    classification: split_with_issue_ref
    split_issue: 1386
    proof_refs:
      - kind: tracker
        issue: 1386
        watchlist: runtime_operations.runtime_store_backend_default_and_sqlite_portability
    notes: >
      Catalog upload/register behavior remains a persisted-bundle public mutator.
      No exact backend-support spec authority currently declares this method
      intentionally Postgres-only, so it remains a #1386 split tail rather than
      a closure-bearing postgres_only exclusion.
  - method: event.publish
    classification: dual_backend_served_proof
    backends: [default_sqlite, explicit_postgres]
    scenario: event_publish_dynamic_auto_emit_lifecycle
    proof_refs:
      - kind: go_test
        name: TestServedParityHarnessEventPublishDynamicAutoEmitLifecycle
    notes: >
      Shared harness owns backend iteration and generic settlement postconditions
      for the #1384 dynamic auto_emit served lifecycle regression.
  - method: event.replay
