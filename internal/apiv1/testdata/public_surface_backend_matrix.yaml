version: 1
kind: public_surface_backend_matrix
issue: 1268
issue_role: canonical_owner
source:
  platform_spec: platform-spec.yaml
  openrpc_artifact: openrpc.json
  adjacent_openrpc_matrix: internal/apiv1/testdata/openrpc_compliance_matrix.yaml
policy:
  closure_level: matrix_owner_first_slice_complete
  claims_parent_closure: false
  named_full_conformance_command: go test ./internal/runtime/cataloge2e -count=1
  required_smoke_policy: >
    Required PR smoke is row/accounting validation plus the smallest selected-backend
    proof refs needed for launch-critical SQLite-default and explicit-Postgres
    public surfaces. The matrix composes existing selected-store, real v1 handler,
    and CLI exact-method proofs instead of expanding every surface into a backend
    Cartesian product.
  mutating_api_parity_classification_policy: >
    Every mutating public method must be classified as direct
    dual_backend_served_proof, covered_transitively, postgres_only_with_spec_ref,
    unsupported_with_issue_ref, or split_with_issue_ref. Deprecated wrapper
    methods whose behavior is inherited from a directly proven mutating method
    use covered_transitively and must name the covered method, covered harness
    scenario, and live proof refs; this classification must not be used as a
    generic bypass for methods with independent backend-sensitive behavior.
  operator_read_api_parity_classification_policy: >
    Every non-mutating public method must be classified as dual_backend_api_proof,
    postgres_only_with_spec_ref, unsupported_with_issue_ref, split_with_issue_ref,
    or different_semantic_concept_with_proof. Dual-backend read proof must include
    selected-backend public-surface evidence for default SQLite and explicit
    Postgres; fake-store OpenRPC probes and store-unit tests alone do not count
    as selected-backend parity proof. Non-HTTP subscription/protocol methods must
    be classified explicitly rather than omitted.
active_trackers:
  - kind: github_issue
    issue: 1239
    watchlist: runtime_operations.runtime_store_backend_default_and_sqlite_portability
  - kind: github_issue
    issue: 1386
    watchlist: runtime_operations.runtime_store_backend_default_and_sqlite_portability
  - kind: watchlist
    issue: 0
    watchlist: operator_surfaces.v1_openrpc_api_conformance
mutating_api_parity_ledger:
