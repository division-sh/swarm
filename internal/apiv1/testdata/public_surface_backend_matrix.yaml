version: 1
kind: public_surface_backend_matrix
issue: 1268
issue_role: canonical_owner
source:
  platform_spec: platform-spec.yaml
  openrpc_artifact: openrpc.json
  adjacent_openrpc_matrix: internal/apiv1/testdata/openrpc_compliance_matrix.yaml
policy:
  closure_level: matrix_owner_first_slice_complete
  claims_parent_closure: false
  named_full_conformance_command: go test ./internal/runtime/cataloge2e -count=1
  required_smoke_policy: >
    Required PR smoke is row/accounting validation plus the smallest selected-backend
    proof refs needed for launch-critical SQLite-default and explicit-Postgres
    public surfaces. The matrix composes existing selected-store, real v1 handler,
    and CLI exact-method proofs instead of expanding every surface into a backend
    Cartesian product.
active_trackers:
  - kind: github_issue
    issue: 1239
    watchlist: runtime_operations.runtime_store_backend_default_and_sqlite_portability
  - kind: watchlist
    issue: 0
    watchlist: operator_surfaces.v1_openrpc_api_conformance
rows:
  - id: serve_contracts_default_sqlite
    surface: default SQLite swarm serve --contracts readiness and API availability
    classification: add_to_matrix
    tier: required_smoke
    backends: [default_sqlite]
    cli_commands: [serve]
    store_owners:
      - internal/store/backendselection
      - cmd/swarm buildStores
      - cmd/swarm runServeRuntime
    proof_dimensions: [backend_selection, selected_store, real_runtime_startup]
    proof_refs:
      - kind: go_test
        name: TestRunServeRuntimeHostWorkspaceBackendBootsWithoutDockerForSystemOnlyFlow
      - kind: go_test
        name: TestRunServeRuntimeFreshEmptySQLiteBootsWithDirectAbandon
      - kind: go_test
        name: TestBuildStoresAcceptsSQLiteSelectedCoreRuntimeStore
    notes: >
      Existing proof establishes no-selector/default SQLite selected-store startup
      through serve-owned runtime construction. This row is required smoke/accounting,
      not a request for a wider serve behavior repair.

  - id: serve_contracts_explicit_postgres
    surface: explicit Postgres swarm serve --contracts readiness and API availability
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [explicit_postgres]
    cli_commands: [serve]
    store_owners:
      - internal/store/backendselection
      - cmd/swarm buildStores
      - cmd/swarm runServeRuntime
    proof_dimensions: [backend_selection, selected_store, real_runtime_startup]
    proof_refs:
      - kind: go_test
        name: TestRunServeRuntimeFreshEmptyPostgresBootstrapsSchemaBeforeDiskContractsServe

  - id: run_contracts_default_sqlite
    surface: default SQLite swarm run --contracts no-service path
    classification: add_to_matrix
    tier: required_smoke
    backends: [default_sqlite]
    cli_commands: [run]
    api_methods: [health.check, run.start, run.get]
    openrpc_matrix_methods: [health.check, run.start, run.get]
    store_owners:
      - cmd/swarm run command local serve owner
      - internal/store/backendselection
      - /v1/rpc health.check
      - /v1/rpc run.start
      - /v1/rpc run.get
    proof_dimensions: [backend_selection, selected_store, real_v1_handler, cli_v1_path, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestRunCommandLocalForegroundConsumesServeOwnerAndV1API
      - kind: go_test
        name: TestBuildStoresAcceptsSQLiteSelectedCoreRuntimeStore
    notes: >
      The row composes run-command local foreground proof with selected SQLite
      store construction proof. It intentionally avoids adding a long external
      process run smoke to every PR.

  - id: run_contracts_explicit_postgres
    surface: explicit Postgres counterpart for swarm run --contracts
    classification: add_to_matrix
    tier: full_conformance
    backends: [explicit_postgres]
    cli_commands: [run]
    api_methods: [health.check, run.start, run.get]
    openrpc_matrix_methods: [health.check, run.start, run.get]
    store_owners:
      - cmd/swarm run command local serve owner
      - internal/store/backendselection
      - /v1/rpc health.check
      - /v1/rpc run.start
      - /v1/rpc run.get
    proof_dimensions: [backend_selection, selected_store, real_v1_handler, cli_v1_path, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestRunCommandLocalForegroundConsumesServeOwnerAndV1API
      - kind: go_test
        name: TestRunServeRuntimeFreshEmptyPostgresBootstrapsSchemaBeforeDiskContractsServe
      - kind: tracker
        issue: 1239
        watchlist: runtime_operations.runtime_store_backend_default_and_sqlite_portability
    notes: >
      This row records the explicit-Postgres counterpart without making Postgres
      startup a required Cartesian duplicate of every fast SQLite run row.

  - id: entity_read_api
    surface: /v1/rpc entity.list, entity.get, and entity.aggregate over selected stores
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    api_methods: [entity.list, entity.get, entity.aggregate]
    openrpc_matrix_methods: [entity.list, entity.get, entity.aggregate]
    store_owners:
      - apiv1.EntityReadStore
      - schema_storage.entity_state
      - platform-spec.yaml entity_registry_policy
    proof_dimensions: [selected_store, real_v1_handler, canonical_store_owner, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestOperatorEntityHandlersServeContractEntityTypesFromSQLite
      - kind: go_test
        name: TestOperatorEntityHandlersServeContractEntityTypesFromPostgres
      - kind: go_test
        name: TestOperatorEntityHandlersExposeEntityNativeReads

  - id: entity_read_cli
    surface: swarm entities list, swarm entity view, and swarm entity aggregate
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    cli_commands: [entities_list, entity_view, entity_aggregate]
    api_methods: [entity.list, entity.get, entity.aggregate]
    openrpc_matrix_methods: [entity.list, entity.get, entity.aggregate]
    store_owners:
      - cmd/swarm entity CLI commands
      - apiv1.EntityReadStore
      - schema_storage.entity_state
    proof_dimensions: [selected_store, real_v1_handler, cli_v1_path, canonical_store_owner, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestEntityCommandsUseSQLiteEntityReadStoreThroughV1API
      - kind: go_test
        name: TestEntitiesListUsesEntityListV1RPCWithFilters
      - kind: go_test
        name: TestOperatorEntityHandlersServeContractEntityTypesFromPostgres
    notes: >
      The Postgres side is accounted for through the API selected-store row and
      the CLI exact-method row. The fast tier must not duplicate every CLI
      command across both backends.

  - id: status_run_get_entity_count
    surface: swarm status and /v1/rpc run.get entity_count correctness
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    cli_commands: [status]
    api_methods: [run.get]
    openrpc_matrix_methods: [run.get]
    store_owners:
      - apiv1.RunReadStore
      - RunHeader.entity_count
      - platform-spec.yaml entity_registry_policy
      - run lifecycle count owners
    proof_dimensions: [selected_store, real_v1_handler, cli_v1_path, canonical_store_owner, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestSQLiteRunAPIReadSurface_LoadListAndDiagnoseEvidence
      - kind: go_test
        name: TestRunAPIReadSurface_LoadAndListRunHeaders
      - kind: go_test
        name: TestOpenRPCReadOnlyHTTPRuntimeProbes
      - kind: go_test
        name: TestStatusUsesDiagnoseAndRunGet
    notes: >
      #1254 / PR #1278 closed the current-run entity_count class by moving
      SQLite and Postgres run headers, lifecycle/debug owners, API run reads,
      builder summaries, and CLI status consumers to canonical run-scoped
      entity_state. This row consumes that closed proof without claiming the
      broader #1239 parent tail is closed.

  - id: event_publish_api
    surface: /v1/rpc event.publish create-new/idempotent publication against SQLite and Postgres
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    api_methods: [event.publish]
    openrpc_matrix_methods: [event.publish]
    store_owners:
      - OperatorEventPublishHandlers
      - runtimebus.EventStore
      - internal/store API idempotency persistence
    proof_dimensions: [selected_store, real_v1_handler, canonical_store_owner, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestOperatorEventPublishSQLiteIdempotentFirstEventPublishesWithoutLock
      - kind: go_test
        name: TestOperatorEventPublishHandlersPersistEventReportDeliveriesAndReplayIdempotency
      - kind: go_test
        name: TestOperatorEventPublishRejectsCallerEntityIDForCreateEntityBeforePersistence
    notes: >
      This covered row is intentionally limited to create-new/idempotent
      publication and create-entity payload identity admission. Existing-run
      served follow-up state advance is covered by the dedicated served-path
      row below.

  - id: api_idempotency_selected_store
    surface: selected-store API idempotency rows for mutating public methods
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    api_methods: [event.publish, run.start]
    openrpc_matrix_methods: [event.publish, run.start]
    store_owners:
      - selectedRuntimeStoreFacade.apiCapabilities
      - apiv1.APIIdempotencyStore
      - internal/store API idempotency persistence
    proof_dimensions: [selected_store, real_v1_handler, canonical_store_owner, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestOperatorRunStartHandlersPersistRootEventAndReplayIdempotency
      - kind: go_test
        name: TestOperatorEventPublishSQLiteIdempotentFirstEventPublishesWithoutLock
      - kind: go_test
        name: TestOperatorEventPublishHandlersPersistEventReportDeliveriesAndReplayIdempotency
    notes: >
      #1402 promotes API idempotency to first-class selected-store accounting.
      The row proves representative mutating public methods consume selected
      store idempotency owners without duplicating every idempotent OpenRPC
      method across both backends.

  - id: event_publish_cli
    surface: swarm event publish create-new publication and exact v1 RPC command shape
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    cli_commands: [event_publish]
    api_methods: [event.publish]
    openrpc_matrix_methods: [event.publish]
    store_owners:
      - cmd/swarm event publish CLI
      - /v1/rpc event.publish
    proof_dimensions: [selected_store, real_v1_handler, cli_v1_path, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestEventPublishUsesEventPublishV1RPCWithBoundParams
      - kind: go_test
        name: TestOperatorEventPublishSQLiteIdempotentFirstEventPublishesWithoutLock
      - kind: go_test
        name: TestOperatorEventPublishHandlersPersistEventReportDeliveriesAndReplayIdempotency
    notes: >
      CLI existing-run follow-up semantics are not claimed by this covered row.
      The exact RPC-shape proof composes with the API create-new/idempotent
      publication proof only; served `--run-id` state-advance coverage is
      covered by the dedicated served-path row below.

  - id: event_publish_existing_run_followup_served_path
    surface: default SQLite served swarm event publish --run-id follow-up state advance and readback
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    cli_commands: [event_publish]
    api_methods: [event.publish]
    openrpc_matrix_methods: [event.publish]
    store_owners:
      - cmd/swarm event publish CLI
      - /v1/rpc event.publish
      - apiv1.RunBundleContextStore
      - runtimebus.EventStore
      - event_deliveries readback owner
    proof_dimensions: [selected_store, real_v1_handler, cli_v1_path, real_runtime_startup, canonical_store_owner, openrpc_publication, served_mutating_lifecycle]
    proof_refs:
      - kind: go_test
        name: TestRunServeRuntimeEventPublishRunIDFollowUpServedPathDefaultSQLite
      - kind: go_test
        name: TestRunServeRuntimeEventPublishRunIDFollowUpServedPathPostgres
      - kind: go_test
        name: TestRunServeRuntimeEventPublishExistingRunActiveLoadServedPathDefaultSQLite
      - kind: go_test
        name: TestRunServeRuntimeEventPublishExistingRunActiveLoadServedPathPostgres
      - kind: go_test
        name: TestBuildStoresSQLiteSelectsRunBundleContextForServedEventPublish
      - kind: go_test
        name: TestOperatorEventPublishSQLiteExplicitRunFollowUpUsesSelectedRun
      - kind: go_test
        name: TestOperatorEventPublishExplicitRunFollowUpRequiresRecipientBeforePersistence
    notes: >
      #1255 closed the served public path proof for default SQLite and explicit
      Postgres: `swarm event publish --run-id` publishes into the selected run,
      advances the system-node flow state, persists event/delivery evidence,
      and reads back through public event, trace, status, and entity surfaces.
      #1434 extends this row with active-load liveness proof: existing-run
      entity-targeted `event.publish` must ACK or fail closed while unrelated
      delivery work remains in progress, without waiting for agent/handler completion.

  - id: event_publish_existing_run_target_route_served_path
    surface: default SQLite and Postgres served swarm event publish --run-id explicit target route identity
    classification: add_to_matrix
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    cli_commands: [event_publish]
    api_methods: [event.publish]
    openrpc_matrix_methods: [event.publish]
    store_owners:
      - cmd/swarm event publish CLI
      - /v1/rpc event.publish
      - runtimebus.EventStore
      - event.target canonical route identity
      - event_deliveries delivery_target_route owner
    proof_dimensions: [selected_store, real_v1_handler, cli_v1_path, real_runtime_startup, canonical_store_owner, openrpc_publication, served_mutating_lifecycle]
    proof_refs:
      - kind: go_test
        name: TestEventPublishSerializesTargetRouteParam
      - kind: go_test
        name: TestOperatorEventPublishExistingRunTargetRouteValidatesAndPersistsCanonicalTarget
      - kind: go_test
        name: TestOperatorEventPublishExistingRunTargetRouteRejectsInvalidTargetBeforePersistence
      - kind: go_test
        name: TestRunServeRuntimeEventPublishTargetRouteServedPathDefaultSQLite
      - kind: go_test
        name: TestRunServeRuntimeEventPublishTargetRouteServedPathPostgres
    notes: >
      #1438 adds the explicit target-route public surface for existing-run
      event.publish. The proof covers typed CLI serialization, API validation
      and persistence of event.target plus delivery_target_route, payload-only
      non-authority, and served SQLite/Postgres state advance/readback through
      the canonical event.publish/EventBus path.

  - id: event_publish_dynamic_auto_emit_served_lifecycle
    surface: /v1/rpc event.publish served dynamic auto_emit_on_create lifecycle parity
    classification: add_to_matrix
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    api_methods: [event.publish]
    openrpc_matrix_methods: [event.publish]
    store_owners:
      - /v1/rpc event.publish
      - runtimebus.EventStore
      - runtimepipeline.WorkflowInstanceStore
      - runtime manager auto_emit_on_create owner
      - event_deliveries readback owner
    proof_dimensions: [selected_store, real_v1_handler, real_runtime_startup, canonical_store_owner, openrpc_publication, served_mutating_lifecycle]
    proof_refs:
      - kind: go_test
        name: TestRunServeRuntimeEventPublishDynamicAutoEmitServedPathDefaultSQLite
      - kind: go_test
        name: TestRunServeRuntimeEventPublishDynamicAutoEmitServedPathPostgres
    notes: >
      #1384 adds the served dynamic auto_emit_on_create parity row missing from
      the simpler existing-run follow-up proof. The proof runs the same fixture
      and lifecycle assertions against default SQLite and explicit Postgres,
      including parent workflow-node delivery terminalization, dynamic child
      dispatch/readback, trace/status/diagnose surfaces, and durable
      event.publish acceptance. This row does not claim full #1386 structural
      lifecycle parity enforcement.

  - id: runtime_log_readback_api
    surface: runtime logs, log subscription, and run trace readback over selected stores
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    api_methods: [runtime.logs, runtime.subscribe_logs, run.trace]
    openrpc_matrix_methods: [runtime.logs, runtime.subscribe_logs, run.trace]
    store_owners:
      - runtime.Stores.RuntimeLogStore
      - apiv1.ObservabilityReadStore
      - internal/store runtime log persistence
    proof_dimensions: [selected_store, real_v1_handler, canonical_store_owner, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestSQLiteRuntimeLogPersistenceWritesLoggerRowsForObservability
      - kind: go_test
        name: TestPostgresRuntimeLogPersistencePreservesRunSourceAndLineage
      - kind: go_test
        name: TestOpenRPCWebSocketRuntimeProbes
      - kind: go_test
        name: TestHandlerWebSocketRuntimeSubscribeLogsUsesOwnerFiltersAndReplay
      - kind: go_test
        name: TestHandlerWebSocketRunSubscribeTraceUsesOwnerReplayAndRunNotFound
    notes: >
      #1402 promotes runtime-log/readback to first-class selected-store
      accounting. Dashboard SQL readers are adjacent read-model consumers; this
      row owns public API selected-store proof only.

  - id: mailbox_read_api_after_mailbox_write
    surface: mailbox.list and mailbox.get after handler-level mailbox_write on selected stores
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    api_methods: [mailbox.list, mailbox.get]
    openrpc_matrix_methods: [mailbox.list, mailbox.get]
    store_owners:
      - runtimepipeline.MailboxWriteMaterializationStore
      - apiv1.MailboxAPIStore
    proof_dimensions: [selected_store, real_v1_handler, canonical_store_owner, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestOperatorMailboxWriteSupportedSurfacePublishesAndReadsAcrossBackends

  - id: mailbox_read_cli
    surface: swarm mailbox list and swarm mailbox view
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    cli_commands: [mailbox_list, mailbox_view]
    api_methods: [mailbox.list, mailbox.get]
    openrpc_matrix_methods: [mailbox.list, mailbox.get]
    store_owners:
      - cmd/swarm mailbox CLI commands
      - apiv1.MailboxAPIStore
    proof_dimensions: [selected_store, real_v1_handler, cli_v1_path, openrpc_publication]
    proof_refs:
      - kind: go_test
        name: TestMailboxListSendsV1RPCRequestAndRendersResult
      - kind: go_test
        name: TestMailboxViewSendsV1RPCRequestAndRendersDetail
      - kind: go_test
        name: TestOperatorMailboxWriteSupportedSurfacePublishesAndReadsAcrossBackends

  - id: serve_dev_abandon_active_runs
    surface: swarm serve --dev and --abandon-active-runs selected-store quiescence
    classification: already_covered_by_existing_proof
    tier: required_smoke
    backends: [default_sqlite, explicit_postgres]
    cli_commands: [serve]
    store_owners:
      - runtimerunquiescence.ServeAbandonStore
      - SQLiteRuntimeStore.ApplyServeAbandonActiveRunQuiescence
      - PostgresStore.ApplyServeAbandonActiveRunQuiescence
    proof_dimensions: [selected_store, canonical_store_owner, real_runtime_startup]
    proof_refs:
      - kind: go_test
        name: TestRunServeRuntimeFreshEmptySQLiteBootsWithDevAbandon
      - kind: go_test
        name: TestRunServeRuntimeFreshEmptySQLiteBootsWithDirectAbandon
      - kind: go_test
        name: TestRunServeRuntimeSQLiteAbandonActiveRunsQuiescesBeforeReadiness
      - kind: go_test
        name: TestRunServeRuntimeFreshEmptyPostgresBootstrapsSchemaBeforeDevAbandon

  - id: handler_create_entity_exact_once
    surface: create-entity handler effect exact-once and mutation-log cardinality after #1253
    classification: already_covered_by_existing_proof
    tier: full_conformance
    backends: [postgres_only]
    store_owners:
      - WorkflowInstanceStore
      - SystemNodeProcessed receipt owner
      - mutation_log
    proof_dimensions: [canonical_store_owner, full_conformance]
    proof_refs:
      - kind: go_test
        name: TestCatalogCreateEntityHandlerEffectCardinality
      - kind: manual_command
        command: go test ./internal/runtime/cataloge2e -count=1
    notes: >
      This is a Postgres-only semantic correctness/full conformance row, not a
      basic API or CLI registration row. It must not be used as SQLite
      conformance proof unless a SQLite catalog E2E harness is added under a
      separate gate.

  - id: remaining_openrpc_selected_backend_tail
    surface: remaining supported OpenRPC methods without selected-backend public-surface classification
    classification: split_to_existing_issue
    tier: future_parent_tail
    split_issue: 1239
    backends: [default_sqlite, explicit_postgres]
    store_owners:
      - internal/apiv1/testdata/openrpc_compliance_matrix.yaml
      - future selected-backend public-surface rows
    proof_dimensions: [split_tracker, openrpc_publication]
    proof_refs:
      - kind: artifact
        path: internal/apiv1/testdata/openrpc_compliance_matrix.yaml
      - kind: tracker
        issue: 1239
        watchlist: runtime_operations.runtime_store_backend_default_and_sqlite_portability
    notes: >
      The existing OpenRPC matrix remains authoritative for method publication,
      schema, and transport proof. Backend support for every method remains a
      parent-tail classification task, not first-slice behavior repair.

  - id: bundle_hash_catalog_boot_postgres_only
    surface: DB-loaded swarm serve --bundle-hash catalog boot
    classification: different_semantic_concept_with_proof
    tier: postgres_only_fail_closed
    backends: [postgres_only]
    cli_commands: [serve]
    store_owners:
      - platform-spec.yaml runtime_store_backend_selection
      - Postgres bundle catalog boot owner
    proof_dimensions: [backend_selection, fail_closed, split_tracker]
    proof_refs:
      - kind: go_test
        name: TestCLI_ServeBundleHashValidationAndSerialScope
      - kind: artifact
        path: platform-spec.yaml
      - kind: tracker
        issue: 1239
        watchlist: runtime_operations.runtime_store_backend_default_and_sqlite_portability
    notes: >
      SQLite local/dev runtime support does not promote DB-loaded persisted
      bundle catalog boot. The executable proof covers `serve --bundle-hash ...
      --store sqlite` failing with the typed `--bundle-hash requires --store
      postgres` diagnostic. SQLite DB-loaded bundle boot remains an intentional
      Postgres-only split until separately gated.
