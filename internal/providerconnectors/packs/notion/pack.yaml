id: provider.notion.connector
version: 0.1.0
platform_version: ">=0.7.0 <0.8.0"
type: connector
manifest_hash: sha256:13eac03cffe51fd399ef7f53dd8b0c2039ec36eca58fcb2f144f54fe87bdf50b
provenance:
  source: platform
capabilities:
  can:
    call_provider_actions:
      - notion.append_block_children
    lower_through_activity: true
    journal_activity_attempts: true
  cannot:
    - bypass activity_attempts
    - retry non_idempotent_write automatically
    - expose credential values
requires:
  managed_credentials:
    - notion_oauth
tests:
  - providerconnectors/notion_pack
  - runtime/notion_connector_managed_credential_supported_surface
