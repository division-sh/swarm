provider: notion
tools:
  notion.append_block_children:
    category: provider_connector
    description: append Notion block children
    handler_type: http
    effect_class: non_idempotent_write
    managed_credential:
      key: notion_oauth
      grant_model: workspace_grant
      token_request:
        client_auth: basic
        body: json
        static_headers:
          Notion-Version: "2026-03-11"
    input_schema:
      type: object
      properties:
        block_id:
          type: string
        children:
          type: array
          items:
            type: object
      required:
        - block_id
        - children
    output_schema:
      type: object
    http:
      method: PATCH
      url: https://api.notion.com/v1/blocks/{{input.block_id}}/children
      headers:
        Notion-Version: "2026-03-11"
      body:
        children: "{{input.children}}"
