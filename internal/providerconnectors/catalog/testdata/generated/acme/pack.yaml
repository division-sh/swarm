id: provider.acme.connector
version: 0.1.0
platform_version: '>=0.7.0 <0.8.0'
type: connector
manifest_hash: sha256:6a833ccfc84f86ef2c4328e8cd8d740c2128fe18ff29d8b15fce1cbdba6dc3d8
provenance:
    source: platform
capabilities:
    can:
        call_provider_actions:
            - acme.create_widget
        lower_through_activity: true
        journal_activity_attempts: true
    cannot:
        - bypass activity_attempts
        - retry non_idempotent_write automatically
        - expose credential values
requires:
    secrets:
        - acme_api_key
tests:
    - providerconnectors/acme_generated_conformance
