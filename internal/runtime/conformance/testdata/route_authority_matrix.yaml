version: 1
kind: route_authority_conformance_matrix
issue: 1346
parent_issue: 1340
source:
  platform_spec: platform-spec.yaml
  openrpc_artifact: openrpc.json
  public_surface_backend_matrix: internal/apiv1/testdata/public_surface_backend_matrix.yaml
  multi_bundle_matrix: internal/runtime/conformance/testdata/multi_bundle_option_a_matrix.yaml
  catalog_tiers: internal/runtime/cataloge2e/README.md
policy:
  closure_level: matrix_owner_first_slice_complete
  claims_parent_closure: false
  full_proof_projection: required-full
  required_smoke_policy: >
    Required PR smoke proves the matrix owner, the RoutePlan contract/model,
    the covered publish/readback consumers, and the smallest SQLite-default plus
    explicit-Postgres served evidence needed for route-authority accounting.
    Full catalog/replay/fork coverage stays in the named full conformance
    command so route authority does not become a backend x surface x route
    Cartesian suite.
active_trackers:
  - kind: github_issue
    issue: 1340
    watchlist: runtime_operations.delivery_and_replay_ownership
  - kind: github_issue
    issue: 1481
    watchlist: runtime_operations.delivery_and_replay_ownership
rows:
  - id: route_plan_spec_contract
    concept: RoutePlan is the publish-time typed authority and event_deliveries is the durable authority sink.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [source_authority, openrpc_publication, persistence_authority, required_pr_smoke]
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_plan_authority}
      - {kind: spec_ref, path: platform-spec.yaml, ref: workflow_node_route_authority}
      - {kind: artifact, path: openrpc.json}
    proof_refs:
      - {kind: pr, pr: 1347}
      - {kind: go_test, name: TestGeneratedOpenRPCArtifactMatchesPlatformSpec}
      - {kind: go_test, name: TestOpenRPCComplianceMatrixCoversEveryGeneratedMethod}
      - {kind: command, command: "go run ./cmd/swarm-openrpc-gen --check"}
    notes: >
      Closed #1342 owns the merge-bearing spec/OpenRPC contract. This matrix
      cites it as source authority and does not redefine route semantics.

  - id: eventbus_route_plan_model
    concept: EventBus owns the canonical internal RoutePlan model and materializer.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [route_plan_model, source_authority, required_pr_smoke]
    owner_refs:
      - {kind: artifact, path: internal/runtime/bus/route_plan.go}
      - {kind: artifact, path: internal/runtime/bus/eventbus_target_routes_test.go}
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_plan_authority}
    proof_refs:
      - {kind: pr, pr: 1348}
      - {kind: go_test, name: TestEventBusRecipientPlanMaterializerNormalizesRoutePlanDirectly}
      - {kind: go_test, name: TestRouteTableRootInputFlowNodeResolvesRootInputRoute}
    notes: >
      Closed #1343 owns the runtime model row. Consumers must cite RoutePlan or
      persisted event_deliveries, not reconstruct recipient authority locally.

  - id: publish_preflight_deferred_outbox_consumers
    concept: Publish, PublishInMutation, preflight, deferred publish, and outbox paths consume one RoutePlan authority.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [route_plan_model, persistence_authority, required_pr_smoke]
    owner_refs:
      - {kind: artifact, path: internal/runtime/bus/eventbus_publish.go}
      - {kind: artifact, path: internal/runtime/bus/outbox.go}
      - {kind: spec_ref, path: platform-spec.yaml, ref: persistence_requirements}
    proof_refs:
      - {kind: pr, pr: 1349}
      - {kind: go_test, name: TestEventBusCheckPublishRecipientPlanReportsSubscribedPublishWithoutDelivery}
      - {kind: go_test, name: TestEventBusCommittedPublishDispatch_NodeOnlyRouteDoesNotRequireAgentChannel}
      - {kind: go_test, name: TestEngineOutboxSubscribedIntentConsumesCanonicalMaterializedRoutePlan}
    notes: >
      Closed #1344 owns these publish-side consumer rows. They are required
      smoke because they prove the main write path consumes the same RoutePlan.

  - id: public_operator_typed_readback
    concept: API, CLI, OpenRPC, and dashboard readback consume persisted typed delivery identity without creating authority.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [public_projection, real_v1_handler, cli_v1_path, openrpc_publication, required_pr_smoke]
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: public_projection_policy}
      - {kind: spec_ref, path: platform-spec.yaml, ref: operator_api_disposition}
      - {kind: artifact, path: internal/apiv1/testdata/public_surface_backend_matrix.yaml}
    proof_refs:
      - {kind: pr, pr: 1350}
      - {kind: openrpc_method, method: event.publish}
      - {kind: openrpc_method, method: event.list}
      - {kind: openrpc_method, method: event.get}
      - {kind: openrpc_method, method: event.subscribe}
      - {kind: go_test, name: TestEventPublishUsesEventPublishV1RPCWithBoundParams}
      - {kind: go_test, name: TestEventPublishMalformedResultsFailClosed}
      - {kind: go_test, name: TestSQLObservabilityReader_ListEvents_FiltersTypedSubscriberIdentity}
      - {kind: go_test, name: TestSQLObservabilityReader_GetEvent_UsesCanonicalDeliveryRows}
    notes: >
      Closed #1345 owns public/operator typed readback. Green readback is
      explicitly consumer proof only, not route authority proof.

  - id: served_root_input_event_publish_supported_surfaces
    concept: Served root-input event.publish proof persists typed workflow-node authority for SQLite and Postgres.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [default_sqlite, explicit_postgres, real_v1_handler, cli_v1_path, persistence_authority, required_pr_smoke]
    owner_refs:
      - {kind: artifact, path: internal/apiv1/testdata/public_surface_backend_matrix.yaml}
      - {kind: spec_ref, path: platform-spec.yaml, ref: event.publish}
      - {kind: spec_ref, path: platform-spec.yaml, ref: workflow_node_route_authority}
    proof_refs:
      - {kind: go_test, name: TestRunServeRuntimeEventPublishRunIDFollowUpServedPathDefaultSQLite}
      - {kind: go_test, name: TestRunServeRuntimeEventPublishRunIDFollowUpServedPathPostgres}
      - {kind: issue, issue: 1337}
    notes: >
      The served proof asserts that the initial root-input publication persists
      typed node/entity-writer event_deliveries authority before the workflow
      node result is accepted. #1293 remains the separate execution-admission
      consumer of that persisted authority.

  - id: top_level_project_node_event_publish_materialization
    concept: Top-level project workflow-node routes are materialized into typed event_deliveries before admission, even when a live workflow-runtime carrier also exists.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [route_plan_model, default_sqlite, explicit_postgres, real_v1_handler, persistence_authority, negative_authority, required_pr_smoke]
    invalid_authority:
      - workflow-runtime carrier route
      - live internal carrier subscription
      - handler lookup
      - event_receipts settlement/backfill
      - replay-scope markers
      - legacy InsertEventDeliveries agent-only fallback
    owner_refs:
      - {kind: artifact, path: internal/runtime/bus/routing_derivation.go}
      - {kind: artifact, path: internal/runtime/bus/eventbus_publish.go}
      - {kind: artifact, path: internal/runtime/bus/eventbus_target_routes_test.go}
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_plan_authority}
      - {kind: spec_ref, path: platform-spec.yaml, ref: workflow_node_route_authority}
    proof_refs:
      - {kind: issue, issue: 1355}
      - {kind: go_test, name: TestRouteTableTopLevelProjectNodeResolvesProgrammaticRootInputRoute}
      - {kind: go_test, name: TestEventBusPublish_TopLevelProjectNodePersistsRouteBeforeInterceptor}
      - {kind: go_test, name: TestEventBusPublish_NodeRouteFailsClosedWithoutRouteSetPersistence}
      - {kind: go_test, name: TestOperatorMailboxWriteSupportedSurfacePublishesAndReadsAcrossBackends}
      - {kind: go_test, name: TestOperatorRuleMailboxWriteSupportedSurfaceIsBranchScopedAcrossBackends}
      - {kind: go_test, name: TestOperatorMailboxWriteSupportedSurfaceMissingMaterializerIsLoud}
      - {kind: go_test, name: TestTemplateInstanceActivationConfigSubscriberPersistsRenderedRouteAndDeliveryRows}
    notes: >
      #1355 closes the first producer/materialization slice exposed by #1293:
      programmatic/top-level project nodes are part of the root project route
      topology, and non-agent typed delivery routes require the route-set
      persistence owner instead of lossy legacy agent-only fallback. This row
      does not claim #1293 execution admission, #1299 wildcard route production,
      or #1301 runtime callback localization closed.

  - id: concrete_template_no_target_node_delivery_route_materialization
    concept: Already-concrete no-target flow-instance events persist semantic workflow-node authority separately from workflow-runtime carrier dispatch.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [route_plan_model, persistence_authority, negative_authority, required_pr_smoke]
    invalid_authority:
      - workflow-runtime carrier route
      - live internal carrier subscription
      - event_receipts settlement/backfill
      - replay-scope markers
    owner_refs:
      - {kind: artifact, path: internal/runtime/bus/delivery_planner.go}
      - {kind: artifact, path: internal/runtime/bus/eventbus_target_routes_test.go}
      - {kind: spec_ref, path: platform-spec.yaml, ref: workflow_node_route_authority}
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_plan_authority}
    proof_refs:
      - {kind: issue, issue: 1294}
      - {kind: go_test, name: TestDeliveryPlanner_NoTargetConcreteRoutedNodePersistsSemanticNodeRoute}
      - {kind: go_test, name: TestEventBusPublish_NoTargetConcreteRoutedNodePersistsSemanticNodeRoute}
      - {kind: go_test, name: TestTemplateInstanceNoTargetSystemNodeDeliveryPersistsReceiptAndReplayScopeSeparately}
    notes: >
      #1294 owns the already-concrete no-target template flow-instance shape,
      for example operating/inst-1/opco.product_initialization_requested with
      flow_instance=operating/inst-1. The persisted route-authority row is the
      semantic workflow node, such as node/lifecycle-orchestrator. A live
      workflow-runtime carrier may dispatch the event, but it is not the
      executable delivery authority consumed by #1293.

  - id: workflow_node_execution_admission
    concept: Workflow-node execution must require committed node delivery authority before handler execution.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [persistence_authority, negative_authority, default_sqlite, explicit_postgres, required_pr_smoke]
    invalid_authority:
      - workflow-runtime carrier route
      - live internal carrier subscription
      - handler lookup
      - processed receipts
      - event_receipts settlement/backfill
      - replay-scope markers
      - API/CLI readback
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: execution_admission}
      - {kind: spec_ref, path: platform-spec.yaml, ref: workflow_node_route_authority}
      - {kind: artifact, path: internal/runtime/pipeline/workflow_nodes.go}
      - {kind: artifact, path: internal/runtime/pipeline/node_system_runner.go}
      - {kind: artifact, path: internal/runtime/pipeline/system_node_receipt_store.go}
    proof_refs:
      - {kind: issue, issue: 1293}
      - {kind: go_test, name: TestPipelineCoordinatorInterceptSkipsNodeWithoutPersistedDeliveryAuthority}
      - {kind: go_test, name: TestPipelineCoordinatorInterceptReplayScopeMarkerDoesNotAuthorizeConcreteNode}
      - {kind: go_test, name: TestPipelineCoordinatorInterceptSkipsWhenCanonicalDeliveryAuthorityUnavailable}
      - {kind: go_test, name: TestPipelineCoordinatorInterceptSettlesAuthorizedNodeDelivery}
      - {kind: go_test, name: TestSystemNodeRunner_SkipsWithoutPersistedNodeDeliveryAuthority}
      - {kind: go_test, name: TestSystemNodeProcessedSettlementFailsWithoutNodeDeliveryAuthority}
      - {kind: go_test, name: TestSQLiteRuntimeStoreSystemNodeReceiptOwnerFailsWithoutDeliveryAuthority}
      - {kind: go_test, name: TestRunServeRuntimeEventPublishRunIDFollowUpServedPathDefaultSQLite}
      - {kind: go_test, name: TestRunServeRuntimeEventPublishRunIDFollowUpServedPathPostgres}
    notes: >
      #1293 owns execution admission. Workflow nodes now consume committed
      typed node event_deliveries authority before handler execution across the
      coordinator and system/background runner paths. Settlement, backfill,
      receipts, carrier dispatch, replay markers, handler lookup, and readback
      remain invalid authority.

  - id: wildcard_static_service_route_production
    concept: Wildcard static-service route-table matches for concrete child-flow events persist typed workflow-node authority for the static service subscriber.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [route_plan_model, persistence_authority, negative_authority, required_pr_smoke]
    invalid_authority:
      - hardcoded Empire diagnostic route
      - workflow-runtime carrier route
      - live internal carrier subscription
      - handler lookup
      - event_receipts settlement/backfill
      - replay-scope markers
      - API/CLI readback
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: wildcard_routes}
      - {kind: spec_ref, path: platform-spec.yaml, ref: workflow_node_route_authority}
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_plan_authority}
      - {kind: artifact, path: internal/runtime/bus/delivery_planner.go}
      - {kind: artifact, path: internal/runtime/bus/routing_derivation_internal_test.go}
      - {kind: artifact, path: internal/runtime/bus/eventbus_target_routes_test.go}
    proof_refs:
      - {kind: issue, issue: 1299}
      - {kind: go_test, name: TestRouteTableResolve_WildcardSubscriberMatchesActiveConcreteChildEventWithoutMaterializedKey}
      - {kind: go_test, name: TestDeliveryPlanner_NoTargetWildcardStaticServiceRoutedNodeUsesSubscriberScope}
      - {kind: go_test, name: TestEventBusPublish_WildcardStaticServiceNodePersistsRouteBeforeInternalCarrier}
    notes: >
      #1299 owns concrete wildcard static-service route production, for example
      component-scaffold/*/opco.repo_scaffold_requested matching
      component-scaffold/<id>/opco.repo_scaffold_requested and persisting the
      static service node delivery row. RouteTable remains the wildcard matcher;
      RoutePlan owns typed delivery materialization; live carriers, receipts,
      replay markers, and readback are not authority.

  - id: runtime_callback_flow_instance_localization
    concept: Runtime callback events with unprefixed local names plus concrete flow_instance normalize into same-flow route keys and persist typed workflow-node delivery authority.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [route_plan_model, persistence_authority, negative_authority, required_pr_smoke]
    invalid_authority:
      - artifact-specific callback fallback
      - workflow-runtime carrier route
      - live internal carrier subscription
      - handler lookup
      - event_receipts settlement/backfill
      - replay-scope markers
      - API/CLI readback
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: runtime_callback_routes}
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_plan_authority}
      - {kind: spec_ref, path: platform-spec.yaml, ref: workflow_node_route_authority}
      - {kind: artifact, path: internal/runtime/bus/delivery_planner.go}
      - {kind: artifact, path: internal/runtime/bus/eventbus_target_routes_test.go}
    proof_refs:
      - {kind: issue, issue: 1301}
      - {kind: go_test, name: TestRoutedEventKeysForPlan_RuntimeCallbackLocalEventWithFlowInstanceDerivesConcreteKey}
      - {kind: go_test, name: TestEventBusPublish_RuntimeCallbackLocalEventPersistsSameFlowNodeRouteBeforeInternalCarrier}
    notes: >
      #1301 closes runtime callback flow_instance localization. Runtime-owned
      artifact callbacks such as repo_scaffold.repo_commit_succeeded and
      repo_scaffold.repo_commit_failed may carry unprefixed local event names
      with flow_instance=repo-scaffold/<id>; EventContext route-key derivation
      normalizes them to repo-scaffold/<id>/<local_event>, RoutePlan produces
      typed node recipients, and event_deliveries persists node authority
      before workflow-runtime carrier dispatch or #1293 execution admission.

  - id: route_authority_drift_guardrail_inventory
    concept: The #1364 route-authority drift inventory/matrix is promoted for #1494 as the conformance guardrail owner.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [guardrail_inventory, source_authority, required_pr_smoke]
    owner_refs:
      - {kind: artifact, path: internal/runtime/conformance/testdata/route_authority_drift_inventory.yaml}
      - {kind: artifact, path: internal/runtime/conformance/route_authority_drift_inventory_test.go}
      - {kind: artifact, path: internal/runtime/conformance/testdata/route_authority_matrix.yaml}
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_authority_drift_guardrails}
    proof_refs:
      - {kind: issue, issue: 1494}
      - {kind: go_test, name: TestRouteAuthorityDriftInventoryCoversRepoWideSearchDimensions}
      - {kind: go_test, name: TestRouteAuthorityDriftInventoryRejectsUnclassifiedRouteLikeProducer}
      - {kind: go_test, name: TestRouteAuthorityMatrixCoversApprovedRows}
    notes: >
      #1494 reuses and hardens the existing #1364 conformance owner instead of
      creating a parallel route-seam inventory. The inventory now has
      CI-visible classified-path guards for route-like producers/interpreters.

  - id: lowered_connect_route_plan_authority_input
    concept: Lowered ConnectRoutePlan artifacts are route-intent authority inputs consumed by EventBus RoutePlan production.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [connect_route_plan, route_plan_model, source_authority, required_pr_smoke]
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_plan_lowering}
      - {kind: spec_ref, path: platform-spec.yaml, ref: lowered_connect_route_plan_consumption}
      - {kind: artifact, path: internal/runtime/core/pinrouting/connect_route_plan.go}
      - {kind: artifact, path: internal/runtime/bus/connect_route_plan_dispatch.go}
    proof_refs:
      - {kind: issue, issue: 1472}
      - {kind: issue, issue: 1473}
      - {kind: issue, issue: 1494}
      - {kind: issue, issue: 1545}
      - {kind: issue, issue: 1546}
      - {kind: issue, issue: 1890}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansUsesTemplateInstanceKey}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansUsesFanInStreamSingularTarget}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansAllowsFanInStreamEventIDDedup}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansFailsClosedForInvalidFanInStream}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansPreservesAddressedTemplateRoute}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansBroadcastBeatsInstanceKey}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansUsesRenamedInstanceKeyAdapter}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansFailsClosedForInvalidRenamedInstanceKeyAdapter}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlanDoesNotDependOnRawPinNamesOrProducerTargets}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanPersistsSingularTargetWithoutLiveSubscriber}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanPersistsTemplateInstanceKeyTarget}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanPersistsRenamedTemplateInstanceKeyTarget}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanBroadcastIgnoresInstanceKeyFiltering}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanFailsClosedForTemplateInstanceKeyGaps}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanFailsClosedForRenamedTemplateInstanceKeySourceGap}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanFailsClosedForUnsupportedBusinessFieldTarget}
      - {kind: go_test, name: TestFanInStreamConformance_RoutesToSingletonAndKernelEnforcesWindowedDedup}
      - {kind: go_test, name: TestFanInStreamConformance_EventIDDedupUsesEventIdentity}
    notes: >
      ConnectRoutePlan is a typed route-intent input, not an untracked string
      fallback. #1545 records the selected route authority in ResolutionKind so
      explicit addressed-input routing cannot be shadowed by addressless
      instance-key materialization. #1495 owns additional typed producer
      migration after this guardrail is in place.

  - id: route_table_resolve_role_separation
    concept: RouteTable.Resolve usages must be classified by role instead of treated as generic route authority.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [route_table_resolve, connect_route_plan, split_tracker, required_pr_smoke]
    owner_refs:
      - {kind: artifact, path: internal/runtime/bus/connect_route_plan_dispatch.go}
      - {kind: artifact, path: internal/runtime/runforkadmission/contract_frontier.go}
      - {kind: artifact, path: internal/runtime/runforkadmission/selected_route_history.go}
      - {kind: artifact, path: internal/runtime/runstart/root_inputs.go}
      - {kind: spec_ref, path: platform-spec.yaml, ref: receiver_carrier_lookup_boundary}
    proof_refs:
      - {kind: issue, issue: 1485}
      - {kind: issue, issue: 1494}
      - {kind: go_test, name: TestConnectRoutePlanReceiverCarrierKeysUseSelectedReceiverIdentity}
      - {kind: go_test, name: TestSelectedContractRunForkRouteConsumersAreClassifiedOutsideEventBusRouteAuthority}
      - {kind: go_test, name: TestDeriveRootInputSetRequiresDeclaredAndRoutableRootInput}
    notes: >
      EventBus connect dispatch uses RouteTable only as selected receiver-carrier
      lookup. Runstart/runfork use RouteTable for split admission/readiness
      route facts, not EventBus publish-time authority.

  - id: receiver_carrier_lookup_not_authority
    concept: Receiver-carrier lookup is post-identity carrier evidence and cannot repair a matched ConnectRoutePlan decision.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [connect_route_plan, route_table_resolve, negative_authority, required_pr_smoke]
    invalid_authority:
      - producer/source endpoint keys
      - raw producer event names
      - live subscriber fallback keys
      - legacy route/subscriber interpretations after matched ConnectRoutePlan
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: receiver_carrier_lookup_boundary}
      - {kind: artifact, path: internal/runtime/bus/connect_route_plan_dispatch.go}
      - {kind: artifact, path: internal/runtime/bus/routing_derivation.go}
    proof_refs:
      - {kind: issue, issue: 1485}
      - {kind: go_test, name: TestConnectRoutePlanReceiverCarrierKeysUseSelectedReceiverIdentity}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanWithOnlySourceAndRawSubscribersFailsClosed}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanFailureSkipsRecipientPlanMaterializer}
    notes: >
      Receiver carriers may locate the concrete runtime handler after selected
      route identity exists. They are invalid authority for source/raw fallback
      and cannot revive a failed matched ConnectRoutePlan.

  - id: descriptor_evidence_not_authority
    concept: Descriptor evidence may support approved runtime target materialization but is not route authority.
    classification: add_to_matrix
    tier: required_pr_smoke
    proof_dimensions: [descriptor_evidence, negative_authority, split_tracker, required_pr_smoke]
    invalid_authority:
      - active-agent descriptor lookup
      - active target descriptors
      - handler descriptor lookup
      - unsupported, nested, or unindexed business-field descriptor targets
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: descriptor_evidence_boundary}
      - {kind: spec_ref, path: platform-spec.yaml, ref: supported_descriptor_targets}
      - {kind: artifact, path: internal/runtime/bus/connect_route_plan_dispatch.go}
      - {kind: artifact, path: internal/runtime/bus/eventbus.go}
      - {kind: artifact, path: internal/runtime/engine/interfaces.go}
    proof_refs:
      - {kind: issue, issue: 1479}
      - {kind: issue, issue: 1494}
      - {kind: issue, issue: 1545}
      - {kind: go_test, name: TestConnectRoutePlanDescriptorsLoadOnlyForRuntimeResolution}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansPreservesAddressedTemplateRoute}
      - {kind: go_test, name: TestLowerCompositionConnectRoutePlansBroadcastBeatsInstanceKey}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanPersistsTemplateInstanceKeyTarget}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanBroadcastIgnoresInstanceKeyFiltering}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanFailsClosedForTemplateInstanceKeyGaps}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanPersistsIndexedBusinessFieldTarget}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanPersistsIndexedBusinessFieldTargetSet}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanFailsClosedForBusinessFieldDescriptorGaps}
      - {kind: go_test, name: TestEventBusPublish_ConnectRoutePlanFailsClosedForUnsupportedBusinessFieldTarget}
      - {kind: go_test, name: TestEventBusPinRoutingDescriptorsIncludeActiveDynamicFlowInstances}
      - {kind: go_test, name: TestPostgresStoreListActiveFlowInstanceDescriptorsFiltersToActiveTemplates}
      - {kind: go_test, name: TestSQLiteRuntimeStoreListActiveFlowInstanceDescriptorsFiltersToActiveTemplates}
    notes: >
      Descriptor evidence remains limited to identity-style targets and
      top-level receiver entity fields explicitly declared with indexed: true.
      It is evidence for ConnectRoutePlan materialization, not topology
      authority. Nested, arbitrary, undeclared, unindexed, config, and instance
      business-field descriptor/index authority remains split to #1466 or later
      gated children.

  - id: event_delivery_plan_compatibility_removed
    concept: Legacy eventDeliveryPlan and CanonicalRoutePlan compatibility projection are invalid old authority paths removed behind RoutePlan.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [compatibility_adapter, route_plan_model, negative_authority, required_pr_smoke]
    invalid_authority:
      - legacy eventDeliveryPlan as final authority
      - CanonicalRoutePlan fallback from legacy projection
      - routePlanFromLegacyEventDeliveryPlan as new producer
    owner_refs:
      - {kind: artifact, path: internal/runtime/bus/route_plan.go}
      - {kind: artifact, path: internal/runtime/bus/route_plan_test.go}
      - {kind: artifact, path: internal/runtime/bus/eventbus_publish.go}
      - {kind: spec_ref, path: platform-spec.yaml, ref: legacy_event_delivery_plan_collapse}
    proof_refs:
      - {kind: issue, issue: 1496}
      - {kind: go_test, name: TestRoutePlanDoesNotExposeLegacyEventDeliveryPlanCompatibility}
      - {kind: go_test, name: TestRoutePlanNormalizationPreservesAuthorityState}
      - {kind: go_test, name: TestEventBusRecipientPlanMaterializerNormalizesRoutePlanDirectly}
    notes: >
      #1496 removes the live compatibility adapter and fallback interpreter so
      subscribed and direct planning return RoutePlan directly. The guard test
      fails if production bus files reintroduce the old adapter names.

  - id: direct_delivery_route_plan_consumption
    concept: Direct delivery and operator replay direct publish are explicit direct RoutePlan consumers, not subscribed RoutePlan authority.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [direct_delivery, route_plan_model, negative_authority, required_pr_smoke]
    invalid_authority:
      - caller-supplied direct recipient list as subscribed route authority
      - operator replay direct path as fresh route planner
    owner_refs:
      - {kind: artifact, path: internal/runtime/bus/delivery_planner.go}
      - {kind: artifact, path: internal/runtime/bus/eventbus_publish.go}
      - {kind: artifact, path: internal/apiv1/operator_event_replay.go}
      - {kind: spec_ref, path: platform-spec.yaml, ref: direct_delivery_route_plan_consumption}
    proof_refs:
      - {kind: issue, issue: 1496}
      - {kind: go_test, name: TestEventBusPublishDirect_PersistsButDoesNotMarkDeliveredBeforeRealFanOut}
      - {kind: go_test, name: TestEventBusPublishDirect_FiltersEntityScopedRecipientsByExplicitMetadata}
      - {kind: go_test, name: TestEngineOutboxAndDispatcher_UseCanonicalDirectRecipientManifest}
      - {kind: go_test, name: TestOperatorEventReplayPublishesDistinctReplayEventAuditAndIdempotency}
      - {kind: go_test, name: TestOperatorEventReplaySubsetAndFailClosedCases}
    notes: >
      Direct delivery stays public and explicit, but PlanDirect now produces a
      RoutePlan directly and direct publish/replay/outbox consumers use that
      RoutePlan path instead of a compatibility projection.

  - id: route_plan_source_reason_constants
    concept: RoutePlan source/reason constants and authority state are carried by the typed EventBus route-intent producer model.
    classification: already_covered_by_existing_proof
    tier: required_pr_smoke
    proof_dimensions: [source_reason_constants, route_plan_model, guardrail_inventory, required_pr_smoke]
    owner_refs:
      - {kind: artifact, path: internal/runtime/bus/route_plan.go}
      - {kind: artifact, path: internal/runtime/conformance/testdata/route_authority_drift_inventory.yaml}
      - {kind: spec_ref, path: platform-spec.yaml, ref: decision_state}
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_intent_producer_model}
    proof_refs:
      - {kind: issue, issue: 1494}
      - {kind: issue, issue: 1495}
      - {kind: go_test, name: TestRoutePlanCanonicalFailClosedDropsExecutableRoutes}
      - {kind: go_test, name: TestRoutePlanDeliveryIntentsCarryTypedProducer}
      - {kind: go_test, name: TestRoutePlanProducerHelpersRequireTypedProducer}
      - {kind: go_test, name: TestRouteAuthorityDriftInventoryCoversRepoWideSearchDimensions}
      - {kind: go_test, name: TestRouteAuthorityDriftInventoryRejectsUnclassifiedRouteLikeProducer}
    notes: >
      #1495 promotes source/reason metadata into a typed route-intent producer
      model so EventBus RoutePlan producers no longer call broad helper APIs with
      independent raw source/reason strings.

  - id: live_carriers_handler_lookup_descriptors_not_authority
    concept: Live carriers, interceptors, handler lookup, and active descriptors are consumers or observations only.
    classification: add_to_matrix
    tier: required_pr_smoke
    proof_dimensions: [negative_authority, route_plan_model, required_pr_smoke]
    invalid_authority:
      - live internal carriers
      - workflow-runtime interceptors
      - handler lookup
      - active descriptors
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: live_dispatch}
      - {kind: spec_ref, path: platform-spec.yaml, ref: route_topology}
    proof_refs:
      - {kind: go_test, name: TestEventBusPublish_RootInputFlowNodePersistsRouteBeforeInterceptorWithoutInternalCarrier}
      - {kind: go_test, name: TestEventBusPublish_NodeOnlyRouteDoesNotRequireAgentChannel}
      - {kind: go_test, name: TestDeliveryRecipientPolicy_KeepsInternalSubscribersLiveOnlyUnderDescriptorPlanning}
    notes: >
      These paths may dispatch or observe work after authority exists. They
      must not create, repair, or replace missing typed RoutePlan recipients.

  - id: receipts_settlement_backfill_not_authority
    concept: Receipts, settlement, backfill, processed markers, dead letters, and retry counters describe post-authority work.
    classification: add_to_matrix
    tier: required_pr_smoke
    proof_dimensions: [negative_authority, persistence_authority, required_pr_smoke]
    invalid_authority:
      - event_receipts
      - settlement and backfill
      - processed markers
      - dead-letter state
      - retry counters
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: completion_evidence}
      - {kind: spec_ref, path: platform-spec.yaml, ref: event_receipts}
    proof_refs:
      - {kind: go_test, name: TestTemplateInstanceNoTargetSystemNodeDeliveryPersistsReceiptAndReplayScopeSeparately}
      - {kind: go_test, name: TestSystemNodeRunner_MarkProcessedSettlesNodeDeliveryAndTriggersNormalRunCompletion}
      - {kind: go_test, name: TestEventBusPublishTransactional_ReturnsPostCommitInterceptorErrorAndRecordsReceipt}
    notes: >
      Completion evidence remains after-the-fact evidence. It cannot authorize
      workflow-node delivery when the committed event_deliveries row is absent.

  - id: replay_markers_not_authority
    concept: Replay-scope markers and replay lineage are gated replay evidence, not arbitrary fresh recipient authority.
    classification: add_to_matrix
    tier: required_pr_smoke
    proof_dimensions: [negative_authority, replay_recovery, required_pr_smoke]
    invalid_authority:
      - replay markers
      - replay-scope markers
      - source delivery lineage
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: replay_scope_expectations}
      - {kind: spec_ref, path: platform-spec.yaml, ref: replay_recovery}
    proof_refs:
      - {kind: go_test, name: TestSweepUndispatched_FailsClosedWithoutReplayClaimOwner}
      - {kind: go_test, name: TestRecoveryManager_FailsClosedWithoutReplayClaimOwner}
      - {kind: go_test, name: TestBuildHistoricalReplayExecutionRejectsTaxonomyReadyWithoutOwnerWork}
    notes: >
      Replay can consume persisted route authority or explicitly gated replay
      owners. Markers alone do not authorize new workflow-node work.

  - id: readback_not_authority
    concept: API, CLI, dashboard, OpenRPC, and event read surfaces expose persisted owner data without replanning.
    classification: add_to_matrix
    tier: required_pr_smoke
    proof_dimensions: [negative_authority, public_projection, required_pr_smoke]
    invalid_authority:
      - API readback
      - CLI readback
      - dashboard readback
      - delivery count reconstruction
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: readback}
      - {kind: artifact, path: internal/apiv1/testdata/public_surface_backend_matrix.yaml}
    proof_refs:
      - {kind: go_test, name: TestEventPublishUsesEventPublishV1RPCWithBoundParams}
      - {kind: go_test, name: TestSQLObservabilityReader_ListEvents_FiltersTypedSubscriberIdentity}
      - {kind: go_test, name: TestSQLObservabilityReader_GetEvent_UsesCanonicalDeliveryRows}
    notes: >
      Public/operator surfaces prove typed projection only. They do not create,
      fabricate, or backfill delivery authority.

  - id: subscriber_id_only_not_authority
    concept: subscriber_id by itself is not recipient identity; route authority requires typed subscriber identity.
    classification: add_to_matrix
    tier: required_pr_smoke
    proof_dimensions: [negative_authority, public_projection, required_pr_smoke]
    invalid_authority:
      - string-only subscriber_id coincidence
      - untyped delivery filters
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: typed_recipients}
      - {kind: spec_ref, path: platform-spec.yaml, ref: subscriber_type}
    proof_refs:
      - {kind: go_test, name: TestEventBusAgentDispatchIgnoresSameIDNodeRouteTargets}
      - {kind: go_test, name: TestSQLObservabilityReader_ListEvents_FiltersTypedSubscriberIdentity}
      - {kind: go_test, name: TestSQLObservabilityReader_GetEvent_UsesCanonicalDeliveryRows}
    notes: >
      A matching raw subscriber_id is not enough when agent and node recipients
      can share names. Typed subscriber identity is the read and write boundary.

  - id: replay_recovery_fork_consumers
    concept: Replay, retry, sweeper, fork, and recovery consume persisted RoutePlan output or explicitly gated replay/fork owners.
    classification: add_to_matrix
    tier: full_conformance_manual_nightly
    proof_dimensions: [replay_recovery, full_conformance, persistence_authority]
    owner_refs:
      - {kind: spec_ref, path: platform-spec.yaml, ref: replay_recovery}
      - {kind: artifact, path: internal/runtime/conformance/testdata/multi_bundle_option_a_matrix.yaml}
    proof_refs:
      - {kind: go_test, name: TestRecoveryManager_UsesPersistedDeliveryRecipientsInsteadOfCurrentSubscriptions}
      - {kind: go_test, name: TestRunForkRuntimeOwnerHarness_SelectedContractsExecuteReportsSourceAdvancedBranchJSON}
      - {kind: go_test, name: TestTier12RuntimeFork_SelectedContractForkExecutionFixture}
      - {kind: proof_projection, projection: required-full}
    notes: >
      This row belongs to full/touched-surface conformance. It should not expand
      every PR into a replay/fork/catalog Cartesian test suite.

  - id: catalog_e2e_route_behavior
    concept: Catalog route behavior remains covered by catalog E2E tiering and is cited rather than duplicated.
    classification: already_covered_by_existing_proof
    tier: full_conformance_manual_nightly
    proof_dimensions: [catalog_tiering, full_conformance]
    owner_refs:
      - {kind: artifact, path: internal/runtime/cataloge2e/README.md}
    proof_refs:
      - {kind: go_test, name: TestTier11FlowCompositionCatalogFixtures_RealRuntime}
      - {kind: go_test, name: TestTier12RuntimeFork_SelectedContractForkExecutionFixture}
      - {kind: proof_projection, projection: catalog-full}
    notes: >
      Catalog E2E tiering stays the full behavior proof owner. #1346 only names
      how route-authority audits should cite it.

  - id: diagnostic_catalog_probe_duplicate
    concept: One-off diagnostic catalog probes are duplicate proof once catalog tiering and the route-authority matrix exist.
    classification: obsolete_duplicate
    tier: obsolete_duplicate
    replacement: catalog_e2e_route_behavior
    proof_dimensions: [obsolete_duplicate, catalog_tiering]
    owner_refs:
      - {kind: artifact, path: internal/runtime/cataloge2e/README.md}
    proof_refs:
      - {kind: proof_projection, projection: catalog-full}
    notes: >
      Ad hoc probes can remain useful locally, but closure-bearing route proof
      should name the catalog tier row or the focused RoutePlan rows above.
