    invalid_authority:
      - event_receipts
      - processed receipts
      - settlement
      - backfill
      - retry counters
    notes: >
      Receipts and settlement are completion evidence. They cannot authorize a
      handler or backfill missing pre-execution node delivery rows.
  - id: replay_recovery_and_fork_consumers
