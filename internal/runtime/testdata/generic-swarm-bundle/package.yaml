name: test-platform
version: "1.0.0"
platform_version: ">=0.7.0 <0.8.0"
description: Generic Swarm bundle for contract-driven runtime tests.
flows:
  - id: intake
    flow: intake
    mode: static
  - id: processing
    flow: processing
    mode: static
  - id: delivery
    flow: delivery
    mode: template
connect:
  - from: intake.item.review_requested
    to: processing.item.review_requested
  - from: intake.item.rejected
    to: processing.item.rejected
  - from: processing.item.completed
    to: delivery.item.completed
    delivery: broadcast
  - from: processing.item.rejected
    to: intake.item.rejected
