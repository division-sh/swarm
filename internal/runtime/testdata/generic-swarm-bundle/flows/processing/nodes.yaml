processing-node:
  id: processing-node
  execution_type: system_node
  idempotency_table: processing_node_idempotency
  state_table: processing_node_state
  subscribes_to:
    - item.review_requested
    - item.rejected
  produces:
    - item.completed
    - item.rejected
  gate_state:
    score_ready: gate set when score is ready
  event_handlers:
    item.review_requested:
      guard:
        id: delivery_enabled
        check: policy.delivery_enabled
        on_fail: reject
      branch:
        - condition: payload.priority == 'urgent'
          then:
            emit:
              event: item.completed
              broadcast: true
          else:
            emit:
              event: item.rejected
              broadcast: true
      compute:
        operation: pick_or_average
        store_as: score
        keys:
          numeric_keys:
            - score
        tiers:
          - dimensions:
              - score
            weight: 1.0
      rules:
        approve:
          condition: payload.score >= 80
          advances_to: approved
          emit:
            event: item.completed
            broadcast: true
        reject:
          condition: else
          advances_to: rejected
          emit:
            event: item.rejected
            broadcast: true
      sets_gate: score_ready
      clear_gates:
        - intake_open
    item.rejected:
      advances_to: rejected
      clear_gates:
        - intake_ready
        - score_ready
        - delivery_ready
