intake-router:
  id: intake-router
  execution_type: system_node
  state_table: intake_router_state
  subscribes_to:
    - item.created
    - item.processed
  produces:
    - item.processed
    - item.review_requested
  gate_state:
    intake_ready: gate set when intake is ready
  event_handlers:
    item.created:
      guard:
        id: accept_item
        check: payload.item_id != ''
      fan_out:
        items_from: payload.items
        as: intake_item
        identity: intake_item.id
        emit:
          event: item.processed
          broadcast: true
          fields:
            item_id: intake_item.id
    item.processed:
      accumulate:
        expected_from: payload.expected_workers
        completion: all
        on_complete:
          id: ready_for_review
          condition: else
          advances_to: ready
          emit:
            event: item.review_requested
      sets_gate: intake_ready
      clear_gates:
        - needs_revision
