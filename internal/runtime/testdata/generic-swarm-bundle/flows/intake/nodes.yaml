intake-router:
  id: intake-router
  execution_type: system_node
  idempotency_table: intake_router_idempotency
  state_table: intake_router_state
  subscribes_to:
    - item.created
    - item.processed
  produces:
    - item.processed
    - item.review_requested
  event_handlers:
    item.created:
      guard:
        id: accept_item
        check: payload.item_id != ''
      fan_out:
        items_from: payload.items
        target: worker-a
        emit: item.processed
      branch:
        - condition: payload.priority == 'urgent'
          then:
            emit: item.processed
          else:
            emit: item.processed
    item.processed:
      accumulate:
        expected_from: payload.expected_workers
        completion: all
        on_complete:
          id: ready_for_review
          condition: else
          advances_to: ready
          emit: item.review_requested
      sets_gate: intake_ready
      clear_gates:
        - needs_revision
