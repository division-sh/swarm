item.created:
  emitter:
    - coordinator
  consumer:
    - intake-router
  runtime_handling: consuming
  owning_node: intake-router
  payload:
    type: object
  required:
    - item_id

item.processed:
  emitter:
    - worker-a
    - worker-b
    - intake-router
  consumer:
    - intake-router
    - processing-node
  runtime_handling: dual_delivery
  owning_node: intake-router
  payload:
    type: object

item.review_requested:
  emitter:
    - intake-router
    - delivery-node
  consumer:
    - processing-node
    - coordinator
  runtime_handling: dual_delivery
  owning_node: processing-node
  payload:
    type: object

item.completed:
  emitter:
    - processing-node
    - delivery-node
  consumer:
    - delivery-node
    - coordinator
  runtime_handling: dual_delivery
  owning_node: delivery-node
  payload:
    type: object

item.rejected:
  emitter:
    - processing-node
  consumer:
    - processing-node
    - coordinator
  runtime_handling: dual_delivery
  owning_node: processing-node
  payload:
    type: object

timer.item.timeout:
  emitter:
    - sys:runtime
  consumer:
    - delivery-node
  runtime_handling: consuming
  owning_node: delivery-node
  payload:
    type: object
