name: swarm

services:
  postgres:
    image: postgres:16
    container_name: swarm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swarm
    ports:
      - "5432:5432"
    volumes:
      - mas_pgdata:/var/lib/postgresql/data

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: swarm-orchestrator
    restart: "no"
    depends_on:
      - postgres
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      SWARM_TOOL_GATEWAY_TOKEN: ${SWARM_TOOL_GATEWAY_TOKEN:-}
      SWARM_DB_HOST: postgres
      SWARM_DB_PORT: "5432"
      SWARM_DB_NAME: swarm
      SWARM_DB_USER: postgres
      SWARM_DB_PASSWORD: postgres
      SWARM_DB_SSLMODE: disable
      SWARM_CLAUDE_USE_MCP: ${SWARM_CLAUDE_USE_MCP:-true}
      SWARM_CLAUDE_PERMISSION_MODE: ${SWARM_CLAUDE_PERMISSION_MODE:-bypassPermissions}
      SWARM_CLAUDE_BYPASS_PERMISSIONS: ${SWARM_CLAUDE_BYPASS_PERMISSIONS:-true}
      SWARM_CLAUDE_TIMEOUT_SECONDS: ${SWARM_CLAUDE_TIMEOUT_SECONDS:-900}
      SWARM_CLAUDE_CLI_COMMAND: claude
      SWARM_CLAUDE_CLI_OUTPUT_FORMAT: stream-json
      SWARM_WORKSPACE_IMAGE: swarm-workspace:latest
      SWARM_WORKSPACE_VOLUMES_FROM: swarm-orchestrator
      SWARM_CONTRACTS_HOST_DIR: ${SWARM_CONTRACTS_HOST_DIR:-}
    volumes:
      - ./docs:/app/docs
      - type: bind
        source: ${SWARM_CONTRACTS_HOST_DIR:-./.docker/missing-contracts}
        target: /opt/swarm/contracts
        read_only: true
        bind:
          create_host_path: false
      - ./migrations:/app/migrations
      - ./contracts:/app/contracts
      - ./internal:/app/internal
      - ./cmd:/app/cmd
      - ./data:/data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8070:8070"
      - "8090:8090"
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        if [ -z "$${SWARM_CONTRACTS_HOST_DIR}" ]; then
          echo "SWARM_CONTRACTS_HOST_DIR must point to a contract bundle for the orchestrator service." >&2
          exit 2
        fi
        exec /usr/local/bin/orchestrator serve \
          --store postgres \
          --backend claude_cli \
          --contracts /opt/swarm/contracts \
          --api-listen-addr 0.0.0.0:8070 \
          --mcp-listen-addr 0.0.0.0:8090 \
          --self-check=false

  # Per-entity and privileged workspaces are created dynamically by runtime policy.
  # This image is the base for those dynamic containers.
  workspace-base:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        INSTALL_CLAUDE_CLI: "true"
        INSTALL_CODEX_CLI: "true"
    image: swarm-workspace:latest
    profiles:
      - workspace

volumes:
  mas_pgdata:
