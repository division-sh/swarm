services:
  postgres:
    image: postgres:16
    container_name: empireai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: empireai
    ports:
      - "5432:5432"
    volumes:
      - empireai_pgdata:/var/lib/postgresql/data

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: empireai-orchestrator
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      EMPIREAI_INBOUND_ADDR: ":8080"
      EMPIREAI_TOOL_GATEWAY_ADDR: ":8090"
      EMPIREAI_TOOL_GATEWAY_TOKEN: ${EMPIREAI_TOOL_GATEWAY_TOKEN:-}
      EMPIREAI_DASHBOARD_ADDR: ":8070"
      EMPIREAI_API_KEY: ${EMPIREAI_API_KEY:-local-dev-key}
      EMPIREAI_ENABLE_DOCKER_WORKSPACES: "true"
      EMPIREAI_CLAUDE_USE_MCP: ${EMPIREAI_CLAUDE_USE_MCP:-true}
      EMPIREAI_CLAUDE_PERMISSION_MODE: ${EMPIREAI_CLAUDE_PERMISSION_MODE:-bypassPermissions}
      EMPIREAI_CLAUDE_BYPASS_PERMISSIONS: ${EMPIREAI_CLAUDE_BYPASS_PERMISSIONS:-true}
      EMPIREAI_CLAUDE_TIMEOUT_SECONDS: ${EMPIREAI_CLAUDE_TIMEOUT_SECONDS:-900}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      MAS_DB_HOST: postgres
      MAS_DB_PORT: "5432"
      MAS_DB_NAME: empireai
      MAS_DB_USER: postgres
      MAS_DB_PASSWORD: postgres
      MAS_DB_SSLMODE: disable
      MAS_LLM_RUNTIME_MODE: cli_test
      MAS_CLAUDE_CLI_COMMAND: claude
      MAS_CLAUDE_CLI_OUTPUT_FORMAT: stream-json
    volumes:
      - ./docs:/app/docs
      - ./migrations:/app/migrations
      - ./contracts:/app/contracts
      - ./internal:/app/internal
      - ./cmd:/app/cmd
      - ./data:/data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
      - "8090:8090"
    command:
      - -store
      - postgres
      - -contracts
      - /app/docs/specs/mas-platform/empire/contracts
      - -self-check=false

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: empireai-dashboard
    restart: unless-stopped
    depends_on:
      - orchestrator
    ports:
      - "8070:8070"

  # Per-entity and privileged workspaces are created dynamically by runtime policy.
  # This image is the base for those dynamic containers.
  workspace-base:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        INSTALL_CLAUDE_CLI: "true"
        INSTALL_CODEX_CLI: "true"
    image: empireai-workspace:latest
    profiles:
      - workspace

volumes:
  empireai_pgdata:
