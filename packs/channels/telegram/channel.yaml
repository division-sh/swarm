provider: telegram
opaque_types:
  destination:
    type: string
    pattern: '^-?[0-9]+$'
    minLength: 1
    maxLength: 17
  delivery_reference:
    type: object
    additionalProperties: false
    required: [id]
    properties:
      id: {type: integer, minimum: 1, maximum: 2147483647}
  delivery_receipt:
    type: object
    additionalProperties: false
    required: [id]
    properties:
      id: {type: integer, minimum: 1, maximum: 2147483647}
  interaction_reference:
    type: string
    minLength: 1
  external_account_reference:
    type: string
    pattern: '^[0-9]+$'
    minLength: 1
    maxLength: 17
  conversation_reference:
    type: string
    pattern: '^-?[0-9]+$'
    minLength: 1
    maxLength: 17
operations:
  deliver:
    tool: telegram.send_interactive
    input:
      chat_id: context.destination
      text: input.presentation.text
      reply_markup.inline_keyboard:
        each: input.actions
        item:
          - text: item.label
            callback_data: item.token
    output:
      delivery_reference.id: result.message_id
  edit:
    tool: telegram.edit_message
    input:
      chat_id: context.destination
      message_id: input.delivery_reference.id
      text: input.presentation.text
      reply_markup.inline_keyboard:
        each: input.actions
        item:
          - text: item.label
            callback_data: item.token
    output:
      delivery_receipt.id: result.message_id
  acknowledge_interaction:
    tool: telegram.answer_callback
    input:
      callback_query_id: input.interaction_reference
events:
  action:
    event: inbound.telegram.callback_action
    fields:
      token: event.token
      interaction_reference: event.interaction_reference
      external_account_reference: event.external_account_reference
      conversation_reference: event.conversation_reference
      provider_message_reference.id: event.provider_message_reference
  text:
    event: inbound.telegram.text_message
    fields:
      text: event.text
      external_account_reference: event.external_account_reference
      conversation_reference: event.conversation_reference
      provider_message_reference.id: event.provider_message_reference
