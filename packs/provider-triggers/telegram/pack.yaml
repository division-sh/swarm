id: provider.telegram
version: 0.1.0
platform_version: '>=0.7.0 <0.8.0'
type: trigger
manifest_hash: sha256:85733532b82b0dcc9bfcf9cfe953ee3ce4b0f4cbd08116b5ea0bf4c8e6181c73
provenance:
    source: platform
capabilities:
    can:
        receive_https_route: /webhooks/{alias}/telegram
        verify_secret: webhook_signing.telegram
        emit_events:
            - inbound.telegram
            - inbound.telegram.callback_action
            - inbound.telegram.text_message
        persist_dedupe_markers: true
    cannot:
        - emit_undeclared_events
        - run_code_before_admission
        - touch_unbound_resources
requires:
    secrets:
        - webhook_signing.telegram
tests:
    - providertriggers/telegram
