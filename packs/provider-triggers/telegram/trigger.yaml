provider: telegram
payload_object_required: true
payload_object_error: telegram update object is required
secret:
  required: true
signature:
  type: token_equality
  header: X-Telegram-Bot-Api-Secret-Token
  missing_error: telegram secret token is required
  invalid_error: invalid telegram secret token
delivery_id:
  json_path: $.update_id
  required: true
  missing_error: telegram update_id is required
event_type:
  literal: update
  required: true
event_name:
  literal: inbound.telegram
normalized_events:
  - event: inbound.telegram.callback_action
    author_subject:
      type: chat
      field: conversation_reference
    fields:
      token:
        from: callback_query.data
        type: text
      interaction_reference:
        from: callback_query.id
        type: text
      external_account_reference:
        from: callback_query.from.id
        type: text
        convert: number_to_text
      conversation_reference:
        from: callback_query.message.chat.id
        type: text
        convert: number_to_text
      provider_message_reference:
        from: callback_query.message.message_id
        type: integer
    when:
      absent: [message]
      equals:
        callback_query.message.chat.type: private
  - event: inbound.telegram.text_message
    author_summary_field: text
    author_subject:
      type: chat
      field: conversation_reference
    fields:
      text:
        from: message.text
        type: text
      external_account_reference:
        from: message.from.id
        type: text
        convert: number_to_text
      conversation_reference:
        from: message.chat.id
        type: text
        convert: number_to_text
      provider_message_reference:
        from: message.message_id
        type: integer
    when:
      absent: [callback_query]
      equals:
        message.chat.type: private
ack:
  mode: durable_before_dispatch
metadata:
  user_agent: user_agent
  telegram_update_id: delivery_id
  telegram_update_type: event_type
