# ============================================================================
# v2.0.39 Upgrade Actions — Universal Scoring Rubric
# ============================================================================

v2039-universal-rubric-weights:
  description: "Implement 3-tier weighted composite in computeComposite()"
  type: code
  priority: must
  action: |
    Replace flat-average composite with tiered weights:
    Tier 1 (15% each): icp_crispness, distribution_leverage, time_to_value, operational_drag
    Tier 2 (10% each): pain_severity, competition_gap, monetization_clarity
    Tier 3 (5% each): retention_architecture, expansion_potential
    Hard gates (pass/fail, scored first): build_complexity ≥50, automation_completeness ≥50
  verify: "go test ./internal/runtime/ -run TestCompositeWeights passes"

v2039-hard-gates:
  description: "Implement hard gate rejection in computeComposite() before composite calculation"
  type: code
  priority: must
  action: "If build_complexity < 50 OR automation_completeness < 50, emit vertical.rejected with reason 'hard_gate_fail' before computing composite"
  verify: "go test ./internal/runtime/ -run TestHardGateRejection passes"
  depends_on: v2039-universal-rubric-weights

v2039-tier1-floors:
  description: "Implement Tier 1 dimension floor (any < 50 → reject) and subscore floor (avg < 60 → reject)"
  type: code
  priority: must
  action: "After gates pass, check all Tier 1 dimensions ≥ 50 and Tier 1 weighted average ≥ 60"
  verify: "go test ./internal/runtime/ -run TestTier1Floors passes"
  depends_on: v2039-hard-gates

v2039-marginal-drain:
  description: "Implement marginal drain rule: composite 55-74 requires ≥2 Tier 1 dimensions ≥70"
  type: code
  priority: must
  action: "In marginal path (55-74), count Tier 1 dimensions ≥70. If <2, emit vertical.rejected with reason 'marginal_drain'"
  verify: "go test ./internal/runtime/ -run TestMarginalDrain passes"
  depends_on: v2039-tier1-floors

v2039-update-system-nodes:
  description: "Update system-nodes.yaml with universal rubric definition (11 dims, 3 tiers, gates, marginal drain)"
  type: contract
  priority: must
  action: "Replace mode-specific rubric entries with universal rubric using YAML anchors"
  verify: "python3 -c \"import yaml; d=yaml.safe_load(open('contracts/system-nodes.yaml')); assert len(d['scoring-node']['rubric_selection']['universal_dimensions']) == 11\""

