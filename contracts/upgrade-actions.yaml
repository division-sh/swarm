    Replace category.assessed schema in EventSchemaRegistry with v2.0.40 structured format:
    - Add: opportunity_name (string), preliminary_icp (string), build_sketch (object with core_features, key_integrations, red_flags), evidence (object with competitors, pain_signals, regulatory, buyer_communities), geographic_scope (enum)
    - Remove: automation_micro enum option
    - All evidence sub-objects require source_url field
    - red_flags items are typed objects with enum: [regulatory_license, enterprise_contract, certification, two_sided_marketplace, funds_custody, requires_human_review, data_residency_requirement, complex_integration, high_feature_count, one_time_setup, accuracy_liability]
