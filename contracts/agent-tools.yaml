# ============================================================================
# EmpireAI Agent Tools Contract — v2.0.50
# ============================================================================
# Defines every agent's wiring: subscriptions, tools, emit_events, model config.
#
# Field semantics:
#   id:                      Agent identifier (TEXT, not UUID)
#   type:                    holding | factory | operating
#   role:                    Functional role name
#   model_tier:              sonnet | haiku | haiku_or_sonnet
#   conversation_mode:       session | session_per_vertical | task | stateless
#   max_turns_per_task:      Turn limit per session
#   subscriptions:           Static EventBus delivery (holding/factory + OpCo leadership)
#   subscriptions_bootstrap: Routes via routing_rules table (OpCo workers only)
#   tools_tier2:             Domain-specific tools (agent_message and emit_* are universal)
#   emit_events:             Events this agent may emit
#
# Subscription model:
#   - Holding/factory agents: subscriptions (static EventBus)
#   - OpCo leadership (CEO, VPs, CoS): subscriptions (static EventBus only, no bootstrap)
#   - OpCo workers: subscriptions_bootstrap (routing_rules table, REQUIRED — dynamic routing)
#     TestContractCompliance/subscriptions asserts workers use bootstrap, leadership uses static
#   - agent_message, mailbox_send, and emit_* tools injected into ALL agents (never list per-agent)
#
# Universal tool schemas:
#   agent_message:  {to: agent_id, message: string}
#   mailbox_send:   {type: enum[review, escalation, spend_request, budget_increase,
#                    digest, vertical_approval, migration_approval, domain_approval],
#                    priority: enum[low, normal, high, critical],
#                    subject: string, vertical_id?: uuid, payload: object}
#
# System nodes (scoring-node): node_type: system, no model/prompt fields
# ============================================================================

scoring-node:
  id: scoring-node
  node_type: system
  type: factory
  subscribes_to:
  - score.dimension_complete
  - scoring.contest_resolved
  - vertical.derived
  - vertical.discovered
  produces:
  - pipeline.dead_letter
  - scoring.contested
  - scoring.requested
  - vertical.discovered
  - vertical.marginal
  - vertical.rejected
  - vertical.scored
  - vertical.shortlisted
  implementation: internal/runtime/scoring_node.go
  state_table: scoring_digest_buffer
  idempotency_table: system_node_ledger
  _note: 'v2.0.37: Migrated from interceptor cases handleVerticalDiscovered and handleScoreDimensionComplete. Receives events
    via normal fan-out, publishes via normal Publish path. Eliminates deferred event chaining bug (RFC-001 v2).

    '
