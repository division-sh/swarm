cases:
  - name: g1_only_no_packaging
    steps: [g1]
    expected:
      g1: true
      g2: false
      g3: false
      g4: false
      packaging_requested: false
      status: active
      stale_research_drop: false

  - name: all_gates_requests_packaging
    steps: [g1, g2, g3, g4]
    expected:
      g1: true
      g2: true
      g3: true
      g4: true
      packaging_requested: true
      status: active
      stale_research_drop: false

  - name: packaged_state_drops_stale_reports
    steps: [g1, g2, g3, g4, packaged]
    expected:
      g1: true
      g2: true
      g3: true
      g4: true
      packaging_requested: false
      status: packaged
      stale_research_drop: true
