id: scenario4-derivation-loop
agents:
  - id: market-research-agent
    role: market-research-agent
    mode: factory
    subscriptions: [market_research.scan_assigned]
    responses:
      - when_event: market_research.scan_assigned
        tool_calls:
          - name: emit_category_assessed
            arguments:
              scan_id: "{{scan_id}}"
              campaign_id: "{{campaign_id}}"
              mode: "{{mode}}"
              geography: "{{geography}}"
              category: operations
              subcategory: derivation_parent
              signal_strength: 72
              opportunity_name: Claims Exception Routing Copilot
              preliminary_icp: Billing manager at SMB clinics handling invoice reporting workflow
              build_sketch:
                core_features: [exception queue, routing]
                key_integrations: [quickbooks]
                red_flags: []
              evidence:
                competitors:
                  - name: Comp Parent
                    pricing: "$159/mo"
                    source_url: https://example.com/d4p
                pain_signals:
                  - signal: exception churn
                    source_url: https://example.com/d4p1
                regulatory:
                  - detail: payer denial code handling guidance
                    source_url: https://example.com/d4p-reg
                buyer_communities:
                  - name: Clinic billing managers
                    source_url: https://example.com/d4p2
              opportunity_hypothesis: Workflow automation for exception routing and reconciliation.
              geographic_scope: local
              opportunity_pattern: workflow_automation
          - name: emit_market_research_scan_complete
            arguments:
              scan_id: "{{scan_id}}"
              campaign_id: "{{campaign_id}}"
              mode: "{{mode}}"
              geography: "{{geography}}"
              categories_assessed: 1
              high_signal_count: 1

  - id: analysis-agent
    role: analysis-agent
    mode: factory
    subscriptions: [scoring.requested]
    responses:
      - when_event: scoring.requested
        tool_calls:
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: build_complexity, score: 80, evidence: d4 parent build, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: automation_completeness, score: 80, evidence: d4 parent automation, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: icp_crispness, score: 40, evidence: d4 parent weak icp, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: distribution_leverage, score: 72, evidence: d4 parent distribution, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: time_to_value, score: 72, evidence: d4 parent ttv, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: operational_drag, score: 72, evidence: d4 parent drag, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: pain_severity, score: 68, evidence: d4 parent pain, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: competition_gap, score: 68, evidence: d4 parent gap, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: monetization_clarity, score: 68, evidence: d4 parent monetization, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: retention_architecture, score: 68, evidence: d4 parent retention, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: expansion_potential, score: 68, evidence: d4 parent expansion, confidence: high}
          - name: emit_vertical_derived
            arguments:
              parent_id: "{{vertical_id}}"
              generation_depth: 1
              generator_agent_id: analysis-agent
              derivation_rationale:
                trigger_dimension: icp_crispness
                reasoning: Alternative buyer segment with clearer ICP fit.
              opportunity_name: Dental Denial Queue Autofix
              preliminary_icp: Billing manager at SMB dental groups handling invoice reporting workflow
              signal_strength: 77
              discovery_context:
                source: derivation
              build_sketch:
                core_features: [denial classifier, suggested fix queue]
                key_integrations: [quickbooks]
                red_flags: []
              evidence:
                competitors:
                  - name: Comp Child
                    pricing: "$189/mo"
                    source_url: https://example.com/d4c
                pain_signals:
                  - signal: recurring denial reasons
                    source_url: https://example.com/d4c1
                regulatory:
                  - detail: remittance exception documentation standards
                    source_url: https://example.com/d4c-reg
                buyer_communities:
                  - name: Dental billing managers
                    source_url: https://example.com/d4c2
              opportunity_hypothesis: Workflow copilot that closes denial loops with recurring fixes.
              geography: "{{geography}}"

  - id: analysis-agent-alt
    role: analysis-agent
    mode: factory
    subscriptions: [scoring.requested]
    responses:
      - when_event: scoring.requested
        message: ignore parent assignment
      - when_event: scoring.requested
        tool_calls:
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: build_complexity, score: 77, evidence: d4 child build, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: automation_completeness, score: 77, evidence: d4 child automation, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: icp_crispness, score: 77, evidence: d4 child icp, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: distribution_leverage, score: 77, evidence: d4 child distribution, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: time_to_value, score: 77, evidence: d4 child ttv, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: operational_drag, score: 77, evidence: d4 child drag, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: pain_severity, score: 77, evidence: d4 child pain, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: competition_gap, score: 77, evidence: d4 child gap, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: monetization_clarity, score: 77, evidence: d4 child monetization, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: retention_architecture, score: 77, evidence: d4 child retention, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: expansion_potential, score: 77, evidence: d4 child expansion, confidence: high}
expected:
  event_counts:
    vertical.derived: 1
    vertical.discovered: 2
    scoring.requested: 2
    vertical.shortlisted: 1
