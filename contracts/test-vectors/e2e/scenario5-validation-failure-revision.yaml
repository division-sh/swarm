id: scenario5-validation-failure-revision
agents:
  - id: market-research-agent
    role: market-research-agent
    mode: factory
    subscriptions: [market_research.scan_assigned]
    responses:
      - when_event: market_research.scan_assigned
        tool_calls:
          - name: emit_category_assessed
            arguments:
              scan_id: "{{scan_id}}"
              campaign_id: "{{campaign_id}}"
              mode: "{{mode}}"
              geography: "{{geography}}"
              category: operations
              subcategory: validation_revision
              signal_strength: 70
              opportunity_name: Law Firm eBilling Compliance Copilot
              preliminary_icp: Billing manager at SMB law firms handling invoice compliance reporting workflow
              build_sketch:
                core_features: [guideline parser, exception queue]
                key_integrations: [clio]
                red_flags: []
              evidence:
                competitors:
                  - name: Comp Validation
                    pricing: "$299/mo"
                    source_url: https://example.com/v5a
                pain_signals:
                  - signal: outside counsel guideline denials
                    source_url: https://example.com/v5a1
                regulatory:
                  - detail: outside counsel guideline variance enforcement
                    source_url: https://example.com/v5a-reg
                buyer_communities:
                  - name: Law billing managers
                    source_url: https://example.com/v5a2
              opportunity_hypothesis: Compliance workflow for OCG-safe invoice submission.
              geographic_scope: local
              opportunity_pattern: compliance_regulatory
          - name: emit_market_research_scan_complete
            arguments:
              scan_id: "{{scan_id}}"
              campaign_id: "{{campaign_id}}"
              mode: "{{mode}}"
              geography: "{{geography}}"
              categories_assessed: 1
              high_signal_count: 1

  - id: analysis-agent
    role: analysis-agent
    mode: factory
    subscriptions: [scoring.requested]
    responses:
      - when_event: scoring.requested
        tool_calls:
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: build_complexity, score: 78, evidence: v5 build, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: automation_completeness, score: 78, evidence: v5 automation, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: icp_crispness, score: 78, evidence: v5 icp, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: distribution_leverage, score: 78, evidence: v5 distribution, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: time_to_value, score: 78, evidence: v5 ttv, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: operational_drag, score: 78, evidence: v5 drag, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: pain_severity, score: 78, evidence: v5 pain, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: competition_gap, score: 78, evidence: v5 gap, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: monetization_clarity, score: 78, evidence: v5 monetization, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: retention_architecture, score: 78, evidence: v5 retention, confidence: high}
          - name: emit_score_dimension_complete
            arguments: {vertical_id: "{{vertical_id}}", dimension: expansion_potential, score: 78, evidence: v5 expansion, confidence: high}

  - id: business-research-agent
    role: business-research-agent
    mode: factory
    subscriptions: [validation.started, spec.draft_ready, spec_review.passed, spec.revision_requested]
    responses:
      - when_event: validation.started
        tool_calls:
          - name: emit_research_completed
            arguments: {vertical_id: "{{vertical_id}}", business_brief: {problem: OCG violations, buyer: billing manager}}
          - name: emit_spec_requested
            arguments: {vertical_id: "{{vertical_id}}", business_brief: {problem: OCG violations, desired_outcome: fewer rejections}}
      - when_event: spec.draft_ready
        tool_calls:
          - name: emit_spec_review_requested
            arguments: {vertical_id: "{{vertical_id}}", mvp_spec: v1 draft}
      - when_event: spec_review.passed
        tool_calls:
          - name: emit_spec_approved
            arguments: {vertical_id: "{{vertical_id}}", final_spec: v1 approved}
      - when_event: spec.revision_requested
        tool_calls:
          - name: emit_research_completed
            arguments: {vertical_id: "{{vertical_id}}", business_brief: {problem: OCG violations, buyer: billing manager, revision: 2}}
          - name: emit_spec_requested
            arguments: {vertical_id: "{{vertical_id}}", business_brief: {problem: OCG violations, desired_outcome: fewer rejections, revision: 2}}
      - when_event: spec.draft_ready
        tool_calls:
          - name: emit_spec_review_requested
            arguments: {vertical_id: "{{vertical_id}}", mvp_spec: v2 draft}
      - when_event: spec_review.passed
        tool_calls:
          - name: emit_spec_approved
            arguments: {vertical_id: "{{vertical_id}}", final_spec: v2 approved}

  - id: lightweight-spec-agent
    role: lightweight-spec-agent
    mode: factory
    subscriptions: [spec.requested]
    responses:
      - when_event: spec.requested
        tool_calls:
          - name: emit_spec_draft_ready
            arguments: {vertical_id: "{{vertical_id}}", mvp_spec: v1 draft}
      - when_event: spec.requested
        tool_calls:
          - name: emit_spec_draft_ready
            arguments: {vertical_id: "{{vertical_id}}", mvp_spec: v2 draft}

  - id: spec-reviewer
    role: spec-reviewer
    mode: factory
    subscriptions: [spec_review.requested]
    responses:
      - when_event: spec_review.requested
        tool_calls:
          - name: emit_spec_review_passed
            arguments: {vertical_id: "{{vertical_id}}", review_notes: pass v1}
      - when_event: spec_review.requested
        tool_calls:
          - name: emit_spec_review_passed
            arguments: {vertical_id: "{{vertical_id}}", review_notes: pass v2}

  - id: spec-auditor
    role: spec-auditor
    mode: factory
    subscriptions: [spec.validation_requested]
    responses:
      - when_event: spec.validation_requested
        tool_calls:
          - name: emit_spec_validation_failed
            arguments:
              vertical_id: "{{vertical_id}}"
              severity: blocker
              status: failed
              passed: false
              issues:
                - code: ocg_variance_missing
                  detail: Missing hard OCG variance handling.
      - when_event: spec.validation_requested
        tool_calls:
          - name: emit_spec_validation_passed
            arguments:
              vertical_id: "{{vertical_id}}"
              validation_notes: Revision resolved OCG handling.

  - id: factory-cto
    role: factory-cto
    mode: factory
    subscriptions: [cto.spec_review_requested]
    responses:
      - when_event: cto.spec_review_requested
        tool_calls:
          - name: emit_cto_spec_approved
            arguments: {vertical_id: "{{vertical_id}}", cto_notes: Approved after revised validation pass.}

  - id: pre-brand-agent
    role: pre-brand-agent
    mode: factory
    subscriptions: [brand.requested]
    responses:
      - when_event: brand.requested
        tool_calls:
          - name: emit_brand_candidates_ready
            arguments: {vertical_id: "{{vertical_id}}", candidates: [{name: CounselFlow}]}

  - id: validation-coordinator
    role: validation-coordinator
    mode: factory
    subscriptions: [validation.package_ready]
    responses:
      - when_event: validation.package_ready
        tool_calls:
          - name: emit_vertical_ready_for_review
            arguments: {vertical_id: "{{vertical_id}}"}

  - id: empire-coordinator
    role: empire-coordinator
    mode: holding
    subscriptions: [vertical.ready_for_review]
    responses: []
expected:
  event_counts:
    spec.validation_requested: 2
    spec.validation_failed: 1
    spec.revision_requested: 1
    spec.validation_passed: 1
    cto.spec_approved: 1
    vertical.approved: 1
