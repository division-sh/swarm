id: scenario7-campaign-multi-mode
agents:
  - id: market-research-agent
    role: market-research-agent
    mode: factory
    subscriptions: [market_research.scan_assigned]
    responses:
      - when_event: market_research.scan_assigned
        tool_calls:
          - name: emit_market_research_scan_complete
            arguments:
              scan_id: "{{scan_id}}"
              campaign_id: "{{campaign_id}}"
              mode: "{{mode}}"
              geography: "{{geography}}"
              categories_assessed: 0
              high_signal_count: 0

  - id: trend-research-agent
    role: trend-research-agent
    mode: factory
    subscriptions: [trend_research.scan_assigned]
    responses:
      - when_event: trend_research.scan_assigned
        tool_calls:
          - name: emit_trend_research_scan_complete
            arguments:
              scan_id: "{{scan_id}}"
              campaign_id: "{{campaign_id}}"
              mode: "{{mode}}"
              geography: "{{geography}}"
              report_count: 0
expected:
  event_counts:
    scan.requested: 2
    market_research.scan_assigned: 1
    trend_research.scan_assigned: 1
    market_research.scan_complete: 1
    trend_research.scan_complete: 1
    scan.completed: 2
    campaign.completed: 1
