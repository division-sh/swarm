role: business-research-agent
responses:
  - when_event: validation.started
    tool_calls:
      - name: emit_research_completed
        arguments:
          vertical_id: "{{vertical_id}}"
          business_brief:
            problem: Manual billing reconciliation and rejected claim churn
            urgency: Weekly cashflow delays
            buyer: Billing manager
      - name: emit_spec_requested
        arguments:
          vertical_id: "{{vertical_id}}"
          business_brief:
            problem: Manual billing reconciliation and rejected claim churn
            desired_outcome: Reduce denial rework cycle time

  - when_event: spec.draft_ready
    tool_calls:
      - name: emit_spec_review_requested
        arguments:
          vertical_id: "{{vertical_id}}"
          mvp_spec: "intake > reconciliation > exception routing"
          business_brief:
            problem: Manual billing reconciliation and rejected claim churn

  - when_event: spec_review.passed
    tool_calls:
      - name: emit_spec_approved
        arguments:
          vertical_id: "{{vertical_id}}"
          final_spec: "MVP with remittance parser, denial queue, and exception routing"
