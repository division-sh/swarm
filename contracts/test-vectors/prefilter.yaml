cases:
  - name: passthrough_red_flags_should_pass
    input:
      signal_strength: 68
      red_flags: [accuracy_liability, one_time_setup]
      evidence_urls: 2
      retention_primitives: [workflow_embedding]
    expected: pass

  - name: blocking_red_flag_rejects
    input:
      signal_strength: 75
      red_flags: [phone_led_sales]
      evidence_urls: 3
      retention_primitives: [recurring_data]
    expected: reject
    expected_reason: blocking_red_flag

  - name: co_occurrence_blocks
    input:
      signal_strength: 80
      red_flags: [complex_integration, high_feature_count]
      evidence_urls: 4
      retention_primitives: [integration_lock_in]
    expected: reject
    expected_reason: co_occurrence_block

  - name: signal_below_threshold
    input:
      signal_strength: 54
      red_flags: []
      evidence_urls: 3
      retention_primitives: [recurring_data]
    expected: reject
    expected_reason: signal_below_threshold

  - name: insufficient_evidence
    input:
      signal_strength: 70
      red_flags: []
      evidence_urls: 1
      retention_primitives: [workflow_embedding]
    expected: reject
    expected_reason: evidence_insufficient

  - name: no_retention_primitive
    input:
      signal_strength: 70
      red_flags: []
      evidence_urls: 3
      retention_primitives: []
    expected: reject
    expected_reason: no_retention_primitive
