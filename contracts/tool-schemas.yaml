# ============================================================================
# EmpireAI Tool Schemas Contract — v2.0.49
# ============================================================================
# Defines input schemas for all Tier 2 tools. The MCP tool gateway generates
# tool definitions from this file. Agents see these schemas in their tool
# definitions and can only send valid parameters.
#
# Three categories:
#   universal:   Injected into every agent session (agent_message, mailbox_send)
#   per_agent:   Listed in agent-tools.yaml tools_tier2 per agent
#   auto_generated: emit_* tools generated from event-catalog.yaml (not here)
#
# Schema format follows JSON Schema draft 2020-12 conventions.
# additionalProperties: false is the default for all tools.
# ============================================================================

# ── Universal Tools ────────────────────────────────────────────────

agent_message:
  category: universal
  description: "Send a directive or message to another agent"
  input_schema:
    type: object
    required: [to, message]
    properties:
      to:
        type: string
        description: "Target agent ID"
      message:
        type: string
        description: "Message content"
      priority:
        type: string
        enum: [normal, urgent]
        default: normal
    additionalProperties: false

mailbox_send:
  category: universal
  description: "Submit a decision item to the human board member"
  input_schema:
    type: object
    required: [type, priority, subject, payload]
    properties:
      type:
        type: string
        enum: [review, escalation, spend_request, budget_increase, digest, vertical_approval, migration_approval, domain_approval]
      priority:
        type: string
        enum: [low, normal, high, critical]
      subject:
        type: string
        description: "One-line summary"
      vertical_id:
        type: string
        description: "Vertical context (required for vertical_approval, migration_approval)"
      payload:
        type: object
        description: "Decision context — contents vary by type"
    additionalProperties: false

# ── Scheduling ─────────────────────────────────────────────────────

schedule:
  category: per_agent
  description: "Schedule a future action or reminder"
  input_schema:
    type: object
    required: [action, delay_seconds]
    properties:
      action:
        type: string
        description: "What to do when timer fires"
      delay_seconds:
        type: integer
        description: "Seconds from now"
      context:
        type: object
        description: "Data to include when timer fires"
    additionalProperties: false

# ── Agent Management ───────────────────────────────────────────────

agent_hire:
  category: per_agent
  description: "Hire a new worker agent into the org"
  input_schema:
    type: object
    required: [role, agent_id]
    properties:
      role:
        type: string
        description: "Functional role for the new agent"
      agent_id:
        type: string
        description: "Unique ID for the new agent"
      model_tier:
        type: string
        enum: [sonnet, haiku, haiku_or_sonnet]
        default: haiku
      system_prompt:
        type: string
        description: "System prompt for the new agent"
    additionalProperties: false

agent_fire:
  category: per_agent
  description: "Terminate a worker agent"
  input_schema:
    type: object
    required: [agent_id, reason]
    properties:
      agent_id:
        type: string
      reason:
        type: string
    additionalProperties: false

agent_reconfigure:
  category: per_agent
  description: "Update a worker agent's configuration"
  input_schema:
    type: object
    required: [agent_id]
    properties:
      agent_id:
        type: string
      model_tier:
        type: string
        enum: [sonnet, haiku, haiku_or_sonnet]
      system_prompt:
        type: string
      max_turns_per_task:
        type: integer
    additionalProperties: false

# ── Routing ────────────────────────────────────────────────────────

configure_routing:
  category: per_agent
  description: "Add, remove, or modify event routing rules"
  input_schema:
    type: object
    required: [operation, event_type]
    properties:
      operation:
        type: string
        enum: [add, remove, modify]
      event_type:
        type: string
        description: "Event type to route"
      subscriber_id:
        type: string
        description: "Agent to receive the event"
      source:
        type: string
        enum: [discovered, seeded]
        description: "Route source (bootstrap routes are immutable and cannot be configured)"
      reason:
        type: string
    additionalProperties: false

# ── Database ───────────────────────────────────────────────────────

sql_execute:
  category: per_agent
  description: "Execute SQL against the agent's schema-scoped database"
  input_schema:
    type: object
    required: [query]
    properties:
      query:
        type: string
        description: "SQL query (schema-scoped, read-write within vertical)"
      params:
        type: array
        items:
          type: string
        description: "Parameterized query values"
    additionalProperties: false

# ── Human Tasks ────────────────────────────────────────────────────

human_task_request:
  category: per_agent
  description: "Request a physical-world task from the human operator"
  input_schema:
    type: object
    required: [category, description, talking_points]
    properties:
      category:
        type: string
        enum: [research, outreach, verification, content_creation, admin]
      description:
        type: string
      talking_points:
        type: array
        items:
          type: string
      priority:
        type: string
        enum: [low, normal, high, critical]
        default: normal
      deadline_hours:
        type: integer
        description: "Hours until task expires"
    additionalProperties: false

human_task_decide:
  category: per_agent
  description: "Approve, reject, or defer a pending human task request"
  input_schema:
    type: object
    required: [task_id, decision]
    properties:
      task_id:
        type: string
      decision:
        type: string
        enum: [approved, rejected, deferred]
      reason:
        type: string
      requeue_date:
        type: string
        description: "ISO date for deferred tasks"
    additionalProperties: false

# ── Infrastructure (Holding DevOps) ────────────────────────────────

nginx_reload:
  category: per_agent
  description: "Reload nginx configuration"
  input_schema:
    type: object
    properties:
      config_path:
        type: string
      dry_run:
        type: boolean
        default: true
    additionalProperties: false

systemd_control:
  category: per_agent
  description: "Start, stop, restart, or check status of a systemd service"
  input_schema:
    type: object
    required: [service, action]
    properties:
      service:
        type: string
      action:
        type: string
        enum: [start, stop, restart, status, enable, disable]
    additionalProperties: false

certbot_execute:
  category: per_agent
  description: "Provision or renew SSL certificate via Let's Encrypt"
  input_schema:
    type: object
    required: [domain]
    properties:
      domain:
        type: string
      action:
        type: string
        enum: [provision, renew, revoke]
        default: provision
    additionalProperties: false

# ── Brand & Domain ─────────────────────────────────────────────────

domain_availability_check:
  category: per_agent
  description: "Check if a domain name is available for registration"
  input_schema:
    type: object
    required: [domain]
    properties:
      domain:
        type: string
    additionalProperties: false

domain_purchase:
  category: per_agent
  description: "Purchase a domain name"
  input_schema:
    type: object
    required: [domain]
    properties:
      domain:
        type: string
      registrar:
        type: string
        default: namecheap
    additionalProperties: false

dns_configure:
  category: per_agent
  description: "Configure DNS records for a domain"
  input_schema:
    type: object
    required: [domain, records]
    properties:
      domain:
        type: string
      records:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
              enum: [A, AAAA, CNAME, MX, TXT]
            name:
              type: string
            value:
              type: string
    additionalProperties: false

instagram_handle_check:
  category: per_agent
  description: "Check if an Instagram handle is available"
  input_schema:
    type: object
    required: [handle]
    properties:
      handle:
        type: string
    additionalProperties: false

whatsapp_name_check:
  category: per_agent
  description: "Check if a WhatsApp Business name is available"
  input_schema:
    type: object
    required: [name]
    properties:
      name:
        type: string
    additionalProperties: false

# ── Messaging (Tier 2 capabilities) ────────────────────────────────

whatsapp_business_api:
  category: per_agent
  description: "Send WhatsApp message via Business API"
  input_schema:
    type: object
    required: [to, message]
    properties:
      to:
        type: string
        description: "Phone number in international format"
      message:
        type: string
      template_id:
        type: string
        description: "Pre-approved message template ID (required for first contact)"
    additionalProperties: false

email_api:
  category: per_agent
  description: "Send email via SendGrid/Postmark"
  input_schema:
    type: object
    required: [to, subject, body]
    properties:
      to:
        type: string
      subject:
        type: string
      body:
        type: string
      from_name:
        type: string
      reply_to:
        type: string
    additionalProperties: false

instagram_api:
  category: per_agent
  description: "Post content to Instagram via Graph API"
  input_schema:
    type: object
    required: [action]
    properties:
      action:
        type: string
        enum: [post_image, post_story, get_insights]
      image_url:
        type: string
      caption:
        type: string
    additionalProperties: false
