workflow:
  name: empire_vertical_pipeline
  version: 2.2.1
  entity: vertical
  entity_table: verticals
  state_field: stage
  initial_stage: discovered
  stages:
  - id: discovered
    phase: factory
    description: Opportunity identified by MRA/TRA/Scanner, passed pre-filter
  - id: scoring
    phase: factory
    description: Analysis agent scoring 11 dimensions
  - id: shortlisted
    phase: factory
    description: Composite >= 75, entering validation pipeline
  - id: marginal_review
    phase: factory
    description: Composite 55-74 with promotion potential, awaiting EC decision
  - id: researching
    phase: factory
    description: Business Research Agent deep-diving the opportunity
  - id: mvp_speccing
    phase: factory
    description: Lightweight Spec Agent writing MVP spec
  - id: cto_spec_review
    phase: factory
    description: Factory CTO reviewing technical feasibility
  - id: branding
    phase: factory
    description: Pre-Brand Agent generating brand candidates
  - id: ready_for_review
    phase: factory
    description: All validation gates met, awaiting human approval
  - id: approved
    phase: decision
    description: Human approved, OpCo spinup initiated
  - id: killed
    phase: terminal
    description: Rejected at any stage
  - id: full_speccing
    phase: operating
    description: Full product spec being written by OpCo
  - id: building
    phase: operating
    description: OpCo engineering team building the product
  - id: pre_launch
    phase: operating
    description: QA, staging deploy, launch preparation
  - id: launched
    phase: operating
    description: Product live, initial users
  - id: operating
    phase: operating
    description: Steady state operations
  - id: expanding
    phase: operating
    description: Growth phase, scaling users
  - id: winding_down
    phase: operating
    description: Sunset in progress
  terminal_stages:
  - killed
  transitions:
  - id: discovered_to_scoring
    from: discovered
    to: scoring
    trigger: vertical.discovered
    node: scoring-node
    guards:
    - has_vertical_id
    - signal_above_threshold
    actions:
    - select_rubric
    - emit_scoring_requested
    data_accumulation:
      writes:
      - name
      - geography
      - raw_signals
      - signal_strength
      - discovery_mode
      - opportunity_pattern
      source_event: vertical.discovered
  - id: scoring_to_shortlisted
    from: scoring
    to: shortlisted
    trigger: vertical.scored
    node: scoring-node
    guards:
    - composite_above_shortlist
    - both_hard_gates_pass
    actions:
    - emit_vertical_shortlisted
    data_accumulation:
      writes:
      - composite_score
      - scoring_rubric
      - scores
      source_event: vertical.scored
  - id: scoring_to_marginal
    from: scoring
    to: marginal_review
    trigger: vertical.scored
    node: scoring-node
    guards:
    - composite_in_marginal_range
    - marginal_promotion_eligible
    actions:
    - emit_vertical_marginal
    data_accumulation:
      writes:
      - composite_score
      - scoring_rubric
      - scores
      - parked_at
      source_event: vertical.marginal
  - id: scoring_to_rejected
    from: scoring
    to: killed
    trigger: vertical.scored
    node: scoring-node
    guards:
    - composite_below_marginal
    actions:
    - emit_vertical_rejected
  - id: marginal_to_researching
    from: marginal_review
    to: researching
    trigger: vertical.resumed
    node: empire-coordinator
    guards:
    - pipeline_has_capacity
    actions:
    - emit_vertical_resumed
  - id: marginal_to_killed
    from: marginal_review
    to: killed
    trigger: vertical.rejected
    node: empire-coordinator
    guards: []
    actions:
    - emit_vertical_rejected
  - id: shortlisted_to_researching
    from: shortlisted
    to: researching
    trigger: vertical.shortlisted
    node: validation-orchestrator
    guards:
    - has_vertical_id
    actions:
    - emit_validation_started
  - id: researching_to_mvp_speccing
    from: researching
    to: mvp_speccing
    trigger: research.completed
    node: validation-orchestrator
    guards:
    - gate_g1_research
    actions: []
    data_accumulation:
      writes:
      - business_brief
      source_event: research.completed
  - id: mvp_speccing_to_cto_review
    from: mvp_speccing
    to: cto_spec_review
    trigger: spec.approved
    node: validation-orchestrator
    guards:
    - gate_g2_spec
    actions: []
    data_accumulation:
      writes:
      - mvp_spec
      source_event: spec.approved
  - id: cto_review_to_branding
    from: cto_spec_review
    to: branding
    trigger: cto.spec_approved
    node: validation-orchestrator
    guards:
    - gate_g3_cto
    actions: []
    data_accumulation:
      writes:
      - cto_feasibility
      source_event: cto.spec_approved
  - id: branding_to_ready
    from: branding
    to: ready_for_review
    trigger: vertical.ready_for_review
    node: validation-orchestrator
    guards:
    - gate_g4_brand
    - all_gates_met
    actions: []
    data_accumulation:
      writes:
      - brand
      - validation_kit
      source_event: brand.candidates_ready
  - id: ready_to_approved
    from: ready_for_review
    to: approved
    trigger: vertical.approved
    node: lifecycle-orchestrator
    guards:
    - has_human_decision
    actions:
    - emit_opco_spinup_requested
  - id: ready_to_killed
    from: ready_for_review
    to: killed
    trigger: vertical.killed
    node: runtime
    guards: []
    actions: []
  - id: ready_to_researching
    from: ready_for_review
    to: researching
    trigger: vertical.needs_more_data
    node: runtime
    guards: []
    actions: []
  - id: validation_failed_to_speccing
    from: cto_spec_review
    to: mvp_speccing
    trigger: spec.validation_failed
    node: validation-orchestrator
    guards:
    - inner_revision_count_below_limit
    actions:
    - increment_revision_count
  - id: cto_revision_to_speccing
    from: cto_spec_review
    to: mvp_speccing
    trigger: cto.spec_revision_needed
    node: validation-orchestrator
    guards:
    - inner_revision_count_below_limit
    actions:
    - increment_revision_count
  - id: researching_to_killed
    from: researching
    to: killed
    trigger: research.vertical_rejected
    node: validation-orchestrator
    guards: []
    actions: []
  - id: cto_vetoed_to_killed
    from: cto_spec_review
    to: killed
    trigger: cto.spec_vetoed
    node: validation-orchestrator
    guards: []
    actions: []
  - id: approved_to_full_speccing
    from: approved
    to: full_speccing
    trigger: opco.ceo_ready
    node: lifecycle-orchestrator
    guards: []
    actions:
    - spinup_opco_org
  - id: full_speccing_to_building
    from: full_speccing
    to: building
    trigger: spec.approved
    node: lifecycle-orchestrator
    guards:
    - spec_validation_passed
    actions: []
  - id: building_to_pre_launch
    from: building
    to: pre_launch
    trigger: build_complete
    node: lifecycle-orchestrator
    guards:
    - qa_passed
    actions: []
  - id: pre_launch_to_launched
    from: pre_launch
    to: launched
    trigger: launch_ready
    node: lifecycle-orchestrator
    guards:
    - deploy_approved
    actions: []
  - id: launched_to_operating
    from: launched
    to: operating
    trigger: opco.steady_state_reached
    node: lifecycle-orchestrator
    guards: []
    actions: []
  - id: operating_to_expanding
    from: operating
    to: expanding
    trigger: opco.growth_triggered
    node: lifecycle-orchestrator
    guards: []
    actions: []
  - id: expanding_to_operating
    from: expanding
    to: operating
    trigger: opco.growth_stabilized
    node: lifecycle-orchestrator
    guards: []
    actions: []
  - id: operating_to_winding_down
    from: operating
    to: winding_down
    trigger: opco.teardown_requested
    node: lifecycle-orchestrator
    guards:
    - has_human_decision
    actions:
    - begin_teardown
  - id: any_factory_to_killed
    from: '*'
    to: killed
    trigger: vertical.killed
    node: runtime
    guards:
    - not_in_operating_phase
    actions: []
  timers:
  - id: marginal_review_timer
    stage: marginal_review
    delay_days: 14
    event: timer.marginal_review
    owner: lifecycle-orchestrator
    action: 'EC re-evaluates parked marginal: promote, extend, or kill'
    cancellation: Cancelled if vertical leaves marginal_review stage
  - id: marginal_kill_timer
    stage: marginal_review
    delay_days: 60
    event: timer.marginal_kill
    owner: lifecycle-orchestrator
    action: Auto-kill marginals parked >60 days with no new signals
    cancellation: Cancelled if vertical promoted or killed earlier
  - id: portfolio_digest_timer
    stage: '*'
    delay_hours: 6
    event: timer.portfolio_digest
    owner: lifecycle-orchestrator
    action: Compile and send portfolio digest
    cancellation: Never cancelled, recurring
    recurring: true
  - id: scan_timeout
    stage: discovered
    delay_minutes: 90
    event: timer.scan_timeout
    owner: scan-orchestrator
    action: Scan accumulator timeout — complete scan with partial results
    cancellation: Cancelled when scan completes normally
  - id: campaign_deadline
    stage: '*'
    delay_hours: 24
    event: timer.campaign_deadline
    owner: scan-orchestrator
    action: Global campaign safety net — force completion
    cancellation: Cancelled when campaign completes normally
  entity_schema:
    description: Schema for the entity table (verticals). Implementer derives DDL from this.
    identity:
      id: uuid
      slug: text (generated from name + geography)
      name: text
      geography: text
    workflow_state:
      stage: text (enum from stages list)
      mode: text (factory | operating)
      parked_at: timestamptz (set on marginal)
      kill_reason: text
      killed_at_stage: text
    discovery_phase:
      raw_signals: jsonb (from vertical.discovered payload)
      signal_strength: integer
      opportunity_pattern: text
      discovery_mode: text (saas_gap | saas_trend | local_services | corpus | derived)
    scoring_phase:
      composite_score: numeric(5,2) (from vertical.scored)
      scoring_rubric: text
      scores: jsonb (dimension scores from vertical.scored.dimensions)
    validation_phase:
      business_brief: jsonb (from research.completed)
      mvp_spec: jsonb (from spec.approved)
      cto_feasibility: jsonb (from cto.spec_approved)
      brand: jsonb (from brand.candidates_ready)
      validation_kit: jsonb (accumulated validation artifacts)
    operating_phase:
      full_spec: jsonb (from opco full spec process)
      deploy_config: jsonb
      live_url: text
      launch_targets: jsonb
      credentials: jsonb (encrypted)
    metadata:
      human_notes: text
      template_version: text
      created_at: timestamptz
      updated_at: timestamptz
    derivation:
      parent_id: uuid (null for non-derived)
      generation_depth: integer default 0
      generator_agent_id: text
