mode_cases:
  - name: saas_gap
    mode: saas_gap
    remaining_modes: [saas_trend, local_services]
    expected_agents: 1

  - name: automation_micro_alias
    mode: automation_micro
    remaining_modes: [saas_trend, local_services]
    expected_agents: 1

  - name: saas_trend
    mode: saas_trend
    remaining_modes: [local_services]
    expected_agents: 1

  - name: local_services
    mode: local_services
    remaining_modes: []
    expected_agents: 5

  - name: corpus
    mode: corpus
    remaining_modes: []
    expected_agents: 1

scan_completion_cases:
  - name: corpus_completes_on_first_signal
    mode: corpus
    completion_events: [market_research.scan_complete]
    expect_scan_completed: true

  - name: local_services_partial_does_not_complete
    mode: local_services
    completion_events: [scanner.google_maps.scan_complete, scanner.instagram.scan_complete]
    expect_scan_completed: false

  - name: local_services_all_scanners_complete
    mode: local_services
    completion_events:
      - scanner.google_maps.scan_complete
      - scanner.instagram.scan_complete
      - scanner.reviews.scan_complete
      - scanner.directories.scan_complete
      - scanner.yelp.scan_complete
    expect_scan_completed: true
