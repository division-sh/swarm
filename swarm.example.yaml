#   contracts_path: ./contracts # Project-contained contract bundle root.
#   prompts_dir: ./prompts # Project-contained prompt directory.
#   tooling_lock_file: ./tooling.lock # Project-contained tooling lock file.
#   verification_gates_file: ./verification-gates.yaml # Project-contained verification gates file.
