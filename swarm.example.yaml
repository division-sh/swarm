#     external_dirs: ["./provider-packs"] # Project-contained provider trigger pack directories.
# workspace:
#   data_source: ./.swarm/data # Project-contained workspace data source.

# Elevated/local-only keys: use .swarm/swarm.yaml, user-global config, explicit --config, or flags
# These keys are machine/operator-specific or unsafe if committed to a shared project file.
# connection:
#   api_server: http://127.0.0.1:8081 # CLI API target. Keep out of checked-in project config.
# database:
#   host: 127.0.0.1 # Postgres host for postgres store deployments.
#   name: swarm # Postgres database name.
#   pool_size: 5 # Postgres connection pool size.
#   port: 5432 # Postgres port for postgres store deployments.
#   sslmode: disable # Postgres SSL mode.
#   user: postgres # Postgres user.
# llm:
#   claude_cli:
#     command: claude # Claude CLI executable path/name.
#   openai_compatible:
#     base_url: https://api.example.com/v1 # OpenAI-compatible endpoint base URL.
#   openai_responses:
#     base_url: https://api.openai.com/v1 # OpenAI Responses endpoint base URL.
# paths:
#   artifact_root: .swarm/artifacts # Runtime artifact root.
#   monitor_dir: .swarm/monitor # Runtime monitor artifact directory.
#   platform_spec_path: platform-spec.yaml # Platform spec path override.
#   swarm_dir: .swarm # Swarm state directory.
# store:
#   backend: sqlite # Runtime store backend.
#   sqlite:
#     path: .swarm/dev.db # SQLite runtime store path.
# workspace:
#   allow_exec_on_host: false # Unsafe host execution opt-in; requires local/operator config or a flag.
#   docker_bin: docker # Docker executable path/name.
#   host_root: ~/.swarm/workspaces # Host workspace root for local/operator use.
#   image: swarm-workspace:latest # Workspace image for Docker-backed execution.
#   network: swarm # Docker network for workspaces.
#   volumes_from: swarm-orchestrator # Container volume source for orchestrated deployments.

# Secret references: never store plaintext secrets in config
# These keys point at secret material; the secret value itself belongs in the secrets store, a token file, a mounted secret file, or an explicitly delegated env var.
# connection:
#   api_token_file: .swarm/api-token # CLI API bearer-token file reference; never inline the token.
# database:
#   password_env: DB_PASSWORD # Explicit env delegation for orchestrator-injected database password.
#   password_file: /run/secrets/postgres-password # Database password file for orchestrator-mounted secrets.
#   password_secret_key: postgres_password # Database password key in the Swarm secrets store.
# serve:
#   api_token_file: .swarm/serve-api-token # Serve API bearer-token file reference; never inline the token.
