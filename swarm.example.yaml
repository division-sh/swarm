# Generated from cmd/swarm unified config metadata.
# Do not hand-maintain key lists here; update the generator metadata and drift test.
# Copy selected keys into ./swarm.yaml for project-safe settings, .swarm/swarm.yaml for local-operator settings, or a file passed with --config for explicit full-trust settings.
# All example entries are commented so this file is documentation, not active project config.
# Inline secret values are intentionally absent; use secret keys, token files, secret files, or explicit env delegation where the schema owns that reference.

# Project-safe keys: safe in checked-in ./swarm.yaml
# These keys express portable runtime behavior.
# budget:
#   global_monthly_cap: 0 # Global monthly budget cap; zero leaves enforcement disabled.
#   human_tasks:
