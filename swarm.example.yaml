#     budget_reset: monday # Weekly human-task budget reset day.
#     categories_enabled: ["ops"] # Human task categories enabled for budget policy.
#     max_tasks_per_week: 0 # Human task weekly cap; zero leaves enforcement disabled.
#   per_entity_monthly_cap: 0 # Per-entity monthly budget cap; zero leaves enforcement disabled.
#   system_monthly_cap: 0 # System actor monthly budget cap; zero leaves enforcement disabled.
# llm:
#   backend: anthropic # Active LLM backend profile.
#   claude_api:
#     max_retries: 1 # Anthropic API retry count.
#     retry_backoff: 2s # Anthropic API retry backoff.
#   claude_cli:
#     output_format: stream-json # Claude CLI output format.
#     timeout: 1h # Claude CLI request timeout.
#   models:
#     regular:
#       anthropic: claude-3-5-sonnet # Provider-specific model alias override.
#   provider_limits:
#     anthropic:
#       max_concurrency: 2 # Provider-wide concurrency limit.
#       max_concurrency_max_wait: 30s # Maximum wait for provider-wide concurrency limiting.
#       models:
#         claude-3-5-sonnet:
#           rate_limit: 10/m # Model-specific request rate limit.
#           rate_limit_max_wait: 30s # Maximum wait for model-specific rate limiting.
#       rate_limit: 30/m # Provider-wide request rate limit.
#       rate_limit_max_wait: 30s # Maximum wait for provider-wide rate limiting.
#   session:
#     lock_ttl: 10s # Session lock lease TTL.
#     rotate_after_turns: 40 # Rotate an LLM session after this many turns.
#     rotate_on_parse_failures: 3 # Rotate an LLM session after repeated parse failures.
# runtime:
#   recovery_on_startup: false # Recover persisted runtime state on startup.
# serve:
#   api_listen_addr: "127.0.0.1:8081" # Loopback API listener. Public or wildcard binds require local/operator config or a flag.
#   mcp_listen_addr: "127.0.0.1:8082" # Loopback MCP listener. Public or wildcard binds require local/operator config or a flag.
# workspace:
