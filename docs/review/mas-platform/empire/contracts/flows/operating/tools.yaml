agent_hire:
  category: per_agent
  description: Hire a new worker agent into the org
  input_schema:
    type: object
    required:
    - role
    - agent_id
    properties:
      role:
        type: string
        description: Functional role for the new agent
      agent_id:
        type: string
        description: Unique ID for the new agent
      model_tier:
        type: string
        enum:
        - sonnet
        - haiku
        - haiku_or_sonnet
        default: haiku
      system_prompt:
        type: string
        description: System prompt for the new agent
    additionalProperties: false
  handler_type: platform_builtin
configure_routing:
  category: per_agent
  description: Add, remove, or modify event routing rules
  input_schema:
    type: object
    required:
    - operation
    - event_type
    properties:
      operation:
        type: string
        enum:
        - add
        - remove
        - modify
      event_type:
        type: string
        description: Event type to route
      subscriber_id:
        type: string
        description: Agent to receive the event
      source:
        type: string
        enum:
        - discovered
        - seeded
        description: Route source (bootstrap routes are immutable and cannot be configured)
      reason:
        type: string
    additionalProperties: false
  handler_type: platform_builtin
agent_reconfigure:
  category: per_agent
  description: Update a worker agent's configuration
  input_schema:
    type: object
    required:
    - agent_id
    properties:
      agent_id:
        type: string
      model_tier:
        type: string
        enum:
        - sonnet
        - haiku
        - haiku_or_sonnet
      system_prompt:
        type: string
      max_turns_per_task:
        type: integer
    additionalProperties: false
  handler_type: platform_builtin
agent_fire:
  category: per_agent
  description: Terminate a worker agent
  input_schema:
    type: object
    required:
    - agent_id
    - reason
    properties:
      agent_id:
        type: string
      reason:
        type: string
    additionalProperties: false
  handler_type: platform_builtin
whatsapp_business_api:
  category: per_agent
  description: Send WhatsApp message via Business API
  input_schema:
    type: object
    required:
    - to
    - message
    properties:
      to:
        type: string
        description: Phone number in international format
      message:
        type: string
      template_id:
        type: string
        description: Pre-approved message template ID (required for first contact)
    additionalProperties: false
  handler_type: workflow_registered
domain_purchase:
  category: per_agent
  description: Purchase a domain name
  input_schema:
    type: object
    required:
    - domain
    properties:
      domain:
        type: string
      registrar:
        type: string
        default: namecheap
    additionalProperties: false
  handler_type: workflow_registered
instagram_api:
  category: per_agent
  description: Post content to Instagram via Graph API
  input_schema:
    type: object
    required:
    - action
    properties:
      action:
        type: string
        enum:
        - post_image
        - post_story
        - get_insights
      image_url:
        type: string
      caption:
        type: string
    additionalProperties: false
  handler_type: workflow_registered
email_api:
  category: per_agent
  description: Send email via SendGrid/Postmark
  input_schema:
    type: object
    required:
    - to
    - subject
    - body
    properties:
      to:
        type: string
      subject:
        type: string
      body:
        type: string
      from_name:
        type: string
      reply_to:
        type: string
    additionalProperties: false
  handler_type: workflow_registered
human_task_request:
  category: per_agent
  description: Request a physical-world task from the human operator
  input_schema:
    type: object
    required:
    - category
    - description
    - talking_points
    properties:
      category:
        type: string
        enum:
        - research
        - outreach
        - verification
        - content_creation
        - admin
      description:
        type: string
      talking_points:
        type: array
        items:
          type: string
      priority:
        type: string
        enum:
        - low
        - normal
        - high
        - critical
        default: normal
      deadline_hours:
        type: integer
        description: Hours until task expires
    additionalProperties: false
  handler_type: platform_builtin
