validation-coordinator:
  id: validation-coordinator
  type: factory
  role: validation_coordinator
  model_tier: sonnet
  conversation_mode: task
  max_turns_per_task: 5
  subscriptions:
  - validation.package_ready
  tools_tier2: []
  emit_events:
  - vertical.ready_for_review
  permissions_bundle: specialist
  permissions: &id002
  - message_domain
  - mailbox_send
  - configure_routing
  workspace_class: factory
  manager_fallback: empire-coordinator
business-research-agent:
  id: business-research-agent
  type: factory
  role: business_research
  model_tier: sonnet
  conversation_mode: session_per_entity
  max_turns_per_task: 30
  subscriptions:
  - validation.started
  - spec.revision_requested
  - spec.draft_ready
  - spec_review.passed
  - spec_review.issues_found
  - research.additional_requested
  - vertical.needs_more_data
  tools_tier2: []
  emit_events:
  - research.completed
  - research.vertical_rejected
  - spec.requested
  - spec.revision_needed
  - spec_review.requested
  - spec.draft_ready
  permissions_bundle: worker
  permissions: &id001
  - message_peers
  workspace_class: factory
  manager_fallback: validation-coordinator
  _note: 'Dual role: deep-dive business research AND spec coordination within the validation pipeline. Naming reflects primary
    function.'
lightweight-spec-agent:
  id: lightweight-spec-agent
  type: factory
  role: lightweight_spec
  model_tier: sonnet
  conversation_mode: session_per_entity
  max_turns_per_task: 20
  subscriptions:
  - spec.requested
  - spec.revision_needed
  tools_tier2: []
  emit_events:
  - spec.draft_ready
  permissions_bundle: worker
  permissions: *id001
  workspace_class: factory
  manager_fallback: validation-coordinator
spec-reviewer:
  id: spec-reviewer
  type: factory
  role: spec_reviewer
  model_tier: haiku
  conversation_mode: stateless
  max_turns_per_task: 10
  subscriptions:
  - spec_review.requested
  tools_tier2: []
  emit_events:
  - spec_review.passed
  - spec_review.issues_found
  permissions_bundle: worker
  permissions: *id001
  workspace_class: factory
  manager_fallback: factory-cto
factory-cto:
  id: factory-cto
  type: holding
  role: factory_cto
  model_tier: sonnet
  conversation_mode: session
  max_turns_per_task: 25
  subscriptions:
  - cto.spec_review_requested
  - spec.validation_passed
  - spec.validation_failed
  - template.publish_requested
  - analyst.bootstrap_upgrade_proposal
  - analyst.prompt_refinement_proposal
  - analyst.anti_pattern_advisory
  - operating/*/opco.steady_state_reached
  - opco.escalation
  tools_tier2: []
  emit_events:
  - template.version_published
  - cto.spec_approved
  - cto.spec_revision_needed
  - cto.spec_vetoed
  - cto.architecture_directive
  - cto.extraction_recommended
  - cto.pattern_detected
  - cto.tech_spec_feedback
  - spec.validation_requested
  permissions_bundle: lead
  permissions:
  - agent_hire
  - agent_fire
  - agent_reconfigure
  - configure_routing
  - message_domain
  - mailbox_send
  - human_task_request
  workspace_class: holding
  manager_fallback: empire-coordinator
pre-brand-agent:
  id: pre-brand-agent
  type: factory
  role: pre_brand
  model_tier: sonnet
  conversation_mode: task
  max_turns_per_task: 20
  subscriptions:
  - brand.requested
  - brand.revision_needed
  tools_tier2:
  - domain_availability_check
  - instagram_handle_check
  - whatsapp_name_check
  emit_events:
  - brand.candidates_ready
  - brand.revision_needed
  permissions_bundle: worker
  permissions: *id001
  workspace_class: factory
  manager_fallback: validation-coordinator
spec-auditor:
  id: spec-auditor
  type: holding
  role: spec_auditor
  model_tier: sonnet
  conversation_mode: task
  max_turns_per_task: 30
  subscriptions:
  - spec.validation_requested
  - spec.contradiction_detected
  tools_tier2: []
  emit_events:
  - spec.validation_passed
  - spec.validation_failed
  - spec.contradiction_detected
  permissions_bundle: specialist
  permissions: *id002
  workspace_class: holding
  manager_fallback: factory-cto
