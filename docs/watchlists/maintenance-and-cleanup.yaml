version: 1
kind: watchlist
id: maintenance_and_cleanup
title: Maintenance And Cleanup Watchlist
canonical_home_for: decomposition, dead code, conformance-fixture coverage, and legacy compatibility removal
role:
  mode: architecture_and_cleanup_map
  guidance:
    - keep active issues mapped to the smallest coherent cleanup or maintenance node
    - use nodes to avoid flattening unrelated decomposition work into one maintenance bucket
    - refine nodes when review shows a repeated cleanup or compatibility-removal pattern
active_issues:
  - id: 125
    title: Wire excluded runtime catalog conformance fixtures into e2e execution
    maps_to:
      - invariant_suite_coverage
  - id: 126
    title: Split boot verification into boundary-owned modules and close major test gaps
    maps_to:
      - boundary_owned_decomposition
      - invariant_suite_coverage
  - id: 127
    title: Remove or implement the inert post-turn contract enforcement path in the LLM agent
    maps_to:
      - dead_or_inert_paths
  - id: 128
    title: Consolidate event bus publish paths and remove dead publish variants
    maps_to:
      - dead_or_inert_paths
      - boundary_owned_decomposition
  - id: 157
    title: Remove legacy schema and error fallback helpers from runtime/store hot paths
    maps_to:
      - legacy_compatibility_removal
  - id: 158
    title: Remove the exact-schedule compatibility shim after canonical identity lands
    maps_to:
      - legacy_compatibility_removal
  - id: 159
    title: Legacy compatibility removal wave
    maps_to:
      - legacy_compatibility_removal
  - id: 360
    title: Remove receipt retry-owner and delivery backfill compatibility from pending-delivery hot path
    maps_to:
      - legacy_compatibility_removal
  - id: 173
    title: Completed-seam hygiene with canonical-owner notes and reusable invariant suites
    maps_to:
      - completed_seam_hygiene
      - invariant_suite_coverage
  - id: 182
    title: Improve local lifecycle and harness reliability so tooling stops hiding runtime semantics
    maps_to:
      - harness_reliability_and_local_smoke
nodes:
  - id: boundary_owned_decomposition
    title: Boundary-Owned Decomposition
    parent_class: maintenance decomposition of oversized seams
    canonical_owners:
      - boundary-owned modules in the touched seam
    why_this_node_exists: oversized files and mixed-responsibility seams invite local patches, weak ownership, and shallow test coverage
    known_manifestations:
      - large seams that still mix multiple concepts in one file
      - extractions that leave same-concept logic duplicated across old and new modules
      - decomposition that moves code without moving the test burden with it
    representative_issues:
      - 126
      - 128
    common_framing_mistakes:
      too_broad:
        - cleanup the whole subsystem
      too_narrow:
        - move one helper because the file is large
    current_action_pressure: active
  - id: legacy_compatibility_removal
    title: Legacy Compatibility Removal
    parent_class: maintenance removal of transitional runtime or store shims
    canonical_owners:
      - canonical runtime/store schema and semantic owners after migration
    why_this_node_exists: temporary compatibility paths tend to become permanent unless they are tracked and removed deliberately
    known_manifestations:
      - hot-path schema capability branching
      - compatibility shims that preserve obsolete scheduling or identity behavior
      - fallback helpers that survive after the canonical owner lands
    representative_issues:
      - 157
      - 158
      - 159
      - 360
    common_framing_mistakes:
      too_broad:
        - delete all legacy code
      too_narrow:
        - remove one branch without checking sibling compatibility seams
    current_action_pressure: active
  - id: invariant_suite_coverage
    title: Invariant Suite Coverage
    parent_class: reusable proof coverage for completed or maturing seams
    canonical_owners:
      - conformance and focused invariant test suites for the touched seam
    why_this_node_exists: mature seams still drift if proof remains issue-local instead of reusable
    known_manifestations:
      - one-off regressions without reusable invariant coverage
      - conformance fixtures excluded from e2e execution
      - completed canonicalization work without a durable invariant suite
    representative_issues:
      - 125
      - 126
    common_framing_mistakes:
      too_broad:
        - add more tests everywhere
      too_narrow:
        - add one regression and call the seam covered
    current_action_pressure: active
  - id: completed_seam_hygiene
    title: Completed-Seam Hygiene
    parent_class: maintenance hardening of already-completed seams
    canonical_owners:
      - canonical-owner notes and reusable invariant suites for the touched completed seam
    why_this_node_exists: completed seams drift back into ambiguity when ownership is not documented locally and proof remains issue-local
    known_manifestations:
      - key completed seams still lack short canonical-owner guidance
      - completed seams rely on one-off regressions instead of reusable invariant suites
    representative_issues:
      - 173
    common_framing_mistakes:
      too_broad:
        - add comments everywhere
        - add more tests everywhere
      too_narrow:
        - one comment in one file
        - one extra regression without seam-level reuse
    current_action_pressure: active
  - id: harness_reliability_and_local_smoke
    title: Harness Reliability And Local Smoke
    parent_class: maintenance reliability of local lifecycle and development/test harnesses
    canonical_owners:
      - local lifecycle smoke coverage and harness reliability for the touched development/test seam
    why_this_node_exists: local lifecycle and harness noise can hide real runtime semantics and send debugging effort at the wrong layer
    known_manifestations:
      - reset/startup smoke coverage is too weak in the touched local path
      - giant fixtures hide smaller invariant failures
      - optional infrastructure gaps are unclear during local startup
    representative_issues:
      - 182
    common_framing_mistakes:
      too_broad:
        - the harness is flaky
      too_narrow:
        - one test is flaky
        - one script needs cleanup
    current_action_pressure: active
  - id: dead_or_inert_paths
    title: Dead Or Inert Paths
    parent_class: maintenance removal of non-authoritative codepaths
    canonical_owners:
      - the real live execution path in the touched subsystem
    why_this_node_exists: dead, inert, or shadow execution paths create fake optionality and weaken reviewer understanding of what is actually authoritative
    known_manifestations:
      - inert enforcement branches
      - unused publish variants
      - helper paths with no live caller or semantic authority
    representative_issues:
      - 127
      - 128
    common_framing_mistakes:
      too_broad:
        - cleanup all dead code
      too_narrow:
        - delete one function without checking whether the surrounding path still duplicates authority
    current_action_pressure: active
