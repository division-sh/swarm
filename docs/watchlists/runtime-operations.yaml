nodes:
  - id: transport_policy_and_surface_parity
    title: Transport Policy And Surface Parity
    parent_class: runtime execution-boundary policy drift
    canonical_owners:
      - canonical tool transport and validation ownership across prompt, verify, and runtime surfaces
    why_this_node_exists: transport-visible behavior drifts when prompt, managed startup, and live transport paths enforce different policies
    known_manifestations:
      - context-token policy differs across transport surfaces
      - startup validation does not prove the real filtered transport path
      - agent-visible tool availability differs between prompt and transport
      - supported agent turns can persist a canonical visible tool surface that is broader than the provider-callable surface actually available on that turn
      - fallback relay on a supported turn can degrade file-backed work by clamping large relayed tool results to preview-only text
      - supported no-read_file turns can emit runtime_read_file follow-up artifacts for oversized tool results even though the same turn surface cannot call read_file
      - oversized file-backed tool results on supported Claude helper turns can leak provider scratch paths back into later runtime read_file calls
      - CLI native tools can still use mixed provider-plus-platform fallback semantics, so visible turn surface does not equal callable provider-native truth for bash, web_search, and file_io
      - startup validation can compare provider-native init output against the full runtime MCP/local fallback surface and can select ordinary semantic tools as startup probes because their schemas accept empty objects
      - generated role-scoped typed reads can be silently downgraded by generic transport projection into preview/truncated shapes instead of complete typed values or explicit typed-read errors
      - generated typed tool and emit schemas can drift between provider-visible delivery, runtime validation, and bootverify, allowing undeclared payload keys or missing required/enum constraints to survive one surface
    representative_issues:
      - 111
      - 136
      - 137
      - 368
      - 406
      - 381
      - 444
      - 544
      - 571
      - 580
      - 582
    common_framing_mistakes:
      too_broad:
        - tool transport is inconsistent
      too_narrow:
        - one endpoint or one token limit is wrong
    current_action_pressure: active
  - id: delivery_and_replay_ownership
    title: Delivery And Replay Ownership
    parent_class: runtime delivery lifecycle and recovery semantics
    canonical_owners:
      - delivery planner / recipient ownership / replay claim ownership in the touched seam
    why_this_node_exists: runtime delivery drifts when publish, recovery, retry, and replay ownership are split across local paths
    known_manifestations:
      - direct-recipient delivery as a shadow semantic path
      - retry counters and delivery-state updates not atomic
      - replayed deliveries and restored timers without explicit shared-store ownership
      - markerless replay-eligible events can repeatedly fail committed replay-scope lookup on the supported outbox sweeper path
      - timestamp forks need fork-local delivery/event replay lineage and committed replay-scope proof rather than direct source delivery redelivery or markerless same-run outbox replay
      - timestamp-fork non-agent delivery facts are not safe to replay through the agent delivery primitive; node/system delivery execution requires a separate handler/idempotency/receipt owner
      - selected-contract fork execution must classify delivery-write boundaries before future mutation; source deliveries remain lineage/blocker evidence, not executable fork work
    representative_issues:
      - 112
      - 144
      - 145
      - 547
      - 564
      - 569
      - 574
      - 583
      - 585
    common_framing_mistakes:
      too_broad:
        - delivery is flaky
      too_narrow:
        - one dispatcher or retry function is wrong
    current_action_pressure: active
  - id: timestamp_fork_replay_resume_ownership
    title: Timestamp Fork Replay Resume Ownership
    parent_class: full mutating timestamp-fork execution after run-scoped current-state materialization and activation
    canonical_owners:
      - canonical timestamp-fork replay/resume owner must define which historical source-run facts are replayed, copied, reconstructed, lineage-only, or permanently blocked before execution starts
      - existing fork planner/materializer/activation owners are prerequisites and consumers, not the historical replay/resume owner
      - delivery, session/turn, timer, route, replay-scope, current-state, and mutation-log owners must either consume that owner or remain explicit blockers
    why_this_node_exists: activation-only forks can start a state-only fork context, but historical replay/resume is split across delivery rows, committed replay scope, sessions, turns, timers, routes, source-advanced checks, and planner blockers; local delivery redelivery or event-copy helpers would preserve semantic drift
    known_manifestations:
      - activation-only timestamp forks deliberately block historical replay and set historical replay as unsupported
      - pending or in-progress deliveries at the fork point are not safe to redeliver without event, recipient, receipt, idempotency, session/turn, timer/route, and side-effect policy
      - same-run committed replay scope fixes do not define timestamp-fork redelivery under a new run_id
      - source advancement after the fork point remains fail-closed because no branch/replay policy proves safe divergence
      - timers and routing_rules are current rows without an append-only timestamp-fork reconstruction owner
      - agent_sessions and agent_turns are run-scoped facts without an at-T fork reconstruction/reuse policy
      - the first supported timestamp-fork delivery/event replay primitive must create fresh fork event/delivery IDs with source lineage and direct committed replay-scope proof for the runtime recovery consumer, while keeping unsafe delivery/session/timer/route cases fail-closed
      - session/turn replay remains an admission-policy first slice; source active sessions, active turns, active task conversation audits, and fork-local pre-existing session/turn rows are permanent fail-closed blockers until a run-scoped reconstruction owner is approved
      - non-agent delivery replay remains admission-policy only; source node/system/platform/internal delivery facts and committed replay-scope markers are lineage-only or named fail-closed blockers until runtime handler replay ownership is approved
      - selected-contract timestamp-fork re-admission needs a non-mutating contract/frontier/route admission owner before node/system delivery facts can become executable fork work
      - selected-contract fork execution needs a non-mutating owner model before mutation; the model must consume frontier admission as evidence only and classify contract binding, fork run_id context, handler execution, receipts, dead letters, idempotency, emitted follow-ups, timers, routes, sessions, source-advanced policy, and contract-swap boot/resume
    representative_issues:
      - 564
      - 565
      - 569
      - 572
      - 574
      - 577
      - 583
      - 585
    common_framing_mistakes:
      too_broad:
        - implement full fork replay, timers, sessions, routes, contract swap, and UI in one undifferentiated PR
      too_narrow:
        - redeliver pending event_deliveries directly from CLI or a local helper
        - copy event rows to a fork run without a delivery/session/timer/route/source-advanced model
        - treat committed same-run outbox replay as timestamp-fork replay ownership
    current_action_pressure: active
  - id: atomic_runtime_state_mutation
    title: Atomic Runtime State Mutation
    parent_class: operational state mutation integrity
    canonical_owners:
      - one atomic owner for workflow instance load/mutate/upsert semantics
    why_this_node_exists: runtime state correctness drifts when mutation spans multiple non-atomic steps
    known_manifestations:
      - workflow instance mutation split across load, mutate, and upsert
    representative_issues:
      - 116
      - 161
    common_framing_mistakes:
      too_broad:
        - persistence is nonatomic
      too_narrow:
        - one update statement races
    current_action_pressure: active
  - id: run_isolated_current_state_ownership
    title: Run-Isolated Current State Ownership
    parent_class: runtime replay, recovery, historical-state reconstruction, and current-state ownership
    canonical_owners:
      - run-scoped current-state identity model for entity_state
      - explicit runtime/store current-state context owner for all entity_state reads, writes, queries, and ownership checks
      - entity_mutations.run_id as append-only history and reconstruction owner
    why_this_node_exists: mutating timestamp forks require source and fork runs to diverge safely while preserving entity identity; global entity_state keyed only by entity_id lets forked execution collide with or overwrite source state
    known_manifestations:
      - entity_state previously had no run_id and used entity_id as a global primary key
      - state-only fork dry-run can be execution-ready, but mutating execution cannot materialize isolated current-state rows until live current state is run-scoped
      - execution-ready timestamp-fork plans need a store-owned materialization operation that creates fork run lineage plus fork-scoped entity_state and entity_mutations rows without resuming delivery
      - materialized state-only forks need store-owned activation that freezes the source run and starts future fork-local execution without historical delivery replay
      - historical replay/resume after activation requires a separate timestamp-fork replay/resume owner before any pending delivery redelivery or event-copy execution can be honest
      - runtime entity tools and workflow projection read and write entity_state by entity_id without run context
      - inbound routing, route ownership, workspace, digest, budget, and tests consume global current-state semantics
    representative_issues:
      - 549
      - 550
      - 558
      - 562
      - 564
    common_framing_mistakes:
      too_broad:
        - implement all mutating fork execution in one PR
        - merge delivery, timer, route, session, and current-state migration into one undifferentiated replay rewrite
      too_narrow:
        - enable swarm fork by changing only CLI or run_fork_planner
        - add a local entity_state copy helper while leaving global readers and writers live
        - add run_id to one query without defining the canonical current-state context owner
    current_action_pressure: active
  - id: boot_wiring_dependency_ownership
    title: Boot Wiring Dependency Ownership
    parent_class: runtime constructor and boot dependency ownership
    canonical_owners:
      - explicit validated dependency ownership for the runtime boot path
    why_this_node_exists: boot wiring drifts opaque when constructors and package-local setup paths split dependency ownership implicitly
    known_manifestations:
      - NewRuntime boot wiring spreads important ownership across multiple constructors
      - dependency validation is implicit instead of being owned by one explicit boot object
      - adjacent boot entrypaths become harder to reason about because dependency truth is not centralized
    representative_issues:
      - 170
    common_framing_mistakes:
      too_broad:
        - constructors are messy
      too_narrow:
        - one parameter list is too long
    current_action_pressure: active
  - id: privileged_control_plane_auth
    title: Privileged Control Plane Authentication
    parent_class: security and authorization fail-closed boundaries
    canonical_owners:
      - privileged transport/control-plane auth and delegation policy owners
    why_this_node_exists: control-plane surfaces drift open when auth or privilege semantics are left to callers or split by endpoint
    known_manifestations:
      - gateway auth not fail-closed
      - builder RPC/WebSocket privileged paths unauthenticated
      - delegable privileges not capped on hire/reconfigure
      - dashboard/runtime-control default listener left open
    representative_issues:
      - 139
      - 140
      - 141
      - 142
    common_framing_mistakes:
      too_broad:
        - auth needs work
      too_narrow:
        - one listener or caller path is unauthenticated
    current_action_pressure: active
  - id: shutdown_and_runtime_lifecycle
    title: Shutdown And Runtime Lifecycle
    parent_class: runtime shutdown and dependency-teardown integrity
    canonical_owners:
      - runtime-owned shutdown admission and drain semantics
    why_this_node_exists: shutdown correctness drifts when admission, draining, and dependency teardown are interpreted independently
    known_manifestations:
      - in-flight work not drained before dependencies tear down
    representative_issues:
      - 143
    common_framing_mistakes:
      too_broad:
        - shutdown is messy
      too_narrow:
        - one shutdown caller is wrong
    current_action_pressure: active
  - id: multi_runtime_fencing
    title: Multi-Runtime Fencing
    parent_class: operational deployment ownership and instance exclusivity
    canonical_owners:
      - explicit multi-runtime fencing or single-instance enforcement owner
    why_this_node_exists: runtime correctness drifts when deployment topology is implicit rather than enforced
    known_manifestations:
      - multiple runtimes can act without fencing or explicit single-instance enforcement
    representative_issues:
      - 146
    common_framing_mistakes:
      too_broad:
        - clustering is unsupported
      too_narrow:
        - one startup guard is missing
    current_action_pressure: active
  - id: fail_closed_operational_config
    title: Fail-Closed Operational Config
    parent_class: operational boundary semantics
    canonical_owners:
      - fail-closed operational config surface owners
    why_this_node_exists: config surfaces drift when inert or permissive controls survive as if they still matter
    known_manifestations:
      - inert controls left exposed
      - operational config surfaces not fail-closed
    representative_issues:
      - 147
    common_framing_mistakes:
      too_broad:
        - config is confusing
      too_narrow:
        - one flag is inert
    current_action_pressure: active
  - id: runtime_lifecycle_observability
    title: Runtime Lifecycle Observability
    parent_class: operator-visible runtime activity and stuckness truth
    canonical_owners:
      - canonical launch, progress, and session-liveness visibility for the touched runtime surfaces
    why_this_node_exists: operators cannot distinguish healthy progress from blocked or stalled runtime state when launch and liveness semantics are only partially surfaced
    known_manifestations:
      - launch lifecycle is not exposed clearly enough
      - stalled runs and healthy running state look too similar
      - long-running or no-output sessions require log archaeology instead of first-class visibility
      - persisted agent_sessions can remain active after the canonical same-run delivery frontier has narrowed
    representative_issues:
      - 175
      - 410
      - 424
    common_framing_mistakes:
      too_broad:
        - observability is weak
      too_narrow:
        - one stuck run needs a better message
    current_action_pressure: active
  - id: recovery_restart_diagnostics
    title: Recovery And Restart Diagnostics
    parent_class: restart and recovery decision visibility
    canonical_owners:
      - canonical diagnostics ownership for replay, skip, drop, and orphan recovery decisions
    why_this_node_exists: restart behavior drifts opaque when the runtime enforces one recovery model but operators cannot see which recovery decisions were actually taken
    known_manifestations:
      - replay, skip, drop, or orphan recovery decisions are not visible enough
      - in-flight recovery invariants are not explicit in touched diagnostics surfaces
      - startup environment confusion hides the real recovery behavior being exercised
    representative_issues:
      - 179
    common_framing_mistakes:
      too_broad:
        - restart is confusing
      too_narrow:
        - one missing restart log line
    current_action_pressure: active
  - id: tool_execution_outcome_diagnostics
    title: Tool Execution Outcome Diagnostics
    parent_class: execution-boundary observability and failure attribution
    canonical_owners:
      - canonical tool execution identity and outcome diagnostics for the touched tool family
    why_this_node_exists: tool execution is hard to debug when payload shaping, enrichment, validation, and publish outcomes collapse into one opaque failure story
    known_manifestations:
      - canonical tool or event identity not surfaced with the tool-call outcome
      - payload-shape failures and downstream publish failures not distinguished clearly
      - pre-validation and post-enrichment payload states not inspectable where they should be
    representative_issues:
      - 177
    common_framing_mistakes:
      too_broad:
        - tool debugging is weak
      too_narrow:
        - one error message needs more detail
    current_action_pressure: active
