nodes:
  - id: llm_provider_adjacency_contract_ownership
    title: LLM Provider Adjacency Contract Ownership
    parent_class: runtime LLM provider abstraction not production-ready
    canonical_owners:
      - internal/runtime/llm provider contract for runtime mode, provider identity, transport, tool schema translation, session lifecycle, response normalization, native-tool capability truth, persistence, and budget accounting
      - internal/runtime/llm/selection backend profile resolver for provider-selection/config authority
    why_this_node_exists: LLM provider behavior drifts when a runtime implementation satisfies StartSession and ContinueSession but leaves tool schema, stream parsing, session persistence, native tools, and budget behavior implicit in adjacent files
    known_manifestations:
      - RuntimeFactory can make provider identity look like a local mode switch rather than a contract-backed provider selection boundary
      - the public Runtime interface alone does not name provider obligations for tool schemas, provider session IDs, response normalization, task-mode audit, native-tool capability truth, or budget usage
      - Anthropic API and Claude CLI encode provider-specific request, response, stream, and budget behavior separately without one named adjacency contract
      - CLI strict native-tool behavior and API fallback-aware behavior can drift if agent tool composition and boot validation read optional runtime helpers instead of the provider contract
      - config llm.runtime_mode and persisted agents.llm_backend used to conflate provider identity, transport, and runtime mode; this selection/config slice is tracked in llm_provider_selection_config_authority
      - README/provider-extensibility wording can overstate provider neutrality unless implementation and docs consume the same provider contract truth
    representative_issues:
      - 983
    common_framing_mistakes:
      too_broad:
        - add all providers
        - make Swarm model-neutral
      too_narrow:
        - add one factory switch case
        - document how to copy the Anthropic runtime
        - rename cli_test
    current_action_pressure: active
  - id: llm_provider_selection_config_authority
    title: LLM Provider Selection Config Authority
    parent_class: runtime LLM provider abstraction not production-ready
    canonical_owners:
      - platform-spec.yaml llm_provider_selection_config_authority
      - internal/runtime/llm/selection backend profile and model alias resolver
    why_this_node_exists: LLM provider/model selection drifts when config, CLI flags, env defaults, runtime factories,
      provider credentials, persisted llm_backend, authored model aliases, and turn audit records each interpret backend
      identity or model resolution independently
    known_manifestations:
      - '#1127 promotes the target authority: --backend > runtime config llm.backend > default anthropic; env never selects backend'
      - '#1128 lands backend selection/config discovery: --backend > runtime config llm.backend > built-in default anthropic through the shared runtime config resolver'
      - target backend profile ids are anthropic, claude_cli, and openai_compatible; legacy api and cli_test are persisted-row migration/backfill inputs only and are not valid new operator/config inputs
      - openai_compatible intentionally remains the active profile name and is not renamed to openai until a separate provider/protocol gate promotes native OpenAI Responses or an official-only identity
      - SWARM_LLM_BACKEND and SWARM_OPENAI_COMPATIBLE_BASE_URL are retired; provider credentials remain env-sourced, while openai_compatible base_url is runtime config only
      - '#1129 lands model_tier-to-provider-resolved-model-alias migration: authored bundles target model; built-in aliases are cheap, regular, and frontier with provider-scoped resolution under llm.models; runtime writers persist authored alias plus resolved backend/provider/concrete model facts'
      - runtime config is canonical for non-secret LLM behavior; env remains valid only for provider secrets and explicitly owned pragmatic infra/connection overrides
      - RuntimeFactory, selected-fork runtime materialization, provider credential checks, AgentManager, store projection/hydration, boot/verify, model selection, budget/session audit, and read surfaces consume the same profile/model alias resolver after #1128 and #1129 behavior migrations
      - runtime audit writes authored model alias plus resolved backend/profile/provider/concrete model at write time; readers must not reconstruct from current config
      - '#1128 owns backend selection/config discovery migration; #1129 owns model_tier-to-model alias runtime/store/verify migration; #1130 owns docs/config/secrets cleanup after behavior lands'
      - OpenAI Responses, OpenRouter, Ollama, Bedrock, Azure, Vertex, vLLM, and native multi-backend-per-run remain separate provider/protocol gates
    representative_issues:
      - 983
      - 1062
      - 1070
      - 1123
      - 1127
      - 1128
      - 1129
      - 1130
    common_framing_mistakes:
      too_broad:
        - implement OpenAI, OpenRouter, Ollama, Bedrock, or another provider in the selection-authority slice
        - "implement #1128 and #1129 behavior in the #1127 source-authority slice"
        - rename openai_compatible to openai while defining source authority
      too_narrow:
        - add one factory switch case
        - add one env var alias while keeping runtime_mode as semantic owner
        - add --backend while SWARM_LLM_BACKEND or config readers remain independent selectors
        - add model alongside model_tier instead of replacing the selector
        - validate config without moving runtime/store/model/audit consumers
    current_action_pressure: active_docs_and_provider_tails_only
  - id: runtime_store_backend_default_and_sqlite_portability
    title: Runtime Store Backend Default And SQLite Portability
    parent_class: runtime store backend default and durable SQLite local/dev portability
    canonical_owners:
      - platform-spec.yaml runtime_store_backend_selection
      - internal/store/backendselection runtime store backend resolver and SQLite path resolver
      - "future SQLite schema/store/session/delivery/trace owners tracked by #1085-#1088 before public default flip"
    why_this_node_exists: Runtime store semantics drift when CLI defaults, env/config loading, runtime store construction, schema bootstrap, session locking, event delivery/replay, trace reads, docs, and CI each infer Postgres or SQLite support independently.
    known_manifestations:
      - "#1084 owns canonical backend ids postgres/sqlite, selector precedence flag > environment > runtime config > rollout default, SWARM_STORE_BACKEND, SWARM_SQLITE_PATH, store.backend, store.sqlite.path, and the staged SQLite path authority."
      - "#1085 must own SQLite dialect, schema bootstrap, and backend capability binding before SQLite can construct runtime stores."
      - "#1086 must port core runtime persistence stores behind backend-neutral SQLite/Postgres contracts."
      - "#1087 must port session, locking, delivery, replay, and trace-stream semantics for the SQLite local runtime path."
      - "#1088 must flip the active local/dev default to SQLite only after zero-service swarm run and explicit Postgres opt-in are proven together."
      - "#1089 must close docs, CI, repo-wide stale-default audit, and parent proof before #1066 closes."
    representative_issues:
      - 1066
      - 1084
      - 1085
      - 1086
      - 1087
      - 1088
      - 1089
    common_framing_mistakes:
      too_broad:
        - make SQLite production-ready in the local/dev default rollout
        - port all persistence backends in the selector child
      too_narrow:
        - flip defaultServeOptions without moving the selector/path owner
        - add --store sqlite while runtime construction still falls through or silently uses Postgres
        - treat SWARM_DB_* or PG* variables as generic backend selectors
        - document SQLite as supported before runtime store/session/delivery/trace proof exists
    current_action_pressure: active
  - id: transport_policy_and_surface_parity
    title: Transport Policy And Surface Parity
    parent_class: runtime execution-boundary policy drift
    canonical_owners:
      - canonical tool transport and validation ownership across prompt, verify, and runtime surfaces
    why_this_node_exists: transport-visible behavior drifts when prompt, managed startup, and live transport paths enforce different policies
    known_manifestations:
      - context-token policy differs across transport surfaces
      - startup validation does not prove the real filtered transport path
      - agent-visible tool availability differs between prompt and transport
      - supported agent turns can persist a canonical visible tool surface that is broader than the provider-callable surface actually available on that turn
      - fallback relay on a supported turn can degrade file-backed work by clamping large relayed tool results to preview-only text
      - supported no-read_file turns can emit runtime_read_file follow-up artifacts for oversized tool results even though the same turn surface cannot call read_file
      - legacy universal entity tools can remain normal-agent provider-visible/callable beside generated role-scoped typed tools
      - generated role-scoped current-entity tools can remain provider-visible/callable on turns whose current entity cannot resolve to the actor's flow-owned entity contract
      - oversized file-backed tool results on supported Claude helper turns can leak provider scratch paths back into later runtime read_file calls
      - CLI native tools can still use mixed provider-plus-platform fallback semantics, so visible turn surface does not equal callable provider-native truth for bash, web_search, and file_io
      - startup validation can compare provider-native init output against the full runtime MCP/local fallback surface and can select ordinary semantic tools as startup probes because their schemas accept empty objects
      - generated role-scoped typed reads can be silently downgraded by generic transport projection into preview/truncated shapes instead of complete typed values or explicit typed-read errors
      - generated typed tool and emit schemas can drift between provider-visible delivery, runtime validation, and bootverify, allowing undeclared payload keys or missing required/enum constraints to survive one surface
      - canonical platform specs and generated docs can lag runtime Path alpha tool delivery, re-authorizing legacy universal entity-tool semantics after normal agents have moved to generated role-scoped tools
    representative_issues:
      - 111
      - 136
      - 137
      - 368
      - 406
      - 381
      - 444
      - 544
      - 556
      - 568
      - 571
      - 579
      - 580
      - 582
      - 612
    common_framing_mistakes:
      too_broad:
        - tool transport is inconsistent
      too_narrow:
        - one endpoint or one token limit is wrong
    current_action_pressure: active
  - id: delivery_and_replay_ownership
    title: Delivery And Replay Ownership
    parent_class: runtime delivery lifecycle and recovery semantics
    canonical_owners:
      - delivery planner / recipient ownership / replay claim ownership in the touched seam
    why_this_node_exists: runtime delivery drifts when publish, recovery, retry, and replay ownership are split across local paths
    known_manifestations:
      - direct-recipient delivery as a shadow semantic path
      - retry counters and delivery-state updates not atomic
      - replayed deliveries and restored timers without explicit shared-store ownership
      - markerless replay-eligible events can repeatedly fail committed replay-scope lookup on the supported outbox sweeper path
      - timestamp forks need fork-local delivery/event replay lineage and committed replay-scope proof rather than direct source delivery redelivery or markerless same-run outbox replay
      - timestamp-fork non-agent delivery facts are not safe to replay through the agent delivery primitive; node/system delivery execution requires a separate handler/idempotency/receipt owner
      - selected-contract fork execution must classify delivery-write boundaries before future mutation; source deliveries remain lineage/blocker evidence, not executable fork work
      - selected-contract fork execution must write fresh fork-local event/delivery/outcome rows through the runtime selected-contract execution owner, with source rows used only as lineage evidence
      - selected-contract delivery writes from recipient planning are execution-proven through runtime.run_fork.selected_contract_execution and EventBus.Publish recipient-plan guards; a delivery-row-only writer would be a non-authoritative duplicate
      - historical replay execution admission must classify event deliveries, receipts, dead letters, retry/idempotency state, emitted follow-ups, and non-agent work before any future replay mutation; source delivery/outcome rows must remain lineage, blockers, or split siblings
      - historical replay delivery/event replay mutation must be owned by runtime.run_fork.historical_replay_execution consuming event_deliveries executable-fork-work admission before the store delivery replay primitive writes fork-local rows
      - historical replay delivery/event replay restart and sweeper recovery must consume #633 fork-local event, delivery, and committed replay-scope rows through the persisted replay owner; source deliveries, current subscriptions, source receipts, and source dead letters are not recovery truth or suppressors
      - contract-swap historical replay execution must consume runtime.run_fork.historical_replay_execution plus selected recipient planning before EventBus.Publish writes selected fork deliveries; source delivery subscribers remain lineage only and store.run_fork.delivery_event_replay is not sufficient for selected recipient truth
      - selected-contract diagnostic/non-routed platform event outcome facts such as platform.runtime_log and platform.inbound_recorded are lineage/no-action evidence under frontier admission; they are not routed, copied, replayed, or used as selected-fork suppressors, while non-diagnostic platform/node/system outcomes remain split or fail-closed
      - selected-contract authoritative agent delivery materialization is owned by runtime.run_fork.selected_contract_execution.authoritative_agent_delivery_materialization before any selected fork delivery write; it consumes runtime.run_fork.selected_contract_recipient_planning, treats planned selected agent recipients as authoritative, and fails closed before fork mutation when no selected-fork handler materializer exists, while source event_deliveries, source subscriptions, active EventBus channels, active descriptors, and CLI/API/dashboard state remain invalid delivery truth
      - selected-contract fork-local agent runtime materializer/executor is owned by runtime.run_fork.selected_contract_execution.fork_local_agent_runtime_materializer_executor; it consumes recipient planning, factors static contract-agent materialization/config semantics, registers only ephemeral fork-local EventBus handlers/descriptors, and allows fresh fork-local agent receipts/follow-ups only from actual selected-fork execution under the fork run_id
      - selected-contract fork-local runtime container is owned by runtime.run_fork.selected_contract_execution.fork_local_runtime_container; it consumes selected recipient planning, authoritative agent delivery materialization, fork-local agent runtime materializer/executor proof, selected route recovery, EventBus recipient guards/descriptors, runtime/platform lineage policy, typed runtime lineage, activation lineage inputs, cleanup, and quiescence for the live selected-fork execution path, while keeping source rows/outcomes, live subscriptions, normal AgentManager current state, readiness/operator output, restart recovery, current-state snapshots, sessions/turns/audits, non-agent replay, retry/idempotency/follow-up policy, and operator consumers split or invalid
      - selected-contract fork-local typed runtime lineage is owned by runtime.run_fork.selected_contract_execution.fork_local_runtime_typed_lineage; selected-fork EventBus, AgentManager, RuntimeLogger, LLM/runtime diagnostic producers, selected-execution tool-executor diagnostics, and MCP turn-context bridges carry fork run ID, subject event ID/type, causal parent event ID, row category, selected-fork owner context, and source/fork/operator classification before persisting canonical ParentEventID/source_event_id truth, while action/reason strings, produced_by_type alone, descriptors, source platform facts, operator state, restart recovery, current-state snapshots, sessions/turns/audits, non-agent replay, and retry/follow-up policy remain invalid or split
      - selected-contract fork-local runtime/platform control event lineage is owned by runtime.run_fork.selected_contract_execution.fork_local_runtime_platform_event_lineage_policy; fresh fork-run platform/control outputs and platform.runtime_log diagnostics from the selected-fork runtime container are admissible only when causally parented to selected execution under the fork run_id, with runtime-log lineage persisted through source_event_id from an explicit parent_event_id or verified same-run subject event rather than action/reason strings, while unrelated fork platform events, source platform facts, produced_by_type alone, and operator surfaces remain invalid selected-fork truth
      - event_receipts typed subscriber identity is owned by the platform DDL and store migration/capability boundary; platform, node, and agent receipt writers must conflict on event_id, subscriber_type, and subscriber_id together rather than preserving local subscriber-id namespacing
