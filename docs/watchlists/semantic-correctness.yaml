version: 1
kind: watchlist
id: semantic_correctness
title: Semantic Correctness Watchlist
canonical_home_for: spec alignment, persistence/recovery truth, lifecycle proof, conformance, and fail-closed boundary semantics
role:
  mode: failure_class_map
  guidance:
    - treat this watchlist as a semantic trie rather than a flat backlog
    - start from the broadest relevant class, then walk down to the lowest coherent node with one canonical owner
    - enumerate known manifestations under that node as explicitly as possible
    - map issues and PRs to a node during intake and pre-audit
    - refine the node when review reveals a broader class, a missed sibling manifestation, or a better canonical owner understanding
update_rules:
  applies_to:
    - failure_class
    - parity
    - semantic_drift
  review_closeout_decisions:
    - no_watchlist_change_needed
    - existing_node_refined
    - new_manifestation_added_to_existing_node
    - new_branch_or_node_created
  node_focus_requirements:
    - one coherent failure class or sub-class
    - one main canonical owner or tightly-coupled owner set
    - the currently known manifestations under that node
node_template:
  required_fields:
    - id
    - title
    - parent_class
    - canonical_owners
    - why_this_node_exists
    - known_manifestations
    - representative_issues
    - common_framing_mistakes
    - current_action_pressure
active_issues:
  - id: 113
    title: Align event-loop validation, delivery receipts, and recovery with the authoritative spec
  - id: 114
    title: Reconcile boot and loader contract vocabulary with the authoritative platform spec
  - id: 115
    title: Preserve full persisted correlation envelope during pipeline recovery replay
  - id: 118
    title: Add a reusable cross-boundary delivery lifecycle conformance suite
  - id: 119
    title: Persist canonical terminal lifecycle for template flow instances
  - id: 120
    title: Persist canonical run completion instead of inferring it from quiescence
  - id: 132
    title: Make CEL validation lifecycle-aware for entity-field availability
    maps_to:
      - lifecycle_aware_entity_field_availability_validation
  - id: 133
    title: Introduce a typed canonical carrier for entity-state semantics across execution seams
  - id: 149
    title: Make handler execution order match the spec for branch selection and top-level data_accumulation
  - id: 150
    title: Make task conversation persistence rollout-safe across legacy and canonical storage
  - id: 151
    title: Remove preview-backed non-success assertions from conformance cases that claim runtime/store semantics
  - id: 152
    title: Fail closed on non-UUID entity_id at the store event boundary
  - id: 253
    title: Preserve flow-owned session_scope proof across verify/boot and runtime startup for package-backed flows
    maps_to:
      - boot_verification_false_negative_validation
      - loader_tree_identity_loss_before_boot_validation
      - flow_owned_session_scope_proof_across_supported_consumers
  - id: 255
    title: Allow self-target entity updates in expression field reference validation
    maps_to:
      - boot_verification_false_negative_validation
      - lifecycle_aware_entity_field_availability_validation
  - id: 270
    title: Align targeted verify and runtime boot on event-schema and tool-registry validation
    maps_to:
      - verify_vs_boot_contract_acceptance_drift
  - id: 402
    title: Align entity-tool schema normalization with authored entity schema annotations
    maps_to:
      - entity_tool_schema_annotation_normalization_drift
  - id: 416
    title: Migrate Empire contracts off cross-flow coupling primitives
    maps_to:
      - primitive_only_cross_flow_authored_contract_migration
  - id: 455
    title: Make event schema the strict cross-flow contract with structured emit grammar
    maps_to:
      - strict_event_schema_cross_flow_contract_migration
  - id: 457
    title: Introduce structured emit grammar and emit-site resolution for event payload authorship
    maps_to:
      - strict_event_schema_cross_flow_contract_migration
  - id: 459
    title: Remove implicit passthrough from declarative system-node emits and fail closed on undeclared payloads
    maps_to:
      - strict_event_schema_cross_flow_contract_migration
  - id: 461
    title: Harden verify/boot proof for the strict declarative emit payload contract
    maps_to:
      - strict_event_schema_cross_flow_contract_migration
  - id: 464
    title: Enforce strict event-schema parity for agent emits
    maps_to:
      - strict_event_schema_cross_flow_contract_migration
  - id: 466
    title: Enforce strict event-schema parity for action-originated emits
    maps_to:
      - strict_event_schema_cross_flow_contract_migration
  - id: 468
    title: Enforce strict event-schema parity for auto_emit_on_create
    maps_to:
      - strict_event_schema_cross_flow_contract_migration
  - id: 470
    title: Retire legacy payload_transform compatibility and stale emit-contract reference surfaces
    maps_to:
      - strict_event_schema_cross_flow_contract_migration
  - id: 181
    title: Expose accumulator completion and on_complete transaction outcomes together
    maps_to:
      - accumulator_completion_and_atomic_outcome_visibility
  - id: 393
    title: Enforce create_entity + accumulate prohibition at canonical boot validation
    maps_to:
      - startup_validation_missing_prohibited_handler_enforcement
  - id: 415
    title: Align runtime enforcement with primitive-only cross-flow model
    maps_to:
      - primitive_only_cross_flow_runtime_migration
nodes:
  - id: boot_verification_false_negative_validation
    title: Boot/Verification False-Negative Validation
    parent_class: semantic correctness drift between authored contracts and startup validation
    canonical_owners:
      - internal/runtime/bootverify
    why_this_node_exists: spec-valid contracts can still be rejected because boot verification interprets the semantic rule too narrowly
    known_manifestations:
      - package-backed flow ownership not preserved deeply enough for flow-scoped session_scope validation
      - self-target entity updates rejected even though the authored pattern is semantically valid
      - adjacent authored patterns rejected because validation encodes a narrower lifecycle or ownership model than the spec
    representative_issues:
      - 253
      - 255
    common_framing_mistakes:
      too_broad:
        - all bootverify drift
      too_narrow:
        - one validator helper
        - one rejected contract example
    current_action_pressure: active
  - id: loader_tree_identity_loss_before_boot_validation
    title: Loader/Tree Identity Loss Before Boot Validation
    parent_class: semantic identity drift across loader, semantic-view, and boot boundaries
    canonical_owners:
      - contract tree and semantic view flow ownership into boot verification
    why_this_node_exists: boot validation can only enforce the correct rule if upstream loader/tree seams preserve the canonical identity proof it depends on
    known_manifestations:
      - package-backed flow identity not carried through deeply enough for later scope validation
      - adjacent package/tree ownership seams preserve enough shape for local parsing but still lose the owner proof boot needs
    representative_issues:
      - 253
    common_framing_mistakes:
      too_broad:
        - loader is wrong
      too_narrow:
        - one session_scope rejection site
    current_action_pressure: active
  - id: flow_owned_session_scope_proof_across_supported_consumers
    title: Flow-Owned Session-Scope Proof Across Supported Consumers
    parent_class: supported-surface proof drift for flow-scoped session semantics
    canonical_owners:
      - flow ownership proof carried from contract tree and semantic view into both boot verification and runtime startup
    why_this_node_exists: flow-scoped session validity drifts when supported consumers prove owning flow identity through different carriers or only one surface is fixed
    known_manifestations:
      - package-backed flow ownership preserved enough for one surface but not another
      - boot verification and runtime startup/static bootstrap consume flow-scoped session proof differently
      - session-scope validity depends on scope path strings or local projection details instead of one shared owner proof
    representative_issues:
      - 253
    common_framing_mistakes:
      too_broad:
        - session scope is inconsistent
      too_narrow:
        - one bootverify rejection
        - one loader/tree field is blank
    current_action_pressure: active
  - id: lifecycle_aware_entity_field_availability_validation
    title: Lifecycle-Aware Entity-Field Availability Validation
    parent_class: lifecycle proof drift across handler planning, validation, and execution
    canonical_owners:
      - handler lifecycle and entity-field availability validation
    why_this_node_exists: field-availability validation can reject authored patterns that are valid once lifecycle ordering and ownership are interpreted correctly
    known_manifestations:
      - self-target entity updates rejected even though they are valid
      - rule drift between top-level and nested lifecycle writers/readers
      - adjacent CEL/data-availability checks classify the same field proof differently across seams
    representative_issues:
      - 132
      - 255
    common_framing_mistakes:
      too_broad:
        - CEL validation is wrong
      too_narrow:
        - one field writer/reader pair in one helper
    current_action_pressure: active
  - id: verify_vs_boot_contract_acceptance_drift
    title: Verify-vs-Boot Contract Acceptance Drift
    parent_class: supported-surface parity drift
    canonical_owners:
      - shared contract validation ownership across cmd/swarm verify and runtime boot
    why_this_node_exists: verification cannot be trusted if supported surfaces disagree on the same semantic class
    known_manifestations:
      - event-schema validation drift between targeted verify and runtime boot
      - tool-registry validation drift between targeted verify and runtime boot
      - future supported-surface agreement gaps in shared contract validation ownership
    representative_issues:
      - 270
    common_framing_mistakes:
      too_broad:
        - verification is inconsistent
      too_narrow:
        - one failing CLI command
        - one boot error message
    current_action_pressure: active
  - id: accumulator_completion_and_atomic_outcome_visibility
    title: Accumulator Completion And Atomic Outcome Visibility
    parent_class: entity-state completion truth and transactional outcome proof
    canonical_owners:
      - canonical accumulator completion and on_complete transaction outcome owner in the touched execution and diagnostics seam
    why_this_node_exists: accumulator completion drifts opaque when evaluation outcome, commit outcome, and final entity-state transition truth are not exposed together
    known_manifestations:
      - final-item accumulation appears to disappear when on_complete evaluation or commit fails late
      - accumulator completion and transaction outcome are not visible together in one touched proof surface
      - atomic completion invariants are not proven directly at the final-item seam
    representative_issues:
      - 181
    common_framing_mistakes:
      too_broad:
        - workflow diagnostics are unclear
      too_narrow:
        - one final-item bug
        - one missing log line
    current_action_pressure: active
  - id: startup_validation_missing_prohibited_handler_enforcement
    title: Startup Validation Missing Prohibited-Handler Enforcement
    parent_class: semantic correctness drift between authored contracts and startup validation
    canonical_owners:
      - internal/runtime/bootverify
      - internal/runtime/workflow_validation.go
    why_this_node_exists: authored contracts that the authoritative spec prohibits can still be admitted at boot because startup validation does not encode the prohibition at the canonical owner boundary
    known_manifestations:
      - create_entity plus accumulate on the same handler is accepted at startup even though the spec says it must be a boot error
      - adjacent spec-prohibited handler combinations could drift into runtime-only rejection if boot validation does not own them explicitly
    representative_issues:
      - 393
    common_framing_mistakes:
      too_broad:
        - bootverify is incomplete
      too_narrow:
        - one stale tier8 fixture
        - one missing if statement in a helper
  - id: primitive_only_cross_flow_runtime_migration
    title: Primitive-Only Cross-Flow Runtime Migration
    parent_class: staged migration from coupled cross-flow runtime semantics to primitive-only event/config handoff semantics
    canonical_owners:
      - emitted-event identity shaping in internal/runtime/pipeline without parent-retarget ownership
      - cross-flow entity access enforcement in internal/runtime/tools and pipeline state mutation
      - create_flow_instance boot/runtime sibling-field enforcement in internal/runtime/bootverify and internal/runtime/pipeline
      - runtime subject-link deprecation ownership across internal/runtime/pipeline, internal/runtime/manager, internal/runtime/tools, and supported proof surfaces
      - run/event causal lineage via events.source_event_id for debugging proof after deprecated subject-link removal
      - canonical platform contract truth in docs/specs/swarm-platform/platform/contracts/platform-spec.yaml
    why_this_node_exists: the runtime is migrating away from the older coupled cross-flow model through staged owner removal and cleanup; subject-link writer/proof ownership moved in #534/#535, #417 closed the schema/tool/operator aftermath, and #414 owns canonical spec adoption for implementation-true behavior.
    known_manifestations:
      - cross-flow get_entity reads remain runtime-authorized
      - cross-flow writes are already fail-closed and must stay so during migration
      - parent-retarget and back-propagation coupling are no longer canonical platform semantics and stale spec/docs references must not reintroduce them as current behavior
      - subject-link writer/proof propagation was removed by #534/#535; #417 removed schema/tool/operator/read aftermath instead of refining local inheritance rules
      - canonical platform specs must describe explicit authored payload/config business correlation plus source_event_id causal proof, not a replacement platform lineage primitive
      - first child-flow subject-lineage ambiguity from #446 is superseded by removing subject-link as a runtime lineage primitive rather than repairing local inheritance
      - subject-based lifecycle proof surfaces must migrate either to explicit authored business correlation fields carried through event payload/config or to source_event_id causal-chain proof
    representative_issues:
      - 413
      - 414
      - 415
      - 426
      - 416
      - 417
      - 446
      - 534
      - 535
    common_framing_mistakes:
      too_broad:
        - remove all cross-flow complexity at once
        - the spec draft is already the implementation boundary
      too_narrow:
        - one validation retarget bug
        - one tool denial or one missing config_from check
        - one missing create_flow_instance sibling field when the full current-spec required-sibling class is still under-enforced
        - repairing first-child subject-link inheritance after the primitive has been deprecated
    current_action_pressure: active
  - id: entity_tool_schema_annotation_normalization_drift
    title: Entity-Tool Schema Annotation Normalization Drift
    parent_class: runtime entity-tool semantics drift from authored entity_schema type annotations
    canonical_owners:
      - shared entity-tool schema type normalization in internal/runtime/tools/entity_schema.go
    why_this_node_exists: entity_schema annotations are authored as human-readable notes, but runtime entity-tool validation can still interpret annotated type strings literally or inconsistently across tool surfaces
    known_manifestations:
      - save_entity_field rejects schema-declared annotated jsonb fields on supported runtime paths
      - create_entity initial field writes and search_entities field filters would reject the same annotated entity types through the shared normalizer
      - adjacent entity-tool surfaces either bypass shared type normalization entirely or carry stale local interpreters of schema type handling
    representative_issues:
      - 402
      - 525
    common_framing_mistakes:
      too_broad:
        - entity tools are broken
        - all schema handling is inconsistent
      too_narrow:
        - one save_entity_field error string
        - one validation-agent transcript line
    current_action_pressure: active
  - id: entity_tool_bracket_list_type_ref_normalization_drift
    title: Entity-Tool Bracket-List Type-Ref Normalization Drift
    parent_class: runtime entity-tool semantics drift from authored entity_schema type annotations
    canonical_owners:
      - shared entity contract value normalization in internal/runtime/entityruntime/contracts.go
      - entity-tool adapter normalization in internal/runtime/tools/entity_schema.go
      - entity-tool result materialization in internal/runtime/tools/executor_entity.go
    why_this_node_exists: authored Wave 1 entity contracts use bracket-form list refs such as [text] and [NamedType], but entityruntime previously recognized only list<T>, T[], and []T, so generic entity tools could reject valid declared fields on supported paths.
    known_manifestations:
      - get_entity result materialization rejects named objects containing bracket-list fields
      - search_entities, query_entities, and query_metrics result materialization reject the same fields before filtering, projection, or aggregation
      - save_entity_field and create_entity can reject valid values for fields whose declared type or nested named-type leaf uses bracket-list refs
    representative_issues:
      - 525
    common_framing_mistakes:
      too_broad:
        - rewrite the entire contract type system
        - merge event schema lowering and entityruntime in the same PR
      too_narrow:
        - one get_entity transcript error
        - one query_entities materialization failure
        - read-only materialization when write and create consume the same owner
    current_action_pressure: active
  - id: primitive_only_cross_flow_authored_contract_migration
    title: Primitive-Only Cross-Flow Authored Contract Migration
    parent_class: authored contract migration away from legacy cross-flow coupling semantics
    canonical_owners:
      - authoritative create_flow_instance authored shape in docs/specs/swarm-platform/platform/contracts/platform-spec.yaml
      - repo-authored contract fixtures and examples that must encode cross-flow handoff through canonical action sibling fields and payload/config carriers
    why_this_node_exists: runtime fail-closed migration is not durable if repo-authored contracts and fixtures still depend on legacy create_flow_instance shapes or other cross-flow coupling assumptions that the migration is removing.
    known_manifestations:
      - repo-authored fixtures still use legacy create_flow_instance action mappings with action.type, flow_template, and instance_id
      - at least one repo-authored fixture still uses templated config_from values instead of canonical payload-path bindings
      - broader authored migration pressure still exists for subject-link, back-propagation, and other cross-flow coupling assumptions, but those are a separate authored class unless local evidence proves they belong to the same narrow migration slice
    representative_issues:
      - 416
      - 431
    common_framing_mistakes:
      too_broad:
        - migrate every cross-flow authored assumption in one PR
        - rewrite Empire contracts and local fixtures as one undifferentiated lane
      too_narrow:
        - update one stale tier5 fixture
        - flatten action fields without checking config_from binding form or sibling authored uses
    current_action_pressure: active
  - id: strict_event_schema_cross_flow_contract_migration
    title: Strict Event-Schema Cross-Flow Contract Migration
    parent_class: staged migration from implicit cross-flow payload inheritance to explicit emit-site event contracts
    canonical_owners:
      - authoritative event-contract rule in docs/specs/swarm-platform/platform/contracts/platform-spec.yaml and the reviewed cross-flow contract draft
      - emit grammar, loader, semantic-view, runtime selection, and boot/verify consumers that must interpret the same emit-site ownership model
    why_this_node_exists: the platform cannot make event schema the strict cross-flow contract while different emit sites still share one ambiguous handler-level payload model or while supported consumers interpret emit authorship differently.
    known_manifestations:
      - closed child seams under this node:
        - structured emit ownership across handler top level, rules, on_complete, accumulate.on_timeout, and fan_out
        - strict declarative runtime emit construction and verify/boot proof parity
        - strict agent emit parity
        - strict action-originated emit parity
        - strict auto_emit_on_create parity
      - remaining compatibility-reference tail addressed by #470:
        - dead contract/type residue for PayloadTransformSpec after retired authored surfaces stopped being accepted on supported handler/rule/fan_out paths
        - stale verify/report wording and dead-event audit text that still described payload_transform-era proof surfaces
        - supported proof-harness allowlists and active prose/reference surfaces that still described payload_transform, fan_out.emit_per_item, or implicit passthrough as current behavior
      - adjacent split retained after this node:
        - generic post-publish canonical-event validation cleanup remains outside this migration class unless later promoted
    representative_issues:
      - 455
      - 457
      - 459
      - 461
      - 464
      - 466
      - 468
      - 470
    common_framing_mistakes:
      too_broad:
        - land the entire strict event-schema migration in one PR
        - rewrite first-party bundles as the vehicle for platform grammar/runtime changes
      too_narrow:
        - patch one Empire handler
        - add one branch-local transform without changing the canonical emit model
        - treat loader, semantic view, executor, or fan_out as separate concepts when they still consume the same emit ownership rule
    current_action_pressure: active
