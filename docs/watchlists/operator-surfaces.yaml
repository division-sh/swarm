version: 1
kind: watchlist
id: operator_surfaces
title: Operator Surfaces Watchlist
canonical_home_for: dashboard, CLI, builder, API/read-models, observability, and run-scoped query ownership
role:
  mode: operator_truth_map
  guidance:
    - track operator-facing truth by canonical projection owner, not by UI endpoint alone
    - group issues by the semantic operator surface they are trying to canonicalize
active_issues:
  - id: 129
    title: Introduce one canonical operator projection for agent health and backlog
    maps_to:
      - canonical_operator_projection_truth
  - id: 130
    title: Preserve retryable-vs-terminal receipt outcome in canonical operator surfaces
    maps_to:
      - canonical_operator_projection_truth
  - id: 131
    title: Define a shared operator observability contract across CLI, dashboard, and builder
    maps_to:
      - shared_observability_contract
  - id: 134
    title: Stop dashboard conversation and turn APIs from widening typed persisted data into loose carriers
    maps_to:
      - typed_persisted_operator_reads
  - id: 138
    title: Canonicalize native capability visibility and recording in CLI execution
    maps_to:
      - shared_observability_contract
  - id: 362
    title: Expose live agent turn progress without container transcript spelunking
    maps_to:
      - typed_persisted_operator_reads
  - id: 363
    title: Make conversation audit and runtime logging reliable enough for first-line investigations
    maps_to:
      - shared_observability_contract
  - id: 364
    title: Add run-centric trace view across run, event, delivery, session, and turn
    maps_to:
      - run_scoped_operator_identity
  - id: 148
    title: Make run_id canonical across replay, diagnostics, API/dashboard scoping, and operator surfaces
    maps_to:
      - run_scoped_operator_identity
  - id: 409
    title: Persisted agent_turns can omit real tool calls visible in provider session transcripts
    maps_to:
      - shared_observability_contract
  - id: 224
    title: Remove implicit canonical schema defaults from dashboard readers and require explicit capability ownership
    maps_to:
      - typed_persisted_operator_reads
  - id: 300
    title: Add completeness invariants for canonical mutation surfaces and touched conformance/read-model seams
    maps_to:
      - typed_persisted_operator_reads
  - id: 344
    title: Add one canonical run-debug read surface for runs, events, mutations, and runtime logs
    maps_to:
      - run_scoped_operator_identity
  - id: 345
    title: Move builder run event streams onto canonical run-bound diagnostics
    maps_to:
      - run_scoped_operator_identity
nodes:
  - id: canonical_operator_projection_truth
    title: Canonical Operator Projection Truth
    parent_class: operator-facing derived truth and backlog semantics
    canonical_owners:
      - canonical operator projection/read-model owner for the touched concept
    why_this_node_exists: operator surfaces drift when status, backlog, and outcome semantics are re-derived independently per endpoint
    known_manifestations:
      - agent health and backlog derived differently across operator surfaces
      - receipt outcomes flattened so retryable and terminal states are no longer distinguishable
    representative_issues:
      - 129
      - 130
    common_framing_mistakes:
      too_broad:
        - dashboard is wrong
      too_narrow:
        - one endpoint field is missing
    current_action_pressure: active
  - id: shared_observability_contract
    title: Shared Observability Contract
    parent_class: operator-facing observability truth across surfaces
    canonical_owners:
      - shared observability contract across CLI, dashboard, and builder
    why_this_node_exists: visibility and observability semantics drift when each surface chooses its own summary model
    known_manifestations:
      - CLI, dashboard, and builder observe different canonical facts
      - native capability visibility/recording diverges from the operator contract
      - first-line investigation surfaces remain too weak, pushing operators to transcript/container spelunking
      - persisted turn tool_calls can under-report provider-observed tool activity on supported CLI turns
    representative_issues:
      - 131
      - 138
      - 363
      - 409
    common_framing_mistakes:
      too_broad:
        - observability is inconsistent
      too_narrow:
        - one screen or one CLI line is missing data
    current_action_pressure: active
  - id: typed_persisted_operator_reads
    title: Typed Persisted Operator Reads
    parent_class: read-model truth derived from persisted typed surfaces
    canonical_owners:
      - typed persisted store/runtime surfaces consumed by operator readers
    why_this_node_exists: operator APIs drift when they widen typed persisted data into loose carriers and inference-heavy summaries
    known_manifestations:
      - conversation and turn APIs widen typed persisted data
      - summary/runtime-log/mutation completeness may be inferred or silently omitted
      - first-line latest-turn progress is flattened differently across dashboard/API readers
    representative_issues:
      - 134
      - 224
      - 300
      - 362
    common_framing_mistakes:
      too_broad:
        - API contracts are messy
      too_narrow:
        - one response field type is loose
    current_action_pressure: active
  - id: run_scoped_operator_identity
    title: Run-Scoped Operator Identity
    parent_class: operator-facing identity and scoping truth
    canonical_owners:
      - canonical run_id ownership across replay, diagnostics, and operator projections
    why_this_node_exists: operator scoping drifts when run identity is preserved in some surfaces and inferred or omitted in others
    known_manifestations:
      - run_id drift across replay and diagnostics
      - API/dashboard query ownership not aligned on the same run-scoped identity
      - builder live run/debug streams reconstruct operator-visible run truth from in-memory state and fresh timestamps instead of consuming canonical run-bound diagnostics
      - investigators must manually correlate run, event, delivery, session, and turn identity across multiple readers because no canonical joined run-trace surface exists
    representative_issues:
      - 148
      - 344
      - 345
      - 364
    common_framing_mistakes:
      too_broad:
        - run scoping is inconsistent
      too_narrow:
        - one dashboard filter or query is wrong
    current_action_pressure: active
  - id: v1_openrpc_api_conformance
    title: V1 OpenRPC API Conformance
    parent_class: operator-facing API/spec/runtime parity and conformance proof drift
    canonical_owners:
      - docs/specs/swarm-platform/platform/contracts/platform-spec.yaml api_specification
      - docs/specs/swarm-platform/platform/contracts/openrpc.json
      - internal/apispec
      - internal/apiv1
      - .github/workflows/ci.yml
    why_this_node_exists: v1 API compliance drifts when method coverage, OpenRPC generation, CI checks, and runtime proof accounting are inferred from scattered tests instead of a method-keyed canonical matrix
    known_manifestations:
      - no checked-in 42-method matrix keyed by generated OpenRPC method name
      - required params, unknown params, auth, declared errors, idempotency, result schema, and notification schema proof status can drift silently
      - stale or free-form proof references in the checked-in compliance matrix can drift silently from their test/helper/artifact/tracker owners
      - generated supported-surface runtime probes can be absent for read-only HTTP methods even when proof-accounting rows resolve
      - generated supported-surface runtime probes can be absent for mutating HTTP methods, leaving side-effect and idempotency behavior inferred from scattered handler-family tests
      - central method transport admission can be absent, letting WS/protocol methods execute over /v1/rpc or HTTP-class methods execute over /v1/ws despite matrix transport classification
      - generated full successful-result schema validation can be absent even when runtime probes only key-smoke result payloads
      - generated notification-schema publication and runtime validation can be absent for subscription notifications even when WS probes only smoke-test envelopes
      - OpenRPC method examples can lack a merge-bearing authoring or deferral policy across the generated method catalog
      - rpc.discover/service-discovery non-publication is owned by api_specification.service_discovery_policy and enforced by internal/apispec plus the compliance matrix
      - CI can pass without a direct swarm-openrpc-gen --check step
    representative_issues:
      - 835
      - 847
      - 857
      - 861
      - 872
      - 878
      - 890
      - 898
      - 904
      - 915
    common_framing_mistakes:
      too_broad:
        - full v1 runtime conformance can be closed by one matrix PR
        - rpc.discover should be added without a promoted platform-spec requirement
      too_narrow:
        - one handler test is enough API compliance accounting
        - generated OpenRPC drift is only an internal/apispec concern
    current_action_pressure: active
