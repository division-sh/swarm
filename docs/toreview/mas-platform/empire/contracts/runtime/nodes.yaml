# AUTO-GENERATED — DO NOT EDIT DIRECTLY
portfolio-node:
  id: portfolio-node
  execution_type: system_node
  description: Cross-flow monitoring. Compiles status, handles runtime reset.
  subscribes_to:
  - timer.portfolio_digest
  - runtime.reset
  - budget.threshold_crossed
  - system.directive
  - opco.spinup_requested
  produces:
  - portfolio.digest_compiled
  - scan.requested
  - budget.adjustment_requested
  - policy.change_requested
  - vertical.resumed
  - directive.unhandled
  event_handlers:
    timer.portfolio_digest:
      description: Query all entities, compile status summary, emit digest
      query:
      - entities: verticals
        group_by: state
        count: true
        store_as: digest.verticals_by_state
      - entities: flow_instances
        filter: template == operating
        group_by: state
        count: true
        store_as: digest.opcos_by_state
      emits: portfolio.digest_compiled
    runtime.reset:
      description: Clear all in-flight pipeline state
      clear:
        targets:
        - accumulator_state
        - cycle_counters
        - pending_dedup_candidates
    budget.threshold_crossed:
      action: handle_budget_alert
      description: Budget threshold hit. Notify EC, potentially throttle operations.
    system.directive:
      action: route_directive
      description: Route human directive to appropriate follow-up event based on directive type.
      rules:
        scan:
          condition: directive.type == scan
          emits: scan.requested
          description: Translate scan directive into scan campaign
        budget_adjust:
          condition: directive.type == budget_adjust
          emits: budget.adjustment_requested
          description: Route budget adjustment to spend handler
        policy_change:
          condition: directive.type == policy_change
          emits: policy.change_requested
          description: Route policy change to EC for evaluation
        vertical_override:
          condition: directive.type == vertical_override
          emits: vertical.resumed
          description: Force resume/kill/promote a specific vertical
        unknown:
          condition: else
          emits: directive.unhandled
          description: Forward unrecognized directives to workflow coordinator agent
    opco.spinup_requested:
      description: Create new OpCo flow instance with mandate data from approval payload.
      action: create_flow_instance
      template: operating
      instance_id_from: payload.vertical_id
      config_from:
        vertical_name: payload.vertical_name
        mandate_document: payload.mandate
        brand_name: payload.brand
        geography: payload.geography
        tech_stack: payload.tech_stack
  permissions:
  - create_flow_instance
  _produces_note: Some produces are emitted via system.directive rules handler (indirect path).
scan-orchestrator:
  id: scan-orchestrator
  execution_type: system_node
  description: 'Manages scan campaigns: dispatches scan.requested to scanner agents, tracks scan completion, handles scan
    timeouts. Pre-workflow — produces events that feed into discovery aggregation.'
  subscribes_to:
  - market_research.scan_complete
  - scan.source_dispatch
  - scan.requested
  - scanner.reviews.scan_complete
  - scanner.yelp.scan_complete
  - trend_research.scan_complete
  - scan.category_dispatch
  - scan.trend_dispatch
  - scanner.google_maps.scan_complete
  - scanner.directories.scan_complete
  - timer.campaign_deadline
  - scanner.instagram.scan_complete
  - timer.scan_timeout
  - '*.scan_complete'
  produces:
  - scan.completed
  - pipeline.dead_letter
  - campaign.completed
  timers:
  - scan_timeout
  - campaign_deadline
  state_table: scan_accumulators
  event_handlers:
    scan.requested:
      description: Route by mode, fan out to agents per subcategory
      rules:
        saas_gap:
          condition: payload.mode == saas_gap
          emits:
          - scan.category_dispatch
          - scan.source_dispatch
        saas_trend:
          condition: payload.mode == saas_trend
          emits: scan.trend_dispatch
        local_services:
          condition: payload.mode == local_services
          emits:
          - scan.source_dispatch
          - scan.category_dispatch
        corpus:
          condition: payload.mode == corpus
          emits: scan.category_dispatch
    '*.scan_complete':
      action: accumulate_scan
      description: Track scanner completion. When all scanners report or timeout, emit scan.completed
      emits: scan.completed
    timer.scan_timeout:
      action: force_scan_complete
      description: 'Timeout: emit scan.completed with partial results'
      emits: scan.completed
    timer.campaign_deadline:
      action: force_campaign_complete
      description: Global 24h safety net. Force-complete the campaign.
      emits: campaign.completed
    scan.category_dispatch:
      description: Fan out subcategories to market research agents
      fan_out:
        items_from: payload.subcategories
        target: discovery/market-research-agent
        emit_per_item: market_research.scan_assigned
      data_accumulation:
        writes:
        - scan_expected_count
        source_event: fan_out.count
    scan.trend_dispatch:
      description: Fan out trend topics to trend research agents
      fan_out:
        items_from: payload.trend_topics
        target: discovery/trend-research-agent
        emit_per_item: trend_research.scan_assigned
      data_accumulation:
        writes:
        - scan_expected_count
        source_event: fan_out.count
    scan.source_dispatch:
      description: Fan out data sources to scanner agents
      fan_out:
        items_from: payload.sources
        target: discovery/scanner-agent
        emit_per_item: scanner.scan_assigned
      data_accumulation:
        writes:
        - scan_expected_count
        source_event: fan_out.count
  state_schema:
    description: Tracks active scans and accumulates scanner completions
    fields:
      scan_id: uuid (primary key)
      campaign_id: uuid
      geography: text
      mode: text
      expected_scanners: text[] (scanner types dispatched)
      completed_scanners: text[] (scanner types reported)
      started_at: timestamptz
      completed_at: timestamptz (null until done)
      status: text (active | completed | timeout)
discovery-aggregator:
  id: discovery-aggregator
  execution_type: system_node
  description: Accumulates category.assessed, trend.identified, source.scraped signals. Runs dedup/synthesis. Produces vertical.discovered
    when threshold met. Pre-workflow — feeds into scoring-node.
  subscribes_to:
  - category.assessed
  - trend.identified
  - source.scraped
  - dedup.resolved
  - synthesis.resolved
  produces:
  - vertical.discovered
  - synthesis.needed
  - pipeline.dead_letter
  - dedup.ambiguous
  timers: []
  state_table: pending_dedup_candidates
  event_handlers:
    category.assessed:
      action: accumulate_signal
      description: Accumulate discovery signal into scan batch.
    trend.identified:
      action: accumulate_signal
      description: Accumulate discovery signal into scan batch.
    source.scraped:
      action: accumulate_signal
      description: Accumulate discovery signal into scan batch.
    dedup.resolved:
      description: Apply merge strategy decided by discovery-coordinator agent
      rules:
        keep_first:
          condition: payload.strategy == keep_first
          data_accumulation:
            writes:
            - merged_signal
            source: payload.signal_a
        keep_best:
          condition: payload.strategy == keep_best
          data_accumulation:
            writes:
            - merged_signal
            source: payload.best_signal
        merge_fields:
          condition: payload.strategy == merge_fields
          data_accumulation:
            writes:
            - merged_signal
            source: payload.merged
    synthesis.resolved:
      description: Apply resolution decided by discovery-coordinator agent
      rules:
        accept_a:
          condition: payload.resolution == accept_a
          data_accumulation:
            writes:
            - resolved_signal
            source: payload.signal_a
        accept_b:
          condition: payload.resolution == accept_b
          data_accumulation:
            writes:
            - resolved_signal
            source: payload.signal_b
        synthesize:
          condition: payload.resolution == synthesize
          data_accumulation:
            writes:
            - resolved_signal
            source: payload.synthesized
  state_schema:
    description: Holds signals pending dedup resolution
    fields:
      id: uuid
      opportunity_name: text
      signal_strength: integer
      evidence: jsonb
      status: text (pending | resolved | discarded)
      matched_vertical_id: uuid (null if no match)
      created_at: timestamptz
scoring-node:
  id: scoring-node
  execution_type: system_node
  description: Multi-dimension scoring with weighted composite. Handles accumulation, classification, derivation, and contest
    resolution.
  subscribes_to:
  - vertical.discovered
  - vertical.derived
  - score.dimension_complete
  - scoring.contest_resolved
  produces:
  - scoring.requested
  - vertical.discovered
  - vertical.shortlisted
  - vertical.marginal
  - vertical.rejected
  - scoring.contested
  - pipeline.dead_letter
  event_handlers:
    vertical.discovered:
      description: Select rubric by mode, write entity fields, emit scoring.requested
      data_accumulation:
        writes:
        - source_field: vertical_name
          target_field: name
        - geography
        - raw_signals
        - signal_strength
        - source_field: mode
          target_field: discovery_mode
        - opportunity_pattern
        source_event: vertical.discovered
      rules:
        saas_gap:
          condition: payload.discovery_mode == saas_gap
          data_accumulation:
            writes:
            - scoring_rubric
            value: saas_gap_rubric
        saas_trend:
          condition: payload.discovery_mode == saas_trend
          data_accumulation:
            writes:
            - scoring_rubric
            value: saas_trend_rubric
        local_services:
          condition: payload.discovery_mode == local_services
          data_accumulation:
            writes:
            - scoring_rubric
            value: local_services_rubric
        corpus:
          condition: payload.discovery_mode == corpus
          data_accumulation:
            writes:
            - scoring_rubric
            value: corpus_rubric
      emits: scoring.requested
      _note: Rubric is mode-specific. Each discovery_mode maps to its own rubric via rules.
    vertical.derived:
      description: Run 8 pre-filter checks. All must pass. If passes, emit vertical.discovered for child scoring.
      guard:
        checks:
        - id: depth_cap
          check: entity.generation_depth <= policy.max_derivation_depth
        - id: child_count
          check: entity.child_count < 2
        - id: signal_strength
          check: payload.signal_strength >= policy.min_derivation_signal
        - id: no_red_flags
          check: entity.red_flag_count == 0
        - id: icp_positive
          check: entity.scores.icp_crispness >= policy.min_icp_score
        - id: evidence_completeness
          check: entity.evidence_count >= policy.min_evidence_for_derivation
        - id: retention_primitive
          check: entity.scores.retention_architecture >= policy.min_retention_score
        - id: name_dedup
          check: query_entities(name == payload.derived_name).count == 0
        on_fail: discard
      emits: vertical.discovered
    score.dimension_complete:
      action: accumulate_dimension
      description: Add dimension score to accumulator.
      on_complete:
        composite_above_shortlist:
          condition: composite_score >= {{composite_shortlist}} AND build_complexity >= {{hard_gate_floor}} AND automation_completeness
            >= {{hard_gate_floor}}
          emits: vertical.shortlisted
          advances_to: shortlisted
        composite_marginal_eligible:
          condition: composite_score >= {{hard_gate_floor}} AND composite_score < {{composite_shortlist}} AND count(tier1_dims
            >= 70) >= 2
          emits: vertical.marginal
          advances_to: marginal_review
        composite_below_marginal:
          condition: else
          emits: vertical.rejected
          advances_to: killed
      compute:
        operation: weighted_average
        description: Weighted average across 3 tiers
        tiers:
        - dimensions:
          - build_complexity
          - automation_completeness
          - icp_crispness
          - distribution_leverage
          - time_to_value
          - operational_drag
          weight: 0.6
        - dimensions:
          - pain_severity
          - competition_gap
          - monetization_clarity
          weight: 0.3
        - dimensions:
          - retention_architecture
          - expansion_potential
          weight: 0.1
        store_as: entity.composite_score
      accumulate:
        expected_from: entity.dimensions_requested
        completion: all
        description: all dimensions in scoring.requested.dimensions_requested have been received
    scoring.contest_resolved:
      description: Two analysts scored same vertical. Pick winner or average.
      reduce:
        items_from: entity.contest_scores
        operation: pick_or_average
        params:
          spread_threshold: '{{contest_spread_threshold}}'
        store_as: entity.composite_score
  state_schema:
    description: Accumulates dimension scores until all received
    fields:
      vertical_id: uuid
      dimensions_requested: text[]
      dimensions_received: 'jsonb ({dimension: {score, evidence, confidence}})'
      analyst_id: text
      started_at: timestamptz
      completed_at: timestamptz (null until all dimensions in)
validation-orchestrator:
  id: validation-orchestrator
  execution_type: system_node
  description: Manages the 4-gate validation pipeline. Projects stage transitions as gates are satisfied. Handles revision
    loops and rejection paths.
  subscribes_to:
  - vertical.shortlisted
  - research.completed
  - spec.revision_requested
  - spec.approved
  - spec.validation_passed
  - spec.validation_failed
  - cto.spec_approved
  - cto.spec_revision_needed
  - cto.spec_vetoed
  - brand.candidates_ready
  - brand.revision_needed
  - vertical.ready_for_review
  - vertical.needs_more_data
  - research.vertical_rejected
  - spec.revision_needed
  - timer.validation_timeout
  produces:
  - validation.started
  - cto.spec_review_requested
  - spec.revision_requested
  - brand.requested
  - validation.more_data_needed
  - brand.revision_needed
  - validation.package_ready
  - vertical.killed
  - pipeline.dead_letter
  timers:
  - id: validation_gate_timeout
    event: timer.validation_timeout
    delay: '{{validation_gate_timeout_hours}}h'
    start_on: state:researching
    cancel_on: state:ready_for_review
    recurring: false
  state_table: validation_pipelines
  gate_state:
    description: Tracks 4 validation gates per vertical
    gates:
    - g1_research
    - g2_spec
    - g3_cto
    - g4_brand
    storage: validation_pipelines.gate_state JSONB
  event_handlers:
    vertical.shortlisted:
      action: init_validation_pipeline
      sets_gate: null
      emits: validation.started
      advances_to: researching
    research.completed:
      action: set_gate
      sets_gate: g1_research
      emits: null
      advances_to: mvp_speccing
      data_accumulation:
        writes:
        - business_brief
        source_event: research.completed
    spec.approved:
      action: set_gate
      sets_gate: g2_spec
      emits: cto.spec_review_requested
      advances_to: cto_spec_review
      data_accumulation:
        writes:
        - source_field: final_spec
          target_field: mvp_spec
        source_event: spec.approved
    cto.spec_approved:
      action: set_gate
      sets_gate: g3_cto
      emits: brand.requested
      advances_to: branding
      data_accumulation:
        writes:
        - source_field: cto_notes
          target_field: cto_feasibility
        source_event: cto.spec_approved
    brand.candidates_ready:
      action: set_gate
      sets_gate: g4_brand
      emits: validation.package_ready
      advances_to: ready_for_review
      guard:
        id: auto_from_condition
        check: all_gates_met
    spec.validation_failed:
      action: revision_loop
      emits: spec.revision_requested
      advances_to: mvp_speccing
      guard:
        id: revision_count_below_limit
        check: entity.revision_count < policy.inner_revision_max
        on_fail: escalate:validation.revision_limit_reached
    cto.spec_revision_needed:
      action: revision_loop
      emits: spec.revision_requested
      advances_to: mvp_speccing
      guard:
        id: revision_count_below_limit
        check: entity.revision_count < policy.inner_revision_max
        on_fail: escalate:validation.revision_limit_reached
    research.vertical_rejected:
      action: kill_vertical
      emits: vertical.killed
      advances_to: killed
    cto.spec_vetoed:
      action: kill_vertical
      emits: vertical.killed
      advances_to: killed
    spec.validation_passed:
      action: set_gate_and_advance
      description: CTO validation passed. Equivalent to cto.spec_approved for gate progression.
      sets_gate: g3_cto
      advances_to: branding
      emits: brand.requested
    vertical.ready_for_review:
      action: finalize_validation
      description: All gates met. Package validation results for human review.
      advances_to: ready_for_review
      data_accumulation:
        writes:
        - source_field: candidates
          target_field: brand
        source_event: brand.candidates_ready
    vertical.needs_more_data:
      action: reopen_research
      description: Human requests more data. Reset to researching stage.
      advances_to: researching
    brand.revision_needed:
      action: request_brand_revision
      description: Brand candidates rejected. Request new candidates.
      emits: brand.requested
      guard:
        id: brand_revision_limit
        check: entity.brand_revision_count < policy.max_brand_revisions
        on_fail: escalate:validation.revision_limit_reached
    spec.revision_requested:
      action: handle_spec_revision
      description: Spec revision requested. Route back to mvp_speccing.
      advances_to: mvp_speccing
    spec.revision_needed:
      action: handle_spec_revision_needed
      description: Spec needs revision (from CTO or reviewer). Trigger revision loop.
      advances_to: mvp_speccing
      guard:
        id: revision_count_below_limit
        check: entity.revision_count < policy.inner_revision_max
        on_fail: escalate:validation.revision_limit_reached
    timer.validation_timeout:
      description: Validation gate timed out. Escalate or kill.
      emits: validation.timeout_escalation
  state_schema:
    description: Tracks 4 validation gates and revision count per vertical
    fields:
      vertical_id: uuid
      gate_state: 'jsonb ({g1_research: bool, g2_spec: bool, g3_cto: bool, g4_brand: bool})'
      revision_count: integer default 0
      started_at: timestamptz
      completed_at: timestamptz (null until all gates or killed)
lifecycle-orchestrator:
  id: lifecycle-orchestrator
  execution_type: system_node
  description: Manages factory→operating handoff (vertical.approved → OpCo spinup) and operating lifecycle transitions. Also
    handles marginal review, vertical kill/resume, and runtime reset.
  subscribes_to:
  - vertical.approved
  - vertical.killed
  - vertical.resumed
  - opco.ceo_ready
  - timer.marginal_review
  - timer.marginal_kill
  - build_complete
  - launch_ready
  - qa.validation_passed
  - review.deploy_feedback
  - opco.steady_state_reached
  - opco.growth_triggered
  - opco.growth_stabilized
  - opco.teardown_requested
  - mailbox.item_decided
  - opco.teardown_complete
  - timer.operating_timeout
  produces:
  - opco.spinup_requested
  - vertical.killed
  - pipeline.dead_letter
  - vertical.approved
  - opco.terminated
  timers:
  - id: operating_state_timeout
    event: timer.operating_timeout
    delay: '{{operating_state_timeout_hours}}h'
    start_on: state:building
    cancel_on: state:operating
    recurring: false
  state_table: null
  event_handlers:
    vertical.approved:
      action: emit_spinup
      emits: opco.spinup_requested
      advances_to: approved
    vertical.killed:
      action: mark_killed
      advances_to: killed
    vertical.resumed:
      action: promote_marginal
      guard:
        id: pipeline_has_capacity
        check: count(verticals in [researching..ready_for_review]) < {{pipeline_capacity_max}}
        policy_ref: policy.yaml → pipeline_capacity_max
      description: Marginal resumed by directive. Re-enter validation via cross-flow event.
    opco.ceo_ready:
      action: spinup_opco_org
      advances_to: building
      description: OpCo CEO ready. Begin building phase.
    timer.marginal_review:
      action: review_marginal
      description: Re-evaluate parked marginal verticals.
      rules:
        pipeline_has_capacity: 'Notify EC via agent_message to decide: promote, extend park, or kill.'
        pipeline_full: Extend park timer by {{marginal_park_days}} days. No action.
    timer.marginal_kill:
      action: auto_kill_stale_marginal
      description: Kill marginals parked > 60 days with no new signals
      advances_to: killed
    build_complete:
      action: advance_operating
      description: Build finished. Advance to pre_launch.
      advances_to: pre_launch
    launch_ready:
      action: advance_operating
      description: Pre-launch checks passed. Advance to launched.
      advances_to: launched
    qa.validation_passed:
      action: record_evidence
      description: QA passed. Record as evidence for build→pre_launch guard.
    review.deploy_feedback:
      action: record_evidence
      description: Deploy review feedback received. Record for pre_launch→launched guard.
    opco.steady_state_reached:
      action: advance_operating
      description: Product stable. Advance to operating.
      advances_to: operating
    opco.growth_triggered:
      action: advance_operating
      description: Growth phase initiated. Advance to expanding.
      advances_to: expanding
    opco.growth_stabilized:
      action: advance_operating
      description: Growth stabilized. Return to operating.
      advances_to: operating
    opco.teardown_requested:
      action: begin_teardown
      description: Human requested teardown. Advance to winding_down.
      advances_to: winding_down
      guard:
        id: has_human_decision
        check: event originated from mailbox decision path
        platform_builtin: has_human_decision
    mailbox.item_decided:
      action: process_mailbox_decision
      description: Human made a mailbox decision. Emits vertical.approved or vertical.killed based on decision.
      rules:
        approved:
          condition: decision == approve
          emits: vertical.approved
        rejected:
          condition: decision == reject
          emits: vertical.killed
    opco.teardown_complete:
      description: Teardown finished. Advance to terminal state.
      advances_to: killed
      emits: opco.terminated
    timer.operating_timeout:
      description: Operating state timed out. Escalate to empire-coordinator.
      emits: operating.timeout_escalation
