name: operating
pins:
  inputs:
    events:
    - build_complete
    - launch_ready
    - mailbox.item_decided
    - opco.ceo_ready
    - opco.growth_stabilized
    - opco.growth_triggered
    - opco.steady_state_reached
    - opco.teardown_requested
    - qa.validation_passed
    - review.deploy_feedback
    - timer.marginal_kill
    - timer.marginal_review
    - vertical.approved
    - vertical.killed
    - vertical.resumed
    reads: []
  outputs:
    events:
    - opco.spinup_requested
    - pipeline.dead_letter
    - vertical.killed
    - vertical.approved
    writes: []
initial_state: approved
terminal_states:
- killed
states:
- approved
- building
- pre_launch
- launched
- operating
- expanding
- winding_down
required_agents:
- role: opco-ceo
  subscribes_to:
  - opco.ceo_ready
  emits:
  - opco.steady_state_reached
  description: OpCo chief executive
- role: opco-cto
  subscribes_to: []
  emits:
  - build_complete
  - launch_ready
  description: Technical leadership
- role: opco-chief-of-staff
  subscribes_to: []
  emits: []
  description: Operations coordination
- role: opco-head-of-product
  subscribes_to: []
  emits: []
  description: Product management
- role: opco-head-of-growth
  subscribes_to: []
  emits:
  - opco.growth_triggered
  description: Growth strategy
- role: opco-pm
  subscribes_to: []
  emits: []
  description: Sprint management
- role: opco-backend
  subscribes_to: []
  emits: []
  description: Backend engineering
- role: opco-frontend
  subscribes_to: []
  emits: []
  description: Frontend engineering
- role: opco-qa
  subscribes_to: []
  emits:
  - qa.validation_passed
  description: Quality assurance
- role: opco-devops
  subscribes_to: []
  emits: []
  description: Infrastructure and deployment
- role: opco-tech-writer
  subscribes_to: []
  emits: []
  description: Documentation
- role: opco-marketing
  subscribes_to: []
  emits: []
  description: Marketing and growth
- role: opco-support
  subscribes_to: []
  emits: []
  description: Customer support
instance_variables:
  description: Variables populated at instance creation from the vertical validation kit
  variables:
    vertical_name: Name of the approved vertical
    mandate_document: Full validation kit (business brief, spec, CTO review, brand)
    brand_name: Selected brand identity
    geography: Target geography
    tech_stack: Recommended technology stack from CTO review
auto_emit_on_create:
  event: opco.ceo_ready
  description: Platform automatically emits this event when a new operating flow instance is created. Kicks off the OpCo lifecycle.
