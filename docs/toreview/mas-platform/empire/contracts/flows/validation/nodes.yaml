validation-orchestrator:
  id: validation-orchestrator
  execution_type: system_node
  description: Manages the 4-gate validation pipeline. Projects stage transitions as gates are satisfied. Handles revision
    loops and rejection paths.
  subscribes_to:
  - vertical.shortlisted
  - research.completed
  - spec.revision_requested
  - spec.approved
  - spec.validation_passed
  - spec.validation_failed
  - cto.spec_approved
  - cto.spec_revision_needed
  - cto.spec_vetoed
  - brand.candidates_ready
  - brand.revision_needed
  - vertical.ready_for_review
  - vertical.needs_more_data
  - research.vertical_rejected
  - spec.revision_needed
  - timer.validation_timeout
  produces:
  - validation.started
  - cto.spec_review_requested
  - spec.revision_requested
  - brand.requested
  - validation.more_data_needed
  - brand.revision_needed
  - validation.package_ready
  - vertical.killed
  - pipeline.dead_letter
  timers:
  - id: validation_gate_timeout
    event: timer.validation_timeout
    delay: '{{validation_gate_timeout_hours}}h'
    start_on: state:researching
    cancel_on: state:ready_for_review
    recurring: false
  state_table: validation_pipelines
  gate_state:
    description: Tracks 4 validation gates per vertical
    gates:
    - g1_research
    - g2_spec
    - g3_cto
    - g4_brand
    storage: validation_pipelines.gate_state JSONB
  event_handlers:
    vertical.shortlisted:
      action: init_validation_pipeline
      sets_gate: null
      emits: validation.started
      advances_to: researching
    research.completed:
      action: set_gate
      sets_gate: g1_research
      emits: null
      advances_to: mvp_speccing
      data_accumulation:
        writes:
        - business_brief
        source_event: research.completed
    spec.approved:
      action: set_gate
      sets_gate: g2_spec
      emits: cto.spec_review_requested
      advances_to: cto_spec_review
      data_accumulation:
        writes:
        - source_field: final_spec
          target_field: mvp_spec
        source_event: spec.approved
    cto.spec_approved:
      action: set_gate
      sets_gate: g3_cto
      emits: brand.requested
      advances_to: branding
      data_accumulation:
        writes:
        - source_field: cto_notes
          target_field: cto_feasibility
        source_event: cto.spec_approved
    brand.candidates_ready:
      action: set_gate
      sets_gate: g4_brand
      emits: validation.package_ready
      advances_to: ready_for_review
      guard:
        id: auto_from_condition
        check: all_gates_met
    spec.validation_failed:
      action: revision_loop
      emits: spec.revision_requested
      advances_to: mvp_speccing
      guard:
        id: revision_count_below_limit
        check: entity.revision_count < policy.inner_revision_max
        on_fail: escalate:validation.revision_limit_reached
    cto.spec_revision_needed:
      action: revision_loop
      emits: spec.revision_requested
      advances_to: mvp_speccing
      guard:
        id: revision_count_below_limit
        check: entity.revision_count < policy.inner_revision_max
        on_fail: escalate:validation.revision_limit_reached
    research.vertical_rejected:
      action: kill_vertical
      emits: vertical.killed
      advances_to: killed
    cto.spec_vetoed:
      action: kill_vertical
      emits: vertical.killed
      advances_to: killed
    spec.validation_passed:
      action: set_gate_and_advance
      description: CTO validation passed. Equivalent to cto.spec_approved for gate progression.
      sets_gate: g3_cto
      advances_to: branding
      emits: brand.requested
    vertical.ready_for_review:
      action: finalize_validation
      description: All gates met. Package validation results for human review.
      advances_to: ready_for_review
      data_accumulation:
        writes:
        - source_field: candidates
          target_field: brand
        source_event: brand.candidates_ready
    vertical.needs_more_data:
      action: reopen_research
      description: Human requests more data. Reset to researching stage.
      advances_to: researching
    brand.revision_needed:
      action: request_brand_revision
      description: Brand candidates rejected. Request new candidates.
      emits: brand.requested
      guard:
        id: brand_revision_limit
        check: entity.brand_revision_count < policy.max_brand_revisions
        on_fail: escalate:validation.revision_limit_reached
    spec.revision_requested:
      action: handle_spec_revision
      description: Spec revision requested. Route back to mvp_speccing.
      advances_to: mvp_speccing
    spec.revision_needed:
      action: handle_spec_revision_needed
      description: Spec needs revision (from CTO or reviewer). Trigger revision loop.
      advances_to: mvp_speccing
      guard:
        id: revision_count_below_limit
        check: entity.revision_count < policy.inner_revision_max
        on_fail: escalate:validation.revision_limit_reached
    timer.validation_timeout:
      description: Validation gate timed out. Escalate or kill.
      emits: validation.timeout_escalation
  state_schema:
    description: Tracks 4 validation gates and revision count per vertical
    fields:
      vertical_id: uuid
      gate_state: 'jsonb ({g1_research: bool, g2_spec: bool, g3_cto: bool, g4_brand: bool})'
      revision_count: integer default 0
      started_at: timestamptz
      completed_at: timestamptz (null until all gates or killed)
