# ============================================================================
# EmpireAI Workflow Schema — v2.0.50
# ============================================================================
# Declarative workflow definition for the vertical pipeline.
# This file defines the state machine that every vertical traverses.
#
# Architecture:
#   Platform layer:  Workflow engine reads this schema, enforces transitions,
#                    evaluates guards, executes actions. Generic, reusable.
#   Workflow layer:  THIS FILE. Stages, transitions, guards, actions.
#                    Specific to the vertical pipeline but uses platform primitives.
#   Policy layer:    prompt-variables.yaml, system-nodes.yaml scoring config.
#                    EmpireAI-specific thresholds and business rules.
#
# The platform enforces: no transition fires unless declared here.
# The workflow defines: what transitions exist and what guards/actions they have.
# The policy configures: threshold values the guards check against.
# ============================================================================

workflow:
  name: empire_vertical_pipeline
  version: "2.0.50"
  entity: vertical
  entity_table: verticals
  state_field: stage
  initial_stage: discovered

  # ── Stages ───────────────────────────────────────────────────────
  stages:
    # Factory pipeline
    - id: discovered
      phase: factory
      description: "Opportunity identified by MRA/TRA/Scanner, passed pre-filter"

    - id: scoring
      phase: factory
      description: "Analysis agent scoring 11 dimensions"

    - id: shortlisted
      phase: factory
      description: "Composite >= 75, entering validation pipeline"

    - id: marginal_review
      phase: factory
      description: "Composite 55-74 with promotion potential, awaiting EC decision"

    - id: researching
      phase: factory
      description: "Business Research Agent deep-diving the opportunity"

    - id: mvp_speccing
      phase: factory
      description: "Lightweight Spec Agent writing MVP spec"

    - id: spec_review
      phase: factory
      description: "Spec Reviewer checking spec quality"

    - id: cto_spec_review
      phase: factory
      description: "Factory CTO reviewing technical feasibility"

    - id: branding
      phase: factory
      description: "Pre-Brand Agent generating brand candidates"

    - id: ready_for_review
      phase: factory
      description: "All validation gates met, awaiting human approval"

    - id: approved
      phase: decision
      description: "Human approved, OpCo spinup initiated"

    - id: killed
      phase: terminal
      description: "Rejected at any stage"

    # Operating pipeline
    - id: full_speccing
      phase: operating
      description: "Full product spec being written by OpCo"

    - id: building
      phase: operating
      description: "OpCo engineering team building the product"

    - id: pre_launch
      phase: operating
      description: "QA, staging deploy, launch preparation"

    - id: launched
      phase: operating
      description: "Product live, initial users"

    - id: operating
      phase: operating
      description: "Steady state operations"

    - id: expanding
      phase: operating
      description: "Growth phase, scaling users"

    - id: winding_down
      phase: operating
      description: "Sunset in progress"

  terminal_stages:
    - killed
    # Note: operating, expanding are not terminal — they have outgoing transitions

  # ── Transitions ──────────────────────────────────────────────────
  transitions:
    # Discovery → Scoring
    - id: discovered_to_scoring
      from: discovered
      to: scoring
      trigger: vertical.discovered
      node: scoring-node
      guards:
        - has_vertical_id
        - signal_above_threshold
      actions:
        - select_rubric
        - emit_scoring_requested

    # Scoring outcomes
    - id: scoring_to_shortlisted
      from: scoring
      to: shortlisted
      trigger: vertical.scored
      node: scoring-node
      guards:
        - composite_above_shortlist
        - both_hard_gates_pass
      actions:
        - emit_vertical_shortlisted

    - id: scoring_to_marginal
      from: scoring
      to: marginal_review
      trigger: vertical.scored
      node: scoring-node
      guards:
        - composite_in_marginal_range
        - marginal_promotion_eligible
      actions:
        - emit_vertical_marginal

    - id: scoring_to_rejected
      from: scoring
      to: killed
      trigger: vertical.scored
      node: scoring-node
      guards:
        - composite_below_marginal
      actions:
        - emit_vertical_rejected

    # Marginal decisions (EC judgment)
    - id: marginal_to_researching
      from: marginal_review
      to: researching
      trigger: vertical.resumed
      node: empire-coordinator
      guards:
        - pipeline_has_capacity
      actions:
        - emit_vertical_resumed

    - id: marginal_to_killed
      from: marginal_review
      to: killed
      trigger: vertical.rejected
      node: empire-coordinator
      guards: []
      actions:
        - emit_vertical_rejected

    # Shortlisted → Validation pipeline
    - id: shortlisted_to_researching
      from: shortlisted
      to: researching
      trigger: validation.started
      node: pipeline-coordinator
      guards:
        - has_vertical_id
      actions:
        - emit_research_requested

    # Validation pipeline (linear with loops)
    - id: researching_to_speccing
      from: researching
      to: mvp_speccing
      trigger: research.completed
      node: pipeline-coordinator
      guards:
        - gate_g1_research
      actions:
        - emit_spec_requested

    - id: speccing_to_review
      from: mvp_speccing
      to: spec_review
      trigger: spec.draft_ready
      node: pipeline-coordinator
      guards: []
      actions:
        - emit_spec_review_requested

    - id: review_to_cto
      from: spec_review
      to: cto_spec_review
      trigger: spec_review.passed
      node: pipeline-coordinator
      guards:
        - gate_g2_spec
      actions:
        - emit_spec_validation_requested

    - id: cto_to_branding
      from: cto_spec_review
      to: branding
      trigger: cto.spec_approved
      node: pipeline-coordinator
      guards:
        - gate_g3_cto
      actions:
        - emit_brand_requested

    - id: branding_to_ready
      from: branding
      to: ready_for_review
      trigger: brand.candidates_ready
      node: pipeline-coordinator
      guards:
        - gate_g4_brand
        - all_gates_met
      actions:
        - emit_validation_package_ready

    # Human decision
    - id: ready_to_approved
      from: ready_for_review
      to: approved
      trigger: vertical.approved
      node: runtime
      guards:
        - has_human_decision
      actions:
        - emit_opco_spinup_requested

    - id: ready_to_killed
      from: ready_for_review
      to: killed
      trigger: vertical.killed
      node: runtime
      guards: []
      actions: []

    - id: ready_to_researching
      from: ready_for_review
      to: researching
      trigger: vertical.needs_more_data
      node: runtime
      guards: []
      actions:
        - emit_research_requested

    # Revision loops
    - id: review_failed_to_researching
      from: spec_review
      to: researching
      trigger: spec_review.issues_found
      node: pipeline-coordinator
      guards:
        - inner_revision_count_below_limit
      actions:
        - increment_revision_count
        - emit_research_requested

    - id: cto_revision_to_speccing
      from: cto_spec_review
      to: mvp_speccing
      trigger: cto.spec_revision_needed
      node: pipeline-coordinator
      guards:
        - inner_revision_count_below_limit
      actions:
        - increment_revision_count
        - emit_spec_revision_requested

    # Operating pipeline
    - id: approved_to_full_speccing
      from: approved
      to: full_speccing
      trigger: opco.ceo_ready
      node: runtime
      guards: []
      actions:
        - spinup_opco_org

    - id: full_speccing_to_building
      from: full_speccing
      to: building
      trigger: spec.approved
      node: opco-cto
      guards:
        - spec_validation_passed
      actions: []

    - id: building_to_pre_launch
      from: building
      to: pre_launch
      trigger: build_complete
      node: opco-cto
      guards:
        - qa_passed
      actions: []

    - id: pre_launch_to_launched
      from: pre_launch
      to: launched
      trigger: launch_ready
      node: opco-cto
      guards:
        - deploy_approved
      actions: []

    - id: launched_to_operating
      from: launched
      to: operating
      trigger: opco.steady_state_reached
      node: runtime
      guards: []
      actions: []

    - id: operating_to_expanding
      from: operating
      to: expanding
      trigger: opco.growth_triggered
      node: opco-ceo
      guards: []
      actions: []

    - id: expanding_to_operating
      from: expanding
      to: operating
      trigger: opco.growth_stabilized
      node: opco-ceo
      guards: []
      actions: []

    - id: operating_to_winding_down
      from: operating
      to: winding_down
      trigger: opco.teardown_requested
      node: runtime
      guards:
        - has_human_decision
      actions:
        - begin_teardown

    # Kill from any non-terminal factory stage
    - id: any_factory_to_killed
      from: "*"  # any stage except launched/operating/expanding
      to: killed
      trigger: vertical.killed
      node: runtime
      guards:
        - not_in_operating_phase
      actions: []

  # ── Timers ───────────────────────────────────────────────────────
  timers:
    - id: marginal_review_timer
      stage: marginal_review
      delay_days: 14
      event: timer.marginal_review
      owner: empire-coordinator
      action: "EC re-evaluates parked marginal: promote, extend, or kill"
      cancellation: "Cancelled if vertical leaves marginal_review stage"

    - id: marginal_kill_timer
      stage: marginal_review
      delay_days: 60
      event: timer.marginal_kill
      owner: runtime
      action: "Auto-kill marginals parked >60 days with no new signals"
      cancellation: "Cancelled if vertical promoted or killed earlier"

    - id: portfolio_digest_timer
      stage: "*"
      delay_hours: 6
      event: timer.portfolio_digest
      owner: empire-coordinator
      action: "Compile and send portfolio digest"
      cancellation: "Never cancelled, recurring"
      recurring: true

    - id: scan_timeout
      stage: discovered
      delay_minutes: 90
      event: timer.scan_timeout
      owner: pipeline-coordinator
      action: "Scan accumulator timeout — complete scan with partial results"
      cancellation: "Cancelled when scan completes normally"

    - id: campaign_deadline
      stage: "*"
      delay_hours: 24
      event: timer.campaign_deadline
      owner: pipeline-coordinator
      action: "Global campaign safety net — force completion"
      cancellation: "Cancelled when campaign completes normally"
