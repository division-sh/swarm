# ============================================================================
# EmpireAI System Nodes Contract — v2.0.50
# ============================================================================
# Defines deterministic, non-LLM components that participate in the EventBus
# alongside agents. System nodes execute Go code, not LLM reasoning.
#
# This contract serves as documentation and validation artifact.
# State machines described here are implemented in Go — they are NOT
# executed from this YAML. See RFC-001 v2 Phase 5 for executable YAML roadmap.
#
# Fields per system node:
#   id:             Node identifier
#   subscribes_to:  Events received via normal EventBus subscription
#   produces:       Events emitted via normal EventBus.Publish
#   implementation: Go source file
#
# ── Contract Conventions (v2.0.44) ──────────────────────────────────
#
# EMITTER CONVENTION:
#   event-catalog.yaml `emitter` should name the component that decides
#   to emit the event, not the process it runs inside.
#   - System nodes (scoring-node) own their emissions directly.
#   - "runtime" means the Go orchestrator (PipelineCoordinator, AgentManager,
#     pre-filter, timer, etc.) — NOT a system node.
#   - Multi-emitter events: `emitter` is the primary path. Use
#     `alternate_emitters` list for secondary paths (e.g. vertical.discovered
#     is primarily runtime pre-filter, secondarily scoring-node derivation).
#   - TestContractCompliance/emit_events checks produces vs catalog emitter.
#
#   `emitter_type` classifies how the compliance test should handle each event:
#     agent      — holding/factory agent. Checked against commgraph registry.
#     system_node — scoring-node etc. Checked against system-nodes.yaml produces.
#     runtime    — Go orchestrator. Not in commgraph — skip emit_events check.
#     human      — emitted by human via CLI/Telegram. Skip emit_events check.
#     opco_agent — OpCo agent via routing table. Only exists when OpCo is live.
#                  Skip emit_events check until OpCo runtime is implemented.
#
# PAYLOAD CONVENTION:
#   event-catalog.yaml `payload` is EXHAUSTIVE EXACT — the complete field
#   list for each event, not a "business-core" subset. Every field the Go
#   code puts into the event must appear in the catalog payload list.
#   - Infrastructure fields (task_id, vertical_id, campaign_id, scan_id)
#     are listed per-event, not assumed implicitly.
#   - When additionalProperties: false, the EventSchemaRegistry properties
#     must exactly match the catalog payload fields.
#   - TestContractCompliance/schema_payload enforces this parity.
#
# CONSUMER_TYPE CONVENTION:
#   event-catalog.yaml `consumer_type` classifies the consumer:
#     agent            — LLM agent (receives event in conversation context)
#     system_component — Go system node or runtime (processes deterministically)
#     human            — Human via mailbox/CLI (async decision)
#   Resolution: if consumer is an agent ID in agent-tools.yaml → agent.
#   If consumer is scoring-node or runtime → system_component.
#   If delivery_channel is mailbox → human.
#
# TERMINAL EVENT CONVENTION:
#   Events with no active consumer (consumer: audit or consumer: —) are
#   terminal events. They are written to the events table for audit trail
#   but trigger no downstream processing. Examples: ops.agent_panic,
#   ops.agent_panic. Terminal events must have delivery_channel: audit.
#
#   state_table:    Database table(s) for state persistence
#   state_machine:  Declarative description of state transitions (contract only)
#
# Transaction contract (all system nodes):
#   1. Start local transaction
#   2. Check idempotency ledger (event_id, node_id)
#   3. If already processed: no-op
#   4. Execute state transition
#   5. Persist outgoing events in same transaction
#   6. Write processing receipt in same transaction
#   7. Commit
#   8. Fan out outgoing events via Publish (post-commit)
#
# Dead-letter policy: 5 failed retries → pipeline.dead_letter event
# ============================================================================

scoring-node:
  id: scoring-node
  subscribes_to:
    - vertical.discovered
    - vertical.derived              # v2.0.43: analyst derivation loop — derived verticals enter pre-filter
    - score.dimension_complete
    - scoring.contest_resolved    # from Empire Coordinator after resolving contested dimensions
  produces:
    - scoring.requested
    - vertical.scored
    - vertical.discovered           # v2.0.43: re-emitted for derived verticals that pass pre-filter (discovery_mode='derived')
    - vertical.shortlisted
    - vertical.marginal
    - vertical.rejected
    - scoring.contested       # rare: sharded dimension conflict
    - pipeline.dead_letter    # escalation after retry exhaustion
  implementation: internal/runtime/scoring_node.go
  execution_type: workflow_node  # deterministic, no LLM
  state_table: scoring_digest_buffer
  idempotency_table: system_node_ledger

  # Workflow transitions owned by this node (from workflow-schema.yaml)
  owned_transitions:
    - discovered_to_scoring
    - scoring_to_shortlisted
    - scoring_to_marginal
    - scoring_to_rejected

  # v2.0.43: Analyst assignment constraint for derived verticals
  # v2.0.44: Fallback behavior clarified — best-effort, not strict-blocking
  analyst_assignment:
    description: >
      When assigning an analyst for a derived vertical (generation_depth > 0),
      the scoring-node MUST exclude the generator_agent_id from the candidate pool.
      This is the core anti-bias guarantee: the analyst who proposed the derivation
      cannot score it.
    fallback_policy: best_effort
    fallback_description: >
      If no alternate analyst exists (single-instance environment), log an
      anti-bias fallback event with severity=warn and proceed with scoring
      using the available analyst (which may be the generator). This is
      acceptable in early deployments where only one Analysis Agent instance
      is running. The anti-bias guarantee is enforced strictly when 2+ analyst
      instances are available. Operators should monitor anti-bias fallback
      log events and scale analyst instances to eliminate them.
    logic: |
      func (sn *ScoringNode) assignAnalyst(opp Vertical) AgentID {
          excluded := opp.GeneratorAgentID  // empty string for depth-0 verticals
          pool := sn.availableAnalysts()
          candidates := filter(pool, func(a AgentID) bool { return a != excluded })
          if len(candidates) == 0 && len(pool) > 0 {
              // Best-effort fallback: log warning, use any available analyst
              sn.logEvent("anti_bias_fallback", severity=warn, vertical_id=opp.ID,
                  generator=excluded, reason="no_alternate_analyst_available")
              return pickByLoad(pool)
          }
          if len(candidates) == 0 {
              return sn.queueForRetry(opp)  // all analysts busy — retry
          }
          return pickByLoad(candidates)
      }
    minimum_pool_size: 2  # at least 2 analyst instances recommended for derivation anti-bias

  # v2.0.43: Derivation pre-filter (processes vertical.derived before state machine)
  # This runs at the scoring-node level, NOT per-vertical instance.
  # A passing vertical.derived creates a new vertical record and emits vertical.discovered,
  # which then enters the normal per-vertical state machine.
  derivation_pre_filter:
    trigger: vertical.derived
    checks:
      - id: depth_cap
        rule: "event.generation_depth <= 2"
        reject_reason: "generation_depth_exceeded"
        priority: must_pass

      - id: signal_strength
        rule: "event.signal_strength >= 55"
        reject_reason: "signal_strength_below_threshold"
        priority: must_pass

      - id: no_blocking_red_flags
        rule: "no red_flag in event.build_sketch.red_flags with severity == 'blocking'"
        reject_reason: "blocking_red_flag"
        priority: must_pass

      - id: icp_positive
        rule: "event.preliminary_icp is non-empty AND contains (role_token OR cohort_token) AND contains workflow_anchor"
        reject_reason: "icp_positive_check_failed"
        priority: must_pass
        workflow_anchor_tokens:
          - schedule
          - booking
          - invoice
          - payroll
          - lead
          - dispatch
          - inventory
          - compliance
          - reporting
        matching: "lowercase strings.Contains (substring match, not word-boundary)"

      - id: evidence_completeness
        rule: "len(event.evidence.competitors) >= 1 AND len(event.evidence.pain_signals) >= 1"
        reject_reason: "insufficient_evidence"
        priority: must_pass

      - id: retention_primitive
        rule: "event has at least 1 retention primitive from [recurring_data, workflow_embedding, integration_lock_in, compliance_cadence, team_collaboration]"
        reject_reason: "no_retention_primitive"
        priority: must_pass

      - id: name_dedup
        rule: "normalized(event.opportunity_name) not in active_verticals[event.campaign_id]"
        reject_reason: "trivial_rename_of_parent"
        priority: must_pass

      - id: budget_check
        rule: "campaign.spent + estimated_scoring_cost <= campaign.budget_cap"
        reject_reason: "budget_exhausted"
        priority: must_pass

    on_pass:
      actions:
        - insert: "verticals table: new row with discovery_mode='derived', parent_id, generation_depth, generator_agent_id, derivation_rationale"
        - emit: "vertical.discovered {vertical_id, vertical_name=event.opportunity_name, mode='derived', discovery_context=event.discovery_context, geographic_scope=event.geographic_scope}"
      _note: "Emitted vertical.discovered enters the normal waiting→accumulating state machine for the new vertical_id"

    on_reject:
      actions:
        - log: "derivation_rejected {parent_id, opportunity_name, reject_reason}"
        - store: "scoring_digest_buffer: record rejected derivation for campaign summary"

  state_machine:
    instance_key: vertical_id
    initial: waiting

    states:
      waiting:
        description: "No scoring in progress for this vertical"
        on:
          vertical.discovered:
            actions:
              - compute: rubric = rubric_selection(event.mode)
              - compute: dimensions = rubric.dimensions
              - create: "ScoringAccumulator {vertical_id, rubric, expected: dimensions}"
              - emit: "scoring.requested {vertical_id, rubric, dimensions}"
                to: analysis-agent
            next: accumulating

      accumulating:
        description: "Waiting for all dimension scores from Analysis Agent"
        on:
          score.dimension_complete:
            actions:
              - store: accumulator.received[event.dimension] = event.score
            branch:
              - when: count(accumulator.received) == count(accumulator.expected)
                actions:
                  - compute: result = computeComposite(accumulator)
                next: evaluating
              - otherwise:
                next: accumulating  # stay, wait for more dimensions

        on_timeout:
          duration: 60m
          actions:
            - compute: result = computeComposite(accumulator, partial=true)
          next: evaluating

      evaluating:
        description: "All dimensions received, computing composite and emitting result (v2.0.39 cascade)"
        # This state is transient — entered and exited in the same handler
        branch:
          - when: result.contested_dimensions exist
            actions:
              - emit: "scoring.contested {vertical_id, contested_dimensions}"
                to: empire-coordinator
            next: awaiting_contest_resolution
          # Step 1-2: Hard gates already checked in accumulating→evaluating transition
          # Step 3: Tier 1 dimension floor (any Tier 1 dim < 50)
          - when: result.tier1_floor_fail
            actions:
              - emit: "vertical.scored {vertical_id, result}"
              - emit: "vertical.rejected {vertical_id, reason: tier1_dimension_floor}"
            next: complete
          # Step 4: Tier 1 sub-score < 60
          - when: result.tier1_score < 60
            actions:
              - emit: "vertical.scored {vertical_id, result}"
              - emit: "vertical.rejected {vertical_id, reason: viability_floor_execution_fit}"
            next: complete
          # Step 5: Composite ≥ 75 → shortlist
          - when: result.composite_score >= 75
            actions:
              - emit: "vertical.scored {vertical_id, result}"
              - emit: "vertical.shortlisted {vertical_id, composite_score}"
            next: complete
          # Step 6: Composite 55-74 + marginal drain check
          - when: result.composite_score >= 55 AND result.tier1_high_dim_count >= 2
            actions:
              - emit: "vertical.scored {vertical_id, result}"
              - emit: "vertical.marginal {vertical_id, composite_score}"
            next: complete
          - when: result.composite_score >= 55 AND result.tier1_high_dim_count < 2
            actions:
              - emit: "vertical.scored {vertical_id, result}"
              - emit: "vertical.rejected {vertical_id, reason: marginal_drain}"
            next: complete
          # Step 5: Composite < 55 → reject
          - otherwise:
            actions:
              - emit: "vertical.scored {vertical_id, result}"
              - emit: "vertical.rejected {vertical_id, reason: composite_below_threshold}"
            next: complete

      awaiting_contest_resolution:
        description: "Waiting for EC to resolve contested dimension scores"
        on:
          scoring.contest_resolved:
            actions:
              - store: accumulator.received[event.dimension] = event.resolved_score
              - compute: result = computeComposite(accumulator)
            next: evaluating

      complete:
        terminal: true
        description: "Scoring finished, accumulator cleaned up"

  rubric_selection:
    description: "Deterministic rubric selection — v2.0.39: all modes use universal rubric"
    universal_dimensions: &universal_dims
      - build_complexity          # Hard gate (≥50)
      - automation_completeness   # Hard gate (≥50)
      - icp_crispness             # Tier 1: Execution Fit (15%)
      - distribution_leverage     # Tier 1: Execution Fit (15%)
      - time_to_value             # Tier 1: Execution Fit (15%)
      - operational_drag          # Tier 1: Execution Fit (15%)
      - pain_severity             # Tier 2: Market Viability (10%)
      - competition_gap           # Tier 2: Market Viability (10%)
      - monetization_clarity      # Tier 2: Market Viability (10%)
      - retention_architecture    # Tier 3: Upside (5%)
      - expansion_potential       # Tier 3: Upside (5%)
    universal_hard_gates: &universal_gates
      build_complexity: 50
      automation_completeness: 50
    universal_tier1: &universal_tier1
      dimensions:
        - icp_crispness
        - distribution_leverage
        - time_to_value
        - operational_drag
      dimension_floor: 50
      subscore_floor: 60
    universal_marginal_drain: &universal_marginal
      min_high_dims: 2
      high_threshold: 70
    rules:
      - when: mode == "saas_gap"
        rubric: universal
        dimensions: *universal_dims
        hard_gates: *universal_gates
        tier1: *universal_tier1
        marginal_drain: *universal_marginal
      - when: mode == "local_services"
        rubric: universal
        _note: "Same rubric, same dimensions. Mode preserved for scan targeting."
        dimensions: *universal_dims
        hard_gates: *universal_gates
        tier1: *universal_tier1
        marginal_drain: *universal_marginal
      - when: mode in ["saas_trend"]
        rubric: universal
        dimensions: *universal_dims
        hard_gates: *universal_gates
        tier1: *universal_tier1
        marginal_drain: *universal_marginal
      - when: mode == "automation_micro"
        rubric: universal
        _note: "automation_micro verticals now scored with universal rubric. Old rubric-specific dimensions (automation_leverage, sales_cycle_simplicity, etc.) are retired."
        dimensions: *universal_dims
        hard_gates: *universal_gates
        tier1: *universal_tier1
        marginal_drain: *universal_marginal

  # v2.0.44: Scoring Anchor Refinement — competition_gap Price Disruption
  # Supersedes v2.0.39 anchors. Adds price-disruption wedge evaluation.
  competition_gap_anchors:
    dimension: competition_gap
    tier: 2  # Market Viability (10%)
    anchors:
      20: >
        Dominant incumbent(s) with direct feature overlap at comparable or lower price points.
        No viable differentiation axis — not on features, not on price, not on segment.
      50: >
        Multiple competitors exist with partial overlap. EITHER differentiation possible on
        features/segment but competitors price at comparable levels, OR competitors price high
        (3x+ EmpireAI's viable price) but one or more already offer a credible downmarket tier.
      80: >
        Clear open niche (few/no competitors) OR multiple competitors exist but ALL priced at
        3x+ EmpireAI's viable price point ($150+/month) with no credible downmarket offering
        AND an identifiable underserved segment that can't justify incumbent pricing.

    evaluation_rules:
      - id: price_floor_comparison
        rule: >
          Analyst MUST identify cheapest viable competitor's price point and compare to
          EmpireAI's viable range ($29-99/month). Required evidence, not optional context.

      - id: price_gap_threshold
        rule: >
          If cheapest incumbent with comparable features is ≥3x EmpireAI's viable price
          (~$150+/month) AND no incumbent offers credible budget/starter tier, analyst
          evaluates price-disruption wedge. Can elevate score 15-20 points above pure
          competitor-count analysis.

      - id: segment_specificity
        rule: >
          Price disruption alone insufficient. Analyst must identify specific underserved
          segment (e.g., "solo appliance repair techs doing <$500k revenue who can't
          justify $300/month ServiceTitan") — not just "small businesses who want it cheaper."

      - id: downmarket_tier_check
        rule: >
          If any competitor offers $29-79/month starter tier (even limited), price disruption
          thesis weakened. Score as if that tier is the relevant competitor.

      - id: cost_structure_moat
        rule: >
          Disruption thesis depends on incumbents being structurally unable to match price.
          Indicators: sales-led motion, enterprise focus (SOC2/SSO/dedicated CSM),
          VC-funded with burn rate expectations, complex onboarding requiring professional
          services. Lean bootstrapped tool at $49/month = no cost structure moat.

    derivation_interaction: >
      When analyst scores competition_gap <65 due to competitor count but observes significant
      price gap, can emit vertical.derived with modification_type='feature_reframe' targeting
      competition_gap improvement via price-disruption wedge.

