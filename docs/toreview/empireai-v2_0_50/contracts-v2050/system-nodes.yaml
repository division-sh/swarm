# ── v2.0.44: Campaign Termination with Derivation Loop ──────────────
# Until campaign-node is implemented, termination logic lives in the Go runtime.
# These rules are evaluated periodically (every 30s) by the runtime event loop.
campaign_termination:
  _note: >
    v2.0.43: With derivation loops, campaigns need termination beyond "all shards complete."
    The runtime tracks active_scoring_accumulators (count of ScoringAccumulators with
    state != complete) and pending_derivations (count of vertical.derived events in
    the pre-filter queue) per campaign_id.
  rules:
    - id: time_cap
      description: "Hard time limit for campaign execution"
      rule: "campaign.elapsed >= campaign.time_cap (default 24h)"
      action: "Drop pending derivations with reason='time_cap_exceeded', wait for active scoring to complete or timeout, emit campaign.completed"
      priority: 1  # evaluated first

    - id: budget_exhausted
      description: "Campaign budget fully consumed"
      rule: "campaign.spent >= campaign.budget_cap"
      action: "Drop pending derivations with reason='budget_exhausted', wait for active scoring to complete, emit campaign.completed"
      priority: 2

    - id: queue_drain
      description: "No more work pending"
      rule: "active_scoring_accumulators[campaign_id] == 0 AND pending_derivation_count[campaign_id] == 0"
      action: "emit campaign.completed"
      priority: 3

    - id: depth_exhaustion
      description: "All depth-2 verticals scored, no further derivation possible"
      rule: "all verticals at max depth scored AND no depth < 2 verticals still accumulating"
      action: "emit campaign.completed (subsumed by queue_drain in practice)"
      priority: 4

  tracking:
    active_scoring_accumulators: "Count of ScoringAccumulator instances with state in {waiting, accumulating, evaluating, awaiting_contest_resolution} grouped by campaign_id"
    pending_derivation_count: "Count of vertical.derived events received but not yet processed through derivation_pre_filter, grouped by campaign_id"
    _implementation_note: >
      Both counters are maintained in-memory by the scoring-node. active_scoring_accumulators
      increments on vertical.discovered, decrements on state→complete. pending_derivation_count
      increments on vertical.derived received, decrements on pre-filter pass or reject.
