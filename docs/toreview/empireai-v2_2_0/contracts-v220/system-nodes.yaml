scoring-node:
  id: scoring-node
  subscribes_to:
  - vertical.discovered
  - vertical.derived
  - score.dimension_complete
  - scoring.contest_resolved
  produces:
  - scoring.requested
  - vertical.scored
  - vertical.discovered
  - vertical.shortlisted
  - vertical.marginal
  - vertical.rejected
  - scoring.contested
  - pipeline.dead_letter
  implementation: internal/runtime/pipeline/scoring_node.go
  execution_type: workflow_node
  state_table: scoring_digest_buffer
  idempotency_table: system_node_ledger
  owned_transitions:
  - discovered_to_scoring
  - scoring_to_shortlisted
  - scoring_to_marginal
  - scoring_to_rejected
  analyst_assignment:
    description: 'When assigning an analyst for a derived vertical (generation_depth > 0), the scoring-node MUST exclude the
      generator_agent_id from the candidate pool. This is the core anti-bias guarantee: the analyst who proposed the derivation
      cannot score it.

      '
    fallback_policy: best_effort
    fallback_description: 'If no alternate analyst exists (single-instance environment), log an anti-bias fallback event with
      severity=warn and proceed with scoring using the available analyst (which may be the generator). This is acceptable
      in early deployments where only one Analysis Agent instance is running. The anti-bias guarantee is enforced strictly
      when 2+ analyst instances are available. Operators should monitor anti-bias fallback log events and scale analyst instances
      to eliminate them.

      '
    logic: "func (sn *ScoringNode) assignAnalyst(opp Vertical) AgentID {\n    excluded := opp.GeneratorAgentID  // empty string\
      \ for depth-0 verticals\n    pool := sn.availableAnalysts()\n    candidates := filter(pool, func(a AgentID) bool { return\
      \ a != excluded })\n    if len(candidates) == 0 && len(pool) > 0 {\n        // Best-effort fallback: log warning, use\
      \ any available analyst\n        sn.logEvent(\"anti_bias_fallback\", severity=warn, vertical_id=opp.ID,\n          \
      \  generator=excluded, reason=\"no_alternate_analyst_available\")\n        return pickByLoad(pool)\n    }\n    if len(candidates)\
      \ == 0 {\n        return sn.queueForRetry(opp)  // all analysts busy — retry\n    }\n    return pickByLoad(candidates)\n\
      }\n"
    minimum_pool_size: 2
  derivation_pre_filter:
    trigger: vertical.derived
    checks:
    - id: depth_cap
      rule: event.generation_depth <= 2
      reject_reason: generation_depth_exceeded
      priority: must_pass
    - id: signal_strength
      rule: event.signal_strength >= 55
      reject_reason: signal_strength_below_threshold
      priority: must_pass
    - id: no_blocking_red_flags
      rule: no red_flag in event.build_sketch.red_flags with severity == 'blocking'
      reject_reason: blocking_red_flag
      priority: must_pass
    - id: icp_positive
      rule: event.preliminary_icp is non-empty AND contains (role_token OR cohort_token) AND contains workflow_anchor
      reject_reason: icp_positive_check_failed
      priority: must_pass
      workflow_anchor_tokens:
      - schedule
      - booking
      - invoice
      - payroll
      - lead
      - dispatch
      - inventory
      - compliance
      - reporting
      matching: lowercase strings.Contains (substring match, not word-boundary)
    - id: evidence_completeness
      rule: len(event.evidence.competitors) >= 1 AND len(event.evidence.pain_signals) >= 1
      reject_reason: insufficient_evidence
      priority: must_pass
    - id: retention_primitive
      rule: event has at least 1 retention primitive from [recurring_data, workflow_embedding, integration_lock_in, compliance_cadence,
        team_collaboration]
      reject_reason: no_retention_primitive
      priority: must_pass
    - id: name_dedup
      rule: normalized(event.opportunity_name) not in active_verticals[event.campaign_id]
      reject_reason: trivial_rename_of_parent
      priority: must_pass
    - id: budget_check
      rule: campaign.spent + estimated_scoring_cost <= campaign.budget_cap
      reject_reason: budget_exhausted
      priority: must_pass
    on_pass:
      actions:
      - insert: 'verticals table: new row with discovery_mode=''derived'', parent_id, generation_depth, generator_agent_id,
          derivation_rationale'
      - emit: vertical.discovered {vertical_id, vertical_name=event.opportunity_name, mode='derived', discovery_context=event.discovery_context,
          geographic_scope=event.geographic_scope}
      _note: Emitted vertical.discovered enters the normal waiting→accumulating state machine for the new vertical_id
    on_reject:
      actions:
      - log: derivation_rejected {parent_id, opportunity_name, reject_reason}
      - store: 'scoring_digest_buffer: record rejected derivation for campaign summary'
  state_machine:
    instance_key: vertical_id
    initial: waiting
    states:
      waiting:
        description: No scoring in progress for this vertical
        true:
          vertical.discovered:
            actions:
            - compute: rubric = rubric_selection(event.mode)
            - compute: dimensions = rubric.dimensions
            - create: 'ScoringAccumulator {vertical_id, rubric, expected: dimensions}'
            - emit: scoring.requested {vertical_id, rubric, dimensions}
              to: analysis-agent
            next: accumulating
      accumulating:
        description: Waiting for all dimension scores from Analysis Agent
        true:
          score.dimension_complete:
            actions:
            - store: accumulator.received[event.dimension] = event.score
            branch:
            - when: count(accumulator.received) == count(accumulator.expected)
              actions:
              - compute: result = computeComposite(accumulator)
              next: evaluating
            - otherwise: null
              next: accumulating
        on_timeout:
          duration: 60m
          actions:
          - compute: result = computeComposite(accumulator, partial=true)
          next: evaluating
      evaluating:
        description: All dimensions received, computing composite and emitting result (v2.0.39 cascade)
        branch:
        - when: result.contested_dimensions exist
          actions:
          - emit: scoring.contested {vertical_id, contested_dimensions}
            to: empire-coordinator
          next: awaiting_contest_resolution
        - when: result.tier1_floor_fail
          actions:
          - emit: vertical.scored {vertical_id, result}
          - emit: 'vertical.rejected {vertical_id, reason: tier1_dimension_floor}'
          next: complete
        - when: result.tier1_score < 60
          actions:
          - emit: vertical.scored {vertical_id, result}
          - emit: 'vertical.rejected {vertical_id, reason: viability_floor_execution_fit}'
          next: complete
        - when: result.composite_score >= 75
          actions:
          - emit: vertical.scored {vertical_id, result}
          - emit: vertical.shortlisted {vertical_id, composite_score}
          next: complete
        - when: result.composite_score >= 55 AND result.tier1_high_dim_count >= 2
          actions:
          - emit: vertical.scored {vertical_id, result}
          - emit: vertical.marginal {vertical_id, composite_score}
          next: complete
        - when: result.composite_score >= 55 AND result.tier1_high_dim_count < 2
          actions:
          - emit: vertical.scored {vertical_id, result}
          - emit: 'vertical.rejected {vertical_id, reason: marginal_drain}'
          next: complete
        - otherwise: null
          actions:
          - emit: vertical.scored {vertical_id, result}
          - emit: 'vertical.rejected {vertical_id, reason: composite_below_threshold}'
          next: complete
      awaiting_contest_resolution:
        description: Waiting for EC to resolve contested dimension scores
        true:
          scoring.contest_resolved:
            actions:
            - store: accumulator.received[event.dimension] = event.resolved_score
            - compute: result = computeComposite(accumulator)
            next: evaluating
      complete:
        terminal: true
        description: Scoring finished, accumulator cleaned up
  rubric_selection:
    description: 'Deterministic rubric selection — v2.0.39: all modes use universal rubric'
    universal_dimensions: &id001
    - build_complexity
    - automation_completeness
    - icp_crispness
    - distribution_leverage
    - time_to_value
    - operational_drag
    - pain_severity
    - competition_gap
    - monetization_clarity
    - retention_architecture
    - expansion_potential
    universal_hard_gates: &id002
      build_complexity: 50
      automation_completeness: 50
    universal_tier1: &id003
      dimensions:
      - icp_crispness
      - distribution_leverage
      - time_to_value
      - operational_drag
      dimension_floor: 50
      subscore_floor: 60
    universal_marginal_drain: &id004
      min_high_dims: 2
      high_threshold: 70
    rules:
    - when: mode == "saas_gap"
      rubric: universal
      dimensions: *id001
      hard_gates: *id002
      tier1: *id003
      marginal_drain: *id004
    - when: mode == "local_services"
      rubric: universal
      _note: Same rubric, same dimensions. Mode preserved for scan targeting.
      dimensions: *id001
      hard_gates: *id002
      tier1: *id003
      marginal_drain: *id004
    - when: mode in ["saas_trend"]
      rubric: universal
      dimensions: *id001
      hard_gates: *id002
      tier1: *id003
      marginal_drain: *id004
    - when: mode == "automation_micro"
      rubric: universal
      _note: automation_micro verticals now scored with universal rubric. Old rubric-specific dimensions (automation_leverage,
        sales_cycle_simplicity, etc.) are retired.
      dimensions: *id001
      hard_gates: *id002
      tier1: *id003
      marginal_drain: *id004
  competition_gap_anchors:
    dimension: competition_gap
    tier: 2
    anchors:
      20: 'Dominant incumbent(s) with direct feature overlap at comparable or lower price points. No viable differentiation
        axis — not on features, not on price, not on segment.

        '
      50: 'Multiple competitors exist with partial overlap. EITHER differentiation possible on features/segment but competitors
        price at comparable levels, OR competitors price high (3x+ EmpireAI''s viable price) but one or more already offer
        a credible downmarket tier.

        '
      80: 'Clear open niche (few/no competitors) OR multiple competitors exist but ALL priced at 3x+ EmpireAI''s viable price
        point ($150+/month) with no credible downmarket offering AND an identifiable underserved segment that can''t justify
        incumbent pricing.

        '
    evaluation_rules:
    - id: price_floor_comparison
      rule: 'Analyst MUST identify cheapest viable competitor''s price point and compare to EmpireAI''s viable range ($29-99/month).
        Required evidence, not optional context.

        '
    - id: price_gap_threshold
      rule: 'If cheapest incumbent with comparable features is ≥3x EmpireAI''s viable price (~$150+/month) AND no incumbent
        offers credible budget/starter tier, analyst evaluates price-disruption wedge. Can elevate score 15-20 points above
        pure competitor-count analysis.

        '
    - id: segment_specificity
      rule: 'Price disruption alone insufficient. Analyst must identify specific underserved segment (e.g., "solo appliance
        repair techs doing <$500k revenue who can''t justify $300/month ServiceTitan") — not just "small businesses who want
        it cheaper."

        '
    - id: downmarket_tier_check
      rule: 'If any competitor offers $29-79/month starter tier (even limited), price disruption thesis weakened. Score as
        if that tier is the relevant competitor.

        '
    - id: cost_structure_moat
      rule: 'Disruption thesis depends on incumbents being structurally unable to match price. Indicators: sales-led motion,
        enterprise focus (SOC2/SSO/dedicated CSM), VC-funded with burn rate expectations, complex onboarding requiring professional
        services. Lean bootstrapped tool at $49/month = no cost structure moat.

        '
    derivation_interaction: 'When analyst scores competition_gap <65 due to competitor count but observes significant price
      gap, can emit vertical.derived with modification_type=''feature_reframe'' targeting competition_gap improvement via
      price-disruption wedge.

      '
  event_handlers:
    vertical.discovered:
      action: init_scoring
      description: Select rubric, create accumulator, emit scoring.requested
      emits: scoring.requested
    vertical.derived:
      action: derivation_pre_filter
      description: Run pre-filter checks. If passes, create child vertical, emit vertical.discovered
      emits: vertical.discovered
      guard: derivation_pre_filter_passes
    score.dimension_complete:
      action: accumulate_dimension
      description: Add dimension score to accumulator.
      completion_rule: all dimensions in scoring.requested.dimensions_requested have been received
      on_complete:
        composite_above_shortlist:
          condition: composite_score >= {{composite_shortlist}} AND build_complexity >= {{hard_gate_floor}} AND automation_completeness
            >= {{hard_gate_floor}}
          emits: vertical.shortlisted
          advances_to: shortlisted
        composite_marginal_eligible:
          condition: composite_score >= {{hard_gate_floor}} AND composite_score < {{composite_shortlist}} AND count(tier1_dims
            >= 70) >= 2
          emits: vertical.marginal
          advances_to: marginal_review
        composite_below_marginal:
          condition: else
          emits: vertical.rejected
          advances_to: killed
      composite_formula:
        description: Weighted average across 3 tiers
        tier1_weight_percent: 60
        tier2_weight_percent: 30
        tier3_weight_percent: 10
        tier1_dimensions:
        - build_complexity
        - automation_completeness
        - icp_crispness
        - distribution_leverage
        - time_to_value
        - operational_drag
        tier2_dimensions:
        - pain_severity
        - competition_gap
        - monetization_clarity
        tier3_dimensions:
        - retention_architecture
        - expansion_potential
        formula: avg(tier1) * 0.6 + avg(tier2) * 0.3 + avg(tier3) * 0.1
    scoring.contest_resolved:
      action: resolve_contest
      description: Two analysts scored the same vertical. Pick the winner.
      resolution_rule: If spread > {{contest_spread_threshold}} points, use higher score. If spread <= threshold, average
        the two composites.
      policy_ref: prompt-variables.yaml → contest_spread_threshold
  state_schema:
    description: Accumulates dimension scores until all received
    fields:
      vertical_id: uuid
      dimensions_requested: text[]
      dimensions_received: 'jsonb ({dimension: {score, evidence, confidence}})'
      analyst_id: text
      started_at: timestamptz
      completed_at: timestamptz (null until all dimensions in)
campaign_termination:
  _note: 'v2.0.43: With derivation loops, campaigns need termination beyond "all shards complete." The runtime tracks active_scoring_accumulators
    (count of ScoringAccumulators with state != complete) and pending_derivations (count of vertical.derived events in the
    pre-filter queue) per campaign_id.

    '
  rules:
  - id: time_cap
    description: Hard time limit for campaign execution
    rule: campaign.elapsed >= campaign.time_cap (default 24h)
    action: Drop pending derivations with reason='time_cap_exceeded', wait for active scoring to complete or timeout, emit
      campaign.completed
    priority: 1
  - id: budget_exhausted
    description: Campaign budget fully consumed
    rule: campaign.spent >= campaign.budget_cap
    action: Drop pending derivations with reason='budget_exhausted', wait for active scoring to complete, emit campaign.completed
    priority: 2
  - id: queue_drain
    description: No more work pending
    rule: active_scoring_accumulators[campaign_id] == 0 AND pending_derivation_count[campaign_id] == 0
    action: emit campaign.completed
    priority: 3
  - id: depth_exhaustion
    description: All depth-2 verticals scored, no further derivation possible
    rule: all verticals at max depth scored AND no depth < 2 verticals still accumulating
    action: emit campaign.completed (subsumed by queue_drain in practice)
    priority: 4
  tracking:
    active_scoring_accumulators: Count of ScoringAccumulator instances with state in {waiting, accumulating, evaluating, awaiting_contest_resolution}
      grouped by campaign_id
    pending_derivation_count: Count of vertical.derived events received but not yet processed through derivation_pre_filter,
      grouped by campaign_id
    _implementation_note: 'Both counters are maintained in-memory by the scoring-node. active_scoring_accumulators increments
      on vertical.discovered, decrements on state→complete. pending_derivation_count increments on vertical.derived received,
      decrements on pre-filter pass or reject.

      '
scan-orchestrator:
  id: scan-orchestrator
  execution_type: system_node
  implementation: internal/runtime/pipeline/scan_orchestrator.go
  description: 'Manages scan campaigns: dispatches scan.requested to scanner agents, tracks scan completion, handles scan
    timeouts. Pre-workflow — produces events that feed into discovery aggregation.'
  subscribes_to:
  - scan.requested
  - market_research.scan_complete
  - trend_research.scan_complete
  - scanner.google_maps.scan_complete
  - scanner.instagram.scan_complete
  - scanner.reviews.scan_complete
  - scanner.directories.scan_complete
  - scanner.yelp.scan_complete
  - timer.scan_timeout
  - timer.campaign_deadline
  produces:
  - scan.completed
  - pipeline.dead_letter
  owned_transitions: []
  timers:
  - scan_timeout
  - campaign_deadline
  state_table: scan_accumulators
  idempotency_table: system_node_ledger
  event_handlers:
    scan.requested:
      action: dispatch_scanners
      description: Dispatch scanner agents for the requested geography and mode
      mode_to_scanners:
        local_services:
        - google_maps
        - instagram
        - reviews
        - directories
        - yelp
        saas_gap:
        - market_research
        saas_trend:
        - trend_research
        corpus:
        - market_research
    '*.scan_complete':
      action: accumulate_scan
      description: Track scanner completion. When all scanners report or timeout, emit scan.completed
      emits: scan.completed
    timer.scan_timeout:
      action: force_scan_complete
      description: 'Timeout: emit scan.completed with partial results'
      emits: scan.completed
    timer.campaign_deadline:
      action: force_campaign_complete
      description: Global 24h safety net. Force-complete the campaign.
      logic: Drop any pending derivations (reason=time_cap_exceeded). Wait for active scoring to finish or timeout. Emit campaign.completed
        with whatever results exist.
      emits: campaign.completed
  state_schema:
    description: Tracks active scans and accumulates scanner completions
    fields:
      scan_id: uuid (primary key)
      campaign_id: uuid
      geography: text
      mode: text
      expected_scanners: text[] (scanner types dispatched)
      completed_scanners: text[] (scanner types reported)
      started_at: timestamptz
      completed_at: timestamptz (null until done)
      status: text (active | completed | timeout)
discovery-aggregator:
  id: discovery-aggregator
  execution_type: system_node
  implementation: internal/runtime/pipeline/discovery_aggregator.go
  description: Accumulates category.assessed, trend.identified, source.scraped signals. Runs dedup/synthesis. Produces vertical.discovered
    when threshold met. Pre-workflow — feeds into scoring-node.
  subscribes_to:
  - category.assessed
  - trend.identified
  - source.scraped
  - dedup.resolved
  - synthesis.resolved
  produces:
  - vertical.discovered
  - synthesis.needed
  - pipeline.dead_letter
  owned_transitions: []
  timers: []
  state_table: pending_dedup_candidates
  idempotency_table: system_node_ledger
  event_handlers:
    category.assessed:
      action: accumulate_signal
      description: Accumulate discovery signal into scan batch.
      logic: Check signal_strength >= {{signal_threshold}}. If below, discard. If above, check for name dedup against active
        verticals. If duplicate, emit dedup check. If new, emit vertical.discovered.
      on_pass:
        emits: vertical.discovered
      on_dedup:
        emits: synthesis.needed
      on_below_threshold: discard (pre-filter rejection)
      policy_ref: prompt-variables.yaml → signal_threshold
    trend.identified:
      action: accumulate_signal
      description: Accumulate discovery signal into scan batch.
      logic: Check signal_strength >= {{signal_threshold}}. If below, discard. If above, check for name dedup against active
        verticals. If duplicate, emit dedup check. If new, emit vertical.discovered.
      on_pass:
        emits: vertical.discovered
      on_dedup:
        emits: synthesis.needed
      on_below_threshold: discard (pre-filter rejection)
      policy_ref: prompt-variables.yaml → signal_threshold
    source.scraped:
      action: accumulate_signal
      description: Accumulate discovery signal into scan batch.
      logic: Check signal_strength >= {{signal_threshold}}. If below, discard. If above, check for name dedup against active
        verticals. If duplicate, emit dedup check. If new, emit vertical.discovered.
      on_pass:
        emits: vertical.discovered
      on_dedup:
        emits: synthesis.needed
      on_below_threshold: discard (pre-filter rejection)
      policy_ref: prompt-variables.yaml → signal_threshold
    dedup.resolved:
      action: process_dedup
      description: Dedup check completed by discovery-coordinator agent.
      rules:
        is_duplicate: Discard new signal. Log as duplicate.
        is_related: Merge signals — combine evidence, keep higher signal_strength.
        is_distinct: Proceed as new vertical — emit vertical.discovered.
    synthesis.resolved:
      action: process_synthesis
      description: Conflicting signals about same opportunity resolved by discovery-coordinator.
      rules:
        conflict_resolved: Use synthesized result — emit vertical.discovered with merged evidence.
        irreconcilable: Discard both signals. Log conflict.
  state_schema:
    description: Holds signals pending dedup resolution
    fields:
      id: uuid
      opportunity_name: text
      signal_strength: integer
      evidence: jsonb
      status: text (pending | resolved | discarded)
      matched_vertical_id: uuid (null if no match)
      created_at: timestamptz
validation-orchestrator:
  id: validation-orchestrator
  execution_type: system_node
  implementation: internal/runtime/pipeline/validation_orchestrator.go
  description: Manages the 4-gate validation pipeline. Projects stage transitions as gates are satisfied. Handles revision
    loops and rejection paths.
  subscribes_to:
  - vertical.shortlisted
  - research.completed
  - spec.revision_requested
  - spec.approved
  - spec.validation_passed
  - spec.validation_failed
  - cto.spec_approved
  - cto.spec_revision_needed
  - cto.spec_vetoed
  - brand.candidates_ready
  - brand.revision_needed
  - vertical.ready_for_review
  - vertical.needs_more_data
  - research.vertical_rejected
  - spec.revision_needed
  produces:
  - validation.started
  - spec.validation_requested
  - cto.spec_review_requested
  - spec.revision_requested
  - brand.requested
  - validation.more_data_needed
  - brand.revision_needed
  - validation.package_ready
  - vertical.killed
  - pipeline.dead_letter
  owned_transitions:
  - shortlisted_to_researching
  - researching_to_mvp_speccing
  - mvp_speccing_to_cto_review
  - cto_review_to_branding
  - branding_to_ready
  - validation_failed_to_speccing
  - cto_revision_to_speccing
  - researching_to_killed
  - cto_vetoed_to_killed
  timers: []
  state_table: validation_pipelines
  idempotency_table: system_node_ledger
  gate_state:
    description: Tracks 4 validation gates per vertical
    gates:
    - g1_research
    - g2_spec
    - g3_cto
    - g4_brand
    storage: validation_pipelines.gate_state JSONB
  event_handlers:
    vertical.shortlisted:
      action: init_validation_pipeline
      sets_gate: null
      emits: validation.started
      advances_to: researching
    research.completed:
      action: set_gate
      sets_gate: g1_research
      emits: null
      advances_to: mvp_speccing
    spec.approved:
      action: set_gate
      sets_gate: g2_spec
      emits: cto.spec_review_requested
      advances_to: cto_spec_review
    cto.spec_approved:
      action: set_gate
      sets_gate: g3_cto
      emits: brand.requested
      advances_to: branding
    brand.candidates_ready:
      action: set_gate
      sets_gate: g4_brand
      emits: validation.package_ready
      advances_to: ready_for_review
      condition: all_gates_met
    spec.validation_failed:
      action: revision_loop
      emits: spec.revision_requested
      advances_to: mvp_speccing
      guard: inner_revision_count_below_limit
    cto.spec_revision_needed:
      action: revision_loop
      emits: spec.revision_requested
      advances_to: mvp_speccing
      guard: inner_revision_count_below_limit
    research.vertical_rejected:
      action: kill_vertical
      emits: vertical.killed
      advances_to: killed
    cto.spec_vetoed:
      action: kill_vertical
      emits: vertical.killed
      advances_to: killed
  state_schema:
    description: Tracks 4 validation gates and revision count per vertical
    fields:
      vertical_id: uuid
      gate_state: 'jsonb ({g1_research: bool, g2_spec: bool, g3_cto: bool, g4_brand: bool})'
      revision_count: integer default 0
      started_at: timestamptz
      completed_at: timestamptz (null until all gates or killed)
lifecycle-orchestrator:
  id: lifecycle-orchestrator
  execution_type: system_node
  implementation: internal/runtime/pipeline/lifecycle_orchestrator.go
  description: Manages factory→operating handoff (vertical.approved → OpCo spinup) and operating lifecycle transitions. Also
    handles marginal review, vertical kill/resume, and runtime reset.
  subscribes_to:
  - vertical.approved
  - vertical.killed
  - vertical.resumed
  - opco.ceo_ready
  - timer.marginal_review
  - timer.marginal_kill
  - timer.portfolio_digest
  - runtime.reset
  - build_complete
  - launch_ready
  - opco.steady_state_reached
  - qa.validation_passed
  - review.deploy_feedback
  - opco.growth_triggered
  - opco.growth_stabilized
  - system.directive
  - mailbox.item_decided
  - budget.threshold_crossed
  produces:
  - opco.spinup_requested
  - vertical.killed
  - pipeline.dead_letter
  owned_transitions:
  - approved_to_full_speccing
  timers:
  - marginal_review_timer
  - marginal_kill_timer
  - portfolio_digest_timer
  state_table: null
  idempotency_table: system_node_ledger
  event_handlers:
    vertical.approved:
      action: emit_spinup
      emits: opco.spinup_requested
      advances_to: approved
    vertical.killed:
      action: mark_killed
      advances_to: killed
    vertical.resumed:
      action: promote_marginal
      advances_to: researching
      guard: pipeline_has_capacity
    opco.ceo_ready:
      action: spinup_opco_org
      advances_to: full_speccing
    timer.marginal_review:
      action: review_marginal
      description: Re-evaluate parked marginal verticals.
      rules:
        pipeline_has_capacity: 'Notify EC via agent_message to decide: promote, extend park, or kill.'
        pipeline_full: Extend park timer by {{marginal_park_days}} days. No action.
      policy_ref: prompt-variables.yaml → marginal_park_days, pipeline_capacity_max
    timer.marginal_kill:
      action: auto_kill_stale_marginal
      description: Kill marginals parked > 60 days with no new signals
      advances_to: killed
    timer.portfolio_digest:
      action: compile_digest
      description: Compile portfolio status for EC.
      logic: 'Query all active verticals. Build summary: stage counts, pending mailbox items, spend totals. Emit portfolio.digest_compiled
        to empire-coordinator.'
      emits: portfolio.digest_compiled
    runtime.reset:
      action: reset_pipeline_state
      description: Clear all in-flight pipeline state.
      logic: Truncate scan_accumulators, reset validation_pipelines, clear pending_dedup_candidates, cancel all active timers.
        Does NOT touch verticals table or events table.
