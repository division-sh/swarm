category.assessed:
  emitter: market-research-agent
  consumer: runtime
  consumer_type: system_component
  intercepted: true
  passthrough: false
  routing: static
  delivery_channel: runtime
  payload:
    scan_id: string
    category: string
    subcategory: string
    geography: string
    signal_strength: integer
    opportunity_name: string
    preliminary_icp: string
    build_sketch:
      type: object
      properties:
        core_features:
          type: array
          items: string
        key_integrations:
          type: array
          items: string
        red_flags:
          type: array
          items:
            type: object
            properties:
              notes: string
              source_url: string
              type: string
    evidence:
      type: object
      properties:
        buyer_communities:
          type: array
          items:
            type: object
            properties:
              name: string
              source_url: string
        competitors:
          type: array
          items:
            type: object
            properties:
              name: string
              pricing: string
              source_url: string
        pain_signals:
          type: array
          items:
            type: object
            properties:
              signal: string
              source_url: string
        regulatory:
          type: array
          items:
            type: object
            properties:
              detail: string
              source_url: string
    opportunity_hypothesis: string
    geographic_scope: string
    opportunity_pattern: string
    signal_sources:
      type: array
      items:
        type: object
        properties:
          signal_type: string
          source: string
          url: string
    required_capabilities:
      type: object
      properties:
        automation_with_unlock: number
        current:
          type: array
          items: string
        would_unlock: string
  required:
  - scan_id
  - category
  - subcategory
  - geography
  - signal_strength
  - opportunity_name
  - preliminary_icp
  - build_sketch
  - evidence
  - opportunity_hypothesis
  - geographic_scope
  notes: 'v2.0.40: Multi-signal model — MRA emits 0-N signals per subcategory. Each signal is one opportunity. automation_micro
    nested field removed. Runtime pre-filter applies ICP positive check, evidence completeness, and red flag filtering before
    emitting vertical.discovered. geographic_scope indicates if opportunity is geography-locked or global. v2.2.0: opportunity_pattern,
    signal_sources, and required_capabilities added. In corpus mode, category/subcategory may be null (MRA assigns from signal
    content). signal_sources tracks provenance for yield analysis.'
  emitter_type: agent
  runtime_handling: consuming
  owning_node: discovery-aggregator
