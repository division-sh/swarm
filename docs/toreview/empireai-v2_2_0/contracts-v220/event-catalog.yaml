vertical.derived:
  emitter: analysis-agent
  consumer: scoring-node
  consumer_type: system_component
  intercepted: true
  passthrough: false
  routing: static
  delivery_channel: eventbus_static
  runtime_handling: projection
  payload:
    opportunity_id: string
    parent_id: string
    generation_depth: integer
    generator_agent_id: string
    campaign_id: string
    derivation_rationale:
      type: object
    opportunity_name: string
    preliminary_icp: string
    build_sketch:
      type: object
    evidence:
      type: object
    geographic_scope: string
    signal_strength: number
    discovery_context:
      type: object
  required:
  - parent_id
  - generation_depth
  - generator_agent_id
  - derivation_rationale
  _constraints:
    generation_depth_max: 2
    max_derivations_per_parent: 2
    modification_types:
    - icp_shift
    - distribution_pivot
    - scope_reduction
    - market_adjacency
    - feature_reframe
    anti_bias: generator_agent_id excluded from analyst assignment for this vertical
  _note: 'v2.0.43: Analyst derivation loop. Analysis Agent may emit 0-2 vertical.derived events per scored vertical (hard
    max enforced by tool execution layer, not just prompt). Derived verticals enter scoring-node pre-filter, survivors become
    vertical.discovered with discovery_mode=''derived''. Scored by different analyst instance (anti-bias guarantee). discovery_context.parent_scores
    is intentionally omitted — scoring analyst must NOT see parent''s actual scores, only which dimensions were weak and why
    (names + reasons).

    '
  emitter_type: agent
  owning_node: scoring-node
