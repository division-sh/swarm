- id: xval-system-node-emitter-consistency
  name: System node producers match event-catalog emitters
  priority: must_pass
  category: events
  command: "python3 -c \" import yaml nodes = yaml.safe_load(open('contracts/system-nodes.yaml')) catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))\
    \ errors = [] for node_id, node in nodes.items():\n  if not isinstance(node, dict) or 'produces' not in node: continue\n\
    \  for event in node['produces']:\n    if event in catalog:\n      emitter = catalog[event].get('emitter', '')\n     \
    \ if emitter != node_id and emitter != 'runtime':\n        errors.append(f'{event}: system-nodes says {node_id}, catalog\
    \ says {emitter}')\nif errors:\n  for e in errors: print(f'MISMATCH: {e}')\n  exit(1)\nprint(f'PASS: all system-node producer\
    \ events match catalog emitters') \"\n"
  pass_criteria: Every event in system-nodes.yaml produces list has matching emitter in event-catalog.yaml
  introduced: 2.0.41
  notes: Catches the v2.0.37-40 pattern where scoring.contested emitter drifted between runtime and scoring-node.
  automated: TestContractCompliance/emit_events
- id: xval-consumer-type-resolvable
  name: 'All consumer_type: agent consumers resolve to known agent IDs'
  priority: must_pass
  category: events
  command: "python3 -c \" import yaml catalog = yaml.safe_load(open('contracts/event-catalog.yaml')) agents = yaml.safe_load(open('contracts/agent-tools.yaml'))\
    \ agent_ids = {k for k,v in agents.items() if isinstance(v, dict) and 'type' in v} agent_ids.add('mailbox')  # special\
    \ sink errors = [] for event, spec in catalog.items():\n  if not isinstance(spec, dict): continue\n  if spec.get('consumer_type')\
    \ != 'agent': continue\n  consumer = spec.get('consumer', '')\n  consumers = [consumer] if isinstance(consumer, str) else\
    \ consumer\n  for c in consumers:\n    c = c.split('#')[0].strip()\n    if c not in agent_ids:\n      errors.append(f'{event}:\
    \ consumer {c} not in agent-tools.yaml')\nif errors:\n  for e in errors: print(f'UNRESOLVABLE: {e}')\n  exit(1)\nprint(f'PASS:\
    \ all agent consumers resolve to known agent IDs') \"\n"
  pass_criteria: 'Every event with consumer_type: agent has a consumer value matching an agent-tools.yaml ID'
  introduced: 2.0.41
  notes: Catches the old pattern of freeform consumer strings that can't be machine-verified.
  automated: null
