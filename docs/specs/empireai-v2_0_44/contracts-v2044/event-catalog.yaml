  - geographic_scope
  - opportunity_pattern
  - signal_sources
  - required_capabilities
  notes: 'v2.0.40: Multi-signal model — MRA emits 0-N signals per subcategory. Each signal is one opportunity. automation_micro
    nested field removed. Runtime pre-filter applies ICP positive check, evidence completeness, and red flag filtering before
    emitting vertical.discovered. geographic_scope indicates if opportunity is geography-locked or global. v2.0.44: opportunity_pattern,
    signal_sources, and required_capabilities added. In corpus mode, category/subcategory may be null (MRA assigns from signal
    content). signal_sources tracks provenance for yield analysis.'
  emitter_type: agent
