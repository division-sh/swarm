platform:
  name: mas-orchestrator
  version: 0.1.0
vocabulary:
  stage:
    description: 'A named state in a workflow. An entity (e.g. a vertical, a ticket, a document) is always in exactly one
      stage. Stages belong to phases for grouping. Some stages are terminal (no outgoing transitions).

      '
    required_fields:
    - id
    - phase
    optional_fields:
    - description
  transition:
    description: 'A directed edge between two stages. Fires when a trigger event arrives AND all guards pass. On fire, executes
      actions and moves the entity to the target stage. A transition is owned by exactly one participant (system_node, agent,
      or runtime). Ownership means: this participant''s code/logic decides whether the transition fires.'
    required_fields:
    - id
    - from
    - to
    - trigger
    - node
    optional_fields:
    - guards
    - actions
  guard:
    description: 'A named boolean check evaluated before a transition fires. If any guard returns false, the transition is
      blocked. Guards are code-backed — the ID maps to a function.

      '
    required_fields:
    - id
    - category
    - description
    optional_fields:
    - input
    - check
    - policy_ref
  action:
    description: 'A named side effect executed when a transition fires. Actions are code-backed — the ID maps to a function.

      '
    required_fields:
    - id
    - category
    - description
    optional_fields:
    - effect
    - emits
  timer:
    description: 'A time-based trigger attached to a stage. When the delay elapses, the platform emits the timer''s event,
      which can trigger a transition.

      '
    required_fields:
    - id
    - stage
    - event
    - owner
    optional_fields:
    - delay_seconds
    - delay_minutes
    - delay_hours
    - delay_days
    - cancellation
    - recurring
  participant:
    description: 'An entity that owns transitions, handles events, and executes logic. Three execution types with different
      semantics.

      '
    types:
      system_node:
        description: 'Deterministic code. No LLM. Subscribes to events, executes fixed logic, emits events. Owns workflow
          transitions. Examples: scoring-node, validation-orchestrator.

          '
        execution: deterministic
        has_prompt: false
        has_model: false
      agent:
        description: LLM-powered. Has a system prompt, model tier, conversation mode. Subscribes to events, reasons about
          them, calls tools. Can own workflow transitions where the stage change requires LLM judgment (e.g. promote/kill
          decisions, build readiness). Agents produce events that may also trigger transitions owned by system nodes.
        execution: llm
        has_prompt: true
        has_model: true
      runtime:
        description: 'The platform itself. Handles transitions that are implicit (human decisions, system lifecycle). Not
          declared in any contract — always available.

          '
        execution: implicit
        has_prompt: false
        has_model: false
contract_formats:
  workflow_definition:
    description: State machine definition for one workflow
    filename_pattern: workflow-{name}.yaml
    schema:
      workflow:
        name: string
        version: string
        entity: string
        entity_table: string
        state_field: string
        initial_stage: string
        stages: list_of_stage
        terminal_stages: list_of_string
        transitions: list_of_transition
        timers: list_of_timer
  hook_registry:
    description: Named guards and actions for one workflow
    filename_pattern: hooks-{name}.yaml
    schema:
      guards: list_of_guard
      actions: list_of_action
    notes: 'Platform-category hooks are reusable across workflows. Workflow-category hooks are specific to one workflow. The
      platform ships with a set of built-in platform hooks.

      '
  node_definition:
    description: System node contract for one workflow
    filename_pattern: nodes-{name}.yaml
    schema:
      '{node_id}':
        id: string
        execution_type: string
        implementation: string
        subscribes_to: list_of_string
        produces: list_of_string
        owned_transitions: list_of_string
        state_table: string
        idempotency_table: string
        timers: list_of_string
    notes: 'Each node''s owned_transitions must cross-reference the workflow definition. The union of all nodes'' owned_transitions
      must cover every non-runtime transition in the workflow.

      '
  event_catalog:
    description: Event definitions for one workflow
    filename_pattern: events-{name}.yaml
    schema:
      '{event_type}':
        emitter: string
        emitter_type: string
        consumer: string
        consumer_type: string
        delivery_channel: string
        payload: object
        required: list_of_string
    notes: 'The platform uses the catalog for schema validation, routing verification, and compliance checks.

      '
  agent_registry:
    description: Agent definitions for one workflow
    filename_pattern: agents-{name}.yaml
    schema:
      '{agent_id}':
        id: string
        type: string
        role: string
        model_tier: string
        subscriptions: list_of_string
        subscriptions_bootstrap: list_of_string
        tools_tier2: list_of_string
        emit_events: list_of_string
  tool_registry:
    description: Tool input schemas
    filename_pattern: tools-{name}.yaml
    schema:
      '{tool_id}':
        category: string
        description: string
        input_schema: json_schema_object
  policy_definition:
    description: Workflow-specific configuration values referenced by guards and prompts
    filename_pattern: policy-{name}.yaml
    schema:
      '{key}': value (scalar, list, or object)
    notes: Guards reference policy values via policy_ref. Prompts reference via {{key}} syntax. The platform template engine
      substitutes values at runtime.
  prompt_contract:
    description: Agent system prompts with template variable support
    filename_pattern: prompts/{agent-id}.md
    schema: Markdown with {{variable}} tokens resolved from policy file
    notes: One file per agent. Mode variants use {agent-id}.{mode}.md. Integrity verified via sha256 manifest.
workflow_state:
  description: 'Every workflow instance (e.g. one vertical, one ticket) has persistent state managed by the platform. This
    is the schema.

    '
  fields:
    instance_id:
      type: uuid
      description: Primary key — the entity being tracked
    workflow_name:
      type: string
      description: Which workflow this instance belongs to
    workflow_version:
      type: string
      description: Version of the workflow definition at creation
    current_stage:
      type: string
      description: Current stage ID
    entered_stage_at:
      type: timestamp
      description: When the current stage was entered
    transition_history:
      type: jsonb_array
      description: 'Ordered list of transitions fired: [{transition_id, from, to, trigger_event_id, fired_at, guards_evaluated}]

        '
    accumulator_state:
      type: jsonb
      description: 'Per-node state buckets. Each system node can store structured state here (e.g. scoring accumulator, gate
        flags). Keyed by node_id.

        '
    timer_state:
      type: jsonb
      description: 'Active timers: [{timer_id, created_at, fires_at, cancelled}]

        '
    metadata:
      type: jsonb
      description: Workflow-specific metadata (revision counts, etc.)
  ddl: "CREATE TABLE workflow_instances (\n    instance_id       UUID PRIMARY KEY,\n    workflow_name     TEXT NOT NULL,\n\
    \    workflow_version  TEXT NOT NULL,\n    current_stage     TEXT NOT NULL,\n    entered_stage_at  TIMESTAMPTZ NOT NULL\
    \ DEFAULT NOW(),\n    transition_history JSONB NOT NULL DEFAULT '[]',\n    accumulator_state JSONB NOT NULL DEFAULT '{}',\n\
    \    timer_state       JSONB NOT NULL DEFAULT '[]',\n    metadata          JSONB NOT NULL DEFAULT '{}',\n    created_at\
    \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\nCREATE INDEX\
    \ idx_wi_workflow ON workflow_instances(workflow_name, current_stage);\nCREATE INDEX idx_wi_stage ON workflow_instances(current_stage);\n"
builtin_hooks:
  guards:
  - id: has_entity_id
    description: Payload contains a valid entity ID
  - id: not_in_terminal_stage
    description: Entity is not in a terminal stage
  - id: revision_count_below_limit
    description: Revision counter hasn't exceeded max
    config_key: max_revisions
  - id: has_human_decision
    description: Transition was triggered by a human decision
  - id: stage_in_phase
    description: Entity's current stage belongs to the specified phase
    config_key: required_phase
  actions:
  - id: increment_revision_count
    description: Increment metadata.revision_count
  - id: record_transition
    description: Append to transition_history (always runs, implicit)
  - id: update_stage
    description: Set current_stage to transition.to (always runs, implicit)
  - id: cancel_stage_timers
    description: Cancel all timers scoped to the departed stage (always runs, implicit)
  - id: start_stage_timers
    description: Start all timers scoped to the entered stage (always runs, implicit)
  notes: 'record_transition, update_stage, cancel_stage_timers, and start_stage_timers are implicit — the platform executes
    them on every transition automatically. They do NOT appear in workflow hook registries. The remaining builtins (has_entity_id,
    not_in_terminal_stage, revision_count_below_limit, has_human_decision, stage_in_phase) are abstract. Workflows bind them
    to concrete implementations via aliases. Example: Empire binds has_entity_id → has_vertical_id, revision_count_below_limit
    → inner_revision_count_below_limit.'
compliance_rules:
  graph_structure:
  - id: initial_stage_exists
    rule: workflow.initial_stage is in workflow.stages[].id
  - id: terminal_stages_exist
    rule: every ID in workflow.terminal_stages is in workflow.stages[].id
  - id: no_outgoing_from_terminal
    rule: 'No transition has from == terminal_stage_id, unless explicitly marked allow_terminal_exit: true

      '
  - id: all_stages_reachable
    rule: 'Every stage is reachable from initial_stage via some chain of transitions (BFS/DFS from initial_stage)

      '
  - id: no_orphan_transitions
    rule: 'Every transition''s from and to stage IDs exist in workflow.stages (or from == "*" for wildcard transitions)

      '
  hook_resolution:
  - id: guards_resolve
    rule: Every guard ID in any transition exists in the hook registry or platform builtins
  - id: actions_resolve
    rule: Every action ID in any transition exists in the hook registry or platform builtins
  participant_existence:
  - id: transition_nodes_exist
    rule: 'Every transition.node exists in the node definition file, the agent registry, or is "runtime"

      '
  - id: timer_owners_exist
    rule: Every timer.owner exists as a participant
  event_consistency:
  - id: trigger_events_exist
    rule: Every transition.trigger exists in the event catalog
  - id: timer_events_exist
    rule: Every timer.event exists in the event catalog
  - id: action_emits_exist
    rule: 'Every action with an emits field — that event exists in the event catalog

      '
  node_coverage:
  - id: transitions_covered
    rule: 'The union of all nodes'' owned_transitions covers every transition where node != "runtime"

      '
  - id: subscriptions_match
    rule: 'Every event a node is supposed to handle (from owned_transitions triggers) appears in that node''s subscribes_to,
      OR the node is the emitter of that event

      '
  wiring:
  - id: emitters_declared
    rule: 'Every event with an agent emitter — that agent''s emit_events includes the event

      '
  - id: consumers_subscribed
    rule: 'Every event with an agent consumer — that agent''s subscriptions or subscriptions_bootstrap includes the event

      '
versioning:
  platform_version:
    description: Version of this platform spec
    current: 0.1.0
    changes_when: Platform vocabulary, contract formats, compliance rules, or builtins change
  workflow_version:
    description: Version of a specific workflow definition
    example: empire_vertical_pipeline v2.2.1
    changes_when: Stages, transitions, guards, actions, timers, or nodes change
  notes: 'Platform version and workflow version are independent. A workflow can upgrade (add stages, transitions) without
    a platform change. A platform upgrade (new builtin hooks, new compliance rules) may require workflow definitions to be
    updated if they violate new rules.

    '
file_layout:
  description: 'Each workflow has its own directory under contracts/. Platform files live at contracts/platform/. Workflow-specific
    files live at contracts/{workflow_name}/.

    '
  example: "contracts/\n  platform/\n    platform-spec.yaml          # this file\n  empire/\n    workflow-empire.yaml    \
    \     # stages, transitions, timers\n    hooks-empire.yaml            # guards, actions\n    nodes-empire.yaml       \
    \     # system nodes\n    events-empire.yaml           # event catalog\n    agents-empire.yaml           # agent registry\n\
    \    tools-empire.yaml            # tool schemas\n    policy-empire.yaml           # thresholds, enums (was prompt-variables.yaml)\n\
    \    prompts/                     # agent prompts\n  # future workflows:\n  support/\n    workflow-support.yaml\n    hooks-support.yaml\n\
    \    ...\n"
  migration_note: 'The current v2.0.50 file layout uses flat names (workflow-schema.yaml, guard-action-registry.yaml). The
    platform convention renames these to follow the pattern. Migration is a rename + content verification, not a content change.

    '
