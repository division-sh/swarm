guards:
- id: has_vertical_id
  category: platform
  description: Payload contains a valid, non-empty vertical_id
  input: event.payload
  check: event.payload.vertical_id is non-empty UUID
- id: has_human_decision
  category: platform
  description: Transition triggered by a human mailbox decision
  input: event.source
  check: event originated from mailbox decision path
- id: not_in_operating_phase
  category: platform
  description: Vertical is not in an operating phase stage
  input: workflow_state.stage
  check: stage not in [launched, operating, expanding]
- id: inner_revision_count_below_limit
  category: platform
  description: Revision loop hasn't exceeded maximum iterations
  input: workflow_state.metadata.revision_count
  check: revision_count < max_revisions (default 3)
- id: signal_above_threshold
  category: empire
  description: Signal strength meets pre-filter minimum
  input: event.payload.signal_strength
  check: signal_strength >= {{signal_threshold}}
  policy_ref: prompt-variables.yaml → signal_threshold
- id: composite_above_shortlist
  category: empire
  description: Composite score meets shortlist threshold
  input: scoring_state.composite_score
  check: composite_score >= {{composite_shortlist}}
  policy_ref: prompt-variables.yaml → composite_shortlist
- id: composite_in_marginal_range
  category: empire
  description: Composite in marginal range with promotion eligibility
  input: scoring_state.composite_score
  check: composite_score >= {{composite_marginal_low}} AND composite_score < {{composite_shortlist}} AND tier1_dims_above_70
    >= {{marginal_tier1_dimensions_above_70}}
  policy_ref: prompt-variables.yaml → composite_marginal_low, composite_shortlist, marginal_tier1_dimensions_above_70
- id: composite_below_marginal
  category: empire
  description: Composite too low for marginal consideration
  input: scoring_state.composite_score
  check: composite_score < {{composite_marginal_low}} OR (composite_in_range AND NOT marginal_promotion_eligible)
  policy_ref: prompt-variables.yaml → composite_marginal_low
- id: both_hard_gates_pass
  category: empire
  description: Both hard gate dimensions meet floor
  input: scoring_state.dimensions
  check: build_complexity >= {{hard_gate_floor}} AND automation_completeness >= {{hard_gate_floor}}
  policy_ref: prompt-variables.yaml → hard_gate_floor
- id: marginal_promotion_eligible
  category: empire
  description: Marginal vertical has enough strong dimensions for promotion
  input: scoring_state.dimensions
  check: count(tier1_dims where score >= 70) >= {{marginal_tier1_dimensions_above_70}}
  policy_ref: prompt-variables.yaml → marginal_tier1_dimensions_above_70
- id: pipeline_has_capacity
  category: empire
  description: Fewer than max verticals in validation pipeline
  input: workflow_state_aggregate
  check: count(verticals in [researching..ready_for_review]) < {{pipeline_capacity_max}}
  policy_ref: prompt-variables.yaml → pipeline_capacity_max
- id: gate_g1_research
  category: empire
  description: 'Validation Gate 1: business research completed'
  input: validation_state.gates
  check: g1_research = true
- id: gate_g2_spec
  category: empire
  description: 'Validation Gate 2: spec review passed'
  input: validation_state.gates
  check: g2_spec = true
- id: gate_g3_cto
  category: empire
  description: 'Validation Gate 3: CTO approved spec'
  input: validation_state.gates
  check: g3_cto = true
- id: gate_g4_brand
  category: empire
  description: 'Validation Gate 4: brand candidates ready'
  input: validation_state.gates
  check: g4_brand = true
- id: all_gates_met
  category: empire
  description: All 4 validation gates are true
  input: validation_state.gates
  check: g1 AND g2 AND g3 AND g4
- id: spec_validation_passed
  category: empire
  description: Spec Auditor validated the full product spec
  input: event.type
  check: inbound spec.validation_passed event exists
- id: qa_passed
  category: empire
  description: QA agent approved the build
  input: event.type
  check: inbound qa.validation_passed event exists
- id: deploy_approved
  category: empire
  description: Deploy review passed
  input: event.type
  check: inbound review.deploy_feedback with decision=approved
- id: no_blocking_red_flags
  category: empire
  description: No blocking red flags in build sketch
  input: event.payload.build_sketch.red_flags
  check: no red_flag.type in {{blocking_red_flags}}
  policy_ref: prompt-variables.yaml → blocking_red_flags
- id: has_retention_primitive
  category: empire
  description: At least one retention primitive present
  input: event.payload
  check: retention_primitives count >= 1
  policy_ref: prompt-variables.yaml → retention_primitives
- id: evidence_sufficient
  category: empire
  description: Minimum evidence URLs present
  input: event.payload.evidence
  check: competitors count >= 1 AND pain_signals count >= 1
actions:
- id: increment_revision_count
  category: platform
  description: Increment the revision counter in workflow metadata
  effect: workflow_state.metadata.revision_count += 1
- id: spinup_opco_org
  category: platform
  description: Create the operating company agent organization
  effect: AgentManager creates 13-agent org from template
- id: begin_teardown
  category: platform
  description: Initiate OpCo teardown sequence
  effect: AgentManager terminates all agents, drops schemas
- id: select_rubric
  category: empire
  description: Select scoring rubric based on discovery mode
  effect: Set rubric field on scoring.requested payload
- id: emit_scoring_requested
  category: empire
  description: Dispatch scoring to analysis agent
  emits: scoring.requested
- id: emit_vertical_shortlisted
  category: empire
  description: Mark vertical as shortlisted, enter validation
  emits: vertical.shortlisted
- id: emit_vertical_marginal
  category: empire
  description: Mark vertical as marginal, queue for EC review
  emits: vertical.marginal
- id: emit_vertical_rejected
  category: empire
  description: Mark vertical as rejected
  emits: vertical.rejected
- id: emit_vertical_resumed
  category: empire
  description: Promote marginal vertical back into pipeline
  emits: vertical.resumed
- id: emit_spec_validation_requested
  category: empire
  description: Dispatch CTO spec review
  emits: spec.validation_requested
- id: emit_validation_package_ready
  category: empire
  description: All gates met, package for human review
  emits: validation.package_ready
- id: emit_opco_spinup_requested
  category: empire
  description: Request OpCo creation
  emits: opco.spinup_requested
- id: emit_validation_started
  category: empire
  description: Initiate validation pipeline for shortlisted vertical
  emits: validation.started
