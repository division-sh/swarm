test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [item.arrived]
  produces: [collection.done]
  event_handlers:
    item.arrived:
      accumulate:
        expected_from: entity.expected_count
        completion: all
      advances_to: complete
      emit:
        event: collection.done
        broadcast: true
  state_schema:
    fields:
      expected_count: integer
      received_items: jsonb
