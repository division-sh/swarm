platform:
  name: swarm-orchestrator
  version: 1.6.0
vocabulary:
  state_change: A transition in the entity state machine, triggered by an advances_to handler field.
  guard:
    description: A boolean check evaluated before handler execution. If any guard check fails, the handler is blocked. Guards
      use CEL expressions evaluated against entity, payload, and policy context.
    on_fail_actions:
    - reject (default)
    - discard
    - kill
    - escalate:{event}
  action:
    description: 'A platform-provided operation executed as the final step of a handler. Only two valid actions exist: create_flow_instance
      and record_evidence. Product-specific actions are not supported.'
  timer:
    description: 'A time-based trigger attached to a stage. When the delay elapses, the platform emits the timer''s event,
      which can trigger a transition.

      '
    required_fields:
    - id
    - state
    - event
    - owner
    optional_fields:
    - delay_seconds
    - delay_minutes
    - delay_hours
    - delay_days
    - cancellation
    - recurring
  agent_role:
    description: 'An entity that owns transitions, handles events, and executes logic. Three execution types with different
      semantics.

      '
    types:
      system_node:
        description: 'Deterministic code. No LLM. Subscribes to events, executes fixed logic, emits events. Owns workflow
          transitions. Examples: order-orchestrator, ticket-router.

          '
        execution: deterministic
        has_prompt: false
        has_model: false
      agent:
        description: LLM-powered. Has a system prompt, model tier, conversation mode. Subscribes to events, reasons about
          them, calls tools. Can own workflow transitions where the stage change requires LLM judgment (e.g. promote/kill
          decisions, build readiness). Agents produce events that may also trigger transitions owned by system nodes.
        execution: llm
        has_prompt: true
        has_model: true
      runtime:
        description: 'The platform itself. Handles transitions that are implicit (human decisions, system lifecycle). Not
          declared in any contract — always available.

          '
        execution: implicit
        has_prompt: false
        has_model: false
  flow:
    description: A self-contained building block with input/output pins (events and data), system nodes that orchestrate state
      transitions, and required agent roles. The marketplace unit. Analogous to an IC chip in circuit design.
    required_files:
    - nodes.yaml
    - events.yaml
    - schema.yaml
  flow_identity:
    description: 'A flow has two distinct identity concepts that are NOT interchangeable.'
    flow_scope_key:
      description: 'Semantic namespace derived from the flow''s position in the contract tree.
        Identifies the flow TYPE and its logical position, not a specific running instance.
        Example: scoring, validation, operating/build. Used for: gate projection namespaces,
        ownership comparisons, event scoping, contract-level references.'
      examples:
      - scoring
      - validation
      - operating/build
    flow_instance_path:
      description: 'Concrete running instance identity. Includes the instance ID for template flows.
        Identifies a specific execution. Example: operating/vert-001. Used for: entity_state.flow_instance,
        routing_rules.flow_instance, instance lifecycle management.'
      examples:
      - scoring (static flow — scope key and instance path are the same)
      - operating/vert-001 (template instance — scope key is "operating", instance path includes the ID)
    not_interchangeable: 'These are not interchangeable. Using instance path where scope key is needed
      causes prefix-based ownership bugs. Using scope key where instance path is needed causes
      cross-instance state leakage. The runtime MUST use the correct identity for each context.'
    flow_entity_id: 'The canonical entity identity within a flow is scoped by the concrete instance
      path, but cardinality depends on the flow kind. A static flow instance may create many
      entity_state rows over time; a template flow instance typically owns one entity_state row.
      The runtime MUST NOT maintain competing identities for the same entity row or blur flow-instance
      identity with entity identity.'
  state:
    description: 'A named state in a workflow. An entity (e.g. a ticket, an order, a document) is always in exactly one
      state. States belong to phases for grouping. Some states are terminal (no outgoing transitions).

      '
    required_fields:
    - id
    - phase
    optional_fields:
    - description
contract_formats:
  description: Canonical format for all flow contract files.
  loader_defaults:
    description: Fields that are optional in contract YAML because the loader derives them from context.
    schema_name: Optional. If omitted, derived from the directory name of the flow package. A flow at flows/intake/ gets
      name "intake" automatically.
    schema_namespace: Optional. If omitted, derived from the flow path relative to root. A flow at flows/intake/ gets namespace
      "intake". Root flow gets empty namespace.
    agent_id: 'Optional. If omitted, the YAML map key IS the agent ID. agents.yaml uses map keys as canonical identifiers:
      {"classifier-agent": {model_tier: sonnet, ...}} means agent_id = "classifier-agent". Explicit id field overrides the
      map key if present, but this is discouraged.'
    agent_emit_events: Optional. If omitted, defaults to empty list []. An agent that only observes (subscribes but never
      emits) may omit emit_events entirely.
  file_layout:
    description: Every flow has the same directory structure. The root flow is the entry point. Flows nest via flows/ subdirectories.
      The runtime/ bridge provides merged flat files for flat file loaders.
    structure: "\n{root_flow}/                         # Root flow (entry point)\n  package.yaml                       # Manifest:\
      \ name, version, flows, handoffs\n  schema.yaml                        # Flow pins + state machine\n  nodes.yaml \
      \                        # Root-level system nodes\n  events.yaml                        # Root-level events (flat payload\
      \ declarations)\n  entities.yaml                      # Root-level entity contracts (rare)\n  types.yaml         \
      \                # Shared named types / enums / scalar aliases\n  agents.yaml                        # Root-level agents\n\
      \  tools.yaml                         # Shared tools\n  policy.yaml                        # Shared policy\n  prompts/\
      \                           # Root-level agent prompts\n  runtime/                           # Merged flat files for\
      \ flat file loader\n    nodes.yaml\n    events.yaml\n    entities.yaml\n    types.yaml\n    agents.yaml\n    tools.yaml\n\
      \    policy.yaml\n  flows/\n    {child_flow}/                    # Child flow (same structure, recursive)\n      package.yaml\n\
      \      schema.yaml\n      nodes.yaml\n      events.yaml\n      entities.yaml                  # Flow-owned entity contract\
      (optional)\n      types.yaml                     # Flow-local types (optional)\n      agents.yaml\n      tools.yaml\
      \                    # Optional\n      policy.yaml                   # Optional\n      prompts/\n      flows/      \
      \                   # Grandchild flows (if any)\n        {grandchild}/\n          package.yaml\n          ...\n\n\
      platform/                            # Platform contracts (separate from any flow)\n  package.yaml\n  platform-spec.yaml\n"
  minimum_flow_package:
    required_files:
    - package.yaml
    - schema.yaml
    optional_files:
    - nodes.yaml
    - events.yaml
    - entities.yaml
    - types.yaml
    - agents.yaml
    - tools.yaml
    - policy.yaml
    optional_directories:
    - prompts/
    - flows/
    rule: A flow with no agents needs no prompts/. A flow with no handlers needs no nodes.yaml. A flow with no events needs
      no events.yaml.
  entity_schema:
    description: |
      `package.yaml.entity_schema` is retired. Authoritative entity
      contracts now live in `entities.yaml`, owned by the flow whose
      directory contains the file. The platform derives DDL and entity
      tool validation from those entity contracts plus the shared type
      system.
    replacement_surface:
      owner_file: contracts/flows/<flow>/entities.yaml
      bundle_scope_exception: contracts/entities.yaml for rare bundle-scope entities
      type_source: contracts/types.yaml and contracts/flows/<flow>/types.yaml
    migration_rules:
      retired:
      - Embedded `entity_schema` blocks in package.yaml
      - Grouped field sections as the contract authority
      - jsonb as an author-declared entity field type
      - Inline `nullable:` authoring as a substitute for explicit type semantics
      replacement: |
        Entity contracts use a flat form: underscore-prefixed keys are
        entity metadata, non-underscored keys are field declarations.
        Field types come from the Wave 1 type system. Every declared
        field is always readable with a type-valid value; `initial:` is
        the explicit authored create-time override when needed.
    authoritative_section: See top-level `entity_contracts` and `type_system`.
  event_schema:
    description: |
      Events in `events.yaml` use the Wave 1 flat payload form.
      Event-level metadata is underscore-prefixed. Non-underscored keys
      are producer-owned payload fields. The platform validates emit
      calls against the declared payload contract and populates envelope
      fields separately.
    format:
      event_name: |
        _note: Human-readable metadata (optional)
        _source: Producer annotation (optional)
        _consumer: Consumer annotation (optional)
        field_name: type
        nested_field:
          type: NamedType
          description: Human-readable annotation
    strict_payload_contract:
      rule: |
        Event payloads are producer-complete only. Every declared
        payload field must be populated by the active emit site's
        `emit.fields`. No payload defaults. No implicit passthrough.
        No nested `payload:` block. Missing declared fields and
        undeclared emitted fields are contract violations.
      envelope_split: |
        Envelope fields such as entity_id, trigger_event_type,
        current_state, source_event_id, and emitted_at are
        platform-populated and are not author-declared in event
        schemas. Consumers access them via the event.* namespace, not
        payload.*.
      retired:
      - Nested `payload:` wrapper blocks
      - Inline `type: object` without declared inner shape
      - jsonb payload declarations
      - Author-declared envelope fields
    routing_derivation:
      description: 'Routing is derived from two sources depending on scope:'
      intra_flow: 'Within a flow, routing derives from local subscriptions — agents.yaml subscriptions,
        nodes.yaml subscribes_to, and event_handlers keys. The platform matches local event names
        against local subscriber declarations.'
      cross_flow: 'Between flows, routing derives from pins by default — source flow pins.outputs.events
        matched against target flow pins.inputs.events. See engine.cross_flow_routing for details.
        Explicit scoped subscriptions (e.g., scoring/vertical.shortlisted) are an escape hatch for
        cases where auto-wiring is insufficient.'
      delivery_rules:
        owning_node: If a system node subscribes_to the event → that node owns it
        dual_delivery: If a node AND agents subscribe → route to both
        consuming: If only a node subscribes → route to node only
        passthrough: If no node subscribes → pure agent delivery
  persistence_model:
    description: Agents do not have raw database access. The platform provides typed persistence tools derived from the
      authoritative entity contracts in entities.yaml and the shared type system. This ensures all data access is
      permissioned, auditable, and storage-backend agnostic.
    auto_generated_tools:
      get_entity: Read entity by ID. Returns all fields the agent has permission to see.
      save_entity_field: Write a specific field on an entity. Field must exist in the inferred entity contract.
      search_entities: Query entities by stage, field values, or metadata.
      query_metrics: Read aggregated metrics (counts, sums, averages) across entities.
    schema_source: entities.yaml + types.yaml
  required_agents:
    description: required_agents in schema.yaml declares agents the flow needs.
    fulfillment_rule: 'The agent YAML map key must match the role field in required_agents. This is the canonical identity:
      if schema says role: classifier-agent, agents.yaml must have a top-level key classifier-agent. No separate fulfills:
      field.'
    note_on_empty: required_agents entries with empty subscriptions and emits are valid. They declare that the flow needs
      this agent role to exist, even if the agent only uses universal tools (agent_message, mailbox_send). Common for managerial
      roles that coordinate via messages rather than event subscriptions.
  hello_world_example:
    description: Minimal flow that processes one event and advances state.
    package_yaml: 'name: hello

      version: 1.0.0

      platform_version: ">=1.1.0"

      flows: []'
    schema_yaml: "initial_state: waiting\nterminal_states: [done]\nstates: [waiting, done]\npins:\n  inputs:\n    events:\
      \ [hello.requested]\n  outputs:\n    events: [hello.completed]"
    nodes_yaml: "hello-node:\n  id: hello-node\n  execution_type: system_node\n  subscribes_to: [hello.requested]\n  produces:\
      \ [hello.completed]\n  event_handlers:\n    hello.requested:\n      advances_to: done\n      emit:\n        event: hello.completed\n\
      \        fields:\n          result: payload.message"
    events_yaml: "hello.requested:\n  message: text\nhello.completed:\n  result: text"
    agents_yaml: '{}'
  produces_derivation: >-
    The produces field on system nodes is OPTIONAL. If omitted, the platform derives it from every supported declarative
    emit site at boot: handler top-level emit, rule-local emit, on_complete branch emit, accumulate.on_timeout emit, and
    fan_out emit. If present, the verifier checks it matches actual emits (PRODUCES-DRIFT warning). Authors should omit
    produces and let the platform derive it.
  underscore_prefix_convention:
    description: Fields starting with _ in contract YAML files.
    semantic_fields:
      _source: 'Event producer type. Suppresses NO-PRODUCER verifier warnings. Values: external (...)'
      _consumer: 'Event consumer type. Suppresses NO-CONSUMER warnings. Values: mailbox_system (...)'
      _status: 'Event lifecycle. Values: planned (future feature).'
      _producer: Event producer agent. Suppresses NO-PRODUCER warnings for agent-emitted events.
    documentation_fields: Any other _-prefixed field (_note, _routing_note, _internal_events_note, etc.) is a human comment.
      The platform ignores them. The verifier ignores them. They are not part of the contract.
rule:
  statement: |
    Entity contracts are the authoritative source of truth for what
    persists in entity_state. Entity type names are flow-scoped: each
    entity type is declared in exactly one owner flow's entities.yaml,
    and the owner flow is determined by the file location under
    contracts/flows/<flow>/entities.yaml. Different flows may reuse the
    same short local name; the fully-qualified form is
    <flow>.<entity_name>.

    A shared type system declared in types.yaml is used by entity
    contracts, event payloads, and policy. Scalars, enums, named types,
    and lists are the complete Wave 1 structural vocabulary. jsonb and
    inline object hand-waves are retired from the author-facing contract
    surface.
  consequences:
    flow_scoped_entity_types: |
      Entity type names are flow-scoped, not bundle-global. Cross-flow
      references use the fully-qualified form; inside the owner flow the
      short form is sufficient.
    declared_is_authority: |
      Writers and readers conform to the declared contract. Writer drift,
      reader drift, and dead contract fields are verification failures.
    universal_presence: |
      Every declared entity field is always readable with a type-valid
      value. Explicit `initial:` or the type default provides the value
      when no writer has populated the field yet.
    lifecycle_vs_field_presence: |
      The state machine is the authority for entity lifecycle. It is not
      the authority for field-level "was this written yet" semantics;
      companion fields are the explicit answer when that distinction
      matters.
type_system:
  description: |
    Shared Wave 1 type declarations used by entities, event payloads,
    and policy. Bundle-wide reusable types live in contracts/types.yaml.
    Flow-local reusable types live in contracts/flows/<flow>/types.yaml.
  vocabulary:
    built_in_scalars:
    - text
    - integer
    - numeric
    - boolean
    - timestamp
    - uuid
    named_types: Composite types with declared inner fields.
    enums: Closed named sets of values.
    lists: Ordered collections of a declared element type.
  field_forms:
    terse: 'field_name: TypeName'
    verbose: |
      field_name:
        type: TypeName
        initial: <value>          # entities only
        immutable: true           # entities only
        description: Human-readable annotation
        _unused_reason: Reason    # entities only; verify suppression for E1
  restrictions:
    retired:
    - jsonb as an author-declared contract type
    - Inline type: object without declared inner shape
    - Optional<T> in Wave 1
    - inheritance / extends clauses
    - recursive types in Wave 1
    allowed_composition: |
      Reuse is compositional only: types reference other named types via
      declared fields. There is no inheritance hierarchy.
  entity_envelope:
    description: |
      Every entity has a platform-owned envelope parallel to the event
      envelope. Envelope fields are implicit and are not author-declared
      in entities.yaml.
    fields:
      id: uuid
      current_state: text (or null for stateless flows)
      revision: integer
      created_at: timestamp
      updated_at: timestamp
      flow_instance: text
  defaults:
    description: |
      Entity field defaults materialize when no explicit `initial:` is
      declared and no writer has set the field.
    values:
      text: '""'
      integer: '0'
      numeric: '0'
      boolean: 'false'
      list: '[]'
      named_type: empty instance with each field at its own default
      enum: first declared value unless initial overrides it
      timestamp: 'null'
      uuid: 'null'
entity_contracts:
  description: |
    Entity contracts are declared in entities.yaml owned by a single
    flow. Ownership is implicit from file location. Bundle-root
    contracts/entities.yaml remains a rare bundle-scope exception.
  ownership: |
    Exactly one flow owns each entity type. Only the owner flow edits
    the contract and creates instances of that type.
  grammar:
    form: |
      <entity_type>:
        _description: Human-readable description
        <field_name>: <type>
        <field_name>:
          type: <type>
          initial: <value>
          immutable: <bool>
          description: <text>
          _unused_reason: <reason>
    notes:
    - Entity-level metadata is underscore-prefixed.
    - State does not live in entity contracts.
    - Envelope names are reserved and must not be author-declared.
  one_entity_type_per_flow: |
    Each flow declares and creates at most one entity type. Verify
    rejects multiple entity types per flow in Wave 1.
  state_machine_link:
    description: |
      State is flow-scoped and declared in schema.yaml. The entity
      envelope field entity.current_state is populated from that flow
      state machine. Authors do not declare a state field or state model
      inside entities.yaml.
event_payload_migration:
  description: |
    Event payload contracts use the same type system and the same flat
    declaration style as entity contracts. Event-level metadata is
    underscore-prefixed; all other keys are payload fields.
  rules:
    flat_form: |
      Event schemas are declared directly under the event name. Nested
      `payload:` blocks are retired.
    envelope_payload_split: |
      Envelope fields are platform-managed and accessed through event.*.
      Author-declared payload fields are accessed through payload.*.
    strict_payload_completeness: |
      Event payloads are producer-complete only. Every declared payload
      field must be populated by the emitting surface's emit.fields. No
      payload defaults, no implicit passthrough, no undeclared extras.
    retired:
    - nested payload wrappers
    - jsonb payload fields
    - inline type: object without declared shape
    - author-declared envelope fields
runtime_enforcement:
  description: |
    Wave 1 adds authoritative behavioral rules on top of the existing
    entity tool APIs. This section does not introduce a second tool
    family; it defines the contract semantics those tools must honor.
  create_entity:
    rule: |
      create_entity writes only fields declared in the inferred
      flow-owned entity contract. The caller does not supply
      `entity_id` or `entity_type`; the runtime mints identity and
      infers the contract from flow context. Envelope field names are
      rejected as caller input. Missing declared fields receive
      explicit `initial:` or the type default.
  save_entity_field:
    rule: |
      save_entity_field targets only declared non-envelope fields on the
      inferred entity contract. Wave 1 writes are top-level only;
      dotted-path writes are rejected. Immutable fields reject
      post-create writes. Values must satisfy the declared type.
  get_entity:
    rule: |
      get_entity returns the full entity object with every declared
      field present at a type-valid value plus the envelope fields.
      Declared fields are never omitted from the response.
  query_entities:
    rule: |
      query_entities validates filter paths against the inferred entity
      contract. Filter paths, metric selectors, and grouped/projected
      entity selectors must resolve either to an envelope field or to a
      declared scalar or enum leaf. Composite whole-value comparison is
      not part of Wave 1.
  error_shape:
    invalid_field: cause=invalid_tool_input with nearest declared matches
    immutable_write: cause=invalid_tool_input for post-create immutable writes
    envelope_write: cause=invalid_tool_input for caller-supplied envelope fields
state_machine_authority:
  description: |
    The flow state machine declared in schema.yaml is the authority for
    entity lifecycle phase. State is flow-scoped, not per-entity-type,
    and Wave 1 assumes one entity type per flow.
  rules:
    state_field_is_implicit: |
      Authors do not declare a state_field anywhere. entity.current_state
      is the implicit envelope carrier. Any state_field declaration is a
      contract error.
    stateless_flows: |
      Stateless flows declare initial_state: null, states: [], and
      terminal_states: []. For them, entity.current_state is null.
    not_field_presence_authority: |
      The state machine answers lifecycle questions, not field-write
      status questions.
companion_field_pattern:
  description: |
    Wave 1 does not use Optional<T>. When a consumer must distinguish
    "unwritten" from "written with the type default value," the contract
    declares an explicit boolean companion field.
  example: |
    score: numeric
    has_scored:
      type: boolean
      initial: false
  guidance:
    use_when: |
      Use a companion boolean only when downstream behavior depends on
      distinguishing "not yet written" from a legitimate default value.
    do_not_use_when: |
      Do not add companion fields when the type default is already a
      semantically sufficient baseline or when the state machine already
      gates consumers naturally.
design_principles:
  description: Durable Wave 1 principles for future DSL work.
  declaration_is_authority_everything_else_is_secondary:
    principle: |
      Contracts are the single declaration surface for structural facts.
      Any other surface mentioning those facts must be derivation,
      assignment, authorization, or documentation — never a second
      hand-authored structural authority.
  contract_derived_summaries_are_canonical:
    principle: |
      Any summary shown to agents, prompts, or documentation that
      restates contract structure must be contract-derived, not
      hand-maintained.
  no_structural_primitive_elides_type_discipline:
    principle: |
      Any structural primitive must preserve named source types,
      explicit target mapping, explicit overrides, and hard-invalidity
      on unmapped or undeclared fields.
  contract_shaping_vs_ergonomics_classification:
    principle: |
      Contract-shaping changes alter what the platform can safely
      express and require architectural review. Ergonomics changes only
      reduce author typing for an already-safe expression and must not
      smuggle contract behavior changes.
handler_specification:
  description: Unified handler specification. Each handler field is documented once with its schema, purpose, execution position
    in the dependency graph, and dependencies.
  dependency_graph:
    description: Arrows mean "must complete before". Steps at the same level are independent — the implementer may execute
      them in any order.
    graph: "\ncreate_entity (optional — mint new entity before any state operations)\n  └→ query (optional — pre-fetch cross-entity\
      \ data into handler context)\n       └→ clear_gates (optional — reset gates before guard)\n            └→ guard\n            └→ accumulate\n                 └→ filter (optional — prune accumulated\
      \ items)\n                      └→ reduce (optional — aggregate filtered items to single value)\n                  \
      \         └→ count (optional — count items)\n                                └→ compute\n                          \
      \           └→ emit-site selection (handler emit OR active branch/rule/timeout/fan_out emit)\n                    \
      \                      └→ advances_to ─┐\n                                             sets_gate ────┤ (independent\
      \ of each other)\n                                             data_accumulation ┘\n                         \
      \                         └→ emit.fields\n                                                       └→ emit.event\n  \
      \                                                          └→ action\n                                            \
      \                     └→ clear (optional — reset accumulator/state buckets)\n    "
  atomicity:
    description: ALL side effects from one handler execution commit in a single database transaction. State advance, gate
      set, data write, and event persistence happen atomically. No external observer sees intermediate state.
    consequence: Since independent steps (advances_to, sets_gate, data_accumulation) commit together, their relative execution
      order is cosmetic. The database sees one atomic write. An implementer may write data before or after state advance —
      the result is identical.
    guards_see_pre_handler_state: Guards evaluate against entity state BEFORE any handler writes. data_accumulation from the
      current handler does NOT affect the current handler's guard. It affects the NEXT handler's guard (on the next event,
      after this transaction commits).
  on_complete_vs_rules:
    description: Mutually exclusive. A handler uses on_complete OR rules, never both.
    on_complete: Ordered list of {condition, advances_to, emit} — first match wins. Used after accumulation/computation.
    rules: Map of {condition, emit/advances_to/data_accumulation} — payload-based routing. Used for type dispatching.
  short_circuits:
    guard_fail: If guard fails, handler stops. on_fail action executes (reject/kill/discard/escalate). No further steps.
    accumulate_incomplete: If accumulation is not yet complete, handler stops after recording the arrival. No further steps
      until completion condition met.
  handler_fields:
    description: Fields within an event_handler declaration. Executed per the dependency graph defined in handler_execution_order.
      All fields are optional — the engine skips absent fields.
    description_field:
      field: description
      type: string
      purpose: Human-readable description of what this handler does. Not executed.
    create_entity:
      field: create_entity
      type: boolean
      purpose: When true, the handler mints a fresh entity_id before any other processing. All subsequent handler steps
        (guard, data_accumulation, advances_to, emit, etc.) operate on the NEW entity. The inbound event's entity_id is
        ignored for state operations — the new entity starts at the flow's initial_state with schema-declared initial values
        already materialized. The original
        event entity_id is preserved in the event payload for reference.
      default: false — handler operates on the inbound event's entity_id (inherit)
      when_to_use: When an event arriving from outside the flow represents a new entity entering this flow's lifecycle.
        Example — vertical.discovered arriving at scoring creates a new vertical entity for scoring. Without create_entity,
        all discovered verticals would share the scan entity from discovery.
      execution_position: First step in the dependency graph. Runs before query, guard, and all other steps. Establishes
        the entity context for the entire handler.
      entity_creation:
        entity_id: Auto-generated UUID
        initial_state: From the flow's schema.yaml initial_state
        flow_instance: Current flow instance path
        fields: Declared entity fields materialized at create_entity time. Explicit `initial:` values apply where declared;
          otherwise the type default is materialized so every declared field is readable immediately.
      interactions:
        with_accumulate: 'PROHIBITED. create_entity mints a new entity_id on every handler invocation. Accumulate receives
          multiple events for the same entity. Combining them would create a different entity on each accumulation event.
          Boot error if both are declared on the same handler.'
        with_fan_out: 'ALLOWED. create_entity creates ONE entity, then fan_out emits multiple events all carrying that entity_id.
          Fan_out items share the new entity.'
        with_guard: 'ALLOWED. Guards evaluate against the NEWLY CREATED entity state after schema initial values materialize.
          Guards may read any declared entity field directly. Declared fields are universally present with either their
          explicit initial or their type default.'
        with_on_complete: 'ALLOWED. on_complete conditions evaluate according to the handler dependency graph. They may rely on
          schema initial values and earlier step outputs, but not on same-handler top-level data_accumulation writes.'
        with_rules: 'ALLOWED. rule conditions evaluate according to the handler dependency graph. They may rely on schema initial
          values and earlier step outputs, but not on same-handler top-level data_accumulation writes.'
        with_advances_to: ALLOWED. Advances the new entity from initial_state to the target state.
      note_on_static_flows: 'For static flows (scoring, validation), create_entity is the mechanism for entity creation.
        Without it, the first event arriving from outside the flow has no entity to write to unless the runtime creates one
        implicitly. create_entity makes this explicit and unambiguous. For dynamic instances (mode: template), entity
        creation happens in create_flow_instance step 9 — create_entity is not needed on those flows.'
    guard:
      field: guard
      type: object — single check OR list of checks
      purpose: Evaluate conditions before proceeding. All checks must pass.
      single_form:
        id: string — check identifier
        check: string — expression evaluated against entity state, payload, and policy
        policy_ref: string — optional annotation documenting which policy key is referenced
        platform_builtin: string — optional reference to a platform-provided guard (e.g., authorization checks)
      list_form:
        checks: list of {id, check} objects — ALL must pass
        on_fail: 'reject | kill | discard | escalate:{event_name} — what to do when any check fails. Default: reject.'
    accumulate:
      field: accumulate
      type: object
      purpose: Track multiple event arrivals for same entity. Wait until completion.
      sub_fields:
        expected_from: string — entity field containing expected count or items list
        completion: all | threshold | timeout
        from: string — optional sender path filter
        on_complete: handler fields to execute when done
        on_timeout: handler fields to execute on timeout
        description: string — human-readable note
        dedup_by: 'string — field path for deduplication. Default: "sender" (sender session ID). Set to a payload field path
          (e.g., "payload.dimension") when accumulating items identified by content rather than sender. Duplicate arrivals
          with the same dedup key are ignored.'
      concept: Track multiple events arriving for the same entity. Fire on_complete when completion condition is met. Expected
        count read from entity state (written by initiating handler).
    compute:
      field: compute
      type: object
      purpose: Execute a platform computation primitive.
      sub_fields:
        operation: string — weighted_average | pick_or_average | sum | min | max | count
        tiers: 'list — for weighted_average: [{dimensions, weight}]'
        keys: object — field name mapping for reading accumulated items. Required for weighted_average with tiers.
        params: object — operation-specific parameters
        store_as: string — entity field to store result
        description: string — human-readable note
      operation_requirements:
        weighted_average:
          description: Compute a weighted average across tiers of accumulated items.
          required:
            keys.dimension_key: string — field name in each accumulated item that identifies the dimension.
            keys.score_keys: list of strings — field name(s) in each accumulated item that contain the numeric score.
            tiers: list of objects — each with dimensions (list of dimension names) and weight (0.0-1.0, must sum to 1.0).
            store_as: string — entity field to write the computed result.
          boot_validation: If operation is weighted_average and keys.dimension_key or keys.score_keys are missing, boot
            error. Silent zero output is not acceptable — missing keys must be caught at contract loading time.
          example: "compute:\n  operation: weighted_average\n  keys:\n    dimension_key: dimension\n    score_keys: [score]\n\
            \  tiers:\n  - dimensions: [build_complexity, automation_completeness]\n    weight: 0.6\n  - dimensions: [pain_severity]\n\
            \    weight: 0.4\n  store_as: entity.composite_score"
    on_complete:
      field: on_complete
      type: list of {condition, advances_to, emit} objects — evaluated top-to-bottom, first match wins
      purpose: Conditional branching after accumulation or computation.
      branch_fields:
        condition: string — expression evaluated against entity state and policy
        advances_to: string — target state
        emit: string or object — event to emit, optionally with local fields payload construction
      _note: MUST be a YAML list (ordered), not a map (unordered). Each entry has a condition evaluated as CEL. First matching
        condition executes.
  expression_context:
    description: 'Defines the namespaces available in CEL expressions used in guard.check, on_complete.condition,
      rules.condition, data_accumulation.expression, and filter.condition. Each namespace resolves to a specific
      data source. Declared entity fields are universally readable at a type-valid value; undeclared field references
      are contract errors.'
    namespaces:
      entity:
        resolves_to: 'entity_state row for the current entity. entity.X reads entity_state.fields->>X.
          entity.current_state reads entity_state.current_state. entity.gates.X reads entity_state.gates->>X.'
        populated_by: 'data_accumulation writes, compute.store_as, sets_gate, advances_to, save_entity_field
          (agent tool), and create_entity (initial field population).'
        read_model:
          declared_fields: Every declared entity field is readable with either an explicit initial value or the field's type default.
          undeclared_fields: Referencing an undeclared entity field is a contract error.
          presence_checks: has(entity.X) and == null / != null comparisons remain available, but they are not required for declared fields.
        does_NOT_include: 'Accumulated items. Dimension scores, fan-out results, and other per-item data
          collected by the accumulate handler step are NOT promoted to entity fields automatically. They exist
          only in the accumulator. To reference them, use the accumulated namespace.'
      accumulated:
        resolves_to: 'The items array from the current handler''s accumulate step. Each item is a JSONB object
          representing one accumulated event payload. Available only in on_complete conditions and filter
          expressions — these run after accumulation completes.'
        usage: 'accumulated.filter(d, <condition>) — filter items by predicate. accumulated.size() — count items.
          accumulated.map(d, d.field) — extract field values. Item fields match the inbound event payload fields
          (e.g., d.dimension, d.score, d.tier for score.dimension_complete).'
        not_available_in: 'guard.check — guards run before accumulation. data_accumulation.expression — runs
          before accumulation. rules.condition — rules are an alternative to on_complete, not used after
          accumulation.'
      fan_out:
        resolves_to: 'Handler context produced by the fan_out step. fan_out.count is the number of items
          that were dispatched. Populated after fan_out executes, before data_accumulation.'
        available_in: 'data_accumulation.expression — the canonical way to write fan_out results to entity
          state. Example: expression: fan_out.count writes the dispatch count to an entity field for
          downstream accumulation tracking (expected_from: entity.search_expected_count).'
        not_available_in: 'guard.check — guards run before fan_out. on_complete.condition — use entity
          fields written by data_accumulation instead.'
        usage_example: "data_accumulation:\n  writes:\n  - target_field: expected_count\n    expression:\
          \ fan_out.count"
      payload:
        resolves_to: 'The inbound event payload. payload.X reads the X field from the triggering event''s
          JSONB payload.'
      policy:
        resolves_to: 'The merged policy context. policy.X reads the X key from the flow''s policy.yaml
          (or root policy.yaml if not overridden at flow level).'
    boot_validation:
      description: 'The platform MUST validate entity field references at boot against the declared entity contract.
        Declared entity fields are always readable; the boot check is declaration and type resolution, not sparse-field
        initializer proof.'
      checks:
        declared_field_resolution: Every entity.X reference must resolve against the inferred entity contract.
        nested_type_resolution: Nested paths must resolve through named types to a declared field.
        filter_leaf_rule: query_entities filter paths must resolve to scalar or enum leaves.
      rule: 'For every entity.X used as a value, X must be declared on the inferred entity contract. Universal
        presence semantics provide the runtime value via explicit initial or type default. Dynamic writes remain
        relevant for business meaning, but not for raw field readability.'
      severity: error (boot fails)
      example_violation: 'A guard references entity.build_complexity, but the inferred entity contract does not declare
        build_complexity. Correct usage is to declare the field on the entity contract or stop reading it.'
    advances_to:
      field: advances_to
      type: string
      purpose: Set entity.current_state to the target state. Skipped if on_complete already advanced.
    sets_gate:
      field: sets_gate
      type: string
      purpose: Set entity.gates.{name} = true.
    data_accumulation:
      field: data_accumulation
      type: object
      purpose: Write fields to entity state from event payloads, literal values, or computed expressions.
      sub_fields:
        writes: list of write items (see write_item_forms below)
        source_event: 'string — which event the payload comes from (default: current trigger event).
          CANONICAL field name — use source_event, not "source".'
      write_item_forms:
        description: 'Each item in writes is one of four forms. No other forms are accepted.'
        direct:
          shape: 'field_name (bare string)'
          meaning: 'payload.field_name → entity.field_name. Direct name match.'
          example: '- geography'
        mapped:
          shape: '{source_field: payload_key, target_field: entity_key}'
          meaning: 'payload.payload_key → entity.entity_key. Renamed mapping.'
          example: "- source_field: vertical_name\n  target_field: name"
        literal:
          shape: '{target_field: entity_key, value: constant}'
          meaning: 'Write a constant value directly to entity.entity_key. No expression evaluation.'
          example: "- target_field: revision_count\n  value: 0"
          note: '{target_field, literal} is NOT valid. The field name is value, not literal.
            value and expression are mutually exclusive — a write item MUST NOT have both.'
        computed:
          shape: '{target_field: entity_key, expression: CEL_expression}'
          meaning: 'CEL expression evaluated against handler context → entity.entity_key.'
          context: 'expression is evaluated against: entity, payload, policy, fan_out. The fan_out
            namespace is available when the handler includes a fan_out step (e.g., fan_out.count).
            accumulated is NOT available — data_accumulation runs before accumulation completes.'
          example: "- target_field: revision_count\n  expression: entity.revision_count + 1"
          note: 'value and expression are mutually exclusive. Use value for constants, expression
            for dynamic computation. Do not use expression for simple constants — use value instead.'
      rules:
      - writes is always a list
      - each item is exactly one of the four forms above
      - value and expression are mutually exclusive on the same write item (boot error if both present)
      - source_event is optional — if omitted, the trigger event is the source
      - source_event payload must contain all fields referenced by direct and mapped writes (verified at boot)
      - literal writes do not reference source_event or handler context — the value is used as-is
      - computed writes do not reference source_event — they use the handler context directly
      example: "data_accumulation:\n  writes:\n  - geography                              # direct\n\
        \  - source_field: vertical_name             # mapped\n    target_field: name\n  - target_field:\
        \ revision_count                # literal\n    value: 0\n  - target_field: expected_count\
        \              # computed\n    expression: fan_out.count\n  source_event: scan.requested\
        \               # optional"
    emit:
      field: emit
      type: 'scalar event name OR object: {event, fields}'
      purpose: Publish the selected follow-up event for this emit site. Handler top-level emit is allowed only when the handler
        has no nested emit sites. Nested emit sites are branch-local on_complete emit, rules emit, accumulate.on_timeout emit,
        and fan_out emit.
      sub_fields:
        event: string — event to emit
        fields: map of output_field_name → CEL expression evaluated against handler context. Optional. If omitted, the emitted
          payload contains no business fields. Runtime-owned envelope context is attached on the event carrier and is accessed
          through event.* rather than payload.*.
      single_emit_handler_rule: 'A handler top-level emit is valid only when the handler has exactly one possible emit site.
        If the handler also declares rules, on_complete, accumulate.on_timeout, or fan_out emit, boot fails with ambiguity.
        Payload ownership must move to the active emit site.'
    rules:
      field: rules
      type: map of rule_name → rule
      purpose: Type-based routing. Match payload field against conditions.
      rule_fields:
        condition: string — expression evaluated against payload
        emit: string or object — rule-local event to emit
        advances_to: string — optional state change
        data_accumulation: object — optional data write (same format as handler-level)
        description: string — human-readable note
    fan_out:
      field: fan_out
      type: object
      purpose: For each item in a list, emit an event.
      sub_fields:
        items_from: string — source list (payload field or entity field)
        target: string — agent path to receive events
        emit: string or object — per-item event to emit, optionally with local fields payload construction
      side_effect: Writes fan_out.count to handler context (available for data_accumulation).
    query:
      field: query
      type: object or list of objects
      purpose: Cross-entity read and aggregation.
      sub_fields:
        entities: string — entity table name
        filter: string — optional condition
        group_by: string — field to group by
        count: boolean — count per group
        select: list — fields to include
        store_as: string — where to put results (in emit payload)
      execution_position: Before clear_gates. Pre-fetches cross-entity data into handler context for use by guard, compute,
        or on_complete.
    reduce:
      field: reduce
      type: object
      purpose: Combine accumulated items into a single value.
      sub_fields:
        items_from: string — source list
        operation: string — weighted_average | pick_or_average | sum | min | max | count
        params: object — operation-specific parameters
        store_as: string — entity field to store result
      execution_position: After filter, before count. Aggregates filtered items into a single value (weighted_average, sum,
        min, max, pick_or_average).
    filter:
      field: filter
      type: object
      purpose: Keep items from a list that match a condition.
      sub_fields:
        items_from: string — source list
        condition: string — expression per item
        store_as: string — entity field for result
      execution_position: After accumulate, before reduce. Prunes accumulated items based on CEL condition. Only matching
        items pass through.
    count:
      field: count
      type: object
      purpose: Count items matching a condition.
      sub_fields:
        items_from: string — source list
        condition: string — optional filter
        store_as: string — entity field for count
      execution_position: After reduce, before compute. Counts items (optionally matching a condition). Stores result in entity
        field.
    clear:
      field: clear
      type: object
      purpose: Bulk reset state tables.
      sub_fields:
        targets: list of state store names to clear
      execution_position: After action. Last step. Resets accumulator state or specific entity field buckets. Distinct from
        clear_gates which runs before guard.
    action:
      field: action
      type: string
      purpose: 'Names a platform-provided action. Valid values: create_flow_instance, record_evidence. The platform executes
        the named action. NOT for platform actions — all behavior must be declarative.'
      emit_interaction: If the resolved runtime action instruction emits a follow-up event, that event uses the action-originated
        emitted-event payload rules under observation_model.emitted_events.payload_rules. The action field itself does not
        declare authored payload fields; runtime-owned action instructions construct and validate any follow-up payload.
      valid_values:
        create_flow_instance:
          description: Create a new dynamic flow instance.
          required_sibling_fields:
            template: 'string — flow template ID (must be mode: template)'
            instance_id_from: string — payload field containing the unique instance ID
            config_from: object — maps instance variable names to payload field paths. Platform reads payload values and passes
              them as config to the new flow instance.
        record_evidence:
          description: Append event payload to entity accumulator state.
          behavior: Reads the event payload and appends it as a new entry in the entity's evidence accumulator (from state_schema).
            Append-only — never replaces. Used for building an audit trail of signals, scores, or decisions.
          required_sibling_fields: {}
    retired_fields:
      description: Legacy declarative emit carriers retired by the structured emit grammar.
      rule: These fields are retired compatibility syntax, not alternate current-contract forms.
      entries:
      - "`emits` — retired; use `emit`"
      - "`payload_transform` — retired; move payload ownership into `emit.fields` at the active emit site"
      - "`fan_out.emit_per_item` — retired; use `fan_out.emit`"
      - "`fan_out.emit_mapping` — retired; no direct replacement in the current fan_out model. Use a single `fan_out.emit` and route before or after fan-out if per-item event-name branching is required."
    clear_gates:
      field: clear_gates
      type: boolean
      purpose: Reset all entity gates to false. Used before re-entering a validation cycle.
      scope: 'Clears all gates on the ENTITY, not scoped to flow schema or node. An entity has one flat gate map. clear_gates:
        true resets every key in that map to false. Rationale: gates are entity-level state. A flow that resets an entity
        to an earlier phase (e.g., review.rejected returning to draft) must clear all gates, not just the ones
        its node declared.'
      limitation: 'All-or-nothing. Selective gate clearing (clear_gates: [gate_a]) is a potential v1.3 feature.'
    evidence_target:
      description: Specifies which accumulator key the evidence is appended to when action is record_evidence. If omitted,
        defaults to the node ID. Explicit declaration is recommended for clarity.
      type: string
      example: build_evidence
  node_specification:
    node_fields:
      description: Top-level fields on a system node declaration.
      required:
        id: string — unique node identifier within the flow
        execution_type: string — must be "system_node"
        subscribes_to: list of event names this node receives
        event_handlers: map of event_name → handler declaration
      optional:
        description: string — human-readable description
        state_schema: map — fields the node persists per entity (accumulator state)
        state_table: string — table name for node state persistence
        timers: list of timer declarations (see timer_model)
        gate_state: map — gate field definitions for this node (boolean flags on entity)
        permissions: list of platform permissions this node requires (e.g., create_flow_instance)
    description: Complete specification for system nodes — the deterministic components that orchestrate state transitions.
      Every field used in nodes.yaml must be defined here.
  dependency_rules:
  - 'query → clear_gates: cross-entity data fetched before any state evaluation'
  - 'clear_gates → guard: gates reset before guard reads them'
  - 'guard → accumulate: guard must pass before accumulation is checked'
  - 'accumulate → filter: accumulated items available before pruning'
  - 'filter → reduce: pruned items available before aggregation'
  - 'reduce → count: aggregated result available before counting'
  - 'count → compute: all list processing complete before computation'
  - 'compute → emit-site selection: computed values written before branch/rule/timeout selection evaluates'
  - 'emit-site selection → {advances_to, sets_gate, data_accumulation}: active branch/rule/timeout may override these fields'
  - 'advances_to, sets_gate, data_accumulation: INDEPENDENT — no causal dependency, any order valid'
  - 'emit.fields → emit.event: output payload constructed before event persisted'
  - 'emit.event → action: events persisted before platform actions execute'
  - 'action → clear: state cleanup runs last, after all side effects committed'
  core_vs_extensions:
    description: Most handlers use a small core subset. Advanced features are extensions.
    core_fields:
      description: Used by 90%+ of handlers. Learn these first.
      fields:
      - guard
      - advances_to
      - sets_gate
      - data_accumulation
      - emit
      - rules
      - on_complete
    extension_fields:
      description: Used by specialized handlers. Learn when needed.
      fields:
      - accumulate
      - compute
      - fan_out
      - filter
      - reduce
      - count
      - query
      - clear
      - clear_gates
      - action
  yaml_field_order: YAML field order within a handler is cosmetic. The engine executes fields per the dependency graph, not
    per source order. A handler may list on_complete before accumulate in YAML — the engine still runs accumulate first. Authors
    SHOULD order fields to match the dependency graph for readability, but the engine does not require it.
  rules_handler_interaction:
    description: When a handler has rules, the active rule owns conditional emit selection for that execution.
    execution_order: 1. rules execute first — the matching rule determines the active condition-specific side effects (rule-level
      emit, data_accumulation, advances_to). 2. Handler-level data_accumulation executes AFTER rules when present and supplements
      rule-level writes in the same atomic transaction. 3. Handler-level emit does NOT supplement rules. If rules are present,
      handler-level emit is invalid and boot fails as ambiguous.
    example: 'order.received may have handler-level data_accumulation (3 fields) + rules with per-rule data_accumulation (category_data).
      Result: all 3 handler-level fields are written, PLUS the matching rule writes category_data. Event emission, however,
      must be owned by the matching rule.'
    precedence: Handler-level advances_to, sets_gate, and data_accumulation are defaults. If the matched rule specifies any
      of these, the rule value OVERRIDES the handler-level value for that field only. emit never falls through from a handler
      into a rules-based multi-emit handler.
engine:
  description: Specification for the platform engine — how it loads, validates, and executes flows.
  flow_tree_walker:
    description: Recursive discovery of flows from the root package.yaml. The walker collects all flows into a flat registry.
      Validation happens after collection.
    algorithm:
    - 1. Start at root directory. Read package.yaml.
    - '2. Register this flow: record its directory, package manifest, and all contract files present.'
    - '3. For each entry in package.yaml flows: list, resolve child directory: {current_dir}/flows/{child.flow}.'
    - 4. If child directory exists and contains package.yaml, recurse from step 1 with child directory.
    - 5. If child directory missing or no package.yaml, log warning and skip.
    - 6. Track visited directories. If already visited, skip (prevents infinite loops from duplicated copies).
    - '7. Stop when depth exceeds 99. Log: "Flow nesting depth exceeded 99 — contact platform team."'
    minimum_required_files:
      always_required:
      - package.yaml
      - schema.yaml
      at_least_one: agents.yaml OR flows/ with at least one child
      boot_error: A flow with no agents.yaml and no child flows is an error.
    optional_files:
      nodes.yaml: System node handlers. Omit if flow only composes children via agents.
      events.yaml: Event payload schemas. Omit if flow uses only events declared by children or root.
      tools.yaml: Flow-specific tools. Omit if flow uses only root-level or platform tools.
      policy.yaml: Flow-specific thresholds. Omit if flow uses only root-level policy.
      prompts/: Agent prompts. Required if agents.yaml exists.
    output: 'A flat list of FlowEntry records. Each record contains: flow ID, directory path, depth, parent flow ID, package
      manifest, and paths to all contract files found. This flat list is the input to the contract merger (next step).'
    max_depth: 99
    duplicate_handling: Flows may be duplicated (same flow directory copied into multiple parents). Each copy is a separate
      flow instance. No deduplication. No DAG resolution. The walker treats each directory as independent.
    flow_id_uniqueness: 'Flow IDs (from package.yaml flows: list) must be unique within the entire tree. Duplicate flow IDs
      across different parents is a boot error.'
  uri_addressing:
    description: 'Every addressable runtime entity (node, agent, event) is identified by a path. Paths follow a simple hierarchical
      model: slash means navigating into a child flow. No slash means local to the current flow.'
    rules:
      local:
        format: '{name}'
        meaning: Entity in the current flow instance.
        examples:
        - order.processing_requested
        - classifier-agent
        - ticket-router
      absolute:
        format: '{flow_id}/{flow_id}/.../{name}'
        meaning: Entity in a specific flow instance. Path navigates from root.
        examples:
        - intake/order.ready — intake flow's event
        - processing/review/review.completed — nested sub-flow event
        - fulfillment/shipper-agent — agent in fulfillment flow
        - dashboard-node — root flow's node (no slash = root-local)
    resolution: Slash presence determines scope. No slash = local to current flow. Slash present = absolute path from root.
      Local names never contain slashes. The platform resolves all references to full internal paths at boot.
    type_inference: 'No type suffix needed. The context determines the type: subscriptions and emit_events contain events.
      Message targets contain agents. subscribes_to in nodes contains events. The type is implicit from where the reference
      appears.'
    full_uri:
      description: 'For cross-root references (future — multiple root flows on one platform), full URI format is available:
        {root}://{path}/{name}. Within a single root flow, absolute paths are sufficient.'
      format: '{root}://{path}/{name}'
      example: myapp://intake/order.ready
      when: Only needed when multiple root flows run on the same platform instance.
  event_identity:
    description: 'Canonical event identity model. An event has multiple projections depending on context.
      The platform MUST use a single resolver module for all identity operations — contract loading,
      route derivation, boot verification, handler lookup, emit authorization, and tool generation.'
    projections:
      local_name: 'The event name as declared in events.yaml and handler keys within a flow.
        No slashes. Examples: vertical.shortlisted, score.dimension_complete.'
      external_name: 'The flow-qualified event name as seen by other flows and the event bus.
        Format: {flow_id}/{local_name}. Examples: scoring/vertical.shortlisted, validation/research.completed.'
      root_name: 'Events emitted at root level (no flow scope). Same as local_name — no prefix.
        Examples: scan.requested, vertical.resumed, system.started.'
    resolution_rules:
      contracts_always_local: 'Node subscribes_to, handler keys, agent subscriptions within a flow,
        and event definitions in events.yaml always use local names. No flow prefixes in contract
        authoring except for explicit cross-flow escape hatches.'
      bus_always_external: 'The event bus stores and routes events using external names. An event
        emitted by a node in the scoring flow is stored as scoring/vertical.shortlisted in the events
        table.'
      handler_lookup_localizes: 'When the runtime delivers an external event to a node, it MUST
        localize the event name before looking up the handler. Localization matches against the target
        node''s declared local interface — input pins, subscribes_to entries, and handler keys. This
        applies to both pin-auto-wired events and explicit scoped subscription escape hatches.
        Example: scoring/vertical.shortlisted → vertical.shortlisted when delivered to a validation
        node that declares vertical.shortlisted in any of those surfaces.'
      root_events_are_global: 'Events emitted at root level have no flow prefix. They are routable
        to any flow that declares them as input pins or has agents/nodes subscribing by local name.'
    canonical_resolver: 'The platform MUST provide a single resolver module used by all subsystems:
      Localize(flowID, eventName) → local name. Externalize(flowID, eventName) → external name.
      Match(pattern, eventName) → bool. ResolveInputAlias(flowID, eventName) → local handler key.
      No subsystem may implement its own name resolution logic.'
  cross_flow_routing:
    description: 'Pin-based auto-wiring is the default cross-flow routing model. Contracts express
      local names and interface pins. The platform derives cross-flow routes at boot.'
    auto_wiring:
      description: 'At boot, the platform resolves cross-flow routes from declared pins:
        1. For each flow, collect pins.outputs.events (events this flow emits to the outside).
        2. For each flow, collect pins.inputs.events (events this flow receives from outside).
        3. For each input pin event name, find all flows that declare the same name as an output pin.
        4. Create a route: source flow output → target flow input.
        5. The handler key in the target flow uses the local name (no prefix).'
      ambiguity: 'If an input pin event name matches output pins from multiple flows, boot MUST fail
        unless the contract disambiguates explicitly (via a scoped subscription as escape hatch).'
      root_events: 'Events emitted at root level (no flow scope) are automatically routable to any
        flow that declares them as input pins. No ambiguity — root events have no flow prefix.'
    escape_hatch:
      description: 'For cases where auto-wiring is insufficient, contracts may use explicit scoped
        subscriptions in node subscribes_to. Example: scoring/vertical.shortlisted as a subscription
        bypasses auto-wiring and creates a direct route. This is an escape hatch, not the default
        authoring model.'
      when_needed:
      - 'Ambiguous pin names: two flows both output the same event name, and the target flow needs
        only one.'
      - 'Non-pin events: subscribing to an internal event from another flow that is not declared as
        an output pin.'
    contract_authoring_rules:
      handler_keys: Always local names. Never flow-prefixed.
      subscribes_to: Local names by default. Flow-prefixed only as escape hatch.
      emit_events: Always local names. The platform externalizes at emission time.
      events_yaml: Always local names. Flow-scoped at load time.
      pins: Always local names. The platform matches across flows by name.
    wildcards:
      description: Pattern matching for subscriptions across flow instances.
      patterns:
        '*/order.completed': Any direct child flow's order.completed event
        '**/item.processed': Any flow at any depth
  contract_merger:
    description: After the flow tree walker collects all flows, the merger builds the runtime registry. Every node, agent,
      and event gets a full URI. No global merge — everything is scoped by flow instance.
    process:
    - 1. For each flow in the flat list (from walker), construct its instance path.
    - '2. For each node in flow''s nodes.yaml: register with URI {root}://{instance_path}/{node_id}'
    - '3. For each agent in flow''s agents.yaml: register with URI {root}://{instance_path}/{agent_id}'
    - '4. For each event in flow''s events.yaml: register with URI {root}://{instance_path}/{event_name}'
    - '5. For each tool in flow''s tools.yaml: register as shared (tools are not URI-scoped)'
    - '6. For each policy key in flow''s policy.yaml: register scoped to flow instance'
    - 7. Root flow's tools and policy are inherited by all children unless overridden.
    no_conflicts: URI scoping eliminates all conflicts. Two flows with a node called "orchestrator" become myapp://intake/orchestrator
      and myapp://processing/orchestrator. No merge logic needed. No collision possible.
    subscription_resolution: After all URIs are constructed, resolve agent subscriptions. Local subscriptions (no :// prefix)
      resolve within the same flow instance. Full URI subscriptions resolve globally. Wildcard subscriptions expand to matching
      URIs.
    tools: Tools are NOT URI-scoped. They are shared resources. Root flow tools are available to all child flows. Child flow
      tools are available only within that flow. If a child declares a tool with the same ID as a root tool, the child's version
      takes precedence within that flow.
    policy: 'Policy keys are scoped by flow. Root flow policy is inherited by all children. Child flow policy overrides root
      for the same key within that child. Guards and prompt templates resolve policy keys by walking up the flow tree: child
      → parent → root.'
    output: 'A runtime registry containing: URI → Node map, URI → Agent map, URI → Event schema map, tool registry (flat,
      with flow-level overrides), policy tree (hierarchical, child overrides parent).'
  agent_sharding:
    description: Parallelism within a flow is handled by system nodes spawning multiple agent instances. The platform provides
      the mechanics (agent_hire, event routing, accumulation tracking). The product node decides the partitioning logic.
    model: A system node handler receives a trigger event with a workload (e.g., 52 subcategories). The node partitions the
      workload and spawns N agent sessions, one per partition. Each agent receives a partition-specific event. The node tracks
      completion via the accumulate primitive. When all partitions complete, the node proceeds.
    platform_provides:
    - agent_hire tool — spawn an agent session with specific configuration
    - Event routing — deliver partition-specific events to the correct agent instance
    - Accumulation tracking — track which partitions have completed
    - Timeout — fire on_timeout if partitions don't complete in time
    product_provides:
    - Partitioning logic — how to split the workload
    - Partition event construction — what each agent instance receives
    - Merge/reduce logic — how to combine partition results (if needed)
    not_in_scope: Flow-level sharding (distributing flow instances across compute nodes) is not supported in v1.0.0. All flow
      instances run on the same platform instance. Agent sharding provides within-flow parallelism. Cross-machine distribution
      is a future concern.
    addressing: Sharded agent instances are addressed by their agent session ID, not by a special shard path. The wildcard
      * in paths matches dynamic flow instances, not agent shards. Agent shards are ephemeral — they exist for the duration
      of the partition work and are not addressable after completion.
  dynamic_instance_lifecycle:
    description: 'Flow instances can be created at runtime by system nodes calling create_flow_instance. The flow template
      must be declared as mode: template in the parent package.yaml.'
    creation:
      trigger: A system node handler declares action create_flow_instance (handler action, not an agent-callable tool). The node
        decides when to create instances based on its product logic. Same pattern as agent sharding — nodes orchestrate instance
        creation.
      instance_id: Supplied by the node (from event payload or generated). Must be unique within the template scope. If already
        exists, creation fails with error.
      process:
      - 1. Node handler calls create_flow_instance with template ID and instance_id
      - '2. Platform validates: template exists and is mode: template'
      - '3. Platform validates: instance_id is unique within template scope'
      - 4. Platform loads flow template contracts from flows/{template}/
      - '5. Platform constructs paths: {template_id}/{instance_id}/{local_name}'
      - 6. Platform registers new nodes, agents, events in runtime registry
      - 7. Platform expands wildcard subscriptions to include new instance
      - 8. Platform resolves local subscriptions for new instance
      - 9. Platform creates entity record at initial_state from schema.yaml
      - 10. New instance nodes and agents start
      auto_emit: Flow schemas may declare auto_emit_on_create. When the platform creates an instance, it automatically emits
        the declared event after the instance is fully started. This bootstraps the flow without requiring an external trigger.
    addressing:
      static_flows: '{flow_id}/{local_name} — one level, no instance segment'
      template_instances: '{template_id}/{instance_id}/{local_name} — extra segment for instance'
      wildcard: '{template_id}/*/{event_name} — matches any instance under this template'
    wildcard_subscriptions:
      description: Agents that need to observe all dynamic instances use wildcard paths. When a new instance is created, existing
        wildcard subscriptions expand to include it.
      static_vs_dynamic: 'Static flows are declared in package.yaml with mode: static. Template instances are created at runtime
        with mode: template. Wildcard * only matches template instances. Static flow names are always explicit.'
    termination:
      terminal_state: A dynamic instance reaches a terminal state from schema.yaml. Instance stops processing events. State
        preserved for querying. Agents and nodes stopped.
      cleanup: 'Operational concern. Platform does not auto-delete. Future: TTL or explicit destroy tool.'
  boot_sequence:
    description: Ordered steps from platform start to ready. If any validation step fails, boot aborts with a clear error.
      No partial startup.
    steps:
    - step: 1
      name: load_platform_spec
      action: Read platform/contracts/platform-spec.yaml. Verify platform version.
    - step: 2
      name: walk_flow_tree
      action: Starting from root package.yaml, recursively discover all flows. Build flat list of FlowEntry records. Max depth
        99.
    - step: 3
      name: construct_paths
      action: 'For each flow, construct hierarchical paths for its nodes, agents, and events. Local names become absolute
        paths using the semantic contract path (flow_scope_key): {flow_scope_key}/{local_name}. This happens at boot
        before any template instances exist — concrete instance paths are materialized later at create_flow_instance time.'
    - step: 4
      name: register_templates
      action: 'For flows declared as mode: template, register the template but create no instances. The template is available
        for runtime create_flow_instance calls.'
    - step: 5
      name: build_registries
      action: 'Build runtime registries keyed by path: nodes, agents, events, tools, policy. Tools are flat (shared). Policy
        is hierarchical (child overrides parent).'
    - step: 6
      name: resolve_subscriptions
      action: Resolve all agent and node subscriptions. Local names (no /) resolve within same flow. Paths with / resolve
        as absolute from root. Wildcards expand to matching paths.
    - step: 7
      name: validate_pins
      action: 'For each flow: required input event pins must be wired (some other flow emits them). No two flows may write
        the same entity field (write conflict = boot error).'
    - step: 8
      name: validate_required_agents
      action: Every flow's required_agents roles must be fulfilled by agents in that flow's agents.yaml.
    - step: 9
      name: validate_tools
      action: Every tool in every agent's tools must exist in the tool registry.
    - step: 10
      name: validate_permissions
      action: Every agent has sufficient permissions for its declared tools.
    - step: 11
      name: validate_platform_version
      action: Root flow's platform_version range includes the running platform version.
    - step: 12
      name: initialize_state_stores
      action: Create or verify entity tables, accumulator state tables, event store. Derive entity contract metadata from
        entities.yaml plus the shared type system; derive node-local state from nodes.yaml.
    - step: 13
      name: start_system_nodes
      action: Each node subscribes to its declared events. Nodes are ready to handle.
    - step: 14
      name: start_agents
      action: Each agent's subscriptions are active. Agent sessions created on first event.
    - step: 15
      name: ready
      action: 'Platform is accepting events. Log boot summary: flow count, node count, agent count, event count.'
    failure_handling: 'Any step that fails aborts boot with a clear error message identifying: which step failed, which flow/agent/event
      caused the failure, and what the expected fix is. No partial startup — either everything validates or nothing runs.'
  event_loop:
    description: The event loop is the core runtime cycle. Events enter, get persisted, routed to subscribers, and processed.
      This runs continuously after boot.
    lifecycle:
    - step: 1
      name: event_arrives
      action: 'An event enters the system. Sources: agent emit, system node emit, timer fire, human input, handoff trigger,
        external API.'
    - step: 2
      name: validate_payload
      action: Validate event payload against the schema in events.yaml. Reject if schema mismatch. Log and discard invalid
        events.
    - step: 3
      name: persist_event
      action: 'Write event to the event store (write-ahead). The event is durable before any processing begins. Crash after
        this point: event replays on recovery.'
    - step: 4
      name: resolve_subscribers
      action: 'Look up subscribers by event path. Two kinds: system nodes (from nodes.yaml subscribes_to) and agents (from
        agents.yaml subscriptions). Wildcard subscriptions are pre-expanded at boot and updated on dynamic instance creation.'
    - step: 5
      name: node_handling
      action: 'For each subscribing system node: acquire entity lock, execute the dependency-graph handler within an atomic
        boundary, release entity lock. New events emitted by the handler are persisted within the same atomic boundary but
        delivered AFTER commit (step 7).'
    - step: 6
      name: agent_delivery
      action: 'For each subscribing agent: place the event in the agent''s inbox. Agent processes it asynchronously. No lock,
        no blocking.'
    - step: 7
      name: deliver_emitted_events
      action: Events emitted by node handlers in step 5 are now delivered. Each enters the event loop at step 1 in its own
        cycle. This prevents recursive handler chains and deadlocks.
    - step: 8
      name: mark_delivered
      action: Original event marked as delivered in the event store.
    concurrency:
      description: Events are serialized per entity, concurrent across entities.
      per_entity_serialization: All events for the same entity are processed one at a time. When a handler is processing an
        event for entity X, any other event for entity X waits until the handler completes and commits. This prevents race
        conditions on entity state, accumulator, and gates.
      cross_entity_concurrency: Events for different entities are fully concurrent. Handling entity X does not block entity
        Y. The platform can process thousands of entities simultaneously.
      entity_lock: 'The platform acquires an entity-level lock before handler execution. Lock scope: one entity, one handler.
        Released after commit or rollback. Lock mechanism is implementation-specific (DB row lock, in-memory mutex, etc.).'
      agent_concurrency: Agent deliveries are asynchronous. Events placed in agent inbox in order. Agent processes inbox events
        sequentially. Multiple agents run concurrently. No entity lock needed for agent processing — agents interact with
        entities through platform tools which acquire their own locks.
    atomicity:
      description: All side effects of one handler execution are atomic. Either everything commits or nothing does.
      within_atomic_boundary:
      - Entity state change (advances_to)
      - Gate updates (sets_gate)
      - Accumulator state updates (data_accumulation, accumulate tracking)
      - New events persisted to event store (emit)
      outside_atomic_boundary:
      - Delivery of emitted events to their subscribers (happens after commit)
      - Agent inbox delivery (async)
      failure: If any write within the atomic boundary fails, all writes roll back. The triggering event is marked as failed.
        Failed events can be retried (handler is idempotent).
    crash_recovery:
      description: On restart, the platform replays undelivered events. Events persisted (step 3) but not marked delivered
        (step 8) are replayed. Handler idempotency ensures replayed events produce the same result.
    single_node_handler_rule:
      description: Each event may be handled by at most ONE system node. If two system nodes declare the same event in their
        event_handlers, boot fails. This ensures unambiguous state authority — one event, one state transition, one owner.
      agents: Not constrained. Multiple agents may subscribe to the same event freely.
      enforcement: Boot validation rejects duplicate node handlers for the same event.
    emit_payload_default: 'For supported declarative system-node emit sites, the platform constructs the business payload by:
      1. Start from an empty payload. 2. Evaluate emit.fields, if present, into the payload. 3. Attach runtime-owned envelope
      context on the emitted event carrier rather than copying it into payload. There is no implicit entity or trigger-payload
      passthrough on this surface. Runtime rejects authored envelope-owned keys in emit.fields fail-closed. Runtime also validates
      the resulting payload fail-closed: undeclared producer-authored payload fields are rejected, not silently trimmed.'
    dual_path_events: An event can be both an input pin (arriving from outside the flow) and internally generated (emitted
      by a handler within the flow). The system node handler processes it identically regardless of source. No priority or
      deduplication between paths — if the same event fires from both, it runs twice (idempotency_key in the events table
      prevents true duplicates).
  state_management:
    description: The platform tracks three kinds of state per entity instance. All state is persisted. All mutations happen
      within the handler atomic boundary.
    entity_state:
      description: A single string value representing where the entity is in the flow lifecycle. Set by advances_to in handler
        execution. Initial value from schema.yaml initial_state. Terminal values from schema.yaml terminal_states.
      storage: Entity table, state column, indexed.
      mutation: Only via advances_to or on_complete branch. Never by agents directly.
    accumulator_state:
      description: 'Structured data tracking partial progress within a handler''s accumulate pattern. Examples: which scoring
        dimensions have arrived, which scanner partitions completed, intermediate computed values.'
      storage: Per-node state table (from nodes.yaml state_schema). Keyed by entity_id.
      mutation: Written by accumulate tracking (record arrival), data_accumulation (write payload fields), and compute steps
        (store computed values). Cleared or reset when accumulation completes.
    gate_state:
      description: Boolean flags on the entity. Used by validation-style flows to track which sub-steps have completed. Guards
        can check gate state as conditions.
      storage: Entity table, gates column (jsonb or equivalent).
      mutation: 'Set via sets_gate handler field. Default behavior: set to true, never reset. If an entity needs to re-enter
        a validation cycle, use clear_gates handler field to reset all gates to false before re-entering.'
    scoping: All state is scoped by entity_id + flow instance path. Two entities in the same flow have independent state.
      Two instances of the same flow template have independent state. There is no shared mutable state between entities or
      between flow instances.
    querying: State is queryable at any time without side effects. The platform may provide a query_flow_state tool for agents
      to read entity state, accumulator, and gates without emitting events.
    terminal_state_behavior:
      description: When an entity reaches a terminal state (from schema.yaml terminal_states), all state is preserved. Entity
        state, accumulator state, gate state, and event history remain queryable indefinitely.
      no_cleanup: The platform does NOT clear entity data on terminal state. Terminated entities retain all accumulated data
        and decision history for post-mortem analysis.
      behavior:
      - Entity stops accepting new events (handlers reject events for terminal entities)
      - Timers are cancelled
      - Agent sessions are terminated
      - All persisted state remains in the database
      - Entity is queryable via query_entities tool
      archival: Future concern — retention policy and cold storage are not specified in v1.1.0.
      event_rejection: 'When an event arrives targeting an entity in a terminal state, the platform rejects it before handler
        execution. No guard runs, no handler runs, no state changes. The event is marked as rejected with reason: terminal_entity.
        This is unconditional — no configuration can override it. Terminal means terminal.'
      absorbing: Terminal states are absorbing by default. Once an entity reaches a terminal state, it cannot leave. All events
        for that entity are rejected. This is unconditional.
      no_reopen_mechanism: There is no opt-in mechanism to reopen a terminal entity. If a business process needs to "reopen"
        a killed/closed entity, the correct pattern is to create a NEW entity (new entity_id) with data copied from the old
        one. The old entity remains terminal. This preserves audit trail integrity.
      backward_transitions: Backward transitions (e.g., review → draft) are allowed for NON-terminal states. The prohibition
        is specifically on leaving terminal states, not on backward movement in general. Revision loops, reset-to-earlier-state,
        and similar patterns are valid.
    entity_field_resolution:
      description: 'In CEL expressions, entity.X resolves against a unified namespace that includes: entity_state.fields (from
        declared entity fields, entity_state.current_state (as entity.current_state), entity_state.gates (as entity.gates.X), and
        node-local state_schema fields (from accumulate/compute writes). Entity contract fields come from entities.yaml, not
        package.yaml.entity_schema. Declared entity fields are universally readable at type-valid values; node state remains
        a separate local concept merged into the CEL namespace by the runtime.'
    state_schema_scoping: state_schema fields are node-scoped in storage. In CEL, entity.X reads the current handler node
      state. Cross-node state reads are not supported — use events to pass data between nodes.
  accumulation_engine:
    description: The accumulation engine is the platform subsystem that handles the accumulate primitive. It tracks multiple
      event arrivals for the same entity and fires on completion.
    tracking:
      setup: 'When an entity first encounters a handler with accumulate.track, the platform creates an accumulator record:
        expected items list, received items list (empty).'
      arrival: 'Each event arrival is identified by its dedup_by key. Default: sender session ID. Can be overridden to a payload
        field (e.g., payload.dimension). If the key was already received, the arrival is ignored (idempotent). If not, it
        is added to the received set and persisted.'
      completion_check: 'After each arrival, check the completion condition: all (every expected item received), threshold
        (received count >= N), or timeout (timer fires regardless of count).'
    completion_modes:
      all: Proceed when every item in the expected list has been received.
      threshold: Proceed when received count reaches a configured number.
      timeout: Proceed when a timer fires, regardless of how many items arrived. Partial results available.
    on_complete: When completion condition is met, the handler continues to the remaining steps (compute, on_complete branches,
      advances_to, emit). The accumulated data is available to these steps.
    on_timeout: If the handler declares accumulate.on_timeout, the platform executes that branch when the timer fires before
      completion. Partial accumulated data is available. Typically used to proceed with whatever data arrived.
    idempotency: Duplicate arrivals (same item, same entity) are ignored. The received list is a set, not a list. Crash recovery
      replays events through the same tracking — already-received items are skipped, accumulator state is consistent.
    cleanup: After completion fires and the handler commits, the accumulator record can be archived or deleted. The entity
      has moved past the accumulation state.
  agent_session_management:
    description: The platform manages agent sessions — the lifecycle of an agent from receiving an event to completing its
      response.
    session_lifecycle:
    - 1. Event arrives in agent inbox.
    - '2. Platform creates agent session: load prompt from prompts/, substitute {{variables}} from policy.'
    - 3. Platform provides tools (from tools.yaml) to the agent session.
    - '4. Agent processes event: reasons, may call tools, may emit events.'
    - 5. Each tool call is validated (schema check, permission check) before execution.
    - 6. Each emitted event is validated (payload schema) and enters the event loop.
    - 7. Agent session completes when agent signals done or max_turns_per_task reached.
    - 8. Session state is persisted for audit/debug.
    tool_execution: Tools execute within the agent session context. Platform validates tool input against schema. Platform
      checks agent permissions before execution. Tool results are returned to the agent for continued reasoning.
    event_emission: When an agent emits an event, the platform validates the payload against events.yaml schema before publish.
      Missing required payload fields fail the emit. Undeclared agent-authored payload fields fail the emit and are not silently
      stripped. The event enters the event loop at step 1 only after that validation passes. Agent emission is NOT within a
      node handler atomic boundary — it is a standalone event publication.
    turn_budget: Each agent session has a max_turns_per_task (from agents.yaml). If the agent exceeds this budget, the session
      is terminated. The platform may emit a timeout or budget_exceeded event.
    agent_invocation: 'Agents are invoked via claude -p (CLI) or equivalent LLM API call. The platform constructs the invocation:
      system prompt + event context + tool schemas. Agents are short-lived and task-scoped. No persistent memory between sessions.
      Context from previous interactions is provided via event payload and entity state.'
    conversation_modes:
      description: How the platform manages agent session context across invocations.
      modes:
        task: New session per event. No memory between invocations. Stateless.
        session: Session persists across events for the agent. Requires explicit session_scope global or flow.
        session_per_entity: One session per entity the agent works on. Requires explicit session_scope entity. Agent retains
          context across multiple events for the same entity but has separate sessions for different entities. Useful for
          agents that need continuity (e.g., research agent building a brief over multiple turns).
      default: task
    subscription_types:
      subscriptions: Static subscription list. Always active from boot (or from instance creation for dynamic flows). Cannot
        be modified at runtime. This is the agent's declared event contract.
    emit_tool_convention:
      description: The platform auto-generates emit tools from each agent's emit_events list. Agents do NOT need to list emit
        tools in tools.
      naming: 'emit_{event_name} where dots are replaced with underscores. Example: emit_events: [score.dimension_complete]
        → tool: emit_score_dimension_complete'
      behavior: Each emit tool accepts a payload object matching the event's schema in events.yaml. The platform validates
        the payload, attaches sender context, and publishes the event.
      universal_tools: 'The following tools are auto-granted to all agents without explicit tools listing: agent_message,
        mailbox_send, get_entity, save_entity_field, query_entities, query_metrics, search_entities. These are "universal"
        tools. See tool_model.agent_tool_filtering.universal_tools for the authoritative list.'
    task_mode_audit: 'Agents in task conversation_mode do NOT create agent_sessions rows. Task mode is
      stateless — no live session, no session lookup, no session persistence. The conversation transcript
      (reasoning, tool calls, results) is persisted after each invocation to agent_conversation_audits
      (write-only audit table) and agent_turns (per-turn append-only log). The transcript is NEVER loaded
      back for subsequent invocations. Each event invocation starts with a fresh context. Task mode means
      "no memory between invocations" AND "no live session row." The persisted audit snapshot enables the
      builder Run tab to show agent reasoning details. Rows may be archived per retention policy.'
    provider_session_ids: 'External LLM provider session IDs (e.g., Anthropic conversation ID) are stored in
      runtime_state.provider_session_id — in agent_sessions for session/session_per_entity modes, in
      agent_conversation_audits for task mode. NOT in session_id or audit_id. Those are platform-owned
      UUID primary keys. The provider ID is an implementation detail that may change if the provider is swapped.'
    session_termination_metadata:
      description: 'Structured termination metadata for live reusable sessions. Stale live-session meanings
        such as orphaned, contaminated, and superseded are NOT status values. status remains one of
        active, suspended, terminated. termination_reason explains why the session was terminated.
        successor_session_id links a terminated session to its replacement when one exists.'
      uniqueness_model:
        description: 'The database uniqueness model for agent_sessions applies only to non-terminated rows.
          Terminated rows are historical lineage and may coexist for the same scope.'
        old_constraint: UNIQUE (agent_id, scope_key)
        new_constraint: 'UNIQUE INDEX agent_sessions_nonterminated_unique ON agent_sessions(agent_id, scope_key)
          WHERE status <> ''terminated'''
        live_owner_query: 'Live runtime ownership queries MUST filter status = ''active''.'
        resumable_owner_query: 'Resumable-owner queries MUST filter status IN (''active'', ''suspended'').'
      fields:
        termination_reason:
          values:
          - normal
          - cancelled
          - failed
          - orphaned
          - contaminated
          - legacy
          semantics: 'legacy is reserved for migration backfill only. The runtime MUST NOT set legacy on new terminations.'
        termination_detail: Optional human-readable detail for diagnostics/operator UI.
        successor_session_id: 'UUID link to the successor session in the same agent/scope/scope_key lineage. A session is
          superseded iff successor_session_id IS NOT NULL.'
        terminated_at: Timestamp set when status transitions to terminated.
      invariants:
      - 'status IN (active, suspended) → termination_reason, termination_detail, successor_session_id, terminated_at are NULL.'
      - 'status = terminated → termination_reason and terminated_at are required.'
      - 'successor_session_id IS NOT NULL → status = terminated.'
      - 'successor_session_id must reference a different session_id with the same agent_id, scope, and scope_key.'
      - 'successor_session_id lineage must be acyclic.'
      - 'terminated sessions are never resurrected to active or suspended.'
      transitions:
      - 'active → suspended'
      - 'suspended → active'
      - 'active → terminated'
      - 'suspended → terminated'
      - 'terminated rows may receive successor_session_id later, but status and termination_reason do not change.'
      migration:
      - 'Add nullable termination_reason, termination_detail, successor_session_id, terminated_at columns.'
      - 'Replace old UNIQUE (agent_id, scope_key) with the partial non-terminated unique index.'
      - 'Backfill legacy terminated rows to termination_reason = legacy and terminated_at = COALESCE(updated_at, created_at).'
      - 'Enable invariant enforcement only after the legacy backfill.'
    conversation_mode_values:
      task: 'Stateless between invocations. No agent_sessions row. Audit snapshot persisted to
        agent_conversation_audits (write-only). Per-turn history in agent_turns. Never reloaded.
        Each invocation starts fresh.'
      session: 'Persistent session across events. Live session row in agent_sessions. Requires explicit
        session_scope global or flow. Conversation history maintained and reused. Agent accumulates context.'
      session_per_entity: 'One session per agent × entity. Live session row in agent_sessions per entity.
        Requires explicit session_scope entity. Context preserved and reused per entity.'
      stateless: Alias for task. Accepted by the loader, normalized to task internally.
    session_scope_intent:
      description: 'Explicit session scope declaration for agent contracts. Removes scope inference from
        agent placement or actor form.'
      contract_field:
        field: session_scope
        location: Agent declaration in agents.yaml, alongside conversation_mode.
        type: string
        values:
        - global
        - flow
        - entity
      canonical_rules:
        task: 'conversation_mode task: session_scope must be absent.'
        session_global: 'conversation_mode session + session_scope global: one session per agent across
          the system. scope_key = "global".'
        session_flow: 'conversation_mode session + session_scope flow: one session per agent per flow
          instance. scope_key = flow_instance path.'
        session_per_entity: 'conversation_mode session_per_entity + session_scope entity: one reusable
          session per agent per entity within the same flow instance. scope_key = entity_id.'
      invalid_combinations:
        task_present: 'task + session_scope present is a boot error.'
        session_missing: 'session + session_scope absent is a boot error.'
        session_entity: 'session + session_scope entity is a boot error. Use session_per_entity.'
        entity_missing: 'session_per_entity + session_scope absent is a boot error.'
        entity_global: 'session_per_entity + session_scope global is a boot error. Use session with
          session_scope global.'
        entity_flow: 'session_per_entity + session_scope flow is a boot error. Use session with
          session_scope flow.'
      boot_validation:
        description: Enforced at boot, not at first runtime session acquisition.
        rules:
        - Validate conversation_mode + session_scope against the canonical combinations.
        - No inference. No fallback. Missing required session_scope is a boot error.
        - session_scope flow requires a flow-scoped declaration with resolvable flow-instance context.
          Root-level agents cannot declare session_scope flow.
        - session_scope entity requires a flow that manages entities (has initial_state). Stateless
          flows cannot declare session_scope entity.
      lookup_rules:
        global: scope_key = "global"
        flow: scope_key = flow_instance path of the agent
        entity: scope_key = entity_id from the triggering event within the agent's flow instance
    native_tools:
      description: Optional agent contract field. Declares which host-level capabilities the agent may use. Default all false
        (omitted = no native capabilities). The native_tools field is the sole authorization gate — no separate permission
        entry is required. Native tools are not part of the tools system. They are runtime-level capabilities. On the shipped
        CLI runtime, `bash`, `web_search`, and `file_io` are provider-native only; the platform does not satisfy native_tools
        by injecting fallback tools, and visible native-tool surface must equal callable truth. Other runtimes may still use
        runtime-specific fallback paths outside this CLI-specific rule.
      contract_field:
        field: native_tools
        type: object
        location: Agent declaration in agents.yaml, alongside tools and permissions.
        default: All capabilities false. Agents do not get native capabilities unless explicitly enabled.
        example: "native_tools:\n  bash: true\n  web_search: true\n  file_io: false"
      authorization:
        description: The native_tools field IS the authorization. It does not require a matching entry in the permissions list.
          Permissions govern platform operations (shared state — agents table, routing, mailbox). Native tools govern local
          execution capabilities (host shell, web access, filesystem). Different concerns, different gates. If the agent contract
          says bash true, the agent gets bash. Boot validation checks that capability names are valid and values are boolean.
      relationship_to_tool_filtering:
        description: Native tools are NOT part of the tools filtering system. tools controls what the platform
          injects as platform/MCP/HTTP tools. Native tools control runtime-level capabilities. They are separate channels.
          On CLI, the platform must not inject a platform tool, MCP shim, or local fallback execution path to satisfy a
          native_tools declaration. The visible native-tool surface for a turn must equal callable truth on that same turn.
      capabilities:
        bash:
          description: Shell command execution. On supporting runtimes, bash runs provider-natively and always executes locally
            on the platform host, in the agent's workspace directory with workspace mounts active (/workspace read-write, /data
            read-only, /opt/swarm/contracts read-only).
          tool_schema:
            input:
              command: string — shell command to execute
              timeout_seconds: integer — optional, default 30
              working_dir: string — always /workspace for the agent's workspace scope. Not overridable by the agent.
            output:
              stdout: string
              stderr: string
              exit_code: integer
              duration_ms: integer
          security_note: Powerful capability. The agent can execute arbitrary commands as the platform process user. Grant only
            to agents that need host-level operations (e.g., infrastructure management agents). Not appropriate for data-processing
            or analysis agents.
        web_search:
          description: Internet search. On the shipped CLI runtime, web_search is a provider-native capability. The platform
            does not satisfy native_tools.web_search through policy-managed search-provider fallback on CLI.
          tool_schema:
            input:
              query: string — search query
              max_results: integer — optional, default 10
            output:
              results: array of objects with title, url, snippet fields
          configuration:
            description: On CLI, policy.web_search_provider is not part of the native_tools contract. It does not satisfy,
              unlock, or downgrade native_tools.web_search. If the configured CLI runtime cannot expose provider-native web_search,
              startup/runtime validation must fail closed. Non-CLI runtimes may still use fallback-aware validation outside
              this CLI-specific rule.
        file_io:
          description: Read and write files within workspace mounts. On the shipped CLI runtime, file_io is provider-native
            and maps to callable read_file/write_file operations on the same turn. /workspace is read-write, /data is read-only,
            /opt/swarm/contracts is read-only. Always runs locally.
          tool_schema:
            read_file:
              input:
                path: string — file path relative to workspace root or absolute within mounts
              output:
                content: string
                size_bytes: integer
            write_file:
              input:
                path: string — must be within /workspace
                content: string
              output:
                bytes_written: integer
      tool_names:
        description: Canonical tool names the agent sees for native capabilities on the CLI supporting-runtime path. These
          names are authoritative only when the same turn can actually call them. The platform must not advertise speculative
          or fallback-only native tool names on CLI.
        bash:
          tool_name: bash
          note: Single tool. Same name as the capability.
        web_search:
          tool_name: web_search
          provider_builtins:
          - WebSearch
          - WebFetch
          note: Canonical Swarm-visible name is `web_search`. On CLI this capability authorizes both provider-native web search
            and direct page-fetch builtins, but they collapse to the same canonical native capability for authorization and
            persisted turn-surface truth.
        file_io:
          tool_names:
          - read_file
          - write_file
          note: The file_io capability maps to two callable tools. The contract field is one boolean (file_io), but the agent
            sees read_file and write_file only when the supporting runtime can actually call them on that turn.
      runtime_resolution:
        description: How the platform resolves native_tools at agent session creation time on the shipped CLI runtime. All
          execution is local to the platform host. CLI enables only provider-native capability support and fails closed otherwise.
          Other runtimes may use fallback-aware validation and are outside this CLI-specific fail-closed rule.
        steps:
        - 1. Read native_tools from agent contract. If absent or empty, no native capabilities — skip.
        - 2. If the configured runtime is CLI-native-strict, ask the runtime which native capabilities it exposes provider-natively.
        - 3. For each enabled capability (bash, web_search, file_io), if the strict CLI runtime does not support it provider-natively,
          fail closed before the session/turn can advertise or execute that capability.
        - 4. On the shipped CLI runtime, enable the provider-native capability through provider invocation and transport binding.
          These run locally on the same host — workspace scoping is inherent.
        - 5. On CLI, do not inject platform fallback tools, MCP shims, or local compatibility paths to satisfy native_tools.
        - 6. Persisted turn surfaces on CLI (for example available_tools and MCP-visible facts) must reflect the same callable truth
          observed for that turn.
        provider_detection: The platform determines CLI native-tool support from the configured runtime adapter. Runtime startup
          probes may further fail closed if a declared capability cannot be bound or called on the shipped CLI runtime path.
      environment:
        description: All native tool execution is local to the platform host and respects the workspace model.
        rules:
        - All native tool execution runs locally on the platform host. There is no remote execution case.
        - bash cwd is /workspace for the agent's workspace class scope
        - file_io is scoped to /workspace (read-write) and /data (read-only). Writes outside /workspace are rejected.
        - On CLI, workspace scoping is guaranteed on the provider-native runtime path. The platform does not satisfy native_tools
          by switching to a separate fallback execution path.
        - Environment variables from the credential store are NOT exposed to native tools. Agents access credentials through
          platform tools (HTTP tool credential substitution, MCP server auth), not via env vars in bash.
      audit:
        description: All native tool usage is captured for observability. Task-mode agents persist transcripts (write-only)
          which ensures provider-native tool calls are always recorded regardless of conversation mode.
        provider_native: Provider-native tool usage is captured in the agent session transcript. For task-mode agents, the
          transcript is persisted (write-only) but never reloaded — providing a full audit trail without breaking stateless
          semantics.
        surface_truth: On CLI, persisted available_tools and MCP-visible turn facts must describe only the tools that were
          actually callable on that turn. The platform must not narrate native-tool fallback availability it cannot execute.
      boot_validation:
        checks:
        - All capability names in native_tools must be recognized (bash, web_search, file_io). Unknown names are a boot error.
        - All values must be boolean. Non-boolean values are a boot error.
        - If any enabled native capability is unsupported by a CLI-native-strict runtime's provider-native capability set, startup/runtime
          validation fails closed. policy.web_search_provider is not part of CLI native_tools validation or authorization. Non-CLI
          runtimes may still use fallback-aware validation outside this CLI-specific rule.
  timer_model:
    description: Timers are durable delayed events. The platform schedules them and fires them as regular events entering
      the event loop. Timers are declared in nodes.yaml.
    declaration:
      description: Timers are declared per system node in nodes.yaml.
      fields:
        id: Unique timer name
        event: Event name to fire when timer expires (e.g., timer.scan_timeout)
        delay: Duration string (e.g., 72h, 30m, 7d) or policy reference (e.g., policy.sla_timeout)
        recurring: Boolean — if true, timer re-fires at the interval until cancelled
        start_on: Trigger that starts the timer. Canonical forms are state:<name>, event:<name>, or boot.
        cancel_on: Trigger that cancels the timer. Canonical forms are state:<name> or event:<name>. boot is invalid.
      trigger_forms:
        state: "state:<name> starts or cancels when the entity enters the named state"
        event: "event:<name> starts or cancels when the named event fires for the entity"
        boot: "start_on: boot starts a timer at platform boot. This form is only valid on start_on."
      invalid_forms:
      - "Unprefixed trigger values are boot errors. The platform does not infer state-vs-event intent from bare strings."
      - "Prefixes other than state: and event: are boot errors."
    lifecycle:
    - 1. Timer starts when the entity enters the start_on state, the start_on event fires, or start_on is boot and platform startup schedules it.
    - 2. Platform persists the timer (entity_id, timer_id, fire_at timestamp).
    - 3. When fire_at is reached, platform emits the timer event into the event loop.
    - 4. Timer event is a regular event — routed to subscribers, processed by handlers.
    - 5. If cancel_on state is reached or cancel_on event fires before fire_at, timer is cancelled.
    - 6. Recurring timers restart after firing unless cancelled.
    crash_recovery: Timers are persisted. On restart, platform checks for expired timers and fires them.
    boot_validation:
      start_on: start_on must match state:<name>, event:<name>, or boot. Any other form is a boot error.
      cancel_on: cancel_on must match state:<name> or event:<name>. boot is not valid.
      state_reference: state:<name> must reference a declared flow state. Unknown state is a boot error.
      event_reference: event:<name> should reference an event in the flow or platform catalog. Unknown event is a boot warning.
    example: "timers:\n  - id: sla_timeout\n    event: timer.sla_breach\n    delay: \"{{sla_timeout_hours}}h\"\
      \n    start_on: state:assigned\n    cancel_on: state:resolved\n    recurring: false\n  - id: daily_report\n\
      \    event: timer.daily_report\n    delay: \"{{report_interval_hours}}h\"\n    start_on: boot\n    recurring: true"
  expression_language:
    description: All guard checks, rule conditions, filter conditions, and on_complete branch conditions are evaluated using
      CEL (Common Expression Language). CEL is a non-Turing-complete, safe expression language designed for policy evaluation.
    specification: https://github.com/google/cel-spec
    go_implementation: https://github.com/google/cel-go
    context_variables:
      entity: Current entity state (all declared entity fields at type-valid values + envelope + gates)
      payload: Current event payload fields
      policy: Policy values from flow policy.yaml merged with root policy.yaml
      fan_out: Available after fan_out step (e.g., fan_out.count)
      accumulated: Available inside on_complete after accumulation (list of received items)
    supported_operators:
    - 'Comparison: ==, !=, <, <=, >, >='
    - 'Logical: &&, ||, !'
    - 'Arithmetic: +, -, *, /'
    - 'Membership: in, contains'
    - 'String: startsWith, endsWith, matches'
    - 'List: size, exists, all, filter, map'
    presence_semantics:
      has_function:
        signature: has(entity.X) -> boolean
        meaning: Returns true for declared entity fields. Remains useful for dynamic maps and rare non-contract objects, but is
          redundant for declared entity fields under universal presence semantics.
      null_comparison:
        meaning: 'entity.X == null and entity.X != null compare against the materialized value. Timestamp and uuid fields may
          legitimately read null when unwritten; most other declared fields read their non-null type defaults.'
      missing_field_rule: Declared entity fields read as their explicit initial or type default. Undeclared fields are contract errors.
    examples:
    - entity.retry_count <= policy.max_retries
    - payload.category == "billing"
    - entity.priority_score >= policy.min_priority
    - entity.error_count == 0
    - payload.decision == "approve"
    - entity.revision_count < policy.max_revisions
    - entity.total_amount >= policy.approval_threshold
    - entity.kill_reason
    - entity.kill_reason != null
  error_model:
    description: How the platform handles failures at each layer.
    event_validation_failure:
      behavior: Reject event. Log error. Do not deliver. No retry.
      visibility: Error logged with event name, payload, and validation error.
    handler_execution_failure:
      behavior: Rollback atomic boundary. Mark event as failed for this handler.
      retry_policy:
        max_retries: 3
        backoff: exponential with configurable base. Default base 1s (delays 1s, 2s, 4s). Configurable via policy.yaml
          handler_retry_base_seconds. Production deployments may use longer bases (e.g., 60s for 1min, 5min, 30min delays).
        retry_on: transient errors (DB timeout, lock contention)
        no_retry_on: guard failures, validation errors, business logic failures
      dead_letter: After max_retries exhausted, emit platform.dead_letter with original event, error details, and retry history.
        Dead letter events are root-scoped.
    agent_session_failure:
      behavior: Agent exceeds turn budget or crashes. Session terminated.
      retry_policy:
        max_retries: 1
        backoff: Same configurable base as handler retries.
        note: Agent sessions are expensive (LLM calls). Retry once, then dead-letter. The 1-retry limit is separate from the
          handler 3-retry limit.
    timer_failure:
      behavior: Timer event treated as regular event. Same retry policy as handler failures.
    chain_depth_limit:
      description: Maximum number of chained event emissions in a single causal chain. Prevents A→B→A→B infinite loops.
      max_depth: 50
      behavior: Each event carries a chain_depth counter (starting at 0). When a handler emits a new event, chain_depth increments.
        If chain_depth exceeds max_depth, the event is routed to platform.dead_letter instead of being delivered. The chain
        is broken.
    dead_letter_schema:
      description: Structured payload for platform.dead_letter events.
      fields:
        original_event: string — the event name that failed
        original_payload: object — full payload of the failed event
        entity_id: string — entity the event was targeting
        flow_instance: string — flow instance path
        failure_type: 'string — handler_error (non-retryable failure: validation error, business logic error, guard-escalated
          error — goes to dead letter immediately without retry) | chain_depth_exceeded (emission intercepted at depth limit)
          | retry_exhausted (retried max_retries times, all failed)'
        error_message: string — human-readable error description
        retry_count: integer — number of retries attempted before dead-lettering
        chain_depth: integer — current chain depth (for chain_depth_exceeded)
        handler_node: string — which system node was handling (if handler_error)
        timestamp: string — ISO 8601
    chain_depth_behavior:
      description: 'What happens when chain_depth exceeds the limit (default: 50).'
      intercepted_event: The event that would exceed the limit is NOT emitted. It is intercepted before entering the event
        loop. It does NOT appear in emitted_events.
      dead_letter_record: 'A dead_letters row is created with failure_type: chain_depth_exceeded, containing the intercepted
        event name, payload, and the chain depth at interception.'
      triggering_handler_outcome: 'The handler that attempted to emit the chain-exceeding event gets outcome: success. The
        handler itself succeeded — it is the EMITTED event that was intercepted. The handler''s other side effects (state
        changes, gate sets, data writes) still commit.'
      note: Chain depth overflow is NOT a handler failure. It is an emission interception. The dead_letter is for the downstream
        event, not the handler that produced it.
  boot_verification:
    description: The platform runs contract verification at boot, after loading all contracts and before starting any nodes
      or agents. If any check fails, boot aborts. These checks are the authoritative integration test.
    checks:
    - id: event_chain_integrity
      severity: warning
      scope: per-flow
      trigger: An emitted event has no handler path to any terminal state or output pin. Detects dead-end events.
      when: boot-only
    - id: event_consumer_exists
      severity: warning
      scope: per-flow
      trigger: An event is emitted (by a node handler or agent emit_events) but no node or agent subscribes to it. Suppressed
        if the event has _consumer or _status annotations.
      when: boot-only
    - id: event_producer_exists
      severity: warning
      scope: per-flow
      trigger: An agent subscribes to an event that no node handler emits and no agent lists in emit_events. Suppressed if
        the event has _source or _status annotations.
      when: boot-only
    - id: payload_field_coverage
      severity: error
      scope: per-flow
      trigger: A handler references a payload field (in guard, data_accumulation, rules condition) that does not exist in the
        triggering event's payload schema in events.yaml.
      when: boot-only
    - id: condition_payload_alignment
      severity: error
      scope: per-flow
      trigger: A CEL condition references payload.X where X is not a declared field in the triggering event's schema.
      when: boot-only
    - id: condition_policy_alignment
      severity: warning
      scope: per-flow
      trigger: A CEL condition references policy.X where X is not a key in any reachable policy.yaml (flow-level or root).
      when: boot-only
    - id: state_machine_coherence
      severity: error
      scope: per-flow
      trigger: An advances_to target is not in the flow's declared states list. Or initial_state is not in states.
      when: boot-only
    - id: required_agents_match
      severity: error
      scope: per-flow
      trigger: A flow schema declares a required_agents role that has no matching agent in agents.yaml (by map key).
      when: boot-only
    - id: handler_field_compliance
      severity: error
      scope: per-flow
      trigger: A handler uses a field name not in the defined handler_fields set (create_entity, guard, accumulate, fan_out,
        filter, reduce, count, compute, on_complete, rules, advances_to, sets_gate, data_accumulation, emit, action,
        clear_gates, clear, query, description, evidence_target).
      when: boot-only
    - id: tool_resolution
      severity: warning
      scope: per-agent
      trigger: An agent's tools list references a tool name that does not exist in the merged tool registry (tools.yaml +
        MCP server catalogs).
      when: boot-only
    - id: prompt_exists
      severity: warning
      scope: per-agent
      trigger: An agent has no prompt file at prompts/{agent-id}.md.
      when: boot-only
    - id: produces_drift
      severity: warning
      scope: per-node
      trigger: >-
        A node's explicit produces list does not match the set of events derived from its supported declarative emit
        sites: handler top-level emit, rules emit, on_complete emit, accumulate.on_timeout emit, and fan_out emit.
      when: boot-only
    - id: invalid_field_detection
      severity: error
      scope: per-node
      trigger: A node declaration uses a top-level field not in the defined node_fields set (id, execution_type, description,
        subscribes_to, event_handlers, state_schema, state_table, timers, gate_state, permissions, produces).
      when: boot-only
    - id: policy_conflict_detection
      severity: warning
      scope: per-flow
      trigger: A child flow policy key overrides a parent flow policy key with a different value. Informational — override
        is allowed, but the conflict is logged.
      when: boot-only
    - id: event_cycle_detection
      severity: error
      scope: per-flow
      trigger: A handler emits an event that, through a chain of handlers, eventually triggers the same handler. Indicates
        a potential infinite loop. Chain depth limit (50) is the runtime safety net, but cycles should be caught at boot.
      when: boot-only
    - id: dialect_compliance
      severity: error
      scope: per-node
      trigger: A handler uses on_complete as a map (dict) instead of a list (ordered). Or uses both on_complete and rules
        on the same handler. Or uses both create_entity and accumulate on the same handler.
      when: boot-only
    - id: single_node_per_event
      severity: error
      scope: global
      trigger: Two system nodes declare handlers for the same event name. Only one node may own a handler per event.
      when: boot-only
    - id: config_from_payload_alignment
      severity: error
      scope: per-node
      trigger: A create_flow_instance action's config_from references payload fields not present in the triggering event's
        schema.
      when: boot-only
    - id: phantom_produces
      severity: warning
      scope: per-node
      trigger: A node's produces list includes an event that no handler in the node actually emits.
      when: boot-only
    - id: native_tools_valid
      severity: error
      scope: per-agent
      trigger: An agent's native_tools field contains an unrecognized capability name (not bash, web_search, file_io) or a
        non-boolean value. This check validates declaration shape only; it does not treat policy.web_search_provider or any
        other fallback path as satisfying a native tool.
      when: boot-only
    - id: mcp_server_reachable
      severity: warning
      scope: global
      trigger: An MCP server declared in policy.yaml mcp_servers is unreachable at boot. Tools from that server are unavailable.
      when: boot-only
    - id: platform_namespace_violation
      severity: error
      scope: per-flow
      trigger: A product events.yaml contains an event name starting with the reserved platform. prefix. Also applies to
        agent emit_events declarations.
      when: boot-only
    - id: workspace_class_exists
      severity: error
      scope: per-agent
      trigger: An agent declares a workspace_class that is not defined in policy.yaml workspace_classes and is not a
        platform-reserved class.
      when: boot-only
    - id: credential_key_exists
      severity: warning
      scope: global
      trigger: A tool's credentials field or an MCP server's credentials_key references a credential key that does not exist
        in the credential store (any tier). The tool may be unconfigured in this deployment.
      when: boot-only
    - id: agent_permission_validation
      severity: error
      scope: per-agent
      trigger: An agent declares an unknown permission (not in the platform permissions list and not in workflow_extension_permissions).
        Or an agent's tools list includes a platform builtin tool whose required permission is not in the agent's permissions
        or permission bundle.
      when: boot-only
    - id: transition_reference_validation
      severity: error
      scope: per-flow
      trigger: A state transition (advances_to, on_complete branch) references a trigger event not in events.yaml. Or a flow's
        input/output event pins reference events not defined in any events.yaml in the flow tree.
      when: boot-only
    - id: condition_expression_validation
      severity: error
      scope: per-node
      trigger: A guard on_fail value is not one of reject, kill, discard, or escalate. Or a CEL condition is syntactically
        invalid (parse failure). Or a condition string lacks a required context prefix (entity., payload., policy., accumulated.,
        fan_out.).
      when: boot-only
    - id: transition_ownership_validation
      severity: error
      scope: per-flow
      trigger: A system node declares ownership of a transition but the flow schema does not include the transition's target
        state. Or a node owns a transition whose trigger event is not in its subscribes_to list.
      when: boot-only
    - id: event_runtime_wiring_validation
      severity: error
      scope: per-flow
      trigger: An event that requires system node handling (has node-owned state transitions) has no owning node registered. Or
        the owning node exists but has no handler for the event.
      when: boot-only
    - id: timer_validation
      severity: error
      scope: per-node
      trigger: A timer declaration is missing its owner (owner_node or owner_agent). Or the timer's owner is not a registered
        participant in the flow. Or the timer's fire_event is not in events.yaml.
      when: boot-only
    - id: write_pin_ownership_validation
      severity: error
      scope: per-flow
      trigger: Two flows declare writes to the same entity field (output data pin). Only one flow may write a given field.
      when: boot-only
    - id: gate_schema_validation
      severity: error
      scope: per-node
      trigger: A handler's sets_gate references a gate name not declared in the node's gate_state schema.
      when: boot-only
    - id: input_pin_wiring
      severity: warning
      scope: per-flow
      trigger: 'A flow''s required input event pin (from schema.yaml pins.inputs.events) has no satisfiable authored producer
        path on the static verify surface. The warning checks only sibling flow output pins, root agent emit_events, root
        node handler emit sites, exact platform_events catalog matches, _source values starting with external, and same-flow
        timer declarations. It does not use produces or _status: planned as proof.'
      when: boot-only
    - id: semantic_drift_dead_event_schema
      severity: warning
      scope: per-event
      trigger: A product-declared event schema entry in `events.yaml` has no active authored role on the static verify surface.
        Active roles are limited to intra-flow local usage, explicit cross-flow qualified usage, root-local usage for root-declared
        events only, external `_source` / `_consumer` annotations, same-flow timer fire/start/cancel references, same-flow
        `fan_out.emit`, and same-flow `auto_emit_on_create`. It does not treat platform catalog membership, root-local
        references into child-flow declarations, or coincidental same local names in other flows as proof.
      when: boot-only
    severity_behavior:
      error: Boot aborts. System does not start.
      warning: Boot continues. Warning logged with finding details.
      hard_invalidity: Boot aborts. Deterministic Wave 1 contract drift is treated as error-level invalidity.
      semantic_drift_warning: Boot continues. Warning logged with finding details and explicit check ID.
      audit_analysis: Not surfaced on normal boot. Available on dedicated audit surfaces.
      lint_evidence: Informational only. Available on detailed lint/audit surfaces.
    check_count: 43 primary checks plus 3 supplemental checks
    implementation_notes:
      framework: Each check is a named function that receives the loaded contract bundle and returns a list of findings. Each
        finding has the check ID, severity, message, and location (flow, node, agent, or event name). The boot sequence runs
        all checks after contract loading and before starting nodes/agents.
      always_on: All checks run on every boot. There is no mechanism to disable individual checks. Acknowledged warnings
        (builder feature) are a UI concern, not a runtime concern.
      scope_meaning: per-flow checks run once per flow in the tree. per-node checks run once per node. per-agent checks run
        once per agent. global checks run once for the entire contract bundle.
compliance:
  description: Boot-time and runtime compliance enforcement.
  runtime_enforcement:
    description: Checks the platform performs during execution.
    required_checks:
    - Tool calls validated against tool schema before execution
    - Platform builtin tool calls checked against agent permissions before execution (tools field entries only — MCP, HTTP,
      and native tools have their own authorization models)
    - Message delivery checked against agent message scope permission
    - State state_changes only follow declared advances_to paths
    - Guards evaluated before state advancement — block if false
    - Events, including action-originated emits, validated against payload schema before publish
    - Accumulation is idempotent — duplicate events do not double-count
    - Permission checks read from agent.permissions, not hardcoded policy functions
    - Product behavior read from policy configuration, not hardcoded
    - Manager fallback read from agent.manager_fallback, not hardcoded role mapping
    - Workspace class read from agent.workspace_class, not hardcoded
  testing:
    description: Required test coverage for spec compliance.
    required_tests:
    - Boot validation passes with current contracts (all checks green)
    - Native tools fail closed when the configured runtime lacks provider-native support for a declared capability
    - Every declared handler has a matching Handle() implementation
    - Every state state_change follows declared advances_to paths
    - Every emitted event has a payload schema in events.yaml
    - Every agent subscription resolves to an event some node or agent produces
    - Permission enforcement blocks unauthorized tool calls
    - Accumulation is idempotent under duplicate event delivery
    - Crash recovery replays undelivered events correctly
    - Persisted native-tool surfaces match callable turn truth for the supporting runtime path
    - Namespace substitution works for multi-instance flows
  handler_execution:
    description: How the runtime executes event handlers.
    rules:
    - Match inbound event to handler in owning node
    - 'If handler has guard: evaluate condition. If false, reject or kill.'
    - 'If handler has accumulate: track arrival, check completion, proceed only on complete.'
    - 'If handler has on_complete: evaluate conditions, execute matching branch.'
    - 'If handler has rules: match payload field, select the matching rule-local emit if present.'
    - 'Apply advances_to, sets_gate, and data_accumulation from the active handler/branch/rule outcome.'
    - 'If the active emit site has emit: publish the selected follow-up event.'
    - 'If handler has action that is a platform action: call registered platform action.'
    - 'If the resolved action runtime instruction emits an event: publish it using the action-originated payload rules and fail-closed schema validation before commit.'
  product_boundary:
    description: Rules for product-specific code isolation.
    rules:
    - Product-specific Go code lives only in approved product packages (e.g., internal/runtime/pipeline/product/)
    - Generic runtime packages contain zero product references
    - Platform actions are platform action, not imported by generic code
    - CI guard fails if product literals appear in generic non-test Go files
  flow_coherence:
  - Every flow declared in package.yaml must have a directory under flows/
  - Root-level nodes must not duplicate flow-level node IDs
  - All handoff events must have both an emitter (source flow) and subscriber (target flow or declarative handoff)
  node_coherence:
  - Every event in event_handlers must appear in subscribes_to
  - Every event in produces must have a payload schema in events.yaml
  - Guards must reference fields that exist on the entity or in policy.yaml
  - advances_to states must be reachable from the current flow state space
  agent_coherence:
  - Every tool in tools must exist in the merged tool registry (tools.yaml + MCP server catalogs)
  - Every event in emit_events must have a payload schema in events.yaml
  - Agent permissions must include required permissions for platform builtin tools in their tools
  - Every subscription event must be emitted by some node or agent
  - Every native_tools capability must be a recognized name (bash, web_search, file_io) with a boolean value
  boot_enforcement: All boot checks are defined in engine.boot_verification.checks. This is the single authoritative list.
permissions_model:
  description: Agents have a permissions list controlling what capabilities they can exercise. The platform enforces permissions
    at tool execution time and message routing time. Workflows define permissions per agent in their agent registry. Optional
    permission_bundles in policy files provide shorthand for common sets.
  enforcement: Before executing a platform builtin tool call from tools, the platform checks the calling agent's permissions
    list. If the tool requires a permission the agent lacks, the call is rejected. MCP and HTTP tools are authorized by the
    tool registry and credential store, not by agent permissions. Native tools (bash, web_search, file_io) are authorized by
    the native_tools field on the agent contract. Message scope is enforced at agent_message delivery per the scoping rules
    defined in permission_scoping.
  workflow_extensions: 'Workflows may define additional permissions beyond the platform set. The platform passes unrecognized
    permissions to workflow-registered handlers. Example: a product workflow might define approve_deployment or override_scoring.'
  permissions:
  - agent_fire
  - agent_hire
  - agent_reconfigure
  - approve_spend
  - configure_routing
  - create_flow_instance
  - human_task_decide
  - human_task_request
  - mailbox_send
  - message_flow
  - message_peers
  - schedule
  bundle_semantics:
    description: An agent may declare permissions_bundle and/or explicit permissions. If both are present, the explicit permissions
      list EXTENDS the bundle. Duplicates are deduplicated. The bundle is expanded first, then explicit permissions are added.
  permission_scoping:
    description: Defines the target scope for each permission. The platform enforces these constraints at tool execution time.
      All scoping is flow-instance-local — no permission grants cross-flow access. Cross-flow communication is via events only.
    messaging:
      message_peers:
        scope: Agents sharing the same manager_fallback value, within the same flow instance.
        rule: Caller and target must be in the same flow instance AND target.manager_fallback == caller.manager_fallback.
      message_flow:
        scope: Any agent in the same flow instance.
        rule: Caller and target must be in the same flow instance. No further constraint.
      cross_flow: Not supported. agent_message delivery is rejected if target is in a different flow instance. Cross-flow communication
        uses events (emit + subscribe).
    management:
      description: agent_hire, agent_fire, agent_reconfigure target constraints.
      scope: Same flow instance, target below caller in manager_fallback chain.
      rules:
      - Caller and target must be in the same flow instance.
      - Target's manager_fallback chain must include the caller. (A can manage B if B.manager_fallback == A, or B.manager_fallback.manager_fallback
        == A, etc.)
      - An agent cannot manage itself.
      - An agent cannot manage its own manager_fallback ancestor.
    routing:
      description: configure_routing target constraints.
      scope: Self + manageable agents (same rules as management scope).
      rules:
      - Caller can modify routes for itself.
      - Caller can modify routes for any agent it can manage (per management scope).
      - Caller cannot modify routes for agents outside its flow instance.
    manager_fallback_semantics:
      description: manager_fallback is an escalation path, not a messaging or management grant. It determines where dead-lettered
        agent sessions route to and defines the management hierarchy. It does NOT grant the fallback target messaging access
        to the agent, and it does NOT allow messaging across flow boundaries even when the fallback target is in a different
        flow.
      cross_flow_fallback: When manager_fallback references an agent in a parent flow (e.g., a child flow agent falls back to
        a root-level coordinator), escalation produces an event (platform.dead_letter or equivalent), not a direct message.
        The platform routes the escalation event through the normal event loop.
tool_model:
  description: The platform owns all tool schema serving, call validation, and execution routing. Every tool has an implementation
    class that determines how the platform executes it. Three classes exist. The generic runtime ships executors for all three.
    No product-specific tool handler code is compiled into the generic runtime.
  tool_implementation_classes:
    description: Every tool falls into exactly one implementation class. The class determines where the execution logic lives,
      what the boot validation rules are, and what the portability guarantees are.
    platform_builtin:
      description: Tools the platform ships. Always available on every deployment. The platform owns the handler code. The list
        in platform_builtin_tools is exhaustive — no other tools may use this class.
      handler_type_value: platform_builtin
      boot_rule: Must exist. Boot error if a platform_builtin handler is missing. This should never happen.
      portability: Guaranteed on every platform instance.
    mcp:
      description: Tools provided by external MCP servers. The platform connects as an MCP client, discovers tools via tools/list,
        and forwards agent calls via tools/call. The platform ships one generic MCP client executor — no per-tool handler code.
      handler_type_value: mcp
      boot_rule: If an MCP server is unreachable at boot, log warning. Tools from that server are marked unavailable. Agents
        with those tools in tools get a boot warning (not error — the agent may not be invoked in this run). If the agent
        IS invoked and calls the tool, the platform returns a tool error to the agent.
      portability: Works anywhere the MCP server is reachable. Pre-built MCP servers exist for common services (databases,
        APIs, cloud providers). Products can ship custom MCP servers as sidecars for infrastructure-specific tools.
    http:
      description: Tools defined declaratively in tools.yaml as HTTP request templates. The platform ships one generic HTTP
        executor that reads the template, resolves variables, makes the HTTP call, and maps the response. No per-tool handler
        code. This is the primary mechanism for adding API-based tools without writing code.
      handler_type_value: http
      boot_rule: Tool definition must have a valid http block with at least url and method. Credential references are validated
        against the credential store — warning if missing (tool may be unconfigured in this deployment but should not block
        boot for other tools).
      portability: Works anywhere with network access to the target URL.
    deprecated:
      workflow_registered: 'Accepted by the loader for backward compatibility. Normalized to http if an http block is present,
        otherwise logs a boot warning: "Tool {name} uses deprecated handler_type workflow_registered with no http block. Migrate
        to handler_type: http with an http block, or provide the tool via an MCP server."'
      api_call: Same as workflow_registered — deprecated, accepted, warns.
  platform_builtin_tools:
    description: Authoritative list of platform-provided tools. Defined here only. This list is exhaustive. The runtime MUST
      ship a Go handler for each of these. Any tool not on this list MUST NOT have a Go handler in the generic runtime.
    tools:
      agent_message: Send a message to another agent. Auto-granted to all agents (universal tool).
      agent_fire: Terminate an agent session. Requires agent_fire permission.
      agent_hire: Spawn a new agent session. Requires agent_hire permission.
      agent_reconfigure: Modify an agent's prompt, tools, or subscriptions. Requires agent_reconfigure permission.
      create_entity: Create a new entity row in entity_state.
      get_entity: Read an entity by ID. Returns all fields the agent has permission to see. Auto-granted to all agents (universal
        tool).
      human_task_decide: Record a human decision on a pending task. Requires human_task_decide permission.
      human_task_request: Create a task for human execution. Requires human_task_request permission.
      mailbox_send: Send an item to the human mailbox for decision. Auto-granted to all agents (universal tool).
      query_entities: Query entities by state, fields, or aggregation. Auto-granted to all agents (universal tool).
      query_metrics: Read aggregated metrics (counts, sums, averages) across entities. Auto-granted to all agents (universal
        tool).
      save_entity_field: Write a specific field on an entity. Field must exist in the inferred entity contract. Auto-granted to all agents
        (universal tool).
      schedule: Schedule a future action or timer. Requires schedule permission.
      search_entities: Query entities by stage, field values, or metadata. Auto-granted to all agents (universal tool).
      get_subject_status: 'Query the full lifecycle of a business object across flows. Input: {subject_id}.
        Returns all flow entities for the subject with their states, terminal flags, and the latest active
        flow. Auto-granted to all agents (universal tool).'
    handler_actions:
      description: These are handler ACTION field values, not agent-callable tools. They are invoked via the action field in
        node handlers. The platform ships the handler code. They are listed separately from the tool catalog because agents
        cannot call them directly.
      actions:
        create_flow_instance: Create a new dynamic flow instance from a template.
        record_evidence: Append payload to entity accumulator. Requires evidence_target field on the handler.
    planned_tools:
      description: Tools planned for future platform versions. Not yet implemented. The permission may exist (as an authorization
        gate) before the tool does.
      configure_routing: Add, remove, or modify event routing rules at runtime. The configure_routing permission exists and gates
        this capability. The agent-callable tool is not yet implemented. Planned for v1.5.
    generic_runtime_rule: The generic runtime ships handlers for platform_builtin tools ONLY. It does not ship handlers for
      any product-specific tool. All other tools are executed via the MCP client or HTTP executor.
    entity_tool_schemas:
      description: All entity tools operate on the generic entity_state table. They read/write entity_state.fields (JSONB),
        entity_state.current_state, entity_state.gates, and entity_state.accumulator. They do NOT operate on product-specific
        typed tables. Product-specific tables are optional query-performance optimizations — the entity tools always use the
        generic entity_state interface.
      create_entity:
        description: Create a new entity row in entity_state.
        input:
          flow_instance: string — existing addressing surface. The platform infers the flow-owned entity contract from this context.
          fields: object — authored field values for the new entity. Keys must be declared on the inferred entity contract.
        output:
          entity_id: string — the created entity's ID
          subject_id: string — the subject linked to the new entity; defaults to entity_id when not supplied
          current_state: string — the entity's initial state from the owning flow state machine
          created_at: string — ISO 8601
        validation: The caller does not supply entity_id, entity_type, or envelope fields. Missing declared fields materialize
          from explicit initial values or type defaults.
      get_entity:
        description: Read an entity by ID. Returns the full entity state from entity_state table.
        input:
          flow_instance: string — required existing addressing surface for the owning flow instance
          entity_id: string — required
        output:
          entity_id: string
          flow_instance: string
          entity_type: string — inferred flow-scoped entity type
          name: string (nullable)
          current_state: string
          gates: object — map of gate names to boolean values
          fields: object — all declared entity fields at type-valid values
          accumulator: object — accumulator state
          revision: integer — entity revision number
          entered_state_at: string — ISO 8601, when current_state was entered
          created_at: string — ISO 8601
          updated_at: string — ISO 8601
        note: Returns all fields. No per-caller field filtering in v1. All agents see all entity fields. Per-field visibility
          is a potential future enhancement.
      save_entity_field:
        description: Write a specific field on an entity. The field is written to entity_state.fields JSONB.
        input:
          flow_instance: string — required existing addressing surface for the owning flow instance
          entity_id: string — required
          field: string — required top-level field name. Must exist on the inferred entity contract and must not be an envelope field.
          value: any — required, the value to write
        output:
          entity_id: string
          field: string
          revision: integer — new revision after write
        validation: The field name must exist on the inferred entity contract. Undeclared fields, dotted-path writes, envelope
          fields, and post-create writes to immutable fields are rejected.
      search_entities:
        description: Query entities by state, field values, or metadata. Returns matching entities from entity_state.
        input:
          flow_instance: string — optional, filter by flow instance
          current_state: string — optional, filter by state
          filter: object — optional, field-value pairs to match against entity_state.fields JSONB
          limit: integer — optional, default 100
          offset: integer — optional, default 0
        output:
          results: array of entity objects (same shape as get_entity output)
          total: integer — total matching count (before limit/offset)
      query_entities:
        description: Cross-entity read with aggregation. Query entities by state, fields, group, and aggregate.
        input:
          flow_instance: string — optional, filter by flow instance when the caller needs a narrower execution scope
          filter: string — optional, CEL expression evaluated against entity fields
          group_by: string — optional, envelope field or declared scalar/enum leaf to group results by
          select: array — optional, envelope fields or declared scalar/enum leaves to include in results
          limit: integer — optional, default 100
        output:
          results: array — matching entities or grouped aggregations
        validation: Filter expressions, group_by, and select selectors must resolve to envelope fields or declared scalar/enum leaves.
      query_metrics:
        description: Read aggregated metrics across entities. Counts, sums, averages.
        input:
          flow_instance: string — optional
          metric: string — required, one of count, sum, avg, min, max
          field: string — required for sum/avg/min/max, envelope field or declared scalar/enum leaf to aggregate
          group_by: string — optional, envelope field or declared scalar/enum leaf to group by
          filter: string — optional, CEL expression
        output:
          value: number — the aggregated result (for ungrouped queries)
          groups: array — for grouped queries, each entry has group_key and value
        validation: metric field, group_by, and filter selectors must resolve to envelope fields or declared scalar/enum leaves.
  agent_tool_filtering:
    description: Agents only see tools listed in their tools contract field. The platform never injects the full tool
      catalog from any source into an agent session. This controls LLM context cost.
    rule: When constructing an agent session, the platform resolves tools entries against the merged tool registry
      (platform_builtin + mcp + http). Only resolved tools are included in the LLM tool definitions. Unresolvable entries
      log a warning per the tool_resolution boot check.
    universal_tools: 'The following tools are included in every agent session without listing in tools: agent_message,
      mailbox_send, get_entity, save_entity_field, query_entities, query_metrics, search_entities. Emit tools
      (emit_{event_name}) are auto-generated from emit_events. Neither universal nor emit tools require explicit tools entry.'
    context_cost: An agent with 4 tools in tools pays for 4 tool schemas in LLM context, regardless of how many tools
      exist in the registry or how many tools an MCP server exposes. The filter is the contract, not the source.
    default_deny: If an agent calls a tool that is not in its tools list, not a universal tool, not an emit tool, and not
      a native_tools capability — the call is rejected. There is no default-allow policy for unrecognized tools.
  mcp_client:
    description: The platform acts as an MCP client, connecting to external MCP servers to discover and invoke tools. MCP
      servers are registered in the product's policy.yaml under mcp_servers.
    protocol: JSON-RPC 2.0 per MCP specification (tools/list for discovery, tools/call for execution).
    registration:
      location: policy.yaml under mcp_servers key
      format:
        mcp_servers:
          server_name:
            description: string — human-readable description of what this server provides
            transport: string — http | stdio
            url: string — server endpoint (for http transport). Supports policy variable substitution.
            command: string — command to spawn (for stdio transport)
            args: list — command arguments (for stdio transport)
            prefix: string — namespace prefix for this server's tools. Required. Must be unique across all registered servers.
            credentials_key: string — optional reference to credential store entry for server authentication
      example: "mcp_servers:\n  postgres:\n    description: PostgreSQL database access\n    transport: http\n    url: \"{{postgres_mcp_url}}\"\
        \n    prefix: pg\n    credentials_key: postgres_mcp\n  sendgrid:\n    description: Email delivery via SendGrid\n   \
        \ transport: stdio\n    command: npx\n    args: [\"@sendgrid/mcp-server\"]\n    prefix: email"
    namespacing:
      description: MCP tools are prefixed with the server's configured prefix to avoid name collisions across servers and
        with platform builtins.
      rule: 'Server with prefix "pg" exposing tool "list_tables" registers as "pg.list_tables" in the platform tool registry.
        Agents reference the prefixed name in their tools field: [pg.list_tables].'
      resolution: 'When an agent calls "pg.list_tables", the platform splits on the first dot: prefix "pg" → server "postgres"
        → tool "list_tables". Forwards tools/call with name "list_tables" to the postgres server.'
    boot_sequence:
    - 1. For each server in mcp_servers, establish connection (HTTP client or spawn stdio process).
    - 2. Call tools/list. Cache the response as the server's tool catalog.
    - 3. For each tool in the catalog, register in the platform tool registry with the prefixed name.
    - 4. Log server name, tool count, and tool names at info level.
    - 5. If connection fails, log warning with server name and error. Skip this server. Do not abort boot.
    lifecycle:
      http: Connection maintained for platform lifetime. Reconnect on failure with exponential backoff (1s, 2s, 4s, max 30s).
      stdio: Process spawned at boot, killed on platform shutdown. If process exits unexpectedly, respawn with backoff.
  http_tool_definition:
    description: Tools defined as HTTP request templates in tools.yaml. The platform ships a generic HTTP executor that reads
      the template, resolves variables, makes the HTTP call, and maps the response. This is the primary mechanism for products
      to add API-based tool integrations without writing handler code.
    schema:
      required_fields:
        description: string — what the tool does
        handler_type: http
        input_schema: object — JSON Schema for tool arguments (same format as platform tools)
        http: object — HTTP request template (see http_block below)
      http_block:
        required:
          method: string — GET | POST | PUT | PATCH | DELETE
          url: string — URL template. Supports {{input.field_name}} substitution.
        optional:
          headers: object — header name to value template. Supports {{credentials.key}} and {{input.field_name}} substitution.
          body: object — request body template. Same substitution. Sent as JSON.
          timeout_seconds: integer — request timeout. Default 30.
          retry: 'object — max_retries: integer (default 0), backoff: string (exponential)'
      optional_fields:
        output_schema: object — field names and types the tool returns (for documentation and LLM context)
        response_mapping: object — maps response body fields to tool output fields. If omitted, the entire response body is
          returned as the tool result.
        credentials: list of strings — credential store key names this tool needs. The platform resolves them from the credential
          store at call time and makes them available as {{credentials.key}} in templates.
    template_resolution:
      description: Template variables in url, headers, body, and response_mapping are resolved at tool call time.
      variables:
        input: Tool call arguments from the agent. Accessed as {{input.field_name}}.
        credentials: Values from the credential store for keys listed in the tool's credentials field. Accessed as {{credentials.key_name}}.
        response: HTTP response data. Available only in response_mapping. Accessed as {{response.body}}, {{response.status}},
          {{response.headers.header_name}}.
      missing_variable: If a required template variable cannot be resolved (missing input field, missing credential), the tool
        call fails with an error returned to the agent. The platform does not make the HTTP request.
    example: "check_domain:\n  description: Check if a domain name is available for registration\n  handler_type: http\n  input_schema:\n\
      \    type: object\n    required: [domain]\n    properties:\n      domain:\n        type: string\n        description:\
      \ Domain to check (e.g., example.com)\n  http:\n    method: GET\n    url: \"https://api.domainr.com/v2/status?domain={{input.domain}}\"\
      \n    headers:\n      Authorization: \"Bearer {{credentials.domainr_api_key}}\"\n  response_mapping:\n    available:\
      \ \"{{response.body.status[0].summary}}\"\n  credentials:\n    - domainr_api_key"
  credential_store:
    description: Secure storage for API keys, tokens, and other credentials referenced by MCP servers and HTTP tools. The
      platform provides a typed interface with a layered resolution model.
    interface:
      get: Retrieve a credential value by key. Runtime-only — never exposed via builder API.
      set: Store a credential value by key to the writable store layer.
      list: List credential keys with metadata (source, writable, present, updated_at). Never returns values.
      delete: Remove a credential by key from the writable store layer. Cannot delete env-sourced credentials.
    resolution_model:
      description: Credentials are resolved through a two-tier overlay. Environment variables take precedence over the local
        file store. Writes go to the file store only. This gives deterministic resolution across deployment modes.
      tiers:
      - tier: env
        description: Environment variables. Read-only. Highest precedence. Used for CI, Docker, and production deployments.
          Credential key "sendgrid_api_key" resolves by trying the raw key name, then the uppercased variant
          (SENDGRID_API_KEY). No prefix required — env var names match the credential key directly.
        writable: false
        precedence: 1 (highest)
      - tier: file
        description: Local file store. Writable. Used for local development and builder-managed credentials. Stored at
          ~/.config/swarm/credentials.json with mode 0600. Atomic writes. Per-entry updated_at timestamp.
        writable: true
        precedence: 2
      resolution_rule: On get, check env tier first. If present, return env value. Otherwise, check file tier. If present,
        return file value. Otherwise, credential is missing.
      list_rule: List returns merged keys from both tiers. Each entry includes the source tier (env or file) and whether
        it is writable (env = false, file = true). If a key exists in both tiers, source shows "env" (effective source).
    metadata:
      description: The list interface returns metadata about each credential, never the value itself. This is what the builder
        displays.
      fields:
        key: string — credential key name
        source: string — env | file (which tier the effective value comes from)
        writable: boolean — true if the credential can be modified (false for env-sourced)
        present: boolean — true if the credential has a value in any tier
        updated_at: string — ISO 8601 timestamp of last write (file-sourced only, null for env)
    storage_backends:
      local_dev: JSON file at ~/.config/swarm/credentials.json, mode 0600, atomic writes. Plaintext for simplicity — encryption
        is a future enhancement. File contains a map of key → value with per-entry updated_at.
      docker: Environment variables (env tier). File store optionally mounted as a volume for builder access.
      production: Environment variables for secrets, or external secrets manager (Vault, AWS Secrets Manager) via a custom
        store tier implementation. The overlay model supports additional tiers — the platform resolves top-down.
    contract_reference: Tools and MCP servers reference credentials by key name, never by value. The key name appears in
      tools.yaml (credentials field) and policy.yaml (mcp_servers.*.credentials_key). The platform resolves the key to the
      secret value at call time only.
    boot_validation: At boot, the platform checks that every credential key referenced by tools and MCP servers exists in the
      credential store (any tier). Missing keys log a warning — the tool may be unconfigured in this deployment.
    platform_guarantee: The platform never logs, indexes, or persists credential values in the event store, dead letters, or
      any platform table. Credentials exist only in the credential store and in-flight tool requests. The builder API never
      returns credential values after write — only metadata.
  custom_tool_schema:
    description: Accepted fields for tool definitions in tools.yaml. This is the union of fields across all implementation
      classes.
    required_fields:
      description: string — human-readable description of what the tool does
    common_optional_fields:
      handler_type: string — platform_builtin | mcp | http. Default http.
      input_schema: object — parameter names and types the tool accepts
      output_schema: object — field names and types the tool returns
      parameters: object — alias for input_schema (accepted by loader)
      returns: object — alias for output_schema (accepted by loader)
    http_fields:
      http: object — HTTP request template (see http_tool_definition.schema.http_block)
      response_mapping: object — maps response fields to output fields
      credentials: list of strings — credential store keys
    not_accepted:
      endpoint: NOT a valid field. Use http.url instead.
      type: NOT a valid field. Use handler_type instead.
prompt_templating:
  description: Agent prompts are markdown files in the prompts/ directory. They may contain {{variable}} placeholders that
    the platform substitutes from policy.yaml at agent session creation time. The substitution is simple string replacement
    — no logic, no conditionals. Variables not found in policy.yaml are left as-is (fail-open for forward compatibility).
  convention:
    prompt_path: prompts/{agent-id}.md
    variable_syntax: '{{variable_name}}'
    variable_source: policy.yaml
  variable_resolution:
    description: Prompt variables ({{token}}) are resolved from multiple sources in priority order. All sources must be scanned
      by compliance tests.
    resolution_order:
    - source: instance_variables (schema.yaml)
      description: Variables declared in the flow schema. Populated at flow instance creation via config_from.
      example: customer_name, order_type, region
    - source: policy (policy.yaml)
      description: Policy values from flow and root policy files.
      example: max_retries, sla_hours, approval_threshold
    - source: entity_state fields
      description: Entity fields written by data_accumulation. Available at render time from entity context.
      example: total_amount, resolution_summary
    - source: runtime tokens
      description: Platform-injected tokens not declared in contracts. Hardcoded allowlist.
      example: current_date, agent_id, flow_instance_path
    compliance_test_sources: 'TestPromptVariablesComplete must scan ALL of these for each prompt directory: schema.yaml (instance_variables.variables),
      policy.yaml (all keys), agents.yaml (prompt_inputs), and the runtime-token allowlist. A variable is valid if it appears
      in ANY of these sources.'
  prompt_postamble:
    description: The platform appends a short environment postamble to every agent system prompt at session creation time.
      The postamble tells the agent where it is working — workspace paths and access levels. It does NOT list available tools
      or capabilities — the LLM sees those via tool definitions in the API call, same as MCP tools and platform builtins.
      The product prompt (from prompts/{agent-id}.md, with variables resolved) comes first. The postamble follows.
    construction:
      order:
      - 1. Product prompt (prompts/{agent-id}.md with {{variable}} substitution)
      - 2. Platform postamble (auto-generated from workspace_class)
      rules:
      - Always included. Every agent gets workspace context.
      - Does NOT list tools or native capabilities — those are conveyed via tool definitions, not prompt text.
      - Generated at session creation time from the agent's workspace_class. Not editable by the product author.
    template: "## Environment\n\nWorking directory: /workspace (read-write)\nReference data: /data (read-only)\nContracts:
      /opt/swarm/contracts (read-only)"
    normative_content: The three workspace lines (/workspace, /data, /opt/swarm/contracts with their access levels) are
      required. The exact wording is not normative — the content requirements are. The implementation may rephrase as long as
      the paths and access levels are communicated.
    native_tools_in_postamble: No. Native tools are NOT described in the postamble. They are conveyed via tool definitions
      in the LLM API call, same as all other tools. The platform must not hide a fallback/native distinction by advertising
      native tools the current turn cannot actually call.
    note: The workspace paths are the same for all workspace classes — only the /workspace scope differs (per-agent vs
      per-flow-instance). The postamble does not vary by scope — it tells the agent the paths, the platform enforces the
      scoping.
flow_model:
  description: A Flow is the universal building block. Every level of the system is a flow — from the root flow down to the
    smallest sub-flow. A flow can contain child flows. The root flow is what others call "the root flow." There is no separate
    project concept (removed).
  flow_package:
    description: A flow is a directory with a standard file set. package.yaml is the manifest — it declares identity, child
      flows, and handoffs. All other files are optional depending on what the flow does.
    files:
      package.yaml: Flow manifest (required)
      schema.yaml: Pins, states, required_agents (required)
      agents.yaml: Agent definitions (required if flow has agents)
      events.yaml: Event schemas (optional — flow may only compose children)
      nodes.yaml: System nodes with handlers (optional)
      tools.yaml: Flow-specific tools (optional — inherits root)
      policy.yaml: Flow-specific config (optional — inherits root)
      prompts/: Agent prompt files (optional)
      flows/: Child flows (optional)
  nesting:
    description: 'Flows nest recursively. A flow''s package.yaml declares child flows in its flows: list. Each child is a
      directory under flows/ with the same structure. There is no depth limit. The platform discovers flows by walking the
      tree from the root.'
    discovery_algorithm: '1. Read package.yaml in the current directory. 2. Register this flow (its nodes, events, agents,
      schema, etc.). 3. For each entry in flows: list, resolve the child directory under flows/. 4. Recurse: read the child''s
      package.yaml and repeat from step 1. 5. Stop when a flow has no flows: list or the directory doesn''t exist.'
    root_flow: The root flow is the entry point. It has flow-level agents, nodes, events, policy. It declares the top-level
      child flows. It is structurally identical to any other flow.
    example: "\nmy-project/                       # root flow\n  package.yaml                   # name: my-project, flows: [intake,\
      \ processing, ...]\n  nodes.yaml                     # dashboard-node\n  events.yaml                    # cross-flow events\
      \  \n  agents.yaml                    # root-level agents\n  schema.yaml                   # root flow pins\n  flows/\n\
      \    intake/                      # child flow\n      package.yaml               # name: intake, flows: [] (leaf)\n\
      \      nodes.yaml\n      events.yaml\n      schema.yaml\n      agents.yaml\n      prompts/\n    processing/        \
      \          # child flow with sub-flows\n      package.yaml               # name: processing, flows: [review, fulfillment,\
      \ ...]\n      nodes.yaml                 # gate orchestrator\n      schema.yaml\n      flows/\n        review/   \
      \                # grandchild flow\n          package.yaml\n          nodes.yaml\n          agents.yaml\n          prompts/\n\
      \        fulfillment/\n          ...\n"
  pins:
    description: Flows have typed input/output pins, like IC chips in a circuit. The platform validates pin wiring at boot.
    input_event_pins:
      description: Events the flow subscribes to. Required pins must be wired (some other flow emits them) or boot warns.
      required: true
    output_event_pins:
      description: Events the flow emits. Optional — subscribers consume them if present, otherwise events are logged only.
      required: false
    input_data_pins:
      description: Entity fields the flow reads. Required pins must be written by a prior flow or initial data.
      required_configurable: true
    output_data_pins:
      description: Entity fields the flow writes. Always written. No two flows may write the same field.
      conflict_rule: Two flows writing the same field is a boot error (short circuit).
    internal_events_convention: Schema pins declare the flow's EXTERNAL interface only. Internal agent-to-agent events within
      a flow (e.g., spec.requested between two agents in the same flow) exist in events.yaml but are NOT listed in schema
      pins. They are implementation details, not part of the flow's public contract. Only events that cross flow boundaries
      or trigger/complete the flow appear in pins.
  required_agents:
    description: 'Each flow schema declares required_agents — agent role sockets that the root flow must fill. Each entry
      specifies: role name, events the agent subscribes to, events it emits, and a description. The platform validates at
      boot that every required role has a matching agent in agents.yaml.'
    schema_field: required_agents
    entry_format:
      role: Name of the required role
      subscribes_to: Events the agent must subscribe to
      emits: Events the agent must emit
      description: What the agent does in this flow
    fulfillment: 'An agent fulfills a role if BOTH conditions hold: (1) the agent YAML map key in agents.yaml
      matches the role name in required_agents (canonical identity binding), AND (2) the agent''s subscriptions
      include all required subscribes_to events and its emit_events include all required emits. Both checks
      run at boot. Identity binding is by name; behavioral fulfillment is by subscription/emit coverage.'
  schema_merging:
    description: When a root flow installs multiple flows, the platform merges their schemas. All output data pins become
      entity table columns. Input data pins are validated against available outputs. Two flows writing the same field is a
      conflict (boot error).
  cross_flow_events:
    rule: An event schema is defined ONCE, in the flow that emits it. Consuming flows reference it by absolute path — they
      do NOT redefine the schema. If both flows need the schema for validation, the consuming flow imports it by reference,
      not by copy.
    enforcement: At boot, if the same event name appears in multiple flow event files, the platform logs a warning. The emitter
      flow's definition is authoritative.
  stateless_flows:
    description: 'Some flows are stateless producers — they process events without tracking entity lifecycle. A signal-processing
      flow is an example: it receives inputs, filters them, and emits results without maintaining per-entity state.'
    schema_for_stateless: 'A stateless flow still has schema.yaml but may set initial_state: null and states: []. Events pass
      through system nodes which accumulate, filter, and emit — but no entity state machine is maintained. The accumulator
      state is flow-scoped, not entity-scoped.'
    when_to_use: Producer pipelines, ETL flows, signal processing, fan-out dispatchers.
    entity_behavior: 'In a stateless flow (initial_state: null, states: []), no state machine is maintained. advances_to
      is invalid in a stateless flow handler (boot error if used). However, stateless does NOT mean entityless. If a handler
      writes entity-scoped fields (data_accumulation, accumulate tracking, compute store_as), the platform auto-materializes
      an entity for that handler invocation. This entity has no current_state and no lifecycle transitions, but it persists
      accumulator state, data_accumulation writes, and computed values. Guards in stateless flows may reference entity fields
      written by prior handlers. The distinction: stateless = no lifecycle state machine. Entityless = no entity at all (rare —
      only flows with no data_accumulation, no accumulate, and no compute).'
  state_composition:
    description: 'How flow-level state machines compose into the entity lifecycle. Core principle:
      state is flow-local, lineage is cross-flow.'
    flow_scoped_entities:
      description: 'One entity belongs to exactly one flow. One row in entity_state, one current_state,
        one state machine. No flow_states map. No shared mutable state across flow boundaries.'
      invariant: 'entity_state.flow_instance identifies the owning flow. Only handlers within that flow
        may write to the entity (advances_to, sets_gate, data_accumulation, save_entity_field). The
        platform enforces this — cross-flow writes are rejected at runtime.'
      current_state: 'entity_state.current_state is singular and unambiguous. It reflects the state within
        the owning flow. No flow_states disambiguation needed.'
    cross_flow_handoff:
      description: 'When a business object moves from one flow to the next, the transition is an explicit
        handoff via events. The receiving flow creates its own entity.'
      pattern:
      - '1. Source flow handler emits a cross-flow event (output pin). Example: scoring emits vertical.shortlisted.'
      - '2. Destination flow handler receives the event (input pin) with create_entity: true.'
      - '3. Destination creates its OWN entity row — new entity_id, own current_state, own fields.'
      - '4. Data from the source entity is passed via the event payload, or the destination agent reads
        the source entity via get_entity (read-only).'
      enforcement: 'Input pin events that introduce a new business object into a static flow (mode: static)
        with initial_state MUST use create_entity: true on the receiving handler. Boot error otherwise.
        Exemptions: (1) stateless flows (initial_state: null) — no entity state machine. (2) Template flows
        (mode: template) — entity creation happens via create_flow_instance, not create_entity. (3) Back-
        propagation events (e.g., killed_backprop) that operate on an existing entity within the flow — these
        are input pins but do not introduce new business objects.'
    cross_flow_writes:
      description: 'Cross-flow entity writes are prohibited by the platform.'
      rule: 'save_entity_field checks that the target entity''s flow_instance matches the calling agent''s
        flow. Mismatch = rejected. This is a platform enforcement, not a convention.'
      reads: 'Cross-flow entity reads are allowed. An agent in validation can get_entity on a scoring
        entity to read composite_score, dimension evidence, etc. This is read-only — the scoring entity
        is immutable from validation''s perspective.'
    subject_id:
      description: 'A business object (e.g., a vertical) passes through multiple flows, creating a separate
        entity in each. subject_id links these flow-local entities into one business identity.'
      column: 'entity_state.subject_id — UUID, nullable, indexed. Platform-owned column — products do NOT
        declare it in entities.yaml. The platform auto-populates it on create_entity.'
      propagation_rules:
        first_flow: 'When create_entity fires and no source entity exists (first flow in the chain):
          subject_id = entity_id. The new entity IS the subject origin.'
        subsequent_flows: 'When create_entity fires from a cross-flow handoff event: read source entity''s
          subject_id. If non-null, copy it. If null, use source entity_id. Never invent a new subject_id
          mid-chain.'
        immutable: 'Once set, subject_id is never updated.'
      name_metadata: 'Name and display metadata belong to the origin entity (the first entity in the
        subject chain, where subject_id = entity_id). Subsequent flow entities do not duplicate the name
        unless the product explicitly copies it via data_accumulation at handoff.'
    killed_across_flows: 'killed is a terminal state in every flow. When a downstream flow kills an entity,
      it emits entity.killed + entity.killed_backprop. Upstream flows handle killed_backprop and advance
      their own entity to killed. Each flow kills its own entity. No shared mutation.'
    ownership_semantics:
      description: 'Entity write ownership is determined by exact semantic flow scope (flow_scope_key),
        not by path prefix matching or instance path.'
      rules:
      - 'A flow owns entities whose SemanticScope(flow_instance_path) == flow_scope_key. For static
        flows, flow_instance_path IS the scope key. For template instances, the semantic scope is derived
        by stripping the instance ID. No prefix matching. No other flow may write to those entities.'
      - 'Parent flows do NOT own descendant flow instance writes. scoring does not own validation
        entities. Root does not own child flow entities.'
      - 'Sibling flows do NOT own each other. scoring and validation are peers — neither can write
        to the other''s entities.'
      - 'No prefix-based ownership inference. The runtime MUST NOT treat "scoring" as owning
        "scoring-extended" or any other flow whose scope_key happens to share a prefix.'
      - 'These semantics hold at arbitrary depth. A three-level flow (root/child/grandchild) follows
        the same rules as a two-level flow. No special cases for depth.'
    gate_projection:
      description: 'Gates are projected (namespaced) by semantic flow scope, not by full instance path.'
      rule: 'Gate storage and projection use flow_scope_key. Example: child flow "build" declares gate
        g_validated. The gate is stored/projected as build/g_validated, not build/<instance-id>/g_validated.
        This ensures gate references are stable across instance IDs and consistent between static and
        template flows.'
    parent_retarget_semantics:
      description: 'When a child flow emits an output event, the platform may retarget the event to the
        parent flow''s entity context. This is called parent retargeting.'
      rules:
      - 'Only true child-flow output boundaries retarget upward. An event emitted by a child flow node
        that is declared in the child''s pins.outputs.events is retargeted to the parent entity context.'
      - 'Top-level flow outputs do NOT retarget. If a root-level flow emits an output event, it stays
        on the emitting flow''s entity. The presence of parent_entity_id metadata alone is NOT sufficient
        to trigger retargeting.'
      - 'Already-retargeted events are NOT retargeted again. If a grandchild output was retargeted to
        the child context, and the child then emits it as its own output, the second retarget goes to
        the grandparent — but the same event is never retargeted twice in one hop.'
      - 'These semantics hold recursively at depth N. No special handling for specific depths.'
    subject_lifecycle_query:
      description: 'Platform tool for querying the full lifecycle of a business object across flows.'
      tool_name: get_subject_status
      input: '{subject_id: uuid}'
      output: '{subject_id, entities: [{entity_id, flow, state, terminal}], all_terminal, latest_flow, latest_state}'
      latest_flow_ordering: 'Determined by entered_state_at — the most recent non-terminal state transition
        across all flow entities for the subject. Tiebreaker: flow depth in package.yaml flows list
        (downstream flows take precedence). latest_state is that entity''s current_state.'
      availability: 'Read-only, available to all agents. Used by dashboards, lifecycle-coordinator,
        and any agent that needs cross-flow context.'
versioning:
  description: Platform and products version independently.
  platform_versioning:
    scheme: semver (major.minor.patch)
    major: Breaking changes to flow model, handler fields, boot validation, or contract formats
    minor: New execution primitives, new handler fields (backward compatible), new compliance checks
    patch: Bug fixes, documentation, clarifications
  product_versioning:
    scheme: semver (major.minor.patch)
    major: Flow restructuring, agent hierarchy changes, breaking event schema changes
    minor: New agents, new events, new tools, threshold adjustments
    patch: Prompt improvements, policy tuning, bug fixes
  compatibility:
    declaration: Products declare platform_version in package.yaml using semver range (e.g., >=1.0.0)
    enforcement: Platform checks product platform_version at boot. Rejects if platform version is outside range.
    forward_compatible: Platform minor/patch releases do not break existing products
    example: 'Product v3.0.0 declares platform_version: ">=1.0.0". Works on platform 1.0.0, 1.1.0, 1.9.0. May not work on
      2.0.0.'
platform_tables:
  description: Platform-owned infrastructure tables. These exist regardless of which product contracts are loaded. They are
    NOT entity tables (those are contract-driven from entities.yaml and the shared type system). The platform generates DDL
    for these at boot via GeneratePlatformTableDDLs.
  tables:
    events:
      description: 'Append-only event store. Every event persisted before delivery. Three scopes: entity (entity_id + flow_instance
        set), flow (flow_instance set, entity_id NULL), global (both NULL — system bootstrap, runtime recovery, admin commands).
        idempotency_key for external dedup. source_event_id for causal chain tracing. run_id links every event to its
        execution context for observability and fork/replay.'
      ddl: "CREATE TABLE events (\n    event_id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id            UUID\
        \ REFERENCES runs(run_id),\n    event_name        TEXT NOT NULL,\n    entity_id         UUID,\n    flow_instance\
        \     TEXT,\n    scope             TEXT NOT NULL DEFAULT 'entity' CHECK (scope IN ('entity', 'flow', 'global')),\n\
        \    payload           JSONB NOT NULL DEFAULT '{}',\n    chain_depth       INTEGER NOT NULL DEFAULT 0,\n\
        \    produced_by       TEXT,\n    produced_by_type  TEXT CHECK (produced_by_type IN ('node', 'agent',\
        \ 'platform', 'external')),\n    handler_node      TEXT,\n    idempotency_key   TEXT,\n    source_event_id   UUID,\n\
        \    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_events_run (run_id, created_at) WHERE\
        \ run_id IS NOT NULL,\n    INDEX idx_events_entity (entity_id, created_at) WHERE entity_id IS NOT NULL,\n    INDEX\
        \ idx_events_flow (flow_instance, event_name) WHERE flow_instance IS NOT NULL,\n    INDEX idx_events_global (event_name,\
        \ created_at) WHERE scope = 'global',\n    INDEX idx_events_idempotency (idempotency_key) WHERE idempotency_key\
        \ IS NOT NULL,\n    INDEX idx_events_source (source_event_id) WHERE source_event_id IS NOT NULL\n);"
    event_deliveries:
      description: Tracks delivery of events to subscribers (nodes and agents). One row per event × subscriber. run_id
        inherited from the parent event for run-scoped queries.
      ddl: "CREATE TABLE event_deliveries (\n    delivery_id       UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id\
        \            UUID REFERENCES runs(run_id),\n    event_id          UUID NOT NULL REFERENCES events(event_id),\n\
        \    subscriber_type   TEXT NOT NULL CHECK (subscriber_type IN ('node', 'agent')),\n    subscriber_id     TEXT NOT\
        \ NULL,\n    status            TEXT NOT NULL DEFAULT 'pending' CHECK (status IN ('pending', 'in_progress', 'delivered',\
        \ 'failed', 'dead_letter')),\n    retry_count       INTEGER NOT NULL DEFAULT 0,\n    reason_code       TEXT,\n\
        \    last_error        TEXT,\n    active_session_id UUID,\n    started_at        TIMESTAMPTZ,\n    delivered_at\
        \      TIMESTAMPTZ,\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_deliveries_run (run_id,\
        \ status) WHERE run_id IS NOT NULL,\n    INDEX idx_deliveries_status (status, created_at),\n    INDEX idx_deliveries_event\
        \ (event_id),\n    INDEX idx_deliveries_active_session (active_session_id) WHERE active_session_id IS NOT NULL\n\
        );"
    event_receipts:
      description: Handler completion acknowledgement. One receipt per event × subscriber. Replaces both pipeline_receipts
        and system_node_ledger. entity_id nullable for global events. subscriber_type + subscriber_id identify the handler
        generically (node, agent, or platform subsystem). idempotency_key used by system_node_runner for replay dedup — if
        a receipt exists for this key, the handler skips re-execution. duration_ms tracks handler execution time for observability.
        side_effects records emitted events and state changes for flight recorder.
      ddl: "CREATE TABLE event_receipts (\n    receipt_id        UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    event_id\
        \          UUID NOT NULL REFERENCES events(event_id),\n    subscriber_type   TEXT NOT NULL CHECK (subscriber_type\
        \ IN ('node', 'agent', 'platform')),\n    subscriber_id     TEXT NOT NULL,\n    entity_id         UUID,\n    flow_instance\
        \     TEXT,\n    outcome           TEXT NOT NULL CHECK (outcome IN ('success', 'reject', 'discard', 'kill', 'escalate',\
        \ 'dead_letter', 'terminal_reject', 'waiting', 'fanned_out', 'no_op')),\n    reason_code       TEXT,\n    state_before      TEXT,\n    state_after       TEXT,\n    side_effects      JSONB\
        \ NOT NULL DEFAULT '{}',\n    duration_ms       INTEGER,\n    idempotency_key   TEXT,\n    processed_at      TIMESTAMPTZ\
        \ NOT NULL DEFAULT NOW(),\n    UNIQUE (event_id, subscriber_id),\n    INDEX idx_receipts_entity (entity_id) WHERE\
        \ entity_id IS NOT NULL,\n    INDEX idx_receipts_subscriber (subscriber_id, processed_at),\n    INDEX idx_receipts_idempotency\
        \ (idempotency_key) WHERE idempotency_key IS NOT NULL\n);"
    entity_state:
      description: Current state of every entity. This IS the entity registry — no separate registry table. slug and name
        are top-level columns for fast lookup/display without JSONB queries. entity_type records the inferred flow-scoped
        entity contract for the row; callers do not author or choose multiple entity kinds inside one flow in Wave 1.
        fields JSONB holds all contract-driven entity fields. Generic store reads use entity_state for listing, filtering,
        and lookup.
      ddl: "CREATE TABLE entity_state (\n    entity_id         UUID PRIMARY KEY,\n    subject_id        UUID,\n\
        \    flow_instance     TEXT NOT NULL,\n    entity_type       TEXT NOT NULL DEFAULT 'default',\n    slug              TEXT,\n\
        \    name              TEXT,\n    current_state     TEXT NOT NULL,\n    gates             JSONB NOT NULL DEFAULT '{}',\n\
        \    fields            JSONB NOT NULL DEFAULT '{}',\n    accumulator       JSONB NOT NULL DEFAULT '{}',\n    revision\
        \          INTEGER NOT NULL DEFAULT 0,\n    entered_state_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX\
        \ idx_entity_subject (subject_id) WHERE subject_id IS NOT NULL,\n    INDEX idx_entity_flow (flow_instance, current_state),\n\
        \    INDEX idx_entity_state (current_state),\n    INDEX idx_entity_type (entity_type),\n    INDEX idx_entity_slug\
        \ (slug) WHERE slug IS NOT NULL\n);"
    agents:
      description: 'Runtime agent registry. One row per agent instance. Carries the full persisted runtime descriptor:
        role/model_tier/llm_backend/conversation_mode/parent_agent_id as typed columns, subscriptions/emit_events/tools/permissions
        as JSONB arrays, and runtime_descriptor JSONB for the remaining control-plane fields that do not already have a
        first-class persisted column (for example type, mode, session_scope, workspace_class, manager_fallback, max_turns_per_task,
        native_tools). config is opaque agent-specific payload only; the platform stores and passes it through but does not read config
        for runtime control semantics. flow_instance nullable for root-level agents not scoped to any flow. entity_id nullable
        — set only for agents scoped to a specific entity (rare). The contract in agents.yaml is the source of truth and
        permissions_bundle is resolved at boot into the persisted permissions array rather than being stored directly.
        llm_backend specifies the LLM invocation backend — api (production), cli_test (test harness), mock (fixture replay).
        This is a deployment/agent property, not a session property. agent_sessions.runtime_mode tracks conversation scope only.'
      ddl: "CREATE TABLE agents (\n    agent_id          TEXT PRIMARY KEY,\n    flow_instance     TEXT,\n    role        \
        \      TEXT NOT NULL,\n    model_tier        TEXT NOT NULL,\n    llm_backend       TEXT NOT NULL DEFAULT 'api' CHECK\
        \ (llm_backend IN ('api', 'cli_test', 'mock', 'local')),\n    conversation_mode TEXT NOT NULL CHECK (conversation_mode\
        \ IN ('task', 'session', 'session_per_entity')),\n    parent_agent_id   TEXT,\n    entity_id         UUID,\n    config\
        \            JSONB NOT NULL DEFAULT '{}',\n    subscriptions     JSONB NOT NULL DEFAULT '[]',\n    emit_events   \
        \    JSONB NOT NULL DEFAULT '[]',\n    tools             JSONB NOT NULL DEFAULT '[]',\n    permissions       JSONB\
        \ NOT NULL DEFAULT '[]',\n    runtime_descriptor JSONB NOT NULL DEFAULT '{}',\n    status            TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active', 'paused',\
        \ 'terminated')),\n    turn_count        INTEGER NOT NULL DEFAULT 0,\n    last_active_at    TIMESTAMPTZ,\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_agents_flow (flow_instance) WHERE flow_instance IS NOT\
        \ NULL,\n    INDEX idx_agents_role (role),\n    INDEX idx_agents_status (status),\n    INDEX idx_agents_parent (parent_agent_id)\
        \ WHERE parent_agent_id IS NOT NULL\n);"
    agent_sessions:
      description: 'Live reusable agent conversation sessions. Used ONLY by session and session_per_entity
        conversation modes. Task mode does NOT create rows here — task-mode audit goes to
        agent_conversation_audits instead. Supports three scopes: entity (one session per agent × entity),
        flow (one session per agent × flow instance), global (one session per agent, shared across all
        entities). scope directly reflects the declared session_scope. scope_key is the lookup key.
        lease_holder/lease_expires_at for distributed session locking. Termination metadata captures WHY
        a row is terminated and WHETHER it was replaced; stale session meanings are not encoded as extra
        status values.'
      ddl: "CREATE TABLE agent_sessions (\n    session_id        UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id\
        \            UUID REFERENCES runs(run_id),\n    agent_id          TEXT NOT NULL REFERENCES agents(agent_id),\n\
        \    entity_id         UUID,\n    flow_instance     TEXT,\n    scope_key         TEXT NOT NULL,\n    scope         \
        \    TEXT NOT NULL DEFAULT 'entity' CHECK (scope IN ('entity', 'flow', 'global')),\n    conversation      JSONB NOT\
        \ NULL DEFAULT '[]',\n    turn_count        INTEGER NOT NULL DEFAULT 0,\n    runtime_mode      TEXT NOT NULL\
        \ CHECK (runtime_mode IN ('session', 'session_per_entity')),\n    runtime_state     JSONB NOT NULL\
        \ DEFAULT '{}',\n    lease_holder      TEXT,\n    lease_expires_at  TIMESTAMPTZ,\n    status            TEXT NOT\
        \ NULL DEFAULT 'active' CHECK (status IN ('active', 'suspended', 'terminated')),\n    termination_reason TEXT\
        \ CHECK (termination_reason IS NULL OR termination_reason IN ('normal', 'cancelled', 'failed', 'orphaned', 'contaminated', 'legacy')),\n\
        \    termination_detail TEXT,\n    successor_session_id UUID REFERENCES agent_sessions(session_id),\n    terminated_at TIMESTAMPTZ,\n    created_at        TIMESTAMPTZ\
        \ NOT NULL DEFAULT NOW(),\n    updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    CHECK ((status IN ('active', 'suspended') AND termination_reason IS NULL AND termination_detail IS NULL AND successor_session_id IS NULL AND terminated_at IS NULL) OR (status = 'terminated' AND termination_reason IS NOT NULL AND terminated_at IS NOT NULL)),\n    CHECK (termination_detail IS NULL OR termination_reason IS NOT NULL),\n    CHECK (successor_session_id IS NULL OR status = 'terminated'),\n    CHECK (successor_session_id IS NULL OR successor_session_id <> session_id),\n\
        \    UNIQUE INDEX agent_sessions_nonterminated_unique (agent_id, scope_key) WHERE status <> 'terminated',\n    INDEX idx_sessions_run (run_id) WHERE run_id IS NOT NULL,\n    INDEX idx_sessions_agent (agent_id, status),\n\
        \    INDEX idx_sessions_entity (entity_id) WHERE entity_id IS NOT NULL,\n    INDEX idx_sessions_scope (scope, status),\n\
        \    INDEX idx_sessions_lease (lease_expires_at) WHERE lease_holder IS NOT NULL,\n    INDEX idx_sessions_terminated_reason (termination_reason, terminated_at) WHERE status = 'terminated'\n);"
      scope_rules:
        entity: entity_id NOT NULL, flow_instance NOT NULL, scope_key = entity_id. One session per agent per entity.
        flow: entity_id NULL, flow_instance NOT NULL, scope_key = flow_instance. One session per agent per flow instance.
        global: entity_id NULL, flow_instance NULL, scope_key = "global". One session per agent across the entire system.
      lookup_pattern: 'Runtime acquires sessions via (agent_id, scope_key) with explicit status filtering.
        The scope_key is derived from conversation_mode: task → no session lookup, no agent_sessions row
        (audit goes to agent_conversation_audits). session_per_entity + session_scope entity → scope_key =
        entity_id. session + session_scope flow → scope_key = flow_instance. session + session_scope global
        → scope_key = "global". No actor-shape inference.'
      live_owner_query: 'Live session ownership MUST query status = ''active'' only.'
      resumable_owner_query: 'Resume/supersession ownership MUST query status IN (''active'', ''suspended'').'
      status_lifecycle: 'status remains active, suspended, terminated. orphaned and contaminated are
        termination reasons. superseded is represented by successor_session_id IS NOT NULL. Terminated
        rows are historical lineage and are never resurrected into live ownership.'
    agent_turns:
      description: 'Append-only per-turn agent execution audit log. Records the triggering event context, visible tools,
        attempted tool calls, emitted event names, canonical per-turn turn_blocks, and sanitized request/response payloads.
        turn_blocks is the ordered per-turn projection/surface for the flight recorder. It is populated from the canonical
        platform.runtime_log stream plus turn-local publish/tool transcript context. turn_blocks MUST include exactly one
        canonical turn_summary block when assistant-visible output, outcome, reasoning blocks, progress updates, or tool
        results are present for the turn. The turn_summary block is the canonical persisted read-model surface for dashboard/debug
        consumers; readers MUST NOT reconstruct those fields from raw transcript payloads. Used by all conversation modes.
        For task mode, this is the primary per-turn audit record (no agent_sessions row exists). For session modes, this
        complements the live session with a queryable historical record.'
      ddl: "CREATE TABLE agent_turns (\n    turn_id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id\
        \             UUID REFERENCES runs(run_id),\n    agent_id           TEXT NOT NULL,\n    session_id         UUID\
        \ NOT NULL,\n    runtime_mode       TEXT NOT NULL DEFAULT 'task' CHECK (runtime_mode IN ('task', 'session', 'session_per_entity')),\n\
        \    scope_key          TEXT,\n    entity_id          UUID,\n    trigger_event_id\
        \   UUID,\n    trigger_event_type TEXT,\n    task_id            TEXT,\n    available_tools    JSONB NOT NULL DEFAULT\
        \ '[]',\n    tool_calls         JSONB NOT NULL DEFAULT '[]',\n    emitted_events     JSONB NOT NULL DEFAULT '[]',\n\
        \    mcp_servers        JSONB NOT NULL DEFAULT '{}',\n    mcp_tools_listed   JSONB NOT NULL DEFAULT '[]',\n    mcp_tools_visible\
        \  JSONB NOT NULL DEFAULT '[]',\n    request_payload    JSONB,\n    response_payload   JSONB,\n    turn_blocks      JSONB NOT NULL DEFAULT '[]',\n    parse_ok      \
        \     BOOLEAN NOT NULL DEFAULT FALSE,\n    latency_ms         INTEGER NOT NULL DEFAULT 0,\n    retry_count       \
        \ INTEGER NOT NULL DEFAULT 0,\n    error              TEXT,\n    created_at         TIMESTAMPTZ NOT NULL DEFAULT\
        \ NOW(),\n    INDEX idx_agent_turns_run (run_id, created_at) WHERE run_id IS NOT NULL,\n    INDEX idx_agent_turns_session\
        \ (session_id, created_at),\n    INDEX idx_agent_turns_agent (agent_id, created_at),\n    INDEX idx_agent_turns_event\
        \ (trigger_event_id) WHERE trigger_event_id IS NOT NULL\n);"
    agent_conversation_audits:
      description: 'Write-only audit table for task-mode conversation snapshots. One row per task-mode
        agent invocation. The conversation transcript is persisted here after each invocation for debugging
        and the builder Run tab. This table is NEVER read back for subsequent invocations — it is purely
        for audit/debug. Dashboard/readers distinguish live sessions (agent_sessions) from task audits
        (agent_conversation_audits) by table, not by convention.'
      ddl: "CREATE TABLE agent_conversation_audits (\n    session_id        UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
        \    run_id            UUID REFERENCES runs(run_id),\n    agent_id          TEXT NOT NULL,\n    entity_id\
        \         UUID,\n    flow_instance     TEXT,\n    scope_key         TEXT,\n    scope             TEXT\
        \ NOT NULL DEFAULT 'global' CHECK (scope IN ('entity', 'flow', 'global')),\n    conversation      JSONB NOT NULL\
        \ DEFAULT '[]',\n    turn_count        INTEGER NOT NULL DEFAULT 0,\n    runtime_mode      TEXT NOT NULL DEFAULT\
        \ 'task' CHECK (runtime_mode = 'task'),\n    runtime_state     JSONB NOT NULL DEFAULT '{}',\n    status\
        \            TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active', 'suspended', 'terminated')),\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n\
        \    INDEX idx_audits_run (run_id, created_at) WHERE run_id IS NOT NULL,\n    INDEX idx_audits_agent (agent_id,\
        \ created_at),\n    INDEX idx_audits_entity (entity_id) WHERE entity_id IS NOT NULL\n);"
      primary_key: 'session_id — shared identifier with agent_turns.session_id. Task-mode turns reference
        the audit row via the same session_id, matching the runtime''s existing linking model.'
      status_lifecycle: 'Task audit rows remain active for dashboard/reader visibility. The status values
        (active, suspended, terminated) match the agent_sessions status model for consistency. Dashboard
        readers query status = active to find visible task-mode audit records. The runtime does NOT
        transition task audits to completed/failed — they stay active as part of the visible audit surface.'
      scope_model: 'scope_key is nullable. scope defaults to global. Task-mode invocations may produce
        audit rows without a specific scope key (e.g., root-level agents with no entity or flow context).
        When entity_id or flow_instance is available, the runtime sets scope_key and scope accordingly.'
      write_only: 'This table is append/update only from the runtime perspective. The runtime writes the
        audit row after each task-mode invocation. It is NEVER read back to construct agent context.
        Readers are: dashboard API, flight recorder queries, debug tools.'
      relationship_to_agent_turns: 'agent_conversation_audits holds the full conversation snapshot per
        invocation. agent_turns holds the per-turn structured execution log. Both are audit surfaces.
        agent_turns is more granular (one row per turn). agent_conversation_audits captures the complete
        conversation context (all messages, all tool results) in one row.'
    routing_rules:
      description: 'Unified routing table for both contract-defined patterns and materialized instance routes. Replaces the
        need for a separate flow_instance_routes table. At boot: contract subscriptions inserted as pattern rows (is_wildcard
        may be true). On create_flow_instance: wildcard patterns expanded into concrete rows (is_materialized = true, materialized_from
        = parent rule_id). On flow instance termination: materialized rows set to inactive. Event dispatch: match concrete
        routes first (is_materialized = true, exact match), fall back to wildcard patterns.'
      ddl: "CREATE TABLE routing_rules (\n    rule_id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    event_pattern\
        \     TEXT NOT NULL,\n    subscriber_type   TEXT NOT NULL CHECK (subscriber_type IN ('node', 'agent')),\n    subscriber_id\
        \     TEXT NOT NULL,\n    flow_instance     TEXT,\n    source_flow       TEXT,\n    is_wildcard       BOOLEAN NOT\
        \ NULL DEFAULT FALSE,\n    is_materialized   BOOLEAN NOT NULL DEFAULT FALSE,\n    materialized_from UUID,\n    status\
        \            TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active', 'inactive')),\n    created_at        TIMESTAMPTZ\
        \ NOT NULL DEFAULT NOW(),\n    INDEX idx_routing_event (event_pattern, status),\n    INDEX idx_routing_subscriber\
        \ (subscriber_id),\n    INDEX idx_routing_flow (flow_instance) WHERE flow_instance IS NOT NULL,\n    INDEX idx_routing_materialized\
        \ (materialized_from) WHERE materialized_from IS NOT NULL\n);"
      lifecycle:
        boot: Load contract subscriptions → INSERT pattern rows. Clear stale materialized rows from previous boot.
        create_flow_instance: For each wildcard pattern matching the new instance path → INSERT materialized row with concrete
          flow_instance.
        terminate_flow_instance: UPDATE materialized rows for this flow_instance → status = inactive.
        event_dispatch: SELECT WHERE event_pattern matches AND status = active. Concrete rows (is_materialized) take priority
          over wildcards.
    mailbox:
      description: 'Human-in-the-loop task queue. Payload-centric model — all task-specific data in payload JSONB. item_type
        distinguishes task kinds: human_task, review_request, approval, alert, operational_decision. human_tasks are represented
        as mailbox items with item_type = "human_task". from_agent identifies the requesting agent. summary provides a human-readable
        description. decision_notes captures the human rationale. notified tracks whether the human was alerted. source_event_id
        links back to the triggering event for traceability.'
      ddl: "CREATE TABLE mailbox (\n    item_id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    entity_id     \
        \    UUID,\n    flow_instance     TEXT,\n    scope             TEXT NOT NULL DEFAULT 'entity' CHECK (scope IN ('entity',\
        \ 'flow', 'global')),\n    item_type         TEXT NOT NULL,\n    source_event_id   UUID,\n    from_agent        TEXT,\n\
        \    severity          TEXT NOT NULL DEFAULT 'normal' CHECK (severity IN ('normal', 'urgent', 'critical')),\n    summary\
        \           TEXT,\n    payload           JSONB NOT NULL DEFAULT '{}',\n    status            TEXT NOT NULL DEFAULT\
        \ 'pending' CHECK (status IN ('pending', 'decided', 'expired', 'cancelled')),\n    decision          TEXT,\n    decision_notes\
        \    TEXT,\n    decided_by        TEXT,\n    decided_at        TIMESTAMPTZ,\n    notified          BOOLEAN NOT NULL\
        \ DEFAULT FALSE,\n    expires_at        TIMESTAMPTZ,\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n\
        \    INDEX idx_mailbox_status (status, severity, created_at),\n    INDEX idx_mailbox_entity (entity_id) WHERE entity_id\
        \ IS NOT NULL,\n    INDEX idx_mailbox_type (item_type, status),\n    INDEX idx_mailbox_global (scope, status) WHERE\
        \ scope = 'global'\n);"
    spend_ledger:
      description: LLM token and API cost tracking. One row per agent invocation.
      ddl: "CREATE TABLE spend_ledger (\n    ledger_id         UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    entity_id\
        \         UUID,\n    flow_instance     TEXT NOT NULL,\n    agent_id          TEXT NOT NULL,\n    model           \
        \  TEXT NOT NULL,\n    input_tokens      INTEGER NOT NULL DEFAULT 0,\n    output_tokens     INTEGER NOT NULL DEFAULT\
        \ 0,\n    cost_usd          NUMERIC(10,6) NOT NULL DEFAULT 0,\n    invocation_type   TEXT NOT NULL,\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_spend_flow (flow_instance, created_at),\n    INDEX idx_spend_agent\
        \ (agent_id, created_at)\n);"
    flow_instances:
      description: Registry of all flow instances (static and dynamic). One row per instance.
      ddl: "CREATE TABLE flow_instances (\n    instance_id       TEXT PRIMARY KEY,\n    flow_template     TEXT NOT NULL,\n\
        \    mode              TEXT NOT NULL CHECK (mode IN ('static', 'template')),\n    parent_instance   TEXT,\n    config\
        \            JSONB NOT NULL DEFAULT '{}',\n    status            TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active',\
        \ 'draining', 'terminated')),\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    terminated_at     TIMESTAMPTZ\n\
        );"
    timers:
      description: 'Durable timer and scheduled task store. Persisted across restarts. Entity-scoped timers: entity_id and
        flow_instance set, tied to a specific entity lifecycle. Global timers: entity_id and flow_instance NULL, used for
        recurring platform-level work (periodic scans, health checks, digest compilation). fire_payload carries context when
        the timer fires. owner_node OR owner_agent identifies who declared the timer (mutually exclusive). recurrence_cron
        supports cron expressions for global recurring schedules. recurrence_interval supports duration strings (e.g., "24h")
        for entity-scoped recurring timers. task_type: timer (one-shot entity), scheduled_task (recurring entity), deadline
        (hard cutoff), global_recurring (platform-level periodic work).'
      ddl: "CREATE TABLE timers (\n    timer_id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    timer_name     \
        \   TEXT NOT NULL,\n    entity_id         UUID,\n    flow_instance     TEXT,\n    fire_event        TEXT NOT NULL,\n\
        \    fire_payload      JSONB NOT NULL DEFAULT '{}',\n    fire_at           TIMESTAMPTZ NOT NULL,\n    recurring  \
        \       BOOLEAN NOT NULL DEFAULT FALSE,\n    recurrence_cron   TEXT,\n    recurrence_interval TEXT,\n    owner_node\
        \        TEXT,\n    owner_agent       TEXT,\n    task_type         TEXT NOT NULL DEFAULT 'timer' CHECK (task_type\
        \ IN ('timer', 'scheduled_task', 'deadline', 'global_recurring')),\n    status            TEXT NOT NULL DEFAULT 'active'\
        \ CHECK (status IN ('active', 'fired', 'cancelled', 'expired')),\n    fired_at          TIMESTAMPTZ,\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_timers_fire (status, fire_at),\n    INDEX idx_timers_entity\
        \ (entity_id) WHERE entity_id IS NOT NULL,\n    INDEX idx_timers_flow (flow_instance) WHERE flow_instance IS NOT NULL,\n\
        \    INDEX idx_timers_global (task_type, status) WHERE entity_id IS NULL\n);"
      scope_rules:
        entity_scoped: entity_id NOT NULL, flow_instance NOT NULL. Tied to entity lifecycle. Cancelled when entity reaches
          terminal state.
        global: entity_id NULL, flow_instance NULL. Platform-level. Not tied to any entity. Survives entity lifecycle.
        flow_scoped: entity_id NULL, flow_instance NOT NULL. Tied to flow instance. Cancelled when flow instance terminates.
    dead_letters:
      description: Failed events after retry exhaustion or chain depth overflow.
      ddl: "CREATE TABLE dead_letters (\n    dead_letter_id    UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    original_event_id\
        \ UUID REFERENCES events(event_id),\n    original_event    TEXT NOT NULL,\n    original_payload  JSONB NOT NULL DEFAULT\
        \ '{}',\n    entity_id         UUID,\n    flow_instance     TEXT NOT NULL,\n    failure_type      TEXT NOT NULL CHECK\
        \ (failure_type IN ('handler_error', 'chain_depth_exceeded', 'retry_exhausted')),\n    error_message     TEXT,\n \
        \   retry_count       INTEGER NOT NULL DEFAULT 0,\n    chain_depth       INTEGER NOT NULL DEFAULT 0,\n    handler_node\
        \      TEXT,\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_dead_letters_flow (flow_instance,\
        \ created_at),\n    INDEX idx_dead_letters_type (failure_type)\n);"
    runs:
      description: 'Platform run registry. A run is a top-level execution context — everything that happens from a
        system.started event or a fork operation. Every event, delivery, session, and turn belongs to exactly one run.
        run_id is the primary correlation key for observability, debugging, and fork/replay. Forked runs link back to
        their parent via forked_from_run_id and forked_from_event_id.'
      ddl: "CREATE TABLE runs (\n    run_id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    status            TEXT\
        \ NOT NULL DEFAULT 'running' CHECK (status IN ('running', 'paused', 'completed', 'failed', 'cancelled', 'forked')),\n\
        \    trigger_event_id  UUID,\n    trigger_event_type TEXT,\n    forked_from_run_id UUID REFERENCES runs(run_id),\n\
        \    forked_from_event_id UUID,\n    entity_count      INTEGER NOT NULL DEFAULT 0,\n    event_count       INTEGER\
        \ NOT NULL DEFAULT 0,\n    error_summary     TEXT,\n    started_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n\
        \    ended_at          TIMESTAMPTZ,\n    INDEX idx_runs_status (status, started_at),\n    INDEX idx_runs_fork\
        \ (forked_from_run_id) WHERE forked_from_run_id IS NOT NULL\n);"
      lifecycle:
        running: Active execution. Events being processed.
        paused: Execution suspended (budget threshold, admin action). Resumable.
        completed: All pipelines reached terminal states or idle. No in-flight events.
        failed: Unrecoverable error. Run cannot continue.
        cancelled: Admin-terminated. In-flight events drained but no new processing.
        forked: 'A new run was forked from this one. Original run is frozen at the fork point.
          The forked run continues execution independently.'
      run_id_propagation: 'run_id is set once at event creation time and propagated through the causal chain.
        When a handler emits a new event, the child event inherits run_id from the parent event.
        External events (API, webhook, admin CLI) start a new run or join an existing one
        based on the ingress configuration.'
    entity_mutations:
      description: 'Append-only mutation log for entity_state changes. Every write to entity_state.fields,
        entity_state.current_state, entity_state.gates, or entity_state.accumulator produces a row.
        The mutation log is the audit trail for the flight recorder and the undo log for fork/replay.
        Not a separate event stream — just a side-table that captures the before/after of every state change.'
      ddl: "CREATE TABLE entity_mutations (\n    mutation_id       UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id\
        \            UUID NOT NULL REFERENCES runs(run_id),\n    entity_id         UUID NOT NULL,\n    field             TEXT\
        \ NOT NULL,\n    old_value         JSONB,\n    new_value         JSONB,\n    caused_by_event   UUID REFERENCES\
        \ events(event_id),\n    writer_type       TEXT NOT NULL CHECK (writer_type IN ('system_node', 'agent', 'platform')),\n\
        \    writer_id         TEXT NOT NULL,\n    handler_step      TEXT,\n    created_at        TIMESTAMPTZ NOT NULL\
        \ DEFAULT NOW(),\n    INDEX idx_mutations_run (run_id, created_at),\n    INDEX idx_mutations_entity (entity_id,\
        \ created_at),\n    INDEX idx_mutations_event (caused_by_event) WHERE caused_by_event IS NOT NULL\n);"
      write_sources:
        system_node_handlers: 'data_accumulation writes, compute store_as, sets_gate, advances_to (current_state),
          clear (gate/accumulator resets). writer_type = system_node, writer_id = node ID,
          handler_step = the handler step name (e.g., data_accumulation, compute, sets_gate).'
        agent_tool_calls: 'save_entity_field tool calls. writer_type = agent, writer_id = agent ID,
          handler_step = save_entity_field.'
        platform_operations: 'create_entity (initial field population), entity state fixes during recovery.
          writer_type = platform, writer_id = operation name.'
      not_logged: 'Event payloads (already in events table). Agent conversation turns (already in agent_turns).
        Read operations (get_entity, search_entities, query_entities). Timer creation/cancellation.'
      hot_path_cost: 'One extra read (old value) + one insert per field write. The read is a single JSONB field
        extraction from entity_state — sub-millisecond. The insert is append-only with no unique constraints
        on the hot path. Given LLM calls at 1-30 seconds per agent turn, the overhead is negligible.'
    schema_version:
      description: 'Platform schema versioning. Tracks which version of the platform DDL has been applied. The platform checks
        this at boot: if the stored version < current platform version, it applies migrations. Products never read or write
        this table.'
      ddl: "CREATE TABLE schema_version (\n    id                INTEGER PRIMARY KEY DEFAULT 1 CHECK (id = 1),\n    platform_version\
        \  TEXT NOT NULL,\n    applied_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    migration_log     JSONB NOT NULL\
        \ DEFAULT '[]'\n);"
  notes:
    product_tables: Product-specific tables (entity fields, custom state) are generated from entities.yaml plus the shared
      type system.
      Those are contract-driven, not listed here.
    migrations: Platform table schema is versioned with the platform version. The platform generates DDL at boot and applies
      migrations if the schema version changed. Products never modify platform tables directly.
    index_syntax: INDEX declarations are logical — the implementer may use CREATE INDEX statements or database-specific syntax.
      The spec declares intent, not SQL dialect.
  diagnostics_encoding:
    description: Runtime diagnostics are encoded into existing platform tables. No dedicated diagnostics table.
    runtime_log_encoding:
      table: events
      event_name: platform.runtime_log
      scope: global (entity_id NULL, flow_instance NULL)
      produced_by_type: platform
      payload_fields:
        log_level: string (debug, info, warn, error, fatal)
        message: human-readable summary written by the producer; not a machine key
        details: object (structured source of truth; includes component, action, error, timing, and runtime context fields)
        stack_trace: string (for errors only)
      design_rules:
      - message is for humans; details is the machine-readable source of truth
      - component and action live in details, not as top-level runtime_log fields
      - error text lives in details.error; message may summarize the failure but is not the raw error string
      - readers and debug UIs should filter and render structured runtime diagnostics from details
      note: 'Queryable via: SELECT * FROM events WHERE event_name = "platform.runtime_log" AND payload->>log_level = "error"'
    pipeline_transition_encoding:
      table: event_receipts
      mapping:
        state_before: event_receipts.state_before
        state_after: event_receipts.state_after
        events_emitted: event_receipts.side_effects.emitted_events (JSONB array)
        drop_reason: event_receipts.outcome (reject/discard/kill) + side_effects.drop_reason
        duration: event_receipts.duration_ms
      note: Every handler execution already produces an event_receipt. The receipt captures state_before, state_after, outcome,
        duration, and side_effects. This IS the pipeline transition record. No separate table needed.
  entity_registry_policy: There is no separate entity registry table. entity_state IS the registry. Generic reads (list entities,
    find by slug, count by state) query entity_state directly. Contract-driven entity tables are optional optimizations —
    they materialize fields JSONB into typed columns for query performance. Not required for correctness.
  entity_lifecycle_scoping:
    description: Entities are global and persistent. Entity queries (search_entities, query_entities, get_entity) return
      entities from ALL runs, not scoped to the current run. This is intentional — a vertical discovered in one run
      and killed in another is still visible to future queries. Products use this for dedup, historical analysis, and
      trend detection.
    rationale: In a continuous system where discovery runs periodically, entities accumulate over time. A killed vertical
      should remain visible so the system does not rediscover the same opportunity. An operating vertical should be visible
      so new discoveries can be checked against active investments. Global visibility enables agents to make informed decisions
      about duplicate detection, market evolution, and portfolio context.
    dedup_responsibility: Duplicate detection across runs is a product concern, not a platform concern. The platform
      provides global entity queries. Products implement dedup logic in their agents and guards — checking entity names,
      geographies, opportunity patterns, and current states to decide whether a newly discovered entity is genuinely new
      or a rediscovery of an existing one.
    entity_state_for_dedup: 'When an agent checks for duplicates, the entity''s current_state provides context for the
      decision: active or in-pipeline entities are strong duplicates (skip). Recently killed entities are likely duplicates
      (skip unless evidence changed). Entities killed long ago may warrant re-evaluation if market conditions shifted.
      The platform does not enforce these rules — products encode them in agent prompts and guard conditions.'
    cleanup: 'Entity data is never auto-deleted. Retention policy and archival are operational concerns. The platform may
      provide a future archive/purge API, but entity_state rows persist indefinitely by default.'
  entity_metrics_convention:
    description: Metrics are entity fields in entity_state.fields JSONB. No separate table.
    canonical_fields:
      name: entity_state.name (top-level column)
      stage: entity_state.current_state (top-level column)
      users_total: entity_state.fields->>'users_total' (JSONB)
      mrr: entity_state.fields->>'mrr' (JSONB, numeric)
      spend: 'Aggregate from spend_ledger: SELECT SUM(cost_usd) FROM spend_ledger WHERE entity_id = X'
    digest_queries: Digest/reporting code should query entity_state for current metrics and spend_ledger for cost aggregates.
      No entity_metrics table.
  migration_policy: 'schema_version is a platform table. It survives the legacy SQL deletion. MigrationSpec and ApplyManagedMigrations
    remain as platform APIs — they apply DDL diffs between platform versions. ApplyMigrationFile is DELETED (no more file-based
    migrations). The boot sequence: read schema_version → compare to current platform version → generate DDL diff → apply
    → update schema_version.'
  test_bootstrap:
    description: After legacy SQL deletion, test bootstrap creates tables from two sources only.
    sources:
      platform_tables: All tables from platform_tables.tables in platform-spec.yaml. Always created.
      entity_tables: Generated from entities.yaml in the flow contracts loaded for the test. Optional — only if the test uses
        entity fields beyond the JSONB.
    generic_store_tests: Generic store tests (postgres_smoke_test.go, etc.) bootstrap using platform_tables only. They create
      entities in entity_state, events in events, sessions in agent_sessions. No product contracts needed. No legacy SQL files.
      No migrations/ directory.
    product_integration_tests: Tests that need product-specific entity tables load product contracts and generate DDL from
      entities.yaml plus types.yaml.
      These tests are product tests, not platform tests.
    bootstrap_function: BootstrapPlatformTables(spec PlatformSpec) — reads platform_tables.tables, generates DDL, executes.
      Called by both production boot and test setup. Single code path.
  credentials_policy:
    description: Webhook secrets, API keys, and other credentials are NOT stored in platform tables. The platform provides
      a config surface; products choose their storage strategy.
    options:
      flow_instance_config: 'For per-instance secrets (webhook signing keys, API tokens): store in flow_instances.config JSONB
        under a "secrets" key. The platform does not encrypt this field — the product layer or infrastructure (encrypted-at-rest
        DB, vault sidecar) handles encryption.'
      external_vault: 'For production deployments: use an external secrets manager (HashiCorp Vault, AWS Secrets Manager,
        etc.). flow_instances.config stores a vault reference, not the secret itself.'
    migration_from_legacy: Legacy code that read workflow_instances.metadata.credentials must be rewritten to read from flow_instances.config.secrets.
      This is a product-level migration — inbound.go is product code, not platform code. Move it out of generic runtime.
    platform_guarantee: The platform never reads, writes, logs, or indexes credential fields. It treats flow_instances.config
      as opaque JSONB. Products own their secrets.
run_model:
  description: 'A run is the top-level execution context for the platform. Every event, delivery, session, turn,
    and entity mutation belongs to exactly one run. Runs provide isolation for observability, debugging, and
    fork/replay. The run_id is the primary correlation key across all platform tables.'
  lineage:
    description: 'Event lineage is tracked via two fields: run_id (which run this event belongs to) and
      source_event_id (which event caused this event to be emitted). Together they replace the former trace_id
      column. run_id provides flat grouping (all events in a run). source_event_id provides causal ordering
      (parent → child event chain). No trace_id column exists — it has been removed from all platform tables.'
    run_id:
      description: 'The run this event belongs to. Set at event creation time. Propagated through the causal
        chain — when a handler or agent emits a new event, the child inherits run_id from the inbound event.
        External events (API, webhook, admin CLI) either join an active run or create a new one.'
      present_on:
      - events.run_id
      - event_deliveries.run_id
      - agent_sessions.run_id
      - agent_conversation_audits.run_id
      - agent_turns.run_id
      - entity_mutations.run_id
      propagation_rule: 'Child event run_id = parent event run_id. The bus publish path reads run_id from
        the inbound event context and stamps it on every outbound event. No handler or agent code touches
        run_id directly.'
    source_event_id:
      description: 'The event that directly caused this event to be emitted. Forms a tree (not a DAG — each
        event has exactly one parent). The root event in a run has source_event_id = NULL. Walking
        source_event_id from any event back to NULL reconstructs the full causal chain.'
      present_on:
      - events.source_event_id
      usage:
        causal_chain: "WITH RECURSIVE chain AS (\n  SELECT * FROM events WHERE run_id = :run_id AND source_event_id\
          \ IS NULL\n  UNION ALL\n  SELECT e.* FROM events e JOIN chain c ON e.source_event_id = c.event_id\n\
          ) SELECT * FROM chain ORDER BY created_at;"
        parent_lookup: 'SELECT * FROM events WHERE event_id = :source_event_id'
        children: 'SELECT * FROM events WHERE source_event_id = :event_id'
    combined_queries:
      run_timeline: 'SELECT * FROM events WHERE run_id = :run_id ORDER BY created_at'
      causal_tree: "WITH RECURSIVE tree AS (\n  SELECT *, 0 AS depth FROM events WHERE run_id = :run_id\
        \ AND source_event_id IS NULL\n  UNION ALL\n  SELECT e.*, t.depth + 1 FROM events e JOIN tree t\
        \ ON e.source_event_id = t.event_id\n) SELECT * FROM tree ORDER BY depth, created_at;"
      entity_in_run: 'SELECT * FROM events WHERE run_id = :run_id AND entity_id = :entity_id ORDER BY created_at'
    fork_lineage: 'Forked runs link to their parent via runs.forked_from_run_id and runs.forked_from_event_id.
      This provides cross-run lineage: which run was this forked from, and at which event. The event
      tree within the forked run starts fresh (new event_ids, new source_event_id chains) — it does not
      extend the parent run''s event tree.'
  lifecycle:
    creation: 'A run is created when: (1) system.started fires (cold start), (2) an external event arrives with
      no active run (warm start), or (3) swarm fork creates a forked run. The platform inserts a row in the runs
      table with status=running and returns the run_id.'
    propagation: 'run_id propagates through the causal chain. When a handler or agent emits an event, the child
      event inherits run_id from the parent. This is set at event creation time in the bus publish path — no
      handler or agent code needs to pass run_id explicitly.'
    completion: 'A run transitions to completed when: all entities have reached terminal states AND no in-flight
      events remain (pending deliveries = 0). The runtime checks this after each event receipt. Runs with active
      timers remain running until the timers fire or are cancelled.'
    failure: 'A run transitions to failed when an unrecoverable platform error occurs (not a handler/agent error —
      those produce dead letters within the run). Examples: database connection loss, contract corruption, boot
      failure mid-run.'
    pause_resume: 'Admin can pause a run (stop accepting new external events, drain in-flight events). Resume
      re-enables external ingress. Platform events platform.paused and platform.resumed are emitted within the run.'
  fork:
    description: 'Fork creates a new run by reconstructing full system state at a point in time, optionally
      loading new contracts, and resuming execution. The system automatically determines which events need
      to be re-delivered. The original run is frozen. The forked run gets independent execution.'
    command: 'swarm fork --run <run_id> --at <event_id|timestamp> [--contracts <path>]'
    event_id_shorthand: 'When --at receives an event ID, the system resolves it to that event''s created_at
      timestamp. Under the hood, fork is always timestamp-based. The event ID is a convenience for pinpointing
      a moment without looking up timestamps manually.'
    semantics:
      1_reconstruct_state: 'Reconstruct all entity states at timestamp T. For every entity touched by the source
        run (SELECT DISTINCT entity_id FROM entity_mutations WHERE run_id = :source_run_id), reverse-apply
        all mutations with created_at > T (newest first, set each field to old_value). Alternative: forward-apply
        from empty entity for reliability. Only committed mutations are included — in-progress deliveries at T
        are excluded, their partial mutations are not applied.'
      2_detect_pending: 'Identify events that were pending at timestamp T — events with created_at <= T whose
        delivery chain was incomplete. This includes: deliveries with status pending or in_progress at T,
        accumulations that had not reached completion at T, entities in non-terminal states expecting further
        events. These are the events the system will re-deliver.'
      3_create_run: 'Insert new run row with forked_from_run_id = source run, forked_from_event_id = target event
        (if event ID was provided). Copy reconstructed entity states into the fork context.'
      4_boot: 'Load contracts (new path if --contracts specified, otherwise same contracts as source run).
        Validate contracts against reconstructed state. Boot the pipeline with the new run context.'
      5_resume: 'Re-deliver all pending events under the new run_id. The normal event loop takes over.
        No manual event selection — the system knows what was unfinished.'
    parallel_safety: 'Timestamp-based fork handles parallel agent execution naturally. At timestamp T, all
      concurrent branches either committed their mutations or did not. No DAG traversal, no branch
      classification, no sibling carry-over logic. The reconstructed state is simply "what was the world at T."'
    contract_swap: 'When --contracts specifies a new contract path, the forked run uses the new handler logic
      for all re-delivered events. This is the primary use case: fix a bug in a handler or prompt, fork to
      before the failure, resume with the fix. All re-delivered events use the new contracts uniformly —
      no mixed-version state.'
    timestamp_precision: 'Events committed in the same millisecond are disambiguated by (created_at, event_id)
      composite ordering. The fork point is inclusive: mutations from the target moment are included in
      reconstructed state. Only mutations strictly after T are undone.'
    isolation: 'Forked runs are fully isolated. They get their own event stream, their own entity state copies,
      and their own agent sessions. Results can be compared side-by-side with the original run.'
    original_run: 'The source run transitions to status=forked. It is frozen — no new events are processed.
      Its data is preserved for comparison and audit.'
  mutation_log:
    description: 'The entity_mutations table is the audit trail for all entity state changes. It serves three
      purposes: (1) flight recorder — step-by-step view of what happened, (2) fork — state reconstruction at
      any point in time, (3) drift detection — verify entity_state matches the mutation history.'
    write_contract: 'Every write to entity_state MUST produce a corresponding entity_mutations row in the same
      transaction. This includes system node handler writes (data_accumulation, compute, sets_gate, advances_to,
      clear) and agent tool writes (save_entity_field). The runtime enforces this — there is no code path that
      mutates entity_state without logging the mutation.'
    drift_detection: 'swarm verify --run <run_id> reconstructs entity state from the mutation log and compares
      it to current entity_state. Any mismatch indicates a write that bypassed the mutation log. This is a
      correctness check, not a normal operation — run it when debugging unexpected state.'
    retention: 'Mutation rows are never auto-deleted. Retention policy is an operational concern. The platform
      may provide a future archive/purge API for mutations older than N days on terminated entities.'
  flight_recorder:
    description: 'The flight recorder is not a separate system — it is a query pattern over four tables:
      events (what happened), entity_mutations (what changed), agent_turns (why it changed), event_deliveries
      (who processed it). All four tables carry run_id for scoped queries.'
    reconstruction_query: 'To reconstruct a run step-by-step:
      SELECT e.event_type, e.payload, m.field, m.old_value, m.new_value, m.writer_type, m.writer_id
      FROM events e LEFT JOIN entity_mutations m ON m.caused_by_event = e.event_id
      WHERE e.run_id = :run_id ORDER BY e.created_at, m.created_at.
      Join with agent_turns on trigger_event_id for agent reasoning context.'
    joined_trace_surface: 'Operator-facing run trace surfaces should extend canonical persisted run-bound diagnostics,
      not invent a second observability island. The joined trace projection links event identity, delivery lifecycle,
      session ownership, and turn activity for a single run by consuming canonical rows from events, event_deliveries,
      agent_sessions or agent_conversation_audits, and agent_turns.'
    entity_timeline: 'To see one entity''s full history across runs:
      SELECT * FROM entity_mutations WHERE entity_id = :entity_id ORDER BY created_at.
      This shows every field change, who made it, and which event caused it.'
  builder_api:
    runs_list: 'GET /runs — list runs with status filter. Returns run_id, status, event_count, entity_count,
      started_at, ended_at.'
    run_detail: 'GET /runs/:run_id — full run metadata including fork lineage.'
    run_events: 'GET /runs/:run_id/events — paginated event stream for the run.'
    run_mutations: 'GET /runs/:run_id/mutations — paginated mutation log for the run.'
    run_trace: 'GET /runs/:run_id/trace — run-centric joined trace rows linking event, delivery, session, and turn identity
      for operator debugging. This is a persisted joined trace surface built on canonical run-bound diagnostics, not a
      separate observability store.'
    run_fork: 'POST /runs/:run_id/fork — fork a run at a specific event. Body: {event_id: uuid}.
      Returns the new run_id.'
    run_pause: 'POST /runs/:run_id/pause — pause a running run.'
    run_resume: 'POST /runs/:run_id/resume — resume a paused run.'
    run_cancel: 'POST /runs/:run_id/cancel — cancel a running run. Drains in-flight events.'
platform_events:
  description: Events emitted by the platform engine itself. These are NOT product events — they are operational signals from
    the engine. All platform events use the platform.* namespace. Products MUST NOT define events with reserved prefixes.
  namespace_reservation:
    reserved_prefixes:
    - platform.
    rule: Boot error if any of the following use a reserved prefix.
    violations:
    - Event names declared in product events.yaml
    - Event names in agent emit_events declarations
    - Event names in node handler emit sites
    - Event names in node produces lists
    - Event names in flow schema.yaml pins.outputs.events (platform.* events are produced by the engine, not by flows)
    not_violations:
    - Agent subscriptions to platform.* events (subscribing is allowed — products SHOULD subscribe to platform events)
    - Wildcard subscriptions that match platform.* events (e.g., platform.* subscription pattern)
    - Flow schema.yaml pins.inputs.events listing platform.* events (flows MAY declare them as inputs to receive routing)
  catalog:
    platform.dead_letter:
      description: Failed event after retry exhaustion or chain depth overflow.
      defined_in: engine.error_model.dead_letter_schema
      note: Full payload schema defined in engine.error_model. Not duplicated here.
    platform.runtime_log:
      description: Diagnostic log record persisted as a global event.
      defined_in: platform_tables.diagnostics_encoding
      note: Full payload schema defined in platform_tables. Not duplicated here.
    platform.agent_failed:
      description: Agent session failed after retry.
      scope: entity (if entity-scoped agent) or flow
      payload:
        agent_id: string
        flow_instance: string
        entity_id: string (nullable)
        error: string
        retry_count: integer
        last_event_type: string
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.agent_panic:
      description: Agent session panicked with unrecoverable error.
      scope: entity or flow
      payload:
        agent_id: string
        flow_instance: string
        entity_id: string (nullable)
        error: string
        stack_trace: string
        conversation_id: string (nullable)
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.event_quarantined:
      description: Poison event quarantined after repeated handler failures on different entities.
      scope: global
      payload:
        event_name: string
        quarantine_reason: string
        affected_entity_count: integer
        sample_error: string
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.dead_letter_escalation:
      description: Dead letter volume or pattern crossed escalation threshold.
      scope: global
      payload:
        flow_instance: string
        dead_letter_count: integer
        window_minutes: integer
        sample_events: array
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.reset:
      description: Admin-initiated platform state reset. Emitted ONLY when a human administrator explicitly triggers a reset
        via the admin CLI or builder API. NOT emitted on crash recovery or automatic recovery fallback — those use
        platform.recovery_failed if they fail, or normal boot if they succeed.
      scope: global
      trigger: Explicit admin action only. The runtime calls ResetRuntimeState() and emits this event after the reset completes.
        Product nodes may subscribe to this event to clear their own state (e.g., accumulator state, cycle counters).
      payload:
        source: string — who initiated the reset (admin_cli, builder_api, etc.)
        timestamp: string (ISO 8601)
      produced_by_type: platform
      _source: external (platform admin CLI or builder API)
    platform.auth_required:
      description: Agent or tool call blocked pending authorization.
      scope: flow
      payload:
        agent_id: string
        tool_name: string (nullable)
        action: string
        reason: string
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.budget_threshold_crossed:
      description: LLM spend crossed a configured threshold. The platform monitors spend_ledger against policy-defined thresholds
        and emits this event when a boundary is crossed. One event with a level field — no separate events per level.
      scope: global
      payload:
        level: string (warning | throttle | emergency | ok)
        current_spend: number (total spend in USD for the current period)
        budget_cap: number (configured budget cap in USD)
        percentage: number (current_spend / budget_cap * 100)
        period: string (budget period identifier)
        timestamp: string (ISO 8601)
      produced_by_type: platform
      threshold_source: policy.yaml keys budget_warning_percent, budget_throttle_percent, budget_emergency_percent. The platform
        reads these at boot. If not present, budget monitoring is disabled.
      level_semantics:
        warning: Spend crossed warning threshold. Informational. No automatic action.
        throttle: Spend crossed throttle threshold. Platform may reduce agent concurrency or defer non-critical work.
        emergency: Spend crossed emergency threshold. Platform pauses all agent sessions until human intervention.
        ok: Spend dropped below warning threshold (after a period boundary reset or budget increase). Resume normal operations.
    platform.paused:
      description: Platform entered paused state. External ingress blocked — no new events accepted from external sources (API,
        webhooks, admin CLI, timer fires). In-flight events (already in the event loop) complete their handler execution and commit.
        Agent sessions in progress complete their current turn. New agent invocations are deferred until resume.
      scope: global
      payload:
        reason: string
        paused_by: string
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.agent_started:
      description: Agent session created and ready to process events.
      scope: flow
      payload:
        agent_id: string
        flow_instance: string (nullable)
        conversation_mode: string
        session_scope: string (nullable)
        model_tier: string
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.boot:
      description: Platform boot completed successfully. Emitted after all validation passes and nodes/agents are started.
      scope: global
      payload:
        flow_count: integer
        node_count: integer
        agent_count: integer
        event_count: integer
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.inbound_recorded:
      description: External event received and persisted. Emitted when an event enters the system from an external source
        (API, webhook, admin CLI).
      scope: entity or global
      payload:
        event_name: string
        source: string
        entity_id: string (nullable)
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.recovery_failed:
      description: Crash recovery failed during event replay. Unrecoverable state.
      scope: global
      payload:
        error: string
        failed_event_id: string (nullable)
        timestamp: string (ISO 8601)
      produced_by_type: platform
  routing_rules:
    description: Most platform events enter the normal event loop. Products can subscribe agents to them. System nodes can handle
      them. They follow standard routing, delivery, and persistence rules.
    routable_events: 'Platform events that enter the normal event loop: platform.dead_letter, platform.agent_failed,
      platform.agent_panic, platform.event_quarantined, platform.dead_letter_escalation, platform.reset, platform.auth_required,
      platform.paused, platform.boot, platform.recovery_failed, platform.agent_started, platform.budget_threshold_crossed.
      Products can subscribe to these.'
    diagnostic_events: 'Platform events that bypass the event loop and are persisted directly to the events table:
      platform.runtime_log, platform.inbound_recorded. These are high-frequency diagnostic records. Routing them through the
      event loop would cause recursive emission loops (a runtime_log about routing generates another runtime_log). They are
      persisted for queryability but not routed to subscribers.'
  go_source_rule:
    description: Every hardcoded event name in Go runtime source must appear in this catalog. CI should enforce this — grep
      Go source for event name literals, verify each exists in platform_events.catalog or is a product event loaded from contracts.
observation_model:
  description: Defines exactly what is observable from a test, audit, or flight recorder perspective. This is the external
    contract of the engine — what an observer sees after a handler runs.
  emitted_events:
    description: The list of events produced by system node handler execution.
    includes:
    - Events from handler top-level emit on single-emit handlers
    - Events from handler rules emit
    - Events from handler on_complete emit
    - Events from handler accumulate.on_timeout emit
    - Events from handler fan_out emit
    - Events from action-originated emits produced by runtime action instructions
    - Events from handler action side effects (e.g., auto_emit_on_create)
    excludes:
    - Agent fixture emissions (agents are independent, their emissions route through the event loop separately)
    - Dead-lettered events (intercepted before delivery, recorded in dead_letters table instead)
    - Child flow auto_emit events (visible within the child, not in parent emission log)
    naming: Events are recorded with their fully-qualified URI in the parent flow context. When a child flow node emits order.completed,
      the parent sees child-flow-id/order.completed. Within the same flow, events use local names (no prefix).
    payload_rules:
      description: Rules for constructing emitted event payloads on supported system-node runtime emit surfaces.
      declarative_system_node_emit_surface:
        construction_order:
        - 1. Start from an empty business payload
        - 2. Evaluate emit.fields for the active emit site, if present
        - 3. Attach runtime-owned envelope context to the emitted event carrier; envelope fields are not copied into payload
        ownership_rule: Runtime-owned envelope fields belong to the event carrier, not to emit.fields or payload.*
        note: This surface has no implicit entity passthrough or trigger-payload passthrough. If an emitted event needs a field
          beyond the runtime-owned envelope context, the producer must declare it explicitly in emit.fields at the active emit
          site. Consumers read envelope fields through event.*.
        runtime_validation:
          description: Runtime validates the emitted payload fail-closed on this surface.
          validation_view: Validate the producer-authored payload carrier against the target event schema. Runtime-owned envelope
            fields are not synthesized into payload for validation.
          rejection_rule: If any producer-authored field is absent from the target event schema, if any declared field violates
            the schema, or if emit.fields authors an envelope-owned key, handler execution fails. Runtime does not silently trim
            producer-authored business payload keys.
      action_originated_emit_surface:
        construction_order:
        - 1. Start from the triggering event payload business carrier
        - 2. Attach runtime-owned envelope context to the emitted event carrier; envelope fields are not copied into payload
        collision_priority: triggering event payload business fields are preserved unless a future action runtime revision introduces
          an explicit payload-construction carrier
        note: This surface currently inherits its business payload from the triggering event payload because the action runtime
          instruction model has no separate emit.fields carrier. Runtime must still fail closed on the resulting payload. Consumers
          read envelope fields through event.* rather than payload.*.
        runtime_validation:
          description: Runtime validates the emitted payload fail-closed on this surface before publish.
          validation_view: Validate the emitted payload carrier that will actually be published. Runtime-owned envelope fields are
            not synthesized into payload for validation.
          rejection_rule: If any inherited or producer-authored business field is undeclared or violates the schema, handler execution
            fails. Runtime does not silently trim inherited trigger-payload keys and does not clear the failure by projecting
            envelope-owned fields back into payload.
      auto_emit_on_create_surface:
        construction_order:
        - 1. Start from lifecycle-owned activation fields: instance_id, template_id, flow_path, subject_id, parent_entity_id
        - 2. Overlay create_flow_instance config entries only for keys not already owned by the lifecycle surface
        - 3. Attach runtime-owned envelope context to the emitted event carrier; envelope fields are not copied into payload
        collision_priority: lifecycle-owned payload fields > create_flow_instance config; runtime-owned envelope context is separate
          from payload
        note: This surface is authored only as `auto_emit_on_create.event`, so runtime owns the payload construction. It still
          must satisfy the active event schema fail-closed. Lifecycle-owned fields are explicit runtime payload on this surface;
          create_flow_instance config does not silently widen the event contract; envelope fields remain accessible through event.*.
        runtime_validation:
          description: Runtime validates the constructed auto-emit payload fail-closed before either immediate publish or queued
            post-commit publish.
          validation_view: Validate the constructed payload carrier against the target event schema. Runtime-owned envelope fields are
            not synthesized into payload for validation.
          rejection_rule: If any lifecycle/config-authored field is undeclared or violates the schema, flow activation fails. Runtime
            does not downgrade auto_emit_on_create schema violations into warning-only success on the queued post-commit branch.
  entity_state:
    description: The entity document after handler execution commits.
    observable_fields:
      current_state: The state after advances_to (or unchanged if no advances_to)
      gates: Map of gate names to boolean values, after sets_gate and clear_gates
      fields: JSONB of entity fields, after data_accumulation writes
      accumulator: JSONB of accumulated items, after accumulate step
      revision: Incremented on every handler commit
  handler_outcome:
    description: The result of a single handler execution.
    values:
      success: Handler ran to completion. All side effects committed.
      reject: 'Guard failed with on_fail: reject. No side effects. Entity unchanged.'
      discard: 'Guard failed with on_fail: discard. No side effects. No record.'
      kill: 'Guard failed with on_fail: kill. Entity advanced to terminal state.'
      escalate: 'Guard failed with on_fail: escalate:{event}. Escalation event emitted instead, using the same emit payload
        construction rules as a declarative system-node emit with no business fields: no implicit trigger/entity passthrough,
        payload stays empty unless authored fields exist, runtime-owned envelope remains on the event carrier, and fail-closed
        contract validation still applies.'
      dead_letter: Handler failed after retry exhaustion OR chain depth exceeded. Event moved to dead_letters.
      terminal_reject: Event targeted an entity in terminal state. Rejected before handler execution.
      waiting: Accumulation incomplete. Handler recorded the arrival but completion condition not yet met. No further steps
        executed. Entity unchanged except for accumulator tracking update.
      fanned_out: Fan-out dispatched. Handler emitted per-item events and is waiting for accumulation of results. Intermediate
        state — final outcome determined when accumulation completes.
  agent_vs_node_observability: System node handler emissions are recorded in the entity emission chain and appear in emitted_events.
    Agent emissions are NOT part of the entity emission chain — they are independent events that enter the event loop separately.
    An agent emitting ticket.classified creates a new event in the events table that is then delivered to subscribers. The
    agent emission does not appear in the triggering handler's emitted_events list.
workspace_model:
  description: Defines the filesystem contract for agent sessions. The platform provides three standard mount points and a
    scoping model. Products define workspace classes that map agent roles to specific scope configurations. If a product declares
    a workspace_class on an agent, the platform MUST provide all mounts at the declared scopes.
  standard_mounts:
    description: Three mount points are available to every agent session. Products cannot add new mount points — they configure
      access and scope for these three via workspace class definitions.
    /workspace:
      description: Writable working directory for agent output — drafts, artifacts, intermediate files.
      access: read-write
      scope_options:
      - per-agent — private to one agent, invisible to others
      - per-flow-instance — shared by all agents in the same flow instance, isolated across instances
      lifecycle:
        per-agent: Created at agent registration. Cleaned on agent termination. Persists across sessions for session/session_per_entity
          conversation modes. Ephemeral for task mode.
        per-flow-instance: Created on create_flow_instance. Preserved on instance termination (for post-mortem). Archival is
          an operational concern.
    /data:
      description: Read-only shared reference data. Products populate this via deployment configuration. The platform treats
        /data as opaque — it never reads, writes, indexes, or validates /data contents.
      access: read-only
      scope: global — identical content visible to every agent regardless of workspace class
      lifecycle: Mounted at boot. Contents managed outside the platform (deployment, CI, admin).
    /opt/swarm/contracts:
      description: Loaded flow contracts. Agents can read their own flow's contract files for self-reference.
      access: read-only
      scope: global
      lifecycle: Populated by the contract loader at boot. Immutable during runtime.
  workspace_class_definition:
    description: Products define workspace classes in their policy.yaml under workspace_classes. Each class maps standard mount
      points to scope configurations. The platform reads these definitions at boot and provisions mounts accordingly.
    format:
      workspace_classes:
        class_name:
          description: string — human-readable purpose
          workspace_scope: string — per-agent | per-flow-instance
    rules:
    - /data and /opt/swarm/contracts are always global, read-only. Products cannot override their scope or access.
    - workspace_scope controls the /workspace mount only — the sole configurable dimension.
    - Every workspace_class referenced by an agent in agents.yaml must be defined in policy.yaml workspace_classes.
    - The platform validates this at boot. Missing class definition is a boot error.
    platform_reserved_classes:
      description: The platform may use internal workspace classes for its own processes (e.g., boot scaffolding, system-level
        operations). Reserved class names are not declared in product policy.yaml — they are platform-internal. Products cannot
        use reserved names. Reserved names are implementation-specific and not part of the contract.
  mount_guarantees:
    description: Rules the runtime MUST enforce.
    rules:
    - Every agent session executes with all three standard mounts active. No mount may be missing.
    - /data is the SAME mount point across all workspace classes. An agent in any class sees identical /data contents.
    - /workspace isolation follows the workspace_scope declared by the agent's workspace class. per-agent workspaces are never
      visible to other agents. per-flow-instance workspaces are visible to all agents in that flow instance only.
    - Read-only mounts are enforced at the filesystem level (read-only bind mount, or equivalent). Agents cannot write to /data
      or /opt/swarm/contracts.
    - The runtime MUST NOT vary mount availability based on conversation_mode, model_tier, or any other agent property. Workspace
      class is the sole determinant of /workspace scope.
  boot_validation:
    description: The platform verifies workspace infrastructure at boot.
    checks:
    - Every workspace_class referenced in agents.yaml is defined in policy.yaml workspace_classes
    - /data mount exists and is readable
    - /opt/swarm/contracts is populated from contract loader
    - For each registered agent, /workspace path is creatable under the declared scope
    failure: Boot aborts if any workspace mount cannot be satisfied. Error message identifies the failing mount, workspace class,
      and agent.
  deployment_mapping:
    description: How standard mounts map to deployment environments. Mount paths are invariant — only backing storage changes.
    local_dev:
      /data: Host directory bind-mounted read-only. Same path for all agent processes.
      /workspace: Host directory under a platform-managed root (e.g., ~/.swarm/workspaces/{scope}/{id}).
      /opt/swarm/contracts: Host directory populated by contract loader at boot.
    docker:
      /data: Named volume or bind mount, shared across all containers. Read-only flag required.
      /workspace: Per-scope volumes. per-agent classes get per-agent volumes. per-flow-instance classes share an instance volume.
      /opt/swarm/contracts: Read-only volume populated by init container or bind mount.
    production:
      /data: Network-attached storage (NFS, EFS, GCS FUSE) mounted read-only. Consistent across all compute nodes.
      /workspace: 'Storage persistence follows conversation_mode. task mode: ephemeral (tmpfs acceptable). session modes: persistent
        storage required.'
      /opt/swarm/contracts: Read-only volume from deployment artifact.
    portability_rule: A product contract that works on local dev MUST work on Docker and production without contract changes.
      Mount paths are invariant. Only the backing storage implementation changes.
agent_prompt_lint:
  description: Prompt/schema lint for authored agent prompts on the verify surface.
  authority_distribution:
    structural:
      authority: hard_invalidity
      scope: Parseable structural references only. Deterministic drift fails boot.
      examples:
      - fenced code blocks showing tool arguments
      - quoted/backticked field references in direct instructions
      - YAML or JSON prompt fragments that name declared contract fields
    lower_confidence_follow_ons:
      authority: tracked separately
      scope: Directive, audit, and lint-confidence prompt findings are not widened into this authoritative first slice unless
        separately promoted.
static_analyzer:
  description: Accepted static analyzer slices promoted from review drafts into the authoritative platform contract spec.
    These slices are verify-owned and must not be widened beyond their recorded scope without a spec change.
  authority_levels:
    hard_invalidity: Deterministic drift or invalidity. Boot fails. The bundle cannot ship until fixed.
    semantic_drift_warning: High-confidence drift signal that remains warning-level in this Wave 1 slice.
    audit_analysis: Medium-confidence migration/audit output. Not surfaced on normal boot.
    lint_evidence: Informational evidence catalog. Not boot-fatal and not warning-level.
  slice_1_create_entity_field_initialization:
    id: semantic_validity_create_entity_field_initialization
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - handler_specification.expression_context.boot_validation
    - handler_specification.expression_context.namespaces.entity
    - handler_specification.handler_fields.create_entity
    - handler_specification.dependency_graph
    scope:
      description: 'For handlers with create_entity: true, every entity.X value read must resolve against the inferred
        entity contract. Wave 1 universal presence semantics make declared fields readable at explicit initial or
        type-default values from create time.
        '
      applies_to:
      - 'create_entity: true handlers only'
      - 'entity.X value reads only'
      excludes:
      - full reaching-definitions across handlers or flows
      - agent write proof via save_entity_field
      - declared event/timer dead-surface drift
    proof_carriers:
      declared_entity_field:
        valid_for: all create_entity read positions
      nested_declared_path:
        valid_for: all create_entity read positions when the path resolves through named types to a declared leaf
      undeclared_field_reference:
        invalid: true
    rule: A create_entity handler value read of entity.X is invalid only when X is undeclared on the inferred entity contract
      (or the nested path does not resolve). Missing initializer proof is not a Wave 1 failure class.
    authority_notes:
      hard_invalidity: Undeclared field/path usage is error-level semantic invalidity on the verify surface.
  slice_2_emitted_event_payload_completeness:
    id: semantic_drift_payload_completeness
    domain: semantic_drift
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - handler_specification.handler_fields.emit
    - contract_formats.event_schema
    - observation_model.emitted_events.payload_rules
    scope:
      description: For every event emitted by a system node handler, verify that the emitted payload statically covers all required
        event-schema fields using only the accepted slice-2 proof carriers.
      applies_to:
      - handler top-level single-emit
      - rules entries
      - on_complete branches
      - accumulate.on_timeout
      - fan_out per-item emit
      - guard on_fail: escalate
      excludes:
      - cross-handler reaching-definitions
      - prompt lint / provenance / handoff audit work
      - lower-authority heuristic checks
      - agent write proof via save_entity_field
    proof_carriers:
      explicit_emit_fields:
        valid_for: producer-authored payload keys explicitly declared in emit.fields at the active emit site
      non_payload_envelope_context:
        valid_for: runtime-owned envelope fields accessed through event.* rather than payload completeness proof
    no_emit_fields_rule:
      description: When emit.fields is absent, no producer-authored payload fields are statically provable in this slice.
    rule: For each required emitted-event payload field, emit hard-invalidity unless the field is explicitly covered by emit.fields
      at the active emit site. Envelope-owned fields do not clear this proof because they are not payload carriers. The finding
      message must say the field is not statically provable in the emitted payload.
  slice_3_input_pin_producer_path_satisfaction:
    id: input_pin_wiring
    domain: semantic_drift
    authority: semantic_drift_warning
    severity: warning
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - flow_model.state_composition.cross_flow_handoff
    - engine.cross_flow_routing.auto_wiring
    - engine.event_identity
    - contract_formats.event_schema
    scope:
      description: For every flow input pin event declared in schema.yaml pins.inputs.events, verify that at least one accepted
        producer path exists in the authored bundle on the static verify surface.
      applies_to:
      - schema.yaml pins.inputs.events
      excludes:
      - runtime routing correctness
      - payload compatibility
      - multi-hop reachability or liveness
      - produces-based proof
      - _status-based lifecycle suppression
    accepted_producer_paths:
      sibling_flow_output_pin:
        rule: Another flow declares the same local event name in schema.yaml pins.outputs.events.
      root_agent_emit_events:
        rule: A root-level agent declares the event in emit_events.
      root_node_handler_emits:
        rule: A root-level system node emits the event from handler top-level emit, rules emit, on_complete emit, accumulate.on_timeout
          emit, or fan_out emit.
      platform_event_catalog:
        rule: The input pin event exactly matches a platform_events.catalog key.
      external_source_annotation:
        rule: The consuming flow or root event entry for the event has _source beginning with external.
      same_flow_timer_declaration:
        rule: A timer declared within the consuming flow fires the same event.
    rule: Emit warning when none of the accepted producer-path forms are found. The finding message must say no producer path
      was found in the authored bundle and list the checked producer-path forms.
  slice_4_state_machine_reachability:
    id: semantic_drift_unreachable_state
    domain: semantic_drift
    authority: semantic_drift_warning
    severity: warning
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - flow_model.state_composition
    - handler_specification.handler_fields.advances_to
    - handler_specification.handler_fields.on_complete
    - handler_specification.handler_fields.rules
    - contract_formats.flow_schema
    scope:
      description: For every stateful flow, verify that each declared state is reachable from initial_state in the authored
        transition graph built from the accepted slice-4 transition carriers.
      applies_to:
      - stateful flows only
      excludes:
      - structural invalid target validation
      - missing terminal-path reasoning
      - runtime liveness or temporal behavior claims
    transition_carriers:
      handler_advances_to:
        rule: Handler-level advances_to contributes a possible edge.
      on_complete_branches:
        rule: on_complete branches with advances_to contribute possible edges.
      rules_branches:
        rule: rules branches with advances_to contribute possible edges.
    source_state_derivation:
      create_entity_handlers:
        rule: create_entity handlers source from initial_state only.
      non_create_entity_handlers:
        rule: non-create_entity handlers source from all non-terminal declared states.
      terminal_states:
        rule: terminal states are sinks in this slice.
    rule: Emit warning when a declared state is unreachable from initial_state in the authored transition graph. Keep invalid
      undeclared advances_to targets on hard-invalid state_machine_coherence.
  slice_5_dead_declared_event_schema_surface:
    id: semantic_drift_dead_event_schema
    domain: semantic_drift
    authority: semantic_drift_warning
    severity: warning
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - contract_formats.event_schema
    - engine.event_identity
    - engine.timer_model
    - engine.agent_session_management.emit_tool_convention
    - handler_specification.handler_fields.emit
    scope:
      description: For every product-declared event schema entry in `events.yaml`, verify that at least one accepted active
        authored role exists on the supported static verify path.
      applies_to:
      - declared `events.yaml` entries only
      excludes:
      - timer-fired-no-consumer ownership
      - runtime delivery correctness
      - payload completeness
      - input-pin producer satisfaction
      - state reachability
      - platform catalog membership as proof
    active_role_carriers:
      intra_flow_local_usage:
        rule: Handlers or agents within the same flow as the declaration reference the event by local name or same-flow resolved
          identity.
      root_local_usage_for_root_declared_events:
        rule: Root-level handlers or agents referencing a root-declared event by local name keep only the root declaration alive.
      cross_flow_qualified_usage:
        rule: Another flow or root participant references the declaration via an explicitly qualified event name that resolves
          to the declaring flow.
      external_annotations:
        rule: "`_source` beginning with external or `_consumer` metadata on the declared event entry counts as an active external role."
      same_flow_timer_references:
        rule: "Timers in the same scope keep the declaration alive through `event`, `start_on: event:...`, or `cancel_on: event:...`."
      same_flow_fan_out_emit:
        rule: "`fan_out.emit` in the same scope keeps the declaration alive."
      same_flow_auto_emit_on_create:
        rule: "`auto_emit_on_create` in the same scope keeps the declaration alive."
    non_proof_carriers:
      platform_catalog_membership:
        rule: "Product-declared `events.yaml` entries are not kept alive by `platform_events.catalog` overlap."
      root_local_reference_into_child_flow:
        rule: A root-local reference does not keep a child-flow declaration alive.
      coincidental_same_local_name:
        rule: The same local event name in another flow is not proof by coincidence.
      produces:
        rule: "Node `produces` lists are not active-role proof."
    rule: Emit warning when a declared event-schema entry has zero accepted active-role carriers. The message must describe the
      event as having no active role in the authored bundle, not as definitely unreachable at runtime.
  slice_6_entity_writer_coverage:
    id: entity_writer_coverage
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - rule.consequences.bidirectional_verification
    - rule.consequences.declared_is_authority
    - type_system.field_forms.verbose
    scope:
      description: For every declared field on the active root or flow-owned Wave 1 entity contract, verify that explicit
        authorial population intent exists.
      applies_to:
      - declared entity fields only
      excludes:
      - platform-owned envelope fields
      - runtime read semantics
      - MCP/tool-schema derivation
    accepted_coverage:
      initial:
        rule: Explicit `initial:` on the field counts as authored creation-time coverage.
      unused_reason:
        rule: Explicit `_unused_reason:` documents intentional no-writer intent and suppresses this slice only.
      handler_write_sites:
        rule: Handler write targets that name the field explicitly count as coverage. This includes data_accumulation, compute,
          filter/group_by/reduce/count store_as, query store_as, and clear targets.
    rule: Emit hard invalidity when a declared entity field has no authored writer coverage, no explicit `initial:`, and no
      `_unused_reason:`.
  slice_7_entity_reader_compliance:
    id: expression_field_reference_validation
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - rule.consequences.required_by_default_uniform_with_events
    - runtime_enforcement.query_entities
    - handler_specification.expression_context.boot_validation
    scope:
      description: Verify that every `entity.*` reference used by handler CEL surfaces resolves against the active Wave 1
        entity contract and, for query-filter contexts, resolves to a scalar or enum leaf.
      applies_to:
      - handler guards
      - handler conditions
      - on_complete and rules conditions
      - emit.fields expressions
      - data_accumulation expressions
      - query/filter expressions on entity paths
      excludes:
      - runtime tool execution
      - prompt heuristics
    proof_carriers:
      declared_field:
        rule: Declared top-level entity field is valid.
      nested_declared_path:
        rule: Nested path is valid only if every named-type step resolves and the final leaf resolves.
      query_filter_leaf:
        rule: Query/filter references must end at a scalar or enum leaf. `list.size()` is accepted because it reduces to integer.
    rule: Emit hard invalidity when an entity read path is undeclared, unresolved through the named-type chain, or used as a
      non-scalar/non-enum filter leaf.
  slice_8_entity_write_target_compliance:
    id: payload_field_coverage
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - rule.consequences.bidirectional_verification
    - runtime_enforcement.create_entity
    - runtime_enforcement.save_entity_field
    scope:
      description: Verify that handler-side entity write targets name declared top-level entity fields on the active Wave 1
        contract.
      applies_to:
      - handler data_accumulation writes
      - handler compute/filter/group_by/reduce/count store targets
      - handler query store targets
      - handler clear targets
      excludes:
      - nested write primitives beyond Wave 1
      - runtime tool delivery/schema generation
    rule: Emit hard invalidity when a handler write target is nested, targets an envelope field, targets an undeclared entity
      field, or appears in a flow with no declared Wave 1 entity contract.
  slice_9_entity_reader_coverage:
    id: entity_reader_coverage
    domain: semantic_validity
    authority: lint_evidence
    severity: informational
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - rule.consequences.bidirectional_verification
    - design_principles
    scope:
      description: Informational audit over declared entity fields for which verify finds no internal handler reader coverage.
      applies_to:
      - declared entity fields only
      excludes:
      - external/operator readers outside platform visibility
      - hard gating or warning-level surfacing
    rule: Emit lint evidence when a declared entity field has no detected internal reader on the supported verify surface.
  slice_10_agent_prompt_lint_structural:
    id: agent_prompt_lint_structural
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/contracts/prompt_schema_guard.go
    supported_surface: cmd/swarm verify
    spec_basis:
    - agent_prompt_lint
    - rule.consequences.bidirectional_verification
    scope:
      description: Deterministic prompt-schema guard over parseable structural prompt references only.
      applies_to:
      - prompt schema guard structural findings
      excludes:
      - directive-form prompt heuristics
      - audit/lint confidence bands
      - delivery/session-primer derivation
    rule: Emit hard invalidity when a parseable structural prompt reference drifts from the declared event or entity contract.
