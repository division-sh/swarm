# ============================================================================
# EmpireAI Agent-Tools Contract — v2.0.35
# ============================================================================
# Canonical source of truth for agent wiring. Authoritative over spec prose.
#
# Fields per agent:
#   id:                  Agent identifier (singletons use literal, templates use {vertical_id})
#   type:                holding | factory | operating
#   role:                Functional role (matches roster)
#   model_tier:          sonnet | haiku | haiku_or_sonnet (runtime-selected)
#   conversation_mode:   session | session_per_vertical | task | stateless
#   max_turns_per_task:  Turn budget per conversation
#   subscriptions:       Static EventBus subscriptions (holding/factory agents)
#   subscriptions_bootstrap: Routes installed via routing_rules table (OpCo agents)
#   tools_tier2:         Non-universal tools (domain-specific)
#   emit_events:         Events this agent may emit
#
# Universal tools (injected into ALL agents, not listed per-agent):
#   agent_message        — point-to-point messaging between agents
#   emit_*               — typed event emission tools (auto-generated from EventSchemaRegistry)
#   Native LLM tools     — file, shell, web_search, http_request (per model capability)
#
# Subscription model:
#   Holding/factory agents use STATIC subscriptions — listed in 'subscriptions' field.
#   OpCo leadership agents use STATIC subscriptions — listed in 'subscriptions' field.
#   OpCo worker agents use ROUTING TABLE subscriptions — listed in 'subscriptions_bootstrap'.
#     Bootstrap routes are installed by runtime at OpCo spinup. Additional routes may be
#     discovered and installed at runtime by CEO/CoS via configure_routing tool.
#     Workers also receive work via agent_message from their managers.
#
# Wildcard note:
#   EventBus does NOT use glob patterns in subscriptions. Events like opco.ceo_report are
#   global event types (not per-vertical). Routing uses vertical_id in payload, not event name.
#   Previous spec versions used opco.*.ceo_report notation — this was incorrect.
#
# Changes from v2.0.31:
#   - C1 FIXED: Wildcard subscriptions replaced with direct event names
#   - C2 FIXED: OpCo worker subscriptions documented (subscriptions_bootstrap field)
#   - C3 FIXED: Spec Auditor → sonnet + holding (was haiku + factory)
#   - H1 FIXED: mailbox_send added to CEO, Marketing, Support, VP Product, VP Growth
#   - H2 FIXED: scanner-agent added (ephemeral, template-based)
#   - H3 FIXED: Chief of Staff 8 subscriptions from config
#   - H4 FIXED: OpCo CTO subscriptions from config
#   - Medium: max_turns, conversation_mode, schedule tool fixes throughout
# ============================================================================

# ---------------------------------------------------------------------------
# HOLDING AGENTS — singletons, always running
# ---------------------------------------------------------------------------
empire-coordinator:
  id: empire-coordinator
  type: holding
  role: empire_coordinator
  model_tier: sonnet
  conversation_mode: session
  max_turns_per_task: 40
  subscriptions:
    - system.started
    - system.directive
    - campaign.completed
    - vertical.scored
    - vertical.marginal
    - vertical.approved
    - vertical.killed
    - template.version_published
    - template.migration_approved
    - template.migration_completed
    - template.migration_failed
    - opco.ceo_ready
    - opco.launched
    - opco.ceo_report
    - opco.steady_state_reached
    - opco.teardown_complete
    - opco.escalation
    - human_task.requested
    - human_task.expired
    - budget.threshold_crossed
    - scoring.contested
    - devops.capacity_warning
    - cto.extraction_recommended
    - board.directive
    - board.chat
    - timer.portfolio_digest
    - timer.marginal_review
  tools_tier2:
    - mailbox_send
    - schedule
    - human_task_decide
  emit_events:
    - scan.requested
    - opco.spinup_requested
    - template.migration_planned
    - template.migration_completed
    - template.migration_failed
    - vertical.health_warning
    - vertical.resumed
    - portfolio.digest_compiled
    - budget.warning
    - budget.throttle
    - budget.emergency
    - budget.resumed
    - human_task.approved
    - human_task.rejected
    - human_task.deferred
    - scoring.contest_resolved

