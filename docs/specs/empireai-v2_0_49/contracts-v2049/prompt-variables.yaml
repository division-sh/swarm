# ============================================================================
# EmpireAI Prompt Variables — v2.0.49
# ============================================================================
# Single source of truth for values that appear in multiple files.
# Prompt templates use {{variable_name}} syntax.
#
# RULE: If a value appears in more than one contract file or prompt,
# it belongs here. Prompts and spec prose reference these variables.
# When a value changes, update it HERE — all prompts pick it up.
#
# The runtime reads this file, then reads each prompt .md file,
# substitutes {{variables}}, and sends the rendered result to the LLM.
# ============================================================================

# ── Pre-filter thresholds ───────────────────────────────────────────
signal_threshold: 55                     # pre-filter rejects below this
mra_self_filter_threshold: 40            # MRA emits anything above this, pre-filter decides
evidence_url_minimum: 2                  # independent source URLs required
hard_gate_floor: 50                      # build_complexity/automation_completeness must be >= this
composite_shortlist: 75                  # composite >= this → shortlisted
composite_marginal_low: 55              # composite >= this and < composite_shortlist with conditions → marginal
composite_marginal_high: 74             # upper bound of marginal range
tier1_dimension_floor: 50               # any Tier 1 dimension below this → reject
tier1_subscore_floor: 60                # Tier 1 weighted sub-score below this → reject

# ── Marginal path ──────────────────────────────────────────────────
marginal_tier1_dimensions_above_70: 2   # need >= this many Tier 1 dims ≥ 70 for marginal (not reject)
marginal_park_days: 14                  # review timer interval for parked marginals
marginal_kill_days: 60                  # parked marginals with no new signals killed after this

# ── Pipeline capacity ──────────────────────────────────────────────
pipeline_capacity_max: 3                # max verticals in validation before marginals are parked

# ── Derivation loop ────────────────────────────────────────────────
max_derivations_per_parent: 2           # analysis agent can propose 0-N alternatives
max_generation_depth: 2                 # derivation chain depth limit
derivation_trigger_threshold: 65        # dimension below this MAY trigger derivation

# ── Corpus mode ────────────────────────────────────────────────────
corpus_batch_size: 25                   # signals per batch dispatched to MRA

# ── Scoring rubric weights ─────────────────────────────────────────
tier1_weight_percent: 60                # Execution Fit
tier2_weight_percent: 30                # Market Viability
tier3_weight_percent: 10                # Upside

# ── Scoring dimensions ─────────────────────────────────────────────
hard_gates:
  - build_complexity
  - automation_completeness

tier1_dimensions:
  - name: icp_crispness
    weight: 15
  - name: distribution_leverage
    weight: 15
  - name: time_to_value
    weight: 15
  - name: operational_drag
    weight: 15

tier2_dimensions:
  - name: pain_severity
    weight: 10
  - name: competition_gap
    weight: 10
  - name: monetization_clarity
    weight: 10

tier3_dimensions:
  - name: retention_architecture
    weight: 5
  - name: expansion_potential
    weight: 5

# ── Red flag enums ─────────────────────────────────────────────────
blocking_red_flags:
  - complex_integration
  - high_feature_count
  - phone_led_sales
  - enterprise_procurement
  - relationship_networking
  - physical_presence_required
  - support_mode_phone_video

passthrough_red_flags:
  - one_time_setup
  - accuracy_liability

# ── Opportunity pattern enums ──────────────────────────────────────
opportunity_patterns:
  - platform_parasitic
  - freelancer_replacement
  - data_asymmetry
  - api_middleware
  - compliance_regulatory
  - ai_wrapper
  - workflow_automation
  - unknown

# ── Retention primitives ───────────────────────────────────────────
retention_primitives:
  - recurring_data
  - workflow_embedding
  - integration_lock_in
  - compliance_cadence
  - team_collaboration

# ── ICP workflow anchor tokens ─────────────────────────────────────
workflow_anchor_tokens:
  - schedule
  - booking
  - invoice
  - payroll
  - lead
  - dispatch
  - inventory
  - compliance
  - reporting

# ── Platform capabilities ──────────────────────────────────────────
tier1_capabilities:
  - Web UI
  - Go backend
  - LLM integration (document parsing, classification, generation)
  - Postgres
  - Stripe payments
  - External API integration (QuickBooks, Xero, MLS, Procore)
  - Document generation (PDF/CSV)
  - OAuth authentication
  - Web scraping

tier2_capabilities:
  - name: Email sending
    provider: SendGrid/Postmark
    cost: "~$0.001/email"
    status: planned
  - name: SMS
    provider: Twilio
    cost: "~$0.008/message"
    status: planned
  - name: WhatsApp Business API
    cost: "~$0.005-0.08/conversation"
    status: planned

tier3_capabilities:
  - name: Voice AI
    provider: Bland.ai/Vapi/Retell
    cost: "$0.07-0.15/minute"
    status: future
  - name: Browser automation
    provider: Playwright
    status: future

# ── Agent model tiers ──────────────────────────────────────────────
model_tiers:
  empire_coordinator: sonnet
  factory_cto: sonnet
  analysis_agent: sonnet
  market_research_agent: sonnet
  trend_research_agent: sonnet
  scanner_agent: haiku
  spec_auditor: sonnet
  default_opco: haiku_or_sonnet

# ── Timeouts ───────────────────────────────────────────────────────
scan_timeout_minutes: 90                # per-scan timeout in ScanAccumulator
campaign_timeout_hours: 24              # global campaign safety net

# ── Budget thresholds ──────────────────────────────────────────────
budget_warning_percent: 80
budget_throttle_percent: 90
budget_emergency_percent: 100

# ── Scoring contest ────────────────────────────────────────────────
contest_spread_threshold: 30            # point spread between shards that triggers contest

# ── OpCo org structure ─────────────────────────────────────────────
opco_agent_count: 13                    # agents per OpCo org
bootstrap_route_count: 20               # immutable routes installed on spinup
seeded_route_count: 7                   # removable routes installed on spinup

# ── Mailbox types ──────────────────────────────────────────────────
mailbox_types:
  - vertical_approval
  - migration_approval
  - domain_approval
  - spend_request
  - escalation
  - review
  - digest
  - budget_increase

mailbox_priorities:
  - low
  - normal
  - high
  - critical
