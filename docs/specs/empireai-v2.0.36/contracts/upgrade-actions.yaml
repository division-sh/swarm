  - id: "v2035-ddl-template-drafts-cols"
    type: migrate
    priority: must_pass
    target_file: contracts/ddl-canonical.sql
    key_path: template_prompt_drafts
    description: "template_prompt_drafts: added source, notes, created_at"
    expected_before: "role TEXT PK, prompt TEXT, updated_at"
    expected_after: "role TEXT PK, prompt TEXT, source TEXT, notes TEXT, created_at, updated_at"
    verify_command: "psql -c \"\\d template_prompt_drafts\" | grep -q source && psql -c \"\\d template_prompt_drafts\" | grep -q notes"
