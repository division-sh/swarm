  - id: "v2035-idx-conversations-scope"
    type: migrate
    priority: must_pass
    target_file: contracts/ddl-canonical.sql
    key_path: conversations.idx_conversations_scope
    description: "conversations unique index: add mode column and session_per_vertical filter"
    expected_before: "UNIQUE INDEX ON conversations(agent_id, scope_key) WHERE scope_key IS NOT NULL AND status = 'active'"
    expected_after: "UNIQUE INDEX ON conversations(agent_id, scope_key, mode) WHERE scope_key IS NOT NULL AND status = 'active' AND mode = 'session_per_vertical'"
    verify_command: "psql -c \"\\di idx_conversations_scope\" | grep -q mode"
    depends_on: ["v2035-ddl-fresh"]

  - id: "v2035-go-struct-renames"
    type: grep_kill
    priority: must_pass
    target_file: "internal/**/*.go"
    key_path: null
    description: >
      Rename Go struct fields to match DDL column names:
      G2_SpecApproved→G2_Spec, G3_CTOApproved→G3_CTO, G4_BrandReady→G4_Brand,
      ExpectedAgents→Expected, AgentsComplete→Complete,
      VerticalsDiscovered→Discovered, VerticalsSkipped→Skipped
    expected_before: "G2_SpecApproved, G3_CTOApproved, G4_BrandReady, ExpectedAgents, AgentsComplete"
    expected_after: "G2_Spec, G3_CTO, G4_Brand, Expected, Complete"
    verify_command: "grep -r 'G2_SpecApproved\\|G3_CTOApproved\\|G4_BrandReady\\|ExpectedAgents\\|AgentsComplete' internal/ | wc -l | tr -d ' ' | grep -q '^0$'"
    depends_on: null

  # ── DDL: Column/constraint fixes ────────────────────────────────────

  - id: "v2034-ddl-strategic-context-jsonb"
    type: migrate
    priority: must_pass
    target_file: contracts/ddl-canonical.sql
    key_path: scan_campaigns.strategic_context
    description: "scan_campaigns.strategic_context: TEXT → JSONB"
    expected_before: "strategic_context text"
    expected_after: "strategic_context jsonb"
    verify_command: "psql -c \"SELECT data_type FROM information_schema.columns WHERE table_name='scan_campaigns' AND column_name='strategic_context'\" | grep -q jsonb"
    depends_on: ["v2035-ddl-fresh"]

  - id: "v2034-ddl-shards-check"
    type: migrate
    priority: should_fix
    target_file: contracts/ddl-canonical.sql
    key_path: shards.status
    description: "Add CHECK constraint on shards.status"
    expected_before: "status TEXT NOT NULL DEFAULT 'pending' (no constraint)"
    expected_after: "CONSTRAINT valid_shard_status CHECK (status IN ('pending','assigned','completed','failed','timed_out'))"
    verify_command: "psql -c \"SELECT conname FROM pg_constraint WHERE conrelid='shards'::regclass AND contype='c'\" | grep -q valid_shard_status"
    depends_on: ["v2035-ddl-fresh"]

  - id: "v2034-ddl-spend-ledger-fk"
    type: migrate
    priority: should_fix
    target_file: contracts/ddl-canonical.sql
    key_path: spend_ledger.agent_id
    description: "Add FK on spend_ledger.agent_id → agents(id)"
    expected_before: "agent_id TEXT (no FK)"
    expected_after: "agent_id TEXT REFERENCES agents(id)"
    verify_command: "psql -c \"SELECT conname FROM pg_constraint WHERE conrelid='spend_ledger'::regclass AND contype='f'\" | grep -q agent"
    depends_on: ["v2035-ddl-fresh"]

  - id: "v2034-ddl-cascade-prompt-overrides"
    type: migrate
