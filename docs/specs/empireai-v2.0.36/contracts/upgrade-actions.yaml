  - id: "v2035-ddl-scan-accumulators-cols"
    type: migrate
    priority: must_pass
    target_file: contracts/ddl-canonical.sql
    key_path: scan_accumulators
    description: "scan_accumulators: TEXT types, expected (not expected_agents), reports INT (not JSONB), completed_by '{}' (not '[]')"
    expected_before: "scan_id UUID, expected_agents INT, reports JSONB, completed_by '[]'"
    expected_after: "scan_id TEXT, expected INT, complete INT, reports INT, discovered INT, completed_by '{}'"
    verify_command: "psql -c \"\\d scan_accumulators\" | grep -q 'scan_id.*text' && psql -c \"\\d scan_accumulators\" | grep -q 'expected '"
