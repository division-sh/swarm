    expected_before: "UNIQUE INDEX ON agent_sessions(agent_id, runtime_mode)"
    expected_after: "UNIQUE INDEX ON agent_sessions(agent_id, runtime_mode, scope_key)"
    verify_command: "psql -c \"\\di idx_sessions_active\" | grep -q scope_key"
