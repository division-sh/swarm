# EmpireAI upgrade-actions.yaml
# Machine-readable upgrade delta. One file per spec version.
# Implementer processes actions in order. Each action is independently verifiable.
#
# Action types:
#   add       — Create new file or add new field/entry
#   edit      — Modify existing file/field/entry
#   drop      — Remove file/field/entry
#   rename    — Rename file/field/entry (old_path → new_path)
#   migrate   — SQL migration (run against live or fresh DB)
#   grep_kill — Find-and-replace across codebase
#
# Fields:
#   id:              Unique action identifier (version-scoped)
#   type:            Action type (see above)
#   priority:        must_pass | should_fix | optional
#   target_file:     File path relative to repo root
#   key_path:        Dot-notation path within the file (for YAML/Go edits)
#   description:     Human-readable what and why
#   expected_before: What the target looks like before this action (null for adds)
#   expected_after:  What the target should look like after this action (null for drops)
#   verify_command:  Shell command that returns 0 on success
#   depends_on:      List of action IDs that must complete first (null if none)

spec_version: "2.0.36"
previous_version: "2.0.35"
generated_at: "2026-02-26"

actions:

  # ── v2.0.35: DDL column-level alignment ─────────────────────────────
  # These supersede the v2.0.34 DDL actions. Run ddl-canonical.sql fresh.

  - id: "v2035-ddl-fresh"
    type: migrate
    priority: must_pass
    target_file: contracts/ddl-canonical.sql
    key_path: null
    description: >
      Run canonical DDL on fresh database. All 7 runtime tables now have
      correct column names matching Go code. Supersedes v2034-ddl-fresh.
    expected_before: null
    expected_after: "36 tables created, 0 errors"
    verify_command: "psql -v ON_ERROR_STOP=1 -f contracts/ddl-canonical.sql 2>&1 | grep -c ERROR | grep -q '^0$'"
    depends_on: null

  - id: "v2035-ddl-pipeline-receipts-cols"
    type: migrate
    priority: must_pass
    target_file: contracts/ddl-canonical.sql
    key_path: pipeline_receipts
    description: "pipeline_receipts: result column → status + error columns"
    expected_before: "result TEXT"
    expected_after: "status TEXT NOT NULL DEFAULT 'processed', error TEXT"
    verify_command: "psql -c \"\\d pipeline_receipts\" | grep -q 'status.*text' && psql -c \"\\d pipeline_receipts\" | grep -q 'error'"
    depends_on: ["v2035-ddl-fresh"]

  - id: "v2035-ddl-pending-dedup-cols"
    type: migrate
    priority: must_pass
    target_file: contracts/ddl-canonical.sql
    key_path: pending_dedup_candidates
    description: "pending_dedup_candidates: dedup_event_id TEXT PK, name, signal_strength, payload"
    expected_before: "id UUID PK, candidate JSONB"
    expected_after: "dedup_event_id TEXT PK, name TEXT, signal_strength INT, payload JSONB"
    verify_command: "psql -c \"\\d pending_dedup_candidates\" | grep -q 'dedup_event_id.*text'"
    depends_on: ["v2035-ddl-fresh"]

  - id: "v2035-ddl-validation-pipelines-cols"
    type: migrate
    priority: must_pass
    target_file: contracts/ddl-canonical.sql
