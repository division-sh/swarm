# EmpireAI verification-gates.yaml
# Machine-readable test gate manifest. Lists required verification commands
# and pass criteria per spec version. "Compliance" is binary: all must_pass
# gates green = compliant; any red = non-compliant.
#
# Gate priorities:
#   must_pass   — Blocks release. Failure = broken system.
#   should_pass — Expected green. Failure = tracked debt, not blocker.
#   informational — Report result, never blocks. Tracks coverage/quality trends.
#
# Each gate specifies:
#   id:           Unique gate identifier
#   name:         Human-readable gate name
#   priority:     must_pass | should_pass | informational
#   category:     ddl | wiring | events | agents | integration
#   command:      Shell command to run (exit 0 = pass)
#   pass_criteria: Human-readable description of what "pass" means
#   introduced:   Spec version that added this gate
#   notes:        Optional context

spec_version: "2.0.34"

gates:

  # ── DDL Gates ───────────────────────────────────────────────────────

  - id: ddl-fresh-install
    name: "Canonical DDL creates all tables on fresh DB"
    priority: must_pass
    category: ddl
    command: "psql -v ON_ERROR_STOP=1 -f contracts/ddl-canonical.sql"
    pass_criteria: "Exit 0, 36 tables created, no errors"
    introduced: "2.0.29"
    notes: "Validates FK ordering, constraint syntax, type correctness"

  - id: ddl-table-count
    name: "Canonical DDL has exactly 36 tables"
    priority: must_pass
    category: ddl
    command: "grep -c 'CREATE TABLE' contracts/ddl-canonical.sql | grep -q '^36$'"
    pass_criteria: "Exactly 36 CREATE TABLE statements"
    introduced: "2.0.32"

  - id: ddl-runtime-tables-match-structs
    name: "7 runtime tables match Go struct field names"
    priority: must_pass
    category: ddl
    command: |
      # validation_pipelines must have G1-G4 gates
      psql -c "\d validation_pipelines" | grep -q g1_research &&
      psql -c "\d validation_pipelines" | grep -q revision_count &&
      # scan_accumulators must have JSONB fields
      psql -c "\d scan_accumulators" | grep -q 'completed_by.*jsonb' &&
      psql -c "\d scan_accumulators" | grep -q 'reports.*jsonb' &&
      # pipeline_receipts must be event_id PK (no handler)
      psql -c "\d pipeline_receipts" | grep -v handler | grep -q event_id &&
      # pending_dedup must have candidate JSONB
      psql -c "\d pending_dedup_candidates" | grep -q 'candidate.*jsonb' &&
      # runtime_config must be snapshot-based
      psql -c "\d runtime_config" | grep -q config_yaml &&
      # pipeline_processed_events must be event_id PK only
      psql -c "\d pipeline_processed_events" | grep -v handler | grep -q event_id &&
      # template_prompt_drafts must be role PK
      psql -c "\d template_prompt_drafts" | grep -q 'role.*text'
    pass_criteria: "All 7 runtime tables have columns matching their Go struct definitions"
    introduced: "2.0.34"
    notes: "This gate was added after v2.0.33 shipped idealized schemas that diverged from Go code"

  - id: ddl-schema-diff
    name: "Live DB schema matches canonical DDL"
    priority: should_pass
    category: ddl
    command: "empire db diff --canonical contracts/ddl-canonical.sql"
    pass_criteria: "0 differences (column types, constraints, indexes all match)"
    introduced: "2.0.34"
    notes: "Requires `empire db diff` command. Report UNVERIFIED if command not yet implemented."

  # ── Wiring Gates ────────────────────────────────────────────────────

  - id: wiring-verifier-clean
    name: "Wiring verifier passes with 0 FAIL, 0 WARN"
    priority: must_pass
    category: wiring
    command: "empire verify --contracts contracts/"
    pass_criteria: "0 FAIL, 0 WARN"
    introduced: "2.0.29"
    notes: "Verifier loads agent-tools.yaml + event-catalog.yaml, cross-validates subscriptions, emit_events, delivery_channel"

  - id: wiring-no-glob-subs
    name: "No glob pattern subscriptions in agent configs"
    priority: must_pass
    category: wiring
    command: "grep -r 'opco\\.\\*\\.' configs/ | wc -l | grep -q '^0$'"
    pass_criteria: "0 glob patterns found"
    introduced: "2.0.32"

  - id: wiring-no-sc-ghosts
    name: "No Scoring Coordinator references in active code"
    priority: must_pass
    category: wiring
    command: "grep -ri 'scoring.coordinator\\|scoring-coordinator\\|ScoringCoordinator' internal/ configs/ | grep -v changelog | wc -l | grep -q '^0$'"
    pass_criteria: "0 references outside changelog entries"
    introduced: "2.0.27"

  - id: wiring-no-uuid-agents
    name: "No UUID type references for agents.id (it is TEXT)"
    priority: must_pass
    category: wiring
    command: "grep -r 'UUID.*agents\\|agents.*UUID' internal/ | wc -l | grep -q '^0$'"
    pass_criteria: "0 UUID references to agents.id"
    introduced: "2.0.29"

  - id: wiring-delivery-channel-complete
    name: "Every event in catalog has a delivery_channel value"
    priority: must_pass
    category: events
    command: |
      python3 -c "
      import yaml
      catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))
      events = catalog.get('events', [])
      missing = [e['type'] for e in events if not e.get('delivery_channel')]
      assert len(missing) == 0, f'Missing delivery_channel: {missing}'
      print(f'{len(events)} events, all have delivery_channel')
      "
    pass_criteria: "All events have delivery_channel field"
    introduced: "2.0.31"

  # ── Cross-validation Gates ──────────────────────────────────────────

  - id: xval-emit-events-in-catalog
    name: "Every agent emit_event has a catalog entry"
    priority: must_pass
    category: wiring
    command: |
      python3 -c "
      import yaml
      agents = yaml.safe_load(open('contracts/agent-tools.yaml'))
      catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))
      catalog_types = {e['type'] for e in catalog.get('events', [])}
      missing = []
      for a in agents.get('agents', []):
        for evt in a.get('emit_events', []):
          if evt not in catalog_types:
            missing.append(f\"{a['id']}: {evt}\")
      assert len(missing) == 0, f'Emit events missing from catalog: {missing}'
      print('All emit_events have catalog entries')
      "
    pass_criteria: "0 orphaned emit_events"
    introduced: "2.0.29"

  - id: xval-subscriptions-in-catalog
    name: "Every agent subscription has a catalog entry"
    priority: must_pass
    category: wiring
    command: |
      python3 -c "
      import yaml
      agents = yaml.safe_load(open('contracts/agent-tools.yaml'))
      catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))
      catalog_types = {e['type'] for e in catalog.get('events', [])}
      missing = []
      for a in agents.get('agents', []):
        for sub in a.get('subscriptions', []):
          if sub not in catalog_types:
            missing.append(f\"{a['id']}: {sub}\")
      assert len(missing) == 0, f'Subscriptions missing from catalog: {missing}'
      print('All subscriptions have catalog entries')
      "
    pass_criteria: "0 orphaned subscriptions"
    introduced: "2.0.29"

  - id: xval-catalog-emitters-exist
    name: "Every catalog emitter is a real agent or system component"
    priority: should_pass
    category: events
    command: |
      python3 -c "
      import yaml
      agents = yaml.safe_load(open('contracts/agent-tools.yaml'))
      catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))
      agent_ids = {a['id'] for a in agents.get('agents', [])}
      system_emitters = {'runtime', 'system', 'human', 'timer', 'eventbus'}
      valid = agent_ids | system_emitters
      invalid = []
      for e in catalog.get('events', []):
        emitter = e.get('emitter', '')
        if emitter not in valid and not emitter.startswith('scanner-'):
          invalid.append(f\"{e['type']}: {emitter}\")
      assert len(invalid) == 0, f'Unknown emitters: {invalid}'
      print('All emitters are valid')
      "
    pass_criteria: "0 unknown emitters"
    introduced: "2.0.29"

  # ── Agent Config Gates ──────────────────────────────────────────────

  - id: agents-all-have-prompts
    name: "Every roster agent has a system_prompt in config"
    priority: must_pass
    category: agents
    command: |
      for f in configs/agents/*.yaml; do
        if ! grep -q 'system_prompt:' "$f"; then
          echo "MISSING: $f"
          exit 1
        fi
      done
    pass_criteria: "Every .yaml config file has system_prompt field"
    introduced: "2.0.20"

  - id: agents-naming-convention
    name: "Agent config filenames follow convention"
    priority: should_pass
    category: agents
    command: |
      python3 -c "
      import yaml, os, re
      agents = yaml.safe_load(open('contracts/agent-tools.yaml'))
      holding = [a for a in agents.get('agents', []) if a.get('type') in ('holding', 'factory')]
      errors = []
      for a in holding:
        aid = a['id']
        expected = f'configs/agents/{aid}.yaml'
        if not os.path.exists(expected):
          errors.append(f'Missing: {expected} for agent {aid}')
      if errors:
        print('\\n'.join(errors))
        exit(1)
      print(f'{len(holding)} agent configs found')
      "
    pass_criteria: "Every holding/factory agent ID maps to a config file"
    introduced: "2.0.34"

  # ── Integration Gates ───────────────────────────────────────────────

  - id: integration-event-roundtrip
    name: "EventBus publish → subscribe delivers to correct agent"
    priority: should_pass
    category: integration
    command: "go test ./internal/runtime/ -run TestEventRoundtrip -count=1"
    pass_criteria: "Test passes, event delivered to subscribed agent within 5s"
    introduced: "2.0.34"
    notes: "Report UNVERIFIED if test not yet written"

  - id: integration-crash-recovery
    name: "RecoverFromCrash replays unreceipted events"
    priority: should_pass
    category: integration
    command: "go test ./internal/runtime/ -run TestCrashRecovery -count=1"
    pass_criteria: "Test passes, unreceipted events replayed through interceptor"
    introduced: "2.0.34"
    notes: "Report UNVERIFIED if test not yet written"

  - id: integration-dual-assessment
    name: "MRA dual assessment emits both saas_gap and automation_micro verticals"
    priority: should_pass
    category: integration
    command: "go test ./internal/runtime/ -run TestDualAssessment -count=1"
    pass_criteria: "Both vertical.discovered events emitted for qualifying subcategory"
    introduced: "2.0.34"
    notes: "Report UNVERIFIED if test not yet written"

# ── Reporting ─────────────────────────────────────────────────────
#
# Expected report format per gate:
#   PASS         — Command exited 0, criteria met
#   FAIL         — Command exited non-0 or criteria not met
#   UNVERIFIED   — Gate requires infrastructure not yet available (e.g., empire db diff)
#   SKIPPED      — Gate not applicable to current scope
#
# Compliance rule:
#   All must_pass gates = PASS or UNVERIFIED → COMPLIANT
#   Any must_pass gate = FAIL → NON-COMPLIANT
#   should_pass gates tracked as debt, never block
#   informational gates reported but never block
