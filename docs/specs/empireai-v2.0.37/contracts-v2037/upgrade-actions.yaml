v2037-create-system-node-ledger:
  description: "Create system_node_ledger table for idempotent system node processing"
  type: ddl
  priority: must
  command: |
    CREATE TABLE IF NOT EXISTS system_node_ledger (
        event_id        UUID NOT NULL REFERENCES events(id),
        node_id         TEXT NOT NULL,
        processed_at    TIMESTAMPTZ NOT NULL DEFAULT now(),
        PRIMARY KEY (event_id, node_id)
    );
  verify: "SELECT count(*) FROM information_schema.tables WHERE table_name = 'system_node_ledger'"

v2037-register-scoring-node:
  description: "Register ScoringNode as system node subscriber for vertical.discovered and score.dimension_complete"
  type: runtime
  priority: must
  action: "Add ScoringNode to runtime startup registration (eb.RegisterSystemNode)"
  verify: "ScoringNode appears in registered subscribers for vertical.discovered and score.dimension_complete"

v2037-remove-scoring-interceptor-cases:
  description: "Remove vertical.discovered and score.dimension_complete cases from PipelineCoordinator.Intercept switch"
  type: code
  priority: must
  action: "Delete handleVerticalDiscovered and handleScoreDimensionComplete interceptor cases; events now pass through to ScoringNode subscriber"
  verify: "grep -c 'handleVerticalDiscovered\\|handleScoreDimensionComplete' internal/runtime/pipeline_coordinator.go returns 0 for interceptor paths"
  depends_on: v2037-register-scoring-node

v2037-scoring-parity-test:
  description: "Write parity test comparing ScoringNode output to former interceptor output"
  type: test
  priority: must
  action: "Create TestScoringNodeParity in internal/runtime/scoring_node_test.go"
  verify: "go test ./internal/runtime/ -run TestScoringNodeParity passes"

v2037-scoring-idempotency-test:
  description: "Write idempotency test for ScoringNode replay safety"
  type: test
  priority: must
  action: "Create TestScoringNodeIdempotency in internal/runtime/scoring_node_test.go"
  verify: "go test ./internal/runtime/ -run TestScoringNodeIdempotency passes"

v2037-add-system-nodes-contract:
  description: "Add system-nodes.yaml to contracts directory"
  type: contract
  priority: must
  action: "Copy system-nodes.yaml to contracts/"
  verify: "python3 -c \"import yaml; yaml.safe_load(open('contracts/system-nodes.yaml'))\" exits 0"
