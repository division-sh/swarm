# Mapping (contract ID в†’ config filename):
#   empire-coordinator      в†’ configs/agents/empire-coordinator.yaml
#   factory-cto             в†’ configs/agents/factory-cto.yaml
#   holding-devops          в†’ configs/agents/holding-devops.yaml
