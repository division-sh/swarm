# v2.0.37 Upgrade Actions вЂ” System Nodes Phase 1
# ============================================================================
# RFC: RFC-001 v2 (Unified Message Bus & System Nodes)
# Scope: Phase 1 only вЂ” ScoringNode migration from interceptor
