#   business-research-agent в†’ configs/agents/business-research-agent.yaml
#   lightweight-spec-agent  в†’ configs/agents/lightweight-spec-agent.yaml
#   spec-reviewer           в†’ configs/agents/spec-reviewer.yaml
#   market-research-agent   в†’ configs/agents/market-research-agent.yaml
#   trend-research-agent    в†’ configs/agents/trend-research-agent.yaml
#   pre-brand-agent         в†’ configs/agents/pre-brand-agent.yaml
#   scanner-{type}-{scan_id}в†’ (ephemeral, template in configs/agents/templates/scanner.yaml)
#   OpCo agents             в†’ configs/agents/templates/opco-{role}.yaml

