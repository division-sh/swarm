workflow:
  name: mas-generic-test
  version: "0.1.0"
  entity: entity
  entity_table: entities
  state_field: state
  initial_stage: queued
  terminal_stages:
    - completed
    - rejected
  stages:
    - id: queued
      phase: intake
      description: waiting for work
    - id: active
      phase: execution
      description: work in progress
    - id: awaiting_review
      phase: review
      description: decision pending
    - id: completed
      phase: terminal
      description: approved path finished
    - id: rejected
      phase: terminal
      description: rejected path finished
  transitions:
    - id: activate
      from: queued
      to: active
      trigger: work.started
      node: router-node
      guards: [has_entity_id]
      actions: [record_state_change]
    - id: request-review
      from: active
      to: awaiting_review
      trigger: review.requested
      node: review-node
      actions: [record_state_change]
    - id: approve
      from: awaiting_review
      to: completed
      trigger: review.approved
      node: review-node
      guards: [has_human_decision]
      actions: [record_state_change]
    - id: reject
      from: awaiting_review
      to: rejected
      trigger: review.rejected
      node: review-node
      guards: [has_human_decision]
      actions: [record_state_change]
