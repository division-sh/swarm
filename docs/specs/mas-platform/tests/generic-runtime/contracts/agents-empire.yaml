coordinator:
  id: coordinator
  role: coordinator
  type: worker
  subscriptions: [review.ready]
  emit_events: [work.started]

reviewer:
  id: reviewer
  role: reviewer
  type: worker
  subscriptions: [review.ready]
  emit_events: [review.approved, review.rejected]

worker:
  id: worker
  role: worker
  type: worker
  subscriptions: [work.started]
