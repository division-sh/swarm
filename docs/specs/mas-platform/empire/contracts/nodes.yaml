portfolio-node:
  id: portfolio-node
  execution_type: system_node
  description: Cross-flow monitoring. Compiles status, handles runtime reset.
  subscribes_to:
  - timer.portfolio_digest
  - platform.reset
  - budget.threshold_crossed
  - system.directive
  - opco.spinup_requested
  produces:
  - budget.adjustment_requested
  - budget.alert_sent
  - directive.unhandled
  - policy.change_requested
  - portfolio.digest_compiled
  - scan.requested
  - vertical.resumed
  event_handlers:
    timer.portfolio_digest:
      description: Query all entities, compile status summary, emit digest
      query:
      - entities: verticals
        group_by: state
        count: true
        store_as: digest.verticals_by_state
      - entities: flow_instances
        filter: template == operating
        group_by: state
        count: true
        store_as: digest.opcos_by_state
      emits: portfolio.digest_compiled
    platform.reset:
      description: Clear all in-flight pipeline state
      clear:
        targets:
        - accumulator_state
        - cycle_counters
        - pending_dedup_candidates
    budget.threshold_crossed:
      description: Budget threshold hit. Notify EC, potentially throttle operations.
      emits: budget.alert_sent
    system.directive:
      description: Route human directive to appropriate follow-up event based on directive type.
      rules:
        scan:
          condition: payload.directive.type == 'scan'
          emits: scan.requested
          description: Translate scan directive into scan campaign
        budget_adjust:
          condition: payload.directive.type == 'budget_adjust'
          emits: budget.adjustment_requested
          description: Route budget adjustment to spend handler
        policy_change:
          condition: payload.directive.type == 'policy_change'
          emits: policy.change_requested
          description: Route policy change to EC for evaluation
        vertical_override:
          condition: payload.directive.type == 'vertical_override'
          emits: vertical.resumed
          description: Force resume/kill/promote a specific vertical
        unknown:
          condition: else
          emits: directive.unhandled
          description: Forward unrecognized directives to workflow coordinator agent
    opco.spinup_requested:
      description: Create new OpCo flow instance with mandate data from approval payload.
      action: create_flow_instance
      template: operating
      instance_id_from: payload.vertical_id
      config_from:
        vertical_name: payload.vertical_name
        mandate_document: payload.mandate
        brand_name: payload.brand
        geography: payload.geography
        tech_stack: payload.tech_stack
        vertical_description: payload.vertical_description
        monthly_api_cap: policy.monthly_api_cap
        growth_budget: policy.growth_budget
        product_budget: policy.product_budget
  permissions:
  - create_flow_instance
  _produces_note: Some produces are emitted via system.directive rules handler (indirect path).
