permission_bundles:
  coordinator:
    description: Full control — top-level workflow coordinator
    permissions:
    - agent_hire
    - agent_fire
    - agent_reconfigure
    - configure_routing
    - approve_spend
    - message_all
    - mailbox_send
    - human_task_request
    - human_task_decide
    - schedule
  lead:
    description: Domain/team lead — can manage team and routing
    permissions:
    - agent_hire
    - agent_fire
    - agent_reconfigure
    - configure_routing
    - message_domain
    - mailbox_send
    - human_task_request
    - schedule
  specialist:
    description: Skilled agent — can message domain and send to mailbox
    permissions:
    - message_domain
    - mailbox_send
    - configure_routing
    - schedule
    - human_task_request
  worker:
    description: Execution agent — can message peers only
    permissions:
    - message_peers
    - schedule
  system_node:
    description: Deterministic node — no permissions (platform handles internally)
    permissions: []
workflow_extension_permissions:
  system_admin:
    description: Execute infrastructure tools (nginx, systemd, certbot). Workflow extension — not a platform permission.
    required_by_tools:
    - nginx_reload
    - systemd_control
    - certbot_execute
