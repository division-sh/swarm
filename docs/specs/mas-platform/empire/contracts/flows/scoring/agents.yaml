analysis-agent:
  id: analysis-agent
  type: factory
  role: analysis_agent
  model_tier: sonnet
  conversation_mode: task
  max_turns_per_task: 30
  subscriptions:
  - scoring.requested
  tools_tier2: &id001 []
  emit_events:
  - score.dimension_complete
  - vertical.derived
  permissions_bundle: worker
  permissions: &id002
  - message_peers
  workspace_class: factory
  manager_fallback: empire-coordinator
analysis-agent-secondary:
  id: analysis-agent-secondary
  type: factory
  role: analysis_agent
  model_tier: sonnet
  conversation_mode: task
  max_turns_per_task: 30
  subscriptions:
  - scoring.derived_requested
  tools_tier2: *id001
  emit_events:
  - score.dimension_complete
  - vertical.derived
  permissions_bundle: worker
  permissions: *id002
  workspace_class: factory
  manager_fallback: empire-coordinator
  description: Scores derived verticals only. Separate agent pool from primary — anti-bias guarantee.
