name: scoring
pins:
  inputs:
    events:
    - score.dimension_complete
    - vertical.derived
    - vertical.discovered
    reads: []
  outputs:
    events:
    - platform.dead_letter
    - scoring.requested
    - vertical.marginal
    - vertical.rejected
    - vertical.shortlisted
    writes:
    - discovery_mode
    - geography
    - name
    - opportunity_pattern
    - raw_signals
    - signal_strength
initial_state: discovered
terminal_states:
- killed
states:
- discovered
- shortlisted
- marginal_review
- killed
required_agents:
- role: analysis-agent
  subscribes_to:
  - scoring.requested
  emits:
  - score.dimension_complete
  - vertical.derived
  description: Scores entity on requested dimensions
- role: analysis-agent-secondary
  subscribes_to:
  - scoring.derived_requested
  emits:
  - score.dimension_complete
  - vertical.derived
  description: Scores derived verticals (anti-bias pool)
_cross_flow_exits:
  marginal_review: 'Exit via empire-coordinator directive: vertical.resumed (re-enter scoring) or timer.marginal_kill (advance
    to killed). These are root-level events handled by lifecycle-orchestrator in the operating flow, which then back-propagates
    state changes.'
