# EmpireAI verification-gates.yaml
# Machine-readable test gate manifest. Lists required verification commands
# and pass criteria per spec version. "Compliance" is binary: all must_pass
# gates green = compliant; any red = non-compliant.
#
# Gate priorities:
#   must_pass   — Blocks release. Failure = broken system.
#   should_pass — Expected green. Failure = tracked debt, not blocker.
#   informational — Report result, never blocks. Tracks coverage/quality trends.
#
# Each gate specifies:
#   id:           Unique gate identifier
#   name:         Human-readable gate name
#   priority:     must_pass | should_pass | informational
#   category:     ddl | wiring | events | agents | integration
#   command:      Shell command to run (exit 0 = pass)
#   pass_criteria: Human-readable description of what "pass" means
#   introduced:   Spec version that added this gate
#   notes:        Optional context

spec_version: "2.0.40"

gates:

  # ── Contract Parse Gate ─────────────────────────────────────────────

  - id: contracts-yaml-parse
    name: "All YAML contracts parse without errors"
    priority: must_pass
    category: contracts
    layer: local
    command: |
      python3 -c "
      import yaml, sys
      files = [
        'contracts/agent-tools.yaml',
        'contracts/event-catalog.yaml',
        'contracts/agent-config-map.yaml',
        'contracts/verification-gates.yaml',
        'contracts/upgrade-actions.yaml',
        'contracts/tooling.lock'
      ]
      for f in files:
        try:
          with open(f) as fh:
            data = yaml.safe_load(fh)
          assert data is not None, f'{f} loaded as None'
        except Exception as e:
          print(f'FAIL: {f} — {e}')
          sys.exit(1)
      print(f'{len(files)} contracts parsed successfully')
      "
    pass_criteria: "All YAML contract files parse without errors"
    introduced: "2.0.36"
    notes: "Added per implementer feedback — malformed YAML causes silent verifier downgrade"

  # ── DDL Gates ───────────────────────────────────────────────────────

  - id: ddl-fresh-install
    name: "Canonical DDL creates all tables on fresh DB"
    priority: must_pass
    category: ddl
    layer: integration
    command: "psql -v ON_ERROR_STOP=1 -f contracts/ddl-canonical.sql"
    pass_criteria: "Exit 0, 37 tables created, no errors"
    introduced: "2.0.29"
    notes: "Validates FK ordering, constraint syntax, type correctness"

  - id: ddl-table-count
    name: "Canonical DDL has exactly 37 tables"
    priority: must_pass
    category: ddl
    layer: integration
    command: "grep -c 'CREATE TABLE' contracts/ddl-canonical.sql | grep -q '^37$'"
    pass_criteria: "Exactly 37 CREATE TABLE statements"
    introduced: "2.0.32"

  - id: ddl-runtime-tables-match-structs
    name: "7 runtime tables match Go struct field names (column-level)"
    priority: must_pass
    category: ddl
    layer: integration
    command: |
      # validation_pipelines: g2_spec (NOT g2_spec_approved), scoring_payload, packaging_retries
      psql -c "\d validation_pipelines" | grep -q 'g2_spec ' &&
      psql -c "\d validation_pipelines" | grep -q scoring_payload &&
      psql -c "\d validation_pipelines" | grep -q packaging_retries &&
      ! psql -c "\d validation_pipelines" | grep -q g2_spec_approved &&
      # scan_accumulators: TEXT PK, expected (NOT expected_agents), reports INT
      psql -c "\d scan_accumulators" | grep -q 'scan_id.*text' &&
      psql -c "\d scan_accumulators" | grep -q 'expected ' &&
      psql -c "\d scan_accumulators" | grep -q 'reports.*integer' &&
      ! psql -c "\d scan_accumulators" | grep -q expected_agents &&
      # pipeline_receipts: status + error (NOT result)
      psql -c "\d pipeline_receipts" | grep -q 'status.*text' &&
      psql -c "\d pipeline_receipts" | grep -q 'error' &&
      ! psql -c "\d pipeline_receipts" | grep -q 'result' &&
      # pending_dedup: dedup_event_id TEXT PK, name, payload
      psql -c "\d pending_dedup_candidates" | grep -q 'dedup_event_id.*text' &&
      psql -c "\d pending_dedup_candidates" | grep -q 'payload.*jsonb' &&
      # runtime_config: config snapshot
      psql -c "\d runtime_config" | grep -q config_yaml &&
      # pipeline_processed_events: event_id PK only
      psql -c "\d pipeline_processed_events" | grep -v handler | grep -q event_id &&
      # template_prompt_drafts: has source, notes, created_at
      psql -c "\d template_prompt_drafts" | grep -q source &&
      psql -c "\d template_prompt_drafts" | grep -q notes &&
      # agent_sessions index includes scope_key (expression-based, check via pg_indexes)
      psql -c "SELECT indexdef FROM pg_indexes WHERE indexname='idx_sessions_active'" | grep -q 'scope_key'
    pass_criteria: "All 7 runtime tables have exact column names matching Go struct fields, including negative checks for old names"
    introduced: "2.0.35"
    notes: "Deepened from v2.0.34 which only checked for presence of key columns, not absence of wrong columns"

  - id: ddl-schema-diff
    name: "Live DB schema matches canonical DDL"
    priority: should_pass
    category: ddl
    layer: integration
    infra_optional: true
    command: "command -v empire >/dev/null 2>&1 && empire db diff --canonical contracts/ddl-canonical.sql || { echo 'UNVERIFIED: empire CLI not available'; exit 0; }"
    pass_criteria: "0 differences (column types, constraints, indexes all match)"
    introduced: "2.0.34"
    notes: "Requires `empire db diff` command. Gate runner should classify exit as UNVERIFIED when command is absent."

  # ── Wiring Gates ────────────────────────────────────────────────────

  - id: wiring-verifier-clean
    name: "Wiring verifier passes with 0 FAIL, 0 WARN"
    priority: must_pass
    category: wiring
    layer: local
    command: "go test ./internal/runtime -run TestSpecRuntimeWiringVerification -v 2>&1 | tee /tmp/wiring.out; grep -q 'fail=0' /tmp/wiring.out && grep -q 'warn=0' /tmp/wiring.out"
    pass_criteria: "Summary line contains fail=0 AND warn=0"
    introduced: "2.0.29"
    notes: "Uses Go test harness. Previous versions referenced 'empire verify' CLI which does not exist."

  - id: wiring-no-glob-subs
    name: "No glob pattern subscriptions in agent configs"
    priority: must_pass
    category: wiring
    layer: local
    command: "grep -r 'opco\\.\\*\\.' configs/ | wc -l | tr -d ' ' | grep -q '^0$'"
    pass_criteria: "0 glob patterns found"
    introduced: "2.0.32"

  - id: wiring-no-sc-ghosts
    name: "No Scoring Coordinator references in active code"
    priority: must_pass
    category: wiring
    layer: local
    command: "grep -ri 'scoring.coordinator\\|scoring-coordinator\\|ScoringCoordinator' internal/ configs/ | grep -v changelog | wc -l | tr -d ' ' | grep -q '^0$'"
    pass_criteria: "0 references outside changelog entries"
    introduced: "2.0.27"

  - id: wiring-no-uuid-agents
    name: "No UUID type references for agents.id (it is TEXT)"
    priority: must_pass
    category: wiring
    layer: local
    command: "grep -r 'UUID.*agents\\|agents.*UUID' internal/ | wc -l | tr -d ' ' | grep -q '^0$'"
    pass_criteria: "0 UUID references to agents.id"
    introduced: "2.0.29"

  - id: wiring-delivery-channel-complete
    name: "Every event in catalog has a delivery_channel value"
    priority: must_pass
    category: events
    layer: local
    command: |
      python3 -c "
      import yaml
      catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))
      events = {k: v for k, v in catalog.items() if isinstance(v, dict) and 'emitter' in v}
      missing = [k for k, v in events.items() if not v.get('delivery_channel')]
      assert len(missing) == 0, f'Missing delivery_channel: {missing}'
      print(f'{len(events)} events, all have delivery_channel')
      "
    pass_criteria: "All events have delivery_channel field"
    introduced: "2.0.31"

  # ── Cross-validation Gates ──────────────────────────────────────────

  - id: xval-emit-events-in-catalog
    name: "Every agent emit_event has a catalog entry"
    priority: must_pass
    category: wiring
    layer: local
    command: |
      python3 -c "
      import yaml
      agents = yaml.safe_load(open('contracts/agent-tools.yaml'))
      catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))
      catalog_types = {k for k, v in catalog.items() if isinstance(v, dict) and 'emitter' in v}
      missing = []
      for aid, a in agents.items():
        if not isinstance(a, dict) or 'emit_events' not in a:
          continue
        for evt in a.get('emit_events', []):
          if evt not in catalog_types:
            missing.append(f'{aid}: {evt}')
      assert len(missing) == 0, f'Emit events missing from catalog: {missing}'
      print(f'All emit_events have catalog entries ({len(catalog_types)} events checked)')
      "
    pass_criteria: "0 orphaned emit_events"
    introduced: "2.0.29"

  - id: xval-subscriptions-in-catalog
    name: "Every agent subscription has a catalog entry"
    priority: must_pass
    category: wiring
    layer: local
    command: |
      python3 -c "
      import yaml
      agents = yaml.safe_load(open('contracts/agent-tools.yaml'))
      catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))
      catalog_types = {k for k, v in catalog.items() if isinstance(v, dict) and 'emitter' in v}
      missing = []
      for aid, a in agents.items():
        if not isinstance(a, dict):
          continue
        for sub in a.get('subscriptions', []) + a.get('subscriptions_bootstrap', []):
          if sub not in catalog_types:
            missing.append(f'{aid}: {sub}')
      assert len(missing) == 0, f'Subscriptions missing from catalog: {missing}'
      print(f'All subscriptions have catalog entries ({len(catalog_types)} events checked)')
      "
    pass_criteria: "0 orphaned subscriptions"
    introduced: "2.0.29"

  - id: xval-catalog-emitters-exist
    name: "Every catalog emitter is a real agent or system component"
    priority: should_pass
    category: events
    layer: local
    command: |
      python3 -c "
      import yaml
      agents = yaml.safe_load(open('contracts/agent-tools.yaml'))
      catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))
      agent_ids = {aid for aid, a in agents.items() if isinstance(a, dict) and 'type' in a}
      system_emitters = {'runtime', 'system', 'human', 'timer', 'eventbus', 'dashboard', 'actor-agent', 'inbound-gateway'}
      valid = agent_ids | system_emitters
      invalid = []
      for evt_name, e in catalog.items():
        if not isinstance(e, dict) or 'emitter' not in e:
          continue
        emitter = e.get('emitter', '')
        if emitter not in valid and not emitter.startswith('scanner-') and not emitter.startswith('opco-'):
          invalid.append(f'{evt_name}: {emitter}')
      assert len(invalid) == 0, f'Unknown emitters: {invalid}'
      print(f'All emitters are valid ({len(agent_ids)} agent IDs + system emitters)')
      "
    pass_criteria: "0 unknown emitters"
    introduced: "2.0.29"

  # ── Agent Config Gates ──────────────────────────────────────────────

  - id: agents-all-have-prompts
    name: "Every roster agent has a system_prompt in config"
    priority: must_pass
    category: agents
    layer: local
    command: |
      python3 -c "
      import yaml
      config_map = yaml.safe_load(open('contracts/agent-config-map.yaml'))
      errors = []
      for agent_id, info in config_map.get('agents', {}).items():
        path = info.get('config_path')
        if path is None:
          continue  # ephemeral agents have no config file
        import os
        if not os.path.exists(path):
          errors.append(f'MISSING FILE: {path} for {agent_id}')
          continue
        with open(path) as f:
          content = f.read()
        if 'system_prompt' not in content and 'prompt:' not in content:
          errors.append(f'NO PROMPT: {path} for {agent_id}')
      if errors:
        print('\\n'.join(errors))
        exit(1)
      print(f'{len(config_map[\"agents\"])} agents checked')
      "
    pass_criteria: "Every agent with a config file has system_prompt field"
    introduced: "2.0.20"
    notes: "Uses agent-config-map.yaml as source. Skips ephemeral agents (config_path: null). Previous version used blind glob on configs/agents/*.yaml which falsely flagged roster.yaml."

  - id: agents-naming-convention
    name: "Agent config filenames follow convention"
    priority: should_pass
    category: agents
    layer: local
    command: |
      python3 -c "
      import yaml, os
      config_map = yaml.safe_load(open('contracts/agent-config-map.yaml'))
      errors = []
      count = 0
      for agent_id, info in config_map.get('agents', {}).items():
        path = info.get('config_path')
        if path is None:
          continue
        count += 1
        if not os.path.exists(path):
          errors.append(f'Missing: {path} for {agent_id}')
      if errors:
        for e in errors: print(e)
        exit(1)
      print(f'{count} agent configs found')
      "
    pass_criteria: "Every agent in agent-config-map.yaml has its config file present"
    introduced: "2.0.34"

  # ── Integration Gates ───────────────────────────────────────────────

  - id: integration-event-roundtrip
    name: "EventBus publish → subscribe delivers to correct agent"
    priority: should_pass
    category: integration
    layer: integration
    infra_optional: true
    command: "go test ./internal/runtime/ -run TestEventRoundtrip -count=1 -v 2>&1 | tee /tmp/t.out && ! grep -q 'no tests to run' /tmp/t.out"
    pass_criteria: "Test passes, event delivered to subscribed agent within 5s"
    introduced: "2.0.34"
    notes: "Report UNVERIFIED if test not yet written"

  - id: integration-crash-recovery
    name: "RecoverFromCrash replays unreceipted events"
    priority: should_pass
    category: integration
    layer: integration
    infra_optional: true
    command: "go test ./internal/runtime/ -run TestCrashRecovery -count=1 -v 2>&1 | tee /tmp/t.out && ! grep -q 'no tests to run' /tmp/t.out"
    pass_criteria: "Test passes, unreceipted events replayed through interceptor"
    introduced: "2.0.34"
    notes: "Report UNVERIFIED if test not yet written"

  - id: integration-dual-assessment
    name: "MRA dual assessment emits both saas_gap and automation_micro verticals"
    priority: should_pass
    category: integration
    layer: integration
    infra_optional: true
    command: "go test ./internal/runtime/ -run TestDualAssessment -count=1 -v 2>&1 | tee /tmp/t.out && ! grep -q 'no tests to run' /tmp/t.out"
    pass_criteria: "Both vertical.discovered events emitted for qualifying subcategory"
    introduced: "2.0.34"
    notes: "Report UNVERIFIED if test not yet written"

  # ── System Node Gates (v2.0.37) ──────────────────────────────────

  - id: system-nodes-yaml-parse
    name: "system-nodes.yaml parses cleanly"
    priority: must_pass
    category: contracts
    layer: local
    command: "python3 -c \"import yaml; d=yaml.safe_load(open('contracts/system-nodes.yaml')); nodes=[k for k,v in d.items() if isinstance(v,dict) and v.get('id')]; assert len(nodes)>=1, f'Expected >=1 active node, got {len(nodes)}'; print(f'{len(nodes)} system nodes validated')\""
    pass_criteria: "YAML parses, at least 1 active system node defined"
    introduced: "2.0.37"

  - id: xval-system-node-events-in-catalog
    name: "All events in system-nodes.yaml exist in event-catalog.yaml"
    priority: must_pass
    category: contracts
    layer: local
    command: |
      python3 -c "
      import yaml
      nodes = yaml.safe_load(open('contracts/system-nodes.yaml'))
      catalog = yaml.safe_load(open('contracts/event-catalog.yaml'))
      missing = []
      for name, node in nodes.items():
          if not isinstance(node, dict) or not node.get('id'):
              continue
          for evt in node.get('subscribes_to', []) + node.get('produces', []):
              if evt not in catalog:
                  missing.append(f'{name}: {evt}')
      assert not missing, f'Missing from catalog: {missing}'
      print('All system node events found in catalog')
      "
    pass_criteria: "Zero missing events"
    introduced: "2.0.37"

  - id: system-node-scoring-parity
    name: "ScoringNode produces identical output to interceptor for same inputs"
    priority: must_pass
    category: integration
    layer: integration
    infra_optional: true
    command: "go test ./internal/runtime/ -run TestScoringNodeParity -count=1 -v 2>&1 | tee /tmp/t.out && ! grep -q 'no tests to run' /tmp/t.out"
    pass_criteria: "ScoringNode and interceptor produce identical events for same input sequence"
    introduced: "2.0.37"
    notes: "Feeds identical event sequences to both paths. Report UNVERIFIED if test not yet written."

  - id: system-node-replay-idempotency
    name: "ScoringNode replay does not duplicate state transitions"
    priority: must_pass
    category: integration
    layer: integration
    infra_optional: true
    command: "go test ./internal/runtime/ -run TestScoringNodeIdempotency -count=1 -v 2>&1 | tee /tmp/t.out && ! grep -q 'no tests to run' /tmp/t.out"
    pass_criteria: "Same event delivered 3 times produces exactly 1 state transition"
    introduced: "2.0.37"
    notes: "Validates system_node_ledger idempotency. Report UNVERIFIED if test not yet written."

  - id: system-node-dead-letter
    name: "ScoringNode escalates after retry exhaustion"
    priority: should_pass
    category: integration
    layer: integration
    infra_optional: true
    command: "go test ./internal/runtime/ -run TestScoringNodeDeadLetter -count=1 -v 2>&1 | tee /tmp/t.out && ! grep -q 'no tests to run' /tmp/t.out"
    pass_criteria: "After 5 failed attempts, pipeline.dead_letter event emitted"
    introduced: "2.0.37"
    notes: "Report UNVERIFIED if test not yet written."

# ── Reporting ─────────────────────────────────────────────────────
#
# Expected report format per gate:
#   PASS         — Command exited 0, criteria met
#   FAIL         — Command exited non-0 or criteria not met
#   UNVERIFIED   — Gate requires infrastructure not yet available
#   SKIPPED      — Gate not applicable to current scope
#
# UNVERIFIED policy (tightened per implementer feedback v2.0.35):
#   must_pass gates may be UNVERIFIED only if the gate has infra_optional: true
#   OR if the tooling dependency is listed in tooling.lock as layer: integration.
#   must_pass gates that are UNVERIFIED due to missing local dependencies (e.g., PyYAML)
#   count as FAIL — install the dependency per tooling.lock setup command.
#
# Compliance rule:
#   All must_pass gates = PASS → COMPLIANT
#   All must_pass gates = PASS or UNVERIFIED (infra_optional only) → COMPLIANT WITH DEBT
#   Any must_pass gate = FAIL or UNVERIFIED (non-infra) → NON-COMPLIANT
#   should_pass gates tracked as debt, never block
