# ============================================================================
# EmpireAI Event Catalog — v2.0.37
# ============================================================================
# Canonical source of truth for all system events. Authoritative over spec prose.
#
# Fields per event:
#   emitter:           Agent or component that produces this event
#   consumer:          Agent(s) that receive this event (string or list)
#   intercepted:       Whether PipelineCoordinator intercepts (true/false/conditional)
#   passthrough:       Whether event continues to subscribers after interception
#   routing:           static | routing_table
#   delivery_channel:  How the event reaches its consumer:
#     eventbus_static         — delivered via EventBus static subscriptions
#     eventbus_routing_table  — delivered via per-vertical routing_rules table
#     runtime                 — consumed by PipelineCoordinator interceptor (no fan-out)
#     agent_message           — delivered point-to-point via agent_message tool
#     mailbox                 — delivered to mailbox table for human decision
#     audit                   — written to events table only, no active consumer
#   runtime_handling:  What the runtime does with this event in the interceptor (v2.0.37):
#     none                    — runtime does not touch this event, passes straight to fan-out
#     consuming               — runtime intercepts and fully consumes (passthrough=false, no fan-out)
#     projection              — runtime intercepts for state update, then passes through to subscribers
#   payload:           Key fields in the event payload (matches EventSchemaRegistry)
#
# Terminal events (verifier skips orphan check):
#   delivery_channel: audit    — no subscriber; logged to events table
#   delivery_channel: mailbox  — no subscriber; delivered to mailbox for human decision
#
# Changes from v2.0.31:
#   - Added 30 missing events (scanner per-type, OpCo lifecycle, human workflow, operational)
#   - Fixed 5 payload field mismatches vs EventSchemaRegistry
#   - Fixed 3+ consumer listing gaps
#   - vertical.shortlisted confirmed: emitter=runtime (not EC)
#   - All events now have delivery_channel field
# ============================================================================

