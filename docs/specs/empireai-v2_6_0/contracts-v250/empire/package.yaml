name: empire
version: 2.6.0
platform_version: 2.6.0
author: youmew
description: AI-powered venture studio — discovers, validates, and operates micro-SaaS businesses
flows:
- id: discovery
  flow: discovery
  namespace: vertical
- id: scoring
  flow: scoring
  namespace: vertical
- id: validation
  flow: validation
  namespace: vertical
- id: operating
  flow: operating
  namespace: opco
handoffs:
- event: opco.spinup_requested
  creates_flow: operating
  namespace: opco
runtime_contracts:
  nodes: runtime/nodes.yaml
  events: runtime/events.yaml
target_contracts:
  nodes: flows/*/nodes.yaml + nodes.yaml (project-level)
  events: flows/*/events.yaml + events.yaml (project-level, payload-only)
  note: Switch to target when runtime supports multi-file loading and routing derivation
entity_schema:
  description: Schema for the vertical entity table. Implementer derives DDL from this.
  identity:
    id: uuid
    slug: text (generated from name + geography)
    name: text
    geography: text
  workflow_state:
    state: text (enum derived from flow schema states)
    mode: text (factory | operating)
    parked_at: timestamptz (set on marginal)
    kill_reason: text
    killed_at_state: text
  discovery_phase:
    raw_signals: jsonb (from vertical.discovered)
    signal_strength: integer
    opportunity_pattern: text
    discovery_mode: text (saas_gap | saas_trend | local_services | corpus | derived)
  scoring_phase:
    composite_score: numeric(5,2) (from vertical.scored)
    scoring_rubric: text
    scores: jsonb (dimension scores)
  validation_phase:
    business_brief: jsonb (from research.completed)
    mvp_spec: jsonb (from spec.approved)
    cto_feasibility: jsonb (from cto.spec_approved)
    brand: jsonb (from brand.candidates_ready)
    validation_kit: jsonb (accumulated validation artifacts)
  operating_phase:
    full_spec: jsonb
    deploy_config: jsonb
    live_url: text
    launch_targets: jsonb
  metadata:
    human_notes: text
    created_at: timestamptz
    updated_at: timestamptz
  derivation:
    parent_id: uuid (null for non-derived)
    generation_depth: integer default 0
