name: validation
pins:
  inputs:
    events:
    - brand.candidates_ready
    - brand.revision_needed
    - cto.spec_approved
    - cto.spec_revision_needed
    - cto.spec_vetoed
    - research.completed
    - research.vertical_rejected
    - spec.approved
    - spec.revision_needed
    - spec.revision_requested
    - spec.validation_failed
    - spec.validation_passed
    - vertical.needs_more_data
    - vertical.ready_for_review
    - vertical.shortlisted
    reads: []
  outputs:
    events:
    - brand.requested
    - brand.revision_needed
    - cto.spec_review_requested
    - pipeline.dead_letter
    - spec.revision_requested
    - spec.validation_requested
    - validation.more_data_needed
    - validation.package_ready
    - validation.started
    - vertical.killed
    writes:
    - brand
    - business_brief
    - cto_feasibility
    - mvp_spec
    - validation_kit
initial_state: researching
terminal_states:
- killed
states:
- researching
- mvp_speccing
- cto_spec_review
- branding
- ready_for_review
namespace_prefix: vertical
namespace_rule: Platform substitutes namespace_prefix with project namespace at boot. To reuse this flow for a different entity
  type, change the namespace in package.yaml.
required_agents:
- role: researcher
  subscribes_to:
  - validation.started
  emits:
  - research.completed
  - research.vertical_rejected
  description: Deep-dive research on the entity
- role: spec_writer
  subscribes_to:
  - spec.revision_requested
  emits:
  - spec.approved
  description: Writes MVP specification
- role: spec_reviewer
  subscribes_to:
  - spec.validation_requested
  emits:
  - spec.validation_passed
  - spec.validation_failed
  description: Reviews specification quality
- role: technical_reviewer
  subscribes_to:
  - cto.spec_review_requested
  emits:
  - cto.spec_approved
  - cto.spec_revision_needed
  - cto.spec_vetoed
  description: Reviews technical feasibility
- role: brand_designer
  subscribes_to:
  - brand.requested
  emits:
  - brand.candidates_ready
  description: Creates brand candidates
