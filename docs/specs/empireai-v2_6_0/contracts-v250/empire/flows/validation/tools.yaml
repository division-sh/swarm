instagram_handle_check:
  category: per_agent
  description: Check if an Instagram handle is available
  input_schema:
    type: object
    required:
    - handle
    properties:
      handle:
        type: string
    additionalProperties: false
  handler_type: workflow_registered
domain_availability_check:
  category: per_agent
  description: Check if a domain name is available for registration
  input_schema:
    type: object
    required:
    - domain
    properties:
      domain:
        type: string
    additionalProperties: false
  handler_type: workflow_registered
whatsapp_name_check:
  category: per_agent
  description: Check if a WhatsApp Business name is available
  input_schema:
    type: object
    required:
    - name
    properties:
      name:
        type: string
    additionalProperties: false
  handler_type: workflow_registered
