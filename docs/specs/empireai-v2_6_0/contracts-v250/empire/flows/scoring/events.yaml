vertical.discovered:
  payload:
    vertical_name: string
    raw_signals:
      type: object
    geography: string
    mode: string
    discovery_context:
      type: object
    geographic_scope: string
vertical.derived:
  payload:
    opportunity_id: string
    parent_id: string
    generation_depth: integer
    generator_agent_id: string
    campaign_id: string
    derivation_rationale:
      type: object
    opportunity_name: string
    preliminary_icp: string
    build_sketch:
      type: object
    evidence:
      type: object
    geographic_scope: string
    signal_strength: number
    discovery_context:
      type: object
score.dimension_complete:
  payload:
    vertical_id: string
    dimension: string
    score:
      type: integer
      minimum: 0
      maximum: 100
    evidence: string
    confidence: string
scoring.contest_resolved:
  payload:
    vertical_id: string
    dimension: string
    resolved_score: integer
    reasoning: string
scoring.requested:
  payload:
    vertical_id: string
    vertical_name: string
    geography: string
    mode: string
    rubric: string
    dimensions_requested:
      type: array
      items: string
    discovery_context:
      type: object
    assigned_analysis_agent_id: string
    excluded_analysis_agent_id: string
vertical.scored:
  payload:
    vertical_id: string
    result: string
    composite_score: number
    viability_score: number
    market_score: number
    dimensions:
      type: object
    rubric: string
vertical.shortlisted:
  payload:
    vertical_id: string
    composite_score: number
    viability_score: number
    scoring_payload:
      type: object
vertical.marginal:
  payload:
    vertical_id: string
    composite_score: number
    viability_score: number
    dimensions:
      type: object
    promotion_eligible: boolean
vertical.rejected:
  payload:
    vertical_id: string
    reason: string
scoring.contested:
  payload:
    vertical_id: string
    dimension: string
    scores:
      type: array
      items: integer
    evidence:
      type: array
      items: string
    spread: integer
pipeline.dead_letter:
  payload:
    event_id: string
    node_id: string
    event_type: string
    retry_count: integer
    last_error: string
