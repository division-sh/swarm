lifecycle-orchestrator:
  id: lifecycle-orchestrator
  execution_type: system_node
  implementation: internal/runtime/pipeline/lifecycle_orchestrator.go
  description: Manages factory→operating handoff (vertical.approved → OpCo spinup) and operating lifecycle transitions. Also
    handles marginal review, vertical kill/resume, and runtime reset.
  subscribes_to:
  - vertical.approved
  - vertical.killed
  - vertical.resumed
  - opco.ceo_ready
  - timer.marginal_review
  - timer.marginal_kill
  - build_complete
  - launch_ready
  - qa.validation_passed
  - review.deploy_feedback
  - opco.steady_state_reached
  - opco.growth_triggered
  - opco.growth_stabilized
  - opco.teardown_requested
  - mailbox.item_decided
  produces:
  - opco.spinup_requested
  - vertical.killed
  - pipeline.dead_letter
  - vertical.approved
  owned_transitions:
  - ready_to_approved
  - approved_to_full_speccing
  - full_speccing_to_building
  - building_to_pre_launch
  - pre_launch_to_launched
  - launched_to_operating
  - operating_to_expanding
  - expanding_to_operating
  - operating_to_winding_down
  timers:
  - marginal_review_timer
  - marginal_kill_timer
  - portfolio_digest_timer
  state_table: null
  idempotency_table: system_node_ledger
  event_handlers:
    vertical.approved:
      action: emit_spinup
      emits: opco.spinup_requested
      advances_to: approved
    vertical.killed:
      action: mark_killed
      advances_to: killed
    vertical.resumed:
      action: promote_marginal
      guard:
        id: pipeline_has_capacity
        check: count(verticals in [researching..ready_for_review]) < {{pipeline_capacity_max}}
        policy_ref: policy-empire.yaml → pipeline_capacity_max
      emits: vertical.resumed
      description: Marginal resumed. Emits vertical.resumed for validation flow to re-enter.
    opco.ceo_ready:
      action: spinup_opco_org
      advances_to: full_speccing
    timer.marginal_review:
      action: review_marginal
      description: Re-evaluate parked marginal verticals.
      rules:
        pipeline_has_capacity: 'Notify EC via agent_message to decide: promote, extend park, or kill.'
        pipeline_full: Extend park timer by {{marginal_park_days}} days. No action.
      policy_ref: prompt-variables.yaml → marginal_park_days, pipeline_capacity_max
    timer.marginal_kill:
      action: auto_kill_stale_marginal
      description: Kill marginals parked > 60 days with no new signals
      advances_to: killed
    build_complete:
      action: advance_operating
      description: Build finished. Advance to pre_launch.
      advances_to: pre_launch
    launch_ready:
      action: advance_operating
      description: Pre-launch checks passed. Advance to launched.
      advances_to: launched
    qa.validation_passed:
      action: record_evidence
      description: QA passed. Record as evidence for build→pre_launch guard.
    review.deploy_feedback:
      action: record_evidence
      description: Deploy review feedback received. Record for pre_launch→launched guard.
    opco.steady_state_reached:
      action: advance_operating
      description: Product stable. Advance to operating.
      advances_to: operating
    opco.growth_triggered:
      action: advance_operating
      description: Growth phase initiated. Advance to expanding.
      advances_to: expanding
    opco.growth_stabilized:
      action: advance_operating
      description: Growth stabilized. Return to operating.
      advances_to: operating
    opco.teardown_requested:
      action: begin_teardown
      description: Human requested teardown. Advance to winding_down.
      advances_to: winding_down
      guard:
        id: has_human_decision
        check: event originated from mailbox decision path
        platform_builtin: has_human_decision
    mailbox.item_decided:
      action: process_mailbox_decision
      description: Human made a mailbox decision. Emits vertical.approved or vertical.killed based on decision.
      rules:
        approved:
          condition: decision == approve
          emits: vertical.approved
        rejected:
          condition: decision == reject
          emits: vertical.killed
