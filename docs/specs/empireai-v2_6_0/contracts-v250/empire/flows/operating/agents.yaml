opco-ceo:
  id: ceo-{vertical_id}
  type: operating
  role: opco_ceo
  model_tier: sonnet
  conversation_mode: session
  max_turns_per_task: 30
  subscriptions:
  - opco.spinup_requested
  - product_report
  - growth_report
  - cross_domain_report
  - product_escalation
  - growth_escalation
  - spend_request
  - spend.approved
  - spend.rejected
  - cto.architecture_directive
  - founder_input.response
  - opco.escalation_response
  - launch_ready
  tools_tier2:
  - agent_hire
  - agent_fire
  - agent_reconfigure
  - configure_routing
  - schedule
  - human_task_request
  emit_events:
  - opco.ceo_report
  - opco.launched
  - opco.escalation
  - opco.spend_request
  - opco.deploy_review
  - opco.founder_input
  - opco.steady_state_reached
  - mandate_updated
  - opco.growth_triggered
  - opco.growth_stabilized
  permissions_bundle: coordinator
  permissions:
  - agent_hire
  - agent_fire
  - agent_reconfigure
  - configure_routing
  - approve_spend
  - message_all
  - mailbox_send
  - human_task_request
  workspace_class: opco
  manager_fallback: empire-coordinator
opco-chief-of-staff:
  id: cos-{vertical_id}
  type: operating
  role: chief_of_staff
  model_tier: haiku_or_sonnet
  conversation_mode: session
  max_turns_per_task: 15
  subscriptions:
  - product_report
  - growth_report
  - feature_deployed
  - churn_risk
  - build_complete
  - prelaunch_ready
  - support_critical
  - channel_blocked
  - mandate_updated
  _routing_note: 'CoS uses static subscriptions only. Do NOT add seeded routes for the same events — static and seeded routes
    for the same agent+event cause double delivery. This applies to all OpCo leadership agents with static subscriptions (CEO,
    CoS).

    '
  tools_tier2:
  - configure_routing
  - schedule
  emit_events:
  - cross_domain_report
  permissions_bundle: specialist
  permissions: &id002
  - message_domain
  - mailbox_send
  - configure_routing
  workspace_class: opco
  manager_fallback: opco-ceo
