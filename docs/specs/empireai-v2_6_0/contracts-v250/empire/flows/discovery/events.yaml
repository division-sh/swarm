category.assessed:
  payload:
    scan_id: string
    category: string
    subcategory: string
    geography: string
    signal_strength: integer
    opportunity_name: string
    preliminary_icp: string
    build_sketch:
      type: object
      properties:
        core_features:
          type: array
          items: string
        key_integrations:
          type: array
          items: string
        red_flags:
          type: array
          items:
            type: object
            properties:
              notes: string
              source_url: string
              type: string
    evidence:
      type: object
      properties:
        buyer_communities:
          type: array
          items:
            type: object
            properties:
              name: string
              source_url: string
        competitors:
          type: array
          items:
            type: object
            properties:
              name: string
              pricing: string
              source_url: string
        pain_signals:
          type: array
          items:
            type: object
            properties:
              signal: string
              source_url: string
        regulatory:
          type: array
          items:
            type: object
            properties:
              detail: string
              source_url: string
    opportunity_hypothesis: string
    geographic_scope: string
    opportunity_pattern: string
    signal_sources:
      type: array
      items:
        type: object
        properties:
          signal_type: string
          source: string
          url: string
    required_capabilities:
      type: object
      properties:
        automation_with_unlock: number
        current:
          type: array
          items: string
        would_unlock: string
