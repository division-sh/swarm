# EmpireAI — Project-Level + Shared Tools v2.6.0

dns_configure:
  category: per_agent
  description: Configure DNS records for a domain
  input_schema:
    type: object
    required:
    - domain
    - records
    properties:
      domain:
        type: string
      records:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
              enum:
              - A
              - AAAA
              - CNAME
              - MX
              - TXT
            name:
              type: string
            value:
              type: string
    additionalProperties: false
  handler_type: workflow_registered
mailbox_send:
  category: universal
  description: Submit a decision item to the human board member
  input_schema:
    type: object
    required:
    - type
    - priority
    - subject
    - payload
    properties:
      type:
        type: string
        enum:
        - review
        - escalation
        - spend_request
        - budget_increase
        - digest
        - vertical_approval
        - migration_approval
        - domain_approval
      priority:
        type: string
        enum:
        - low
        - normal
        - high
        - critical
      subject:
        type: string
        description: One-line summary
      vertical_id:
        type: string
        description: Vertical context (required for vertical_approval, migration_approval)
      payload:
        type: object
        description: Decision context — contents vary by type
    additionalProperties: false
  handler_type: platform_builtin
schedule:
  category: per_agent
  description: Schedule a future action or reminder
  input_schema:
    type: object
    required:
    - action
    - delay_seconds
    properties:
      action:
        type: string
        description: What to do when timer fires
      delay_seconds:
        type: integer
        description: Seconds from now
      context:
        type: object
        description: Data to include when timer fires
    additionalProperties: false
  handler_type: workflow_registered
instagram_handle_check:
  category: per_agent
  description: Check if an Instagram handle is available
  input_schema:
    type: object
    required:
    - handle
    properties:
      handle:
        type: string
    additionalProperties: false
  handler_type: workflow_registered
nginx_reload:
  category: per_agent
  description: Reload nginx configuration
  input_schema:
    type: object
    properties:
      config_path:
        type: string
      dry_run:
        type: boolean
        default: true
    additionalProperties: false
  handler_type: workflow_registered
whatsapp_name_check:
  category: per_agent
  description: Check if a WhatsApp Business name is available
  input_schema:
    type: object
    required:
    - name
    properties:
      name:
        type: string
    additionalProperties: false
  handler_type: workflow_registered
certbot_execute:
  category: per_agent
  description: Provision or renew SSL certificate via Let's Encrypt
  input_schema:
    type: object
    required:
    - domain
    properties:
      domain:
        type: string
      action:
        type: string
        enum:
        - provision
        - renew
        - revoke
        default: provision
    additionalProperties: false
  handler_type: workflow_registered
systemd_control:
  category: per_agent
  description: Start, stop, restart, or check status of a systemd service
  input_schema:
    type: object
    required:
    - service
    - action
    properties:
      service:
        type: string
      action:
        type: string
        enum:
        - start
        - stop
        - restart
        - status
        - enable
        - disable
    additionalProperties: false
  handler_type: workflow_registered
human_task_decide:
  category: per_agent
  description: Approve, reject, or defer a pending human task request
  input_schema:
    type: object
    required:
    - task_id
    - decision
    properties:
      task_id:
        type: string
      decision:
        type: string
        enum:
        - approved
        - rejected
        - deferred
      reason:
        type: string
      requeue_date:
        type: string
        description: ISO date for deferred tasks
    additionalProperties: false
  handler_type: workflow_registered
agent_message:
  category: universal
  description: Send a directive or message to another agent
  input_schema:
    type: object
    required:
    - to
    - message
    properties:
      to:
        type: string
        description: Target agent ID
      message:
        type: string
        description: Message content
      priority:
        type: string
        enum:
        - normal
        - urgent
        default: normal
    additionalProperties: false
  handler_type: platform_builtin
domain_availability_check:
  category: per_agent
  description: Check if a domain name is available for registration
  input_schema:
    type: object
    required:
    - domain
    properties:
      domain:
        type: string
    additionalProperties: false
  handler_type: workflow_registered
