platform:
  name: mas-orchestrator
  version: 2.5.0
vocabulary:
  transition:
    description: 'A directed edge between two stages. Fires when a trigger event arrives AND all guards pass. On fire, executes
      actions and moves the entity to the target stage. A transition is owned by exactly one participant (system_node, agent,
      or runtime). Ownership means: this participant''s code/logic decides whether the transition fires.'
    required_fields:
    - id
    - from
    - to
    - trigger
    - node
    optional_fields:
    - guards
    - actions
  guard:
    description: 'A named boolean check evaluated before a transition fires. If any guard returns false, the transition is
      blocked. Guards are code-backed — the ID maps to a function.

      '
    required_fields:
    - id
    - category
    - description
    optional_fields:
    - input
    - check
    - policy_ref
  action:
    description: 'A named side effect executed when a transition fires. Actions are code-backed — the ID maps to a function.

      '
    required_fields:
    - id
    - category
    - description
    optional_fields:
    - effect
    - emits
  timer:
    description: 'A time-based trigger attached to a stage. When the delay elapses, the platform emits the timer''s event,
      which can trigger a transition.

      '
    required_fields:
    - id
    - stage
    - event
    - owner
    optional_fields:
    - delay_seconds
    - delay_minutes
    - delay_hours
    - delay_days
    - cancellation
    - recurring
  participant:
    description: 'An entity that owns transitions, handles events, and executes logic. Three execution types with different
      semantics.

      '
    types:
      system_node:
        description: 'Deterministic code. No LLM. Subscribes to events, executes fixed logic, emits events. Owns workflow
          transitions. Examples: scoring-node, validation-orchestrator.

          '
        execution: deterministic
        has_prompt: false
        has_model: false
      agent:
        description: LLM-powered. Has a system prompt, model tier, conversation mode. Subscribes to events, reasons about
          them, calls tools. Can own workflow transitions where the stage change requires LLM judgment (e.g. promote/kill
          decisions, build readiness). Agents produce events that may also trigger transitions owned by system nodes.
        execution: llm
        has_prompt: true
        has_model: true
      runtime:
        description: 'The platform itself. Handles transitions that are implicit (human decisions, system lifecycle). Not
          declared in any contract — always available.

          '
        execution: implicit
        has_prompt: false
        has_model: false
  flow:
    description: A self-contained building block with input/output pins (events and data), system nodes that orchestrate state
      transitions, and required agent roles. The marketplace unit. Analogous to an IC chip in circuit design.
    required_files:
    - nodes.yaml
    - events.yaml
    - schema.yaml
  state:
    description: 'A named state in a workflow. An entity (e.g. a vertical, a ticket, a document) is always in exactly one
      state. States belong to phases for grouping. Some states are terminal (no outgoing transitions).

      '
    required_fields:
    - id
    - phase
    optional_fields:
    - description
contract_formats:
- name: flow_package
  description: A self-contained flow with 3 files
  files:
    nodes.yaml: System nodes with event_handlers. State machine derived from advances_to fields.
    events.yaml: Event payload schemas. Routing derived from agents + nodes at boot.
    schema.yaml: 'Pin declarations: input/output events, input/output data fields, states, namespace.'
- name: schema_definition
  description: Flow schema (the datasheet)
  required_fields:
  - name
  - namespace
  - pins
  optional_fields:
  - initial_state
  - terminal_states
  - states
  pins_format:
    inputs:
      events: list of event names this flow subscribes to (required=true by default)
      reads: list of entity fields this flow reads
    outputs:
      events: list of event names this flow emits
      writes: list of entity fields this flow writes (no two flows may write same field)
- name: node_definition
  description: System node with event handlers
  required_fields:
  - id
  - execution_type
  - subscribes_to
  - produces
  - event_handlers
  optional_fields:
  - state_schema
  - state_table
  - timers
  handler_fields:
    advances_to: Target state (this IS the transition)
    emits: Event to publish
    sets_gate: Gate flag to set on entity
    guard: Condition to check before advancing (inline)
    data_accumulation: Entity fields to write from event payload
    on_complete: Conditional outcomes for accumulation handlers
    rules: Type-based routing for directive-style handlers
- name: agent_registry
  description: Agent definitions
  required_fields:
  - id
  - model_tier
  - conversation_mode
  - subscriptions
  - emit_events
  optional_fields:
  - tools_tier2
  - permissions
  - permissions_bundle
  - max_turns_per_task
- name: event_payload
  description: Event payload schema (payload only — routing derived at boot)
  format:
    event_name:
      payload:
        field: type
- name: project_manifest
  description: Project package.yaml
  required_fields:
  - name
  - version
  - flows
  optional_fields:
  - platform_version
  - author
  - description
  flows_format:
    id: instance name
    flow: flow directory
    namespace: event prefix
workflow_state:
  description: 'Every workflow instance (e.g. one vertical, one ticket) has persistent state managed by the platform. This
    is the schema.

    '
  fields:
    instance_id:
      type: uuid
      description: Primary key — the entity being tracked
    workflow_name:
      type: string
      description: Which workflow this instance belongs to
    workflow_version:
      type: string
      description: Version of the workflow definition at creation
    current_stage:
      type: string
      description: Current stage ID
    entered_stage_at:
      type: timestamp
      description: When the current stage was entered
    transition_history:
      type: jsonb_array
      description: 'Ordered list of transitions fired: [{transition_id, from, to, trigger_event_id, fired_at, guards_evaluated}]

        '
    accumulator_state:
      type: jsonb
      description: 'Per-node state buckets. Each system node can store structured state here (e.g. scoring accumulator, gate
        flags). Keyed by node_id.

        '
    timer_state:
      type: jsonb
      description: 'Active timers: [{timer_id, created_at, fires_at, cancelled}]

        '
    metadata:
      type: jsonb
      description: Workflow-specific metadata (revision counts, etc.)
  ddl: "CREATE TABLE workflow_instances (\n    instance_id       UUID PRIMARY KEY,\n    workflow_name     TEXT NOT NULL,\n\
    \    workflow_version  TEXT NOT NULL,\n    current_stage     TEXT NOT NULL,\n    entered_stage_at  TIMESTAMPTZ NOT NULL\
    \ DEFAULT NOW(),\n    transition_history JSONB NOT NULL DEFAULT '[]',\n    accumulator_state JSONB NOT NULL DEFAULT '{}',\n\
    \    timer_state       JSONB NOT NULL DEFAULT '[]',\n    metadata          JSONB NOT NULL DEFAULT '{}',\n    created_at\
    \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\nCREATE INDEX\
    \ idx_wi_workflow ON workflow_instances(workflow_name, current_stage);\nCREATE INDEX idx_wi_stage ON workflow_instances(current_stage);\n"
builtin_hooks:
  guards:
  - id: has_entity_id
    description: Payload contains a valid entity ID
  - id: not_in_terminal_stage
    description: Entity is not in a terminal stage
  - id: revision_count_below_limit
    description: Revision counter hasn't exceeded max
    config_key: max_revisions
  - id: has_human_decision
    description: Transition was triggered by a human decision
  - id: stage_in_phase
    description: Entity's current stage belongs to the specified phase
    config_key: required_phase
  actions:
  - id: increment_revision_count
    description: Increment metadata.revision_count
  - id: record_transition
    description: Append to transition_history (always runs, implicit)
  - id: update_stage
    description: Set current_stage to transition.to (always runs, implicit)
  - id: cancel_stage_timers
    description: Cancel all timers scoped to the departed stage (always runs, implicit)
  - id: start_stage_timers
    description: Start all timers scoped to the entered stage (always runs, implicit)
  notes: 'record_transition, update_stage, cancel_stage_timers, and start_stage_timers are implicit — the platform executes
    them on every transition automatically. They do NOT appear in workflow hook registries. The remaining builtins (has_entity_id,
    not_in_terminal_stage, revision_count_below_limit, has_human_decision, stage_in_phase) are abstract. Workflows bind them
    to concrete implementations via aliases. Example: Empire binds has_entity_id → has_vertical_id, revision_count_below_limit
    → inner_revision_count_below_limit.'
  guard_aliases:
    has_vertical_id:
      platform_builtin: has_entity_id
      check: event.payload.vertical_id is non-empty UUID
    has_human_decision:
      platform_builtin: has_human_decision
      check: event originated from mailbox decision path
    not_in_operating_phase:
      platform_builtin: not_in_terminal_stage
      check: stage not in [launched, operating, expanding]
    inner_revision_count_below_limit:
      platform_builtin: revision_count_below_limit
      check: revision_count < max_revisions (default 3)
  action_aliases:
    increment_revision_count:
      platform_builtin: increment_revision_count
      effect: workflow_state.metadata.revision_count += 1
compliance_rules:
  flow_coherence:
  - Every handler with advances_to must reference a state declared in schema.yaml or reachable from initial_state
  - No two flows may declare the same output data pin (write conflict = boot error)
  - Every required input event pin must be satisfied by some flow output or project-level event
  - Every required agent role must be fulfilled by an agent in agents.yaml
  - Namespace substitution must produce no event name collisions
  node_coherence:
  - Every event in event_handlers must appear in subscribes_to
  - Every event in produces must have a payload schema in events.yaml
  - Guards must reference fields that exist on the entity or in policy.yaml
  - advances_to states must be reachable from the current flow state space
  agent_coherence:
  - Every tool in tools_tier2 must exist in tools.yaml
  - Every event in emit_events must have a payload schema in events.yaml
  - Agent permissions must include required permissions for their tools
  - Every subscription event must be emitted by some node or agent
  project_coherence:
  - Every flow declared in package.yaml must have a directory under flows/
  - Project-level nodes must not duplicate flow-level node IDs
  - All handoff events must have both an emitter (source flow) and subscriber (target flow or declarative handoff)
versioning:
  platform_version:
    description: Version of this platform spec
    current: 0.1.0
    changes_when: Platform vocabulary, contract formats, compliance rules, or builtins change
  workflow_version:
    description: Version of a specific workflow definition
    example: empire_vertical_pipeline v2.3.0
    changes_when: Stages, transitions, guards, actions, timers, or nodes change
  notes: 'Platform version and workflow version are independent. A workflow can upgrade (add stages, transitions) without
    a platform change. A platform upgrade (new builtin hooks, new compliance rules) may require workflow definitions to be
    updated if they violate new rules.

    '
  current: 2.5.0
file_layout:
  description: 'Each workflow has its own directory under contracts/. Platform files live at contracts/platform/. Workflow-specific
    files live at contracts/{workflow_name}/.

    '
  example: "contracts/\n  platform/\n    package.yaml              # Platform manifest\n    platform-spec.yaml        # Platform\
    \ definition (21 sections)\n  {project}/\n    package.yaml              # Project manifest (flow instances, handoffs,\
    \ entity schema)\n    agents.yaml               # Project-level agents only (span multiple flows)\n    nodes.yaml    \
    \            # Project-level system nodes\n    events.yaml               # Project-level events (cross-flow, agent-to-agent)\n\
    \    tools.yaml                # Project-level + shared tools\n    policy.yaml               # Project-level policy (permission\
    \ bundles, shared thresholds)\n    prompts/                  # Project-level agent prompts\n    runtime/             \
    \     # Runtime bridge (merged flat files for current loader)\n      nodes.yaml\n      events.yaml\n    flows/\n     \
    \ {flow_name}/            # Each flow is self-contained\n        nodes.yaml            # System nodes + event handlers\n\
    \        events.yaml           # Event payload schemas (flow-internal)\n        schema.yaml           # Pins, states,\
    \ namespace, required_agents\n        agents.yaml           # Agents belonging to this flow\n        tools.yaml      \
    \      # Tools used by this flow's agents (optional)\n        policy.yaml           # Flow-specific policy/thresholds\
    \ (optional)\n        prompts/              # Prompts for this flow's agents\n"
  migration_note: Phase B complete. Files reorganized from flat naming to platform convention.
permissions_model:
  description: Agents have a permissions list controlling what capabilities they can exercise. The platform enforces permissions
    at tool execution time and message routing time. Workflows define permissions per agent in their agent registry. Optional
    permission_bundles in policy files provide shorthand for common sets.
  platform_permissions:
    agent_hire: Can spawn new agents into the workflow
    agent_fire: Can remove agents from the workflow
    agent_reconfigure: Can modify agent prompts, tools, and subscriptions
    configure_routing: Can modify event routing rules
    approve_spend: Can approve token/budget expenditure
    message_all: Can send agent_message to any agent in the workflow
    message_domain: Can send agent_message to agents in same domain/team
    message_peers: Can send agent_message to direct peers only
    mailbox_send: Can write items to the human decision mailbox
    human_task_request: Can create tasks for human execution
  enforcement: Before executing any tool call, the platform checks the calling agent's permissions list. If the tool requires
    a permission the agent lacks, the call is rejected. Message scope is enforced at agent_message delivery — the most permissive
    message permission wins (message_all > message_domain > message_peers).
  workflow_extensions: 'Workflows may define additional permissions beyond the platform set. The platform passes unrecognized
    permissions to workflow-registered handlers. Example: an Empire workflow might define approve_deployment or override_scoring.'
tool_model:
  description: The platform owns ALL tool schema serving. It reads tool definition YAML, generates MCP tool definitions, validates
    calls against schemas, and routes to handlers. Tool handlers are either platform-builtin or workflow-registered.
  platform_builtin_tools:
  - agent_message
  - mailbox_send
  handler_registration: At bootstrap, the workflow module registers handlers for its tools. The platform provides the MCP
    gateway and schema validation. One tools file per workflow containing all tool schemas (universal + workflow-specific).
    The platform does not need separate tool files.
directive_pattern:
  description: Human directives (system.directive events) are handled by a system node, not by LLM reasoning. The node reads
    the directive type and routes to the appropriate follow-up event. Directive types and their routing are declared in the
    node's event_handlers, same pattern as all other system nodes.
  example:
    system.directive:
      action: route_directive
      rules:
        scan:
          condition: directive.type == scan
          emits: scan.requested
        budget:
          condition: directive.type == budget_adjust
          emits: budget.adjustment_requested
        policy:
          condition: directive.type == policy_change
          emits: policy.change_requested
persistence_model:
  description: Agents do not have raw database access. The platform provides typed persistence tools auto-generated from the
    entity_schema in package.yaml. For each field group in the entity schema, the platform generates save/get tools with validated
    input schemas. This ensures all data access is permissioned, auditable, and storage-backend agnostic.
  auto_generated_tools:
    get_entity: Read entity by ID. Returns all fields the agent has permission to see.
    save_entity_field: Write a specific field on an entity. Field must exist in entity_schema.
    search_entities: Query entities by stage, field values, or metadata.
    query_metrics: Read aggregated metrics (counts, sums, averages) across entities.
  schema_source: package.yaml → entity_schema
event_schema:
  description: Each workflow defines event payload schemas in events.yaml. Events are keyed by event name. Each entry contains
    a payload object mapping field names to types (string, integer, object, array, boolean). The platform uses these schemas
    to validate emit tool calls at runtime. Routing, consumers, and delivery are NOT declared in events.yaml — the platform
    derives routing from agents.yaml (subscriptions, emit_events) and nodes.yaml (subscribes_to, event_handlers).
  format:
    event_name:
      payload:
        field_name: type (string | integer | boolean | object | array)
  routing_derivation:
    owning_node: If a system node subscribes_to the event → that node owns it
    dual_delivery: If a node AND agents subscribe → route to both
    consuming: If only a node subscribes → route to node only
    passthrough: If no node subscribes → pure agent delivery
prompt_templating:
  description: Agent prompts are markdown files in the prompts/ directory. They may contain {{variable}} placeholders that
    the platform substitutes from policy.yaml at agent session creation time. The substitution is simple string replacement
    — no logic, no conditionals. Variables not found in policy.yaml are left as-is (fail-open for forward compatibility).
  convention:
    prompt_path: prompts/{agent-id}.md
    variable_syntax: '{{variable_name}}'
    variable_source: policy.yaml
flow_model:
  description: A Flow is the fundamental building block of the platform. It is a self-contained package with input/output
    pins (events and data), system nodes that orchestrate state transitions, and required agent roles. Flows compose via events
    — if one flow emits an event another subscribes to, they are connected. No explicit wiring declaration needed.
  flow_package:
    description: A flow is a marketplace-distributable package containing 3 files
    files:
      nodes.yaml: System nodes with event_handlers (required)
      events.yaml: Event payload schemas (required)
      schema.yaml: Pin declarations, states, namespace, required_agents (required)
      agents.yaml: Agent definitions for this flow (required)
      tools.yaml: Tools used by this flow's agents (optional — omit if flow uses only platform builtins)
      policy.yaml: Flow-specific thresholds and configuration (optional — omit if flow uses only project policy)
      prompts/: Agent prompt files (required — one per agent)
  pins:
    description: Flows have typed input/output pins, like IC chips in a circuit. The platform validates pin wiring at boot.
    input_event_pins:
      description: Events the flow subscribes to. Required pins must be wired (some other flow emits them) or boot warns.
      required: true
    output_event_pins:
      description: Events the flow emits. Optional — subscribers consume them if present, otherwise events are logged only.
      required: false
    input_data_pins:
      description: Entity fields the flow reads. Required pins must be written by a prior flow or initial data.
      required_configurable: true
    output_data_pins:
      description: Entity fields the flow writes. Always written. No two flows may write the same field.
      conflict_rule: Two flows writing the same field is a boot error (short circuit).
  namespacing:
    description: 'Each flow schema declares a namespace_prefix — the event prefix used in its contracts. Projects assign a
      namespace per flow instance in package.yaml. The platform substitutes namespace_prefix → project namespace at boot.
      This enables flow reuse: the same scoring flow can score verticals (namespace=vertical) or tickets (namespace=ticket)
      by changing one field in package.yaml.'
    schema_field: namespace_prefix
    substitution_rule: 'At boot, for each flow instance: find all events in the flow''s nodes.yaml and events.yaml that start
      with the flow''s namespace_prefix. Replace that prefix with the project''s assigned namespace. Example: scoring flow
      has namespace_prefix=vertical. Project assigns namespace=ticket. vertical.scored becomes ticket.scored.'
    package_yaml_format:
      flows:
      - id: instance-name
        flow: flow-directory
        namespace: project-assigned-prefix
  required_agents:
    description: 'Each flow schema declares required_agents — agent role sockets that the project must fill. Each entry specifies:
      role name, events the agent subscribes to, events it emits, and a description. The platform validates at boot that every
      required role has a matching agent in agents.yaml.'
    schema_field: required_agents
    entry_format:
      role: Name of the required role
      subscribes_to: Events the agent must subscribe to
      emits: Events the agent must emit
      description: What the agent does in this flow
    fulfillment: An agent fulfills a role if its subscriptions include the required subscribes_to events (after namespace
      substitution) and its emit_events include the required emits. The project author maps agents to roles — the platform
      enforces the contract.
  schema_merging:
    description: When a project installs multiple flows, the platform merges their schemas. All output data pins become entity
      table columns. Input data pins are validated against available outputs. Two flows writing the same field is a conflict
      (boot error).
project_model:
  description: A Project composes flows into a running system. It installs flows, provides agents, sets policy, and optionally
    adds project-level system nodes for cross-flow coordination.
  structure: "\n{project_name}/\n  package.yaml           # project manifest (name, version, flow instances)\n  agents.yaml\
    \            # project-level agents (span multiple flows)\n  nodes.yaml             # project-level system nodes (handoffs,\
    \ portfolio, directives)\n  policy.yaml            # shared policy (thresholds, permission bundles)\n  tools.yaml    \
    \         # shared tools\n  prompts/               # agent prompts\n  flows/\n    {flow_instance}/     # each installed\
    \ flow\n      nodes.yaml\n      events.yaml\n      schema.yaml\n"
  project_level_nodes:
    description: 'System nodes at the project level handle cross-cutting concerns: flow-to-flow handoffs, portfolio monitoring,
      budget tracking, human directive routing. These are the wiring on the circuit board.'
    common_patterns:
      portfolio_node: Compiles status across all flows, handles runtime reset
      budget_node: Monitors spend across all flows
      directive_node: Routes human directives to the appropriate flow
  boot_validation:
    description: Platform validates at boot before any flow starts
    checks:
    - All required input event pins are wired (some flow emits them)
    - All required agent roles are fulfilled
    - No data pin write conflicts (two flows writing same field)
    - All required input data pins are satisfied
    - All event payload schemas are present for emitted events
    - Namespace substitution produces no collisions
    - All flow required_agents roles are fulfilled by agents in agents.yaml
    - Namespace substitution produces valid event names with no collisions
  handoffs:
    description: Flow-to-flow transitions that create new flow instances are declared in package.yaml. The platform reads
      these at boot and creates instances when the trigger event fires. Simple event forwarding between flows needs no declaration
      — events auto-wire via subscriptions.
    format:
      event: Trigger event name
      creates_flow: Flow to instantiate
      namespace: Namespace for the new instance
execution_primitives:
  description: Built-in execution patterns the platform engine interprets from YAML handler declarations. These cover the
    common system node behaviors. Handlers using these primitives need no product-specific code.
  generic_patterns:
    description: The engine interprets these handler fields natively.
    advance_state:
      field: advances_to
      behavior: Set entity.state = target state
    emit_event:
      field: emits
      behavior: Publish event with entity context
    set_gate:
      field: sets_gate
      behavior: Set entity.gates.{name} = true
    check_guard:
      field: guard
      behavior: Evaluate condition against entity fields + policy values. Block if false.
    write_data:
      field: data_accumulation
      behavior: Write event payload fields to entity
    conditional_branch:
      field: on_complete
      behavior: Evaluate conditions top-to-bottom, execute first match
    typed_routing:
      field: rules
      behavior: Match payload field value against rule conditions, emit matching event
    record_evidence:
      field: 'action: record_evidence'
      behavior: Append event payload to entity accumulator state
  accumulate:
    description: Track multiple events arriving for the same entity. Fire on_complete when a completion condition is met.
      Platform handles idempotency, partial failure, and crash recovery.
    handler_fields:
      accumulate.track: List of expected items (e.g., dimensions_requested, scanner_types)
      accumulate.completion: all (every item received) | threshold (count >= N) | timeout (timer fires)
      accumulate.on_complete: Handler fields to execute when complete (advances_to, emits, compute, etc.)
      accumulate.on_timeout: 'Optional: what to do if timer fires before completion'
    covers:
    - score.dimension_complete — accumulate dimension scores, fire on all received
    - '*.scan_complete — accumulate scanner reports, fire on all reported or timeout'
    - category.assessed / trend.identified / source.scraped — accumulate signals, fire on threshold
    platform_guarantees:
    - Each arrival is idempotent (duplicate events do not double-count)
    - Partial state survives crash (accumulator persisted after each event)
    - Timeout triggers on_timeout handler if configured
  dispatch:
    description: Spawn work across multiple agents or targets from a single trigger event. Platform handles fan-out and tracks
      which dispatches completed.
    handler_fields:
      dispatch.targets: List or mapping of targets (e.g., mode_to_scanners)
      dispatch.event_per_target: Event to emit for each target
      dispatch.track_completion: true/false — whether to set up accumulation for responses
    covers:
    - scan.requested — dispatch to scanner agents per mode
  query_and_format:
    description: Read entity state across multiple flow instances, compile a summary, and emit a digest event. Platform provides
      the query mechanism; the format template is in the handler.
    handler_fields:
      query.scope: all_entities | by_state | by_flow
      query.fields: Which entity fields to include
      format.template: Summary structure (counts, lists, aggregates)
      emits: Digest event with compiled payload
    covers:
    - timer.portfolio_digest — compile status across all verticals and OpCos
  product_hooks:
    description: Handlers that cannot be expressed with platform primitives. These require product-specific code in an approved
      product package. The engine calls the registered hook by action name.
    expected_hooks_per_flow: A well-designed flow should have <10% of handlers requiring product hooks. If more, the platform
      likely needs a new primitive.
    empire_hooks:
    - process_dedup — merge strategy for duplicate signals
    - process_synthesis — resolution strategy for conflicting signals
    - resolve_contest — scoring contest winner selection
    - reset_pipeline_state — system reset (clear specific tables/state)
  coverage_target:
    generic_patterns: 34 of 47 handlers (72%)
    with_accumulate_dispatch_query: 43 of 47 handlers (91%)
    product_hooks: 4 of 47 handlers (9%)
compliance_guidelines:
  description: Guidelines for the implementer to achieve and maintain spec compliance. These are the rules the runtime must
    follow to be a valid platform implementation.
  boot_validation:
    description: Checks the platform performs at startup before any flow runs.
    required_checks:
    - All YAML files parse without errors
    - package.yaml declares flows; each flow directory exists with nodes.yaml, events.yaml, schema.yaml
    - All required input event pins are wired (some flow or project node emits them)
    - All required_agents roles are fulfilled by agents in agents.yaml
    - No data pin write conflicts (two flows writing same entity field)
    - Namespace substitution produces no event name collisions
    - All tools in agents tools_tier2 exist in tools.yaml
    - All agent permissions include required permissions for their tools
    - All event payloads referenced by emit_events have schemas in events.yaml
    - Entity schema in package.yaml covers all data_accumulation write targets
  runtime_enforcement:
    description: Checks the platform performs during execution.
    required_checks:
    - Tool calls validated against tool schema before execution
    - Tool calls checked against agent permissions before execution
    - Message delivery checked against agent message scope permission
    - State transitions only follow declared advances_to paths
    - Guards evaluated before state advancement — block if false
    - Events validated against payload schema before publish
    - Accumulation is idempotent — duplicate events do not double-count
    - Permission checks read from agent.permissions, not hardcoded policy functions
    - Scan mode behavior read from policy.scan_modes, not hardcoded
    - Manager fallback read from agent.manager_fallback, not hardcoded role mapping
    - Workspace class read from agent.workspace_class, not hardcoded
  contract_loading:
    description: How the runtime loads contracts.
    current:
      note: Runtime reads from empire/runtime/ (merged flat files)
      nodes: runtime/nodes.yaml — all nodes in one file
      events: runtime/events.yaml — all events with full metadata
    target:
      note: Runtime reads from empire/flows/ (per-flow files) + project-level
      nodes: Merge flows/*/nodes.yaml + empire/nodes.yaml into one node map
      events: Merge flows/*/events.yaml + empire/events.yaml; derive routing from agents + nodes
  handler_execution:
    description: How the runtime executes event handlers.
    rules:
    - Match inbound event to handler in owning node
    - 'If handler has guard: evaluate condition. If false, reject or kill.'
    - 'If handler has accumulate: track arrival, check completion, proceed only on complete.'
    - 'If handler has advances_to: update entity state.'
    - 'If handler has emits: publish follow-up event.'
    - 'If handler has sets_gate: update entity gate state.'
    - 'If handler has data_accumulation: write payload fields to entity.'
    - 'If handler has on_complete: evaluate conditions, execute matching branch.'
    - 'If handler has rules: match payload field, emit matching event.'
    - 'If handler has action that is a product hook: call registered hook function.'
  testing:
    description: Required test coverage for spec compliance.
    required_tests:
    - Boot validation passes with current contracts (all checks green)
    - Every declared handler has a matching Handle() implementation
    - Every state transition follows declared advances_to paths
    - Every emitted event has a payload schema in events.yaml
    - Every agent subscription resolves to an event some node or agent produces
    - Permission enforcement blocks unauthorized tool calls
    - Accumulation is idempotent under duplicate event delivery
    - Crash recovery replays undelivered events correctly
    - Namespace substitution works for multi-instance flows
  product_boundary:
    description: Rules for product-specific code isolation.
    rules:
    - Product-specific Go code lives only in approved product packages (e.g., internal/runtime/pipeline/empire/)
    - Generic runtime packages contain zero product references
    - Product hooks are registered at bootstrap, not imported by generic code
    - CI guard fails if product literals appear in generic non-test Go files
agent_registry_fields:
  description: Fields the platform reads from agents.yaml to replace hardcoded policy functions.
  permissions: List of capabilities. Platform checks before tool execution and message delivery.
  permissions_bundle: Shorthand referencing a bundle in policy.yaml.
  workspace_class: Agent grouping for workspace isolation (e.g., holding, factory, opco).
  manager_fallback: Agent ID to escalate to when this agent cannot handle a situation. Platform uses for message routing fallback.
  model_tier: LLM model selection.
  max_turns_per_task: Turn budget per task.
policy_driven_behavior:
  description: Behavior the platform derives from policy.yaml instead of hardcoded functions. The runtime reads these at boot
    and uses them for decisions during execution.
  scan_modes: Map of mode → rubric, signal types, priority. Replaces NormalizeScanMode, DefaultScanMode, RubricNameForScanMode,
    EmitsCategorySignals, EmitsTrendSignals.
  permission_bundles: Named permission sets. Replaces AllowHumanTaskDecision, AllowGlobalRouting, AllowGlobalManagement, AllowMailboxSend.
  thresholds: Scoring thresholds, revision limits, park durations. Referenced by guards via policy_ref.
handler_execution_order:
  description: 'When a system node receives an event matching a declared handler, the platform executes the handler fields
    in this exact order. Each step is optional — the engine skips steps whose fields are absent. This order is normative:
    all platform implementations must follow it.'
  order:
  - step: 1
    field: guard
    behavior: Evaluate condition against entity state + policy values.
    on_fail: Reject the event. Do not proceed. If guard specifies a kill path, advance to terminal state.
    on_pass: Continue to step 2.
  - step: 2
    field: accumulate
    behavior: Track this event arrival against the expected list. Check completion condition.
    on_incomplete: Stop. Wait for remaining items. Do not proceed to step 3.
    on_complete: Continue to step 3 with accumulated state.
    on_timeout: Execute accumulate.on_timeout if declared, then stop.
  - step: 3
    field: compute
    behavior: Execute platform computation primitive (weighted_average, threshold_classify, etc.) if declared.
    output: Store result in entity field specified by store_as.
  - step: 4
    field: on_complete
    behavior: Evaluate conditions top-to-bottom against entity state. Execute first matching branch.
    note: Each branch may contain advances_to, emits, or both. Only one branch fires.
  - step: 5
    field: advances_to
    behavior: Update entity.state to target state. Record transition in entity history.
    note: Skipped if on_complete already advanced state in step 4.
  - step: 6
    field: sets_gate
    behavior: Set entity.gates.{name} = true.
  - step: 7
    field: data_accumulation
    behavior: Write event payload fields to entity. Fields listed in data_accumulation.writes.
  - step: 8
    field: emits
    behavior: Publish follow-up event with entity context.
    note: Skipped if on_complete already emitted in step 4.
  - step: 9
    field: rules
    behavior: Match event payload field against declared rules. Emit the matching event.
    note: Alternative to steps 5+8 for directive-style routing.
  - step: 10
    field: action (product hook)
    behavior: Call registered product hook function by action name.
    note: Only if action name is not a platform primitive. Hook has full access to entity + event.
  transaction_boundary: Steps 1-10 execute within a single database transaction. If any step fails, the entire handler rolls
    back. The event is marked as failed and may be retried.
  idempotency: The platform guarantees handler idempotency. If the same event is delivered twice (crash recovery, retry),
    the handler produces the same result. Accumulation tracking, gate setting, and state advancement are all idempotent.
