  emitter: analysis-agent
  consumer: runtime           # intercepted → handleScoreDimensionComplete accumulates
  intercepted: true
  passthrough: false
  routing: static
  payload: [vertical_id, dimension, score, evidence, confidence]

scoring.contested:
  emitter: runtime            # rare — sharded Analysis Agents disagree on a dimension
  consumer: empire-coordinator
  intercepted: false
  routing: static
  payload: [vertical_id, dimension, scores, evidence, spread]

scoring.contest_resolved:
  emitter: empire-coordinator
  consumer: runtime
  intercepted: false
  routing: static
  payload: [vertical_id, dimension, resolved_score, reasoning]

vertical.scored:
  emitter: runtime            # from computeComposite()
  consumer: empire-coordinator  # shortlisted only (rejections → scoring_digest_buffer)
  intercepted: false
  routing: static
  payload: [vertical_id, result, composite_score, viability_score, market_score, dimensions, rubric]

vertical.shortlisted:
  emitter: runtime            # from computeComposite() when composite ≥75
  consumer: runtime           # intercepted → handleShortlisted creates ValidationPipeline
  intercepted: true
  passthrough: false
  routing: static
  payload: [vertical_id, composite_score, viability_score, scoring_payload]

vertical.marginal:
  emitter: runtime            # from computeComposite() when composite 50-74
  consumer: empire-coordinator  # EC decides: promote/park/reject
  intercepted: false
  routing: static
  payload: [vertical_id, composite_score, viability_score, dimensions, promotion_eligible]

vertical.rejected:
  emitter: runtime
  consumer: audit             # written to scoring_digest_buffer, NOT delivered to EC
  intercepted: false
  routing: static
  payload: [vertical_id, reason]

