# EmpireAI Event Catalog — canonical source of truth
# Generated from spec v2.0.28, audited v2.0.30
#
# This file is AUTHORITATIVE. Tests verify:
#   1. Every event here has a matching EventSchemaRegistry entry
#   2. Every emitter listed here has the event in its emit_events (agent-tools.yaml)
#   3. Every consumer listed here has the event in its subscriptions (agent-tools.yaml)
#   4. Intercepted events are handled in PipelineCoordinator.Intercept()
#
# Fields:
#   emitter:     Who produces this event (agent id, "runtime", or "human")
#   consumer:    Who receives it (agent id, "runtime", "audit", "mailbox")
#   intercepted: Whether PipelineCoordinator consumes before/instead of fan-out
#   passthrough: If intercepted, does it ALSO get delivered to subscribers?
#   routing:     "static" (subscription-based) or "routing_table" (OpCo internal)
#   payload:     Key fields in the event payload (matches EventSchemaRegistry)

# ===========================================================================
# SYSTEM LIFECYCLE
# ===========================================================================

system.started:
  emitter: runtime
  consumer: empire-coordinator
  intercepted: false
  routing: static
  payload: [timestamp, config_version, agent_count, is_cold_start]

system.directive:
  emitter: human
  consumer: empire-coordinator
  intercepted: true          # runtime parses simple directives, passes complex to EC
  passthrough: conditional   # simple → consumed, complex → passthrough to EC
  routing: static
  payload: [directive_text, timestamp]

# ===========================================================================
# SCAN CAMPAIGN
# ===========================================================================

scan.requested:
  emitter: empire-coordinator
  consumer: runtime           # intercepted → handleScanRequested delegates to sub-agents
  intercepted: true
  passthrough: false
  routing: static
  payload: [geography, mode, taxonomy_categories, sources, depth, campaign_id]

scan.completed:
  emitter: runtime            # emitted when ScanAccumulator has all agent completions
  consumer: runtime           # intercepted → handleScanCompleted cycles to next mode
  intercepted: true
  passthrough: false
  routing: static
  payload: [mode, geography, reports_received, agents_expected, agents_complete, verticals_discovered, campaign_id]

scan.started:
  emitter: runtime            # from handleScanRequested
  consumer: audit
  intercepted: false
  routing: static
  payload: [geography, mode, assigned_agents, scan_id]

campaign.completed:
  emitter: runtime            # all scan modes done for a geography
  consumer: empire-coordinator
  intercepted: false
  routing: static
  payload: [campaign_id, geography, modes_completed, total_discovered, total_shortlisted]

