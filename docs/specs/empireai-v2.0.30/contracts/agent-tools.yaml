# EmpireAI Agent Contracts — canonical source of truth
# Generated from spec v2.0.28, audited v2.0.30
#
# This file is AUTHORITATIVE. If the spec prose disagrees, this file wins.
# Tests verify the runtime against these contracts.
#
# Structure per agent:
#   id, type, role, model_tier, conversation_mode, max_turns_per_task,
#   subscriptions (EventBus delivery), tools_tier2 (beyond universal set),
#   emit_events (runtime generates emit_* tools from this list)
#
# Universal tools (injected into ALL agents, not listed per-agent):
#   - agent_message (Tier 2, §4.5)
#   - emit_* tools (auto-generated from emit_events below)
#   - Native LLM tools: file read/write, shell, web search/fetch, HTTP

# ===========================================================================
# HOLDING AGENTS (singleton, not per-vertical)
# ===========================================================================

empire-coordinator:
  id: empire-coordinator
  type: holding
  role: empire_coordinator
  model_tier: sonnet
  conversation_mode: session
  max_turns_per_task: 40
  subscriptions:
    - system.started
    - system.directive
    - campaign.completed
    - vertical.scored
    - vertical.marginal
    - vertical.approved
    - vertical.killed
    - template.version_published
    - template.migration_approved
    - template.migration_completed
    - template.migration_failed
    - opco.ceo_ready
    - opco.launched
    - opco.ceo_report
    - opco.steady_state_reached
    - opco.teardown_complete
    - human_task.requested
    - human_task.expired
    - budget.threshold_crossed
    - scoring.contested
    - timer.portfolio_digest
    - timer.marginal_review
    - opco.escalation
    - devops.capacity_warning
    - cto.extraction_recommended
  tools_tier2:
    - human_task_decide
    - schedule
    - mailbox_send
  emit_events:
    - scan.requested
    - opco.spinup_requested
    - template.migration_planned
    - template.migration_completed
    - template.migration_failed
    - vertical.health_warning
    - portfolio.digest_compiled
    - budget.warning
    - budget.throttle
    - budget.emergency
    - budget.resumed
    - human_task.approved
    - human_task.rejected
    - human_task.deferred
    - scoring.contest_resolved
    - vertical.resumed

factory-cto:
  id: factory-cto
  type: holding
  role: factory_cto
  model_tier: sonnet
  conversation_mode: session
  max_turns_per_task: 30
  subscriptions:
    - cto.spec_review_requested
    - spec.validation_passed
    - spec.validation_failed
    - template.publish_requested
    - analyst.bootstrap_upgrade_proposal
    - analyst.prompt_refinement_proposal
    - analyst.anti_pattern_advisory
    - opco.*.steady_state_reached
    - opco.*.cto_escalation
  tools_tier2: []
  emit_events:
    - template.version_published
    - cto.spec_approved
    - cto.spec_revision_needed
    - cto.spec_vetoed
    - cto.architecture_directive
    - cto.extraction_recommended
    - cto.pattern_detected
    - cto.tech_spec_feedback
    - spec.validation_requested

holding-devops:
  id: holding-devops
  type: holding
  role: devops
  model_tier: haiku
  conversation_mode: task
  max_turns_per_task: 20
  subscriptions:
    - devops.deploy_requested
    - devops.health_check_failed
    - devops.rollback_requested
    - spend.approved
    - spend.rejected
    - timer.infra_health_check
  tools_tier2:
    - nginx_reload
    - systemd_control
    - certbot_execute
    - dns_configure
    - mailbox_send
  emit_events:
    - devops.deploy_complete
    - devops.deploy_failed
    - devops.rollback_complete
    - devops.rollback_failed
    - devops.capacity_warning
    - devops.infra_change_needed
    - devops.ssl_provisioned
    - devops.health_check_failed

operations-analyst:
  id: operations-analyst
  type: holding
  role: operations_analyst
  model_tier: sonnet
  conversation_mode: session
  max_turns_per_task: 30
  subscriptions:
    - opco.*.ceo_report
    - opco.*.steady_state_reached
  tools_tier2:
    - sql_execute
  emit_events:
    - analyst.bootstrap_upgrade_proposal
    - analyst.prompt_refinement_proposal
    - analyst.anti_pattern_advisory

