role: cto-agent
responses:
  - when_event: opco.ceo_ready
    tool_calls:
      - name: emit_spec_approved
        arguments:
          vertical_id: "{{vertical_id}}"
          final_spec: "Operating spec approved from OpCo kickoff"
  - when_event: spec.approved
    tool_calls:
      - name: emit_build_complete
        arguments:
          vertical_id: "{{vertical_id}}"
          feature: "initial operating release"
          environment: "staging"
  - when_event: build_complete
    tool_calls:
      - name: emit_launch_ready
        arguments:
          vertical_id: "{{vertical_id}}"
          version: 1
          deploy_url: "https://example.com/{{vertical_id}}"
          test_results:
            status: passed
