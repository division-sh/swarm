requester-node:
  id: requester-node
  execution_type: system_node
  subscribes_to: [requester.setup, requester.requested, provider.replied]
  event_handlers:
    requester.setup: {}
    requester.requested:
      emit:
        event: provider.requested
        fields:
          account_id: payload.account_id
    provider.replied: {}
