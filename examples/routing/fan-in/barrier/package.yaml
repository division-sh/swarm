name: fan-in-barrier
version: "1.0.0"
platform_version: ">=0.7.0 <0.8.0"
flows:
  - id: ingress
    flow: ingress
    mode: static
  - id: operating
    flow: operating
    mode: template
  - id: portfolio
    flow: portfolio/default
    mode: singleton
connect:
  - from: ingress.operating_report_requested
    to: operating.operating_report_requested
  - from: operating.operating_reported
    to: portfolio.operating_reported
