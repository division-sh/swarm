item-handler:
  id: item-handler
  execution_type: system_node
  subscribes_to: [item.received]
  produces: [item.processed]
  event_handlers:
    item.received:
      advances_to: done
      emit:
        event: item.processed
        fields:
          item_id: payload.item_id
item-observer:
  id: item-observer
  execution_type: system_node
  subscribes_to: [item.processed]
  event_handlers:
    item.processed: {}
