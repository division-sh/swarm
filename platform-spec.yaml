        - '#1552'
        - '#1553'
        - '#1554'
      - id: analyzer_obligations
        locked_design_section: Analyzer obligations
        coverage: split_to_child
        owner: platform-spec.yaml#flow_model.flow_instance_authoring.analyzer_obligations
        implementation_trackers:
        - '#1539'
        - '#1543'
        - '#1544'
        - '#1545'
        - '#1546'
        - '#1547'
        - '#1548'
        - '#1549'
        - '#1551'
      - id: first_pilots
        locked_design_section: First pilots
        coverage: split_to_child
        owner: platform-spec.yaml#flow_model.flow_instance_authoring.pilot_model
        implementation_trackers:
        - '#1552'
        - '#1553'
    vocabulary:
      flow_definition: Contract/type for a reusable flow.
      flow_instance: One running process, case, job, or service instance.
      primary_entity: Durable state object owned by one normal flow instance.
      contained_state: Typed scalar, list, or map data owned inside the primary entity.
      child_template_flow: Independently routable or lifecycle-owning child/template flow instance.
      singleton_coordinator: Static shared-policy, aggregate-state, or cross-instance-learning owner.
      connect: Parent-owned flow-instance wiring over declared pins and keys.
      interface: Reusable structural contract over pins, payloads, and keys.
      analyzer: The verifier/compiler that expands compact authoring and rejects ambiguity.
    normal_model:
      rule: >
        The normal unit of durable workflow state is the flow instance, not an
        arbitrary entity row inside a static service flow. A normal flow
        instance owns exactly one primary state entity; handlers update that
        local state unless a separately declared child/template flow owns an
        independent sub-lifecycle.
      identity_ladder:
      - field = scalar state on the primary entity
      - list/map = contained local state on the primary entity
      - child/template flow instance = independently addressable lifecycle
      - singleton coordinator = shared policy, aggregate state, or cross-instance learning
    authoring_decision_rubric:
      status: merge_bearing_authoring_guidance
      rule: >
        Authors should not choose among overlapping routing/entity primitives.
        They first classify whether state is a flow instance, contained data,
        shared coordination state, or an explicit escape hatch.
      decisions:
      - id: template_flow_instance
        when: >
          The item has independent states, timers, retries, callbacks,
          terminality, direct routing, audit, independent agent assignment, or
          another independently addressable lifecycle.
        use: child/template flow instance
      - id: contained_state
        when: The item is just data owned by the current process or service.
        use: typed field/list/map on the primary entity
      - id: singleton_coordinator
        when: The flow coordinates, summarizes, or learns across many instances.
        use: singleton coordinator with real shared state or policy
      - id: promotion_line
        when: A map/list item starts behaving like a routable recipient.
        use: promote it to a child/template flow instance
    template_instance_model:
      status: merge_bearing_contract_behavior
      implementation_tracker: '#1543'
      policy_default_tracker: '#1595'
      canonical_code_owner: internal/runtime/contracts.WorkflowContractBundle.ResolveFlowTemplateInstance
      declaration_surface:
      - 'mode: template'
      - 'instance.by'
      - 'on_missing: create | reject'
      - 'on_conflict: reject | reuse'
      rule: >
        Template flow instances are the common shape for process/case/job state
        that needs independent lifecycle, routing, timers, retries, agents, or
        audit. #1543 owns the receiver template-instance declaration and verifier
        contract: `mode: template` flows MUST declare `instance.by`. #1595
        owns policy default expansion: when omitted, `on_missing` defaults to
        `create` and `on_conflict` defaults to `reject`; runtime route-plan
        lowering remains tracked by #1545.
      primary_entity_dependency: >
        `instance.by` is checked against the flow primary entity resolved by
        internal/runtime/contracts.WorkflowContractBundle.ResolveFlowPrimaryEntity.
        `schema.yaml entity` is not a secondary entity selector and remains
        invalid for normal flow authoring.
      key_rule: >
        Each `instance.by` entry names a top-level scalar or enum field on the
        primary entity. Empty fields, duplicate fields, nested paths, undeclared
        fields, and non-scalar/non-enum fields fail verification. Composite key
        material is ordered exactly as declared in `instance.by` so identity is
        deterministic and unambiguous.
      policy_rule: >
        `on_missing` MAY be omitted and defaults to `create`. `on_conflict`
        MAY be omitted and defaults to `reject`. When explicitly authored,
        `on_missing` MUST be `create` or `reject`, and `on_conflict` MUST be
        `reject` or `reuse`. Unsupported, explicit empty, or null-like policy
        values fail closed during verification. Generated/expanded authoring
        views MUST show the effective explicit policy values.
      connect_time_lifecycle_rule: >
        For normal parent `connect` into an addressless template receiver, the
        runtime owner is the EventBus connect-time template instance lifecycle
        decision. That owner consumes
        WorkflowContractBundle.ResolveFlowTemplateInstance, ordered
        TemplateInstanceContract.CanonicalKeyMaterial, the lowered
        ConnectRoutePlan.InstanceKey including #1546 adapter mappings, and the
        producer output key/carries evidence. If the receiver policy is
        `on_missing: create`, the owner derives a deterministic instance id from
        receiver flow id plus ordered key material, seeds the receiver primary
        entity/config with those key fields, and invokes the configured flow
        instance activator before delivery routes are committed. If
        `on_missing: reject`, missing instances fail closed. If create is
        enabled and an exact matching active descriptor already exists,
        `on_conflict: reuse` routes to that exact instance and `on_conflict:
        reject` fails closed as `route_plan_instance_conflict`; ambiguous
        matches always fail closed. Preflight may only preview the deterministic
        route when the real lifecycle activator is configured and MUST NOT
        persist lifecycle state. Publish-time creation, route installation,
        event row, delivery rows, and committed replay scope share the active
        publish mutation boundary when the store provides one.
      non_authoritative_paths: >
        Flow input-pin `address`, receiver `select_entity` /
        `select_or_create_entity`, producer `target`, producer `broadcast:true`,
        direct delivery, and `create_flow_instance.instance_id_from` are not the
        normal template instance-key authority for #1537 composition. They may
        survive only as explicit sibling/escape-hatch surfaces owned by their
        tracked issues.
    primary_entity_model:
      status: merge_bearing_contract_behavior
      implementation_tracker: '#1539'
      declaration_surface: 'exactly one flow-owned entities.yaml entry; root entities.yaml uses the same resolver when present'
      canonical_code_owner: internal/runtime/contracts.WorkflowContractBundle.ResolveRootPrimaryEntity / ResolveFlowPrimaryEntity
      single_entity_rule: >
        If exactly one entity type exists for a normal child flow, that entity
        type is the primary entity. More than one entity type is invalid for
        normal flow authoring; authors must split flows, use contained state,
        template instances, singleton/coordinator contained state, or child
        flows. If the bundle root declares entity contracts, multiple root
        entity types are invalid under the same resolver.
        `schema.yaml entity` is not a supported selector because it would
        restate entity ownership in a second file. Missing, duplicate, or
        restated entity ownership fails closed. Verification and direct runtime
        consumers consume the same canonical resolver.
      stateful_presence_rule: >
        A stateful normal child flow (stateful schema with no static/template
        mode) must resolve exactly one entity type. Root schema entity
        selectors and multi-root-entity declarations fail closed, but existing
        package-level root workflow state without root entities remains outside
        this required-child-flow entity presence rule. Stateless flows, static
        package/service flows, and template-flow instance-key behavior remain
        separate explicit classifications and are not silently rescued by
        handler acquisition, route planning, entity-tool fallback, or a
        schema-level entity selector.
    composition_model:
      status: references_existing_owner
      canonical_routing_owner: platform-spec.yaml#flow_model.flow_package.composition_routing
      route_plan_owner: platform-spec.yaml#contract_formats.event_schema.routing_derivation.route_plan_authority
      rule: >
        Parent `connect` routes across flow instances using declared producer
        output keys and receiver instance keys. This section names the authoring
        model; composition-routing and RoutePlan remain the canonical owners
        for topology lowering and publish-time delivery authority.
      public_target_revision:
        keep:
        - pin aliasing
        - import boundaries
        - resolver plumbing
        - fail-closed verification
        revise: parent-owned correlate_by/cardinality as the main authoring syntax
        prefer: connect + instance key mapping + explicit delivery
      split_children:
        output_pin_key_carries: '#1544'
        connect_to_instance_route_planning: '#1545'
        connect_key_adapters: '#1546'
        connect_time_template_lifecycle: '#1577'
      connect_to_instance_route_planning:
        status: merge_bearing_runtime_behavior
        implementation_tracker: '#1545'
        canonical_code_owner: internal/runtime/core/pinrouting.ConnectRoutePlan.InstanceKey + internal/runtime/bus.connectRoutePlanResolver
        rule: >
          For same-name normal composition into a template receiver, parent
          `connect` MUST lower the producer output pin `key/carries` evidence
          and the receiver `instance.by` contract into an explicit
          instance-key ConnectRoutePlan. The normal path MUST NOT use receiver
          input-pin `address`, receiver `select_entity`, producer
          target/broadcast, direct delivery, raw subscribers, RouteTable lookup,
          handler lookup, delivery rows, or replay/readback rows as the route
          selector. Renamed key adapters remain #1546.
      connect_key_adapters:
        status: merge_bearing_contract_runtime_behavior
        implementation_tracker: '#1546'
        canonical_code_owner: internal/runtime/contracts.FlowPackageConnect.Using.Instance + internal/runtime/bootverify.validateCompositionConnectInstanceKeyAdapter + internal/runtime/core/pinrouting.ConnectRoutePlan.InstanceKey.Mappings
        syntax: connect.using.instance.source / connect.using.instance.target
        rule: >
          Parent `connect` MAY adapt renamed producer output key evidence to a
          receiver template `instance.by` key only through
          `connect.using.instance`. The adapter is parent-owned route
          evidence: `source` names top-level producer payload fields declared by
          the output pin `carries`, `target` names the receiver template
          `instance.by` fields, and the ordered mapping becomes the lowered
          ConnectRoutePlan instance-key materialization rule. Same-name
          producer/receiver key fields remain valid without adapter syntax.
          Renamed key routes without explicit adapter evidence fail closed.
          `connect.map` is not adapter authority for addressless template
          instance-key routing and MUST NOT repair this class.
        supported_shapes:
          scalar: >
            A scalar adapter maps exactly one producer source field to exactly
            one receiver target field. Both fields must exist, be unique in the
            mapping, and have compatible schema types.
          composite: >
            Composite adapters map the full ordered receiver `instance.by`
            field set. `source` and `target` lists must have equal cardinality,
            every target must appear in receiver `instance.by`, every receiver
            key target must be covered exactly once, and every source must be
            carried by the producer output pin.
        fail_closed:
        - missing source or target adapter side
        - source/target cardinality mismatch
        - duplicate source or target fields
        - source field missing from producer carries or event schema
        - target field missing from receiver entity schema or instance.by
        - producer/receiver key type incompatibility
        - using.instance declared on addressed-input, broadcast, or non-template receiver routes
        non_authoritative_paths:
        - connect.map for addressless template instance-key adapters
        - receiver input-pin address rules for this addressless instance-key class
        - producer target.match or broadcast:true
        - raw/live subscriber lookup before lowered route identity
        - delivery rows, replay rows, or readback rows as route producers
      output_pin_key_carries_contract:
        status: merge_bearing_contract_behavior
        implementation_tracker: '#1544'
        canonical_code_owner: internal/runtime/contracts.FlowOutputEventPin + internal/runtime/bootverify.checkOutputPinKeyCarriesValidation
        rule: >
          Producer output event pins used for downstream instance-key composition
          MUST declare `key` and `carries`. `key` names the top-level payload
          field that supplies the producer's route identity evidence. `carries`
          names every top-level payload field the output pin promises as
          producer interface evidence and MUST include the key. The verifier
          type-checks those fields against the producer event schema and
          requires supported node emit sites to statically construct them.
          Agent `emit_events`, root or flow `auto_emit_on_create`, and workflow
          timer declarations that name key/carries output pins fail closed until
          an explicit static payload construction surface is available.
        non_authoritative_paths: >
          Event payload schema fields, connect.map source expressions, receiver
          address rules, producer target.match, broadcast:true, raw/direct
          subscribers, and RouteTable/live subscription lookup are not the
          canonical producer evidence owner for this class.
    contained_state_model:
      status: merge_bearing_contract_runtime_behavior
      implementation_tracker: '#1548'
      canonical_code_owner: internal/runtime/contracts.WorkflowDataWrite.Operation + internal/runtime/entityruntime.ResolveContainedOperationTarget + internal/runtime/engine.Executor.applyContainedDataOperation
      rule: >
        Typed lists and maps are contained state inside the primary entity.
        They are not cross-flow route targets and MUST NOT be addressed through
        parent `connect`. If a contained item needs independent lifecycle,
        routing, timers, retries, agents, audit, callbacks, terminality, or
        durable idempotency identity, it must be promoted to a child/template
        flow instance instead of remaining only a list/map item.
      operation_surface:
        host: platform-spec.yaml#handler.data_accumulation.write_item_forms.contained_operation
        supported_operations:
        - map set
        - map merge
        - map delete
        - map append-to-contained-list
        - list append
        - list update
        variable_key_rule: >
          Variable map keys are expressed only through the operation `key`
          expression. Dynamic/bracket target paths are not a compatibility
          surface and must fail verification/runtime validation.
        persistence_rule: >
          Contained operations mutate the owning primary entity field. Store
          persistence, mutation-log rows, replay reconstruction, and readback
          remain keyed by the primary entity field; contained map/list items do
          not gain independent runtime identity or route rows.
        non_routing_rule: >
          A contained operation does not create a receiver, route descriptor,
          RouteTable row, direct delivery target, or live subscription. Parent
          `connect` remains cross-flow-instance topology only.
    singleton_coordinator_model:
      status: merge_bearing_contract_runtime_behavior
      implementation_tracker: '#1549'
      declaration_surface: 'mode: singleton'
      canonical_code_owner: internal/runtime/contracts.WorkflowContractBundle.ResolveFlowSingletonCoordinator + internal/runtime/bootverify.checkSingletonCoordinatorValidation + internal/runtime/engine.Executor.applyContainedDataOperation
      rule: >
        Singleton/coordinator flows are explicit `mode: singleton` child flows
        that own real shared policy, aggregate state, or cross-instance
        learning for many normal/template instances. Bare `mode: static` is
        not coordinator authority. A singleton coordinator still has exactly
        one primary entity and must express coordinator state as typed
        contained map/list fields on that entity. Agent conversation/session
        memory, static multi-entity ownership, route-to-contained-item
        semantics, producer target/broadcast, direct delivery, and route-plan
        fallbacks are not singleton coordinator authority.
      lifecycle_policy: >
        Singleton coordinator state is persisted on the coordinator primary
        entity until handlers explicitly archive, roll up, clean up, or promote
        the state. Contained map/list items do not gain independent lifecycle,
        retry, timer, audit, callback, terminality, idempotency, or route
        identity. If a contained item needs those behaviors it must be promoted
        to a child/template flow instance instead of remaining singleton
        contained state.
      fail_closed:
      - 'root schema declares mode: singleton'
      - 'bare mode: static used as singleton/coordinator proof'
      - 'mode: singleton declares template instance fields'
      - singleton flow lacks exactly one primary entity
      - singleton flow primary entity lacks typed contained map/list state
      - singleton flow contained map/list value or item types do not resolve
      - singleton flow uses schema.yaml entity restatement
      - singleton flow declares multiple entity contracts
      - agent conversation/session memory is used as coordinator state authority
      - contained map/list items are targeted as route recipients
      - 'producer target, broadcast:true, direct delivery, RouteTable, live subscriptions, handler lookup, delivery rows, or replay rows are used as coordinator authority'
      promotion_rule: >
        Promote a singleton contained map/list item when it becomes an
        independently routable recipient or needs lifecycle, timers, retries,
        agents, audit, callbacks, terminality, durable idempotency, or separate
        route identity. Promotion behavior and pilots remain tracked by #1553
        and do not widen #1549.
      non_authoritative_paths:
      - 'mode: static as implicit coordinator declaration'
      - schema.yaml entity as a singleton entity selector
      - template instance.by / on_missing / on_conflict for singleton ownership
      - static multi-entity flow ownership
      - agent mode or derived session_scope memory
      - parent connect to contained map/list items
      - producer target, broadcast:true, direct delivery, RouteTable, raw subscribers, delivery rows, replay rows
    escape_hatches:
      static_multi_entity_flows:
        status: retired_unsupported
        implementation_tracker: '#1554'
        rule: >
          Stateful static/default-static authored flows MUST NOT create, select,
          or own multiple runtime entity rows through `create_entity`,
          `select_entity`, or `select_or_create_entity`. Static multi-row
          ownership is retired. Authors must model the state as one primary
          entity with contained state, a `mode: template` flow instance, a
          `mode: singleton` coordinator, or a child flow. Existing historical
          rows are not silently rewritten; actual persisted-row migration
          requires a separately gated migration.
      select_entity:
        status: retained_escape_hatch_pending_child
        implementation_tracker: '#1547'
        rule: >
          `select_entity` and `select_or_create_entity` remain acquisition
          primitives only for separately owned non-static/runtime surfaces.
          They are not an escape hatch for authored static multi-row ownership.
          Normal in-topology composition should route to the receiving flow
          instance through parent `connect` and instance keys instead; normal
          in-topology receiver acquisition fails boot verification rather than
          remaining a warning.
      producer_emit_target:
        status: exotic_dynamic_routing_escape_hatch
        implementation_tracker: '#1545'
        adjacent_authority: platform-spec.yaml#flow_model.flow_package.composition_routing.emit_target_escape_hatch
        adapter_boundary_tracker: '#1546'
        rule: >
          Producer `emit.target` remains only for genuinely exotic dynamic
          routing. It is not authoritative for normal parent-owned composition,
          where `connect`, instance keys, and RoutePlan authority own delivery.
          The existing composition-routing `emit_target_escape_hatch` owner
          remains authoritative for permitted dynamic target forms and limits;
          #1545 owns the route-planning proof that normal instance-key
          composition cannot be rescued by producer target/broadcast, and #1546
          owns explicit key-adapter overlap.
      custom_adapters:
        status: explicit_adapter_escape_hatch
        implementation_tracker: '#1546'
        rule: >
          Custom adapters remain valid when interface names or key names differ.
          They must be explicit parent-owned mappings, not implicit receiver
          entity selection or producer-owned target matching.
    migration_model:
      status: child_tracked
      rule: >
        Existing static multi-entity flows must not be preserved as a static
        multi-row escape hatch or migrated blindly to template flows. The target
        shape depends on whether the keyed item needs platform state-machine
        machinery, cross-flow addressability, or only contained data plus shared
        coordination. Historical rows are not silently rewritten; actual
        persisted-row migration is separately gated.
      implementation_trackers:
        template_pilot: '#1552'
        singleton_map_pilot: '#1553'
        static_multi_entity_escape_hatch_policy: '#1554'
    pilot_model:
      status: child_tracked
      rule: >
        The locked design requires both a template pilot and a singleton+map
        pilot before broad migration, because one migration cannot validate
        both sides of the authoring model.
      implementation_trackers:
        template_pilot: '#1552'
        singleton_map_pilot: '#1553'
    analyzer_obligations:
      status: child_tracked
      rule: >
        The analyzer owns safe expansion of compact authoring and rejection of
        ambiguity. #1538 records the obligations as source authority only; each
        behavior is implemented by its child issue.
      children:
        primary_entity_inference: '#1539'
        instance_key_verification: '#1543'
        output_key_carries_verification: '#1544'
        connect_to_instance_route_plans: '#1545'
        connect_key_mapping: '#1546'
        ambiguous_key_rejection: '#1545'
        select_entity_demotion: '#1547'
        typed_map_list_update_verification: '#1548'
        singleton_coordinator_contract: '#1549'
        expand_minimize_tooling: '#1551'
      expand_minimize_tooling:
        status: merge_bearing_supported_tooling
        implementation_tracker: '#1551'
        command: swarm describe
        canonical_code_owner: internal/runtime/authoringview.Build + cmd/swarm describe
        rule: >
          The supported expanded authoring view is a projection over existing
          semantic owners. It must expose inferred primary entity, template
          instance declaration/policy, output pin `key`/`carries`, versioned
          routing topology, explicit and implicit key mappings,
          singleton/coordinator boundaries, typed contained-state operations,
          lifecycle stage graphs requested with `--graph`, and retired static
          multi-entity diagnostics without becoming a new semantic owner or
          reimplementing verifier/runtime decisions.
        graph_rule: >
          `swarm describe --graph` renders the per-flow lifecycle stage graph
          from the canonical lowered lifecycle owner and the existing transition
          carriers, including accumulator completion and timeout `advances_to`
          carriers. It must show flow namespace, nodes, initial/terminal markers,
          edges, and edge source. It is projection-only and MUST NOT introduce a
          second transition-authoring owner.
        source_location_rule: >
          Diagnostics in the expanded view must carry check_id, message,
          remediation/evidence when available from the verifier finding owner,
          plus authored YAML file or other stable authored location derived from
          contract bundle source metadata.
        routing_topology:
          command: swarm describe routes
          schema_version: routing-topology/v1
          canonical_code_owner: internal/runtime/routingtopology.Build projected by internal/runtime/authoringview.BuildRoutingTopology
          projection_only: true
          evolution_rule: >
            Fields may be added within routing-topology/v1. Removing, renaming, retyping, or changing the meaning of
            a field requires a new artifact schema identity. Runtime recipients, persisted deliveries, replay facts,
            conformance status, and historical route-decision provenance are forbidden inputs and fields.
          delivery_scope_rule: >
            Delivery between authored producers and consumers has exactly two canonical scopes. Standing ingress is
            admission into a declared event boundary, not a third authored producer-to-consumer delivery scope.
          delivery_scopes:
          - typed_pubsub delivery between authored producers and consumers, with match exact|pattern and boundary same_flow|import_boundary proof
          - inter_flow_connect delivery between authored producers and consumers, lowered from declared output pin through parent connect to declared input pin
          typed_pubsub_rule: >
            One semanticview relation resolver evaluates each producer-or-input/consumer pair exactly once. Same canonical
            flow identity may return exact or pattern with boundary same_flow. Different canonical flow identity may return
            only pattern with boundary import_boundary and a stable normalized authorization proof naming the authorizing
            parent package, child package, import label/source, event pattern, and route source. Bounded observe-grant patterns
            intersect imported wildcard subscriptions over the declared typed event catalog. Each finite witness retains one
            source-relative local identity paired with its source-qualified canonical identity; these identities must not be
            flattened into independent candidates. The authored consumer pattern may match either identity according to its
            namespace, while the normalized grant pattern matches the canonical identity. For a static source, runtime route
            matching uses that canonical identity. For a template source, the finite witness retains the authorized source
            template identity and concrete source-local event. RouteTable registers that relation as deferred authority and
            materializes an exact `{instance_path}/{local_event}` route only from lifecycle proof that the instance belongs to
            that same source template; it removes the exact route with the source or consumer instance lifecycle. Concrete path
            shape or presence in the global authored event-path inventory is not instance-ownership proof. An authored static
            descendant remains unauthorized even when its path has the same segment shape as a template instance. Before any
            route-state mutation, flow-instance materialization MUST reject an instance path that aliases or would capture an
            authored static scope, or overlaps a non-instance event identity; canonical namespace collision is a hard invalidity
            and MUST leave existing event paths, observers, and sibling instance routes unchanged. A declared nested template
            scope remains allowed to materialize below its authored static parent; parent ancestry alone is not collision proof.
            RouteTable is the canonical lifecycle identity owner and stores one complete normalized `(scope_key, instance_id,
            instance_path)` route per instance path. Normal template creation, recovery, and ad hoc fallback use the same
            admission function. Exact replay of the complete identity is idempotent. A different identity at an owned path is a
            hard conflict; presence requires the complete identity; removal must match the complete stored owner before either
            persisted or in-memory authority is changed. All identity and authored-namespace collisions are validated before
            event paths, observers, or routes mutate. The static
            witness remains the sole authorization and ambiguity proof; runtime projection cannot broaden it to another local
            event or static flow.
            That paired witness drives semantic relation proof, runtime route inclusion, and ambiguity enumeration. Exact duplicate proofs collapse deterministically;
            distinct proofs for one relation are a typed ambiguity and produce an issue, not an edge. Authorization-conflict
            enumeration also evaluates every declared materializable event independently of current producer-census membership,
            because low-level event.publish can publish a declared event without an authored static producer endpoint. The
            complete ordered relation result is consumed by static topology projection, boot verification, and runtime route
            admission. Typed authorization ambiguity is a hard invalidity: runtime contract validation, route-table construction,
            and EventBus construction fail closed without runtime delivery authority, including when a caller supplies a prebuilt
            route table. Canonical name equality alone never authorizes a cross-flow edge.
          connect_source_rule: >
            Every inter_flow_connect edge and connect-lowering issue carries the exact authored package.yaml file:line
            captured by contract loading and propagated through normalization and lowering. Missing source file or positive
            line is connect_source_location_missing and cannot produce an edge. Projection/rendering MUST NOT reconstruct
            source proof from package keys or bundle paths.
          endpoint_rule: >
            Producers, consumers, input pins, and output pins come from one immutable authored endpoint census.
            Output pins are interface exposures and become delivery only through a lowered connect edge.
          resolution_rule: >
            Runnable connect edges preserve complete static create, select, select-or-create, fan-in, reply,
            static, and broadcast declarations without claiming a concrete runtime recipient. Invalid or unlowerable
            declarations appear only as typed issues and never as executable edges.
          identity_rule: >
            Every endpoint and edge carries authored, local, and canonical event identity plus stable flow/package
            scope. Declared-input and fan-in associations fail closed on zero or multiple matches.
          legacy_qualified_subscription_rule: >
            A concrete qualified cross-flow subscription that runtime still honors without a pin/connect route is
            projected in `legacy_qualified_subscriptions` with disposition `legacy_qualified_subscription`, exact
            authored file:line evidence, runtime_delivery true, canonical_edge false, migration remediation, and a
            linked verifier finding. It MUST NOT appear as a canonical edge. Staged/new-model bundles receive a hard
            invalidity when any root or child flow authors stages; all-legacy bundles receive a semantic-drift warning until E1a retires qualified cross-flow
            delivery. Wildcard imports and consumers reached through a declared input pin plus connect are not this
            legacy class.
          supported_outputs:
          - swarm describe routes
          - swarm describe routes --json
          - swarm describe --json routing_topology subprojection
        non_authoritative_paths:
        - CLI-local verifier decisions
        - API-local verifier decisions
        - generated expanded YAML as merge authority
    non_goals:
    - '#1538 does not implement verifier/runtime behavior.'
    - '#1538 does not migrate Empire contracts.'
    - '#1538 does not implement typed map/list operations.'
    - '#1538 does not close the #1537 parent.'
  flow_package:
    description: A flow is a directory with a standard file set. package.yaml is the manifest — it declares identity, child
      flows, and handoffs. All other files are optional depending on what the flow does.
    files:
      package.yaml: Flow manifest (required)
      schema.yaml: Pins and states. required_agents is optional; omission infers same-scope implementation-local agents,
        while presence declares an explicit interface boundary.
      agents.yaml: Agent definitions (required if flow has agents)
      events.yaml: Event schemas (optional — flow may only compose children)
      nodes.yaml: System nodes with handlers (optional)
      tools.yaml: Flow-specific tools (optional — inherits root)
      policy.yaml: Flow-specific config (optional — inherits root)
      prompts/: Agent prompt files (optional)
      flows/: Child flows (optional)
    manifest_self_facts:
      owner: package.yaml top-level fields decoded by ProjectPackageDocument
      strict_decoding:
        rule: >
          package.yaml top-level keys are fail-closed platform contract input. The loader MUST reject any
          top-level key that is not in the supported field set and MUST NOT silently ignore, warn-only,
          compatibility-shim, or preserve unknown top-level fields for later interpretation.
        supported_fields:
        - name
        - version
        - platform_version
        - author
        - description
        - keywords
        - license
        - repository
        - extra
        - requires
        - flows
        - packages
        - children
        - subpackages
        - connect
        - connector_packs
        - handoffs
        retired_fields:
          entity_schema: >
            package.yaml.entity_schema is retired and must fail with the retired-field migration error instead of
            being accepted as a manifest self-fact. Authoritative entity contracts live in entities.yaml.
        explicit_non_fields:
        - homepage
        - category
        - capabilities
        - tools
        - backends
      fields:
        keywords: >
          Optional list of unique package keyword slugs. Each item MUST be a string using lowercase ASCII letters,
          digits, and hyphen with no leading/trailing whitespace. Duplicate keywords fail closed.
        license: >
          Optional package license. When present it MUST be a non-deprecated SPDX license identifier from the
          platform's embedded SPDX license-list owner. SPDX expressions, loose aliases, prose, and proprietary
          placeholders are not accepted in this field.
        repository: >
          Optional package source repository. When present it MUST be exactly an HTTPS GitHub repository URL in the
          form https://github.com/{owner}/{repo}. SSH URLs, arbitrary hosts, homepage/docs URLs, branch/tree/blob/issue
          URLs, query strings, fragments, URL escapes, trailing slashes, and .git suffixes fail closed.
        extra: >
          Optional downstream metadata map. Keys MUST be namespaced as domain.tld/name and values MUST be strings.
          Swarm stores and projects this map for catalog/read-model consumers but does not interpret its values for
          runtime semantics.
        connector_packs: >
          Optional explicit provider-connector pack imports. The first supported shape is
          `connector_packs.imports[]` with required `provider` and `tool` fields. Each imported tool must resolve to a
          verified built-in connector pack, must produce a normal `ToolSchemaEntry` with `category: provider_connector`,
          and must fail closed on unknown fields, unknown providers/tools, provider/tool mismatch, or collision with any
          packed or flow-local tool id. Omission imports no connector tools.
      catalog_consumption:
        owner: bundle catalog projection
        rule: >
          Persisted bundle catalog rows MUST consume the typed package manifest owner for these self-facts. The
          projection exposes them under parsed_json.package and mirrors them into catalog metadata for list/detail
          read surfaces. Catalog replay MUST parse stored package.yaml through the same strict ProjectPackageDocument
          owner; persisted unknown top-level fields are invalid runtime input.
      non_goals:
      - package.yaml.repository does not implement update or fetch behavior.
      - package.yaml.extra does not authorize runtime behavior, capability selection, tool binding, backend selection, or category taxonomy.
      - package.yaml self-facts do not change platform_version compatibility semantics.
    import_boundary:
      description: >
        Imported flow packages declare their required public interface and dependency surface in their own package.yaml
        `requires` block. The parent import site in package.yaml must satisfy those declarations with an explicit `bind`
        block on the corresponding `flows[]`, `packages[]`, `children[]`, or `subpackages[]` entry. This is the canonical
        source authority for import-boundary completeness; raw same-name pins, ambient parent policy inheritance, flat
        credential names, and wildcard reachability are not proof that a declared import requirement is satisfied.
      requires_manifest:
        owner: Imported package package.yaml `requires`
        fields:
          inputs: List of package-local input event pin names the importing parent must bind.
          outputs: List of package-local output event pin names the importing parent must bind when the imported package
            exposes them as required public outputs.
          policy: >
            Package-local policy dependency declarations. The list shorthand declares required policy keys with no default.
            The mapping form is keyed by package-local policy path and accepts a requirement object with optional
            non-secret `default`; `type`, `description`, and `required` are accepted as descriptive annotations/reserved
            metadata and do not change runtime resolution. Unknown requirement-object fields fail closed during contract
            parsing. A declared policy dependency is an externally supplied slot and is not satisfied by same-name
            child-local policy or parent ambient inheritance.
          credentials: List of package-local credential dependency names the importing parent must bind.
          platform_version: Optional imported package platform-version constraint. The current first slice preserves and
            exposes this value; existing top-level `platform_version` remains the package load/admission constraint until
            a later source-authority change promotes different runtime semantics.
      import_site_bind:
        owner: Parent package.yaml import site `bind`
        locations:
        - flows[]
        - packages[]
        - children[]
        - subpackages[]
        fields:
          inputs: Map keyed by imported package `requires.inputs` item. Each value names the parent-facing event binding.
          outputs: Map keyed by imported package `requires.outputs` item. Each value names the parent-facing event binding.
          policy: Map keyed by imported package `requires.policy` item. Each value names the parent policy reference that
            will satisfy that package-local dependency. Supported references are `parent.policy.<path>` and `policy.<path>`.
          credentials: Map keyed by imported package `requires.credentials` item. Each value names the parent/deployment
            credential reference that will satisfy that package-local dependency.
      fail_closed_minimal_verify:
        rule: >
          If an imported package declares any item under `requires.inputs`, `requires.outputs`, `requires.policy`, or
          `requires.credentials`, boot/verify must report a hard invalidity unless the parent import site provides a
          non-empty `bind` entry for that exact item in the matching field. `requires.policy` may instead be satisfied by
          an explicit declared package default. For `requires.inputs` and
          `requires.outputs`, boot/verify must also fail closed when a `bind` key is not declared by the imported
          package public pin list, when the package-local pin is not declared by an imported flow schema, or when the
          parent-facing event binding is unknown or ambiguous.
        unsupported_shapes: >
          Unknown `requires` or `bind` fields, malformed non-list/non-map `requires.policy` shapes, non-list
          `requires.inputs` / `requires.outputs` / `requires.credentials` fields, and non-map `bind` fields are malformed
          contract input and must fail closed during contract parsing.
      dependency_resolution:
        owner: Runtime import-boundary dependency resolver over semanticview ProjectScopes, FlowScopes, and import-site binds.
        policy: >
          Imported package policy dependencies resolve exactly in this order: explicit import-site `bind.policy` reference
          to parent policy, then declared non-secret package default, then hard verify/runtime error. For every imported
          package context, runtime policy is package-local policy plus declared resolved dependency slots; ambient
          parent/root policy inheritance is disabled for that imported package context, even when `requires.policy` is
          empty.
          Declared dependency paths are removed from the child-local policy document before resolution is applied, so
          child-local policy at the same path, same-name parent/root policy inheritance, and ambient contract-merger fallback
          are not proof that the dependency is satisfied. Existing root/non-imported flow policy inheritance remains a
          different semantic concept and must not be used as an import compatibility shim.
        credentials: >
          Imported package credential dependencies resolve exactly in this order: package-local credential handle,
          import-site `bind.credentials` value, deployment credential key, owner-specific value or managed record at call
          time. Credentials have no package defaults and no same-name raw-key fallback. Static HTTP/MCP/native web-search,
          managed HTTP credential, bootverify, and credential metadata/status consumers must map package handles through
          this resolver before reading or indexing deployment credential keys. The static credential store remains the only
          owner of static secret values; the managed credential store remains the only owner of managed token records; the
          import-boundary resolver never exposes or persists secret values or token material.
        fail_closed: >
          Runtime and verify consumers must use the shared import-boundary dependency resolver. A remaining same-concept
          helper that independently interprets imported package policy or credential handles is non-authoritative. Imported
          package credential use with no declared `requires.credentials` item must resolve as an import-boundary miss, not
          as a raw deployment credential key.
      pin_alias_delivery:
        owner: Runtime import-boundary pin alias resolver over semanticview ProjectScopes and FlowScopes.
        inputs: >
          For an imported package with a declared `requires.inputs` pin, the parent import-site `bind.inputs` value is
          the canonical producer pattern consumed by flow input auto-wire, boot/verify input pin wiring, RouteTable
          static/template derivation, EventBus recipient planning/persistence, and workflow-node materialization.
          The child handler still consumes the package-local input pin name as its localized event. Raw same-name
          local input fallback is forbidden for declared imported package input pins; same-name fallback remains valid
          only for authored/local flows or imports that do not declare the input requirement.
        outputs: >
          For an imported package with a declared `requires.outputs` pin, the emitted/persisted event identity remains
          the child flow output event pattern. Parent-facing subscribers consume the parent import-site `bind.outputs`
          event name through the same runtime alias resolver. Delivery/readback localized event for the parent consumer
          is the parent-facing event name; the source event identity, replay scope, target routing metadata, broadcast
          semantics, correlation, and cardinality are not rewritten by the alias.
        fail_closed: >
          Runtime consumers must use the shared import-boundary alias resolver; local helpers must not independently
          reinterpret package-local pins, parent event names, or raw same-name fallback for declared imported package
          pins.
      wildcard_subscription_scope:
        owner: Runtime import-boundary wildcard scope/grant resolver over semanticview ProjectScopes, FlowScopes, and
          parent import-site `bind.observe` grants.
        default_scope: >
          A wildcard subscription authored inside an imported package is scoped to that imported package subtree by
          default. The candidate set includes events from the imported package's own flow/package subtree, including
          materialized template instances for that imported package. The candidate set does not include sibling package
          events merely because the raw event name matches `*`, `**`, or an unqualified local wildcard such as
          `task.*`.
        import_site_grants:
          field: bind.observe
          shape: >
            `bind.observe` is a list of narrow observation grants on the parent package.yaml import-site entry. Each
            grant MUST name a parent-visible typed `source` and an `events` list. `source` resolves to exactly one
            parent-visible flow import ID or package key. Each event pattern is evaluated relative to that source and
            intersected with the imported package's authored wildcard subscription before the event becomes a route
            candidate.
          example: |
            flows:
              - id: observer
                flow: observer
                bind:
                  observe:
                    - source: producer
                      events: [task.done]
              - id: producer
                flow: producer
          forbidden_compatibility_shapes: >
            Broad compatibility grants such as observe-all, all-siblings, global/root observation, or raw path-prefix
            fallbacks are not valid authority. A grant source must resolve through import/flow/package metadata, not
            through string prefix matching alone.
        fail_closed: >
          Verify/boot and runtime route derivation must use the shared import-boundary wildcard resolver. A grant with
          an empty, unknown, ambiguous, root/global, or non-parent-visible source is hard invalid. A grant with an empty,
          unknown, malformed, or unbounded event pattern such as `*` or `**` is hard invalid. An imported package
          wildcard subscription that has no package-subtree candidate and no matching explicit observe grant is hard
          invalid and must not fall back to global wildcard matching.
        runtime_parity: >
          RouteTable static derivation, template-instance route materialization, EventBus recipient planning/persistence,
          runtime owner lookup, workflow-node handler lookup, and boot verification must consume this same resolver.
          Low-level event identity wildcard matching remains only the primitive matcher inside the candidate set supplied
          by this resolver; it is not package-boundary authority. If this resolver scopes an imported-package wildcard
          handler and denies a concrete event, raw bundle/contract handler fallback must not resurrect that handler for
          delivery, replay, direct execution, preview/admission, or accumulator metadata.
        non_import_behavior: >
          Root and non-imported flow wildcard subscriptions keep their existing wildcard route behavior. Target and
          target_set delivery narrowing still applies after the scoped wildcard candidate is produced; wildcard grants
          do not override delivery target filtering.
      split_runtime_semantics:
        final_e2e_package_proof: >
          Final multi-package marketplace-style runtime proof is tracked by #1455 and guarded by
          internal/runtime/bus/sealed_flow_package_fixture_test.go plus
          internal/runtime/conformance/sealed_flow_package_conformance_test.go. This is proof coverage for the
          existing import-boundary, dependency, wildcard, and composition-routing rules, not an
          additional semantic owner.
    composition_routing:
      status: source_authority_promoted_runtime_migration_pending
      promoted_by: '#1467'
      parent_decision: '#1466'
      owner: platform-spec.yaml#flow_model.flow_package.composition_routing
      rule: >
        Parent-authored composition routing is the canonical source authority for common cross-flow pin delivery.
        Output pins declare the event identity and producer interface/key evidence; input pins declare the receiver interface;
        template receiver `instance.by` declares the normal receiver instance key; explicit input-pin `address` declares
        separately approved addressed-input descriptor routing. Parent package.yaml `connect` entries declare inter-flow delivery topology.
        The analyzer verifies those authored facts, infers only safe and unambiguous defaults, rejects ambiguity
        fail-closed, and lowers each accepted connection into concrete route-plan facts consumed by runtime RoutePlan.
        Producer emit sites MUST NOT own consumer routing on the common composed path.
      authored_shapes:
        output_event_pin:
          location: schema.yaml pins.outputs.events
          canonical_form: >
            An output event pin MAY be authored as an object `{name, event, key, carries}`.
            `name` is the local public output pin name. `event` is the local event identity
            emitted by the producer. `key` names the top-level payload field that carries
            instance-key producer evidence for normal parent-composed delivery. `carries`
            is the top-level payload field inventory promised by the producer output pin
            and MUST include `key` when `key` is present.
          scalar_form: >
            A scalar output event pin remains valid for outputs that do not participate in
            instance-key composition. A scalar output pin consumed by an addressed parent
            connect cannot prove producer key evidence and fails closed.
          example: |
            pins:
              outputs:
                events:
                  - name: deploy_completed
                    event: deploy.completed
                    key: vertical_id
                    carries:
                      - vertical_id
                      - component_id
        addressed_input_pin:
          location: schema.yaml pins.inputs.events
          canonical_form: >
            An input event pin MAY be authored as an object when it needs receiver address resolution:
            `{name, event, source, address}`. `name` is the local public input pin name. `event` is the local event
            identity accepted by the receiver handler. `source` is optional and currently valid only as `external`,
            declaring explicit intrinsic external ingress for this input pin. `address` declares how the receiver entity or
            flow instance is selected for in-topology delivery.
          scalar_form: >
            A scalar input event pin remains valid only for receivers that need no explicit addressed-input descriptor
            routing or where the parent connect/lowering rule supplies a complete receiver route from static topology or
            producer output key/carries plus receiver instance.by. A scalar input pin on a template receiver is not a
            receiver-side selector by itself.
          address_fields:
            by: Required receiver address key name when address is present.
            source: Optional source expression such as payload.vertical_id or event.source.entity_id. If omitted, the analyzer may infer it only when the output payload exposes exactly one compatible field for `by`.
            target: Optional receiver expression such as entity.vertical_id, config.vertical_id, or instance.vertical_id. If omitted, the analyzer may infer it only when the receiver declares exactly one compatible owned key for `by`.
            cardinality: Required when address is present; valid values are one and many. one lowers to singular target; many lowers to target_set/fan-out.
            mode: Optional receiver acquisition mode. Valid values are select_existing, select_or_create, and static_instance. Omitted mode means select_existing.
          example: |
            pins:
              inputs:
                events:
                  - name: deploy_completed
                    event: deploy.completed
                    address:
                      by: vertical_id
                      source: payload.vertical_id
                      target: entity.vertical_id
                      cardinality: one
        parent_connect:
          location: parent package.yaml connect
          canonical_form: >
            `connect` is a list of structured connections. Each entry binds one producer output pin to one receiver
            input pin, optionally names an alias/adapter, and declares or confirms delivery topology. `from` uses either
            flow-id plus local pin name or the explicit package-root endpoint form `.{root_output_pin_name}`. `to` uses
            flow-id plus local input pin name in this slice. Connect refs are not handler keys and not runtime instance paths.
          fields:
            from: Required producer reference `{producer_flow_id}.{output_pin_name}` or package-root producer reference `.{root_output_pin_name}`.
            to: Required receiver reference `{receiver_flow_id}.{input_pin_name}`.
            adapter: Optional named payload/event adapter when producer output and receiver input names or payload keys differ.
            map: Optional explicit map from receiver address keys to source/target expressions. Required when inference would be ambiguous or names differ.
            delivery: Optional delivery topology; valid values are one, many, broadcast, and reply. If omitted, the analyzer may infer only when unambiguous from the addressed input pin cardinality.
            reply: Optional reply lineage declaration for response routing; required when delivery is reply and usable request lineage is not otherwise provable.
          example: |
            connect:
              - from: holding_devops.deploy_completed
                to: operating.deploy_completed
                delivery: one
                map:
                  vertical_id:
                    source: payload.vertical_id
                    target: entity.vertical_id
              - from: .root_ready
                to: operating.root_ready
                delivery: one
      ownership_split:
        output_pins: Output pins own producer event identity and public producer key/carries evidence for instance-key composition.
        input_pins: Input pins own receiver interface and receiver address resolution requirements.
        parent_connect: Parent connect owns inter-flow delivery topology, including point-to-point, broadcast/fan-out, and reply/sender routing.
        analyzer: Analyzer owns validation, safe inference, alias/adapter expansion, and lowering to concrete route-plan facts.
        route_plan: Runtime RoutePlan owns publish-time concrete recipient authority after lowering; it consumes authored topology and MUST NOT reconstruct it from live subscribers.
        producer_emit_target: Producer `emit.target` owns only exceptional dynamic routing and MUST NOT be used as the common parent-composed routing surface.
      analyzer_verify_requirements:
        producer_flow_exists: The `from` flow must exist in the loaded package registry unless `from` is the explicit
          package-root endpoint form `.{root_output_pin_name}`.
        producer_output_pin_exists: The `from` pin must exist in the producer schema output event pins; for package-root
          endpoints it must exist in root schema.yaml pins.outputs.events.
        receiver_flow_exists: The `to` flow must exist in the loaded package registry.
        receiver_root_unsupported: Root receiver endpoints are not supported by #1508; `to` must name a loaded receiver flow input pin.
        receiver_input_pin_exists: The `to` pin must exist in the receiver schema input event pins.
        event_alias_or_adapter_valid: Differing local event names or payload keys require an explicit alias/adapter or unambiguous bind-derived alias; raw same-name fallback is not valid for declared imported package pins.
        output_carries_address_key: The producer output pin key/carries declaration must prove the top-level payload key used
          by the receiver instance.by route key, receiver address, or explicit connect.map source. Event payload schema and connect.map are validation inputs,
          not the canonical producer evidence owner; renamed-key adapters are explicit sibling work.
        receiver_route_key_present: Template receivers must resolve a valid instance.by contract for normal same-name
          instance-key routing, or declare an explicit addressed input-pin route surface. Stateful/static receivers that
          need no runtime selection may lower to a statically unique receiver.
        key_types_compatible: Source and target key types must be compatible before route-plan lowering.
        delivery_topology_valid: The declared delivery topology must match addressed input cardinality and available receiver instances.
        reply_lineage_usable: Reply delivery must prove usable request lineage; missing or ambiguous lineage fails closed.
        inference_unambiguous: Analyzer inference is allowed only when exactly one producer, receiver, key, adapter, and topology match is possible.
        lowered_route_plan_concrete: Accepted connections must lower to concrete route-plan inputs; no runtime path may recover by broadcasting or reinterpreting raw pin names.
      route_plan_lowering:
        owner: platform-spec.yaml#flow_model.flow_package.composition_routing.route_plan_lowering
        consumes:
        - parent package.yaml connect entries
        - producer output pin event identity and verified key/carries evidence, including explicit package-root `.pin_name` output endpoints
        - receiver template instance.by / on_missing / on_conflict contracts from WorkflowContractBundle.ResolveFlowTemplateInstance
        - receiver addressed input pin rules
        - import-boundary pin alias bindings
        - explicit adapter/map entries
        produces:
        - semantic producer scope and local output pin identity
        - producer output key/carries evidence on instance-key connect plans
        - semantic receiver scope and local input pin identity
        - receiver instance-key evidence on same-name template receiver connect plans
        - external persisted event identity
        - receiver-local handler event identity
        - 'concrete target route for delivery: one'
        - 'concrete target_set routes for delivery: many or broadcast'
        - 'reply route lineage for delivery: reply'
        - typed failure reason when lowering cannot produce a concrete plan
        delivery_mapping:
          one: Lower to a singular event.target and one delivery row.
          many: Lower to event.target_set and one delivery row per concrete recipient.
          broadcast: Lower to explicit parent-authored fan-out route facts; producer broadcast:true is not required.
          reply: Lower through the recorded request lineage; missing or ambiguous lineage fails closed.
        implementation_slice_1472:
          status: merge_bearing_runtime_artifact
          canonical_code_owner: internal/runtime/core/pinrouting.ConnectRoutePlan
          rule: |
            Runtime lowering of verified parent connect facts is represented by
            a stage-specific typed artifact before EventBus dispatch. The
            artifact MUST consume the verified semantic source facts exposed by
            contracts/semanticview and MUST NOT reconstruct topology from raw
            output pin names, live subscription lists, producer emit.target,
            producer broadcast, or structural ParentRoute.
          artifact_fields:
            package_key: Parent package key that authored the connect entry when available.
            producer_endpoint: Producer semantic flow id/path or package-root marker, output pin name, local output event identity, and scoped resolved event identity.
            receiver_endpoint: Receiver semantic flow id/path/mode, input pin name, local receiver event identity, and scoped resolved event identity.
            adapter_and_map: Explicit adapter plus sorted address-key map entries used for alias/key adaptation.
            delivery: one, many, broadcast, or reply after analyzer/default inference.
            target_kind: target for singular delivery, target_set for fanout/broadcast, reply for reply-lineage delivery.
            resolution_kind: |
              static, address, instance_key, or broadcast; materialization MUST
              consume this discriminant and MUST NOT select route authority from
              nil-field ordering. Explicit addressed-input routes remain
              `address`; explicit parent-authored `delivery: broadcast` remains
              `broadcast` for addressless fan-out and MUST NOT be shadowed by
              producer key/carries or receiver instance.by evidence.
            address_rule: Receiver-owned address key, source expression, target expression, cardinality, and mode when runtime descriptor materialization is required.
            instance_key_rule: Receiver-owned template instance fields, on_missing, and on_conflict when an addressless template receiver is selected by producer key/carries plus receiver instance.by.
            reply_lineage: 'The explicit reply lineage map for delivery: reply.'
            static_target_route: Static receiver flows may lower immediately to a concrete target or single target_set member using the receiver flow path and canonical flow-instance entity id.
            runtime_resolution_flag: Template or dynamic receivers keep an explicit runtime-resolution requirement instead of fabricating concrete delivery rows.
          materialization_boundary:
            static_receivers: Static receivers can materialize target route facts during lowering because the receiver flow path is concrete.
            template_receivers: Template/dynamic receivers may materialize route facts from receiver instance keys plus runtime descriptors, from explicit addressed-input keys and runtime descriptors, or for delivery:broadcast by enumerating receiver-scope descriptors; descriptor materialization remains pre-dispatch route evidence, not delivery execution.
            descriptor_scope: Descriptor materialization MUST reject descriptors whose flow_instance is not the receiver semantic flow path or a child instance under that path before stamping the receiver flow id onto the route.
            supported_descriptor_targets:
            - entity_id / _entity.id
            - flow_instance / instance.flow_instance
            - instance_id / instance.instance_id
            - 'entity.<field> when the receiver entity contract declares that top-level field with indexed: true'
            unsupported_descriptor_targets: Nested entity paths, undeclared or unindexed entity fields, config.<field>, instance.<field>, and other arbitrary business fields remain fail-closed unless a later approved spec+runtime child promotes a typed descriptor/index owner for those forms.
        implementation_slice_1545:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/core/pinrouting.ConnectRoutePlan.ResolutionKind + ConnectRoutePlan.InstanceKey + internal/runtime/bus.connectRoutePlanResolver
          rule: |
            Same-name parent connect into a template receiver MUST lower to an
            explicit ConnectRoutePlan `ResolutionKind: instance_key` decision
            when the receiver input pin is addressless, the producer output pin
            declares `key/carries`, and the receiver resolves `instance.by`
            through WorkflowContractBundle.ResolveFlowTemplateInstance.
            The lowered plan MUST carry producer key/carries evidence and
            receiver instance-key fields separately from the explicit
            addressed-input `Address` descriptor model. If the receiver input
            pin declares `address`, lowering MUST keep `ResolutionKind: address`
            and MUST NOT also select the addressless instance-key route; the
            addressed-input descriptor model remains the canonical owner for
            that explicit addressed surface. If the parent connect declares
            `delivery: broadcast`, lowering MUST keep `ResolutionKind: broadcast`
            for addressless template fan-out and MUST NOT select instance-key
            materialization even when producer key/carries and receiver
            instance.by evidence are present.

            Runtime materialization MUST derive key material from the inbound
            event payload using TemplateInstanceContract.CanonicalKeyMaterial,
            match only receiver-scoped active flow-instance descriptors whose
            entity.<field> address fields equal that key material, and then use
            RouteTable only to locate the concrete receiver carrier for the
            already-selected route identity. Missing key value, no matching
            receiver instance under rejecting policy, ambiguous matching
            descriptors, unsupported evidence shape, or missing receiver carrier
            MUST fail closed with zero executable routes.
          non_authoritative_for_this_slice:
          - receiver input-pin address for the addressless normal instance-key path
          - receiver instance-key materialization for explicit parent-authored broadcast fan-out
          - receiver select_entity/select_or_create_entity
          - producer target.match
          - producer broadcast:true
          - direct delivery
          - connect.map renamed-key adapter
          - raw/live subscribers before selected target identity
          - handler lookup before selected target identity
          - delivery rows, replay rows, or readback rows as route producers
          split_or_adjacent:
            renamed_key_adapters: '#1546'
            select_entity_demote_warn_error: '#1547'
            replay_fork_idempotency_beyond_delivery_row_readback: '#1550'
            explicit_addressed_input_descriptor_routing: '#1479'
          failure_reasons:
          - source_missing
          - connect_pin_ref_invalid
          - producer_flow_missing
          - producer_output_pin_missing
          - receiver_root_unsupported
          - receiver_flow_missing
          - receiver_input_pin_missing
          - receiver_address_rule_missing
          - delivery_topology_invalid
          - reply_lineage_missing
          - route_plan_address_value_missing
          - route_plan_target_unsupported
          - route_plan_target_unresolved
          - route_plan_target_ambiguous
          stage_boundary:
            produces: Typed lowered connect route artifacts and optional descriptor-materialized target/target_set facts.
            does_not_produce:
            - EventBus dispatch
            - RouteTable publish consumption
            - event_deliveries rows
            - receipts
            - replay-scope rows
            - recovery or retry work
            - agent/node delivery parity
            - producer target/broadcast retirement
        implementation_slice_1577:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/bus.TemplateInstanceLifecycleDecision + internal/runtime/bus.templateInstanceLifecycleOwner
          rule: |
            `on_missing` and `on_conflict` on addressless template receivers are
            consumed by the connect-time template lifecycle owner, not by
            descriptor lookup alone. The owner first derives ordered key
            material with TemplateInstanceContract.CanonicalKeyMaterial from
            ConnectRoutePlan.InstanceKey and producer key/carries evidence. It
            then selects exactly one receiver-scoped active descriptor, creates
            one deterministic receiver flow instance, or fails closed.

            Created instance identity is deterministic: receiver semantic flow
            id plus ordered field/value key material is hashed into the stored
            template instance id. The created flow instance persists the key
            fields as receiver primary-entity fields and config variables, with
            entity_type, instance_kind, last_source_event, and parent-route
            control metadata carried by activation. Route installation must use
            the same activation context so stores that expose a publish mutation
            persist the instance row, entity_state row, route row, event row,
            delivery rows, and committed replay scope in one semantic mutation.

            `on_missing: reject` means no create attempt and no lower-precedence
            rescue. `on_missing: create` with `on_conflict: reuse` reuses the
            exact existing matching receiver instance and treats duplicate
            retry of the same key decision as reuse after the descriptor exists.
            `on_missing: create` with `on_conflict: reject` rejects an exact
            pre-existing match as `route_plan_instance_conflict`; event-id and
            store idempotency remain responsible for retrying the same already
            committed publish. Ambiguous matches, non-matching descriptors,
            missing activator, missing key values, missing receiver carrier,
            unsupported adapter evidence, delivery rows, replay/readback rows,
            RouteTable lookup before selected identity, live subscribers,
            handler lookup, direct delivery, producer target, producer
            broadcast:true, receiver select_entity/select_or_create_entity, and
            explicit create_flow_instance are not lifecycle authority.
        implementation_slice_1835:
          status: spec_locked_create_select_select_or_create_and_fan_in_stream_modes_runnable_remaining_modes_fail_closed
          canonical_spec_owner: platform-spec.yaml#flow_model.flow_package.composition_routing.route_plan_lowering.implementation_slice_1835
          canonical_code_owner: internal/runtime/contracts.FlowInputPinResolution + internal/runtime/core/pinrouting.ConnectRoutePlan.InstanceKey/FanIn + internal/runtime/bus.templateInstanceLifecycleOwner/connectRoutePlanResolver + internal/runtime/engine.AccumulateSpec + internal/runtime/bootverify.composition_connect_validation
          rule: |
            Receiver input pins may declare an explicit instance-resolution
            contract under `resolution:{mode,...}`. This receiver-side contract
            is the canonical authoring owner for new instance routing semantics;
            route planning consumes it as typed contract data and lowers it into
            ConnectRoutePlan evidence before EventBus delivery. Runtime must not
            infer resolution authority from producer emit targets, live
            subscribers, delivery rows, replay rows, route-table lookup before a
            selected target, or handler lookup.

            PR1 spec-locks every approved mode and makes
            `resolution.mode: create` runnable. PR2 makes
            `resolution.mode: select` runnable for a single declared carried
            key. PR3 makes `resolution.mode: select-or-create` runnable for
            the same single declared carried-key boundary, with lifecycle/store
            convergence on exactly one receiver instance for concurrent same-key
            missing deliveries. PR4 makes `resolution.mode: fan-in` runnable
            only for `aggregation: stream` / bounded windowed delivery into an
            explicit singleton/coordinator receiver. All other locked modes and
            fan-in barrier semantics are recognized by contracts and verifier
            and fail closed as
            design-locked/not-runnable until their implementation slices land.
            Static root ingress, parent-connect static delivery, and
            harness-injected inputs remain existing #1807 input-source /
            connect behavior; they are not instance-resolution runtime modes.
          authoring_shape: |
            pins:
              inputs:
                events:
                  - name: validation_requested
                    event: validation.requested
                    resolution:
                      mode: create
                      instance_key:
                        mint: uuid
                        as: validation_case_id
                    carries:
                      validation_case_id:
                        from: instance.key.validation_case_id
                        type: uuid
          modes:
            create:
              status: runnable_in_1835_pr1
              contract: >
                `mode: create` mints the receiver template instance key at the
                boundary, carries that key as `instance.key.<as>`, creates the
                receiver instance if absent, and reuses the same keyed instance
                on replay or duplicate delivery. The receiver flow MUST be
                `mode: template`, MUST have a single `instance.by` field in this
                slice, and `instance_key.as` MUST equal that field. The input pin
                MUST declare a matching `carries.<field>.from:
                instance.key.<field>` entry so downstream route rendering and
                lifecycle activation consume the same canonical key material.
              mint:
                uuid: >
                  Deterministically mints a UUID-shaped instance key from the
                  source event id plus receiver flow, receiver pin, and
                  `instance_key.as`. It is replay-stable: the same committed
                  event resolves to the same receiver instance and does not
                  create another instance.
                event_id: >
                  Carries the source event id directly as the receiver instance
                  key. The source event id must be present and non-empty.
              runtime_policy: >
                The lowered plan internally uses create/reuse lifecycle
                semantics for this new resolution surface. Legacy
                `instance.on_missing/on_conflict` remains authoritative only for
                legacy addressless template instance-key composition; it does
                not override `resolution.mode:create`.
              fail_closed:
              - missing, empty, or unsupported mint
              - missing instance_key.as
              - instance_key.as not matching the receiver single instance.by
              - missing carries.<as>.from: instance.key.<as>
              - type-incompatible carried key
              - combined legacy input address
              - combined connect.using.instance or connect.map
              - delivery topology other than one
              - unavailable template lifecycle activator
            select:
              status: runnable_in_1835_pr2
              contract: >
                Select routes to exactly one existing receiver template
                instance by a declared carried key. The input pin declares the
                seam identity once under `carries.<field>`, and
                `resolution.instance_key` MUST name that carried field. In this
                slice the receiver flow MUST be `mode: template`, MUST have a
                single `instance.by` field, and that field MUST equal
                `resolution.instance_key`. The carry MUST use `from:
                payload.<field>` and may declare a type compatible with the
                receiver `entity.<field>`. The lowered route plan records
                `Mode: select`, the single field mapping, runtime descriptor
                resolution, and reject/reject lifecycle policy. Missing or
                ambiguous target is invalid; this mode never creates an
                instance and receiver legacy `on_missing:create` does not
                override select semantics. Target-failure diagnostics MUST name
                the receiver flow, key field, key value when available, and an
                imperative remediation.
              fail_closed:
              - missing or empty instance_key
              - instance_key not naming declared carries.<field>
              - receiver not mode: template
              - receiver instance.by missing, composite, or not equal to instance_key
              - carry source not payload.<field>
              - type-incompatible carried key
              - combined legacy input address
              - combined connect.using.instance or connect.map
              - delivery topology other than one
              - missing target instance
              - ambiguous target instance
              - any activation attempt for a missing target
            select-or-create:
              status: runnable_in_1835_pr3
              contract: >
                Select-or-create routes to exactly one existing receiver
                template instance by a declared carried key, or creates exactly
                one receiver instance when no exact match exists. The authoring
                contract is the same single-field carried-key boundary as
                `select`: `carries.<field>` declares the seam identity once,
                `resolution.instance_key` MUST name that carry, the receiver
                flow MUST be `mode: template`, and its single `instance.by`
                field MUST equal the key. The lowered route plan records
                `Mode: select-or-create`, explicit field mapping, runtime
                descriptor resolution, and create/reuse lifecycle policy.
                Missing targets create through the canonical template lifecycle
                owner; exact existing matches reuse; ambiguous matches fail
                closed. Concurrent deliveries for the same missing key MUST
                converge on one receiver instance or fail closed without
                duplicating the receiver key.
              fail_closed:
              - missing or empty instance_key
              - instance_key not naming declared carries.<field>
              - receiver not mode: template
              - receiver instance.by missing, composite, or not equal to instance_key
              - carry source not payload.<field>
              - type-incompatible carried key
              - combined legacy input address
              - combined connect.using.instance or connect.map
              - delivery topology other than one
              - ambiguous target instance
              - unavailable template lifecycle activator
              - activation/create race that cannot reload exactly one matching instance
            fan-in:
              status: stream_windowed_runnable_in_1835_pr4_barrier_fail_closed
              contract: >
                Fan-in routes many source deliveries into one receiver instance
                or aggregation context. `aggregation: stream|barrier` is the
                locked sub-semantics selector. Stream delivers each accepted
                event into the receiver context; barrier waits for the declared
                close condition/window before releasing an aggregate result.
                In the PR4 runnable subset, only `aggregation: stream` is
                executable. The receiver input pin MUST declare `window`,
                `dedup_by`, and `singleton`. `singleton` is the explicit
                receiver route path for the singleton/coordinator instance and
                MUST be the receiver route or a child of the receiver route; it
                is never inferred from the sender/source instance. `dedup_by`
                is required and may be only `event.id` or one top-level
                `payload.<field>` in this slice; tuple/composite dedup remains
                fail-closed until evidence requires it. `window` is required and
                must be one top-level payload field. The route plan reuses
                singular target delivery and carries fan-in metadata for proof;
                it MUST NOT introduce a new fan-in target kind. The receiver
                input pin is the only authoring owner for fan-in `dedup_by` and
                `window` semantics. The receiving handler accumulator declares
                only the accumulator target/source; handler redeclaration of
                `accumulate.dedup_by` or `accumulate.window` for a fan-in input
                is invalid. Runtime derives the effective accumulator
                dedup/window from the matched receiver input pin, and the
                accumulate kernel enforces idempotency and window partitioning
                from those derived values. EventBus/delivery MUST NOT add an
                independent fan-in dedup/window owner.
              fail_closed:
              - aggregation other than stream, including barrier
              - missing or empty singleton
              - singleton outside the receiver route path
              - missing or empty window
              - window not naming one top-level payload field
              - missing or empty dedup_by
              - dedup_by list/tuple/composite beyond one field
              - dedup_by other than event.id or one top-level payload field
              - receiver not mode: singleton/coordinator
              - missing receiver handler for the input event
              - receiver handler missing accumulate
              - receiver handler redeclares accumulate.dedup_by for fan-in
              - receiver handler redeclares accumulate.window for fan-in
              - combined legacy input address
              - combined connect.using.instance or connect.map
              - delivery topology other than one
              - producer target.flow / target.match / broadcast rescue
            fan-out:
              status: spec_locked_not_runnable_in_1835_pr1
              contract: >
                Fan-out routes one input event to a concrete set of receiver
                instances selected by the route plan. Producer-authored
                `target:{flow,match}` and broadcast rescue remain invalid for
                common package topology; the route plan owns target-set
                materialization.
            reply:
              status: spec_locked_not_runnable_in_1835_pr1
              contract: >
                Reply routes a response back to the originating request
                instance. By default the platform mints and threads origin
                instance identity plus request correlation from stable request
                event identity. An explicit correlation override is reserved for
                provider-supplied request/idempotency ids.
          legacy_same_concept_seams:
            non_authoritative_for_new_resolution_surface:
            - flow.instance.by/on_missing/on_conflict as authoring shorthand for `resolution`
            - TemplateInstanceContract as a standalone resolution authoring surface
            - connect.using.instance for receiver-declared `resolution`
            - route planning reconstructed from producer output key/carries when `resolution` is declared
            - templateInstanceLifecycleOwner as a separate syntax interpreter
            - create_flow_instance action syntax
            - select_entity / select_or_create_entity
            - producer target.flow / target.match / broadcast:true
            migration_note: >
              These seams remain only as legacy or adjacent owners until #1738
              and #1827 retire old routing mechanisms after the new resolution
              model is proven. They may be consumed as implementation substrate
              when explicitly named here, but they do not own the new
              `resolution:{mode,...}` semantics.
          proof_obligations:
          - contracts decode every locked mode and reject unknown resolution fields fail-closed
          - bootverify accepts valid create/select/select-or-create/fan-in stream resolution and rejects other non-runnable modes as not runnable in this slice
          - route-plan lowering records create mode, mint kind, carried `as` field, create/reuse lifecycle policy, and does not require producer output key/carries
          - EventBus publish/preflight creates a missing receiver instance through the canonical lifecycle path
          - downstream receiver routes can render the carried minted instance key from activation variables
          - same committed event replay reuses persisted delivery route/scope and does not create another receiver instance
          - route-plan lowering records select mode, declared carried key mapping, runtime descriptor resolution, and reject/reject lifecycle policy
          - EventBus publish/preflight for select routes to exactly one existing receiver instance
          - missing/ambiguous select target failures fail closed with receiver/key/value/remediation detail and no activation
          - same committed select event replay reuses persisted delivery route/scope and does not reselect after descriptor drift
          - standalone #1828 `template-select-existing` conformance fixture verifies and materializes through the canonical select route plan
          - route-plan lowering records select-or-create mode, declared carried key mapping, runtime descriptor resolution, and create/reuse lifecycle policy
          - EventBus publish/preflight for select-or-create reuses exactly one existing receiver instance
          - EventBus publish/preflight for select-or-create creates exactly one missing receiver instance through the canonical lifecycle path
          - concurrent same-key select-or-create deliveries converge on one receiver instance or fail closed without duplicate key ownership
          - ambiguous select-or-create target failures fail closed with receiver/key/value/remediation detail and no activation
          - same committed select-or-create event replay reuses persisted delivery route/scope and does not reselect or recreate after descriptor drift
          - standalone #1828 `template-select-or-create` conformance fixture verifies and materializes through the canonical select-or-create route plan
          - route-plan lowering records fan-in stream metadata, required singleton/window/dedup_by, singular target delivery, and no new target kind
          - bootverify rejects fan-in receiver handler redeclaration of accumulate.dedup_by or accumulate.window
          - EventBus publish/preflight for fan-in stream routes multiple source contributions to the same explicit singleton/coordinator receiver route
          - executor derives effective fan-in accumulator dedup/window from the matched receiver input pin, with no handler-local redeclaration
          - receiver accumulator kernel enforces pin-declared dedup_by idempotency and partitions arrivals by pin-declared window
          - same committed fan-in stream event replay reuses persisted delivery route/scope and does not re-infer receiver identity from sender/source state
          - standalone #1828 `template-fan-in` conformance fixture verifies and materializes through the canonical fan-in stream route plan
        implementation_slice_1546:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/core/pinrouting.ConnectRoutePlan.InstanceKey.Mappings + internal/runtime/bus.connectRoutePlanResolver
          rule: |
            Renamed parent connect into an addressless template receiver MUST
            lower `connect.using.instance.source` /
            `connect.using.instance.target` adapter evidence
            into explicit ConnectRoutePlan instance-key mappings. Runtime
            materialization MUST read key values from the mapped producer source
            payload fields and stamp them under the receiver canonical
            `instance.by` target fields before matching receiver-scoped
            descriptors and producing delivery routes. Same-name key/carries
            routes remain valid without adapter noise. Renamed routes without
            adapter evidence, incomplete/ambiguous adapter shapes, unsupported
            declaration surfaces, or missing source payload values fail closed
            with zero executable routes and no raw subscriber fallback.

            `connect.map` remains the explicit addressed-input map concept and
            is not instance-key adapter authority for addressless template
            receivers. No legacy map, receiver address rule, producer target,
            broadcast:true, RouteTable lookup, delivery row, replay row, or
            readback row may repair a missing or invalid instance-key adapter.
          consumes:
          - FlowPackageConnect.Using.Instance source/target adapter evidence
          - producer output pin key/carries evidence
          - receiver template instance.by fields
          - matched inbound event payload source fields
          - receiver-scoped active flow-instance descriptors
          produces:
          - ConnectRoutePlan.InstanceKey.Mappings for scalar and composite renamed keys
          - route_plan_instance_key_adapter_invalid for unsupported adapter declarations
          - route_plan_address_value_missing when mapped source payload values are missing
          non_authoritative_for_this_slice:
          - connect.map as addressless template instance-key adapter authority
          - receiver input-pin address rules for this addressless instance-key adapter class
          - receiver select_entity/select_or_create_entity
          - producer target.match
          - producer broadcast:true
          - direct delivery
          - raw/live subscribers before selected target identity
          - handler lookup before selected target identity
          - delivery rows, replay rows, or readback rows as route producers
          split_or_adjacent:
            same_name_instance_key_route_planning: '#1545'
            select_entity_demote_warn_error: '#1547'
            explicit_addressed_input_descriptor_routing: '#1479'
          failure_reasons:
          - connect_key_adapter_missing_source
          - connect_key_adapter_missing_target
          - connect_key_adapter_cardinality
          - connect_key_adapter_duplicate_source
          - connect_key_adapter_duplicate_target
          - connect_key_adapter_source_missing
          - connect_key_adapter_target_missing
          - connect_key_adapter_partial
          - key_types_incompatible
          - route_plan_instance_key_adapter_invalid
          - route_plan_address_value_missing
        implementation_slice_1473:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/bus.RoutePlan via deliveryPlanner.Plan and connectRoutePlanResolver
          rule: |
            Supported EventBus publish/preflight/outbox dispatch consumes lowered ConnectRoutePlan artifacts as the
            publish-time route authority. A matched lowered plan replaces lower-precedence RouteTable/live-subscriber/raw-name
            inference, legacy recipient-policy/descriptor evaluation, and recipient-plan materialization for the publish
            operation. Singular, fanout, and reply plans materialize into typed RoutePlan delivery intents before persistence;
            matching lowered-plan failures hard-cut legacy fallback delivery and cannot be repaired by later materializer hooks.
          consumes:
          - implementation_slice_1472 typed ConnectRoutePlan artifacts
          - supported descriptor materialization targets from implementation_slice_1472
          - RouteTable concrete receiver subscribers only after target route identity selection
          produces:
          - persisted event_deliveries delivery_target_route rows for supported connected outputs
          - pipeline receipt settlement through normal EventBus delivery consumers
          - committed replay-scope rows separate from executable delivery rows
          - fail-closed target diagnostics for unsupported or invalid lowered route plans
          proof_obligations:
          - Publish, PublishInMutation, CheckPublishRecipientPlan, and engineOutbox use the same corrected planner
          - singular target, target_set fanout, and reply metadata are covered
          - unsupported or unindexed business-field descriptor targets remain fail-closed and split to #1466 or later gated children
          - '#1473 does not close #1474, #1475, selected-contract runfork readiness, or #1466 parent closure'
        implementation_slice_1474:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/bus.RoutePlan via CheckPublishRecipientPlan and Publish, consumed by internal/runtime/tools.Executor.handleEmitTool
          rule: |
            Generated agent emit tools for pin-declared output events MUST NOT
            reject connected output-pin emits before EventBus can evaluate the
            lowered parent-connect RoutePlan authority. The tool may preflight
            EventBus planning only to distinguish canonical lowered-route
            decisions from lower-precedence subscriber/materializer fallback:
            canonical matched plans are admitted to Publish; canonical
            fail-closed plans fail before publish with zero executable routes;
            lower-precedence or no-canonical plans continue through retained
            explicit target, structural ParentRoute, static child delivery-entity,
            and broadcast escape handling. Node/system emits remain consumers of
            the same RoutePlan authority through engine outbox/dispatcher paths.
          consumes:
          - implementation_slice_1473 EventBus RoutePlan publish authority
          - implementation_slice_1472 lowered ConnectRoutePlan artifacts
          - agent sender/source route context from generated emit tool execution
          produces:
          - no-relay generated-agent delivery for supported connected output pins
          - node/system output-pin parity through the same persisted RoutePlan sink
          - fail-closed unresolved connected output pins with no raw subscriber fallback
          does_not_close:
          - '#1475 producer target/broadcast retirement'
          - '#1466 composition-first parent closure'
          - '#1444 static verifier coverage, later closed by static_analyzer.slice_3a_pin_target_resolution.implementation_slice_1444'
        implementation_slice_1475:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/core/pinrouting.ProducerRouteCommonPathFailure consumed by internal/runtime/bootverify and runtime pin-route resolution
          rule: |
            Producer-authored emit.target and broadcast:true are retained as
            explicit escape-hatch syntax, but they are not valid common-path
            composition routing for loaded package receiver inputs from loaded
            flow-scope producers. If a pin-declared flow output targets a
            loaded receiver flow input for the same event with target.flow/match,
            targets a loaded receiver flow reached by the parent connect graph
            for that output pin, or broadcasts to loaded package receiver inputs
            for the same event or connected output pin, verification and runtime
            resolution MUST fail closed with a typed reason. Adding a parent
            connect, including an alias/adapter connect, does not grandfather
            the producer target/broadcast writer; the producer route must be
            removed or proven to be a different escape hatch. Parent connect
            remains the topology owner and EventBus RoutePlan remains the
            concrete delivery authority. Root-level producer target/broadcast composition
            is closed separately by implementation_slice_1508 when an explicit root connect
            endpoint consumes the package-root output pin.
          consumes:
          - loaded flow-scope producer output pin event identity
          - authored emit target/broadcast syntax
          - loaded package receiver input pins and parent connect graph edges, including alias/adapter connects
          - parent composition route-authority contract from #1466
          produces:
          - producer_target_common_path_forbidden for loaded flow-scope target.flow/match common-path composition
          - producer_broadcast_common_path_forbidden for loaded flow-scope broadcast:true common-path composition
          - preserved sender, explicit instance_id, genuine dynamic flow/match, target_set, and external/no-receiver broadcast escape hatches
          proof_obligations:
          - bootverify rejects loaded flow-scope target.flow/match and broadcast:true when used as package-internal composition routing
          - runtime pin-route resolution rejects the same stale producer route before it can populate event.target or event.target_set
          - explicit sender, instance_id, genuine dynamic flow/match/allow_fanout, target_set, and external/no-receiver broadcast remain supported escape hatches
          - connected agent/node output pins continue through EventBus RoutePlan without relay nodes or producer target/broadcast
          does_not_close:
          - '#1466 composition-first parent closure'
        implementation_slice_1508:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/contracts.FlowPackageConnect plus internal/runtime/core/pinrouting.ConnectRoutePlan and ProducerRouteCommonPathFailure
          rule: |
            Parent connect may name a package-root producer output pin with
            `from: .{root_output_pin_name}`. That root endpoint is a first-class
            source-authority fact: contracts parsing, semanticview connect lookups,
            bootverify composition validation, pin target resolution, EventBus
            lowered ConnectRoutePlan consumption, and delivery persistence MUST all
            consume the same explicit connect owner. A package-root producer emit
            target.flow/match or broadcast:true is invalid common-path topology when
            an explicit root connect consumes that output pin and routes to the
            same loaded receiver flow. Runtime must fail closed before producer
            target/broadcast can repair or override the canonical root connect
            decision. Root receiver endpoints are not supported in this slice and
            fail closed as receiver_root_unsupported.
          root_endpoint_syntax:
            producer: '`.{root_output_pin_name}` in connect.from names root schema.yaml pins.outputs.events only.'
            receiver: 'Unsupported in #1508; connect.to must name `{receiver_flow_id}.{input_pin_name}`.'
          consumes:
          - root schema.yaml pins.outputs.events
          - parent package.yaml connect.from `.{root_output_pin_name}` entries
          - receiver flow input pin declarations and addressed-input route-plan lowering
          - root producer authored emit target/broadcast syntax
          produces:
          - typed root ConnectRoutePlan producer endpoints
          - producer_target_common_path_forbidden for root target.flow/match common-path composition where root connect authority applies
          - producer_broadcast_common_path_forbidden for root broadcast:true common-path composition where root connect authority applies
          - receiver_root_unsupported for attempted root connect receivers
          proof_obligations:
          - semanticview exposes root connect facts through CompositionConnectsFrom("", pin)
          - bootverify accepts root outputs with root connect and no producer target/broadcast
          - bootverify rejects root producer target.flow/match and broadcast:true when root connect authority applies
          - EventBus persists delivery rows and subscribed replay scope from lowered root ConnectRoutePlan authority
          - existing loaded flow-scope connect/target/broadcast regressions remain covered
          does_not_close:
          - '#1479 business-field descriptor/index materialization'
          - '#1450 broader package policy/grants/final e2e work'
          - 'root connect receiver semantics'
          - '#1474 already closed generated agent/node EventBus RoutePlan consumption'
          - '#1479 already closed declared indexed business-field descriptor materialization'
        implementation_slice_1485:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/bus.connectRoutePlanResolver with connectReceiverCarrierRouteKeys
          rule: |
            Lower-precedence route interpreters are separated from matched
            lowered-connect RoutePlan authority. RouteTable may locate concrete
            receiver carriers only after the lowered plan has selected a
            receiver target identity; source endpoint keys, raw producer event
            names, live subscriber fallback, and legacy route/subscriber
            interpretations are not carrier lookup inputs for a matched lowered
            plan. Descriptor loading in the EventBus connect resolver is
            limited to matched plans whose supported target form requires
            runtime descriptor evidence. Static and template lowered-connect
            receiver subscribers for concrete flow input events materialize
            receiver carrier evidence at the selected receiver path rather than
            relying on producer-key subscription projection.
          does_not_close:
          - arbitrary business-field descriptor/index support outside declared indexed receiver entity fields
          - selected-contract runfork route/readiness mutation
          - broad composition-first routing parent closure
          proof_obligations:
          - matched connect receiver carrier lookup excludes source/raw fallback keys
          - static and template lowered-connect receiver input subscribers materialize selected receiver-carrier keys
          - static matched connect plans do not load descriptors
          - descriptor-backed matched connect plans load only supported descriptor evidence
          - Publish, PublishInMutation, CheckPublishRecipientPlan, and engineOutbox preserve the corrected RoutePlan path where relevant
        implementation_slice_1496:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/bus.RoutePlan via deliveryPlanner.Plan, deliveryPlanner.PlanDirect, EventBus.PublishDirect, and EventBus.CheckDirectRecipients
          rule: |
            Subscribed publish planning, direct publish planning, recipient-plan
            materialization, authorization guards, engine outbox, operator replay
            direct publish, and direct-recipient preflight consume RoutePlan
            directly. The legacy eventDeliveryPlan compatibility adapter and
            CanonicalRoutePlan fallback are invalid old authority paths and
            must not reappear as live runtime producers or readers.
            Direct-recipient public behavior remains explicit direct-delivery
            semantics backed by PlanDirect RoutePlan production, not subscribed
            route-authority reconstruction.
          does_not_close:
          - arbitrary business-field descriptor/index support outside declared indexed receiver entity fields
          - selected-contract runfork route/readiness mutation
          - broad composition-first routing parent closure
          proof_obligations:
          - production bus files contain no eventDeliveryPlan compatibility adapter, CanonicalRoutePlan fallback, or routePlanFromLegacyEventDeliveryPlan interpreter
          - deliveryPlanner.Plan and deliveryPlanner.PlanDirect return RoutePlan directly
          - Publish, PublishInMutation, CheckPublishRecipientPlan, and engineOutbox preserve RoutePlan authority after materialization and guard checks
          - PublishDirect and CheckDirectRecipients preserve direct RoutePlan behavior and CommittedReplayScopeDirect persistence
          - operator event.replay proves direct-recipient preflight and direct publish through the same RoutePlan-backed path
        implementation_slice_1479:
          status: merge_bearing_runtime_behavior
          canonical_code_owner: internal/runtime/core/pinrouting.MaterializeConnectRoutePlan with internal/runtime/bus.connectRoutePlanResolver
          rule: |
            Supported receiver business-field descriptor/index materialization is
            limited to addressed input targets whose receiver entity contract
            declares the top-level target field with `indexed: true`.
            Bootverify MUST reject unsupported, nested, or unindexed
            non-identity targets before runtime.
            Runtime planning MUST pass the supported target list from the
            loaded semantic source into `MaterializeConnectRoutePlan`; the
            materializer MUST compare event source values only with descriptor
            evidence for those supported targets. Runtime descriptor loaders
            MUST omit run-scoped entity address fields when no run id is
            available rather than selecting entity state across runs. Singular
            cardinality produces exactly one concrete target route; cardinality
            many produces a target_set/fanout over all matching receiver-scope descriptors.
            Missing source values, no matches, ambiguous cardinality-one
            matches, unsupported/unindexed/nested targets, and wrong receiver
            scope fail closed with zero executable routes.
          consumes:
          - receiver addressed input pin address.target
          - parent connect map target expression
          - receiver entity contract top-level field indexed: true
          - active flow-instance descriptor address fields loaded from current run entity_state
          - lowered ConnectRoutePlan runtime-resolution requirements
          produces:
          - concrete target route for supported singular business-field receiver selection
          - concrete target_set routes for supported many business-field receiver selection
          - fail-closed target diagnostics for unsupported, missing, unresolved, ambiguous, or wrong-scope descriptor evidence
          does_not_close:
          - arbitrary config.<field> or instance.<field> descriptor/index authority
          - nested entity path descriptor/index authority
          - dynamic indexing of arbitrary payload/entity fields
          - select_entity/select_or_create_entity receiver-local mutation semantics
          - selected-contract runfork route/readiness mutation
          - broad #1466 composition-first routing parent closure
          proof_obligations:
          - bootverify rejects unindexed receiver business-field address targets
          - EventBus publish proves indexed singular entity business-field target materializes one concrete delivery route
          - EventBus publish proves indexed many entity business-field target materializes target_set fanout
          - negative proof covers missing source, no match, ambiguous one, unsupported/unindexed, and wrong receiver scope with zero executable routes
          - SQLite and Postgres active descriptor loading preserve run-scoped indexed entity address fields
        invalid_outputs:
        - raw same-name pin match used as final topology authority
        - live subscription list used to invent missing connect topology
        - producer emit.target used as common parent-composed routing owner
        - select_entity used to repair an in-topology broadcast
      pin_alias_delivery_composition:
        rule: >
          Import-boundary `requires`/`bind` pin aliases from #1452 are lower-level name-adaptation inputs to connect
          lowering. They may rename the parent-facing input/output pin, but they do not rewrite source event identity,
          replay scope, target metadata, broadcast semantics, correlation, cardinality, or delivery topology.
        owner_consumed: platform-spec.yaml#flow_model.flow_package.import_boundary.pin_alias_delivery
      emit_target_escape_hatch:
        role: >
          `emit.target` remains the only producer-authored dynamic routing escape hatch. It is valid for cases where the
          producer genuinely knows a runtime recipient that parent connect cannot statically express. It is not a
          compatibility path for missing parent connect entries, missing addressed input pins, or ambiguous topology.
        limits:
        - Must use the target forms defined by handler_specification.handler_fields.emit and engine.cross_flow_routing.target_forms.
        - Must fail closed for malformed, unreachable, ambiguous, or unauthorized targets.
        - Must not satisfy parent connect requirements for imported package public pins.
        - Must not be introduced as a producer route-default surface.
      split_boundaries:
        runtime_route_consumption: '#1473 closes supported EventBus publish/preflight/outbox consumption of lowered ConnectRoutePlan artifacts only; selected-contract runfork readiness, full agent/node parity, and parent #1466 closure remain separate tracked work. Loaded flow-scope producer target/broadcast common-path retirement is closed by #1475.'
        parser_model_support: Parser/model support beyond source-authority fixtures is follow-up unless an implementation gate explicitly widens.
        policy_credential_resolution: '#1453 remains separate.'
        wildcard_scoping: '#1454 remains separate.'
        final_e2e_package_proof: '#1455 proof lives in internal/runtime/bus/sealed_flow_package_fixture_test.go and internal/runtime/conformance/sealed_flow_package_conformance_test.go.'
        route_explain_describe: '#1442 tooling remains separate.'
        agent_output_pin_static_verify: '#1444 closes static bootverify coverage for agent emit_events under composition-first route authority; runtime generated-agent route-plan admission closed by #1474.'
  nesting:
    description: 'Flows nest recursively. A flow''s package.yaml declares child flows in its flows: list. Each child is a
      directory under flows/ with the same structure. There is no depth limit. The platform discovers flows by walking the
      tree from the root.'
    discovery_algorithm: '1. Read package.yaml in the current directory. 2. Register this flow (its nodes, events, agents,
      schema, etc.). 3. For each entry in flows: list, resolve the child directory under flows/. 4. Recurse: read the child''s
      package.yaml and repeat from step 1. 5. Stop when a flow has no flows: list or the directory doesn''t exist.'
    root_flow: The root flow is the entry point. It has flow-level agents, nodes, events, policy. It declares the top-level
      child flows. It is structurally identical to any other flow.
    example: "\nmy-project/                       # root flow\n  package.yaml                   # name: my-project, flows: [intake,\
      \ processing, ...]\n  nodes.yaml                     # dashboard-node\n  events.yaml                    # cross-flow events\
      \  \n  agents.yaml                    # root-level agents\n  schema.yaml                   # root flow pins\n  flows/\n\
      \    intake/                      # child flow\n      package.yaml               # name: intake, flows: [] (leaf)\n\
      \      nodes.yaml\n      events.yaml\n      schema.yaml\n      agents.yaml\n      prompts/\n    processing/        \
      \          # child flow with sub-flows\n      package.yaml               # name: processing, flows: [review, fulfillment,\
      \ ...]\n      nodes.yaml                 # gate orchestrator\n      schema.yaml\n      flows/\n        review/   \
      \                # grandchild flow\n          package.yaml\n          nodes.yaml\n          agents.yaml\n          prompts/\n\
      \        fulfillment/\n          ...\n"
  pins:
    description: Flows have typed input/output pins, like IC chips in a circuit. The platform validates pin wiring at boot.
    input_event_pins:
      description: Events the flow subscribes to through its public receiver interface. Required pins must be wired by parent
        connect, input pin source:external, explicit harness injection, platform source, or internal topology producer proof.
      required: true
    output_event_pins:
      description: Events the flow emits across its public interface. Optional, but when an emit site emits one of these
        events, pin routing is active and routing must be supplied by parent connect lowering, explicit dynamic target escape
        hatch, structural ParentRoute fallback when no lowered connect route applies, an eligible static child delivery-entity
        route, or explicit broadcast escape hatch. Structured output pins may declare `key` and `carries`; for connected
        instance-key composition these fields are the canonical producer-side evidence that the output event carries the
        payload key material consumed by parent `connect`.
      required: false
    input_data_pins:
      description: Entity fields the flow reads. Required pins must be written by a prior flow or initial data.
      required_configurable: true
    output_data_pins:
      description: Entity fields the flow writes. Always written. No two flows may write the same field.
      conflict_rule: Two flows writing the same field is a boot error (short circuit).
    internal_events_convention: Schema pins declare the flow's EXTERNAL interface only. Internal agent-to-agent events within
      a flow (e.g., spec.requested between two agents in the same flow) exist in events.yaml but are NOT listed in schema
      pins. They are implementation details, not part of the flow's public contract. Only events that cross flow boundaries
      or trigger/complete the flow appear in pins.
    routing_authority: Output event pins are the activation switch for source/target pin routing. Input event pins define
      the allowed receiving interface and any receiver address resolution. Parent package connect entries own common
      inter-flow topology. Runtime implementation and flow migration must consume flow_model.flow_package.composition_routing
      and engine.cross_flow_routing as the authoritative source for composed route semantics.
  required_agents:
    description: 'Each flow has effective required-agent facts. If schema.required_agents is omitted, the platform derives
      those facts from same-scope agents.yaml map keys plus subscriptions and emit_events. If schema.required_agents is
      present, each entry is an explicit agent role socket that the root flow or implementation must fill. Presence,
      including an empty list, disables inference for that scope.'
    schema_field: required_agents
    entry_format:
      role: Name of the required role
      subscribes_to: Events the agent must subscribe to
      emits: Events the agent must emit
      description: What the agent does in this flow
    fulfillment: 'For explicit required_agents, an agent fulfills a role if BOTH conditions hold: (1) the agent YAML map
      key in agents.yaml matches the role name in required_agents (canonical identity binding), AND (2) the agent''s
      subscriptions include all required subscribes_to events and its emit_events include all required emits. Inferred
      facts are generated from the same agents.yaml facts and then consumed by bootverify/runtime as the canonical effective
      required-agent view. Identity binding is by map key; behavioral fulfillment is by subscription/emit coverage.'
  schema_merging:
    description: When a root flow installs multiple flows, the platform merges their schemas. All output data pins become
      entity table columns. Input data pins are validated against available outputs. Two flows writing the same field is a
      conflict (boot error).
  cross_flow_events:
    rule: An event schema is defined ONCE, in the flow that emits it. Consuming flows reference it by absolute path — they
      do NOT redefine the schema. If both flows need the schema for validation, the consuming flow imports it by reference,
      not by copy.
    enforcement: At boot, if the same event name appears in multiple flow event files, the platform logs a warning. The emitter
      flow's definition is authoritative.
  stateless_flows:
    description: 'Some flows are stateless producers — they process events without tracking entity lifecycle. A signal-processing
      flow is an example: it receives inputs, filters them, and emits results without maintaining per-entity state.'
    schema_for_stateless: 'A stateless flow still has schema.yaml but may set initial_state: null and states: []. Events pass
      through system nodes which accumulate, filter, and emit — but no entity state machine is maintained. The accumulator
      state is flow-scoped, not entity-scoped.'
    when_to_use: Producer pipelines, ETL flows, signal processing, fan-out dispatchers.
    entity_behavior: 'In a stateless flow (initial_state: null, states: []), no state machine is maintained. advances_to
      is invalid in a stateless flow handler (boot error if used). However, stateless does NOT mean entityless. If a handler
      writes entity-scoped fields (data_accumulation, accumulate tracking, compute store_as), the platform auto-materializes
      an entity for that handler invocation. This entity has no current_state and no lifecycle transitions, but it persists
      accumulator state, data_accumulation writes, and computed values. Guards in stateless flows may reference entity fields
      written by prior handlers. The distinction: stateless = no lifecycle state machine. Entityless = no entity at all (rare —
      only flows with no data_accumulation, no accumulate, and no compute).'
  state_composition:
    description: 'How flow-level state machines compose into the entity lifecycle. Core principle:
      state is flow-local, and cross-flow business correlation is explicit authored payload/config data.'
    flow_scoped_entities:
      description: 'One entity belongs to exactly one flow. One row in entity_state, one current_state,
        one state machine. No flow_states map. No shared mutable state across flow boundaries.'
      invariant: 'entity_state.flow_instance identifies the owning flow. Only handlers within that flow
        may write to the entity (advances_to, sets_gate, data_accumulation, save_entity_field). The
        platform enforces this — cross-flow writes are rejected at runtime.'
      current_state: 'entity_state.current_state is singular and unambiguous. It reflects the state within
        the owning flow. No flow_states disambiguation needed.'
    cross_flow_handoff:
      description: 'When a business object moves from one flow to the next, the transition is an explicit
        handoff via events. The receiving flow is addressed as a supported flow instance through parent connect and
        instance keys, or the receiving state is modeled as contained state, a singleton coordinator, or a child flow.'
      pattern:
      - '1. Source flow handler emits a cross-flow event (output pin). Example: scoring emits vertical.shortlisted.'
      - '2. Destination flow handler receives the event through parent-owned connect / instance-key routing or another
        supported route owner.'
      - '3. Destination updates its primary entity, contained state, singleton coordinator state, or child/template flow
        instance. Static input-pin handlers do not create or select arbitrary receiving-flow rows.'
      - '4. Data from the source entity is passed via the event payload or create_flow_instance
        config_from bindings. Direct runtime entity reads do not cross flow ownership boundaries.'
      service_request_pattern:
      - '1. Source flow emits a typed request event containing declared business keys, not target entity_id,
        entity_type, or flow_instance.'
      - '2. Destination declares a supported ownership model: mode: template with instance.by, mode: singleton with contained
        state, one primary entity with contained data, or a child flow.'
      - '3. Parent connect / route-plan authority supplies the target flow-instance context; static receiver-side
        create_entity, select_entity, and select_or_create_entity are not repair paths.'
      - '4. Handler writes and transitions remain same-flow owned under the supported receiver ownership model.'
      enforcement: 'Input pin events into a stateful static flow (mode: static) MUST NOT declare create_entity,
        select_entity, or select_or_create_entity as static multi-row ownership. Boot verification fails closed with
        migration diagnostics. Exemptions: (1) stateless flows (initial_state: null) — no entity state machine. (2)
        Template flows (mode: template) — entity creation happens via create_flow_instance, not create_entity,
        select_entity, or select_or_create_entity.'
    cross_flow_writes:
      description: 'Cross-flow entity writes are prohibited by the platform.'
      rule: 'save_entity_field checks that the target entity''s stored flow_instance resolves to the same
        semantic ownership scope as the calling agent''s actor flow. A different ownership scope is rejected.
        This is a platform enforcement, not a convention.'
      reads: 'Cross-flow entity reads through agent-facing entity tools are prohibited. Agents consume
        declared event payload fields or create_flow_instance config_from bindings for business data,
        and use source_event_id causal chains for debugging proof.'
    business_correlation:
      description: 'The platform does not create a lineage primitive for a business object that spans
        flows. Products carry business correlation explicitly through declared event payload fields and
        create_flow_instance config_from bindings. Causal debugging and proof use the source_event_id
        event chain.'
    terminality:
      description: 'Terminal states are flow-local. If another flow must react to a terminal outcome, the
        producing flow emits a declared output event with the required business payload. Consumers handle
        that event in their own state machine; the platform does not back-propagate terminal state across
        flows.'
    ownership_semantics:
      description: 'Entity write ownership is determined by the semantic ownership scope derived from
        entity_state.flow_instance and the actor flow contract. The platform does not infer cross-flow
        ownership from arbitrary path prefixes, parent/child relationships, or shared business correlation
        data.'
      rules:
      - 'A handler may write only entities whose owner flow resolves to the same semantic ownership
        scope as the handler''s actor flow. Template instances that share a semantic flow scope are not
        isolated from each other by instance ID in the current runtime.'
      - 'Parent flows do NOT own descendant flow instance writes. scoring does not own validation
        entities. Root does not own child flow entities.'
      - 'Sibling flows do NOT own each other. scoring and validation are peers — neither can write
        to the other''s entities.'
      - 'No prefix-based ownership inference. The runtime MUST NOT treat "scoring" as owning
        "scoring-extended" or any other flow whose path happens to share a prefix.'
      - 'These semantics hold at arbitrary depth. A three-level flow (root/child/grandchild) follows
        the same rules as a two-level flow. No special cases for depth.'
    gate_projection:
      description: 'Gates are projected (namespaced) by semantic flow scope, not by full instance path.'
      rule: 'Gate storage and projection use flow_scope_key. Example: child flow "build" declares gate
        g_validated. The gate is stored/projected as build/g_validated, not build/<instance-id>/g_validated.
        This ensures gate references are stable across instance IDs and consistent between static and
        template flows.'
versioning:
  description: Platform and products version independently.
  platform_versioning:
    scheme: semver (major.minor.patch)
    author_facing_version: platform.version is the single Swarm compatibility version that products target in
      package.yaml platform_version. Release binary tags MUST match the embedded platform.version; binary build
      metadata and commits are diagnostic only.
    active_train_policy: Semantic PRs land on the active platform train without repeatedly editing platform.version.
      Release validation confirms the train version and tags the binary as v<platform.version>.
    major: Breaking changes to flow model, handler fields, boot validation, or contract formats
    minor: New execution primitives, new handler fields (backward compatible), new compliance checks
    patch: Bug fixes, documentation, clarifications
  product_versioning:
    scheme: semver (major.minor.patch)
    major: Flow restructuring, agent hierarchy changes, breaking event schema changes
    minor: New agents, new events, new tools, threshold adjustments
    patch: Prompt improvements, policy tuning, bug fixes
  compatibility:
    declaration: Products declare platform_version in package.yaml using Masterminds semver/v3 constraint syntax
      (for example, ">=0.7.0 <0.8.0", ">=0.7.0", "^0.7.0", or exact "0.7.0").
    enforcement: Platform checks every loaded product package.yaml platform_version at package admission. Rejects if
      the embedded platform.version is missing, malformed, outside the declared range, or if the declared range is
      missing/malformed.
    forward_compatible: Platform minor/patch releases do not break existing products
    example: 'Product v3.0.0 declares platform_version: ">=0.7.0 <0.8.0". Works on platform 0.7.x after re-verification.
      A later train such as 0.8.0 requires an updated compatibility range.'
agent_directive_operation_model:
  status: promoted
  promoted_by: '#1932'
  canonical_owner: platform_tables.tables.agent_directive_operations
  method: agent.send_directive
  rule: >
    Every accepted directive is represented by one durable operation and one
    platform.agent_directive event before BoardStep is admitted. The operation row is the
    sole authority for request replay, execution admission, durable outcome, settlement,
    and recovery. Event existence, session state, provider logs, and api_idempotency rows
    are evidence or projections only and MUST NOT authorize execution or infer success.
  reservation:
    transaction: >
      Resolve the runtime context and run target first, then atomically persist one
      operation row in prepared state, its reserved directive event, and committed direct
      replay scope. Failure leaves none of those facts. One keyed request identity is
      (method, actor_token_id, idempotency_key); a different request_hash fails before
      event persistence or execution.
    event_identity: The directive_event_id is allocated once by the operation owner and is stable for every retry.
  states:
    prepared: Reserved durably but not admitted to BoardStep.
    executing: Exactly one owner holds a bounded execution lease and BoardStep may be running.
    executed: BoardStep returned successfully and its canonical response is durable; settlement may be repaired without execution.
    succeeded: Receipt, keyed API completion projection, and terminal operation outcome committed atomically.
    failed: BoardStep returned an error and the stable typed failure plus error receipt are durable.
    indeterminate: Execution may have produced effects but no authoritative result was durably recorded; automatic execution is forbidden.
  outcome_evidence:
    persisted_invariants:
      failure: state IN ('failed', 'indeterminate') if and only if one valid platform.failure/v1 envelope is present
      response: state IN ('executed', 'succeeded') if and only if one durable response is present
      legacy_flat_error_columns: forbidden; hard migration recognizes only the two closed recovery producers and removes all three columns
    immediate_uncertainty: >
      heartbeat shutdown and post-effect persistence errors return response-local indeterminate copies with canonical
      uncertainty envelopes. They do not claim a durable transition. A generic persistence error preserves only the
      last confirmed pre-call state because commit acknowledgment may be lost; authoritative reload and reconciliation
      decide which complete atomic outcome committed.
  transitions:
    - absent -> prepared
    - prepared -> executing
    - prepared -> failed (keyless startup recovery only; execution was never admitted)
    - executing -> executed
    - executed -> succeeded
    - executing -> failed
    - executing -> indeterminate
  forbidden_transitions:
    - executing, executed, succeeded, failed, or indeterminate -> prepared
    - any second execution admission for one operation
    - receipt success before successful BoardStep and durable executed response
    - inference of success from event, session, provider, tool, or log evidence
  execution_lease: >
    Admission uses a compare-and-set transition and a bounded owner lease. The manager
    renews the lease while BoardStep is active. Each renewal has a bounded context derived
    from the heartbeat lifecycle. If heartbeat shutdown does not complete within its bound,
    the manager MUST NOT enter result or failure persistence because renewal may still own
    the same serialized mutation boundary; it returns AGENT_DIRECTIVE_OUTCOME_INDETERMINATE
    immediately and leaves the durable row executing for lease-expiry reconciliation. No
    database transaction, advisory lock, or process-local lock is held across BoardStep. An
    expired executing lease becomes indeterminate and is never returned to an executable
    state.
  finalization: >
    After successful BoardStep, RecordDirectiveExecuted durably stores the response before
    settlement. Finalization then atomically writes the processed platform/pipeline receipt,
    the keyed api_idempotency success projection with resource_id=operation_id, and succeeded
    state with its 24-hour replay TTL. Before finalization, executed is the last confirmed durable state and retry
    or recovery performs finalization only. A returned commit error does not prove rollback. Failed-outcome
    finalization may leave executing with no failure/receipt or may have atomically committed failed with the exact
    failure and matching error receipt. Result recording may leave executing without a response or may have committed
    executed with the exact response and no receipt. Success finalization may leave executed or may have atomically
    committed succeeded with its processed nil-failure receipt and keyed API projection. Immediate uncertainty is
    response-local; same-key retry and startup reconciliation reload the authoritative row and converge without another
    BoardStep.
  key_behavior:
    keyed: >
      Same actor/key/hash consumes one operation. prepared may receive its sole admission;
      executing returns AGENT_DIRECTIVE_IN_PROGRESS; executed attempts finalization only;
      succeeded returns the stored response and repairs a missing projection; failed returns
      its stored failure; indeterminate returns AGENT_DIRECTIVE_OUTCOME_INDETERMINATE.
    keyless: >
      Every call creates a fresh operation and event. At-most-one admission applies within
      that operation only; no cross-call exactly-once claim is made and no internal retry
      may execute BoardStep again after an uncertain outcome.
  recovery_order: >
    Every selected runtime context reconciles directive operations before public directive
    admission, regardless of runtime.recovery_on_startup or unscoped persistent-recovery
    policy, and before generic missing-pipeline-receipt replay. Failure blocks that context
    from starting. Finalize executed rows without BoardStep, repair missing keyed success
    projections, terminalize expired executing rows as indeterminate, and terminalize
    abandoned keyless prepared rows as failed/not-admitted. Keyed prepared rows wait for a
    same-key caller and are not executed by startup recovery. Generic pipeline recovery
    excludes operation-owned directive events.
  terminal_retention: >
    succeeded and failed rows may be deleted only after their replay TTL. Indeterminate and
    nonterminal rows are never silently TTL-deleted. Destructive reset is not an exception:
    it fails closed while retained directive authority exists for a planned run and may
    remove terminal rows only after expiry. Expired terminal deletion releases the keyed
    identity for a future request.
  backend_parity: >
    Postgres and SQLite expose identical transitions, compare-and-set admission, errors,
    response projection, TTL, receipt behavior, and recovery. SQLite uses the canonical
    selected-store mutation executor; Postgres uses short explicit transactions. Backend
    selection is not visible to API/runtime consumers.
platform_tables:
  description: Platform-owned infrastructure tables. These exist regardless of which product contracts are loaded. They are
    the normal runtime boot schema, including canonical entity_state. They do not include product-specific typed entity
    tables derived from entities.yaml. The platform generates DDL for these at boot via GeneratePlatformTableDDLs.
  destructive_reset_cleanup_policy:
    status: internal_only
    owner: internal/runtime/destructivereset cleanup catalog and PostgresStore.ApplyDestructiveResetCleanup
    public_api: none
    run_set: all rows in runs.run_id captured into the destructive reset plan cleanup_runs snapshot at plan time
    prerequisites:
      - destructive reset coordinator plan/result/lock/idempotency owner has accepted the operation
      - destructive reset quiescence has terminalized active runs and retryable deliveries for the same operation envelope
      - expired succeeded/failed agent directive operations for the cleanup run set have been removed; any remaining directive operation authority blocks cleanup
    invariants:
      - No production cleanup owner may use all-table truncate, cascading bulk truncation, table name heuristics, entity_id-only predicates, or flow_instance-only predicates.
      - Every platform_tables.tables entry must have exactly one destructive-reset cleanup classification in the typed cleanup catalog.
      - Apply and dry-run must consume the plan cleanup_runs snapshot only; runs created after the plan/quiescence envelope are out of scope for that cleanup call.
      - Before deleting planned run-scoped rows, apply must sever nullable preserved/out-of-scope references into the cleanup set; current severed references are agent_sessions.successor_session_id, runs.forked_from_run_id/forked_from_event_id, runtime_ingress_state.transition_event_id, entity_mutations.caused_by_event, timers.source_timer_id, and mailbox.reply_context_id.
      - Fork-lineage cleanup must delete fork replay and selected-contract rows by fork/source run_id and by linked cleanup-owned event/delivery references before deleting event_deliveries or events; preserved fork/source run IDs are not sufficient proof that the row is out of scope.
      - Runtime-owned persisted facts that describe running or historical execution must carry an exact run_id, event lineage, or fork/source run lineage before destructive reset may delete them.
      - agent_directive_operations is retained replay/outcome authority rather than ordinary run history. Cleanup must fail closed while prepared, executing, executed, indeterminate, or unexpired succeeded/failed rows exist for a planned run; it may remove succeeded/failed rows only after expires_at.
      - Agent lifecycle operations, transition facts, diagnostic outbox rows, and external-effect operation/attempt evidence are replay, reconciliation, and no-redispatch authority. They survive destructive reset with the preserved agent registry.
      - Generated node-state tables and legacy/future product optimization tables remain split-preserved until a separate
        owner gives them exact run-scoped identity. Normal runtime boot does not create generated typed entity tables.
      - Schema, auth/idempotency-like, operator/system, product config, topology, global timers, mailbox, and spend/cost audit state must survive this internal cleanup slice unless a later gate defines an exact run-scoped owner.
      - "The bundle catalog is request-scoped by `runtime.nuke.include_bundles`: `false` preserves `bundles`; `true` deletes `bundles` only inside the destructive-reset cleanup transaction after serializing persisted run creation and failing closed if any persisted bundle-source run remains outside the cleanup plan."
      - Apply executes in one database transaction, reports per-table dry-run/apply counts, rolls back on any SQL/FK/order error, and produces no successful result unless the transaction commits.
    classifications:
      delete_by_event_join:
        - event_receipts
        - dead_letters
      delete_by_run_lineage:
        - run_fork_delivery_event_replays
        - run_fork_selected_contract_executions
        - run_fork_selected_contract_branch_divergences
        - run_fork_selected_contract_route_recoveries
        - run_fork_selected_contract_bindings
      delete_by_run_id:
        - activity_attempts
        - reply_contexts
        - agent_turns
        - agent_sessions
        - entity_mutations
        - entity_state
        - run_control_state
        - events
      retain_directive_authority:
        - agent_directive_operations
      delete_mixed_row_policy:
        - event_deliveries
        - agent_conversation_audits
        - conversation_fork_snapshots
        - conversation_fork_turns
        - conversation_forks
        - timers
      delete_all:
        - runs
      preserve:
        - schema_version
        - api_idempotency
        - runtime_ingress_state
        - agents
        - agent_lifecycle_operations
        - agent_lifecycle_transition_facts
        - agent_lifecycle_diagnostic_outbox
        - agent_external_effect_operations
        - agent_external_effect_attempts
        - flow_instances
        - routing_rules
      request_scoped_bundle_catalog:
        - bundles
      split_preserve:
        - mailbox
        - spend_ledger
        - generated node-state tables from GenerateNodeStateTableDDLs
        - legacy/future contract-driven product optimization tables
  tables:
    bundles:
      description: 'Content-addressed bundle catalog. The primary key is the canonical bundle_hash
        (`bundle-v1:sha256:<64 lowercase hex>`) from multi_bundle_persistence.bundle_identity.
        Rows store durable bundle bytes and a parsed JSON projection for server-side inspection.
        This table is global platform catalog state, not run-scoped state, and is not referenced
        by runs through a database foreign key.'
      ddl: "CREATE TABLE bundles (\n    bundle_hash      TEXT PRIMARY KEY CHECK (bundle_hash ~ '^bundle-v1:sha256:[0-9a-f]{64}$'),\n    content_yaml     TEXT NOT NULL,\n    parsed_json      JSONB NOT NULL DEFAULT '{}'::jsonb,\n    data_blob        BYTEA,\n    metadata         JSONB NOT NULL DEFAULT '{}'::jsonb,\n    ingested_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_bundles_ingested_at (ingested_at)\n);"
    events:
      description: 'Append-only event store. Every event persisted before delivery. Three scopes: entity (entity_id + flow_instance
        projection set), flow (flow_instance projection set, entity_id NULL), global (both NULL — system bootstrap,
        runtime recovery, admin commands). source_route, target_route, and target_set are the canonical pin-routing
        identities; legacy entity_id and flow_instance are receiver-context projections. idempotency_key for external
        dedup. source_event_id for causal chain tracing. run_id links every event to its execution context for observability
        and fork/replay.'
      ddl: "CREATE TABLE events (\n    event_id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id            UUID\
        \ REFERENCES runs(run_id),\n    event_name        TEXT NOT NULL,\n    entity_id         UUID,\n    flow_instance\
        \     TEXT,\n    source_route      JSONB NOT NULL DEFAULT '{}',\n    target_route      JSONB NOT NULL DEFAULT '{}',\n\
        \    target_set        JSONB NOT NULL DEFAULT '[]',\n    scope             TEXT NOT NULL DEFAULT 'entity' CHECK (scope IN ('entity', 'flow', 'global')),\n\
        \    payload           JSONB NOT NULL DEFAULT '{}',\n    chain_depth       INTEGER NOT NULL DEFAULT 0,\n\
        \    produced_by       TEXT,\n    produced_by_type  TEXT CHECK (produced_by_type IN ('node', 'agent',\
        \ 'platform', 'external')),\n    handler_node      TEXT,\n    idempotency_key   TEXT,\n    source_event_id   UUID,\n\
        \    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_events_run (run_id, created_at) WHERE\
        \ run_id IS NOT NULL,\n    INDEX idx_events_entity (entity_id, created_at) WHERE entity_id IS NOT NULL,\n    INDEX\
        \ idx_events_flow (flow_instance, event_name) WHERE flow_instance IS NOT NULL,\n    INDEX idx_events_source_route ((source_route->>'flow_instance'), (source_route->>'entity_id')) WHERE source_route <> '{}'::jsonb,\n    INDEX idx_events_target_route ((target_route->>'flow_instance'), (target_route->>'entity_id')) WHERE target_route <> '{}'::jsonb,\n    INDEX idx_events_global (event_name,\
        \ created_at) WHERE scope = 'global',\n    INDEX idx_events_idempotency (idempotency_key) WHERE idempotency_key\
        \ IS NOT NULL,\n    INDEX idx_events_source (source_event_id) WHERE source_event_id IS NOT NULL\n);"
    agent_directive_operations:
      description: >-
        Durable operation/outcome owner for agent.send_directive. One row reserves one
        platform.agent_directive event and owns request-hash conflict detection, one
        execution admission, the post-BoardStep response or stable failure, pipeline
        settlement, the keyed API completion projection, and recovery. api_idempotency is
        a success projection only for this method. Event existence never proves execution
        or success. Transactions and locks must not span BoardStep.
      ddl: |
        CREATE TABLE agent_directive_operations (
            operation_id               UUID PRIMARY KEY,
            method                     TEXT NOT NULL CHECK (method = 'agent.send_directive'),
            actor_token_id             TEXT NOT NULL,
            idempotency_key            TEXT,
            request_hash               TEXT NOT NULL,
            agent_id                   TEXT NOT NULL,
            directive_text             TEXT NOT NULL,
            requested_run_id           UUID,
            resolved_run_id            UUID NOT NULL REFERENCES runs(run_id),
            run_id_resolution          TEXT NOT NULL CHECK (run_id_resolution IN ('specified', 'inferred_from_active_session', 'new_run_allocated')),
            source                     TEXT NOT NULL,
            operator_id                TEXT,
            directive_event_id         UUID NOT NULL UNIQUE REFERENCES events(event_id),
            state                      TEXT NOT NULL CHECK (state IN ('prepared', 'executing', 'executed', 'succeeded', 'failed', 'indeterminate')),
            execution_owner_id         TEXT,
            execution_lease_expires_at TIMESTAMPTZ,
            response                   JSONB,
            failure                    JSONB,
            execution_admitted_at      TIMESTAMPTZ,
            executed_at                TIMESTAMPTZ,
            completed_at               TIMESTAMPTZ,
            created_at                 TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            updated_at                 TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            expires_at                 TIMESTAMPTZ,
            CHECK (idempotency_key IS NULL OR idempotency_key <> ''),
            CHECK ((state IN ('executed', 'succeeded')) = (response IS NOT NULL)),
            CHECK ((state IN ('failed', 'indeterminate')) = (failure IS NOT NULL)),
            UNIQUE INDEX idx_agent_directive_operations_active_key (method, actor_token_id, idempotency_key) WHERE idempotency_key IS NOT NULL,
            INDEX idx_agent_directive_operations_recovery (state, execution_lease_expires_at, updated_at),
            INDEX idx_agent_directive_operations_expiry (expires_at),
            INDEX idx_agent_directive_operations_run (resolved_run_id, created_at)
        );
    agent_lifecycle_operations:
      description: >-
        Durable operation/outcome owner for per-agent lifecycle create, start, restart,
        reconfigure, teardown, stop, self-release, and failure transitions. The selected
        store commits the authoritative agents lifecycle cell, immutable transition fact,
        operation outcome, API projection when applicable, and diagnostic outbox atomically.
      ddl: |
        CREATE TABLE agent_lifecycle_operations (
            operation_id       UUID PRIMARY KEY,
            agent_id           TEXT NOT NULL REFERENCES agents(agent_id),
            operation_kind     TEXT NOT NULL CHECK (operation_kind IN ('spawn', 'start', 'restart', 'reconfigure', 'teardown', 'stop', 'self_release', 'fail')),
            request_hash       TEXT NOT NULL,
            expected_epoch     BIGINT NOT NULL,
            expected_generation BIGINT NOT NULL,
            target_generation BIGINT NOT NULL,
            target_phase      TEXT NOT NULL CHECK (target_phase IN ('registered', 'running', 'terminated', 'failed')),
            config_revision   TEXT NOT NULL,
            run_mode          TEXT NOT NULL CHECK (run_mode IN ('stopped', 'standard', 'authoritative_delivery_only')),
            state             TEXT NOT NULL CHECK (state IN ('prepared', 'executing', 'succeeded', 'failed', 'indeterminate')),
            result            JSONB,
            failure           JSONB,
            created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            completed_at      TIMESTAMPTZ,
            CHECK ((state = 'succeeded') = (result IS NOT NULL)),
            CHECK ((state IN ('failed', 'indeterminate')) = (failure IS NOT NULL)),
            INDEX idx_agent_lifecycle_operations_agent (agent_id, created_at),
            INDEX idx_agent_lifecycle_operations_recovery (state, updated_at)
        );
    agent_lifecycle_transition_facts:
      description: Immutable committed per-agent lifecycle transition evidence.
      ddl: |
        CREATE TABLE agent_lifecycle_transition_facts (
            transition_id      UUID PRIMARY KEY,
            operation_id       UUID NOT NULL UNIQUE,
            agent_id           TEXT NOT NULL REFERENCES agents(agent_id),
            trigger            TEXT NOT NULL,
            previous_phase     TEXT NOT NULL,
            next_phase         TEXT NOT NULL,
            previous_generation BIGINT NOT NULL,
            next_generation    BIGINT NOT NULL,
            runtime_epoch      BIGINT NOT NULL,
            config_revision   TEXT NOT NULL,
            run_mode          TEXT NOT NULL,
            created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            INDEX idx_agent_lifecycle_transition_facts_agent (agent_id, created_at)
        );
    agent_lifecycle_diagnostic_outbox:
      description: Durable non-authoritative projection queue for lifecycle diagnostics.
      ddl: |
        CREATE TABLE agent_lifecycle_diagnostic_outbox (
            outbox_id          UUID PRIMARY KEY,
            operation_id       UUID NOT NULL UNIQUE,
            agent_id           TEXT NOT NULL REFERENCES agents(agent_id),
            event_name         TEXT NOT NULL,
            payload            JSONB NOT NULL,
            projected_at       TIMESTAMPTZ,
            created_at         TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            INDEX idx_agent_lifecycle_outbox_pending (created_at) WHERE projected_at IS NULL
        );
    agent_external_effect_operations:
      description: >-
        Generic durable logical operation owner for every managed external provider,
        HTTP tool, credential, web-search, MCP, native command/write, and relay effect.
      ddl: |
        CREATE TABLE agent_external_effect_operations (
            operation_id       UUID PRIMARY KEY,
            effect_kind        TEXT NOT NULL,
            effect_class       TEXT NOT NULL CHECK (effect_class IN ('read_only', 'write_or_unknown')),
            agent_id           TEXT NOT NULL REFERENCES agents(agent_id),
            runtime_epoch      BIGINT NOT NULL,
            generation         BIGINT NOT NULL,
            lineage            JSONB NOT NULL DEFAULT '{}',
            request_fingerprint TEXT NOT NULL,
            state              TEXT NOT NULL CHECK (state IN ('prepared', 'authorized', 'launched', 'response_observed', 'settled', 'terminal_failure', 'outcome_uncertain')),
            created_at         TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            updated_at         TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            completed_at       TIMESTAMPTZ,
            INDEX idx_agent_external_effect_operations_agent (agent_id, created_at),
            INDEX idx_agent_external_effect_operations_recovery (state, updated_at)
        );
    agent_external_effect_attempts:
      description: One actual transport/process/write attempt under a durable external-effect operation.
      ddl: |
        CREATE TABLE agent_external_effect_attempts (
            attempt_id         UUID PRIMARY KEY,
            operation_id       UUID NOT NULL,
            attempt_ordinal    INTEGER NOT NULL CHECK (attempt_ordinal > 0),
            adapter            TEXT NOT NULL,
            transport          TEXT NOT NULL,
            runtime_epoch      BIGINT NOT NULL,
            generation         BIGINT NOT NULL,
            state              TEXT NOT NULL CHECK (state IN ('authorized', 'launched', 'response_observed', 'settled', 'terminal_failure', 'outcome_uncertain')),
            evidence           JSONB NOT NULL DEFAULT '{}',
            failure            JSONB,
            authorized_at      TIMESTAMPTZ NOT NULL,
            launched_at        TIMESTAMPTZ,
            response_observed_at TIMESTAMPTZ,
            completed_at       TIMESTAMPTZ,
            updated_at         TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            UNIQUE (operation_id, attempt_ordinal),
            INDEX idx_agent_external_effect_attempts_recovery (state, updated_at)
        );
    reply_contexts:
      description: >-
        Canonical mutable owner for one request/reply loop. A request delivery route carries only
        reply_context_id in its typed delivery_context; business payloads, EventEnvelope, lineage,
        and generic flow metadata never own or reconstruct reply routing. The record binds the
        request event, paired request/reply topology, concrete origin route, and request correlation.
        Terminal claim is atomic: the first reply event wins, replay of that same event is idempotent,
        and a distinct later reply fails closed as platform.reply_already_terminal.
      ddl: |
        CREATE TABLE reply_contexts (
            reply_context_id        TEXT PRIMARY KEY,
            run_id                  UUID REFERENCES runs(run_id),
            request_event_id        UUID NOT NULL REFERENCES events(event_id),
            requester_flow_id       TEXT NOT NULL,
            request_output_pin      TEXT NOT NULL,
            reply_input_pin         TEXT NOT NULL,
            provider_flow_id        TEXT NOT NULL,
            provider_input_pin      TEXT NOT NULL,
            provider_output_pin     TEXT NOT NULL,
            origin_route            JSONB NOT NULL,
            request_correlation_id  TEXT NOT NULL,
            correlation_key         TEXT,
            state                   TEXT NOT NULL DEFAULT 'open' CHECK (state IN ('open', 'terminal')),
            accepted_reply_event_id UUID REFERENCES events(event_id),
            created_at              TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            updated_at              TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            terminal_at             TIMESTAMPTZ,
            CHECK ((state = 'open' AND accepted_reply_event_id IS NULL AND terminal_at IS NULL) OR (state = 'terminal' AND accepted_reply_event_id IS NOT NULL AND terminal_at IS NOT NULL)),
            UNIQUE (requester_flow_id, request_output_pin, reply_input_pin, provider_flow_id, request_correlation_id, origin_route),
            INDEX idx_reply_contexts_run_state (run_id, state),
            INDEX idx_reply_contexts_request (request_event_id),
            INDEX idx_reply_contexts_correlation (request_correlation_id, state)
        );
    activity_attempts:
      description: 'Durable attempt/result journal for executable non-idempotent activity calls. A platform.activity_requested
        event is the request owner; this table is the provider-attempt truth owner after the request is admitted. The
        runtime must insert the started row before outbound provider dispatch, update the row with the canonical terminal
        result after the dispatch outcome, and consume the row on request redelivery/replay/restart before deciding whether
        a provider call may occur. For non_idempotent_write activities, any existing started, uncertain, succeeded, or
        failed row blocks automatic provider re-dispatch. Generated result events are published from this journaled terminal
        state. Static credentials and admitted managed credentials for provider_connector tools are resolved through their
        respective credential-store/import-boundary owners before the started row is inserted; missing, unbound, unusable, or
        mismatched credentials therefore fail before provider dispatch and do not create an attempt row. On duplicate/redelivered
        request events, the existing row is consumed before static or managed credential resolution, token refresh, or outbound
        preparation. response_mapping, rate_limit, MCP/platform/native/generated tools, idempotent_write, and long_running remain
        split/fail-closed.'
      ddl: "CREATE TABLE activity_attempts (\n    request_event_id UUID PRIMARY KEY,\n    run_id            UUID NOT NULL REFERENCES runs(run_id),\n    source_event_id   UUID,\n    parent_event_id   UUID,\n    entity_id         UUID,\n    flow_instance     TEXT,\n    node_id           TEXT NOT NULL,\n    handler_event_key TEXT NOT NULL,\n    activity_id       TEXT NOT NULL,\n    tool              TEXT NOT NULL,\n    effect_class      TEXT NOT NULL CHECK (effect_class = 'non_idempotent_write'),\n    attempt           INTEGER NOT NULL DEFAULT 1 CHECK (attempt = 1),\n    status            TEXT NOT NULL CHECK (status IN ('started', 'succeeded', 'failed', 'uncertain')),\n    success_event     TEXT NOT NULL,\n    failure_event     TEXT NOT NULL,\n    result_event_id   UUID,\n    result_event_type TEXT,\n    result_payload    JSONB,\n    failure           JSONB,\n    input_hash        TEXT NOT NULL,\n    loop_generation   JSONB NOT NULL DEFAULT '{}'::jsonb,\n    loop_stage        TEXT,\n    reply_context_id  TEXT REFERENCES reply_contexts(reply_context_id),\n    started_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    completed_at      TIMESTAMPTZ,\n    updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    CHECK ((status = 'started' AND result_event_id IS NULL AND result_event_type IS NULL AND result_payload IS NULL AND failure IS NULL AND completed_at IS NULL) OR (status = 'succeeded' AND result_event_id IS NOT NULL AND result_event_type IS NOT NULL AND result_payload IS NOT NULL AND failure IS NULL AND completed_at IS NOT NULL) OR (status IN ('failed', 'uncertain') AND result_event_id IS NOT NULL AND result_event_type IS NOT NULL AND result_payload IS NOT NULL AND failure IS NOT NULL AND completed_at IS NOT NULL)),\n    INDEX idx_activity_attempts_run (run_id, started_at),\n    INDEX idx_activity_attempts_activity (run_id, activity_id, tool),\n    INDEX idx_activity_attempts_result_event (result_event_id) WHERE result_event_id IS NOT NULL\n);"
    run_fork_selected_contract_bindings:
      description: Durable selected-contract source binding for timestamp forks. One row binds a fork run to the selected
        contract source identity that was admitted before materialization. This is prerequisite fork-run state for future
        selected-contract execution; CLI/API arguments, dry-run JSON, and local model output are not semantic owners. It
        does not authorize handler execution, event/delivery replay, timer, route, session, turn, source-advanced, or
        contract-swap mutation.
      ddl: "CREATE TABLE run_fork_selected_contract_bindings (\n    binding_id       UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    fork_run_id      UUID NOT NULL REFERENCES runs(run_id),\n    source_run_id    UUID NOT NULL REFERENCES runs(run_id),\n    fork_event_id    UUID NOT NULL REFERENCES events(event_id),\n    mode             TEXT NOT NULL CHECK (mode IN ('selected_contracts', 'bundle_hash')),\n    contracts_root   TEXT,\n    bundle_hash      TEXT CHECK (bundle_hash IS NULL OR bundle_hash ~ '^bundle-v1:sha256:[0-9a-f]{64}$'),\n    workflow_name    TEXT NOT NULL,\n    workflow_version TEXT NOT NULL,\n    created_at       TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    CHECK ((mode = 'selected_contracts' AND NULLIF(TRIM(COALESCE(contracts_root, '')), '') IS NOT NULL AND NULLIF(TRIM(COALESCE(bundle_hash, '')), '') IS NULL) OR (mode = 'bundle_hash' AND NULLIF(TRIM(COALESCE(contracts_root, '')), '') IS NULL AND bundle_hash IS NOT NULL)),\n    UNIQUE (fork_run_id),\n    INDEX idx_run_fork_selected_contract_bindings_source (source_run_id, fork_event_id)\n);"
    run_fork_selected_contract_executions:
      description: Source-to-fork lineage table for mutating selected-contract timestamp-fork execution. The runtime
        selected-contract execution owner publishes fresh fork-local events under the fork run_id and records which source
        frontier event each fork event executed from. Source events, deliveries, receipts, dead letters, retry state, and
        post-fork outcomes are lineage evidence only and must not be copied or used as fork suppressors.
      ddl: "CREATE TABLE run_fork_selected_contract_executions (\n    execution_id    UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    fork_run_id     UUID NOT NULL REFERENCES runs(run_id),\n    source_run_id   UUID NOT NULL REFERENCES runs(run_id),\n    source_event_id UUID NOT NULL REFERENCES events(event_id),\n    fork_event_id   UUID NOT NULL REFERENCES events(event_id),\n    event_name      TEXT NOT NULL,\n    created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    UNIQUE (fork_run_id, source_event_id),\n    UNIQUE (fork_event_id),\n    INDEX idx_run_fork_selected_contract_executions_fork (fork_run_id, fork_event_id),\n    INDEX idx_run_fork_selected_contract_executions_source (source_run_id, source_event_id)\n);"
    run_fork_selected_contract_branch_divergences:
      description: Durable source/fork branch divergence evidence for selected-contract timestamp-fork execution. This
        table is written only by the selected-contract execution owner when the source has advanced after the fork point
        and selected execution proceeds as a branch rather than freezing or rewinding the source. Source post-fork facts
        remain source-run evidence only; fork-local work is regenerated under the fork run_id.
      ddl: "CREATE TABLE run_fork_selected_contract_branch_divergences (\n    divergence_id                   UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    fork_run_id                     UUID NOT NULL REFERENCES runs(run_id),\n    source_run_id                   UUID NOT NULL REFERENCES runs(run_id),\n    fork_event_id                   UUID NOT NULL REFERENCES events(event_id),\n    owner                           TEXT NOT NULL,\n    policy                          TEXT NOT NULL CHECK (policy IN ('selected_contract_source_advanced_branch')),\n    source_run_status_at_activation TEXT NOT NULL,\n    source_run_status_after_activation TEXT NOT NULL,\n    source_frozen                   BOOLEAN NOT NULL DEFAULT FALSE,\n    source_advanced_facts           TEXT[] NOT NULL DEFAULT '{}',\n    created_at                      TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    UNIQUE (fork_run_id),\n    INDEX idx_run_fork_selected_contract_branch_divergences_source (source_run_id, fork_event_id)\n);"
    run_fork_selected_contract_route_recoveries:
      description: Durable fork-local selected-contract route/topology recovery evidence. This table is owned by
        store.run_fork.selected_contract_route_persistence and consumed by runtime.run_fork.selected_contract_route_recovery
        after restart. Rows are keyed by fork run_id and selected binding/topology/recipient evidence; they are not copied
        source routing_rules rows and are not current operational flow-instance route rows. The topology and recipient
        fingerprints are computed over canonical JSON semantics so JSONB storage normalization cannot invalidate honest
        rows while tampered payloads still fail closed. Runtime recovery must consume these rows as route truth for
        selected-contract forks and must continue to gate recipients through
        runtime.run_fork.selected_contract_recipient_planning before publish. This table does not authorize delivery
        replay, handler execution, receipts, dead letters, idempotency, timers, sessions, contract swap, or UI/API
        ownership.
      ddl: "CREATE TABLE run_fork_selected_contract_route_recoveries (\n    recovery_id                    UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    fork_run_id                    UUID NOT NULL REFERENCES runs(run_id),\n    source_run_id                  UUID NOT NULL REFERENCES runs(run_id),\n    fork_event_id                  UUID NOT NULL REFERENCES events(event_id),\n    owner                          TEXT NOT NULL,\n    runtime_recovery_owner         TEXT NOT NULL,\n    mode                           TEXT NOT NULL CHECK (mode IN ('selected_contracts', 'bundle_hash')),\n    contracts_root                 TEXT,\n    bundle_hash                    TEXT CHECK (bundle_hash IS NULL OR bundle_hash ~ '^bundle-v1:sha256:[0-9a-f]{64}$'),\n    workflow_name                  TEXT NOT NULL,\n    workflow_version               TEXT NOT NULL,\n    route_topology_owner           TEXT NOT NULL,\n    dynamic_topology_owner         TEXT,\n    recipient_planning_owner       TEXT NOT NULL,\n    frontier_evidence_fingerprint  TEXT NOT NULL,\n    route_topology_fingerprint     TEXT NOT NULL,\n    recipient_planning_fingerprint TEXT NOT NULL,\n    static_route_event_count       INTEGER NOT NULL DEFAULT 0,\n    dynamic_topology_proof_count   INTEGER NOT NULL DEFAULT 0,\n    recipient_plan_event_count     INTEGER NOT NULL DEFAULT 0,\n    route_topology                 JSONB NOT NULL,\n    recipient_planning             JSONB NOT NULL,\n    created_at                     TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    CHECK ((mode = 'selected_contracts' AND NULLIF(TRIM(COALESCE(contracts_root, '')), '') IS NOT NULL AND NULLIF(TRIM(COALESCE(bundle_hash, '')), '') IS NULL) OR (mode = 'bundle_hash' AND NULLIF(TRIM(COALESCE(contracts_root, '')), '') IS NULL AND bundle_hash IS NOT NULL)),\n    UNIQUE (fork_run_id),\n    INDEX idx_run_fork_selected_contract_route_recoveries_source (source_run_id, fork_event_id),\n    INDEX idx_run_fork_selected_contract_route_recoveries_owner (owner, runtime_recovery_owner)\n);"
    event_deliveries:
      description: >-
        Tracks delivery of events to subscribers (nodes and agents). One row per event x subscriber. run_id inherited
        from the parent event for run-scoped queries. delivery_target_route stores the concrete target_set member assigned
        to this subscriber when fan-out routing materializes multiple target identities. delivery_context stores opaque
        platform-only route-scoped continuation references and is never part of the business event envelope. status is the canonical lifecycle
        owner for both agent and node deliveries: pending means queued/not started; in_progress means the delivery has been
        claimed or handler execution has started; delivered means successfully settled; failed means a retry-visible
        handler/dispatch failure; dead_letter means terminal failure. Agent and system-node execution paths must mark
        in_progress before handler execution, must not execute from missing delivery authority, and must not settle handler
        failure as delivered.
      ddl: "CREATE TABLE event_deliveries (\n    delivery_id       UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id\
        \            UUID REFERENCES runs(run_id),\n    event_id          UUID NOT NULL REFERENCES events(event_id),\n\
        \    subscriber_type   TEXT NOT NULL CHECK (subscriber_type IN ('node', 'agent')),\n    subscriber_id     TEXT NOT\
        \ NULL,\n    delivery_target_route JSONB NOT NULL DEFAULT '{}',\n    delivery_context JSONB NOT NULL DEFAULT '{}',\n    status            TEXT NOT NULL DEFAULT 'pending' CHECK (status IN ('pending', 'in_progress', 'delivered',\
        \ 'failed', 'dead_letter')),\n    retry_count       INTEGER NOT NULL DEFAULT 0,\n    reason_code       TEXT,\n\
        \    failure           JSONB,\n    active_session_id UUID,\n    started_at        TIMESTAMPTZ,\n    delivered_at\
        \      TIMESTAMPTZ,\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_deliveries_run (run_id,\
        \ status) WHERE run_id IS NOT NULL,\n    INDEX idx_deliveries_status (status, created_at),\n    INDEX idx_deliveries_event\
        \ (event_id),\n    INDEX idx_deliveries_active_session (active_session_id) WHERE active_session_id IS NOT NULL\n\
        );"
    run_fork_delivery_event_replays:
      description: Source-to-fork lineage table for the supported timestamp-fork delivery/event replay primitive. The fork
        run gets fresh fork-local event_id and delivery_id values; this table records which source event/delivery facts
        produced those fork-local rows. It is not a generic historical replay log and does not authorize session, turn,
        timer, route, source-advanced, or contract-swap reconstruction.
      ddl: "CREATE TABLE run_fork_delivery_event_replays (\n    replay_id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    fork_run_id       UUID NOT NULL REFERENCES runs(run_id),\n    source_run_id     UUID NOT NULL REFERENCES runs(run_id),\n    source_event_id   UUID NOT NULL REFERENCES events(event_id),\n    source_delivery_id UUID NOT NULL REFERENCES event_deliveries(delivery_id),\n    fork_event_id     UUID NOT NULL REFERENCES events(event_id),\n    fork_delivery_id  UUID NOT NULL REFERENCES event_deliveries(delivery_id),\n    subscriber_type   TEXT NOT NULL CHECK (subscriber_type IN ('node', 'agent')),\n    subscriber_id     TEXT NOT NULL,\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    UNIQUE (fork_run_id, source_delivery_id),\n    UNIQUE (fork_delivery_id),\n    INDEX idx_run_fork_replays_fork (fork_run_id, fork_event_id),\n    INDEX idx_run_fork_replays_source (source_run_id, source_event_id)\n);"
    event_receipts:
      description: Handler completion acknowledgement. One receipt per event × subscriber. Replaces both pipeline_receipts
        and system_node_ledger. entity_id nullable for global events. subscriber_type + subscriber_id identify the handler
        generically (node, agent, or platform subsystem). idempotency_key used by system_node_runner for replay dedup — if
        a receipt exists for this key, the handler skips re-execution. duration_ms tracks handler execution time for observability.
        side_effects records emitted events and state changes for flight recorder.
      ddl: "CREATE TABLE event_receipts (\n    receipt_id        UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    event_id\
        \          UUID NOT NULL REFERENCES events(event_id),\n    subscriber_type   TEXT NOT NULL CHECK (subscriber_type\
        \ IN ('node', 'agent', 'platform')),\n    subscriber_id     TEXT NOT NULL,\n    entity_id         UUID,\n    flow_instance\
        \     TEXT,\n    outcome           TEXT NOT NULL CHECK (outcome IN ('success', 'reject', 'discard', 'kill', 'escalate',\
        \ 'dead_letter', 'terminal_reject', 'waiting', 'fanned_out', 'no_op')),\n    reason_code       TEXT,\n    state_before      TEXT,\n    state_after       TEXT,\n    failure           JSONB,\n    side_effects      JSONB\
        \ NOT NULL DEFAULT '{}',\n    duration_ms       INTEGER,\n    idempotency_key   TEXT,\n    processed_at      TIMESTAMPTZ\
        \ NOT NULL DEFAULT NOW(),\n    UNIQUE (event_id, subscriber_type, subscriber_id),\n    INDEX idx_receipts_entity (entity_id) WHERE\
        \ entity_id IS NOT NULL,\n    INDEX idx_receipts_subscriber (subscriber_id, processed_at),\n    INDEX idx_receipts_idempotency\
        \ (idempotency_key) WHERE idempotency_key IS NOT NULL\n);"
    entity_state:
      description: Current run-scoped state of every entity. This IS the run-scoped entity registry — no separate registry
        table. Current-state identity is (run_id, entity_id), allowing source and fork runs to preserve the same entity_id
        while diverging independently. slug and name are top-level columns for fast lookup/display without JSONB queries.
        entity_type records the inferred flow-scoped entity contract for the row; callers do not author or choose multiple
        entity kinds inside one flow in Wave 1. fields JSONB holds all contract-driven entity fields. Generic store reads
        use entity_state for run-scoped listing, filtering, and lookup.
      ddl: "CREATE TABLE entity_state (\n    run_id            UUID NOT NULL REFERENCES runs(run_id),\n    entity_id         UUID NOT NULL,\n    flow_instance     TEXT NOT NULL,\n    entity_type       TEXT NOT NULL DEFAULT 'default',\n    slug              TEXT,\n\
        \    name              TEXT,\n    current_state     TEXT NOT NULL,\n    gates             JSONB NOT NULL DEFAULT '{}',\n\
        \    fields            JSONB NOT NULL DEFAULT '{}',\n    accumulator       JSONB NOT NULL DEFAULT '{}',\n    revision\
        \          INTEGER NOT NULL DEFAULT 0,\n    entered_state_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    PRIMARY\
        \ KEY (run_id, entity_id),\n    INDEX idx_entity_flow (run_id, flow_instance, current_state),\n\
        \    INDEX idx_entity_state (run_id, current_state),\n    INDEX idx_entity_type (run_id, entity_type),\n    INDEX\
        \ idx_entity_slug (run_id, slug) WHERE slug IS NOT NULL,\n    INDEX idx_entity_cross_run (entity_id)\n);"
    agents:
      description: 'Runtime agent registry. One row per agent instance under the current global agent_id identity model.
        agent_id remains the authored contract slug and current global live/runtime identity described by
        agent_identity_model.current_supported_posture; duplicate authored agent slugs across live loaded/boot-pinned
        bundles are unsupported until the #977 UUID-internal migration is separately promoted and implemented. Carries the full persisted runtime descriptor:
        role/model/llm_backend/conversation_mode/parent_agent_id as typed columns, subscriptions/emit_events/tools/permissions
        as JSONB arrays, and runtime_descriptor JSONB for the remaining control-plane fields that do not already have a
        first-class persisted column (for example type, mode, session_scope, session_scope_authority, workspace_class,
        manager_fallback, max_turns_per_task, native_tools). session_scope_authority is a runtime-owned descriptor
        whose only valid value is platform_internal and is required for platform-owned/internal agents that intentionally
        use session_scope global. config is opaque agent-specific payload only; the platform stores and passes it through but does not read config
        for runtime control semantics. flow_instance nullable for root-level agents not scoped to any flow. entity_id nullable
        — set only for agents scoped to a specific entity (rare). The contract in agents.yaml is the source of truth and
        permissions_bundle is resolved at boot into the persisted permissions array rather than being stored directly.
        llm_backend stores the backend profile id owned by llm_provider_selection_config_authority. Active runtime profiles
        are anthropic (Anthropic API transport), claude_cli (Claude CLI transport), openai_compatible (Chat Completions-compatible
        HTTP transport), and openai_responses (native OpenAI Responses API transport); legacy api and cli_test persisted rows are migration/backfill inputs only and are not valid new
        config/operator inputs. mock and local are reserved persisted profile ids and are not active runtimes until a dedicated provider/runtime owner lands. This value is provider-selection
        deployment truth, not provider identity alone and not transport mode alone. This is a deployment/agent property, not
        a session property. agent_sessions.runtime_mode tracks conversation scope only.'
      ddl: "CREATE TABLE agents (\n    agent_id          TEXT PRIMARY KEY,\n    flow_instance     TEXT,\n    role        \
        \      TEXT NOT NULL,\n    model             TEXT NOT NULL,\n    llm_backend       TEXT NOT NULL DEFAULT 'anthropic' CHECK\
        \ (llm_backend IN ('anthropic', 'claude_cli', 'openai_compatible', 'openai_responses', 'mock', 'local')),\n    conversation_mode TEXT NOT NULL CHECK (conversation_mode\
        \ IN ('task', 'session', 'session_per_entity')),\n    parent_agent_id   TEXT,\n    entity_id         UUID,\n    config\
        \            JSONB NOT NULL DEFAULT '{}',\n    subscriptions     JSONB NOT NULL DEFAULT '[]',\n    emit_events   \
        \    JSONB NOT NULL DEFAULT '[]',\n    tools             JSONB NOT NULL DEFAULT '[]',\n    permissions       JSONB\
        \ NOT NULL DEFAULT '[]',\n    runtime_descriptor JSONB NOT NULL DEFAULT '{}',\n    lifecycle_phase   TEXT NOT NULL DEFAULT 'registered' CHECK (lifecycle_phase IN ('registered', 'running', 'terminated', 'failed')),\n    lifecycle_generation BIGINT NOT NULL DEFAULT 0 CHECK (lifecycle_generation >= 0),\n    lifecycle_runtime_epoch BIGINT NOT NULL DEFAULT 0 CHECK (lifecycle_runtime_epoch >= 0),\n    lifecycle_config_revision TEXT NOT NULL DEFAULT '',\n    lifecycle_run_mode TEXT NOT NULL DEFAULT 'stopped' CHECK (lifecycle_run_mode IN ('stopped', 'standard', 'authoritative_delivery_only')),\n    lifecycle_last_transition_id UUID,\n    status            TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active', 'paused',\
        \ 'terminated', 'failed')),\n    turn_count        INTEGER NOT NULL DEFAULT 0,\n    last_active_at    TIMESTAMPTZ,\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_agents_flow (flow_instance) WHERE flow_instance IS NOT\
        \ NULL,\n    INDEX idx_agents_role (role),\n    INDEX idx_agents_status (status),\n    INDEX idx_agents_parent (parent_agent_id)\
        \ WHERE parent_agent_id IS NOT NULL\n);"
    agent_sessions:
      description: 'Live reusable agent conversation sessions keyed by the current global agent_id identity. Used ONLY by session and session_per_entity
        conversation modes. Task mode does NOT create rows here — task-mode audit goes to
        agent_conversation_audits instead. Supports three scopes: entity (one session per agent × entity),
        flow (one session per agent × flow instance), global (one session per agent, shared across all
        entities). For authored normal agents, scope is derived from declared mode and MUST NOT be
        global. The global value is retained for platform-owned/internal system-service runtime state and historical/read-only
        persisted rows. scope_key is the lookup key.
        lease_holder/lease_expires_at for distributed session locking. Termination metadata captures WHY
        a row is terminated and WHETHER it was replaced; stale session meanings are not encoded as extra
        status values.'
      ddl: "CREATE TABLE agent_sessions (\n    session_id        UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id\
        \            UUID REFERENCES runs(run_id),\n    agent_id          TEXT NOT NULL REFERENCES agents(agent_id),\n\
        \    entity_id         UUID,\n    flow_instance     TEXT,\n    scope_key         TEXT NOT NULL,\n    scope         \
        \    TEXT NOT NULL DEFAULT 'entity' CHECK (scope IN ('entity', 'flow', 'global')),\n    conversation      JSONB NOT\
        \ NULL DEFAULT '[]',\n    turn_count        INTEGER NOT NULL DEFAULT 0,\n    runtime_mode      TEXT NOT NULL\
        \ CHECK (runtime_mode IN ('session', 'session_per_entity')),\n    runtime_state     JSONB NOT NULL\
        \ DEFAULT '{}',\n    lease_holder      TEXT,\n    lease_expires_at  TIMESTAMPTZ,\n    status            TEXT NOT\
        \ NULL DEFAULT 'active' CHECK (status IN ('active', 'suspended', 'terminated')),\n    termination_reason TEXT\
        \ CHECK (termination_reason IS NULL OR termination_reason IN ('normal', 'cancelled', 'failed', 'orphaned', 'contaminated', 'legacy')),\n\
        \    termination_detail TEXT,\n    successor_session_id UUID REFERENCES agent_sessions(session_id),\n    terminated_at TIMESTAMPTZ,\n    created_at        TIMESTAMPTZ\
        \ NOT NULL DEFAULT NOW(),\n    updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    CHECK ((status IN ('active', 'suspended') AND termination_reason IS NULL AND termination_detail IS NULL AND successor_session_id IS NULL AND terminated_at IS NULL) OR (status = 'terminated' AND termination_reason IS NOT NULL AND terminated_at IS NOT NULL)),\n    CHECK (termination_detail IS NULL OR termination_reason IS NOT NULL),\n    CHECK (successor_session_id IS NULL OR status = 'terminated'),\n    CHECK (successor_session_id IS NULL OR successor_session_id <> session_id),\n\
        \    UNIQUE INDEX agent_sessions_nonterminated_unique (agent_id, scope_key) WHERE status <> 'terminated',\n    INDEX idx_sessions_run (run_id) WHERE run_id IS NOT NULL,\n    INDEX idx_sessions_agent (agent_id, status),\n\
        \    INDEX idx_sessions_entity (entity_id) WHERE entity_id IS NOT NULL,\n    INDEX idx_sessions_scope (scope, status),\n\
        \    INDEX idx_sessions_lease (lease_expires_at) WHERE lease_holder IS NOT NULL,\n    INDEX idx_sessions_terminated_reason (termination_reason, terminated_at) WHERE status = 'terminated'\n);"
      scope_rules:
        entity: entity_id NOT NULL, flow_instance NOT NULL, scope_key = entity_id. One session per agent per entity.
        flow: entity_id NULL, flow_instance NOT NULL, scope_key = flow_instance. One session per agent per flow instance.
        global: entity_id NULL, flow_instance NULL, scope_key = "global". One session per agent across the entire system.
          Reserved for platform-owned/internal system services and historical/read-only persisted rows, not product-authored
          normal agents.
      lookup_pattern: 'Runtime acquires sessions via (agent_id, scope_key) with explicit status filtering.
        The scope_key is derived from conversation_mode: task → no session lookup, no agent_sessions row
        (audit goes to agent_conversation_audits). session_per_entity + session_scope entity → scope_key =
        entity_id. session + session_scope flow → scope_key = flow_instance. session + session_scope global
        → scope_key = "global" only for platform-owned/internal system-service runtime state and historical/read-only
        rows. No actor-shape inference.'
      live_owner_query: 'Live session ownership MUST query status = ''active'' only.'
      resumable_owner_query: 'Resume/supersession ownership MUST query status IN (''active'', ''suspended'').'
      status_lifecycle: 'status remains active, suspended, terminated. orphaned and contaminated are
        termination reasons. superseded is represented by successor_session_id IS NOT NULL. Terminated
        rows are historical lineage and are never resurrected into live ownership.'
    agent_turns:
      description: 'Append-only per-turn agent execution audit log. Records the triggering event context, visible tools,
        attempted tool calls, emitted event names, canonical per-turn turn_blocks, and sanitized request/response payloads.
        turn_blocks is the ordered per-turn projection/surface for the flight recorder. It is populated from the canonical
        platform.runtime_log stream plus turn-local publish/tool transcript context. turn_blocks MUST include exactly one
        canonical turn_summary block when assistant-visible output, outcome, reasoning blocks, progress updates, or tool
        results are present for the turn. The turn_summary block is the canonical persisted read-model surface for dashboard/debug
        consumers; readers MUST NOT reconstruct those fields from raw transcript payloads. Used by all conversation modes.
        For task mode, this is the primary per-turn audit record (no agent_sessions row exists). For session modes, this
        complements the live session with a queryable historical record.'
      ddl: "CREATE TABLE agent_turns (\n    turn_id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id\
        \             UUID REFERENCES runs(run_id),\n    agent_id           TEXT NOT NULL,\n    session_id         UUID\
        \ NOT NULL,\n    runtime_mode       TEXT NOT NULL DEFAULT 'task' CHECK (runtime_mode IN ('task', 'session', 'session_per_entity')),\n\
        \    scope_key          TEXT,\n    entity_id          UUID,\n    trigger_event_id\
        \   UUID,\n    trigger_event_type TEXT,\n    task_id            TEXT,\n    available_tools    JSONB NOT NULL DEFAULT\
        \ '[]',\n    tool_calls         JSONB NOT NULL DEFAULT '[]',\n    emitted_events     JSONB NOT NULL DEFAULT '[]',\n\
        \    mcp_servers        JSONB NOT NULL DEFAULT '{}',\n    mcp_tools_listed   JSONB NOT NULL DEFAULT '[]',\n    mcp_tools_visible\
        \  JSONB NOT NULL DEFAULT '[]',\n    request_payload    JSONB,\n    response_payload   JSONB,\n    turn_blocks      JSONB NOT NULL DEFAULT '[]',\n    parse_ok      \
        \     BOOLEAN NOT NULL DEFAULT FALSE,\n    latency_ms         INTEGER NOT NULL DEFAULT 0,\n    retry_count       \
        \ INTEGER NOT NULL DEFAULT 0,\n    failure            JSONB,\n    created_at         TIMESTAMPTZ NOT NULL DEFAULT\
        \ NOW(),\n    INDEX idx_agent_turns_run (run_id, created_at) WHERE run_id IS NOT NULL,\n    INDEX idx_agent_turns_session\
        \ (session_id, created_at),\n    INDEX idx_agent_turns_agent (agent_id, created_at),\n    INDEX idx_agent_turns_event\
        \ (trigger_event_id) WHERE trigger_event_id IS NOT NULL\n);"
    agent_conversation_audits:
      description: 'Write-only audit table for task-mode conversation snapshots. One row per task-mode
        agent invocation. The conversation transcript is persisted here after each invocation for debugging
        and the builder Run tab. This table is NEVER read back for subsequent invocations — it is purely
        for audit/debug. Dashboard/readers distinguish live sessions (agent_sessions) from task audits
        (agent_conversation_audits) by table, not by convention.'
      ddl: "CREATE TABLE agent_conversation_audits (\n    session_id        UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
        \    run_id            UUID REFERENCES runs(run_id),\n    agent_id          TEXT NOT NULL,\n    entity_id\
        \         UUID,\n    flow_instance     TEXT,\n    scope_key         TEXT,\n    scope             TEXT\
        \ NOT NULL DEFAULT 'global' CHECK (scope IN ('entity', 'flow', 'global')),\n    conversation      JSONB NOT NULL\
        \ DEFAULT '[]',\n    turn_count        INTEGER NOT NULL DEFAULT 0,\n    runtime_mode      TEXT NOT NULL DEFAULT\
        \ 'task' CHECK (runtime_mode = 'task'),\n    runtime_state     JSONB NOT NULL DEFAULT '{}',\n    status\
        \            TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active', 'suspended', 'terminated')),\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n\
        \    INDEX idx_audits_run (run_id, created_at) WHERE run_id IS NOT NULL,\n    INDEX idx_audits_agent (agent_id,\
        \ created_at),\n    INDEX idx_audits_entity (entity_id) WHERE entity_id IS NOT NULL\n);"
      primary_key: 'session_id — shared identifier with agent_turns.session_id. Task-mode turns reference
        the audit row via the same session_id, matching the runtime''s existing linking model.'
      status_lifecycle: 'Task audit rows remain active for dashboard/reader visibility. The status values
        (active, suspended, terminated) match the agent_sessions status model for consistency. Dashboard
        readers query status = active to find visible task-mode audit records. The runtime does NOT
        transition task audits to completed/failed — they stay active as part of the visible audit surface.'
      scope_model: 'scope_key is nullable. scope defaults to global. Task-mode invocations may produce
        audit rows without a specific scope key (e.g., root-level agents with no entity or flow context).
        When entity_id or flow_instance is available, the runtime sets scope_key and scope accordingly.'
      write_only: 'This table is append/update only from the runtime perspective. The runtime writes the
        audit row after each task-mode invocation. It is NEVER read back to construct agent context.
        Readers are: dashboard API, flight recorder queries, debug tools.'
      relationship_to_agent_turns: 'agent_conversation_audits holds the full conversation snapshot per
        invocation. agent_turns holds the per-turn structured execution log. Both are audit surfaces.
        agent_turns is more granular (one row per turn). agent_conversation_audits captures the complete
        conversation context (all messages, all tool results) in one row.'
    routing_rules:
      description: 'Unified routing table for both contract-defined patterns and materialized instance routes. Replaces the
        need for a separate flow_instance_routes table. At boot: contract subscriptions inserted as pattern rows (is_wildcard
        may be true). On create_flow_instance: wildcard patterns expanded into concrete rows (is_materialized = true, materialized_from
        = parent rule_id). On flow instance termination: materialized rows set to inactive. Event dispatch: match concrete
        routes first (is_materialized = true, exact match), fall back to wildcard patterns.'
      ddl: "CREATE TABLE routing_rules (\n    rule_id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    event_pattern\
        \     TEXT NOT NULL,\n    subscriber_type   TEXT NOT NULL CHECK (subscriber_type IN ('node', 'agent')),\n    subscriber_id\
        \     TEXT NOT NULL,\n    flow_instance     TEXT,\n    source_flow       TEXT,\n    is_wildcard       BOOLEAN NOT\
        \ NULL DEFAULT FALSE,\n    is_materialized   BOOLEAN NOT NULL DEFAULT FALSE,\n    materialized_from UUID,\n    status\
        \            TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active', 'inactive')),\n    created_at        TIMESTAMPTZ\
        \ NOT NULL DEFAULT NOW(),\n    INDEX idx_routing_event (event_pattern, status),\n    INDEX idx_routing_subscriber\
        \ (subscriber_id),\n    INDEX idx_routing_flow (flow_instance) WHERE flow_instance IS NOT NULL,\n    INDEX idx_routing_materialized\
        \ (materialized_from) WHERE materialized_from IS NOT NULL\n);"
      lifecycle:
        boot: Load contract subscriptions → INSERT pattern rows. Clear stale materialized rows from previous boot.
        create_flow_instance: For each wildcard pattern matching the new instance path → INSERT materialized row with concrete
          flow_instance and rendered subscriber_id using the dynamic_instance_lifecycle.route_materialization activation variable
          set.
        terminate_flow_instance: UPDATE materialized rows for this flow_instance → status = inactive.
        event_dispatch: SELECT WHERE event_pattern matches AND status = active. Concrete rows (is_materialized) take priority
          over wildcards.
    mailbox:
      description: 'Human-in-the-loop task queue. Payload-centric model — all task-specific data in payload JSONB. item_type
        distinguishes task kinds: human_task, review_request, approval, alert, operational_decision. human_tasks are represented
        as mailbox items with item_type = "human_task". from_agent identifies the requesting agent. summary provides a human-readable
        description. decision_notes captures the human rationale. notified tracks whether the human was alerted. source_event_id
        links back to the triggering event for traceability. reply_context_id is platform-only route-scoped continuation
        authority and must never be copied into payload.'
      ddl: "CREATE TABLE mailbox (\n    item_id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    entity_id     \
        \    UUID,\n    flow_instance     TEXT,\n    scope             TEXT NOT NULL DEFAULT 'entity' CHECK (scope IN ('entity',\
        \ 'flow', 'global')),\n    item_type         TEXT NOT NULL,\n    source_event_id   UUID,\n    from_agent        TEXT,\n\
        \    severity          TEXT NOT NULL DEFAULT 'normal' CHECK (severity IN ('normal', 'urgent', 'critical')),\n    summary\
        \           TEXT,\n    payload           JSONB NOT NULL DEFAULT '{}',\n    status            TEXT NOT NULL DEFAULT\
        \ 'pending' CHECK (status IN ('pending', 'decided', 'expired', 'cancelled')),\n    decision          TEXT,\n    decision_notes\
        \    TEXT,\n    decided_by        TEXT,\n    decided_at        TIMESTAMPTZ,\n    notified          BOOLEAN NOT NULL\
        \ DEFAULT FALSE,\n    expires_at        TIMESTAMPTZ,\n    deferred_until    TIMESTAMPTZ,\n    reply_context_id  TEXT REFERENCES reply_contexts(reply_context_id),\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n\
        \    INDEX idx_mailbox_status (status, severity, created_at),\n    INDEX idx_mailbox_entity (entity_id) WHERE entity_id\
        \ IS NOT NULL,\n    INDEX idx_mailbox_type (item_type, status),\n    INDEX idx_mailbox_global (scope, status) WHERE\
        \ scope = 'global'\n);"
    api_idempotency:
      description: 'Reusable v1 API idempotency replay store. One row per (method, actor token id, idempotency key). Stores
        the canonical request hash and original completed response for the TTL window required by api_specification.conventions.idempotency.'
      ddl: "CREATE TABLE api_idempotency (\n    method            TEXT NOT NULL,\n    actor_token_id    TEXT NOT NULL,\n\
        \    idempotency_key   TEXT NOT NULL,\n    request_hash      TEXT NOT NULL,\n    resource_id       TEXT NOT NULL,\n\
        \    response          JSONB NOT NULL,\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    expires_at\
        \        TIMESTAMPTZ NOT NULL,\n    PRIMARY KEY (method, actor_token_id, idempotency_key),\n    INDEX idx_api_idempotency_expires\
        \ (expires_at)\n);"
    conversation_forks:
      description: 'Canonical forkchat lifecycle store for conversation.fork, conversation.fork_list, conversation.fork_view,
        conversation.fork_chat, and conversation.fork_delete. Rows record source session/run/agent lineage, the validated
        fork-point descriptor, creator token, fixed lifecycle TTL, and soft-deletion state. This table is isolated from
        agent_sessions, agent_turns, events, runtime logs, and dashboard conversation readers; fork chat execution consumes
        conversation_fork_snapshots and conversation_fork_turns rather than writing normal conversation/event/log surfaces.'
      ddl: "CREATE TABLE conversation_forks (\n    fork_id                UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
        \    source_session_id      UUID NOT NULL,\n    source_run_id          UUID,\n    source_agent_id        TEXT NOT\
        \ NULL,\n    fork_point_kind       TEXT NOT NULL CHECK (fork_point_kind IN ('turn', 'event', 'time')),\n    fork_point_turn_index\
        \ INTEGER,\n    fork_point_turn_id UUID,\n    fork_point_event_id UUID,\n    fork_point_at         TIMESTAMPTZ,\n\
        \    fork_point_selected_at TIMESTAMPTZ NOT NULL,\n    created_by            TEXT NOT NULL,\n    created_at   \
        \         TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    expires_at            TIMESTAMPTZ NOT NULL,\n    deleted_at\
        \            TIMESTAMPTZ,\n    CHECK ((fork_point_kind = 'turn' AND fork_point_turn_index IS NOT NULL AND fork_point_turn_id\
        \ IS NOT NULL AND fork_point_event_id IS NULL AND fork_point_at IS NULL) OR (fork_point_kind = 'event' AND fork_point_turn_index\
        \ IS NOT NULL AND fork_point_turn_id IS NOT NULL AND fork_point_event_id IS NOT NULL AND fork_point_at IS NULL) OR\
        \ (fork_point_kind = 'time' AND fork_point_turn_index IS NOT NULL AND fork_point_turn_id IS NOT NULL AND fork_point_at\
        \ IS NOT NULL)),\n    INDEX idx_conversation_forks_source (source_session_id, created_at DESC),\n    INDEX idx_conversation_forks_created\
        \ (created_at DESC, fork_id),\n    INDEX idx_conversation_forks_active (expires_at) WHERE deleted_at IS NULL\n);"
    conversation_fork_snapshots:
      description: 'Forkchat source-at-fork snapshot owner for conversation.fork_chat. One row per fork captures the source
        turn descriptor plus the source run entity projection reconstructed from entity_mutations at fork_point_selected_at.
        Read-only forkchat tools consume this row; they must not read live entity_state or post-fork source mutations.'
      ddl: |
        CREATE TABLE conversation_fork_snapshots (
            fork_id                  UUID PRIMARY KEY REFERENCES conversation_forks(fork_id) ON DELETE CASCADE,
            source_session_id        UUID NOT NULL,
            source_run_id            UUID,
            source_agent_id          TEXT NOT NULL,
            fork_point_turn_id       UUID NOT NULL,
            fork_point_turn_index    INTEGER NOT NULL,
            fork_point_selected_at   TIMESTAMPTZ NOT NULL,
            source_turn              JSONB NOT NULL DEFAULT '{}',
            entity_snapshot          JSONB NOT NULL DEFAULT '[]',
            snapshot_owner           TEXT NOT NULL CHECK (snapshot_owner = 'conversation.fork_chat.snapshot.v1'),
            created_at               TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            INDEX idx_conversation_fork_snapshots_source_run (source_run_id) WHERE source_run_id IS NOT NULL
        );
    conversation_fork_turns:
      description: 'Fork-local transcript owner for conversation.fork_chat. Rows are intentionally separate from agent_turns,
        events, runtime logs, and dashboard conversation readers. Side-effecting tools are recorded under sandbox_policy/tool_calls
        as stubbed fork-local facts and must not mutate live state.'
      ddl: |
        CREATE TABLE conversation_fork_turns (
            fork_turn_id       UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            fork_id            UUID NOT NULL REFERENCES conversation_forks(fork_id) ON DELETE CASCADE,
            turn_index         INTEGER NOT NULL CHECK (turn_index >= 1),
            actor_token_id     TEXT NOT NULL,
            message            TEXT NOT NULL,
            assistant_message  TEXT NOT NULL,
            request_payload    JSONB NOT NULL,
            response_payload   JSONB NOT NULL,
            tool_calls         JSONB NOT NULL DEFAULT '[]',
            sandbox_policy     JSONB NOT NULL,
            snapshot_owner     TEXT NOT NULL CHECK (snapshot_owner = 'conversation.fork_chat.snapshot.v1'),
            created_at         TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            UNIQUE (fork_id, turn_index),
            INDEX idx_conversation_fork_turns_fork (fork_id, turn_index)
        );
    runtime_ingress_state:
      description: 'Durable singleton runtime ingress state owned by the canonical runtime ingress controller. It records whether
        queueable event-producing ingress is running or paused, the last transition reason/actor, and the platform event emitted
        for that transition. Runtime pause/resume API handlers, dashboard adapters, inbound admission, MCP/tool admission,
        auth-breaker safety triggers, and reset safety triggers consume this owner instead of interpreting a process-local flag
        as semantic truth.'
      ddl: "CREATE TABLE runtime_ingress_state (\n    id                  INTEGER PRIMARY KEY DEFAULT 1 CHECK (id = 1),\n\
        \    status              TEXT NOT NULL CHECK (status IN ('running', 'paused')),\n    reason              TEXT,\n\
        \    controlled_by       TEXT NOT NULL,\n    transition_event_id UUID REFERENCES events(event_id),\n    updated_at\
        \          TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);"
    run_control_state:
      description: 'Durable per-run operator lifecycle-control state owned by the canonical run-control owner. It distinguishes
        operator-paused runs from fork-materialized paused rows, records stop/pause/continue transition reason and actor, and
        is consumed by run.stop, run.pause, run.continue, EventBus run-scoped dispatch gating, and legacy Builder adapters.
        Runtime ingress pause/resume does not consume this owner. reason is the sole non-failure cancellation/control-reason
        owner; it never names or reconstructs a runtime failure class.'
      ddl: "CREATE TABLE run_control_state (\n    run_id         UUID PRIMARY KEY REFERENCES runs(run_id) ON DELETE CASCADE,\n\
        \    control_status TEXT NOT NULL CHECK (control_status IN ('running', 'paused', 'stopped')),\n    reason         TEXT,\n\
        \    controlled_by  TEXT NOT NULL,\n    paused_at      TIMESTAMPTZ,\n    stopped_at     TIMESTAMPTZ,\n    updated_at\
        \      TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_run_control_state_status (control_status, updated_at)\n\
        );"
    spend_ledger:
      description: LLM token and API cost tracking. One row per agent invocation. usage_accounting is the canonical exact-vs-estimated usage owner for public read surfaces; existing rows without prior accounting evidence migrate conservatively to estimated.
      ddl: "CREATE TABLE spend_ledger (\n    ledger_id         UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    entity_id\
        \         UUID,\n    flow_instance     TEXT NOT NULL,\n    agent_id          TEXT NOT NULL,\n    model           \
        \  TEXT NOT NULL,\n    model_alias      TEXT NOT NULL DEFAULT 'unknown',\n    backend_profile  TEXT NOT NULL DEFAULT\
        \ 'unknown',\n    provider         TEXT NOT NULL DEFAULT 'unknown',\n    transport        TEXT NOT NULL DEFAULT\
        \ 'unknown',\n    resolved_model   TEXT NOT NULL DEFAULT 'unknown',\n    input_tokens      INTEGER NOT NULL DEFAULT\
        \ 0,\n    output_tokens     INTEGER NOT NULL DEFAULT 0,\n    cost_usd          NUMERIC(10,6) NOT NULL DEFAULT\
        \ 0,\n    invocation_type   TEXT NOT NULL,\n    usage_accounting TEXT NOT NULL DEFAULT 'estimated' CHECK (usage_accounting\
        \ IN ('exact', 'estimated')),\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_spend_flow (flow_instance, created_at),\n    INDEX idx_spend_agent\
        \ (agent_id, created_at)\n);"
    flow_instances:
      description: Registry of all flow instances (static and dynamic). One row per instance.
      ddl: "CREATE TABLE flow_instances (\n    instance_id       TEXT PRIMARY KEY,\n    flow_template     TEXT NOT NULL,\n\
        \    mode              TEXT NOT NULL CHECK (mode IN ('static', 'template')),\n    parent_instance   TEXT,\n    config\
        \            JSONB NOT NULL DEFAULT '{}',\n    status            TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active',\
        \ 'draining', 'terminated')),\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    terminated_at     TIMESTAMPTZ\n\
        );"
    timers:
      description: 'Durable timer and scheduled task store. Persisted across restarts. Run-scoped timers carry run_id and
        are claimed, fired, cancelled, and recovered under that run identity. Entity-scoped timers: entity_id and
        flow_instance set, tied to a specific entity lifecycle inside run_id. Global timers: entity_id, flow_instance,
        and run_id NULL, used for boot-start workflow timers and platform-level work (periodic scans, health checks,
        digest compilation).
        fire_payload carries business input when the timer fires; reply_context_id separately carries opaque route-scoped
        continuation authority for one-shot timers. owner_node OR owner_agent identifies who declared the timer
        (mutually exclusive). source_timer_id, forked_from_run_id, forked_from_event_id, and reconstruction_owner are
        lineage-only fields for fork-local reconstructed timers and must not make the source timer executable fork truth.
        recurrence_cron supports cron expressions for global recurring schedules. recurrence_interval supports duration
        strings (e.g., "24h") for entity-scoped recurring timers. task_type: timer (one-shot schedule, including global
        non-recurring boot timers), scheduled_task (recurring entity), deadline (hard cutoff), global_recurring
        (global recurring work).'
      ddl: "CREATE TABLE timers (\n    timer_id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    timer_name     \
        \   TEXT NOT NULL,\n    run_id            UUID REFERENCES runs(run_id),\n    source_timer_id   UUID REFERENCES timers(timer_id),\n\
        \    forked_from_run_id UUID REFERENCES runs(run_id),\n    forked_from_event_id UUID REFERENCES events(event_id),\n\
        \    reconstruction_owner TEXT,\n    entity_id         UUID,\n    flow_instance     TEXT,\n    fire_event        TEXT NOT NULL,\n\
        \    fire_payload      JSONB NOT NULL DEFAULT '{}',\n    fire_at           TIMESTAMPTZ NOT NULL,\n    recurring  \
        \       BOOLEAN NOT NULL DEFAULT FALSE,\n    recurrence_cron   TEXT,\n    recurrence_interval TEXT,\n    owner_node\
        \        TEXT,\n    owner_agent       TEXT,\n    reply_context_id  TEXT REFERENCES reply_contexts(reply_context_id),\n    task_type         TEXT NOT NULL DEFAULT 'timer' CHECK (task_type\
        \ IN ('timer', 'scheduled_task', 'deadline', 'global_recurring')),\n    status            TEXT NOT NULL DEFAULT 'active'\
        \ CHECK (status IN ('active', 'fired', 'cancelled', 'expired')),\n    fired_at          TIMESTAMPTZ,\n    created_at\
        \        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_timers_run (run_id, status, fire_at) WHERE run_id IS NOT NULL,\n\
        \    INDEX idx_timers_source_lineage (source_timer_id) WHERE source_timer_id IS NOT NULL,\n    INDEX idx_timers_fire (status, fire_at),\n    INDEX idx_timers_entity\
        \ (entity_id) WHERE entity_id IS NOT NULL,\n    INDEX idx_timers_flow (flow_instance) WHERE flow_instance IS NOT NULL,\n\
        \    INDEX idx_timers_global (task_type, status) WHERE entity_id IS NULL\n);"
      scope_rules:
        entity_scoped: entity_id NOT NULL, flow_instance NOT NULL, run_id set for runtime-owned entity timers. Tied to entity
          lifecycle inside run_id. Cancelled when entity reaches terminal state.
        global: entity_id NULL, flow_instance NULL, run_id NULL. Platform-level. Not tied to any entity. Survives entity
          lifecycle.
        flow_scoped: entity_id NULL, flow_instance NOT NULL, run_id set for runtime-owned flow timers. Tied to flow instance
          inside run_id. Cancelled when flow instance terminates.
    dead_letters:
      description: Failed events after a terminal delivery disposition. The canonical failure envelope is preserved verbatim from the triggering runtime failure; lifecycle and retry counters remain dead-letter-owned facts.
      ddl: "CREATE TABLE dead_letters (\n    dead_letter_id    UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    original_event_id\
        \ UUID REFERENCES events(event_id),\n    original_event    TEXT NOT NULL,\n    original_payload  JSONB NOT NULL DEFAULT\
        \ '{}',\n    entity_id         UUID,\n    flow_instance     TEXT NOT NULL,\n    failure           JSONB NOT NULL,\n   \
        \ retry_count       INTEGER NOT NULL DEFAULT 0,\n    chain_depth       INTEGER NOT NULL DEFAULT 0,\n    handler_node\
        \      TEXT,\n    created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    INDEX idx_dead_letters_flow (flow_instance,\
        \ created_at),\n    INDEX idx_dead_letters_class ((failure->>'class'))\n);"
    runs:
      description: 'Platform run registry. A run is a top-level execution context — everything that happens from a
        system.started event or a fork operation. Every event, delivery, session, and turn belongs to exactly one run.
        run_id is the primary correlation key for observability, debugging, and fork/replay. Forked runs link back to
        their parent via forked_from_run_id and forked_from_event_id.'
      ddl: "CREATE TABLE runs (\n    run_id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    status            TEXT\
        \ NOT NULL DEFAULT 'running' CHECK (status IN ('running', 'paused', 'completed', 'failed', 'cancelled', 'forked')),\n\
        \    bundle_hash        TEXT CHECK (bundle_hash IS NULL OR bundle_hash ~ '^bundle-v1:sha256:[0-9a-f]{64}$'),\n\
        \    bundle_source      TEXT NOT NULL DEFAULT 'legacy' CHECK (bundle_source IN ('persisted', 'ephemeral', 'deleted', 'legacy')),\n\
        \    bundle_fingerprint TEXT,\n    trigger_event_id  UUID,\n    trigger_event_type TEXT,\n    forked_from_run_id UUID REFERENCES runs(run_id),\n\
        \    forked_from_event_id UUID,\n    entity_count      INTEGER NOT NULL DEFAULT 0,\n    event_count       INTEGER\
        \ NOT NULL DEFAULT 0,\n    failure           JSONB,\n    started_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n\
        \    ended_at          TIMESTAMPTZ,\n    INDEX idx_runs_status (status, started_at),\n    INDEX idx_runs_fork\
        \ (forked_from_run_id) WHERE forked_from_run_id IS NOT NULL,\n    INDEX idx_runs_bundle_hash (bundle_hash) WHERE bundle_hash IS NOT NULL,\n\
        \    INDEX idx_runs_bundle_source_status (bundle_source, status, started_at),\n    INDEX idx_runs_bundle_delete_planning\
        \ (bundle_hash, status) WHERE bundle_hash IS NOT NULL\n);"
      lifecycle:
        running: Active execution. Events being processed.
        paused: Execution suspended (budget threshold, admin action). Resumable.
        completed: All pipelines reached terminal states or idle. No in-flight events.
        failed: Unrecoverable error. Run cannot continue.
        cancelled: Admin-terminated. In-flight events drained but no new processing.
        forked: 'A new run was forked from this one. Original run is frozen at the fork point.
          The forked run continues execution independently.'
      terminal_evidence:
        canonical_owner: internal/store/runlifecycle plus internal/runtime/failures
        store_enforcement:
          postgres: Hard status/failure and status/ended_at constraints installed by the canonical failure migration owner.
          sqlite: Equivalent fail-closed insert/update triggers installed by the canonical failure migration owner because the shared DDL translator does not interpret table-level named checks.
        status_matrix:
          running:
            failure: forbidden
            ended_at: forbidden
            control_reason: optional last continue/control transition evidence only
          paused:
            failure: forbidden
            ended_at: forbidden
            control_reason: optional for fork-materialized pause; required on an operator-paused control row
          completed:
            failure: forbidden
            ended_at: required
            control_reason: historical control evidence only, never completion cause
          failed:
            failure: required_valid_platform_failure_v1
            ended_at: required
            control_reason: historical control evidence only; runs.failure solely explains failed status
          cancelled:
            failure: forbidden
            ended_at: required
            control_reason: required_nonempty_with_control_status_stopped; sole terminal cancellation reason
          forked:
            failure: forbidden
            ended_at: required
            control_reason: historical control evidence only; fork lineage explains the status
        persistence_operation: MarkRunTerminal accepts a typed failure and returns the authoritative persisted snapshot from one store-owned transaction. Builder and other callers must not perform a second semantic readback.
        immutability: A repeated terminal write is idempotent only when status and canonical failure match exactly. Conflicting failure evidence or terminal status fails closed.
        migration:
          failed_rows: Migrate only a strictly valid platform.failure/v1 value. Empty or prose-only evidence aborts with status, count, and run IDs; no text heuristic exists.
          cancelled_rows: Never map to failure. A legacy value migrates only when it is a closed preservation reason and exactly matches an existing stopped run_control_state.reason; missing or conflicting evidence aborts.
          other_rows: running, paused, completed, and forked rows with failure or legacy error evidence abort.
          removal: runs.error_summary is dropped from both stores and every interface/readback. No alias, fallback, compatibility reader, or dual-write survives.
      terminal_event_identity:
        owner: internal/runtime/failures.SemanticFingerprint consumed by Builder run debug projection
        fields:
        - schema_version
        - class
        - detail.code
        - canonically encoded detail.attributes
        - retryable
        - deterministic
        - component
        - operation
        excluded:
        - message
        - remediation
        rule: Failed terminal event identity is run_id plus status plus ended_at plus the semantic fingerprint. Non-failed terminal identity is run_id plus status plus ended_at. Presentation wording never changes identity.
      run_id_propagation: 'run_id is set once at event creation time and propagated through the causal chain.
        When a handler emits a new event, the child event inherits run_id from the parent event.
        External events (API, webhook, admin CLI) start a new run or join an existing one
        based on the ingress configuration.'
      bundle_hash: 'Nullable canonical bundle identity for the run. Values use the
        multi_bundle_persistence.bundle_identity format and intentionally have no database foreign key
        to bundles.bundle_hash so historical audit identity survives bundle deletion.'
      bundle_source: 'Required bundle availability/source classifier. Existing rows are legacy; current
        writers without a gate-approved canonical v1 source fact write legacy with bundle_hash NULL.
        Later multi-bundle children own persisted/ephemeral/deleted source stamping.'
      bundle_fingerprint: 'Legacy pre-multi-bundle compatibility column. It is not the canonical run
        bundle identity after #1013 and must not be copied into bundle_hash. Remaining public/code
        migration is tracked by #1001; reader migration is tracked by #1014.'
    entity_mutations:
      description: 'Append-only mutation log for entity_state changes. Every write to entity_state.fields,
        entity_state.current_state, entity_state.gates, or entity_state.accumulator produces a row.
        The mutation log is the audit trail for the flight recorder and the undo log for fork/replay.
        Not a separate event stream — just a side-table that captures the before/after of every state change.'
      ddl: "CREATE TABLE entity_mutations (\n    mutation_id       UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    run_id\
        \            UUID NOT NULL REFERENCES runs(run_id),\n    entity_id         UUID NOT NULL,\n    field             TEXT\
        \ NOT NULL,\n    old_value         JSONB,\n    new_value         JSONB,\n    caused_by_event   UUID REFERENCES\
        \ events(event_id),\n    writer_type       TEXT NOT NULL CHECK (writer_type IN ('system_node', 'agent', 'platform')),\n\
        \    writer_id         TEXT NOT NULL,\n    handler_step      TEXT,\n    created_at        TIMESTAMPTZ NOT NULL\
        \ DEFAULT NOW(),\n    INDEX idx_mutations_run (run_id, created_at),\n    INDEX idx_mutations_entity (entity_id,\
        \ created_at),\n    INDEX idx_mutations_event (caused_by_event) WHERE caused_by_event IS NOT NULL\n);"
      write_sources:
        system_node_handlers: 'data_accumulation writes, compute store_as, sets_gate, advances_to (current_state),
          clear (gate/accumulator resets). writer_type = system_node, writer_id = node ID,
          handler_step = the handler step name (e.g., data_accumulation, compute, sets_gate).'
        agent_tool_calls: 'save_entity_field tool calls. writer_type = agent, writer_id = agent ID,
          handler_step = save_entity_field.'
        platform_operations: 'create_entity (initial field population), entity state fixes during recovery.
          writer_type = platform, writer_id = operation name.'
      not_logged: 'Event payloads (already in events table). Agent conversation turns (already in agent_turns).
        Read operations (get_entity, search_entities, query_entities). Timer creation/cancellation.'
      hot_path_cost: 'One extra read (old value) + one insert per field write. The read is a single JSONB field
        extraction from entity_state — sub-millisecond. The insert is append-only with no unique constraints
        on the hot path. Given LLM calls at 1-30 seconds per agent turn, the overhead is negligible.'
    schema_version:
      description: 'Platform schema versioning. Tracks which version of the platform DDL has been applied. The platform checks
        this at boot: if the stored version < current platform version, it applies migrations. Products never read or write
        this table.'
      ddl: "CREATE TABLE schema_version (\n    id                INTEGER PRIMARY KEY DEFAULT 1 CHECK (id = 1),\n    platform_version\
        \  TEXT NOT NULL,\n    applied_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    migration_log     JSONB NOT NULL\
        \ DEFAULT '[]'\n);"
  notes:
    product_tables: Product-specific tables (entity fields, custom state) are generated from entities.yaml plus the shared
      type system.
      Those are contract-driven, not listed here.
    migrations: Platform table schema is versioned with the platform version. The platform generates DDL at boot and applies
      migrations if the schema version changed. Products never modify platform tables directly.
    index_syntax: INDEX declarations are logical — the implementer may use CREATE INDEX statements or database-specific syntax.
      The spec declares intent, not SQL dialect.
  diagnostics_encoding:
    description: Runtime diagnostics are encoded into existing platform tables. No dedicated diagnostics table.
    runtime_log_encoding:
      table: events
      event_name: platform.runtime_log
      scope: global (entity_id NULL, flow_instance NULL)
      produced_by_type: platform
      payload_fields:
        log_level: string (debug, info, warn, error, fatal)
        message: human-readable summary written by the producer; not a machine key
        details: object (structured source of truth; includes component, action, optional canonical failure, timing, and runtime context fields)
        stack_trace: string (for errors only)
      design_rules:
      - message is for humans; details is the machine-readable source of truth
      - component and action live in details, not as top-level runtime_log fields
      - failure-bearing entries carry details.failure as a platform.failure/v1 envelope; details.error is forbidden and message is not a semantic classifier
      - readers and debug UIs should filter and render structured runtime diagnostics from details
      - >
        Tool-execution entries that consume external tool-provider dispatch admission include machine-readable
        details fields `rate_limit_scope`, `rate_limit_bucket_hash`, `rate_limit_limit`, `rate_limit_period_ms`,
        `rate_limit_max_wait_ms`, `rate_limit_wait_ms`, `rate_limit_outcome`, and `rate_limit_attempts`. If admission
        times out, details also include `error_code: rate_limited` and `retryable: true`.
      note: 'Queryable via: SELECT * FROM events WHERE event_name = "platform.runtime_log" AND payload->>log_level = "error"'
    pipeline_transition_encoding:
      table: event_receipts
      mapping:
        state_before: event_receipts.state_before
        state_after: event_receipts.state_after
        events_emitted: event_receipts.side_effects.emitted_events (JSONB array)
        drop_reason: event_receipts.outcome (reject/discard/kill) + side_effects.drop_reason
        duration: event_receipts.duration_ms
      note: Every handler execution already produces an event_receipt. The receipt captures state_before, state_after, outcome,
        duration, and side_effects. This IS the pipeline transition record. No separate table needed.
  entity_registry_policy: There is no separate entity registry table. entity_state IS the run-scoped current registry.
    Generic reads (list entities, find by slug, count by state) query entity_state through an explicit run context.
    Contract-driven typed entity tables are not created by normal runtime boot. They may become optional optimizations only
    if a future source-authority owner defines projection identity, run scoping, rebuild/backfill, cleanup, and exhaustive
    writer coverage. They are never required for correctness.
  entity_lifecycle_scoping:
    description: Entity identity can be compared across runs, but current entity state is run-scoped. Entity queries
      (search_entities, query_entities, get_entity) return entity_state rows from the current run context only. Cross-run
      duplicate detection or historical analysis must use an explicit cross-run read model rather than the live current-state
      registry.
    rationale: Mutating timestamp forks require source and fork runs to preserve entity_id while diverging safely. Global
      live current state would let forked execution overwrite or read source-run state by accident. Products that need
      historical or portfolio-wide duplicate detection must consume explicit cross-run history/read surfaces.
    dedup_responsibility: Duplicate detection across runs is a product concern, not a live current-state registry concern.
      Products that need cross-run dedup consume explicit cross-run history/read surfaces, not unscoped entity_state
      queries. Products implement dedup logic in their agents and guards — checking entity names, geographies, opportunity
      patterns, and scoped current states to decide whether a newly discovered entity is genuinely new or a rediscovery
      of an existing one.
    entity_state_for_dedup: 'When an agent checks for duplicates, the entity''s current_state provides context for the
      decision: active or in-pipeline entities are strong duplicates (skip). Recently killed entities are likely duplicates
      (skip unless evidence changed). Entities killed long ago may warrant re-evaluation if market conditions shifted.
      The platform does not enforce these rules — products encode them in agent prompts and guard conditions.'
    cleanup: 'Entity data is never auto-deleted. Retention policy and archival are operational concerns. The platform may
      provide a future archive/purge API, but entity_state rows persist indefinitely by default.'
  entity_metrics_convention:
    description: Metrics are entity fields in entity_state.fields JSONB. No separate table.
    canonical_fields:
      name: entity_state.name (top-level column)
      stage: entity_state.current_state (top-level column)
      users_total: entity_state.fields->>'users_total' (JSONB)
      mrr: entity_state.fields->>'mrr' (JSONB, numeric)
      spend: 'Aggregate from spend_ledger: SELECT SUM(cost_usd) FROM spend_ledger WHERE entity_id = X'
    digest_queries: Digest/reporting code should query entity_state for current metrics and spend_ledger for cost aggregates.
      No entity_metrics table.
  migration_policy: 'schema_version is a platform table. It survives the legacy SQL deletion. MigrationSpec and ApplyManagedMigrations
    remain as platform APIs — they apply DDL diffs between platform versions. ApplyMigrationFile is DELETED (no more file-based
    migrations). The boot sequence: read schema_version → compare to current platform version → generate DDL diff → apply
    → update schema_version.'
  test_bootstrap:
    description: After legacy SQL deletion, normal runtime/test bootstrap creates only platform tables plus generated
      node-state tables. Product-specific typed entity table DDL is explicit future/legacy optimization-test input, not
      normal boot input.
    sources:
      platform_tables: All tables from platform_tables.tables in platform-spec.yaml. Always created.
      node_state_tables: Generated from node state_schema in the flow contracts loaded for the test. Optional — only if the
        test uses generated node-local state tables.
      product_optimization_tables: Optional explicit future/legacy test-only DDL generated from entities.yaml plus
        types.yaml. Not created by production boot or generic test bootstrap.
    generic_store_tests: Generic store tests (postgres_smoke_test.go, etc.) bootstrap using platform_tables only. They create
      entities in entity_state, events in events, sessions in agent_sessions. No product contracts needed. No legacy SQL files.
      No migrations/ directory.
    product_integration_tests: Tests that explicitly exercise future/legacy product optimization tables may load product
      contracts and generate DDL from entities.yaml plus types.yaml. These tables are not normal runtime boot artifacts and
      are not supported entity current-state read authority.
    bootstrap_function: BootstrapPlatformTables(spec PlatformSpec) — reads platform_tables.tables, generates DDL, executes.
      Called by both production boot and test setup. Single code path.
  credentials_policy:
    description: Webhook secrets, API keys, and other credentials are NOT stored in platform tables. The platform provides
      a config surface; products choose their storage strategy.
    options:
      flow_instance_config: 'For per-instance secrets (webhook signing keys, API tokens): store in flow_instances.config JSONB
        under a "secrets" key. The platform does not encrypt this field — the product layer or infrastructure (encrypted-at-rest
        DB, vault sidecar) handles encryption.'
      external_vault: 'For production deployments: use an external secrets manager (HashiCorp Vault, AWS Secrets Manager,
        etc.). flow_instances.config stores a vault reference, not the secret itself.'
    migration_from_legacy: Legacy code that read workflow_instances.metadata.credentials must be rewritten to read from flow_instances.config.secrets.
      This is a product-level migration — inbound.go is product code, not platform code. Move it out of generic runtime.
    platform_guarantee: The platform never reads, writes, logs, or indexes credential fields. It treats flow_instances.config
      as opaque JSONB. Products own their secrets.
run_model:
  description: 'A run is the top-level execution context for the platform. Every event, delivery, session, turn,
    entity mutation, and current entity-state row belongs to exactly one run. Runs provide isolation for observability,
    debugging, and fork/replay. The run_id is the primary correlation key across all platform tables.'
  lineage:
    description: 'Event lineage is tracked via two fields: run_id (which run this event belongs to) and
      source_event_id (which event caused this event to be emitted). Together they replace the former trace_id
      column. run_id provides flat grouping (all events in a run). source_event_id provides causal ordering
      (parent → child event chain). No trace_id column exists — it has been removed from all platform tables.'
    run_id:
      description: 'The run this event belongs to. Set at event creation time. Propagated through the causal
        chain — when a handler or agent emits a new event, the child inherits run_id from the inbound event.
        External events (API, webhook, admin CLI) either join an active run or create a new one.'
      present_on:
      - events.run_id
      - event_deliveries.run_id
      - agent_sessions.run_id
      - agent_conversation_audits.run_id
      - agent_turns.run_id
      - entity_mutations.run_id
      - entity_state.run_id
      propagation_rule: 'Child event run_id = parent event run_id. The bus publish path reads run_id from
        the inbound event context and stamps it on every outbound event. No handler or agent code touches
        run_id directly.'
    source_event_id:
      description: 'The event that directly caused this event to be emitted. Forms a tree (not a DAG — each
        event has exactly one parent). The root event in a run has source_event_id = NULL. Walking
        source_event_id from any event back to NULL reconstructs the full causal chain.'
      present_on:
      - events.source_event_id
      usage:
        causal_chain: "WITH RECURSIVE chain AS (\n  SELECT * FROM events WHERE run_id = :run_id AND source_event_id\
          \ IS NULL\n  UNION ALL\n  SELECT e.* FROM events e JOIN chain c ON e.source_event_id = c.event_id\n\
          ) SELECT * FROM chain ORDER BY created_at;"
        parent_lookup: 'SELECT * FROM events WHERE event_id = :source_event_id'
        children: 'SELECT * FROM events WHERE source_event_id = :event_id'
    combined_queries:
      run_timeline: 'SELECT * FROM events WHERE run_id = :run_id ORDER BY created_at'
      causal_tree: "WITH RECURSIVE tree AS (\n  SELECT *, 0 AS depth FROM events WHERE run_id = :run_id\
        \ AND source_event_id IS NULL\n  UNION ALL\n  SELECT e.*, t.depth + 1 FROM events e JOIN tree t\
        \ ON e.source_event_id = t.event_id\n) SELECT * FROM tree ORDER BY depth, created_at;"
      entity_in_run: 'SELECT * FROM events WHERE run_id = :run_id AND entity_id = :entity_id ORDER BY created_at'
    fork_lineage: 'Forked runs link to their parent via runs.forked_from_run_id and runs.forked_from_event_id.
      This provides cross-run lineage: which run was this forked from, and at which event. The event
      tree within the forked run starts fresh (new event_ids, new source_event_id chains) — it does not
      extend the parent run''s event tree.'
  lifecycle:
    creation: 'A run is created when: (1) system.started fires (cold start), (2) an external event arrives with
      no active run (warm start), or (3) the runtime fork owner creates a forked run. The platform inserts a row
      in the runs table with status=running and returns the run_id. Public run forking is governed by
      multi_bundle_persistence.api_surface.run_fork and the intended CLI command
      `swarm run fork <source-run-id> [--bundle-hash <bundle_hash>] [--at-event <event-id>] [--idempotency-key <key>]`.'
    propagation: 'run_id propagates through the causal chain. When a handler or agent emits an event, the child
      event inherits run_id from the parent. This is set at event creation time in the bus publish path — no
      handler or agent code needs to pass run_id explicitly.'
    completion: 'A run transitions to completed when: all entities have reached terminal states AND no in-flight
      events remain (pending deliveries = 0). The runtime checks this after each event receipt. Runs with active
      timers remain running until the timers fire or are cancelled.'
    failure: 'A run transitions to failed when an unrecoverable platform error occurs (not a handler/agent error —
      those produce dead letters within the run). Examples: database connection loss, contract corruption, boot
      failure mid-run.'
    pause_resume: 'Run-scoped pause/resume is owned by run.pause and run.continue. Operator run-control transition
      state is persisted in run_control_state so run.continue can distinguish operator-paused runs from materialized
      fork rows that also use runs.status=paused. It gates dispatch for one run while in-flight events complete.
      Runtime-scoped external ingress pause/resume is a separate global control owned by api_specification.conventions.runtime_ingress.'
    stalled_run_escalation:
      owner: policy.runtime.stalled_run_escalation
      event_owner: platform_events.catalog.platform.run_stalled
      diagnosis_owner: internal/store/run_operational_status_read_surface.go.ProjectRunOperationalStatus
      progress_timestamp_owner: latest events.created_at for the run excluding platform.run_stalled self-alert rows
      default_policy:
        enabled: true
        threshold_seconds: 300
      policy_keys:
        runtime.stalled_run_escalation.enabled: boolean
        runtime.stalled_run_escalation.threshold_seconds: positive integer seconds
      rule: >
        The serve runtime may emit platform.run_stalled only for runs whose canonical run diagnosis
        projects operational_state=stalled and whose latest non-platform.run_stalled event timestamp is
        non-zero and at least threshold_seconds in the past. The platform.run_stalled event itself is
        not progress evidence and must not advance the dedupe timestamp. Runs with terminal run-table
        status, active-delivery diagnosis, or zero non-alert progress timestamp do not emit in this slice.
      dedupe: >
        The runtime emits at most one platform.run_stalled event for a tuple of
        (run_id, blocking_layer, blocking_reason, last_progress_at). A new event may be emitted only
        when canonical progress advances LastEventAt or the diagnosis tuple changes while the run
        remains stalled.
      non_owners:
      - mailbox item creation
      - incident records
      - dashboard alert UI
      - CLI alert rendering
  fork:
    description: 'Fork creates an isolated run by reconstructing provable current state at a point in time,
      optionally loading selected contracts, and then executing only owner-admitted fork-local work. The supported
      model is bounded re-execution from inputs: delivery_event_replay_ready pending unstarted agent deliveries,
      selected-contract frontier execution, and approved timer reconstruction. The system does not infer arbitrary
      unfinished work; in-progress delivery, session, turn, audit, non-agent, route, retry/idempotency, and other
      unsupported historical facts remain permanently fail-closed unless a later issue names a concrete consumer and
      proves a new owner.'
    command: 'public CLI: `swarm run fork <source-run-id> [--bundle-hash <bundle_hash>] [--at-event <event-id>] [--idempotency-key <key>]`, consuming /v1/rpc run.fork'
    dry_run_command: 'retired in v1 CLI; historical `swarm fork --dry-run` is not a supported operator command'
    materialize_only_command: 'retired in v1 CLI; historical `swarm fork --materialize-only` is not a supported operator command'
    activation_command: 'retired in v1 CLI; historical `swarm fork --activate` is not a supported operator command'
    planning_admission: 'The dry-run form is a read-only planning/admission surface. It resolves the fork
      point, reconstructs provable state, classifies replay candidates, optionally loads selected contracts
      for non-mutating contract/frontier/route admission, and returns execution_ready=false
      with named unsupported blockers whenever persisted recorder facts cannot prove safe execution. Dry-run
      MUST NOT create a forked run, mark the source run forked, copy entity state, redeliver events, or change
      runtime delivery/session/timer/route state.'
    materialize_only_admission: 'The materialize-only form is the first supported mutating fork slice. It
      consumes the canonical read-only planner, requires execution_ready=true, creates a fork run with
      status=paused and fork lineage, and writes reconstructed entity_state rows under the fork run_id.
      When selected contracts are provided, it may also persist a durable selected-contract source binding under the
      fork run_id after loading and validating that selected source, but that binding is prerequisite metadata only.
      It does not mark the source run forked, freeze the source run, redeliver pending work, resume event
      processing, change contracts, or mutate delivery/session/timer/route state. Materialized fork current-state
      rows start a new fork-local revision sequence at revision=1; source-at-T entity_state.revision is not
      copied because revision is a current-row commit counter, not append-only historical state in entity_mutations.
      Materialization MUST consume runtime.run_fork.materialized_entity_snapshot_metadata for every reconstructed
      entity before writing fork-local entity_state. That owner may use at/before-T event flow evidence, or source
      entity_state creation metadata when the source row was created at or before T, for flow_instance. Entity_type
      MUST come from source entity_state creation metadata when the source row was created at or before T; reconstructed
      fields.entity_type is projection state and MUST NOT authorize materialization, though a conflicting reconstructed
      value may fail closed. The owner MUST NOT read source current_state, gates, fields, accumulator, revision, or updated_at
      as fork-point projection truth. If flow_instance/entity_type cannot be proven for a reconstructed entity,
      materialization fails closed with entity_snapshot_metadata_unproven and writes no fork rows.
      Materialized fork rows preserve entered_state_at from the source-at-T current_state mutation evidence; they
      MUST NOT stamp entered_state_at with the fork point unless that is when the current_state was entered.
      Full fork execution remains a separately gated operation.'
    activation_admission: 'The activate form consumes an already materialized state-only fork and is the
      supported activation slice for forks whose state was produced by materialize-only admission. Activation
      requires a fork run with status=paused, fork lineage, fork-local entity_state rows, and a revalidated
      execution_ready=true planner result at the original fork point. Activation atomically transitions the
      fork run to status=running and the source run to status=forked. It may create fork-local event and delivery
      rows only after runtime.run_fork.historical_replay_execution consumes a concrete
      runtime.run_fork.historical_replay_execution_admission that marks event_deliveries as executable fork work for
      source pending unstarted agent deliveries that the canonical replay_resume_admission taxonomy marks
      delivery_event_replay_ready. Activation/store MUST consume owner-authorized executable work from
      runtime.run_fork.historical_replay_execution and MUST NOT reselect replayable source deliveries directly from
      RunForkPlan or store.run_fork.replay_resume_admission. The store delivery-event replay primitive uses fresh fork
      event IDs, a direct committed replay-scope marker, and run_fork_delivery_event_replays lineage rows. It fails closed with no partial mutation if the source run advanced
      after the fork point, if the fork already has events, deliveries, sessions, or turns, or if node, in-progress,
      failed, dead-letter, timer, route, session, active-turn, replay, or contract-swap facts
      would require unsupported historical replay. Source committed replay-scope marker facts remain fail-closed unless
      an approved selected-contract marker policy classifies at/before-T markers as lineage/no-action evidence only.
      Activation does not copy source event IDs, replay delivered/completed
      or receipt-only facts, reconstruct timer, route, session, turn, or contract rows, or recompute recipients from
      current subscriptions.'
    planning_owner: 'Fork planning/admission is owned by the canonical store-backed fork planner. CLI,
      Builder, dashboard, and other operator surfaces MUST consume that owner and MUST NOT reimplement
      fork planning with direct SQL joins.'
    replay_resume_admission_taxonomy: 'Fork planning, materialization, and activation surfaces expose the
      canonical store-backed replay_resume_admission taxonomy. This taxonomy classifies
      historical source-run facts as reconstruct, lineage-only, fail-closed blockers, split siblings, or
      no-historical-action. It also identifies the first supported delivery_event_replay_ready subset: pending
      unstarted source agent deliveries whose fork-local event/delivery rows can be created under the fork run_id with
      explicit source lineage and a direct committed replay-scope marker for the existing persisted delivery/recovery
      consumer. It does not authorize source event_id copying, node delivery replay, delivered/completed redelivery,
      receipt-only redelivery, session/turn/timer/route reconstruction, contract swap execution, or runtime-wide replay
      mutation. There is no separately promised arbitrary source-run resume lane: unsupported fact families remain
      fail-closed unless a consumer-named successor promotes a new owner.'
    selected_contract_readiness_classifier: 'Selected-contract timestamp-fork readiness explanation is owned by
      runtime.run_fork.selected_contract_readiness_classifier. This owner is non-mutating and consumes the canonical
      store planner, store.run_fork.replay_resume_admission, runtime.run_fork.contract_frontier_admission, selected
      route admission/topology/dynamic topology, runtime.run_fork.selected_contract_recipient_planning, selected
      execution model/admission evidence when present, current-state/materialization metadata, contract-swap admission,
      historical replay admission, and fork-local runtime/platform lineage owners. It emits a complete read-only fact
      matrix for selected-contract fork readiness with exactly one disposition for every source/fork fact family:
      executable fork work, reconstructed fork-local state, lineage/no-action, branch-divergence evidence,
      fail-closed blocker, or unsupported/split sibling. The classifier MUST NOT run handlers, create fork runs, write
      fork-local events, event_deliveries, entity_state, sessions, turns, timers, audits, route recovery, replay rows,
      receipts, dead letters, idempotency state, emitted follow-ups, or API/UI state. It MUST NOT copy source rows, use
      source outcomes as fork suppressors, recompute historical fact-family semantics owned by historical replay
      admission, recompute contract-swap readiness, or weaken materialization, execution, activation, or recovery
      fail-closed gates. CLI, API, dashboard, and Builder are consumers only and may display the classifier output, but
      they are not readiness owners.'
    selected_contract_execution_model: 'Selected-contract fork execution ownership is a non-mutating model until
      separately approved for runtime mutation. The canonical owner consumes contract_frontier_admission output only as
      prerequisite evidence, names the durable selected-contract binding owner that future execution must consume,
      names the future selected-contract execution owner, classifies invalid paths such as copying
      source event_deliveries or source events, and records the required future consumers for fork-local run_id context,
      handler execution, fork-local event/delivery writes, receipts, dead letters, idempotency, emitted follow-up events,
      timers, routes, sessions, turns, source advancement, and contract-swap boot/resume. The model MUST NOT create
      fork-local executable work, run handlers, accept source outcomes as fork suppressors, or treat same-run outbox
      replay as timestamp-fork selected-contract execution.'
    selected_contract_execution_admission: 'Selected-contract fork execution admission is a non-mutating runtime-side
      prerequisite for future selected-contract execution. The canonical owner consumes the durable
      store.run_fork.selected_contract_binding by fork run_id, loads and validates the selected semantic source from that
      binding identity, combines it with contract_frontier_admission and selected_contract_execution_model evidence, and
      returns fail-closed execution admission/context for the future runtime.run_fork.selected_contract_execution owner.
      It MUST NOT run handlers, create fork-local events or event_deliveries, copy source events or source
      event_deliveries, use same-run outbox replay, write receipts, dead letters, idempotency state, emitted follow-up
      events, timers, routes, sessions, turns, source-advanced policy, contract-swap state, or UI/API execution state.
      Missing, ambiguous, stale, incompatible, or unavailable binding/source/admission evidence is a hard admission
      failure before any selected-contract execution mutation.'
    selected_contract_activation_gate: 'Selected-bound fork activation is owned by the runtime-side
      runtime.run_fork.selected_contract_execution.activation_gate before store activation mutates lifecycle state.
      The gate loads durable selected-contract binding, consumes selected_contract_execution_admission, and permits
      activation to proceed only when the selected-bound fork has no selected executable frontier and no replayable source
      delivery/event work. If selected-contract frontier evidence or source delivery/event replay would be required, the
      gate fails closed before source freeze, fork activation, run_fork_delivery_event_replays insertion, fork event row
      creation, or fork delivery row creation. This gate does not run handlers, create selected fork-local executable
      event/delivery rows, write receipts, dead letters, idempotency state, emitted follow-up events, timers, routes,
      sessions, turns, source-advanced policy, contract-swap state, or UI/API execution state.'
    selected_contract_source_advanced_branch: 'Mutating selected-contract timestamp-fork execution treats a source run
      that advanced after the fork point as branch divergence evidence, not as executable fork work and not as a fork
      suppressor. This policy is owned by runtime.run_fork.selected_contract_execution and its store-owned durable branch
      divergence evidence. It is selected-contract execution only: generic/state-only activation still requires no source
      advancement and may freeze the source run. A selected-contract branch must not freeze or rewind an already-advanced
        source run, must record terminal source status at activation as divergence evidence, must not copy post-fork source
        events or event_deliveries, and must continue to regenerate fork-local events, deliveries, receipts, dead letters,
        idempotency effects, and emitted follow-ups under the fork run_id. Post-fork source session, turn, and
        conversation-audit facts may be classified only by the separate
        runtime.run_fork.selected_contract_execution.source_advanced_conversation_history_policy owner as lineage/no-action
        branch-divergence evidence. Same-source in-progress delivery coupling admitted by
        runtime.run_fork.selected_contract_execution.active_source_delivery_conversation_coupling_policy is also
        branch-divergence lineage evidence and not executable delivery/session truth.'
    selected_contract_source_advanced_conversation_history_policy: 'Mutating selected-contract timestamp-fork execution
      may consume runtime.run_fork.selected_contract_execution.source_advanced_conversation_history_policy to classify
      post-fork-T source agent_sessions, agent_turns, and agent_conversation_audits as source-advanced branch-divergence
      lineage/no-action evidence only. This policy is selected-contract execution only and is not conversation-history
      reconstruction. Source session, provider-session, transcript, audit, turn, receipt, outcome, or task-audit rows
      MUST NOT be copied into the fork, reused as fork-local runtime truth, or used as selected-fork suppressors. Fresh
      fork-local conversation rows may appear only through normal selected fork runtime execution under the fork run_id.
      Pending or in-progress source delivery/session coupling, fork-local pre-existing conversation rows, generic/state-only
      activation, broad source-run resumption, timers, routes, non-agent replay, restart recovery, and operator surfaces
      remain fail-closed or split siblings unless separately approved.'
    selected_contract_active_source_delivery_conversation_coupling_policy: 'Mutating selected-contract timestamp-fork
      execution may consume runtime.run_fork.selected_contract_execution.active_source_delivery_conversation_coupling_policy
      to classify exactly one narrow at-T active delivery/session coupling case as lineage/no-action and branch-divergence
      evidence: the in-progress source agent delivery is for the source event referenced by the fork-point event
      source_event_id, the fork-point event was produced by the same agent subscriber, the delivery started at/before T,
      and the delivery row has no active_session_id, receipt, receipt outcome, or delivered_at at T. The policy does not
      authorize copying source delivery rows, sessions, turns, audits, provider session IDs, transcripts, receipts,
      outcomes, or conversation audits into the fork and does not let a source terminal outcome after T suppress or decide
      selected fork execution. Unrelated in-flight deliveries, active_session_id coupling, partial receipt/outcome state,
      fork-local pre-existing conversation rows, post-T source conversation facts outside the source-advanced
      conversation-history owner, non-agent replay, timers, routes, retry/idempotency, follow-up policy, restart recovery,
      and operator surfaces remain fail-closed or split siblings unless separately approved.'
    selected_contract_timer_route_policy: 'Mutating selected-contract timestamp-fork execution treats source route facts
      as evidence-only fail-closed blockers until a separately approved route reconstruction owner exists. Active source
      timers may be reconstructed only by runtime.run_fork.historical_replay_execution.timer_reconstruction, which
      consumes store.run_fork.replay_resume_admission timer_history as lineage, writes fresh fork-local timer rows under
      the fork run_id with source_timer_id/forked_from_run_id/forked_from_event_id/reconstruction_owner lineage, and
      requires scheduler claim/fire/recovery identity to include run_id. Source timer rows are never copied as executable
      truth, fired as source work, or used as selected-fork suppressors. Unsupported source timer histories and post-T
      source timer facts remain fail-closed. The runtime.run_fork.selected_contract_execution owner must continue to
      consume flow_route_history blockers and MUST NOT copy routing_rules, persist fork-local route rows, derive
      selected-source recipients for execution outside recipient planning, or use source route outcomes as selected-fork
      suppressors.'
    selected_contract_session_turn_audit_lineage_policy: 'Mutating selected-contract timestamp-fork execution may consume
      runtime.run_fork.historical_replay_execution.selected_contract_session_turn_audit_lineage_policy to classify
      at/before-fork-T source agent_sessions, agent_turns, and agent_conversation_audits as lineage/no-action evidence
      only. This policy is selected-contract execution only and is not session, turn, or audit reconstruction. It applies
      only when selected-contract execution regenerates fresh fork-local work through canonical owners and no pending or
      in-progress source delivery at T requires live session continuity through active_session_id, started_at, partial
      receipt/outcome state, or equivalent active execution evidence, except for the separately owned same-source
      fork-point emission case admitted by runtime.run_fork.selected_contract_execution.active_source_delivery_conversation_coupling_policy.
      Source session, turn, audit, provider-session,
      transcript, receipt, outcome, or task-audit rows MUST NOT be copied into the fork, reused as fork-local runtime
      truth, or used as selected-fork suppressors. Fork-local conversation rows before the selected execution owner
      creates them remain fail-closed. Post-T source session, turn, and conversation-audit facts are outside this
      at/before-T lineage owner and may be classified only by the selected-contract source-advanced conversation-history
      policy. Committed replay-scope marker policy is a split sibling.'
    selected_contract_committed_replay_scope_marker_policy: 'Mutating selected-contract timestamp-fork execution may
      consume runtime.run_fork.historical_replay_execution.selected_contract_committed_replay_scope_marker_policy to
      classify at/before-fork-T source committed replay-scope marker rows as lineage/no-action evidence only. This policy
      is selected-contract execution only and is not same-run replay recovery, fork-local delivery-event replay recovery,
      or generic historical replay. At/before-T classification is determined by the underlying source event position
      relative to the fork point, not by the committed marker delivery row write timestamp; delayed marker delivery
      write-skew for an at/before-T source event remains lineage/no-action and MUST NOT be reclassified as generic
      selected-contract source-delivery advancement. Source marker rows MUST NOT be copied into the fork, reused as
      fork-local recovery proof, treated as executable fork work, or used as selected-fork suppressors. Fork-local
      committed replay-scope truth must be freshly written under the fork run_id by selected-contract execution or
      approved fork-local delivery-event replay owners. Source marker facts whose underlying source event is after T
      remain fail-closed unless a separate approved source-advanced/reconstruction owner changes that policy.'
    selected_contract_diagnostic_platform_outcome_policy: 'Mutating selected-contract timestamp-fork execution may consume
      runtime.run_fork.contract_frontier_admission.selected_contract_diagnostic_platform_outcome_policy to classify
      at/before-fork-T source outcome facts for spec-declared diagnostic/non-routed platform events as lineage/no-action
      evidence only. The diagnostic event set is defined by platform_events.routing_rules.diagnostic_events, currently
      platform.runtime_log and platform.inbound_recorded. This policy is selected-contract frontier admission only. It
      MUST NOT route diagnostic platform events through selected contracts, synthesize selected recipients, copy source
      events, event_deliveries, event_receipts, or dead_letters into the fork, use diagnostic source outcomes as
      selected-fork suppressors, change generic non-agent/dead-letter replay policy, or make CLI, API, dashboard, or
      Builder surfaces semantic owners. Non-diagnostic platform/node/system event outcomes remain fail-closed or split
      unless a separate approved owner changes that policy.'
    selected_contract_route_admission: 'Selected-contract route/subscription reconstruction admission is a
      non-mutating prerequisite owned by runtime.run_fork.selected_contract_route_admission. It consumes
      runtime.run_fork.contract_frontier_admission for selected frontier work, consumes selected-source static route
      derivation through internal/runtime/bus.DeriveRouteTable for historical route evidence, and treats source
      routing_rules and flow_instance_routes as evidence-only fail-closed facts. It MUST NOT copy source route rows,
      persist fork-local route rows, derive executable recipients, create event_deliveries, run handlers, or absorb
      timer reconstruction, session/turn reconstruction, source-advanced policy, contract-swap ownership, or UI/API
      route ownership.'
    selected_contract_route_topology: 'Selected-contract route/topology truth is owned by
      runtime.run_fork.selected_contract_route_topology after route admission. It consumes
      runtime.run_fork.selected_contract_route_admission as prerequisite evidence, classifies selected-source static
      route topology as fork-local truth only through internal/runtime/bus.DeriveRouteTable and the durable selected
      contract/frontier binding, and classifies dynamic flow-instance topology as fork-local-proven or fail-closed with
      a named blocker. It MUST NOT copy source routing_rules or materialized flow-instance route rows, persist
      fork-local route rows, derive executable recipients, invoke the delivery planner for fork work, create
      event_deliveries, run handlers, or absorb timer/session/turn/source-advanced/contract-swap/UI ownership.'
    selected_contract_dynamic_route_topology: 'Selected-contract dynamic route topology proof is a non-mutating
      child owned by runtime.run_fork.selected_contract_dynamic_route_topology under
      runtime.run_fork.selected_contract_route_topology. It may clear selected_contract_dynamic_route_topology_unproven
      only when each dynamic flow-instance topology item is proven from fork-local selected-contract evidence:
      selected-source route derivation, contract frontier evidence, route-admission evidence, and fork-local
      flow-instance identity/topology evidence. If proof is incomplete, dynamic topology remains fail-closed. This
      owner MUST NOT copy source routing_rules or materialized flow-instance route rows, persist fork-local route rows,
      derive executable recipients outside runtime.run_fork.selected_contract_recipient_planning, invoke delivery
      writes, run handlers, or absorb timer/session/turn/source-advanced/contract-swap/UI ownership.'
    selected_contract_route_persistence_recovery: 'Fork-local selected-contract route persistence is owned by
      store.run_fork.selected_contract_route_persistence and runtime recovery consumption is owned by
      runtime.run_fork.selected_contract_route_recovery. The store owner persists selected route topology, dynamic
      topology proof or fail-closed state, recipient-plan evidence, selected binding identity, and evidence
      fingerprints under the fork run_id. Topology and recipient-planning fingerprints MUST be computed and verified
      over canonical JSON semantics rather than raw JSONB storage bytes. Runtime recovery MUST read this owner after restart for selected-contract
      fork route truth and MUST NOT read source/current routing_rules, source flow_instance_routes, current
      ListFlowInstanceRoutes output, or source event_deliveries as executable fork route or recipient truth. Recipient
      planning and EventBus.Publish recipient-plan guards remain authoritative before publish. This owner MUST NOT write
      event_deliveries, run handlers, replay timers, reconstruct sessions/turns/audits, replay non-agent work,
      implement contract-swap boot/resume, or own UI/API behavior.'
    selected_contract_recipient_planning: 'Selected-contract recipient planning for mutating fork execution is owned by
      runtime.run_fork.selected_contract_recipient_planning after selected route topology. It consumes the durable
      selected-contract binding, runtime.run_fork.contract_frontier_admission, runtime.run_fork.selected_contract_route_admission,
      and runtime.run_fork.selected_contract_route_topology, then produces deterministic fork-local recipient-plan
      evidence for selected frontier events before selected execution publishes fork-local events. The selected execution
      publish path and EventBus.Publish MUST consume/gate on this owner before deriving recipients for selected-fork work.
      internal/runtime/bus.deliveryPlanner.Plan MAY be a downstream helper or isolated pure primitive, but it is not the
      canonical owner and MUST NOT bypass this owner. Dynamic flow-instance topology remains fail-closed unless explicit
      fork-local topology proof exists. Source route rows, source flow-instance route rows, source event_deliveries,
      source recipients, source receipts, source dead letters, and post-fork source outcomes are invalid as executable
      fork truth or fork suppressors. This owner MUST NOT persist fork-local route rows, write event_deliveries, run
      handlers, write receipts, dead letters, idempotency state, emitted follow-ups, timers, sessions, turns,
      source-advanced policy, contract-swap state, or UI/API execution state.'
    selected_contract_authoritative_agent_delivery_materialization: 'Selected-contract authoritative agent delivery
      materialization is owned by runtime.run_fork.selected_contract_execution.authoritative_agent_delivery_materialization
      as a mutating-execution gate after runtime.run_fork.selected_contract_recipient_planning and before any fork
      materialization. It consumes only canonical selected-recipient planning to identify required agent recipients for
      selected frontier events. It may pass only when
      runtime.run_fork.selected_contract_execution.fork_local_agent_runtime_materializer_executor proves every planned
      selected agent recipient has fork-local handler construction and execution support. If that materializer/executor
      is unavailable for any authoritative agent recipient, the owner MUST fail closed before creating fork runs,
      selected-contract bindings, route recoveries, fork events, fork deliveries, branch-divergence rows, or fork
      entity_state. Live source event_deliveries, source subscriptions, current EventBus channels, active agent
      descriptors alone, CLI/dry-run JSON, and dashboard/API state are not executable handler-availability truth.
      Node/system handler execution, route topology, timers, sessions, turns, audits, non-agent replay,
      retry/idempotency/follow-up policy, restart recovery, and UI/API behavior remain separate owners or split
      siblings.'
    selected_contract_fork_local_agent_runtime_materializer_executor: 'Selected-contract fork-local agent runtime
      materialization and execution is owned by
      runtime.run_fork.selected_contract_execution.fork_local_agent_runtime_materializer_executor. It consumes
      runtime.run_fork.selected_contract_recipient_planning as the only selected-fork recipient truth, factors ordinary
      static contract-agent materialization semantics for ID rendering, subscriptions, emit events, permissions, native
      tools, flow path, role/model/session scope, prompt resolution, and runtime descriptor normalization, and constructs
      ephemeral fork-local handlers through the normal AgentManager/buildAgent/applyContractPrompt/factory execution
      path before selected fork publish. It may register only fork-local in-memory handler channels and runtime-active
      descriptors for the selected-fork EventBus; it MUST NOT persist those handlers into ordinary current-runtime
      agents, read source event_deliveries or source outcomes as executable truth, synthesize delivered/processed
      receipts, or let live subscriptions/active descriptors alone become recipient truth. Fresh event_deliveries,
      receipts, dead letters, sessions, turns, audits, idempotency state, and emitted follow-ups may appear only as
      fork-local outputs of actual selected-fork handler execution under the fork run_id. Flow-instance-scoped agent
      materialization, restart recovery of fork-local handlers, session/turn/audit reconstruction, timers, non-agent
      replay, retry/idempotency/follow-up policy beyond normal execution, and UI/API behavior remain split unless this
      owner has explicit fork-local proof for that subcase.'
    selected_contract_fork_local_runtime_container: 'Selected-contract fork-local live runtime container ownership is
      runtime.run_fork.selected_contract_execution.fork_local_runtime_container. This owner consumes durable selected
      binding/admission evidence, runtime.run_fork.selected_contract_recipient_planning,
      runtime.run_fork.selected_contract_execution.authoritative_agent_delivery_materialization,
      runtime.run_fork.selected_contract_execution.fork_local_agent_runtime_materializer_executor when agent recipients
      exist, selected route recovery evidence, and
      runtime.run_fork.selected_contract_execution.fork_local_runtime_platform_event_lineage_policy plus
      runtime.run_fork.selected_contract_execution.fork_local_runtime_typed_lineage before any live
      selected-fork publish path is authoritative. The container constructs the fork-run EventBus with recipient-plan
      guards, registers only ephemeral fork-local runtime active-agent descriptors, starts selected handlers through
      AgentManager under the fork run_id, binds RuntimeLogger/platform diagnostics to the selected-fork lineage policy,
      carries typed runtime lineage until it is compiled to persisted ParentEventID/source_event_id truth, waits for
      runtime quiescence, and owns cleanup obligations for failed selected-fork execution attempts. The same
      container owner may be consumed by contract-swap/historical replay execution only after that path has independently
      admitted executable selected work; it must not become a generic historical replay owner. Source events, source
      deliveries, source recipients, source outcomes, source runtime/platform rows, live subscriptions, normal
      AgentManager current state, EventBus descriptors alone, readiness JSON, CLI/API/dashboard/Builder output, and
      produced_by_type alone are invalid as runtime-container truth. Restart/recovery of fork-local containers,
      current-state snapshot ownership, session/turn/audit reconstruction, non-agent replay, retry/idempotency/follow-up
      policy beyond normal selected-fork output, and operator consumers remain separate owners or split siblings unless
      separately approved.'
    selected_contract_fork_local_runtime_typed_lineage: 'Selected-contract fork-local typed runtime lineage is owned by
      runtime.run_fork.selected_contract_execution.fork_local_runtime_typed_lineage under
      runtime.run_fork.selected_contract_execution.fork_local_runtime_container and the fork-local runtime/platform
      lineage policy. This owner is the runtime-internal typed model carried by selected-fork EventBus, AgentManager,
      RuntimeLogger, LLM/runtime diagnostic producers, and selected-execution tool-executor diagnostics, including
      MCP turn-context bridges only as selected-fork context carriers, for fresh fork-run platform diagnostics and
      platform-control outputs. The model carries the fork run ID, subject event ID/type, causal parent event ID, row category,
      selected-fork ownership context, and source/fork/operator classification; the authoritative persisted truth remains
      the existing event ParentEventID/events.source_event_id lineage written by the store/runtime logger. Activation and
      selected-tree validation must continue to consume only persisted fork-run lineage, not in-memory descriptors,
      action/reason strings, produced_by_type alone, readiness JSON, operator OAuth state, or diagnostic payload prose.
      Unrelated fork-run platform rows, source platform facts, source outcomes/deliveries, restart recovery, current-state
      materialization, session/turn/audit reconstruction, non-agent replay, retry/idempotency/follow-up policy beyond
      normal selected-fork output, and operator consumers remain fail-closed, invalid, or split under their own owners.'
    selected_contract_fork_local_runtime_platform_event_lineage_policy: 'Selected-contract fork-local runtime/platform
      control event lineage is owned by
      runtime.run_fork.selected_contract_execution.fork_local_runtime_platform_event_lineage_policy under
      runtime.run_fork.selected_contract_execution.fork_local_runtime_container. This owner covers fresh fork-run platform/control or diagnostic events emitted by
      the selected-fork runtime container while processing selected fork-local work, including agent-started,
      auth-required, runtime-ingress pause/resume, budget-threshold, event-quarantine, agent-panic, agent-failed,
      dead-letter-escalation, and runtime-log records. Such events are fork-local lineage/output evidence only when they
      are causally parented to selected-fork execution through the fork event parent/source_event_id chain and persisted
      under the fork run_id. For platform.runtime_log diagnostics, the canonical persisted lineage is events.source_event_id;
      the runtime logger may derive it only from an explicit diagnostic parent_event_id or a verified same-run persisted
      subject EventID. Activity diagnostics emitted while executing a selected-fork platform.activity_requested event MUST
      use the actual persisted fork-local request event as that subject; a recomputed activity request identity that is not
      persisted in the fork run is not lineage proof. Diagnostic action/reason strings, EventBus descriptors, and
      produced_by_type are not lineage proof.
      Unrelated platform events without selected-fork causal context, source-run platform facts, source outcomes,
      source deliveries, source receipts, source dead letters, CLI/API/dashboard JSON, live EventBus descriptors, or
      produced_by_type alone are not executable fork truth and must remain fail-closed or split. This owner does not copy
      source rows, suppress fork-local execution with source outcomes, own current-state/entity
      materialization, reconstruct sessions/turns/audits, replay timers/routes/non-agent work, or claim restart
      recovery.'
    selected_contract_supported_execution: 'The historical selected-contract timestamp-fork execution harness was
      swarm fork --contracts; that legacy harness flag remains rejected unless a later source-authority PR promotes it.
      The intended public command is now `swarm run fork <source-run-id> ...` (CLI v2.2 spelling) defined by
      multi_bundle_persistence.cli_surface.run_fork and blocked on #989 API/runtime/CLI implementation. The runtime
      behavior is owned by runtime.run_fork.selected_contract_execution, not by CLI, route helpers,
      delivery-row helpers, or source-row replay. The owner consumes store.run_fork.selected_contract_binding,
      selected_contract_execution_admission, selected_contract_route_topology, selected_contract_dynamic_route_topology,
      runtime.run_fork.selected_contract_recipient_planning, and
      runtime.run_fork.selected_contract_execution.authoritative_agent_delivery_materialization plus
      runtime.run_fork.selected_contract_execution.fork_local_agent_runtime_materializer_executor when planned selected
      agent recipients exist, consumes runtime.run_fork.selected_contract_execution.fork_local_runtime_container for the
      live fork-run EventBus/AgentManager/RuntimeLogger/cleanup/quiescence boundary, and consumes
      runtime.run_fork.selected_contract_execution.fork_local_runtime_platform_event_lineage_policy for fork-local
      runtime/platform control outputs caused by selected execution plus
      runtime.run_fork.selected_contract_execution.fork_local_runtime_typed_lineage to carry typed runtime lineage before
      persistence compiles it to source_event_id. It creates fresh
      fork-local events and event_deliveries under the fork run_id, records selected source-to-fork lineage in
      run_fork_selected_contract_executions, runs selected handlers through the fork-local runtime container and normal runtime pipeline, writes fork-local
      outcomes, and regenerates emitted follow-ups under the fork run_id. When selected frontier work is a
      platform.activity_requested event, source preparation MUST bind the request payload source_event_id to the actual
      fork-local frontier event before deriving fork-local request/result identities. read_only with reexecute_read executes
      the connector exactly once under that fork-local generation and does not copy a source attempt;
      non_idempotent_write with reuse_recorded_result copies only terminal succeeded, failed, or uncertain evidence under
      fork-local request/result identities and publishes that recorded result without calling the connector. Failed and
      uncertain evidence MUST preserve its typed failure, including platform.outcome_uncertain. Source events are
      payload/lineage inputs only;
      source event_deliveries, recipients, receipts, dead letters, retry/idempotency state, and post-fork outcomes MUST
      NOT become executable fork work or fork suppressors. At/before-T source committed replay-scope marker rows may be
      consumed only as lineage/no-action evidence by the selected-contract marker policy; fork-local recovery must use
      fresh fork-run marker rows. At/before-T source outcome facts for spec-declared diagnostic/non-routed platform
      events may be consumed only as lineage/no-action evidence by the selected-contract diagnostic platform outcome
      policy. Route persistence, timer reconstruction, session/turn/audit
      reconstruction, non-agent delivery replay, runtime restart recovery, contract-swap boot/resume beyond selected
      frontier execution, and UI/API ownership remain separately gated siblings.'
    contract_swap_boot_resume_admission: 'Contract-swap boot/resume readiness for timestamp forks is owned by
      runtime.run_fork.contract_swap_boot_resume_admission. This owner is non-mutating and consumes the durable
      store.run_fork.selected_contract_binding, runtime.run_fork.selected_contract_execution_admission,
      store.run_fork.replay_resume_admission, selected route topology, selected recipient planning, and fork-local
      selected route recovery evidence before answering whether full boot/resume under selected or swapped contracts is
      allowed. It MUST fail closed with named blockers for source deliveries, receipts, dead letters, retry/idempotency
      state, post-fork source outcomes, timers, current/source routes, sessions, turns, audits, source committed
      replay-scope rows not admitted by the selected-contract marker policy, non-agent replay, missing selected route
      recovery, or any missing/stale selected binding/source evidence. It
      MUST NOT run handlers, create fork-local events or event_deliveries, copy source rows, write receipts, dead
      letters, idempotency state, emitted follow-up events, timers, sessions, turns, route rows, API/UI state, or
      otherwise implement mutating source-run resume. CLI, API, dashboard, Builder, route helpers, delivery
      writers, and pipeline boot paths may consume this owner but MUST NOT compute contract-swap boot/resume readiness
      independently.'
    historical_replay_execution_admission: 'Bounded fork re-execution admission is owned by
      runtime.run_fork.historical_replay_execution_admission. This legacy-named owner is non-mutating and establishes
      the authority boundary for the runtime.run_fork.historical_replay_execution owner. It consumes the canonical
      store.run_fork.replay_resume_admission taxonomy plus selected-contract execution admission, selected binding,
      selected route topology, selected recipient planning, selected route recovery when present, and
      runtime.run_fork.contract_swap_boot_resume_admission when selected/swap evidence exists. For non-selected
      activation delivery/event replay, it may consume the canonical replay_resume_admission taxonomy directly and must
      still classify every historical fact family before mutation. It classifies source events, event deliveries, receipts,
      dead letters, retry/idempotency state, emitted follow-ups, timers, routes/current route rows, sessions, turns,
      audits, non-agent/node/system work, source-advanced/post-T source outcomes, runtime restart recovery, and
      CLI/API/dashboard/operator consumers exactly once as executable fork work, reconstructed fork-local state,
      lineage-only evidence, fail-closed blockers, or split siblings. Source events and outcomes are lineage/proof only;
      the only admitted executable delivery family is the separately proven delivery_event_replay_ready primitive from
      store.run_fork.replay_resume_admission. This owner MUST NOT run handlers, create or copy events or
      event_deliveries, write receipts, dead letters, retry/idempotency state, emitted follow-up events, timers,
      sessions, turns, route rows, API/UI/dashboard state, suppress fork work from source outcomes, or treat selected
      frontier execution as proof of broader source-run resumption. CLI, API, dashboard, Builder, route helpers, delivery
      writers, runtime recovery, and pipeline boot paths may consume this owner but MUST NOT compute historical replay
      execution admission independently.'
    historical_replay_execution: 'Mutating bounded fork re-execution authority is owned by
      runtime.run_fork.historical_replay_execution. This legacy-named owner consumes runtime.run_fork.historical_replay_execution_admission
      and the canonical store.run_fork.replay_resume_admission taxonomy, validates that every historical source fact
      family has exactly one executable, reconstructed, lineage-only, fail-closed, or split-sibling classification, and
      emits the executable work set that downstream store/runtime writers may mutate. The current supported closure
      level is canonical owner promotion with delivery_event_replay_ready plus the selected-contract active-timer
      reconstruction child runtime.run_fork.historical_replay_execution.timer_reconstruction. The timer reconstruction
      child may reconstruct only active source timers at T into fresh fork-local timer rows under fork run_id with
      lineage fields; it does not copy source rows, fire source timers, clear route/session/turn/audit/non-agent
      blockers, or authorize full scheduler/recovery replay beyond run-scoped timer claim/fire/reload identity. The
      selected-contract contract-swap child runtime.run_fork.historical_replay_execution.contract_swap_boot_resume may
      execute only already-admitted delivery_event_replay_ready work under selected/swapped contracts. Full
      product-complete source-run resumption for routes, sessions, turns, audits, non-agent/node/system work,
      broader contract-swap boot/resume, generic source-advanced policy, broader restart recovery, and API/UI/dashboard
      surfaces remains unsupported unless separately approved.
      Activation, store delivery-event replay, recovery, selected/contract-swap consumers, route
      helpers, timer helpers, session helpers, and operator surfaces MUST consume this owner or remain explicit
      fail-closed/split outputs. They MUST NOT authorize mutation directly from replay_resume_admission, selected
      frontier execution, source rows, same-run outbox replay, source outcomes, CLI/API/dashboard state, or local
      helper predicates.'
    historical_replay_contract_swap_boot_resume_execution: 'The selected-contract contract-swap boot/resume historical
      replay child is owned by runtime.run_fork.historical_replay_execution.contract_swap_boot_resume. It consumes
      runtime.run_fork.historical_replay_execution, runtime.run_fork.historical_replay_execution_admission,
      runtime.run_fork.contract_swap_boot_resume_admission, store.run_fork.selected_contract_binding,
      runtime.run_fork.selected_contract_execution_admission, selected route topology, selected recipient planning, and
      fork-local selected route recovery before any fork-local event, delivery, handler, receipt, dead-letter,
      retry/idempotency, or follow-up mutation. Its first-slice closure level is selected-contract execution of
      owner-authorized delivery_event_replay_ready work only. It MUST map historical source delivery identities to
      selected recipient-plan work by source event, mint fresh fork-local event IDs under the fork run_id, publish
      through EventBus with selected recipient-plan guards, run selected handlers through the normal runtime pipeline,
      and record fork-local lineage without copying source event IDs or source delivery rows. Source delivery
      subscriber identity, source receipts, source dead letters, source retry/idempotency, emitted source follow-ups,
      timers, source/current routes, sessions, turns, audits, non-agent/node/system work, source-advanced/post-T facts,
      runtime restart state, and CLI/API/dashboard/Builder state are lineage-only, fail-closed blockers, split siblings,
      or consumers; they MUST NOT become selected-fork recipient truth, executable fork work, or fork suppressors. This
      child MUST NOT use store.run_fork.delivery_event_replay as-is when that writer preserves source subscriber
      recipients, MUST NOT treat runtime.run_fork.selected_contract_execution as broader source-run replay proof, and MUST NOT
      make CLI/API/dashboard/Builder semantic owners. This bounded selected-frontier contract-swap child is not a
      promise of broader source-run resumption; #564 closes through the fact matrix and successor issues #1721/#1722.'
    historical_replay_delivery_event_replay_execution: 'The first mutating historical replay execution child is owned by
      runtime.run_fork.historical_replay_execution and is limited to the already-admitted
      delivery_event_replay_ready primitive. It consumes runtime.run_fork.historical_replay_execution_admission before
      any source freeze, fork activation, event row creation, delivery row creation, committed replay-scope marker, or
      lineage write. It validates the complete historical fact matrix, keeps unsupported families as explicit blockers
      or split siblings, and emits owner-authorized delivery_event_replay_ready work identities. It may delegate physical
      fork-local row writes to store.run_fork.delivery_event_replay, but that store primitive is not the semantic
      execution owner and MUST NOT choose replayable source deliveries from the plan on its own. The owner may mint fresh
      fork-local event IDs and delivery IDs under the fork run_id for pending unstarted source-agent deliveries admitted
      as event_deliveries executable fork work, record run_fork_delivery_event_replays lineage, and let the normal
      runtime delivery pipeline process the fork-local pending delivery. It MUST NOT copy source event IDs, source
      delivery IDs, receipts, dead letters,
      retry/idempotency state, emitted follow-ups, timers, route rows, sessions, turns, audits, non-agent/node/system
      work, runtime restart state, API/UI/dashboard state, or use source/post-T outcomes as fork suppressors. Timers,
      routes, sessions, turns, audits, non-agent replay, contract-swap/full resume, restart recovery, and operator
      surfaces remain separately gated siblings under #564/#549/#618.'
    historical_replay_delivery_event_replay_recovery: 'Restart and sweeper recovery for the admitted
      delivery_event_replay_ready primitive is owned by
      runtime.run_fork.historical_replay_execution.delivery_event_replay_ready_recovery. It consumes the fresh
      fork-local event rows, fork-local event_deliveries rows, direct committed replay-scope marker rows, and
      run_fork_delivery_event_replays lineage produced by runtime.run_fork.historical_replay_execution for the fork
      run_id. Startup RecoveryManager and EventBus.SweepUndispatched MUST consume the existing persisted replay owner:
      ListEventsMissingPipelineReceipt, ClaimPipelineReplay, ListEventDeliveryRecipients, LoadCommittedReplayScope,
      and PublishPersistedRecipients. Fork-local event_deliveries are the recipient truth; source event IDs, source
      delivery IDs, source recipients, current subscriptions, source receipts, source dead letters, retry/idempotency
      state, emitted follow-ups, and post-fork source outcomes are lineage/proof only and MUST NOT become executable
      fork work or recovery suppressors. ClaimPipelineReplay remains the duplicate/race owner for fork replay event IDs.
      This owner MUST NOT reconstruct timers, routes, sessions, turns, audits, non-agent/node/system work,
      contract-swap boot/resume, runtime-wide restart recovery, API/UI/dashboard state, or close successor concepts
      such as #1721 memoized re-execution or #1722 fleet fork reporting.'
    event_id_shorthand: 'When --at receives an event ID, the system resolves it to that event''s created_at
      timestamp. Under the hood, fork is always timestamp-based. The event ID is a convenience for pinpointing
      a moment without looking up timestamps manually.'
    semantics:
      1_reconstruct_state: 'Reconstruct all entity states at timestamp T. For every entity touched by the source
        run (SELECT DISTINCT entity_id FROM entity_mutations WHERE run_id = :source_run_id), reverse-apply
        all mutations with created_at > T (newest first, set each field to old_value). Alternative: forward-apply
        from empty entity for reliability. Only committed mutations are included — in-progress deliveries at T
        are excluded, their partial mutations are not applied. A reconstructed entity is materializable only after
        runtime.run_fork.materialized_entity_snapshot_metadata authorizes its source-at-T flow_instance/entity_type
        metadata or produces a named fail-closed blocker.'
      2_detect_pending: 'Identify events that were pending at timestamp T — events with created_at <= T whose
        delivery chain was incomplete. This includes: deliveries with status pending or in_progress at T,
        accumulations that had not reached completion at T, entities in non-terminal states expecting further
        events. These are the events the system will re-deliver.'
      3_create_run: 'Insert new run row with forked_from_run_id = source run, forked_from_event_id = target event
        (if event ID was provided). Copy reconstructed entity states into the fork context.'
      3a_materialize_only_run: 'For a materialize-only fork, insert the fork run row with status=paused,
        forked_from_run_id = source run, forked_from_event_id = target event, and event_count = 0.
        Source run status is unchanged. Copy reconstructed entity states into the fork context with fork-local
        revision=1 and source-at-T entered_state_at for the reconstructed current_state, then stop; do not boot,
        resume, redeliver, or mutate runtime delivery/session/timer/route state.'
      3b_activate_materialized_fork: 'For an activation fork, consume a previously materialized fork run.
        Revalidate the original fork point against current source-run facts, require no source advancement and
        no unsupported replay/timer/route/session/turn/contract-swap facts, optionally create fork-local event/delivery
        rows and direct committed replay-scope markers for the delivery_event_replay_ready subset only through
        runtime.run_fork.historical_replay_execution consuming historical replay execution admission and owner-authorized
        executable delivery work, then atomically mark the source run forked and the fork run running. Activation/store
        does not authorize replay directly from replay_resume_admission or RunForkPlan pending rows. Future runtime work uses the fork
        run_id, fork-local entity_state rows, and fork-local pending delivery rows; broader source-run replay remains
        unsupported outside the gated delivery/event primitive.'
      3b1_selected_contract_readiness_classifier: 'For selected-contract timestamp-fork dry-run/explain, the
        runtime.run_fork.selected_contract_readiness_classifier owner consumes existing planner, replay taxonomy,
        contract-frontier, route/topology, recipient-planning, selected-execution, current-state/materialization,
        contract-swap, historical-replay, and fork-local runtime lineage owners to emit one read-only readiness matrix
        before mutation. Every source/fork fact family must appear exactly once with owner, disposition, proof source,
        and blocker or split tracker when applicable. The classifier is an explanation/read model only: it does not
        authorize materialization, activation, selected execution, route recovery, historical replay, contract-swap
        execution, restart recovery, or API/UI behavior. Mutation owners and activation gates must continue to consume
        their own canonical owners and fail closed. CLI/API/dashboard/Builder surfaces may consume the matrix but MUST
        NOT compute readiness semantics independently.'
      3c_selected_contract_source_advanced_branch: 'For selected-contract mutating fork execution, source advancement
        after the fork point is explicit branch divergence evidence when the selected execution owner can regenerate
        fork-local work under the fork run_id. The source run remains in its current status and is not frozen or rewound.
        Post-fork source events, deliveries, receipts, dead letters, retry state, outcomes, current state, and mutations
        remain source-run evidence only; they are not copied into the fork and do not suppress fork-local selected
        execution. Generic/state-only activation continues to use 3b no-source-advancement/freeze semantics.'
      3c1_selected_contract_source_advanced_conversation_history_policy: 'For selected-contract timestamp-fork
        execution, runtime.run_fork.selected_contract_execution.source_advanced_conversation_history_policy consumes
        post-fork-T source agent_sessions, agent_turns, and agent_conversation_audits as source-advanced
        branch-divergence lineage/no-action evidence only. The owner covers all three conversation-history source fact
        families together and records the admitted fact codes in replay_resume_admission and selected-contract branch
        divergence evidence. It is not session, turn, audit, provider-session, transcript, receipt, outcome, or task-audit
        reconstruction. Source conversation rows are never copied into the fork, reused as fork-local runtime truth, or
        used as selected-fork suppressors. Fresh fork-local conversation rows may be written only by normal selected fork
        runtime execution under the fork run_id. Pending or in-progress source delivery/session coupling, fork-local
        pre-existing conversation rows, generic/state-only activation, broad source-run resumption, timers, routes,
        non-agent replay, restart recovery, and operator surfaces remain fail-closed or split siblings unless
        independently approved.'
      3d_selected_contract_timer_route_policy: 'For selected-contract mutating fork execution, source timer and route
        facts remain evidence-only blockers. The selected execution owner consumes timer_history_unproven and
        flow_route_history_unproven from the canonical replay/resume taxonomy and fails before materializing,
        activating, firing timers, copying routing rules, deriving selected-source recipients, or creating fork-local
        executable work. Timer reconstruction and route reconstruction are separately gated fork replay/resume
        children.'
      3e_selected_contract_route_admission: 'For selected-contract mutating fork execution, selected route/subscription
        admission is evidence-only and non-mutating. It distinguishes frontier recipient admission from historical
        route reconstruction, uses the selected contract route table only as route evidence, and fails closed before
        route persistence, executable recipient derivation, delivery writes, or handler execution. Source routing rows,
        source flow-instance routes, and source recipients are never copied into the fork.'
      3f_selected_contract_route_topology: 'For selected-contract mutating fork execution, fork-local route/topology
        truth is a separate owner beyond route admission. The selected execution model and admission consume
        runtime.run_fork.selected_contract_route_topology rather than treating route admission as final truth. Static
        selected-source topology is classified from selected-source route derivation and selected binding/frontier
        evidence only. Dynamic flow-instance topology requires explicit fork-local topology proof and otherwise
        remains fail-closed. This owner is still non-mutating: it does not persist route rows, derive executable
        recipients, write deliveries, or run handlers.'
      3f1_selected_contract_dynamic_route_topology: 'For selected-contract mutating fork execution, dynamic
        flow-instance route topology is proven by runtime.run_fork.selected_contract_dynamic_route_topology as a
        non-mutating extension of runtime.run_fork.selected_contract_route_topology. Dynamic proof is valid only when
        selected-source route derivation and frontier/route-admission evidence identify fork-local flow-instance
        topology and derived recipients for every dynamic instance. Missing, stale, source-row-only, or partial proof
        keeps selected_contract_dynamic_route_topology_unproven fail-closed. This owner does not persist routes,
        copy source routing rows, create deliveries, run handlers, reconstruct timers/sessions/turns, change
        source-advanced policy, own contract-swap behavior, or own UI/API execution state.'
      3g_selected_contract_recipient_planning: 'For selected-contract mutating fork execution, fork-local recipient
        planning is a separate owner beyond route topology. The selected execution model, admission, publish path, and
        EventBus.Publish recipient guard consume runtime.run_fork.selected_contract_recipient_planning before selected
        fork recipient derivation. The owner plans recipients from selected binding, frontier evidence, route admission,
        and route topology evidence only; source deliveries, source route rows, source recipients, source receipts,
        source dead letters, and post-fork source outcomes are not executable fork truth or suppressors. This owner is
        still non-mutating: it does not persist route rows, write deliveries, run handlers, or own receipts, dead
        letters, idempotency, emitted follow-ups, timers, sessions, turns, source-advanced policy, contract swap, or
        UI/API execution state.'
      3g1_selected_contract_fork_local_agent_runtime_materializer_executor: 'For selected-contract mutating fork
        execution, planned selected agent recipients may execute only through
        runtime.run_fork.selected_contract_execution.fork_local_agent_runtime_materializer_executor after recipient
        planning and before selected fork publish. This owner consumes recipient planning as authoritative recipient
        truth, factors ordinary static contract-agent config/materialization semantics, constructs ephemeral fork-local
        handlers through the same runtime build/execution primitives as normal agents, and registers only fork-local
        EventBus channels/descriptors needed for authoritative delivery under the fork run_id. It must not persist
        selected handlers into ordinary current-runtime agents, use source deliveries/outcomes/live subscriptions as
        execution truth, synthesize receipts, or claim restart recovery. Flow-instance-scoped materialization without
        explicit fork-local proof, session/turn/audit reconstruction, timers, non-agent replay, retry/idempotency,
        follow-up policy beyond normal handler output, and UI/API consumers remain split siblings.'
      3g1a_selected_contract_fork_local_runtime_container: 'For selected-contract mutating fork execution, the live
        runtime container is owned by runtime.run_fork.selected_contract_execution.fork_local_runtime_container. It
        consumes selected binding/admission, selected recipient planning, authoritative agent delivery materialization,
        fork-local agent runtime materializer/executor proof when agent recipients exist, selected route recovery, and
        fork-local runtime/platform lineage policy plus typed runtime lineage before EventBus.Publish, AgentManager
        handlers, RuntimeLogger diagnostics, activation lineage inputs, cleanup, or quiescence are authoritative. The
        container may be consumed
        by the contract-swap historical replay path only after that path has independently admitted executable selected
        work, and it must preserve source rows/outcomes as lineage or blocker evidence only. EventBus descriptors,
        normal AgentManager current state, readiness JSON, CLI/API/dashboard/Builder output, and produced_by_type alone
        are not container truth. Restart recovery, current-state snapshot ownership, session/turn/audit reconstruction,
        non-agent replay, retry/idempotency/follow-up policy beyond normal selected output, and operator consumers remain
        split siblings.'
      3g1b_selected_contract_fork_local_runtime_typed_lineage: 'For selected-contract mutating fork execution,
        runtime.run_fork.selected_contract_execution.fork_local_runtime_typed_lineage owns the in-memory typed lineage
        model used by selected-fork runtime diagnostics, selected-execution tool-executor diagnostics, MCP turn-context
        bridges that preserve selected-fork context, and platform-control producers. It carries fork run ID, subject
        event ID/type, causal parent event ID, row category, selected-fork owner context, and source/fork/operator
        classification, then compiles that model to the existing persisted ParentEventID/events.source_event_id truth.
        Activation and selected-tree validation must continue to consume persisted lineage only, and unrelated/source
        platform rows, action/reason strings, produced_by_type alone, descriptors, readiness/operator state, restart
        recovery, current-state materialization, sessions/turns/audits, non-agent replay, retry/idempotency, and follow-up
        policy remain outside this owner.'
      3g2_selected_contract_fork_local_runtime_platform_event_lineage_policy: 'For selected-contract mutating fork
        execution, runtime.run_fork.selected_contract_execution.fork_local_runtime_platform_event_lineage_policy owns
        fresh fork-run runtime/platform control or diagnostic events emitted by the selected-fork runtime container while
        processing selected fork-local work. The owner may admit only events persisted under the fork run_id that are
        causally parented to selected-fork execution through the selected fork event parent/source_event_id chain.
        For platform.runtime_log diagnostics, the runtime logger must persist canonical lineage through events.source_event_id
        derived from an explicit diagnostic parent_event_id or from a verified same-run persisted subject EventID; diagnostic
        action/reason strings and local caller detail shape are not semantic owners. Unrelated fork-run platform events
        without selected-fork causal context, source platform facts, source outcomes, source deliveries, live EventBus
        descriptors, operator surfaces, and produced_by_type alone remain invalid selected-fork lineage. This owner does
        not change the source diagnostic platform outcome policy for platform.runtime_log/platform.inbound_recorded,
        does not treat platform.auth_required as source replay truth,
        and does not own restart recovery, current-state materialization, sessions, turns, audits, timers, routes,
        non-agent replay, retry/idempotency, or follow-up policy beyond normal selected-fork runtime output.'
      3h_selected_contract_supported_execution: 'For the runtime-owned selected-contract fork execution surface, selected-contract
        execution is a runtime-owned mutating path after selected binding, execution admission, route topology, dynamic
        topology proof or fail-closed classification, recipient planning, authoritative agent delivery materialization,
        and fork-local selected agent runtime materializer/executor proof when selected agent recipients exist. It mints
        fresh fork-local event IDs, writes fork event and delivery rows under the fork run_id, gates EventBus.Publish
        through recipient-planning evidence, runs selected handlers through
        runtime.run_fork.selected_contract_execution.fork_local_runtime_container and the normal runtime pipeline, records selected
        execution lineage, writes fork-local outcomes, consumes the fork-local runtime/platform event lineage policy for
        causally parented runtime control outputs, consumes typed runtime lineage before persisting runtime diagnostic
        lineage, and regenerates follow-up events under the fork run_id. This bounded owner does not include route
        persistence/recovery, timer reconstruction, session/turn/audit reconstruction, non-agent replay, contract-swap
        boot/resume beyond selected frontier execution, runtime restart recovery, and UI/API ownership remain separate
        parents or siblings. At/before-T source session/turn/audit facts may be admitted only as lineage/no-action
        evidence by the separate selected-contract session/turn/audit lineage policy. Post-T source session/turn/audit
        facts may be admitted only as source-advanced branch-divergence lineage/no-action evidence by the separate
        selected-contract source-advanced conversation-history policy. At/before-T source committed replay-scope marker
        rows may be admitted only as lineage/no-action evidence by the separate selected-contract committed replay-scope
        marker policy. Same-source in-progress source delivery coupling at the fork-point emission boundary may be
        admitted only by the separate selected-contract active source delivery conversation-coupling policy.'
      3h1_selected_contract_session_turn_audit_lineage_policy: 'For selected-contract timestamp-fork execution,
        runtime.run_fork.historical_replay_execution.selected_contract_session_turn_audit_lineage_policy consumes the
        canonical replay_resume_admission session_history, active_turn_history, and conversation_audit_history facts and
        may demote those at/before-T source facts from fail-closed blockers to lineage/no-action evidence only. The owner
        must keep pending/in-progress delivery session coupling and fork-local pre-existing conversation rows
        fail-closed except when the separate selected-contract active source delivery conversation-coupling policy has
        admitted the same-source fork-point emission case. It must not copy or reuse source session IDs, provider session IDs, transcripts, task audits, turns,
        receipts, outcomes, or source audit rows as fork-local runtime truth or suppressors. Fresh fork-local sessions,
        turns, and audits may appear only through normal selected fork runtime execution under the fork run_id. Post-T
        source conversation facts are outside this at/before-T owner and may be admitted only by
        runtime.run_fork.selected_contract_execution.source_advanced_conversation_history_policy. This owner does not
        close full session reconstruction, committed replay-scope marker policy, timers, routes, non-agent replay,
        restart recovery, contract-swap boot/resume, or operator surfaces.'
      3h2_selected_contract_committed_replay_scope_marker_policy: 'For selected-contract timestamp-fork execution,
        runtime.run_fork.historical_replay_execution.selected_contract_committed_replay_scope_marker_policy consumes the
        canonical replay_resume_admission committed_replay_scope fact and may demote at/before-T source committed
        replay-scope marker rows from fail-closed blockers to lineage/no-action evidence only. Source marker rows are
        same-run proof only: they are not executable fork work, not fork-local recovery truth, not copied into the fork,
        and not selected-fork suppressors. The cutoff for marker facts is the underlying source event position, so
        marker delivery write-skew after T for an at/before-T source event is lineage/no-action and must be excluded from
        generic selected-contract `source_deliveries_advanced_after_fork_point` evidence. Fork-local replay/recovery
        proof must be newly written under the fork run_id by selected-contract execution or approved fork-local
        delivery-event replay owners. Source committed replay-scope marker facts whose underlying source event is after T
        remain fail-closed unless a separate approved owner changes that policy. This owner does not close same-run
        recovery, fork-local delivery-event replay recovery, sessions, turns, audits, timers, routes, non-agent replay,
        restart recovery, contract-swap boot/resume, or operator surfaces.'
      3h3_selected_contract_diagnostic_platform_outcome_policy: 'For selected-contract timestamp-fork execution,
        runtime.run_fork.contract_frontier_admission.selected_contract_diagnostic_platform_outcome_policy consumes
        at/before-T source outcome facts for platform_events.routing_rules.diagnostic_events and may demote those
        diagnostic/non-routed platform facts from selected frontier work to lineage/no-action evidence only. The owner is
        part of selected-contract frontier admission before route topology, recipient planning, and selected execution.
        Diagnostic platform source facts are not executable fork work, route truth, selected recipients, copied source
        rows, source outcome suppressors, or operator-surface truth. Non-diagnostic platform/node/system outcome facts,
        generic non-agent replay, delivery-event replay, committed replay-scope marker policy, sessions, turns, audits,
        timers, routes, retry/idempotency, follow-up policy, restart recovery, contract-swap boot/resume, and operator
        surfaces remain separate fail-closed or split siblings unless independently approved.'
      3h4_selected_contract_active_source_delivery_conversation_coupling_policy: 'For selected-contract timestamp-fork
        execution, runtime.run_fork.selected_contract_execution.active_source_delivery_conversation_coupling_policy
        consumes replay_resume_admission delivery_in_progress_history evidence and fork-point source-event causality to
        admit only the same-source delivery fork-point emission case: the source delivery is in progress at T, belongs to
        the fork-point event source_event_id, and its agent subscriber produced the fork-point event, with no
        active_session_id, receipt, receipt outcome, or delivered_at at T. This owner may demote that delivery fact from a
        generic delivery_history_unproven blocker to lineage/no-action evidence and may allow the session/turn/audit
        lineage policy to classify at/before-T source conversation rows. It records the admitted case as selected-contract
        branch-divergence evidence. It must not copy source delivery/session/turn/audit rows, use source terminal outcomes
        after T as fork suppressors, or admit unrelated active deliveries, active_session_id coupling, post-T source
        conversation facts, fork-local pre-existing rows, non-agent replay, timers, routes, retry/idempotency, follow-up
        policy, restart recovery, or operator surfaces.'
      3i_contract_swap_boot_resume_admission: 'For timestamp forks with selected or swapped contracts, full boot/resume
        readiness is answered by runtime.run_fork.contract_swap_boot_resume_admission before any mutating historical
        replay/resume work. The owner consumes selected binding/source admission, replay/resume taxonomy, selected route
        topology, selected recipient planning, and selected route recovery evidence. Source rows and post-T outcomes
        remain lineage/evidence or fail-closed blockers; they are not executable fork work and do not suppress future
        fork-local work. This owner is non-mutating and does not authorize handler execution, delivery writes, receipts,
        dead letters, idempotency, emitted follow-ups, timers, sessions, turns, non-agent replay, route row mutation, or
        API/UI state.'
      3j_historical_replay_execution_admission: 'Before any owner-authorized bounded fork re-execution mutation,
        runtime.run_fork.historical_replay_execution_admission classifies every historical source fact family under one
        legacy-named runtime authority. It consumes replay_resume_admission, selected-contract execution admission, route topology,
        recipient planning, route recovery evidence when present, and contract-swap boot/resume admission when those
        prerequisites exist. It is
        admission/model only: it does not run handlers, create fork-local rows, copy source rows, write outcomes, replay
        timers, reconstruct sessions/turns/audits, mutate routes, or own API/dashboard state. Mutation is limited to
        separately admitted bounded children of runtime.run_fork.historical_replay_execution.'
      3j1_historical_replay_execution_owner: 'The legacy-named mutating authority for bounded fork re-execution is
        runtime.run_fork.historical_replay_execution. It consumes the admission fact matrix, validates exactly one
        classification for every source fact family, exposes the currently executable fork work set, and keeps unsupported
        fact families explicit as fail-closed blockers or split siblings. Its current supported mutation scope is only
        delivery_event_replay_ready plus approved selected-contract/timer children; it does not promise product-complete
        resumption for every source fact family.'
      3j2_historical_replay_contract_swap_boot_resume_execution: 'For selected or swapped contracts, the bounded
        mutating contract-swap boot/resume child is
        runtime.run_fork.historical_replay_execution.contract_swap_boot_resume. It consumes the promoted historical
        replay owner plus contract-swap admission, selected binding/admission, selected route topology, selected
        recipient planning, and selected route recovery. It may execute only owner-authorized delivery_event_replay_ready
        work, and recipients must come from selected recipient planning rather than source delivery subscribers. Timers,
        routes beyond selected recovery, sessions, turns, audits, non-agent work, source outcomes, restart recovery, and
        operator surfaces remain lineage-only, fail-closed, or split siblings under #564/#549/#618.'
      3k_historical_replay_delivery_event_replay_execution: 'For the first mutating historical replay child,
        runtime.run_fork.historical_replay_execution consumes a concrete historical replay execution admission and may
        execute only the delivery_event_replay_ready primitive. It creates fresh fork-local event/delivery rows and
        lineage through store.run_fork.delivery_event_replay, before source/fork lifecycle mutation, and only when
        event_deliveries are admitted as executable fork work and the owner emits concrete executable work identities.
        store.run_fork.delivery_event_replay is a physical writer only; it does not select replayable source deliveries
        from plan/admission data by itself. All other historical source fact families remain lineage, fail-closed
        blockers, or split siblings.'
      3k1_historical_replay_delivery_event_replay_recovery: 'For the delivery_event_replay_ready primitive, startup
        recovery and sweeper recovery consume the fork-local rows created by
        runtime.run_fork.historical_replay_execution through the existing persisted replay owner. The recovery queue is
        the fork event missing its platform pipeline receipt, serialized by ClaimPipelineReplay; recipients come from
        fork-local event_deliveries; direct replay scope comes from the fork-local committed replay-scope marker. Source
        rows and source outcomes are lineage/proof only and never suppress fork-local recovery. This is a restart
        durability child only; timers, routes, sessions, turns, audits, non-agent replay, contract-swap boot/resume,
        runtime-wide restart recovery, and API/UI/dashboard surfaces remain split under #564/#549/#618.'
      4_boot: 'Load the selected contracts when provided, otherwise reuse the source contract identity, and validate
        them against the reconstructed fork-local state and admitted fork fact matrix. Boot only the fork-local runtime
        context required by approved owners; boot does not reconstruct source sessions, turns, audits, routes,
        idempotency, or arbitrary in-flight work.'
      5_resume: 'Execute only owner-admitted fork-local work under the new run_id. Today that means the
        delivery_event_replay_ready primitive, selected-contract frontier execution when independently admitted, and
        timer reconstruction where the timer owner has proven active-at-T lineage. Unsupported historical fact families
        fail closed with typed blockers; the platform never infers unfinished source work from current rows.'
    parallel_safety: 'Timestamp-based fork handles parallel agent execution naturally. At timestamp T, all
      concurrent branches either committed their mutations or did not. No DAG traversal, no branch
      classification, no sibling carry-over logic. The reconstructed state is simply "what was the world at T."'
    contract_swap: 'When --contracts specifies a new contract path, any admitted fork-local delivery/event work must use
      the selected handler logic uniformly with no mixed-version state. This intent is not itself an execution owner.
      Runtime/store readiness for selected-contract boot/resume is governed by
      runtime.run_fork.contract_swap_boot_resume_admission, and mutation remains limited to separately approved bounded
      owners for admitted fork work.'
    timestamp_precision: 'Events committed in the same millisecond are disambiguated by (created_at, event_id)
      composite ordering. The fork point is inclusive: mutations from the target moment are included in
      reconstructed state. Only mutations strictly after T are undone.'
    isolation: 'Forked runs are fully isolated. They get their own event stream, their own entity state copies,
      and their own agent sessions. Fork state materialization writes entity_state rows under the fork run_id while
      preserving entity_id from the source run. Results can be compared side-by-side with the original run.'
    original_run: 'The source run transitions to status=forked. It is frozen — no new events are processed.
      Its data is preserved for comparison and audit.'
  mutation_log:
    description: 'The entity_mutations table is the audit trail for all entity state changes. It serves three
      purposes: (1) flight recorder — step-by-step view of what happened, (2) fork — state reconstruction at
      any point in time, (3) drift detection — verify entity_state matches the mutation history.'
    write_contract: 'Every write to entity_state MUST carry an explicit run_id and produce a corresponding
      entity_mutations row with the same run_id in the same transaction. This includes system node handler writes
      (data_accumulation, compute, sets_gate, advances_to, clear) and agent tool writes (save_entity_field).
      The runtime enforces this — there is no code path that mutates entity_state without logging the mutation.'
    drift_detection: 'swarm verify --run <run_id> reconstructs entity state from the mutation log and compares
      it to current entity_state rows for that same run_id. Any mismatch indicates a write that bypassed the mutation log. This is a
      correctness check, not a normal operation — run it when debugging unexpected state.'
    retention: 'Mutation rows are never auto-deleted. Retention policy is an operational concern. The platform
      may provide a future archive/purge API for mutations older than N days on terminated entities.'
  flight_recorder:
    description: 'The flight recorder is not a separate system — it is a query pattern over four tables:
      events (what happened), entity_mutations (what changed), agent_turns (why it changed), event_deliveries
      (who processed it). All four tables carry run_id for scoped queries.'
    reconstruction_query: 'To reconstruct a run step-by-step:
      SELECT e.event_type, e.payload, m.field, m.old_value, m.new_value, m.writer_type, m.writer_id
      FROM events e LEFT JOIN entity_mutations m ON m.caused_by_event = e.event_id
      WHERE e.run_id = :run_id ORDER BY e.created_at, m.created_at.
      Join with agent_turns on trigger_event_id for agent reasoning context.'
    joined_trace_surface: 'Operator-facing run trace surfaces should extend canonical persisted run-bound diagnostics,
      not invent a second observability island. The joined trace projection links event identity, delivery lifecycle,
      session ownership, and turn activity for a single run by consuming canonical rows from events, event_deliveries,
      agent_sessions or agent_conversation_audits, and agent_turns.'
    entity_timeline: 'To see one entity''s full history across runs:
      SELECT * FROM entity_mutations WHERE entity_id = :entity_id ORDER BY created_at.
      This shows every field change, who made it, and which event caused it.'
  builder_api:
    runs_list: 'GET /runs — list runs with status filter. Returns run_id, status, event_count, entity_count,
      started_at, ended_at.'
    run_detail: 'GET /runs/:run_id — full run metadata including fork lineage.'
    run_events: 'GET /runs/:run_id/events — paginated event stream for the run.'
    run_mutations: 'GET /runs/:run_id/mutations — paginated mutation log for the run.'
    run_trace: 'GET /runs/:run_id/trace — run-centric joined trace rows linking event, delivery, session, and turn identity
      for operator debugging. This is a persisted joined trace surface built on canonical run-bound diagnostics, not a
      separate observability store.'
    run_fork: 'POST /runs/:run_id/fork — fork a run at a specific event. Body: {event_id: uuid}.
      Returns the new run_id.'
    run_pause: 'POST /runs/:run_id/pause — pause a running run.'
    run_resume: 'POST /runs/:run_id/resume — resume a paused run.'
    run_cancel: 'POST /runs/:run_id/cancel — cancel a running run. Drains in-flight events.'
agent_identity_model:
  status: current_global_slug_constraint_promoted_source_authority
  promoted_by: '#977'
  merge_bearing_owner: platform-spec.yaml#agent_identity_model
  current_supported_posture: global_live_slug_identity
  authority_rule: >
    This section is the merge-bearing source authority for agent identity semantics under multi-bundle until a later
    #977 child promotes and proves a UUID-internal migration. Current runtime/store/API/CLI/dashboard behavior treats
    agent_id as the authored contract slug and as the globally unique live runtime identity. Issue prose that sketches
    agents.id UUID or bundle-scoped slug aliases is design evidence only until promoted here with matching schema,
    runtime, API/OpenRPC, CLI/dashboard, and historical-record proof.
  concepts:
    authored_slug:
      source: agents.yaml map key or explicit id field after contract loading
      current_public_name: agent_id
      role: Human-authored and operator-facing display/lookup alias.
    current_live_identity:
      source: agents.agent_id and runtime Agent.ID()
      role: Current durable primary key, runtime map key, EventBus subscriber key, session owner, delivery subscriber id,
        and public agent lookup token.
      limitation: This identity is global in the current platform and is not bundle-scoped.
    bundle_scoped_lookup:
      status: not_supported_for_duplicate_agent_slugs
      rule: >
        bundle_hash and RuntimeContextManager BundleContext selection identify runtime bundle context, not an immutable
        agent identity. Current agent.* reads/control, conversation.current_for_agent, CLI agent commands, dashboard
        read models, delivery/session/timer owners, and replay subscriber selection do not promise disambiguation of the
        same authored agent_id across multiple live bundles.
    historical_agent_reference:
      role: Existing agent_id, subscriber_id, owner_agent, from_agent, source_agent_id, log, audit, delivery, receipt,
        spend, timer, mailbox, and provenance rows record the identity value used when the fact was written.
      migration_rule: >
        Historical rows must not be blindly rewritten as part of a future UUID migration. A later child must classify
        each table as immutable history, new-row UUID owner, display alias, or explicitly split surface.
  current_multi_bundle_constraint:
    rule: >
      Every currently supported live loaded/boot-pinned runtime bundle sharing the same platform store/read model must
      use globally unique authored agent_id values. Duplicate authored agent slugs across live loaded BundleContexts are
      unsupported and must not be advertised as bundle-scoped or UUID-disambiguated behavior.
    enforcement_status: >
      RuntimeContextManager admission enforces this current-model live constraint for registered loaded BundleContexts:
      duplicate authored agent slugs fail closed before API readiness and report the duplicate slug plus conflicting
      bundle hashes/source labels when available. This enforcement does not add duplicate-slug support, UUID identity,
      bundle-scoped public lookup, store schema migration, API/CLI disambiguation, slug prefixing, or compatibility
      remapping; #977 remains the parent for those behaviors.
    final_matrix_dependency: >
      #1025 must treat duplicate agent slugs across live bundles as unsupported unless a later #977 implementation child
      promotes UUID-internal identity and proves bundle-scoped lookup across all affected surfaces.
  uuid_internal_migration_target:
    tracker: '#977'
    status: staged_parent_only_not_current_runtime_behavior
    target_model: >
      A future migration may introduce an immutable internal agent UUID, keep agent_id as authored slug/display alias,
      and make slug lookup bundle- or run-scoped where public callers provide enough context. That target requires
      separate gates for schema/backfill, runtime manager/EventBus/delivery/session ownership, API/OpenRPC resolution,
      CLI/dashboard display behavior, and historical/provenance policy.
    not_promoted_in_this_slice:
      - agents.id UUID schema migration
      - bundle-scoped UNIQUE(bundle_hash, agent_id) live alias enforcement
      - UUID-backed EventBus, delivery, receipt, timer, session, spend, mailbox, or conversation ownership
      - UUID-or-slug API parameter resolution
      - CLI/dashboard UUID display or disambiguation behavior
      - duplicate slug support across loaded bundles
  consumer_disposition:
    uuid_internal_candidates:
      - agents table durable primary key after future migration
      - runtime AgentManager maps and loop cancellation keys
      - EventBus agent subscriptions and live delivery subscriber keys
      - agent_sessions live ownership and session lookup
      - executable timers owned by agents
    slug_display_aliases:
      - agents.yaml authored map keys and explicit id fields
      - CLI positional agent-id inputs and normal text/table display
      - dashboard/read-model display labels
      - bundle.agents definition-only catalog output
    bundle_scoped_lookup_candidates:
      - agent-facing API methods when run_id or bundle context is explicit
      - RuntimeContextManager-selected control paths that dispatch through a chosen BundleContext
      - future duplicate-slug-safe dashboard/API reads
    historical_immutable_records:
      - agent_turns.agent_id
      - agent_conversation_audits.agent_id
      - event_deliveries and event_receipts subscriber_id rows already written
      - spend_ledger.agent_id
      - mailbox from_agent and provenance fields
      - runtime logs, dead letters, source_agent_id, and audit payload identity fields
    split_or_escalate:
      - tool/MCP target_agent_id, to_agent_id, and gateway agent_id fields
      - container/workspace identity labels
      - broad UUID schema/runtime/API migration children
multi_bundle_persistence:
  status: promoted_source_authority_with_partial_runtime_behavior
  promoted_by: '#1012'
  source_evidence:
    retired_private_draft: MULTI_BUNDLE_PERSISTENCE_DRAFT
    canonical_hash_first_slice: '#979 / PR #1033'
    bundle_hash_naming: '#1001'
    run_fork_cli_authority_absorbed_from: '#1038'
    serve_db_loaded_runtime_source: '#1020'
    boot_pinned_runtime_context_manager: '#1175'
    dynamic_load_disposition: '#1209'
    agent_identity_source_authority: '#977'
  authority_rule: >
    This section is the merge-bearing source authority for multi-bundle persistence, bundle identity, bundle-aware
    resume/delete/fork semantics, planned bundle API methods, and planned CLI command shape. The draft is now evidence
    only. Database foundation, read-only bundle catalog APIs, supported local serve ingest/source stamping, and boot-pinned
    Postgres-backed `swarm serve --bundle-hash` DB-loaded boot and RuntimeContextManager dispatch now have
    promoted implementation owners in this section. Remaining runtime, API handler, CLI, delete/fork/recovery, and
    generated OpenRPC publication work stays separately gated unless a later PR explicitly promotes and proves it.
  generated_artifact_policy:
    current_openrpc_status: bundle_read_catalog_register_run_fork_and_delete_methods_published
    rule: >
      Generated openrpc.json is derived from api_specification.method_catalog and must continue to match the currently
      registered /v1/rpc handler set. The read-only bundle.list, bundle.get, and bundle.agents catalog methods are now
      published because their handlers and store owner are implemented in the same gated PR. run.fork is now published
      because its selected-contract API/runtime handler owner is implemented in the same gated PR. Mutating bundle.register
      is now published because its handler, idempotency behavior, shared bundle catalog writer, and generated artifacts are
      implemented together. bundle.delete is now published because its API/runtime handler owners are implemented in gated
      PRs: omitted or false force performs the #1018 non-force delete path, while force=true performs the #1019 force-delete
      cleanup path.
    proof_expectation: >
      Source-authority promotion proof must verify that generated OpenRPC methods are not silently published without
      implementation, and that future implementation PRs promote matching method_catalog entries and generated artifacts
      together.
  agent_identity_boundary:
    owner: platform-spec.yaml#agent_identity_model
    tracker: '#977'
    status: current_global_slug_constraint
    rule: >
      Multi-bundle BundleContext selection is governed by bundle_hash. It does not by itself provide duplicate agent slug
      disambiguation. Current agent-facing runtime/store/API/CLI/dashboard surfaces consume agent_id under
      agent_identity_model.current_supported_posture, so live loaded or boot-pinned bundles with duplicate authored
      agent slugs are unsupported until a separately gated #977 UUID-internal identity migration lands.
  bundle_identity:
    canonical_name: bundle_hash
    format: 'bundle-v1:sha256:<64 lowercase hex>'
    hash_rule_owner: platform-spec.yaml#multi_bundle_persistence.bundle_identity.canonicalization_v1
    historical_design_evidence: retired private bundle canonicalization design evidence
    rename_policy:
      bundle_hash: promoted_name
      bundle_fingerprint: legacy_pre_multi_bundle_name
      bundle_ref: legacy_pre_multi_bundle_api_wrapper
      dual_accept_transition: '#1001 only; old and new names must fail closed if both are supplied and disagree'
    canonicalization_v1:
      status: promoted_merge_bearing_authority
      implementation_owner: internal/runtime/contracts.BundleHash
      runtime_behavior_boundary: >
        This block governs only canonical bundle_hash computation. Serve ingest, run source stamping, API routing, CLI,
        fork, delete, runtime.nuke, health output promotion, and reader migration remain separately gated work.
      output:
        name: bundle_hash
        format: 'bundle-v1:sha256:<64 lowercase hex>'
        digest: SHA-256
        namespace: bundle-v1
        legacy_non_authority: >
          `sha256:<hex>` BundleFingerprint values and bundle_ref.fingerprint are legacy boot/runtime transition
          assertions. They are not v1 bundle_hash values and must not be compared as canonical bundle identity.
      preimage_stream:
        prelude: literal bytes `swarm-bundle-hash-v1` followed by LF
        entry_order: sort by canonical label bytes after slash normalization
        entry_encoding: >
          For each entry, write uint64 big-endian label byte length, label UTF-8 bytes, uint64 big-endian canonical
          content byte length, then canonical content bytes.
      labels:
        platform_spec_label: platform/platform-spec.yaml
        bundle_label_prefix: bundle/
        bundle_label_rule: >
          Labels are `bundle/<relative path from contracts root>` after symlink checks and filepath cleaning. Path
          separators are `/` on every host. Labels must be valid UTF-8, NFC-normalized, non-empty, contain no NUL or
          backslash, and contain no empty, `.`, or `..` segment.
        duplicate_rule: >
          Duplicate canonical labels fail closed. ASCII case-colliding labels also fail closed; non-ASCII bytes are
          never locale-folded.
      canonical_entries:
        required:
          - label: platform/platform-spec.yaml
            source: effective platform-spec.yaml used to load the bundle
            policy: yaml
          - label: bundle/package.yaml
            source: root package manifest
            policy: yaml
        root_optional_yaml:
          - schema.yaml
          - types.yaml
          - entities.yaml
          - nodes.yaml
          - events.yaml
          - agents.yaml
          - tools.yaml
          - policy.yaml
        root_prompts: every non-ignored regular file under root prompts/
        project_packages: >
          For each non-root discovered project package, include the package manifest plus nodes.yaml, events.yaml,
          agents.yaml, tools.yaml, policy.yaml when present, and every non-ignored regular file under that package's
          prompts/ directory.
        flow_yaml: >
          For each discovered flow, include schema.yaml, types.yaml, entities.yaml, nodes.yaml, events.yaml,
          agents.yaml, tools.yaml, and policy.yaml when present.
        flow_prompts: every non-ignored regular file under each flow prompts/
        flow_data: every non-ignored regular file under each flow data/ as raw bytes
        flow_policy_modules: >
          For each flow policy.yaml modules declaration, include the referenced module bytes as raw bytes under their
          canonical bundle-relative label. The declared module digest is checked against the same bytes; omitting module
          bytes from bundle_hash or bundle_fingerprint is invalid for bundles containing compute_module rows.
        excluded_inputs:
          - verification gates, tooling locks, generated caches, build outputs, database DDL, runtime state, and host absolute paths
          - files outside the contracts root, except the effective platform spec under the fixed platform label
      filesystem_policy:
        discovery: lstat-style discovery; symlinks are not followed
        fail_closed:
          - required platform spec, root package manifest, and explicit input paths that are missing or unreadable
          - any symlink encountered as an explicit input or below a recursive included directory
          - non-regular required files and out-of-tree bundle input paths
        skip: optional absent paths and non-regular non-symlink entries below recursive included directories
        ignored_directories:
          - .git
          - .hg
          - .svn
          - .idea
          - .vscode
          - __pycache__
          - .pytest_cache
          - .mypy_cache
          - .ruff_cache
        ignored_files:
          exact:
            - .DS_Store
            - Thumbs.db
          suffixes:
            - '~'
            - .swp
            - .swo
            - .tmp
            - .bak
          prefixes:
            - '.#'
      content_policies:
        yaml:
          input: valid UTF-8, exactly one YAML document
          presentation_not_content: comments, document markers, indentation, line endings, and mapping key order
          structures: mappings, sequences, aliases, and scalar nodes only
          mappings: keys must canonicalize to strings; duplicate keys after NFC normalization fail closed
          aliases: aliases are resolved before JSON emission; alias cycles fail closed; anchor names are not content
          refs: '`$ref` is literal YAML content and is not expanded, fetched, or inlined by bundle_hash v1'
          tags: >
            Only YAML core map, seq, str, bool, int, float, and null tags are allowed. Custom, binary, timestamp, and
            unknown tags fail closed. Explicit non-string scalar tags are accepted only when the unquoted scalar spelling
            would have the same implicit v1 kind; quoted explicit non-string scalar tags fail closed. Explicit string tags
            remain strings.
          scalars: >
            Only `true`, `false`, and `null` are typed booleans/null by implicit spelling. JSON-number grammar scalars
            become numbers when finite IEEE 754 binary64 values; integer-valued numbers must be within the I-JSON safe
            integer range; negative zero, non-finite values, and unsupported numeric spellings fail closed. All other
            scalars are NFC-normalized strings.
          json_emission: >
            Emit RFC 8785 JCS-compatible UTF-8 JSON with no insignificant whitespace and no trailing newline. Object keys
            sort by UTF-16 code units after NFC normalization. Strings use JSON escaping. Numbers use JCS fixed/exponent
            thresholds, including `+` on positive exponents.
        prompt_text:
          input: valid UTF-8 text
          canonicalization: strip one UTF-8 BOM if present, normalize CRLF and CR to LF, append one final LF to non-empty files without one
          preserves: trailing spaces, tabs, blank lines, and all non-line-ending content bytes after UTF-8 decoding
        raw_data:
          input: raw bytes from included flow data/ files
          canonicalization: no byte normalization
  persistence_model:
    live_schema_boundary: >
      platform_tables.tables is the current runtime DDL source. #1013 promotes the bundles table and
      runs.bundle_hash/runs.bundle_source into the live schema foundation. Serve ingest/source stamping for local
      `swarm serve --contracts` is promoted by multi_bundle_persistence.persistence_model.serve_ingest_projection;
      boot-pinned Postgres-backed `swarm serve --bundle-hash` runtime boot and dispatch are promoted by
      multi_bundle_persistence.persistence_model.serve_db_loaded_runtime_source. Reader migration,
      CLI/fork behavior beyond this serve flag, dynamic runtime Load/Unload, delete/runtime cleanup, and public
      dual-accept naming remain separately gated implementation work unless a later PR explicitly promotes and proves them.
    bundles_table:
      planned_live_owner_after_migration: platform_tables.tables.bundles
      primary_key: bundle_hash
      required_columns:
        - bundle_hash
        - content_yaml
        - parsed_json
        - ingested_at
      optional_columns:
        - data_blob
        - metadata
      stores:
        - deterministic serve-ingest YAML archive for non-data canonical bundle inputs
        - data/ bundle blob archive bytes when included by the canonical hash rule
        - parsed JSON projection for safe server-side inspection
      does_not_store:
        - external code
        - host filesystem dependencies
        - credentials
        - generated runtime state
    serve_ingest_projection:
      status: implemented_for_local_postgres_serve_contracts
      projection_owner: internal/runtime/contracts.BuildBundleCatalogProjection
      store_owner: internal/store.PostgresStore.UpsertBundleCatalog
      source_fact_owner: cmd/swarm.prepareServeBundleSource
      runtime_context_owner: internal/runtime/correlation.BundleSourceFact
      applies_to:
        persisted: '`swarm serve --contracts` computes BundleHash, writes or reuses one bundles row, and stamps every new run row with bundle_hash plus bundle_source=persisted.'
        ephemeral: '`swarm serve --contracts --dev` computes the same BundleHash, writes no bundles row, and stamps every new run row with bundle_hash plus bundle_source=ephemeral.'
      content_yaml: >
        Deterministic YAML archive named `swarm.bundle.catalog.v1`. The archive lists every non-data canonical bundle
        input by canonical label and stores the bundle_hash v1 canonical content bytes as base64, plus a canonical_inputs list containing all
        bundle_hash v1 labels, policies, and byte sizes. It never stores host absolute paths. Flow data/ raw entries are
        excluded from content_yaml and live only in data_blob.
      data_blob: >
        NULL when the canonical bundle has no flow data/ raw inputs. Otherwise a deterministic JSON byte archive named
        `swarm.bundle.catalog.v1` with entries sorted by canonical label; each entry records label, byte size, and exact
        raw bytes as base64.
      parsed_json: >
        Definition-only JSON projection with projection_version, workflow name/version, canonical input labels/policies,
        and agent definitions. Agent definitions may include agent_id, flow_instance, role, type, model,
        mode, session_scope, prompt_path, subscriptions, and tools. Runtime-owned fields such as status,
        runtime_state, queues, active task, watchdog, last_tool_outcome, pending deliveries, and delivery lifecycle are
        forbidden.
      metadata: >
        JSON object containing projection_version, source=`swarm serve --contracts`, workflow_name, workflow_version,
        file_count, and data_file_count.
      idempotency: >
        Reusing an existing bundles row with the same bundle_hash is allowed only when content_yaml, parsed_json,
        data_blob, and metadata match the computed projection. A hash collision or stale row with different stored
        content fails closed before runtime construction.
      split_boundaries:
        - DB-loaded same-bundle source/fork loaders consume the persisted bundle catalog runtime source owner.
        - New-work routing and bundle_hash admission remain #1022.
        - Bundle register/delete APIs remain #1017/#1018/#1019.
        - SQLite local/dev runtime support is promoted for `swarm run start --contracts`, but DB-loaded `--bundle-hash`
          bundle-catalog boot remains Postgres-only unless separately gated.
    serve_db_loaded_runtime_source:
      status: implemented_for_boot_pinned_postgres_serve_bundle_hash_contexts
      cli_flag: 'swarm serve --bundle-hash <bundle-v1:sha256:<64 lowercase hex>> [--bundle-hash <bundle-v1:sha256:<64 lowercase hex>> ...]'
      canonical_store_owner: internal/store.PostgresStore.LoadBundleCatalogRuntimeRecord
      runtime_source_owner: internal/runtime/contracts.LoadBundleCatalogRuntimeSource
      serve_boot_owner: cmd/swarm.loadServeRuntimeBundleFromCatalog
      source_fact_owner: cmd/swarm.prepareLoadedServeBundleSource
      runtime_context_manager_owner: internal/runtime.RuntimeContextManager
      bundle_context_owner: internal/runtime.BundleContext
      source_replacement_guard: cmd/swarm.runtimeProjectSupervisor.DisableSourceReplacement
      supported_surface:
        - One or more canonical bundle_hash values may be pinned at process boot by repeating --bundle-hash. Values must be canonical, non-empty, duplicate-free, and mutually exclusive with --contracts and --dev.
        - The mode is Postgres-only and all-or-nothing before API readiness. SQLite, no-store, missing store, missing bundle row, malformed archive, missing bytes, hash mismatch, duplicate hash, and noncanonical hash fail closed before any runtime context is served.
        - The runtime loader consumes stored bundles.content_yaml and raw bundles.data_blob bytes only; parsed_json is inspection output and is never a runtime source.
        - The loader reconstructs platform spec, contract definition files, prompts, and flow data/ raw bytes into a process-owned temporary source, then recomputes BundleHash and requires it to equal the requested bundle_hash before runtime construction.
        - Each pinned bundle is registered as a BundleContext under RuntimeContextManager. The BundleContext owns its source, BundleSourceFact, EventBus, route table, pipeline/coordinator, agent manager, subscriptions, source-bound runtime components, and manager-owned lifecycle state.
        - Under agent_identity_model.current_supported_posture, RuntimeContextManager admission rejects duplicate authored agent_id slugs across registered loaded BundleContexts before API readiness; the unsupported shape must name the duplicate slug and conflicting bundle hashes/source labels rather than prefix, alias, remap, or otherwise disambiguate the slug.
        - event.publish and run.start select a loaded BundleContext by explicit canonical bundle_hash for create-new work or by runs.bundle_hash/runs.bundle_source for existing-run work. Missing, deleted, legacy, or unloaded contexts fail closed rather than falling back to ambient boot state.
        - RuntimeContextManager lifecycle state is fail-closed and monotonic in this slice: once a loaded persisted BundleContext is marked unavailable/unloaded by an authoritative bundle-unavailability operation, supported admission paths must reject that context with BUNDLE_UNAVAILABLE unless a later separately-approved Load/repair owner exists.
        - Successful bundle.delete, force bundle.delete partial failure after force-controlled cleanup begins, and successful or partial runtime.nuke with include_bundles=true consume RuntimeContextManager deactivation for loaded matching contexts. runtime.nuke include_bundles=false must not deactivate bundle contexts.
        - Existing-run controls that can be resolved by run_id dispatch through the selected BundleContext. Ambiguous singleton controls such as runtime.pause/resume, mailbox decision event publication, and broad agent restart/backlog replay fail closed in multi-context mode pending dynamic lifecycle work.
        - When more than one bundle is pinned in the same process, unscoped startup ownership, active schedule restoration, and manager pending-event recovery are disabled for every context until bundle-scoped recovery filters are promoted. Single-bundle DB-loaded serve may keep the existing startup recovery owner.
        - Every run writer reachable under the selected runtime context consumes BundleSourceFact with bundle_source=persisted and bundle_hash equal to that context's canonical hash.
        - Runtime project OpenProject/ReloadProject source replacement is disabled while the process is pinned to a DB-loaded bundle source.
        - Workspace/container names, volumes, and managed identity labels for executable context paths include bundle-disambiguated identity when more than one context can be loaded.
        - External executable code, tools, container images, credentials, and host environment dependencies remain environment-owned and are not stored in the bundles row.
      split_boundaries:
        - Dynamic post-boot RuntimeContextManager Load remains split to #1176/#981 follow-up; this slice only implements unload/deactivation triggered by existing authoritative delete/nuke owners.
        - Same-bundle selected-contract fork execution from DB bytes consumes the persisted bundle catalog runtime source owner.
        - Cross-bundle run.fork target selection is implemented for already loaded/boot-pinned target BundleContexts under #976.
        - Final lifecycle/scoped API conformance matrix remains #1025.
        - Ambient CLI bundle context remains #1028.
        - Bundle CLI inventory and swarm run fork consumers remain #1023/#989.
        - Delete/runtime.nuke/lifecycle cleanup remains #987/#988/#998/#1008/#1009.
    dynamic_load_source_authority:
      tracker: '#1209'
      status: parked_no_supported_post_boot_load
      decision: >
        Dynamic post-boot RuntimeContextManager Load is not a supported Option A runtime behavior in the current platform
        contract. Supported loaded BundleContexts are created only by boot-pinned `swarm serve --bundle-hash` before API
        readiness. `bundle.register` remains a persisted catalog mutation only: it must not construct, repair, reload, or
        expose a RuntimeContextManager BundleContext in the running process. No public runtime/admin Load API or CLI
        surface is currently published. Previously unloaded/deactivated contexts remain fail-closed and are not
        reactivated in-process by registration, retry, idempotency replay, or catalog row presence.
      trigger_disposition:
        bundle_register: catalog_only_no_runtime_load
        explicit_runtime_admin_load: not_published
        repair_reload_unloaded_context: not_supported
        automatic_load_on_admission: not_supported
      supported_recovery_path: >
        Operators that need a newly registered or previously unloaded persisted bundle to become routable under the
        current contract must start a process pinned to that bundle_hash. Any future in-process Load, repair, or reload
        behavior requires a separately gated source-authority PR that names the public or internal trigger, runtime graph
        factory owner, idempotency/concurrency semantics, and generated artifacts if a public surface is introduced.
      final_matrix_disposition: >
        #1025 must treat Dynamic Load as explicitly parked/not supported for this phase. The matrix should prove that
        registration remains catalog-only, unloaded contexts fail closed after #1201 deactivation, and no current
        supported API/CLI surface promises post-readiness RuntimeContextManager Load.
    runs_table:
      planned_live_owner_after_migration: platform_tables.tables.runs
      promoted_fields:
        bundle_hash: nullable canonical bundle identity for the run
        bundle_source: "persisted | ephemeral | deleted | legacy"
      foreign_key_policy: >
        runs.bundle_hash intentionally has no database foreign key to bundles.bundle_hash. Deleting a bundle row must not
        cascade into historical run rows; resume/fork admission consumes bundle_source and current bundle row presence.
      migration_policy: >
        Existing rows start as bundle_source=legacy with bundle_hash NULL unless a separately gated migration can prove a
        persisted bundle hash. Migration must be aggressive and fail closed for unknown owners rather than inventing hashes
        from stale filesystem paths.
  resume_and_recovery:
    resume_eligibility:
      persisted_bundle_present:
        condition: 'runs.bundle_source=persisted and bundles row exists for runs.bundle_hash'
        result: resume_allowed
      persisted_bundle_missing:
        condition: 'runs.bundle_source=persisted and no bundles row exists for runs.bundle_hash'
        result_error: BUNDLE_DATA_INTEGRITY_ERROR
        rationale: A persisted source promised durable bytes; a missing row is data corruption, not normal unavailability.
      ephemeral_deleted_or_legacy:
        condition: 'runs.bundle_source in (ephemeral, deleted, legacy)'
        result_error: BUNDLE_UNAVAILABLE
        rationale: The server lacks authoritative bundle bytes for resume/fork after restart or deletion.
    active_restart_recovery:
      startup_owner:
        implemented_by:
          - internal/runtime/startuprecovery
          - internal/runtime/preservationcleanup
          - internal/store.PostgresStore.ApplyUnavailableBundleStartupPreservationCleanup
        ordering: >
          Serve startup runs this owner after platform schema/state-store initialization and after
          runtime_boot.active_run_abandon_quiescence, but before legacy bundle-match admission, runtime start,
          API readiness, or late delivery recovery.
        persisted_missing_rule: >
          Any active run classified as BUNDLE_DATA_INTEGRITY_ERROR by the canonical run bundle availability owner
          fails serve before cleanup/readiness. Mixed persisted-missing and orphanable active rows must not apply
          partial preservation cleanup.
        orphan_cleanup_scope: >
          Active ephemeral, deleted, and legacy runs are cancelled with no failure envelope; the bundle orphan reason is
          written only to stopped run_control_state.reason. Pending/in-progress same-run agent/node deliveries are
          dead-lettered with receipts, active/suspended agent sessions terminate with reason orphaned and the bundle
          cause as detail, active run-scoped timers are cancelled, and run-scoped managed containers are stopped when
          their managed identity proves the affected run_id.
      persisted_bundle_present: restart_may_resume_or_recover_the_run_under_runtime_recovery_owners
      persisted_bundle_missing: fail_serve_with_BUNDLE_DATA_INTEGRITY_ERROR_until_operator_repairs_data
      ephemeral_deleted_or_legacy: >
        Active mid-flight runs cannot be resumed after process restart. Runtime recovery must orphan/terminalize them
        through the active-run and delivery cleanup owner chain instead of pretending their filesystem bundle is still
        authoritative.
    completed_run_fork_after_bundle_delete:
      rule: >
        Completed runs whose source bundle row has been deleted are not forkable from bundle bytes. Same-bundle fork
        admission returns BUNDLE_UNAVAILABLE unless another promoted owner proves an authoritative source bundle.
  bundle_delete:
    api_method: bundle.delete
    cli_command: swarm bundle delete <bundle-hash> [--force] [--dry-run] [--idempotency-key <key>]
    non_force_rule: >
      Without --force, deleting a bundle with any active run using that bundle fails closed with BUNDLE_HAS_ACTIVE_RUNS.
    phase_5_atomicity:
      tracker: '#1009'
      implementation_status: implemented_for_force_and_non_force_delete_runtime
      canonical_runtime_owner: internal/store.PostgresStore.ApplyBundleDeleteFinalMutation
      applies_to:
        - '#1018 non-force bundle.delete final bundle availability mutation'
        - '#1019 bundle.delete --force final bundle availability mutation after preservation cleanup succeeds'
      transaction_rule: >
        The final bundle availability mutation MUST execute in one database transaction. The transaction first serializes
        run creation for the runs table, then rechecks/locks referencing persisted run rows, then updates every eligible
        referencing run from bundle_source=persisted to bundle_source=deleted before deleting the matching bundles row. API
        handlers, CLI consumers, force-delete orchestration, and non-force delete orchestration MUST consume the shared
        store transaction owner rather than issuing local raw SQL for this transition.
      transaction_order:
        - lock_runs_table_against_new_persisted_bundle_references
        - update_eligible_runs_bundle_source_to_deleted
        - delete_matching_bundles_row
      eligible_runs: >
        Only runs that are already non-active for the delete operation may be marked deleted in Phase 5. Active-run refusal
        is owned by #1018 for non-force delete, and active-run quiescence plus preservation cleanup is owned by #1019/#1008
        for force delete before Phase 5 is reachable.
      isolation: >
        PostgreSQL READ COMMITTED is sufficient only when the final transaction blocks concurrent run creation before the
        active-run recheck and source update. Concurrent readers observe either the pre-delete persisted source with an
        existing bundle row or the post-delete deleted source with no row. They must not observe a legitimate delete as
        bundle_source=persisted with a missing bundle row.
      post_delete_new_work_admission:
        status: implemented_for_force_and_non_force_delete_runtime
        canonical_owner: internal/store/runlifecycle.EnsureActive
        consumed_by:
          - internal/store.PostgresStore.ensureRunRow
          - internal/runtime/bus.EventBus publish paths through PostgresStore.AppendEventTx
          - internal/runtime.RuntimeLogger runtime-log run-row persistence
          - internal/runtime/mutationlog mutation-log run-row persistence
          - /v1/rpc event.publish
          - /v1/rpc run.start
        rule: >
          New work or run-scoped runtime/mutation records stamped from a persisted runtime BundleSourceFact MUST serialize
          against the runs table, re-check that bundles still contains the source bundle_hash in the same transaction as
          the run-row creation, and fail closed before inserting a run, event, runtime-log row, or mutation-log row when
          the bundle row has been deleted. A successful bundle.delete, with or without --force, must therefore make later
          same-runtime event.publish, run.start, runtime-log, and mutation-log attempts fail closed rather than recreating
          bundle_source=persisted with a missing bundle row.
      runtime_context_deactivation:
        status: implemented_for_runtime_context_manager_unload_first_slice
        canonical_owner: internal/runtime.RuntimeContextManager
        consumed_by:
          - /v1/rpc bundle.delete
          - /v1/rpc runtime.nuke when include_bundles=true
          - internal/apiv1 runtime context admission helpers
        rule: >
          In DB-loaded RuntimeContextManager mode, successful bundle.delete for a loaded bundle_hash MUST mark that
          BundleContext unloaded before later supported admission paths can select it again. bundle.delete --force
          partial failure after force-controlled cleanup has begun MUST also fail closed by marking the matching context
          unavailable. Non-force active-run refusal, dry-run delete, missing bundle errors, and idempotency conflicts MUST
          NOT deactivate a loaded context because those operations do not establish bundle unavailability.
      reader_invariant: >
        Bundle availability readers MUST read runs.bundle_source before consulting bundles. Readers only look up bundles
        when bundle_source=persisted. bundle_source in (ephemeral, deleted, legacy) returns BUNDLE_UNAVAILABLE without a
        bundle-row lookup; bundle_source=persisted with a missing row remains BUNDLE_DATA_INTEGRITY_ERROR.
      invalid_implementations:
        - deleting the bundles row before marking eligible runs deleted
        - splitting the runs update and bundle row delete across transactions
        - implementing separate raw-SQL Phase 5 transitions in non-force and force delete paths
        - reading bundles before runs.bundle_source when classifying bundle availability
    force_owner_chain:
      - acquire shared destructive-operation mutex/idempotency owner
      - plan affected runs and deliveries for the bundle_hash
      - quiesce and terminalize active runs under run-control/runtime recovery owners
      - cancel or drain retryable deliveries and pending queues under delivery owners
      - stop/clean runtime containers and process-owned resources for the affected runs
      - delete or mark bundle rows only after cleanup succeeds
    errors:
      - BUNDLE_NOT_FOUND
      - BUNDLE_HAS_ACTIVE_RUNS
      - BUNDLE_DELETE_IN_PROGRESS
      - RUNTIME_NUKE_IN_PROGRESS
      - IDEMPOTENCY_CONFLICT
    result_shape:
      name: BundleDeleteResult
      required_fields:
        - bundle_hash
        - deleted
        - active_runs_stopped
        - deliveries_cancelled
        - containers_stopped
        - dry_run
  api_surface:
    publication_status: bundle_read_catalog_register_run_fork_and_delete_generated_openrpc
    command_transport_owner: api_specification
    bundle_methods_planned:
      bundle.list:
        kind: read
        result: BundleSummary page, optionally cursor-paginated
      bundle.get:
        kind: read
        params: bundle_hash
        result: BundleDetail
      bundle.agents:
        kind: read
        params: bundle_hash
        result: Agent definitions from the persisted bundle bytes
      bundle.register:
        kind: mutate
        params: BundleRegistrationEnvelopeV1 content_yaml, BundleRegisterDataBlobV1 data_blob?, idempotency_key?
        result: BundleRegistrationResult with bundle_hash, registered, has_data, and data_size_bytes
        rule: >
          Registration materializes the submitted BundleRegistrationEnvelopeV1 into a temporary contract root, consumes the
          canonical internal/runtime/contracts.BundleHash owner, persists exactly one shared bundle catalog row through the
          store UPSERT owner, and does not start runtime work or update runs. Re-registering the same canonical content is a
          no-op. Existing same-hash rows with different persisted content/projection fail closed with
          BUNDLE_REGISTER_CONFLICT. Re-registering a previously deleted hash never restores runs.bundle_source from deleted
          to persisted.
      bundle.delete:
        kind: destructive_mutate
        params: bundle_hash, force?, dry_run?, idempotency_key?
        result: BundleDeleteResult
    bundle_aware_existing_methods_planned:
      event.publish:
        rule: >
          New-run publication requires canonical bundle_hash when run_id is absent. Existing-run publication resolves bundle
          context from runs.bundle_hash/runs.bundle_source. If caller bundle_hash and existing run context disagree, the
          method fails closed with BUNDLE_MISMATCH before mutation or idempotency completion. In DB-loaded pinned
          RuntimeContextManager mode, the resolved/requested bundle_hash must select a loaded BundleContext; valid but
          unloaded or unavailable hashes fail closed with BUNDLE_UNAVAILABLE rather than falling back to ambient boot
          state. Legacy bundle_ref/bundle_fingerprint wrappers are transition-only parser inputs
          and are not authoritative for create-new-work scope.
      run.start:
        rule: Deprecated wrapper follows event.publish bundle_hash semantics while it remains present.
      run.list:
        rule: Accepts optional bundle_hash filter over canonical runs.bundle_hash.
      runtime.logs:
        rule: Accepts optional bundle_hash filter over canonical runs.bundle_hash.
      runtime.subscribe_logs:
        rule: Accepts the same optional bundle_hash runtime-log source filter as runtime.logs.
      runtime.incidents:
        rule: Accepts optional bundle_hash filter over source runtime-log rows before incident aggregation.
      agent.list:
        rule: >
          Current live agent listing consumes agent_identity_model.current_supported_posture: agent_id is the globally
          unique authored slug for live loaded agents, and duplicate slugs across live BundleContexts are unsupported.
          Future duplicate-slug-safe listing must explicitly disambiguate run-scoped loaded agents from persisted bundle
          agent catalog definitions and must not infer UUID or bundle-scoped lookup before a #977 child promotes it.
      event.list:
        rule: Multi-bundle-safe event listing requires explicit filter.run_id; unscoped event firehose reads are not public v1.
      event.subscribe:
        rule: Multi-bundle-safe event subscriptions require explicit filter.run_id; unscoped event firehose streams are not public v1.
    run_fork:
      method: run.fork
      params:
        source_run_id:
          required: true
          meaning: Run to fork from.
        fork_event_id:
          required: false
          cli_flag: --at-event <event-id>
          meaning: Explicit fork-point event selector. When omitted, the run-fork store owner selects the latest persisted source-run event; no CLI/current-session ambient event is allowed.
        bundle_hash:
          required: false
          cli_flag: --bundle-hash <bundle_hash>
          meaning: Optional target/source bundle selector under the promoted bundle_hash naming rule.
        idempotency_key:
          required: false
          cli_flag: --idempotency-key <key>
      same_bundle_rule: >
        If bundle_hash is omitted or equals the source run bundle_hash, same-bundle fork admission consumes the source
        bundle row when available. Disk-loaded selected_contracts execution consumes the existing runtime ownership.
        DB-loaded selected_contracts execution must load source bytes from the persisted bundle catalog runtime source
        owner for the source run bundle_hash, verify the reconstructed hash, and stamp fork-created runs with
        bundle_source=persisted and that canonical bundle_hash.
      cross_bundle_rule: >
        If bundle_hash differs from the source run bundle_hash, the target hash selects an already loaded/boot-pinned
        RuntimeContextManager BundleContext under current Option A. The fork loads target bundle bytes from the persisted
        bundle catalog, persists selected-contract ownership as mode=bundle_hash with that target bundle_hash, records
        route recovery against the same target identity, and stamps fork-created runs with bundle_source=persisted plus
        the target canonical bundle_hash. Valid target hashes that are not loaded by this process, have been unloaded or
        deactivated, are missing/deleted from the catalog, or otherwise lack supported persisted bytes fail closed with
        BUNDLE_UNAVAILABLE. Corrupt or hash-mismatched persisted target bytes fail with BUNDLE_DATA_INTEGRITY_ERROR.
        run.fork MUST NOT perform Dynamic Load, bundle.register runtime start, catalog-only runtime load, ambient CLI
        bundle selection, or Option B artifact capture.
      unavailable_rule: >
        Source runs with bundle_source ephemeral, deleted, or legacy return BUNDLE_UNAVAILABLE for fork admission because
        the server lacks authoritative persisted bundle bytes.
  cli_surface:
    publication_status: bundle_inventory_register_envelope_directory_delete_run_fork_and_boot_pinned_serve_bundle_hash_implemented_other_cli_children_pending
    bundle_commands_supported:
      - swarm bundle list
      - swarm bundle show <bundle-hash>
      - swarm bundle agents <bundle-hash>
      - swarm bundle build [--contracts <contracts-directory>] [--output <output-root>] [--report json]
      - swarm bundle register <registration-envelope-yaml> [--data-blob <data-blob-json>] [--idempotency-key <key>]
      - swarm bundle register --contracts <contracts-directory> [--idempotency-key <key>]
      - swarm bundle delete <bundle-hash> [--force] [--dry-run] [--idempotency-key <key>]
    bundle_commands_split:
      - swarm bundle register --archive <archive-file>
    bundle_register_directory_packager:
      owner: internal/runtime/contracts.BuildBundleRegistrationDirectoryUpload
      status: implemented_local_directory_packager
      cli_consumer: swarm bundle register --contracts <contracts-directory>
      rule: >
        The local directory packager converts a selected contracts directory into BundleRegistrationEnvelopeV1
        content_yaml plus optional BundleRegisterDataBlobV1 entries without computing bundle_hash, building catalog
        projection bytes, touching store/runtime writers, or sending server-local paths. It reuses canonical bundle input
        discovery for traversal, ignored file/dir, symlink, normalized-label, duplicate, and ASCII case-collision behavior,
        emits slash-relative NFC bundle paths in deterministic order, writes text inputs to content_yaml, and writes raw
        inputs under every discovered flow data directory to data_blob, including root flows/<flow>/data/...,
        package flows such as packages/<package>/flows/<flow>/data/..., and nested flow packages such as
        flows/<parent>/flows/<child>/data/.... Empty raw-data files are represented as empty base64 strings. The
        `--contracts` value is an explicit operator input: it MUST name either the selected contracts directory itself
        or that directory's `package.yaml` file shorthand, and MUST NOT fall back to a parent bundle when the supplied
        path is a typo/non-root child. It is distinct from `swarm bundle build` materialization. Archive packaging remains
        split until archive format and extraction safety rules are promoted.
    bundle_build_materialization:
      owner: internal/runtime/contracts.BuildBundleMaterialization
      status: implemented_wasm_and_python_slice_b
      cli_consumer: swarm bundle build [--contracts <contracts-directory>] [--output <output-root>] [--report json]
      rule: >
        The bundle build command materializes a local contracts root under <output>/<bundle-hash> (default
        .swarm/build/<bundle-hash>) for explicit consumption. It consumes BundleHash as the canonical identity owner,
        copies only bundle contract inputs and referenced module bytes/source needed to reconstruct that identity, writes
        build-manifest.json as a proof artifact, and emits a build report. It fails closed before runtime for invalid
        contract/module shape, missing module bytes/source, digest mismatch, stale declared source_hash, unsupported
        build-step requirements, invalid Python source/ABI/capability/runtime identity, reserved generated-artifact path
        collisions including case variants, output roots inside hashed recursive inputs, and materialized hash mismatch.
        Declared source_path files may be copied for Wasm source_hash freshness proof but are not BundleHash identity
        owners. Python source uses module path/digest as source authority. It MUST NOT call bundle.register, run test
        scenarios, touch store/runtime writers, archive bundles, produce Python snapshots, invoke external Python/Wizer/WASI
        SDK tooling, auto-build for test/register, or write generated bindings.
    modified_commands_planned:
      - swarm serve --bundle-hash <bundle_hash> [--bundle-hash <bundle_hash> ...] (implemented boot-pinned Postgres DB-loaded process mode)
      - swarm serve --dev
      - swarm agent list --run-id <run-id>
      - swarm event publish <event-name> --bundle-hash <bundle_hash>
      - swarm run start --bundle-hash <bundle_hash>
    run_fork:
      command: swarm run fork <source-run-id> [--bundle-hash <bundle_hash>] [--at-event <event-id>] [--idempotency-key <key>]
      public_status: implemented_public_command
      api_owner: /v1/rpc run.fork
      rules:
        - '`swarm run fork` is the public command for run.fork (CLI v2.2). The former top-level `swarm fork` spelling is retired fail-closed per cli_specification.retired_namespaces.topology_v2_2_retired_spellings.'
        - The bundle selector flag is --bundle-hash, not draft --bundle.
        - --at-event selects the fork event only and never means ambient current-run or current-event.
        - The CLI must not call internal runtime/store/fork harnesses directly.
        - Historical harness flags --dry-run, --materialize-only, --activate, and --contracts remain rejected unless a later source-authority PR promotes them.
  explicit_splits:
    schema_foundation:
      tracker: '#1013'
      implementation_status: live_schema_foundation_promoted
      reason: Live bundles table, runs.bundle_hash, runs.bundle_source, indexes, and no-FK migration are database/schema implementation.
    reader_migration:
      tracker: '#1014'
      reason: Production readers must migrate from bundle_fingerprint/null-collapse behavior to bundle_source availability semantics.
    bundle_ingest_and_run_stamping:
      tracker: '#1015'
      implementation_status: live_for_supported_postgres_serve_contracts
      runtime_owners:
        - internal/runtime/contracts.BuildBundleCatalogProjection
        - internal/store.PostgresStore.UpsertBundleCatalog
        - cmd/swarm.prepareServeBundleSource
        - internal/runtime/correlation.BundleSourceFact
      reason: serve --contracts / --dev ingest, canonical hashing, bundle row writes, and persisted/ephemeral run stamping are runtime boot implementation.
    startup_recovery_unavailable_bundle:
      tracker: '#1016'
      reason: Restart recovery for active persisted/ephemeral/deleted/legacy bundle-source runs is lifecycle implementation.
    bundle_api_catalog:
      tracker: '#1017'
      reason: bundle.list/get/agents/register method publication, store owners, OpenRPC artifacts, and handler tests are API implementation.
    bundle_delete_non_force:
      tracker: '#1018'
      implementation_status: implemented_api_store_runtime
      reason: Non-force bundle.delete active-run refusal and non-active deleted marking are implemented by the API handler and shared store transaction owner.
    bundle_delete_force:
      tracker: '#1019'
      implementation_status: implemented_destructive_runtime
      reason: Forced bundle.delete preservation cleanup, mutex, quiescence, delivery/session/timer/container cleanup, and result projection are destructive-runtime implementation.
    serve_db_loaded_bundle:
      tracker: '#1020'
      implementation_status: boot_pinned_postgres_context_process_promoted
      runtime_owners:
        - internal/store.PostgresStore.LoadBundleCatalogRuntimeRecord
        - internal/runtime/contracts.LoadBundleCatalogRuntimeSource
        - cmd/swarm.loadServeRuntimeBundleFromCatalog
        - cmd/swarm.prepareLoadedServeBundleSource
        - cmd/swarm.runtimeProjectSupervisor.DisableSourceReplacement
        - internal/runtime.RuntimeContextManager
        - internal/runtime.BundleContext
      reason: >
        swarm serve --bundle-hash DB-loaded YAML/data runtime boot mode is implemented for one or more canonical
        Postgres-backed bundle_hash values pinned at process boot. RuntimeContextManager owns loaded BundleContext
        dispatch for the boot-pinned surface. Dynamic post-boot Load/Unload remains split to #1176; same-bundle
        selected-contract fork source reuse consumes the persisted bundle catalog runtime source owner.
    bundle_safe_list_read_scoping:
      tracker: '#1021'
      reason: agent/event/run/log/incident read/list method scoping and generated OpenRPC shape are API read-model implementation.
    create_new_work_bundle_hash:
      tracker: '#1022'
      reason: event.publish/run.start create-new-work admission with required bundle_hash when run_id is absent is API/runtime routing implementation.
    cross_bundle_fork:
      tracker: '#976'
      implementation_status: implemented_for_boot_pinned_option_a_targets
      reason: Different target bundle_hash selected for run.fork consumes RuntimeContextManager loaded BundleContext ownership, persists selected-contract selection as mode=bundle_hash, recovers routes against that target hash, and fail-closes unloaded, unavailable, missing, deleted, or corrupt target bundle sources without Dynamic Load.
    db_loaded_same_bundle_source:
      tracker: '#1024'
      implementation_status: implemented_for_same_bundle_selected_contracts
      runtime_owners:
        - internal/store.PostgresStore.LoadRunBundleAvailability
        - internal/store.PostgresStore.LoadBundleCatalogRuntimeRecord
        - internal/runtime/contracts.LoadBundleCatalogRuntimeSource
        - internal/runtime/runforkexecution.BundleCatalogSelectedContractSourceLoader
      reason: Same-bundle fork from persisted DB bundle bytes uses a sibling source loader separate from disk-rooted selected_contracts execution.
    run_fork_cli_consumer:
      tracker: '#1023'
      implementation_status: implemented_by_1023_first_slice
      reason: swarm run fork consumes /v1/rpc run.fork only; same-bundle DB-loaded source loading is supported by #1024, and cross-bundle target selection for already loaded/boot-pinned BundleContexts is supported by #976.
    multi_bundle_cli_inventory:
      tracker: '#1023'
      implementation_status: inventory_prepared_envelope_directory_register_and_bundle_delete_implemented
      reason: swarm bundle list/show/agents consume /v1/rpc bundle.list/get/agents only, prepared-envelope swarm bundle register consumes /v1/rpc bundle.register only, swarm bundle register --contracts packages a local contracts directory through the non-hashing registration upload owner before calling /v1/rpc bundle.register, and swarm bundle delete consumes /v1/rpc bundle.delete only. Archive register packaging remains split until archive input and extraction safety authority lands.
    bundle_hash_dual_accept_migration:
      tracker: '#1001'
      reason: Old bundle_fingerprint/bundle_ref names must be reconciled in code and generated artifacts under the locked bundle_hash naming decision.
    runtime_context_isolation:
      tracker: '#981'
      implementation_status: boot_pinned_dispatch_and_unload_first_slices_implemented_parent_remains_open
      runtime_owners:
        - internal/runtime.RuntimeContextManager
        - internal/runtime.BundleContext
        - internal/apiv1.OperatorReadOptions.RuntimeContexts
      reason: Boot-pinned multi-context serve now routes supported runtime mutations through loaded BundleContext ownership, disables unscoped startup recovery/restore in multi-context processes, and marks loaded contexts unavailable/unloaded after authoritative bundle.delete/runtime.nuke include_bundles=true operations. Dynamic Load, scoped recovery filters, final matrix, ambient CLI context, cross-bundle fork, and cleanup siblings remain separately gated.
      dynamic_load_disposition: >
        #1209 records the current Dynamic Load source-authority decision: no post-readiness RuntimeContextManager Load,
        repair, or reload surface is supported. Bundle registration is catalog-only and does not make a BundleContext
        routable in the active process. Future Dynamic Load work must start from a new gated authority update rather than
        from RuntimeContextManager helper implementation alone.
    lifecycle_cleanup:
      trackers:
        - '#987'
        - '#988'
        - '#998'
        - '#1008'
        - '#1009'
      reason: Delete/restart/ephemeral-run cleanup must consume existing lifecycle owners rather than invent bundle-local shortcuts.
platform_events:
  description: Events emitted by the platform engine itself. These are NOT product events — they are operational signals from
    the engine or product-facing platform emissions whose schema is owned by the engine. Most operational signals use the
    platform.* namespace, but platform-emitted events are defined by this catalog rather than by namespace alone. Products MUST
    NOT define events with reserved prefixes or any event name owned by this catalog.
  namespace_reservation:
    reserved_prefixes:
    - platform.
    rule: Boot error if any of the following use a reserved prefix.
    violations:
    - Event names declared in product events.yaml
    - Event names in agent emit_events declarations
    - Event names in node handler emit sites
    - Event names in node produces lists
    - Event names in flow schema.yaml pins.outputs.events (platform.* events are produced by the engine, not by flows)
    not_violations:
    - Agent subscriptions to platform.* events (subscribing is allowed — products SHOULD subscribe to platform events)
    - Wildcard subscriptions that match platform.* events (e.g., platform.* subscription pattern)
    - Flow schema.yaml pins.inputs.events listing platform.* events (flows MAY declare them as inputs to receive routing)
    - Product subscriptions, handlers, or input pins that reference non-platform.* catalog-owned events such as mailbox.item_decided
  schema_authority_ref_syntax:
    description: >-
      platform_events.catalog entries use schema_authority refs to identify the parsed platform-spec.yaml owner for each
      payload schema. A schema_authority ref with prefix platform-spec.yaml# is parsed as explicit path syntax, not as prose.
      Dot segments select normal YAML mapping keys. Bracketed literal segments select an exact YAML mapping key and MUST be
      used when the key itself contains dots, such as platform event names.
    grammar:
      simple_segment: Normal YAML mapping key segment separated by dots, for example engine.error_model.dead_letter_schema.
      bracketed_literal_segment: '["literal.key"] selects the exact YAML mapping key literal.key without splitting on dots.'
      fail_closed: Invalid syntax, empty segments, unterminated brackets, unquoted bracket literals, and missing owners are
        parsed-invalid. Implementations and conformance tests MUST NOT recover by joining dot segments heuristically.
    examples:
      dotted_event_key: 'platform-spec.yaml#platform_events.catalog["platform.boot"].payload'
      simple_owner: platform-spec.yaml#engine.error_model.dead_letter_schema
  catalog:
    platform.dead_letter:
      description: Failed event after retry exhaustion or chain depth overflow.
      defined_in: engine.error_model.dead_letter_schema
      schema_authority: platform-spec.yaml#engine.error_model.dead_letter_schema
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/pipeline/coordinator.go#publish
        - internal/runtime/pipeline/node_system_runner.go
      routing_class: event_loop_routable
      note: Full payload schema defined in engine.error_model. Not duplicated here.
    platform.runtime_log:
      description: Diagnostic log record persisted as a global event.
      defined_in: platform_tables.diagnostics_encoding
      schema_authority: platform-spec.yaml#platform_tables.diagnostics_encoding
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/store/runtime_log_persistence.go
      routing_class: diagnostic_direct_persisted
      note: Full payload schema defined in platform_tables. Not duplicated here.
    platform.activity_requested:
      description: Internal durable request to execute a handler activity after the handler transaction commits.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.activity_requested"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/pipeline/activity_engine.go
      routing_class: platform_internal_event_loop
      runtime_handling: consumed_by_workflow_runtime
      scope: entity
      payload:
        activity_id: string
        tool: string
        input: object
        effect_class: string
        success_event: string
        failure_event: string
        retry_max_attempts: integer
        retry_backoff: string
        fork_policy: string
        entity_id: string
        node_id: string
        flow_id: string
        handler_event_key: string
        source_event_id: string
        source_run_id: string
        source_task_id: string
        parent_event_id: string
        chain_depth: integer
        attempt: integer
        loop_generation: object (optional; durable bounded-loop attempt identity)
        loop_stage: string (optional; source stage claimed with the attempt)
      produced_by_type: platform
    platform.agent_failed:
      description: Agent session failed after retry.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.agent_failed"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/manager/runtime.go
      routing_class: event_loop_routable
      scope: entity (if entity-scoped agent) or flow
      payload:
        agent_id: string
        flow_instance: string
        entity_id: string (nullable)
        failure: platform.failure/v1 envelope
        retry_count: integer
        last_event_type: string
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.agent_panic:
      description: Agent session panicked with unrecoverable error.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.agent_panic"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/manager/runtime.go
      routing_class: event_loop_routable
      scope: entity or flow
      payload:
        agent_id: string
        flow_instance: string
        entity_id: string (nullable)
        failure: platform.failure/v1 envelope
        stack_trace: string
        conversation_id: string (nullable)
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.event_quarantined:
      description: Poison event quarantined after repeated handler failures on different entities.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.event_quarantined"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/manager/runtime.go
      routing_class: event_loop_routable
      scope: global
      payload:
        event_name: string
        reason_code: string (repeated_agent_panic; operational disposition, not failure identity)
        panic_count: integer
        affected_entity_count: integer
        last_failure: platform.failure/v1 envelope
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.dead_letter_escalation:
      description: Dead letter volume or pattern crossed escalation threshold.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.dead_letter_escalation"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/manager/receipts.go
      routing_class: event_loop_routable
      scope: global
      payload:
        flow_instance: string
        dead_letter_count: integer
        window_minutes: integer
        sample_events: array
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.run_stalled:
      description: Runtime detected a running run that has crossed the stalled-run escalation threshold according to the canonical run diagnosis projection.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.run_stalled"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/runstalled/monitor.go
        - cmd/swarm/run_stalled_monitor.go
      routing_class: event_loop_routable
      scope: flow or global
      payload:
        run_id: uuid
        flow_instance: string
        operational_state: string
        blocking_layer: string
        blocking_reason: string
        last_progress_at: string (ISO 8601)
        threshold_seconds: integer
        stalled_for_seconds: integer
        emitted_at: string (ISO 8601)
      required:
      - run_id
      - operational_state
      - blocking_layer
      - blocking_reason
      - last_progress_at
      - threshold_seconds
      - stalled_for_seconds
      - emitted_at
      produced_by_type: platform
    platform.reset:
      description: Admin-initiated platform state reset. Emitted ONLY when a human administrator explicitly triggers a reset
        via the internal admin reset source. Builder/dashboard reset_state is retired and MUST NOT emit this event. NOT
        emitted on crash recovery or automatic recovery fallback — those use platform.recovery_failed if they fail, or normal
        boot if they succeed.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.reset"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/manager/runtime.go#ResetRuntimeState
      routing_class: event_loop_routable
      scope: global
      trigger: Explicit internal admin action only. The runtime calls ResetRuntimeState() and emits this event after the reset
        completes.
        Product nodes may subscribe to this event to clear their own state (e.g., accumulator state, cycle counters).
      payload:
        source: string — who initiated the reset (admin_cli)
        timestamp: string (ISO 8601)
      produced_by_type: platform
      swarm:
        source: external (platform admin CLI)
    platform.auth_required:
      description: Agent or tool call blocked pending authorization.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.auth_required"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/manager/receipts.go
      routing_class: event_loop_routable
      scope: flow
      payload:
        agent_id: string
        entity_id: string
        flow_instance: string
        tool_name: string (nullable)
        action: string
        failure: platform.failure/v1 envelope
        timestamp: string (ISO 8601)
      required:
      - agent_id
      - entity_id
      - flow_instance
      - tool_name
      - action
      - failure
      - timestamp
      produced_by_type: platform
    platform.budget_threshold_crossed:
      description: LLM spend crossed a configured threshold. The platform monitors spend_ledger against policy-defined thresholds
        and emits this event when a boundary is crossed. One event with a level field — no separate events per level.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.budget_threshold_crossed"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/budget.go
      routing_class: event_loop_routable
      scope: global
      payload:
        level: string (warning | throttle | emergency | ok)
        current_spend: number (total spend in USD for the current period)
        budget_cap: number (configured budget cap in USD)
        percentage: number (current_spend / budget_cap * 100)
        period: string (budget period identifier)
        timestamp: string (ISO 8601)
      produced_by_type: platform
      threshold_source: policy.yaml keys budget_warning_percent, budget_throttle_percent, budget_emergency_percent. The platform
        reads these at boot. If not present, budget monitoring is disabled.
      level_semantics:
        warning: Spend crossed warning threshold. Informational. No automatic action.
        throttle: Spend crossed throttle threshold. Platform may reduce agent concurrency or defer non-critical work.
        emergency: Spend crossed emergency threshold. Platform pauses all agent sessions until human intervention.
        ok: Spend dropped below warning threshold (after a period boundary reset or budget increase). Resume normal operations.
    platform.paused:
      description: Runtime ingress entered paused state. Queueable event-producing ingress is accepted into canonical event
        persistence but is not dispatched until platform.resumed/runtime.resume. Non-queueable synchronous request/response ingress
        such as MCP/tool execution is rejected fail-closed while paused. In-flight events already dispatched complete their handler
        execution and commit. Agent sessions in progress complete their current turn; new agent invocations for queued work are
        deferred until resume.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.paused"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/ingress/controller.go
      routing_class: event_loop_routable
      scope: global
      payload:
        reason: string
        paused_by: string
        last_failure: platform.failure/v1 envelope (nullable; present for safety-triggered pauses and absent for operator control pauses)
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.resumed:
      description: Runtime ingress left paused state. Queued event-producing ingress is eligible for normal EventBus dispatch
        exactly once through the canonical delivery/idempotency owners. Synchronous request/response ingress may execute again
        after resume.
      schema_authority: 'platform-spec.yaml#platform_events.catalog["platform.resumed"].payload'
      producer_evidence:
        produced_by_type: platform
        locations:
        - internal/runtime/ingress/controller.go
      routing_class: event_loop_routable
      scope: global
      payload:
        reason: string
        resumed_by: string
        timestamp: string (ISO 8601)
      produced_by_type: platform
    platform.agent_directive:
      description: Operator-issued directive accepted by the runtime for an agent. This is the authoritative persisted root
        event for directive-started or directive-targeted work; BoardStep and all child emissions inherit this event's run_id
        and source_event_id. It is reserved atomically with one agent_directive_operations row before agent execution and is
        not defined by the legacy board.directive helper. Event existence proves reservation only; it never proves BoardStep
