    conversation.current_for_agent:
      tier: should_have
      description: "Read the agent's current (most-recent active) session. Replaces the\nownership-violating agent.get_session\
        \ that earlier drafts proposed \u2014\nagent.* doesn't own sessions; conversation.* does.\n"
      scope:
        required:
        - read:conversations
      params:
      - name: agent_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      result:
        name: result
        required: true
        description: Returns null if the agent has no active session.
        schema:
          oneOf:
          - $ref: '#/components/schemas/ConversationDetail'
          - type: 'null'
      errors:
      - AGENT_NOT_FOUND
    conversation.fork:
      tier: should_have
      description: |
        Create a forkchat lifecycle session from an existing conversation source
        session and a validated fork point. This first slice is lifecycle-only:
        it persists source session/run/agent lineage, fork point descriptor,
        creator token, fixed 24-hour TTL, and deletion state. It does not
        execute a forked LLM turn, return entity snapshots, expose inherited
        transcript counts, or write into normal conversation/event/log surfaces.
      scope:
        required:
        - write:conversations
        - read:conversations
      idempotency: per the convention.
      params:
      - name: source_session_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: fork_point
        required: true
        schema:
          $ref: '#/components/schemas/ConversationForkPointSelector'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/ConversationForkCreateResult'
      errors:
      - SESSION_NOT_FOUND
      - TURN_NOT_FOUND
      - EVENT_NOT_FOUND
      - IDEMPOTENCY_CONFLICT
    conversation.fork_list:
      tier: should_have
      description: List active forkchat lifecycle sessions from the isolated conversation_forks owner.
      scope:
        required:
        - read:conversations
      params:
      - name: source_session_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
      - name: cursor
        required: false
        schema:
          $ref: '#/components/schemas/Cursor'
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - forks
          properties:
            forks:
              type: array
              items:
                $ref: '#/components/schemas/ConversationForkSession'
            next_cursor:
              $ref: '#/components/schemas/Cursor'
      errors: []
    conversation.fork_view:
      tier: should_have
      description: Read one forkchat lifecycle session header/state and fork-local transcript turns owned by conversation_fork_turns.
      scope:
        required:
        - read:conversations
      params:
      - name: fork_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/ConversationForkSession'
      errors:
      - FORK_NOT_FOUND
    conversation.fork_chat:
      tier: should_have
      description: |
        Execute one sandboxed forkchat turn against an active fork lifecycle session.
        The method consumes conversation_forks for lifecycle validation,
        conversation_fork_snapshots for source-at-fork context, and
        conversation_fork_turns for fork-local transcript persistence. It does
        execute the source agent through the forkchat sandbox executor, provides
        fork-snapshot read tools, and records only sandbox-observed requested
        side-effecting tools as stubbed fork-local results under
        ConversationForkSandboxPolicy. It does not write agent_turns, events,
        runtime logs, mailbox rows, run commands, or dashboard conversation rows
        by default.
      scope:
        required:
        - write:conversations
        - read:conversations
      idempotency: per the convention.
      params:
      - name: fork_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: message
        required: true
        schema:
          type: string
          minLength: 1
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/ConversationForkChatResult'
      errors:
      - FORK_NOT_FOUND
      - IDEMPOTENCY_CONFLICT
    conversation.fork_delete:
      tier: should_have
      description: Soft-delete one forkchat lifecycle session from the isolated conversation_forks owner.
      scope:
        required:
        - write:conversations
      idempotency: per the convention.
      params:
      - name: fork_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/ConversationForkDeleteResult'
      errors:
      - FORK_NOT_FOUND
      - IDEMPOTENCY_CONFLICT
    runtime.logs:
      tier: should_have
      description: Filtered structured runtime log query. The optional bundle_hash filter is a canonical persisted
        run-bundle selector over runs.bundle_hash and composes with run_id and other filters as AND.
      scope:
        required:
        - read:runtime
      params:
      - name: bundle_hash
        required: false
        description: Optional canonical bundle selector over runs.bundle_hash. Must be bundle-v1:sha256:<64 lowercase hex>.
        schema:
          $ref: '#/components/schemas/BundleHash'
      - name: run_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: entity_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: session_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: component
        required: false
        schema:
          type: string
      - name: level
        required: false
        schema:
          $ref: '#/components/schemas/LogLevel'
      - name: error_code
        required: false
        schema:
          type: string
      - name: source
        required: false
        schema:
          type: string
      - name: since
        required: false
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: until
        required: false
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
      - name: cursor
        required: false
        schema:
          $ref: '#/components/schemas/Cursor'
      - name: order
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - logs
          properties:
            logs:
              type: array
              items:
                $ref: '#/components/schemas/LogEntry'
            next_cursor:
              $ref: '#/components/schemas/Cursor'
      errors: []
    runtime.subscribe_logs:
      tier: should_have
      description: "Live structured runtime log stream for `runtime.logs` follow mode.\nNotifications carry one `LogEntry`\
        \ row from the same persisted runtime log read owner used by `runtime.logs`.\nThe method accepts the same runtime-log\
        \ identity/content filter fields as `runtime.logs`, but snapshot pagination, sort, and fixed-window controls (`limit`,\
        \ `cursor`, `order`, `since`, `until`) are not accepted on the subscription. Use `replay_since` for catch-up.\n"
      scope:
        required:
        - read:runtime
      params:
      - name: bundle_hash
        required: false
        description: Optional canonical bundle selector over runs.bundle_hash. Must be bundle-v1:sha256:<64 lowercase hex>.
        schema:
          $ref: '#/components/schemas/BundleHash'
      - name: run_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: entity_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: session_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: component
        required: false
        schema:
          type: string
      - name: level
        required: false
        schema:
          $ref: '#/components/schemas/LogLevel'
      - name: error_code
        required: false
        schema:
          type: string
      - name: source
        required: false
        schema:
          type: string
      - name: replay_since
        required: false
        description: Optional catch-up window. If present, delivers runtime log entries from this time forward, then continues
          live. Subject to runtime log retention.
        schema:
          $ref: '#/components/schemas/Timestamp'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/SubscriptionId'
      notification_schema:
        $ref: '#/components/schemas/LogEntry'
      notification_cadence: Pushed per runtime log entry matching the filter.
      errors: []
    runtime.incidents:
      tier: should_have
      description: Aggregated runtime incidents (errors and warnings grouped by error_code/component for triage). The optional
        bundle_hash filter is applied to source runtime-log rows before aggregation.
      scope:
        required:
        - read:runtime
      params:
      - name: bundle_hash
        required: false
        description: Optional canonical bundle selector over runs.bundle_hash. Must be bundle-v1:sha256:<64 lowercase hex>.
        schema:
          $ref: '#/components/schemas/BundleHash'
      - name: since_hours
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 720
          default: 24
      - name: component
        required: false
        schema:
          type: string
      - name: level
        required: false
        schema:
          $ref: '#/components/schemas/LogLevel'
      - name: mcp_only
        required: false
        schema:
          type: boolean
      - name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
      - name: cursor
        required: false
        schema:
          $ref: '#/components/schemas/Cursor'
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - incidents
          properties:
            incidents:
              type: array
              items:
                $ref: '#/components/schemas/Incident'
            next_cursor:
              $ref: '#/components/schemas/Cursor'
      errors: []
    runtime.pause:
      tier: should_have
      description: Pause runtime ingress. Queueable event-producing ingress is persisted but not dispatched until runtime.resume;
        synchronous MCP/tool request-response ingress fails closed while paused. In-flight handlers complete.
      scope:
        required:
        - control:runtime
      idempotency: per the convention.
      params:
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/OkResult'
      errors:
      - RUNTIME_ALREADY_PAUSED
      - IDEMPOTENCY_CONFLICT
    runtime.resume:
      tier: should_have
      description: Resume runtime ingress. Queued event-producing ingress becomes eligible for normal EventBus dispatch exactly
        once through canonical delivery/idempotency owners.
      scope:
        required:
        - control:runtime
      idempotency: per the convention.
      params:
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/OkResult'
      errors:
      - RUNTIME_NOT_PAUSED
      - IDEMPOTENCY_CONFLICT
    runtime.nuke:
      tier: should_have
      description: "Public destructive runtime reset wrapper. The API layer owns only the v1 request/response/auth/idempotency\
        \ contract and MUST consume the destructive-reset owner chain for execution: plan/result/lock, active-run and delivery\
        \ quiescence, run-scoped cleanup/preservation, and managed entity-container selection/stop. It MUST NOT directly\
        \ truncate tables, call raw Docker stop/list helpers, call AgentManager.ResetRuntimeStateWithSource, or migrate dashboard/Builder/CLI\
        \ reset seams in this method implementation.\n\n`dry_run=true` returns the same top-level shape with side-effect-free\
        \ previews from each owner. Apply mode sequences plan -> quiescence -> cleanup -> managed-container stop. Managed-container\
        \ stop failures are represented as `status=partial_failure`, `ok=false`, and explicit `errors`; they must not masquerade\
        \ as complete success. `include_bundles` defaults true and is the only runtime.nuke control for whether server-wide\
        \ bundle catalog state is deleted with the cleanup owner; false preserves bundle catalog rows. In DB-loaded RuntimeContextManager\
        \ mode, successful or partial apply-mode runtime.nuke requests with `include_bundles=true` also mark loaded BundleContext\
        \ entries unavailable/unloaded so later supported admissions fail closed with BUNDLE_UNAVAILABLE; `include_bundles=false`\
        \ must not deactivate loaded contexts. Public final-response idempotency follows the v1 API idempotency convention.\n"
      scope:
        required:
        - control:runtime
      idempotency: per the convention.
      params:
      - name: dry_run
        required: false
        schema:
          type: boolean
          default: false
      - name: include_bundles
        required: false
        schema:
          type: boolean
          default: true
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/RuntimeNukeResult'
      errors:
      - RUNTIME_NUKE_IN_PROGRESS
      - IDEMPOTENCY_CONFLICT
  deferred_namespaces:
    description: 'Explicitly out of v1 scope. Listed here so consumers know to expect them

      in a follow-on slice. Do NOT implement these methods in v1; do NOT

      reserve their names in code unless the implementer is also drafting

      the follow-on slice.

      '
    debug:
      methods:
      - debug.add_breakpoint
      - debug.remove_breakpoint
      - debug.list_breakpoints
      - debug.run_step
      - debug.run_inject
      - debug.run_skip
      - debug.run_retry
      - debug.fire_timer
      - debug.cancel_timer
      rationale: Developer/debug controls, not production operator surface. If they entered v1, the permission and safety
        semantics would dominate Layer 3 conventions. Defer until there is a real consumer driving the design.
    dead_letter:
      methods:
      - dead_letter.replay
      - dead_letter.quarantine
      - dead_letter.assign
      - dead_letter.resolve
      rationale: For v1, dead-letter inspection folds into event.list via filters. Break out as its own namespace only when
        dead-letter workflow gains actions beyond inspection.
    timer:
      methods:
      - timer.list
      - timer.get
      rationale: Read-only timer introspection. Useful for admin debugging; not load-bearing for v1 operator workflow.
    contract:
      methods:
      - contract.list_flows
      - contract.list_agents
      - contract.list_events
      - contract.get_node
      rationale: Runtime introspection of loaded contracts. verify.full covers static validation; runtime introspection becomes
        useful when there is a contract-editing UI (Phase 3).
    credentials:
      methods:
      - credentials.list
      - credentials.set
      - credentials.delete
      - credentials.test
      rationale: Existing Builder API methods kept as-is in their current location. Re-spec under v1 in a follow-on if a unified
        credentials story is needed.
    runtime_admin:
      methods:
      - runtime.reset_state
      rationale: Legacy reset_state naming remains deferred/retired. Public destructive reset is exposed as runtime.nuke,
        backed by the destructive-reset owner chain. Dashboard/Builder reset_state plumbing is retired/fail-closed rather
        than migrated as a legacy API; any future privileged admin reset namespace requires a separate spec-gated child.
    bundle_lifecycle:
      methods:
      - bundle.open
      - bundle.reload
      - bundle.close
      rationale: >
        Legacy dynamic bundle.open/reload/close remains deferred and is not the multi-bundle public API. #1012 promotes the
        authoritative multi-bundle source model under multi_bundle_persistence, with planned bundle.list/get/agents/register/delete,
        run.fork, and bundle_hash create-new-work semantics. The read-only bundle.list/get/agents catalog methods and
        non-destructive bundle.register, run.fork, and destructive bundle.delete are now published in method_catalog/OpenRPC
        with handlers. Existing bundle_ref/bundle_fingerprint
        language is migration evidence only after the #1001 bundle_hash decision.
    verify:
      methods:
      - verify.full
      - verify.upload
      rationale: "verify.full as originally drafted took server-local contracts_path\nand platform_spec parameters. That is\
        \ not safely callable from\nexternal Phase-2 consumers \u2014 they cannot meaningfully reference\nlocal filesystem\
        \ paths on the server. v1 keeps verification\nCLI-local: `swarm verify` operates directly on contract files on\ndisk\
        \ (the one carve-out from the cli_consumption_rule). A\ncontent-based verify.upload (takes the bundle contents inline)\n\
        is the right Phase-2 API shape and is deferred until that consumer\nis real. No verify.* method is implemented in\
        \ v1 over JSON-RPC.\n"
    runtime_identity:
      methods: []
      rationale: >
        runtime.identity is promoted in v1 as the canonical runtime-instance descriptor trust owner by #1613.
        Future non-sensitive identity dimensions may extend RuntimeIdentityResult additively.
  migration:
    description: How the previous dual-API surface is retired in favor of v1.
    builder_api_disposition:
      transport: "JSON-RPC at /rpc and /api/rpc, plus Builder WebSocket at /ws and /api/ws, are retired operator-facing\
        \ compatibility surfaces. They MUST NOT remain reachable in production; v1 /v1/rpc and /v1/ws are the only user-facing\
        \ operator API transports."
      methods:
      - "project.open / project.reload / project.close \u2192 retired with the legacy Builder transport. A future bundle_lifecycle\
        \ namespace requires a new product owner and spec."
      - "run.start / run.stop / run.pause / run.continue \u2192 renamed to v1 run.* methods (same semantics, new request envelope\
        \ under /v1/rpc, canonical bundle_hash input with legacy bundle_ref transition alias)."
      - "run.step / run.retry / run.skip \u2192 retired with the legacy Builder transport. A future debug.* namespace requires\
        \ a new product owner and spec."
      - "state.list_instances \u2192 entity.list (consolidated with /api/instances)."
      - "state.get_entity \u2192 entity.get (consolidated with /api/instances/{id})."
      - "credentials.list / set / delete \u2192 retired with the legacy Builder transport. A future credentials.* namespace\
        \ requires a new product owner and spec."
      - "validate.full \u2192 DEPRECATED. No JSON-RPC equivalent in v1; verify.* namespace is deferred (see deferred_namespaces.verify).\
        \ Use `swarm verify` CLI for static contract validation in v1."
      - "[PROPOSED] methods that were never implemented \u2192 either v1 method on the equivalent namespace, deferred namespace,\
        \ or removed from spec entirely. None remain as [PROPOSED] in v1."
    operator_api_disposition:
      transport: "REST at /api/* is retired as an operator-facing compatibility surface. It MUST NOT remain reachable in\
        \ production; consumers use /v1/rpc or /v1/ws."
      methods:
      - "GET /api/health \u2192 health.check"
      - "GET /api/agents \u2192 agent.list"
      - "GET /api/agents/{id} \u2192 agent.get"
      - "POST /api/agents/{id}/actions/directive \u2192 agent.send_directive"
      - "POST /api/agents/{id}/actions/restart \u2192 agent.restart"
      - "POST /api/agents/{id}/actions/replay \u2192 agent.replay_backlog"
      - "GET /api/conversations \u2192 conversation.list"
      - "GET /api/conversations/{sessionID} \u2192 conversation.get"
      - "GET /api/events \u2192 event.list"
      - "GET /api/events/{id} \u2192 event.get"
      - "GET /api/events/flow \u2192 event.subscribe"
      - "GET /api/mailbox \u2192 mailbox.list"
      - "GET /api/mailbox/{id} \u2192 mailbox.get"
      - "(NEW) \u2192 mailbox.approve / mailbox.reject / mailbox.defer"
      - "GET /api/instances \u2192 entity.list"
      - "GET /api/instances/{id} \u2192 entity.get"
      - "GET /api/instances/aggregate \u2192 entity.aggregate"
      - "GET /api/runtime/logs \u2192 runtime.logs"
      - "GET /api/runtime/incidents \u2192 runtime.incidents"
      - "POST /api/runtime/actions {pause/resume} \u2192 runtime.pause / runtime.resume"
      - "POST /api/runtime/actions {reset_state} \u2192 retired/fail-closed; future dashboard consumers must call runtime.nuke
        directly and the legacy reset_state name remains deferred/retired."
      - "GET /api/runs/{runID}/trace \u2192 run.trace (also adds run.subscribe_trace as the live variant)"
    auth_token_disposition:
      v1_model: >
        User-facing API bearer-token sources are governed by
        cli_specification.foundations.api_connection_auth_config_precedence. Client-side `SWARM_API_TOKEN` is not
        a valid API bearer-token source after #1636; server-side `swarm serve` API auth sourcing remains tracked by #1647.
        `SWARM_BUILDER_AUTH_TOKEN` and `SWARM_OPERATOR_AUTH_TOKEN` are retired and MUST NOT authorize /v1/rpc
        or /v1/ws.
      auth_boundary_bug_fix: "The current bug where /api/rpc and /api/ws bypass operator auth is moot under v1 \u2014 one\
        \ auth surface, one token."
    cli_consumer_migration:
      private_makefile_helper_retired: >
        The former private Makefile/script runtime helper is not a supported
        public surface. Public consumers use `swarm serve` for runtime startup,
        `swarm run start` for run creation, `swarm health` for readiness/identity,
        `swarm agent directive` for directive delivery, and `swarm control
        nuke` for destructive reset through `/v1/rpc runtime.nuke`. No
        compatibility wrapper or alternate helper owner remains for those
        behaviors.
      cli_v2_read_commands: "Promoted CLI v2 read commands map to v1 methods (v2.2 spellings):\n  swarm run list     \u2192 run.list\n  swarm\
        \ run status   \u2192 run.diagnose (default), run.get for header-only mode if exposed\n  swarm run trace    \u2192 run.trace,\
        \ run.subscribe_trace (--follow)\n  swarm health   \u2192 health.check\nRetired `swarm investigate *` commands are\
        \ legacy consumers only. They are not authoritative CLI v2 topology and must either migrate to the promoted commands\
        \ or fail closed when the legacy namespace is removed.\n"
      dashboard: "When a dashboard ships, it consumes v1 \u2014 no direct DB or internal-package access."
  out_of_scope_for_v1:
    multi_tenancy: No org_id, tenant_id, workspace_id in v1. URL paths reserved for tenant prefix in Phase 3 without breaking
      v1 URL shape.
    rate_limiting: No rate limiting in v1. Phase 2/3 may add per-token quotas (returns RATE_LIMITED error).
    sla_contracts: No latency/availability SLA in v1.
    openrpc_schema_publication: The spec emits a parallel openrpc.json. Publication on a public docs site is a Phase 2 concern.
    streaming_durability: Subscriptions are best-effort within their connection lifetime; no durable replay-from-disconnect.
    bulk_mutation: No batch endpoints in v1.
    websocket_authentication_refresh: Tokens validated at WebSocket upgrade; not re-validated for connection lifetime. Token
      rotation requires reconnect.
  closure_proof_requirements:
    spec:
    - platform-spec.yaml contains api_specification as the canonical method-catalog source.
    - openrpc.json is generated from api_specification and implementation registration as the public API artifact.
    - Retired Builder API markdown evidence is private/historical context and is not a public source artifact.
    - 'CHANGELOG entry references Empire #57 (mailbox approval API gap closed) and the dual-API consolidation.'
    runtime:
    - /v1/rpc HTTP endpoint and /v1/ws WebSocket endpoint exist as the only user-facing operator API transports. Legacy /api/*,
      /rpc, /api/rpc, /ws, and /api/ws endpoints are not reachable in production.
    - Every must_have method in the catalog is implemented and reachable via /v1/rpc with the documented params, returns,
      scopes, and errors.
    - "Idempotency replay-store implementation: (method, actor, idempotency_key) \u2192 response; 24h TTL; IDEMPOTENCY_CONFLICT\
      \ response on body mismatch."
    - run.stop is must-have because promoted CLI v2 `swarm run start` foreground modes require Ctrl-C cancellation after run creation.
    - run.subscribe_trace is must-have because promoted CLI v2 `swarm run start` foreground follow and `swarm run trace --follow` depend
      on it. Remaining subscription methods are sequenced by their own slices, but every subscription wire format must match
      the geth-style rpc.subscription shape.
    - health.check returns the BundleIdentity block including fingerprint.
    - mailbox.approve / reject / defer mutate the mailbox table and emit downstream events as configured.
    - run.diagnose exposes the existing operator-state projection from internal/store/run_operational_status_read_surface.go.ProjectRunOperationalStatus
      over the JSON-RPC API, returning operational_state + blocking_layer + blocking_reason + heuristics. The projection itself
      is the canonical owner and is unchanged; this proof confirms the API surface routes through it (no second interpretation
      layer in the API handler).
    - platform.run_stalled is emitted by the serve runtime only after policy.runtime.stalled_run_escalation consumes
      ProjectRunOperationalStatus plus the latest non-platform.run_stalled run event timestamp. The default policy is
      enabled with threshold_seconds=300, and the producer dedupes by (run_id, blocking_layer, blocking_reason,
      last_progress_at). The self-emitted platform.run_stalled alert is not progress evidence. Mailbox item creation,
      incident records, dashboard alert UI, and CLI alert rendering are not owned by this slice.
    cli:
    - '`swarm run list`, `swarm run status`, `swarm run trace`, and `swarm health` consume /v1/rpc or /v1/ws methods, with no direct internal-package
      access (except the `swarm verify` carve-out). Retired `swarm investigate *` commands are non-authoritative legacy consumers.'
    - Private Makefile/script runtime helpers are retired; public CLI reset, run, health, and directive consumers use the promoted v1 API owners directly.
    deprecation:
    - 'Legacy /rpc, /api/rpc, /ws, /api/ws, and dashboard /api/* endpoints are removed or fail closed. They are not aliases.'
    - SWARM_BUILDER_AUTH_TOKEN and SWARM_OPERATOR_AUTH_TOKEN are not accepted as API auth fallbacks. Runtime-state clients must use a token source governed by cli_specification.foundations.api_connection_auth_config_precedence.
    openrpc_artifact:
    - A generator (verify-pipeline tool) reads this YAML and emits openrpc.json from method_catalog + components. Drift between
      the two is hard_invalidity at boot verify.
    - 'Generator wraps the method catalog in OpenRPC envelope: {openrpc: "1.2.6", info: {title, version, description}, servers:
      [{url: "<host>/v1/rpc"}], methods: [...], components: {schemas, errors, contentDescriptors}}.'
    - Every component schema in this YAML maps 1:1 to a component in the generated openrpc.json.
    - Every method in method_catalog maps to one OpenRPC method object with params (array of contentDescriptors), result (contentDescriptor),
      errors (array of error objects derived from components.errors with unique numeric OpenRPC codes and canonical data.code
      string discriminators).

agent_lifecycle_authority:
  owner: typed AgentManager lifecycle coordinator plus the selected SQLite/Postgres store
  durable_cell:
    table: agents
    fields: [lifecycle_phase, lifecycle_generation, lifecycle_runtime_epoch, lifecycle_config_revision, lifecycle_run_mode, lifecycle_last_transition_id]
    rule: The agents row is the sole durable lifecycle cell. Process memory is a fenced projection and never an independent authority.
  lifecycle_token:
    fields: [runtime_epoch, agent_id, generation]
    rule: Every managed agent execution context carries exactly one token. Missing or superseded authority fails before external launch.
  transitions:
    operations: [spawn, hydrate, materialize, start, restart, reconfigure, teardown, self_release, shutdown, reset]
    serialization: All creators, replacers, destroyers, and self-release paths serialize through one per-agent coordinator decision point.
    ordering:
      - Validate and build candidate state before transition admission.
      - Commit the lifecycle cell, immutable transition fact, durable operation outcome, and diagnostic outbox atomically.
      - Fence the predecessor generation before cancellation and await its generation-aware release before starting a successor loop.
      - Persistence failure leaves the prior process-local owner unchanged and cannot be acknowledged as success.
    replay: Repeating one operation_id returns its stored outcome and never cancels, restarts, rotates, or advances generation again.
    generation: A new create/replace/destroy transition advances exactly one generation; self-release conditionally changes phase without advancing generation.
  public_restart:
    idempotency: A supplied API idempotency key derives a stable lifecycle operation_id. API completion failure is repaired by replaying the stored lifecycle outcome without repeating restart.
    diagnostic: Success requires durable transition outcome and durable outbox enqueue; immediate projection is non-authoritative.
  reconfigure:
    operation_identity: Derived from agent id and candidate config revision.
    session_rotation: Rotation consumes the same operation identity and is idempotent, so persistence retry never rotates twice.
  recovery:
    rule: Recovery hydrates only durable non-terminal cells and projects pending diagnostic outbox rows through the runtime log owner before marking them projected; projection failure leaves the row pending and never repeats the lifecycle transition.
  forbidden:
    - direct lifecycle map writes outside the coordinator
    - memory-only fallback for a selected persistent runtime store
    - best-effort lifecycle persistence or diagnostic ownership
    - tolerant dual lifecycle readers or compatibility aliases

managed_external_effect_authority:
  owner: agent_external_effect_operations and agent_external_effect_attempts in the selected store
  registration:
    required_fields: [effect_kind, effect_class, adapter, transport, launch_site, primitive_keys, launch_observed, prelaunch_failure, postlaunch_failure, outcome_mapping, canonical_evidence, settlement_recovery, proof]
    rule: Registration is incomplete unless every field is concrete and the source-derived primitive contract binds every actual launch/write boundary to its adapter, Begin admission, pre-primitive launched marker, outcome table, and named execution proof.
  context_authority:
    managed_agent: Every adapter invocation requires the lifecycle token, selected-store controller, and typed logical-operation identity. Missing context fails closed before authorization.
    gateway_reentry: Turn-context registration and gateway reconstruction preserve lifecycle token, controller, the full explicit logical identity, inbound identity, and lineage. Managed Claude CLI MCP tools/call requests MUST carry the provider-owned non-empty params._meta["claudecode/toolUseId"] call-occurrence coordinate. The gateway refines the preserved provider-turn identity with that coordinate and fails closed before executor admission when it is absent. JSON-RPC id, progressToken, method, tool name, arguments, and other request content are correlation or fingerprint evidence, never occurrence identity; identical sibling calls remain distinct while replay of one provider call remains stable across transport-correlation replacement.
    different_owner: Runtime dependency, pipeline activity, credential lifecycle, operator infrastructure, and build/test infrastructure calls use a closed typed different-owner context. Unknown owner labels and missing lifecycle context fail closed.
  logical_operation:
    identity: A deterministic operation_id is derived from agent, typed inbound/explicit logical identity, deterministic provider-turn or provider-owned tool-call occurrence coordinate, adapter, and declared lineage. Sibling turns/calls under one inbound event are distinct while replay of the same child is stable. Runtime epoch and generation are deliberately excluded so the same logical work cannot redispatch after restart; they remain fenced evidence on the original operation/attempt. Request bytes are excluded from identity and stored as a separate fingerprint.
    replay: Authorization loads the existing operation and latest attempt under the same operation_id. Exact replay is refused without dispatch; launched, response-observed, settled, or uncertain replay never dispatches; changed request or registration fields return a fingerprint conflict.
    attempts: One actual attempt is authorized for each logical operation except Claude CLI may allocate the next ordinal after the preceding attempt has exact durable zero-process-launch proof. The attempt ID is deterministically derived from operation_id and ordinal. No other adapter creates a second attempt or operation during replay.
  effect_classes:
    read_only: The platform contract proves the operation cannot mutate business, workspace, or provider state.
    write_or_unknown: The operation may mutate state or lacks authoritative no-effect proof.
  launch:
    rule: Authorization atomically compares the lifecycle token with the durable agents cell and creates the attempt. At launch, the selected-store transaction locks and revalidates the same lifecycle cell against the attempt token before atomically marking the operation and attempt launched. The durable launched marker must commit before HTTP dispatch, process start, MCP stdio write, or any filesystem mutation, including parent-directory creation, temporary-file creation/cleanup, file write/sync/chmod, and replacement.
    rejection: If the primitive subsequently rejects launch with exact zero-effect proof, the already-marked attempt settles terminal_failure with launch_rejected evidence. Marker failure performs zero launch or mutation.
    stale: platform.superseded_generation with zero launch or mutation.
  settlement:
    success: Correlated known success settles the same attempt exactly once with immutable evidence.
    prelaunch_failure: Every failure before cmd.Start, including target resolution, admission, command construction, pipe setup,
      monitor setup, and exact cmd.Start rejection, settles the authorized attempt terminal_failure with canonical evidence.
      Claude CLI may admit a later ordinal only when the canonical returned failure disposition is retry and the delivery retry
      budget permits another invocation.
    postlaunch_read_only_failure: Terminal connector failure with no automatic retry.
    postlaunch_write_or_unknown_failure: Every error after cmd.Start succeeds, including provider exit, response validation,
      mutable projection, and atomic provider-head settlement failure, settles the attempt platform.outcome_uncertain with
      adapter-specific evidence while preserving the original failure as the returned classification; automatic redispatch is forbidden.
    mutable_projection: Successor-facing session, conversation, watchdog, and rotation projection is generation-predicated; old-generation turn, task-audit, spend, and effect evidence remains immutable.
  recovery:
    authorized: An authorized attempt has proven no primitive launch because the exact primitive contract requires durable launched state before every dispatch/start/write/mutation; startup settles it as effect_recovery_prelaunch_abandoned without dispatch.
    launched_or_response_observed: Startup settles the existing attempt and operation as platform.outcome_uncertain/effect_recovery_outcome_unconfirmed without dispatch.
    terminal: Existing settled, terminal_failure, and outcome_uncertain attempts are unchanged.
  automatic_redispatch_allowlist:
    - adapter: claude_cli
      condition: preceding attempt is terminal_failure with no launched_at, or carries exact launch_rejected=true evidence after cmd.Start rejection
      exclusion: cmd.Start success, launched/response_observed/outcome_uncertain/settled state, provider exit classification, and inferred gateway/native/customization inactivity never authorize another attempt
  adapters:
    provider: [anthropic_api, openai_compatible, openai_responses, claude_cli]
    tool: [authored_http_tool, managed_credential, native_web_search]
    mcp: [mcp_tools_call_http, mcp_tools_call_stdio]
    native: [native_bash, native_read_file, native_write_file]
    relay: [tool_result_relay, claude_tool_result_relay]
  forbidden:
    - provider or authored HTTP automatic retries except the exact Claude CLI zero-process-launch transition above
    - managed-credential 401 refresh followed by target redispatch
    - effect classification derived from HTTP status, JSON-RPC correlation, exit code, or provider self-description
    - post-mutation native file failure reported as a proven terminal no-effect outcome
    - recovery redispatch of an authorized, launched, response-observed, or uncertain attempt
    - nil-handle or missing-token no-op admission
    - random logical operation or attempt identity on retry
    - launch transition without current lifecycle-token revalidation
    - MCP logical child identity derived from replaceable JSON-RPC correlation ID
    - MCP logical child identity derived from request content or progress correlation instead of the provider-owned call-occurrence coordinate
    - managed Claude CLI MCP tools/call execution without a non-empty params._meta["claudecode/toolUseId"] coordinate
