            display_projection: full
            display_shortening_eligible: false
          mailbox:
            candidate_source: /v1/rpc mailbox.list
            scope_mode: unpromoted_full_only
            scope_rule: boundedness and required scope not promoted
            normalization_mode: trim_case_sensitive
            normalization: trim only; case-sensitive
            display_projection: full
            display_shortening_eligible: false
          flow_instance:
            candidate_source: unpromoted
            scope_mode: unpromoted_full_only
            scope_rule: full exact value
            normalization_mode: existing_flow_path
            normalization: trim surrounding slashes only where the command contract already does so
            display_projection: full
            display_shortening_eligible: false
          context:
