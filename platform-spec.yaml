        - type
        - model
        - mode
        - status
        properties:
          agent_id:
            $ref: '#/components/schemas/OpaqueId'
          role:
            type: string
          type:
            type: string
          model:
            type: string
          mode:
            $ref: '#/components/schemas/ConversationMode'
          session_scope:
            $ref: '#/components/schemas/SessionScope'
            description: Present only for scoped agent modes. Omitted for mode=task because task agents have no live runtime session scope.
          status:
            $ref: '#/components/schemas/AgentStatus'
      SessionRef:
        type: object
        additionalProperties: false
        required:
        - session_id
        - started_at
        properties:
          session_id:
            $ref: '#/components/schemas/OpaqueId'
          started_at:
            $ref: '#/components/schemas/Timestamp'
      TurnRef:
        type: object
        additionalProperties: false
        required:
        - turn_id
        - completed_at
        - parse_ok
        properties:
          turn_id:
            $ref: '#/components/schemas/OpaqueId'
          completed_at:
            $ref: '#/components/schemas/Timestamp'
          parse_ok:
            type: boolean
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
      AgentDetail:
        type: object
        additionalProperties: false
        required:
        - agent
        properties:
          agent:
            $ref: '#/components/schemas/AgentSummary'
          current_session_ref:
            $ref: '#/components/schemas/SessionRef'
          last_turn_ref:
            $ref: '#/components/schemas/TurnRef'
      AgentDeliveryLifecycleState:
        type: string
        enum:
        - queued
        - launching
        - active
        - retrying
        - exhausted
      AgentPendingDelivery:
        type: object
        additionalProperties: false
        required:
        - event_id
        - event_name
        - enqueued_at
        - attempts
        properties:
          event_id:
            $ref: '#/components/schemas/OpaqueId'
          event_name:
            type: string
            minLength: 1
          enqueued_at:
            $ref: '#/components/schemas/Timestamp'
            description: Same timestamp owner as AgentDiagnosisQueue.oldest_pending_age_seconds; currently events.created_at.
          attempts:
            type: integer
            minimum: 0
            description: Canonical recorded delivery retry counter from event_deliveries.retry_count; the API must not add one or reinterpret by status.
      AgentDiagnosisQueue:
        type: object
        additionalProperties: false
        required:
        - pending_count
        - oldest_pending_age_seconds
        - pending_deliveries
        properties:
          pending_count:
            type: integer
            minimum: 0
          oldest_pending_age_seconds:
            type: integer
            minimum: 0
          pending_deliveries:
            type: array
            items:
              $ref: '#/components/schemas/AgentPendingDelivery'
          next_cursor:
            $ref: '#/components/schemas/Cursor'
      AgentDeliveryLifecycle:
        type: object
        additionalProperties: false
        required:
        - state
        - blocking_layer
        properties:
          state:
            $ref: '#/components/schemas/AgentDeliveryLifecycleState'
          blocking_layer:
            type: string
            minLength: 1
            description: >
              Current producer owner is internal/store/agent_lifecycle_read_surface.go
              agentLifecycleBlockingLayer, consuming deliverylifecycle.StateFromDelivery. Current reachable
              state/layer pairs are queued/delivery_queue, launching/session_launch, active/session_execution,
              retrying/delivery_retry, and exhausted/delivery_terminal. The field remains string-valued for
              compatible additive server values; current in-repo producer additions must update the authoritative
              human-code projection and parity tests in the same change. Delivered is not a current diagnosis state.
      AgentDeliveryLifecycleRow:
        type: object
        additionalProperties: false
        description: |
          Agent-scoped delivery lifecycle row sourced only from canonical
          event_deliveries rows joined to the minimum canonical event identity
          fields needed for display. This schema is the public row type for
          agent.delivery_lifecycle and is distinct from the narrow
          AgentDeliveryLifecycle hint embedded in agent.diagnose. It must not
          contain dead-letter record details, failure aggregates, retry-policy
          recommendations, route-target interpretation, status hints, dashboard
          projections, or trace/event rendering.
        required:
        - delivery_id
        - event_id
        - event_name
        - status
        - retry_count
        - delivery_created_at
        properties:
          delivery_id:
            $ref: '#/components/schemas/OpaqueId'
          event_id:
            $ref: '#/components/schemas/OpaqueId'
          event_name:
            type: string
            minLength: 1
          run_id:
            $ref: '#/components/schemas/OpaqueId'
            description: Canonical delivery/event run identity, read as COALESCE(event_deliveries.run_id, events.run_id).
          entity_id:
            $ref: '#/components/schemas/OpaqueId'
          status:
            $ref: '#/components/schemas/DeliveryStatus'
            description: Canonical event_deliveries.status lifecycle value.
          retry_count:
            type: integer
            minimum: 0
            description: Canonical event_deliveries.retry_count; the API must not add one or infer retries from receipts.
          reason_code:
            type: string
            description: Canonical event_deliveries.reason_code summary. Rich terminal evidence remains owned by agent.delivery_diagnostics.
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
            description: Canonical event_deliveries.failure envelope. No read surface may reconstruct it from reason_code or prose.
          delivery_created_at:
            $ref: '#/components/schemas/Timestamp'
            description: Canonical ordering watermark from event_deliveries.created_at.
          delivery_started_at:
            $ref: '#/components/schemas/Timestamp'
            description: Canonical event_deliveries.started_at when handler execution has started.
          delivery_delivered_at:
            $ref: '#/components/schemas/Timestamp'
            description: Canonical event_deliveries.delivered_at when the delivery was settled.
      AgentDeliveryLifecycleList:
        type: object
        additionalProperties: false
        required:
        - agent_id
        - deliveries
        properties:
          agent_id:
            $ref: '#/components/schemas/OpaqueId'
          deliveries:
            type: array
            description: Retained canonical lifecycle rows ordered by delivery_created_at DESC then delivery_id DESC.
            items:
              $ref: '#/components/schemas/AgentDeliveryLifecycleRow'
          next_cursor:
            $ref: '#/components/schemas/Cursor'
      AgentDiagnosisWatchdog:
        type: object
        additionalProperties: false
        description: |
          Watchdog-backed runtime evidence for agent.diagnose. This object is
          the public projection of agent_sessions.runtime_state.watchdog after
          DecodeConversationRuntimeStateDescriptor validation; it is not the
          full #852 agent runtime_state enum and must not be derived from queue,
          delivery lifecycle, dashboard state, active task, last tool, token,
          failure, dead-letter, restart, or broad session lifecycle heuristics.
        required:
        - state
        - blocking_layer
        - action
        - outcome
        - recorded_at
        properties:
          state:
            type: string
            enum:
            - healthy_long_running
            - no_output
          blocking_layer:
            type: string
            enum:
            - session_execution
          action:
            type: string
            enum:
            - turn_long_running
            - session_no_output
          outcome:
            type: string
            enum:
            - observed
            - warning_emitted
          last_output_at:
            $ref: '#/components/schemas/Timestamp'
            description: Required when state is healthy_long_running; omitted when no output has been observed.
          recorded_at:
            $ref: '#/components/schemas/Timestamp'
      AgentDiagnosisRuntimeState:
        type: object
        additionalProperties: false
        description: |
          Narrow runtime-state container for agent.diagnose watchdog evidence.
          The diagnosis owner reads the most-recent active agent_sessions row
          for session/session_per_entity modes using the same active-session
          selector as LoadOperatorAgentDiagnosis, ordered by updated_at DESC then
          created_at DESC then session_id ASC. It ignores inactive or terminated rows, omits
          runtime_state when there is no active live session or no watchdog
          evidence, and fails closed on malformed runtime_state.watchdog data.
          Multiple active sessions use that same deterministic current-session
          selector; this schema does not promote a broader agent runtime_state
          enum.
        required:
        - watchdog
        properties:
          watchdog:
            $ref: '#/components/schemas/AgentDiagnosisWatchdog'
      AgentDiagnosisActive:
        type: object
        additionalProperties: false
        description: |
          Selected active-session latest-turn refs for agent.diagnose. This
          object is present only when the diagnosis owner selects an active
          live agent_sessions row for session/session_per_entity modes and that
          selected session has a latest agent_turns row. It is persisted
          selected-turn evidence, not proof of actual in-flight work. turn_id is
          the selected latest turn. task_id is the same selected latest
          agent_turns.task_id and is omitted when empty. entity_id is the same
          selected latest agent_turns.entity_id dispatch entity and is omitted
          when absent. The owner must not fall back to AgentConfig
          EffectiveEntityID(), task target entity, role-scoped current-entity
          tool context, dashboard projections, conversation API composition, or
          stale/inactive session rows.
        required:
        - turn_id
        properties:
          turn_id:
            $ref: '#/components/schemas/OpaqueId'
          task_id:
            type: string
            minLength: 1
          entity_id:
            $ref: '#/components/schemas/OpaqueId'
      AgentDiagnosisLastToolOutcome:
        type: object
        additionalProperties: false
        description: |
          Compact selected-turn last-tool evidence for agent.diagnose. This
          object is present only when the diagnosis owner selects an active
          live agent_sessions row for session/session_per_entity modes, that
          selected session has a latest agent_turns row, and that turn has a
          canonical turn_summary.tool_results entry. turn_id is the same
          selected latest turn used by AgentDiagnosisActive. tool_name,
          optional tool_use_id, and optional result come from the last
          canonical tool_results entry. ok is the selected latest
          agent_turns.parse_ok value; it is not a per-tool execution status.
          The owner must omit last_tool_outcome when no selected active live
          session, latest turn, canonical summary, or canonical tool result
          exists, and must fail closed on malformed canonical summary or tool
          result data. It must not fall back to raw response_payload, raw
          transcript text, dashboard projections, conversation API composition,
          runtime executor telemetry, event/dead-letter data, stale/inactive
          sessions, or richer per-tool status/latency/completion/error
          diagnostics.
        required:
        - turn_id
        - tool_name
        - ok
        properties:
          turn_id:
            $ref: '#/components/schemas/OpaqueId'
          tool_name:
            type: string
            minLength: 1
          tool_use_id:
            type: string
            minLength: 1
          ok:
            type: boolean
            description: Selected latest agent_turns.parse_ok; not a per-tool execution status.
          result:
            type: object
            additionalProperties: true
            description: Optional validated JSON object from the selected canonical tool_results entry.
      AgentDiagnosis:
        type: object
        additionalProperties: false
        required:
        - agent_id
        - status
        - queue
        properties:
          agent_id:
            $ref: '#/components/schemas/OpaqueId'
          status:
            $ref: '#/components/schemas/AgentStatus'
          current_session_ref:
            $ref: '#/components/schemas/SessionRef'
          last_turn_ref:
            $ref: '#/components/schemas/TurnRef'
          queue:
            $ref: '#/components/schemas/AgentDiagnosisQueue'
          delivery_lifecycle:
            $ref: '#/components/schemas/AgentDeliveryLifecycle'
          runtime_state:
            $ref: '#/components/schemas/AgentDiagnosisRuntimeState'
          active:
            $ref: '#/components/schemas/AgentDiagnosisActive'
          last_tool_outcome:
            $ref: '#/components/schemas/AgentDiagnosisLastToolOutcome'
      UsageAccounting:
        type: string
        enum:
        - exact
        - estimated
        description: |
          Exact means token counts came from a provider usage object. Estimated
          means token counts were locally estimated because the runtime surface
          did not expose provider usage. API consumers must not silently merge
          exact and estimated buckets without preserving this field.
      AgentUsageWindow:
        type: object
        additionalProperties: false
        description: |
          Agent usage aggregate window over spend_ledger.created_at. since is
          inclusive when supplied; until is exclusive when supplied. If both
          are omitted, the owner aggregates all retained spend_ledger rows for
          the agent. This schema intentionally makes no run/session/turn or
          last-turn claim.
        properties:
          since:
            $ref: '#/components/schemas/Timestamp'
          until:
            $ref: '#/components/schemas/Timestamp'
      AgentUsageTotals:
        type: object
        additionalProperties: false
        required:
        - ledger_entries
        - input_tokens
        - output_tokens
        - estimated_cost_usd
        properties:
          ledger_entries:
            type: integer
            minimum: 0
          input_tokens:
            type: integer
            minimum: 0
          output_tokens:
            type: integer
            minimum: 0
          estimated_cost_usd:
            type: number
            minimum: 0
            description: Guardrail cost estimate from BudgetTracker pricing, not provider billing truth.
      AgentUsageByAccounting:
        type: object
        additionalProperties: false
        required:
        - exact
        - estimated
        properties:
          exact:
            $ref: '#/components/schemas/AgentUsageTotals'
          estimated:
            $ref: '#/components/schemas/AgentUsageTotals'
      AgentUsageBreakdown:
        type: object
        additionalProperties: false
        required:
        - usage_accounting
        - invocation_type
        - model
        - model_alias
        - backend_profile
        - provider
        - transport
        - resolved_model
        - totals
        properties:
          usage_accounting:
            $ref: '#/components/schemas/UsageAccounting'
          invocation_type:
            type: string
            minLength: 1
            description: Backend profile id recorded by the spend ledger, such as anthropic, claude_cli, openai_compatible, or openai_responses.
          model:
            type: string
            minLength: 1
            description: Concrete model string used for legacy grouping and guardrail cost estimation.
          model_alias:
            type: string
            minLength: 1
            description: Authored model alias from the agent contract at write time.
          backend_profile:
            type: string
            minLength: 1
            description: Selected backend profile id at write time.
          provider:
            type: string
            minLength: 1
            description: Resolved provider identity at write time.
          transport:
            type: string
            minLength: 1
            description: Resolved provider transport at write time.
          resolved_model:
            type: string
            minLength: 1
            description: Concrete provider model resolved from model_alias for backend_profile at write time.
          totals:
            $ref: '#/components/schemas/AgentUsageTotals'
      AgentUsage:
        type: object
        additionalProperties: false
        required:
        - agent_id
        - window
        - usage
        - breakdown
        properties:
          agent_id:
            $ref: '#/components/schemas/OpaqueId'
          window:
            $ref: '#/components/schemas/AgentUsageWindow'
          usage:
            $ref: '#/components/schemas/AgentUsageByAccounting'
          breakdown:
            type: array
            items:
              $ref: '#/components/schemas/AgentUsageBreakdown'
      AgentDeliveryDiagnosticsSummary:
        type: object
        additionalProperties: false
        required:
        - failures_24h
        - dead_letters_24h
        properties:
          failures_24h:
            type: integer
            minimum: 0
            description: Rolling 24-hour count of failed agent delivery rows using the same occurrence watermark as AgentDeliveryFailure.occurred_at.
          dead_letters_24h:
            type: integer
            minimum: 0
            description: Rolling 24-hour count of terminal dead-letter agent delivery rows using the same occurrence watermark as AgentDeadLetterDelivery.occurred_at.
      AgentDeliveryFailure:
        type: object
        additionalProperties: false
        required:
        - delivery_id
        - event_id
        - event_name
        - status
        - retry_count
        - occurred_at
        properties:
          delivery_id:
            $ref: '#/components/schemas/OpaqueId'
          event_id:
            $ref: '#/components/schemas/OpaqueId'
          event_name:
            type: string
            minLength: 1
          run_id:
            $ref: '#/components/schemas/OpaqueId'
          entity_id:
            $ref: '#/components/schemas/OpaqueId'
          status:
            type: string
            const: failed
            description: Failed-delivery subfact from the canonical event_deliveries delivery status owner.
          reason_code:
            type: string
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
          retry_count:
            type: integer
            minimum: 0
          occurred_at:
            $ref: '#/components/schemas/Timestamp'
            description: Canonical delivery occurrence watermark, currently COALESCE(event_deliveries.delivered_at, event_deliveries.created_at).
      AgentDeadLetterDelivery:
        type: object
        additionalProperties: false
        required:
        - delivery_id
        - event_id
        - event_name
        - status
        - retry_count
        - occurred_at
        - dead_letter_records
        properties:
          delivery_id:
            $ref: '#/components/schemas/OpaqueId'
          event_id:
            $ref: '#/components/schemas/OpaqueId'
          event_name:
            type: string
            minLength: 1
          run_id:
            $ref: '#/components/schemas/OpaqueId'
          entity_id:
            $ref: '#/components/schemas/OpaqueId'
          status:
            type: string
            const: dead_letter
            description: Terminal dead-letter delivery subfact from the canonical event_deliveries delivery status owner.
          reason_code:
            type: string
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
          retry_count:
            type: integer
            minimum: 0
          occurred_at:
            $ref: '#/components/schemas/Timestamp'
            description: Canonical delivery occurrence watermark, currently COALESCE(event_deliveries.delivered_at, event_deliveries.created_at).
          dead_letter_records:
            type: array
            description: Event-scoped dead-letter records reconciled to this terminal agent delivery through the original event id. A terminal dead-letter delivery without at least one matching record is malformed owner data and fails closed.
            items:
              $ref: '#/components/schemas/DeadLetterRecord'
      AgentDeliveryDiagnostics:
        type: object
        additionalProperties: false
        required:
        - agent_id
        - summary
        - failures
        - dead_letters
        properties:
          agent_id:
            $ref: '#/components/schemas/OpaqueId'
          summary:
            $ref: '#/components/schemas/AgentDeliveryDiagnosticsSummary'
          failures:
            type: array
            description: Recent retained failed delivery rows for this agent, ordered by occurred_at DESC then delivery_id DESC.
            items:
              $ref: '#/components/schemas/AgentDeliveryFailure'
          failures_next_cursor:
            $ref: '#/components/schemas/Cursor'
          dead_letters:
            type: array
            description: Recent retained terminal dead-letter delivery rows for this agent, ordered by occurred_at DESC then delivery_id DESC.
            items:
              $ref: '#/components/schemas/AgentDeadLetterDelivery'
          dead_letters_next_cursor:
            $ref: '#/components/schemas/Cursor'
      ConversationSummary:
        type: object
        additionalProperties: false
        required:
        - session_id
        - agent_id
        - started_at
        - turn_count
        - message_count
        - status
        properties:
          session_id:
            $ref: '#/components/schemas/OpaqueId'
          agent_id:
            $ref: '#/components/schemas/OpaqueId'
          run_id:
            $ref: '#/components/schemas/OpaqueId'
          started_at:
            $ref: '#/components/schemas/Timestamp'
          ended_at:
            $ref: '#/components/schemas/Timestamp'
          turn_count:
            type: integer
            minimum: 0
          message_count:
            type: integer
            minimum: 0
          status:
            type: string
            enum:
            - active
            - terminated
      Turn:
        type: object
        additionalProperties: false
        required:
        - turn_index
        - turn_id
        - trigger_event_id
        - trigger_event_type
        - parse_ok
        - latency_ms
        properties:
          turn_index:
            type: integer
            minimum: 1
          turn_id:
            $ref: '#/components/schemas/OpaqueId'
          trigger_event_id:
            $ref: '#/components/schemas/OpaqueId'
          trigger_event_type:
            type: string
          request_payload:
            type: object
            additionalProperties: true
          response_payload:
            type: object
            additionalProperties: true
          tool_calls:
            type: array
            description: Sandbox-observed tool calls requested during this fork-local turn. Entries may include
              snapshot-read evidence and requested side-effect tool results stubbed as fork-local facts; they are
              not synthesized for unrequested tools and are not live runtime side effects.
            items:
              type: object
              additionalProperties: true
          turn_blocks:
            type: array
            items:
              type: object
              additionalProperties: true
          parse_ok:
            type: boolean
          latency_ms:
            type: integer
            minimum: 0
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
      ConversationTurnDispatchMetadata:
        type: object
        additionalProperties: false
        properties:
          trigger_event_id:
            $ref: '#/components/schemas/OpaqueId'
          trigger_event_type:
            type: string
          entity_id:
            $ref: '#/components/schemas/OpaqueId'
          task_id:
            type: string
          run_id:
            $ref: '#/components/schemas/OpaqueId'
      ConversationTurnProviderMetadata:
        type: object
        additionalProperties: false
        required:
        - latency_ms
        properties:
          latency_ms:
            type: integer
            minimum: 0
      ConversationDeepTurn:
        type: object
        additionalProperties: false
        required:
        - turn_index
        - turn_id
        - started_at
        - completed_at
        - duration_ms
        - parse_ok
        - dispatch_metadata
        - advertised_tools
        - runtime_log_entries
        - provider_metadata
        - full_prompt_context
        - full_prompt_context_v2_reserved
        - raw_llm_response
        - raw_llm_response_v2_reserved
        properties:
          turn_index:
            type: integer
            minimum: 1
          turn_id:
            $ref: '#/components/schemas/OpaqueId'
          scope:
            type: string
          started_at:
            $ref: '#/components/schemas/Timestamp'
          completed_at:
            $ref: '#/components/schemas/Timestamp'
          duration_ms:
            type: integer
            minimum: 0
          outcome:
            type: string
          parse_ok:
            type: boolean
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
          retry_count:
            type: integer
            minimum: 0
          dispatch_metadata:
            $ref: '#/components/schemas/ConversationTurnDispatchMetadata'
          advertised_tools:
            type: array
            items:
              type: string
          mcp_tools_listed:
            type: array
            items:
              type: string
          mcp_tools_visible:
            type: array
            items:
              type: string
          reasoning_blocks:
            type: array
            items:
              type: string
          progress_updates:
            type: array
            items:
              type: string
          tool_calls:
            type: array
            items:
              type: object
              additionalProperties: true
          tool_results:
            type: array
            items:
              type: object
              additionalProperties: true
          emitted_events:
            type: array
            items:
              type: string
          runtime_log_entries:
            type: array
            items:
              $ref: '#/components/schemas/LogEntry'
          provider_metadata:
            $ref: '#/components/schemas/ConversationTurnProviderMetadata'
          request_payload:
            type: object
            additionalProperties: true
          response_payload:
            type: object
            additionalProperties: true
          full_prompt_context:
            oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
          full_prompt_context_v2_reserved:
            type: boolean
            const: true
          raw_llm_response:
            oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
          raw_llm_response_v2_reserved:
            type: boolean
            const: true
          assistant_visible_output:
            type: string
      ConversationTurnDetail:
        type: object
        additionalProperties: false
        required:
        - session
        - turn
        - turn_blocks_raw
        properties:
          session:
            $ref: '#/components/schemas/ConversationSummary'
          turn:
            $ref: '#/components/schemas/ConversationDeepTurn'
          turn_blocks_raw:
            type: array
            items:
              type: object
              additionalProperties: true
      ConversationDetail:
        type: object
        additionalProperties: false
        required:
        - conversation
        - turns
        properties:
          conversation:
            $ref: '#/components/schemas/ConversationSummary'
          turns:
            type: array
            items:
              $ref: '#/components/schemas/Turn'
      ConversationForkPointSelector:
        description: "Selector for the source conversation fork point. Exactly one selector kind is accepted. For `turn`,\
          \ turn_index is the canonical 1-based conversation order used by conversation.get_turn. For `event`, event_id must\
          \ be the trigger_event_id for exactly one turn in the source session. For `time`, at resolves to the latest source\
          \ turn with agent_turns.created_at <= at, using created_at ASC then turn_id ASC as the canonical order."
        type: object
        additionalProperties: false
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - turn
            - event
            - time
          turn_index:
            type: integer
            minimum: 1
          event_id:
            $ref: '#/components/schemas/OpaqueId'
          at:
            $ref: '#/components/schemas/Timestamp'
      ConversationForkPointDescriptor:
        description: Canonical validated fork-point descriptor persisted by the conversation fork lifecycle owner.
        type: object
        additionalProperties: false
        required:
        - kind
        - turn_index
        - turn_id
        - selected_at
        properties:
          kind:
            type: string
            enum:
            - turn
            - event
            - time
          turn_index:
            type: integer
            minimum: 1
          turn_id:
            $ref: '#/components/schemas/OpaqueId'
