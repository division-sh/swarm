          type: object
          additionalProperties: true
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/MailboxDecisionResult'
      errors:
      - MAILBOX_NOT_FOUND
      - MAILBOX_ALREADY_DECIDED
      - MAILBOX_DECISION_EVENT_UNCONFIGURED
      - IDEMPOTENCY_CONFLICT
    mailbox.reject:
      tier: must_have
      description: >
        Reject a pending mailbox item with a stated reason. Triggers
        `mailbox.item_decided` with `decision = rejected` and schema-visible
        `reason`; route or publish failure fails closed without row-only
        success.
      scope:
        required:
        - approve:mailbox
      idempotency: per the convention.
      params:
      - name: mailbox_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: reason
        required: true
        schema:
          type: string
          minLength: 1
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/MailboxDecisionResult'
      errors:
      - MAILBOX_NOT_FOUND
      - MAILBOX_ALREADY_DECIDED
      - MAILBOX_DECISION_EVENT_UNCONFIGURED
      - IDEMPOTENCY_CONFLICT
    mailbox.defer:
      tier: must_have
      description: >
        Defer a pending mailbox item until a specified time. Defer is
        non-terminal: the row remains pending with `deferred_until` set and
        `expires_at` unchanged. Triggers `mailbox.item_deferred`; route or
        publish failure fails closed without row-only success. `until` must be
        in the future and must not exceed `expires_at` when the item has an
        expiry deadline.
      scope:
        required:
        - approve:mailbox
      idempotency: per the convention.
      params:
      - name: mailbox_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: until
        required: true
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/MailboxDecisionResult'
      errors:
      - MAILBOX_NOT_FOUND
      - MAILBOX_ALREADY_DECIDED
      - MAILBOX_DECISION_EVENT_UNCONFIGURED
      - INVALID_DEFER_UNTIL
      - IDEMPOTENCY_CONFLICT
    agent.list:
      tier: should_have
      description: List declared agents in the loaded bundle, with current operational status.
      scope:
        required:
        - read:agents
      params:
      - name: flow
        required: false
        schema:
          type: string
      - name: role
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - agents
          properties:
            agents:
              type: array
              items:
                $ref: '#/components/schemas/AgentSummary'
      errors: []
    agent.get:
      tier: should_have
      description: "Read one agent's identity, current operational status, and references\nto its current session and last\
        \ turn. Returns refs only \u2014 full session\nand transcript content is read via conversation.* methods. Ownership\n\
        boundary: agent.* never returns transcripts.\n"
      scope:
        required:
        - read:agents
      params:
      - name: agent_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/AgentDetail'
      errors:
      - AGENT_NOT_FOUND
    agent.diagnose:
      tier: should_have
      description: |
        Read the owner-backed diagnosis slice for one agent. This method is
        limited to agent identity/status refs, current/last conversation refs,
        pending-delivery queue summary/detail evidence, and optional delivery
        lifecycle evidence. It may also return runtime_state.watchdog as a
        narrow projection of the canonical active session watchdog descriptor,
        active as selected active-session latest-turn refs, and
        last_tool_outcome as compact selected active-session latest-turn
        canonical tool-result evidence. active is omitted when no active live
        session is selected or the selected session has no latest turn.
        active.turn_id is required when active is present; active.task_id and
        active.entity_id are omitted when empty or absent. active.entity_id is
        the latest selected agent_turns.entity_id dispatch entity and must not
        fall back to the agent configured/effective entity, task target entity,
        role-scoped current-entity tool context, dashboard projection,
        conversation API response, or stale session evidence.
        last_tool_outcome is omitted when no active live session is selected,
        no latest turn exists, no canonical turn summary exists, or the
        canonical summary has no tool result. last_tool_outcome.ok is the
        selected turn parse_ok value and is not a per-tool execution status;
        richer per-tool status, latency, completed_at, and error diagnostics
        remain split.
        runtime_state.watchdog is omitted when no active live session or no
        active-session watchdog evidence exists, and malformed watchdog data
        fails closed. Queue details are paged with queue_limit and
        queue_cursor, ordered by events.created_at ASC then events.event_id ASC.
        AgentPendingDelivery.enqueued_at uses the same timestamp owner as
        oldest_pending_age_seconds. AgentPendingDelivery.attempts is the
        canonical recorded retry counter from event_deliveries.retry_count, with
        no API-layer +1 or status arithmetic. The API handler consumes the
        canonical agent diagnosis read owner directly, including its
        watchdog-backed runtime_state sub-owner, selected-turn active sub-owner,
        and selected-turn last_tool_outcome sub-owner. It must not locally join
        conversation, run, trace, token, CLI, or dashboard owners, and it must
        not expose the full runtime_state
        enum, top-level watchdog, run_id, bundle_version, actual in-flight
        active work, configured/effective current entity, task target entity,
        role-scoped current entity, token usage, recent failures, or dead
        letters.
      scope:
        required:
        - read:agents
      params:
      - name: agent_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: queue_limit
        required: false
        description: Max pending-delivery detail rows to return. pending_count remains the total pending count for the selected queue, not the page length.
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: queue_cursor
        required: false
        description: Opaque cursor returned by queue.next_cursor for the next pending-delivery detail page.
        schema:
          $ref: '#/components/schemas/Cursor'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/AgentDiagnosis'
      errors:
      - AGENT_NOT_FOUND
    agent.delivery_lifecycle:
      tier: should_have
      description: |
        Read the owner-backed per-agent delivery lifecycle rows across the
        canonical event_deliveries lifecycle states. This method is the
        canonical agent-scoped lifecycle read owner for pending, in_progress,
        delivered, failed, and dead_letter delivery rows. It is a separate
        owner from agent.diagnose and agent.delivery_diagnostics: AgentDiagnosis
        remains lean, and rich failed/dead-letter evidence remains owned by
        agent.delivery_diagnostics.

        The API handler validates agent_id, optional run_id, optional
        delivery_status filters, list bounds, cursor, and unknown params, then
        consumes one named persisted delivery lifecycle read owner. The owner
        reads only canonical event_deliveries rows for subscriber_type agent
        joined to the minimum canonical event identity fields needed for
        display: event_id, event_name, run_id, and entity_id. It must not
        reconstruct lifecycle rows from run.trace, event.get, event.list,
        agent.diagnose, agent.delivery_diagnostics, event_receipts,
        dead_letters, logs, dashboard/Builder helpers, CLI state, EventBus
        memory, runtime memory, or direct DB/store readers outside this owner.

        Rows are ordered by event_deliveries.created_at DESC, then delivery_id
        DESC. cursor is an opaque cursor over that ordering. run_id filters use
        the canonical delivery/event run identity, currently
        COALESCE(event_deliveries.run_id, events.run_id), and return only rows
        matching the supplied run. delivery_status filters are exact
        event_deliveries.status values. Empty lists are represented as empty
        arrays. The method reports only lifecycle summaries
        (status/timestamps/retry_count/reason_code/failure); it does not
        include dead-letter records, route target details, retry-policy
        recommendations, status hints, trace reconstruction, event rendering,
        or CLI/dashboard presentation semantics.
      scope:
        required:
        - read:agents
        - read:events
      params:
      - name: agent_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: run_id
        required: false
        description: Optional run filter over COALESCE(event_deliveries.run_id, events.run_id).
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: delivery_status
        required: false
        description: Optional exact lifecycle-status filter. When supplied, only these canonical event_deliveries.status values are returned.
        schema:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryStatus'
      - name: limit
        required: false
        description: Max lifecycle rows to return.
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: cursor
        required: false
        description: Opaque cursor returned by next_cursor for the next lifecycle page.
        schema:
          $ref: '#/components/schemas/Cursor'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/AgentDeliveryLifecycleList'
      errors:
      - AGENT_NOT_FOUND
    agent.usage:
      tier: should_have
      description: |
        Read the owner-backed per-agent LLM token and estimated-cost usage
        aggregate. This is a separate owner from agent.diagnose:
        AgentDiagnosis remains lean and must not expose token usage. The API
        handler validates agent_id and optional created_at window params, then
        consumes one named per-agent usage read owner over spend_ledger facts.
        It must not locally reconstruct usage from raw request_payload,
        response_payload, agent.diagnose, agent.delivery_diagnostics,
        run.trace, run.diagnose, dashboard helpers, CLI state, EventBus data,
        or runtime memory.

        The owner is agent-scoped and aggregates retained spend_ledger rows by
        spend_ledger.created_at. since is inclusive; until is exclusive. If no
        window is supplied, all retained rows for the agent are aggregated. The
        response separates exact and estimated usage_accounting totals and
        provides model alias, backend profile, provider, transport, and concrete
        model breakdowns so provider usage and estimated CLI usage are not
        silently merged. estimated_cost_usd is the
        BudgetTracker guardrail cost estimate, not provider billing truth. This
        method does not make run_id, session_id, turn_id, last-turn, or
        provider-billing claims.
      scope:
        required:
        - read:agents
      params:
      - name: agent_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: since
        required: false
        description: Inclusive lower bound over spend_ledger.created_at.
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: until
        required: false
        description: Exclusive upper bound over spend_ledger.created_at; must be after since when both are supplied.
        schema:
          $ref: '#/components/schemas/Timestamp'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/AgentUsage'
      errors:
      - AGENT_NOT_FOUND
    agent.delivery_diagnostics:
      tier: should_have
      description: |
        Read the owner-backed per-agent delivery diagnostics slice for failed
        deliveries and terminal dead-letter deliveries. This method is a
        separate owner from agent.diagnose: AgentDiagnosis remains lean and must
        not expose recent failures or dead letters. The API handler validates
        agent_id, list bounds, cursors, and unknown params, then consumes one
        named per-agent delivery diagnostics read owner. It must not locally
        reconstruct the shape from run.trace, run.diagnose, event.list,
        event.get, event_receipts, dashboard helpers, CLI state, runtime memory,
        or EventBus data.

        Failed-delivery rows are sourced from canonical agent
        event_deliveries rows with status failed. Dead-letter rows are sourced
        from canonical agent event_deliveries rows with status dead_letter and
        reconciled with event-scoped dead_letters records by original event id.
        A terminal dead-letter delivery without at least one matching
        dead_letters record is malformed owner data and must fail closed rather
        than silently reporting a partial fact. Dead-letter records for events
        that do not have a terminal delivery for this agent are not attributed to
        this agent by this owner.

        Detail rows are ordered by the canonical delivery occurrence watermark
        DESC, then delivery_id DESC. The occurrence watermark is currently
        COALESCE(event_deliveries.delivered_at, event_deliveries.created_at).
        failure_cursor and dead_letter_cursor are independent opaque cursors
        over that ordering. failures_24h and dead_letters_24h are rolling
        24-hour counts over the same occurrence watermark. Detail lists return
        retained rows subject to store retention and explicit per-list limits.
        Empty lists are represented as empty arrays.
      scope:
        required:
        - read:agents
        - read:events
      params:
      - name: agent_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: failure_limit
        required: false
        description: Max failed-delivery detail rows to return.
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: failure_cursor
        required: false
        description: Opaque cursor returned by failures_next_cursor for the next failed-delivery page.
        schema:
          $ref: '#/components/schemas/Cursor'
      - name: dead_letter_limit
        required: false
        description: Max terminal dead-letter delivery detail rows to return.
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: dead_letter_cursor
        required: false
        description: Opaque cursor returned by dead_letters_next_cursor for the next terminal dead-letter delivery page.
        schema:
          $ref: '#/components/schemas/Cursor'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/AgentDeliveryDiagnostics'
      errors:
      - AGENT_NOT_FOUND
    agent.send_directive:
      tier: should_have
      description: >-
        Send a directive (free-form instruction) to a running agent. The runtime resolves the target run before
        reservation: explicit run_id targets an existing nonterminal run; with no run_id, zero active sessions allocate
        a new run_id, one active session uses that session's run_id, and multiple active sessions fail closed with
        AMBIGUOUS_RUN_TARGET. One agent_directive_operations row and one platform.agent_directive event are persisted
        atomically before the operation receives its sole BoardStep admission. Successful BoardStep response is made
        durable before pipeline settlement and API completion are finalized. Same-key retries consume the same operation
        and never re-execute an admitted, executed, failed, or indeterminate operation. Keyless calls create fresh
        operations and make no cross-call exactly-once claim.
      scope:
        required:
        - control:agents
      idempotency: >-
        agent_directive_operations is the semantic replay/outcome owner. A keyed request is unique by
        (method, actor_token_id, idempotency_key) for 24 hours and conflicts on request_hash mismatch before side effects.
        api_idempotency is written atomically as a derived succeeded-response projection and is never consulted to admit
        BoardStep. An executed operation is finalized without re-execution; an executing or indeterminate operation is
        never re-admitted.
      params:
      - name: agent_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: directive
        required: true
        schema:
          type: string
          minLength: 1
      - name: run_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
        description: Optional explicit nonterminal run target. If omitted, the runtime resolves from active sessions or allocates
          a new run_id.
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - ok
          - operation_id
          - run_id
          - run_id_resolution
          - directive_event_id
          - directive_event_type
          properties:
            ok:
              type: boolean
              const: true
            operation_id:
              $ref: '#/components/schemas/OpaqueId'
            response:
              type: string
              description: Optional acknowledgement or error from the agent.
            run_id:
              $ref: '#/components/schemas/OpaqueId'
            run_id_resolution:
              type: string
              enum:
              - specified
              - inferred_from_active_session
              - new_run_allocated
            directive_event_id:
              $ref: '#/components/schemas/OpaqueId'
            directive_event_type:
              type: string
              const: platform.agent_directive
      errors:
      - AGENT_NOT_FOUND
      - AGENT_NOT_RUNNING
      - RUN_NOT_FOUND
      - RUN_ALREADY_TERMINAL
      - AMBIGUOUS_RUN_TARGET
      - IDEMPOTENCY_CONFLICT
      - AGENT_DIRECTIVE_IN_PROGRESS
      - AGENT_DIRECTIVE_COMPLETION_PENDING
      - AGENT_DIRECTIVE_EXECUTION_FAILED
      - AGENT_DIRECTIVE_OUTCOME_INDETERMINATE
    agent.restart:
      tier: should_have
      description: Restart an agent's session. Existing in-flight turn is killed; agent re-initializes.
      scope:
        required:
        - control:agents
      idempotency: per the convention.
      params:
      - name: agent_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/OkResult'
      errors:
      - AGENT_NOT_FOUND
      - IDEMPOTENCY_CONFLICT
    agent.replay:
      tier: should_have
      description: "Agent-scoped projection of the canonical operator-facing event redelivery primitive.\n\nRedelivers one\
        \ existing persisted event to exactly one requested original agent subscriber. This method MUST consume the same canonical\
        \ event redelivery owner as event.replay by projecting the request to the singleton subscriber set [agent_id]. It\
        \ MUST NOT implement independent replay target derivation, fresh replay event creation, audit emission, idempotency,\
        \ or delivery/session interpretation.\n\nThe target authority remains the original event_deliveries agent rows for\
        \ event_id. If agent_id was not an original agent subscriber for that event, the method fails closed with EVENT_REPLAY_SUBSCRIBER_NOT_ORIGINAL.\
        \ Current live subscriptions, route tables, bundle declarations, or agent backlog state must not add recipients.\n\
        \nThe replay preserves the original event, delivery, receipt, and session inspection surface, creates a distinct replay\
        \ event identity with source_event_id/parent lineage to the original event, creates a fresh delivery row for the selected\
        \ agent, and returns the single original/new delivery projection. The synthetic audit event is the canonical event.replayed\
        \ event; this method does not create agent.event_replayed or mutate/abort the original session.\n"
      scope:
        required:
        - write:runs
      idempotency: per the convention.
      params:
      - name: event_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: agent_id
        required: true
        schema:
          type: string
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/AgentReplayResult'
      errors:
      - EVENT_NOT_FOUND
      - EVENT_REPLAY_NO_DELIVERY_HISTORY
      - EVENT_REPLAY_SUBSCRIBER_NOT_ORIGINAL
      - EVENT_REPLAY_SUBSCRIBER_UNAVAILABLE
      - EVENT_REPLAY_NOT_ELIGIBLE
      - PAYLOAD_VALIDATION_FAILED
      - IDEMPOTENCY_CONFLICT
    agent.replay_backlog:
      tier: should_have
      description: Replay the agent's pending event backlog. Used for recovery after restart or ingress pause.
      scope:
        required:
        - control:agents
      idempotency: per the convention.
      params:
      - name: agent_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - ok
          - replayed_count
          properties:
            ok:
              type: boolean
              const: true
            replayed_count:
              type: integer
              minimum: 0
      errors:
      - AGENT_NOT_FOUND
      - IDEMPOTENCY_CONFLICT
    conversation.list:
      tier: should_have
      description: List conversation summaries (one per session).
      scope:
        required:
        - read:conversations
      params:
      - name: agent_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: run_id
        required: false
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
      - name: cursor
        required: false
        schema:
          $ref: '#/components/schemas/Cursor'
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - conversations
          properties:
            conversations:
              type: array
              items:
                $ref: '#/components/schemas/ConversationSummary'
            next_cursor:
              $ref: '#/components/schemas/Cursor'
      errors: []
    conversation.get:
      tier: should_have
      description: "Read one conversation in full \u2014 session metadata plus all turns and turn blocks."
      scope:
        required:
        - read:conversations
      params:
      - name: session_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/ConversationDetail'
      errors:
      - SESSION_NOT_FOUND
    conversation.get_turn:
      tier: should_have
      description: "Read one deep single-turn diagnosis record for an existing conversation session.\nThis method composes\
        \ the canonical conversation/session/turn owner with the canonical persisted runtime log owner; clients MUST NOT\
        \ reconstruct this shape by independently joining conversation.get, runtime.logs, run.trace, or dashboard audit tables.\n"
      scope:
        required:
        - read:conversations
        - read:runtime
      params:
      - name: session_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: turn_index
        required: true
        description: "1-based position in the session's canonical turn order, matching the `conversation.get` turns array\
          \ order (`agent_turns.created_at ASC, turn_id ASC`)."
        schema:
          type: integer
          minimum: 1
      - name: include_logs
        required: false
        schema:
          type: boolean
