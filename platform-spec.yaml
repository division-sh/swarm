        - '#1545'
        - '#1546'
      - id: delivery_vs_contained_state_update
        locked_design_section: Delivery vs contained-state update
        coverage: split_to_child
        owner: platform-spec.yaml#flow_model.flow_instance_authoring.contained_state_model
        implementation_tracker: '#1548'
      - id: escape_hatches
        locked_design_section: What stays as escape hatch
        coverage: specified_by_1538
        owner: platform-spec.yaml#flow_model.flow_instance_authoring.escape_hatches
