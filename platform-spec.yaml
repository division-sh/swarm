        implemented build command is local-only: it consumes a selected contracts root, canonical BundleHash, existing
        policy.modules validation, and the bundle_build_materialization owner to write a materialized directory plus
        build report without calling API, store, runtime, register, or test owners. The
        implemented register command consumes /v1/rpc bundle.register with an already-prepared
