            machine-parsed contract.
        json:
          invocation: --json
          non_streaming_shape: >
            Exactly one UTF-8 JSON document followed by a newline. The document MUST encode the command's
            canonical result object, list, or local metadata object using server-owned or spec-owned field names.
            It MUST NOT include ANSI color, human headings, lossy table abbreviations, or reconstructed local
            semantics not present in the command's canonical owner.
          streaming_shape: >
            Streaming commands render newline-delimited JSON (NDJSON): one complete UTF-8 JSON object per line,
            flushed in the same order as the canonical stream records are observed. Streaming JSON MUST NOT wrap
            the stream in an array and MUST NOT interleave human text on stdout.
          empty_result_shape: >
            Empty successful list/snapshot results render an empty JSON array or an explicitly defined empty
            result object from the command row. They MUST NOT render human empty-state prose on stdout.
        quiet:
          invocation: --quiet
          shape: >
            Exactly the command row's declared load-bearing value or values, plus trailing newlines. Quiet output
            MUST NOT include headings, labels, explanatory prose, tables, ANSI color, or stderr diagnostics on
            stdout. Commands with no declared load-bearing quiet value MUST reject `--quiet` before side effects
            with CLI validation exit 2.
          multiple_values: >
            If a command row declares more than one quiet value, each value renders on its own line in command-row
            order. JSON arrays, maps, and table formatting are invalid quiet output unless the row explicitly
            declares the load-bearing value itself as serialized JSON.
      shared_renderer_contract:
        owner_rule: >
          Future CLI implementation MUST introduce or consume one shared `cmd/swarm` output-mode renderer owner for
          mode parsing, stdout/stderr policy, JSON/NDJSON encoding, quiet rendering, and exception enforcement.
          Command-local writers may provide command-specific facts and text renderers, but they MUST NOT each
          reinterpret output-mode semantics independently.
        display_renderer_rule: >
          Successful human table/list/repeated-row/detail-display output MUST consume one shared `cmd/swarm`
          display renderer for column alignment, empty values, empty list states, color/no-color policy,
          emoji-vocabulary policy, reviewed code-to-phrase projection, and truncation declarations. Command/API
          owners keep owning facts, machine codes, row order, and filtering. The shared human-code projector owns
          only the reviewed phrases declared below; unregistered command-specific prose remains command-owned. The
          display renderer MUST NOT reorder rows, shorten identifiers by default, hide fields outside an explicit
          human-output contract, or infer facts not supplied by the command's canonical fact owner.
        row_model_rule: >
          For migrated read/list/detail surfaces, default text and JSON MUST derive from the same validated command
          result or row/detail model. A command MUST NOT assemble separate fact interpretations for human table rows
          and JSON output. Human default text may omit fields for readability, but it cannot invent alternate field
          values or abbreviate identifiers unless a command row explicitly owns that lossy projection.
        table_policy:
          alignment: Space-aligned columns with at least two spaces between columns; literal-tab TSV is not a
            supported table rendering policy for public CLI read/list output.
          empty_value: Empty string values render as `-` in human tables/details. JSON preserves the canonical
            empty/null value from the fact owner.
          empty_state: Empty successful lists render a single author-facing sentence with the applicable filter
            context and, when the command has an obvious creation path, a concrete next command. Blank tables are
            invalid.
          identifier_columns: ID/key/hash columns MUST NOT be implicitly truncated. Short-ID adoption waits for the
            ID-prefix resolver owner and must remain drillable.
          truncation: Truncatable columns must be declared by the table owner. Terminal width alone is not authority
            to truncate an identifier or semantic key.
          ordering: Row order is fact semantics owned by the command/API owner; the shared display renderer MUST
            render rows in the order supplied by that owner.
        color_and_emoji_policy:
          color: >
            Human default text may use ANSI color only when stdout is an interactive TTY and neither `--no-color`
            nor `NO_COLOR` suppresses it. JSON, NDJSON, quiet output, and non-TTY output MUST NOT depend on ANSI
            color for meaning.
          emoji: >
            Emoji status marks share the same gating and suppression rules as color. They may augment, but never
            replace, complete plain text. The allowed semantic vocabulary is limited to success/settled, failed,
            warning/blocked, and inactive classes; implementation of emoji marks is optional for the first #1814
            slice.
        sibling_exclusions:
        - Broad short-ID adoption and ID-prefix drillability remain owned by #1815.
        - Run-trace business-event fidelity and runtime-log hiding remain owned by #1816.
        - Conversation/detail-depth rewrites remain owned by #1820.
        - Failure-bearing reason_code/failure_type taxonomy and operator prose remain owned by #1869.
        - Unknown flags, unsupported enum values, domain flag conflicts, and non-positional validation remain
          outside #1818 arg-count diagnostics unless separately promoted.
        - Mutation summaries and streaming/follow rendering are not table/display closure proof for #1814.
        canonical_fact_rule: >
          Runtime-state commands render facts returned by their canonical API owner at /v1/rpc or /v1/ws. They
          MUST NOT read DB/store/runtime/EventBus state locally, recompute status, or enrich JSON/quiet output
          from non-authoritative state. `swarm verify` remains the only local file-contract carve-out.
        schema_rule: >
          JSON/NDJSON field names and value semantics come from the command's canonical API schema, local metadata
          schema, or explicit command-row output contract. When a command row's default text omits fields for
          readability, `--json` may include the full canonical result, but it must remain server/spec-owned.
        stream_rule: >
          Follow-style commands that use /v1/ws or another canonical stream consume the same shared output owner.
          Default text streams are human-readable; `--json` streams are NDJSON; `--quiet` is unsupported for streams
          unless the command row declares a specific quiet stream value.
        human_code_projection:
          promoted_by: '#1817'
          canonical_owner: platform-spec.yaml#cli_specification.foundations.output_contract.shared_renderer_contract.human_code_projection
          implementation_owner: internal/userfacing/human_code_projection.go ProjectHumanCode and HumanCodePhrases; cmd/swarm/cli_output.go formatCLIHumanCode is the CLI adapter
          scope: >
            Authoritative human projection for current public status, mode, state, layer, action, outcome, and
            blocking-reason codes rendered by CLI detail, table, summary, stream, mutation, fork, and identifier
            diagnostic surfaces. Canonical API/runtime owners continue to own the machine values; this registry owns
            only reviewed human phrases.
          machine_surface_rule: >
            JSON, NDJSON, quiet output, API schemas, request filters, validators, and runtime/control decisions retain
            canonical machine field names and values exactly. Human projection MUST NOT rename public JSON fields,
            change accepted input, or become a validator or runtime semantic owner.
          known_value_rule: >
            Every current value or reachable tuple from the named canonical producer/schema owners MUST have an
            explicit reviewed phrase. Adding a current producer value without updating this table and its parity
            tests fails closed.
          unknown_value_rule: >
            A compatible newer server may return an additive value unknown to this client. Lookup may trim only to
            find a known mapping; an unknown value renders in its exact original machine shape. Mechanical underscore
            replacement, title casing, output trimming, or inferred prose is forbidden.
          families:
            run_status:
              machine_owner: components.schemas.RunStatus and canonical runtime/store run lifecycle writers
              phrases: {running: running, paused: paused, completed: completed, failed: failed, cancelled: cancelled, forked: forked}
            agent_status:
              machine_owner: components.schemas.AgentStatus and operatorAgentProjection.v1Status
              phrases: {idle: idle, running: running, paused: paused, failed: failed, terminated: terminated}
            conversation_mode:
              machine_owner: internal/runtime/sessions.RuntimeMode and components.schemas.ConversationMode
              phrases: {task: task, session: session, session_per_entity: session per entity}
            session_scope:
              machine_owner: internal/runtime/sessions.SessionScope and components.schemas.SessionScope
              phrases: {global: global, flow: flow, entity: entity}
            delivery_status:
              machine_owner: persisted event_deliveries.status contract and components.schemas.DeliveryStatus
              phrases: {pending: pending, in_progress: in progress, delivered: delivered, failed: failed, dead_letter: dead letter}
            provider_subject_kind:
              machine_owner: internal/packs SubjectKind
              phrases: {provider_trigger: provider trigger pack, provider_connector: provider connector}
            provider_subject_status:
              machine_owner: internal/packs NormalizeSubjects derived SubjectStatus
              phrases: {READY: READY, NOT_READY: NOT READY, AVAILABLE: AVAILABLE}
            provider_capability:
              machine_owner: internal/packs capability code constants populated from accepted provider bodies
              phrases:
                receive_https_route: receive HTTPS route
                verify_secret: verify named secret
                emit_event: emit named event
                persist_dedupe_markers: persist dedupe markers
                call_provider_action: call provider action
                lower_through_activity: lower through platform.activity_requested
                journal_activity_attempts: journal non-idempotent attempts in activity_attempts
            provider_guarantee:
              machine_owner: tool_model.provider_capability_surface.guarantee_enforcement_registry.claims
              phrases:
                emit_undeclared_events: emit undeclared events
                run_code_before_admission: run code before admission
                touch_unbound_resources: touch unbound resources
                bypass_activity_attempts: bypass activity_attempts
                retry_non_idempotent_write_automatically: retry non_idempotent_write automatically
                expose_credential_values: expose credential values
            provider_requirement_status:
              machine_owner: internal/packs requirement validation consuming canonical credential descriptors
              phrases:
                BOUND: BOUND
                UNBOUND: UNBOUND
                CONNECTED: CONNECTED
                UNCONNECTED: UNCONNECTED
                PENDING_CONSENT: PENDING CONSENT
                REFRESH_FAILED: REFRESH FAILED
                SCOPE_INSUFFICIENT: SCOPE INSUFFICIENT
                NOT_IMPORTED: NOT IMPORTED
                UNKNOWN: UNKNOWN
            operational_state:
              machine_owner: internal/store/run_operational_status_read_surface.go ProjectRunOperationalStatus and components.schemas.OperationalState
              phrases: {running: running, stalled: stalled, paused: paused, completed: completed, failed: failed, cancelled: cancelled, forked: forked}
            run_blocking_tuples:
              machine_owner: internal/store/run_operational_status_read_surface.go ProjectRunOperationalStatus
              current_non_empty:
              - state: stalled
                blocking_layer: scoring_terminal_outcome
                blocking_reason: terminal_scoring_outcome_missing
                layer_phrase: scoring outcome
                reason_phrase: waiting for a terminal scoring outcome
              - state: stalled
                blocking_layer: delivery_lifecycle
                blocking_reason: no_active_deliveries
                layer_phrase: delivery lifecycle
                reason_phrase: no active deliveries
              absence_rule: Non-stalled states carry empty layer/reason values and omit those rows from human output.
            agent_lifecycle_tuples:
              machine_owner: internal/store/agent_lifecycle_read_surface.go agentLifecycleBlockingLayer, consuming internal/runtime/deliverylifecycle.StateFromDelivery
              current:
              - {state: queued, blocking_layer: delivery_queue, state_phrase: queued, layer_phrase: delivery queue}
              - {state: launching, blocking_layer: session_launch, state_phrase: launching, layer_phrase: session launch}
              - {state: active, blocking_layer: session_execution, state_phrase: active, layer_phrase: session execution}
              - {state: retrying, blocking_layer: delivery_retry, state_phrase: retrying, layer_phrase: delivery retry}
              - {state: exhausted, blocking_layer: delivery_terminal, state_phrase: exhausted, layer_phrase: delivery terminal}
              delivered_exclusion: >
                deliverylifecycle.StateDelivered is not an AgentDeliveryLifecycleState. Delivered history remains a
                DeliveryStatus and is not selected as a current/exhausted agent diagnosis fact.
            watchdog_tuples:
              machine_owner: internal/runtime/llm/session_watchdog.go plus ValidateConversationRuntimeWatchdogDescriptor
              current:
              - state: healthy_long_running
                blocking_layer: session_execution
                action: turn_long_running
                outcome: observed
                state_phrase: healthy, long-running
                layer_phrase: session execution
                action_phrase: turn running for a long time
                outcome_phrase: observed
              - state: no_output
                blocking_layer: session_execution
                action: session_no_output
                outcome: warning_emitted
                state_phrase: no output
                layer_phrase: session execution
                action_phrase: session produced no output
                outcome_phrase: warning emitted
          exact_evidence_exclusions: >
            reason_code, failure_type, subscriber type/id, event/flow/entity names and IDs, tool names, result
            payloads, and validation errors quoting invalid input remain exact evidence/addressability fields. They
            are not phrase families and MUST NOT be mechanically prettified. Canonical failure prose remains #1869.
          public_consumer_rule: >
            Every public human renderer of a registered family must call the shared projector, including identity
            phrases. Current consumers include run list/status/start/reattach/terminal/fork, run trace snapshot/detail/
            summary/follow and foreground start trace, agent list/view/diagnose/deliveries and agent ambiguity,
            bundle agents, event view/publish/replay, provider capability findings through internal/packs RenderSubject,
            and their shared row/detail writers. Validators, replay-only
            validation, event-follow counts, machine output, and the private run-fork runtime-owner harness are not
            human phrase consumers.
          vocabulary_guard:
            implementation_owner: internal/userfacing/vocabulary.go
            global_terms:
            - Wave 1
            - unified
            status_detail_terms:
            - test_
            - heuristic
            - quiescence
            - runtime_state
            - session_scope
            - blocking_layer
            - blocking_reason
            - current_session_ref
            - last_turn_ref
            - last_tool_outcome
            - next_cursor
            consumption_rule: >
              One scoped implementation registry is consumed by phrase/producer guards and the generated public
              config-example guard. Test-local duplicate forbidden lists are invalid.
      command_support:
        default_eligible_scope: >
          All implemented, non-retired CLI v2 command rows are output-mode eligible unless this contract or their
          command row declares an exception. Eligibility means a later implementation slice must either consume the
          shared output owner for the row or explicitly split the row before adding output-mode behavior.
        output_conformance_registry:
          promoted_by: '#1821'
          canonical_owner: platform-spec.yaml#cli_specification.foundations.output_contract.command_support.output_conformance_registry
          implementation_owner: cmd/swarm/cli_output_conformance_registry_test.go
          status: implemented
          rule: >
            This registry is the single living current-state authority for CLI command output-route conformance.
            Every visible command surface must be classified as exactly one of `shared_output`, `exception`, or
            `split`. The registry is a ratchet, not a migration: adding a visible command without a row fails
            closed, new commands default to `shared_output`, and any command whose output would need to change to
            pass must stay `split` with an owner issue until that owner lands.
          classification_values:
            shared_output: >
              The command consumes the shared `cmd/swarm` output-mode/color owner for successful output and, when it
              renders table/list/detail human text, consumes the shared display renderer. It accepts `--json`,
              `--quiet`, and `--no-color` through the shared helper path.
            exception: >
              The command is an explicit help/process/retired-style surface that does not consume output modes and
              is governed by an exception rule.
            split: >
              The command is implemented, but shared-output route-through, table rendering, argument formatting,
              ID resolution, vocabulary, or another output class remains tracked by a named owner issue. Split rows
              are removal candidates; they must shrink as owner children land.
          ratchet_rules:
            full_catalog_coverage: >
              The conformance guard must cover every implemented, non-retired command_catalog row and every visible
              Cobra command path. Unclassified rows fail closed.
            new_command_default: >
              New command paths must be classified as `shared_output` unless an explicit review decision adds a
              narrower exception or split owner. Exception and split growth is reviewable churn, not a silent default.
            split_owner_required: >
              A split row must cite a real owner issue. A missing canonical owner is classified as split; the guard
              must not require a missing formatter/resolver by implication.
            no_output_byte_changes: >
              This registry slice does not change command output bytes. A command that needs byte changes to pass
              remains split and is migrated under its owner issue.
          rows:
            root:
              command: swarm
              classification: exception
              exception_rule: root_help_completion
            help:
              command: swarm help
              classification: exception
              exception_rule: root_help_completion
            completion:
              command: swarm completion
              classification: exception
              exception_rule: root_help_completion
            version:
              command: swarm version
              classification: shared_output
              fact_owner: local binary metadata from injected release metadata, Go build info, and embedded platform-spec version; /v1/rpc health.check when --server is supplied
              json_shape: local binary metadata object with binary_version, module_version, platform_version, commit, built, go_version, goos, and goarch; with --server includes a server health.check object
              quiet_values:
              - binary_version
              - server_bundle_fingerprint when --server is supplied
            doctor:
              command: swarm doctor
              classification: split
              owner_issue: '#1712'
              reason: doctor has typed diagnostic output and JSON mode, but has not been migrated to the shared successful-output mode owner.
            test:
              command: swarm test
              classification: split
              owner_issue: '#1712'
              reason: deterministic scenario-runner output is implemented, but output-mode route-through remains part of the CLI output umbrella.
            workspace:
              command: swarm workspace
              classification: exception
              exception_rule: group_help
            workspace_build:
              command: swarm workspace build
              classification: split
              owner_issue: '#1712'
              reason: workspace image build emits process-progress text and has no shared output-mode owner yet.
            secrets:
              command: swarm secrets
              classification: exception
              exception_rule: group_help
            secrets_set:
              command: swarm secrets set
              classification: split
              owner_issue: '#1712'
              reason: local secret metadata output has not been migrated to the shared output-mode owner.
            secrets_list:
              command: swarm secrets list
              classification: split
              owner_issue: '#1913'
              reason: secret list table/default text consumes the shared display renderer; full shared output-mode route-through remains tracked by the active registry split-owner child.
            secrets_check:
              command: swarm secrets check
              classification: split
              owner_issue: '#1712'
              reason: manual JSON/default text remains outside the shared output-mode owner.
            secrets_rm:
              command: swarm secrets rm
              classification: split
              owner_issue: '#1712'
              reason: local secret metadata output has not been migrated to the shared output-mode owner.
            connections:
              command: swarm connections
              classification: exception
              exception_rule: group_help
            connections_connect:
              command: swarm connections connect
              classification: split
              owner_issue: '#1712'
              reason: managed-credential command output has not been migrated to the shared output-mode owner.
            connections_callback:
              command: swarm connections callback
              classification: split
              owner_issue: '#1712'
              reason: managed-credential command output has not been migrated to the shared output-mode owner.
            connections_status:
              command: swarm connections status
              classification: split
              owner_issue: '#1913'
              reason: connection status table/default text consumes the shared display renderer; full shared output-mode route-through remains tracked by the active registry split-owner child.
            connections_disconnect:
              command: swarm connections disconnect
              classification: split
              owner_issue: '#1712'
              reason: managed-credential command output has not been migrated to the shared output-mode owner.
            serve:
              command: swarm serve
              classification: exception
              exception_rule: serve_daemon_process
            run_group:
              command: swarm run # live run command group help
              classification: exception
