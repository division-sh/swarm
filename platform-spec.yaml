    mailbox.approve:
      tier: must_have
      description: >
        Approve a pending mailbox item. Triggers `mailbox.item_decided` using
        api_specification.conventions.mailbox.decision_event_routes.

        The mailbox row decision, `mailbox.item_decided` event persistence,
        delivery/replay-scope evidence, and API idempotency completion commit
        atomically. Route or publish failure fails closed without row-only
        success. Downstream subscriber/interceptor/runtime work from the
        transactional decision publish runs only after that decision transaction
        commits, or remains queued while ingress is paused.
      scope:
        required:
