        - subscriber_type
        - subscriber_id
        - status
        - attempt
        - retry_count
        - retry_eligible
        - terminal
        properties:
          delivery_id:
            $ref: '#/components/schemas/OpaqueId'
          subscriber_type:
            $ref: '#/components/schemas/SubscriberType'
          subscriber_id:
            type: string
          session_id:
            type: string
          status:
            $ref: '#/components/schemas/DeliveryStatus'
          reason_code:
            type: string
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
          attempt:
            type: integer
            minimum: 1
          retry_count:
            type: integer
            minimum: 0
          retry_eligible:
            type: boolean
          terminal:
            type: boolean
          created_at:
            $ref: '#/components/schemas/Timestamp'
          started_at:
            $ref: '#/components/schemas/Timestamp'
          finished_at:
            $ref: '#/components/schemas/Timestamp'
          dead_letters:
