              owner_issue: '#1712'
              reason: bundle build report output is not yet routed through the shared output-mode owner.
            bundle_register:
              command: swarm bundle register
              classification: shared_output
              fact_owner: /v1/rpc bundle.register
              json_shape: bundle registration result object
              quiet_values:
              - bundle_hash
            bundle_delete:
              command: swarm bundle delete
              classification: shared_output
              fact_owner: /v1/rpc bundle.delete
              json_shape: bundle delete result object
              quiet_values:
              - bundle_hash
            forkchat:
              command: swarm forkchat
              classification: exception
              exception_rule: group_help
            forkchat_new:
              command: swarm forkchat new
              classification: shared_output
              fact_owner: /v1/rpc conversation.fork and optional /v1/rpc conversation.fork_chat
              json_shape: forkchat new result object
              quiet_values:
              - fork_id
            forkchat_resume:
              command: swarm forkchat resume
              classification: shared_output
              fact_owner: /v1/rpc conversation.fork_chat
              json_shape: forkchat resume result object
              quiet_values:
              - turn_id
            forkchat_list:
              command: swarm forkchat list
              classification: shared_output
              fact_owner: /v1/rpc conversation.fork_list
              json_shape: forkchat list result object
              quiet_values:
              - fork_id, one per returned fork
            forkchat_view:
              command: swarm forkchat view
              classification: shared_output
              fact_owner: /v1/rpc conversation.fork_view
              json_shape: forkchat view result object
              quiet_values:
              - fork_id
            forkchat_delete:
              command: swarm forkchat delete
              classification: shared_output
              fact_owner: /v1/rpc conversation.fork_delete
              json_shape: forkchat delete result object
              quiet_values:
              - fork_id
            entity:
              command: swarm entity
              classification: exception
              exception_rule: group_help
            entities_list:
              command: swarm entity list
              classification: split
              owner_issue: '#1913'
              reason: entity list table/default text consumes the shared display renderer; full shared output-mode route-through remains tracked by the active registry split-owner child.
            entity_view:
              command: swarm entity view
              classification: split
              owner_issue: '#1913'
              reason: entity detail shell consumes the shared display renderer; full shared output-mode route-through remains tracked by the active registry split-owner child.
            entity_aggregate:
              command: swarm entity aggregate
              classification: split
              owner_issue: '#1913'
              reason: entity aggregate table/default text consumes the shared display renderer; full shared output-mode route-through remains tracked by the active registry split-owner child.
            logs:
              command: swarm logs
              classification: split
              owner_issue: '#1712'
              reason: logs human projection consumes the shared display and semantic projection owners; full shared JSON/quiet output-mode route-through remains tracked by the active CLI output umbrella.
            incidents:
              command: swarm incidents
              classification: split
              owner_issue: '#1913'
              reason: incident table/default text consumes the shared display renderer; full shared output-mode route-through remains tracked by the active registry split-owner child.
            context:
              command: swarm context
              classification: exception
              exception_rule: group_help
            context_current:
              command: swarm context current
              classification: split
              owner_issue: '#1712'
              reason: context output has manual JSON/default text and no shared output-mode owner yet.
            context_list:
              command: swarm context list
              classification: split
              owner_issue: '#1913'
              reason: context list table/default text consumes the shared display renderer; full shared output-mode route-through remains tracked by the active registry split-owner child.
            context_prune:
              command: swarm context prune
              classification: split
              owner_issue: '#1712'
              reason: context prune output has manual JSON/default text and no shared output-mode owner yet.
            describe:
              command: swarm describe
              classification: shared_output
              fact_owner: local authoring view
              json_shape: describe authoring view result object
              quiet_values:
              - flow ids and summary values declared by the command implementation
            describe_routes:
              command: swarm describe routes
              classification: shared_output
              fact_owner: routing-topology/v1 projection over the authored endpoint census and lowered connect plans
              json_shape: routing-topology/v1 object
              quiet_values:
              - stable route edge ids followed by stable typed route issue ids
      exception_rules:
        root_help_completion:
          commands:
          - root
          - help
          - completion
          rule: >
            Root help, help topics, and shell completion generation are default-text/script surfaces. They do not
            consume JSON/quiet output modes unless a later tracked spec row explicitly promotes that behavior.
            Unsupported output-mode flags on these surfaces fail before side effects with CLI validation exit 2.
        group_help:
          rule: >
            Group-only command paths that exist to list child commands are default-text help/navigation surfaces.
            They do not consume JSON/quiet output modes unless a later tracked command row explicitly promotes that
            behavior. Their child commands are classified independently in the output conformance registry.
        serve_daemon_process:
          commands:
          - serve
          rule: >
            `swarm serve` is a long-running process-control command. Its boot-progress text remains owned by
            serve boot observability and `--verbose`; output modes are unsupported until a later tracked serve
            output-mode row defines a machine-readable boot/readiness stream. Unsupported output-mode flags fail
            before runtime boot or active-run mutation.
        retired_namespaces:
          commands:
          - investigate
          - control_mailbox
          - fork
          - status_v1_retirement_message
          rule: >
            Retired and migration-only namespaces remain fail-closed stderr surfaces. Output modes MUST NOT
            resurrect legacy behavior, make API/runtime calls, or convert migration messages into successful
            machine-readable output.
        absent_command_rows:
          commands: []
          rule: >
            Absent or blocked command rows do not receive output-mode implementation from #848. Their future
            implementation children consume this contract only after their command/API/runtime owner is promoted.
      split_siblings:
      - '#844 universal flag/config/env precedence; config-file no_color and CLI logging behavior implementation remain split'
      - '#846 error-channel and exit-code classification; closed first slice'
      - '#839 retired namespace migration cleanup'
      - '#743 swarm run start behavior and follow semantics; output-mode implementation may consume this contract later'
      - 'absent #735 command families'
      - API/runtime method semantics
      - JSON error-body or rich structured-error output unless a later tracked child promotes it
      implementation_proof_requirements:
      - grep proof that implemented output-mode/color behavior consumes one shared cmd/swarm output owner
      - tests proving default text, JSON/NDJSON, and quiet behavior for every command row in the approved slice
      - tests proving `--no-color` and `NO_COLOR` consume the shared owner, strip ANSI from default text, and do not
        reshape JSON/quiet output
      - tests proving unsupported exception rows fail before side effects
      - stdout/stderr tests proving successful machine-readable stdout is not contaminated by diagnostics/errors
      - no direct DB/store/runtime/EventBus reads for API-backed output rendering
    cli_logging_policy:
      promoted_by: '#936'
      implementation_status: implemented for current shared-output first-slice consumers only
      canonical_owner: platform-spec.yaml#cli_specification.foundations.cli_logging_policy
      future_runtime_owner: cmd/swarm shared CLI diagnostic logging policy resolver
      scope: >
        Merge-bearing CLI v2 authority for CLI process diagnostic logging controls. This owner governs
        `--log-level` source disposition, allowed levels, command applicability, stdout/stderr separation, and
        boundaries with successful output rendering, serve boot observability, runtime log filters, and persisted
        runtime log payloads. Behavior is implemented only for the current shared-output first-slice consumers
        listed below; all other command rows remain pending or split until a later child consumes this owner.
      accepted_sources:
        flag: --log-level <debug|info|warn|error>
      source_precedence:
      - flag
      default_level: info
      allowed_levels:
      - debug
      - info
      - warn
      - error
      rejected_levels:
        fatal: >
          Not promoted for CLI process diagnostics. Runtime log payloads may carry fatal/error severity from their
          own runtime observability owner, but the CLI diagnostic flag remains bounded to debug/info/warn/error.
      rejected_sources:
        environment:
          SWARM_LOG_LEVEL: >
            Not promoted as a CLI process diagnostic source. The ignored review artifact mentions
            `SWARM_LOG_LEVEL=debug` as runtime-level debugging evidence, not as a CLI universal flag/env contract.
            If runtime/daemon logging needs environment precedence, it must be promoted by a runtime logging child,
            not by this CLI process diagnostics owner.
        config_file:
          log_level: >
            Not promoted as a config-file key by #936. Config-file logging precedence remains a later #844 child
            because the API connection/auth config owner currently rejects `log_level`, and accepting it here
            without shared config behavior would create an inert key.
      command_applicability:
        eligible_scope: >
          Future behavior may accept `--log-level` only on implemented, non-retired command rows that execute
          through the shared CLI execution context and consume the future shared diagnostic logging resolver.
          Command-local `--log-level` parsers are invalid.
        unsupported_surfaces:
        - root
        - help
        - completion
        - retired namespaces
        - blocked or absent command rows
        - command rows that have not yet been moved to the shared logging owner
        unsupported_rule: >
          Unsupported surfaces MUST fail before API/runtime calls, local verification, runtime boot, active-run
          mutation, or other side effects if `--log-level` is supplied.
        serve_boundary: >
          `swarm serve --verbose/-v` remains owned by serve boot observability and prints the numbered boot sequence
          to stdout. `--log-level` is not an alias for `--verbose/-v` in the promoted spec. A later serve logging
          child may consume this owner for process diagnostics, but it MUST NOT change the boot-progress contract
          unless the serve boot owner is explicitly updated.
      stdout_stderr_boundary: >
        CLI diagnostics controlled by `--log-level` render only to stderr. They MUST NOT contaminate successful
        stdout in default text, JSON, streaming NDJSON, or quiet modes. `--log-level` does not change exit-code
        classification, JSON error-body policy, or successful-output shape.
      output_interaction:
        json: '`--json` controls successful stdout rendering only; diagnostics remain stderr-only.'
        quiet: '`--quiet` controls successful stdout rendering only; diagnostics remain stderr-only and may still be filtered by logging level.'
        no_color: '`--no-color` and `NO_COLOR` are color controls, not logging filters. They do not change diagnostic level selection.'
      implemented_logging_policy_first_slice:
        implemented_by: '#944'
        failure_class: runtime.cli.v2.logging_resolver_for_current_shared_output_consumers
        owner: cmd/swarm shared CLI diagnostic logging policy resolver
        status: implemented
        rule: >
          These consumers accept `--log-level` through one shared CLI diagnostic logging policy resolver. The
          resolver accepts only `debug`, `info`, `warn`, and `error`, defaults to `info`, rejects invalid levels
          with CLI validation exit 2 before local/API/runtime side effects, and does not accept environment or
          config-file logging sources. This first slice closes resolver parsing, validation, defaulting,
          applicability, and stdout/stderr separation for the listed consumers only; it does not claim new
          diagnostic emission content.
        consumers:
        - version
        - verify
        - health
        - runs
        - status
        - conversations_list
        - conversation_view
        - conversation_turn
      split_siblings:
      - '#844 config-file log_level precedence'
      - '#844 universal/repeatable --verbose/-v outside serve boot observability'
      - '#848 output-mode/shared renderer implementation tails'
      - '#931 color/no-color policy; closed first slice'
      - '#884/#750 serve listener/runtime behavior'
      - '#743 swarm run start behavior and follow semantics'
      - '`swarm logs --level` and `swarm incidents --level` runtime result filters'
      - persisted runtime `log_level` payloads and runtime/daemon logging configuration
      implementation_boundaries:
      - 'This #936 first slice is source-of-truth repair only: no Cobra flags, config/env parsing, runtime logging, or command behavior change is implied.'
      - 'The #944 behavior slice implements only the current shared-output first-slice consumers listed above.'
      - 'Future implementation MUST consume the shared cmd/swarm diagnostic logging policy resolver before accepting `--log-level` on any additional command row.'
      - 'Implementation MUST prove stdout/stderr separation for JSON, quiet, default text, and diagnostics.'
      - 'Future implementation MUST keep runtime log filters and serve boot verbosity classified as separate owners unless a later spec PR deliberately changes that boundary.'
    auth_boundary: >
      Runtime-state commands use v1 bearer auth through token sources governed by
      cli_specification.foundations.api_connection_auth_config_precedence. Legacy
      `SWARM_BUILDER_AUTH_TOKEN` and `SWARM_OPERATOR_AUTH_TOKEN` fallback is invalid.
    local_target_resolution_authority:
      promoted_by: '#1612'
      implementation_status: implemented_first_slice
      canonical_owner: platform-spec.yaml#cli_specification.foundations.local_target_resolution_authority
      implementation_owner: cmd/swarm local target diagnostic resolver
      scope: >
        Merge-bearing authority for local Swarm target/source explanation: the Swarm user/global state directory,
        project-root facts derived from the existing contracts resolver, target precedence, command-class safety, and
        the first inspection surface `swarm doctor --target`. This first slice is an authority and diagnostic surface
        only. Runtime identity and local context registry primitives are promoted separately under
        local_context_registry_authority. #1614 consumes those primitives for TCP project-scoped `serve --dev`
        registration and current API-backed command targeting. This owner still does not migrate store/data paths,
        change `swarm run start` default/foreground behavior, or implement IPC/unix dialing policy.
      invariant: >
        You target the project you are in. If you are not in a project, or the project has no live known runtime after
        the registry children exist, Swarm may use the selected/default context or built-in loopback target according to
        command-class safety. Swarm MUST NOT silently guess between two live runtimes, and supported target diagnostics
        MUST show what was selected and why.
      swarm_dir:
        accepted_sources:
          flag: --swarm-dir <path>
          config_key: paths.swarm_dir
          built_in_default: ~/.swarm
        source_order:
        - --swarm-dir
        - config paths.swarm_dir
        - default ~/.swarm
        rejected_sources:
          --datadir: Not promoted; too easily confused with the agent-visible `--data` directory.
          SWARM_DIR: Not promoted in this slice; adding environment state-dir authority requires a later gate.
          SWARM_HOME: Not promoted in this slice; adding environment state-dir authority requires a later gate.
          '<swarm-dir>/config.yaml': >
            Not a bootstrap config owner. Static bootstrap config remains governed by
            configuration_source_authority.unified_swarm_config.
        normalization_rule: >
          Explicit relative `--swarm-dir` and config `paths.swarm_dir` paths are resolved to clean absolute filesystem paths
          without creating the directory. Blank explicit values fail closed before target diagnostics or runtime action.
      project_root_resolution:
        source_owner: cli_specification.foundations.contract_platform_spec_path_resolution
        rule: >
          Project-root facts are derived from the resolved contracts source. If the resolved contracts root is named
          `contracts`, the project root is its parent; otherwise the contracts root itself is the project root. The
          canonical project key uses the realpath of that root when available. #1614 uses this canonical project key
          for TCP local context registration, project descriptor lookup, and project-first API command targeting.
        no_project_rule: >
          If no contracts source is resolved, target diagnostics report no project source. Runtime command behavior is
          not changed by #1612.
      target_precedence:
        source_order:
        - explicit_api_flags
        - explicit_context_flag
        - live_project_scoped_context
        - known_dead_or_stale_project_context_fail_closed
        - selected_or_default_global_context
        - existing_api_config
        - built_in_loopback_default
        current_behavior: >
          `swarm doctor --target` explains explicit API flag, config, project-root, Swarm-dir, current
          rollout store/data, and local context registry/identity facts. API-backed commands consume the same target
          order through the shared CLI API resolver after #1614 and #1636. Client-side `SWARM_API_SERVER`,
          `SWARM_API_TOKEN`, and `SWARM_API_TOKEN_FILE` are not target/auth sources. Unavailable facts MUST be reported as unavailable
          rather than inferred from PID, port, URL, or health bundle fingerprint. A project context may be selected
          implicitly only when exactly one descriptor exists for the canonical project root and that descriptor validates
          `ok`; mixed live/stale or otherwise non-ok project descriptors fail closed.
      command_classes:
        target_diagnostic:
          status: implemented
          commands:
          - swarm doctor --target
          fallthrough: not_applicable
        read_only_inspection:
          status: implemented_#1614
          commands:
          - swarm run list
          - swarm run status
          - swarm run trace
          - swarm logs
          - swarm health
          - swarm incidents
          - swarm version --server
          - swarm event list
          - swarm event follow
          - swarm event view
          - swarm bundle list
          - swarm bundle show
          - swarm bundle agents
          - swarm agent list
          - swarm agent deliveries
          - swarm agent diagnose
          - swarm agent view
          - swarm conversation list
          - swarm conversation view
          - swarm conversation turn
          - swarm entity list
          - swarm entity view
          - swarm entity aggregate
          - swarm mailbox list
          - swarm mailbox view
          - swarm forkchat list
          - swarm forkchat view
          fallthrough: >
            May use selected/global/default target only outside a project or when a project has no known context. A
            stale, mismatched, corrupt, permission-denied, or multiple-live project context fails closed rather than
            silently falling through.
        mutating_runtime_state:
          status: implemented_#1614
          commands:
          - swarm event publish
          - swarm event replay
          - swarm agent restart
          - swarm agent replay
          - swarm agent replay-backlog
          - swarm agent directive
          - swarm bundle register
          - swarm bundle delete
          - swarm mailbox approve
          - swarm mailbox reject
          - swarm mailbox defer
          - swarm run fork
          - swarm forkchat new
          - swarm forkchat resume
          - swarm forkchat delete
          fallthrough: >
            Must not fall through to selected/global/default from inside a project with no live project context. Requires
            an explicit target or a live project-scoped context.
        control_destructive:
          status: implemented_#1614
          commands:
          - swarm control pause
          - swarm control continue
          - swarm control stop
          - swarm control nuke
          fallthrough: >
            Requires explicit or unambiguous selected target plus existing command confirmation rules. Must not fall
            through to selected/global/default from inside a project with no live project context.
        startup_and_run:
          status: implemented
          commands:
          - swarm serve --dev
          - swarm run start
          fallthrough: >
            `serve --dev` registers a project-scoped TCP context after a pre-bind project claim and after the final API
            target/runtime_instance_id are known. Default foreground `swarm run start` consumes the same local runtime state
            authority and project live-runtime guard; it fails closed inside a project that already has a live runtime
            unless the user targets that runtime explicitly through connected API mode.
      doctor_target_surface:
        command: swarm doctor --target [--json] [--swarm-dir <path>] [--api-server <url>] [--api-token-file <path>]
        output_owner: cli_specification.foundations.output_contract
        behavior: >
          The target mode is a fast, read-only diagnostic. It MUST NOT require backend preflight, start runtime, read a
          runtime DB, write local state, create the Swarm-dir, create `.swarm/data`, trust descriptors, or mutate other
          command JSON payloads. Human output renders only to stdout on success. `--json` renders one structured target
          report to stdout and emits no success stderr. `--quiet` is not supported by this first slice and remains
          fail-closed as an unknown/unsupported flag.
      split_siblings:
      - '#1614 project-scoped serve/API command targeting (implemented)'
      - '#1615 store/data migration and swarm run start semantics (implemented)'
      - '#1576 transport-aware descriptors and IPC/ephemeral-port direction'
      implementation_boundaries:
      - 'The unified config parser may accept `paths.swarm_dir`, but API connection/auth resolution must ignore it.'
      - 'No `SWARM_DIR`, `SWARM_HOME`, `--datadir`, or `<swarm-dir>/config.yaml` bootstrap source is promoted.'
      - 'Descriptor registry primitives are written and validated only through local_context_registry_authority.'
      - 'API-backed commands consume project/global contexts through the shared #1614 CLI API target resolver only.'
      - 'Store/data/run startup decisions consume local_runtime_state_authority; API-backed connected commands do not start local stores or workspace data.'
    local_runtime_state_authority:
      promoted_by: '#1615'
      implementation_status: implemented
      canonical_owner: platform-spec.yaml#cli_specification.foundations.local_runtime_state_authority
      implementation_owner: cmd/swarm local runtime state resolver
      scope: >
        Merge-bearing authority for local runtime store path, agent-visible data source defaulting, descriptor store/data
        metadata, doctor target reporting, and foreground `swarm run start` local-start admission. It closes the previous
        asymmetry where store/data could resolve from cwd while command targeting resolved through project/global context
        selection.
      invariant: >
        Explicit store/data/backend inputs win. Otherwise, if the command is in a real project whose canonical contracts
        project root matches the active repo root, local state is project-local. If there is no project, Swarm-dir
        managed store state is allowed but workspace data must be explicit. If contracts point at a borrowed project
        outside the active repo root, Swarm MUST NOT write `.swarm` state into that borrowed tree.
      project_resolution:
        owner: cli_specification.foundations.contract_platform_spec_path_resolution
        local_project_rule: >
          A project is project-local only when the resolved contracts-derived project root canonicalizes to the active repo
          root or a directory under it. Explicit `--contracts` paths outside the active repo root are borrowed-project inputs.
      store_resolution:
        sqlite_source_order:
        - store.sqlite.path
        - project_default_or_swarm_dir_default
        retired_environment: SWARM_SQLITE_PATH
        project_default: <project-root>/.swarm/stores/dev.db
        no_project_default: <swarm-dir>/stores/default/dev.db
        borrowed_project_default: <swarm-dir>/stores/projects/<project-key>/dev.db
        legacy_rule: >
          If `<project-root>/.swarm/dev.db` exists and the canonical `<project-root>/.swarm/stores/dev.db` does not,
          startup must fail closed with both paths and remediation instead of silently orphaning the old DB.
        postgres_rule: >
          Explicit Postgres backend selection remains governed by runtime_store_backend_selection and bypasses SQLite
          path defaults.
      data_resolution:
        source_order:
        - --data
        - workspace.data_source
        - workspace.volumes_from deployment alternate
        - project_default
        project_default: <project-root>/.swarm/data
        rule: >
          The project default is created with mode 0755 only for a project-local root. No-project and borrowed-project
          local startup fail closed unless an explicit data source or deployment alternate is selected.
      run_startup_rule: >
        Default foreground `swarm run start` starts a descriptorless local runtime only after the same project live-runtime
        guard used by `serve --dev`. A live project context blocks local foreground startup with guidance to use
        connected targeting or stop the existing runtime. Connected and reattach paths are API-owned and MUST NOT start
        local store/data.
      consumers:
      - swarm serve startup
      - local foreground `swarm run start` startup
      - workspace data source selection and local preflight validation
      - runtime store selection before store construction
      - serve --dev context descriptor store_path/data_dir metadata
      - swarm doctor --target dry-run diagnostics
    local_context_registry_authority:
      promoted_by: '#1613'
      implementation_status: implemented_primitive_registry
      canonical_owner: platform-spec.yaml#cli_specification.foundations.local_context_registry_authority
      implementation_owner: cmd/swarm local context registry helpers and lifecycle commands
      scope: >
        Merge-bearing authority for local context descriptor storage under the resolved Swarm-dir, descriptor schema,
        selected/current context storage, atomic registry writes, descriptor validation taxonomy, and minimal lifecycle
        inspection/cleanup. It provides primitives that #1614 may consume for project/global command targeting, but it
        does not itself change serve registration or API-backed command resolution.
      registry_layout:
        root: <swarm-dir>/contexts
        descriptors: <swarm-dir>/contexts/<context-name>.json
        current_selector: <swarm-dir>/contexts/current
        lock: <swarm-dir>/contexts/.lock
        project_claims: <swarm-dir>/contexts/.project-claims/<hash>.claim
        name_rule: >
          Context names are trimmed UTF-8 strings that cannot be empty, '.', '..', contain path separators, contain NUL,
          or start with '.'. #1614 auto-generates project context names from the project basename plus a short hash of
          the canonical project-root realpath when `serve --dev --context` is not supplied.
      descriptor_schema:
        version: 1
        required_fields:
        - version
        - name
        - runtime_instance_id
        - transport
        - created_at
        - updated_at
        transport:
          supported_values:
          - tcp
          - unix
          tcp_required_field: api_server
          unix_required_field: socket_path
          current_implementation: >
            tcp descriptors can be validated by calling /v1/rpc runtime.identity. unix descriptors are schema-valid
            but validation classifies them as unsupported until #1576 promotes IPC dialing policy.
        safe_auth:
          allowed_modes:
          - builtin_loopback
          - token_file
          rejected: inline bearer tokens, token strings, environment-token snapshots, or descriptor-local secret values
          builtin_loopback_rule: >
            builtin_loopback is accepted only for numeric loopback TCP API targets where the existing API auth owner
            permits the built-in default token. Non-loopback targets require token_file.
        optional_fields:
        - project_root
        - contracts_path
        - store_path
        - data_dir
        - pid
        path_fields: >
          Path fields are explanatory metadata only in this child. Store/data migration and project registration are split
          to #1615 and #1614.
      atomicity:
        rule: >
          Registry mutations acquire the registry lock, write complete JSON/text to a temporary file in the registry
          directory, fsync-or-equivalent that file, rename it over the destination, and best-effort fsync the directory.
          Lock contention, permission denial, and partial/corrupt files fail closed.
        project_claim_rule: >
          `serve --dev` acquires a project-claim file before listener binding and runtime-store side effects, then writes
          the final descriptor only after the API listener address and runtime_instance_id are known. Failed startup
          releases the claim and must not leave a descriptor selected as current. `serve --dev` may reclaim an existing
          same-project descriptor only when runtime.identity validation proves it is dead, stale, or identity-mismatched;
          live, permission-denied, corrupt, invalid, or otherwise ambiguous project descriptors fail closed instead of
          being silently overwritten. Explicit `serve --dev --context <name>` MUST also reject any existing descriptor
          with that global context name from another project.
      validation_statuses:
      - ok
      - no_server
      - stale_descriptor
      - identity_mismatch
      - unsupported_transport
      - auth_failure
      - permission_denied
      - corrupt_descriptor
      - invalid_descriptor
      lifecycle_surface:
        commands:
        - swarm context current
        - swarm context list
        - swarm context prune
        doctor_consumption: swarm doctor --target reports registry and runtime identity facts using these primitives
        output_owner: cli_specification.foundations.output_contract
      implementation_boundaries:
      - '`serve --dev` project-scoped TCP descriptor registration is consumed by #1614; non-dev serve registration remains unpromoted.'
      - 'API-backed command target resolver consumes context descriptors through #1614 only.'
      - 'No runtime store/data path migration or `swarm run start` behavior change in #1613; #1615 owns that behavior.'
      - 'No unix socket dialing policy in #1613; #1576 owns actual IPC transport behavior.'
    repo_dotenv_source_authority:
      promoted_by: '#1635'
      implementation_status: implemented
      canonical_owner: platform-spec.yaml#cli_specification.foundations.repo_dotenv_source_authority
      scope: >
        Merge-bearing authority for repository `.env` files as local CLI command input. Repo `.env` files are
        non-authoritative for Swarm production and user-facing command startup. Commands MUST NOT implicitly read,
        parse, or import repo `.env` values into the process environment. Public repository templates and docs MUST
        present config files for durable non-secret settings and `swarm secrets`/token files for credentials rather
        than teaching `.env` as normal Swarm setup.
      applies_to:
      - '`swarm serve` startup.'
      - 'local foreground `swarm run start` startup.'
      - '`swarm verify` local contract validation.'
      - '`swarm run fork` runtime-owner harness.'
      - 'default `swarm doctor` diagnostics.'
      - '`swarm describe` local authoring view rendering.'
      - '`swarm secrets set`, `swarm secrets list`, `swarm secrets check`, and `swarm secrets rm`.'
      source_rule: >
        A repo `.env` file MAY exist for external tools, but Swarm commands treat it as ordinary project data and
        never as an implicit configuration, secret, target, path, or runtime-binding source. Malformed repo `.env`
        contents MUST NOT fail Swarm commands unless a future explicitly gated env-file feature names the file as
        command input.
      explicit_process_env_boundary: >
        This owner does not deauthorize process environment variables that are already present when Swarm starts.
        Direct environment sources such as `SWARM_API_SERVER`, `SWARM_API_TOKEN`, `SWARM_CONTRACTS_PATH`, store and
        database variables, provider credential variables, workspace/bootstrap variables, and final-boundary tooling
        variables remain governed by their specific source-authority owners and #1600 sibling issues.
      replacement_setup:
        non_secret_settings: generated swarm.example.yaml guidance
        credentials: '`swarm secrets set|check|list|rm` and token-file sources where explicitly owned'
      rejected_sources:
        repo_dotenv_autoload: >
          Not promoted. Implicit repo dotenv loading is hidden mutable source authority and can shadow config,
          secrets, contexts, token files, and runtime bindings.
      implementation_boundaries:
      - 'No direct process-env precedence migration is implied by #1635; #1636-#1640 own those sibling migrations.'
      - 'No provider credential migration to the secrets store is implied by #1635; #1638 owns that migration.'
      - 'No explicit `--env-file` or dotenv compatibility shim is promoted.'
    api_connection_auth_config_precedence:
      promoted_by: '#844'
      loopback_default_implemented_by: '#1124'
      client_env_removed_by: '#1636'
      implementation_status: implemented_loopback_default_no_client_env_sources
      canonical_owner: platform-spec.yaml#cli_specification.foundations.api_connection_auth_config_precedence
      scope: >
        Merge-bearing authority for CLI API base URL selection, bearer-token selection, and CLI config-file
        discovery for API-backed commands. API-backed command leaves consume `--api-server`, `--api-token-file`,
        project/selected context descriptors, unified `swarm.yaml` connection config, and built-in defaults
        through one shared resolver. `SWARM_API_SERVER`, `SWARM_API_TOKEN`, and `SWARM_API_TOKEN_FILE` are removed as
        client-side API target/auth sources and fail closed with replacement guidance when present. When no explicit
        token source is configured, the shared resolver may
        use the fixed built-in dev API token only for numeric loopback API targets. This contract does not add OpenRPC behavior, retry behavior,
        output rendering, inline token flags, or serve listener binding.
      applies_to:
      - Runtime-state CLI commands that call the platform JSON-RPC or WebSocket API.
      - '`swarm version --server` when it queries the platform API.'
      - '`swarm run start --connect` only for shared API client/auth error categories; run mode and follow semantics remain #743.'
      not_applies_to:
      - '`swarm serve` runtime configuration except for shared unified config discovery and the `connection.*` handoff.'
      - '`swarm verify` contract-file validation, except for contract/platform-spec path resolution governed by
        cli_specification.foundations.contract_platform_spec_path_resolution.'
      - Output mode, logging verbosity, retry, and color.
      precedence_order:
      - flag
      - context_descriptor
      - config_file
      - built_in_default
      api_server:
        accepted_sources:
          flag: --api-server <url>
          context_descriptor: project/selected context descriptor api_server
          config_key: connection.api_server
          built_in_default: http://127.0.0.1:8081
        rejected_sources:
          SWARM_API_SERVER: >
            Removed by #1636. Client-side API target env is hidden mutable source authority; use `--api-server`,
            `--context`, a project/selected context, or config `connection.api_server`.
        value_model: >
          The configured value is an API server base URL, not a direct `/v1/rpc` endpoint. It MUST include an
          `http` or `https` scheme and host, MUST NOT include query or fragment components, and SHOULD use an
          empty path or `/`. API clients derive `/v1/rpc` and `/v1/ws` from that base URL per the command's
          transport needs.
        rationale: >
          The ignored review artifact used `http://localhost:8081`; the promoted spec uses `127.0.0.1` to
          match serve listener loopback defaults and avoid hostname/IPv6 ambiguity. API-backed command users
          configure the base URL; the client derives concrete transport endpoints from this owner.
      api_token:
        accepted_sources:
          flag_file: --api-token-file <path>
          context_descriptor: project/selected context descriptor auth
          config_file_key: connection.api_token_file
        source_order:
        - --api-token-file
        - context descriptor auth
        - config connection.api_token_file
        - built-in loopback default
        rejected_sources:
          SWARM_API_TOKEN: >
            Removed as a client-side API token source by #1636. Use `--api-token-file`, context descriptor auth, or
            config `connection.api_token_file`. Server-side `swarm serve` API auth source ownership is a separate seam
            tracked by #1647.
          SWARM_API_TOKEN_FILE: >
            Removed as a client-side API token-file source by #1636. Use `--api-token-file`, context descriptor auth,
            or config `connection.api_token_file`.
          --api-token: >
            Not promoted. Inline token flags leak secrets into shell history and process listings; operators
            must use token-file, context descriptor, or future secure-source owners for file-backed credentials.
          config api_token: >
            Not promoted. The config file may point at a token file but MUST NOT store the bearer token inline.
        token_file_rule: >
          Token-file sources are read once during CLI command startup by the API client/auth resolver. Missing,
          unreadable, or blank token-file contents classify through the shared CLI error/exit-code contract and
          MUST NOT fall back to the built-in loopback default.
        built_in_loopback_default:
          token_value: swarm-dev-loopback-api-token
          source: built-in-loopback-default
          applies_when: >
            Applies only after `--api-token-file`, context descriptor auth, and config `connection.api_token_file` are all
            absent, and only when the API target host is numeric loopback.
          allowed_target_hosts:
          - 127.0.0.0/8
          - ::1
          rejected_without_explicit_token:
          - localhost
          - 0.0.0.0
          - '::'
          - wildcard, empty, routable IP, and DNS hosts
          no_auth_bypass_rule: >
            The default is a bearer token value, not a no-auth mode. CLI requests still send
            `Authorization: Bearer <token>` and the v1 API handler still validates the bearer value.
      cli_config_file:
        owner: platform-spec.yaml#cli_specification.foundations.api_connection_auth_config_precedence.cli_config_file
        unified_config_supersession: >
          #1804 superseded this flat CLI config-file model with
          configuration_source_authority.unified_swarm_config. #1858 implements the parser/discovery first slice:
          global `--config` and `SWARM_CONFIG` select a unified `swarm.yaml`, user-global config is
          `${XDG_CONFIG_HOME:-$HOME/.config}/swarm/swarm.yaml`, and old flat `config.yaml` discovery is invalid.
        accepted_sources:
          flag: --config <path>
          environment: SWARM_CONFIG locator only when --config is absent
          xdg_default: '${XDG_CONFIG_HOME:-$HOME/.config}/swarm/swarm.yaml'
        rejected_sources:
          '${XDG_CONFIG_HOME:-$HOME/.config}/swarm/config.yaml': >
            Flat CLI config discovery is retired by #1858. Move values to unified `swarm.yaml` under `connection`,
            `serve`, or `paths`.
          executable_adjacent_config.yaml: >
            Executable-adjacent runtime config is ambient file authority and is retired by #1858. Use global
            `--config`, `SWARM_CONFIG`, `.swarm/swarm.yaml`, `./swarm.yaml`, or user-global `swarm.yaml`.
        accepted_keys:
          connection.api_server: API server base URL consumed by API-backed commands.
          connection.api_token_file: Path to a file containing the bearer token.
        shared_non_api_keys:
          paths.swarm_dir: >
            Accepted by the shared CLI config parser for
            cli_specification.foundations.local_target_resolution_authority; ignored by the API connection and auth
            resolver.
          paths.contracts_path: >
            Accepted by the shared CLI config parser for
            cli_specification.foundations.contract_platform_spec_path_resolution; ignored by the API connection
            and auth resolver.
          paths.platform_spec_path: >
            Accepted by the shared CLI config parser for
            cli_specification.foundations.contract_platform_spec_path_resolution; ignored by the API connection
            and auth resolver.
          serve.api_listen_addr: >
            Accepted by the shared CLI config parser for
            cli_specification.command_catalog.serve.listener_topology_v2_1.source_precedence; ignored by the API
            connection and auth resolver.
          serve.mcp_listen_addr: >
            Accepted by the shared CLI config parser for
            cli_specification.command_catalog.serve.listener_topology_v2_1.source_precedence; ignored by the API
            connection and auth resolver.
          serve.api_token_file: >
            Accepted by the shared CLI config parser for
            cli_specification.command_catalog.serve.listener_topology_v2_1.source_precedence.server_api_auth; ignored
            by the API connection and auth resolver. This key is server-side `swarm serve` auth only and MUST NOT be
            consumed as client API auth.
        rejected_keys:
          api_token: Inline bearer tokens in config files are not promoted.
          output_format: Split to #848 output renderer implementation.
          no_color: >
            Not promoted as a config-file key by #931. #931 accepts only `--no-color` and non-empty `NO_COLOR`
            through the shared output owner for current first-slice consumers.
          log_level: >
            Not promoted as a config-file key by #936. `--log-level` flag authority is promoted in
            cli_specification.foundations.cli_logging_policy, but config-file `log_level` precedence remains a
            later #844 child.
          retry: Split to retry policy work.
      serve_listener_env_config_boundary:
        rejected_ports:
          SWARM_API_PORT: 'Not promoted; final v2.1 listener topology uses full listen addresses.'
          SWARM_MCP_PORT: 'Not promoted; final v2.1 listener topology uses full listen addresses.'
        rejected_listener_environment:
          SWARM_API_LISTEN_ADDR: 'Retired by #1891. Use `swarm serve --api-listen-addr` or config `serve.api_listen_addr`.'
          SWARM_MCP_LISTEN_ADDR: 'Retired by #1891. Use `swarm serve --mcp-listen-addr` or config `serve.mcp_listen_addr`.'
        rule: >
          API client connection settings and serve listener bind settings are different concepts. This owner
          governs where CLI clients connect; the shared config parser accepts listener keys for the serve topology
          owner, but the API connection/auth resolver MUST ignore listener env/config keys.
      split_siblings:
      - '#848 output modes/shared renderer; spec promoted, implementation pending'
      - '#846 error-channel and exit-code classification; closed first slice'
      - '#844 later behavior child for API config/auth resolver implementation'
      - '#1636 client-side API target/auth env removal'
      - '#1647 server-side swarm serve API token secure-source ownership'
      - '#884/#750 serve listener enable-disable controls and runtime topology siblings'
      - '#743 swarm run start behavior and follow semantics'
      - '`--no-retry` retry policy'
      implementation_boundaries:
      - 'API-backed command leaves consume one cmd/swarm resolver for this owner.'
      - 'Client-side `SWARM_API_SERVER`, `SWARM_API_TOKEN`, and `SWARM_API_TOKEN_FILE` are invalid sources after #1636.'
      - 'Server-side `swarm serve` API auth token sourcing remains split to #1647.'
      - 'Global --config is implemented only as unified config-file selection; no inline --api-token, OpenRPC, output renderer, retry, or listener behavior changes are implied by this owner.'
      - 'Future API-backed CLI commands MUST consume this owner rather than the ignored review artifact.'
    contract_platform_spec_path_resolution:
      promoted_by: '#844'
      implementation_status: implemented
      canonical_owner: platform-spec.yaml#cli_specification.foundations.contract_platform_spec_path_resolution
      scope: >
        Merge-bearing CLI v2 authority for selecting the local workflow contract bundle path and the platform
        spec YAML path. This owner covers the currently implemented local file-contract surfaces only: `swarm
        verify`, `swarm serve`, and local foreground `swarm run start` before it starts the serve owner. It does not add
        API connection behavior, OpenRPC methods, serve listener binding, retry/follow
        policy, output rendering, or absent command families.
      applies_to:
      - '`swarm verify` local contract-file validation.'
      - '`swarm serve` runtime boot bundle loading.'
      - 'local foreground `swarm run start` as a consumer of serve startup.'
      not_applies_to:
      - '`swarm run start --connect` because connected run consumes an existing server and MUST NOT accept local
        contract/platform-spec path overrides.'
      - '`swarm run start --reattach` because reattach consumes existing run/server state and MUST NOT accept local
        contract/platform-spec path overrides.'
      - 'inline `--api-token`, API auth/config resolver behavior, output/color/logging, retry/follow, and serve
        listener/runtime binding.'
      contracts_path:
        accepted_sources:
          flag: --contracts <path>
          environment: SWARM_CONTRACTS_PATH
          config_key: paths.contracts_path
          discovered_default: repo-local contracts/package.yaml when present
        source_order:
        - --contracts
        - SWARM_CONTRACTS_PATH
        - config paths.contracts_path
        - repo contracts/package.yaml
        rejected_sources:
          SWARM_CONTRACTS_DIR: >
            Not a CLI source. This legacy internal runtime contracts helper environment name MUST NOT compete with
            the promoted CLI resolver. If it remains for non-CLI internals, supported CLI surfaces must bypass it.
        missing_source_rule: >
          If no source yields a contracts root and repo discovery does not find `contracts/package.yaml`, the
          command fails closed during local contract resolution with the promoted missing-contracts-source error.
          There is no implicit contracts root default without a discovered package file.
        explicit_source_validation_rule: >
          Values from `--contracts`, `SWARM_CONTRACTS_PATH`, and config `paths.contracts_path` are explicit operator
          inputs. After normal relative-path resolution, the resolver MUST validate the named value itself as either
          a directory containing `package.yaml` or that directory's `package.yaml` file shorthand. It MUST NOT walk
          upward or fall back to a parent directory to satisfy a typo/non-root child path. Repo-local
          `contracts/package.yaml` discovery remains the only discovered default.
      platform_spec_path:
        accepted_sources:
          flag: --platform-spec <path>
          config_key: paths.platform_spec_path
          built_in_default: platform-spec.yaml
        source_order:
        - --platform-spec
        - config paths.platform_spec_path
        - embedded tracked platform spec
        rejected_sources:
          SWARM_PLATFORM_SPEC_PATH: >
            Not promoted. Platform spec path selection is intentionally flag/config/default only; adding an env
            source would create untracked source precedence and must be separately gated.
        default_rule: >
          The built-in default is the tracked platform spec embedded into the installed `swarm` binary at compile time
          from `platform-spec.yaml`; it MUST NOT require source checkout,
          repo-root discovery, or a `go.mod` walk. Implementations may materialize the embedded bytes to an internal
          cache path for path-based readers, but that materialized path is not a user-facing config source. Relative
          explicit/config values are resolved against the repo root when one is available; without a repo root they use
          normal filesystem semantics from the current working directory. Absolute values are preserved.
      cli_config_file:
        shared_parser: >
          Global `--config`, `SWARM_CONFIG`, and user-global/project/local-operator `swarm.yaml` discovery are owned by
          configuration_source_authority.unified_swarm_config. The parser accepts this owner's `paths.*` keys plus
          API connection/auth keys, while each semantic resolver consumes only its own keys.
        unified_config_supersession: >
          #1804 moved `contracts_path` and `platform_spec_path` under the unified config model's `paths` section.
          #1858 implements the parser/discovery first slice and rejects old flat keys with migration guidance.
        accepted_keys:
          paths.contracts_path: Consumed only by this contract path resolver.
          paths.platform_spec_path: Consumed only by this platform spec path resolver.
        rejected_keys:
          SWARM_CONTRACTS_DIR: Environment variable, not config-file key, and not a CLI source.
          SWARM_PLATFORM_SPEC_PATH: Environment variable, not config-file key, and not promoted.
      implementation_boundaries:
      - 'verify consumes this resolver before local contract bundle loading.'
      - 'serve consumes this resolver before runtime boot bundle loading.'
      - 'local foreground run consumes this resolver before starting the serve owner.'
      - 'connected run and run --reattach reject local contract/platform-spec path flags and do not consume this owner.'
      - 'The API auth/config resolver may share config parsing but must ignore contracts_path and platform_spec_path.'
      - 'Unsupported config keys still fail closed; accepting this owner’s path keys must not silently accept output, logging, retry, serve listener, or inline token keys.'
      - 'SWARM_CONTRACTS_DIR may remain only for non-CLI internals and must not affect supported CLI surfaces.'
    error_channel_and_exit_code_contract:
      implemented_by: '#846'
      scope: >
        First-slice normalization for currently implemented API-backed CLI commands. This applies to diagnostics/read
        paths, mailbox list/view/decisions, version --server, agents list/view, agent mutations, control commands, event
        list/follow/view/replay/publish, entity list/view/aggregate, and swarm run start shared API/client failures. Future
        command families consume this contract when their API-backed implementation is promoted. This contract consumes
        `cli_specification.foundations.output_contract.diagnostic_convention.exit_code_taxonomy` for global exit-code
        classes and declares narrower API-backed command exceptions.
      canonical_owner: cmd/swarm shared CLI API error classifier
      stdout_rule: >
        stdout is reserved for successful load-bearing command output. API/client/runtime errors, malformed API
        responses, validation failures, and retired-namespace migration messages render to stderr.
      root_fallback_rule: >
        The root Cobra fallback keeps exit 2 for CLI syntax, misuse, invalid args, retired aliases, and other no-API-call
        validation paths. Implemented API-backed commands MUST classify shared API/client/runtime errors before returning;
        they MUST NOT leak missing-token, HTTP/RPC auth, transport, JSON-RPC envelope, malformed result, or known
        application-code errors into the root fallback.
      exit_codes:
        success: 0
        unexpected_or_internal_failure: 1
        cli_validation_or_misuse_before_api_call: 2
        runtime_transport_readiness_or_malformed_api: 3
        auth_or_missing_token: 4
        resource_not_found: 5
        resource_state_or_conflict: 6
        run_terminal_failed_or_cancelled: 7
        interrupted_or_detached: 130
      shared_classification:
        missing_swarm_api_token: 4
        http_401_or_403: 4
        json_rpc_application_code_UNAUTHORIZED: 4
        known_resource_not_found_application_codes: 5
        known_resource_state_or_idempotency_conflict_application_codes: 6
        transport_errors_http_non_auth_json_rpc_envelope_errors_unknown_rpc_codes_and_malformed_success_payloads: 3
      standard_json_rpc_error_rendering: >
        Standard JSON-RPC errors that do not carry an application-level `data.code` still render diagnostic context on
        stderr. API-backed CLI commands MUST include the top-level JSON-RPC numeric code, message, `data.correlation_id`,
        and structured `data.details` when the server supplies them; they MUST NOT collapse `-32603` to the bare string
        `internal error`.
      command_local_preservation: >
        Commands may define resource-specific not-found and conflict application-code sets, and `swarm run start` preserves
        terminal workflow exit 7 and interrupt/detach exit 130. Those command-local helpers still delegate shared
        API/client categories to the canonical classifier.
      split_siblings:
      - '#844 universal flag/config/env precedence'
      - '#848 --json/--quiet/output renderer normalization'
      - '#839 retired namespace migration cleanup'
      - 'absent #735 command families'
      - API/runtime method semantics
  tiers:
    must_have: 'Closure-gate command set for the promoted CLI v2 catalog.'
    should_have: 'Subsequent slices and backlog commands; each still requires a gated implementation child before code changes.'
  command_catalog:
    root:
      command: swarm
      tier: must_have
      implementation_status: implemented
      behavior: print root help on no args, exit 0
    help:
      command: swarm help [topic]
      group: utilities
      tier: must_have
      implementation_status: implemented
      owner: Cobra help command
    completion:
      command: swarm completion <bash|zsh|fish|powershell>
      group: utilities
      tier: must_have
      implementation_status: implemented
      owner: Cobra completion generation
    version:
      command: swarm version [--server]
      group: getting_started
      tier: must_have
      implementation_status: implemented
      local_owner: local binary metadata resolver
      server_owner: /v1/rpc health.check
      behavior: '`swarm version` prints local binary identity and performs no API call. Local binary identity resolves injected release metadata first, Go module/VCS build info second, and deterministic dev/unknown fallbacks last. `swarm version --json` additionally exposes module_version and platform_version as separate fields; platform_version is the embedded root platform-spec.yaml platform.version. `swarm version --server` first queries `/v1/rpc health.check`, then prints the same local binary identity followed by a `Server:` section containing v1 server bundle/runtime identity from health.check.'
      output_contract:
        local:
        - Swarm <binary-version>
        - 'Commit: <binary-commit>'
        - 'Built: <binary-build-date>'
        - 'Go: <go-version> <goos>/<goarch>'
        server_flag:
          source: /v1/rpc health.check
          rendering:
          - local output block first
          - 'Server:'
          - alive=<bool> ready=<bool> db_ok=<bool> runtime_ok=<bool>
          - bundle fingerprint=<fingerprint> workflow_name=<workflow-name-or-dash> workflow_version=<workflow-version-or-dash>
          forbidden_claims:
          - remote server binary version
          - remote server commit
          - remote server build date
          - server-local bundle path
    doctor:
      command: swarm doctor [--backend claude_cli] [--target] [--contracts <path>] [--json]
      group: getting_started
      tier: should_have
      implementation_status: implemented
      owner: cli_specification.foundations.local_claude_cli_preflight_admission; target mode owner cli_specification.foundations.local_target_resolution_authority
      behavior: >
        Default mode reports typed local prerequisite findings for the selected backend without starting runtime or
        reading/writing runtime DB state. For `claude_cli`, the command checks backend selector authority, applies backend
        credential authority only when the selected source declares agents, checks selected contract source when provided,
        contract-required secrets through the credential store, Docker/workspace image/Claude CLI availability through the
        workspace lifecycle owner, API/MCP listener availability, and stale MCP gateway env values through the serve startup
        owner. `--target` is a separate fast local-target diagnostic mode owned by
        cli_specification.foundations.local_target_resolution_authority; it reports Swarm-dir, project-root, API target,
        pending context/identity facts, current store/data facts, command classes, and split siblings without backend
        preflight or local state writes. Human typed findings render through the shared typed diagnostic list renderer
        as `[BLOCKER]`, `[WARN]`, or `[INFO]` lines with remediation when present. JSON output is supported for scripts
        and remains the existing doctor/preflight report shape.
      split_scope:
      - workspace image build
      - local API connection discovery files
      - stale gateway env precedence or auto-fix policy
      - deployment-mode profile management
      - trusted runtime identity and context registry consumption
      - store/data migration and swarm run start behavior
    test:
      command: swarm test [scenario-file ...] [--contracts <path>] [--platform-spec <path>] [--timeout <duration>] [--poll-interval <duration>]
      group: author_validate
      tier: should_have
      implementation_status: implemented_first_slice
      owner: platform-spec.yaml#test_specification.deterministic_scenario_runner
      behavior: >-
        Public deterministic scenario-runner CLI consumer. The command discovers v1 YAML scenarios only under
        contracts/tests/... and contracts/flows/<flow>/tests/...; automatic discovery treats YAML files with version, steps,
        or invalid top-level scenario sentinels as scenario documents and leaves fixture YAML uninterpreted, while explicit
        scenario-file arguments are always parsed fail-closed. The command loads the selected contract bundle, computes the
        canonical bundle_hash through internal/runtime/contracts.BundleHash, validates fixture payloads through the existing
        event schema owner before mutation, and executes scenario steps only through public v1 RPC owners. `publish` steps
        optionally consume setup/pre-state aliases seeded through /v1/rpc test.setup_entities before calling
        /v1/rpc event.publish; mailbox approve/reject/defer steps locate exactly one pending mailbox item through
        mailbox.list and then call the matching mailbox decision RPC. The command waits for test quiescence by repeatedly
        reading canonical `run.diagnose` result.test_quiescence until active deliveries, unsettled same-run pipeline receipt
        work, due timers, and active session leases are absent; --timeout is a safety failure bound, not the semantic
        completion rule. Expectations consume run.trace, event.list dead-letter readback, paginated entity.list, and
        entity.get for detail assertions. The
        command does not activate mock/local providers, implement ProviderContract, test live agent sessions/tool calls/audit/
        spend semantics, execute inline code, copy cataloge2e private formats, or mutate EventBus/store/mailbox tables
        directly.
      flags:
      - name: --contracts <path>
        behavior: Contract package root used for bundle loading and scenario discovery. Omitted uses config paths.contracts_path,
          then repo-local contracts when present, then the repo root.
      - name: --platform-spec <path>
        behavior: platform-spec.yaml path used for bundle loading. Omitted uses config paths.platform_spec_path, then the repo-local
          default platform-spec.yaml.
      - name: --timeout <duration>
        behavior: Positive safety deadline for test quiescence waits. Reaching it fails the scenario with diagnostic context.
      - name: --poll-interval <duration>
        behavior: Positive interval between canonical readback probes while waiting for test quiescence.
      output:
        success_detail: >-
          One scenario ok line per scenario file followed by
          `swarm test ok: scenarios=<n>`.
      exit_codes:
        success: 0
        cli_validation: 2
        transport_or_malformed_response: 3
        auth_or_missing_token: 4
        not_found: 5
        scenario_rejected: 6
      proof_expectations:
      - setup/pre-state blocks make exactly one idempotent /v1/rpc test.setup_entities call with canonical bundle_hash,
        deterministic run_id, deterministic entity_id values, validated entity_type/current_state/fields/gates, and no direct
        DB/store/runtime/EventBus mutation path
      - exact /v1/rpc event.publish calls with event_name, payload, canonical bundle_hash, optional run_id/source_event_id/
        target/emitter/idempotency_key params only; no direct DB/store/runtime/EventBus publish path
      - setup alias publish targets lower only to event.publish target and fail before mutation when the alias is unknown,
        root-flow-scoped, or combined with explicit target_flow_instance/target_entity_id
      - mailbox decisions are preceded by mailbox.list and fail closed unless exactly one pending mailbox item matches
      - scenario discovery rejects files outside contracts/tests and contracts/flows/<flow>/tests
      - fixture from paths cannot escape the contract root, set overrides are applied before schema validation, and invalid
        fixture/schema variants fail before mutation
      - entity current_state, fields, and gates expectations either resolve setup aliases through entity.get or resolve
        unmatched rows through paginated entity.list, fail closed on zero/multiple detail matches, and read canonical detail
        through entity.get
      - no live LLM credentials, ProviderContract mock/local activation, or cataloge2e private scenario format is required
    workspace_build:
      command: swarm workspace build --backend claude_cli [--config <path>] [--image <tag>] [--docker-bin <path>]
      group: getting_started
      tier: should_have
      implementation_status: implemented_first_slice
      owner: workspace_model.local_workspace_image_build_authority
      behavior: >
        Builds and validates the local Docker workspace image for `claude_cli` proof flows using the embedded/materialized
        workspace build plan. The command uses `--docker-bin` when set, otherwise `workspace.docker_bin` from explicit
        config, otherwise the built-in `docker` default. It builds into a temporary image tag, targets `--image`,
        `workspace.image`, or `swarm-workspace:latest` by default, passes the approved `claude_cli` build args, validates
        that the temporary image can execute `claude --version`, and only then tags the validated image as the configured
        target. `SWARM_DOCKER_BIN` and `SWARM_WORKSPACE_IMAGE` are retired and must not be read as fallback sources.
      boundaries:
      - no runtime startup auto-build
      - no source-checkout Dockerfile lookup or go.mod walk
      - no host workspace execution changes
      - no local API connection discovery
      - no stale MCP gateway env policy change
    secrets:
      command: swarm secrets set|list|check|rm
      group: author_validate
      tier: must_have
      implementation_status: implemented
      owner: tool_model.credential_store
      behavior: >
        Local operator CLI for the existing credential store. The command is intentionally CLI-local and MUST NOT add
        `/v1/rpc credentials.*`, `/v1/rpc secrets.*`, or legacy Builder credentials transport reachability. The public noun
        is `secrets`; `credentials` is not a supported alias.
      subcommands:
        set:
          command: swarm secrets set <key> [--stdin]
          behavior: >
            Writes only the local file tier. If stdin is a TTY, prompt for the secret value with hidden input and
            confirmation. If stdin is not a TTY, read the value from stdin. `--stdin` explicitly forces stdin mode.
            Plaintext positional values and `--value` are forbidden because argv values leak through shell history and
            process listings. Output is metadata-only and never echoes the secret value.
        list:
          command: swarm secrets list [--json] [--missing] [--present] [--source env|file] [--contracts <path>]
          behavior: >
            Lists metadata only: key, source, writable, shadowed, present, updated_at, and required_by where contract source
            context is available. Env/file shadowing must be visible as source=env and shadowed=true when a file-tier value
            exists behind the effective env value.
        check:
          command: swarm secrets check [--contracts <path>] [--json]
          behavior: >
            Consumes the same required-credential owner as verify/boot. Exits 0 when all required secrets are present and
            non-zero when any required key is missing. JSON output is supported for CI.
        rm:
          command: swarm secrets rm <key>
          behavior: >
            Removes only the file-tier value. If env still supplies the key, the effective secret remains present,
            non-writable, and source=env.
      storage_path:
        default: os.UserConfigDir()/swarm/credentials.json
        override: SWARM_CREDENTIALS_FILE
        examples:
          macos: ~/Library/Application Support/swarm/credentials.json
          linux: ~/.config/swarm/credentials.json
      write_coordination: Cross-process advisory lock around file-tier set/rm, plus atomic replace. Lock contention fails
        closed instead of risking lost updates.
      split_scope:
      - "`/v1/rpc credentials.*` or `/v1/rpc secrets.*`"
      - retired Builder credentials RPC
      - managed/OAuth credentials
      - external vault/team secret management
      - package credential binding semantics
      - boot-check severity policy
    connections:
      command: swarm connections connect|callback|status|disconnect
      group: author_validate
      tier: must_have
      implementation_status: implemented_first_slice
      owner: tool_model.managed_credential_store
      behavior: >
        Local operator CLI for deployment-level managed OAuth/token credentials. This command owns managed credential
        lifecycle metadata and token records; it MUST NOT store OAuth lifecycle state in `swarm secrets` and MUST NOT expose
        access tokens, refresh tokens, authorization codes, PKCE verifiers/state, or client secrets in stdout/stderr/status
        JSON.
      subcommands:
        connect:
          command: swarm connections connect <key> --grant authorization_code|authorization_code_pkce|client_credentials|github_app_installation [...]
          behavior: >
            For authorization_code and authorization_code_pkce, stores a pending consent record with provider config, optional
            PKCE challenge/state, grant_model, and token_request metadata, then prints only the authorization URL/state and
            redacted connection metadata. For client_credentials, exchanges with the token endpoint immediately and stores a
            connected token record. For github_app_installation, reads the GitHub App private key through
            `--private-key-stdin`, requires `--installation-id`, optionally accepts `--api-base-url`, signs an app JWT, and
            exchanges it for an installation token before storing connected metadata. OAuth client secrets and GitHub App
            private keys, when required by the provider, are read through stdin flags; argv secret values such as
            `--client-secret <value>` or `--private-key <value>` are unsupported because they leak through shell history and
            process listings. Token endpoint profile flags are closed: token-client-auth post|basic, token-body form|json,
            token-header Name=Value for non-secret headers, and grant-model scope_grant|workspace_grant|installation_grant.
        callback:
          command: swarm connections callback <key> --state <state> --code-stdin
          behavior: >
            Completes an authorization_code or authorization_code_pkce record by validating callback state, exchanging the code
            through the stored token_request profile, clearing transient verifier/state fields, and persisting connected token
            metadata. The authorization code is read from stdin and MUST NOT be accepted as an argv flag value. Output is
            metadata only.
        status:
          command: swarm connections status [<key>] [--json] [--contracts <path>]
          behavior: >
            Lists managed credential metadata only: key, provider, account, grant_type, scopes, grant_model, token_request,
            installation_id, api_base_url, status, redacted failure, expires_at, updated_at, present, and required_by where
            contract source context is available. Values, private keys, generated JWTs, and token material are never
            returned.
        disconnect:
          command: swarm connections disconnect <key>
          behavior: Deletes the managed credential token record for the deployment key.
      storage_path:
        default: os.UserConfigDir()/swarm/managed_credentials.json
        override: SWARM_MANAGED_CREDENTIALS_FILE
      split_scope:
        - static `swarm secrets` API-key/PAT/bearer-token values
        - provider trigger/webhook adapters on inbound.webhook
        - multi-tenant per-user token vaults
        - DB/AWS SigV4/non-HTTP/native connector auth
        - external vault/team managed credential UI/API
    serve:
      command: swarm serve [flags]
      group: getting_started
      tier: must_have
      implementation_status: partial
      behavior: >
        Starts current runtime and implemented API/MCP HTTP listeners for process probes, /v1/rpc, /v1/ws,
        MCP, and tool surfaces. Final CLI v2.1 topology is the separate API/MCP listener contract below;
        enable-disable controls and env/config listener precedence remain pending follow-up children.
      runtime_config_backend_selection:
        config_flag: --config <path>
        backend_flag: --backend <anthropic|claude_cli|openai_compatible|openai_responses>
        owner: engine.agent_session_management.llm_provider_selection_config_authority
        unified_config_supersession: >
          #1804 superseded command-local runtime config discovery with
          configuration_source_authority.unified_swarm_config. #1858 implements global `--config`, layered
          `swarm.yaml`, and executable-adjacent `config.yaml` invalidation atomically.
        rule: >
          `swarm serve` consumes the unified runtime config resolver: explicit --config first, then local-operator
          `.swarm/swarm.yaml`, project `./swarm.yaml`, user-global `swarm.yaml`, and built-in/default config. The
          `--backend` flag overrides config `llm.backend` only after the configured backend itself has been validated.
          SWARM_LLM_BACKEND, SWARM_LLM_RUNTIME_MODE, llm.runtime_mode, and SWARM_OPENAI_COMPATIBLE_BASE_URL are retired
          selector/connection-owner seams and must fail closed.
      workspace_data_source_authority:
        promoted_by: '#1139/#1223'
        owner: workspace_model.data_source_authority
        flag: --data <path>
        config_key: workspace.data_source
        retired_env_var: SWARM_WORKSPACE_DATA_SOURCE
        rule: >
          `swarm serve` MUST resolve the agent-visible `/data` source through
          `workspace_model.data_source_authority` before constructing any workspace lifecycle. The command MUST NOT
          derive `/data` from the Swarm source checkout or from a repo-local `data/` directory unless that path was
          explicitly selected by the operator through the promoted source order. When no explicit path source and no
          deployment alternate are selected, the shared local runtime state resolver MUST create and use
          `<project-root>/.swarm/data` only for a canonical project root that matches the active repo root; no-project and
          borrowed-contract startup fail closed instead of creating cwd-relative or borrowed-tree state.
        consumers:
        - serve boot workspace lifecycle
        - local foreground `swarm run start` startup through the serve startup owner
        - dynamic Builder project reload workspace lifecycle
        - selected-contract run-fork workspace lifecycle
      workspace_backend_selection:
        promoted_by: '#1138'
        owner: workspace_model.workspace_backend_selection
        flag: --workspace-backend <docker|host>
        config_key: workspace.backend
        unsafe_config_key: workspace.allow_exec_on_host
        retired_env_var: SWARM_WORKSPACE_BACKEND
        default_backend: capability-derived
        rule: >
          `swarm serve` MUST resolve the effective workspace backend requirement through
          `workspace_model.workspace_backend_selection` after loading the selected contract source and before constructing
          any workspace lifecycle. No-agent bundles default to no workspace lifecycle, non-exec API/runtime-mediated bundles
          default to host, and exec-capable bundles require Docker unless the operator takes the explicit loud unsafe host
          opt-out. `SWARM_WORKSPACE_BACKEND` is retired and MUST NOT be read as a backend preference or unsafe host opt-out
          authority.
        consumers:
        - serve boot workspace lifecycle
        - local foreground run start
        - dynamic Builder project reload workspace lifecycle
        - selected-contract run-fork workspace lifecycle
        - verify/describe/doctor diagnostics
        - conversation.fork_chat sandbox LLM runtime admission
      workspace_execution_target_capability:
        promoted_by: '#1213/#1235/#1286/#1356'
        owner: workspace_model.workspace_execution_target_capability
        rule: >
          `swarm serve` runtime execution surfaces MUST consume the typed workspace execution target/capability owner after
          backend selection. Host-local targets remain explicit and support trusted/unsafe native command execution,
          platform-managed native file read/write, and tool-result relay through execution-target path authority; Claude/provider
          execution remains fail closed. Docker targets continue through container execution.
        consumers:
        - native executor command/file path authority
        - native fallback tool-surface truth
        - OpenAI-compatible/API fallback-tool routing through tools.Executor
        - tool-result relay path authority
        - Claude CLI process/startup/relay validation
      unified_listener_bind_contract:
        implemented_by: '#853'
        superseded_by: '#992 listener_topology_v2_1 runtime bind implementation'
        flag: --health-addr <addr>
        owner: >
          Historical implementation evidence only. `cmd/swarm serve` previously owned command-line bind selection
          through `--health-addr`; `runServeRuntime`, `newHealthServer`, and `listenHealthServer` previously owned
          the single runtime HTTP listener. Final runtime binding now consumes `listener_topology_v2_1`.
        semantics: >
          `--health-addr` was the historical bind address for the single HTTP listener created by `swarm serve`.
          Despite its historical health-specific name, that listener was not health-only: it exposed health,
          readiness, API, WebSocket, MCP, and tool routes when their handlers were installed. This section is
          retained as migration evidence for #853/#882 only; it is superseded by `listener_topology_v2_1` and
          MUST NOT be accepted as final CLI v2.1 runtime behavior.
        routes:
          always:
          - /healthz
          - /readyz
          when_api_handler_installed:
          - /v1/rpc
          - /v1/ws
          when_mcp_gateway_installed:
          - /mcp
          - /tools/
        bind_rules:
        - 'Historical: blank `--health-addr` used the default serve listener address.'
        - 'Historical: one TCP HTTP listener shared API, WebSocket, MCP, tools, health, and readiness routes.'
        - 'Superseded: final v2.1 startup fails closed independently for API and MCP listener binds.'
        - 'Superseded: final v2.1 route mounting is partitioned by `listener_topology_v2_1`.'
        consumer_boundaries:
          swarm_run_api_port: >
            Historical #853 boundary: `swarm run start --api-port` consumed the unified serve startup/listener owner for
            local foreground startup. Under `listener_topology_v2_1`, it remains a consumer of the API listener
            owner and MUST NOT become a second bind owner or introduce a separate runtime boot path.
          swarm_run_mcp_port: >
            `swarm run start --mcp-port` remains unsupported until a later child explicitly promotes local foreground
            MCP listener control. It MUST fail before API/WS calls, local runtime boot, or active-run mutation with
            CLI validation exit 2.
        unpromoted_review_controls:
        - --api/--no-api
        - --mcp/--no-mcp
        - serve --api-port
        - serve --mcp-port
        - --log-level
        sibling_boundaries: >
          Output modes remain governed by `cli_specification.foundations.output_contract`; universal config/env
          precedence remains #844; `swarm run start` foreground/follow behavior remains #743; final split API/MCP
          listener runtime binding is consumed by `listener_topology_v2_1`, while enable-disable controls remain
          future work outside this historical unified-listener evidence row.
      listener_topology_v2_1:
        promoted_by: '#884'
        runtime_bind_implemented_by: '#992'
        env_config_precedence_implemented_by: '#844'
        server_api_auth_implemented_by: '#1647'
        implementation_status: runtime_bind_env_config_and_server_api_auth_implemented_enable_disable_pending
        canonical_owner: platform-spec.yaml#cli_specification.command_catalog.serve.listener_topology_v2_1
        summary: >
          Final CLI v2.1 `swarm serve` topology uses two independently configurable HTTP listeners: one API
          listener and one MCP listener. This is the merge-bearing final topology decision. Runtime binding and
          listener source precedence now consume `--api-listen-addr <host:port>`, `--mcp-listen-addr <host:port>`,
          `serve.api_listen_addr`, and `serve.mcp_listen_addr`; historical `--health-addr` remains migration
          evidence only.
        listeners:
          api:
            enabled_by_default: true
            enable_flag: --api
            disable_flag: --no-api
            bind_flag: --api-listen-addr <host:port>
            default_listen_addr: 127.0.0.1:8081
            routes:
            - /healthz
            - /readyz
            - /v1/rpc
            - /v1/ws
            semantics:
            - API, WebSocket, health, and readiness routes share the API listener.
            - Health and readiness are not served from the MCP listener.
            - No legacy `/api/health` compatibility route is promoted by this contract; legacy `/api/*` surfaces remain retired.
            - Startup MUST fail closed before readiness if the API listener is enabled and cannot bind.
          mcp:
            enabled_by_default: true
            enable_flag: --mcp
            disable_flag: --no-mcp
            bind_flag: --mcp-listen-addr <host:port>
            default_listen_addr: 127.0.0.1:8082
            routes:
            - /mcp
            - /tools/
            semantics:
            - MCP and tool routes share the MCP listener.
            - MCP listener bind selection is independent from API listener bind selection.
            - Setting `--api-listen-addr` MUST NOT change the MCP listener address.
            - If MCP is disabled, tool execution paths requiring MCP MUST fail with `MCP_DISABLED`.
            - Startup MUST fail closed before readiness if the MCP listener is enabled and cannot bind.
        address_format:
          type: host_port
          valid_examples:
          - 127.0.0.1:8081
          - 0.0.0.0:8081
          - '[::1]:8081'
          invalid_examples:
          - bare port without host
          - host without port
          - URL schemes such as http://127.0.0.1:8081
        defaults:
          api_listen_addr: 127.0.0.1:8081
          mcp_listen_addr: 127.0.0.1:8082
          rationale: >
            Loopback defaults prevent accidental public exposure. Operators must explicitly bind to `0.0.0.0`
            or another routable interface for remote access.
        source_precedence:
          applies_to:
          - '`swarm serve` API listener bind address.'
          - '`swarm serve` MCP listener bind address.'
          not_applies_to:
          - '`swarm run start` local foreground listener startup.'
          - API client connection/auth configuration such as `--api-server`, context descriptors, and
            `connection.api_server`.
          - Unified config discovery/precedence itself, which is owned by configuration_source_authority.unified_swarm_config.
          unified_config_supersession: >
            #1804 moved serve listener and server API token-file config under
            configuration_source_authority.unified_swarm_config `serve`. #1858 implements the unified config parser
            and accepts `serve.*` keys; #1891 retires listener env rows as parent-process source authority.
          source_order:
          - flag
          - unified_config
          - built_in_default
          api_listen_addr:
            flag: --api-listen-addr <host:port>
            config_key: serve.api_listen_addr
            built_in_default: 127.0.0.1:8081
          mcp_listen_addr:
            flag: --mcp-listen-addr <host:port>
            config_key: serve.mcp_listen_addr
            built_in_default: 127.0.0.1:8082
          server_api_auth:
            accepted_sources:
              flag_file: --api-token-file <path>
              config_file_key: serve.api_token_file
              built_in_loopback_default: built-in-loopback-default
            source_order:
            - --api-token-file
            - config serve.api_token_file
            - built-in loopback default
            rejected_sources:
              SWARM_API_TOKEN: >
                Removed as a server-side `swarm serve` API auth source by #1647. Raw env is hidden mutable token
                authority; use `swarm serve --api-token-file` or config `serve.api_token_file`.
              SWARM_API_TOKEN_FILE: >
                Not promoted as a server-side `swarm serve` API auth source. Use `swarm serve --api-token-file` or
                config `serve.api_token_file`.
              config connection.api_token_file: >
                Client-side API auth only, governed by
                cli_specification.foundations.api_connection_auth_config_precedence. Server-side `swarm serve` auth
                uses config `serve.api_token_file` to avoid client/server source ownership ambiguity.
              config api_token: >
                Not promoted. Inline bearer tokens in config files leak secret material into durable plaintext config.
            token_file_rule: >
              Token-file sources are read once during `swarm serve` startup. Missing, unreadable, or blank token-file
              contents fail closed and MUST NOT fall back to the built-in loopback default.
          unified_config_file:
            accepted_sources:
            - global --config <path>
            - SWARM_CONFIG
            - '${XDG_CONFIG_HOME:-$HOME/.config}/swarm/swarm.yaml'
            - './swarm.yaml'
            - '.swarm/swarm.yaml'
            rejected_sources:
            - executable-adjacent config.yaml
            - '${XDG_CONFIG_HOME:-$HOME/.config}/swarm/config.yaml'
          independence_rule: >
            API and MCP source resolution is per-listener. A source for one listener MUST NOT infer, mutate,
            or default the other listener.
          validation_rule: >
            Values from flags and unified config MUST use the host:port address_format above and
            fail before runtime startup if invalid.
          api_auth_coupling_rule: >
            If no explicit token-file source is configured for `swarm serve`, the API listener may start only when
            its host is numeric loopback (`127.0.0.0/8` or `::1`). `localhost`, wildcard, empty, routable IP, and
            DNS hosts require `swarm serve --api-token-file` or config `serve.api_token_file`. The built-in API token is never valid for a
            non-loopback API listener. This rule applies to the API listener only; MCP listener and tool-gateway
            tokens remain owned by local_cli_test_gateway_startup.
          rejected_sources:
            SWARM_API_PORT: 'Not promoted; port-only configuration cannot express bind interface/IP.'
            SWARM_MCP_PORT: 'Not promoted; port-only configuration cannot express bind interface/IP.'
            api_listen_addr: 'Not promoted as a unified config key; use serve.api_listen_addr.'
            mcp_listen_addr: 'Not promoted as a unified config key; use serve.mcp_listen_addr.'
        interaction_rules:
          independent_bind_addresses: >
            API and MCP listener addresses are independent. Supplying one listener address never mutates or
            infers the other listener address.
          api_addr_only_example:
            command: swarm serve --api-listen-addr 0.0.0.0:9001
            result:
              api_listen_addr: 0.0.0.0:9001
              mcp_listen_addr: 127.0.0.1:8082
          enable_disable:
          - '`--api` and `--no-api` are mutually exclusive.'
          - '`--mcp` and `--no-mcp` are mutually exclusive.'
          - 'Supplying `--api-listen-addr` while `--no-api` is set MUST fail closed.'
          - 'Supplying `--mcp-listen-addr` while `--no-mcp` is set MUST fail closed.'
          - 'Supplying `--no-api --no-mcp` MUST fail closed because serve would expose no supported listener.'
          bind_failures:
            exit_code: 3
            stderr_class: listener_bind_failed
            rule: >
              If any enabled listener cannot bind, `swarm serve` MUST exit before runtime readiness is reported.
          api_default_token_exposure:
            rule: >
              If the API listener would use the built-in loopback default token on a non-loopback host,
              `swarm serve` MUST fail closed before readiness with a diagnostic naming that non-loopback API binds
              require `--api-token-file` or config `serve.api_token_file`. Raw `SWARM_API_TOKEN` MUST NOT satisfy this
              requirement.
        flag_disposition:
          --health-addr:
            disposition: retired_final_v2_1_name_current_migration_evidence
            replacement: --api-listen-addr and --mcp-listen-addr
            rationale: >
              `--health-addr` was misleading because the historical implementation bound API, WebSocket, MCP,
              tools, health, and readiness routes on one listener.
          serve --api-port:
            disposition: not_promoted_final_v2_1
            replacement: --api-listen-addr
            rationale: >
              Port-only configuration is incomplete because it cannot express the bind interface/IP.
          serve --mcp-port:
            disposition: not_promoted_final_v2_1
            replacement: --mcp-listen-addr
            rationale: >
              Port-only configuration is incomplete because it cannot express the bind interface/IP.
          --log-level:
            disposition: governed_by_cli_logging_policy
            owner: cli_specification.foundations.cli_logging_policy
            rationale: >
              Logging level is not listener topology. Its source-of-truth owner is promoted by #936, but serve
              runtime behavior remains outside #884 runtime topology implementation until a later implementation
              child consumes the CLI logging policy owner.
          SWARM_API_PORT:
            disposition: not_promoted_final_v2_1
            replacement_candidate: --api-listen-addr or serve.api_listen_addr
            owner: '#1891 listener config migration'
          SWARM_MCP_PORT:
            disposition: not_promoted_final_v2_1
            replacement_candidate: --mcp-listen-addr or serve.mcp_listen_addr
            owner: '#1891 listener config migration'
        output_boundary:
          ready_banner: >
            Human-readable ready output SHOULD report both enabled listeners and their bound addresses once
            runtime implementation lands; exact rendering remains governed by serve boot/output owners.
          machine_readable_modes: >
            If serve output modes are implemented later, machine-readable boot/readiness events MUST include
            enabled listener names, configured listen addresses, and actual bound addresses.
        run_command_consumer_boundary:
          swarm_run_api_port: >
            Current `swarm run start --api-port` remains a local-start convenience consumer of the serve startup owner
            and now maps to the API listener bind address. A later CLI cleanup may replace it with `swarm run
            start --api-listen-addr`.
          swarm_run_mcp_port: >
            Current `swarm run start --mcp-port` MUST remain fail-closed until a later child explicitly promotes local
            foreground MCP listener control. `swarm serve` now owns MCP listener binding through
            `--mcp-listen-addr`; if local foreground startup needs MCP listener control later, prefer a
            listen-address model over port-only `--mcp-port`.
        implementation_boundaries:
        - '#884 promoted the source-of-truth repair only.'
        - '#992 implements Cobra/runtime binding for `--api-listen-addr` and `--mcp-listen-addr`, route partitioning, listener address validation, listener bind failure exit 3 before readiness, `--health-addr` retirement, MCP gateway URL alignment, and `swarm run start --api-port` as an API listener consumer.'
        - '#1891 implements `swarm serve` listener source precedence for `serve.api_listen_addr` and `serve.mcp_listen_addr` and retires `SWARM_API_LISTEN_ADDR` / `SWARM_MCP_LISTEN_ADDR`.'
        - '`swarm run start --mcp-port` remains fail-closed until a later child explicitly promotes local foreground MCP listener control.'
        - 'API/MCP enable-disable implementation may be a later child if not absorbed with listener implementation.'
        - '`--log-level` is governed by cli_specification.foundations.cli_logging_policy, not listener topology.'
      boot_observability:
        implemented_by: '#802'
        flags:
        - --verbose
        - '-v'
        rule: >
          By default `swarm serve` remains quiet except for readiness and errors. With `--verbose` or `-v`, serve prints
          the numbered boot-progress sequence to stdout as the canonical serve/runtime boot phases complete. The CLI
          owns stdout rendering; runtime owns the boot-progress facts and the persisted `platform.boot` payload.
        schema_inventory_detail: >
          Default serve and local foreground run process logs may report concise generated state-store schema counts
          such as `tables=N` and `columns=M`, but MUST NOT dump per-table `table(column_count)` inventory details.
          Per-table generated schema inventory is diagnostic boot detail owned by the explicit serve verbose channel
          (`swarm serve --verbose/-v`, and `--dev` through its verbose composition).
        boot_progress_sequence:
          total_steps: 22
          steps:
          - step: 1
            name: process_start
            owner: cmd/swarm
          - step: 2
            name: config_load
            owner: cmd/swarm
          - step: 3
            name: db_connection
            owner: cmd/swarm
          - step: 4
            name: bundle_load
            owner: cmd/swarm
          - step: 5
            name: startup_ownership_lease
            owner: internal/runtime
          - step: 6
            name: recovery_snapshot_inspection
            owner: internal/runtime
          - step: 7
            name: recovery_decision
            owner: internal/runtime
          - step: 8
            name: pipeline_maintenance
            owner: internal/runtime
          - step: 9
            name: system_nodes_start
            owner: internal/runtime
          - step: 10
            name: schedule_restoration
            owner: internal/runtime
          - step: 11
            name: manager_recovery_if_enabled
            owner: internal/runtime
          - step: 12
            name: outbox_sweeper
            owner: internal/runtime
          - step: 13
            name: static_agents_bootstrap
            owner: internal/runtime
          - step: 14
            name: flow_required_agents
            owner: internal/runtime effective required-agent view derived by internal/runtime/contracts
          - step: 15
            name: workspace_validation_and_system_containers
            owner: internal/runtime
          - step: 16
            name: mcp_tool_validation
            owner: internal/runtime
          - step: 17
            name: manager_event_loop_start
            owner: internal/runtime
          - step: 18
            name: boot_self_check_optional
            owner: internal/runtime
          - step: 19
            name: platform_boot_event_published
            owner: internal/runtime
          - step: 20
            name: http_listener_bind
            owner: cmd/swarm
          - step: 21
            name: health_endpoints_respond
            owner: cmd/swarm
          - step: 22
            name: ready
            owner: cmd/swarm
        platform_boot_payload: >
          `platform.boot` carries the boot decision summary: boot timestamps/duration, bundle fingerprint,
          startup recovery decision, static and flow-required agent materialization lists, system container names,
          self-check-required state, and nullable self-check pass state. CLI/dashboard/API readers consume this persisted event; they do not reconstruct boot
          decisions from text logs.
      bundle_match_admission:
        default: require-bundle-match
        implemented_by: '#753/#754'
        flags:
        - --require-bundle-match
        - --no-require-bundle-match
        rule: >
          After loading the boot bundle and ensuring platform schema, serve refuses startup before runtime start/readiness when
          any active run has a non-NULL `runs.bundle_fingerprint` different from the boot bundle fingerprint. Legacy NULL fingerprints
          mean unknown bundle and do not block startup. `--no-require-bundle-match` disables this admission gate for operator-approved
          recovery/dev workflows.
      active_run_abandon_quiescence:
        implemented_by: '#808/#1251'
        flag: --abandon-active-runs
        owner: internal/runtime/runquiescence plus selected runtime store active-run quiescence owner, consumed by cmd/swarm serve
        ordering: >
          `swarm serve --abandon-active-runs` applies after platform schema/state-store initialization and before bundle-match
          admission, startup recovery, runtime start, API readiness, or late delivery recovery can reclaim work. Failure to apply
          the quiescence owner is a serve startup failure; serve MUST NOT continue with partial abandon state.
        backend_ownership: >
          The selected runtime store implements this owner for its backend: `PostgresStore` for explicit Postgres and
          `SQLiteRuntimeStore` for the local/dev SQLite default. Serve MUST call the selected owner for both direct
          `--abandon-active-runs` and `--dev`; it MUST NOT special-case SQLite as a skip/no-op and MUST NOT use raw
          Postgres handle presence as the capability decision.
        active_run_scope: >
          The owner selects all active source runs with `runs.status` in `running` or `paused`. Each selected run is terminalized
          as `runs.status=cancelled`, with `run_control_state.control_status=stopped`, `reason=server_restart_abandon`, and
          `controlled_by=swarm.serve.abandon_active_runs`.
        delivery_scope: >
          For those selected runs, same-run agent/node deliveries in `pending`, `in_progress`, or retryable `failed` state are
          terminalized as `dead_letter` with `reason_code=server_restart_abandon`; `active_session_id` is cleared. Retryable failed
          means the delivery is still eligible for normal runtime retry under the delivery retry policy. Delivered, exhausted,
          unrelated, or terminal-run deliveries remain untouched.
        receipt_scope: >
          The owner writes matching agent/node event receipts and platform pipeline receipts with `outcome=dead_letter` and
          `reason_code=server_restart_abandon` so missing-pipeline-receipt recovery cannot resurrect abandoned work.
        late_writer_rule: >
          EventBus, AgentManager, node pipeline, and pipeline-receipt writers MUST treat `server_restart_abandon` as a terminal
          active-run quiescence reason. They MUST NOT overwrite the delivery/receipt reason, reclaim the delivery, or requeue
          missing pipeline work after the owner has applied.
        destructive_reset_separation: >
          Destructive reset/runtime.nuke consumes the same active-run quiescence owner with `runtime_nuke_cancelled` reasons and
          must retain its existing run-scoped cleanup and managed-container deletion semantics. `--abandon-active-runs` does not
          delete source rows, truncate tables, stop managed entity containers, or reuse nuke-specific reason codes.
      shutdown_grace_drain_budget:
        implemented_by: '#825'
        flag: --shutdown-grace <duration>
        default: 30s
        owner: cmd/swarm serve parses the operator duration; runtime.Runtime.ShutdownWithOptions and
          internal/runtime/manager.AgentManager.ShutdownWithOptions own the runtime shutdown drain budget.
        validation: >
          The duration MUST be a positive Go duration string accepted by the CLI duration parser. Invalid, zero, or negative
          values fail before runtime boot and MUST NOT start the runtime, mutate active runs, or begin shutdown.
        ordering: >
          The budget applies only after serve has already booted and the serve process begins shutdown from its signal/close
          path. Runtime shutdown admission closes before the drain begins, so inbound, MCP/tool, manager replay/restart/chat,
          and new agent work remain fail-closed while in-flight work drains.
        drain_scope: >
          The configured budget is consumed by the runtime/manager shutdown owner for agent in-flight quiescence and final
          manager run goroutine shutdown. Serve MUST NOT keep a hidden manager timeout or a CLI-local timeout as an alternate
          shutdown policy.
        timeout_outcome: >
          If in-flight work does not quiesce within the configured budget, the manager cancels active loop contexts and returns
          an explicit timeout error that includes the configured budget. This slice does not persist `platform.shutdown` events
          or terminalize event deliveries as `interrupted_by_shutdown`; those semantics remain split until promoted by a
          merge-bearing spec contract.
        sibling_boundaries: >
          `--dev`, dev entity-container shutdown cleanup, `platform.shutdown` event persistence, and persisted delivery/receipt
          interruption reasons remain outside this owner and under #750 unless a later child promotes them.
      dev_mode_lifecycle_composition:
        implemented_by: '#830'
        flag: --dev
        owner: >
          `cmd/swarm serve` owns command-line composition; existing serve startup owners perform active-run abandon,
          bundle-match admission, and verbose boot output; `internal/runtime/workspace` plus
          `internal/runtime/containeridentity` own dev entity-container cleanup and preservation.
        composition:
        - sets `--abandon-active-runs`
        - sets `--no-require-bundle-match`
        - sets `--verbose`
        - enables dev entity-container cleanup after runtime shutdown/drain
        conflict_rules:
        - '`--dev --require-bundle-match` or `--dev --require-bundle-match=true` fails before runtime boot because dev mode disables bundle-match admission.'
        - '`--dev --require-bundle-match=false`, `--dev --no-require-bundle-match`, `--dev --abandon-active-runs`, and `--dev --verbose` are redundant but valid.'
        shutdown_ordering: >
          On serve shutdown, runtime shutdown admission and the runtime/manager shutdown-grace drain run first. Dev cleanup runs
          only after that shutdown attempt reaches its completion point. Cleanup still runs after a shutdown timeout/error and
          the serve path reports joined shutdown and cleanup errors.
        cleanup_scope: >
          Dev cleanup stops only identity-proven runtime-owned, reset-eligible, `kind=entity` containers. The cleanup owner
          consumes typed managed-container identity and MUST NOT infer ownership from names, raw Docker listings, or
          `RuntimeWorkspaceContainers` alone.
        preservation_boundary: >
          Scaffold/system containers, operator-managed containers, unlabeled containers, malformed identity rows, name-mismatched
          containers, unrelated containers, and runtime-owned `kind=agent` or `kind=flow` containers are preserved fail-closed.
        sibling_boundaries: >
          `platform.shutdown` event persistence, persisted `interrupted_by_shutdown` delivery/receipt terminalization,
          destructive reset/runtime.nuke behavior, and `swarm run start` foreground behavior remain outside this owner unless a later
          child promotes them.
      remaining_tail: '#750 has no remaining promoted serve/dev lifecycle tail after #830. `platform.shutdown` event persistence
        and persisted delivery/receipt interruption reasons remain unpromoted unless a later child makes them authoritative.'
    run_group:
      command: swarm run # live noun-group form: bare run prints group help
      tier: must_have
      implementation_status: implemented
      group: run_operate
      owner: cobra noun-group help
      behavior: >
        Bare `swarm run` prints the run noun-group help and exits 0; it does not start a run and
        makes no API calls. Start-intent invocations (positional args or start flags on bare
        `swarm run`) fail closed with exit 2 and the promoted pointer message from
        topology_revision_v2_2.superseded_spellings.run_bare_start.
    run:
      command: swarm run start [flags]
      group: run_operate
      tier: must_have
      implementation_status: implemented
      tracker: '#743'
      accepted_contract_status: 'merge-bearing contract promoted by #795; command code implemented by #743.'
      owners:
        readiness: /v1/rpc health.check
        start: /v1/rpc run.start
        status: /v1/rpc run.get
        cancellation: /v1/rpc run.stop
        follow: /v1/ws run.subscribe_trace
        local_startup: existing `swarm serve` startup owner
      flags:
      - --event <name>
      - --payload <path>
      - --connect <url>
      - --no-follow
      - --reattach <run-id>
      - --bundle-hash <bundle-v1:sha256:...>
      - --bundle-fingerprint <sha>
      - --config <path>
      - --backend <anthropic|claude_cli|openai_compatible|openai_responses>
      - --contracts <path>
      - --data <path>
      - --platform-spec <path>
      - --idempotency-key <key>
      - --run-id <id>
      - --api-port <int>
      dropped_flags:
        --detach: 'Unsupported in v2; fail before API calls with exit 2 and migration text. Use `swarm serve` plus `swarm run start --connect ... --no-follow`.'
        --mcp-port: 'Unsupported in #743; `swarm run start` may consume the existing serve startup owner, but explicit MCP bind ownership remains split to the #750 serve-owner tail and MUST fail before API/WS calls.'
      modes:
        foreground_local_start:
          invocation: swarm run start --event <name> --payload <file> [--config <path>] [--backend <profile>] --contracts <path> [--data <path>] --platform-spec <path>
          behavior: >
            Start runtime/API/MCP through the existing serve startup owner, call health.check, call run.start, subscribe
            with run.subscribe_trace, render composed trace rows and final summary until terminal. Local runtime config and
            backend selection consume the same shared resolver as `swarm serve`; local `/data` source selection consumes
            `workspace_model.data_source_authority` through the serve startup owner. When the caller does not pass
            `--bundle-hash` or the deprecated `--bundle-fingerprint`, run.start uses the active canonical bundle_hash
            returned by health.check for create-new-work scope. `--data` is local foreground startup configuration only and
            MUST fail closed with `--connect` or `--reattach`.
          ctrl_c: 'First Ctrl-C calls run.stop after a run_id exists, shuts down the locally started runtime, and exits 130. A second interrupt may hard-exit.'
        foreground_connected_start:
          invocation: swarm run start --connect <url> --event <name> --payload <file>
          behavior: 'Use an existing API server, call health.check, call run.start, subscribe with run.subscribe_trace, and render until terminal.'
          ctrl_c: 'First Ctrl-C calls run.stop against the connected server and exits 130; it MUST NOT stop the server.'
        connected_no_follow:
          invocation: swarm run start --connect <url> --event <name> --payload <file> --no-follow
          behavior: 'Call health.check and run.start, print run_id plus follow/inspect guidance, exit 0, and do not open /v1/ws.'
          validation: '`--no-follow` requires `--connect` and is mutually exclusive with `--reattach`.'
        reattach_active:
          invocation: swarm run start --reattach <run-id> [--connect <url>]
          behavior: 'Call run.get, then subscribe with run.subscribe_trace when the run is active.'
          ctrl_c: 'Detach only, exit 130, and MUST NOT call run.stop.'
        reattach_terminal:
          invocation: swarm run start --reattach <run-id> [--connect <url>]
          behavior: 'Call run.get, render terminal summary, and exit according to terminal status without opening /v1/ws.'
      exit_codes:
        success: 0
        cli_validation: 2
        config_readiness_transport_or_malformed_api: 3
        auth_failure: 4
        run_not_found: 5
        start_rejection_bundle_or_idempotency_conflict: 6
        workflow_failed_or_cancelled: 7
        interrupted: 130
      proof_expectations:
      - exact /v1/rpc calls for health.check, run.start, run.get, and run.stop; health.check exposes the active canonical bundle_hash when available; run.start carries explicit --bundle-hash or the health.check bundle_hash when create-new-work scope is required, or deprecated legacy bundle_ref.fingerprint only when the corresponding legacy flag is supplied; missing create-new-work bundle scope maps server BUNDLE_SCOPE_REQUIRED, valid non-routable hashes map BUNDLE_UNAVAILABLE, and --bundle-fingerprint remains non-authoritative transition input
      - connected start failures for EVENT_NOT_DECLARED, PAYLOAD_VALIDATION_FAILED, EVENT_PUBLISH_FAILED, bundle identity rejection, and IDEMPOTENCY_CONFLICT render canonical API codes on stderr, exit 6, and do not open /v1/ws or follow work after failed run.start
      - exact /v1/ws subscription for run.subscribe_trace where follow is in scope
      - no direct DB/store/runtime/EventBus reads or writes
      - no legacy /api/*, /rpc, /api/rpc, /ws, /api/ws, or legacy token fallback
      - tests for every mode, invalid bundle_hash / bundle fingerprint / combined bundle identity flags, invalid flag combination, Ctrl-C behavior, exit mapping, malformed RPC/WS response, and no-call invalid paths
      split_siblings:
      - swarm run trace --follow
      - swarm control pause|continue|stop
      - broader run-control/fork command surfaces
      - '#750 serve-owner MCP bind ownership for future explicit --mcp-port support'
    verify:
      command: swarm verify [flags]
      group: author_validate
      tier: must_have
      implementation_status: implemented
      behavior: local contract-file validation carve-out
    runs:
      command: swarm run list [filters]
      group: run_operate
      tier: must_have
      implementation_status: implemented
      owner: /v1/rpc run.list
      behavior: List runs through the canonical run.list read owner; no direct DB/store/runtime-state reads.
      read_window_input_contract: cli_specification.foundations.read_window_input
      flags:
      - --since <RFC3339-or-relative-duration>
      - --until <RFC3339-or-relative-duration>
    status:
      command: swarm run status [<run-id>]
      group: run_operate
      tier: must_have
      implementation_status: implemented
      owner: /v1/rpc run.diagnose by default; /v1/rpc run.get for header-only mode if exposed
      defaulting: If run-id is omitted, resolve the target through run.list with active-run preference.
      behavior: Run-scoped operational status projection. This is the v2 replacement for `swarm investigate run`.
      human_output: >
        A labeled detail headed `Run <run-id>  <human operational state>`. Trigger, timing, scale, run status,
        health, blocker, notes, and failed-delivery sections are rendered only when their owner-backed facts are
        present. Test/internal labels such as test_quiescence_ready, heuristics, blocking_layer, and blocking_reason
        never appear in human output. JSON preserves the exact run.diagnose or run.get result shape.
    trace:
      command: swarm run trace [<run-id>] [--verbose] [--delivery-detail|--delivery-summary] [--since <RFC3339-or-relative-duration>] [--until <RFC3339-or-relative-duration>] [--limit <n>] [--cursor <cursor>] [--event-name <name> ...] [--entity-id <entity-id> ...] [--delivery-status <pending|in_progress|delivered|failed|dead_letter> ...] [--subscriber-id <id> ...] [--subscriber-type <node|agent> ...] [--follow|-f] [--no-retry]
      group: run_operate
      tier: must_have
      implementation_status: implemented
      owners: /v1/rpc run.trace for snapshot; /v1/ws run.subscribe_trace for --follow/-f
      defaulting: If run-id is omitted, resolve the target through run.list with active-run preference.
      behavior: Run trace rendering over API-owned RunTraceRow facts only; no CLI reconstruction from tables.
      promoted_trace_filter_contract:
        status: api_and_subscription_owner_promoted_cli_implemented
        snapshot_owner: /v1/rpc run.trace
        subscription_owner: /v1/ws run.subscribe_trace
        promoted_params:
        - run_id
        - limit
        - cursor
        - since
        - until
        - filter
        - include_internal
        cli_read_window_input_contract: cli_specification.foundations.read_window_input
        filter_schema: RunTraceFilter
        filter_fields:
          event_name: Repeatable event-name predicate. The CLI sends an array of non-empty names as `filter.event_name` and the server matches any value against RunTraceRow.event_name.
          entity_id: Repeatable entity-id predicate. The CLI sends an array of OpaqueId values as `filter.entity_id` and the server matches any value against RunTraceRow.entity_id.
          delivery_status: Repeatable delivery-status predicate. The CLI sends an array of DeliveryStatus enum values as `filter.delivery_status` and the server matches any value against RunTraceRow.delivery_status.
          subscriber_id: Repeatable subscriber identity predicate. The CLI sends an array of non-empty subscriber ids as `filter.subscriber_id` and the server matches any value against RunTraceRow.subscriber_id.
          subscriber_type: Repeatable subscriber type predicate. The CLI sends an array of SubscriberType enum values as `filter.subscriber_type` and the server matches any value against RunTraceRow.subscriber_type.
        since_semantics: >
          The API `since` parameter is an absolute RFC3339/RFC3339Nano timestamp watermark. Snapshot CLI input
          additionally consumes cli_specification.foundations.read_window_input and sends its resolved UTC value.
          The server returns trace rows whose canonical
          materialization watermark is strictly after `since`, where that watermark is the greatest available
          timestamp across the joined event, delivery, session, and turn fields owned by RunTraceRow.
        until_semantics: >
          The API `until` parameter is a snapshot-only absolute RFC3339/RFC3339Nano timestamp upper bound. Snapshot
          CLI input additionally consumes cli_specification.foundations.read_window_input and sends its resolved UTC
          value. The server returns trace rows whose
          canonical materialization watermark is less than or equal to `until`, using the same greatest-available
          event, delivery, session, and turn timestamp owner as `since`. Combined `since` and `until` define the
          half-open window `(since, until]`; `since` after `until` is invalid, while equal timestamps are allowed and
          naturally produce an empty exclusive/inclusive window.
        current_cli_consumer_status: implemented_by_918_and_855
        cli_consumer_behavior: >
          Snapshot `swarm run trace` consumes `--since`, `--until`, `--limit`, `--cursor`, `--event-name`, `--entity-id`,
          `--delivery-status`, `--subscriber-id`, and `--subscriber-type` by sending the exact promoted params to
          `/v1/rpc run.trace`. Follow `swarm run trace --follow` / `swarm run trace -f` consumes the same typed filter flags
          by sending `filter` to `/v1/ws run.subscribe_trace`; fixed-window snapshot controls `--since`, `--until`,
          `--limit`, and `--cursor` remain invalid with follow and must fail before any API or WebSocket request.
          By default, both `run.trace` and `run.subscribe_trace` exclude `platform.runtime_log` trace rows. The CLI
          `--verbose` flag sends `include_internal=true` to the selected trace API and reveals those rows. The CLI
          MUST NOT hide or reveal runtime-log trace rows by client-side filtering.
          Snapshot `--delivery-detail` is a CLI-only rendering modifier over the same `/v1/rpc run.trace` response:
          it renders delivery identity, subscriber identity, delivery status/reason, delivery lifecycle timestamps, and
          queue/execution durations derived only from same-row RunTraceRow timestamps. `--delivery-detail` is invalid
          with `--follow` and does not introduce a new API/store/runtime owner.
          Snapshot `--delivery-summary` is a CLI-only exhaustive projection over `/v1/rpc run.trace`: it follows
          returned `next_cursor` values until none remain, preserving run_id, since, until, filter, and page-size
          limit while advancing only cursor. If the caller omits `--until`, the CLI captures one RFC3339Nano
          point-in-time upper bound before the first request and reuses that `until` value for every page. It groups rows that carry delivery_id by subscriber_type/subscriber_id
          and delivery_status, derives queue and execution timing only from same-row RunTraceRow timestamps, treats
          event-only rows as non-delivery trace rows, and renders point-in-time snapshot wording. `--delivery-summary`
          is invalid with `--follow` and is mutually exclusive with `--delivery-detail`.
        proof_expectations:
        - exact /v1/rpc run.trace params for explicit run ids and omitted-run resolution through run.list
        - default trace requests omit include_internal or send false and the API excludes platform.runtime_log; --verbose sends include_internal=true and reveals platform.runtime_log through the API owner
        - repeatable filter flags serialize as RunTraceFilter arrays under the single `filter` param and compose with since/until/limit/cursor
        - follow-mode repeatable filter flags and include_internal serialize under the same run.subscribe_trace params and are preserved across recovery requests
        - invalid --since, invalid --until, since-after-until, out-of-range --limit, blank --cursor, blank/invalid typed filters, and fixed-window snapshot controls combined with --follow fail before API/WS calls
        - --delivery-detail renders only existing RunTraceRow delivery lifecycle facts and rejects --follow before API/WS calls
        - --delivery-summary exhausts /v1/rpc run.trace pagination across returned next_cursor values, captures and reuses a fixed until bound when the caller omits --until, treats --limit as page size rather than a total cap, rejects --follow and --delivery-detail before API/WS calls, fails closed on repeated/non-advancing cursors or malformed delivery rows, and renders only aggregate facts derived from existing RunTraceRow delivery fields
        - missing token fails before API calls through the shared CLI API client
        - no direct DB/store/runtime/EventBus/dashboard/Builder reads and no legacy /api, /rpc, /ws, or fallback token paths
      promoted_trace_follow_recovery_contract:
        status: api_owner_promoted_cli_implemented
        implemented_by: '#928'
        follow_owner: /v1/ws run.subscribe_trace
        follow_shorthand:
          implemented_by: '#855'
          shorthand: -f
          expands_to: --follow
          behavior: >
            `-f` is an exact CLI-only shorthand for `--follow`. It selects the same `/v1/ws run.subscribe_trace`
            follow path, accepts the same `--no-retry` modifier, rejects the same fixed-window snapshot flags before
            any API or WebSocket call, and does not introduce distinct runtime semantics, output behavior, or
            `swarm run start` follow behavior. It may carry the promoted RunTraceFilter param when typed filter flags are present.
        scope: >
          Applies only to `swarm run trace --follow` / `swarm run trace -f`. `swarm run start` foreground follow, connected follow, and reattach keep their
          existing lifecycle policy and may continue to use the shared one-shot `subscribeRunTrace` helper without inheriting
          this trace-specific reconnect policy.
        retry_policy: >
          By default, `swarm run trace --follow` may reconnect after at most three retryable subscription interruptions after the
          initial subscription attempt. The retry backoff is bounded exponential delay of 250ms, 500ms, then 1s. If a clean
          subscription close exhausts the reconnect budget, the command exits successfully after rendering all received rows.
          If a retryable transport error exhausts the budget, the command exits with the CLI runtime/transport error code.
        retryable_classes:
        - websocket dial failure
        - websocket request write failure
        - websocket subscription-response read failure caused by transport close/reset/timeout
        - websocket notification read failure caused by transport close/reset/timeout
        terminal_classes:
        - JSON-RPC application errors such as RUN_NOT_FOUND
        - malformed subscription responses or malformed result envelopes
        - malformed subscription notifications, schema validation failures, or subscription mismatches
        - notification queue overflow
        - CLI validation failures, missing token, and snapshot flags combined with --follow
        - operator interrupt / context cancellation
        replay_watermark: >
          Initial `run.subscribe_trace` requests omit `replay_since`. Recovered subscriptions set `replay_since` to the
          RFC3339Nano `event_created_at` timestamp of the last successfully rendered RunTraceRow. If no row has been
          rendered, recovered requests also omit `replay_since`. Recovered requests preserve the same RunTraceFilter, if any,
          that the initial follow request used. The CLI does not deduplicate rows; recovery is at-least-once and the server/API
          owner remains responsible for trace ordering and retention semantics.
        no_retry_flag: >
          `--no-retry` disables this recovery loop for `swarm run trace --follow` / `swarm run trace -f` only. With `--no-retry`, the command performs
          exactly one `run.subscribe_trace` request, may include the promoted RunTraceFilter, never sends `replay_since`, exits
          0 on a clean close, and fails closed on the first subscription or notification error.
        invalid_combinations:
        - --since with --follow/-f
        - --until with --follow/-f
        - --limit with --follow/-f
        - --cursor with --follow/-f
        - --no-retry without --follow/-f
        - direct --replay-since flag; replay_since is an internal recovery parameter, not a user-facing trace flag
        proof_expectations:
        - initial and recovered WebSocket request-shape tests prove exact run.subscribe_trace params and replay_since handling
        - follow-mode typed filter request-shape tests prove initial, recovered, and --no-retry subscriptions preserve the exact RunTraceFilter
        - '`-f` help/discoverability and execution tests prove exact aliasing to --follow with no distinct API or runtime path'
        - omitted-run follow resolves through /v1/rpc run.list once before recovered subscriptions for the resolved run id
        - --no-retry proves one-shot close behavior and no replay_since
        - malformed subscription responses and notifications fail closed without retrying indefinitely
        - Ctrl-C detaches with exit 130 and does not call run.stop
        - '`swarm run start` foreground/follow and reattach regression proof remains unchanged'
        - static no-bypass proof for no direct DB/store/runtime/EventBus/dashboard/Builder reads and no legacy transports
        split_tail:
          include_payload: Not promoted; RunTraceRow has no payload field and output/schema ownership is split.
          shared_run_follow_recovery: Not promoted; `swarm run start` follow and reattach have distinct lifecycle semantics and remain split.
          all_runs: Not promoted; multi-run trace needs a canonical multi-run owner or explicit run.list + run.trace composition contract.
    mailbox_list:
