  workspace_monitor_artifact_debug_slice:
    promoted_by: '#1640'
    parent_tracker: '#1600'
    implementation_status: classification_updated_by_1843
    canonical_owner: platform-spec.yaml#environment_source_authority.workspace_monitor_artifact_debug_slice
    scope: >
      Merge-bearing classification authority for the #1640 workspace/monitor/artifact/debug inventory. #1843 retired the
      workspace Docker/host environment sources, local workspace image/bootstrap knobs, and legacy internal
      scaffold/system/entity lifecycle rows from parent-process env authority. Runtime-private artifact and monitor roots,
      prompt/spec helper path overrides, and debug/test environment toggles remain classified here until later children.
      This owner records current source-authority disposition and public-doc quarantine for those envs; repo-wide
      guard/doctor enforcement remains owned by #1731.
    classification_rule: >
      Every env listed here is either retired by a later child, governed by an existing typed owner, retained as a tracked
      residual helper/debug source, quarantined as debug/test-only, or explicitly governed by another owner. Public docs and
      templates MUST NOT present these envs as normal setup. #1640 does not create env-over-config precedence or dual
      semantic ownership.
    classifications:
      existing_config_owned_workspace_sources:
        disposition: retired_by_1843_to_flags_or_typed_workspace_config
        owner: workspace_model.data_source_authority and workspace_model.workspace_backend_selection
        env_vars:
        - SWARM_WORKSPACE_DATA_SOURCE
        - SWARM_WORKSPACE_BACKEND
        rule: >
          These envs historically overlapped existing workspace owners. #1843 removes them from source order and accepted-set
          seeded status: use `--data` / `workspace.data_source` and `--workspace-backend` / `workspace.backend` instead.
      production_bootstrap_or_deployment_plumbing:
        disposition: retired_by_1843_to_workspace_config_or_internal_defaults
        owner: workspace_model.runtime_image_packaging, workspace_model.local_workspace_image_build_authority, workspace_model.data_source_authority, workspace_model.workspace_backend_selection, and workspace lifecycle config construction
        env_vars:
        - SWARM_DOCKER_BIN
        - SWARM_WORKSPACE_IMAGE
        - SWARM_WORKSPACE_HOST_ROOT
        - SWARM_WORKSPACE_VOLUMES_FROM
        - SWARM_WORKSPACE_NETWORK
        - SWARM_WORKSPACE_DATA_MOUNT
        - SWARM_WORKSPACE_CONTRACTS_SOURCE
        - SWARM_WORKSPACE_CONTRACTS_MOUNT
        rule: >
          #1843 removes these envs as live parent-process workspace/bootstrap inputs. `SWARM_DOCKER_BIN` moves to
          `workspace.docker_bin` or explicit `--docker-bin` for `swarm workspace build`; `SWARM_WORKSPACE_IMAGE` moves to
          `workspace.image` or explicit `--image`; host root, volumes-from, and network move to typed workspace config.
          Data/contract mount destinations are internal generated defaults with no env replacement, and contracts source is
          selected through the contracts path owner / `--contracts`.
      internal_workspace_lifecycle_names:
        disposition: retired_by_1843_internal_generated_defaults
        owner: internal/runtime/workspace Docker lifecycle configuration
        env_vars:
        - SWARM_SCAFFOLD_CONTAINER
        - SWARM_SCAFFOLD_WORKDIR
        - SWARM_SCAFFOLD_VOLUME
        - SWARM_SYSTEM_CONTAINER
        - SWARM_SYSTEM_WORKDIR
        - SWARM_SYSTEM_ENTITIES_VOLUME
        - SWARM_SYSTEM_NGINX_VOLUME
        - SWARM_SYSTEM_SYSTEMD_VOLUME
        - SWARM_ENTITY_CONTAINER_PREFIX
        - SWARM_ENTITY_WORKDIR
        rule: >
          #1843 removes these rows as live env inputs. They are fixed internal local Docker lifecycle naming/workdir defaults,
          not product contract fields, public setup guidance, or proof that container identity is semantically configurable by
          agents.
      runtime_private_storage_and_observability:
        disposition: keep_env_first_slice_runtime_private_storage_or_observability
        owner: runtime_storage.artifact_root and runtime monitor sink
        env_vars:
        - SWARM_ARTIFACT_ROOT
        - SWARM_MONITOR_DIR
        rule: >
          `SWARM_ARTIFACT_ROOT` remains the current spec-listed runtime-private artifact root override for local-git artifact
          storage, but public docs MUST NOT teach repo `.env` or ambient shell exports as normal setup. `SWARM_MONITOR_DIR`
          remains an observability/debug monitor log root until a later config/state-dir owner is promoted. Neither path may be
          agent-visible workspace data.
      internal_prompt_and_spec_helpers:
        disposition: keep_env_first_slice_internal_developer_helper
        owner: prompt/spec helper path resolvers
        env_vars:
        - SWARM_PROMPTS_DIR
        - SWARM_AGENT_CONFIG_MAP_FILE
        - SWARM_VERIFICATION_GATES_FILE
        - SWARM_TOOLING_LOCK_FILE
        rule: >
          These envs are internal developer/helper path overrides for prompt and auxiliary spec files. Installed-binary runtime
          behavior MUST NOT depend on old source-checkout helper paths becoming public configuration. Public docs/templates
          MUST NOT advertise them as normal setup.
      debug_and_test_quarantine:
        disposition: keep_env_first_slice_debug_or_test_quarantine
        owner: runtime debug/test harnesses
        env_vars:
        - SWARM_SQL_DEBUG
        - SWARM_BOOT_WARNINGS_FATAL
        - SWARM_EMIT_SCHEMA_STRICT
        - SWARM_CATALOG_E2E_DEBUG
        - SWARM_TEST_POSTGRES_DSN
        env_prefixes:
        - SWARM_TEST_
        rule: >
          Debug and test envs are not production/user setup. They may remain for tests, CI, and narrow developer diagnostics in
          this first slice, but public docs/templates MUST NOT advertise them. If any becomes production behavior, a later gate
          must promote a typed flag/config owner instead of relying on ambient env.
      governed_outside_1640:
        disposition: governed_by_existing_owner_or_split
        owner: cli_specification.foundations.cli_logging_policy and #1731
        env_vars:
        - SWARM_LOG_LEVEL
        rule: >
          `SWARM_LOG_LEVEL` is not a universal CLI env source and remains governed by
          cli_specification.foundations.cli_logging_policy. Parent-wide accepted-set, typed env delegation, doctor env reporting,
          generated-boundary env closure, and unknown-env guard behavior are split to #1731.
    public_doc_quarantine:
      rule: >
        Public repository setup docs and `.env.example` MUST NOT include assignment examples or normal-setup instructions for
        the envs classified by this owner. Internal test/debug documentation may mention a quarantined env only when the
        surrounding text clearly scopes it to tests, CI, or developer diagnostics.
    split_siblings:
    - '#1731 repo-wide SWARM env accepted-set guard, typed delegation schema, doctor env reporting, generated-boundary env closure, and unknown-env guard'
    - '#1600 parent residual env-source-authority closeout'
configuration_source_authority:
  unified_swarm_config:
    promoted_by: '#1804'
    parent_trackers:
    - '#1801'
    - '#1600'
    related_trackers:
    - '#1731'
    - '#1748'
    implementation_status: parser_discovery_first_slice_implemented
    canonical_owner: platform-spec.yaml#configuration_source_authority.unified_swarm_config
    scope: >
      Merge-bearing authority for the unified `swarm.yaml` configuration model. This owner defines the final
      schema sections, source layers, trust tiers, source precedence, strict/old-shape handling, deep-merge and
      provenance semantics, and #1600 env-drain destinations. The #1858 parser/discovery first slice implements the
      unified parser, layered discovery, global explicit config selection, `SWARM_CONFIG` locator behavior,
      executable-adjacent `config.yaml` invalidation, and minimum doctor provenance. #1844 implements the generated
      `swarm.example.yaml` public guidance cleanup. Provider-trigger runtime behavior changes, sharding runtime
      promotion, serve/connection family cleanup, and seeded env-row shrinkage remain split to later children.
    invariant: >
      Swarm configuration is explicit, typed, and provenance-bearing. Environment variables are never a normal
      precedence layer; they are accepted only as the `SWARM_CONFIG` config-file locator/replacement, as a
      schema-declared exact env delegation field, as a seeded #1600 migration row, as a test quarantine row, or as a
      generated child-process boundary row. File config may name secret/token sources, but MUST NOT store inline
      secret values.
    source_precedence:
      order:
      - flags
      - explicit_config
      - local_operator_config
      - project_config
      - user_global_config
      - built_in_defaults
      rules:
        flags: >
          Invocation-scoped flags win for the semantic owner they target. Inline secret values remain forbidden; flags
          may name files or other non-argv secret sources only where the owning section allows it.
        explicit_config: >
          A global `--config <path>` selects a full-trust unified `swarm.yaml` file. `SWARM_CONFIG`, when non-empty and
          no `--config` flag is supplied, is only a bootstrap locator/replacement for a config file; it never injects
          individual values or creates env-over-config precedence.
        local_operator_config: >
          A gitignored `.swarm/swarm.yaml` under the current project root is the local operator layer. It may set
          runtime behavior and local overrides but not connection/auth values. Individual elevated runtime keys may be
          admitted from local-operator config only when their owning section allows local machine-specific overrides.
        project_config: >
          A checked-in `./swarm.yaml` is the low-trust project layer. It may set only project-safe runtime behavior.
          It cannot set connection/auth keys, non-loopback or wildcard listener binds, serve token files,
          `workspace.allow_exec_on_host`, or absolute/outside-project path references.
        user_global_config: >
          `${XDG_CONFIG_HOME:-$HOME/.config}/swarm/swarm.yaml` is full-trust user-global config. It replaces the
          current flat `config.yaml` target after the parser/discovery migration child.
        built_in_defaults: >
          Built-in defaults are lowest precedence and must remain explicit in the consuming owner. Defaults do not
          authorize ambient repo, executable-adjacent, env, or source-checkout discovery.
    trust_tiers:
      full:
        sources:
        - flags
        - explicit_config
        - user_global_config
        may_set: any non-secret config key accepted by that key's semantic owner
      medium:
        sources:
        - local_operator_config
        may_set: runtime behavior, local paths, and local overrides except connection/auth and explicitly elevated keys
      low:
        sources:
        - project_config
        may_set: project-safe runtime behavior only
    key_trust_classes:
      project_safe: May be set by project config.
      elevated: Requires flags, explicit config, user-global config, or an allowed local-operator key.
      secret_reference: May reference a token file, secret key, secret file, or explicit env delegation; inline secret values are rejected.
      project_contained_path: Project config may set only relative paths that remain under the canonical project root after clean/eval checks.
      split_unsupported: Known config-looking seam that remains invalid or split until a later gate promotes it.
    schema:
      strict_unknown_keys: fail_closed
      env_interpolation: rejected
      sections:
        connection:
          trust: elevated
          keys:
            api_server: elevated
            api_token_file: secret_reference
          owner: cli_specification.foundations.api_connection_auth_config_precedence
          notes: >
            Connection config is an elevated file-config input. Live project/selected context descriptors remain a
            separate target authority and are not demoted into ordinary file-layer precedence.
        serve:
          trust: elevated_for_public_listener_or_auth
          keys:
            api_listen_addr: elevated_when_non_loopback_or_wildcard
            mcp_listen_addr: elevated_when_non_loopback_or_wildcard
            api_token_file: secret_reference
          owner: cli_specification.command_catalog.serve.listener_topology_v2_1
        runtime:
          trust: project_safe_unless_key_is_marked_elevated
          keys:
            max_concurrent_agents: split_unsupported
            event_poll_interval: split_unsupported
            recovery_on_startup: project_safe
          owner: runtime_storage.runtime_store_backend_selection
        store:
          trust: elevated
          keys:
            backend: elevated
            sqlite.path: project_contained_path_or_elevated
          owner: runtime_storage.runtime_store_backend_selection
        database:
          trust: elevated
          keys:
            host: elevated
            port: elevated
            name: elevated
            user: elevated
            sslmode: elevated
            pool_size: elevated
            password: rejected_inline_secret
            password_secret_key: secret_reference
            password_file: secret_reference
            password_env: schema_declared_env_delegation
          owner: runtime_storage.runtime_store_backend_selection.postgres_connection_details
        workspace:
          trust: project_safe_unless_key_is_marked_elevated
          keys:
            data_source: project_contained_path_or_elevated
            backend: project_safe
            allow_exec_on_host: elevated
            image: elevated
            docker_bin: elevated
            host_root: elevated
            volumes_from: elevated
            network: elevated
          owner: workspace_model.workspace_backend_selection
        llm:
          trust: project_safe_unless_key_is_marked_elevated
          keys:
            backend: project_safe
            runtime_mode: split_unsupported
            models: project_safe
            session.lock_ttl: project_safe
            session.rotate_after_turns: project_safe
            session.rotate_on_parse_failures: project_safe
            provider_limits: project_safe
            claude_api.default_model: split_unsupported
            claude_api.haiku_model: split_unsupported
            claude_cli.command: elevated
            claude_cli.timeout: project_safe
            claude_cli.output_format: project_safe
            claude_cli.retries: split_unsupported
            claude_cli.no_session_persistence: split_unsupported
            claude_cli.use_tmux: split_unsupported
            openai_compatible.base_url: elevated
            openai_compatible.default_model: split_unsupported
            openai_compatible.low_cost_model: split_unsupported
            openai_responses.base_url: elevated
          owner: engine.agent_session_management.llm_provider_selection_config_authority
          retired_model_selection_keys: >
            `llm.claude_api.default_model`, `llm.claude_api.haiku_model`,
            `llm.openai_compatible.default_model`, and `llm.openai_compatible.low_cost_model`
            are retired model-selection inputs. Unified config migration MUST keep rejecting them with guidance to use
            `llm.models`; this spec does not re-admit them as accepted project-safe keys.
          claude_cli_control_cleanup: >
            `llm.claude_cli.retries`, `llm.claude_cli.use_tmux`, and
            `llm.claude_cli.no_session_persistence` remain split_unsupported until #1803 or a later explicitly
            gated production runtime owner promotes real behavior. Field presence/default seeding is not proof of
            supported config semantics, and #1858 MUST keep these controls fail-closed with no supported replacement.
          provider_limits_shape: >
            `llm.provider_limits.<profile>` profile ids and
            `llm.provider_limits.<profile>.models.<model>` model ids are dynamic map keys, but provider-limit policy
            fields are finite: `rate_limit`, `rate_limit_max_wait`, `max_concurrency`,
            `max_concurrency_max_wait`, and profile-level `models`. Unknown policy fields under a provider profile
            or model policy MUST fail closed as unknown config keys before YAML struct decoding can silently ignore
            them. Nested `models` maps under model-specific policy entries remain unsupported and fail closed.
        provider_triggers:
          trust: split_by_pack_authorship
          keys:
            packs.platform_dirs: elevated
            packs.external_dirs: project_contained_path_or_elevated
          owner: contract_formats.configured_provider_triggers
          path_rule: >
            Project config cannot declare `packs.platform_dirs`; platform-authored capability inventory requires
            local-operator, user-global, explicit config, or a future promoted flag. Project config may name external packs
            only through project-contained relative directories. Absolute paths, parent escapes, symlink escapes, or paths
            outside the canonical project root are elevated. Relative entries in each effective directory-list key resolve
            from the config layer that declared that key, not from an aggregate or highest-precedence config path. The
            effective elevated `packs.platform_dirs` key is mandatory and must resolve to the exact current-platform
            first-party identity inventory; missing, empty, partial, or unexpected platform inventory fails before stores.
        budget:
          trust: project_safe
          keys:
            global_monthly_cap: project_safe
            per_entity_monthly_cap: project_safe
            system_monthly_cap: project_safe
            human_tasks.max_tasks_per_week: project_safe
            human_tasks.budget_reset: project_safe
            human_tasks.auto_expire_hours: project_safe
            human_tasks.categories_enabled: project_safe
          owner: config extensions budget owner, to be promoted by parser migration child
          nested_shape: >
            Human task budget controls remain under `budget.human_tasks`, matching the implemented
            `BudgetConfig.HumanTasks` shape. A separate top-level `human_tasks` section is not part of the unified
            schema unless a future migration explicitly promotes and gates that shape.
        sharding:
          trust: split_unsupported
          keys:
            '*': split_unsupported
          owner: split_runtime_sharding_owner_required
          rule: >
            Current code rejects `sharding` with `sharding extension is unsupported: no runtime path consumes it`.
            #1804 does not promote sharding runtime behavior.
        paths:
          trust: project_contained_path_or_elevated
          keys:
            swarm_dir: elevated
            contracts_path: project_contained_path_or_elevated
            platform_spec_path: project_contained_path_or_elevated
            prompts_dir: project_contained_path_or_elevated
            artifact_root: elevated
            monitor_dir: elevated
            agent_config_map_file: project_contained_path_or_elevated
            verification_gates_file: project_contained_path_or_elevated
            tooling_lock_file: project_contained_path_or_elevated
          owner: contract/platform path owners, runtime_storage.artifact_root, and #1600 helper-path drains
    merge_semantics:
      rule: >
        Layers deep-merge key-by-key by section. Implementations MUST track presence separately from zero values so
        omitted means inherit lower-precedence value while explicit false, zero, empty list, or empty string are
        validated as deliberate values by the owning key.
      provenance: >
        The unified parser must retain source layer, source path, line/column when available, and trust-class result for
        every accepted or blocked key so `swarm doctor` can explain the effective config.
    old_shape_and_unknown_key_policy:
      unknown_keys: fail_closed_with_key_path_and_source
      rejection_diagnostics:
        unknown_key: >
          Typos or truly unknown keys MUST fail closed with the key path, source path/layer, and nearest-known-key
          suggestion when available. Message shape: "unknown config key `<path>` in `<source>`; did you mean `<known>`?"
        trust_tier_rejection: >
          Keys recognized by the unified schema but forbidden from the source's trust tier MUST fail closed as
          not-allowed-here, not as unknown. The diagnostic MUST include the key path, source layer, required trust
          class, and exact remediation such as "move this to .swarm/swarm.yaml, user-global config, explicit --config,
          or a flag".
        split_unsupported_key: >
          Keys classified as `split_unsupported` are recognized but not wired. They MUST fail closed with a distinct
          not-yet-wired diagnostic that names the key path, owning/split tracker when known, and a current replacement
          or "no supported replacement" guidance. They MUST NOT be silently ignored and MUST NOT be reported as typos or
          trust-tier violations.
      flat_cli_shape: >
        Top-level flat CLI keys such as `api_server`, `api_token_file`, `serve_api_listen_addr`, and
        `serve_api_token_file` are old-shape evidence outside their unified sections and must fail closed with
        migration guidance.
      runtime_config_shape: >
        Runtime section keys that remain canonical may be valid as a subset of unified `swarm.yaml`; old command-local
        runtime config discovery and executable-adjacent `config.yaml` remain superseded sources and must fail closed
        or route through migration guidance when the parser/discovery child lands.
      executable_adjacent_config_yaml: >
        Executable-adjacent `config.yaml` is ambient file authority and is not part of the unified discovery model.
        Removal is split but must be atomic with the parser/discovery implementation.
    doctor_provenance:
      command: swarm doctor
      requirements:
      - list loaded config files and layers in precedence order
      - show per-key provenance for effective values
      - show blocked keys with source path, trust-tier reason, and remediation
      - show old-shape diagnostics with migration guidance
      - render despite config/env blockers where possible and exit nonzero when blockers exist
    env_drain:
      rule: >
        Every seeded #1600 env row must drain to either a unified typed key in this owner or a terminal secret/token-file
        owner. Direct env readers are not proof of configuration ownership; each migration child must shrink the seeded
        accepted set or explicitly leave a tracked residual row.
      examples:
        SWARM_API_LISTEN_ADDR: serve.api_listen_addr
        SWARM_MCP_LISTEN_ADDR: serve.mcp_listen_addr
        SWARM_CONTRACTS_PATH: paths.contracts_path or --contracts
        SWARM_STORE_BACKEND: store.backend
        SWARM_SQLITE_PATH: store.sqlite.path
        SWARM_DB_HOST: database.host
        SWARM_DB_PORT: database.port
        SWARM_DB_NAME: database.name
        SWARM_DB_USER: database.user
        SWARM_DB_SSLMODE: database.sslmode
        SWARM_DB_POOL_SIZE: database.pool_size
        SWARM_WORKSPACE_DATA_SOURCE: workspace.data_source
        SWARM_WORKSPACE_BACKEND: workspace.backend
        SWARM_DOCKER_BIN: workspace.docker_bin or --docker-bin for workspace build
        SWARM_WORKSPACE_IMAGE: workspace.image or --image for workspace build
        SWARM_WORKSPACE_HOST_ROOT: workspace.host_root
        SWARM_WORKSPACE_VOLUMES_FROM: workspace.volumes_from
        SWARM_WORKSPACE_NETWORK: workspace.network
        SWARM_ARTIFACT_ROOT: paths.artifact_root
        SWARM_MONITOR_DIR: paths.monitor_dir
        SWARM_PROMPTS_DIR: paths.prompts_dir
        SWARM_AGENT_CONFIG_MAP_FILE: paths.agent_config_map_file
        SWARM_VERIFICATION_GATES_FILE: paths.verification_gates_file
        SWARM_CREDENTIALS_FILE: secrets file owner, not inline config secret
        SWARM_MANAGED_CREDENTIALS_FILE: managed credential store owner, not inline config secret
    consumer_matrix:
      flat_cli_config: superseded_by_unified_owner_first_slice_implemented
      xdg_config_yaml: invalid_legacy_discovery_replaced_by_user_global_swarm_yaml_by_1858
      runtime_config_loader: consumed_by_unified_owner_first_slice_implemented
      executable_adjacent_config_yaml: invalid_ambient_reader_removed_by_1858
      env_guard_delegated_env_sources: consumed_by_unified_owner_first_slice_implemented
      provider_triggers_packs_platform_dirs: consumed_by_unified_owner
      provider_triggers_packs_external_dirs: consumed_by_unified_owner
      budget_human_tasks_inline_extension: consumed_by_unified_owner_code_migration_split
      llm_retired_model_selection_keys: split_unsupported_retired_use_llm.models
      llm_claude_cli_current_controls: split_unsupported_tracked_by_1803
      sharding_inline_extension: split_unsupported_retired
      context_descriptors: different_semantic_owner_local_target_context_registry
      token_and_secret_material: different_semantic_owner_secret_or_token_file_reference_only
      env_accepted_set_seeded_rows: migration_backlog_to_unified_keys_or_secret_owners
    legacy_spec_commitments_superseded:
    - owner: cli_specification.foundations.api_connection_auth_config_precedence.cli_config_file
      commitment: historical root/global --config rejection and XDG flat config.yaml acceptance
      superseded_by: configuration_source_authority.unified_swarm_config
    - owner: cli_specification.command_catalog.serve.runtime_config_backend_selection
      commitment: historical command-local --config plus executable-adjacent config.yaml runtime config discovery
      superseded_by: configuration_source_authority.unified_swarm_config
    - owner: cli_specification.command_catalog.serve.listener_topology_v2_1
      commitment: listener env/config keys as flat CLI config keys
      superseded_by: configuration_source_authority.unified_swarm_config serve section
    split_siblings:
    - '#1858 unified parser and layered discovery first-slice implementation'
    - '#1803 inert/unsupported Claude CLI config-surface cleanup'
    - '#1600 seeded env-row family migrations'
    - '#1799 runtime/LLM config-default env-row retirement consumes this owner for final key-path guidance'
    - '#1844 generated `swarm.example.yaml` examples/docs cleanup'
    - runtime sharding behavior promotion, if ever desired
    - provider-trigger runtime behavior changes, explicitly not part of #1804
workspace_model:
  description: Defines the filesystem contract for agent sessions. The platform provides three standard mount points and a
    scoping model. Products define workspace classes that map agent roles to specific scope configurations. If a product declares
    a workspace_class on an agent, the platform MUST provide all mounts at the declared scopes.
  runtime_image_packaging:
    promoted_by: '#1002'
    implementation_status: implemented
    canonical_owner: platform-spec.yaml#workspace_model.runtime_image_packaging
    rule: >
      Runtime workspace startup treats the configured workspace image as a prebuilt runtime dependency. The runtime MUST inspect
      the resolved workspace image before creating workspaces and fail closed with an actionable diagnostic when the image is
      absent. Production runtime code MUST NOT build a missing workspace image from source-checkout `Dockerfile.workspace`, use
      `runtime.Caller` / Go source paths as a runtime asset root, or walk for `go.mod` to recover build material.
    mount_source_rule: >
      Host sources for `/data` and `/opt/swarm/contracts` MUST come from `workspace_model.data_source_authority`,
      explicit deployment configuration, config/CLI path resolution, or an already selected workflow/project
      root passed by the command owner. Default workspace runtime configuration MUST NOT derive those mount sources from
      the Swarm source checkout except for the promoted `.swarm/data` managed local default owned by
      `workspace_model.data_source_authority`.
    split_scope: >
      Docker Compose setup and workspace image contents/default agent CLI availability remain tracked separately by #996 and
      #997 unless a future gate explicitly widens them.
  local_workspace_image_build_authority:
    promoted_by: '#1566'
    implementation_status: implemented_first_slice
    canonical_owner: platform-spec.yaml#workspace_model.local_workspace_image_build_authority
    implementation_owner: cmd/swarm workspace build command plus embedded workspace Dockerfile materializer
    scope: >
      Merge-bearing local setup authority for building and validating the Docker workspace image needed by local
      `claude_cli` proof flows. This owner is an explicit operator setup surface. It is separate from runtime startup:
      runtime startup consumes `workspace_model.runtime_image_packaging` and MUST remain fail-closed inspect-only when the
      configured image is missing or unusable.
    command_surface: swarm workspace build --backend claude_cli [--config <path>] [--image <tag>] [--docker-bin <path>]
    build_plan_rule: >
      The command MUST use an embedded/materialized workspace Dockerfile or equivalent embedded build plan. It MUST NOT
      locate build material by walking for a source checkout, reading repo-root `Dockerfile.workspace`, using
      `runtime.Caller`, or requiring a `go.mod` path. The materialized plan is internal implementation detail, not a
      user-facing configuration source.
    claude_cli_build_profile:
      backend: claude_cli
      docker_build_args:
        INSTALL_CLAUDE_CLI: 'true'
        INSTALL_CODEX_CLI: 'false'
      version_policy: >
        Claude CLI package/version selection is owned by the embedded workspace Dockerfile defaults unless a later gated
        source-authority change promotes explicit version flags.
    image_target_rule: >
      Without `--image`, the command MUST target the same configured workspace image consumed by `swarm serve` Docker
      startup: `workspace.image` from an explicit config when provided, otherwise `swarm-workspace:latest`. `--image <tag>`
      is an explicit setup-only override and MUST fail closed when empty or syntactically invalid. The override does not
      change runtime configuration by itself; operators must still run serve with the matching configured image when
      overriding.
    docker_bin_rule: >
      The command MUST use `--docker-bin` when provided, otherwise `workspace.docker_bin` from an explicit config when
      provided, otherwise the built-in `docker` default. `SWARM_DOCKER_BIN` is retired and MUST NOT be read as a fallback.
    validation_rule: >
      The command MUST build into a temporary image tag first and MUST NOT publish/replace the configured runtime image
      tag until validation passes. After build, the command MUST validate the temporary image by running a harmless
      executable Claude CLI proof inside the image, equivalent to `command -v -- "$1" >/dev/null && "$1" --version
      >/dev/null` with `$1=claude`. Image inspection alone and command lookup alone are insufficient.
    consumer_boundaries:
      - '`swarm workspace build` is the setup producer for this first slice.'
      - '`swarm doctor --backend claude_cli` may report or recommend the build command, but MUST NOT build images.'
      - '`swarm serve --dev --backend claude_cli` and local foreground `swarm run start --backend claude_cli` MUST NOT auto-build images.'
      - 'Host workspace backend execution, local API connection discovery, stale MCP gateway env policy, Compose setup, and docs rollout remain split.'
  data_source_authority:
    promoted_by: '#1139/#1223'
    implementation_status: implemented
    canonical_owner: platform-spec.yaml#workspace_model.data_source_authority
    scope: >
      Defines the host/source authority for the agent-visible `/data` mount for `swarm serve`, local foreground `swarm run start`,
      and current workspace lifecycle consumers. Compose/Postgres onboarding (#1137), host workspace backend execution
      parity (#1138/#1213), SQLite store concurrency, agent-free workspace-init skipping, and mount destination override
      cleanup remain split.
    cli_flag: --data
    config_key: workspace.data_source
    retired_env_var: SWARM_WORKSPACE_DATA_SOURCE
    source_order:
    - --data
    - workspace.data_source
    - project_default
    default_behavior: >
      If no explicit path source is selected and no deployment alternate such as `workspace.volumes_from` is active,
      the local runtime state resolver MUST select and create `<project-root>/.swarm/data` with mode 0755 only when the canonical
      contracts project root is the active repo root or is under it. If there is no project, or the command points at a borrowed
      contracts root outside the active repo root, startup MUST fail closed with guidance to pass `--data` or configure
      `workspace.data_source`; it MUST NOT create cwd-relative `.swarm/data` or pollute the
      borrowed contracts tree. The runtime MUST NOT synthesize `/data` from the Swarm source checkout or from a repo-local
      `data/` directory unless that path was explicitly selected through the authoritative source order.
    path_resolution_rule: >
      Non-empty relative path sources are resolved through the command path resolver with the active repo root when present;
      absolute path sources are used as-is after cleaning. Empty explicit values are invalid.
    failure_behavior: >
      Missing or unreadable explicit path sources fail closed during workspace boot validation. Empty explicit values are
      invalid and MUST NOT fall through to environment or default sources. Default directory creation failures fail closed
      before workspace lifecycle construction.
    volumes_from_conflict_rule: >
      `workspace.volumes_from` is an explicit Docker deployment alternate, not a fallback path source. If no explicit
      `/data` path source is selected and `workspace.volumes_from` is active, the command resolver MUST NOT
      materialize or override with `.swarm/data`; Docker workspace validation consumes the alternate shared mounts instead.
      `workspace.volumes_from` MUST NOT be combined with an explicit `/data` path source from `--data` or
      `workspace.data_source`; startup must fail closed on that conflict. Host backend startup continues to reject
      `workspace.volumes_from`.
    read_policy: >
      `/data` remains read-only, global, and opaque to the platform. Source authority does not permit indexing, mutating,
      validating contents beyond mount readability, or folding runtime `/data` into workflow bundle identity.
    consumers:
    - swarm serve boot workspace lifecycle
    - local foreground `swarm run start` startup through the serve startup owner
    - builder project supervisor reload workspace lifecycle
    - selected-contract run-fork workspace lifecycle
    - Docker workspace manager SharedDataSource mount consumer
    - Host workspace manager SharedDataSource mount consumer
    retired_non_authoritative_sources:
    - repoRoot/data derivation in cmd/swarm configuredWorkspaceLifecycle
    - lower-level Docker default ownership of SWARM_WORKSPACE_DATA_SOURCE
    - parent-process SWARM_WORKSPACE_DATA_SOURCE
    - parent-process SWARM_WORKSPACE_VOLUMES_FROM
    split_scope:
    - '#1137 Compose/Postgres onboarding and Compose ./data:/data:ro deployment shape'
    - '#1138/#1213 host workspace backend execution parity'
    - '#1214 SQLite first run/event locking'
    - agent-free workspace-init skipping
    - broader local runtime onboarding/docs polish
    - mount destination override semantics such as SWARM_WORKSPACE_DATA_MOUNT
  workspace_backend_selection:
    promoted_by: '#1138'
    implementation_status: implemented_capability_driven_first_slice
    canonical_owner: platform-spec.yaml#workspace_model.workspace_backend_selection
    scope: >
      Defines the capability-derived effective workspace backend requirement for `swarm serve` boot, dynamic Builder project
      reload, selected-contract run-fork lifecycle consumers, local foreground `swarm run start`, `swarm doctor`, `swarm
      verify`, `swarm describe`, and the `conversation.fork_chat` sandbox runtime. The loaded contract and effective runtime
      backend decide whether a workspace is needed, whether host is sufficient, or whether container isolation is required.
      Operator backend input is a preference or explicit unsafe opt-out; it is not the semantic source of the requirement.
    cli_flag: --workspace-backend <docker|host>
    config_key: workspace.backend
    unsafe_config_key: workspace.allow_exec_on_host
    retired_env_var: SWARM_WORKSPACE_BACKEND
    source_order:
    - loaded contract execution capability
    - --workspace-backend preference / unsafe host opt-out
    - workspace.backend preference plus workspace.allow_exec_on_host for persistent unsafe host opt-out
    default_backend: capability-derived
    capability_classes:
      none:
        rule: No declared agents require no workspace lifecycle by default and MUST boot with zero Docker/workspace external dependencies.
      workspace_write:
        rule: >
          Runtime-mediated agents or agents with `native_tools.file_io` but no process-spawning capability use the host
          lifecycle by default. Host file operations remain scoped by `workspace_execution_target_capability`.
      exec:
        rule: >
          Any agent whose effective backend spawns a local process (`claude_cli`) or that is granted an exec-class capability
          such as `native_tools.bash` requires Docker by default. The first slice is coarse any-exec => Docker; per-agent
          backend selection remains split.
    decision_table:
      - contents: no declared agents
        backend: none
        posture: zero external dependencies unless the operator explicitly requests docker or host for diagnostics/setup
      - contents: API/runtime-mediated agents with no exec-class tools
        backend: host
        posture: default and silent
      - contents: anything exec-capable
        backend: docker_required
        posture: >
          Docker missing fails closed at the `runtime_context` boot step with doctor-format remediation naming the
          exec-capable agent/capability. Host is allowed only through explicit loud unsafe opt-out.
    backends:
      none:
        behavior: >
          No workspace lifecycle is constructed. Runtime boot and forkchat wiring MUST NOT require Docker only because the
          API exposes a potential forkchat executor. If a later API operation reaches a workspace-required path, it fails
          closed through this owner instead of falling back to Docker, host cwd, or nil workspace behavior.
      docker:
        behavior: >
          Required backend for exec-capable bundles unless unsafe host opt-out is accepted, and allowed as an explicit
          operator preference for non-exec diagnostics/setup. Startup preserves the existing Docker fail-closed checks for the configured workspace
          image, Docker binary availability, Docker network, container creation, mounted `/data`, mounted contracts, and
          managed container lifecycle.
      host:
        behavior: >
          Default backend for non-exec agent bundles and explicit local-dev/trusted opt-in where accepted. Startup consumes the selected `/data` source from
          `workspace_model.data_source_authority`, the loaded contracts source, and a platform-managed host workspace root.
          It MUST NOT require Docker, build Docker images, or create containers. It supports trusted/unsafe native command
          execution only through `workspace_execution_target_capability` after explicit unsafe host opt-out and actor
          `native_tools.bash` authorization. Host native command execution is full host-user shell execution and must not be
          command-filtered by the runtime. It MUST fail closed for unsupported execution surfaces until those host execution
          semantics are explicitly promoted. `workspace.backend: host` alone is insufficient for exec-capable bundles; it
          must be paired with `workspace.allow_exec_on_host: true` and the runtime must print a loud warning every boot.
        workspace_root:
          config_key: workspace.host_root
          default: ~/.swarm/workspaces
          rule: >
            The host workspace root is platform-managed and writable. Startup MUST create/validate required workspace roots and
            MUST reject roots that overlap the read-only `/data` source or loaded contracts source. Overlap checks MUST use
            canonical/evaluated paths. Every host lifecycle consumer MUST pass this validation before platform-managed
            workspace path creation; path creation MUST fail closed instead of following symlink escapes out of the selected
            host workspace root.
    failure_behavior:
    - Unsupported backend names fail closed before runtime construction.
    - Empty explicit backend sources from the flag or config fail closed instead of falling through.
    - Host backend MUST reject `workspace.volumes_from`; the host backend consumes explicit path authorities, not Docker
      volume inheritance.
    - Host backend MUST fail closed for Claude CLI/provider execution unless a future gate promotes that support. Host native
      command execution is supported only as trusted/unsafe explicit host-mode execution through
      `workspace_execution_target_capability`; unsupported native tool execution MUST still fail closed.
    - A retired environment value such as `SWARM_WORKSPACE_BACKEND=host` MUST NOT act as the unsafe host opt-out for
      exec-capable bundles.
    - conversation.fork_chat MUST consume the same decision owner. It MUST NOT preserve implicit primary-workspace
      inheritance or discover required isolation only by failing inside the LLM process startup path.
    - Docker target failures, missing containers, nil targets, empty targets, unknown backends, and non-host-authorized
      contexts MUST NOT silently fall back to host native command execution.
    consumers:
    - swarm serve boot workspace lifecycle
    - local foreground `swarm run start` startup through the serve startup owner
    - dynamic Builder project reload workspace lifecycle
    - selected-contract run-fork workspace lifecycle
    - swarm verify isolation diagnostics
    - swarm describe isolation diagnostics
    - swarm doctor local diagnostics
    - conversation.fork_chat sandbox LLM runtime admission
    split_scope:
    - '#1137 Compose/Postgres onboarding and Compose cleanup'
    - '#1136 broader local onboarding/docs'
    - full host Claude CLI/provider execution parity
    - production SQLite multi-writer semantics
  workspace_execution_target_capability:
    promoted_by: '#1213/#1235/#1286/#1356'
    implementation_status: implemented_host_file_relay_and_trusted_command_slice
    canonical_owner: platform-spec.yaml#workspace_model.workspace_execution_target_capability
    scope: >
      Defines the canonical runtime execution-target and capability authority for workspace-backed execution surfaces after
      workspace backend selection. The owner distinguishes Docker container execution, explicit host-local targets, and
      unsupported targets. It does not make host execution Docker-equivalent. Host-local targets support trusted/unsafe
      native command execution, platform-managed native file read/write, and tool-result relay over logical workspace mounts.
      Host native command execution is full host-user shell execution from the workspace backing directory; command and
      absolute-path access follow the host deployment namespace and OS permissions. Host Claude/provider runtime support
      remains unsupported unless a later gate promotes that surface.
    implementation_owner: internal/runtime/workspace.ExecutionTarget
    target_modes:
      docker_container:
        rule: >
          A Docker target has an explicit backend, container identity, logical workdir, and standard logical mounts. Current
          Docker-backed execution capabilities remain supported through this mode.
        capabilities:
        - native_command
        - file_read
        - file_write
        - tool_result_relay
        - claude_cli
      host_local:
        rule: >
          A host target is an explicit local-dev backend target with platform-managed raw host backing paths and logical
          mount identities. Host-local targets MUST NOT infer execution support from an empty container field. Host-local
          targets support trusted/unsafe native_command, file_read, file_write, and tool_result_relay only through the
          platform-managed workspace execution owner; claude_cli remains unsupported.
        capabilities:
        - native_command
        - file_read
        - file_write
        - tool_result_relay
      unsupported:
        rule: >
          Nil targets, unknown backend names, Docker targets without a container, and empty targets are unsupported. They MUST
          fail closed instead of falling back to process cwd, raw workdir execution, or implicit host execution.
        capabilities: []
    logical_mount_authority:
      writable:
      - /workspace
      read_only:
      - /data
      - /opt/swarm/contracts
      rules:
      - Relative execution paths resolve under logical `/workspace`.
      - Writes outside logical `/workspace` fail closed.
      - Reads outside logical `/workspace`, `/data`, and `/opt/swarm/contracts` fail closed.
      - Runtime execution surfaces MUST expose logical paths as product semantics and MUST NOT leak raw host backing paths as
        agent-visible authority.
      - Host file operations MUST resolve private host backing paths through this owner from the selected logical mount and
        MUST reject symlink escapes or raw host absolute paths as product input.
      - Host execution target production MUST consume `workspace_model.data_source_authority` for `/data` and the loaded
        contracts source for `/opt/swarm/contracts`.
    consumers:
    - Docker workspace target production
    - Host workspace target production
    - native executor command execution
    - native executor read_file and write_file path resolution
    - native fallback tool definitions and callable capability truth
    - OpenAI-compatible/API fallback-tool routing through tools.Executor
    - native tool-result relay path construction and execution support
    - Claude CLI process command construction
    - Claude workspace-command relay
    - Claude startup visible-tool probe workspace validation
    - runtime Claude managed-agent startup validation
    retired_non_authoritative_interpreters:
    - Target.Container as execution support
    - Target.Enabled() as execution support
    - raw Target.Workdir as product path authority
    - nil target or empty target cwd fallback
    - ad hoc HostBackend() checks outside the execution-target owner
    failure_behavior:
    - Host-local native command execution MUST require explicit host backend selection, actor `native_tools.bash`
      authorization, and execution-target path authority. It is trusted/unsafe host-user execution and MUST NOT be described
      as Docker-equivalent isolation or as a command-filtered/platform-file-only surface.
    - Host-local targets remain fail closed for Claude/provider execution until a later gate promotes and proves that surface.
    - Docker target failures, Docker targets without containers, unsupported targets, and unauthorized actors MUST NOT fall
      back to host native command execution.
    - Host-local tool-result relay writes MUST use platform-managed host file I/O through the execution-target path owner and
      MUST NOT use native command, shell, or provider execution.
    - Host-local file operations fail closed when the logical path is outside allowed mounts, when a write targets a read-only
      mount, when a raw host path is provided as product input, or when private backing-path resolution would escape the selected
      mount root.
    - Empty-container targets MUST NOT authorize local host execution.
    - Docker behavior must remain regression-proven through the same typed owner.
    split_scope:
    - Claude CLI/provider-native host runtime support
    - Docker-equivalent host isolation claims
    - '#1137 and #1136 docs/onboarding cleanup'
  standard_mounts:
    description: Three mount points are available to every agent session. Products cannot add new mount points — they configure
      access and scope for these three via workspace class definitions.
    /workspace:
      description: Writable working directory for agent output — drafts, artifacts, intermediate files.
      access: read-write
      scope_options:
      - per-agent — private to one agent, invisible to others
      - per-flow-instance — shared by all agents in the same flow instance, isolated across instances
      lifecycle:
        per-agent: Created at agent registration. Cleaned on agent termination. Persists across sessions for session/session_per_entity
          conversation modes. Ephemeral for task mode.
        per-flow-instance: Created on create_flow_instance. Preserved on instance termination (for post-mortem). Archival is
          an operational concern.
    /data:
      description: Read-only shared reference data. Products populate this via deployment configuration. The platform treats
        /data as opaque — it never reads, writes, indexes, or validates /data contents.
      access: read-only
      scope: global — identical content visible to every agent regardless of workspace class
      lifecycle: Mounted at boot. Contents managed outside the platform (deployment, CI, admin).
    /opt/swarm/contracts:
      description: Loaded flow contracts. Agents can read their own flow's contract files for self-reference.
      access: read-only
      scope: global
      lifecycle: Populated by the contract loader at boot. Immutable during runtime.
  workspace_class_definition:
    description: Products define workspace classes in their policy.yaml under workspace_classes. Each class maps standard mount
      points to scope configurations. The platform reads these definitions at boot and provisions mounts accordingly.
    format:
      workspace_classes:
        class_name:
          description: string — human-readable purpose
          workspace_scope: string — per-agent | per-flow-instance
    rules:
    - /data and /opt/swarm/contracts are always global, read-only. Products cannot override their scope or access.
    - workspace_scope controls the /workspace mount only — the sole configurable dimension.
    - Every workspace_class referenced by an agent in agents.yaml must be defined in policy.yaml workspace_classes.
    - The platform validates this at boot. Missing class definition is a boot error.
    platform_reserved_classes:
      description: The platform may use internal workspace classes for its own processes (e.g., boot scaffolding, system-level
        operations). Reserved class names are not declared in product policy.yaml — they are platform-internal. Products cannot
        use reserved names. Reserved names are implementation-specific and not part of the contract.
  mount_guarantees:
    description: Rules the runtime MUST enforce.
    rules:
    - Every agent session has all three standard logical mounts available through platform workspace/file surfaces. Docker-backed
      command execution exposes those logical mounts as OS paths; trusted host native command execution is full host-user shell
      execution from the resolved workspace backing directory and does not synthesize absolute OS mount paths.
    - /data is the SAME mount point across all workspace classes. An agent in any class sees identical /data contents.
    - /workspace isolation follows the workspace_scope declared by the agent's workspace class. per-agent workspaces are never
      visible to other agents. per-flow-instance workspaces are visible to all agents in that flow instance only.
    - Read-only mounts are enforced at the filesystem level for backends that expose the logical mounts as OS paths
      (read-only bind mount, or equivalent). Platform-managed host file operations enforce read-only /data and
      /opt/swarm/contracts through logical path authority. Trusted host native commands are full host-user shell execution
      and do not provide Docker-equivalent read-only mount isolation.
    - The runtime MUST NOT vary mount availability based on conversation_mode, model, or any other agent property. Workspace
      class is the sole determinant of /workspace scope.
  boot_validation:
    description: The platform verifies workspace infrastructure at boot.
    checks:
    - Every workspace_class referenced in agents.yaml is defined in policy.yaml workspace_classes
    - /data mount exists and is readable
    - /opt/swarm/contracts is populated from contract loader
    - For each registered agent, /workspace path is creatable under the declared scope
    failure: Boot aborts if any workspace mount cannot be satisfied. Error message identifies the failing mount, workspace class,
      and agent.
  deployment_mapping:
    description: How standard logical mounts map to deployment environments. Platform logical paths are invariant; command
      process namespace behavior differs by backend as explicitly documented.
    local_dev:
      /data: Host directory bind-mounted read-only. Same path for all agent processes.
      /workspace: Host directory under a platform-managed root (e.g., ~/.swarm/workspaces/{scope}/{id}).
      /opt/swarm/contracts: Host directory populated by contract loader at boot.
    docker:
      /data: Named volume or bind mount, shared across all containers. Read-only flag required.
      /workspace: Per-scope volumes. per-agent classes get per-agent volumes. per-flow-instance classes share an instance volume.
      /opt/swarm/contracts: Read-only volume populated by init container or bind mount.
    production:
      /data: Network-attached storage (NFS, EFS, GCS FUSE) mounted read-only. Consistent across all compute nodes.
      /workspace: 'Storage persistence follows conversation_mode. task mode: ephemeral (tmpfs acceptable). session modes: persistent
        storage required.'
      /opt/swarm/contracts: Read-only volume from deployment artifact.
    portability_rule: A product contract that works on local dev MUST work on Docker and production without contract changes.
      Mount paths are invariant. Only the backing storage implementation changes.
  managed_container_identity:
    status: internal_only
    owner: internal/runtime/containeridentity plus internal/runtime/workspace creation paths
    purpose: Durable, inspectable identity for platform-created workspace containers. Destructive reset and recovery code must
      consume this identity rather than inferring ownership from container names, prefixes, or raw Docker listings.
    labels:
      owner: dev.swarm.owner = runtime
      kind: dev.swarm.container.kind = scaffold | system | entity | agent | flow
      reset_eligibility: dev.swarm.reset.eligible = true | false
      creation_source: dev.swarm.creation_source names the workspace creation owner
      container_name: dev.swarm.container.name records the exact container name stamped at creation
      workspace_scope: dev.swarm.workspace.scope records scaffold, system, entity, per-agent, or per-flow-instance scope
      lineage: dev.swarm.run_id, dev.swarm.entity_id, dev.swarm.agent_id, and dev.swarm.flow_instance are stamped when
        that lineage is available to the creation owner
    reset_policy:
    - Destructive reset may stop only containers whose typed identity proves owner=runtime, reset_eligible=true, and kind
      is entity, agent, or flow.
    - scaffold and system containers are platform-created but reset_eligible=false and must be preserved by destructive reset.
    - Unlabeled, unregistered, operator-managed, postgres/tool-gateway, name-only, and ambiguous containers are preserved
      fail-closed. A Swarm-looking container name is not ownership proof.
    - Destructive reset planning captures managed container refs before run-scoped DB cleanup can remove supporting runtime
      rows. Cleanup tables are not the container selector.
    - Broad Docker enumeration such as raw `docker ps | docker stop` is not a production reset owner. Label-filtered inventory
      may be used only as a consumer of this typed identity model.
agent_prompt_lint:
  description: Prompt/schema lint for authored agent prompts on the verify surface.
  authority_distribution:
    structural:
      authority: hard_invalidity
      scope: Parseable structural references only. Deterministic drift fails boot.
      examples:
      - fenced code blocks showing tool arguments
      - quoted/backticked field references in direct instructions
      - YAML or JSON prompt fragments that name declared contract fields
    lower_confidence_follow_ons:
      authority: tracked separately
      scope: Directive, audit, and lint-confidence prompt findings are not widened into this authoritative first slice unless
        separately promoted.
static_analyzer:
  description: Accepted static analyzer slices promoted from review drafts into the authoritative platform contract spec.
    These slices are verify-owned and must not be widened beyond their recorded scope without a spec change.
  authority_levels:
    hard_invalidity: Deterministic drift or invalidity. Boot fails. The bundle cannot ship until fixed.
    semantic_drift_warning: High-confidence drift signal that remains warning-level in this Wave 1 slice.
    audit_analysis: Medium-confidence migration/audit output. Not surfaced on normal boot.
    lint_evidence: Informational evidence catalog. Not boot-fatal and not warning-level.
  slice_1_create_entity_field_initialization:
    id: semantic_validity_create_entity_field_initialization
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - handler_specification.expression_context.boot_validation
    - handler_specification.expression_context.namespaces.entity
    - handler_specification.handler_fields.create_entity
    - handler_specification.dependency_graph
    scope:
      description: 'For handlers with create_entity: true, every entity.X value read must resolve against the inferred
        entity contract. Wave 1 universal presence semantics make declared fields readable at explicit initial or
        type-default values from create time.
        '
      applies_to:
      - 'create_entity: true handlers only'
      - 'entity.X value reads only'
      excludes:
      - full reaching-definitions across handlers or flows
      - agent write proof via save_entity_field
      - declared event/timer dead-surface drift
    proof_carriers:
      declared_entity_field:
        valid_for: all create_entity read positions
      nested_declared_path:
        valid_for: all create_entity read positions when the path resolves through named types to a declared leaf
      undeclared_field_reference:
        invalid: true
    rule: A create_entity handler value read of entity.X is invalid only when X is undeclared on the inferred entity contract
      (or the nested path does not resolve). Missing initializer proof is not a Wave 1 failure class.
    authority_notes:
      hard_invalidity: Undeclared field/path usage is error-level semantic invalidity on the verify surface.
  slice_2_emitted_event_payload_completeness:
    id: semantic_drift_payload_completeness
    domain: semantic_drift
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - handler_specification.handler_fields.emit
    - contract_formats.event_schema
    - observation_model.emitted_events.payload_rules
    scope:
      description: For every event emitted by a system node handler, verify that the emitted payload statically covers all required
        event-schema fields using only the accepted slice-2 proof carriers.
      applies_to:
      - handler top-level single-emit
      - rules entries
      - on_complete branches
      - accumulate.on_timeout
      - fan_out per-item emit
      - guard on_fail: escalate
      excludes:
      - cross-handler reaching-definitions
      - prompt lint / provenance / handoff audit work
      - lower-authority heuristic checks
      - agent write proof via save_entity_field
    proof_carriers:
      explicit_emit_fields:
        valid_for: producer-authored payload keys in the canonical explicit emit.fields map at the active emit site
      lowered_emit_from:
        valid_for: required declared emitted payload fields filled by `emit.from` before validation when the same-named source
          field exists in exactly one allowed source namespace (`entity` or `payload`)
      lowered_bare_namespace_field_values:
        valid_for: explicit emitted payload field entries whose value is the bare allowed namespace (`entity` or `payload`),
          lowered to the same-named dotted source reference before expression validation
      non_payload_envelope_context:
        valid_for: runtime-owned envelope fields accessed through event.* rather than payload completeness proof
    no_emit_fields_rule:
      description: When both canonical emit.fields and valid lowered emit.from coverage are absent, no producer-authored payload
        fields are statically provable in this slice.
    rule: For each required emitted-event payload field, emit hard-invalidity unless the field is covered by the canonical
      explicit emit.fields map after emitted-payload lowering at the active emit site. Envelope-owned fields do not clear this
      proof because they are not payload carriers. The finding message must say the field is not statically provable in the
      emitted payload.
  slice_3_input_pin_producer_path_satisfaction:
    id: input_pin_wiring
    domain: semantic_drift
    authority: semantic_drift_warning
    severity: warning
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - flow_model.flow_package.composition_routing
    - flow_model.state_composition.cross_flow_handoff
    - engine.cross_flow_routing.auto_wiring
    - engine.event_identity
    - contract_formats.event_schema
    scope:
      description: For every flow input pin event declared in schema.yaml pins.inputs.events, verify that at least one accepted
        producer source exists in the authored bundle through the canonical input-source resolver on the static verify surface.
      applies_to:
      - schema.yaml pins.inputs.events
      excludes:
      - runtime routing correctness
      - payload compatibility
      - multi-hop reachability or liveness
      - produces-based proof
      - swarm.status-based lifecycle suppression
    accepted_producer_sources:
      boundary_external_ingress:
        rule: A root input pin is externally ingressible by boundary contract.
      intrinsic_input_pin_ingress:
        rule: 'A child/template/static flow input pin explicitly declares source: external.'
      parent_connect:
        rule: Parent package.yaml connect binds a producer output pin to this receiver input pin and lowers to a concrete RoutePlan.
      harness_injection:
        rule: Validation/test harness declares an explicit injected flow/event source.
      platform_source:
        rule: The input pin event exactly matches a platform_events.catalog key or accepted platform source proof.
      internal_topology_producer:
        rule: Authored handlers, agents, flow output pins, or timers produce the event inside the topology; this proof does not
          generate producer-scoped route patterns.
    retired_producer_paths:
      sibling_flow_output_auto_wire:
        rule: Unique same-name sibling output pin inference is not producer-pattern authority and MUST NOT create auto-wire aliases.
      event_swarm_source_external:
        rule: 'events.yaml swarm.source: external is not input-pin proof. Use input pin source: external for intrinsic ingress.'
    rule: Emit warning when none of the accepted producer-source forms are found. The finding message must say no accepted producer
      source was found in the authored bundle and list the checked source classes.
  slice_3a_pin_target_resolution:
    id: pin_target_resolution
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - flow_model.flow_package.composition_routing
    - engine.cross_flow_routing
    - handler_specification.handler_fields.emit
    - contract_formats.event_schema.strict_payload_contract.envelope_identity
    canonical_replacement: flow_model.flow_package.composition_routing.analyzer_verify_requirements
    scope:
      description: For every system-node emit site or agent emit_events declaration whose emitted event is declared in the
        emitter flow's pins.outputs.events, verify that the authored contract supplies lowered parent connect topology,
        a valid target escape hatch, structural binding only when no lowered connect route applies, eligible static child
        delivery-entity routing, or explicit broadcast opt-out. Agent emit_events declarations do not require producer
        target, broadcast:true, or relay-node workarounds when parent connect supplies route authority. Loaded flow-scope
        producer target/broadcast that selects a known package receiver input for the same pin-declared output is rejected
        as common-path composition routing; package-root producer target/broadcast is rejected the same way when an
        explicit root connect endpoint consumes that root output pin. Parent connect is the route owner.
      applies_to:
      - handler top-level single-emit
      - rules entries
      - on_complete branches
      - accumulate.on_timeout
      - fan_out per-item emit
      - agent emit_events declarations
      excludes:
      - runtime instance liveness
      - payload-dependent target.match cardinality
      - mixed-trigger path disambiguation beyond statically singular handlers
      - runtime delivery correctness after a target has been resolved
    accepted_target_mechanisms:
      lowered_parent_connect:
        rule: Parent connect plus receiver addressed input pin lowering provides concrete route-plan facts before runtime dispatch.
      explicit_target:
        forms:
        - sender
        - instance_id
        - flow_match
        - flow_match_allow_fanout
        rule: Target form must be syntactically valid and reference loaded flow topology where statically known. flow_match
          target forms from loaded flow-scope producers, or package-root producers whose output pin is consumed by
          explicit root connect authority, are invalid when they select a loaded package receiver input for the same
          pin-declared output or a receiver flow reached by the parent connect graph instead of acting as a genuine
          dynamic escape hatch.
      fanout_representation:
        rule: flow_match_allow_fanout resolves to event.target_set, not singular event.target. The runtime must persist concrete
          target_set route identities and one delivery target per recipient; it must not persist only the authored selector.
      structural_parent_route:
        rule: Child-to-parent structural binding is valid only when no lowered parent connect route applies and only for
          child/template instances that will record full ParentRoute at create_flow_instance time.
      static_child_delivery_entity:
        rule: Nested static child flows without a materialized instance row may use the current delivery entity as the only
          implicit target route for pin-declared outputs; root static flows require lowered root connect authority,
          explicit target, or broadcast:true. When explicit root connect authority consumes the root output pin,
          producer target/broadcast is no longer accepted as common topology.
          This path is not ParentRoute metadata and must not fall back to inbound event.source.
      explicit_broadcast:
        rule: broadcast:true is a deliberate opt-out and is the only no-target form accepted for a pin-declared output when
          no loaded package receiver input consumes the same output event and no parent connect graph edge consumes the
          output pin from a loaded flow-scope producer or package-root producer. Parent-composed broadcast/fan-out uses connect.
    static_failure_reasons:
      target_required_missing: No lowered parent connect route, no explicit target escape hatch, no structural ParentRoute
        eligibility, no eligible static child delivery-entity route, and no broadcast:true.
      target_invalid_syntax: Literal target spec is malformed or incomplete.
      target_unknown_flow: target.flow is not present in the loaded flow registry.
      target_sender_no_inbound: target:sender is used from a handler whose only triggers cannot supply inbound event.source.
      target_sender_empty_source: target:sender is used only from external-sourced event types with empty source.
      producer_target_common_path_forbidden: A loaded flow-scope producer or package-root producer target.flow/match
        selects a loaded package receiver input for the same pin-declared output or a receiver flow reached by the
        parent connect graph; parent connect is the required route owner.
      producer_broadcast_common_path_forbidden: Loaded flow-scope or package-root broadcast:true is used as package-internal
        delivery to receiver input pins for the same pin-declared output or connected output pin; parent connect
        broadcast/fan-out is the required route owner.
    runtime_failure_reasons:
      publish_time_dead_letter:
      - target_unreachable_no_subscriber
      - target_unreachable_terminated
      - parent_route_incomplete
      - target_ambiguous
      - target_not_subscribed
      emit_time_tool_error:
      - target_sender_no_inbound_runtime
      - target_sender_empty_source_runtime
      - producer_target_common_path_forbidden
      - producer_broadcast_common_path_forbidden
    rule: Emit hard invalidity for every statically detectable missing or malformed accepted pin route source. Runtime failure
      reasons cover the cases boot verification cannot prove; no case may silently fall back to broadcast.
    implementation_slice_1444:
      status: merge_bearing_static_verify_behavior
      canonical_code_owner: internal/runtime/bootverify.checkPinTargetResolution with pinRoutingAgentEmitSites
      rule: |
        Agent emit_events declarations that name a pin-declared output event are
        static emit sites for pin_target_resolution. They consume the same
        composition-first route authority as node/system emits: lowered parent
        connect, structural ParentRoute/static child delivery-entity eligibility,
        or a spec-authorized explicit dynamic escape hatch. A lowered parent
        connect is sufficient and MUST NOT require producer target, broadcast:true,
        relay nodes, raw same-name fallback, or live-subscription compatibility
        fallback. If no accepted route proof exists, verification fails closed
        before runtime with target_required_missing.
      consumes:
      - root/project agent emit_events declarations
      - flow-scoped agent emit_events declarations
      - flow pins.outputs.events event identity
      - lowered parent connect proof from flow_model.flow_package.composition_routing
      - existing node/system pin_target_resolution target validation owner
      produces:
      - agent emit_events pin-declared output coverage on cmd/swarm verify
      - connected agent output-pin verification success without producer target/broadcast/relay requirements
      - unconnected or unsupported agent output-pin verification failure with pin_target_resolution
      proof_obligations:
      - flow-scoped agent emit_events with a parent connect output route verifies successfully
      - flow-scoped agent emit_events without parent connect, structural route, static child delivery-entity route, or explicit dynamic escape fails with target_required_missing
      - node/system pin_target_resolution behavior remains unchanged
      - fixture contracts that intentionally test prompt/tool/agent delivery behavior do not declare stale output pins unless they also provide route authority
      does_not_close:
      - broad #1466 composition-first parent closure
      - #1474 runtime generated-agent EventBus RoutePlan admission, already closed separately
      - marketplace/address-key or other final turnkey composition behavior outside static verify coverage
  slice_3a0_output_pin_key_carries_validation:
    id: output_pin_key_carries_validation
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify.checkOutputPinKeyCarriesValidation
    supported_surface: cmd/swarm verify
    implementation_tracker: '#1544'
    spec_basis:
    - flow_model.flow_instance_authoring.composition_model.output_pin_key_carries_contract
    - flow_model.flow_package.composition_routing
    - contract_formats.event_schema
    scope:
      description: >
        For producer output event pins used by addressed parent connect /
        instance-key composition, verify that the output pin declares canonical
        key/carries evidence and that supported producer emit sites statically
        construct every declared key/carries payload field. Runtime/config
        constructed producer surfaces must either consume an explicit static
        payload proof owner or fail closed.
      applies_to:
      - schema.yaml pins.outputs.events structured output pin objects
      - connected output pins consumed by addressed parent connect entries
      - handler top-level single-emit
      - rules entries
      - on_complete branches
      - accumulate.on_timeout and accumulate.on_complete branches
      - fan_out per-item emit
      - guard on_fail: escalate
      - agent emit_events declarations
      - root and flow auto_emit_on_create declarations
      - workflow timer declarations
      excludes:
      - RoutePlan runtime lowering and EventBus dispatch, tracked by #1545
      - renamed-key adapters, tracked by #1546
      - receiver select_entity demotion, tracked by #1547
      - producer target/broadcast compatibility
    validation_requirements:
      connected_output_declares_key: Addressed parent connect outputs must declare key.
      connected_output_declares_carries: Addressed parent connect outputs must declare carries.
      key_is_carried: The declared key must also appear in carries.
      carries_are_unique: Duplicate carried fields fail closed.
      carries_are_top_level_payload_fields: Key/carries fields are top-level payload fields in this slice.
      event_schema_declares_fields: The producer event schema must declare every key/carries field.
      carried_fields_are_scalar: Key/carries fields must be scalar key material, not list/object payloads.
      node_emit_payload_proves_fields: Supported node emit sites must include every key/carries field in emit.fields.
      agent_emit_payload_fails_closed: Agent emit_events for key/carries output pins fail closed until static payload construction exists.
      auto_emit_payload_fails_closed: Root and flow auto_emit_on_create for key/carries output pins fails closed until activation config payload proof exists.
      timer_payload_fails_closed: Workflow timers for key/carries output pins fail closed until timer payload construction proof exists.
    old_non_authoritative_paths: >
      Event payload schema alone, connect.map source, receiver input-pin address
      rules, target.match, broadcast:true, direct/raw subscribers, RouteTable, or
      live subscription lookup cannot satisfy producer key/carries evidence.
  slice_3a1_composition_connect_validation:
    id: composition_connect_validation
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - flow_model.flow_package.composition_routing
    - flow_model.flow_package.import_boundary.pin_alias_delivery
    - engine.cross_flow_routing
    scope:
      description: Validate parser/model/semantic-view consumption of parent package.yaml connect entries and receiver
        addressed input pins before runtime route-plan lowering. This check proves authored composition facts are present,
        typed, and lowerable as semantic route facts, but it does not execute EventBus/RouteTable delivery.
      applies_to:
      - parent package.yaml connect entries
      - schema.yaml pins.inputs.events addressed input pin objects
      - schema.yaml pins.outputs.events structured output pin objects
      - import-boundary requires/bind aliases used as lower-level name adaptation
      excludes:
      - runtime RoutePlan artifact lowering
      - EventBus or RouteTable publish execution
      - persisted delivery rows, receipts, readback, or replay
      - agent/node parity for connected output pins
      - retiring producer emit.target or broadcast escape hatches
    validation_requirements:
      producer_flow_exists: connect.from flow id must exist in the loaded flow registry.
      producer_output_pin_exists: connect.from pin must exist in the producer schema output event pins.
      receiver_flow_exists: connect.to flow id must exist in the loaded flow registry.
      receiver_input_pin_exists: connect.to pin must exist in the receiver schema input event pins.
      event_alias_or_adapter_valid: Differing producer and receiver event identities require an explicit adapter or an
        import-boundary alias from requires/bind on either the producer output side or receiver input side; alias/bind
        adapts names only and does not own topology.
      output_carries_address_key: The producer output pin key/carries declaration must prove the top-level payload key
        consumed by the receiver address or explicit connect.map source; event payload schema and connect.map are
        validation inputs, not the producer evidence owner.
      receiver_address_rule_present: Template or instance-addressed receivers must declare an addressed input pin unless
        delivery is an explicit broadcast.
      key_types_compatible: Payload/config/entity/instance source and target key types must be compatible before lowering.
      delivery_topology_valid: Delivery must be one, many, broadcast, or reply and must match addressed input cardinality;
        fan-out delivery such as many or broadcast is invalid for a singular addressed input pin.
      reply_lineage_usable: reply delivery must declare usable reply lineage; missing lineage fails closed.
      event_topology_roles_consume_connect: Verify-time producer/consumer and dead-event schema checks must treat valid
        connect output/input facts as authored event roles so parent topology does not require runtime reconstruction to
        silence missing producer, missing consumer, or dead-schema diagnostics.
      no_runtime_reconstruction: Accepted verify-time facts must not require EventBus/RouteTable or workflow-node materialization
        to reconstruct missing connect topology.
  slice_3b_select_entity_pin_coexistence:
    id: select_entity_pin_coexistence
    domain: semantic_drift
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - engine.cross_flow_routing.select_entity_coexistence
    - handler_specification.handler_fields.select_entity
    - handler_specification.handler_fields.select_or_create_entity
    scope:
      description: Classify receiver-side entity acquisition on pin-routed events so select_entity remains a fallback for
        external or mixed provenance, not a second in-topology routing owner.
      applies_to:
      - select_entity handlers
      - select_or_create_entity handlers
      excludes:
      - in-tree contract migration edits
      - runtime target resolution
    verdicts:
      redundant_in_topology:
        severity: error
        rule: select_entity/select_or_create_entity on an event whose only producers are normal in-topology connected/pin-routed
          producers is hard invalidity; use receiver instance.by plus parent connect routing instead.
      external_or_mixed_provenance:
        severity: ok
        rule: External or mixed-provenance events may use receiver-side acquisition as late binding when event.target is absent.
      missing_external_binding:
        severity: error
        rule: A stateful external/no-target handler with no acquisition mechanism is invalid because it would run against source fallback.
  slice_4_state_machine_reachability:
    id: semantic_drift_unreachable_state
    domain: semantic_drift
    authority: semantic_drift_warning
    severity: warning
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - flow_model.state_composition
    - handler_specification.handler_fields.advances_to
    - handler_specification.handler_fields.on_complete
    - handler_specification.handler_fields.rules
    - handler_specification.handler_fields.accumulate
    - contract_formats.flow_schema
    scope:
      description: For every stateful flow, verify that each declared state is reachable from initial_state in the authored
        transition graph built from the accepted slice-4 transition carriers.
      applies_to:
      - stateful flows only
      excludes:
      - structural invalid target validation
      - missing terminal-path reasoning
      - runtime liveness or temporal behavior claims
      - timer cancel_on state:<name> reachability from timer activation context
    transition_carriers:
      handler_advances_to:
        rule: Handler-level advances_to contributes a possible edge.
      on_complete_branches:
        rule: on_complete branches with advances_to contribute possible edges.
      rules_branches:
        rule: rules branches with advances_to contribute possible edges.
      accumulate_on_complete_branches:
        rule: accumulate.on_complete branches with advances_to contribute possible edges.
      accumulate_on_timeout_branch:
        rule: accumulate.on_timeout with advances_to contributes a possible edge.
    source_state_derivation:
      create_entity_handlers:
        rule: create_entity handlers source from initial_state only.
      select_entity_handlers:
        rule: select_entity handlers source from all non-terminal declared states because they operate on an existing
          receiving-flow-owned entity selected at runtime.
      select_or_create_entity_handlers:
        rule: select_or_create_entity handlers source from initial_state for the zero-match creation path and from all
          non-terminal declared states for the one-match selection path. Multiple matches remain hard-invalid at runtime.
      non_create_entity_handlers:
        rule: non-create_entity handlers source from all non-terminal declared states.
      terminal_states:
        rule: terminal states are sinks in this slice.
    rule: Emit warning when a declared state is unreachable from initial_state in the authored transition graph. Keep invalid
      undeclared advances_to targets on hard-invalid state_machine_coherence. For staged bundles, the same unreachable
      lifecycle-node condition is hard-invalid because `stages:` is the canonical lifecycle node authoring owner.
  slice_5_dead_declared_event_schema_surface:
    id: semantic_drift_dead_event_schema
    domain: semantic_drift
    authority: semantic_drift_warning
    severity: warning
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - contract_formats.event_schema
    - engine.event_identity
    - engine.timer_model
    - engine.agent_session_management.emit_tool_convention
    - handler_specification.handler_fields.emit
    scope:
      description: For every product-declared event schema entry in `events.yaml`, verify that at least one accepted active
        authored role exists on the supported static verify path.
      applies_to:
      - declared `events.yaml` entries only
      excludes:
      - timer-fired-no-consumer ownership
      - runtime delivery correctness
      - payload completeness
      - input-pin producer satisfaction
      - state reachability
      - platform catalog membership as proof
    active_role_carriers:
      same_flow_local_usage:
        rule: Handlers or agents within the same flow as the declaration reference the event by local name or same-flow resolved
          identity.
      root_local_usage_for_root_declared_events:
        rule: Root-level handlers or agents referencing a root-declared event by local name keep only the root declaration alive.
      cross_flow_qualified_usage:
        rule: Another flow or root participant references the declaration via an explicitly qualified event name that resolves
          to the declaring flow.
      external_annotations:
        rule: "Accepted `swarm.source` beginning with external or platform, or accepted external `swarm.consumer` metadata on the declared event entry, counts as an active external role. Internal topology roles must be derived from topology owners and fail closed if restated through `swarm.*`."
      same_flow_timer_references:
        rule: "Timers in the same scope keep the declaration alive through `event`, `start_on: event:...`, or `cancel_on: event:...`."
      same_flow_fan_out_emit:
        rule: "`fan_out.emit` in the same scope keeps the declaration alive."
      same_flow_auto_emit_on_create:
        rule: "`auto_emit_on_create` in the same scope keeps the declaration alive."
    non_proof_carriers:
      platform_catalog_membership:
        rule: "Product-declared `events.yaml` entries are not kept alive by `platform_events.catalog` overlap."
      root_local_reference_into_child_flow:
        rule: A root-local reference does not keep a child-flow declaration alive.
      coincidental_same_local_name:
        rule: The same local event name in another flow is not proof by coincidence.
      produces:
        rule: "Node `produces` lists are not active-role proof."
    rule: Emit warning when a declared event-schema entry has zero accepted active-role carriers. The message must describe the
      event as having no active role in the authored bundle, not as definitely unreachable at runtime.
  slice_6_entity_writer_coverage:
    id: entity_writer_coverage
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - rule.consequences.bidirectional_verification
    - rule.consequences.declared_is_authority
    - type_system.field_forms.verbose
    scope:
      description: For every declared field on the active root or flow-owned Wave 1 entity contract, verify that explicit
        authorial population intent exists.
      applies_to:
      - declared entity fields only
      excludes:
      - platform-owned envelope fields
      - runtime read semantics
      - MCP/tool-schema derivation
    accepted_coverage:
      initial:
        rule: Explicit `initial:` on the field counts as authored creation-time coverage.
      unused_reason:
        rule: Explicit `_unused_reason:` documents intentional no-writer intent and suppresses this slice only.
      materialize_from:
        rule: Explicit `materialize_from:` counts as runtime-owned writer coverage when accumulator_entity_projection verify passes.
      handler_write_sites:
        rule: Handler write targets that name the field explicitly count as coverage. This includes data_accumulation, compute,
          filter/group_by/reduce/count store_as, query store_as, and clear targets.
    rule: Emit hard invalidity when a declared entity field has no authored writer coverage, no explicit `initial:`, and no
      `_unused_reason:`.
  slice_6b_accumulator_entity_projection:
    id: accumulator_entity_projection
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/accprojection resolver consumed by bootverify and runtime executor
    supported_surface: cmd/swarm verify and runtime handler execution
    spec_basis:
    - entity_contracts.accumulator_entity_projection
    - handler_specification.handler_fields.accumulate
    - design_principles.no_structural_primitive_elides_type_discipline
    rule: |
      Verify every `materialize_from` field through the shared projection
      resolver. Hard invalidity if the reference is malformed, the source node
      is missing or cross-flow, the source handler lacks matching
      `accumulate.into`, multiple handlers on one node declare the same
      projectable buffer, the source/target types are not named-type lists, the
      source event payload lacks the complete typed view, project coverage is
      partial, reaches undeclared source fields/metadata/extras, references an
      undeclared policy path, uses an unsupported binding namespace, the field
      also declares `_unused_reason`, or any other authored writer targets the
      same field.
    runtime_rule: |
      On successful accumulator completion, runtime writes the projection as a
      full replacement before emit.fields when no `on_complete` block is
      declared or when a declared `on_complete` branch matches successfully.
      Handler `rules` do not guard projection eligibility. The projected result
      is validated through entity named-type normalization. Failure rolls back
      the whole handler transaction. If a verify-clean declaration exists for
      the active handler accumulator but runtime resolves zero projection
      bindings, execution fails closed as a runtime invariant violation rather
      than silently skipping the projection. Projection does not run for
      timeout, incomplete accumulation, or declared `on_complete` no-match
      completion.
  slice_6c_accumulator_static_safety:
    ids:
    - accumulate_all_bounded_escape
    - accumulator_timeout_requires_timeout_ms
    - accumulator_input_producer_path
    domain: semantic_validity
    authority: mixed_warning_and_hard_invalidity
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - handler_specification.handler_fields.accumulate
    - engine.event_identity
    - flow_model.flow_package.composition_routing
    - static_analyzer.slice_3_input_pin_producer_path_satisfaction
    scope:
      description: Verify static accumulator safety properties that are decidable from the authored bundle without claiming
        runtime liveness. The check is structural and source/producer-path based only.
      applies_to:
      - system-node handlers with accumulate declarations
      excludes:
      - runtime progress detection
      - watchdog stalled-entity signaling
      - implicit timeout insertion
      - changing accumulator completion semantics
      - treating produces declarations as producer proof
      - treating swarm.status planned as producer proof
    bounded_escape_warning:
      id: accumulate_all_bounded_escape
      severity: warning
      rule: Emit a warning when an accumulator uses completion all/default and has no schedulable bounded timeout escape.
        A schedulable timeout escape requires positive timeout_ms plus either completion timeout or an on_timeout branch.
        A bare on_timeout without positive timeout_ms remains unbounded. This warning is not proof that runtime execution
        will stall; it says the authored handler has no static escape if an expected arrival never appears.
    timeout_completion_requires_timeout:
      id: accumulator_timeout_requires_timeout_ms
      severity: hard_invalidity
      rule: Emit hard invalidity when an accumulator uses completion timeout without positive timeout_ms. Runtime schedules
        accumulate.timeout only from a positive timeout_ms, and timeout completion depends on that event.
    input_producer_dead_end:
      id: accumulator_input_producer_path
      severity: hard_invalidity
      rule: Emit hard invalidity when an accumulator input event has no accepted static producer/source path in the authored
        bundle. Accepted paths are the same producer/source categories used by input_pin_wiring where applicable, plus same-flow
        node handler emits and same-flow agent emit_events for accumulator-local consumption. produces declarations and
        swarm.status planned do not count as proof.
  slice_7_entity_reader_compliance:
    id: expression_field_reference_validation
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - rule.consequences.required_by_default_uniform_with_events
    - runtime_enforcement.query_entities
    - handler_specification.expression_context.boot_validation
    scope:
      description: Verify that every `entity.*` reference used by handler CEL surfaces resolves against the active Wave 1
        entity contract and, for query-filter contexts, resolves to a scalar or enum leaf.
      applies_to:
      - handler guards
      - handler conditions
      - on_complete and rules conditions
      - canonical emit.fields expressions after emitted-payload lowering
      - data_accumulation expressions
      - query/filter expressions on entity paths
      excludes:
      - runtime tool execution
      - prompt heuristics
    proof_carriers:
      declared_field:
        rule: Declared top-level entity field is valid.
      nested_declared_path:
        rule: Nested path is valid only if every named-type step resolves and the final leaf resolves.
      query_filter_leaf:
        rule: Query/filter references must end at a scalar or enum leaf. `list.size()` is accepted because it reduces to integer.
    rule: Emit hard invalidity when an entity read path is undeclared, unresolved through the named-type chain, or used as a
      non-scalar/non-enum filter leaf.
  slice_8_entity_write_target_compliance:
    id: entity_write_target_compliance
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - rule.consequences.bidirectional_verification
    - runtime_enforcement.create_entity
    - runtime_enforcement.save_entity_field
    scope:
      description: Verify that handler-side entity write targets resolve against declared fields on the active Wave 1 entity
        contract.
      applies_to:
      - handler data_accumulation writes
      - handler compute/filter/group_by/reduce/count store targets
      - handler query store targets
      - handler clear targets
      excludes:
      - runtime tool delivery/schema generation
    rule: Emit hard invalidity when a handler write target targets an envelope field, targets an undeclared entity field, contains
      an unresolved nested named-type path, or appears in a flow with no declared Wave 1 entity contract.
  slice_9_entity_reader_coverage:
    id: entity_reader_coverage
    domain: semantic_validity
    authority: lint_evidence
    severity: informational
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - rule.consequences.bidirectional_verification
    - design_principles
    scope:
      description: Informational audit over declared entity fields for which verify finds no internal handler reader coverage.
      applies_to:
      - declared entity fields only
      excludes:
      - external/operator readers outside platform visibility
      - hard gating or warning-level surfacing
    accepted_suppression:
      unused_reader_reason:
        field_metadata: _unused_reader_reason
        rule: Explicit `_unused_reader_reason:` with a trimmed reason of at least 10 characters declares intentional
          external/operator readout and suppresses this lint-evidence slice only.
    rule: Emit lint evidence when a declared entity field has no detected internal reader on the supported verify surface.
  slice_9a_cross_surface_named_type_use:
    id: cross_surface_named_type_use
    domain: semantic_validity
    authority: lint_evidence
    severity: informational
    canonical_owner: internal/runtime/bootverify
    supported_surface: cmd/swarm verify
    spec_basis:
    - type_system.field_forms
    - spec_authority.review_artifact_boundary
    - design_principles
    scope:
      description: Informational audit over repeated authored object shapes that may represent an unextracted named type.
      applies_to:
      - root and flow type catalog named-type field shapes
      - root and flow entity contract field shapes, excluding platform envelope fields
      - resolved event payload field shapes
      - root, project, and flow policy object shapes
      excludes:
      - scalar-only values and object shapes with fewer than two normalized field/type pairs
      - runtime-delivered payload instances or persisted runtime state
      - hard gating or warning-level surfacing
      - exact duplicate shapes with exactly two candidates and exactly two normalized field/type pairs
    exact_duplicate_threshold:
      rule: Emit exact duplicate lint evidence only when the normalized shape appears in at least two authored candidates
        and either `field_count >= 3` or `candidate_count >= 3`.
    near_duplicate_threshold:
      rule: Emit near-duplicate lint evidence only when compared shapes are not exact duplicates, both shapes have at least
        four field/type pairs, they share at least four field/type pairs, the larger shape has at most two additional pairs,
        and common pair coverage is at least 75% of the larger shape.
    rule: Emit lint evidence when authored object shapes satisfy the exact duplicate or near-duplicate thresholds; the finding
      must remain advisory and must not require authors to extract a named type unless the shared shape is genuinely the same
      concept.
  slice_10_agent_prompt_lint_structural:
    id: agent_prompt_lint_structural
    domain: semantic_validity
    authority: hard_invalidity
    severity: error
    canonical_owner: internal/runtime/contracts/prompt_schema_guard.go
    supported_surface: cmd/swarm verify
    spec_basis:
    - agent_prompt_lint
    - rule.consequences.bidirectional_verification
    scope:
      description: Deterministic prompt-schema guard over parseable structural prompt references only.
      applies_to:
      - prompt schema guard structural findings
      excludes:
      - directive-form prompt heuristics
      - audit/lint confidence bands
      - delivery/session-primer derivation
    rule: Emit hard invalidity when a parseable structural prompt reference drifts from the declared event or entity contract.

test_specification:
  description: Public Swarm-authored test and conformance surfaces.
  deterministic_scenario_runner:
    id: testing.deterministic_scenario_runner_source_authority
    promoted_by: '#1646'
    implementation_status: implemented_first_slice
    owner: platform-spec.yaml#test_specification.deterministic_scenario_runner
    purpose: >
      Define the public deterministic scenario/injection runner semantics for
      cost-free proof of flow routing, system-node behavior, mailbox decisions,
      emitted events, entity state, dead letters, idempotency facts, and invalid
      fixture variants. This runner drives normal platform mutation and read
      owners with authored events and decisions; it does not invoke or simulate
      live LLM provider sessions.
    selected_public_surface:
      command_family: swarm test
      command_catalog_status: >
        `swarm test` is the selected and implemented first-slice user-facing
        runner family. The concrete cli_specification.command_catalog row
        defines the implemented flags, exit codes, output rendering, and
        proof expectations while this source-authority section remains the
        semantic owner for scenario format and runner behavior.
      scenario_roots:
      - contracts/tests
      - contracts/flows/<flow>/tests
      package_level_tests: >
        `contracts/tests/...` contains package-wide or cross-flow scenario
        proofs that may involve multiple flows in the package.
      flow_local_tests: >
        `contracts/flows/<flow>/tests/...` contains scenarios whose default
        flow scope is the owning flow. Flow-local tests are intended to ship
        with imported/published flow packages so consumers can run executable
        conformance scenarios against their bindings.
    source_authority:
      merge_bearing_owner: platform-spec.yaml
      rule: >
        Scenario-runner implementation PRs, generated schemas, examples,
        public documentation, and tracker closeouts MUST bind runner semantics
        to this section. Empire scripts, internal catalog fixtures, private
        design notes, README text, and manual event-publish workflows are
        evidence only unless their exact semantics are promoted here.
      consumed_owners:
        expressions: platform-spec.yaml#handler_specification.expression_context
        setup_pre_state: platform-spec.yaml#api_specification.method_catalog.test.setup_entities
        event_injection: platform-spec.yaml#cli_specification.command_catalog.event_publish and /v1/rpc event.publish
        mailbox_decisions: platform-spec.yaml#api_specification.method_catalog.mailbox.approve/reject/defer
        run_readback: platform-spec.yaml#api_specification.method_catalog.run.get/trace/diagnose
        entity_readback: platform-spec.yaml#api_specification.method_catalog.entity.*
        dead_letter_readback: event/delivery/dead-letter read owners consumed by run.trace and run.diagnose
        test_quiescence_inputs: platform-spec.yaml#api_specification.method_catalog.run.diagnose result.test_quiescence backed by run_model.lifecycle.completion inputs and ProjectRunOperationalStatus
        contract_validation: engine.boot_verification.checks plus existing event payload/schema validation owners
    non_goals:
    - No runtime/backend/provider implementation is promoted by this section.
    - No active `mock` or `local` LLM backend profile is promoted.
    - The runner does not satisfy, weaken, or bypass internal/runtime/llm.ProviderContract.
    - The runner does not prove live agent sessions, tool-call translation, conversation modes, turn/audit persistence,
      retry lineage, native-tool capability truth, or spend/budget accounting.
    - The runner must not execute arbitrary inline Python, JavaScript, shell, subprocesses, network calls, filesystem reads,
      imports, or mutable global code from scenario files.
    - Static grep/prompt/schema residue checks such as `forbid_text` are not scenario-runtime assertions; they belong to
      static_analyzer or a future verify/lint owner.
    - Documentation/README cleanup consumes this owner but does not define it.
    scenario_document:
      format: YAML
      versioning: >
        The v1 scenario format is the public initial format. A scenario file may
        omit an explicit version while the runner is v1-only; once a future
        incompatible format exists, a version field is required for that new
        format and omitted version continues to mean v1.
      top_level_fields:
        name: Optional human-readable scenario name.
        seed: Optional recorded deterministic seed string for generated helper values. When omitted, the empty seed is
          recorded by implication for v1.
        vars: Optional map of literal values or CEL expressions evaluated once before the first step.
        setup: Optional setup/pre-state block for deterministic scenario-owned entity rows before the first action step.
        steps: Required non-empty list of scenario actions.
        expect: Optional final assertion block evaluated after the final step reaches test quiescence.
        invalid: Optional table of invalid fixture variants. Each case derives from a base fixture/action and expects a
          specific reject/fail-closed outcome.
      literal_model: >
        Plain YAML scalars, arrays, and objects are literal data by default.
        A string of the exact form `${...}` is a CEL expression. No other
        sigil, unquoted bare-token rule, or alternate expression grammar is
        authoritative.
      expression_model:
        evaluator: Existing CEL expression authority.
        scenario_namespaces:
          vars: Scenario-local variables evaluated from the `vars` block.
          scenario: Deterministic helper namespace owned by this runner.
        helper_policy: >
          Helpers must be deterministic and replayable. Generated identifiers
          are derived from scenario identity, case name, helper arguments, and
          the recorded scenario seed; they are not random wall-clock values.
        initial_helpers:
          scenario.uuid: Deterministic UUID derived from the contract-relative scenario identity, scenario name, recorded
            scenario seed, and caller-provided label.
          scenario.sha40: Deterministic 40-character lowercase hex digest of its normalized string argument.
        forbidden_helpers:
        - wall-clock now
        - random
        - environment lookup
        - filesystem lookup
        - network lookup
        - subprocess execution
      fixture_payloads:
        forms:
          inline_object: Payload may be an inline YAML object.
          from_file: >
            Payload may specify `from: <relative-path>` to load a YAML or
            JSON object fixture.
          set_overrides: >
            Payload may specify `set: {path: value}` to override fields after
            fixture load.
        validation_rule: >
          The effective payload after `from` loading, `set` overrides, and CEL
          interpolation MUST be validated against the target event/action schema
          before the mutating step is submitted. Schema mismatch fails the
          scenario before publication/decision mutation.
        path_rule: >
          Fixture paths are relative to the scenario file unless explicitly
          rooted by the future runner command. Paths must not escape the
          contract package root.
      setup_pre_state:
        syntax: >
          `setup.entities` is an optional non-empty array. Each row declares
          `as` (scenario-local alias), `type` (entity type), optional `flow`
          (flow scope, defaulting to the owning flow for flow-local
          scenarios), optional `current_state`, optional `fields`, and optional
          `gates`.
        owner: /v1/rpc test.setup_entities
        rule: >
          Setup/pre-state seeds only scenario-owned initial entity rows for the
          single current scenario run before the first action step. The runner
          derives deterministic run_id and entity_id values from the scenario
          identity and recorded seed, validates the authored setup against the
          loaded contract bundle, then submits exactly one idempotent
          `test.setup_entities` request carrying canonical bundle_hash,
          run_id, and the validated entity rows. Root-flow setup rows use the
          same canonical root entity identity as same-run root event handling:
          the root setup entity_id is derived from the scenario run_id. Flow-scoped
          setup rows use deterministic alias-specific entity_id values and may
          be consumed by `target` aliases. The runner MUST NOT write the
          database/store directly, call EventBus, create deliveries, infer
          handler outcomes, or expose a generic entity.create/entity.update
          public mutation surface.
        validation:
          - >
            `as` aliases are non-empty and unique within the scenario.
          - >
            `type` must match the primary entity type for the selected flow scope.
            For legacy root packages with no entities.yaml, root setup may use
            `type: default` only for state/gate setup; public setup fields still
            require a declared entity contract field.
          - >
            `current_state`, when supplied, must be a declared state for the selected flow; otherwise the selected flow's
            initial state is used.
          - >
            every `fields` key must be declared for the selected entity type, and authored values must be type-compatible
            with the declared contract field type before any API mutation.
          - >
            every `gates` key must be declared by the selected flow's gate model or gate-setting handlers, and every gate
            value must be boolean.
          - >
            setup establishes one current scenario run context; multi-run setup and cross-run setup remain unsupported.
        alias_consumers:
          publish_target: >
            A publish step may use `target: <setup-alias>`. The runner resolves
            the alias to the exact setup entity and sends event.publish `target`
            with flow_instance/entity_id. Unknown aliases, root-flow aliases
            that cannot form a flow-scoped event.publish target, and combining
            alias `target` with explicit `target_flow_instance` or
            `target_entity_id` fail before API mutation.
          expect_entity_ref: >
            An entity expectation may use `ref: <setup-alias>`. The runner
            resolves the alias to the exact setup entity and reads it through
            `entity.get` for current_state, fields, and gates assertions.
            `ref` MUST NOT be combined with `count`.
        unsupported_forms:
          - private cataloge2e setup syntax such as trigger.entity, entity_state_before, entity_fields_before, or gates_before
          - handler_outcome or pipeline-receipt success proof
          - no-output absence, exact emitted-event counts, causal chains, positive dead-letter details, or flow/template creation
          - seeded pre-state for live agent sessions, tool calls, faithful scripted backend behavior, or arbitrary runtime/store mutation
    action_steps:
      run_context:
        rule: >
          A scenario has one current run context. Setup/pre-state may establish
          the current run context before the first publish. Otherwise, the first
          mutating publish that creates work records the server-owned run_id.
          Later publish and mailbox-decision steps use that run_id unless a
          future spec explicitly promotes multi-run scenarios.
        bundle_scope: >
          For create-new-work publish steps, the runner supplies the canonical
          bundle_hash for the loaded contract package to event.publish. It must
          not use deprecated bundle fingerprints as canonical scope.
      publish:
        syntax: >
          `publish: <event-name>` with `payload` as an inline object or
          `payload: {from, set}` fixture construction.
        owner: /v1/rpc event.publish
        rule: >
          Publish steps consume event.publish. The runner sends the authored
          event name and effective payload to the server owner and preserves the
          server-owned EventPublishResult. It must not validate routability,
          persist events, create delivery rows, or call EventBus/store APIs
          directly.
        setup_alias_target: >
          Optional `target: <setup-alias>` consumes
          scenario_document.setup_pre_state.alias_consumers.publish_target and
          lowers only to event.publish `target`. It is not a payload shortcut
          and does not authorize payload.entity_id or payload.flow_instance as
          target authority.
      mailbox_approve:
        syntax: "`mailbox.approve` or `approve_mailbox` as a scenario action alias."
        owner: /v1/rpc mailbox.approve
        rule: >
          Approval steps locate exactly one pending mailbox item in the current
          run using API-owned mailbox read surfaces and then call mailbox.approve
          with the effective decision payload. Zero or multiple matches fail
          closed before mutation.
      mailbox_reject:
        syntax: "`mailbox.reject` or `reject_mailbox` as a scenario action alias."
        owner: /v1/rpc mailbox.reject
        rule: >
          Reject steps locate exactly one pending mailbox item in the current
          run and call mailbox.reject with a non-empty reason. Zero or multiple
          matches fail closed before mutation.
      mailbox_defer:
        syntax: "`mailbox.defer` or `defer_mailbox` as a scenario action alias."
        owner: /v1/rpc mailbox.defer
        rule: >
          Defer steps locate exactly one pending mailbox item in the current run
          and call mailbox.defer with an RFC3339 timestamp or deterministic CEL
          expression resolving to one. Zero or multiple matches fail closed
          before mutation.
      unsupported_actions:
      - direct database writes
      - direct EventBus publish
      - direct mailbox table mutation
      - provider/runtime fake-response injection
      - shell/script execution
    test_quiescence:
      owner: platform-spec.yaml#test_specification.deterministic_scenario_runner.test_quiescence
      relationship_to_runtime_completion: >
        Runtime run completion remains owned by run_model.lifecycle.completion:
        all entities terminal and no pending deliveries, with active timers
        keeping the run running. Test quiescence is a runner assertion barrier,
        not a replacement run status.
      rule: >
        After each mutating step and before final assertions, the runner waits
        by reading `/v1/rpc run.diagnose` result.test_quiescence until the
        current run has no active deliveries, no unsettled same-run pipeline
        receipt work owned by committed post-commit callbacks, no currently due
        timer work, and no active session lease/callback evidence that can
        synchronously enqueue more work for the same run.
      timers: >
        Non-due active timers do not prevent test quiescence. Due timers do.
        A scenario that needs timer behavior must either advance time through a
        future spec-owned test-time control or leave timer firing to a later
        implementation child; wall-clock sleeps are not semantic proof.
      failures: >
        Dead-letter and terminal failed-delivery evidence is observable at
        quiescence and must not be hidden. Retryable delivery state that can
        still enqueue immediate work is not quiescent.
      deadline: >
        Runner-level deadlines are safety bounds only. Reaching a deadline is
        a scenario failure with diagnostic evidence; it is not a quiescent
        success condition and must not define done.
    expectations:
      evaluation_point: Final `expect` blocks run only after the final step reaches test quiescence.
      events:
        shorthand: A YAML list under `expect.events` means unordered subset/include matching within the current run.
        include: Unordered subset match. Every listed event must appear at least once.
        exact: Unordered exact set of event names for the assertion window. Multiplicity must be specified explicitly if
          future runner syntax supports event counts.
        ordered: Ordered subsequence match by canonical event ordering; unrelated events may appear between matched events.
        window: Current scenario run from the first scenario-created event through final quiescence unless a future spec
          promotes narrower windows.
      entities:
        rule: >
          Entity assertions consume canonical entity read owners. The runner may
          match by explicit setup alias ref, by explicit entity id, by current
          run plus declared entity type plus field predicates, or by a
          mailbox/event-derived id. Zero or multiple matches fail closed unless
          the assertion explicitly expects a count.
        ref: >
          `ref: <setup-alias>` resolves through setup_pre_state alias bindings
          to exactly one setup-created entity and consumes `entity.get` directly
          with that entity_id and the current scenario run_id. Unknown aliases
          fail before readback. `ref` MUST NOT be combined with `count`; when
          `type` is also supplied, it must match the setup binding's entity
          type.
        current_state: >
          A row with `current_state` is a detail assertion, not a count
          assertion. Expected values consume the scenario literal model, so
          `${...}` values are evaluated as CEL before comparison. The runner
          first resolves matching entity summaries through the canonical
          `entity.list` owner in the current run. The match must resolve to
          exactly one entity, then the runner reads that entity through
          `entity.get` and compares `EntityFull.entity.current_state` exactly.
        fields: >
          A row with `fields` is a detail assertion over
          `EntityFull.fields`. Expected field values consume the scenario
          literal model, so nested `${...}` values are evaluated as CEL before
          comparison. The expected YAML object is compared exactly to the
          canonical `entity.get` field map after JSON-compatible scalar
          normalization; missing, extra, or differently-valued fields fail the
          scenario.
        gates: >
          A row with `gates` is a detail assertion over `EntityFull.gates`.
          Gate expectations consume the scenario literal model, so nested
          `${...}` values are evaluated as CEL and must resolve to booleans.
          The resulting boolean map compares exactly to the canonical
          `entity.get` gate map. Missing, extra, non-boolean, or
          differently-valued gates fail the scenario.
        count_interaction: >
          `count` is a count-only assertion and MUST NOT be combined with
          `current_state`, `fields`, or `gates`. A type-only entity row is not a
          valid assertion. This prevents the runner from preserving two
          different interpretations of the same `expect.entities` row.
      mailbox:
        rule: >
          Mailbox assertions consume mailbox read owners and are scoped to the
          current run by default. Zero or multiple matches fail closed unless
          the assertion explicitly expects a count.
      no_dead_letters:
        shorthand: >
          `no_dead_letters: true`
        rule: >
          Assert that no dead-letter records or platform.dead_letter events
          exist for the current scenario run in the assertion window. The
          runner must query canonical dead-letter/readback surfaces and must
          not infer absence from missing stderr text or delivery counts alone.
      invalid_variants:
        rule: >
          Invalid variant cases execute from a base fixture/action plus
          declared `set` overrides and assert fail-closed rejection categories.
          A rejection that occurs after mutating state is not equivalent to a
          pre-mutation validation rejection unless the expected category says so.
    catalog_convergence:
      decision: split_follow_up
      rule: >
        The public scenario format defined here is the target authority for new
        authored scenarios. Existing internal `tests/**/expected.yaml`,
        `tests/**/fixtures.yaml`, `internal/runtime/swarmflowtest`, and
        `internal/runtime/cataloge2e` remain internal evidence until a separate
        migration/convergence child updates them or explicitly keeps them
        private. Implementation PRs must not leak those private formats as
        public schema by copying them into CLI behavior.
    proof_obligations:
      source_authority_pr:
      - platform-spec.yaml contains this section as the canonical runner owner.
      - The section names consumed owners for CEL, setup/pre-state, event.publish, mailbox decisions, readback, dead letters, and
        test quiescence.
      - The section explicitly rejects ProviderContract/backend activation and arbitrary inline code.
      - The section defines scenario locations, fixture validation, expectation modes, dead-letter windows, and catalog
        convergence disposition.
      later_implementation_pr:
      - Adds the concrete CLI command catalog row and command behavior for `swarm test`.
      - Runs scenarios through public API/runtime owners, with no direct DB/EventBus/mailbox table mutation.
      - Adds setup/pre-state only through /v1/rpc test.setup_entities when a scenario needs deterministic seeded entities.
      - Proves at least one catalog-derived fixture and one Empire-style deterministic scenario with no live LLM credentials.
      - Runs `go test ./...`.
      split_siblings:
      - '#1252 faithful scripted LLM backend / ProviderContract-backed fixture replay'
      - static verify/lint residue checks
      - internal catalog fixture convergence
      - README/docs cleanup
      - broader operational stalled-run UI/diagnosis changes

cli_specification:
  description: |
    Authoritative Swarm CLI v2 UX contract. This section is the merge artifact
    for command topology, migration boundary, runtime-state ownership rules,
    and #735 child gating. It supersedes the earlier v1 `swarm investigate`
    topology and the non-promoted CLI v2 review draft as a merge artifact.
  source_of_truth:
    status: promoted_cli_v2_catalog
    promoted_by: '#795'
    merge_bearing_owner: platform-spec.yaml#cli_specification
    authority_rule: >
      This cli_specification block is the sole merge-bearing CLI v2 authority. CLI implementation gates, PRs,
      tests, and tracker closeouts MUST bind to this tracked section. Issue prose, local review drafts,
      ignored files, audit matrices, and unpromoted design notes are evidence only until their accepted
      behavior is promoted here.
    local_review_spec_disposition: >
      Private CLI UX review artifacts remain reconciliation input only. Any
      local "AUTHORITATIVE" or "source-of-truth" claim in those artifacts is
      superseded by this tracked source_of_truth block. Merge-bearing behavior
      must be reflected here.
    promotion_rule: >
      When the local CLI UX v2 review artifact contains behavior not represented in this section, the
      behavior is candidate intent. It must be promoted into this section, split to a tracked child, or
      explicitly downgraded to backlog before it can be used as implementation authority.
    supersedes:
    - stale v1 `swarm investigate` command draft
    - non-promoted CLI UX v1 review draft
    - stale v1 `swarm investigate *` command catalog entries
  agent_identity_boundary:
    owner: platform-spec.yaml#agent_identity_model
    status: current_global_slug_constraint
    rule: >
      Agent-facing CLI commands accept and display agent-id values as the current public authored slug. Read-only CLI
      inputs registered by `cli_specification.foundations.output_contract.identifier_resolution` may resolve a unique,
      case-sensitive authored-slug prefix through the complete `agent.list` result. That lookup does not change agent
      identity: the CLI MUST NOT infer UUIDs, bundle-scoped aliases from bundle_hash, duplicate-slug support, or case
      folding, and mutating agent selectors remain full-slug-only unless an explicit confirmation contract is promoted.
      The staged UUID/display-alias migration remains parked under #977.
  catalog_accounting_model:
    owner: platform-spec.yaml#cli_specification.command_catalog
    accounting_unit: explicit_command_catalog_row
    rule: >
      CLI v2 catalog accounting counts one explicit `command_catalog` map entry as one row.
      Row keys, not Cobra nodes, literal subcommands, optional flags, examples, target modes,
      or ignored review-artifact prose, define the implementation and tracker accounting unit.
      Future #794/#735 children MUST bind to these explicit rows unless a later tracked spec
      change deliberately splits or merges rows.
    derived_count_rule: >
      Numeric totals are not independently authoritative prose. Total, tier, and implementation
      status counts MUST be derived from the structured `command_catalog` rows at review/proof
      time by grouping row entries by `tier` and `implementation_status`.
    stale_count_policy: >
      Count claims in ignored review artifacts, issue prose, historical matrices, or non-promoted
      design notes are reconciliation evidence only. If they disagree with the structured rows,
      the structured rows win until a tracked spec PR changes the catalog.
    family_normalization_examples:
      forkchat:
        row: forkchat
        rule: >
          `swarm forkchat new|resume|list|view|delete` is one blocked backlog family row for
          #735/#749 accounting until a future tracked spec PR splits the family.
      control:
        rows:
        - control_pause
        - control_continue
        - control_stop
        rule: >
          Each control verb is one row. Target forms such as `<run-id>` and `--all` are modes
          of that row, not separate command rows.
      agent_replay:
        rows:
        - agent_replay
        - agent_replay_backlog
        rule: >
          Event-targeted replay and backlog replay are separate rows because they have different
          runtime/API ownership and were intentionally split by the promoted catalog.
      events:
        rows:
        - event_replay
        - event_publish
        rule: >
          Event replay and event publish are separate rows. The implemented replay row MUST NOT
          be reopened or counted as closing the absent publish row.
  review_artifact_reconciliation:
    source: private CLI UX v2 review artifact
    source_status: private_untracked_reconciliation_input
    rule: >
      This ledger records the current disposition of CLI UX v2 review-artifact content that is missing,
      under-promoted, or more general than the tracked platform spec. It prevents future #794/#735
      gates from citing the ignored review artifact as merge authority.
    under_promoted_review_features:
      universal_flags_config_env_precedence:
        disposition: promoted_first_slice
        tracker: '#844'
        action: >
          API connection/auth/config authority is promoted in
          cli_specification.foundations.api_connection_auth_config_precedence. Diagnostic logging authority is
          promoted in cli_specification.foundations.cli_logging_policy. Contract/platform-spec path resolution is
          promoted in cli_specification.foundations.contract_platform_spec_path_resolution. Serve listener
          environment/config precedence is promoted and implemented under
          cli_specification.command_catalog.serve.listener_topology_v2_1. Retry and output-renderer implementation
          tails remain split until later children promote their own merge-bearing owners.
      exit_code_and_error_channel_normalization:
        disposition: promoted_first_slice
        tracker: '#846'
        action: >
          The currently implemented API-backed command first slice is promoted in
          cli_specification.foundations.error_channel_and_exit_code_contract. Successful-output mode implementation
          now consumes cli_specification.foundations.output_contract; universal flag semantics stay split to #844.
      output_modes_and_shared_renderer:
        disposition: promoted_first_slice
        tracker: '#848'
        action: >
          Exact `--json`, `--quiet`, streaming NDJSON, shared renderer ownership, exception rules,
          and implementation split-tail accounting are promoted in cli_specification.foundations.output_contract.
          CLI/runtime renderer implementation remains a future #794/#735 child and MUST consume that owner.
      diagnostic_logging_policy:
        disposition: promoted_first_slice
        tracker: '#936'
        action: >
          CLI process diagnostic logging authority is promoted in
          cli_specification.foundations.cli_logging_policy. This resolves the ignored CLI UX v2 review artifact's
          ambiguous `--log-level` / `-v` / serve logging text by separating CLI diagnostics from successful output
          rendering, serve boot observability, runtime log filters, and persisted runtime log payloads. This slice
          is source-of-truth repair only; Cobra flags, config/env parsing, runtime logging, and command behavior
          remain unchanged until a later implementation child consumes the promoted owner.
      serve_bind_listener_surface:
        disposition: superseded_migration_evidence
        tracker: '#853'
        action: >
          The historical unified serve listener contract remains recorded in
          cli_specification.command_catalog.serve.unified_listener_bind_contract as #853/#882 migration evidence.
          `swarm serve --health-addr` is no longer accepted as final runtime behavior after #992 consumed
          listener_topology_v2_1.
      serve_api_mcp_listener_topology:
        disposition: promoted_first_slice
        tracker: '#884'
        action: >
          Final CLI v2.1 `swarm serve` listener topology is promoted in
          cli_specification.command_catalog.serve.listener_topology_v2_1. The final contract uses separate API
          and MCP listen-address socket owners, superseding the CLI UX v2 draft's port-only serve flags and the
          historical `--health-addr` implementation name. #992 consumes this owner for Cobra/runtime listener bind
          wiring and `swarm run start --api-port` as an API listener consumer. #844 consumes this owner for `swarm
          serve` listener env/config precedence. OpenRPC remains unchanged; enable-disable controls and `swarm
          run start --mcp-port` support remain follow-up work.
      trace_filters_and_subscription_recovery:
        disposition: promoted_first_slice
        tracker: '#855'
        action: >
          The bounded snapshot trace filter contract is promoted in
          api_specification.method_catalog.run.trace and
          cli_specification.command_catalog.trace.promoted_trace_filter_contract. The promoted API owner accepts
          `limit`, `cursor`, `since`, and `until`; `since` and `until` filter by the canonical RunTraceRow materialization watermark
          used by the run-debug trace owner. Trace-specific `swarm run trace --follow` subscription recovery and
          `--no-retry` are promoted in
          cli_specification.command_catalog.trace.promoted_trace_follow_recovery_contract by #928. Review-artifact
          `-f` shorthand is promoted in the trace command row as a CLI-only alias for `--follow`. Typed
          RunTraceFilter fields for event-name, subscriber identity, entity-id, and delivery-status are promoted on
          `/v1/rpc run.trace` and `/v1/ws run.subscribe_trace` and consumed by `swarm run trace` snapshot and follow
          modes. Snapshot `until` is promoted on `/v1/rpc run.trace` only as an inclusive upper bound. `include_internal`
          is promoted on both trace APIs by #1816 as the API-owned visibility control for `platform.runtime_log` trace
          rows: omitted/false excludes those rows, true includes them. CLI `swarm run trace --verbose` is the user-facing
          consumer of that API parameter. Review-artifact `--include-payload`, shared `swarm run start` recovery, and
          multi-run `--all` remain explicitly unpromoted split tails until later gated children promote their own
          canonical owners.
      mailbox_decision_sheet_and_result_ux:
        disposition: promoted_first_slice
        tracker: '#856'
        action: >
          Rich mailbox decision-sheet ownership is promoted on /v1/rpc mailbox.get:
          the server/API owns entity context and downstream preview fields consumed by
          `swarm mailbox view`. File-backed decision payload, richer mutation result
          rendering, priority enum/prose repair, shared output/payload policy, and
          broader trace/run/mailbox UX remain split until separate gated children promote
          their own canonical owners.
      control_idempotency_and_stop_all_confirmation:
        disposition: tracked_child
        tracker: '#859'
        action: >
          `swarm control pause|continue` and single-run `swarm control stop` idempotency-key pass-through are
          promoted as the first #859 slice. `swarm control stop --all --idempotency-key` fails before any API
          request because no per-target key derivation policy is promoted. `stop --all --yes` confirmation/non-TTY
          behavior is promoted as the second #859 slice: stop-all requires TTY confirmation before API client
          construction/request unless --yes is supplied, and --yes is valid only with stop --all. `swarm control
          nuke --idempotency-key` is promoted as the final #859 slice: the CLI accepts a caller-supplied key,
          rejects explicit blank keys before prompt/client/request, and passes non-blank keys through unchanged to
          `/v1/rpc runtime.nuke` for dry-run, --yes apply, and TTY-confirmed apply without generating,
          deriving, hashing, persisting, or locally interpreting idempotency ownership.
      rich_agent_operator_ux:
        disposition: tracked_child
        tracker: '#860'
        action: Promote richer agent filters, directive/replay output, restart/session options, and composed view semantics before implementation.
      event_replay:
        disposition: closed_child
        tracker: '#863'
        action: '`swarm event replay` is implemented over `/v1/rpc event.replay` by PR #866 / commit 23ef7d9c; it must not be reopened or grouped with future event publish work.'
      event_publish:
        disposition: closed_child
        tracker: '#868'
        pr: '#869'
        action: '`swarm event publish` is implemented over `/v1/rpc event.publish` by #868 / PR #869; it must not be reopened as a future #735 event-family child or grouped with run.start migration work.'
      conversations:
        disposition: future_child
        tracker: '#735'
        action: '`swarm conversation list` (v2.2 spelling), `swarm conversation view`, and `swarm conversation turn` require separate gated children.'
      entities:
        disposition: promoted_first_slice
        tracker: '#892'
        action: '`swarm entity list` (v2.2 spelling), `swarm entity view`, and `swarm entity aggregate` are promoted as one bounded read-only CLI child over /v1/rpc entity.list, entity.get, and entity.aggregate; conversations and forkchat remain split.'
      logs:
        disposition: promoted_first_slice
        tracker: '#876'
        action: '`swarm logs` snapshot and follow semantics are promoted as one bounded CLI child over runtime.logs and runtime.subscribe_logs; richer output-mode work remains split to #848.'
      incidents:
        disposition: promoted_first_slice
        tracker: '#886'
        action: '`swarm incidents` default-text read semantics are promoted as one bounded CLI child over runtime.incidents; richer output-mode work remains split to #848/#794.'
      retired_namespace_legacy_spellings:
        disposition: promoted_first_slice
        tracker: '#839'
        action: >
          Retired namespace migration authority is reconciled by
          cli_specification.retired_namespaces and cli_specification.parent_tail.retired_or_fail_closed.
          Promoted fail-closed migration surfaces are `swarm investigate *`, `swarm control mailbox`,
          and legacy `swarm fork --dry-run|--materialize-only|--activate|--contracts` harness forms only.
          #1012 restored top-level `swarm fork <source-run-id> ...` as the then-planned public source authority; superseded by CLI v2.2 (#1654/#1677), which retires the top-level spelling fail-closed and makes `swarm run fork` the public command.
          Review-artifact-only `swarm runtime pause|resume` and
          `swarm control run pause|continue|stop` are explicitly unpromoted candidate/backlog
          spellings; their current generic Cobra unknown-command behavior is intentional unless a
          later tracked spec row promotes hidden fail-closed stubs.
      forkchat:
        disposition: promoted_first_slice
        tracker: '#749'
        action: >
          `swarm forkchat new|resume|list|view|delete` is promoted as a bounded CLI consumer over the
          `conversation.fork|fork_chat|fork_list|fork_view|fork_delete` APIs. Full `--include-forks`
          cross-surface conversation behavior, Dashboard/Builder views, and sharing/ACL/pinning remain
          split. The public run-fork CLI is implemented as `swarm run fork` (CLI v2.2; the pre-v2.2
          top-level `swarm fork` spelling is retired fail-closed).
    platform_spec_refinements_not_cleanly_present_in_review_artifact:
      agent_replay_backlog:
        classification: required_current_contract
        reason: >
          Platform spec splits backlog replay from event-targeted replay. This is required to avoid
          overloading `swarm agent replay` with two different owners.
      agent_replay_event_targeted:
        classification: required_current_contract
        reason: >
          Platform spec requires `swarm agent replay <agent-id> --event-id <event-id>` over `agent.replay`.
          The review artifact anticipated event-targeted replay but left the command row under-specified.
      agent_directive_run_targeting:
        classification: required_current_contract
        reason: >
          Platform spec promotes directive run targeting through `--run-id` and server-owned run target
          resolution after #755. This is required current behavior, not legacy compatibility.
      serve_bundle_match_admission:
        classification: required_current_contract
        reason: >
          Platform spec carries exact `--require-bundle-match` and `--no-require-bundle-match` admission
          semantics from #753/#754. Review artifact broad intent is superseded by this tracked owner text.
      serve_active_run_abandon:
        classification: required_current_contract
        reason: >
          Platform spec carries exact `--abandon-active-runs` quiescence and reason-code semantics from #808.
      serve_shutdown_grace:
        classification: required_current_contract
        reason: >
          Platform spec carries exact `--shutdown-grace` drain-budget semantics from #825.
      serve_dev_mode_lifecycle:
        classification: required_current_contract
        reason: >
          Platform spec carries exact `--dev` composition and dev entity-container cleanup semantics from #830.
      serve_unified_listener_bind_contract:
        classification: superseded_migration_evidence
        reason: >
          Historical Swarm served health, readiness, `/v1/rpc`, `/v1/ws`, MCP, and tool routes from one
          `swarm serve` HTTP listener. The CLI UX v2 review artifact anticipated split API/MCP listener
          controls in its primary serve flag summary; its later `--health-addr` mention described then-current
          implementation configurability, not final CLI v2 naming. This node remains migration evidence only;
          #884 promotes final CLI v2.1 split API/MCP listen-address topology and #992 consumes it for runtime
          binding.
      serve_v2_1_listen_address_topology:
        classification: required_current_contract
        reason: >
          Platform spec intentionally refines the CLI UX v2 draft's port-only API/MCP flags into explicit
          listen-address socket owners: `--api-listen-addr <host:port>` and `--mcp-listen-addr <host:port>`.
          This is required because port-only flags cannot express the bind interface/IP, while a generic
          `--bind-addr` would be ambiguous once API and MCP are independent listeners.
      cli_diagnostic_logging_separation:
        classification: required_current_contract
        reason: >
          The CLI UX v2 draft mixes universal verbosity, serve boot verbosity, and a daemon-conventional
          `--log-level` alias. The promoted platform spec separates those concepts: `--log-level` is CLI process
          diagnostic logging policy, `swarm serve --verbose/-v` remains serve boot observability, runtime
          `logs/incidents --level` remain API result filters, and persisted runtime `log_level` payloads remain
          runtime observability data.
      event_read_stream_filters:
        classification: required_current_contract
        reason: >
          Platform spec carries exact `swarm event list`, `swarm event follow`, and `swarm event view`
          API-owner/filter rules from #849/#858.
      investigate_fail_closed_stubs:
        classification: legacy_migration_behavior
        reason: >
          `swarm investigate *` is not v2 topology. Fail-closed stubs remain only to prevent silent legacy
          command resurrection and to provide migration guidance.
      control_mailbox_fail_closed_stubs:
        classification: legacy_migration_behavior
        reason: >
          `swarm control mailbox approve|reject|defer` is retired in favor of `swarm mailbox
          approve|reject|defer`.
      fork_fail_closed_stub:
        classification: superseded_by_multi_bundle_source_authority
        reason: >
          Previous tracked prose treated top-level `swarm fork` as retired. #1012 then promoted the multi-bundle
          source authority and restored top-level `swarm fork <source-run-id> ...` as the then-intended public command
          over /v1/rpc run.fork, implemented by #989/#1023. That authority is itself superseded by CLI v2.2
          (#1654/#1677): the top-level `swarm fork` spelling is retired fail-closed per
          cli_specification.retired_namespaces.topology_v2_2_retired_spellings and the public command is
          `swarm run fork`. Historical harness flags remain rejected.
      runtime_and_control_run_legacy_spellings:
        classification: unpromoted_candidate_backlog
        reason: >
          The ignored CLI UX v2 review artifact named `swarm runtime pause|resume` and
          `swarm control run pause|continue|stop` as old spellings for the promoted
          `swarm control pause|continue|stop` commands. This tracked spec does not promote
          those spellings as retired migration surfaces. They intentionally remain generic
          Cobra unknown-command behavior until a later tracked row promotes hidden fail-closed
          stubs with exact migration text and proof.
  foundations:
    read_window_input:
      promoted_by: '#1955'
      implementation_status: implemented
      canonical_owner: platform-spec.yaml#cli_specification.foundations.read_window_input
      scope: >
        Shared public CLI input authority for optional lower/upper read-window bounds. It applies exactly to
        `swarm run list`, snapshot `swarm run trace`, `swarm event list`, and snapshot `swarm logs`. It owns CLI
        flag presence, accepted input grammar, invocation-clock capture, absolute UTC projection, and resolved
        window ordering before those commands call their existing API owners.
      accepted_input:
        absolute: RFC3339 or RFC3339Nano timestamp.
        relative: >
          One or more additive unsigned whole-number components using lowercase `h`, `m`, `s`, or `ms` only.
          Examples are `2h`, `90m`, `1h30m`, and `250ms`. Every component and the total MUST be positive.
          Signs, surrounding whitespace, decimals, bare numbers, uppercase units, `d`/`w`/other units, zero
          components, malformed sequences, and duration overflow are invalid.
      presence_rule: >
        Omitted bounds remain optional. An explicitly supplied empty or whitespace value is invalid and MUST NOT be
        collapsed into omission.
      resolution_rule: >
        Each command invocation captures one UTC reference time before resolving either bound. Both relative
        `--since` and relative `--until` mean the captured reference time minus the supplied elapsed duration.
        Mixed absolute/relative bounds consume the same captured reference. `swarm run trace --delivery-summary`
        also uses that reference as its fixed omitted `until` and reuses the resulting value across every page.
      wire_rule: >
        Every accepted bound is projected to an absolute UTC RFC3339Nano string before the existing API request.
        The API/OpenRPC timestamp grammar, filtering, ordering, pagination, storage, and runtime semantics do not
        accept relative syntax and are unchanged.
      ordering_rule: >
        A resolved `since` after `until` is a CLI validation failure before any request. Equal bounds are valid for
        these four selected read API contracts.
      diagnostic_rule: >
        Invalid, blank, zero, signed, malformed, unsupported-unit, overflow, and reversed-window input consumes
        cli_specification.foundations.output_contract.diagnostic_convention and exits 2 before any API or WebSocket
        request.
      consumers:
      - swarm run list --since/--until
      - swarm run trace --since/--until in snapshot mode
      - swarm event list --since/--until
      - swarm logs --since/--until in snapshot mode
      excluded_different_concepts:
      - run/event/log follow recovery replay_since watermarks
      - mailbox and scenario future deadlines
      - forkchat historical point selectors
      - incident aggregation horizons
      - API-only usage windows
    command_router:
      canonical_owner: cmd/swarm Cobra command tree
      implementation_framework: github.com/spf13/cobra
      rule: 'Cobra is the only semantic command router. Bare os.Args routing or parallel flag dispatch for operator commands is not authoritative.'
    installed_binary_portability:
      promoted_by: '#1002'
      implementation_status: implemented
      canonical_owner: platform-spec.yaml#cli_specification.foundations.installed_binary_portability
      scope: >
        Merge-bearing CLI v2 authority for source-checkout-independent startup and embedded platform-spec defaults.
        This owner covers root command construction, no-asset command surfaces (`swarm`, help, completion, local
        `swarm version`, and `swarm version --server` command construction), and the built-in platform spec default
        consumed by `cli_specification.foundations.contract_platform_spec_path_resolution`. It also records that
        installed-binary runtime workspace startup consumes `workspace_model.runtime_image_packaging` instead of
        source-checkout `Dockerfile.workspace` lookup. It does not close Docker Compose setup, local `cli_test`
        defaults, multi-bundle work, or README/public-doc polish.
      rule: >
        An installed `swarm` binary MUST construct the Cobra command tree and run no-asset command surfaces without a
        source checkout, repo-root discovery, or `go.mod` walk. Source checkout discovery may occur only after command
        selection inside local asset-consuming commands, and failure to discover a checkout MUST NOT block help,
        completion, or local version output.
      embedded_assets:
        platform_spec: >
          The built-in platform spec default is compiled into the binary from the tracked
          `platform-spec.yaml`. Implementations may materialize these
          embedded bytes to an internal cache path for existing path-based readers, but that path is not a user-facing
          configuration source and MUST NOT require a source checkout.
      runtime_workspace_assets:
        workspace_image: >
          Runtime workspace startup consumes `workspace_model.runtime_image_packaging`. An installed binary MUST NOT use
          source-checkout discovery, Go caller file paths, or a `go.mod` walk to locate `Dockerfile.workspace` or derive
          workspace mount defaults.
      split_tail:
      - '#996 Docker Compose setup, #997 local cli_test defaults/image contents, #992 serve listener behavior, multi-bundle work, and README/public-doc polish remain split.'
    local_cli_test_gateway_startup:
      promoted_by: '#997'
      implementation_status: implemented_first_slice
      canonical_owner: platform-spec.yaml#cli_specification.foundations.local_cli_test_gateway_startup
      scope: >
        Merge-bearing CLI/runtime authority for the narrowed #997 local `cli_test` first slice:
        local serve/run MCP gateway token derivation and MCP-only managed-agent startup proof.
        Endpoint/source-authority for local tool gateway reachability is now owned by
        `cli_specification.foundations.local_tool_gateway_binding`; this owner remains the
        token-source and startup-proof history for the #997 first slice. This owner does not close full #997,
        local workspace image contents/default-agent CLI
        availability, Docker Compose setup, selected-contract/multi-bundle gateway materialization,
        or public one-secret quickstart polish.
      gateway_token_rule: >
        `SWARM_TOOL_GATEWAY_TOKEN` is removed as a public/operator token source by #1639:
        local serve/run MUST derive a per-boot token and store it on the typed binding. Runtime gateway auth,
        startup probes, and MCP HTTP config generation MUST consume the binding token. The token env var
        MUST NOT own endpoint reachability or token authority. `SWARM_TOOL_GATEWAY_URL` and
        `SWARM_TOOL_GATEWAY_CONTAINER_URL` are not source authority for local serve/run endpoint binding.
        Local foreground `swarm run start` consumes the same serve startup owner and MUST NOT fork an independent
        gateway-token owner.
      gateway_token_consumers:
      - 'runtime `RuntimeOptions.ToolGatewayBinding`'
      - runtime MCP gateway auth
      - '`llm.ValidateClaudeCLIRuntimeConfig`'
      - MCP HTTP binding for startup/runtime tool calls
      startup_probe_rule: >
        For agent-present `cli_test` managed agents, startup validation MUST execute the Claude
        CLI/container startup probe for every managed agent before accepting MCP-only
        `tools/list` or optional `tools/call` gateway proof. Provider-native builtin surfaces
        still additionally compare the provider-visible native tool list. Agent-free `cli_test`
        boot remains governed by #993 and MUST NOT require LLM/gateway startup credentials.
      split_tail:
      - '#997 local cli_test workspace image contents/default-agent Claude CLI availability is closed by cli_specification.foundations.local_cli_test_workspace_cli_availability.'
      - '#996 Docker Compose setup remains split.'
      - '#1568 selected-contract and multi-bundle gateway materialization remains split; #979/#1012 are completed historical source-authority slices and are not active trackers for this open gateway tail.'
      - '#1002 runtime workspace source-root image packaging is closed by PR #1034 and is not an open tail.'
      - '#1568 selected-fork URL-env side-channel and current public URL-env retirement/admission are closed by local_tool_gateway_binding; broader multi-bundle materialization and remote transport policy remain split.'
    local_tool_gateway_binding:
      promoted_by: '#1568'
      implementation_status: implemented_first_slice
      canonical_owner: platform-spec.yaml#cli_specification.foundations.local_tool_gateway_binding
      scope: >
        Merge-bearing source authority for local `serve` / foreground `run` `claude_cli`
        tool gateway reachability in the approved #1568 first slice. The binding is a typed runtime value
        produced from the actual bound MCP listener before local runtime construction. It closes the local
        stale URL-env endpoint authority class for local serve/run. It also closes current public/operator
        URL-env retirement/admission for non-dev serve and doctor/preflight diagnostics. It does not close
        broader selected-contract/multi-bundle materialization, host workspace execution, API connection
        discovery, IPC/unix socket transports, or remote/Kubernetes routing. It also closes the selected-fork
        ephemeral gateway URL-env side-channel child: any production
        Claude runtime factory constructed for a live ephemeral gateway MUST receive that gateway's typed binding
        instead of depending on ambient URL env, and selected-fork gateway startup MUST NOT mutate process-global
        `SWARM_TOOL_GATEWAY_URL` or `SWARM_TOOL_GATEWAY_CONTAINER_URL`. This owner also closes the #1568
        fail-closed first slice for DB-loaded multi-context `claude_cli` serve: until a separately gated
        context-aware gateway router exists, Swarm must not expose hidden primary-only MCP or forkchat gateway
        behavior in a process with multiple loaded BundleContexts.
      binding_fields:
      - transport
      - host_endpoint
      - workspace_endpoint
      - auth_token
      - lifecycle_owner
      - source
      source_rule: >
        `swarm serve` MUST bind the MCP/tool listener first, then create `ToolGatewayBinding` from that bound
        address. The host endpoint is the listener URL reachable by the serve process. The workspace endpoint
        is the workspace-backend projection for containers or workspace processes. The binding source records
        the bound MCP listener, and the lifecycle owner is serve boot. Local foreground `swarm run start` consumes
        the same binding path through the serve startup owner. Selected-fork ephemeral gateways MUST create their
        own typed binding from the actual ephemeral gateway listener, with selected-fork lifecycle/source metadata,
        and pass that binding directly to selected-fork runtime consumers.
      endpoint_env_rule: >
        `SWARM_TOOL_GATEWAY_URL` and `SWARM_TOOL_GATEWAY_CONTAINER_URL` are not public/operator source
        authority for local serve/run endpoint binding. Stale values MUST NOT override the typed binding.
        These variables may survive only as generated final-boundary compatibility for launched host/container
        processes, and only when their values are derived from `ToolGatewayBinding`. Selected-fork ephemeral
        gateway startup MUST NOT set, restore, or otherwise use process-global URL env as a propagation channel;
        stale shell URL env must remain unchanged and non-authoritative. For current non-dev `swarm serve`,
        any non-empty `SWARM_TOOL_GATEWAY_URL` or `SWARM_TOOL_GATEWAY_CONTAINER_URL` is a retired public input
        and MUST fail closed with remediation to unset it, not repoint it at the MCP listener. `swarm doctor`
        and local preflight may read these variables only to report retired/shadowed diagnostic evidence; matching
        non-empty URL env MUST NOT be rendered as accepted configuration.
      auth_rule: >
        `SWARM_TOOL_GATEWAY_TOKEN` is removed as public/operator token source authority by #1639. Serve boot
        MUST generate a per-boot token and place it on `ToolGatewayBinding`; selected-fork ephemeral gateways
        MUST generate their own binding token from the same typed binding owner. Runtime gateway auth, startup
        probes, and MCP HTTP config generation MUST consume the binding token, not a later ambient env read.
        Non-empty `SWARM_TOOL_GATEWAY_TOKEN` in production token-source paths MUST fail closed with replacement
        guidance to unset it. The variable MUST NOT be used for Docker exec token propagation; supported Claude
        CLI auth to the tool gateway is carried by MCP config headers derived from `ToolGatewayBinding`.
      multi_context_rule: >
        In DB-loaded multi-context serve, `claude_cli` tool-gateway and forkchat sandbox materialization are
        unsupported until a separately gated context-aware gateway router and forkchat runtime selector exist.
        If more than one BundleContext is boot-pinned and the selected LLM backend is `claude_cli`, serve MUST
        fail closed before readiness, before MCP `/mcp` and `/tools/` routes are exposed, and before the forkchat
        sandbox Claude runtime can be exposed through the API. The implementation MUST NOT rely on primary
        context `ToolGatewayBinding`, primary `rt.ToolGateway`, primary workspace resolver, or primary forkchat
        sandbox runtime construction as implicit semantic policy. RuntimeContextManager API routing remains
        adjacent and does not prove MCP/tool-gateway/forkchat routing is context-aware.
      consumers:
      - '`cmd/swarm` serve listener binding'
      - 'local foreground `swarm run start` through the serve startup owner'
      - 'runtime `RuntimeOptions.ToolGatewayBinding`'
      - runtime MCP gateway auth
      - '`internal/runtime/llm.ValidateClaudeCLIRuntimeConfig`'
      - Claude CLI startup MCP probes
      - Claude CLI MCP HTTP config generation
      - Claude CLI Docker exec final-boundary env injection
      - fork-chat sandbox Claude runtime factory as a local serve consumer
      - multi-context serve admission for unsupported `claude_cli` tool-gateway and forkchat materialization
      - selected-fork ephemeral gateway Claude runtime factory as regression-guard consumer
      - local `claude_cli` preflight diagnostics as consumer-only stale-env reporter
      - non-dev serve retired URL-env admission
      split_tail:
      - '#1639 closes raw `SWARM_TOOL_GATEWAY_TOKEN` source authority for local serve/run and selected-fork tool-gateway tokens.'
      - '#1568 broader selected-contract and multi-bundle gateway materialization remains split; selected-fork ephemeral gateway startup no longer uses process-global URL env as a propagation side channel, and DB-loaded multi-context claude_cli gateway/forkchat ambiguity now fails closed, but full context-aware MCP/forkchat routing remains open. #979/#1012 are completed historical source-authority slices and are not active trackers for this open gateway tail.'
      - '#1138/#1213 host workspace `claude_cli` execution remains split.'
      - '#1567 API connection discovery and connection-file authority remain split.'
      - 'IPC/unix socket transports and remote/Kubernetes routing remain split.'
    local_cli_test_workspace_cli_availability:
      promoted_by: '#997'
      implementation_status: implemented
      canonical_owner: platform-spec.yaml#cli_specification.foundations.local_cli_test_workspace_cli_availability
      scope: >
        Merge-bearing CLI/runtime authority for the remaining #997 local `cli_test`
        workspace image/default-agent Claude CLI availability and early actionable
        startup diagnostics class. This owner applies to agent-present local
        `swarm serve` and local foreground `swarm run start` flows that consume the serve
        startup owner. It does not reopen #1002 source-root workspace image
        packaging, #996 Docker Compose setup, #995 schema migration diagnostics,
        API conformance, selected-contract/multi-bundle work, or public quickstart
        docs polish.
      workspace_cli_rule: >
        For agent-present `cli_test` managed agents, startup validation MUST prove
        the resolved workspace container can execute the configured Claude CLI
        command before readiness or event delivery. Successful Docker image
        inspection and existing container reuse are not sufficient proof of this
        capability. Missing, stale, or incompatible workspace image/container
        failures MUST fail closed with an actionable startup diagnostic naming the
        configured Claude CLI command, the resolved container, the configured
        workspace image, and remediation to build or pull an image containing the
        Claude CLI, remove stale workspace containers, or set `workspace.image`
        to a compatible image.
      consumers:
      - 'local `swarm serve` runtime startup for agent-present `cli_test` bundles'
      - 'local foreground `swarm run start` that consumes the serve startup owner'
      - '`internal/runtime/runtime_claude_startup.go` managed-agent startup validation'
      - '`internal/runtime/llm` Claude CLI startup probe and per-turn fallback diagnostics'
      - '`internal/runtime/workspace` configured workspace image/container targets'
      split_tail:
      - '#996 Docker Compose setup remains split.'
      - '#995 schema migration startup diagnostics remain split.'
      - '#1568 selected-contract and multi-bundle gateway materialization remains split; #979/#1012 are completed historical source-authority slices and are not active trackers for this open gateway tail.'
      - '#1002 runtime workspace source-root image packaging is closed by PR #1034 and is not reopened.'
    local_claude_cli_preflight_admission:
      promoted_by: '#1565'
      implementation_status: implemented
      canonical_owner: platform-spec.yaml#cli_specification.foundations.local_claude_cli_preflight_admission
      implementation_owner: cmd/swarm local claude_cli preflight/admission owner
      scope: >
        Merge-bearing authority for local `claude_cli` prerequisite diagnostics and admission. The owner materializes typed
        prerequisite findings for the selected backend and local runtime path, reports them through `swarm doctor`, and feeds
        the relevant fail-closed subset into `swarm serve --dev --backend claude_cli` and local foreground
        `swarm run start --backend claude_cli` through the serve startup owner. It is not a deployment profile system and does not
        build workspace images, write local connection files, or change stale gateway env precedence.
      finding_categories:
      - backend_prerequisite
      - workspace_prerequisite
      - serve_listener_prerequisite
      - gateway_prerequisite
      - contract_secret_prerequisite
      - dev_convenience_prerequisite
      command_mode_rule: >
        `swarm doctor --backend claude_cli` renders the shared findings without starting runtime. `swarm serve --dev
        --backend claude_cli` and local foreground `swarm run start --backend claude_cli` consume the same owner as admission
        evidence and fail closed before readiness when a blocking prerequisite is missing. Non-dev `swarm serve
        --backend claude_cli` consumes the runtime-safety subset where the selected disk-contract startup path needs the same
        prerequisites; dev-only conveniences must not leak into deployment-mode serve.
      owner_consumption_rule: >
        The preflight owner MUST delegate subordinate facts to existing owners: backend profile/credential and retired
        selector checks consume `llm_provider_selection_config_authority`; the selected backend credential is required only
        when the selected contract source declares agents, matching runtime's declared-agent credential gate;
        contract-required secrets consume `tool_model.credential_store` / `swarm secrets check`; Docker/image/workspace CLI
        capability consumes the workspace lifecycle owner; listener and gateway validation consume the serve startup/listener
        owners. Doctor-only or run-only duplicate interpreters are non-authoritative.
      split_tail:
      - '#1566 workspace image build/validation path remains split; this owner may report a missing/unusable image but must not build one.'
      - '#1567 API connection discovery and .swarm/connection.* remain split.'
      - '#1568 stale MCP gateway env precedence/auto-fix policy remains split; this owner may detect/report/fail closed on stale values.'
      - '#1138/#1213 host workspace claude_cli execution support remains split.'
      - '#1441 parent local proof setup remains open after this child unless all sibling tails are closed separately.'
    no_args_behavior: '`swarm` with no arguments prints root help and exits 0. Bare `swarm` MUST NOT start the runtime.'
    daemon_startup: '`swarm serve` owns runtime/API/health/MCP startup. `swarm run start` may consume the serve startup owner for local foreground start, but MUST NOT fork a second runtime boot owner.'
    cli_consumes_api_rule: 'All CLI commands that read or mutate runtime state consume the canonical API at /v1/rpc or /v1/ws. The only local file-contract carve-out is `swarm verify`, which validates contract files on disk and does not require runtime DB/API state.'
    topology: >
      CLI v2 uses top-level verbs for dominant single-intent operations, resource-noun-first
      commands for multi-verb resources, and `swarm control` only for run-state intervention.
      `swarm investigate` is retired legacy topology and MUST NOT be extended.
    output_contract:
      promoted_by: '#848'
      canonical_owner: platform-spec.yaml#cli_specification.foundations.output_contract
      future_runtime_owner: cmd/swarm shared output-mode/color policy renderer
      scope: >
        Merge-bearing CLI v2 authority for successful command output mode selection, shared rendering, and
        user-facing diagnostic conventions. This contract covers default text, `--json`, streaming NDJSON,
        `--quiet`, successful-output color control, stdout/stderr separation, diagnostic severity vocabulary,
        diagnostic message/remediation structure, exit-code taxonomy, command exceptions, and downstream
        implementation obligations. It does not implement CLI flags or renderer code by itself.
      mode_selection:
        default_mode: default_text
        explicit_modes:
        - --json
        - --quiet
        collision_rule: >
          `--json` and `--quiet` are mutually exclusive output modes. Supplying both MUST fail before any
          API/runtime call with CLI validation exit 2 unless a later tracked spec row explicitly changes that
          command's collision policy. #844 may later define config/env/default precedence, but it MUST NOT make
          simultaneously supplied explicit modes ambiguous.
        no_inert_flags: >
          A command MUST NOT accept an output-mode flag unless that invocation renders through the shared
          output-mode owner or is explicitly listed as an exception that fails before side effects. Adding flags
          that silently fall back to text output is invalid.
      color_control:
        promoted_by: '#931'
        implementation_status: implemented for current shared-renderer first-slice consumers only
        canonical_owner: cmd/swarm shared output-mode/color policy renderer
        accepted_sources:
          flag: --no-color
          environment: NO_COLOR
        precedence_rule: >
          `--no-color` and any non-empty `NO_COLOR` value disable ANSI color in human-readable default text for
          command invocations that consume the shared output owner. They are orthogonal controls, not output modes,
          and they MUST NOT change `--json`, streaming JSON/NDJSON, `--quiet`, error exit-code classification, or
          stderr diagnostics.
        default_text_rule: >
          Shared-renderer consumers route default text through the color policy owner. If color is disabled, ANSI
          escape sequences are removed by the shared owner before stdout emission. Current first-slice default text
          is ANSI-free by default, and that invariant is tested through the same shared owner.
        machine_output_rule: >
          JSON and quiet output are machine-readable and MUST remain ANSI-free by command contract. The color policy
          MUST NOT post-process or reshape machine output; `--no-color --json` and `--no-color --quiet` are valid
          and produce the same successful output as their machine mode without `--no-color`.
        unsupported_surface_rule: >
          `--no-color` is not a root/global flag and is not accepted by command surfaces that do not consume the
          shared output owner. Root/help/completion, `swarm serve`, retired namespaces, blocked/absent command rows,
          and split sibling command families MUST fail before side effects if `--no-color` is supplied there.
        split_sources:
          config_no_color: >
            A config-file `no_color` key is not promoted by this first slice. Color config-file precedence remains
            split from the shared renderer flag/env owner until a later #844 child promotes it.
          log_level: >
            `--log-level`, config-file `log_level`, and universal/repeatable verbosity are not color controls.
            Their source-of-truth disposition is governed by cli_specification.foundations.cli_logging_policy.
        consumer_registry: >
          Current color-policy consumers are exactly
          `cli_specification.foundations.output_contract.command_support.output_conformance_registry.rows`
          entries classified as `shared_output`. Do not maintain a second consumer list here; the registry is the
          living current-state owner.
      stdout_stderr_boundary: >
        Successful load-bearing output renders only to stdout. Errors, warnings, retired-namespace migration text,
        validation failures, auth failures, transport/API failures, and diagnostics render to stderr under
        cli_specification.foundations.error_channel_and_exit_code_contract. `--json` and `--quiet` do not change
        error exit-code classification and do not create JSON error bodies in this first promoted contract.
      diagnostic_convention:
        promoted_by: '#1812'
        canonical_owner: platform-spec.yaml#cli_specification.foundations.output_contract.diagnostic_convention
        scope: >
          Shared source authority for user-facing CLI diagnostic text and public diagnostic/remediation JSON fields.
          This convention is consumed by single command-outcome failures, typed finding lists, verify/doctor
          diagnostics, and command-specific diagnostic fields. It establishes author/operator-facing wording and
          classification rules; it does not by itself sweep existing strings or implement renderer route-through
          guards.
        user_facing_surface:
          human_text: >
            CLI stdout/stderr text whose purpose is to tell a user what happened, why a command failed, or what to
            do next.
          public_diagnostic_json_fields: >
            Public JSON fields whose purpose is diagnostic or remediation content, including `message`,
            `remediation`, diagnostic `detail`, and typed-finding problem/evidence fields when exposed to users or
            diagnostic consumers.
          internal_metadata_exemption: >
            Source-authority metadata, spec ledgers, testdata, implementation trackers, split-boundary bookkeeping,
            and other non-user-facing implementation records may cite internal issues or tracker names when those
            references are the intended internal authority.
        severity_vocabulary:
          command_outcome_failures: >
            Single command-outcome failures use greppable `ERROR:` or `WARNING:` prefixes on human stderr. They are
            one problem line plus remediation/detail continuation lines when useful.
          typed_finding_lists: >
            Enumerated typed diagnostic lists, such as verify and doctor findings, render `[BLOCKER]`, `[WARN]`, or
            `[INFO]` lines. This consumes `engine.boot_verification.severity_behavior.surface_fatality.text_rendering`
            for analyzer finding severity/fatality mapping.
          no_mixing_rule: >
            A single command outcome must not masquerade as a typed finding list, and a typed finding list must not
            downgrade its enumerated entries to plain `ERROR:` lines.
        diagnostic_content_rules:
          translate_never_dump: >
            Known failure classes must render author/operator-facing prose. Raw Go errors, transport verbs, runtime
            stack details, SQL/storage implementation names, JSON-RPC envelope details, and other low-level causes
            may appear only as secondary debug/detail/evidence context, never as the primary problem statement.
          author_facing_terms: >
            Diagnostics name the command, file, contract element, runtime target, or user-selected value involved.
            Human-facing text must not use test-only or implementation vocabulary such as `test_`, `heuristic`,
            `quiescence`, internal layer names, Go functions, SQL tables, delivery rows, or replay markers unless
            the command is explicitly a test/internal surface.
          no_internal_issue_or_tracker_refs: >
            User-facing diagnostics must not reference internal GitHub issue numbers, tracker IDs, or watchlist node
            names. State the constraint in plain terms such as `not supported yet`, `not supported in this
            configuration`, or `use <supported setting>`. If a pointer is warranted, use a public docs URL.
          structure: >
            The first line is concise and states the problem. Remediation, detail, and evidence belong on
            continuation lines or structured fields. This convention intentionally avoids a hard character cap; the
            shape carries readability, not a numeric limit.
          capitalization_and_grammar: >
            Command-outcome prefixes are uppercase with a colon: `ERROR:` and `WARNING:`. The problem statement uses
            a lowercase initial word when grammar allows, names concrete values, is one sentence, and ends with a
            period. Remediation lines are capitalized, imperative, and complete sentences. Diagnostics must not use
            exclamation marks or decorative emoji/glyph flourishes; typed finding severity tokens remain the
            bracketed text forms `[BLOCKER]`, `[WARN]`, and `[INFO]`.
          remediation: >
            Every error has actionable remediation when an action exists. Remediation is imperative and names exact
            commands, flags, files, or contract fields when possible.
          evidence: >
            Evidence is optional and should appear only when it helps the user understand what was checked or why the
            diagnostic fired. Evidence must remain concise, stable, and user-facing.
          root_input_rejections: >
            A `run.start` EVENT_NOT_DECLARED rejection with reason `not_declared_root_input` or
            `declared_root_input_not_routable` MUST consume the server-owned root-input facts. Human output defines a
            root input as an event declared in the root flow's `pins.inputs.events`, renders the declared and routable
            domains with `none` for an empty domain, and gives a contract-field remediation. CLI and Builder consumers
            MUST NOT reload contracts, infer the domains independently, normalize malformed server facts, or flatten the
            structured facts to raw error text. The CLI renders `none` only from an explicit canonical empty array; missing,
            null, non-canonical scalar or domain, or reason-inconsistent facts fall back to the generic application-error
            rendering. The application code, reason, and rejected event name are exact scalar facts and are never trimmed.
        exit_code_taxonomy:
          success: 0
          unexpected_or_internal_failure: 1
          usage_argument_configuration_or_contract_validation_before_runtime_action: 2
          transport_api_or_runtime_state_failure: 3
          authentication_or_authorization_failure: 4
          addressed_resource_not_found: 5
          explicit_exception_rule: >
            Command-specific state/conflict, terminal-run, interrupt, or detached outcomes may use additional exit
            codes only when an explicit command row or narrower contract promotes that exception. Command-local
            helpers must not reinterpret the canonical 0-5 classes.
        examples:
          good:
          - 'ERROR: cannot reach the Swarm runtime at 127.0.0.1:8081.'
          - '  Is the runtime running? Start one with `swarm serve`.'
          - '[BLOCKER] accumulator_input_producer_path @ flow.items: handler accumulates event item.done but no accepted producer/source path was found.'
          - '  remediation: Fix one of: add an accepted producer path; mark the event external; remove the accumulator.'
          bad:
          - 'v1 RPC request failed: Post "http://127.0.0.1:1/v1/rpc": dial tcp 127.0.0.1:1: connect: connection refused'
          - 'run status: test_quiescence_ready=true heuristics=none blocking_layer='
          - 'renamed-key adapters are tracked by an internal issue'
        arg_count_diagnostics:
          promoted_by: '#1818'
          canonical_owner: platform-spec.yaml#cli_specification.foundations.output_contract.diagnostic_convention.arg_count_diagnostics
          implementation_owner: cmd/swarm/cli_arg_count.go
          scope: >
            Shared source authority for public positional argument-count diagnostics on promoted CLI commands. This
            covers too-few and too-many positional args for commands that previously used raw Cobra
            `ExactArgs`/`MaximumNArgs` or equivalent command-local `len(args)` checks. It does not govern unknown
            flags, unsupported enum values, domain flag conflicts, ID-prefix resolution, or secret-material argv
            safety diagnostics.
          structural_rule: >
            Promoted positional commands MUST use the shared arg-count validator/formatter owner instead of raw
            Cobra arg-count validators or hand-written count strings. The formatter derives the command path and
            one-line positional usage from the command's `Use` metadata; per-command code may only declare a true
            discovery hint through the command annotation consumed by the formatter.
          rendering_rule: >
            Human stderr uses one concise `ERROR:` problem line, a one-line `Usage: swarm ...` positional
            signature, and an optional true discovery hint. Too-many diagnostics quote the received positional
            tokens. Too-few diagnostics name the missing positional; when some earlier positionals were supplied,
            the diagnostic also states which positionals were already present. Validation exits with code 2 before
            runtime/API side effects.
          secret_material_split: >
            `swarm secrets set <key>` missing-key validation is arg-count. Extra argv values for secret material are
            a safety diagnostic and MUST NOT use the generic quoted-token evidence path because that would echo
            secret material.
          conformance_guard: >
            `cmd/swarm/cli_output_conformance_registry_test.go` structurally rejects raw
            `cobra.ExactArgs`/`cobra.MaximumNArgs`/`cobra.MinimumNArgs`/`cobra.RangeArgs` uses and stale raw Cobra
            `accepts N arg(s)` expectations for promoted CLI arg-count diagnostics.
      identifier_resolution:
        promoted_by: '#1815'
        canonical_owner: platform-spec.yaml#cli_specification.foundations.output_contract.identifier_resolution
        implementation_owner: cmd/swarm/cli_identifier_registry.go, cmd/swarm/cli_identifier_resolver.go, and the
          family-aware identifier cells in cmd/swarm/cli_output.go
        status: implemented_registry_first_slice
        scope: >
          Shared source authority for classifying every public CLI input that selects or filters an existing resource
          by identifier. The registry owns the family, candidate source, scope rule, normalization, accepting command
          or flag, safety mode, and display-shortening eligibility. It does not make unbounded global scans, infer
          identity aliases, or turn caller-minted identifiers, idempotency keys, authored keys, provider identifiers,
          cursors, or result-only identifiers into resource selectors.
        round_trip_law: >
          Every identifier form rendered by the human CLI must be accepted safely everywhere that family is an input.
          A family with any full-only, unresolved, or split input row is not eligible for short display. JSON and quiet
          output continue to carry canonical full identifiers.
        display_enforcement: >
          Every shared-table column that renders an identifier family MUST declare that family and route through the
          family-aware display owner. That owner derives shortening eligibility from every input row in the family and
          fails closed to the full identifier when the registry is invalid, any input is full-only/split, or no lossy
          display projection is promoted. Command-local identifier slicing or abbreviation is forbidden.
        matching:
          exact_precedence: An exact canonical identifier wins before prefix ambiguity is considered.
          ambiguity: A prefix matching multiple candidates fails closed and lists at most five stable candidates with
            status and created-time facts when the candidate owner supplies them.
          no_match: A prefix matching no candidate fails before retrying the addressed read with a resolved identifier
            and teaches the family list path. Commands that preserve an existing exact-first RPC may perform that exact
            probe before candidate enumeration.
          bounded_enumeration: Bounded candidate sources must page to completion, reject repeated cursors, and fail
            closed on API/list/protocol errors.
          unbounded_enumeration: Runs, events, and entities without a full run scope MUST NOT be globally paged for
            prefix lookup. They require a promoted scope or the full identifier.
          mutation_safety: Mutating, destructive, creation, and boot inputs never act silently on a prefix. They remain
            full-only unless an explicit echo-resolution plus confirmation contract is promoted and proven before side effects.
        modes:
          resolver_bounded: Complete bounded candidate enumeration followed by exact-or-unique-prefix matching.
          resolver_scoped: Complete candidate enumeration inside the registry-declared full scope.
          full_only: Existing exact/full input behavior; the row blocks short display for its family.
          different_concept: Explicitly inventoried non-resource identity input that is never prefix-resolved.
          split: A live resource selector whose candidate source or scope is not promoted; full input behavior remains
            and the row blocks short display.
        family_registry:
          agent:
            candidate_source: /v1/rpc agent.list
            scope_mode: global_bounded
            scope_rule: global authored-slug set; duplicate live slugs remain unsupported
            normalization_mode: trim_case_sensitive
            normalization: trim only; case-sensitive
            display_projection: full
            display_shortening_eligible: false
          bundle:
