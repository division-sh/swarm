platform:
  name: swarm-orchestrator
  version: 0.7.0
spec_authority:
  merge_bearing_owner: platform-spec.yaml
  rule: |
    This file is the only merge-bearing platform specification. Issue gates,
    implementation PRs, tests, generated artifacts, and tracker closeouts MUST
    bind platform semantics to this tracked file or to generated/implementation
    proof that is derived from it.
  review_artifact_boundary:
    status: private_non_authoritative_context
    rule: |
      Local review, design, reconciliation, historical evidence, and maintainer
      process notes are private context unless their exact semantics are
      promoted into this tracked platform-spec.yaml in the same branch that
      makes those semantics true. Private review drafts MUST NOT be cited as
      binding source of truth for platform behavior, CLI/API contracts, OpenRPC
      methods, runtime ownership, or command gating.
    permitted_use: |
      Private review artifacts may be cited as design evidence, backlog intent,
      audit trail, or reconciliation input. A gate that depends on such evidence
      must name the tracked owner that already contains the accepted semantics,
      or must split/promote the exact semantic draft before implementation.
    prohibited_use:
    - Treating a private review draft header, local source-of-truth claim, or
      audit matrix as merge-bearing authority.
    - Implementing API, runtime, CLI, OpenRPC, or command behavior directly from
      a review artifact without promoting the matching semantics here.
    - Leaving active tracker prose that names a private review artifact as the
      binding source after a tracked owner or superseding tracker note exists.
  tracker_repairs:
    explicit_superseding_comments:
    - '#852'
    - '#749'
    - '#746'
    accounted_existing_trackers:
    - '#750'
    - '#628'
    - '#499'
    - '#500'
    - '#664'
    rule: |
      Future active tracker references to ignored review artifacts MUST be
      superseded with a tracked owner before implementation proceeds. If no
      tracked owner exists, the work must split or promote the exact semantic
      draft instead of citing the ignored artifact as binding authority.
vocabulary:
  state_change: A transition in the entity state machine, triggered by an advances_to handler field.
  guard:
    description: A boolean check evaluated before handler execution. If any guard check fails, the handler is blocked. Guards
      use CEL expressions evaluated against entity, payload, and policy context.
    on_fail_actions:
    - reject (default)
    - discard
    - kill
    - escalate:{event}
  action:
    description: 'A platform-provided operation executed as the final step of a handler. Valid actions are create_flow_instance,
      record_evidence, mailbox_write, and artifact_repo_commit. Product-specific actions are not supported.'
  timer:
    description: 'A time-based trigger attached to a stage. When the delay elapses, the platform emits the timer''s event,
      which can trigger a transition.

      '
    required_fields:
    - id
    - state
    - event
    - owner
    optional_fields:
    - delay
    - cancellation
    - recurring
    retired_fields:
    - delay_seconds
    - delay_minutes
    - delay_hours
    - delay_days
    retirement_rule: Numeric duration aliases are retired public YAML. Timer declarations must use canonical delay
      and retired aliases fail closed.
  agent_role:
    description: 'An entity that owns transitions, handles events, and executes logic. Three execution types with different
      semantics.

      '
    types:
      system_node:
        description: 'Deterministic code. No LLM. Subscribes to events, executes fixed logic, emits events. Owns workflow
          transitions. Examples: order-orchestrator, ticket-router.

          '
        execution: deterministic
        has_prompt: false
        has_model: false
      agent:
        description: LLM-powered. Has a system prompt, provider-resolved model alias, conversation mode. Subscribes to events, reasons about
          them, calls tools. Can own workflow transitions where the stage change requires LLM judgment (e.g. promote/kill
          decisions, build readiness). Agents produce events that may also trigger transitions owned by system nodes.
        execution: llm
        has_prompt: true
        has_model: true
      runtime:
        description: 'The platform itself. Handles transitions that are implicit (human decisions, system lifecycle). Not
          declared in any contract — always available.

          '
        execution: implicit
        has_prompt: false
        has_model: false
  flow:
    description: A self-contained building block with input/output pins (events and data), system nodes that orchestrate state
      transitions, and required agent roles. The marketplace unit. Analogous to an IC chip in circuit design.
    required_files:
    - nodes.yaml
    - events.yaml
    - schema.yaml
  flow_identity:
    description: 'A flow has two distinct identity concepts that are NOT interchangeable.'
    flow_scope_key:
      description: 'Semantic namespace derived from the flow''s position in the contract tree.
        Identifies the flow TYPE and its logical position, not a specific running instance.
        Example: scoring, validation, operating/build. Used for: gate projection namespaces,
        event scoping, contract-level references.'
      examples:
      - scoring
      - validation
      - operating/build
    flow_instance_path:
      description: 'Concrete running instance identity. Includes the instance ID for template flows.
        Identifies a specific execution. Example: operating/vert-001. Used for: entity_state.flow_instance,
        routing_rules.flow_instance, instance lifecycle management.'
      examples:
      - scoring (static flow — scope key and instance path are the same)
      - operating/vert-001 (template instance — scope key is "operating", instance path includes the ID)
    not_interchangeable: 'These are not interchangeable. Using instance path where scope key is needed
      causes prefix-based ownership bugs. Using scope key where instance path is needed causes
      cross-instance state leakage. The runtime MUST use the correct identity for each context.'
    flow_entity_id: 'The canonical entity identity within a flow is scoped by the concrete instance
      path, but cardinality depends on the authoring model. Under the normal
      flow-instance-centered authoring model, a flow instance owns one primary
      state entity. Static multi-entity ownership is retired and MUST NOT create
      many entity_state rows over time from authored static handlers; template
      flow instances use the instance identity plus their primary entity. The
      runtime MUST NOT maintain competing identities for the same entity row or
      blur flow-instance identity with entity identity.'
  state:
    description: 'A named state in a workflow. An entity (e.g. a ticket, an order, a document) is always in exactly one
      state. States belong to phases for grouping. Some states are terminal (no outgoing transitions).

      '
    required_fields:
    - id
    - phase
    optional_fields:
    - description
contract_formats:
  description: Canonical format for all flow contract files.
  loader_defaults:
    description: Fields and identifiers that the loader derives from context. Entries marked non-authorable are not accepted
      as public YAML fields.
    schema_name: Optional. If omitted, derived from the directory name of the flow package. A flow at flows/intake/ gets
      name "intake" automatically.
    flow_namespace: Non-authorable. Derived from the flow path relative to root. A flow at flows/intake/ gets namespace "intake".
      Root flow gets empty namespace. Public schema.yaml namespace override fields, including namespace, namespace_prefix,
      and namespace_rule, are not accepted.
    agent_id: 'Optional. If omitted, the YAML map key IS the agent ID. agents.yaml uses map keys as canonical identifiers:
      {"classifier-agent": {model: regular, ...}} means agent_id = "classifier-agent". Explicit id field overrides the
      map key if present, but this is discouraged. Under agent_identity_model.current_supported_posture this authored
      slug is also the current public/runtime agent_id and must be unique across live loaded/boot-pinned bundles until
      the #977 UUID-internal migration is separately promoted and implemented.'
    agent_emit_events: Optional. If omitted, defaults to empty list []. An agent that only observes (subscribes but never
      emits) may omit emit_events entirely.
  file_layout:
    description: Every flow has the same directory structure. The root flow is the entry point. Flows nest via flows/ subdirectories.
      The runtime/ bridge provides merged flat files for flat file loaders.
    structure: "\n{root_flow}/                         # Root flow (entry point)\n  package.yaml                       # Manifest:\
      \ name, version, flows, handoffs\n  schema.yaml                        # Flow pins + state machine\n  nodes.yaml \
      \                        # Root-level system nodes\n  events.yaml                        # Root-level events (flat payload\
      \ declarations)\n  entities.yaml                      # Root-level entity contracts (rare)\n  types.yaml         \
      \                # Shared named types / enums / scalar aliases\n  agents.yaml                        # Root-level agents\n\
      \  tools.yaml                         # Shared tools\n  policy.yaml                        # Shared policy\n  prompts/\
      \                           # Root-level agent prompts\n  runtime/                           # Merged flat files for\
      \ flat file loader\n    nodes.yaml\n    events.yaml\n    entities.yaml\n    types.yaml\n    agents.yaml\n    tools.yaml\n\
      \    policy.yaml\n  flows/\n    {child_flow}/                    # Child flow (same structure, recursive)\n      package.yaml\n\
      \      schema.yaml\n      nodes.yaml\n      events.yaml\n      entities.yaml                  # Flow-owned entity contract\
      (optional)\n      types.yaml                     # Flow-local types (optional)\n      agents.yaml\n      tools.yaml\
      \                    # Optional\n      policy.yaml                   # Optional\n      prompts/\n      data/                      # Flow-scoped static reference data (optional)\n      flows/      \
      \                   # Grandchild flows (if any)\n        {grandchild}/\n          package.yaml\n          ...\n\n\
      platform/                            # Platform contracts (separate from any flow)\n  package.yaml\n  platform-spec.yaml\n"
  minimum_flow_package:
    required_files:
    - package.yaml
    - schema.yaml
    optional_files:
    - nodes.yaml
    - events.yaml
    - entities.yaml
    - types.yaml
    - agents.yaml
    - tools.yaml
    - policy.yaml
    optional_directories:
    - prompts/
    - flows/
    rule: A flow with no agents needs no prompts/. A flow with no handlers needs no nodes.yaml. A flow with no events needs
      no events.yaml.
  flow_schema:
    description: Canonical `schema.yaml` flow declaration surface for lifecycle stage-node and pin declarations.
    owner_file: contracts/flows/<flow>/schema.yaml
    bundle_scope_exception: contracts/schema.yaml for the root flow
    owned_concepts:
    - stages
    - loops
    - initial_state
    - terminal_states
    - states
    - pins.inputs.events
    - pins.outputs.events
    rule: Flow reachability, declared state membership, and flow-local pin event declarations resolve against this parsed
      owner. Runtime liveness and temporal progress are separate runtime concerns. Entity ownership is not selected in
      schema.yaml for normal flows; the single flow-owned `entities.yaml` entry is authoritative.
    stages_authoring:
      status: merge_bearing_first_slice
      implementation_tracker: '#1845'
      rule: >
        `stages:` is the canonical lifecycle node authoring owner for staged
        bundles. It is a keyed mapping whose keys are per-flow stage IDs and
        whose values carry declaration metadata such as `initial: true`,
        `terminal: true`, and `description`. It lowers to the existing
        `initial_state` / `states` / `terminal_states` kernel. It does not
        replace transition-edge carriers; handlers still contribute edges
        through `advances_to`, `rules`, and `on_complete` in this slice.
      stateless_form: >
        `stages: []` is the explicit stateless form for staged bundles.
      mutual_exclusion: >
        `stages:` is mutually exclusive with legacy lifecycle authoring fields
        `initial_state`, `states`, and `terminal_states` in the same schema.
        Legacy fields remain accepted as explicit legacy/kernel input until a
        later migration removes them from public authoring.
      temporal_rows:
        implementation_tracker: '#1846'
        rule: >
          A stage may declare one-shot temporal rows under
          `stages.<stage>.timers`. Each row uses `after:` plus `emit:`,
          `advances_to:`, or both. The timer arms when the entity enters the
          owning stage and cancels when the entity leaves that stage. A row with
          `advances_to` terminates the stage by lowering to the existing
          transition-edge model; an emit-only row does not leave the stage. The
          author does not write `interrupting`; the presence of `advances_to`
          defines the stage-ending behavior.
        syntax: |
          stages:
            awaiting_review:
              timers:
                - after: 48h
                  emit: review.sla_escalated
                - after: "{{marginal_park_days}}d"
                  advances_to: expired
        row_identity: >
          `id:` is optional. When absent, the platform derives a stable ID from
          `<stage>.<emit-event-or-advance-target>`. Duplicate derived IDs are a
          boot error; authors must add explicit IDs to disambiguate collisions.
          Timer row IDs, whether derived or explicit, must be unique within the
          owning flow's semantic timer namespace. Runtime semantic timer IDs
          are scoped by the owning flow for non-root flows so common local
          stage/timer IDs in sibling flows do not merge.
        invalid_forms: >
          Stage timer rows reject superseded spellings including `delay`,
          `interrupting`, `repeat`, and `recurring`. Stage timer rows are
          one-shot in this slice.
    bounded_loops:
      status: merge_bearing
      implementation_tracker: '#1849'
      purpose: >
        `loops:` is the canonical owner for declarative, finite lifecycle
        revision loops. It replaces counter guards, backward-edge conventions,
        prompt instructions, and accumulator reset fields as loop authority.
      syntax: |
        loops:
          revision:
            revision_field: revision_id
            max_attempts: "{{policy.inner_revision_max}}"
            escape:
              advances_to: escalated
              emit:
                event: review.escalated
                fields:
                  revision_id: {cel: loop.revision_id}

        event_handlers:
          work.started:
            loop: {start: revision, from: queued}
            advances_to: drafting
          draft.ready:
            loop: {admit: revision, from: drafting}
            advances_to: review
          review.revision_requested:
            loop: {repeat: revision, from: review}
            advances_to: drafting
          review.approved:
            loop: {close: revision, from: review}
            advances_to: approved
      declaration:
        keyed_scope: Loop IDs and revision_field names are unique within one flow.
        revision_field: >
          Required text event field that carries the current durable revision
          identity. A handler consuming that field in the declaring flow must
          declare exactly one matching loop operation.
        max_attempts: >
          Required positive integer or policy scalar reference. It means total
          attempts including the initial attempt, is evaluated exactly once at
          start, and is persisted in the activation. Policy edits and resume do
          not alter an active loop's cap.
        escape: >
          Required advances_to target outside the loop's strongly connected
          component, with an optional typed emit. The emit is part of the
          canonical declarative emitted-site inventory: its event MUST exist,
          every authored and required payload field MUST satisfy that event
          schema, and the declared revision field MUST be required text carried
          exactly from loop.revision_id. Escape is a declared lifecycle outcome,
          not a failure.
      operations:
        start: Creates one durable activation at attempt 1 and enters the loop region.
        admit: >
          Admits work for the current revision before guards, values, state
          mutation, actions, activities, fan-out, joins, accumulators, transition,
          or emit. It may remain in the stage or advance only within the region.
        repeat: >
          If attempt is below the stamped cap, atomically increments the attempt,
          mints a new revision, supersedes prior-attempt machinery, and returns to
          the declared entry path. At the cap it atomically selects escape and
          suppresses ordinary repeat transition and emit work.
        close: Atomically closes the activation and exits the region.
        source_fact: >
          Every operation requires exact `from:`. Runtime admission requires the
          persisted current stage to match it; no ambient or inferred source stage
          is accepted.
      topology: >
        One canonical lowered lifecycle graph owns handler, rule, completion,
        join, timer, and loop transition edges for verify, runtime loop plans,
        and describe --graph. The loop region is the exact strongly connected
        component containing the start target; it is never reconstructed as a
        union of operation endpoints. The start source MUST be outside that SCC,
        repeat MUST return to the start target, and close plus cap escape MUST
        leave the SCC. An ordinary edge that reconnects a close or escape target
        to the SCC makes that target part of the SCC and is rejected. Every
        handler whose canonical source-stage set intersects the SCC MUST declare
        the matching loop operation; non-start handlers also require the
        declared text revision field. Verify requires one start, at least one
        repeat and close, and disjoint flat regions. Nested, overlapping,
        computed, unbounded, or arbitrary loops are rejected and belong to #1671.
      identity_and_admission: >
        Activation and revision IDs are deterministic run/entity/flow/loop facts.
        Exact delivery identity remains idempotent. A prior or post-close revision
        is platform.stale_arrival; a matching revision for a later stage is
        platform.early_arrival; an unknown/future/non-active revision is
        platform.unexpected_arrival; conflicting content at one logical coordinate
        is platform.conflicting_duplicate. Rejections mutate no business or
        control state and launch no effect.
      atomicity: >
        Start, admit, repeat, close, cap escape, stage mutation, outbox events,
        and supersession of generation-owned machinery commit through one selected
        SQLite/Postgres mutation owner under the workflow entity lock. An error in
        any part rolls back the unit; no post-commit best-effort loop authority is
        permitted.
      generation_carriers: >
        One-shot stage/event timers, join activations and outcomes, accumulator
        buckets/timeouts, fan-out and child results, action and mailbox results,
        activity requests/claims/results, runtime logs, restart, replay, and forks
        carry either the internal immutable generation or the declared revision
        field. Prior-generation work cannot mutate or launch work in a later
        generation. Recurring timers connected to a loop region or operation are
        rejected by verify, boot, and runtime construction.
      activity_claim: >
        A loop-owned non_idempotent_write activity checks the durable generation
        and inserts or reads activity_attempts.started in one selected-store
        transaction under the entity lock, before credential resolution or
        outbound preparation. Repeat/close winning first yields stale admission
        and no call. A committed started claim winning first owns at most one call;
        its later result remains stamped with that generation. Commit
        acknowledgment ambiguity reconciles by request identity before dispatch;
        started or uncertain rows are never blindly redispatched.
      replay_restart_fork: >
        Restart reloads the activation and generation-owned machinery. Same-run
        replay preserves recorded identity. Timestamp forks preserve attempt and
        stamped cap but deterministically mint fork-local activation/revision IDs
        and remint generation-bearing event payloads, timer/join/accumulator
        identities, pending activity requests, journal evidence, and result IDs.
        read_only activity requests use reexecute_read under fork-local identity.
        non_idempotent_write requests use reuse_recorded_result: terminal source
        evidence is copied into a fork-local terminal activity_attempt and the
        existing dispatcher republishes that fork-local result without invoking
        the connector. Missing, non-terminal, or policy-inconsistent activity
        evidence fails the fork closed.
      expression_context: >
        `loop.id`, `loop.activation_id`, `loop.revision_id`, `loop.attempt`, and
        `loop.max_attempts` are available after loop admission. The CEL
        implementation may lower this root internally, but `loop.*` is the only
        authored spelling.
      projection: >
        Reserved persisted loop buckets are not readable or writable through
        authored accumulator/data/clear paths. Supported entity/tool readbacks
        expose a typed loop projection and omit the mutable internal bucket.
  entity_schema:
    description: |
      `package.yaml.entity_schema` is retired. Authoritative entity
      contracts now live in `entities.yaml`, owned by the flow whose
      directory contains the file. The platform derives DDL and entity
      tool validation from those entity contracts plus the shared type
      system.
    replacement_surface:
      owner_file: contracts/flows/<flow>/entities.yaml
      bundle_scope_exception: contracts/entities.yaml for rare bundle-scope entities
      type_source: contracts/types.yaml and contracts/flows/<flow>/types.yaml
    migration_rules:
      retired:
      - Embedded `entity_schema` blocks in package.yaml
      - Grouped field sections as the contract authority
      - jsonb as an author-declared entity field type
      - Inline `nullable:` authoring as a substitute for explicit type semantics
      replacement: |
        Entity contracts use a flat form: underscore-prefixed keys are
        entity metadata, non-underscored keys are field declarations.
        Field types come from the Wave 1 type system. Every declared
        field is always readable with a type-valid value; `initial:` is
        the explicit authored create-time override when needed.
    authoritative_section: See top-level `entity_contracts` and `type_system`.
  event_schema:
    description: |
      Events in `events.yaml` use the Wave 1 flat payload form.
      Event-level Swarm metadata lives under the reserved `swarm:`
      namespace. Aside from reserved platform metadata fields such as
      `emitter`, `runtime_handling`, `owning_node`, and
      `delivery_channel`, other non-underscored top-level keys are
      producer-owned payload fields.
      The platform validates emit calls against the declared payload
      contract and populates envelope fields separately.
      Runtime emit-payload validators MUST validate against the
      canonical type-aware event schema lowered through the active
      Wave 1 type catalog. Runtime validators MUST NOT pass unresolved
      contract type names such as named types, scalar aliases, or enums
      to the primitive JSON schema validator as literal schema types.
      Authored `swarm.source`, `swarm.producer`, and `swarm.consumer`
      are external/platform/non-derivable proof only. Internal producer,
      consumer, and source facts MUST be derived from topology owners such
      as handlers, agents, timers, fan_out, auto_emit_on_create, pins,
      connect routes, runtime owners, and effective system-node helpers.
      Authored metadata that deterministically restates those internal
      roles is a hard invalidity, not an alternate semantic owner.
      Validation ownership is layered, not competing: supported emit
      surfaces validate producer-authored payloads before publish, while
      canonical event-store admission validates every event payload that
      reaches persistence. Event-store admission is the primary owner for
      ingress/direct/store append paths without a more specific producer
      surface owner, and is only a final guard for supported emit surfaces
      that already validated before publish. Event-store admission MUST NOT
      interpret routing, delivery, source, target, or recipient semantics.
    format:
      event_name: |
        swarm:
          source: external (optional; non-derivable external/platform producer proof)
          producer: mailbox_human (optional; exceptional non-derivable producer proof)
          consumer: external_ui (optional; non-derivable external sink proof)
          status: planned (optional; lifecycle suppression)
          note: Human-readable metadata (optional)
        field_name: type
        nested_field:
          type: NamedType
          description: Human-readable annotation
          pattern: ^[0-9a-f]{40}$
          length:
            min: 40
            max: 40
          range:
            min: 0
            max: 100
          equal_to: sibling_field
    strict_payload_contract:
      rule: |
        Event payloads are producer-complete only. Every declared
        payload field must be populated by the active emit site's
        canonical explicit `emit.fields` map. `emit.from` and same-named
        bare namespace `emit.fields` values are only authoring sugar for
        system-node emitted payload maps; they lower to the same explicit map
        before validation, generated/semantic views, and runtime execution. No
        payload defaults. No implicit passthrough. No nested `payload:` block.
        Missing declared fields and undeclared emitted fields are contract
        violations.
      envelope_split: |
        Envelope fields are runtime-owned and are not author-declared
        in event schemas. Consumers access them through event.*,
        not payload.*.

        Pin-routed events use two route identities:
        - event.source: the emitter route identity. For platform-originated
          emits this is always set from the emitter's flow_instance and
          entity_id at emit time. Source lineage is never overwritten by
          receiver selection, replay, or target resolution.
        - event.target: the singular recipient route identity. It is set by a
          lowered parent `connect` route plan, by the exceptional explicit
          producer target escape hatch, by structural child-to-parent binding,
          or by receiver-side late binding when resolution yields exactly one
          recipient.
        - event.target_set: a concrete list of recipient route identities for
          fan-out targeting. It is produced by lowered parent `connect`
          fan-out/topology or by the exceptional
          `target: { flow, match, allow_fanout: true }` escape hatch after
          publish-time resolution. It is not a selector and it is not
          broadcast.

        Top-level event.entity_id and event.flow_instance are retired
        receiver-context projection shorthands and are unsupported on
        handler authoring expression surfaces. Current receiver entity
        context must be read through _entity.id and _entity.flow_instance.
        Emitter route identity must be read through event.source.entity_id
        and event.source.flow_instance. Singular receiver route identity
        must be read through event.target.entity_id and
        event.target.flow_instance. Fan-out receiver identity is represented
        by event.target_set and by the per-recipient delivery target exposed
        as event.target during dispatch. event.entity_id and
        event.flow_instance are not a source-of-truth envelope model for pin
        routing.

        Other envelope fields such as trigger_event_type, current_state,
        source_event_id, emitted_at, run_id, and scope remain
        platform-populated.
      envelope_identity:
        source:
          fields:
          - flow_instance
          - entity_id
          rule: Platform-originated emits MUST set source from the emitter context before payload validation or delivery.
          lineage: Source persists unchanged through replay, retry, recovery, diagnostics, and dead-letter records.
        target:
          fields:
          - flow_instance
          - entity_id
          rule: Pin-declared output emits MUST either resolve a singular target from lowered parent connect topology,
            resolve target_set from lowered fan-out topology, use the explicit producer target escape hatch, use a structural
            ParentRoute target only when no lowered connect target applies, use an eligible static child delivery-entity route,
            or explicitly opt out with broadcast:true.
          absent_means: event.target is absent when event.target_set is present, when broadcast:true is used, or when uncontrolled external ingress has not yet been receiver-bound.
          mutual_exclusion: event.target and event.target_set MUST NOT both be populated on the persisted event.
        target_set:
          fields:
          - flow_instance
          - entity_id
          rule: Parent connect fan-out and explicit flow/match fan-out MUST materialize a concrete ordered list of recipient route identities at publish time.
          not_a_selector: The persisted event.target_set stores resolved route identities, not the authored connect or flow/match selector.
          delivery_rule: Each persisted delivery row MUST carry one target_set member as its delivery target. Dispatch exposes that per-recipient target as event.target for the receiver context.
        receiver_context_order:
        - event.target
        - current_delivery_target_from_event.target_set
        - select_entity_or_select_or_create_entity_late_binding
        - event.source
      retired:
      - Nested `payload:` wrapper blocks
      - Inline `type: object` without declared inner shape
      - jsonb payload declarations
      - Author-declared envelope fields
    runtime_event_construction:
      status: merge_bearing_source_authority
      owner: platform-spec.yaml#contract_formats.event_schema.runtime_event_construction
      rule: |
        Runtime event carriers are read-only outside the event package.
        Event-owned fields such as id, type, source_agent, task_id, payload,
        chain_depth, run_id, source_event_id/parent_event_id, envelope, and
        created_at MUST be supplied through semantic event constructors or
        through explicitly bounded projection/readback constructors. Production
        code MUST NOT mutate event-owned fields after construction and MUST NOT
        construct events through direct carrier literals.

        The constructor class is part of the semantic claim. A runtime producer
        MUST use the constructor class that matches the producer role rather
        than a generic all-fields constructor. Constructor APIs MUST clone
        caller-owned payload bytes, normalize event-owned identity fields, and
        expose event facts through read-only accessors.

        Persisted event admission is the canonical boundary between constructed
        event shells, context/correlation candidates, and storage. The admission
        owner MUST classify or consume the constructor class before any event row
        is written. It may materialize explicitly admitted event_id and created_at
        defaults, and may allocate root-ingress run_id when the ingress class
        permits server allocation. Runtime-owned routable platform events emitted
        by the runtime-control or runtime-diagnostic classes may also allocate an
        explicit standalone run_id at admission so the platform event enters the
        normal run/delivery lifecycle without relying on store fallbacks. It MUST
        fail closed for missing child, replay, fork, or runtime-domain lineage
        facts that are required by the event class. EventBus, transactional
        outbox, direct store append/persist, runtime-log diagnostic-direct
        persistence, inbound-marker persistence, and Postgres/SQLite storage
        envelopes MUST consume this owner. Stores and database defaults are
        schema fallbacks only; they MUST NOT silently invent event_id, run_id,
        created_at, source_event_id, target, target_set, or other class-required
        facts after admission.
      constructor_classes:
        root_ingress:
          rule: External/operator/root run ingress events carry their final
            explicit run, source, envelope, and timestamp facts at construction.
        child:
          rule: Child/runtime emits inherit lineage from the supplied parent or
            explicit EventLineage at construction. Lineage inheritance MUST NOT
            be patched by later carrier mutation.
        replay:
          rule: Replay/fork events use replay lineage constructors so replay
            source and run ownership are explicit before persistence or dispatch.
            Selected-contract fork-local replay is the bounded exception where
            the durable parent/source authority is
            run_fork_selected_contract_executions rather than
            events.source_event_id. Admission MUST consume the selected-fork
            lineage owner instead of silently writing a generic source_event_id
            parent, and the typed execution lineage row MUST be committed after
            the fork event row exists and before selected-contract activation.
        runtime_control:
          rule: Platform control and directive events use runtime-control
            constructors so diagnostics/control traffic is not confused with
            producer-authored domain emits.
        runtime_diagnostic:
          rule: Runtime diagnostic/dead-letter/status events use diagnostic
            constructors and remain separate from route or delivery authority.
        diagnostic_direct:
          rule: Diagnostic-direct persisted platform events such as
            platform.runtime_log and platform.inbound_recorded are admitted as
            non-routed/non-executable evidence markers before direct persistence.
            Their event_id and created_at facts are explicit admission output,
            not database defaults; optional run_id remains empty only when the
            diagnostic-direct class is global/no-run by design.
        route_probe:
          rule: Route-query and sentinel probes may use dedicated probe
            constructors only when the event is not a persisted runtime emit and
            is not executable delivery work.
      projection_boundary:
        rule: |
          Projection construction is not runtime producer authority. It exists
          only to reconstruct or copy an event from facts that another canonical
          owner has already produced. Production projection call sites MUST be
          exact-path/function/count allowlisted by the event-construction guard.
          Adding a new production projection call requires naming the upstream
          owner whose facts are being projected and proving that the projection
          does not create, repair, or infer missing lineage, envelope, recipient,
          or delivery authority.
        allowed_classes:
        - persisted event-store, delivery, replay, and readback row hydration
        - publish-admission default projection of an already constructed event
          shell for generated event_id, created_at, or source_agent facts before
          persistence
        - route/envelope projection after RoutePlan, pin-routing, or selected
          entity owners have already resolved the final envelope facts
        - pure immutable carrier copy/snapshot for post-commit, preview, or
          engine adapter isolation
        - route-query/sentinel probes that are not persisted runtime events and
          cannot become executable delivery work
        invalid_authority:
        - constructing a new domain/runtime event because the caller has all
          fields available
        - filling missing run_id, source_event_id, task_id, target, target_set,
          or delivery_target_route after the responsible semantic owner failed
          to produce them
        - creating workflow-node recipient or event_deliveries authority
        - repairing replay, receipt, settlement, or readback gaps
        - preserving legacy payload-derived lineage or envelope behavior
      conformance_guard:
        rule: |
          The production construction guard MUST scan production Go files under
          internal/ and cmd/ and fail on direct events.Event literals, direct
          event-owned field assignment, event With* projection/mutation calls,
          dot-imported event APIs, and unallowlisted NewProjectionEvent or
          NewRouteProbeEvent calls.
          Projection allowlist entries MUST be exact enough to detect both new
          call sites and extra calls added inside an existing allowed function;
          route-probe allowlist entries MUST meet the same exactness bar.
    routing_derivation:
      description: 'Routing is derived from two mechanisms:'
      typed_pubsub: 'Typed pub/sub routing derives from subscriptions — agents.yaml subscriptions,
        nodes.yaml subscribes_to, and event_handlers keys. The platform matches canonical event identity
        through same-flow declarations or governed import-boundary wildcard authorization.'
      inter_flow_connect: 'Between flows, authored topology derives from parent package connect entries
        over output and input pins. Output pins declare event identity and producer key/carries
        evidence, template receivers declare instance.by route keys, input pins declare receiver
        interface and explicit addressed-input routing when needed, and parent connect lowers into concrete route-plan facts. See
        flow_model.flow_package.composition_routing and engine.cross_flow_routing for details.
        Explicit scoped subscriptions (e.g., scoring/vertical.shortlisted) remain an escape hatch for
        cases outside the pin/connect interface.'
      input_source_resolution:
        canonical_owner: internal/runtime/semanticview.ResolveFlowInputProducer
        rule: |
          Flow input producer proof is resolved once through a typed source taxonomy and consumed by boot verification,
          RouteTable derivation, and workflow-node subscription projection. The accepted proof classes are boundary external
          ingress, intrinsic input-pin ingress (`source: external` on the input pin), parent connect, explicit harness
          injection, platform source, and internal topology producer. Internal topology producer proof proves the event is
          produced inside the authored topology by sibling flow outputs, root/flow agent or node emits, timers, fan_out,
          or root/flow `auto_emit_on_create`, but it MUST NOT generate producer-scoped auto-wire route patterns.
          Direct parent connect proof proves the input is satisfied, but concrete delivery authority remains the connect
          RoutePlan, not a raw subscription fallback.
        retired_paths: |
          Unique same-name sibling output-pin inference is retired as producer-pattern authority. `swarm.source: external`
          on events.yaml is not input-pin producer proof; it remains external metadata for non-input event roles such as
          dead-event and accumulator producer-source checks.
      delivery_rules:
        owning_node: If a system node subscribes_to the event → that node owns it
        dual_delivery: If a node AND agents subscribe → route to both
        consuming: If only a node subscribes → route to node only
        passthrough: If no node subscribes → pure agent delivery
        workflow_node_route_authority: Workflow-node delivery route authority is derived from semantic route topology at publish time and persisted as typed event_deliveries rows before workflow-node execution. Live internal carriers, interceptors, handler lookup, receipts, settlement, replay markers, and API/CLI readback are consumers or evidence only; they MUST NOT be required or used as the authority that creates a workflow-node delivery route.
      route_plan_authority:
        status: merge_bearing_source_authority
        owner: platform-spec.yaml#contract_formats.event_schema.routing_derivation.route_plan_authority
        definition: |
          A RoutePlan is the publish-time typed authority that states which
          concrete recipients should receive one event, why they were selected,
          which target route identity applies to each recipient, and which
          persistence/replay expectations downstream consumers inherit. It is
          produced before executable delivery work is dispatched and before any
          workflow-node handler can run.
        rule: |
          RoutePlan construction MUST consume semantic route topology and the
          event's resolved context exactly once for the publish operation. The
          resulting typed recipients MUST be persisted through event_deliveries
          before they are treated as executable delivery work. Runtime dispatch,
          API/CLI readback, receipts, settlement, replay markers, handler lookup,
          descriptor lookup, live carriers, and interceptors consume or observe
          RoutePlan results; they MUST NOT create, replace, or repair missing
          route authority.
        decision_state:
          status: merge_bearing_runtime_behavior
          implementation_slice: '#1482'
          canonical_code_owner: internal/runtime/bus.RoutePlan.AuthorityState
          states:
          - no_canonical_match
          - canonical_matched
          - canonical_failed_closed
          - lower_precedence
          rule: |
            RoutePlan authority decisions MUST be represented by first-class
            runtime state, not reconstructed from ExtraDetail, TargetFailure,
            Source, Reason, or prose diagnostics. no_canonical_match means no
            canonical route owner matched the publish operation and lower-
            precedence route production may run. canonical_matched means a
            canonical route owner matched and produced executable recipients;
            lower-precedence producers such as legacy recipient materializers
            MUST NOT add, replace, or repair routes afterward.
            canonical_failed_closed means a canonical route owner matched and
            failed closed; the final RoutePlan MUST expose zero executable
            LiveRecipients, DeliveryIntents, DeliveryRoutes, and persisted
            recipients unless a later spec explicitly defines partial-delivery
            semantics. lower_precedence means legacy or compatibility route
            production was used only after no canonical owner matched.
            Publish, PublishInMutation, CheckPublishRecipientPlan, and
            engineOutbox MUST preserve this decision state across RoutePlan
            projection, materialization, diagnostics, persistence, and delivery
            consumers.
        route_intent_producer_model:
          status: merge_bearing_runtime_behavior
          implementation_slice: '#1495'
          canonical_code_owner: internal/runtime/bus.routeIntentProducer
          producers:
          - agent_policy / matched_agent_subscription
          - direct_policy / direct_publish
          - internal_target_route / internal_carrier
          - internal_target_route / route_table_node
          - concrete_node_route / route_table_node
          - scoped_node_route / route_table_node
          - root_node_route / route_table_node
          - root_input_flow_node_route / route_table_node
          - recipient_plan_materializer / materialized_route
          - connect_route_plan / lowered_connect_route_plan
          rule: |
            EventBus RoutePlan producer identity MUST be represented by a closed
            typed route-intent producer role, not by broad helper APIs accepting
            raw source/reason strings and not by a producer-local pair of
            independently assigned source and reason values. RoutePlan
            live-recipient and delivery-intent metadata MUST carry the same typed
            producer role so source and reason are derived from one role and
            cannot drift independently across producers.
            The typed producer model is metadata and ownership proof; it does
            not by itself create delivery authority, override
            RoutePlanAuthorityState, or permit lower-precedence repair after a
            canonical matched or canonical failed-closed route decision.
            Connect-route producer roles, lower-precedence agent/subscription
            roles, internal-target roles, concrete/scoped/root node roles,
            root-input roles, and recipient-materializer roles MUST be produced
            through the typed model. #1496 removes the legacy EventBus
            eventDeliveryPlan compatibility projection as a live route
            interpreter, and #1493 removes the obsolete legacy projection
            producer vocabulary left behind after that collapse. Direct delivery
            remains an explicit direct-recipient RoutePlan-backed
            producer/consumer path.
        legacy_event_delivery_plan_collapse:
          status: merge_bearing_runtime_behavior
          implementation_slice: '#1496'
          canonical_code_owner: internal/runtime/bus.RoutePlan via deliveryPlanner.Plan and deliveryPlanner.PlanDirect
          rule: |
            EventBus subscribed and direct planning MUST return and consume
            RoutePlan directly. The runtime MUST NOT expose an eventDeliveryPlan
            compatibility adapter, CanonicalRoutePlan projection,
            WithCanonicalRoutePlan replacement helper, or
            routePlanFromLegacyEventDeliveryPlan fallback that can reconstruct
            route authority from legacy recipient fields after planning. Publish
            materialization, publish authorization, preflight, transactional
            publish, deferred outbox, direct publish, and replay direct publish
            MUST consume the same RoutePlan model instead of crossing a
            post-plan compatibility interpreter.
        direct_delivery_route_plan_consumption:
          status: merge_bearing_runtime_behavior
          implementation_slice: '#1496'
          canonical_code_owner: internal/runtime/bus.EventBus.PublishDirect and internal/runtime/bus.EventBus.CheckDirectRecipients
          rule: |
            Direct delivery is a distinct public delivery semantic, not
            subscribed route authority. PublishDirect and CheckDirectRecipients
            MUST use deliveryPlanner.PlanDirect to produce a typed RoutePlan
            with the direct_policy/direct_publish producer role, persist direct
            delivery rows with CommittedReplayScopeDirect, and preserve explicit
            requested-recipient filtering metadata. Operator replay, pipeline,
            tools, manager, and outbox direct paths are consumers of this
            direct RoutePlan path and MUST NOT reinterpret caller-supplied
            recipients as subscribed RoutePlan authority or rebuild subscribed
            routing from replay/readback evidence.
        lowered_connect_route_plan_consumption:
          status: merge_bearing_runtime_behavior
          implementation_slice: '#1473/#1545'
          canonical_code_owner: internal/runtime/bus.RoutePlan via deliveryPlanner.Plan and connectRoutePlanResolver
          consumes:
          - internal/runtime/core/pinrouting.ConnectRoutePlan
          - lowered connect-route failure issues from route_plan_lowering
          - EventBus semantic source selected for the publish operation
          - producer output key/carries evidence and receiver instance-key evidence carried by ConnectRoutePlan.InstanceKey
          - RouteTable concrete receiver subscribers only after a lowered plan selects the receiver route identity
          - active flow-instance descriptors for supported receiver instance-key and addressed template targets
          produces:
          - typed RoutePlanDeliveryIntent rows with source=connect_route_plan and reason=lowered_connect_route_plan
          - concrete delivery_target_route values for supported singular event.target delivery
          - concrete delivery_target_route values for each supported event.target_set fanout member
          - reply-lineage route metadata on the RoutePlan when delivery=reply carries reply context
          - fail-closed TargetFailure values for missing, invalid, unsupported, unresolved, or unsubscribed lowered plans
          rule: |
            Supported EventBus subscribed publish planning MUST prefer a matched lowered ConnectRoutePlan over lower-precedence
            RouteTable/subscriber, raw event-name, producer target, producer broadcast, legacy recipient-policy/descriptor,
            recipient-plan materializer, or structural fallback routing.
            Publish, PublishInMutation, CheckPublishRecipientPlan, and engineOutbox MUST share this RoutePlan authority path.
            Static lowered ConnectRoutePlan matches MUST NOT require or be blocked by legacy active-agent descriptor lookup;
            descriptor loading is limited to lowered plans whose supported target form requires runtime resolution.
            Same-name template receiver plans MUST materialize from producer output key/carries plus receiver instance.by
            evidence carried on ConnectRoutePlan.InstanceKey; input-pin address, connect.map, select_entity, producer target,
            broadcast:true, direct delivery, raw subscribers, handler lookup, delivery rows, replay rows, and readback rows
            MUST NOT route or rescue that normal instance-key path.
            When a lowered plan matches but cannot materialize or resolve to supported concrete receiver routes, planning MUST
            fail closed and MUST NOT preserve previously inferred live-subscriber fallback recipients. RouteTable may be used
            only as a consumer that locates the concrete receiver handler/carrier for the already-selected target route identity.
            A matched lowered ConnectRoutePlan decision, including fail-closed diagnostics, MUST NOT be repaired or augmented
            by post-planning recipient materialization hooks. #1482 promotes this matched decision into explicit
            RoutePlan authority state so materializer eligibility and fail-closed zero-route behavior are structural rather
            than inferred from connect-route metadata.
          receiver_carrier_lookup_boundary:
            status: merge_bearing_runtime_behavior
            implementation_slice: '#1485'
            canonical_code_owner: internal/runtime/bus.connectReceiverCarrierRouteKeys
            rule: |
              For a matched lowered ConnectRoutePlan, RouteTable lookup is a
              concrete receiver-carrier lookup only. Lookup keys MUST be derived
              from the selected materialized receiver target identity and the
              receiver endpoint. They MUST NOT include the producer/source
              endpoint, raw producer event name, source-scoped event name, live
              subscriber fallback keys, or any other lower-precedence route
              interpretation. If the selected receiver identity cannot locate a
              concrete receiver carrier, the matched plan fails closed instead
              of recovering through source/raw/legacy subscriber routes.
              Static and template lowered-connect receiver subscribers for
              concrete flow input events MUST materialize receiver-carrier
              evidence at the selected receiver path, except where
              import-boundary alias policy requires exclusive alias patterns.
          descriptor_evidence_boundary:
            status: merge_bearing_runtime_behavior
            implementation_slice: '#1485/#1479'
            canonical_code_owner: internal/runtime/bus.connectRoutePlanResolver.descriptorsForPlans and internal/runtime/core/pinrouting.MaterializeConnectRoutePlan
            rule: |
              Descriptor loading during lowered-connect EventBus planning is
              evidence for supported runtime-resolution target forms only.
              Static lowered ConnectRoutePlan matches MUST NOT load or depend on
              legacy active-agent recipient-policy descriptors. Runtime
              descriptor evidence may materialize identity-style targets and
              declared top-level receiver entity fields marked `indexed: true`. Descriptor
              evidence MUST NOT promote unsupported arbitrary business fields,
              unindexed entity fields, config fields, instance fields, delivery
              rows, receipts, replay/readback, RouteTable state, live
              subscriptions, or handler lookup into route topology authority.
          route_authority_drift_guardrails:
            status: merge_bearing_conformance_guardrail
            implementation_slice: '#1494'
            canonical_artifacts:
            - internal/runtime/conformance/testdata/route_authority_drift_inventory.yaml
            - internal/runtime/conformance/route_authority_drift_inventory_test.go
            - internal/runtime/conformance/testdata/route_authority_matrix.yaml
            - internal/runtime/conformance/route_authority_matrix_test.go
            rule: |
              Route-authority conformance guardrails MUST extend the existing
              route_authority_drift_inventory and route_authority_matrix owners
              instead of creating parallel inventories. Guardrails MUST classify
              route-like seams by role before they can be treated as approved:
              canonical RoutePlan/ConnectRoutePlan production, RouteTable
              carrier lookup, descriptor evidence, removed legacy
              eventDeliveryPlan compatibility, direct delivery, durable
              persistence sinks, replay/readback consumers, diagnostics, or
              explicitly split concepts.
              New route-like producers, compatibility interpreters, source/reason
              owners, or carrier/descriptor/direct-delivery seams MUST fail CI
              until they are added to the conformance inventory with a named
              classification and tracker disposition. These guardrails are
              source-authority checks only; they MUST NOT migrate runtime
              behavior without a separately approved issue gate.
          supported_surface:
          - static receiver singular delivery
          - identity-style template/dynamic receiver fanout through supported descriptor targets
          - reply delivery metadata preservation
          - persisted delivery rows, pipeline receipts, and committed replay scope as separate owners
          unsupported_or_split:
            business_field_descriptor_targets: 'Declared top-level receiver entity fields with indexed: true are implemented by #1479; nested entity paths, arbitrary, undeclared, unindexed, config, and instance business-field descriptor targets remain split to #1466 or later gated children.'
            agent_node_emitter_parity: 'Closed by #1474: generated agent emit tools and node/system emits for supported connected output pins consume the same EventBus RoutePlan authority from lowered parent connect facts.'
            producer_target_broadcast_retirement: 'Closed by #1475 for loaded flow-scope target.flow/match and broadcast:true common-path package composition; #1508 adds explicit package-root producer endpoints and retires root producer target/broadcast common-path composition when root connect authority applies.'
            selected_contract_runfork_readiness: 'Tracked under #1466/watchlist; not closed by #1473.'
            parent_composition_routing_closure: '#1466 remains open until root-connect #1508 closeout is merged and audited.'
        inputs:
          event_identity:
            fields:
            - event_id when already allocated
            - event_name
            - source_event_id
            - emitter/source
            rule: Event identity carries the concrete event being published and
              any causal parent/source facts. It is not enough by itself to
              infer recipients.
          run_bundle_context:
            fields:
            - run_id
            - bundle_hash
            - bundle_source
            - workflow_name
            - workflow_version
            rule: Run and bundle context select the loaded semantic topology
              and fail closed when the selected topology is unavailable or
              inconsistent with the publish request.
          route_topology:
            fields:
            - parent package.yaml connect entries
            - addressed input pin receiver resolution rules
            - lowered connect route-plan facts
            - RouteTable semantic subscribers
            - nodes.yaml subscribes_to entries
            - agents.yaml subscriptions
            - event_handlers keys
            - pins.inputs.events and pins.outputs.events
            rule: Semantic route topology is the source for recipient
              derivation. Parent connect topology and addressed input pins are
              the authored cross-flow source authority; RouteTable and RoutePlan
              consume the lowered facts. Live subscription channels, active
              descriptors, and handler lookup are not topology authority.
          target_context:
            fields:
            - event.target
            - event.target_set
            - delivery_target_route
            - lowered connect route-plan facts
            - explicit target routes
            - structural ParentRoute
            - flow_instance
            - entity_id
            rule: Target context narrows or materializes recipient route
              identities. A fan-out target_set MUST be resolved to concrete
              per-recipient delivery targets before persistence.
          execution_context:
            fields:
            - selected_contract_context
            - fork_run_context
            - runtime_callback_context
            - replay_scope_context
            rule: Selected, fork, runtime callback, and replay contexts may add
              or constrain route-plan inputs only through their own gated
              owners. Source rows, current live subscriptions, readback state,
              receipts, or settlement evidence remain invalid recipient truth.
        runtime_callback_context:
          status: merge_bearing_source_authority
          owner: platform-spec.yaml#contract_formats.event_schema.routing_derivation.route_plan_authority.runtime_callback_context
          rule: |
            Runtime-produced callbacks that carry an unprefixed local event name
            and a scoped concrete flow_instance MUST be normalized into the
            same-flow concrete route context before RoutePlan production. For
            example, event_name=repo_scaffold.repo_commit_succeeded with
            flow_instance=repo-scaffold/<instance> is planned as the concrete
            same-flow route context
            repo-scaffold/<instance>/repo_scaffold.repo_commit_succeeded while
            preserving the original event name in the delivered event envelope.
          normalization:
            input_shape:
            - unprefixed runtime/local event_name
            - scoped concrete flow_instance whose first path segment is the
              static semantic flow scope
            - optional entity_id and target context supplied by the producer
            route_context: The concrete same-flow route context is
              <flow_instance>/<local_event_name>. Root/run-owned flow_instance
              values without a semantic scope MUST NOT synthesize a concrete
              same-flow route key.
            existing_scoped_events: Runtime events whose event_name already
              carries the static semantic flow scope continue to normalize to
              the same concrete <flow_instance>/<local_event_name> route
              context. Callback-local normalization MUST share this owner
              rather than introduce an artifact-specific fallback.
          authority_boundaries:
            route_plan: RoutePlan MUST produce typed workflow-node recipients
              from the normalized callback route context before dispatch.
            persistence: event_deliveries MUST persist the typed node delivery
              row before workflow-node admission may execute the callback
              subscriber.
            invalid_authority:
            - artifact-specific callback fallback
            - workflow-runtime carrier row
            - live internal subscription state
            - handler lookup or active descriptor lookup
            - replay markers or replay-scope rows
            - event_receipts, settlement, or backfill
            - API, CLI, dashboard, or OpenRPC readback
        outputs:
          typed_recipients:
            fields:
            - subscriber_type
            - subscriber_id
            rule: Each executable recipient MUST be typed. subscriber_id alone
              is not sufficient when the semantic question is recipient
              identity or delivery authority.
          target_route_identity:
            fields:
            - delivery_target_route
            - target_set_member
            - flow_instance
            - entity_id
            rule: Each recipient that is narrowed or fanned out by target
              routing MUST carry the concrete target route identity that
              downstream dispatch exposes as receiver context.
          source_and_reason:
            fields:
            - route_source
            - reason_code
            - target_failure_reason
            - route_owner
            rule: RoutePlan output MUST preserve enough typed source/reason
              data to distinguish semantic route production, target-resolution
              failure, replay-scope ownership, and diagnostic/projection
              evidence.
          replay_scope_expectations:
            fields:
            - replay_scope_required
            - replay_scope_owner
            - source_delivery_lineage
            rule: Replay scope is an explicit expectation or lineage fact
              attached to a gated replay/fork owner. Replay markers are not
              route authority and MUST NOT authorize fresh delivery work by
              themselves.
          persistence_requirements:
            fields:
            - event_id
            - run_id
            - subscriber_type
            - subscriber_id
            - delivery_target_route
            - status
            - reason_code
            rule: Executable RoutePlan recipients are committed as typed
              event_deliveries rows. The durable row is the delivery-authority
              sink consumed by workflow-node admission, dispatch, retry,
              recovery, replay, and readback surfaces.
        authority_boundaries:
          admission: Event admission decides whether an event may enter or
            start work. It is a prerequisite to RoutePlan construction, not a
            substitute for a persisted recipient plan.
          route_production: Route production owns the typed recipient and
            target-route decisions before persistence. Later consumers must not
            re-plan the same event from local runtime evidence.
          persistence: event_deliveries is the durable authority sink for
            executable delivery work. Missing rows fail closed in consumers
            that require delivery authority.
          live_dispatch: Live carriers, workflow-runtime interceptors, active
            descriptors, and handler lookup are dispatch/observation consumers
            only. They must consume a RoutePlan or persisted deliveries rather
            than create authority.
          completion_evidence: event_receipts, settlement, backfill, processed
            markers, dead-letter state, and retry counters describe work after
            route authority exists. They must not repair or backfill missing
            pre-execution recipient authority.
          readback: API, CLI, dashboard, OpenRPC, and event read surfaces are
            projections over persisted owner data. They must not re-plan
            subscribers or fabricate delivery rows.
          replay_recovery: Replay, retry, sweeper, outbox, fork, and recovery
            paths consume persisted RoutePlan output or an explicitly gated
            replay/fork owner. They must not infer fresh recipients from current
            live topology unless their governing owner explicitly requires a
            current-recipient publish.
        public_projection_policy:
          current_boundary: |
            The internal and persisted RoutePlan authority is typed. Public
            event.publish, dashboard, and operator delivery readback projections
            expose persisted typed delivery identity as delivery_id,
            subscriber_type, and subscriber_id. They remain non-authoritative
            readback surfaces and must not re-plan subscribers, fabricate rows,
            or expose delivery_target_route unless a separately gated public
            schema change promotes route-target identity. Dashboard event-list
            subscriber selectors consume the same typed subscriber_id +
            subscriber_type delivery identity as the canonical event.list owner.
          split_owner: '#1345 owns the public/operator readback projection for delivery_id, subscriber_type, and subscriber_id; route-target public exposure remains split.'
        split_children:
          runtime_model: '#1343 owns the canonical internal EventBus RoutePlan model.'
          publish_consumers: '#1344 owns Publish, PublishInMutation, deferred/outbox publish, and CheckPublishRecipientPlan consumption of one RoutePlan authority.'
          readback: '#1345 owns API/CLI/OpenRPC/readback consumption and any public subscriber_type exposure.'
          conformance: '#1346 owns the route-authority proof matrix.'
          execution_admission: '#1293 owns workflow-node execution admission against committed delivery authority.'
          wildcard_routes: '#1299 owns wildcard static-service route production.'
          runtime_callback_routes: '#1301 closed runtime callback flow_instance localization; authoritative semantics are defined in route_plan_authority.runtime_callback_context.'
  persistence_model:
    description: Agents do not have raw database access. The platform derives agent-facing persistence tools from the
      authoritative flow-owned entity contracts in entities.yaml, agents.yaml entity_writes declarations, and the shared
      type system. This ensures all data access is permissioned, auditable, and storage-backend agnostic.
    role_scoped_entity_tools:
      default_surface: 'For normal agents, the Path alpha entity-tool model is mandatory. If an actor resolves to a
        flow-owned entity contract, the platform generates role-scoped current-entity tools for that actor by default;
        no schema.yaml opt-in flag is required or honored as a compatibility boundary.'
      no_contract_surface: Normal agents that do not resolve to a flow-owned entity contract receive no entity tools.
      current_entity_binding: 'Generated role-scoped entity tools operate on the current entity resolved from the triggering
        event/session context. Agent-supplied entity_id, entity_type, or flow_instance arguments are not accepted.'
      turn_eligibility: 'A generated current-entity tool is provider-visible and callable for a concrete turn only when
        the turn current entity resolves to the same flow-owned entity contract as the actor. If the current entity is absent,
        root/run-owned, missing, or belongs to another flow/entity contract, generated current-entity read/save/update tools
        MUST be removed from provider-visible catalogs and marked not callable for that turn. Executor validation remains
        fail-closed defense-in-depth.'
      startup_validation_surface: 'Runtime startup validation distinguishes actor-static generated schema inventory from
        concrete turn-eligible MCP tools/list. Actor-static inventory may prove generated read/save/update schemas exist for
        an actor, but a no-current startup MCP tools/list probe MUST be compared against the concrete startup turn context
        and MUST NOT require generated current-entity tools to appear without a valid current entity.'
      generated_reads:
        read_entity: 'read_{entity_type}() returns the complete current entity envelope and fields for the actor''s flow-owned
          entity contract.'
        read_field: 'read_{entity_type}_{field}() returns the complete typed value of one declared field.'
        non_lossy_invariant: 'Generated typed reads return the complete typed value or fail closed with an explicit typed-read
          error. They MUST NOT silently return preview, truncated, omitted, or follow-up-file placeholder shapes as the value.'
      generated_writes:
        save_field: 'save_{entity_type}_{field}({value}) writes exactly one top-level declared field authorized by agents.yaml
          entity_writes.<entity_type>.save or entity_writes.<flow_id>.<entity_type>.save.'
        update_path: 'update_{entity_type}_{field}_{subpath}({value}) updates one generated top-level subpath for a writable
          named-object field. The value schema is the exact declared subpath type. Runtime lowering consumes the same
          declared dotted replacement owner as save_entity_field.'
        materialized_field_exclusion: 'Fields declaring materialize_from, and every nested subpath below them, MUST NOT
          appear in generated write tools or writable-path summaries. They are runtime-owned projection fields.'
        create_rule: 'create authorization in entity_writes is author evidence for prompt/boot coverage. Path alpha does not
          expose a generic agent-facing create_entity replacement for current-entity tools.'
      generated_schema_closure: 'Generated entity-tool input and output schemas are closed recursively: additionalProperties
        is false for object schemas, required fields are explicit, and enum values come from the shared type system. Provider-visible
        schemas, runtime validation, and bootverify schema-closure checks must agree. Provider schema enforcement is a first
        validation layer when honored; runtime validation remains mandatory defense-in-depth.'
      legacy_surface_retirement: 'For normal agents, the legacy universal entity surface is removed from the
        provider-visible/callable agent surface, not merely denied after selection. Retired names are create_entity,
        get_entity, get_subject_status, query_entities, search_entities, query_metrics, and save_entity_field. allowed_tools,
        runtime-wide fallback, MCP tools/list, provider summaries, and executor authorization MUST NOT reintroduce these
        names for ordinary agents.'
      compatibility_boundary: 'Retained legacy platform entity handlers are trusted runtime-internal compatibility only.
        A normal agent MUST NOT regain them by setting agent-authored type/role/config fields; they are not a valid normal-agent
        provider-visible or callable surface.'
    schema_source: entities.yaml + types.yaml
  required_agents:
    description: 'schema.yaml required_agents is optional. When omitted, the flow''s effective required-agent facts are
      inferred from same-scope agents.yaml map keys plus each agent''s subscriptions and emit_events. When present,
      including an explicit empty list, required_agents is an explicit interface/implementation boundary and no inference
      from agents.yaml is performed for that scope.'
    fulfillment_rule: 'The agent YAML map key must match the role field in required_agents. This is the canonical identity:
      if an explicit schema boundary says role: classifier-agent, agents.yaml must have a top-level key classifier-agent.
      No separate fulfills: field. Inferred facts use the agents.yaml map key as the role and MUST NOT fall back to
      agent-authored role or id fields.'
    note_on_empty: 'required_agents entries with empty subscriptions and emits are valid. They declare that the flow needs
      this agent role to exist, even if the agent only uses the universal communication/mailbox tools (agent_message,
      mailbox_send). Common for managerial roles that coordinate via messages rather than event subscriptions. An explicit
      required_agents: [] declares an explicit no-role boundary and MUST NOT infer agents from agents.yaml.'
    generated_view: The generated/expanded authoring view MUST expose each effective required-agent fact and whether it
      was explicitly authored or inferred from same-scope agents.yaml. It MUST also expose explicit empty boundaries.
  hello_world_example:
    description: Minimal flow that processes one event and advances state.
    package_yaml: 'name: hello

      version: 1.0.0

      platform_version: ">=0.7.0 <0.8.0"

      flows: []'
    schema_yaml: "initial_state: waiting\nterminal_states: [done]\nstates: [waiting, done]\npins:\n  inputs:\n    events:\
      \ [hello.requested]\n  outputs:\n    events: [hello.completed]"
    nodes_yaml: "hello-node:\n  event_handlers:\n    hello.requested:\n      advances_to: done\n      emit:\n        event: hello.completed\n\
      \        fields:\n          result: payload.message"
    events_yaml: "hello.requested:\n  message: text\nhello.completed:\n  result: text"
    agents_yaml: '{}'
  produces_derivation: >-
    The produces field on system nodes is OPTIONAL. If omitted, the platform derives the effective production surface from
    every supported declarative emit site at boot: handler top-level emit, rule-local emit, rules emit template specialization
    effective emits, selected on_complete emit, accumulate.on_timeout emit, and fan_out emit. Runtime routing, producer authority,
    and transition checks consume this effective production surface, not raw authored produces. If present, produces is an
    explicit authored assertion surface: the verifier checks it matches actual emits, including an explicit empty list, with
    a PRODUCES-DRIFT warning. Authors should omit produces and let the platform derive it.
  underscore_prefix_convention:
    description: Fields starting with _ in contract YAML files.
    semantic_fields:
      _source: 'Retired legacy migration input for event swarm.source. Contracts MUST fail closed instead of accepting this as event metadata.'
      _consumer: 'Retired legacy migration input for event swarm.consumer. Contracts MUST fail closed instead of accepting this as event metadata.'
      _status: 'Retired legacy migration input for event swarm.status. Contracts MUST fail closed instead of accepting this as event metadata.'
      _producer: 'Retired legacy migration input for event swarm.producer. Contracts MUST fail closed instead of accepting this as event metadata.'
    documentation_fields: Any other _-prefixed field (_note, _routing_note, _internal_events_note, etc.) is a human comment.
      The platform ignores them. The verifier ignores them. They are not part of the contract.
rule:
  statement: |
    Entity contracts are the authoritative source of truth for what
    persists in entity_state. Entity type names are flow-scoped: each
    entity type is declared in exactly one owner flow's entities.yaml,
    and the owner flow is determined by the file location under
    contracts/flows/<flow>/entities.yaml. Different flows may reuse the
    same short local name; the fully-qualified form is
    <flow>.<entity_name>.

    A shared type system declared in types.yaml is used by entity
    contracts, event payloads, and policy. Scalars, enums, named types,
    and lists are the complete Wave 1 structural vocabulary. jsonb and
    inline object hand-waves are retired from the author-facing contract
    surface.
  consequences:
    flow_scoped_entity_types: |
      Entity type names are flow-scoped, not bundle-global. Cross-flow
      references use the fully-qualified form; inside the owner flow the
      short form is sufficient.
    declared_is_authority: |
      Writers and readers conform to the declared contract. Writer drift,
      reader drift, and dead contract fields are verification failures.
    bidirectional_verification: |
      Verification must check both sides of declared structure: every
      platform-visible writer must target declared contract fields, and every
      platform-visible reader must resolve through declared contract fields.
      Writer-only or reader-only proof is incomplete.
    universal_presence: |
      Every declared entity field is always readable with a type-valid
      value. Explicit `initial:` or the type default provides the value
      when no writer has populated the field yet.
    required_by_default_uniform_with_events: |
      Declared entity fields and event payload fields are required and
      type-checked by default unless an explicit supported contract form
      states otherwise. Readers and writers must not infer optionality from
      sparse runtime rows, absent historical writes, or prompt prose.
    lifecycle_vs_field_presence: |
      The state machine is the authority for entity lifecycle. It is not
      the authority for field-level "was this written yet" semantics;
      companion fields are the explicit answer when that distinction
      matters.
type_system:
  description: |
    Shared Wave 1 type declarations used by entities, event payloads,
    and policy. Bundle-wide reusable types live in contracts/types.yaml.
    Flow-local reusable types live in contracts/flows/<flow>/types.yaml.
  vocabulary:
    built_in_scalars:
    - text
    - integer
    - numeric
    - boolean
    - timestamp
    - uuid
    named_types: Composite types with declared inner fields.
    enums: Closed named sets of values.
    lists: Ordered collections of a declared element type.
  schema_refinements:
    description: |
      Declared event payload fields, named-type fields, and entity fields
      may carry only the closed schema-refinement vocabulary listed here.
      These refinements extend the shared type/schema owner; they are not a
      handler-level validation row, not a rule artifact grammar, not CEL, and
      not a generic JSON Schema drawer. Unsupported refinement keys and
      malformed refinement declarations are contract-load failures.
    vocabulary:
      required_presence: |
        Declared event payload fields and entity fields remain required by
        default unless another explicit supported contract form states
        otherwise. Presence is enforced by the existing event/entity schema
        owners.
      pattern: |
        `pattern: <regular expression>` is allowed only on text/string-like
        fields. The pattern must compile during contract loading.
      length: |
        `length: {min, max}` is allowed only on text/string-like fields and
        list fields. Text length is character length; list length is item
        count. At least one bound is required; bounds must be non-negative and
        `min <= max` when both are present.
      enum: |
        Enums remain closed named sets in the shared type system. Field-local
        enum dialects are not introduced by this slice.
      range: |
        `range: {min, max}` is allowed only on integer/numeric fields. At
        least one bound is required and `min <= max` when both are present.
      equal_to: |
        `equal_to: <sibling_field>` declares pure same-object field equality.
        The target must be a declared sibling field with the same resolved
        type. Non-equality predicates, provenance checks, external file
        checks, rule IDs, and failure routing are not schema refinements.
    runtime_consumption: |
      Event payload validators, entity materialization/write normalization,
      and generated entity/tool schemas that derive from the shared
      type/schema owner MUST consume the same refinement model. A consumer may
      omit a refinement only when it is a different semantic concept or an
      explicitly tracked surviving follow-up.
    validation_row_boundary: |
      Machine-evaluated validation rows are governed by
      policy_validation_contracts. They consume the stable-ID criteria artifact
      family with a machine evaluator, bind computed.validation.* results only,
      and leave branch routing to policy-sheet selection rows.
  field_forms:
    terse: 'field_name: TypeName'
    verbose: |
      field_name:
        type: TypeName
        initial: <value>          # entities only
        immutable: true           # entities only
        description: Human-readable annotation
        pattern: ^[0-9a-f]{40}$
        length:
          min: 40
          max: 40
        range:
          min: 0
          max: 100
        equal_to: sibling_field
        citation:                 # event payload fields only
          criteria: feasibility_exclusions
          allowed_classes: [hard, soft]
        _unused_reason: Reason    # entities only; verify suppression for E1
        _unused_reader_reason: Reason # entities only; reader lint suppression for external/operator readout
  restrictions:
    retired:
    - jsonb as an author-declared contract type
    - Inline type: object without declared inner shape
    - Optional<T> in Wave 1
    - inheritance / extends clauses
    - recursive types in Wave 1
    allowed_composition: |
      Reuse is compositional only: types reference other named types via
      declared fields. There is no inheritance hierarchy.
  entity_envelope:
    description: |
      Every entity has a platform-owned envelope parallel to the event
      envelope. Envelope fields are implicit and are not author-declared
      in entities.yaml.
    fields:
      id: uuid
      current_state: text (or null for stateless flows)
      revision: integer
      created_at: timestamp
      updated_at: timestamp
      flow_instance: text
  defaults:
    description: |
      Entity field defaults materialize when no explicit `initial:` is
      declared and no writer has set the field.
    values:
      text: '""'
      integer: '0'
      numeric: '0'
      boolean: 'false'
      list: '[]'
      named_type: empty instance with each field at its own default
      enum: first declared value unless initial overrides it
      timestamp: 'null'
      uuid: 'null'
entity_contracts:
  description: |
    Entity contracts are declared in entities.yaml owned by a single
    flow. Ownership is implicit from file location. Bundle-root
    contracts/entities.yaml remains a rare bundle-scope exception.
  ownership: |
    Exactly one flow owns each entity type. Only the owner flow edits
    the contract and creates instances of that type.
  grammar:
    form: |
      <entity_type>:
        _description: Human-readable description
        <field_name>: <type>
        <field_name>:
          type: <type>
          initial: <value>
          immutable: <bool>
          indexed: <bool>
          description: <text>
          pattern: <regular expression>
          length:
            min: <non-negative integer>
            max: <non-negative integer>
          range:
            min: <number>
            max: <number>
          equal_to: <sibling_field>
          materialize_from: <node_id>.<accumulator_name>
          project:
            <target_item_field>: source.<source_item_field>
            <target_policy_field>: policy.<policy_path>
            <target_literal_field>: <literal>
          _unused_reason: <reason>
          _unused_reader_reason: <reason>
    notes:
    - Entity-level metadata is underscore-prefixed.
    - State does not live in entity contracts.
    - Envelope names are reserved and must not be author-declared.
    - '`materialize_from` is valid only for a list of a declared named type.'
    - '`materialize_from` and `_unused_reason` are mutually exclusive.'
    - '`_unused_reader_reason` documents that a field is intentionally read only outside platform-visible internal handlers.
      It suppresses only the informational `entity_reader_coverage` slice; it does not count as writer coverage, authorize
      runtime/API reads, or change persistence semantics.'
    - '`indexed: true` declares a top-level entity field as addressable descriptor/index evidence for supported runtime receiver selection.
      It does not make the field route topology authority, dynamically index arbitrary payload fields, or authorize
      undeclared or nested business-field routing.'
    - 'A `materialize_from` field is runtime-owned and not agent-writable.'
  routing_indexes:
    status: merge_bearing_runtime_behavior
    implementation_slice: '#1479'
    rule: |
      A top-level receiver entity field with `indexed: true` may be used as descriptor
      evidence for a composition-routing addressed input target such as
      `entity.vertical_id`. The receiver input pin and parent connect entry
      still own the route topology. The indexed entity field only authorizes
      runtime descriptor/index materialization to answer which active receiver
      instance has the declared top-level field value. Nested entity paths such
      as `entity.profile.vertical_id` are unsupported in the #1479 slice because
      runtime descriptor evidence is emitted only for top-level scalar entity
      fields. Missing, unindexed, undeclared, nested, ambiguous, unsupported, or
      wrong-scope targets fail closed and produce no executable routes.
  accumulator_entity_projection:
    description: |
      `materialize_from` declares a downstream typed entity-field copy of a
      same-flow node accumulator. The accumulator remains canonical for
      receipt acceptance, deduplication, completion, and computation. The
      entity field is a persisted visibility/audit projection written by the
      runtime on successful accumulator completion.
    source_reference: |
      The value has shape `<node_id>.<accumulator_name>`. The referenced node
      must belong to the same flow as the declaring entity. The referenced
      handler accumulator must be declared with `accumulate.into:
      <accumulator_name>`.
    target_type: |
      The target field must be `list<NamedType>` or `[NamedType]`. The source
      accumulator state_schema field named by `accumulate.into` must also be a
      named-type list. `jsonb`, `[text]`, and untyped structural targets are
      invalid for projection.
    project: |
      If source and target item named types are identical, `project` is
      forbidden and identity projection is used. If they differ, `project` is
      required and must name every field of the target item type. Project
      expressions support exactly `source.*`, `policy.*`, and literal YAML
      scalar/sequence/mapping values. `source.*` references resolve only
      against declared fields of the source item type. Runtime accumulator
      metadata (`event_id`, `event_type`, `source`, `received_at`) and
      event-payload extras outside the source named type are not addressable
      through `source.*`. `policy.*` references resolve against the declaring
      flow's resolved policy document and must be declared; unknown policy
      paths are hard invalidity. Literal values are copied as authored and
      validated through the target entity field's named-type normalizer at
      runtime. Bindings to `entity.*`, `payload.*`, `event.*`, `fan_out.*`, or
      `accumulated.*` are unsupported in `project`.
    writer_ownership: |
      `materialize_from` is the sole runtime writer for the field after
      create-time `initial:` materialization. Other authored writes
      (`data_accumulation`, compute/filter/reduce/count/group_by store_as,
      query store_as, clear, or agent entity_writes/save tools) are hard
      invalidity.
    runtime_binding_identity: |
      Runtime projection binding uses the same node event identity semantics as
      handler dispatch. A flow-local authored handler key and the
      namespace-qualified runtime event that dispatched that handler are the
      same projection source when the node event resolver canonicalizes them to
      the same event identity.
    e1_coverage: |
      `materialize_from` counts as entity writer coverage for E1. It replaces
      `_unused_reason`; the two may not coexist.
  one_entity_type_per_flow: |
    For normal flow-instance-centered authoring (stateful schemas with no
    static/template mode), a stateful normal flow declares exactly one entity
    type in its flow-owned entities.yaml. That single entity type is the
    flow's primary entity; there is no normal-flow primary/secondary split and
    no schema.yaml `entity: <Type>` selector. Bundle-root entity declarations,
    when present, use the same single-entity/no-schema-selector resolver so
    root read/tool surfaces cannot silently disappear behind a local
    interpretation. A missing normal child-flow entity type, multiple root or
    flow entity types, or a schema-level entity selector is fail-closed.
    Static package/service flows and template instance-key behavior remain
    separate explicit classifications; they are not silent fallback semantics
    for normal flows. Static multi-entity ownership is retired rather than a
    future escape hatch. The old Wave 1 rule is preserved as a product decision
    for normal flow authoring, not as a temporary limitation.
  state_machine_link:
    description: |
      State is flow-scoped and declared in schema.yaml. The entity
      envelope field exposed to expressions as _entity.current_state is populated from that flow
      state machine. Authors do not declare a state field or state model
      inside entities.yaml.
event_payload_migration:
  description: |
    Event payload contracts use the same type system and the same flat
    declaration style as entity contracts. Event-level metadata is
    underscore-prefixed; all other keys are payload fields.
  rules:
    flat_form: |
      Event schemas are declared directly under the event name. Nested
      `payload:` blocks are retired.
    envelope_payload_split: |
      Envelope fields are platform-managed and accessed through event.*.
      Author-declared payload fields are accessed through payload.*.
    strict_payload_completeness: |
      Event payloads are producer-complete only. Every declared payload
      field must be populated by the emitting surface's canonical explicit
      emit.fields. `emit.from` lowering may fill required declared fields before
      completeness checks, but it is not runtime passthrough. No payload
      defaults, no implicit passthrough, no undeclared extras.
    retired:
    - nested payload wrappers
    - jsonb payload fields
    - inline type: object without declared shape
    - author-declared envelope fields
criteria_contracts:
  status: merge_bearing_runtime_behavior
  implementation_slice: '#1717'
  description: |
    Flow-local agent-judged criteria are stable-ID rule sets declared as a
    typed `criteria:` section inside the owning flow's `policy.yaml`. Criteria
    are contract artifacts, not prompt prose, generic policy scalar values,
    flow `data/` files, or `read_flow_data` conventions.
  policy_section:
    location: flow policy.yaml only
    field: criteria
    owner: flow-owned PolicyDocument.Criteria
    shape: |
      criteria:
        <set_name>:
          classes:
            <class_name>:
              disposition: <event_name-or-none>
          rules:
            - id: <stable-never-reused-id>
              class: <declared-class>
              text: <human-readable rule>
              params:
                <name>: <typed-scalar-or-policy-scalar-ref>
    rules:
    - '`criteria:` is a closed typed policy section. It is decoded separately from generic `PolicyDocument.Values` and MUST
      NOT appear as `policy.criteria`, a prompt variable, or arbitrary policy object data.'
    - Criteria sets are flow-local in this slice. Root/project policy criteria, project-shared packs, team packs, and
      marketplace distribution are not implemented.
    - Rule IDs are stable and never reused within a set. Historical events cite the bundle/contract version active when
      emitted; this slice does not add a separate criteria-versioning subsystem.
    - Each set MUST declare at least one class, every class MUST have a disposition, every rule MUST have id/class/text,
      every rule class MUST be declared, and duplicate rule IDs fail static validation.
    - Parameters are inert typed scalar literals or references to sibling scalar policy values using `policy.<key>`.
      Criteria parameters are not CEL, predicates, machine-evaluated checks, or a general expression language.
  agent_references:
    field: criteria
    location: flow-scoped agents.yaml entries
    syntax: 'criteria: [feasibility_exclusions]'
    rules:
    - Agent criteria refs are short set names resolved against the agent's owning flow policy.criteria section. Dotted paths,
      path separators, duplicates, empty refs, and unresolved refs fail static validation.
    - Root/project-scoped agents cannot declare criteria in this slice.
  delivery:
    generated_context: |
      Agents that declare criteria receive a deterministic generated "Contract Criteria" prompt/context section rendered from
      the resolved contract. The generated section is the only PR1 delivery path and is tested as stable so later prompt-frame
      generation (#1718) can absorb it without changing behavior.
    forbidden_bypasses:
    - generic policy prompt variables
    - '`policy.criteria` expression reads'
    - flow `data/` files
    - '`read_flow_data`'
    - prompt-local hardcoded criteria IDs as authority
    fail_closed: Runtime inability to deliver an otherwise valid referenced set fails closed before agent judgment proceeds.
  event_citations:
    field_metadata: |
      Event payload fields may declare citation metadata:

      cites:
        type: text       # or [text] / list<text>
        citation:
          criteria: feasibility_exclusions
          allowed_classes: [hard]
    type_rule: Citation fields must be text/string or list-of-text/list-of-string.
    compatibility_rule: |
      PR1 uses explicit `allowed_classes` on each citation field. The end-state may derive allowed classes from the
      class-to-disposition mapping, but until that is promoted, missing `allowed_classes` is invalid.
    emit_boundary: |
      Generated emit tools validate criteria citations after ordinary payload schema validation and before publish. Unknown IDs,
      agent-undeclared criteria sets, unresolved sets, wrong citation value shape, and class-incompatible IDs fail in-turn with
      a non-retryable typed corrective runtime error (`criteria_citation_validation_failed`) and publish zero events.
    multi_citation: Both single `text` citation fields and list citation fields are supported in this slice.
  static_verification:
    checks:
    - typed policy criteria shape
    - flow-local placement
    - unique stable IDs within a set
    - class declaration and disposition completeness
    - inert parameter scalar/ref validation
    - agent criteria references
    - event citation field type and allowed class metadata
    - emitted-event citation fields consumed only by agents that declare the referenced criteria set
  split_boundaries:
  - '#1714 machine-evaluated validation rows consume this stable-ID rule grammar as a sibling policy section with a different
    evaluator.'
  - '#1718 prompt-frame generation may absorb the deterministic criteria section later; #1717 does not ship the full frame
    generator.'
  - Structured predicates, criteria packs, team packs, CLI/editor UX, and criteria evaluation harnesses are separate gates.
policy_validation_contracts:
  status: merge_bearing_runtime_behavior
  implementation_slice: '#1714'
  description: |
    Flow-local machine-evaluated validation sets are stable-ID rule sets
    declared as a typed `validation:` section inside the owning flow's
    `policy.yaml`. They share the criteria artifact family but use the
    platform machine evaluator, not agent judgment. Validation rows bind
    turn-scoped computed facts only; they do not route, emit, advance state,
    persist data, call tools, read files, run CEL, or execute code.
  policy_section:
    location: flow policy.yaml only
    field: validation
    owner: flow-owned PolicyDocument.Validation
    shape: |
      validation:
        <set_name>:
          classes:
            <class_name>:
              disposition: <event_name-or-none>
          inputs:
            <input_name>: <scalar_type>
          rules:
            - id: <stable-never-reused-id>
              class: <declared-class>
              text: <human-readable rule>
              pin_candidate: true|false
              check:
                equal:
                  left: input.<input_name>
                  right: input.<input_name>
    rules:
    - '`validation:` is a closed typed policy section. It is decoded separately from generic `PolicyDocument.Values` and
      MUST NOT appear as `policy.validation`, a prompt variable, or arbitrary policy object data.'
    - Validation sets are flow-local in this slice. Root/project policy validation, shared validation packs, team packs,
      marketplace distribution, file-backed rule sets, and external data reads are not implemented.
    - Rule IDs are stable and never reused within a set. Every set MUST declare at least one class, at least one typed input,
      and at least one rule.
    - Every class MUST declare a disposition. Dispositions are consistency metadata for downstream selection-row routing;
      validation rows themselves do not emit or route.
    - 'Every rule MUST declare id/class/text, every rule class MUST be declared, every rule MUST explicitly declare
      `pin_candidate: true|false`, and duplicate rule IDs fail static validation.'
    - Rule parameters, when present, follow `criteria_contracts` inert scalar/ref rules. They are not expressions and are
      not consumed by the Slice B equal-only evaluator.
  evaluator:
    supported_checks:
    - equal
    equal_semantics: |
      Slice B supports only exact typed equality between declared `input.*` names. Both sides must reference declared inputs
      with compatible scalar types. Regex, length/range, non_empty, CEL, arithmetic, schema-shape validation, code, tools,
      I/O, and WASM are outside this slice.
    inputs: |
      Validation rule sets are root-agnostic. Handler rows map execution context roots into the declared input signature.
      Runtime missing inputs, unmapped inputs, unknown sets, or ill-typed inputs are deterministic no-retry failures.
    result_shape: |
      Runtime evaluation produces `{valid: bool, violations: [{id, class, content_ref}]}`. A failed equality check appends
      one violation citing the stable rule ID, class, and violating input references.
  policy_sheet_validate_rows:
    field: validate
    location: handler.rules value row
    shape: |
      rules:
        - id: validate_manifest
          validate:
            set: deploy_manifest
            input:
              source_ref: payload.source_ref
              manifest_source_ref: payload.file_manifest.source_ref
            into: computed.validation.deploy_manifest
        - id: invalid_manifest
          when: computed.validation.deploy_manifest.valid == false
          emit: deploy.manifest_invalid
    lowering: |
      `validate:` rows lower to the compute-owned internal validate operation. They run in the value/compute phase before
      selection rows and bind only `computed.validation.*`. Public `compute.operation: validate` is forbidden.
    input_roots: '`validate.input` values must be simple explicit paths rooted in payload, entity, event, or computed.'
    target_namespace: '`validate.into` MUST be a simple explicit `computed.validation.*` path. Entity persistence and generic
      computed target names are forbidden for validation results.'
    routing: |
      Branch routing remains owned by #1713 selection rows. A selection row that consumes an invalid validation result must
      emit an event declared by the validation set's class dispositions. The validation row never emits, advances state,
      executes action/activity, fans out, writes data_accumulation, or persists entity state.
    dead_binding: '`validate.into` bindings must be consumed by a supported downstream condition, emit field, activity input,
      fan_out, or expression in the same handler; unconsumed bindings fail boot verification.'
  static_verification:
    checks:
    - typed policy.validation shape and flow-local placement
    - class declaration and disposition completeness
    - typed input declaration and rule input compatibility
    - explicit pin_candidate on every rule
    - equal-only check shape over declared input.* references
    - validate row set resolution and exact input mapping coverage
    - validate row lowering to compute-owned internal operation
    - computed.validation.* target namespace
    - dead validation-result binding detection
    - invalid-result routing consistency with declared dispositions
  split_boundaries:
  - Schema refinements own pattern, length, range, presence, enum, and same-object equal_to checks.
  - 'Receiver input pins and static interface negotiation may later absorb `pin_candidate: true` rules; this slice records the
    marker but does not promote pin declarations.'
  - Non-equality predicates, richer expression/derive rows, criteria packs, prompt-frame validation, compute/WASM validation,
    and file-backed validation sets are separate gates.
compute_module_contracts:
  status: merge_bearing_runtime_behavior
  implementation_slice: '#1669 + #1670 Slice B'
  description: |
    Flow-local `modules:` declarations inside policy.yaml define deterministic
    compute modules. Policy-sheet `compute_module` value rows instantiate those
    declarations, map explicit handler context inputs into the module, and bind
    the validated JSON object result under computed.*. Supported kinds are
    precompiled zero-import Wasm modules and embedded CPython-WASI Python source
    modules. This is the supported surface for pure algorithmic deterministic
    work that cannot be represented by lookup, validation, selection, or simple
    arithmetic/derive rows.
  policy_section:
    location: flow policy.yaml only
    field: modules
    owner: flow-owned PolicyDocument.Modules
    shape: |
      modules:
        <module_id>:
          kind: wasm              # optional default for existing declarations
          path: modules/<name>.wasm
          abi: core-json-v1
          entry: compute
          digest: sha256:<64 lowercase hex>
          source_path: optional/source/path
          source_hash: optional-source-hash
          input_schema:
            type: object
            properties: {...}
          output_schema:
            type: object
            properties: {...}
          limits:
            gas: <positive integer>
            memory_pages: <positive integer>
            output_bytes: <positive integer>
      modules:
        <module_id>:
          kind: python
          path: modules/<name>.py
          abi: python-json-v1
          entry: handle
          digest: sha256:<64 lowercase hex> # source bytes
          input_schema:
            type: object
            properties: {...}
          output_schema:
            type: object
            properties: {...}
          limits:
            gas: <positive integer>         # Python-specific fuel profile
            memory_pages: <positive integer>
            output_bytes: <positive integer>
    rules:
    - '`modules:` is a closed typed policy section. It is decoded separately from generic PolicyDocument.Values and MUST NOT
      appear as a generic policy expression object or prompt variable.'
    - Module declarations are flow-local in this slice. Root/project modules, shared module packs, source compilation,
      public build tooling, artifact repositories, and remote module loading are separate gates.
    - Module IDs are short stable identifiers. A row references a module by short ID, not by filesystem path.
    - Module bytes MUST live inside the owning contracts root and MUST be regular files. Ambient filesystem lookup,
      symlinks, out-of-tree paths, network fetches, and runtime-generated module bytes fail closed.
    - >
      The declared digest MUST be `sha256:<64 lowercase hex>` and MUST match the bundle-pinned module bytes before
      execution. For `kind: wasm`, the bytes are the `.wasm` module. For `kind: python`, the bytes are the Python source.
    - >
      `kind` defaults to `wasm` only for existing declarations that omit it. Unknown kinds fail closed. Compatibility
      fallback beyond that default is forbidden.
    - >
      Optional `source_path`/`source_hash` provenance is valid for Wasm only in this slice. Python source authority is
      `path` plus `digest`; separate source_path/source_hash would create a second source owner and fails closed.
  abi:
    wasm:
      name: core-json-v1
      entrypoint: '`entry` MUST be `compute`.'
      exports:
      - '`memory` linear memory export'
      - '`alloc(i32) -> i32` allocator used by the host to copy canonical JSON input bytes into guest memory'
      - '`compute(i32, i32) -> i64` entrypoint receiving input pointer/length and returning output pointer/length packed in
        the high/low 32-bit halves'
      imports: |
        Author Wasm modules MUST declare zero imports. WASI, filesystem,
        network, clock, random, process, and other host capabilities are not
        available. Platform instrumentation used by a future build pipeline is
        not an author-declared host capability and is outside this slice.
    python:
      name: python-json-v1
      entrypoint: '`entry` MUST be `handle`.'
      callable: 'Author source MUST define `def handle(input): return {...}`.'
      transport: |
        The platform harness owns JSON input/output transport. Author code
        receives a Python dict and must return a JSON-object-compatible dict.
        Authors do not read stdin, write stdout, or manage generated bindings.
      embedded_artifact: |
        The interpreter artifact is CPython-WASI 3.13.14 built with WASI SDK 24,
        pinned as `brettcannon/cpython-wasi-build` v3.13.14
        `python-3.13.14-wasi_sdk-24.zip`, digest
        `sha256:a70a750951302744d84746340b4932b80dabad5b153cc3392bcae114b293c060`.
        No official python.org prebuilt WASI binary exists; this first slice
        records the artifact as an unofficial-but-canonical community/core-dev
        build. Self-building CPython-WASI from source in swarm release CI is a
        hardening follow-up, not a first-slice prerequisite.
      snapshot_boundary: |
        The shared bare-interpreter snapshot is a swarm release artifact, not a
        `swarm bundle build` output. Release CI may use Wizer/WASI SDK offline
        to produce an embedded initialized interpreter+harness Wasm artifact.
        User machines, `swarm bundle build`, `swarm test`, runtime execution,
        and `bundle register` MUST NOT require external Python, Wizer, WASI SDK,
        shell tools, package managers, or a local toolchain. Per-module snapshots
        remain blocked until a promoted in-process snapshot API or embedded
        Wizer path exists.
      sandbox: |
        v1 is stdlib pure-compute only. The load-bearing capability boundary is
        the platform-owned WASI/process configuration, not CPython source
        rewriting, AST lint, or builtins filtering. Source lint may reject direct
        unsupported imports and obvious denied names early for author feedback,
        but it is non-authoritative and non-security-bearing.

        Python modules run with a fixed runtime environment containing only
        `PYTHONHOME`, `PYTHONPATH`, `PYTHONHASHSEED`, and `PYTHONNOUSERSITE`;
        host/user environment variables MUST NOT be inherited. The only
        filesystem mount is the embedded CPython-WASI interpreter artifact,
        mounted read-only at `/` so the interpreter can import its standard
        library. Host, project, user, and working-directory filesystems are not
        mounted. Network, subprocess, threads, third-party packages, generated
        bindings, and ambient host capabilities are not supported.

        Author-reachable WASI clock, random, and timer/sleep imports MUST be
        deterministic in this slice. The host shadows `clock_time_get` with a
        zero clock, `random_get` with deterministic bytes, and `poll_oneoff`
        with a deterministic unsupported-capability result; real wall-clock
        values, host entropy, and host timer waits are not exposed even if
        author code recovers unrestricted CPython imports through reflection.
    deterministic_features: |
      Runtime configuration MUST disable nondeterministic or unapproved features
      including threads, SIMD, memory64, and multi-memory. Deterministic core
      features needed by the compiled fixture ABI may be enabled only when they
      do not introduce host capability or nondeterministic execution. PR1 enables
      bulk memory for the precompiled Rust core-module fixture; this remains a
      zero-import, deterministic Wasm execution feature rather than a host
      capability.
    memory_limits: |
      `limits.memory_pages` is a hard contract limit. A supported module's
      exported memory MUST declare a Wasm maximum, and that maximum MUST be less
      than or equal to `limits.memory_pages`; missing or larger maxima fail
      static validation before execution. Runtime MAY additionally apply an
      engine store/resource limiter when available, but the module-declared
      maximum and the runtime engine store/resource limiter are the PR1 grow-time
      ceilings.
    encoding: |
      Input and output are canonical JSON objects validated against the declared
      schemas. Float/numeric I/O schemas are forbidden in PR1; authors must use
      integer, boolean, text/string, arrays, and objects, or scaled decimals as
      integers. Output bytes are untrusted until decoded and validated on every
      invocation.
  policy_sheet_compute_module_rows:
    field: compute_module
    location: handler.rules value row
    shape: |
      rules:
        - id: render_file_bundle
          compute_module:
            module: structured_renderer
            input:
              component: payload.component
              owner: payload.owner
              files: payload.files
            into: computed.rendered_bundle
    lowering: |
      `compute_module:` rows lower to the compute-owned internal module
      execution operation. They run in the value/compute phase before selection
      rows and bind only computed.*. Public `compute.operation: compute_module`
      is forbidden; `compute_module` is not a standalone handler field and does
      not overload the existing compute primitive vocabulary.
    input_roots: '`compute_module.input` values must be simple explicit paths rooted in payload, entity, event, or computed.'
    target_namespace: '`compute_module.into` MUST be a simple explicit computed.* path. Entity persistence is forbidden for
      module outputs unless a separate declared data write explicitly persists the value under its own owner.'
    side_effects: |
      A module row cannot emit, advance state, execute action/activity, fan_out,
      data_accumulation, access files, perform I/O, or persist entity state.
    boundary: |
      Lookup-like finite tables, validation predicates, selection dispatch,
      simple arithmetic/expression derivation, durable external work, and
      orchestration remain owned by their respective row families or future
      gates. compute_module is for algorithmic work such as bounded iteration,
      aggregation, parsing, and deterministic structured rendering.
    dead_binding: '`compute_module.into` bindings must be consumed by a supported downstream condition, emit field, activity
      input, fan_out, or expression in the same handler; unconsumed bindings fail boot verification.'
  runtime_execution:
    owner: internal/runtime/computemodule and internal/runtime/pythonmodule adapters behind the compute runtime owner
    engine_boundary: |
      The Wasm engine is an implementation detail behind an internal adapter.
      The semantic owners are policy.modules, compute_module rows, the ABI
      contract, and bundle identity. Engine version is recorded in traces and
      replay evidence but does not define authoring semantics. PR1 may use a
      native/cgo engine only as an explicitly recorded implementation decision;
      the long-run single-binary and platform-owned gas schedule question remains
      owned by the parent/#1670 follow-up rather than authoring semantics.
    deterministic_failures: |
      Compile/ABI/import rejection, digest mismatch, trap/unreachable, gas/fuel
      exhaustion, memory limit, output-size limit, output bounds, and output
      schema violation are deterministic no-retry failures with typed
      diagnostics carrying module ID and row ID. Python direct-lint
      denied-capability failures and framed user-exception failures are the same
      deterministic no-retry class; the runtime boundary does not rely on that
      lint to deny host filesystem, inherited environment, clock, or entropy.
    trace_and_replay: |
      Runtime compute-module replay evidence is a typed
      `swarm.compute_module.replay.v1` envelope, not an engine-local helper.
      Each envelope records module ID, row ID, kind, ABI, entrypoint, declared
      digest, source hash when applicable, canonical input hash, outcome
      (`success` or `failure`), output hash for success, deterministic error
      code for failure, fuel/gas consumed, declared limits, engine version,
      architecture, and Python interpreter/interpreter-digest/harness/snapshot
      identity when kind is `python`.

      Input and output hashes MUST be computed over canonical JSON so map order
      or incidental serialization does not create false replay divergence.
      Diagnostic text is not semantic replay identity. For failed executions,
      the deterministic error code is the replay outcome.

      Supported replay re-executes module rows and compares envelopes in this
      order:
      1. Identity fields (module, row, kind, ABI, entry, digest, source hash,
         input hash, declared limits, and Python interpreter/harness/snapshot
         identity) must match. Mismatch is `identity_divergence`.
      2. Engine/architecture profile must match. Mismatch is
         `unsupported_profile`, not nondeterminism, because the replay ruler
         changed.
      3. Semantic outcome must match. Success compares output hash; failure
         compares deterministic error code. Mismatch is fatal
         `result_divergence`.
      4. Wasm replay compares fuel exactly under a matching profile. Mismatch
         is `resource_envelope_divergence`. Python fuel is retained as evidence
         but is not divergence-bearing in this slice because CPython-WASI
         startup under wasmtime fuel can vary across identical invocations by
         small implementation-accounting deltas; exact Python fuel divergence
         detection remains split until the release-time snapshot/gas envelope
         is stabilized.

      Replay mode is explicit: an empty expected trace set means zero module
      executions are expected, not normal non-replay execution. Runtime logs may
      carry persisted replay envelopes under action
      `compute_module_replay_evidence`; supported persisted replay loaders read
      those envelopes for the replayed execution identity, scoped at minimum by
      run id, source event id, and node id, and feed them into the same
      expected-trace execution path used by in-memory replay. Runtime logs and
      store rows are carriers only and do not become the semantic owner.
      Divergence diagnostics MUST be typed, include the finding kind and field,
      include module/row IDs and hashes only, and avoid raw input/output dumps.
      True result divergence is a fatal deterministic replay failure;
      identity/profile mismatch is fail-closed unsupported/incompatible replay.
  bundle_identity:
    rule: |
      Module bytes referenced by policy.modules are part of the bundle contract
      preimage and fingerprint. A bundle hash that omits module bytes is not a
      valid v1 identity for a bundle containing compute modules.
  static_verification:
    checks:
    - typed policy.modules shape and flow-local placement
    - module path containment, regular-file loading, kind-specific byte/source digest match
    - supported Wasm ABI exports and zero author imports
    - supported Python ABI, source syntax/callable validation, embedded runtime identity, direct denied-capability lint, and deterministic WASI boundary checks
    - deterministic capability/resource limits
    - object input/output schemas and PR1 float/numeric schema rejection
    - compute_module row module resolution and exact input mapping coverage
    - computed.* target namespace and cross-source binding uniqueness
    - dead module-output binding detection
    - bundle hash/fingerprint inclusion of module bytes
  split_boundaries:
  - '#1670 owns public build/source tooling and any instrumentation pipeline.'
  - Declarative lookup, validation, selection, and future derive rows remain preferred when they can express the work.
  - Durable activities, orchestration, timers, joins, loops, schedules, host imports, WASI capabilities beyond the fixed
    Python interpreter mount and deterministic clock/random/timer stubs, filesystem/network access beyond that read-only
    mount, shared module packs, source compilation, and file-backed module inputs are separate gates.
bundle_build_materialization:
  status: merge_bearing_build_surface
  implementation_slice: '#1670 Slice A + Slice B'
  command: swarm bundle build [--contracts <path>] [--output <path>] [--report json]
  description: |
    `swarm bundle build` is the public materialization owner for local
    contract bundles before explicit test/register/runtime consumption. It
    supports precompiled Wasm policy modules and embedded CPython-WASI Python
    source modules. The command loads and validates the selected contracts root,
    consumes canonical BundleHash identity, writes a materialized contracts
    directory, and emits a deterministic build report. It does not rewrite
    policy digests, register bundles, execute tests, or create interpreter
    snapshots.
  artifact_contract:
    directory: .swarm/build/<bundle-hash> by default, or <output>/<bundle-hash> when --output is provided
    contents:
    - resolved contract source files needed to reconstruct the selected bundle
    - referenced module bytes included in BundleHash identity
    - declared module source_path files when source_hash provenance is declared, as freshness proof inputs only
    - build-manifest.json as a proof artifact
    manifest:
      api_version: swarm.bundle.build.v1
      fields:
      - bundle_hash
      - platform_version
      - spec_version
      - modules[] with id, flow_id, kind, path, digest, source_path, source_hash, and Python runtime identity fields when applicable
      - inputs[] with canonical bundle labels, slash-relative paths, content policy, and size
      authority: |
        build-manifest.json is not a semantic owner, source of identity, or
        runtime authority. BundleHash, platform-spec.yaml, contract source,
        policy.modules, and compute_module rows remain authoritative.
  build_report:
    format: json when --report json is requested; human summary otherwise
    fields:
    - api_version
    - status
    - drift_status
    - bundle_hash
    - output_path
    - manifest_path
    - platform_version
    - spec_version
    - steps
    - modules
    - inputs
    rule: |
      Host facts such as output_path may appear in the report. Timestamps,
      absolute paths, temporary paths, and build-host facts MUST NOT enter the
      hashed contract content.
  build_steps:
    rule: |
      The implementation exposes an ordered build-step seam. The supported steps
      are Wasm policy.modules validation/materialization and Python policy
      module source/ABI/runtime-identity validation. Python interpreter snapshot
      production is not a bundle-build step; it is a release artifact. Archive
      packaging, watch mode, scaffolding, source compilation, and per-module
      snapshots are unregistered and unsupported until separately promoted.
  drift_validation:
    fail_closed_before_runtime:
    - missing contract inputs or module bytes
    - out-of-root paths and symlinks
    - module digest mismatch
    - stale source_hash when source_path/source_hash provenance is declared
    - invalid module ABI, schema, resource limits, or unsupported module shape
    - invalid Python source syntax, missing callable handle, unsupported Python capability, or embedded runtime identity drift
    - unsupported build-step requirements
    - bundle input, module byte, or source_path proof collisions with reserved generated artifact paths such as build-manifest.json, including ASCII case variants
    - output roots or target directories inside hashed recursive inputs such as prompts/ or flow data/
    - materialized directory hash mismatch
  reproducibility:
    rule: |
      Same inputs MUST produce the same bundle_hash and byte-identical hashed
      materialized content. Generated build manifests and reports are excluded
      from bundle identity unless a later spec section explicitly promotes them.
  consumer_boundaries:
  - swarm test --contracts remains an explicit contracts-root consumer and MUST NOT auto-build.
  - swarm bundle register --contracts remains a non-hashing upload packager and MUST NOT auto-build or silently become bundle build.
  - Archive/register transport, `--watch`, `bundle new`, CPython-WASI release-pipeline snapshot production, per-module
    snapshots, generated Python bindings, and source instrumentation are separate gates.
runtime_enforcement:
  description: |
    Wave 1 adds authoritative behavioral rules on top of the existing
    entity tool APIs. This section does not introduce a second tool
    family; it defines the contract semantics those tools must honor.
  create_entity:
    rule: |
      create_entity writes only fields declared in the inferred
      flow-owned entity contract. The caller does not supply
      `entity_id` or `entity_type`; the runtime derives the canonical
      receiving-flow primary identity from flow-instance/run context
      and infers the contract from flow context. Envelope field names
      are rejected as caller input. Missing declared fields receive
      explicit `initial:` or the type default.
  save_entity_field:
    rule: |
      save_entity_field targets only declared non-envelope top-level fields
      or declared dotted subpaths on the inferred entity contract. Dotted
      paths must resolve from a declared top-level field through declared
      named types; the operation is whole-value replacement at the resolved
      field path, not keyed or indexed contained-state mutation. Bracket,
      index, and dynamic path writes are rejected. Immutable fields reject
      post-create writes. Materialized/runtime-owned fields are rejected.
      Values must satisfy the resolved declared type.
  get_entity:
    rule: |
      get_entity returns the full entity object with every declared
      field present at a type-valid value plus the envelope fields.
      Declared fields are never omitted from the response.
  query_entities:
    rule: |
      query_entities validates filter paths against the inferred entity
      contract. Filter paths, metric selectors, and grouped/projected
      entity selectors are projection-specific row selectors: bare top-level
      row fields such as current_state remain valid on that tool surface, and
      declared field paths must resolve to declared scalar or enum leaves.
      `entity.*` is not accepted as a filter selector root on this projection
      surface. Composite whole-value comparison is not part of Wave 1.
    handler_expression_rule: |
      `query_entities(...).count` used inside handler boolean expressions
      (guards, rules/on_complete conditions, and accumulator completion
      expressions) resolves through the active handler workflow identity and
      current run context. Missing workflow/run context, unsupported scoped
      operands, or missing scoped operand values fail closed with a diagnostic.
      Static validation may accept syntactically valid scoped operands whose
      values are only available at runtime, but runtime evaluation must not
      reinterpret unresolved scoped operands as string literals.
  error_shape:
    invalid_field: cause=invalid_tool_input with nearest declared matches
    immutable_write: cause=invalid_tool_input for post-create immutable writes
    envelope_write: cause=invalid_tool_input for caller-supplied envelope fields
state_machine_authority:
  description: |
    The flow state machine declared in schema.yaml is the authority for
    entity lifecycle phase. For staged bundles, `stages:` is the canonical
    lifecycle node authoring owner and lowers to the existing state-machine
    kernel. State is flow-scoped, not per-entity-type, and Wave 1 assumes one
    entity type per flow.
  rules:
    state_field_is_implicit: |
      Authors do not declare a state_field anywhere. _entity.current_state is
      the platform entity metadata read for the current lifecycle state. Any
      state_field declaration is a contract error. A declared business field
      named current_state remains ordinary business data and is read as
      entity.current_state; it is not the lifecycle state carrier.
    stateless_flows: |
      Staged stateless flows declare stages: []. Legacy stateless flows may
      declare initial_state: null, states: [], and terminal_states: []. For
      them, _entity.current_state is null.
    stages_are_flat_and_flow_scoped: |
      Stage IDs are scoped to the flow that declares them. Nested/statechart
      hierarchy is not part of this slice. Flow composition owns hierarchy
      between parent and child flow instances.
    not_field_presence_authority: |
      The state machine answers lifecycle questions, not field-write
      status questions.
companion_field_pattern:
  description: |
    Wave 1 does not use Optional<T>. When a consumer must distinguish
    "unwritten" from "written with the type default value," the contract
    declares an explicit boolean companion field.
  example: |
    score: numeric
    has_scored:
      type: boolean
      initial: false
  guidance:
    use_when: |
      Use a companion boolean only when downstream behavior depends on
      distinguishing "not yet written" from a legitimate default value.
    do_not_use_when: |
      Do not add companion fields when the type default is already a
      semantically sufficient baseline or when the state machine already
      gates consumers naturally.
design_principles:
  description: Durable Wave 1 principles for future DSL work.
  declaration_is_authority_everything_else_is_secondary:
    principle: |
      Contracts are the single declaration surface for structural facts.
      Any other surface mentioning those facts must be derivation,
      assignment, authorization, or documentation — never a second
      hand-authored structural authority.
  contract_derived_summaries_are_canonical:
    principle: |
      Any summary shown to agents, prompts, or documentation that
      restates contract structure must be contract-derived, not
      hand-maintained.
  no_structural_primitive_elides_type_discipline:
    principle: |
      Any structural primitive must preserve named source types,
      explicit target mapping, explicit overrides, and hard-invalidity
      on unmapped or undeclared fields.
  contract_shaping_vs_ergonomics_classification:
    principle: |
      Contract-shaping changes alter what the platform can safely
      express and require architectural review. Ergonomics changes only
      reduce author typing for an already-safe expression and must not
      smuggle contract behavior changes.
handler_specification:
  description: Unified handler specification. Each handler field is documented once with its schema, purpose, execution position
    in the dependency graph, and dependencies.
  dependency_graph:
    description: Arrows mean "must complete before". Steps at the same level are independent — the implementer may execute
      them in any order.
    graph: "\nentity acquisition (optional — create_entity materializes the canonical receiving-flow primary entity; select_entity resolves exactly one target-flow-owned existing entity; select_or_create_entity resolves or creates one target-flow-owned entity by declared key)\n  └→ query (optional — pre-fetch cross-entity\
      \ data into handler context)\n       └→ clear_gates (optional — reset gates before guard)\n            └→ guard\n            └→ accumulate\n                 └→ filter (optional — prune accumulated\
      \ items)\n                      └→ reduce (optional — aggregate filtered items to single value)\n                  \
      \         └→ count (optional — count items)\n                                └→ compute\n                          \
      \           └→ emit-site selection (handler emit OR active emit set: selected rule emit/template then on_success.emit, selected on_complete/timeout emit, or fan_out emit)\n                    \
      \                      └→ advances_to ─┐\n                                             sets_gate ────┤ (independent\
      \ of each other)\n                                             data_accumulation ┘\n                         \
      \                         └→ projection (materialize_from, if accumulator projection eligible)\n                  \
      \                                └→ emit.fields\n                                                       └→ emit.event\n  \
      \                                                          └→ action OR activity intent\n                                            \
      \                     └→ clear (optional — reset accumulator/state buckets)\n    "
  atomicity:
    description: ALL side effects from one handler execution commit in a single database transaction. State advance, gate
      set, data write, and event persistence happen atomically. No external observer sees intermediate state.
    consequence: Since independent steps (advances_to, sets_gate, data_accumulation) commit together, their relative execution
      order is cosmetic. The database sees one atomic write. An implementer may write data before or after state advance —
      the result is identical.
    guards_see_pre_handler_state: Guards evaluate against entity state BEFORE any handler writes. data_accumulation from the
      current handler does NOT affect the current handler's guard. It affects the NEXT handler's guard (on the next event,
      after this transaction commits).
  on_complete_vs_rules:
    description: Mutually exclusive. A handler uses on_complete OR rules, never both.
    on_complete: Ordered list of {condition, advances_to, emit} — first match wins. Used after accumulation/computation.
      If handler-level on_complete and accumulate.on_complete are both declared, handler-level on_complete is evaluated first;
      when no handler-level branch matches, accumulate.on_complete is evaluated as the accumulator-completion branch surface.
    rules: Current concrete spelling of the ordered policy-sheet authoring construct for handler-phase selection. Existing
      condition rules and typed selection rows lower to the canonical selected-branch owner. Retired `handler.branch`
      syntax is unsupported and must fail closed instead of being interpreted, lowered, or preserved as compatibility syntax.
  short_circuits:
    guard_fail: If guard fails, handler stops. on_fail action executes (reject/kill/discard/escalate). No further steps.
    accumulate_incomplete: If accumulation is not yet complete, handler stops after recording the arrival. No further steps
      until completion condition met.
  handler_fields:
    description: Fields within an event_handler declaration. Executed per the dependency graph defined in handler_execution_order.
      All fields are optional — the engine skips absent fields.
    description_field:
      field: description
      type: string
      purpose: Human-readable description of what this handler does. Not executed.
    create_entity:
      field: create_entity
      type: boolean
      purpose: When true, the handler materializes the canonical receiving-flow primary entity before any other processing.
        All subsequent handler steps (guard, data_accumulation, advances_to, emit, etc.) operate on that canonical entity.
        The inbound event's entity_id is parent/source context only and is ignored for state ownership; the receiving-flow
        entity starts at the flow's initial_state with schema-declared initial values already materialized.
      default: false — handler operates on the inbound event's entity_id (inherit)
      when_to_use: When an event arriving from outside the flow represents a new entity entering this flow's lifecycle.
        Example — vertical.discovered arriving at scoring creates a new vertical entity for scoring. Without create_entity,
        all discovered verticals would share the scan entity from discovery.
      execution_position: First step in the dependency graph. Runs before query, guard, and all other steps. Establishes
        the entity context for the entire handler.
      entity_creation:
        entity_id: Canonical receiving-flow primary entity identity derived from flow-instance/run context, not caller payload identity
        initial_state: From the flow's schema.yaml initial_state
        flow_instance: Current flow instance path
        fields: Declared entity fields materialized at create_entity time. Explicit `initial:` values apply where declared;
          otherwise the type default is materialized so every declared field is readable immediately.
      interactions:
        with_accumulate: 'PROHIBITED. create_entity establishes the canonical receiving-flow lifecycle entity for this handler.
          Accumulate waits across multiple arrivals and must not be combined with same-handler lifecycle materialization.
          Boot error if both are declared on the same handler.'
        with_fan_out: 'ALLOWED. create_entity materializes ONE canonical entity, then fan_out emits multiple events all carrying
          that entity_id. Fan_out items share the canonical entity.'
        with_guard: 'ALLOWED. Guards evaluate against the materialized canonical entity state after schema initial values materialize.
          Guards may read any declared entity field directly. Declared fields are universally present with either their
          explicit initial or their type default.'
        with_on_complete: 'ALLOWED. on_complete conditions evaluate according to the handler dependency graph. They may rely on
          schema initial values and earlier step outputs, but not on same-handler top-level data_accumulation writes.'
        with_rules: 'ALLOWED. rule conditions evaluate according to the handler dependency graph. They may rely on schema initial
          values and earlier step outputs, but not on same-handler top-level data_accumulation writes.'
        with_advances_to: ALLOWED. Advances the new entity from initial_state to the target state.
      note_on_static_flows: 'Retired for authored stateful static/default-static multi-row ownership. A static input-pin
        handler MUST NOT use create_entity to materialize arbitrary receiving-flow rows over time. Authors must model the state
        as one primary entity with contained state, a mode: template flow instance, a mode: singleton coordinator, or a
        child flow. Historical rows are not silently rewritten by this retirement; actual persisted-row migration is
        separately gated.'
    select_entity:
      field: select_entity
      type: object
      purpose: Resolve exactly one existing entity owned by the receiving flow before any other handler processing. This is
        the service-owned acquisition primitive for stateful typed input-pin handlers where the incoming cross-flow request
        addresses an existing target-flow resource by declared business key, not by source-provided entity identity.
      default: absent — handler operates on the resolved inbound event entity context unless create_entity is declared
      when_to_use: When an event arriving from outside the flow represents a request against an already-existing service
        entity owned by the receiving flow. Example — OpCo emits a typed spend event with vertical_id, and Treasury selects
        its own budget entity whose vertical_id matches the payload. The source flow must not provide the target entity_id,
        entity_type, or flow_instance.
      schema:
        by: map of target entity field name to explicit payload reference. Each key MUST be a declared field on the receiving
          flow's entity contract. Each value MUST be a payload.* reference from the triggering event schema.
      execution_position: First step in the dependency graph. Runs before query, guard, accumulate, data_accumulation,
        advances_to, emit, and action. Establishes the entity context for the entire handler.
      entity_selection:
        ownership_scope: Only entities owned by the receiving flow are candidates. Source-flow entities, source event envelope
          identity, arbitrary parent/child path inference, and caller-provided target entity identity are not authoritative.
        matching: Every select_entity.by binding must match exactly one receiving-flow entity field value. Zero matches fail
          closed. More than one match fails closed. Missing payload refs fail closed.
        selected_context: The selected entity_id and flow_instance become the handler entity context for state, guard,
          data_accumulation, emit.fields, and state transition processing.
      pin_routing_interaction:
        receiver_context_order: 'For pin-routed events, handler entity context resolves in this order: event.target when set;
          otherwise select_entity late binding when declared; otherwise event.source.'
        canonical_uses: External webhook ingress, events declared with swarm.source beginning with external, and rare mixed-provenance
          event types where in-topology producers set event.target but external producers arrive without target.
        non_canonical_use: In-topology receivers for pin-declared events whose producers are also in the pin topology. Pin routing
          already supplies event.target; select_entity is a hard invalidity under the normal composition model and should
          be replaced with receiver instance.by plus parent connect routing.
        boot_verify: Redundant normal in-topology select_entity is a hard invalidity. Stateful static/default-static authored
          handlers using select_entity fail closed because static multi-row ownership is retired. Missing select_entity on
          external/no-target static handlers is not repaired by requiring the retired acquisition field; authors must use
          a supported template, singleton, contained-state, or child-flow model.
      restrictions:
        lifecycle_scope: Not valid for authored stateful static/default-static input-pin multi-row ownership. Stateless flows
          do not have stateful entity acquisition. Template flows acquire entities through create_flow_instance.
        with_create_entity: PROHIBITED. A handler must either materialize the canonical receiving-flow primary entity with
          create_entity or select an existing target-flow-owned entity with select_entity, never both.
        source_authority: PROHIBITED. select_entity keys must not target platform envelope/control fields such as entity_id,
          entity_type, flow_instance, current_state, workflow_name, or workflow_version. Payload refs must not be
          payload.entity_id, payload.entity_type, or payload.flow_instance. `_entity.*` and `event.*` refs are readable
          elsewhere only where explicitly supported; they are not selector source authority.
        compatibility: PROHIBITED. select_entity does not restore generic existing-entity cross-flow continuation and does
          not allow a source flow to directly name or mutate another flow's entity row.
      interactions:
        with_accumulate: ALLOWED. Accumulate operates on the selected target-flow-owned entity after acquisition.
        with_guard: ALLOWED. Guards evaluate against the selected entity state before same-handler writes.
        with_data_accumulation: ALLOWED. Writes are validated against the selected entity's receiving-flow contract and remain
          subject to same-flow ownership enforcement.
        with_advances_to: ALLOWED. State transitions advance only the selected receiving-flow entity.
        with_query: ALLOWED. Query runs after acquisition and cannot replace select_entity ownership checks.
    select_or_create_entity:
      field: select_or_create_entity
      type: object
      purpose: Resolve one existing entity owned by the receiving flow by declared business key, or deterministically mint
        that receiving-flow entity when no active match exists. This is the replay-safe service-owned acquisition primitive
        for typed input-pin handlers whose target service must own the entity identity.
      default: absent — handler operates on the resolved inbound event entity context unless create_entity or select_entity is declared
      when_to_use: When an event arriving from outside the flow represents a request against a receiving-flow service entity
        that may not exist yet, and the receiving service can define the entity by stable payload keys. Example — a spec-repo
        service receives a typed repo request keyed by source validation case and artifact type, then resolves or creates
        the service-owned repo entity. The source flow must not provide the target entity_id, entity_type, or flow_instance.
      schema:
        by: map of target entity field name to explicit payload reference. Each key MUST be a declared field on the receiving
          flow's entity contract. Each value MUST be a payload.* reference from the triggering event schema.
      execution_position: First step in the dependency graph. Runs before query, guard, accumulate, data_accumulation,
        advances_to, emit, and action. Establishes the entity context for the entire handler.
      entity_acquisition:
        ownership_scope: Only entities owned by the receiving flow are candidates. Source-flow entities, source event envelope
          identity, arbitrary parent/child path inference, caller-provided target entity identity, and product-authored UUID
          derivation are not authoritative.
        matching: Every select_or_create_entity.by binding must match receiving-flow entity fields. One active match selects
          that entity. Zero active matches deterministically creates one receiving-flow entity from the declared key. More
          than one match fails closed. Missing payload refs fail closed.
        deterministic_identity: The runtime derives the minted entity identity from the receiving flow ownership scope and
          the canonical declared key. Contracts do not call a generic UUID helper and source flows do not provide target IDs.
        selected_context: The selected or created entity_id and flow_instance become the handler entity context for state,
          guard, data_accumulation, emit.fields, action, and state transition processing.
      pin_routing_interaction:
        receiver_context_order: 'For pin-routed events, handler entity context resolves in this order: event.target when set;
          otherwise current delivery target from event.target_set when present; otherwise select_or_create_entity late binding
          when declared; otherwise event.source.'
        canonical_uses: External or mixed-provenance events where the receiving service owns the entity identity and may need
          to mint the entity on zero-match.
        non_canonical_use: In-topology pin routing where lowered parent connect, the explicit target escape hatch, structural
          fallback, or target_set delivery already supplies the receiver route context.
        boot_verify: Redundant normal in-topology select_or_create_entity is a hard invalidity. Stateful static/default-static
          authored handlers using select_or_create_entity fail closed because static multi-row ownership is retired.
      restrictions:
        lifecycle_scope: Not valid for authored stateful static/default-static input-pin multi-row ownership. Stateless flows
          do not have stateful entity acquisition. Template flows acquire entities through create_flow_instance.
        with_create_entity: 'PROHIBITED. A handler must choose exactly one acquisition mode: create_entity, select_entity,
          or select_or_create_entity.'
        with_select_entity: PROHIBITED. select_entity and select_or_create_entity cannot appear on the same handler.
        source_authority: PROHIBITED. select_or_create_entity keys must not target platform envelope/control fields such as
          entity_id, entity_type, flow_instance, current_state, workflow_name, or workflow_version. Payload refs must not be
          payload.entity_id, payload.entity_type, or payload.flow_instance. `_entity.*` and `event.*` refs are readable
          elsewhere only where explicitly supported; they are not selector source authority.
        compatibility: PROHIBITED. select_or_create_entity does not restore generic existing-entity cross-flow continuation
          and does not allow a source flow to directly name or mutate another flow's entity row.
      interactions:
        with_accumulate: ALLOWED. Accumulate operates on the acquired target-flow-owned entity after acquisition.
        with_guard: ALLOWED. Guards evaluate against the acquired entity state before same-handler writes.
        with_data_accumulation: ALLOWED. Writes are validated against the acquired entity's receiving-flow contract and remain
          subject to same-flow ownership enforcement.
        with_advances_to: ALLOWED. State transitions advance only the acquired receiving-flow entity.
        with_action: ALLOWED. Actions execute with the acquired entity context. Built-ins such as artifact_repo_commit may
          use _entity.id as a service-owned opaque repo_id without exposing product-specific target identity to Swarm.
        with_query: ALLOWED. Query runs after acquisition and cannot replace select_or_create_entity ownership checks.
    guard:
      field: guard
      type: object — single check OR list of checks
      purpose: Evaluate conditions before proceeding. All checks must pass.
      single_form:
        id: string — check identifier
        check: string — expression evaluated against entity state, payload, and policy
        policy_ref: string — optional annotation documenting which policy key is referenced
        platform_builtin: string — optional reference to a platform-provided guard (e.g., authorization checks)
      list_form:
        checks: list of {id, check} objects — ALL must pass
        on_fail: 'reject | kill | discard | escalate:{event_name} | {escalate: {event, fields}} — what to do when
          any check fails. Default: reject. The scalar escalate:{event_name} shorthand emits an escalation event with
          no explicit business payload. The object form authors explicit escalation business payload fields using the
          same expression-value forms as emit.fields, evaluated at guard-failure time before later handler transforms
          or data writes. Guard escalation never implicitly passes through trigger payload/entity metadata and cannot
          author runtime-owned envelope fields as business payload.'
    accumulate:
      field: accumulate
      type: object
      purpose: Track multiple event arrivals for same entity. Wait until completion.
      sub_fields:
        into: 'string — optional explicit accumulator buffer name. Required when any entity field declares
          materialize_from: <this_node>.<into>. Must resolve to a state_schema field on this node typed as
          list<NamedType> or [NamedType]. Within one node, a given into value may be declared by at most one handler.'
        expected_from: string — entity field containing expected count or items list
        completion: all | threshold | timeout
        from: string — optional sender path filter
        on_complete: handler fields to execute when done
        on_timeout: handler fields to execute on timeout
        description: string — human-readable note
        window: 'string — optional field path for partitioning one logical accumulator into bounded windows (for
          example payload.period_id). When declared, the runtime resolves the path on each arrival and stores/reads
          the accumulator under a bucket identity scoped by that window value. Missing or empty runtime window values
          fail closed for that handler execution.'
        dedup_by: 'string — field path for deduplication. Default: "sender" (sender session ID). Set to a payload field path
          (e.g., "payload.dimension") when accumulating items identified by content rather than sender. Duplicate arrivals
          with the same dedup key are ignored.'
      concept: Track multiple events arriving for the same entity. Fire on_complete when completion condition is met. Expected
        count read from entity state (written by initiating handler).
      projection_hook: |
        When a handler accumulator reaches successful completion, any same-flow
        entity field declaring `materialize_from` for this handler's
        `accumulate.into` buffer is written as a full replacement list after
        data_accumulation and before emit.fields if either no `on_complete`
        block is declared or an `on_complete` branch matches successfully.
        `rules` remain branch-selection/data-write/emit/action semantics and do
        not guard accumulator projection eligibility. No projection occurs for
        incomplete accumulation, timeout branches, or declared `on_complete`
        completion with no matching branch.
    compute:
      field: compute
      type: object
      purpose: Execute a platform computation primitive.
      sub_fields:
        operation: string — weighted_average | pick_or_average | sum | min | max | count
        tiers: 'list — for weighted_average: [{dimensions, weight}]'
        keys: object — field name mapping for reading accumulated items. Required for weighted_average with tiers.
        params: object — operation-specific parameters
        store_as: string — entity field to store result
        description: string — human-readable note
      operation_requirements:
        lookup:
          status: internal_lowering_only
          description: |
            `lookup` is the compute-owned internal operation produced by
            policy-sheet lookup value rows. It is not a public
            `compute.operation` authoring value. Public YAML must author lookup
            value derivation as a `rules[*].lookup` policy-sheet row. The
            lowered compute plan reads explicit context roots, performs exact
            typed tuple matching against an inline finite table, and writes the
            result to a turn-scoped `computed.*` binding.
          public_authoring: 'forbidden; `compute.operation: lookup` fails closed.'
          miss_disposition: |
            A table miss with `default: fail` is deterministic, no-retry, emits
            a typed diagnostic naming the row ID and unmatched tuple, and
            performs no side effects.
        validate:
          status: internal_lowering_only
          description: |
            `validate` is the compute-owned internal operation produced by
            policy-sheet validate value rows. It is not a public
            `compute.operation` authoring value. Public YAML must author
            machine validation as a `rules[*].validate` policy-sheet row. The
            lowered compute plan reads explicit context roots, evaluates the
            referenced policy.validation set with the Slice B equal-only
            machine evaluator, and writes the result to a turn-scoped
            computed.validation.* binding.
          public_authoring: 'forbidden; `compute.operation: validate` fails closed.'
          failure_disposition: |
            Unknown sets, unmapped inputs, missing source paths, ill-typed
            source values, and malformed rules are deterministic no-retry
            failures. Equality mismatches produce a computed validation result
            with stable rule-ID violations and do not retry.
        compute_module:
          status: internal_lowering_only
          description: |
            `compute_module` is the compute-owned internal operation produced by
            policy-sheet compute_module value rows. It is not a public
            `compute.operation` authoring value. Public YAML must author
            deterministic Wasm value derivation as a `rules[*].compute_module`
            policy-sheet row referencing a flow policy.modules declaration. The
            lowered compute plan reads explicit context roots, executes the
            declared precompiled core-json-v1 module with deterministic limits,
            validates the JSON object result, and writes the result to a
            turn-scoped computed.* binding.
          public_authoring: 'forbidden; `compute.operation: compute_module` fails closed.'
          failure_disposition: |
            Module compile/ABI/import rejection, digest mismatch,
            trap/unreachable, gas/fuel exhaustion, memory limit, output-size
            limit, output bounds, and output schema violation are deterministic
            no-retry failures naming module ID and row ID.
        weighted_average:
          description: Compute a weighted average across tiers of accumulated items.
          required:
            keys.dimension_key: string — field name in each accumulated item that identifies the dimension.
            keys.score_keys: list of strings — field name(s) in each accumulated item that contain the numeric score.
            tiers: list of objects — each with dimensions (list of dimension names) and weight (0.0-1.0, must sum to 1.0).
            store_as: string — entity field to write the computed result.
          boot_validation: If operation is weighted_average and keys.dimension_key or keys.score_keys are missing, boot
            error. Silent zero output is not acceptable — missing keys must be caught at contract loading time.
          example: "compute:\n  operation: weighted_average\n  keys:\n    dimension_key: dimension\n    score_keys: [score]\n\
            \  tiers:\n  - dimensions: [build_complexity, automation_completeness]\n    weight: 0.6\n  - dimensions: [pain_severity]\n\
            \    weight: 0.4\n  store_as: entity.composite_score"
    on_complete:
      field: on_complete
      type: list of {condition, advances_to, emit} objects — evaluated top-to-bottom, first match wins
      purpose: Conditional branching after accumulation or computation.
      branch_fields:
        condition: string — expression evaluated against entity state and policy
        advances_to: string — target state
        emit: string or object — event to emit, optionally with local fields payload construction
      _note: MUST be a YAML list (ordered), not a map (unordered). Each entry has a condition evaluated as CEL. First matching
        condition executes.
    advances_to:
      field: advances_to
      type: string
      purpose: Set the platform lifecycle state exposed as _entity.current_state to the target state. Skipped if on_complete already advanced.
    sets_gate:
      field: sets_gate
      type: string
      purpose: Set the platform gate exposed as _entity.gates.{name} = true.
    data_accumulation:
      field: data_accumulation
      type: object
      purpose: Write fields to entity state from event payloads, literal values, or computed expressions.
      sub_fields:
        writes: list of write items (see write_item_forms below)
        source_event: 'string — which event the payload comes from (default: current trigger event).
          CANONICAL field name — use source_event, not "source".'
      write_item_forms:
        description: 'Each item in writes is one of five forms. No other forms are accepted.'
        direct:
          shape: 'field_name (bare string)'
          meaning: 'payload.field_name → entity.field_name. Direct name match.'
          example: '- geography'
        mapped:
          shape: '{source_field: payload_key, target_field: entity_key}'
          meaning: 'payload.payload_key → entity.entity_key. Renamed mapping.'
          example: "- source_field: vertical_name\n  target_field: name"
        literal:
          shape: '{target_field: entity_key, value: constant}'
          meaning: 'Write a constant value directly to entity.entity_key. No expression evaluation.'
          example: "- target_field: revision_count\n  value: 0"
          note: '{target_field, literal} is NOT valid. The field name is value, not literal.
            value and expression are mutually exclusive — a write item MUST NOT have both.'
        computed:
          shape: '{target_field: entity_key, expression: CEL_expression}'
          meaning: 'CEL expression evaluated against handler context → entity.entity_key.'
          context: 'expression is evaluated against: entity, payload, policy, fan_out. The fan_out
            namespace is available when the handler includes a fan_out step (e.g., fan_out.count).
            accumulated is NOT available — data_accumulation runs before accumulation completes.'
          example: "- target_field: revision_count\n  expression: entity.revision_count + 1"
          note: 'value and expression are mutually exclusive. Use value for constants, expression
            for dynamic computation. Do not use expression for simple constants — use value instead.'
        contained_operation:
          promoted_by: '#1548'
          canonical_code_owner: internal/runtime/contracts.WorkflowDataWrite.Operation + internal/runtime/entityruntime.ResolveContainedOperationTarget
          shape: '{op: set|merge|delete|append|update, target: entity.<map_or_list_field>[.<declared_nested_field>], key?: expression, index?: expression, value?: expression}'
          meaning: >
            Apply a deterministic typed update to a list/map contained inside the
            current primary entity. `target` is a declared entity field path and
            MUST use `entity.` scope. For map-scoped operations, `key` is the
            explicit map key expression; dynamic bracket targets such as
            `entity.map[payload.key]` are not valid operation syntax. `value`,
            `key`, and `index` use the expression-value grammar: scalars/maps/lists
            are literals, `{ref: payload.field}` reads a scoped value, and
            `{cel: expression}` evaluates a CEL expression.
          map_operations:
            set: >
              Requires `target`, `key`, and `value`. The target root must be
              `map[...]T`. The value is type-checked as `T` or as the declared
              nested target type when `target` names a declared field under the
              map value type.
            merge: >
              Requires `target`, `key`, and `value`. The map entry or declared
              nested target must already exist and resolve to an object/named
              type. The value is a typed partial object merged deterministically
              into that object. Unknown fields fail closed.
            delete: >
              Requires `target` and `key`; forbids `value` and `index`. The
              target must be the map root. Missing keys fail closed.
            append: >
              With `key`, appends `value` to a list stored as the map value or
              under a declared nested list field of the map value type. The list
              item is type-checked against the declared list element type.
          list_operations:
            append: >
              Without `key`, `target` must resolve to a declared list field on
              the primary entity. Appends a value type-checked against the list
              item type.
            update: >
              Requires `target`, `index`, and `value`. `target` must resolve to
              a declared list field, either directly on the primary entity or
              under an explicit map `key`. The index must be non-negative and
              existing at runtime; out-of-range update fails closed.
          fail_closed:
          - missing target
          - target outside entity scope
          - target_path/field/source_field/target_field mixed with op syntax
          - unsupported operation name
          - missing required key/index/value for the operation
          - index declared on append or delete
          - value declared on delete
          - dynamic bracket/index path syntax in target
          - target root not declared on the primary entity schema
          - map operation on a non-map field
          - list operation on a non-list field
          - nested target path that does not resolve through declared named types
          - wrong key type, wrong value shape, missing map key, or out-of-range list update
          non_authoritative_paths:
          - target_path bracket syntax
          - paths.Parse dynamic segments
          - whole-map/list CEL rebuilds used as keyed operation proof
          - connect/direct delivery/RouteTable/descriptor lookup for contained items
          example: "data_accumulation:\n  writes:\n  - op: append\n    target: entity.verticals.active_jobs\n    key:\n      ref: payload.vertical_id\n    value:\n      ref: payload.job\n  - op: update\n    target: entity.review_queue\n    index: 0\n    value: reviewed"
      rules:
      - writes is always a list
      - each item is exactly one of the five forms above
      - value and expression are mutually exclusive on the same write item (boot error if both present)
      - source_event is optional — if omitted, the trigger event is the source; this effective default must be visible in
        the normalized handler semantics used by boot and runtime
      - source_event payload must contain all fields referenced by direct and mapped writes (verified at boot)
      - literal writes do not reference source_event or handler context — the value is used as-is
      - computed writes do not reference source_event — they use the handler context directly
      - contained operations are validated against the current flow primary entity contract and remain local state updates, not routing declarations
      example: "data_accumulation:\n  writes:\n  - geography                              # direct\n\
        \  - source_field: vertical_name             # mapped\n    target_field: name\n  - target_field:\
        \ revision_count                # literal\n    value: 0\n  - target_field: expected_count\
        \              # computed\n    expression: fan_out.count\n  source_event: scan.requested\
        \               # optional"
    emit:
      field: emit
      type: 'scalar event name OR object: {event, fields, target, broadcast}'
      purpose: Publish the selected follow-up event for this emit site. Handler top-level emit is allowed only when the handler
        has no nested emit sites. Nested emit sites are selected on_complete emit, rules emit, accumulate.on_timeout emit,
        and fan_out emit.
      sub_fields:
        event: string — event to emit
        fields: map of output_field_name → CEL expression evaluated against handler context. Optional. If omitted, the emitted
          payload contains no business fields. Runtime-owned envelope context is attached on the event carrier and is accessed
          through event.* rather than payload.*.
        target: optional controlled dynamic-routing escape hatch. Valid forms are sender, {instance_id}, {flow, match},
          and {flow, match, allow_fanout}. This field is not payload and is the only producer-authored path that may ask
          the platform to populate event.target or event.target_set. It is not the common consumer-routing surface for
          parent-composed flow packages; common cross-flow delivery is owned by parent connect lowering. A loaded flow-scope
          producer target, or package-root producer target from a root output pin consumed by an explicit root connect endpoint,
          that selects a loaded package receiver input for the same pin-declared output or a receiver flow reached by the parent
          connect graph is invalid common-path routing, not an escape hatch.
        broadcast: optional boolean. Only true is meaningful. For a pin-declared output, broadcast:true is an explicit
          producer-authored opt-out escape hatch that leaves event.target absent. Parent-authored broadcast/fan-out uses
          connect lowering rather than producer broadcast. Loaded flow-scope producer broadcast, and package-root producer
          broadcast from a root output pin consumed by an explicit root connect endpoint, is invalid when it is used as
          package-internal delivery to receiver input pins that require parent connect topology.
      pin_routing_activation:
        rule: Pin routing activates if and only if the emitted event is declared in the emitter flow's schema.yaml pins.outputs.events.
        ad_hoc_emits: Emits not declared in pins.outputs.events are ordinary event-loop emits and do not require target or broadcast.
        target_requirement: A pin-declared output emit in parent-composed topology MUST resolve through lowered parent connect
          facts, use structural child-to-parent ParentRoute binding, or use the static no-instance child-flow delivery-entity
          route where eligible. Explicit target and broadcast remain escape hatches only for cases outside known
          parent-composed receiver-input routing. No silent fallback to event-type broadcast is allowed.
        explicit_target_precedence: Producer target is an exceptional dynamic-routing escape hatch, not the common route
          owner for parent-composed topology. Lowered parent connect remains the common source authority for connected pins;
          loaded flow-scope producer target/broadcast and package-root producer target/broadcast on the common path must
          be removed or fail closed even if a parent connect is also present. Structural binding writes event.target only when the emit site has no explicit target,
          no lowered connect target applies, and broadcast:true is absent.
      target_forms:
        sender: Copy inbound event.source into the new event.target. Sender is the immediate inbound sender, not a chain ancestor.
        instance_id: Resolve a target instance in the addressed child/template scope using the instance_id known to the producer.
        flow_match: Resolve exactly one target instance in target.flow whose declared entity fields match the target.match expressions.
        flow_match_allow_fanout: Permit more than one match for the specified flow/match selector. Publish-time resolution
          MUST materialize event.target_set as the complete concrete recipient route list, leave singular event.target absent
          on the persisted event, and persist one delivery target per recipient route. It must not silently collapse to one target.
      target_failures:
        target_required_missing: Pin-declared output has no lowered parent connect route, no explicit target escape hatch,
          no structural ParentRoute, no eligible static child delivery-entity route, and no broadcast:true.
        target_invalid_syntax: Target form is malformed or has invalid literal fields.
        target_unknown_flow: target.flow names a flow outside the loaded registry.
        target_sender_no_inbound: target:sender is used where no inbound event source can exist.
        target_sender_empty_source: target:sender is used where inbound source is statically external or empty.
        producer_target_common_path_forbidden: A loaded flow-scope producer or package-root producer target.flow/match
          selects a loaded package receiver input for the same pin-declared output or a receiver flow reached by the
          parent connect graph; parent connect is the required route owner.
        producer_broadcast_common_path_forbidden: Loaded flow-scope or package-root broadcast:true is used as package-internal
          delivery to receiver input pins for the same pin-declared output or connected output pin; parent connect
          broadcast/fan-out is the required route owner.
      single_emit_handler_rule: >-
        A handler top-level emit is valid only when the handler has exactly one possible emit site, except for the explicit
        rules emit template specialization described under `rules.emit_template_specialization`. If the handler also declares
        ordinary rules emit sites, on_complete, accumulate.on_timeout, or fan_out emit, boot fails with ambiguity. Payload
        ownership must move to the active emit site. The only approved additive rules success surface is explicit
        on_success.emit, which is not a handler-level emit overload.
      emit_field_lowering:
        syntax: "`emit.from` is an optional sibling of `emit.event`, `emit.fields`, `emit.target`, and `emit.broadcast`.
          It is valid only on emitted-event payload `EmitSpec` surfaces."
        allowed_sources: "`entity` and `payload` only. The value names exactly one source namespace; lists, fallbacks,
          wildcards, multi-source selection, and heuristic matching are invalid."
        lowering: "`emit.from: <source>` fills required declared payload fields for the emitted event when the same-named
          field exists in the source and the target field is not explicitly present in `emit.fields`. Optional payload fields
          are never auto-filled; authors opt into optionals through explicit `emit.fields` entries."
        field_value_micro_sugar: "Inside emitted payload `emit.fields` only, a bare namespace value means same-named source
          field: `interest_score: payload` lowers to `interest_score: payload.interest_score`; `bucket: entity` lowers to
          `bucket: entity.bucket`. Explicit dotted CEL values remain the canonical authoring form for renames and computed
          selections."
        canonical_output: The generated/semantic view and every validator/runtime consumer see the lowered canonical explicit
          `emit.fields` map with `emit.from` removed. Runtime evaluates only that explicit map; it never performs implicit
          entity or trigger-payload passthrough.
        fail_closed: Missing source namespace, invalid source namespace, missing source field, missing emitted event payload
          schema, missing required emitted payload field after lowering, undeclared target payload field, and envelope-owned
          payload keys are hard invalidity.
        excluded_surfaces: This sugar is not valid for `config_from`, `emit.target.match`, action mailbox payloads,
          artifact-repo payload/provenance maps, connect maps, or data-handoff maps. Those remain separate mapping surfaces
          and must not inherit `emit.from` or bare namespace field-value lowering.
      on_success:
        field: on_success
        type: object
        purpose: Explicit success-side effects that run after a handler execution succeeds.
        sub_fields:
          emit: emit spec — additive success/audit/lifecycle event emitted after the selected rules emit.
        rules_only: on_success.emit is supported only on handlers with rules in this slice. It is not supported with on_complete,
          accumulate.on_timeout, handler-level fan_out, rule-level fan_out, handler-level action, or bare handler-level emit.
        ordering: When a rule matches and has emit, the rule emit is materialized first and on_success.emit second. Both events
          are emitted after rule selection, state/gate/data/projection side effects, and emit.fields evaluation for their own
          active emit site, before the handler transaction commits.
        no_match: If no rule matches and no else branch exists, the handler still succeeds when no validation or runtime failure
          occurs. on_success.emit fires, and no rule emit fires.
        distinct_event_requirement: If on_success.emit and the selected rules emit resolve to the same event identity, runtime
          fails closed. Same-event template specialization is outside this surface.
        atomicity: Any payload, route, validation, persistence-prerequisite, outbox, or delivery-plan creation failure for either
          event rolls back both emitted events and all same-handler state changes.
    rules:
      field: rules
      type: ordered list of rules, or a keyed map that is decoded into ordered rules. `rules` is the current policy-sheet
        spelling; it is enhanced in place rather than adding a co-authorable `policy` field. Every typed policy-sheet
        selection row must have a stable `id` that acts as trace-addressable contract identity.
      purpose: Type-based routing and policy-sheet selection. Match rule conditions or typed selection rows over the
        rule-condition handler context; common dispatch reads payload fields, but selection is not payload-only.
      rule_fields:
        condition: string — CEL expression evaluated against the rule-condition handler context. Allowed roots
          are payload.*, entity.*, policy.*, event.*, computed.*, and query_entities(...). accumulated.*, fan_out.*,
          and item.* are unavailable in rules.condition. entity.* reads use the pre-rule entity state and the same
          declared-field validation as other rule-phase handler conditions. computed.* reads are turn-scoped
          values written earlier in the handler compute phase, including lookup and validate value rows.
        when: >-
          string — first-class policy-sheet selection row for compound relational conditions. Lowers to condition
          and otherwise uses the ordinary selected-branch rule fields. Must not be combined with condition, case, range,
          else, or default.
        case: >-
          object — first-class policy-sheet selection row for scalar or tuple dispatch. Shape is
          `{selector: <path>, equals: <scalar>}` or `{selectors: [<path>, ...], equals: [<scalar>, ...]}`. Selectors
          must be simple dotted paths rooted in payload, entity, policy, or event. The row lowers to equality conditions
          joined by AND. Duplicate selector/value keys fail closed.
        range: >-
          object — first-class policy-sheet selection row for numeric threshold/range dispatch. Shape includes
          `value` and one or more of `gt`, `gte`, `lt`, `lte`; bounds may be numeric literals or policy-constant
          expressions. Entity/payload/event dynamic bounds are forbidden and fail closed; normalize those values through
          compute/value rows first. Policy-constant bounds require `monotonicity` declarations using `<=` so verify can
          prove structural ordering and non-overlap. Literal ranges are checked for absolute overlap.
        lookup: >-
          object — first-class policy-sheet value row for finite tuple/key-to-value mapping. Public shape is
          `{on: [payload.<field>, ...], entries: [{key: [<scalar>, ...], value: <scalar>}], into: computed.<name>,
          default: fail}`. `lookup.on` supports explicit `payload.*` roots only in this slice; entity, policy, event, and
          computed lookup keys require a later schema/domain verifier before they can be promoted. Single-key rows may author
          a scalar `key`; tuple rows use list keys. Entries are inline only
          in this slice. Lookup rows bind a value and do not select a branch, emit, advance state, execute action/activity,
          fan_out, data_accumulation, or public compute. The row lowers to the compute-owned internal lookup operation
          and runs before selection rows consume computed.*.
        validate: >-
          object — first-class policy-sheet value row for machine-evaluated validation against a flow policy.validation
          set. Public shape is `{set: <validation_set>, input: {<input_name>: <payload|entity|event|computed path>},
          into: computed.validation.<name>}`. The row maps execution context roots into the validation set's typed input
          signature, lowers to the compute-owned internal validate operation, binds `{valid, violations}` under
          computed.validation.*, and runs before selection rows consume the result. It cannot emit, advance state,
          execute action/activity, fan_out, data_accumulation, or public compute.
        compute_module: >-
          object — first-class policy-sheet value row for deterministic precompiled Wasm modules declared in flow
          policy.modules. Public shape is `{module: <module_id>, input: {<input_name>: <payload|entity|event|computed path>},
          into: computed.<name>}`. The row maps execution context roots into the module's declared input schema, lowers to
          the compute-owned internal compute_module operation, validates the module output object against the declared output
          schema, binds the object under computed.*, and runs before selection rows consume the result. It cannot emit,
          advance state, execute action/activity, fan_out, data_accumulation, perform I/O, access files, or public compute.
        else: boolean true — explicit default row. Lowers to the ordinary else selected branch.
        default: boolean true — alias for else, used when the authoring intent is an explicit policy-sheet default row.
        emit: string or object — rule-local event to emit, or an eventless object with fields only when participating in
          rules emit template specialization.
        advances_to: string — optional state change
        data_accumulation: object — optional data write (same format as handler-level)
        description: string — human-readable note
      policy_sheet_selection_rows:
        scope: Selection rows are `when`, `case`, `range`, and explicit else/default rows. Lookup value rows are specified
          under `policy_sheet_value_rows`; validate value rows are governed by policy_validation_contracts. Arithmetic/expression
          derivation and temporal/join/loop/collection/schedule rows are separate future gates.
        stable_identity: Typed policy-sheet rows require stable IDs. The selected row ID is trace-addressable contract
          identity and must survive authoring edits.
        lowering: Accepted selection rows lower before runtime execution into ordinary selected `HandlerRuleEntry` branches.
          Runtime must not contain a second switch/table/range interpreter.
        default_requirement: A rules block containing typed policy-sheet rows must include an else/default selected branch
          unless a later spec-promoted row type supplies a stronger exhaustiveness proof.
        forbidden_authoring_surfaces:
          - "`handler.branch` — retired; fail closed"
          - "`handler.switch`, `handler.lookup`, `handler.threshold` — not standalone handler fields"
          - "`policy` as a co-authorable handler field while `rules` remains authorable"
          - runtime-only table, switch, lookup, threshold, or range interpreters
      policy_sheet_value_rows:
        scope: Value rows in this slice support `lookup`, a finite inline exact-match table whose right-hand side is
          a scalar value; `validate`, a machine-evaluated policy.validation row that binds a typed validation result; and
          `compute_module`, a deterministic precompiled Wasm module row that binds a validated JSON object result.
          Arithmetic/expression derivation, file-backed tables, temporal rows, join rows, loop rows, collection rows, and
          schedule rows are separate gates.
        ownership: The policy sheet is the authoring construct. Lookup, validate, and compute_module rows lower to the
          compute owner; they do not create second runtime table/validation/Wasm interpreters and do not make public
          `compute.lookup`, `compute.validate`, or `compute.compute_module` authorable.
        ordering: The sheet is not a sequential program. Row types lower into their declared runtime phases. Lookup value
          rows, validate value rows, and compute_module value rows run in compute phase before branch selection; selection
          rows then read computed.*. Selection outcomes are not values and may not be consumed by value rows.
        target_namespace: lookup.into MUST be an explicit simple computed.* path. validate.into MUST be an explicit simple
          computed.validation.* path. compute_module.into MUST be an explicit simple computed.* path. Entity persistence is
          forbidden for derived lookup values, validation results, and module outputs; computed.* is turn-scoped and is not
          written to entity_state unless a separate declared data write explicitly persists a value under its own owner.
        matching: lookup.on entries MUST use explicit payload.* roots in this slice. Matching is exact typed equality through
          one canonicalization path shared by duplicate-key detection and runtime matching. Key literals are type-checked
          against declared payload field schemas; the string "1" and the number 1 are different keys.
        default_and_exhaustiveness: >-
          Closed domains may omit `default: fail` only when boot verification proves exhaustive table coverage. Any open or
          unknown domain component requires `default: fail`.
        diagnostics: >-
          A `default: fail` miss is deterministic no-retry failure with row ID and unmatched tuple in diagnostics, distinct from
          validation failures.
        validation_rows: >-
          validate rows reference flow policy.validation sets, map exactly the declared typed inputs, evaluate only Slice B
          equal checks, and bind `{valid, violations}`. Invalid-result routing is expressed by ordinary selection rows that
          consume computed.validation.* and emit events declared by the validation set class dispositions.
        compute_module_rows: >-
          compute_module rows reference flow policy.modules declarations, map exactly the declared object input fields, execute
          only precompiled core-json-v1 Wasm with zero author imports and deterministic limits, validate object output, and bind
          computed.*. Module bytes are bundle-pinned and included in bundle identity.
        dead_binding: lookup.into, validate.into, and compute_module.into bindings must be consumed by a supported downstream
          condition, emit field, activity input, fan_out, or expression in the same handler; unconsumed bindings fail boot
          verification.
      emit_template_specialization:
        syntax: A rules handler may declare handler-level emit as the template, with `emit.event` and optional shared
          `emit.from` / `emit.fields`. Each rule then declares `emit.fields` and may declare the same `emit.from` without
          `emit.event` to add branch-specific fields. `emit` remains one object shape everywhere, `{event?, from?, fields?,
          target?, broadcast?}`.
        field_values: All `emit.fields` values use the normal CEL expression string grammar after emitted-payload lowering.
          String constants are CEL string literals, for example YAML value `'"high"'`. The same-named bare namespace
          micro-sugar described in `emit_field_lowering` is the only additional emitted-payload field-value shorthand.
          The platform does not support `emit_fields`, flattened rule emit payload maps, `literal`, `value`, or any second
          field-value dialect for this specialization.
        matching: Rules keep ordered first-match semantics. Threshold-style overlapping rules are valid when ordered from
          most specific to least specific; the platform does not fail closed merely because multiple conditions could be true.
        required_else: Every rules emit template specialization must include an `else` rule so every successful rules-handler
          execution has a defined specialization branch.
        effective_emit: The selected rule's eventless `emit.fields` fill-merge with the handler template. The result is exactly
          one effective emit. Runtime evaluates that merged effective emit's fields, then emits its inherited `emit.event`.
        fill_only: Rule specialization fields are fill-only. A rule field that redefines a handler template field is invalid
          and boot fails closed.
        unsupported_combinations: Rule-level specialization may not set `emit.event`, `emit.target`, or `emit.broadcast`.
          If both handler template and rule specialization declare `emit.from`, the values must match. Handler-level
          `on_success.emit` remains the separate additive two-event surface and is not part of template specialization.
          on_complete, accumulate.on_timeout, fan_out, and action-originated emits are out of this specialization slice.
        proof_consumers: Bootverify, semantic view, produces derivation, route authority, runtime execution, and pipeline/outbox
          proof consume the same merged effective emit, not the raw handler template and raw rule specialization as separate
          events.
    fan_out:
      field: fan_out
      type: object
      purpose: For each item in a bounded collection, emit one ordinary event through the normal emit pipeline.
      sub_fields:
        items_from: string — source collection at exactly one declared top-level payload.* or entity.* field.
          Nested paths are unsupported in this slice and fail closed until the schema owner can prove the complete
          terminal path is itself a collection.
        as: string — required simple identifier that binds the current item for this row's emit.fields expressions.
          `fan_out.item`, bare `item`, and `fan_out.identity` are not authoring namespaces.
        identity: string — required expression over the item alias that declares the stable per-item key. It is
          verification metadata, not a second expression namespace. Bootverify must prove `fan_out.emit.fields`
          carries this exact expression so downstream join/dedup contracts can bind to the emitted payload.
        max_items: optional positive integer tightening the platform ceiling. An authored zero is invalid; only omission
          selects the platform ceiling. The platform ceiling is always enforced even when authors omit max_items.
        emit: string or object — per-item event to emit, optionally with local fields payload construction. During
          fan_out.emit.fields only, the item alias and platform-provided `fan_out.index` are available.
      platform_ceiling:
        max_items: 1000
        overrun: >
          Runtime evaluates items_from once per handler activation and checks the resulting count before any
          per-item emit. If the count exceeds the effective limit, the handler fails closed with non-retryable
          typed platform error `platform.fan_out_bound_exceeded`. The runtime must not silently truncate and
          must not emit a partial prefix.
      empty_collection: >
        An empty collection emits zero events and still completes the fan_out row. Handler `advances_to` runs once
        after fan_out completion, including the empty path, and `fan_out.count` is 0 for later data_accumulation.
      transition_order: Handler `advances_to` fires once after per-item emission, not once per item.
      graph_surface: describe --graph renders multiplicity-bearing fan-out edges such as `waiting ->xN line_item.requested`.
      route_authority: >
        `fan_out.emit` is a normal authored emit site. When it emits a
        pin-declared output event, routing is owned by the same output pin,
        parent connect / ConnectRoutePlan, and EventBus RoutePlan authority as
        handler-level emit, rule emit, on_complete emit, and accumulate timeout
        emit. The runtime must not route target-less fan_out output through
        direct delivery, raw subscriber lookup, RouteTable fallback, relay,
        replay/readback repair, receiver select_entity repair, or event-type
        broadcast compatibility.
      retired_target_field: >
        `fan_out.target` is retired and invalid. It is not a route owner and
        must not be implemented as an agent-dispatch mode. Authors that need a
        genuine producer escape hatch use `fan_out.emit.target` with the same
        restrictions as any other explicit emit target; common composed flow
        delivery uses output pins and parent connect.
      batching_scatter_pattern: >
        The supported batched-agent scatter pattern is asynchronous and
        event-driven: a coordinator emits a batch request event to a normal
        authored agent, that agent emits a batch-completed event, and the
        coordinator fans out result rows with target-less `fan_out.emit` to
        pin-declared outputs. Each row must construct the output pin key/carries
        payload fields from the required item alias and declared `identity`
        expression, and parent connect
        routes each emitted event to the intended flow instance by correlation
        key. No `batch_agent`, `map_agent`, inline runtime LLM invocation, or
        runtime-owned JSON result contract is part of this pattern.
      side_effect: Writes fan_out.count to handler context (available for data_accumulation). `fan_out.index`
        is scoped to per-item emit field evaluation and is not a durable handler value.
    join:
      field: join
      type: object
      purpose: >-
        Declare one stage-anchored finite-membership barrier on an arriving event. Join is the sole public barrier owner
        for stages: bundles; open/windowed stream accumulation remains owned by accumulate.
      sub_fields:
        id: Optional stable simple identifier. It defaults to stage; collisions in the same flow/stage require explicit unique IDs.
        stage: Required stage in the same flow. Arrivals are admitted only against a persisted activation for this stage.
        members: >-
          Required `{from: entity.<field>, by: payload.<field>}`. from names a declared ordered list<text> that is
          snapshotted once at stage arm; by names the declared text member identity on each arrival and is the sole
          membership/dedup key.
        window: >-
          Optional `{from: entity.<field>, by: payload.<field>}` text identity. It is required when the static transition
          graph permits re-entry into the join stage. from is snapshotted at arm and by must match exactly on arrival.
        output: Required top-level declared payload field captured with its canonical value/hash per admitted member.
        complete_when: >-
          Optional CEL boolean over join.expected, join.completed, join.missing, join.results, and join.timed_out only.
          Omission means all declared members. Authoring the default-all tautology is unnecessary.
        remaining: >-
          Required exactly as ignore when complete_when is authored and forbidden otherwise. terminate is unsupported
          until a durable contributor-lifecycle/cancellation owner is promoted.
        on_complete: >-
          Required non-empty outcome using only existing data_accumulation, emit, and advances_to fields. Expressions may
          read declared entity.* and typed join.* only.
        timeout: >-
          Required `{after: <positive literal or policy-scalar duration>, ...outcome}`. Bare joins are invalid. The outcome
          supports the same fields and expression roots as on_complete.
      context:
        expected: Integer snapshotted member count.
        completed: Integer persisted admitted-member count.
        missing: list<text> of membership-ordered member IDs without output.
        results: List of the declared join.output payload type, membership-ordered and independent of arrival order.
        timed_out: Boolean true only while evaluating the timeout outcome.
      expression_typing: >-
        Verify and runtime evaluation type-check every direct join.* access against the context types above. A boolean
        result alone is insufficient: expressions with invalid typed operands fail closed at load and may not reach
        execution. Bracket, dynamic, bare-root, and undeclared join access remain invalid.
      execution: >-
        The stage transition, membership/window snapshot, typed activation, timeout intent, and any zero-member completion
        intent commit in one selected-store transaction. Empty membership evaluates the same default-all or authored
        complete_when plan used on arrival; an unsatisfied custom condition remains open until an arrival satisfies it or
        timeout closes it. Arrivals never create activations. The existing entity lock and selected-store row transaction
        admit exactly one arrival-versus-timeout close winner; losers observe closed state.
      duplicate_policy: >-
        An exact same-member/same-canonical-output arrival is idempotent. The same member with different canonical output
        fails as platform.conflicting_duplicate. Non-members, arrivals before arm, and arrivals after close fail through
        platform.unexpected_arrival, platform.early_arrival, and platform.stale_arrival respectively.
      timeout_policy: >-
        Timeout is evaluated once at arm and fire_at is persisted. It is the only missing/dead-contributor escape in this
        slice. join.terminated, join.active, and remaining: terminate are invalid until a real contributor lifecycle owner lands.
      staged_accumulate_retirement: >-
        A stages: bundle may not author finite-barrier accumulate fields such as expected_from, threshold/completion,
        timeout_ms, on_complete, or on_timeout. Non-staged migration remains separately tracked; accumulate continues to
        own open/windowed streams.
      graph_surface: >-
        describe --graph renders stage-scoped join completion and timeout edges. Timeout edges include after and the join ID.
    query:
      field: query
      type: object or list of objects
      purpose: Cross-entity read and aggregation.
      sub_fields:
        entities: string — entity table name
        filter: string — optional condition
        group_by: string — field to group by
        count: boolean — count per group
        select: list — fields to include
        store_as: string — where to put results (in emit payload)
      execution_position: Before clear_gates. Pre-fetches cross-entity data into handler context for use by guard, compute,
        or on_complete.
    reduce:
      field: reduce
      type: object
      purpose: Combine accumulated items into a single value.
      sub_fields:
        items_from: string — source list
        operation: string — weighted_average | pick_or_average | sum | min | max | count
        params: object — operation-specific parameters
        store_as: string — entity field to store result
      execution_position: After filter, before count. Aggregates filtered items into a single value (weighted_average, sum,
        min, max, pick_or_average).
    filter:
      field: filter
      type: object
      purpose: Keep items from a list that match a condition.
      sub_fields:
        items_from: string — source list
        condition: string — expression per item
        store_as: string — entity field for result
      execution_position: After accumulate, before reduce. Prunes accumulated items based on CEL condition. Only matching
        items pass through.
    count:
      field: count
      type: object
      purpose: Count items matching a condition.
      sub_fields:
        items_from: string — source list
        condition: string — optional filter
        store_as: string — entity field for count
      execution_position: After reduce, before compute. Counts items (optionally matching a condition). Stores result in entity
        field.
    clear:
      field: clear
      type: object
      purpose: Bulk reset state tables.
      sub_fields:
        targets: list of state store names to clear
      retired_fields:
        target: RETIRED — use targets, including a one-item list for a single clear target.
      execution_position: After action or activity intent persistence. Last step. Resets accumulator state or specific entity
        field buckets. Distinct from clear_gates which runs before guard.
    action:
      field: action
      type: string or object
      purpose: 'Names a platform-provided action on a handler without rules or on a handler.rules[*] branch. Valid values:
        create_flow_instance, record_evidence, mailbox_write, artifact_repo_commit. The platform executes the named action.
        NOT for product actions — all behavior must be declarative.'
      emit_interaction: If the resolved runtime action instruction emits a follow-up event, that event uses the action-originated
        emitted-event payload rules under observation_model.emitted_events.payload_rules. The action field itself does not
        declare authored payload fields; runtime-owned action instructions construct and validate any follow-up payload.
      valid_values:
        create_flow_instance:
          description: Create a new dynamic flow instance. Duplicate resolved instance IDs fail closed; they are never updates
            or already-exists successes.
          required_sibling_fields:
            template: 'string — flow template ID (must be mode: template)'
            instance_id_from: string — payload field containing the unique instance ID
            config_from: object — maps instance variable names to supported handler context refs (`payload.*`, `entity.*`,
              and `event.*`). Platform resolves those refs from the canonical handler context and passes the values as config
              to the new flow instance.
        record_evidence:
          description: Append event payload to entity accumulator state.
          behavior: Reads the event payload and appends it as a new entry in the entity's evidence accumulator (from state_schema).
            Append-only — never replaces. Used for building an audit trail of signals, scores, or decisions.
          required_sibling_fields: {}
        mailbox_write:
          description: Deterministically materialize an authored mailbox request event into public.mailbox.
          required_mapping:
            action.id: mailbox_write
            action.mailbox: object — typed mailbox row declaration.
          mailbox_fields:
            item_type: expression value resolving to the mailbox item/review kind. Required. Normalized by lowercasing and
              replacing hyphen/dot with underscore.
            severity: optional expression value resolving to normal, urgent, or critical. Defaults to normal.
            summary: expression value resolving to human-readable row summary. Required.
            entity_id: optional expression value. Defaults to the triggering event entity_id when present.
            flow_instance: optional expression value. Defaults to the triggering event flow_instance when present.
            payload: optional mapping of payload/context fields to expression values. Only explicitly declared fields are copied;
              no implicit event payload pass-through occurs.
          behavior: Inserts a pending public.mailbox row inside the system-node handler transaction. source_event_id is the
            triggering event id. from_agent is the deterministic system node identity. item_id is deterministic for source_event_id
            and materializer node so duplicate/replayed node delivery does not create duplicate mailbox rows.
        artifact_repo_commit:
          description: Deterministically materialize service-owned typed file artifacts into a local git repository and expose
            an opaque artifact URL plus immutable git ref on the owning entity.
          required_mapping:
            action.id: artifact_repo_commit
            action.artifact_repo: object — typed artifact repository commit declaration.
          provider:
            v1: local_git only. Unsupported providers fail closed at decode/verify/runtime.
            product_surface: Consumers receive `swarm-artifact://...` URLs and 40-character git commit SHAs, not raw host paths.
          artifact_repo_fields:
            provider: string — must be local_git.
            repo_id: expression value resolving to the service-owned repository UUID. Required. This is the authoritative
              opaque repository identity; product concepts must not be encoded as platform identity fields.
            namespace: optional expression value resolving to a product-neutral isolation namespace. Defaults to the triggering
              event run_id when omitted. Only letters, digits, dash, underscore, and dot are allowed; traversal markers fail
              closed. The namespace partitions provider storage but is not semantic product identity.
            partition_key: optional expression value resolving to a product-neutral grouping key copied into the manifest.
              It may be used by consumers for indexing/debugging, but the runtime does not interpret it.
            display_slug: optional expression value resolving to a cosmetic debug label copied into the manifest/failure
              payload. It is never authoritative identity and must not affect provider storage paths. Path separators, traversal
              markers, and values with no letters/digits fail closed.
            request_id: expression value resolving to the business idempotency UUID. Required.
            author: optional expression value used for git author display only.
            provenance: optional mapping of product-owned provenance keys to expression values. Keys are copied under a
              manifest/failure `provenance` object and are not interpreted by the platform. Invalid keys fail closed.
            allowed_paths: list of repository-relative paths allowed for this service action. Required. Absolute paths and
              traversal are prohibited.
            files: list of `{path, content, content_type, schema, max_bytes}` entries. path and content are explicit expression
              values; content_type is yaml, markdown, or text. The resolved path must be allowlisted. yaml files must declare
              schema.type must be object; schema.required_fields names top-level keys that must be present before commit.
            limits: optional max_yaml_bytes, max_markdown_bytes, max_text_bytes, and max_repo_bytes.
            output: mapping of entity field names for repo_url, current_ref, file_manifest, status, failure,
              last_request_id, and last_source_event_id.
            success_event: optional event name emitted after runtime has produced a verified git ref and persisted the declared
              committed output fields. The event is action-owned readiness publication for the committed artifact result.
            success_payload: optional mapping of additional success event payload fields to expression values. Runtime always
              includes repo_id, namespace, request_id, source_event_id, repo_url, current_ref, file_manifest, provenance,
              and optional partition_key and display_slug when declared/resolved.
            failure_event: optional event name emitted transactionally with failed output state when runtime execution fails
              after request/source identity resolution.
            failure_payload: optional mapping of additional failure event payload fields to expression values. Runtime always
              includes repo_id, namespace, request_id, source_event_id, failure, provenance, and optional partition_key
              and display_slug when declared/resolved.
            result_payload_rules: 'success_payload and failure_payload are strict. Declared fields must resolve, must validate
              against the target event payload schema, and must not override runtime-owned result fields: repo_id, namespace,
              partition_key, display_slug, request_id, source_event_id, repo_url, current_ref, file_manifest, failure,
              or provenance. The target result-event schema must allow every runtime-owned field the action will emit and
              every required target field must be supplied by runtime-owned fields or declared result payload fields.
              Unsupported result-event declarations fail closed at verify/runtime.'
          behavior: The runtime normalizes file content, validates yaml content against the declared file schema, writes only
            allowlisted paths under the service-owned repo root, verifies the projected git tree stays within max_repo_bytes,
            commits staged files atomically, verifies the resulting ref is a 40-character git SHA, persists only the declared
            output fields on the selected/owned entity, and when success_event or failure_event is declared writes the result
            event to the runtime outbox in the same handler transaction as the corresponding output state. Result events are
            dispatched only after that transaction commits. Duplicate replay for the same source_event_id is a no-op only when the
            contract-visible committed output state is already present and any declared success_event has been transactionally
            enqueued with that state; post-commit delivery failures are recovered through outbox replay rather than by
            re-mutating the artifact output fields. Reusing a request_id with the same content/tree may repair committed output
            state and publish the same success readiness event; reusing a request_id with different content fails closed and
            may publish failure_event when declared. Content hashes are diagnostic and do not replace request/source idempotency.
            The public artifact URL is product-neutral
            (`swarm-artifact://repos/<repo_id>`). The local-git provider path is product-neutral, collision-safe by repo_id,
            scoped below the runtime artifact root defined by `runtime_storage.artifact_root`, and must not encode
            product-specific path segments.
          operation_state: The selected/owned entity is the contract-visible operation/ref ledger surface for V1. The service
            contract must declare the output fields it wants persisted; status is committed or failed, failure records the
            canonical platform.failure/v1 envelope when present, and current_ref updates only after git commit/ref verification succeeds.
            Provider history must record every accepted request_id and content/tree identity durably enough to reject historical
            request-id conflicts after intervening commits, including accepted same-tree/no-op requests. If git history contains
            the accepted request but entity output persistence is missing or stale, retry reconstructs and persists the
            contract-visible repo_url, current_ref, file_manifest, status, and last_source_event_id from durable provider history.
            If failure_event is declared, the runtime also enqueues that typed event in the same transaction as failed status.
          durable_activity_disposition:
            current_owner: >
              This action remains the canonical platform owner for artifact repository commits. Authors request
              artifact repository writes through `action.id: artifact_repo_commit`; durable `activity` is not an alternate
              authoring, verification, dispatch, replay, or result-event path for artifact commits in the current platform.
            activity_non_owner_paths: >
              `artifact_repo_commit` is not callable as a platform_builtin, MCP, native/generated,
              shell, product-local git, or HTTP-tool activity. Those paths must fail closed or remain different semantic
              concepts; they do not prove artifact commit support.
            migration_blocker: >
              Generic durable activities currently execute only read_only authored HTTP tools. idempotent_write
              and non_idempotent_write activities remain non-executable until a stable activity attempt/result journal and
              idempotency execution owner are specified and implemented.
            future_migration_condition: >
              A separately gated migration may rebind artifact repository commits to a built-in
              activity only if it preserves the current provider/root/path allowlist, schema/size/ref validation, provider
              request history, output-state repair, and success/failure result-event guarantees in the same merge-bearing
              spec/runtime/verifier PR.
          fail_closed: Invalid provider, missing or non-UUID identities, invalid root, traversal, symlink/root escape, allowlist
            miss, unsupported content type, missing/failed yaml schema validation, size-limit violation, git write/commit failure,
            invalid ref, and idempotency conflict all fail closed. No agent prompt, native_tools, shell command, or product-local
            git syntax may bypass this action.
    activity:
      field: activity
      type: object
      purpose: >
        Declares a durable, node-owned external tool call. The handler transaction persists the activity intent as a
        platform.activity_requested event before commit; the tool call executes only after the transaction commits and after
        the entity lock is released. Activity outcome is reported by generated typed result events, not hidden runtime-only
        state.
      minimal_form:
        tool: string — authored tools.yaml tool id
        input: object — maps tool input field names to the same expression value grammar used by emit.fields
      generated_result_events:
        naming: <flow>.<activity_id>.succeeded and <flow>.<activity_id>.failed. If activity.id is omitted, the platform derives
          a stable id from node id, handler event key, selected rule identity when present, and tool id.
        materialization: Generated result events are contract-derived, visible in the resolved event catalog, schema registry,
          verifier output, and effective node produces. They are not authored in events.yaml. The verifier MUST reject any
          generated result-event name that collides with an authored event or another generated activity result event after
          event-name normalization.
        success_payload: activity_id, tool, effect_class, attempt, result. The result field is shaped by the tool output_schema.
        failure_payload: activity_id, tool, effect_class, attempt, failure (required platform.failure/v1 envelope).
      durable_request_event:
        event_name: platform.activity_requested
        owner: platform_events.catalog["platform.activity_requested"]
        behavior: The request event is generated by the handler transaction, persisted through the canonical outbox before
          commit, and consumed by the workflow runtime after commit. It is the replay/recovery owner for starting the external
          activity call; diagnostic runtime_log rows are non-authoritative. Generated result event ids are stable for the
          request identity and generated result event type. Before any external tool call, the workflow runtime MUST check the
          canonical event store for either stable generated result event id for that request identity. If a success or failure
          result event is already recorded, duplicate delivery, replay, and crash recovery MUST reuse the recorded result and
          MUST NOT call the external tool again for the same request identity.
      supported_tool_sources:
        authored_http_tools: Required Stage 1 supported surface for read_only activity execution and for non_idempotent_write
          activity execution when the activity_attempts journal owns provider-attempt truth. The tool must be declared in
          tools.yaml or imported as a connector pack, resolve to handler_type http, and include an http block. read_only
          tools may retry under the read-only retry policy. non_idempotent_write tools must check the existing
          activity_attempts row for the request identity and, when loop-owned, atomically compare the loop generation and
          insert/read activity_attempts.started before credential resolution or outbound preparation. It must not automatically retry or re-dispatch once an attempt
          may have reached the provider, and may consume static credentials through the existing credential-store/import-
          boundary owner or managed credentials through `tool_model.managed_credential_store` when the tool is a
          provider_connector. Missing static or managed credentials fail before provider dispatch. HTTP tools using
          response_success are admitted as a provider response success predicate and fail the activity when the predicate
          is false or unresolved. HTTP tools using response_mapping, rate_limit, or rate_limit_max_wait are not admitted to
          activities in Stage 1; those subfeatures require later owner consumption before activity execution may claim them.
        platform_builtin: Not callable from activity in Stage 1; fail closed. This includes `artifact_repo_commit`, which
          remains action-owned under `handler_fields.action.valid_values.artifact_repo_commit` until a separately gated
          write-effect activity migration preserves that action's artifact safety and idempotency guarantees.
        mcp: Not callable from activity in Stage 1. MCP-discovered/self-described effect classes are not authoritative; an
          authored registration-site override is required in a future slice before MCP tools can be activity-callable.
        native_or_generated_tools: Not callable from activity in Stage 1; fail closed.
        credentialed_http_tools: Static credentials are admitted only for authored HTTP non_idempotent_write activities and
          only through the existing credential-store/import-boundary owner. Managed credentials are admitted only for
          non_idempotent_write provider_connector HTTP activities and only through `tool_model.managed_credential_store`.
          Static and managed credential values must not appear in logs, result payloads, readback, capability output, or
          errors.
      effect_classes:
        read_only:
          retry_default: max_attempts 3, exponential backoff
          fork_default: reexecute_read
        idempotent_write:
          stage_1_execution: Not executable in Stage 1; split until stable activity attempt/result journaling and idempotency
            execution ownership are specified and implemented.
          retry_default: max_attempts 2, exponential backoff
          fork_default: reuse_recorded_result
        non_idempotent_write:
          stage_1_execution: Executable only for authored HTTP tools, with optional static credentials or managed
            credentials for provider_connector tools, when the activity_attempts journal is available. The runtime must
            consume or atomically claim the row on duplicate/redelivered request events before credential resolution or provider preparation,
            insert the started attempt row before resolving credentials and before outbound dispatch,
            update the row with succeeded, failed, or uncertain terminal state after the outcome, and consume the row on
            duplicate/redelivered request events before deciding whether dispatch is allowed. Any existing started,
            uncertain, succeeded, or failed row blocks automatic provider re-dispatch and managed credential refresh.
          retry_default: max_attempts 1, no retry
          fork_default: require_manual_confirmation
        long_running: Split to a later resume/cancel/journal slice; fail closed in Stage 1.
      interactions:
        with_action: PROHIBITED. action and activity are mutually exclusive for the selected handler path.
        with_emit: PROHIBITED in Stage 1. Use generated activity result events instead. Immediate authored emit+activity ordering
          is intentionally not defined in this slice.
        with_rules: A top-level handler activity is allowed only when the handler has no rules. In a rules handler, activity
          must be declared on the selected handler.rules[*] branch. on_complete and accumulator completion/timeout activity
          sites are not supported in Stage 1. Retired `handler.branch` syntax is unsupported for all handler semantics,
          including activity placement.
      execution_position: After emit.event/action selection point and before clear. The intent is persisted inside the handler
        transaction; tool execution and generated result publication occur after commit and outside the entity lock.
    retired_fields:
      description: Legacy handler fields retired by the structured handler grammar.
      rule: These fields are retired compatibility syntax, not alternate current-contract forms.
      entries:
      - "`emits` — retired; use `emit`"
      - "`payload_transform` — retired; move payload ownership into `emit.fields` at the active emit site"
      - "`handler.branch` — retired; use `rules` for handler-phase branch selection"
      - "`fan_out.emit_per_item` — retired; use `fan_out.emit`"
      - "`fan_out.emit_mapping` — retired; no direct replacement in the current fan_out model. Use a single `fan_out.emit` and route before or after fan-out if per-item event-name branching is required."
      - "top-level handler `completion_rule` — retired; it had no production interpreter"
      - "top-level handler `policy_ref` — retired; use `guard.policy_ref` only"
      - "loop counter guards `revision_count_below_limit` and `inner_revision_count_below_limit` — retired; use `loops:`"
      - "clear targets `cycle_counters` and `cycle_index` — retired; loop activation owns attempt state"
      - "`fan_out.target` — retired; `fan_out.emit` routes through ordinary emit target semantics or, for composed pin-declared outputs, through output pin plus parent connect route authority."
    clear_gates:
      field: clear_gates
      type: boolean
      purpose: Reset all entity gates to false. Used before re-entering a validation cycle.
      scope: 'Clears all gates on the ENTITY, not scoped to flow schema or node. An entity has one flat gate map. clear_gates:
        true resets every key in that map to false. Rationale: gates are entity-level state. A flow that resets an entity
        to an earlier phase (e.g., review.rejected returning to draft) must clear all gates, not just the ones
        its node declared.'
      limitation: 'All-or-nothing. Selective gate clearing (clear_gates: [gate_a]) is a potential v1.3 feature.'
    evidence_target:
      description: Specifies which accumulator key the evidence is appended to when action is record_evidence. If omitted,
        defaults to the node ID. Explicit declaration is recommended for clarity.
      type: string
      example: build_evidence
  expression_context:
    description: 'Defines the namespaces available in CEL expressions used in guard.check, on_complete.condition,
      rules.condition, data_accumulation.expression, and filter.condition. Each namespace resolves to a specific
      data source. Declared entity fields are universally readable at a type-valid value; undeclared field references
      are contract errors.'
    namespaces:
      entity:
        resolves_to: 'Declared business fields for the current entity. entity.X reads entity_state.fields->>X
          only when X is declared by the active entity contract.'
        populated_by: 'data_accumulation writes, compute.store_as, sets_gate, advances_to, save_entity_field
          (agent tool), and create_entity (initial field population).'
        read_model:
          declared_fields: Every declared entity field is readable with either an explicit initial value or the field's type default.
          undeclared_fields: Referencing an undeclared entity field is a contract error. Legacy platform metadata reads such as entity.current_state, entity.gates, entity.entity_id, entity.flow_instance, entity.revision, entity.created_at, entity.updated_at, entity.entity_type, entity.workflow_name, and entity.workflow_version are invalid unless the field name is declared as business data; use _entity for supported platform metadata.
          presence_checks: has(entity.X) and == null / != null comparisons are valid, but they are not required for declared fields.
        does_NOT_include: 'Accumulated items. Dimension scores, fan-out results, and other per-item data
          collected by the accumulate handler step are NOT promoted to entity fields automatically. They exist
          only in the accumulator. To reference them in post-accumulation conditions, use the accumulated namespace.
          To persist a strict typed downstream copy, declare an entity field materialize_from; the runtime projection
          step owns that write.'
      _entity:
        resolves_to: 'Read-only platform metadata/control for the current entity. Supported fields are _entity.id,
          _entity.current_state, _entity.flow_instance, _entity.gates, and _entity.gates.<name>.'
        read_model:
          id: Canonical current entity id. This replaces legacy platform reads through entity.entity_id.
          current_state: Current lifecycle state owned by the flow state machine.
          flow_instance: Current flow-instance path for the entity context.
          gates: Read-only map of platform gate booleans; dot access is supported for simple gate names and bracket access is used for gate names containing separators.
          unsupported_fields: '_entity.entity_id, _entity.entity_type, _entity.workflow_name, _entity.workflow_version, _entity.run_id, _entity.fields, _entity.accumulator, _entity.entered_state_at, _entity.revision, _entity.created_at, _entity.updated_at, and _entity.name are not exposed. revision, created_at, and updated_at must not remain readable through undeclared entity.* platform fallback.'
        write_model: Read-only. Handler writes and entity tools may not target _entity. Emit payload construction may read _entity; select_entity/select_or_create_entity keys may not use _entity as a source-authority bypass.
      accumulated:
        resolves_to: 'The items array from the current handler''s accumulate step. Each item is a JSONB object
          representing one accumulated event payload. Available only in on_complete conditions and filter
          expressions — these run after accumulation completes.'
        usage: 'accumulated.filter(d, <condition>) — filter items by predicate. accumulated.size() — count items.
          accumulated.map(d, d.field) — extract field values. Item fields match the inbound event payload fields
          (e.g., d.dimension, d.score, d.tier for score.dimension_complete).'
        not_available_in: 'guard.check — guards run before accumulation. data_accumulation.expression — runs
          before accumulation. rules.condition — rules are an alternative to on_complete, not used after
          accumulation.'
        projection_boundary: |
          `materialize_from` consumes accumulated items through the source
          named type's typed view. Runtime accumulator metadata and event
          payload extras outside the source named type are stripped before
          writing the entity field and are not addressable as `source.*`.
      fan_out:
        resolves_to: 'Handler context produced by the fan_out step. fan_out.count is the number of items
          that were dispatched. Populated after fan_out executes, before data_accumulation. fan_out.index is
          scoped to fan_out.emit.fields only.'
        available_in: 'data_accumulation.expression — the canonical way to write fan_out results to entity
          state. Example: expression: fan_out.count writes the dispatch count to an entity field for
          downstream accumulation tracking (expected_from: entity.search_expected_count).'
        not_available_in: 'guard.check — guards run before fan_out. on_complete.condition — use entity
          fields written by data_accumulation instead.'
        usage_example: "data_accumulation:\n  writes:\n  - target_field: expected_count\n    expression:\
          \ fan_out.count"
      computed:
        resolves_to: 'Turn-scoped derived handler values written by compute-owned operations. Public authors may read
          computed.* in rule conditions and expression-value surfaces after the value has been produced by the handler
          dependency graph.'
        populated_by: 'compute.store_as targets under computed.*, policy-sheet lookup value rows lowering to internal
          compute lookup plans, policy-sheet validate value rows lowering to internal compute validation plans, and
          policy-sheet compute_module value rows lowering to internal deterministic module execution plans.'
        persistence_model: 'Read/write handler context only. computed.* is not persisted entity state, not event payload,
          and not replay authority unless a separate declared owner explicitly writes a computed value to a durable surface.'
        available_in: 'rules.condition, emit.fields CEL expressions, mailbox/action expression values, activity inputs,
          fan_out inputs, and query_entities scoped operands when the runtime context contains the value.'
        not_available_as: 'lookup.into may write computed.*; validate.into may write computed.validation.*; compute_module.into
          may write computed.*; entity.* durable cache fallback for lookup, validation, or module values is forbidden.'
      payload:
        resolves_to: 'The inbound event payload. payload.X reads the X field from the triggering event''s
          JSONB payload.'
      event:
        resolves_to: 'The runtime-owned triggering event envelope/context. event.X reads the supported
          platform-populated event context fields supplied by the runtime.'
        available_in: 'rules.condition and other handler expression surfaces when the runtime supplies current
          event context. event.* is read-only handler context, not payload.'
        read_model:
          supported_top_level_fields: 'event.id, event.type, event.trigger_event_type, event.source_agent, event.task_id, event.source, event.target, event.target_set, event.source_event_id, event.emitted_at, event.current_state, event.run_id, and event.scope.'
          route_identity_fields: 'event.source.entity_id, event.source.flow_instance, event.source.flow_id, event.target.entity_id, event.target.flow_instance, and event.target.flow_id are supported route identity reads. event.target_set is a list of route identities; it is not a selector and is not a top-level receiver projection.'
          unsupported_fields: 'Top-level event.entity_id and event.flow_instance are unsupported legacy receiver-context projection shorthands. Use _entity.id / _entity.flow_instance for current receiver context, event.source.* for emitter route identity, event.target.* for singular receiver route identity, and event.target_set for fan-out recipient route identities.'
          source_authority: 'select_entity and select_or_create_entity keys may not use event.*, _entity.*, or payload-owned envelope fields as a source-authority bypass.'
      policy:
        resolves_to: 'The merged policy context. policy.X reads the X key from the flow''s policy.yaml
          (or root policy.yaml if not overridden at flow level), excluding typed policy sections such
          as criteria:, validation:, and modules:. policy.criteria, policy.validation, and policy.modules are not generic
          expression roots.'
    boot_validation:
      description: 'The platform MUST validate entity field references at boot against the declared entity contract.
        Declared entity fields are always readable; the boot check is declaration and type resolution, not sparse-field
        initializer proof.'
      checks:
        declared_field_resolution: Every entity.X reference must resolve against the inferred entity contract.
        nested_type_resolution: Nested paths must resolve through named types to a declared field.
        filter_leaf_rule: query_entities filter paths must resolve to scalar or enum leaves.
        query_operand_rule: query_entities operands with supported scopes (entity, event, payload, policy, computed, fan_out)
          are validated as scoped operands; unsupported scoped roots are invalid. Runtime evaluation fails closed
          when a supported scoped operand is unavailable in the handler context.
      rule: 'For every entity.X used as a value, X must be declared on the inferred entity contract. Universal
        presence semantics provide the runtime value via explicit initial or type default. Dynamic writes remain
        relevant for business meaning, but not for raw field readability.'
      severity: error (boot fails)
      example_violation: 'A guard references entity.build_complexity, but the inferred entity contract does not declare
        build_complexity. Correct usage is to declare the field on the entity contract or stop reading it.'
  node_specification:
    node_fields:
      description: Top-level fields on a system node declaration.
      required:
        event_handlers: map of event_name → handler declaration
      optional:
        id: string — migration spelling for the node identifier; if omitted, the YAML map key is the effective node id.
          If present as a plain value, it must exactly match the YAML map key. Existing rendered runtime-id templates such
          as node-key-{instance_id} are subscriber naming templates, not a separate semantic node identity owner.
        execution_type: string — if omitted, defaults to "system_node"; any explicit non-system_node value is invalid.
        subscribes_to: list of event names this node receives. Exact handler-triggered subscriptions are derived from
          event_handlers keys when omitted. Accumulator timeout delivery is platform-owned; handlers with timeout-mode
          accumulate or accumulate.on_timeout derive the intrinsic accumulate.timeout runtime subscription. Wildcard/import-boundary
          escape-hatch subscriptions remain explicit.
        produces: list of event names this node emits. Omit for ordinary nodes; the effective production surface is derived
          from supported declarative emit sites. If present, this is an explicit authored assertion checked against actual
          emits.
        description: string — human-readable description
        state_schema: map — fields the node persists per entity (accumulator state)
        state_table: string — table name for node state persistence
        timers: legacy/kernel timer declarations (see timer_model). Staged lifecycle
          timer authoring for flows using `stages:` is owned by
          `stages.<stage>.timers`, not node-level state timers.
        gate_state: map — gate field definitions for this node (boolean flags on entity)
      effective_semantics:
        id: YAML map key, with same-value explicit id accepted during migration
        execution_type: system_node
        runtime_subscriptions: union of explicit subscribes_to entries, event_handlers keys, and intrinsic platform runtime
          events required by declared handler primitives such as accumulate.timeout
        produces: events derived from supported declarative emit sites
    description: Complete specification for system nodes — the deterministic components that orchestrate state transitions.
      Every field used in nodes.yaml must be defined here.
  dependency_rules:
  - 'query → clear_gates: cross-entity data fetched before any state evaluation'
  - 'clear_gates → guard: gates reset before guard reads them'
  - 'guard → accumulate: guard must pass before accumulation is checked'
  - 'accumulate → filter: accumulated items available before pruning'
  - 'filter → reduce: pruned items available before aggregation'
  - 'reduce → count: aggregated result available before counting'
  - 'count → compute: all list processing complete before computation'
  - 'compute → emit-site selection: computed values from compute, lookup, validate, and compute_module value rows are written before rule/on_complete/timeout selection evaluates'
  - 'emit-site selection → advances_to: the selected rule/on_complete/timeout advances_to overrides handler-level advances_to when present; otherwise handler-level advances_to is the default'
  - 'emit-site selection → sets_gate: sets_gate is handler-level only; selected rule/on_complete/timeout entries do not declare or override sets_gate'
  - 'emit-site selection → data_accumulation: selected rule/on_complete/timeout data_accumulation supplements handler-level data_accumulation in the same transaction; selected entry writes run before handler-level writes'
  - 'advances_to, sets_gate, data_accumulation: INDEPENDENT — no causal dependency, any order valid'
  - 'data_accumulation → projection: accumulator-to-entity materialize_from writes run after selected rule/on_complete/timeout writes'
  - 'projection → emit.fields: emit payload expressions observe projected entity fields'
  - 'emit.fields → emit.event: output payload constructed before event persisted'
  - 'emit.event → action: events persisted before platform actions execute'
  - 'action → clear: state cleanup runs last, after all side effects committed'
  core_vs_extensions:
    description: Most handlers use a small core subset. Advanced features are extensions.
    core_fields:
      description: Used by 90%+ of handlers. Learn these first.
      fields:
      - guard
      - advances_to
      - sets_gate
      - data_accumulation
      - emit
      - rules
      - on_complete
    extension_fields:
      description: Used by specialized handlers. Learn when needed.
      fields:
      - accumulate
      - compute
      - fan_out
      - filter
      - reduce
      - count
      - query
      - clear
      - clear_gates
      - action
  yaml_field_order: YAML field order within a handler is cosmetic. The engine executes fields per the dependency graph, not
    per source order. A handler may list on_complete before accumulate in YAML — the engine still runs accumulate first. Authors
    SHOULD order fields to match the dependency graph for readability, but the engine does not require it.
  rules_handler_interaction:
    description: When a handler has rules, the active rule owns conditional emit and action selection for that execution.
    execution_order: |
      1. rules execute first — the matching rule determines the active condition-specific side effects (rule-level
      emit, action, data_accumulation, advances_to). 2. Handler-level data_accumulation executes AFTER rules when present and
      supplements rule-level writes in the same atomic transaction. 3. Bare handler-level emit and handler-level action do NOT
      supplement rules. If rules are present, bare handler-level emit or handler-level action is invalid and boot fails as
      ambiguous, except for the explicit rules emit template specialization where handler-level emit supplies the event/shared
      field template and the matched rule contributes eventless fields to one effective emit. 4. Explicit on_success.emit
      supplements rules as a distinct additive success emit: the selected rule emit or template-specialized emit is queued first
      and on_success.emit second; if no rule matches, only on_success.emit is queued. 5. The selected rule action
      executes at the normal action step after active state/gate/data updates and selected emit queuing, and remains in the same
      system-node handler transaction as those side effects.
    example: 'order.received may have handler-level data_accumulation (3 fields) + rules with per-rule data_accumulation (category_data).
      Result: all 3 handler-level fields are written, PLUS the matching rule writes category_data. Event emission, however,
      and action must be owned by the matching rule or by the explicit rules emit template specialization.'
    side_effect_resolution:
      advances_to: Handler-level advances_to is the default transition target. A matched rule with a non-empty advances_to
        overrides the handler-level target for that execution only.
      sets_gate: sets_gate is handler-level only in the supported handler/rule vocabulary. Rules, on_complete entries,
        and accumulate.on_timeout entries do not declare or override sets_gate.
      data_accumulation: Handler-level data_accumulation supplements the selected rule/on_complete/timeout data_accumulation in
        the same atomic transaction. Selected entry writes run before handler-level writes. This is additive composition,
        not default/override precedence.
      emit_and_action: Bare emit and action never fall through from a handler into a rules-based multi-emit/action handler.
        The only handler-level emit exception is rules emit template specialization, where handler-level `emit.event` and
        shared `emit.fields` are inherited by the matched rule's eventless `emit.fields` and produce exactly one effective
        emit. Explicit on_success.emit is additive only as a second distinct success event.
engine:
  description: Specification for the platform engine — how it loads, validates, and executes flows.
  flow_tree_walker:
    description: Recursive discovery of flows from the root package.yaml. The walker collects all flows into a flat registry.
      Validation happens after collection.
    algorithm:
    - 1. Start at root directory. Read package.yaml.
    - '2. Register this flow: record its directory, package manifest, and all contract files present.'
    - '3. For each entry in package.yaml flows: list, resolve child directory: {current_dir}/flows/{child.flow}.'
    - 4. If child directory exists and contains package.yaml, recurse from step 1 with child directory.
    - 5. If child directory missing or no package.yaml, log warning and skip.
    - 6. Track visited directories. If already visited, skip (prevents infinite loops from duplicated copies).
    - '7. Stop when depth exceeds 99. Log: "Flow nesting depth exceeded 99 — contact platform team."'
    minimum_required_files:
      always_required:
      - package.yaml
      - schema.yaml
      at_least_one: No agent file is required for an agent-free flow; flows/ remains optional composition.
      boot_error: Missing agents.yaml is not a boot error by itself. It is invalid only when the flow declares or depends on agents without corresponding agent entries.
    optional_files:
      nodes.yaml: System node handlers. Omit if flow only composes children via agents.
      events.yaml: Event payload schemas. Omit if flow uses only events declared by children or root.
      tools.yaml: Flow-specific tools. Omit if flow uses only root-level or platform tools.
      policy.yaml: Flow-specific thresholds. Omit if flow uses only root-level policy.
      prompts/: Agent prompts. Required if agents.yaml exists.
    output: 'A flat list of FlowEntry records. Each record contains: flow ID, directory path, depth, parent flow ID, package
      manifest, and paths to all contract files found. This flat list is the input to the contract merger (next step).'
    max_depth: 99
    duplicate_handling: Flows may be duplicated (same flow directory copied into multiple parents). Each copy is a separate
      flow instance. No deduplication. No DAG resolution. The walker treats each directory as independent.
    flow_id_uniqueness: 'Flow IDs (from package.yaml flows: list) must be unique within the entire tree. Duplicate flow IDs
      across different parents is a boot error.'
  uri_addressing:
    description: 'Every addressable runtime entity (node, agent, event) is identified by a path. Paths follow a simple hierarchical
      model: slash means navigating into a child flow. No slash means local to the current flow.'
    rules:
      local:
        format: '{name}'
        meaning: Entity in the current flow instance.
        examples:
        - order.processing_requested
        - classifier-agent
        - ticket-router
      absolute:
        format: '{flow_id}/{flow_id}/.../{name}'
        meaning: Entity in a specific flow instance. Path navigates from root.
        examples:
        - intake/order.ready — intake flow's event
        - processing/review/review.completed — nested sub-flow event
        - fulfillment/shipper-agent — agent in fulfillment flow
        - dashboard-node — root flow's node (no slash = root-local)
    resolution: Slash presence determines scope. No slash = local to current flow. Slash present = absolute path from root.
      Local names never contain slashes. The platform resolves all references to full internal paths at boot.
    type_inference: 'No type suffix needed. The context determines the type: subscriptions and emit_events contain events.
      Message targets contain agents. subscribes_to in nodes contains events. The type is implicit from where the reference
      appears.'
    full_uri:
      description: 'For cross-root references (future — multiple root flows on one platform), full URI format is available:
        {root}://{path}/{name}. Within a single root flow, absolute paths are sufficient.'
      format: '{root}://{path}/{name}'
      example: myapp://intake/order.ready
      when: Only needed when multiple root flows run on the same platform instance.
  event_identity:
    description: 'Canonical event identity model. An event has multiple projections depending on context.
      The platform MUST use a single resolver module for all identity operations — contract loading,
      route derivation, boot verification, handler lookup, emit authorization, and tool generation.'
    projections:
      local_name: 'The event name as declared in events.yaml and handler keys within a flow.
        No slashes. Examples: vertical.shortlisted, score.dimension_complete.'
      external_name: 'The flow-qualified event name as seen by other flows and the event bus.
        Format: {flow_id}/{local_name}. Examples: scoring/vertical.shortlisted, validation/research.completed.'
      root_name: 'Events emitted at root level (no flow scope). Same as local_name — no prefix.
        Examples: scan.requested, vertical.resumed, system.started.'
      source_route: 'The emitter route identity on the envelope: source.flow_instance plus source.entity_id.
        This is lineage and audit identity, not delivery identity.'
      target_route: 'The resolved delivery route identity on the envelope: target.flow_instance plus target.entity_id.
        This is receiver context and publish-time narrowing identity.'
      target_routes: 'The resolved fan-out delivery route identities on the envelope: target_set[].flow_instance plus
        target_set[].entity_id. This is the concrete multi-recipient target representation for allow_fanout:true.'
    resolution_rules:
      contracts_always_local: 'Node subscribes_to, handler keys, agent subscriptions within a flow,
        and event definitions in events.yaml always use local names. No flow prefixes in contract
        authoring except for explicit cross-flow escape hatches.'
      bus_always_external: 'The event bus stores and routes events using external names. An event
        emitted by a node in the scoring flow is stored as scoring/vertical.shortlisted in the events
        table.'
      handler_lookup_localizes: 'When the runtime delivers an external event to a node, it MUST
        localize the event name before looking up the handler. Localization matches against the target
        node''s declared local interface — input pins, subscribes_to entries, and handler keys. This
        applies to both pin-auto-wired events and explicit scoped subscription escape hatches.
        Example: scoring/vertical.shortlisted → vertical.shortlisted when delivered to a validation
        node that declares vertical.shortlisted in any of those surfaces.'
      root_events_are_global: 'Events emitted at root level have no flow prefix. They can be routed
        to flows that declare them as input pins or have agents/nodes subscribing by local name, but pin-declared root emits
        still obey the target/broadcast rules in engine.cross_flow_routing.'
    canonical_resolver: 'The platform MUST provide a single resolver module used by all subsystems:
      Localize(flowID, eventName) → local name. Externalize(flowID, eventName) → external name.
      Match(pattern, eventName) → bool. ResolveInputAlias(flowID, eventName) → local handler key.
      No subsystem may implement its own name resolution logic.'
  cross_flow_routing:
    description: 'Composition-first pin routing is the canonical cross-flow routing surface. Parent package
      connect entries own inter-flow delivery topology, output pins declare the event identity being produced,
      input pins declare the receiver address resolution contract, and the analyzer lowers the connection into
      concrete route-plan facts. For pin-declared outputs, the platform routes by resolved source/target
      identity, not by unconstrained event-type broadcast.'
    canonical_owner: platform-spec.yaml#flow_model.flow_package.composition_routing
    implementation_status: source_authority_promoted_eventbus_dispatch_partial
    activation:
      rule: Pin routing activates when the emitter flow declares the emitted event in schema.yaml pins.outputs.events and the
        event is admitted through a valid lowered parent connect route, explicit dynamic target escape hatch, structural
        ParentRoute fallback when no lowered connect route applies, eligible static child delivery-entity route, or explicit
        broadcast escape hatch.
      no_separate_flag: The output pin declaration is the activation switch.
      ad_hoc_emits: Events not declared in the emitter flow's output pins remain ordinary event-loop emits.
      aggressive_day_one: Pin routing is the default for pin-declared outputs; implicit event-type broadcast is not a compatibility mode.
    auto_wiring:
      status: safe_inference_only
      description: 'At boot, the platform validates parent connect topology and may infer same-name wiring only when the
        inference is unambiguous and lowers to the same concrete route-plan facts as an explicit connect:
        1. For each flow, collect pins.outputs.events.
        2. For each flow, collect pins.inputs.events.
        3. Match local event names across output and input pins only as an inference candidate, not as topology authority.
        4. Preserve local handler lookup by local event name in the target flow.
        5. Persist or expose the lowered parent-connect route facts; do not treat a topology match as permission to broadcast
           to every instance.'
      ambiguity: 'If an input pin event name matches output pins from multiple flows, boot MUST fail
        unless the parent connect, alias/adapter, scoped subscription escape hatch, or explicit target escape hatch
        disambiguates the route.'
      static_pairs: Static-to-static pairs may resolve to a single instance pair at boot.
      template_pairs: Template or dynamic-instance pairs require lowered parent connect route facts from producer output
        key/carries plus receiver instance.by for normal same-name instance-key routing, explicit addressed input-pin
        descriptor routing for approved addressed surfaces, or an explicit dynamic target escape hatch at emit/publish
        time. Structural ParentRoute binding is only a child-to-parent fallback when no lowered connect target applies.
    reply_resolution:
      status: runnable_v1
      description: Receiver-declared request/reply routing returns one terminal provider result to the exact route that
        emitted the paired request. The runtime carries this authority as opaque route-scoped delivery context; business
        payload, event envelope, source lineage, flow-instance metadata, requesting_agent, and task_id are never routing owners.
      authoring:
        request_output:
          shape: 'pins.outputs.events[] {name: provider_requested, event: provider.requested, carries: [provider_request_id]}'
          correlation: The optional correlation_key must name one declared scalar carried key on this output pin.
        reply_input:
          shape: 'pins.inputs.events[] {name: provider_replied, event: provider.replied, resolution: {mode: reply, replies_to: provider_requested, correlation_key: provider_request_id}}'
          replies_to: Required. Names exactly one output pin on the same requester flow.
        topology: Parent connect must contain exactly one request edge from the paired requester output to one provider
          counterpart and exactly one response edge from that same counterpart to the reply input.
        default_correlation: Stable request event id when correlation_key is absent.
      lowering:
        owner: runtime/core/pinrouting.ConnectRoutePlan.ReplyResolution
        result: One typed request role and one typed response role share requester pins, provider pins, and optional correlation key.
        ambiguity: Missing pins, undeclared carried keys, multiple request counterparts, multiple response counterparts,
          or different provider counterparts are hard boot invalidities.
      delivery_context:
        type: 'events.DeliveryContext{Reply: *ReplyContextRef{ID string}}'
        scope: One delivery route. It is installed independently for each node/agent route and is omitted from EventEnvelope JSON.
        creation: Request publication creates the full reply_contexts row in the same typed event mutation after the request
          event exists and before provider delivery commits. Recipient preflight computes the deterministic id but performs no write.
        identity: Deterministic from request event, paired topology, and normalized origin route. Logical resolution identity
          is (origin_instance_id, request_correlation_id) within the paired topology.
        consumption: Only publication through the declared provider reply output consumes the ref and terminally claims it.
      continuation_carriers:
        ordinary_emit: EmitIntent.Context and route-aware EventBus publish preserve the ref.
        activity: ActivityIntent.Context and activity_attempts.reply_context_id preserve the ref across request, provider call,
          journal readback, and result publication.
        timer: TimerIntent.Context and timers.reply_context_id preserve the ref for one-shot schedules; recurring schedules
          carrying an open reply context fail closed.
        child: FlowInstanceActivationRequest.Context preserves the ref through activation, child input/auto-emit, and completion;
          no instance-global metadata copy is permitted.
        mailbox: mailbox.reply_context_id is populated by system mailbox_write and agent mailbox_send. Defer and terminal
          decision updates restore it into the transactional decision-event publication context and do not claim the reply.
        human_task: human_task_request stores source_event_id, flow_instance, and mailbox.reply_context_id. Defer and final decision outcomes
          are produced from the locked durable row in the same mutation, restore the ref independently of requesting_agent/task_id,
          and do not claim the reply.
      persistence:
        owner: store.ReplyContextStore
        backends: [postgres, sqlite]
        full_record: reply_contexts owns request/topology/origin/correlation/lifecycle/accepted-event facts.
        durable_refs: [event_deliveries.delivery_context, activity_attempts.reply_context_id, timers.reply_context_id, mailbox.reply_context_id]
        rule: Durable consumers store only the opaque reply_context_id.
      terminal_claim:
        explicit_correlation_validation: When correlation_key is declared, the provider reply MUST carry the same non-empty
          scalar value persisted from the paired request. A missing or unequal response value fails closed as
          platform.stale_arrival before origin resolution or terminal claim, persists no requester delivery, and leaves the
          reply context open.
        first_reply: Atomically changes open to terminal and records accepted_reply_event_id.
        accepted_replay: The same reply event id is idempotent and reuses its persisted delivery.
        distinct_second_reply: Fails closed as platform.reply_already_terminal and names the accepted/rejected event ids.
        missing_or_closed_origin: Fails closed as platform.stale_arrival; no create, broadcast, source, or payload fallback is allowed.
        mailbox_and_human_decisions: Non-terminal provider continuation events; they preserve but never consume the claim.
      replay_and_fork:
        restart: Event deliveries and continuation rows restore refs only from their typed columns.
        same_run_replay: Uses the persisted delivery route context; it does not reconstruct reply identity.
        timestamp_fork: A source run with an open reply context at the selected frontier fails closed with
          open_reply_context_unsupported. The context is never copied or reopened in the fork.
      observability:
        graph: Generated connect route plans expose both request and response roles and name the paired request/reply/provider pins.
        trace: run.trace exposes reply_context_id from event_deliveries.delivery_context for platform debugging; business payload remains unchanged.
    target_resolution:
      precedence:
      - lowered parent connect route plan
      - explicit emit target escape hatch
      - structural ParentRoute for child-to-parent pin outputs
      - receiver-side select_entity/select_or_create_entity late binding for external or mixed-provenance no-target events
      - source fallback for explicit broadcast or legacy external paths
      explicit_target_escape_hatch: Producer target is only an exceptional dynamic-routing escape hatch. It must not be
        treated as the common parent-composed routing owner and must not replace lowered parent connect as the common source
        authority for connected pins. target.flow/match from a loaded flow-scope producer, or from a package-root
        producer output pin consumed by explicit root connect authority, that selects a loaded package receiver input for
        the same pin-declared output or a receiver flow reached by the parent connect graph is illegal common-path
        composition routing, including when a parent connect or alias/adapter connect also exists.
      fail_closed: A pin-declared output that has no lowered parent connect route, no explicit target escape hatch, no structural
        ParentRoute, no eligible static child delivery-entity route, and no broadcast:true is invalid.
      no_silent_broadcast_fallback: Missing, malformed, ambiguous, or unreachable targets must fail with a typed reason.
    target_forms:
      sender: |
        `target: sender` copies the inbound event.source route identity into the new event.target.
        Sender is the immediate inbound sender. In a multi-hop chain A -> B -> C, C's target:sender resolves to B, not A.
      instance_id: |
        `target: { instance_id }` targets a specific child/template instance known to the producer. Parent-to-child routing
        is explicit because a parent can have many children of the same flow type.
      flow_match: |
        `target: { flow, match }` resolves target.flow plus declared entity-field matches to exactly one target instance.
        Zero matches and more than one match fail closed at publish time. From loaded flow-scope producers, or package-root
        producers whose output pin is consumed by explicit root connect authority, it is forbidden as package-internal composition
        routing when target.flow has a receiver input for the same pin-declared output event or is reached by the parent
        connect graph; parent connect owns that route.
      flow_match_allow_fanout: |
        `target: { flow, match, allow_fanout: true }` is the explicit dynamic fan-out escape hatch for flow/match targeting.
        It permits more than one matched recipient. Parent-authored fan-out should use connect topology. Publish-time
        resolution materializes event.target_set as the concrete ordered recipient route list, leaves singular event.target
        absent on the persisted event, and persists one delivery target per recipient. It is not valid as a compatibility
        surface for package-internal fan-out that parent connect/broadcast lowering can express. The authored flow/match
        selector is not the persisted routing authority after resolution.
      broadcast: |
        `broadcast: true` is the producer-authored explicit opt-out escape hatch for pin-declared output routing. It leaves
        event.target absent and uses the ordinary no-target event-type delivery path. Parent-authored broadcast/fan-out should
        use connect topology and lower to concrete route-plan facts. From loaded flow-scope producers, or package-root
        producers whose output pin is consumed by explicit root connect authority, broadcast:true is forbidden when it functions as
        package-internal delivery to loaded receiver input pins for the same pin-declared output or connected output pin.
    structural_binding:
      precedence_guard: Structural binding is lower precedence than lowered parent connect and the explicit target escape
        hatch. It may write event.target only for a child-to-parent pin output when no lowered parent connect target applies,
        no explicit target is present, and broadcast:true is absent.
      child_to_parent: A child flow instance has exactly one parent in v1. A child pin-declared output routes to the recorded
        ParentRoute of the instance that created the child only when the emit has no lowered parent connect route and no
        explicit target.
      static_child_no_instance: Nested static child flows that are not template/dynamic instances have no persisted ParentRoute
        row. When such a child emits a pin-declared output without a lowered parent connect route, without explicit target,
        and without broadcast:true, the runtime may target only the current delivery entity route. Eligibility requires the
        resolved flow scope path to be nested. This exception must not read inbound event.source as structural parent authority
        and does not satisfy ParentRoute metadata for template/dynamic instances.
      parent_to_child: Parent-to-child routing is never inferred structurally in v1. The parent must use target:{instance_id}
        or the canonical parent connect topology with addressed receiver input pins.
      grandchildren: A grandchild's structural pin output routes to its immediate parent only. Multi-level retargeting is v2.
      multiple_parents: Per-child multi-parent structural routing is v2. Parent-authored multi-consumer fan-out uses connect
        topology and lowers to target_set route-plan facts; explicit target forms remain only the dynamic escape hatch.
    parent_route:
      description: Full parent route identity recorded at create_flow_instance time.
      fields:
        parent_flow_instance: canonical parent flow instance path
        parent_entity_id: parent entity id
        parent_flow_id: parent flow id, defensive and derivable from path
      exposed_type: 'ParentRoute { FlowInstance, EntityID, FlowID }'
      read_rule: Child pin-output emit reads ParentRoute from local instance metadata and writes event.target only when no
        lowered parent connect route applies, no explicit target exists, and broadcast:true is absent.
      stale_instance_policy: Pre-existing children with only parent_entity_id and no complete ParentRoute fail closed with parent_route_incomplete.
    delivery_filter:
      rule: Filter once at publish-time recipient construction, persist the narrowed recipient list, and make all downstream
        delivery paths inherit that persisted list.
      applies_to:
      - routed delivery
      - subscribed publish
      - transactional publish
      - direct publish
      - outbox redelivery
      - sweeper retry
      - recovery replay
      singular_target: When event.target is set, routing-execution subscribers are narrowed to target.flow_instance.
      fanout_target_set: When event.target_set is non-empty, routing-execution subscribers are narrowed to the concrete
        target_set flow_instances. The publish plan MUST persist one delivery row per target route/recipient pair. Dispatch
        MUST expose the delivery row's target route as the receiver's singular event.target view.
      target_absent: When event.target and event.target_set are both absent, no target filter applies. This is the explicit
        broadcast/external path. It is not the normal parent-composed pin route.
      internal_observation_hooks: Audit logging, debug streams, metric taps, and test-only live observers are not routing-execution
        subscribers and may observe all events regardless of target.
      match_count_behavior:
        zero_target_set: Dead-letter target_unreachable_no_subscriber or target_not_subscribed depending on whether the target instance exists.
        one_target_set: Normal delivery.
        many_target_set: Dead-letter target_ambiguous unless the emit used allow_fanout:true; with allow_fanout:true, persist event.target_set and per-recipient delivery targets.
        no_target: Existing no-target event-type fan-out semantics.
    target_resolution_failure_taxonomy:
      boot_verify:
        target_required_missing: Pin-declared output emit with no lowered parent connect route, no explicit target escape
          hatch, no structural binding, no eligible static child delivery-entity route, and no broadcast:true.
        target_invalid_syntax: Literal target spec is malformed or incomplete.
        target_unknown_flow: target.flow does not exist in the loaded flow registry.
        target_sender_no_inbound: target:sender appears on a handler whose only triggers cannot supply inbound source.
        target_sender_empty_source: target:sender appears on a handler subscribed only to external-sourced events with empty source.
        producer_target_common_path_forbidden: A loaded flow-scope producer or package-root producer target.flow/match
          selects a loaded package receiver input for the same pin-declared output or a receiver flow reached by the
          parent connect graph; parent connect is the required route owner.
        producer_broadcast_common_path_forbidden: Loaded flow-scope or package-root broadcast:true is used as package-internal
          delivery to receiver input pins for the same pin-declared output or connected output pin; parent connect
          broadcast/fan-out is the required route owner.
      publish_time_dead_letter:
        target_unreachable_no_subscriber: Target resolution finds no recipient for the requested target.
        target_unreachable_terminated: Target or ParentRoute referred to an instance that no longer exists.
        parent_route_incomplete: Structural child-to-parent routing needs ParentRoute but instance metadata only has incomplete legacy parent data.
        target_ambiguous: flow/match resolution finds more than one target without allow_fanout:true.
        target_not_subscribed: Target instance exists but does not subscribe to the emitted event type.
        platform.reply_already_terminal: A distinct reply event attempted to consume a context already terminally claimed by
          another reply. Diagnostics name reply_context_id, request event, accepted reply event, and rejected reply event.
        platform.stale_arrival: Reply context is missing, malformed, topology-mismatched, or resolves to no live origin carrier.
          Diagnostics name the paired request/reply pins and available context identity; no fallback delivery is attempted.
      emit_time_tool_error:
        target_sender_no_inbound_runtime: target:sender reached a mixed path with no inbound event source.
        target_sender_empty_source_runtime: target:sender reached an inbound event whose source is empty.
    boot_verify_scope:
      proves:
      - contract well-formedness
      - static pin topology
      - statically detectable target misuse patterns
      cannot_prove:
      - instance lifecycle at runtime
      - payload values
      - mixed-trigger execution paths that are not statically singular
      - secondary-field uniqueness without declared unique indexes
      bridge: Runtime publish-time and emit-time checks cover the cases boot verification cannot prove. No silent failure category is allowed.
      v2_non_blockers:
      - entity-field unique indexes for boot-provable match cardinality
      - deeper trigger reachability analysis for mixed target:sender paths
      - dedicated route-inspection CLI
    select_entity_coexistence:
      canonical: External webhook ingress, events declared with swarm.source beginning with external, and mixed-provenance no-target events.
      non_canonical: In-topology parent-connect pin routing. Receivers should declare addressed input pin resolution rather
        than depend on select_entity to repair broadcast or connected delivery to the right entity.
      receiver_context_order:
      - event.target
      - select_entity_or_select_or_create_entity
      - event.source
      boot_verify: Redundant normal in-topology select_entity/select_or_create_entity is hard invalidity. Stateful
        static/default-static handlers using receiver-side acquisition fail
        closed because static multi-row ownership is retired.
    auth_boundary:
      v1_rule: Existing emit authorization plus pin topology are the v1 authorization boundary.
      no_separate_acl: No separate per-target ACL layer exists in v1.
      emit_auth: The actor must already be allowed to emit the event type.
      pin_topology: Boot verification rejects target forms outside the loaded pin topology.
      dynamic_misses: Publish-time target failures produce typed dead letters, not authorization fallbacks.
      v2_non_blockers:
      - per-target ACLs for multi-tenant deployments
      - cross-topology grants for third-party flow contributions
    escape_hatch:
      description: Explicit scoped subscriptions remain an escape hatch for non-pin or disambiguated subscription cases, but
        they are not a replacement source of truth for pin-declared output routing.
      when_needed:
      - Ambiguous local names where the contract intentionally selects one qualified producer.
      - Non-pin events from another flow that are not part of the pin-routed interface.
    contract_authoring_rules:
      handler_keys: Always local names. Never flow-prefixed.
      subscribes_to: Local names by default. Flow-prefixed only as escape hatch.
      emit_events: Always local names. The platform externalizes at emission time.
      events_yaml: Always local names. Flow-scoped at load time.
      pins: Always local names. Parent connect binds output pins to receiver input pins for topology; same-name pin matching
        is not route or producer authority. Target rules materialize concrete instance recipients after connect lowering or
        explicit escape-hatch targeting.
    wildcards:
      description: Pattern matching for subscriptions across flow instances. Wildcards do not override target filtering when event.target or event.target_set is set.
      patterns:
        '*/order.completed': Any direct child flow's order.completed event
        '**/item.processed': Any flow at any depth
  contract_merger:
    description: After the flow tree walker collects all flows, the merger builds the runtime registry. Every node, agent,
      and event gets a full URI. No global merge — everything is scoped by flow instance.
    process:
    - 1. For each flow in the flat list (from walker), construct its instance path.
    - '2. For each node in flow''s nodes.yaml: register with URI {root}://{instance_path}/{node_id}'
    - '3. For each agent in flow''s agents.yaml: register with URI {root}://{instance_path}/{agent_id}'
    - '4. For each event in flow''s events.yaml: register with URI {root}://{instance_path}/{event_name}'
    - '5. For each tool in flow''s tools.yaml: register as shared (tools are not URI-scoped)'
    - '6. For each policy key in flow''s policy.yaml: register scoped to flow instance'
    - 7. Root flow's tools and policy are inherited by all children unless overridden.
    no_conflicts: URI scoping eliminates all conflicts. Two flows with a node called "orchestrator" become myapp://intake/orchestrator
      and myapp://processing/orchestrator. No merge logic needed. No collision possible.
    subscription_resolution: After all URIs are constructed, resolve agent subscriptions. Local subscriptions (no :// prefix)
      resolve within the same flow instance. Full URI subscriptions resolve globally. Wildcard subscriptions expand to matching
      URIs.
    tools: Tools are NOT URI-scoped. They are shared resources. Root flow tools are available to all child flows. Child flow
      tools are available only within that flow. If a child declares a tool with the same ID as a root tool, the child's version
      takes precedence within that flow.
    policy: 'Policy keys are scoped by flow. Root flow policy is inherited by all children. Child flow policy overrides root
      for the same key within that child. Guards and prompt templates resolve policy keys by walking up the flow tree: child
      → parent → root.'
    output: 'A runtime registry containing: URI → Node map, URI → Agent map, URI → Event schema map, tool registry (flat,
      with flow-level overrides), policy tree (hierarchical, child overrides parent).'
  agent_sharding:
    description: Parallelism within a flow is handled by system nodes spawning multiple agent instances. The platform provides
      the mechanics (agent_hire, event routing, accumulation tracking). The product node decides the partitioning logic.
    model: A system node handler receives a trigger event with a workload (e.g., 52 subcategories). The node partitions the
      workload and spawns N agent sessions, one per partition. Each agent receives a partition-specific event. The node tracks
      completion via the accumulate primitive. When all partitions complete, the node proceeds.
    platform_provides:
    - agent_hire tool — spawn an agent session with specific configuration
    - Event routing — deliver partition-specific events to the correct agent instance
    - Accumulation tracking — track which partitions have completed
    - Timeout — fire on_timeout if partitions don't complete in time
    product_provides:
    - Partitioning logic — how to split the workload
    - Partition event construction — what each agent instance receives
    - Merge/reduce logic — how to combine partition results (if needed)
    not_in_scope: Flow-level sharding (distributing flow instances across compute nodes) is not supported in v1.0.0. All flow
      instances run on the same platform instance. Agent sharding provides within-flow parallelism. Cross-machine distribution
      is a future concern.
    addressing: Sharded agent instances are addressed by their agent session ID, not by a special shard path. The wildcard
      * in paths matches dynamic flow instances, not agent shards. Agent shards are ephemeral — they exist for the duration
      of the partition work and are not addressable after completion.
  dynamic_instance_lifecycle:
    description: 'Flow instances can be created at runtime by system nodes calling create_flow_instance. The flow template
      must be declared as mode: template in the parent package.yaml.'
    creation:
      trigger: A system node handler declares action create_flow_instance (handler action, not an agent-callable tool). The node
        decides when to create instances based on its product logic. Same pattern as agent sharding — nodes orchestrate instance
        creation.
      instance_id: Supplied by the node (from event payload or generated). Must be unique within the template scope. If already
        exists, creation fails with error before mutating flow_instances, entity_state, routes, agents, or auto_emit_on_create.
      process:
      - 1. Node handler calls create_flow_instance with template ID and instance_id
      - '2. Platform validates: template exists and is mode: template'
      - '3. Platform validates: instance_id is unique within template scope; duplicate resolved IDs fail closed before create side
        effects'
      - 4. Platform loads flow template contracts from flows/{template}/
      - '5. Platform constructs paths: {template_id}/{instance_id}/{local_name}'
      - 6. Platform registers new nodes, agents, events in runtime registry
      - 7. Platform expands wildcard subscriptions to include new instance
      - 8. Platform resolves local subscriptions for new instance
      - 9. Platform records the full ParentRoute from the calling handler context on the child instance metadata
      - 10. Platform creates entity record at initial_state from schema.yaml
      - 11. New instance nodes and agents start
      parent_route:
        description: Full structural route from the child instance back to the creating parent.
        metadata_fields:
          parent_flow_instance: Parent flow instance path from the calling handler context.
          parent_entity_id: Parent entity id from the calling handler context.
          parent_flow_id: Parent flow id, defensively recorded even when derivable from parent_flow_instance.
        required_for: Child-to-parent pin-declared output emits when the emit site has no lowered parent connect route, no
          explicit target, and no broadcast:true.
        incomplete_policy: A child instance with incomplete ParentRoute metadata MUST fail closed with parent_route_incomplete
          before emitting a structurally routed pin output.
        single_parent_v1: Each child has exactly one ParentRoute in v1. Multiple parents are v2.
      route_materialization:
        subscriber_identity_variables: Dynamic flow-instance route subscribers MUST render from the same activation variable
          set used to materialize the child instance's agents. That set includes `config_from` values plus runtime built-ins
          `instance_id`, `template_id`, `flow_scope_key`, and `flow_instance_path`; built-ins remain authoritative for their
          reserved names.
        persisted_truth: Materialized `routing_rules.subscriber_id` rows store concrete rendered subscriber IDs. Route
          persistence, delivery planning, active-agent lookup, and runtime recovery consume that materialized route truth and
          MUST NOT independently reinterpret authored subscriber templates.
        recovery: Startup recovery of active flow-instance routes MUST reconstruct the same activation variable set from the
          persisted flow instance config, or recover from persisted rendered route truth. It MUST fail closed rather than
          re-render route subscribers from route identity alone.
      auto_emit: Flow schemas may declare auto_emit_on_create. When the platform creates an instance, it automatically emits
        the declared event after the instance is fully started. Duplicate create failures MUST NOT auto-emit. This bootstraps
        the flow without requiring an external trigger.
    addressing:
      static_flows: '{flow_id}/{local_name} — one level, no instance segment'
      template_instances: '{template_id}/{instance_id}/{local_name} — extra segment for instance'
      wildcard: '{template_id}/*/{event_name} — matches any instance under this template'
    wildcard_subscriptions:
      description: Agents that need to observe all dynamic instances use wildcard paths. When a new instance is created, existing
        wildcard subscriptions expand to include it.
      static_vs_dynamic: 'Static flows are declared in package.yaml with mode: static. Template instances are created at runtime
        with mode: template. Wildcard * only matches template instances. Static flow names are always explicit.'
    termination:
      terminal_state: A dynamic instance reaches a terminal state from schema.yaml. Instance stops processing events. State
        preserved for querying. Agents and nodes stopped.
      cleanup: 'Operational concern. Platform does not auto-delete. Future: TTL or explicit destroy tool.'
  boot_sequence:
    description: Ordered steps from platform start to ready. If any validation step fails, boot aborts with a clear error.
      No partial startup.
    steps:
    - step: 1
      name: load_platform_spec
      action: Read platform-spec.yaml. Verify platform version.
    - step: 2
      name: walk_flow_tree
      action: Starting from root package.yaml, recursively discover all flows. Build flat list of FlowEntry records. Max depth
        99.
    - step: 3
      name: construct_paths
      action: 'For each flow, construct hierarchical paths for its nodes, agents, and events. Local names become absolute
        paths using the semantic contract path (flow_scope_key): {flow_scope_key}/{local_name}. This happens at boot
        before any template instances exist — concrete instance paths are materialized later at create_flow_instance time.'
    - step: 4
      name: register_templates
      action: 'For flows declared as mode: template, register the template but create no instances. The template is available
        for runtime create_flow_instance calls.'
    - step: 5
      name: build_registries
      action: 'Build runtime registries keyed by path: nodes, agents, events, tools, policy. Tools are flat (shared). Policy
        is hierarchical (child overrides parent).'
    - step: 6
      name: resolve_subscriptions
      action: Resolve all agent and node subscriptions. Local names (no /) resolve within same flow. Paths with / resolve
        as absolute from root. Wildcards expand to matching paths.
    - step: 7
      name: validate_pins
      action: 'For each flow: required input event pins must be satisfied by the canonical input-source resolver: parent connect
        topology, input pin source:external, explicit harness injection, platform source, or internal topology producer. Pin-declared output emits consume
        flow_model.flow_package.composition_routing: lowered parent connect supplies singular event.target or fan-out
        event.target_set route facts; explicit target is only the dynamic escape hatch; structural ParentRoute and eligible
        static-child delivery-entity routing are fallback paths when no lowered connect route applies; broadcast:true is the
        explicit no-target opt-out. Target specs must be well formed, and no two flows may write the same entity field (write
        conflict = boot error).'
    - step: 8
      name: validate_required_agents
      action: 'Build effective required-agent facts for every scope. If schema.required_agents is omitted, infer facts from
        same-scope agents.yaml map keys, subscriptions, and emit_events. If schema.required_agents is present, including
        an empty list, validate that explicit boundary strictly against same-scope agents.yaml by exact map key and required
        subscription/emit coverage.'
    - step: 9
      name: validate_tools
      action: Every tool in every agent's tools must exist in the tool registry.
    - step: 10
      name: validate_permissions
      action: Every agent has sufficient permissions for its declared tools.
    - step: 11
      name: validate_platform_version
      action: Root flow's platform_version range includes the running platform version.
    - step: 12
      name: initialize_state_stores
      action: Create or verify platform runtime tables, including the canonical entity_state/accumulator current-state
        store, event store, and generated node-local state tables. Derive entity contract metadata from entities.yaml plus
        the shared type system, but do not create product-specific typed entity tables during normal runtime boot.
    - step: 13
      name: start_system_nodes
      action: Each node subscribes to its declared events. Nodes are ready to handle.
    - step: 14
      name: start_agents
      action: Each agent's subscriptions are active. Agent sessions created on first event.
    - step: 15
      name: ready
      action: 'Platform is accepting events. Log boot summary: flow count, node count, agent count, event count.'
    failure_handling: 'Any step that fails aborts boot with a clear error message identifying: which step failed, which flow/agent/event
      caused the failure, and what the expected fix is. No partial startup — either everything validates or nothing runs.'
  event_loop:
    description: The event loop is the core runtime cycle. Events enter, get persisted, routed to subscribers, and processed.
      This runs continuously after boot.
    lifecycle:
    - step: 1
      name: event_arrives
      action: 'An event enters the system. Sources: agent emit, system node emit, timer fire, human input, handoff trigger,
        external API.'
    - step: 2
      name: validate_payload
      action: Validate event payload and admitted envelope facts before persistence. Supported producer emit surfaces
        perform their own fail-closed validation before publish; this event-loop admission check remains the canonical final
        guard for all events that reach the event store and the primary owner for ingress/direct/store append paths without
        a more specific producer surface owner. Reject if schema mismatch or if the event admission class is missing
        required identity, time, run, or lineage facts. Log and discard invalid events.
    - step: 3
      name: persist_event
      action: 'Write the already-admitted event to the event store (write-ahead). Storage translates admitted facts into
        row columns and must not repair missing event-owned facts. The event is durable before any processing begins. Crash
        after this point: event replays on recovery.'
    - step: 4
      name: resolve_subscribers
      action: 'Look up subscribers by event path. Two kinds: system nodes (from nodes.yaml subscribes_to) and agents (from
        agents.yaml subscriptions). Wildcard subscriptions are pre-expanded at boot and updated on dynamic instance creation.
        If event.target is set, narrow routing-execution subscribers to target.flow_instance before persisting event deliveries.
        If event.target_set is non-empty, persist one delivery row per target_set route/recipient pair and dispatch each
        recipient with that delivery target as its singular event.target view. If both event.target and event.target_set
        are absent, use the explicit broadcast/external no-target path.'
    - step: 5
      name: node_handling
      action: 'For each subscribing system node: acquire entity lock, execute the dependency-graph handler within an atomic
        boundary, release entity lock. New events emitted by the handler are persisted within the same atomic boundary but
        delivered AFTER commit (step 7). Durable activity handlers persist platform.activity_requested within the same atomic
        boundary; external activity tool execution starts only when that persisted request event is processed after commit and
        outside the entity lock.'
    - step: 6
      name: agent_delivery
      action: 'For each subscribing agent: place the event in the agent''s inbox. Agent processes it asynchronously. No lock,
        no blocking.'
    - step: 7
      name: deliver_emitted_events
      action: Events emitted by node handlers in step 5, including platform.activity_requested activity request events, are
        now delivered. The workflow runtime consumes platform.activity_requested and emits the generated durable activity
        success/failure result event after its post-commit tool execution completes. Each generated result event enters the
        event loop at step 1 in its own cycle. This prevents recursive handler chains and deadlocks.
    - step: 8
      name: mark_delivered
      action: Original event marked as delivered in the event store.
    concurrency:
      description: Events are serialized per entity, concurrent across entities.
      per_entity_serialization: All events for the same entity are processed one at a time. When a handler is processing an
        event for entity X, any other event for entity X waits until the handler completes and commits. This prevents race
        conditions on entity state, accumulator, and gates.
      cross_entity_concurrency: Events for different entities are fully concurrent. Handling entity X does not block entity
        Y. The platform can process thousands of entities simultaneously.
      entity_lock: 'The platform acquires an entity-level lock before handler execution. Lock scope: one entity, one handler.
        Released after commit or rollback. Lock mechanism is implementation-specific (DB row lock, in-memory mutex, etc.).'
      agent_concurrency: Agent deliveries are asynchronous. Events placed in agent inbox in order. Agent processes inbox events
        sequentially. Multiple agents run concurrently. No entity lock needed for agent processing — agents interact with
        entities through platform tools which acquire their own locks.
    atomicity:
      description: All side effects of one handler execution are atomic. Either everything commits or nothing does.
      within_atomic_boundary:
      - Entity state change (advances_to)
      - Gate updates (sets_gate)
      - Accumulator state updates (data_accumulation, accumulate tracking)
      - New events persisted to event store (emit)
      outside_atomic_boundary:
      - Delivery of emitted events to their subscribers (happens after commit)
      - Agent inbox delivery (async)
      failure: If any write within the atomic boundary fails, all writes roll back. The triggering event is marked as failed.
        Failed events can be retried (handler is idempotent).
    crash_recovery:
      description: On restart, the platform replays undelivered events. Events persisted (step 3) but not marked delivered
        (step 8) are replayed. Handler idempotency ensures replayed events produce the same result.
    single_node_handler_rule:
      description: Each event may be handled by at most ONE system node. If two system nodes declare the same event in their
        event_handlers, boot fails. This ensures unambiguous state authority — one event, one state transition, one owner.
      agents: Not constrained. Multiple agents may subscribe to the same event freely.
      enforcement: Boot validation rejects duplicate node handlers for the same event.
    emit_payload_default: 'For supported declarative system-node emit sites, the platform constructs the business payload by:
      1. Lower emitted-payload authoring sugar (`emit.from` and bare namespace same-named `emit.fields` values) to a canonical
      explicit emit.fields map. 2. Start from an empty payload. 3. Evaluate the canonical emit.fields, if present, into the
      payload. 4. Attach runtime-owned envelope context on the emitted event carrier rather than copying it into payload.
      There is no implicit entity or trigger-payload passthrough on this surface. Runtime rejects authored envelope-owned keys
      in emit.fields fail-closed. Runtime also validates the resulting payload fail-closed: undeclared producer-authored payload
      fields are rejected, not silently trimmed.'
    dual_path_events: An event can be both an input pin (arriving from outside the flow) and internally generated (emitted
      by a handler within the flow). The system node handler processes it identically regardless of source. No priority or
      deduplication between paths — if the same event fires from both, it runs twice (idempotency_key in the events table
      prevents true duplicates).
  state_management:
    description: The platform tracks three kinds of state per entity instance. All state is persisted. All mutations happen
      within the handler atomic boundary.
    entity_state:
      description: A single string value representing where the entity is in the flow lifecycle. Set by advances_to in handler
        execution. For staged bundles, initial and terminal values are lowered from schema.yaml stages. For legacy bundles,
        initial value comes from schema.yaml initial_state and terminal values from schema.yaml terminal_states.
      storage: Entity table, state column, indexed.
      mutation: Only via advances_to or on_complete branch. Never by agents directly.
    accumulator_state:
      description: 'Structured data tracking partial progress within a handler''s accumulate pattern. Examples: which scoring
        dimensions have arrived, which scanner partitions completed, intermediate computed values.'
      storage: Per-node state table (from nodes.yaml state_schema). Keyed by entity_id.
      mutation: Written by accumulate tracking (record arrival), data_accumulation (write payload fields), and compute steps
        (store computed values). Cleared or reset when accumulation completes.
    gate_state:
      description: Boolean flags on the entity. Used by validation-style flows to track which sub-steps have completed. Guards
        can check gate state as conditions.
      storage: Entity table, gates column (jsonb or equivalent).
      mutation: 'Set via sets_gate handler field. Default behavior: set to true, never reset. If an entity needs to re-enter
        a validation cycle, use clear_gates handler field to reset all gates to false before re-entering.'
    scoping: All state is scoped by entity_id + flow instance path. Two entities in the same flow have independent state.
      Two instances of the same flow template have independent state. There is no shared mutable state between entities or
      between flow instances.
    querying: State is queryable at any time without side effects. The platform may provide a query_flow_state tool for agents
      to read entity state, accumulator, and gates without emitting events.
    terminal_state_behavior:
      description: When an entity reaches a terminal state (from schema.yaml terminal_states), all state is preserved. Entity
        state, accumulator state, gate state, and event history remain queryable indefinitely.
      no_cleanup: The platform does NOT clear entity data on terminal state. Terminated entities retain all accumulated data
        and decision history for post-mortem analysis.
      behavior:
      - Entity stops accepting new events (handlers reject events for terminal entities)
      - Timers are cancelled
      - Agent sessions are terminated
      - All persisted state remains in the database
      - Entity remains queryable through explicit read/query surfaces; for normal agents this means generated current-entity
        reads, while legacy query_entities remains a trusted runtime-internal compatibility surface.
      archival: Future concern — retention policy and cold storage are not specified in v1.1.0.
      event_rejection: 'When an event arrives targeting an entity in a terminal state, the platform rejects it before handler
        execution. No guard runs, no handler runs, no state changes. The event is marked as rejected with reason: terminal_entity.
        This is unconditional — no configuration can override it. Terminal means terminal.'
      absorbing: Terminal states are absorbing by default. Once an entity reaches a terminal state, it cannot leave. All events
        for that entity are rejected. This is unconditional.
      no_reopen_mechanism: There is no opt-in mechanism to reopen a terminal entity. If a business process needs to "reopen"
        a killed/closed entity, the correct pattern is to create a NEW entity (new entity_id) with data copied from the old
        one. The old entity remains terminal. This preserves audit trail integrity.
      backward_transitions: Backward transitions (e.g., review → draft) are allowed for NON-terminal states. The prohibition
        is specifically on leaving terminal states, not on backward movement in general. Revision loops, reset-to-earlier-state,
        and similar patterns are valid.
    entity_field_resolution:
      description: 'In CEL expressions, entity.X resolves against a unified namespace that includes: entity_state.fields (from
        declared entity fields) and node-local state_schema fields (from accumulate/compute writes). Platform current-entity
        metadata/control is read only through _entity.*. Entity contract fields come from entities.yaml, not
        package.yaml.entity_schema. Declared entity fields are universally readable at type-valid values; node state remains
        a separate local concept merged into the CEL namespace by the runtime.'
    state_schema_scoping: state_schema fields are node-scoped in storage. In CEL, entity.X reads the current handler node
      state. Cross-node state reads are not supported — use events to pass data between nodes.
  accumulation_engine:
    description: The accumulation engine is the platform subsystem that handles the accumulate primitive. It tracks multiple
      event arrivals for the same entity and fires on completion.
    tracking:
      setup: 'When an entity first encounters a handler with accumulate.track, the platform creates an accumulator record:
        expected items list, received items list (empty).'
      bucket_identity: |
        Handler accumulator buckets are keyed by the selected authored handler
        event key after runtime handler resolution/localization, not by the
        concrete event-bus event type that delivered the event. The concrete
        event type remains event provenance and must be retained on accumulated
        item metadata and diagnostics. Timeout bucket handles, compute reads,
        and `materialize_from` projection reads must consume the same selected
        handler event key. If `accumulate.window` is declared, the window value
        is part of the accumulator bucket identity; unwindowed accumulators keep
        the existing node/event bucket key.
      arrival: 'Each event arrival is identified by its dedup_by key. Default: sender session ID. Can be overridden to a payload
        field (e.g., payload.dimension). If the key was already received, the arrival is ignored (idempotent). If not, it
        is added to the received set and persisted.'
      completion_check: 'After each arrival, check the completion condition: all (every expected item received), threshold
        (received count >= N), or timeout (timer fires regardless of count).'
    completion_modes:
      all: Proceed when every item in the expected list has been received.
      threshold: Proceed when received count reaches a configured number.
      timeout: Proceed when a timer fires, regardless of how many items arrived. Partial results available.
    on_complete: When completion condition is met, the handler continues to the remaining steps (compute, on_complete branches,
      advances_to, emit). The accumulated data is available to these steps. Handler-level on_complete branches are evaluated
      first; if no handler-level branch matches and accumulate.on_complete branches are declared, those accumulator-completion
      branches are evaluated through the same selected-branch owner.
    on_timeout: If the handler declares accumulate.on_timeout, the platform executes that branch when the timer fires before
      completion. Partial accumulated data is available. Typically used to proceed with whatever data arrived. The platform
      emits and routes accumulate.timeout intrinsically to the owning handler bucket; authors do not declare accumulate.timeout
      in subscribes_to to make the timeout branch deliverable.
    idempotency: Duplicate arrivals (same item, same entity) are ignored. The received list is a set, not a list. Crash recovery
      replays events through the same tracking — already-received items are skipped, accumulator state is consistent.
    cleanup: After completion fires and the handler commits, the accumulator record can be archived or deleted. The entity
      has moved past the accumulation state.
  join_engine:
    description: >-
      The join engine is the canonical durable owner for staged finite-membership barrier activation, arrivals, deterministic
      output assembly, timeout, and close. It consumes the typed lowered handler.join plan; route, timer, store, and test
      surfaces do not reconstruct join semantics independently.
    persisted_activation:
      identity: >-
        flow instance + stage + effective join ID + optional window. Node and handler event remain exact internal routing
        identity for arrival and timer delivery, but may not narrow or replace the verified stage-scoped semantic identity.
      fields:
      - ordered snapshotted members
      - per-member canonical output value and hash
      - open/closed status and close reason
      - armed_at and persisted fire_at
      - exact timer task/event identity
      - expected-zero pending/fired completion disposition
    arm: >-
      Stage entry snapshots members and optional window only after transition data writes are visible. Empty membership
      evaluates the same canonical completion plan as arrival: default-all closes immediately, while authored complete_when
      closes only when that boolean is true. A false custom condition persists an open activation and its mandatory timeout.
    arrival: >-
      Runtime loads the persisted activation inside the entity lock and selected-store transaction, checks exact window and
      member identity, stores canonical output, and evaluates default-all or complete_when over persisted join context.
    ordering: join.results and join.missing always follow declared membership order, never arrival or map iteration order.
    close: >-
      Completion, timeout, and stage exit persist one closed reason. Completion/timeout outcomes and timer cancellation share
      the selected-store transaction; in-memory scheduler registration/cancellation happens only after commit.
    recovery: >-
      Restart, replay, and fork consume persisted members/window/close/timer facts. They do not re-read mutable entity
      membership, synthesize an arrival-owned activation, or resurrect a closed timeout.
  runtime_store_backend_selection:
    promoted_by: '#1084'
    parent_tracker: '#1066'
    canonical_owner: internal/store/backendselection runtime store backend resolver
    description: >
      Runtime store backend selection is owned by one typed resolver before runtime store construction. CLI flags,
      runtime config, deprecated environment fallback, harnesses, and local foreground startup may collect selector input,
      but they must consume this owner rather than interpreting backend strings independently.
    backend_ids:
      postgres:
        status: active_supported_runtime_backend
        meaning: External Postgres runtime store. Postgres remains explicitly selectable for production and existing operator deployments through flag or typed runtime/unified config only.
      sqlite:
        status: active_local_dev_default_runtime_backend
        meaning: >
          Local/dev SQLite runtime store selection. No-selection local/dev runtime startup resolves to SQLite through the
          rollout default owned by internal/store/backendselection. Explicit sqlite selection constructs the selected typed
          SQLite store owners promoted by #1086/#1087/#1147/#1148/#1149/#1150/#1186/#1157 without exposing a raw runtime
          SQL handle to Postgres-only runtime consumers. SQLite is the local/dev default; it does not promote production
          multi-writer SQLite semantics.
    selector_precedence:
      source_order:
      - flag
      - runtime_config
      - rollout_default
      flag:
        command: swarm serve
        name: --store <backend>
      runtime_config:
        backend_key: store.backend
      rollout_default:
        active_no_selection_default: sqlite
        postgres_opt_in_backend: postgres
        rule: >
          No-selection local/dev runtime startup resolves to SQLite. Postgres remains explicitly selectable through
          --store postgres or store.backend=postgres and remains the production/external backend. SWARM_STORE_BACKEND is
          a retired environment source and MUST NOT affect backend selection.
    sqlite_path:
      canonical_owner: internal/store/backendselection SQLite path resolver
      runtime_config_key: store.sqlite.path
      default_authority: platform-spec.yaml#cli_specification.foundations.local_runtime_state_authority
      project_default_path: .swarm/stores/dev.db
      no_project_default_path: <swarm-dir>/stores/default/dev.db
      borrowed_project_default_path: <swarm-dir>/stores/projects/<project-key>/dev.db
      legacy_repo_relative_path: .swarm/dev.db
      source_order:
      - runtime_config
      - local_runtime_state_default
      retired_environment: SWARM_SQLITE_PATH
      lifecycle:
      - Project-local startup whose canonical project root matches the active repo root uses `<project-root>/.swarm/stores/dev.db`.
      - Startup with no project uses `<swarm-dir>/stores/default/dev.db`.
      - Startup pointed at a contracts root outside the active repo root uses a Swarm-dir project hash store and MUST NOT silently write `.swarm` state into the borrowed contracts tree.
      - A legacy `<project-root>/.swarm/dev.db` file MUST NOT be silently orphaned behind an empty replacement; startup must either migrate/read through it or fail closed with the old path, new path, and remediation.
      - Runtime SQLite support must create parent directories on demand when the SQLite backend is implemented.
      - The SQLite file is persistent until the operator deletes it.
      - The runtime must never silently replace the local/dev SQLite store with an in-memory database.
    postgres_connection_details:
      retired_env_vars:
      - SWARM_DB_HOST
      - SWARM_DB_PORT
      - SWARM_DB_NAME
      - SWARM_DB_USER
      - SWARM_DB_SSLMODE
      - SWARM_DB_POOL_SIZE
      - PGHOST
      - PGPORT
      - PGDATABASE
      - PGUSER
      config_prefix: database.*
      rule: >
        Non-secret database.* config keys are Postgres connection details after the canonical selector resolves to
        postgres. They are not generic backend selectors and must not imply backend selection by presence alone.
        Non-secret connection details are owned by typed runtime/unified config and built-in local defaults only.
        SWARM_DB_* and implicit PG* variables are retired ambient sources and MUST NOT be read as fallback authority.
        Postgres DSN construction MUST emit canonical host, port, dbname, sslmode, and user keywords from typed config
        or built-in defaults so lib/pq cannot fill omitted non-secret fields from PG* environment variables.
    postgres_password_source_authority:
      owner: typed database password resolver consumed before Postgres DSN construction
      config_fields:
      - database.password_secret_key
      - database.password_file
      - database.password_env
      invalid_fields:
      - database.password
      invalid_implicit_env:
      - SWARM_DB_PASSWORD
      - PGPASSWORD
      rule: >
        Postgres DB password material is STORE-class secret material under #1600/#1645. For store.backend=postgres,
        runtime startup MUST declare exactly one explicit password source: database.password_secret_key for the local
        Swarm credential file / swarm secrets owner, database.password_file for a mounted secret file, or database.password_env
        for a deliberately named orchestrator/CI env variable. The runtime MUST NOT read SWARM_DB_PASSWORD, PGPASSWORD, or
        a literal "postgres" password as hardcoded fallback. Operators may use legacy env names only by explicitly naming
        them through database.password_env. Plaintext database.password is unsupported and MUST fail closed with migration
        guidance. DSN construction MUST receive already-resolved password material and MUST NOT resolve password sources.
    runtime_backend_rule:
    - Unsupported backend ids fail closed with supported backend guidance.
    - >
      SQLite is recognized as the active local/dev default backend id. It constructs the selected typed SQLite store owners
      without passing a raw runtime SQL handle into Postgres-only runtime consumers. runtime.NewRuntime must consume
      backend-neutral owners for runtime construction, including #1186 mailbox_write materialization and #1157 agent.usage
      reads.
    - Explicit postgres selection must remain available through flag, runtime config, and deprecated environment fallback
      and must reach the existing Postgres runtime store path.
    - >
      Local/dev SQLite `swarm run start --contracts` may stamp an ephemeral bundle source fact when no Postgres bundle catalog
      is present. DB-loaded `--bundle-hash` boot remains Postgres-only until a separate bundle-catalog portability owner
      promotes SQLite support.
    required_consumers:
    - cmd/swarm defaultServeOptions
    - cmd/swarm swarm serve --store
    - cmd/swarm runServeRuntime and buildStoresForServe
    - cmd/swarm buildStores
    - cmd/swarm startLocalRunServe through inherited serve options
    - cmd/swarm runForkRuntimeOwnerHarness
    - runtime config loading for store.backend and store.sqlite.path
    split_boundaries:
    - "SQLite dialect/schema/bootstrap is promoted by #1085."
    - "Backend-neutral core runtime persistence stores are promoted by #1086."
    - "SQLite runtime construction semantics remain under #1087 parent closeout; mailbox_write materialization is promoted by #1186 and must consume its backend-neutral owner rather than the raw pipeline SQL database."
    - "Public local/dev default flip plus zero-service swarm run start proof is promoted by #1088."
    - "Docs, CI, and repo-wide stale-default closeout remains split to #1089."
  runtime_store_schema_dialect_bootstrap:
    promoted_by: '#1085'
    parent_tracker: '#1066'
    canonical_owner: internal/store schema dialect bootstrap and capability owner
    description: >
      Runtime store schema bootstrap is owned by one backend dialect boundary after the #1084 backend selector resolves a
      typed backend. Platform table intent remains authored in platform_tables.tables, but executable DDL is backend
      specific. SQLite support at this layer means deterministic file-backed schema creation and schema capability
      detection only; it does not mean the runtime may execute all store methods on SQLite.
    dialects:
      postgres:
        status: active_supported_runtime_bootstrap
        owner: internal/store.PostgresStore.EnsureSchemaTables and Postgres schema capability binding
        rules:
        - Postgres remains authoritative when the canonical backend selector resolves to postgres.
        - Postgres bootstrap may use pgcrypto, Postgres compatibility migrations, Postgres DDL execution, and Postgres
          catalog inspection.
      sqlite:
        status: explicit_local_runtime_schema_bootstrap
        owner: internal/store.SQLiteSchemaStore and SQLite dialect translation
        rules:
        - SQLite schema bootstrap must be file-backed and must not silently use an in-memory database.
        - SQLite bootstrap must create parent directories for the selected path when the schema owner opens the database.
        - SQLite DDL must cover every current platform_tables.tables entry plus generated node-state tables unless a gate
          explicitly records a named deferral. Normal runtime boot must not create product-specific typed entity tables.
        - SQLite DDL must be rendered from the normalized schema plan subset. The renderer must explicitly classify each
          supported Postgres-authored construct it accepts, including UUID defaults, timestamp defaults, JSON text storage,
          text-array storage, partial indexes, expression indexes, and check predicates.
        - Unsupported Postgres-only constructs must fail closed with named diagnostics rather than being accepted through
          heuristic free-form SQL rewriting.
    covered_schema_inputs:
    - platform_tables.tables
    - generated node-state tables from system node state_schema
    schema_capabilities:
      owner: backend-specific schema catalog readers feeding StoreSchemaCapabilities
      rule: >
        Capability detection must inspect the selected backend's catalog. Postgres may use information_schema/pg_catalog;
        SQLite must use SQLite catalog/PRAGMA inspection. Runtime readers may consume capability results, but runtime SQL
        portability remains split until #1086/#1087.
    split_boundaries:
    - "Core runtime store method portability is promoted by #1086."
    - "Explicit SQLite local-runtime session locking, event delivery/replay, and trace/read model semantics are promoted under #1087 child closeout."
    - "Public local/dev default flip plus zero-service swarm run start proof is promoted by #1088."
    - "Docs, CI, and repo-wide stale-default closeout remains split to #1089."
  runtime_core_persistence_store_contracts:
    promoted_by: '#1086'
    parent_tracker: '#1066'
    canonical_owner: runtime.Stores selected persistence interfaces backed by internal/store.PostgresStore and internal/store.SQLiteRuntimeStore
    description: >
      Core runtime persistence selected for #1086 is owned by typed store contracts selected during runtime store construction.
      CLI/runtime startup may keep raw database handles only for explicitly split surfaces, but selected core persistence
      operations must be reachable through the runtime store bundle instead of treating Postgres-only construction as the
      semantic owner. SQLite support at this layer is file-backed local/dev runtime support; it is the public local/dev
      default promoted by #1088 and does not promote production SQLite semantics.
    backend_implementations:
      postgres:
        owner: internal/store.PostgresStore implementations consumed through selected runtime store interfaces
        status: active_supported_runtime_backend
      sqlite:
        owner: internal/store.SQLiteRuntimeStore
        status: active_local_dev_default_store_backend
        rules:
        - Must be file-backed and use the canonical SQLite path selected by internal/store/backendselection.
        - "Must consume the #1085 SQLite schema/bootstrap capability owner before selected runtime methods execute."
        - Must not silently replace missing unsupported sibling semantics with in-memory state.
        - >
          May expose typed SQLite store owners for the #1087 session, startup ownership, delivery/replay, conversation/turn,
          observability semantics, #1148 budget/spend rows, #1149 tool entity/human-task persistence rows, and #1150
          runtime diagnostics/log rows, and #1186 mailbox_write materialization rows without passing raw SQLite SQL handles
          to Postgres-only runtime consumers.
        - Must not pass a raw runtime SQL handle to Postgres-only runtime consumers.
        - >
          Must support the #1088 zero-service SQLite `swarm run start` local/dev default and explicit Postgres opt-in proof.
          SQLite construction remains local/dev support only; it does not promote production multi-writer SQLite semantics.
    selected_contracts:
    - name: runtime_store_bundle_construction
      owner: cmd/swarm buildStores plus storeBundle.runtimeStores consuming typed runtime store interfaces
      consumers:
      - swarm serve explicit --store sqlite
      - local foreground run startup through buildStores
      - runtime.NewRuntime store dependency graph
    - name: selected_runtime_store_facade
      owner: cmd/swarm storeBundle selectedRuntimeStoreFacade
      promoted_by: '#1395'
      model_defined_by: '#1404'
      producer_facing_model_name: selected_runtime_store_capability_model
      scope: >
        After backendselection resolves the selected runtime backend and buildStores constructs concrete stores, producer
        and public-surface assembly code must consume named selected capability interfaces from the selected runtime store
        facade. Concrete PostgresStore / SQLiteRuntimeStore identity, raw SQL handles, and backend dialect flags are not
        producer-side authority for selected runtime behavior.
      model: >
        The selected runtime store capability model is the public producer-facing store contract after backend selection.
        It is a typed capability graph, not a backend tag. Producers may ask for a named capability and receive either a
        concrete typed owner for the selected backend or an absent/fail-closed capability result. Producers must not infer
        capability availability from PostgresStore, SQLiteRuntimeStore, raw *sql.DB, dialect strings, or backend ids once
        construction has completed.
      capability_groups:
      - name: construction_only_backend_owner
        owner: internal/store/backendselection plus cmd/swarm buildStores and backend-specific store constructors
        allowed_consumers:
        - backend selector/config parsing
        - schema/bootstrap construction
        - storeBundle population before selectedRuntimeStoreFacade consumption
        - backend-specific store implementations
        rule: Concrete backend identity and raw database handles are authoritative only inside this construction boundary.
      - name: core_runtime_stores
        owner: selectedRuntimeStoreFacade.runtimeStores returning runtime.Stores
        capabilities:
        - EventStore
        - RuntimeLogStore
        - PipelineStore
        - SessionRegistry
        - ConversationStore
        - ManagerStore
        - ScheduleStore
        - MailboxMaterializer
        - MailboxStore
        - ToolEntityStore
        - HumanTaskStore
        - BudgetSpendStore
        - RuntimeIngressStore
        - TurnStore
        - StartupOwnership
        rule: Runtime construction consumes typed selected stores. It must fail closed when a required selected owner is missing.
      - name: public_api_read_and_control_capabilities
        owner: selectedRuntimeStoreFacade.apiCapabilities and apiv1.OperatorReadOptions
        capabilities:
        - health ping
        - run reads
        - entity reads
        - observability/event/log/trace reads
        - agent conversation reads
        - agent usage reads
        - mailbox API
        - API idempotency
        - event publisher
        - run control
        - runtime ingress
        rule: API handlers consume named interfaces. A method is registered only when its required typed owners are present.
      - name: optional_product_capabilities
        owner: selectedRuntimeStoreFacade selected optional capability accessors
        capabilities:
        - bundle catalog read/write
        - conversation fork read surface
        - conversation fork lifecycle/chat/delete
        - run bundle availability
        - selected-contract run.fork
        - bundle delete
        - destructive reset
        - startup recovery
        - run-stalled read
        - runtime contexts
        rule: Optional or not-yet-promoted feature families are represented as absent typed capabilities or explicit fail-closed diagnostics, not as producer-side backend checks. Mixed read/lifecycle roles must be segregated; conversation.fork_list and conversation.fork_view consume a read-only fork capability, while conversation.fork, conversation.fork_chat, and conversation.fork_delete consume a lifecycle capability so read promotion cannot silently enable unproven mutation.
      - name: workspace_and_process_db_capabilities
        owner: cmd/swarm workspace lifecycle and process health construction
        capabilities:
        - workspace lifecycle SQL handle
        - process DB close
        - selected DB ping
        rule: These raw database consumers are adjacent process/workspace capabilities, not selected runtime persistence authority. They must stay named and must not be reused as runtime store fallbacks.
      - name: selected_runtime_mutation_unit_of_work
        owner: backend_neutral_runtime_mutation_write_boundary plus typed selected-runtime row-family unit-of-work entrypoints under '#1403'
        promoted_by: '#1403'
        promoted_first_slice_by: '#1414'
        typed_entrypoint_owners:
        - runtimebus.EventMutationRunner and runtimebus.EventMutation for selected event publish, PublishInMutation, mailbox decision publish, and outbox atomic mutation groups
        - runtimepipeline.Store.RunPipelineMutation for selected workflow pipeline mutation groups
        - internal/store.SQLiteRuntimeStore.RunRuntimeMutation for selected SQLite runtime row-family mutations
        - internal/store.PostgresStore normal transaction methods for selected Postgres runtime row-family mutations
        rule: >
          Mutation writers must consume a semantic mutation owner. Event publish/outbox, mailbox decision publication,
          workflow pipeline producers, and selected runtime row-family producers must not construct raw
          `func(context.Context, *sql.Tx) error` callbacks, pass raw `*sql.Tx`, or branch on SQLite/Postgres transaction
          mechanics as their selected-runtime mutation authority. Backend-specific SQL transaction mechanics may remain
          inside store implementations and backend-local `*Tx` helpers. SQLite serialization/retry policy is owned below
          the store boundary and remains guarded by #1405.
      raw_sql_policy:
        allowed:
        - boundary: backend selection, store construction, schema/bootstrap, and backend-specific store implementations
          reason: These layers create or implement the selected backend and may own raw DB/TX mechanics.
        - boundary: workspace lifecycle and process DB health/close capabilities
          reason: These are explicitly adjacent process/workspace capabilities and are not selected runtime persistence owners.
        - boundary: Postgres-only runtime raw SQL consumers that are still explicitly tracked by the raw_sql_runtime_consumer_boundary_for_sqlite split
          reason: SQLite construction must omit runtime.Stores.SQLDB until each raw-SQL consumer has a separately gated backend-neutral owner.
        forbidden:
        - Producer-side runtime behavior must not use raw *sql.DB, *sql.Tx, concrete store type, backend id, or dialect string as capability authority.
        - SQLite selected runtime construction must not pass a raw runtime SQL handle to Postgres-only runtime consumers.
        - Runtime construction must not reconstruct selected pipeline persistence from raw SQL when buildStores failed to provide PipelineStore.
      dependency_classifications:
      - dependency: internal/store/backendselection and selector parsing
        classification: legitimate backend-selection/construction boundary
      - dependency: cmd/swarm buildStores concrete backend switch
        classification: legitimate backend-selection/construction boundary
      - dependency: cmd/swarm storeBundle concrete/raw fields
        classification: construction payload only; producer-facing use is invalid and must migrate under #1401/#1402
      - dependency: selectedRuntimeStoreFacade methods
        classification: canonical selected capability composer
      - dependency: runtime.Stores typed fields
        classification: selected core runtime capability consumers
      - dependency: runtime.Stores.SQLDB and RuntimeSQLDB
        classification: raw SQL exception; Postgres-only until split owners promote replacements, SQLite runtime handle omitted
      - dependency: apiv1.OperatorReadOptions and API method options
        classification: typed public-surface capability consumers
      - dependency: dashboard SQL readers and local PostgresStore wrappers
        classification: producer-facing raw/concrete escapes to classify and migrate under #1401/#1402 unless independently gated
      - dependency: ConversationForkReadStore and ConversationForkLifecycleStore
        classification: segregated optional capabilities; fork read availability must not imply fork lifecycle/chat/delete availability
      - dependency: selected-contract run.fork PostgresStore internals
        classification: optional product capability with current concrete escape; migrate under #1401/#1403 or a run-fork child
      - dependency: RunRuntimeMutation, RunEventMutation, RunPipelineMutation, and backend-local direct transaction helpers
        classification: mutation/unit-of-work owner class under #1403/#1405; producers consume the typed entrypoints while raw helpers stay below store implementations
      - dependency: route planning, event admission/defaulting, delivery authority, startup readiness
        classification: different semantic concepts; explicitly split unless a later gate widens
      rules:
      - Concrete backend selection remains confined to backendselection/config parsing, buildStores construction, and backend-specific store implementations.
      - Serve/API/CLI/runtime producers must consume typed selected capabilities such as runtime stores, API read stores, bundle catalog capabilities, run-fork capabilities, destructive reset capabilities, startup recovery capabilities, and run-stalled read capabilities.
      - Unsupported or not-yet-promoted feature families are represented as absent typed optional capabilities rather than inferred by checking concrete backend identity at the producer.
      - Runtime construction must not reconstruct selected pipeline persistence from a raw SQL handle when buildStores failed to provide the selected PipelineStore owner.
      - Child issues must consume this model without redefining ownership: #1401 removes producer-side backend branching, #1403 promotes typed runtime mutation unit-of-work, #1405 hides SQLite busy/serialization policy, and #1402 adds guard/proof durability.
      excludes:
      - backend selector precedence and CLI/config parsing
      - SQLite feature parity for bundle catalog, selected-contract run.fork, destructive reset, preservation cleanup, and startup recovery
      - runtime startup readiness, route planning, event admission/defaulting, delivery authority, and #1394 writer-bypass enforcement
    - name: backend_neutral_runtime_mutation_write_boundary
      owner: internal/store.SQLiteRuntimeStore.RunRuntimeMutation and internal/store.SQLiteRuntimeStore.RunEventTransaction for SQLite-local selected runtime mutations
      promoted_by: '#1388'
      sqlite_owner: internal/store.SQLiteRuntimeStore mutation executor
      postgres_owner: internal/store.PostgresStore normal transaction methods with no global write serialization or SQLite retry semantics
      scope: >
        SQLite local/dev selected runtime mutation writers must enter one canonical backend-neutral mutation boundary before
        opening SQLite write transactions. The boundary owns process-local SQLite write serialization, elapsed-budgeted
        SQLITE_BUSY / database-locked retry, context cancellation/deadline handling, active pipeline transaction detection,
        and exactly-once post-commit action flushing for successful commits. It covers the selected runtime mutation row
        families named in this section: event/delivery/replay/receipt, runtime log, mailbox/idempotency, ingress/run
        control/quiescence, session/conversation/turn, schedule/timer, tool entity/human-task, budget/spend, manager/agent,
        and run-completion mutations. Postgres remains the production runtime backend and must not inherit SQLite global
        serialization or retry behavior.
      rules:
      - SQLite runtime mutation producers must not implement local SQLITE_BUSY retry loops or open independent write transactions when a selected runtime store boundary is available.
      - SQLite workflow/pipeline mutation methods must consume the selected RuntimeMutationRunner and must fail closed instead of opening a local fallback transaction when that runner is absent.
      - SQLite driver busy_timeout must stay short; elapsed retry budget, cancellation, and backoff are owned by the selected mutation boundary rather than by long driver-level waits.
      - SQLite post-commit action flushing must happen after the selected mutation boundary releases its process-local write serialization lock, so post-commit callbacks can safely re-enter selected runtime mutation APIs.
      - SQLite API idempotency callback execution must stay outside the idempotency row write transaction; failed callbacks must not persist completion.
      - Active pipeline transactions are already inside the selected mutation boundary and must be reused rather than nested.
      - Schema/bootstrap, bundle catalog, destructive reset, preservation cleanup, fork-specific mutation/recovery, and read-only projections remain separate concepts unless independently gated.
      consumers:
      - runtimebus transactional publish through EventMutationRunner
      - runtimepipeline.WorkflowInstanceStore production SQLite construction through NewSQLiteWorkflowInstanceStoreWithRuntimeMutationRunner and RunPipelineMutation
      - SQLiteRuntimeStore selected runtime mutation methods for the named row families
    - name: event_append_and_run_lifecycle_rows
      owner: runtimebus.EventStore
      sqlite_owner: internal/store.SQLiteRuntimeStore.AppendEvent
      postgres_owner: internal/store.PostgresStore.AppendEvent
      excludes:
      - event delivery claim/retry/replay semantics owned by #1087
    - name: manager_agent_and_entity_schema_rows
      owner: runtimemanager.ManagerPersistence
      sqlite_owner: internal/store.SQLiteRuntimeStore agent/entity schema methods
      postgres_owner: internal/store.PostgresStore manager methods
      excludes:
      - pending delivery replay and receipt settlement semantics owned by #1087
    - name: schedule_timer_rows
      owner: runtimepipeline.SchedulePersistence
      sqlite_owner: internal/store.SQLiteRuntimeStore schedule methods
      postgres_owner: internal/store.PostgresStore schedule methods
      excludes:
      - cross-process timer claim/locking semantics owned by #1087
    - name: pipeline_coordination_workflow_instance_and_replay_rows
      owner: runtimepipeline.WorkflowInstanceStore consumed through runtime.Stores.PipelineStore and PipelineCoordinator
      sqlite_owner: internal/runtime/pipeline.NewSQLiteWorkflowInstanceStoreWithRuntimeMutationRunner over the selected SQLite runtime store
      postgres_owner: internal/runtime/pipeline.NewWorkflowInstanceStore over PostgresStore.DB
      scope: >
        SQLite supports explicit local-dev pipeline coordination for workflow instance state, pipeline engine transaction/query
        persistence, background-node receipt settlement, pipeline receipt replay, process-local replay claims, and committed
        replay scope consumption. Production SQLite pipeline writes consume the backend_neutral_runtime_mutation_write_boundary
        instead of owning a separate local retry/serialization policy, so pipeline producers do not branch on backend write
        contention. A SQLite WorkflowInstanceStore constructed without the selected RuntimeMutationRunner is not selected
        runtime write authority and must fail closed for pipeline mutation entry points. Postgres remains authoritative for
        production cross-runtime transaction and claim semantics.
      excludes:
      - tool executor entity and human-task persistence owned by runtime_tool_entity_and_human_task_rows
      - runtime diagnostics/logging owned by #1150
      - broader runtime mutation-store write serialization outside WorkflowInstanceStore owned by #1388
    - name: runtime_budget_spend_rows
      owner: internal/runtime/budgetspend.Store consumed through runtime.Stores.BudgetSpendStore and internal/runtime.BudgetTracker
      sqlite_owner: internal/store.SQLiteRuntimeStore budget/spend methods over spend_ledger and entity_state
      postgres_owner: internal/store.PostgresStore budget/spend methods over spend_ledger and entity_state
      scope: >
        SQLite supports explicit local-dev budget tracking construction, LLM spend recording, flow-instance resolution,
        active entity enumeration, system/global/entity spend aggregation, threshold event evaluation, and emergency mailbox
        side effects through the same BudgetTracker behavior owner. Postgres remains authoritative for production runtime
        budget/spend semantics. SQLite must not substitute an in-memory spend ledger for persisted local runtime budget truth.
      excludes:
      - public operator agent.usage reads over spend_ledger owned by operator_agent_usage_read_rows
      - tool executor entity and human-task persistence owned by runtime_tool_entity_and_human_task_rows
      - runtime diagnostics/logging owned by #1150
      - broader docs/CI/repo-wide closeout owned by #1089
      - production multi-writer SQLite budget concurrency semantics
    - name: operator_agent_usage_read_rows
      owner: internal/store.OperatorAgentUsageReadStore consumed by api_specification.method_catalog.agent.usage through apiv1.OperatorReadOptions.AgentUsage
      promoted_by: '#1157'
      sqlite_owner: internal/store.SQLiteRuntimeStore.LoadOperatorAgentUsage over canonical agents and spend_ledger rows
      postgres_owner: internal/store.PostgresStore.LoadOperatorAgentUsage over canonical agents and spend_ledger rows
      scope: >
        The public agent.usage read surface consumes one backend-neutral per-agent usage read owner over canonical
        spend_ledger facts for exact and estimated accounting. The owner validates active agent existence, applies
        since-inclusive and until-exclusive created_at windows, aggregates exact and estimated totals, and returns
        model, model_alias, backend_profile, provider, transport, resolved_model, and invocation_type breakdowns for
        both explicit SQLite local/dev runtime stores and Postgres production stores. API handlers must not reconstruct
        usage from runtime memory, dashboard-local SQL, diagnostics, trace streams, EventBus payloads, or tests.
      excludes:
      - spend writes, threshold evaluation, and runtime budget side effects owned by runtime_budget_spend_rows
      - agent.diagnose, agent.delivery_diagnostics, conversation, dashboard, trace, and runtime diagnostics surfaces
      - broader docs/CI/repo-wide closeout owned by #1089
      - public-source and CI closeout owned by #1089
      - production multi-writer SQLite concurrency semantics
    - name: runtime_tool_entity_and_human_task_rows
      owner: runtimetools.EntityPersistence and runtimetools.HumanTaskPersistence consumed through runtime.Stores and ExecutorOptions
      promoted_by: '#1149'
      sqlite_owner: internal/store.SQLiteRuntimeStore tool entity and human-task persistence methods
      postgres_owner: internal/store.PostgresStore tool entity and human-task persistence methods
      scope: >
        SQLite supports explicit local-dev runtime tool entity reads, searches, CEL-backed query/metrics filtering, entity
        creation, entity field updates with mutation-log rows, generated role-scoped current-entity tools, human_task_request
        mailbox row creation, and human_task_decide decision/requeue/weekly-budget reads through the same executor behavior
        owner used by Postgres. Deferred human-task decisions share the platform mailbox defer storage model: status remains
        pending, decision remains unset, requeue_date is persisted as deferred_until, and defer after expiry fails closed.
        Backend-specific SQL belongs to the store implementations; the runtime tool executor must
        not receive a raw SQLite SQL handle as a compatibility seam for these surfaces.
      excludes:
      - public operator mailbox API decisions owned by api_specification.method_catalog.mailbox.*
      - public operator agent.usage reads over spend_ledger owned by operator_agent_usage_read_rows
      - runtime diagnostics/logging owned by #1150
      - broader docs/CI/repo-wide closeout owned by #1089
      - production multi-writer SQLite concurrency semantics
    - name: runtime_diagnostics_log_rows
      owner: internal/runtime.RuntimeLogPersistence consumed by internal/runtime.RuntimeLogger through runtime.Stores.RuntimeLogStore
      promoted_by: '#1150'
      sqlite_owner: internal/store.SQLiteRuntimeStore runtime-log persistence and lineage lookup methods
      postgres_owner: internal/store.PostgresStore runtime-log persistence and lineage lookup methods
      scope: >
        RuntimeLogger owns canonical platform.runtime_log payload construction. Backend-specific stores own capability
        checks, global and run-scoped runtime-log persistence, source_event_id lineage lookup, and run-row preservation
        behavior for their backend. Explicit SQLite local/dev runtime construction consumes SQLiteRuntimeStore without
        passing a raw SQLite *sql.DB into RuntimeLogger. Postgres remains authoritative for production runtime-log
        persistence, bundle-source fail-closed run creation, and run counter synchronization.
      excludes:
      - public operator agent.usage reads over spend_ledger owned by operator_agent_usage_read_rows
      - broader docs/CI/repo-wide closeout owned by #1089
      - repo-wide CI closeout owned by #1089
      - production multi-writer SQLite concurrency semantics
    - name: mailbox_write_materialization_rows
      owner: runtimepipeline.MailboxWriteMaterializationStore consumed by PipelineCoordinator mailbox_write actions through runtime.Stores.MailboxMaterializer
      promoted_by: '#1186'
      sqlite_owner: internal/store.SQLiteRuntimeStore.MaterializeMailboxWrite
      postgres_owner: internal/store.PostgresStore.MaterializeMailboxWrite
      scope: >
        PipelineCoordinator owns mailbox_write expression evaluation, deterministic item_id derivation from source_event_id
        and materializer node, source_event_id/from_agent/flow_instance/payload shaping, and handler transaction context
        propagation. Backend-specific stores own idempotent persisted mailbox row materialization through the same typed
        owner for explicit SQLite local/dev runtime construction and Postgres production runtime construction. SQLite must
        keep runtime.Stores.SQLDB nil and must not receive a raw pipeline SQL handle as a mailbox_write compatibility seam.
      excludes:
      - broad public mailbox decision API behavior owned by api_specification.method_catalog.mailbox.*
      - dashboard and digest mailbox read closure
      - broader docs/CI/repo-wide closeout owned by #1089
      - repo-wide CI closeout owned by #1089
      - production multi-writer SQLite concurrency semantics
    - name: mailbox_rows
      owner: runtimetools.MailboxPersistence plus apiv1.MailboxAPIStore for the v1 operator mailbox surface
      sqlite_owner: internal/store.SQLiteRuntimeStore mailbox and v1 mailbox API methods
      postgres_owner: internal/store.PostgresStore mailbox and v1 mailbox API methods
    - name: runtime_ingress_and_run_control_rows
      owner: runtimeingress.Store and runtimeruncontrol.Store
      sqlite_owner: internal/store.SQLiteRuntimeStore ingress/run-control methods
      postgres_owner: internal/store.PostgresStore ingress/run-control methods
      excludes:
      - delivery release/abandon and replay behavior owned by #1087
    - name: serve_active_run_abandon_quiescence_rows
      owner: runtimerunquiescence.ServeAbandonStore consumed by cmd/swarm serve --abandon-active-runs and --dev
      promoted_by: '#1251'
      sqlite_owner: internal/store.SQLiteRuntimeStore.ApplyServeAbandonActiveRunQuiescence
      postgres_owner: internal/store.PostgresStore.ApplyServeAbandonActiveRunQuiescence
      scope: >
        The selected runtime store owns serve-startup active-run abandon quiescence for its backend. Both SQLite local/dev
        and Postgres production/external backends apply the same `server_restart_abandon` semantics over active runs,
        same-run recoverable agent/node deliveries, agent/node event receipts, and platform pipeline receipts before
        runtime startup can reclaim work. `cmd/swarm serve` consumes this typed selected-store owner and must not infer
        support from raw Postgres handles or skip the operation on SQLite.
      excludes:
      - destructive reset/runtime.nuke container and row-deletion semantics
      - broader startup recovery/replay policy outside the rows explicitly terminalized by serve abandon
      - production multi-writer SQLite semantics
    - name: api_idempotency_rows
      owner: internal/store API idempotency persistence contract
      sqlite_owner: internal/store.SQLiteRuntimeStore.WithAPIIdempotency
      postgres_owner: internal/store.PostgresStore.WithAPIIdempotency
      promoted_by: '#1214'
      scope: >
        API idempotency owns replay, conflict detection, and completion persistence for mutating v1 API calls. SQLite
        local-dev idempotency must serialize idempotent callback execution without holding a SQLite write transaction
        across the callback, because callbacks may write through selected runtime owners such as EventBus.Publish and
        SQLiteRuntimeStore.AppendEventTx. SQLite uses process-local serialization keyed by the selected SQLite database
        path plus short database operations for purge/load/completion rows; Postgres remains authoritative for production
        concurrency through its advisory-lock owner. Callback or publish failure must leave no idempotency completion for
        the failed request.
      excludes:
      - broad API delivery/replay/concurrency semantics owned by #1087
    - name: runtime_session_registry_rows
      owner: internal/runtime/sessions.Registry
      sqlite_owner: internal/store.SQLiteRuntimeStore session registry methods
      postgres_owner: internal/runtime/sessions.PostgresRegistry through internal/store.PostgresStore database
      scope: >
        SQLite provides persisted local-dev session leases and process-local serialization. Postgres remains authoritative
        for production concurrency and cross-process session fencing.
    - name: runtime_startup_ownership
      owner: internal/runtime/startupownership.Store
      sqlite_owner: internal/store.SQLiteRuntimeStore process-local startup ownership lease
      postgres_owner: internal/store.PostgresStore advisory-lock startup ownership
      scope: >
        SQLite startup ownership prevents competing runtimes inside the local process boundary. It is not a production
        multi-writer lock substitute.
    - name: event_delivery_receipt_and_replay_rows
      owner: runtimebus.EventStore, runtimebus.EventMutationRunner/EventMutation, backend store implementations, runtimemanager.ManagerPersistence, and runtimereplayclaim committed replay contracts
      sqlite_owner: internal/store.SQLiteRuntimeStore delivery, receipt, pipeline receipt, committed replay scope, and replay-claim methods
      postgres_owner: internal/store.PostgresStore delivery, receipt, pipeline receipt, committed replay scope, and replay-claim methods
      scope: >
        SQLite supports local-dev delivery, receipt settlement, pending/backlog replay, and process-local replay claims over
        persisted rows. Postgres remains the production owner for cross-runtime claims and transaction/fencing semantics.
    - name: llm_conversation_and_turn_rows
      owner: internal/runtime/llm TurnPersistence and ConversationPersistence
      sqlite_owner: internal/store.SQLiteRuntimeStore conversation and agent turn methods
      postgres_owner: internal/store.PostgresStore conversation and agent turn methods
      scope: SQLite persists local-runtime conversation state and turns for the selected backend.
    - name: operator_trace_event_log_read_rows
      owner: apiv1.ObservabilityReadStore and v1 run.trace, event.subscribe, runtime.logs/runtime.subscribe_logs surfaces
      sqlite_owner: internal/store.SQLiteRuntimeStore observability read methods
      postgres_owner: internal/store.PostgresStore observability read methods
      scope: >
        SQLite exposes persisted local-runtime event, delivery, session, turn, and log rows through the same API read owner.
        Cursor-rich production read semantics remain Postgres-owned unless separately promoted for SQLite.
    optional_public_mutating_backend_support:
      owner: selectedRuntimeStoreFacade optional_product_capabilities plus apiv1.OperatorReadOptions method assembly
      rule: >
        Public mutating methods whose required selected optional product capability is absent for SQLite MUST remain
        fail-closed on SQLite through normal /v1/rpc method registration. Publishing a method in the public catalog does
        not imply that every selected backend wires the method; backend support is declared by the selected capability
        owner below. Producers and handlers must not infer support from backend identity, raw SQL handles, or method
        catalog presence.
      bundle_register:
        method: bundle.register
        selected_capability: BundleCatalog register writer capability
        postgres_support: supported through the Postgres persisted bundle source catalog writer
        sqlite_support: unsupported; SQLite wires the bundle catalog read capability only and must not expose bundle.register until a separately gated SQLite write owner exists
      bundle_delete:
        method: bundle.delete
        selected_capability: BundleDelete
        postgres_support: supported through the Postgres bundle delete coordinator and selected bundle catalog cleanup owners
        sqlite_support: unsupported; SQLite omits the destructive bundle delete capability and must fail closed
      run_fork:
        method: run.fork
        selected_capability: RunForkAvailability plus RunFork
        postgres_support: supported through the selected-contract Postgres run-fork runtime owner
        sqlite_support: unsupported; SQLite omits selected-contract run.fork runtime lifecycle mutation until separately promoted
      runtime_nuke:
        method: runtime.nuke
        selected_capability: ResetCoordinator plus ResetQuiescer plus ResetCleaner plus ResetContainers
        postgres_support: supported through the Postgres destructive reset owner chain
        sqlite_support: unsupported; SQLite omits destructive reset cleanup/quiescence capabilities and must fail closed
      conversation_fork:
        method: conversation.fork
        selected_capability: ConversationForkLifecycle
        postgres_support: supported through the Postgres conversation fork lifecycle owner
        sqlite_support: unsupported; SQLite may expose read-only conversation fork capability separately, but lifecycle mutation remains absent until separately promoted
      conversation_fork_chat:
        method: conversation.fork_chat
        selected_capability: ConversationForkLifecycle plus ForkChatExecutor
        postgres_support: supported through the Postgres conversation fork lifecycle owner with separately admitted fork-chat execution
        sqlite_support: unsupported; SQLite omits conversation fork lifecycle mutation and must not enable fork chat through read capability wiring
      conversation_fork_delete:
        method: conversation.fork_delete
        selected_capability: ConversationForkLifecycle
        postgres_support: supported through the Postgres conversation fork lifecycle owner
        sqlite_support: unsupported; SQLite omits conversation fork lifecycle deletion and must fail closed
    raw_sql_runtime_consumer_boundary_for_sqlite:
      runtime_sql_handle_for_sqlite: omitted
      rule: >
        Explicit SQLite store construction must leave runtime.Stores.SQLDB nil so Postgres-only raw-SQL components are not
        accidentally treated as SQLite owners. Runtime diagnostics/logging consumes the promoted backend-neutral
        RuntimeLogPersistence owner instead of a raw SQL handle. mailbox_write materialization consumes the #1186
        MailboxWriteMaterializationStore owner instead of the raw pipeline SQL database. Any future raw-SQL runtime
        consumer must receive a separately gated backend-neutral owner before it can participate in explicit SQLite runtime
        construction.
    split_boundaries:
    - "Public local/dev SQLite default flip and zero-service swarm run start proof are promoted by #1088."
    - "Docs, CI, repo-wide stale-default closeout, and #1066 parent proof remain split to #1089."
    - "Production multi-writer SQLite concurrency semantics are not promoted by #1087."
    - "Additional raw-SQL runtime feature parity for SQLite requires a separately gated backend-neutral owner before use."
  agent_session_management:
    description: The platform manages agent sessions — the lifecycle of an agent from receiving an event to completing its
      response.
    session_lifecycle:
    - 1. Event arrives in agent inbox.
    - '2. Platform creates agent session: load prompt from prompts/, substitute {{variables}} from policy.'
    - 3. Platform provides tools (from tools.yaml) to the agent session.
    - '4. Agent processes event: reasons, may call tools, may emit events.'
    - 5. Each tool call is validated (schema check, permission check) before execution.
    - 6. Each emitted event is validated (payload schema) and enters the event loop.
    - 7. Agent session completes when agent signals done or max_turns_per_task reached.
    - 8. Session state is persisted for audit/debug.
    tool_execution: Tools execute within the agent session context. Platform validates tool input against schema. Platform
      checks agent permissions before execution. Tool results are returned to the agent for continued reasoning.
    event_emission: When an agent emits an event, the platform validates the payload against events.yaml schema before publish.
      Missing required payload fields fail the emit. Undeclared agent-authored payload fields fail the emit and are not silently
      stripped. The event enters the event loop at step 1 only after that validation passes. Agent emission is NOT within a
      node handler atomic boundary — it is a standalone event publication.
    turn_budget: Each agent session has a max_turns_per_task (from agents.yaml). If the agent exceeds this budget, the session
      is terminated. The platform may emit a timeout or budget_exceeded event.
    agent_invocation: 'Agents are invoked via claude -p (CLI) or equivalent LLM API call. The platform constructs the invocation:
      system prompt + event context + tool schemas. Agents are short-lived and task-scoped. No persistent memory between sessions.
      Context from previous interactions is provided via event payload and entity state.'
    llm_provider_adapter_contract:
      description: Runtime LLM provider adapters are the canonical boundary between platform agent execution and provider-specific
        API or CLI transports. A provider adapter is production-ready only when it declares and satisfies the full adjacency
        contract for tool-schema translation, session lifecycle, response normalization, native-tool capability truth, turn/audit
        persistence, and budget usage accounting. A runtime mode switch or StartSession/ContinueSession implementation alone
        is not sufficient provider ownership.
      owner: internal/runtime/llm provider contract
      required_contract_dimensions:
        tool_schema:
          rules:
          - Platform tool definitions must be translated to the provider-facing schema format before invocation.
          - Provider-facing input schemas must be validated before execution reaches the provider.
          - Platform tool results must be returned through the provider adapter in a normalized message form.
        session_lifecycle:
          rules:
          - The adapter must preserve task, session, and session_per_entity conversation modes.
          - Platform session IDs remain platform-owned; external provider session IDs, when present, are stored only as provider
            implementation details.
          - Session rotation and retry lineage must be accounted for by the adapter contract.
          - Claude CLI provider child-session identity is the durable external-effect attempt ID. First turns start that child;
            continued turns resume the selected-store confirmed provider head and fork into a fresh attempt-owned child.
          - A missing confirmed Claude provider head is never reconstructed from the platform session ID. Provider response
            settlement and reusable confirmed-head promotion commit through one selected-store transaction before mutable
            conversation projections advance. That transaction locks and revalidates the attempt lifecycle token against the
            durable agent cell and requires the selected session lease to remain owned and unexpired before the confirmed head
            may advance. Superseded generations and expired leases leave both the attempt settlement and provider head unchanged.
        response_normalization:
          rules:
          - Provider responses must normalize assistant messages and tool calls into the platform response model.
          - Raw provider responses must be preserved for turn/audit persistence.
          - Provider-specific stream parsers are implementation details behind the adapter contract, not generic platform truth.
        native_tools:
          rules:
          - The adapter must declare whether it is strict provider-native for native_tools and which native capabilities are callable.
          - Strict provider-native adapters must fail closed rather than satisfying native_tools through fallback paths.
          - FallbackToolsAllowed only permits the runtime to consider platform fallback after a concrete fallback owner proves
            callability; it is not itself admission.
          - For non-strict fallback runtimes, bash and file_io native_tools are admitted only when the selected workspace
            execution target supports the required native command and file capabilities.
          - For non-strict fallback runtimes, web_search native_tools are admitted only when policy.web_search_provider resolves
            to a supported provider and every provider-required credential resolves to a non-empty deployment credential.
          - Static boot, dynamic agent_hire, and dynamic agent_reconfigure must fail closed before the affected agent's first
            turn when provider-native support or the required fallback owner proof is missing.
          - Persisted turn visible-tool facts must reflect callable truth for the adapter's turn.
        persistence:
          rules:
          - Agent turns and task-mode audits must be persisted consistently across adapters.
          - Conversation snapshots for reusable session modes must be explicit adapter behavior.
        budget:
          rules:
          - The adapter must declare whether usage accounting is exact provider-reported usage or an estimate.
          - Budget records must persist authored model alias, backend profile id, provider identity, transport, and concrete
            resolved model at write time for audit and cost attribution.
      current_runtime_modes:
        api:
          provider: anthropic
          transport: api
          budget_usage_accounting: exact
          native_tool_policy: fallback-aware non-strict runtime
        cli_test:
          provider: claude
          transport: cli
          budget_usage_accounting: estimated
          native_tool_policy: strict provider-native runtime
        openai_compatible:
          provider: openai_compatible
          transport: api
          budget_usage_accounting: exact
          native_tool_policy: fallback-aware non-strict runtime
          protocol: chat_completions_compatible_json
        openai_responses:
          provider: openai
          transport: api
          budget_usage_accounting: exact
          native_tool_policy: fallback-aware non-strict runtime
          protocol: native_openai_responses
      split_boundaries:
      - Adding additional provider identities or protocol families such as OpenRouter, Ollama, Bedrock,
        Azure OpenAI, Vertex, or vLLM requires a separate provider implementation/parity gate that consumes llm_provider_selection_config_authority.
      - Renaming cli_test is a separate compatibility/semantics decision.
      - Provider-selection UI is outside this adapter-contract slice.
    llm_provider_selection_config_authority:
      promoted_by: '#1127'
      implementation_status: backend_selection_and_model_alias_authority_implemented_docs_split
      description: Runtime LLM backend and authored model selection are provider-profile and model-alias based. A backend
        profile id is the canonical operator/config/persisted deployment value; it resolves to provider identity, access
        method/transport, credential source, alias-to-model resolution, and the provider adapter runtime mode consumed by
        internal/runtime/llm.ProviderContract. Authored bundles declare one provider-agnostic model alias per agent. Runtime
        readers consume write-time resolved backend/provider/model facts and MUST NOT reconstruct them from current config.
      owner: internal/runtime/llm/selection backend profile and model alias resolver
      behavior_children:
        backend_selection_config_discovery: '#1128'
        model_alias_runtime_migration: '#1129'
        docs_config_secrets_cleanup: '#1130'
      canonical_selector:
        cli_flag: --backend
        config_key: llm.backend
        env_var: null
        default_backend_profile: anthropic
        source_order:
        - --backend
        - runtime config llm.backend
        - built-in default anthropic
        retired_non_authoritative_selectors:
        - SWARM_LLM_BACKEND
        - llm.runtime_mode
        - SWARM_LLM_RUNTIME_MODE
        rules:
        - Runtime config is canonical for non-secret LLM behavior.
        - Environment variables never select the backend profile. Provider secrets resolve from swarm secrets; provider env
          names remain only deprecated shadow diagnostics. Pragmatic infra/connection env overrides are allowed only when
          explicitly owned by their configuration sections.
        - "Commands that need runtime/operator config consume the unified `swarm.yaml` resolver: explicit --config,
          local-operator, project, user-global, then built-in/default config."
        - The platform must not infer backend profile from credential, endpoint, model, or tool-gateway env presence.
        - Unsupported backend profiles and retired selector fields fail closed.
      backend_profile_identity:
        active_backend_profiles:
          anthropic:
            provider: anthropic
            transport: api
            provider_contract_runtime_mode: api
            legacy_backend_ids:
            - api
            credential_source:
              secret_key: ANTHROPIC_API_KEY
              owner: swarm secrets
              legacy_env_var: ANTHROPIC_API_KEY
              required: true
              resolution_rule: "Resolve from the provider credential store backed by swarm secrets; process env is deprecated diagnostic shadow input only and must not beat a stored secret."
          claude_cli:
            provider: claude
            transport: cli
            provider_contract_runtime_mode: cli_test
            legacy_backend_ids:
            - cli_test
            credential_source:
              secret_key: CLAUDE_CODE_OAUTH_TOKEN
              owner: swarm secrets
              legacy_env_var: CLAUDE_CODE_OAUTH_TOKEN
              required: true
              resolution_rule: "Resolve from the provider credential store backed by swarm secrets; process env is deprecated diagnostic shadow input only and must not beat a stored secret. Subprocess/container env injection is allowed only as final-boundary Claude CLI plumbing using the resolved secret value."
          openai_compatible:
            provider: openai_compatible
            transport: api
            provider_contract_runtime_mode: openai_compatible
            protocol: Chat Completions-compatible HTTP JSON at /v1/chat/completions relative to the configured base URL.
            legacy_backend_ids: []
            credential_source:
              secret_key: OPENAI_COMPATIBLE_API_KEY
              owner: swarm secrets
              legacy_env_var: OPENAI_COMPATIBLE_API_KEY
              required: true
              resolution_rule: "Resolve from the provider credential store backed by swarm secrets; process env is deprecated diagnostic shadow input only and must not beat a stored secret."
            endpoint_source:
              config_key: llm.openai_compatible.base_url
              env_var: null
              required: true
              rule: "This is deployment configuration, not a secret. Runtime config is canonical; SWARM_OPENAI_COMPATIBLE_BASE_URL is retired and must fail closed with config guidance."
            proof_boundary: This profile proves one non-Anthropic Chat Completions-compatible HTTP provider path. It remains
              named openai_compatible and is not a native OpenAI Responses API provider, not an official-OpenAI-only provider
              identity, not OpenRouter/Ollama/Bedrock/Azure/Vertex/vLLM closure, and not a provider matrix.
          openai_responses:
            provider: openai
            transport: api
            provider_contract_runtime_mode: openai_responses
            protocol: Native OpenAI Responses API resource path /responses relative to the configured base URL.
            legacy_backend_ids: []
            credential_source:
              secret_key: OPENAI_API_KEY
              owner: swarm secrets
              legacy_env_var: OPENAI_API_KEY
              required: true
              resolution_rule: "Resolve from the provider credential store backed by swarm secrets; process env is deprecated diagnostic shadow input only and must not beat a stored secret."
            endpoint_source:
              config_key: llm.openai_responses.base_url
              env_var: null
              required: false
              built_in_default: https://api.openai.com/v1
              rule: "This is deployment configuration, not a secret. Runtime config is canonical; no env-var endpoint selector is promoted."
            proof_boundary: >
              This profile proves the first native OpenAI Responses runtime adapter subset: platform-managed text transcript,
              platform function tools/function-call outputs, Responses output normalization, deterministic Responses SSE parsing,
              turn/conversation persistence, and exact provider-reported usage. It is not openai_compatible, not
              Chat Completions-compatible HTTP JSON, not provider-hosted previous_response_id continuity, not OpenAI built-in
              tools/file/image/audio/prompt/conversation closure, not an OpenRouter/Ollama/Bedrock/Azure/Vertex/vLLM provider-matrix
              proof, and not a provider runtime implementation for any backend id named openai.
        reserved_persisted_backend_profiles:
          mock: Reserved persisted profile id for fixture replay. It is not a supported active runtime backend until a
            dedicated provider/runtime owner lands.
          local: Reserved persisted profile id for local model execution. It is not a supported active runtime backend until
            a dedicated provider/runtime owner lands.
        rejected_target_names:
          openai: >
            Not active for this authority because the shipped non-Anthropic proof is Chat Completions-compatible and
            may front OpenRouter or local-compatible endpoints. Native OpenAI Responses source authority is named
            and activated as openai_responses by #1229/#1224; provider identity openai remains intentionally separate from
            backend profile id and openai must not be accepted as a selector alias.
      native_openai_responses_source_authority:
        promoted_by: '#1229'
        implementation_status: runtime_adapter_activated_first_subset
        target_backend_profile_id: openai_responses
        provider_identity: openai
        activation_status: active_backend_profile_runtime_adapter_promoted_by_1224
        authoritative_refs:
          - "https://platform.openai.com/docs/api-reference/responses"
          - "https://platform.openai.com/docs/models"
          - "https://platform.openai.com/docs/guides/function-calling?api-mode=responses"
          - "https://platform.openai.com/docs/guides/streaming-responses?api-mode=responses"
        active_selector_policy:
          - "openai_responses is accepted by --backend, config llm.backend, persisted agents.llm_backend, RuntimeFactory, and CLI help after #1224."
          - "openai remains a rejected backend selector name; provider identity and backend profile id are intentionally separate."
          - "openai_compatible remains Chat Completions-compatible HTTP JSON and MUST NOT inherit native Responses semantics."
        protocol_family:
          name: native_openai_responses
          endpoint_path: /responses
          transport: api
          request_body_owner: "provider adapter behind internal/runtime/llm.ProviderContract after #1224"
          input_scope: >
            Platform-managed text transcript plus function-tool call outputs. Image, audio, file, provider prompt
            templates, conversations, and provider-hosted item references are not part of the first source-authority subset.
          tool_scope: >
            Platform function tools only. OpenAI built-in tools such as web search, file search, code interpreter,
            computer use, hosted shell, MCP, and tool search are explicitly outside the first subset until separately gated.
          streaming_scope: >
            Streaming uses Responses server-sent events for the first supported subset. The parser family is owned by
            the native Responses adapter behind internal/runtime/llm.ProviderContract.
          session_continuity: >
            Platform session IDs and platform-managed transcript history remain canonical. Provider response
            IDs may be persisted as raw provider metadata, but previous_response_id/provider-hosted continuity is deferred
            unless a later gate promotes it explicitly.
        credential_and_endpoint_policy:
          credential_source:
            secret_key: OPENAI_API_KEY
            owner: swarm secrets
            legacy_env_var: OPENAI_API_KEY
            required: true
            resolution_rule: "Resolve from the provider credential store backed by swarm secrets; process env is deprecated diagnostic shadow input only and must not beat a stored secret."
          endpoint_source:
            config_key: llm.openai_responses.base_url
            env_var: null
            required: false
            built_in_default: https://api.openai.com/v1
          rules:
            - Swarm secrets provide the OpenAI API secret; environment variables do not select the backend or endpoint and are not the provider credential owner.
            - Runtime config is canonical for endpoint/base URL overrides used by deterministic tests or deployments.
            - "Credential validation happens after openai_responses is selected and must fail closed before HTTP if OPENAI_API_KEY is missing from swarm secrets."
        model_alias_defaults:
          cheap: gpt-5.4-nano
          regular: gpt-5.4
          frontier: gpt-5.5
        model_alias_rule: >
          The target profile uses the existing llm.models provider-scoped alias map. These defaults are consumed by
          verify, boot, and runtime materialization for openai_responses after #1224.
        provider_contract_expectations:
          tool_schema:
            - Translate platform tools to OpenAI Responses function tools with validated JSON schema parameters.
            - Return platform tool results as Responses function-call output items.
          response_normalization:
            - Normalize output messages and function calls into the platform response model.
            - Preserve raw Responses payloads for turn and audit persistence.
            - Treat provider built-in tool output as unsupported until a separate native-tool gate promotes it.
          session_lifecycle:
            - Preserve task, session, and session_per_entity conversation modes through platform-managed transcript state.
            - Persist provider response IDs only as provider metadata until previous_response_id continuity is separately promoted.
          persistence:
            - Persist authored model alias, backend profile id openai_responses, provider identity openai, transport api, concrete
              model, and raw provider response at write time once runtime implementation is promoted.
          budget:
            - Use exact provider-reported usage when available; fail closed or explicitly record unsupported usage if the provider
              response lacks required accounting fields.
        store_profile_implication: >
          #1224 updates agents.llm_backend schema/check admission so openai_responses is a valid active persisted backend
          profile id alongside anthropic, claude_cli, and openai_compatible. Legacy api and cli_test backfill behavior
          remains unchanged.
        split_boundaries:
          - '#1224 owns native OpenAI Responses runtime adapter implementation and deterministic protocol proof after this source authority lands.'
          - Provider-hosted continuity through previous_response_id, OpenAI built-in tools, file/image/audio inputs, provider
            prompt templates, conversations, and broader streaming parity remain separate gates unless explicitly promoted.
          - Provider matrix work, OpenRouter/Ollama/Bedrock/Azure/Vertex/vLLM support, Compose/local defaults, .env release docs,
            and provider-contributor docs remain split.
      model_alias_authority:
        contract_field: model
        replaces: model_tier
        alias_config_key: llm.models
        built_in_aliases:
        - cheap
        - regular
        - frontier
        built_in_model_defaults:
          cheap:
            anthropic: claude-3-5-haiku
            claude_cli: haiku
            openai_compatible: gpt-compatible-mini
            openai_responses: gpt-5.4-nano
          regular:
            anthropic: claude-3-5-sonnet
            claude_cli: sonnet
            openai_compatible: gpt-compatible
            openai_responses: gpt-5.4
          frontier:
            anthropic: claude-3-opus
            claude_cli: opus
            openai_compatible: gpt-compatible-frontier
            openai_responses: gpt-5.5
        alias_vocabulary_declaration: none; aliases are free-form strings in bundles, with well-formedness checked by verify
          and selected-backend resolution checked at boot.
        resolution_rule: Resolution is deterministic and provider-scoped. The canonical input is (backend profile id, authored
          model alias); the canonical output is the concrete provider model string plus resolved backend and provider identity.
          Per-alias runtime config overrides built-in defaults; unresolved aliases fail closed before agent turns.
        verify_rule: swarm verify validates the authored model field is present and well formed. When runtime config is
          available through the shared discovery path, verify also validates selected-backend alias resolution against built-in
          aliases plus llm.models without requiring deployment credentials.
        audit_rule: Runtime audit writes authored model alias plus resolved backend profile, provider identity, and concrete
          model at write time. Readers consume recorded values and MUST NOT reconstruct from current config.
      credential_and_config_policy:
        provider_secret_keys:
        - ANTHROPIC_API_KEY
        - CLAUDE_CODE_OAUTH_TOKEN
        - OPENAI_COMPATIBLE_API_KEY
        - OPENAI_API_KEY
        deprecated_provider_env_shadow_sources:
        - ANTHROPIC_API_KEY
        - CLAUDE_CODE_OAUTH_TOKEN
        - OPENAI_COMPATIBLE_API_KEY
        - OPENAI_API_KEY
        secret_env_sources:
        - SWARM_API_TOKEN
        - database password env/store sources
        runtime_config_canonical_for:
        - backend selection
        - provider endpoint/base URLs
        - provider model alias maps
        - tool-gateway URLs and workspace/runtime behavior
        - Claude CLI permission, output, timeout, and session behavior
        infra_connection_override_policy: Config remains canonical; env overrides are allowed only for pragmatic infra/connection
          values explicitly named by their owning config sections. This does not allow env-based backend selection.
      persistence_rules:
      - Target agents.llm_backend stores the provider-named backend profile ids anthropic, claude_cli, openai_compatible, and openai_responses.
      - "Legacy persisted backend ids api and cli_test are non-authoritative after #1128/#1129 migration and must be explicitly backfilled to anthropic and claude_cli."
      - "Authored model aliases replace model_tier as the bundle/source selector. Store/schema migration was closed by #1129."
      - Runtime manager/default materialization must persist the resolved backend profile id and model alias rather than
        reusing config/runtime-mode strings.
      - Runtime audit must persist resolved backend/provider/concrete model at write time, and readers must consume persisted
        facts rather than re-resolving against current config.
      - Agent/session conversation scope remains owned by agent_sessions.runtime_mode and is orthogonal to llm_backend.
      split_boundaries:
      - '#1127 is source-authority/spec/tracker only and MUST NOT change runtime/config/store/verify/CLI behavior.'
      - '#1128 owns backend selection/config discovery, --backend precedence, env selector retirement, and backend id migration.'
      - '#1129 owns model_tier to model alias migration, boot/verify alias validation, runtime model resolution, and audit writes.'
      - '#1130 owns public/local config and model-alias cleanup after behavior lands.'
      - '#1229 defines native OpenAI Responses source authority.'
      - '#1224 owns native OpenAI Responses active backend runtime implementation/protocol proof after #1229.'
      - Implementing OpenAI Responses, OpenRouter, Ollama, Bedrock, Azure OpenAI, Vertex, vLLM, or any other additional
        provider remains a separate provider implementation/parity gate.
      - Native multi-backend-per-run remains deferred until a separate real user need is gated.
    llm_provider_configured_outbound_admission:
      promoted_by: '#1457'
      implementation_status: configured_first_slice
      description: >
        Runtime LLM provider outbound admission is owned by runtime config plus
        the shared internal/runtime/llm provider-admission registry. It applies
        only when an operator declares limits for an active backend profile.
        Absence of matching config means no provider admission limit. The
        platform MUST NOT invent hardcoded numeric provider defaults.
      owner: internal/runtime/llm provider admission registry consuming config llm.provider_limits
      config_authority:
        config_key: llm.provider_limits
        profile_key_rule: Keys are active backend profile ids owned by llm_provider_selection_config_authority.
        active_profile_keys:
        - anthropic
        - claude_cli
        - openai_compatible
        - openai_responses
        supported_fields:
          rate_limit: '<positive integer>/<period>, for example 60/m'
          rate_limit_max_wait: 'Duration max wait before failing closed; 0s means reject immediately when queued.'
          max_concurrency: Positive integer for simultaneous outbound requests/dispatches.
          max_concurrency_max_wait: 'Duration max wait before failing closed; 0s means reject immediately when saturated.'
          models: Optional map keyed by authored model alias or concrete provider model. Model entries override only the
            limit dimensions they declare.
        duration_units: ms, s, m, h, d
        malformed_or_partial_policy: >
          Unsupported profile keys, missing paired max-wait fields, invalid
          duration syntax, non-positive limits, and nested model limit maps fail
          closed during config validation.
      runtime_rules:
      - If llm.provider_limits is absent or has no entry for the active backend profile, provider admission is a no-op.
      - Admission happens after backend/model resolution and before the outbound provider dispatch for API requests or CLI
        subprocess dispatch.
      - Anthropic API retry attempts, OpenAI-compatible requests, OpenAI Responses requests, and Claude CLI subprocess
        dispatches all re-enter the same owner when configured.
      - Bucket identity includes backend profile id, provider identity, transport, and either the profile-wide `*` model
        bucket or the selected model-specific alias/concrete key.
      - A wait timeout or immediate saturation returns a retryable runtime error with code rate_limited, component llm-provider,
        and operation provider_admission before outbound dispatch.
      split_boundaries:
      - Exact TPM/default provider-limit semantics remain unimplemented until separately promoted; this slice only implements
        explicit operator-configured admission.
      - Agent scheduler/admission, tool/MCP rate limits, budget enforcement, session locking, and backend/provider selection
        are separate owners and MUST NOT consume this section as their authority.
      - OpenRouter, Ollama, Bedrock, Azure OpenAI, Vertex, vLLM, provider-specific quota discovery, and dynamic provider
        adaptation remain separate provider-matrix gates.
    conversation_modes:
      description: How the platform manages agent session context across invocations. Public authored agent contracts
        use the field `mode`; the runtime persists the derived value in the internal `conversation_mode` column.
      modes:
        task: 'New session per event. No memory between invocations. Stateless.'
        session: 'Session persists across events for the agent. Authored normal agents declare `mode: session`; the runtime
          derives session_scope flow. session_scope global is reserved for platform-owned/internal system services and
          historical/read-only runtime rows.'
        session_per_entity: 'One session per entity the agent works on. Authored normal agents declare `mode: session_per_entity`;
          the runtime derives session_scope entity. Agent retains
          context across multiple events for the same entity but has separate sessions for different entities. Useful for
          agents that need continuity (e.g., research agent building a brief over multiple turns).'
      default: task
    platform_defaults:
      description: Agent contracts have a contracts-owned effective view before boot verification, generated/expanded
        views, catalog/read surfaces, and runtime materialization consume them. Layer 1 defaults add no authored
        syntax; they derive only safe platform-owned fields when omitted from an agent declaration.
      canonical_owner: internal/runtime/contracts effective AgentRegistryEntry normalization
      precedence:
      - Explicit authored agent field wins.
      - If the field is omitted and listed in this section, the platform default is materialized into the effective
        agent entry with provenance `platform_default`.
      - If the field is omitted and not listed in this section, no platform default exists.
      fields:
        type:
          default: generic
          rationale: Promotes the historical runtime fallback in generic agent construction into contracts-owned
            effective semantics.
        mode:
          default: task
          rationale: Consumes the public `mode` owner and derives runtime `conversation_mode` / `session_scope`
            from the effective value.
        max_turns_per_task:
          default: 100
          authored_constraint: When explicitly authored, the value MUST be positive.
          rationale: Promotes the historical LLM-agent runtime fallback into contracts-owned effective semantics.
        workspace_class:
          default: absent/empty
          rationale: No workspace class is invented by the platform. Named classes remain explicit product policy.
      no_default_fields:
        model: Cost/provider-bearing. It remains explicit in Layer 1 and missing model aliases fail validation.
        manager_fallback: No platform default in Layer 1; explicit value only.
      generated_view:
        rule: Generated/expanded views MUST show each effective Layer 1 field value and whether it was authored
          directly or platform-defaulted. Derived runtime session fields may be shown as derived from the effective
          `mode`.
      unsupported_layer_syntax:
        rule: Authored `agent_defaults`, named `profile`, `agent_profiles`, and `runtime_id_template` syntax is not
          accepted by Layer 1. These fields/blocks MUST fail closed or be separately gated before implementation.
      exclusions:
      - No defaults for logical identity, runtime/display id templates, subscriptions, emit_events, required_agents,
        pins, events, entities, public interfaces, policy, criteria, credentials, permissions, permissions_bundle, tools,
        native_tools, or flow_data_access.
    subscription_types:
      subscriptions: Static subscription list. Always active from boot (or from instance creation for dynamic flows). Cannot
        be modified at runtime. This is the agent's declared event contract.
    retired_authored_fields:
      tools_tier2: RETIRED — use tools.
      subscriptions_bootstrap: RETIRED — use subscriptions.
      subscribes_to: RETIRED for agents.yaml only — use subscriptions. Node subscribes_to and required_agents[].subscribes_to
        remain canonical fields for their separate concepts.
    emit_tool_convention:
      description: The platform auto-generates emit tools from each agent's emit_events list. Agents do NOT need to list emit
        tools in tools.
      naming: 'emit_{event_name} where dots are replaced with underscores. Example: emit_events: [score.dimension_complete]
        → tool: emit_score_dimension_complete'
      behavior: |
        Each emit tool accepts a payload object matching the event's schema in events.yaml. The platform validates
        the payload, validates any criteria_contracts.event_citations metadata against the actor's declared criteria sets,
        attaches sender context, and publishes the event.
        For pin-declared output events, generated agent emit tools MUST consume the same publish-time RoutePlan
        authority as node/system emits. If EventBus preflight reports a canonical lowered parent-connect route
        decision, the tool MUST admit the event to Publish so that EventBus persists and dispatches the typed
        RoutePlan delivery intents; if that canonical decision failed closed, the tool MUST fail closed before
        publish with zero executable route rows. Raw event-name subscribers, RouteTable fallback, live subscriptions,
        materializer repair, or producer target/broadcast escape hatches MUST NOT rescue a matched canonical
        failure. When no canonical lowered route applies, retained explicit target, structural ParentRoute,
        static child-flow delivery-entity, and broadcast escape behavior remains governed by handler_specification.handler_fields.emit
        and engine.cross_flow_routing.
      universal_tools: 'The following tools are auto-granted to all agents without explicit tools listing: agent_message
        and mailbox_send. Generated emit tools are derived from emit_events. Entity tools are governed by
        contract_formats.persistence_model.role_scoped_entity_tools and tool_model.agent_tool_filtering, not by prompt prose.'
    task_mode_audit: 'Agents in task mode do NOT create agent_sessions rows. Task mode is
      stateless — no live session, no session lookup, no session persistence. The conversation transcript
      (reasoning, tool calls, results) is persisted after each invocation to agent_conversation_audits
      (write-only audit table) and agent_turns (per-turn append-only log). The transcript is NEVER loaded
      back for subsequent invocations. Each event invocation starts with a fresh context. Task mode means
      "no memory between invocations" AND "no live session row." The persisted audit snapshot enables the
      builder Run tab to show agent reasoning details. Rows may be archived per retention policy.'
    provider_session_ids: 'External LLM provider session IDs (e.g., Anthropic conversation ID) are stored in
      runtime_state.provider_session_id — in agent_sessions for session/session_per_entity modes, in
      agent_conversation_audits for task mode. NOT in session_id or audit_id. Those are platform-owned
      UUID primary keys. The provider ID is an implementation detail that may change if the provider is swapped.'
    session_termination_metadata:
      description: 'Structured termination metadata for live reusable sessions. Stale live-session meanings
        such as orphaned, contaminated, and superseded are NOT status values. status remains one of
        active, suspended, terminated. termination_reason explains why the session was terminated.
        successor_session_id links a terminated session to its replacement when one exists.'
      uniqueness_model:
        description: 'The database uniqueness model for agent_sessions applies only to non-terminated rows.
          Terminated rows are historical lineage and may coexist for the same scope.'
        old_constraint: UNIQUE (agent_id, scope_key)
        new_constraint: 'UNIQUE INDEX agent_sessions_nonterminated_unique ON agent_sessions(agent_id, scope_key)
          WHERE status <> ''terminated'''
        live_owner_query: 'Live runtime ownership queries MUST filter status = ''active''.'
        resumable_owner_query: 'Resumable-owner queries MUST filter status IN (''active'', ''suspended'').'
      fields:
        termination_reason:
          values:
          - normal
          - cancelled
          - failed
          - orphaned
          - contaminated
          - legacy
          semantics: 'legacy is reserved for migration backfill only. The runtime MUST NOT set legacy on new terminations.'
        termination_detail: Optional human-readable detail for diagnostics/operator UI.
        successor_session_id: 'UUID link to the successor session in the same agent/scope/scope_key lineage. A session is
          superseded iff successor_session_id IS NOT NULL.'
        terminated_at: Timestamp set when status transitions to terminated.
      invariants:
      - 'status IN (active, suspended) → termination_reason, termination_detail, successor_session_id, terminated_at are NULL.'
      - 'status = terminated → termination_reason and terminated_at are required.'
      - 'successor_session_id IS NOT NULL → status = terminated.'
      - 'successor_session_id must reference a different session_id with the same agent_id, scope, and scope_key.'
      - 'successor_session_id lineage must be acyclic.'
      - 'terminated sessions are never resurrected to active or suspended.'
      transitions:
      - 'active → suspended'
      - 'suspended → active'
      - 'active → terminated'
      - 'suspended → terminated'
      - 'terminated rows may receive successor_session_id later, but status and termination_reason do not change.'
      migration:
      - 'Add nullable termination_reason, termination_detail, successor_session_id, terminated_at columns.'
      - 'Replace old UNIQUE (agent_id, scope_key) with the partial non-terminated unique index.'
      - 'Backfill legacy terminated rows to termination_reason = legacy and terminated_at = COALESCE(updated_at, created_at).'
      - 'Enable invariant enforcement only after the legacy backfill.'
    agent_memory_mode_values:
      task: 'Stateless between invocations. No agent_sessions row. Audit snapshot persisted to
        agent_conversation_audits (write-only). Per-turn history in agent_turns. Never reloaded.
        Each invocation starts fresh.'
      session: 'Persistent session across events. Live session row in agent_sessions. Requires explicit
        authored `mode: session`; the runtime derives session_scope flow for authored normal agents. session_scope global
        is reserved for platform-owned/internal system services and historical/read-only runtime rows. Conversation history maintained and reused. Agent
        accumulates context.'
      session_per_entity: 'One session per agent × entity. Live session row in agent_sessions per entity.
        Requires explicit authored `mode: session_per_entity`; the runtime derives session_scope entity. Context preserved and reused per entity.'
      stateless: Retired alias for task. Authored YAML, tool/API mutation payloads, and generated public inputs MUST reject
        stateless rather than normalize it.
    session_scope_intent:
      description: 'Runtime-derived session scope for authored normal agent contracts. Authored contracts and tool/API
        mutation payloads do not declare session_scope directly.'
      contract_field:
        field: mode
        location: Agent declaration in agents.yaml and dynamic agent_hire/agent_reconfigure memory-mode mutation payloads.
        type: string
        authored_normal_agent_values:
        - task
        - session
        - session_per_entity
        derived_runtime_scope:
          task: absent
          session: flow
          session_per_entity: entity
        retired_authored_fields:
        - conversation_mode
        - session_scope
        - session_scope_authority
        values:
        - task
        - session
        - session_per_entity
        value_notes:
          global: Reserved for platform-owned/internal system services and historical/read-only persisted runtime rows.
            Product-authored normal agents in agents.yaml and runtime mutation payloads MUST NOT declare or derive global.
        internal_authority_marker: 'Platform-owned/internal services that require session_scope global must carry the
          runtime-only persisted descriptor field session_scope_authority: platform_internal. This marker is not an
          agents.yaml/API/tool-input field and MUST NOT be inferable from authored type, role, mode, tools, or opaque config.'
      canonical_rules:
        task: 'mode task: session_scope is absent and no session lookup/row is performed.'
        session_global: 'Internal runtime state only: conversation_mode session + session_scope global means one session per agent across
          the system. scope_key = "global". This is valid only for platform-owned/internal system-service runtime
          state and historical/read-only rows; authored normal agents MUST NOT declare it.'
        session_flow: 'mode session derives conversation_mode session + session_scope flow: one session per agent per
          flow instance. scope_key = flow_instance path.'
        session_per_entity: 'mode session_per_entity derives conversation_mode session_per_entity + session_scope entity: one reusable
          session per agent per entity within the same flow instance. scope_key = entity_id.'
      invalid_combinations:
        retired_conversation_mode: 'Authored conversation_mode is a load/tool/API error; use mode.'
        retired_session_scope: 'Authored session_scope is a load/tool/API error; scope is runtime-derived from mode.'
        forged_session_scope_authority: 'Authored agents and runtime tool payloads cannot set session_scope_authority.
          Any appearance in top-level payloads, config, constraints, opaque config, or runtime descriptor paths is invalid runtime-owned metadata.'
        mode_global: 'Authored mode global is invalid. Global reusable sessions are reserved for platform-owned/internal system-service runtime state.'
        unknown_mode: 'Any authored mode outside task/session/session_per_entity is invalid.'
        stateless_alias: 'Authored stateless is invalid; use mode task.'
      boot_validation:
        description: Enforced at boot, not at first runtime session acquisition.
        rules:
        - Validate authored mode against task/session/session_per_entity and derive runtime conversation_mode/session_scope from that single owner.
        - Authored normal agents MUST NOT declare conversation_mode, session_scope, or session_scope_authority. Runtime
          mutators such as agent_hire and agent_reconfigure must enforce the same rejection and must not accept old fields
          or runtime authority through top-level payloads, config, constraints, opaque config, or runtime descriptor paths.
        - No compatibility aliases. stateless, global, and unknown mode values fail closed.
        - Derived session_scope flow requires a flow-scoped declaration with resolvable flow-instance context.
          Root-level agents cannot declare session_scope flow.
        - Derived session_scope entity requires a flow that manages entities (has initial_state). Stateless
          flows cannot declare session_scope entity.
      lookup_rules:
        global: scope_key = "global"
        flow: scope_key = flow_instance path of the agent
        entity: scope_key = entity_id from the triggering event within the agent's flow instance
    flow_data_access:
      description: Optional flow-scoped agent contract field. Declares immutable deploy-time reference files under the
        owning flow package's data/ subtree that the agent may read with the generated read_flow_data tool. This is static
        contract data, not entity state, policy scalar config, native file I/O, or a mutable artifact surface.
      contract_field:
        field: flow_data_access
        type: array of strings
        location: Flow-scoped agent declaration in agents.yaml. Root/project-scoped agents cannot declare this field unless
          a future spec adds project-scoped data semantics.
        default: omitted or empty means no flow-data read surface and no read_flow_data tool.
        example: "flow_data_access:\n  - exclusions.yaml\n  - templates/review.md"
      data_root:
        convention: contracts/flows/<flow>/data/
        scope: The filename is resolved relative to the declaring agent's owning authored flow data root, not a runtime
          flow-instance path and not another flow's data root.
        deploy_time: data/ is read-only contract data. Changes ship as contract changes and participate in workflow bundle
          identity. Runtime hot reload is out of scope.
      generated_tool:
        name: read_flow_data
        generated_for: Only agents with at least one valid flow_data_access declaration.
        input:
          filename: One of the exact normalized filenames declared for that agent.
        output:
          content: string
          content_type: yaml | json | markdown | text
          size_bytes: integer
        authorization: flow_data_access is the authorization. The tool is not universal, does not require permissions, is
          not granted by tools:, and is independent of native_tools.file_io.
      fail_closed_rules:
        - Empty filenames are invalid.
        - Absolute paths are invalid.
        - Traversal segments, dot segments, doubled separators, backslashes, drive-letter/UNC-style paths, and home-relative
          paths are invalid.
        - Missing data roots, missing files, symlink escapes, non-regular files, undeclared files, and cross-flow paths are
          invalid.
        - The tool never returns host paths to agents.
      validation:
        shared_owner: Verify, boot, runtime tool generation, runtime execution, MCP/tool visibility, and diagnostics must
          consume the same flow-data path/scoping resolver.
        boot_check: flow_data_access_validation
    criteria:
      description: Optional flow-scoped agent contract field. Declares the flow-local policy.criteria sets that are
        delivered to the agent as deterministic generated context and that the agent may cite in generated emit tools.
      contract_field:
        field: criteria
        type: array of short set names
        location: Flow-scoped agent declaration in agents.yaml. Root/project-scoped agents cannot declare this field in
          the #1717 slice.
        default: omitted or empty means no generated criteria context and no criteria citation authority.
        example: "criteria:\n  - feasibility_exclusions"
      validation:
        boot_check: criteria_contract_validation
        refs: Each item must be a short non-empty set name resolving to the declaring flow's policy.criteria section.
          Dotted paths and filesystem-like paths are invalid.
        generated_delivery: Referenced sets are rendered through criteria_contracts.delivery; criteria are not granted by
          tools, flow_data_access, prompt variables, or generic policy reads.
    native_tools:
      description: Optional agent contract field. Declares which host-level capabilities the agent may use. Default all false
        (omitted = no native capabilities). The native_tools field is the sole authorization gate — no separate permission
        entry is required. Native tools are not part of the tools system. They are runtime-level capabilities. Provider-native
        CLI runtimes may expose native tools only when their provider/runtime can actually call them; platform fallback native
        tools may be exposed only when the selected workspace execution target supports the matching capability, and visible
        native-tool surface must equal callable truth on the same turn.
      contract_field:
        field: native_tools
        type: object
        location: Agent declaration in agents.yaml, alongside tools and permissions.
        default: All capabilities false. Agents do not get native capabilities unless explicitly enabled.
        example: "native_tools:\n  bash: true\n  web_search: true\n  file_io: false"
      authorization:
        description: The native_tools field IS the authorization. It does not require a matching entry in the permissions list.
          Permissions govern platform operations (shared state — agents table, routing, mailbox). Native tools govern local
          execution capabilities (host shell, web access, filesystem). Different concerns, different gates. If the agent contract
          says bash true, the agent gets bash. Boot validation checks that capability names are valid and values are boolean.
      relationship_to_tool_filtering:
        description: Native tools are NOT part of the tools filtering system. tools controls what the platform
          injects as platform/MCP/HTTP tools. Native tools control runtime-level capabilities. They are separate channels.
          On provider-native CLI runtimes, the platform must not inject a platform tool, MCP shim, or local fallback execution
          path to satisfy a native_tools declaration. Platform fallback native tools must consume the same actor authorization
          plus workspace execution-target capability owner. The visible native-tool surface for a turn must equal callable truth
          on that same turn.
      capabilities:
        bash:
          description: Shell command execution. On supporting provider-native runtimes, bash runs provider-natively. On the
            platform fallback host workspace runtime, bash is trusted/unsafe host-user execution and is available only when the
            host backend is explicitly selected and the workspace execution target supports native_command. It runs with the
            agent's workspace backing directory as the process cwd, does not command-filter shell input, and does not provide
            Docker-equivalent isolation.
          tool_schema:
            input:
              command: string — shell command to execute
              timeout_seconds: integer — optional, default 30
              working_dir: string — Docker-backed bash uses /workspace as the process cwd. Trusted host fallback bash starts
                in the workspace backing directory resolved from logical /workspace; that backing path is not overridable by
                the agent, and absolute paths follow the host deployment namespace and OS permissions.
            output:
              stdout: string
              stderr: string
              exit_code: integer
              duration_ms: integer
          security_note: Powerful capability. The agent can execute arbitrary commands as the platform process user. Grant only
            to agents that need host-level operations (e.g., infrastructure management agents). Not appropriate for data-processing
            or analysis agents.
        web_search:
          description: Internet search. On the shipped CLI runtime, web_search is a provider-native capability. The platform
            does not satisfy native_tools.web_search through policy-managed search-provider fallback on CLI.
          tool_schema:
            input:
              query: string — search query
              max_results: integer — optional, default 10
            output:
              results: array of objects with title, url, snippet fields
          configuration:
            description: On CLI, policy.web_search_provider is not part of the native_tools contract. It does not satisfy,
              unlock, or downgrade native_tools.web_search. If the configured CLI runtime cannot expose provider-native web_search,
              startup/runtime validation must fail closed. Non-CLI runtimes may still use fallback-aware validation outside
              this CLI-specific rule.
            platform_provider_rate_limit: >
              Non-CLI platform-executed web_search_provider dispatch may declare `rate_limit` and
              `rate_limit_max_wait` alongside the provider configuration. These fields are owned by the
              external tool-provider dispatch admission model and apply only to platform-owned HTTP
              provider requests for hardcoded Brave/Serper/Tavily providers and custom provider.http
              requests. Provider-native CLI web_search and LLM-provider API calls do not consume this
              bucket. Bucket identity is keyed by workflow source, the effective policy owner/provenance
              that supplied the `policy.web_search_provider` declaration, and provider. Inherited root or
              ancestor provider declarations therefore share one provider bucket across child flows; caller
              flow becomes a bucket dimension only when that flow owns or overrides the provider declaration.
        file_io:
          description: Read and write files within workspace mounts. On the shipped CLI runtime, file_io is provider-native
            and maps to callable read_file/write_file operations on the same turn. /workspace is read-write, /data is read-only,
            /opt/swarm/contracts is read-only. Always runs locally.
          tool_schema:
            read_file:
              input:
                path: string — file path relative to workspace root or absolute within mounts
              output:
                content: string
                size_bytes: integer
            write_file:
              input:
                path: string — must be within /workspace
                content: string
              output:
                bytes_written: integer
      tool_names:
        description: Canonical tool names the agent sees for native capabilities on the CLI supporting-runtime path. These
          names are authoritative only when the same turn can actually call them. The platform must not advertise speculative
          or fallback-only native tool names on CLI.
        bash:
          tool_name: bash
          note: Single tool. Same name as the capability.
        web_search:
          tool_name: web_search
          provider_builtins:
          - WebSearch
          - WebFetch
          note: Canonical Swarm-visible name is `web_search`. On CLI this capability authorizes both provider-native web search
            and direct page-fetch builtins, but they collapse to the same canonical native capability for authorization and
            persisted turn-surface truth.
        file_io:
          tool_names:
          - read_file
          - write_file
          note: The file_io capability maps to two callable tools. The contract field is one boolean (file_io), but the agent
            sees read_file and write_file only when the supporting runtime can actually call them on that turn.
      runtime_resolution:
        description: How the platform resolves native_tools at agent session creation time on the shipped CLI runtime. All
          execution is local to the platform host. CLI enables only provider-native capability support and fails closed otherwise.
          Other runtimes may use fallback-aware validation and are outside this CLI-specific fail-closed rule.
        steps:
        - 1. Read native_tools from agent contract. If absent or empty, no native capabilities — skip.
        - 2. If the configured runtime is CLI-native-strict, ask the runtime which native capabilities it exposes provider-natively.
        - 3. For each enabled capability (bash, web_search, file_io), if the strict CLI runtime does not support it provider-natively,
          fail closed before the session/turn can advertise or execute that capability.
        - 4. On the shipped CLI runtime, enable the provider-native capability through provider invocation and transport binding.
          These run locally on the same host — workspace scoping is inherent.
        - 5. On CLI, do not inject platform fallback tools, MCP shims, or local compatibility paths to satisfy native_tools.
        - 6. Persisted turn surfaces on CLI (for example available_tools and MCP-visible facts) must reflect the same callable truth
          observed for that turn.
        provider_detection: The platform determines CLI native-tool support from the configured runtime adapter. Runtime startup
          probes may further fail closed if a declared capability cannot be bound or called on the shipped CLI runtime path.
      environment:
        description: All native tool execution is local to the platform host and respects the workspace model.
        rules:
        - All native tool execution runs locally on the platform host. There is no remote execution case.
        - bash cwd is /workspace for Docker-backed command execution. Trusted host fallback bash is full host-user shell
          execution from the resolved workspace backing directory and MUST NOT claim Docker-equivalent absolute mount paths.
          The runtime does not command-filter host bash input; command and absolute-path access follow the host deployment
          namespace and OS permissions.
        - file_io is scoped to /workspace (read-write) and /data (read-only). Writes outside /workspace are rejected.
        - On CLI, workspace scoping is guaranteed on the provider-native runtime path. The platform does not satisfy native_tools
          by switching to a separate fallback execution path.
        - Environment variables from the credential store are NOT exposed to native tools. Agents access credentials through
          platform tools (HTTP tool credential substitution, MCP server auth), not via env vars in bash.
      audit:
        description: All native tool usage is captured for observability. Task-mode agents persist transcripts (write-only)
          which ensures provider-native tool calls are always recorded regardless of conversation mode.
        provider_native: Provider-native tool usage is captured in the agent session transcript. For task-mode agents, the
          transcript is persisted (write-only) but never reloaded — providing a full audit trail without breaking stateless
          semantics.
        surface_truth: On CLI, persisted available_tools and MCP-visible turn facts must describe only the tools that were
          actually callable on that turn. The platform must not narrate native-tool fallback availability it cannot execute.
      boot_validation:
        checks:
        - All capability names in native_tools must be recognized (bash, web_search, file_io). Unknown names are a boot error.
        - All values must be boolean. Non-boolean values are a boot error.
        - If any enabled native capability is unsupported by a CLI-native-strict runtime's provider-native capability set, startup/runtime
          validation fails closed. policy.web_search_provider is not part of CLI native_tools validation or authorization. Non-CLI
          runtimes may still use fallback-aware validation outside this CLI-specific rule.
        - policy.web_search_provider `rate_limit` and `rate_limit_max_wait`, when present for a platform-executed provider,
          must satisfy the external tool-provider dispatch grammar. They do not make CLI native_tools.web_search valid.
  timer_model:
    description: Timers are durable delayed events. The platform schedules them and fires them as regular events entering
      the event loop. Canonical staged lifecycle timer authoring lives under `stages.<stage>.timers`; lower-level
      node timers remain kernel/legacy declarations for non-staged or platform-owned schedules.
    declaration:
      description: >
        Public staged lifecycle timers are declared as stage-resident rows in schema.yaml. Legacy/kernel timers are
        declared per system node in nodes.yaml.
      fields:
        id: Unique timer name
        event: Event name to fire when timer expires (e.g., timer.scan_timeout)
        delay: Canonical duration string or policy-rendered duration. Accepts Go duration strings (e.g., 72h,
          30m) plus a positive integer day unit (e.g., 7d).
        recurring: Boolean — if true, timer re-fires at the interval until cancelled
        start_on: Trigger that starts the timer. Canonical forms are state:<name>, event:<name>, or boot.
        cancel_on: Trigger that cancels the timer. Canonical forms are state:<name> or event:<name>. boot is invalid.
          cancel_on is invalid when start_on is boot until the platform defines an explicit global boot-timer cancellation
          primitive.
      trigger_forms:
        state: "state:<name> starts or cancels when the entity enters the named state"
        event: "event:<name> starts or cancels when the named event fires for the entity"
        boot: "start_on: boot starts a global schedule at platform boot. This form is only valid on start_on."
      invalid_forms:
      - "Unprefixed trigger values are boot errors. The platform does not infer state-vs-event intent from bare strings."
      - "Prefixes other than state: and event: are boot errors."
      stage_timer_authoring:
        fields:
          after: Canonical duration string or policy-rendered duration. The platform evaluates it once on stage entry
            against the owning flow's merged policy context and persists the resulting fire_at.
          emit: Optional event to emit when the timer fires.
          advances_to: Optional target stage. Presence of this field lowers to a timed transition edge and ends the
            source stage when the timer fires.
          id: Optional stable row ID. If omitted, defaults to `<stage>.<emit-event-or-advance-target>`.
        invalid_fields: [delay, interrupting, repeat, recurring]
    lifecycle:
    - 1. Timer starts when the entity enters the owning stage for stage timer rows, when the entity enters the
      start_on state, when the start_on event fires, or when start_on is boot and platform startup schedules it.
    - 2. Platform renders the timer delay at start time and persists the timer. State/event timers persist run/entity or
      flow scope plus fire_at. Boot-start timers persist as global schedules with entity_id, flow_instance, and run_id NULL.
      Non-recurring boot timers persist a one-shot fire_at. Recurring boot timers persist the recurring schedule interval.
      Active timers keep the persisted fire_at or recurrence value; later policy/config changes do not rewrite already scheduled
      timers unless a separate explicit reschedule primitive is defined.
    - 3. Stage timers cancel durably when the entity leaves the owning stage before fire_at. The schedule/cancel intent
      is part of the same lifecycle mutation unit as the stage transition; persistence failure is fatal to the mutation.
    - 4. When fire_at is reached, platform emits the timer event into the event loop. Advance-only stage timers use the
      internal event `platform.stage_timer`; user-authored emit timers use their declared event and remain visible to
      downstream consumers.
    - 5. Timer event is a regular event for user-authored emit timers — routed to subscribers, processed by handlers.
      For advance-only stage timers, the runtime consumes the internal event and applies the derived timed transition.
    - 6. If cancel_on state is reached or cancel_on event fires before fire_at, a legacy/kernel timer is cancelled.
      cancel_on is invalid for start_on boot timers until an explicit global cancellation primitive is specified.
    - 7. Recurring timers restart after firing unless cancelled. Stage timer rows do not support repeat/recurring behavior
      in this slice.
    crash_recovery: >
      Timers are persisted. On restart, platform checks for expired timers and fires them. Overdue stage timers fire late
      by contract and record a typed runtime diagnostic including the timer ID, stage, and lateness instead of pretending
      punctual delivery.
    replay_and_fork: >
      Replay and fork reconstruct stage timer facts from recorded timer state under the run/fork admission rules. Fired
      and cancelled stage timers are not rescheduled as active work.
    boot_validation:
      start_on: start_on must match state:<name>, event:<name>, or boot. Any other form is a boot error.
      cancel_on: cancel_on must match state:<name> or event:<name>. boot is not valid.
      stage_timers: >
        Stage timer source and advances_to target must reference declared stages in the owning flow. The internal
        `platform.stage_timer` event used for advance-only rows does not require authored event-catalog membership.
        In a flow that declares `stages:`, node-level timers using `start_on: state:*` or `cancel_on: state:*` are
        rejected as legacy staged authoring; use `stages.<stage>.timers`.
      boot_start: start_on boot creates a global startup schedule. Recurring and non-recurring boot timers are valid only
        when cancel_on is absent. A boot-start timer with cancel_on is a boot error because no entity/run-scoped cancellation
        context exists for that global schedule.
      state_reference: state:<name> must reference a declared flow state. Unknown state is a boot error.
      event_reference: event:<name> must reference an event in the flow or platform catalog and must have an authored producer
        path, platform producer, or explicit external source. Unknown or inert event triggers are boot errors.
      fire_event_consumer: The timer fire event must have an executable handler/agent consumer, a declared output boundary, or
        explicit external consumer metadata. Catalog membership alone is not sufficient proof that a timer can do useful work.
      cancel_state_reachability: >
        For timers started by state:<name> or event:<name>, cancel_on state:<name> must be reachable after every possible
        timer activation context in the authored transition graph. start_on state:<name> uses that state as the activation
        context. start_on event:<name> derives activation states from same-flow handlers for that event: handler-level advances_to,
        on_complete advances_to, rules advances_to, accumulate.on_complete advances_to, and accumulate.on_timeout advances_to
        targets are post-handler activation states; a handler with no authored state target uses its authored source states.
        The timer's own fire event is not valid proof of a pre-fire cancellation path. The activation state itself is not
        sufficient proof unless an authored post-activation transition reaches the
        cancel state from that activation state. Missing activation proof or any derived activation state with no
        post-activation path is a boot error. start_on boot state-cancel reachability is left to explicit boot-start
        scheduling semantics and is not closed by this rule.
    example: "stages:\n  awaiting_review:\n    timers:\n      - after: 48h\n        emit: review.sla_escalated\n\
      \      - after: \"{{marginal_park_days}}d\"\n        advances_to: expired\n  expired:\n    terminal: true\n\
      \n# Legacy/kernel timer example:\ntimers:\n  - id: daily_report\n    event: timer.daily_report\n    delay: \"{{report_interval_hours}}h\"\
      \n    start_on: boot\n    recurring: true"
  expression_language:
    description: All guard checks, rule conditions, filter conditions, and on_complete branch conditions are evaluated using
      CEL (Common Expression Language). CEL is a non-Turing-complete, safe expression language designed for policy evaluation.
    specification: https://github.com/google/cel-spec
    go_implementation: https://github.com/google/cel-go
    context_variables:
      entity: Current entity state (all declared entity fields at type-valid values + envelope + gates)
      payload: Current event payload fields
      event: Current runtime-owned event envelope/context fields
      policy: Policy values from flow policy.yaml merged with root policy.yaml
      fan_out: Available after fan_out step for count metadata (fan_out.count). fan_out.index is available only
        while evaluating fan_out.emit.fields for one item.
      join: Available only while evaluating join complete_when and selected on_complete/timeout outcomes. The typed fields
        are expected, completed, missing, results, and timed_out; join is read-only and never persisted as entity state.
      accumulated: Available inside on_complete after accumulation (list of received items)
    ambient_time: >
      CEL guard/rule/filter/on_complete conditions must not call ambient time functions such as `now()` or
      `timestamp()`. Time-driven behavior is authored with stage timers so fire_at is evaluated once and persisted.
    supported_operators:
    - 'Comparison: ==, !=, <, <=, >, >='
    - 'Logical: &&, ||, !'
    - 'Arithmetic: +, -, *, /'
    - 'Membership: in, contains'
    - 'String: startsWith, endsWith, matches'
    - 'List: size, exists, all, filter, map'
    presence_semantics:
      has_function:
        signature: has(entity.X) -> boolean
        meaning: Returns true for declared entity fields. Remains useful for dynamic maps and rare non-contract objects, but is
          redundant for declared entity fields under universal presence semantics.
      null_comparison:
        meaning: 'entity.X == null and entity.X != null compare against the materialized value. Timestamp and uuid fields may
          legitimately read null when unwritten; most other declared fields read their non-null type defaults.'
      missing_field_rule: Declared entity fields read as their explicit initial or type default. Undeclared fields are contract errors.
    examples:
    - entity.retry_count <= policy.max_retries
    - payload.category == "billing"
    - entity.priority_score >= policy.min_priority
    - entity.error_count == 0
    - payload.decision == "approve"
    - entity.revision_count < policy.max_revisions
    - entity.total_amount >= policy.approval_threshold
    - entity.kill_reason
    - entity.kill_reason != null
  error_model:
    description: How the platform handles failures at each layer.
    failure_taxonomy:
      owner: platform-spec.yaml#engine.error_model.failure_taxonomy
      executable_owner: internal/runtime/failures
      namespace: platform.*
      namespace_rule: The platform.* failure namespace is closed and reserved. Product contracts cannot mint classes or selectors in it.
      triage_rule: Author-contract mistakes are bootverify findings. Runtime classes represent only facts that can arise after a valid contract is admitted.
      deterministic_definition: Given the same recorded execution inputs and pinned runtime facts, re-execution produces the same failure class and semantic detail.
      authority:
        rule: A valid wire spelling is not authority. Provenance is established before an envelope may control class, selector membership, disposition, stamped decisions, or rendering.
        sources:
          same_process:
            status: authoritative
            requirement: The envelope is created by internal/runtime/failures; its registry owns class, detail validation, retryability, determinism, message, and remediation. Every typed-error extraction and authority ingress revalidates the current envelope contract. A malformed same-process typed error is canonicalized to platform.internal_failure/invalid_failure_construction or rejected before persistence, disposition, logging, or readback.
          persisted_or_replayed:
            status: authoritative_after_current_version_validation
            requirement: The envelope is loaded through the hard-migrated local persistence, replay, or fork path and passes strict current-schema validation without prose reclassification.
          local_gateway_server:
            status: authoritative_at_server_boundary
            requirement: Served /tools and /mcp responses serialize a same-process envelope; presentation text is never semantic authority.
          managed_startup_local_gateway:
            status: authoritative_with_construction_provenance
            requirement: Exact preservation requires an in-memory, unexported marker minted from a runtime-owned listener binding only after generated-token validation and fresh turn-context registration. Public binding fields, URL shape, copied token values, or payload spelling cannot establish provenance.
          generic_external_mcp:
            status: untrusted_provider_evidence
            requirement: HTTP and stdio mcp_servers responses always translate through the local constructor. Remote class, decisions, templates, component, operation, arbitrary attributes, and prose cannot become canonical evidence. No local-looking URL or token heuristic upgrades trust.
          federated_swarm_peer:
            status: unsupported
            requirement: Exact cross-runtime preservation requires a separately approved registry-version, peer-identity, attestation, downgrade, and migration protocol. No trust flag or implicit federation mode exists.
      envelope:
        schema_version: platform.failure/v1
        copy_rule: Copying an envelope neither establishes authority nor erases malformed non-null evidence. The receiving semantic owner validates before use.
        required:
        - schema_version
        - class
        - detail
        - retryable
        - deterministic
        - message
        - remediation
        fields:
          schema_version: constant platform.failure/v1
          class: one exact key from classes
          detail:
            required:
            - code
            fields:
              code: stable lowercase identifier matching ^[a-z][a-z0-9_]*$
              attributes: class-owned typed JSON object; provider-specific values remain detail and cannot mint classes
          retryable: stamped decision derived by the executable registry; producers cannot set it
          deterministic: stamped decision derived by the executable registry using deterministic_definition; producers cannot set it
          message: registry-owned template rendered with the detail code; producers cannot supply prose
          remediation: registry-owned template rendered with the detail code; producers cannot supply prose
          component: optional runtime component identity
          operation: optional stable runtime operation identity
      selectors:
        platform.any:
          members:
          - platform.timeout
          - platform.connector_failure
          - platform.compute_failure
          - platform.outcome_uncertain
          - platform.retry_exhausted
          - platform.budget_exhausted
          - platform.data_limit_exceeded
          - platform.authentication_required
          - platform.authorization_denied
          - platform.target_unreachable
          - platform.target_ambiguous
          - platform.fan_out_bound_exceeded
          - platform.chain_depth_exceeded
          - platform.early_arrival
          - platform.stale_arrival
          - platform.unexpected_arrival
          - platform.conflicting_duplicate
          - platform.reply_already_terminal
          - platform.superseded_generation
          - platform.lifecycle_conflict
          - platform.schema_invalid
          - platform.dependency_unavailable
          - platform.internal_failure
          exclusions: []
        platform.any_task_failure:
          members:
          - platform.timeout
          - platform.connector_failure
          - platform.compute_failure
          - platform.outcome_uncertain
          - platform.retry_exhausted
          - platform.budget_exhausted
          - platform.data_limit_exceeded
          - platform.authentication_required
          - platform.authorization_denied
          - platform.target_unreachable
          - platform.target_ambiguous
          - platform.fan_out_bound_exceeded
          - platform.chain_depth_exceeded
          - platform.superseded_generation
          - platform.lifecycle_conflict
          - platform.schema_invalid
          - platform.dependency_unavailable
          - platform.internal_failure
          exclusions:
          - platform.early_arrival
          - platform.stale_arrival
          - platform.unexpected_arrival
          - platform.conflicting_duplicate
          - platform.reply_already_terminal
          exclusion_reason: Temporal/cardinality arrivals are event-admission failures, not task executions.
      matching_rule: Selector matching is exact positive-set membership. Prefix, suffix, substring, and prose matching are forbidden.
      classes:
        platform.timeout:
          family: task_execution
          task_failure: true
          retryable: true
          deterministic: false
          message_template: Runtime deadline exceeded (%s).
          remediation_template: Retry after confirming the dependency can complete within the declared deadline (%s).
        platform.connector_failure:
          family: task_execution
          task_failure: true
          retryable: true
          deterministic: false
          decision_overrides: provider_credit_exhausted is non-retryable and deterministic; typed status 408, 429, and 5xx are retryable
          message_template: External connector failed (%s).
          remediation_template: Inspect the connector status and typed failure detail (%s).
        platform.compute_failure:
          family: task_execution
          task_failure: true
          retryable: false
          deterministic: true
          message_template: Compute module failed (%s).
          remediation_template: Correct the module or its declared resource limits (%s).
        platform.outcome_uncertain:
          family: task_execution
          task_failure: true
          retryable: false
          deterministic: false
          message_template: Operation outcome is uncertain (%s).
          remediation_template: Reconcile the authoritative operation state before retrying (%s).
          detail_contracts:
            run_terminal_persistence_unconfirmed:
              owner: internal/runtime/failures plus internal/builder run terminal adapter
              attributes:
                attempted_status:
                  required: true
                  enum:
                  - failed
                  - completed
              additional_attributes: false
              cause_policy: The original execution failure, storage error text, nested envelopes, and ad hoc persistence fields are forbidden. The persisted outcome must be reconciled before retry.
            directive_heartbeat_shutdown_unconfirmed:
              owner: internal/runtime/agentcontrol directive failure adapter
              attributes: {}
              additional_attributes: false
              cause_policy: Response-local evidence only. Raw heartbeat or storage diagnostics are forbidden.
            directive_failure_persistence_unconfirmed:
              owner: internal/runtime/agentcontrol directive failure adapter
              attributes: {}
              additional_attributes: false
              cause_policy: Response-local evidence only. The original execution failure and storage diagnostics are forbidden; authoritative reload decides which atomic branch committed.
            directive_result_persistence_unconfirmed:
              owner: internal/runtime/agentcontrol directive failure adapter
              attributes: {}
              additional_attributes: false
              cause_policy: Response-local evidence only. The result and storage diagnostics are forbidden; authoritative reload decides which atomic branch committed.
            directive_execution_lease_expired:
              owner: internal/runtime/agentcontrol directive failure adapter
              attributes: {}
              additional_attributes: false
              cause_policy: Durable recovery evidence. Raw heartbeat, execution, and storage diagnostics are forbidden.
        platform.retry_exhausted:
          family: task_execution
          task_failure: true
          retryable: false
          deterministic: true
          message_template: Retry policy was exhausted (%s).
          remediation_template: Resolve the underlying failure before starting a new execution (%s).
        platform.budget_exhausted:
          family: task_execution
          task_failure: true
          retryable: false
          deterministic: true
          detail_required:
          - budget_kind
          budget_kind:
          - spend
          - agent_turns
          - tool_rounds
          message_template: Execution budget was exhausted (%s).
          remediation_template: Increase or reset the declared budget before starting a new execution (%s).
        platform.data_limit_exceeded:
          family: task_execution
          task_failure: true
          retryable: false
          deterministic: true
          detail_required:
          - limit_kind
          - limit
          - actual
          message_template: Runtime data limit was exceeded (%s).
          remediation_template: Reduce the result size or raise the declared limit (%s).
        platform.authentication_required:
          family: access
          task_failure: true
          retryable: false
          deterministic: true
          detail_required:
          - auth_kind
          message_template: Authentication is required (%s).
          remediation_template: Provide or refresh the required credential (%s).
        platform.authorization_denied:
          family: access
          task_failure: true
          retryable: false
          deterministic: true
          detail_required:
          - action
          message_template: Authorization was denied (%s).
          remediation_template: Grant the required authority or use an authorized principal (%s).
        platform.target_unreachable:
          family: routing_control
          task_failure: true
          retryable: false
          deterministic: false
          message_template: Runtime target is unreachable (%s).
          remediation_template: Restore or select a reachable target (%s).
        platform.target_ambiguous:
          family: routing_control
          task_failure: true
          retryable: false
          deterministic: true
          message_template: Runtime target is ambiguous (%s).
          remediation_template: Make target selection resolve to exactly one target (%s).
        platform.fan_out_bound_exceeded:
          family: routing_control
          task_failure: true
          retryable: false
          deterministic: true
          message_template: Fan-out bound was exceeded (%s).
          remediation_template: Reduce the collection or raise the declared bound (%s).
        platform.chain_depth_exceeded:
          family: routing_control
          task_failure: true
          retryable: false
          deterministic: true
          message_template: Event chain depth was exceeded (%s).
          remediation_template: Break the causal event cycle or reduce its depth (%s).
        platform.early_arrival:
          family: temporal_cardinality
          task_failure: false
          retryable: false
          deterministic: true
          message_template: Event arrived before its admitted window (%s).
          remediation_template: Retry only through the owning temporal policy (%s).
        platform.stale_arrival:
          family: temporal_cardinality
          task_failure: false
          retryable: false
          deterministic: true
          message_template: Event arrived after its owning lifecycle closed (%s).
          remediation_template: Start a new lifecycle rather than reusing the closed one (%s).
        platform.unexpected_arrival:
          family: temporal_cardinality
          task_failure: false
          retryable: false
          deterministic: true
          message_template: Event is not admitted by the active contract (%s).
          remediation_template: Send an event admitted by the active request or join (%s).
        platform.conflicting_duplicate:
          family: temporal_cardinality
          task_failure: false
          retryable: false
          deterministic: true
          message_template: Duplicate identity carries conflicting content (%s).
          remediation_template: Reuse the original content or mint a new identity (%s).
        platform.reply_already_terminal:
          family: temporal_cardinality
          task_failure: false
          retryable: false
          deterministic: true
          message_template: Request already has a terminal reply (%s).
          remediation_template: Do not send a second distinct terminal reply (%s).
        platform.superseded_generation:
          family: runtime_lifecycle
          task_failure: true
          retryable: false
          deterministic: true
          message_template: Agent generation was superseded (%s).
          remediation_template: Start new work under the current lifecycle generation (%s).
        platform.lifecycle_conflict:
          family: runtime_lifecycle
          task_failure: true
          retryable: false
          deterministic: true
          message_template: Agent lifecycle authority conflicts with the requested transition (%s).
          remediation_template: Reload the canonical lifecycle cell before retrying (%s).
        platform.schema_invalid:
          family: boundary_platform
          task_failure: true
          retryable: false
          deterministic: true
          message_template: Runtime input violates its schema (%s).
          remediation_template: Correct the runtime input to match the declared schema (%s).
        platform.dependency_unavailable:
          family: boundary_platform
          task_failure: true
          retryable: true
          deterministic: false
          message_template: Required runtime dependency is unavailable (%s).
          remediation_template: Restore the dependency and retry the execution (%s).
        platform.internal_failure:
          family: boundary_platform
          task_failure: true
          retryable: false
          deterministic: false
          decision_overrides: typed_read_result_marshal_failed and directive_execution_not_admitted are deterministic
          message_template: The platform encountered an internal failure (%s).
          remediation_template: Inspect the typed detail and runtime diagnostics (%s).
          detail_contracts:
            directive_board_step_failed:
              owner: internal/runtime/agentcontrol directive failure adapter
              attributes: {}
              additional_attributes: false
              cause_policy: Used only for an untyped BoardStep error. Raw execution prose is forbidden.
            directive_execution_not_admitted:
              owner: internal/runtime/agentcontrol directive failure adapter
              attributes: {}
              additional_attributes: false
              deterministic: true
              cause_policy: Durable keyless prepared-operation recovery evidence. Raw recovery prose is forbidden.
    event_validation_failure:
      behavior: Reject event. Log error. Do not deliver. No retry.
      visibility: Error logged with event name, payload, and validation error.
    handler_execution_failure:
      behavior: Rollback atomic boundary. Mark event as failed for this handler.
      retry_policy:
        max_retries: 3
        backoff: exponential with configurable base. Default base 1s (delays 1s, 2s, 4s). Configurable via policy.yaml
          handler_retry_base_seconds. Production deployments may use longer bases (e.g., 60s for 1min, 5min, 30min delays).
        decision_owner: engine.FailureDisposition consumes the canonical envelope's registry-stamped retryable value; error prose is never classified
      dead_letter: After max_retries exhausted, emit platform.dead_letter with the canonical failure envelope and retry history.
        Dead letter events are root-scoped.
    agent_session_failure:
      behavior: Agent exceeds turn budget or crashes. Session terminated.
      retry_policy:
        max_retries: 1
        backoff: Same configurable base as handler retries.
        note: Agent sessions are expensive (LLM calls). Retry once, then dead-letter. The 1-retry limit is separate from the
          handler 3-retry limit.
        decision_owner: internal/runtime/engine.FailureDispositionFor consumes the canonical returned Agent.OnEvent failure envelope.
        terminal_rule: A terminal or dead-letter disposition terminalizes the delivery immediately, preserves the original envelope,
          does not advance retry_count, and must not be labeled retry_exhausted.
        exhaustion_rule: platform.retry_exhausted is synthesized only after retry dispositions consume the configured retry budget.
    timer_failure:
      behavior: Timer event treated as regular event. Same retry policy as handler failures.
    chain_depth_limit:
      description: Maximum number of chained event emissions in a single causal chain. Prevents A→B→A→B infinite loops.
      max_depth: 50
      behavior: Each event carries a chain_depth counter (starting at 0). When a handler emits a new event, chain_depth increments.
        If chain_depth exceeds max_depth, the event is routed to platform.dead_letter instead of being delivered. The chain
        is broken.
    dead_letter_schema:
      description: Structured payload for platform.dead_letter events.
      fields:
        original_event: string — the event name that failed
        original_payload: object — full payload of the failed event
        source: object — original event.source route identity, preserving emitter lineage
        target: object — original singular event.target route identity when one was resolved
        target_set: list — original event.target_set route identities when fan-out targeting was resolved
        delivered_to: list — routing-execution recipients selected before failure, including each recipient delivery target when applicable
        entity_id: string — receiver-context projection
        flow_instance: string — receiver flow instance projection
        failure: required platform.failure/v1 envelope; target and routing details live in failure.detail.attributes
        retry_count: integer — number of retries attempted before dead-lettering
        chain_depth: integer — current chain depth (for chain_depth_exceeded)
        handler_node: string — which system node was handling (if handler_error)
        timestamp: string — ISO 8601
    chain_depth_behavior:
      description: 'What happens when chain_depth exceeds the limit (default: 50).'
      intercepted_event: The event that would exceed the limit is NOT emitted. It is intercepted before entering the event
        loop. It does NOT appear in emitted_events.
      dead_letter_record: 'A dead_letters row is created with a platform.chain_depth_exceeded failure envelope, containing the intercepted event name, payload, and the chain depth at interception.'
      triggering_handler_outcome: 'The handler that attempted to emit the chain-exceeding event gets outcome: success. The
        handler itself succeeded — it is the EMITTED event that was intercepted. The handler''s other side effects (state
        changes, gate sets, data writes) still commit.'
      note: Chain depth overflow is NOT a handler failure. It is an emission interception. The dead_letter is for the downstream
        event, not the handler that produced it.
  boot_verification:
    description: The platform runs contract verification at boot, after loading all contracts and before starting any nodes
      or agents. If any check fails, boot aborts. These checks are the authoritative integration test.
    checks:
    - id: event_chain_integrity
      severity: warning
      scope: per-flow
      trigger: An emitted event has no handler path to any terminal state or output pin. Detects dead-end events.
      when: boot-only
    - id: event_consumer_exists
      severity: warning
      scope: per-flow
      trigger: An event is emitted (by a node handler or agent emit_events) but no node or agent subscribes to it. Suppressed
        only by accepted external/non-derivable swarm.consumer proof or swarm.status metadata. Internal consumers are derived
        from topology owners; authored swarm.consumer values that restate internal handlers, agents, timers, pins, connect
        routes, runtime owners, or effective system-node helpers fail closed under event_metadata_authority.
      when: boot-only
    - id: event_producer_exists
      severity: warning
      scope: per-flow
      trigger: An agent subscribes to an event that no node handler emits and no agent lists in emit_events. Suppressed if the
        event has accepted external/platform swarm.source proof, accepted external/non-derivable swarm.producer proof,
        swarm.status metadata, or an exact authoritative platform_events.catalog match. Internal producers are derived from
        topology owners; authored swarm.source or swarm.producer values that restate internal handlers, agents, timers, pins,
        connect routes, runtime owners, or effective system-node helpers fail closed under event_metadata_authority.
      when: boot-only
    - id: event_metadata_authority
      severity: hard_invalidity
      scope: per-event
      trigger: An events.yaml entry authors legacy event metadata fields (`producer`, `consumer`, `_source`, `_producer`,
        `_consumer`, `_status`) or authors `swarm.source`, `swarm.producer`, or `swarm.consumer` values that deterministically
        restate internal topology roles. `swarm.*` event metadata is external/platform/non-derivable proof only; internal roles
        are derived from handlers, agents, timers, fan_out, auto_emit_on_create, pins, connect routes, runtime owners, and
        effective system-node helpers.
      when: boot-only
    - id: payload_field_coverage
      severity: error
      scope: per-flow
      trigger: A handler data_accumulation write reads a source payload field (direct write, source_field, or CEL payload reference)
        that does not exist in the configured source_event or triggering event payload schema in events.yaml.
      when: boot-only
    - id: entity_write_target_compliance
      severity: error
      scope: per-flow
      trigger: A handler-side entity write target names an envelope field, undeclared or unresolved entity field path, or appears
        in a flow with no declared Wave 1 entity contract.
      when: boot-only
    - id: condition_payload_alignment
      severity: error
      scope: per-flow
      trigger: A CEL condition references payload.X where X is not a declared field in the triggering event's schema.
      when: boot-only
    - id: condition_policy_alignment
      severity: warning
      scope: per-flow
      trigger: A CEL condition references policy.X where X is not a key in any reachable policy.yaml (flow-level or root).
      when: boot-only
    - id: state_machine_coherence
      severity: error
      scope: per-flow
      trigger: >-
        An advances_to target is not in the flow's lowered declared state list. Or the lifecycle declaration is malformed:
        legacy initial_state is not in states, staged lifecycle mixes stages with legacy lifecycle fields, a non-empty
        stages mapping lacks exactly one initial stage, or a non-empty stages mapping declares no terminal stage.
      when: boot-only
    - id: required_agents_match
      severity: error
      scope: root-and-per-flow
      trigger: An explicit schema.required_agents boundary declares a role that has no matching agent in that scope's
        agents.yaml by exact map key; or the matching agent does not cover all required subscribes_to / emits events.
        Omitted required_agents is not a restatement surface and MUST NOT trigger this check by itself.
      when: boot-only
    - id: handler_field_compliance
      severity: error
      scope: per-node
      trigger: A handler or handler action declaration violates the platform handler contract. This includes unknown or retired
        handler/action fields, unsupported platform action identifiers, missing required declaration fields for supported actions,
        unresolved executable action or guard owners, runtime-handled events without a system-node executor, and invalid typed
        action declarations or result payload shapes.
      when: boot-only
    - id: tool_resolution
      severity: warning
      scope: per-agent
      trigger: An agent's tools list references a non-MCP tool name that does not exist in the merged runtime tool
        registry (platform builtin tools, authored tools.yaml/http tools, and MCP server catalogs). Required MCP-backed
        tools are governed by required_mcp_tool_availability instead of this warning path.
      when: boot-only
    - id: required_mcp_tool_availability
      severity: hard_invalidity
      scope: per-agent
      trigger: An MCP-backed tool that can become visible or callable for an agent turn lacks exact concrete
        tools/list catalog proof from the runtime MCP discovery owner. This includes explicit agent tools entries,
        authored tools.yaml handler_type:mcp entries selected for an actor, and runtime actor tool definitions or
        gateway catalog entries. Declared MCP prefixes, authored handler_type:mcp schemas, and later mcp tools/call
        unavailable errors are not sufficient proof.
      when: boot-only
    - id: platform_tool_usage_hints
      severity: hard_invalidity
      scope: per-tool
      trigger: A platform-owned delivered tool or generated emit tool lacks the shared provider-facing usage hint, the
        generated emit usage hint instructs CEL/expression arguments instead of concrete payload values, or a delivered
        tool usage hint exceeds the provider-facing lint limit.
      when: boot-only
    - id: generated_tool_schema_closure
      severity: hard_invalidity
      scope: per-tool
      trigger: A generated platform-owned emit/entity tool schema is not provider-closed, omits declared required properties,
        requires undeclared properties, declares an empty enum, or cannot be lowered to the provider JSON Schema contract.
      when: boot-only
    - id: prompt_exists
      severity: warning
      scope: per-agent
      trigger: >-
        An agent has no prompt file resolved by the canonical runtime prompt resolver. Resolution checks the agent's
        prompt_ref, logical agent id, registry entry id, mode-specific variants, workspace-class/role fallback, shard-parent
        runtime lookup, and bundle prompt-directory fallback before reporting the prompt missing.
      when: boot-only
    - id: produces_drift
      severity: warning
      scope: per-node
      trigger: >-
        A node's explicit produces list does not match the set of events derived from its supported declarative emit
        sites: handler top-level emit, rules emit, on_complete emit, accumulate.on_timeout emit, and fan_out emit.
      when: boot-only
    - id: invalid_field_detection
      severity: error
      scope: contract
      trigger: A declaration uses an unsupported or malformed field in a fail-closed contract surface. This includes node
        top-level fields outside the defined node_fields set (id, execution_type, description, subscribes_to, event_handlers,
        state_schema, state_table, timers, gate_state, produces) and malformed external tool-provider dispatch
        rate-limit declarations on HTTP tools, MCP servers, or policy.web_search_provider.
      when: boot-only
    - id: policy_conflict_detection
      severity: warning
      scope: per-flow
      trigger: A child flow policy key overrides a parent flow policy key with a different value. Informational — override
        is allowed, but the conflict is logged.
      when: boot-only
    - id: event_cycle_detection
      severity: error
      scope: per-flow
      trigger: A handler emits an event that, through a chain of handlers, eventually triggers the same handler. Indicates
        a potential infinite loop. Chain depth limit (50) is the runtime safety net, but cycles should be caught at boot.
      when: boot-only
    - id: dialect_compliance
      severity: error
      scope: per-node
      trigger: A handler uses on_complete as a map (dict) instead of a list (ordered). Or uses both on_complete and rules
        on the same handler. Or uses both create_entity and accumulate on the same handler. Or combines more than one entity
        acquisition mode on the same handler (create_entity, select_entity, select_or_create_entity).
      when: boot-only
    - id: single_node_per_event
      severity: error
      scope: global
      trigger: Two system nodes declare handlers for the same event name. Only one node may own a handler per event.
      when: boot-only
    - id: config_from_payload_alignment
      severity: error
      scope: per-node
      trigger: A create_flow_instance action's config_from payload.* refs name payload fields not present in the triggering
        event's schema. Non-payload handler-context refs, including supported event-envelope refs through event.*, are not
        payload schema fields and are governed by runtime config_from ref resolution.
      when: boot-only
    - id: phantom_produces
      severity: warning
      scope: per-node
      trigger: A node's produces list includes an event that no handler in the node actually emits.
      when: boot-only
    - id: native_tools_valid
      severity: error
      scope: per-agent
      trigger: An agent's native_tools field contains an unrecognized capability name (not bash, web_search, file_io) or a
        non-boolean value. This check validates declaration shape only; it does not treat policy.web_search_provider or any
        other fallback path as satisfying a native tool.
      when: boot-only
    - id: flow_data_access_validation
      severity: error
      scope: per-agent
      trigger: A flow-scoped agent's flow_data_access declaration references an invalid, missing, non-regular, escaping, or
        outside-flow data file; or a root/project-scoped agent declares flow_data_access.
      when: boot-only
    - id: criteria_contract_validation
      severity: error
      scope: per-flow/per-agent/per-event
      trigger: A policy.criteria set has invalid shape, duplicate stable IDs, undeclared classes, missing dispositions, bad
        inert params, or non-flow-local placement; an agent criteria ref is malformed or unresolved; an event citation field
        has an unsupported type or missing/invalid allowed_classes; or an agent emits a citation-bearing event without
        declaring the referenced criteria set.
      when: boot-only
    - id: policy_sheet_validation_value_rows
      severity: hard_invalidity
      scope: per-handler
      trigger: A policy-sheet validate value row fails to lower through the compute-owned validate operation, writes outside
        computed.validation.*, references an unresolved policy.validation set, leaves its result unconsumed, or routes an
        invalid-result branch to an event not declared by the validation set dispositions.
      when: boot-only
    - id: mcp_server_reachable
      severity: warning
      scope: global
      trigger: An MCP server declared in policy.yaml mcp_servers is unreachable at boot. Tools from that server are unavailable.
      when: boot-only
    - id: platform_namespace_violation
      severity: error
      scope: per-flow
      trigger: A product events.yaml contains an event name starting with the reserved platform. prefix, or declares/emits any
        platform_events.catalog-owned event name. Also applies to agent emit_events declarations.
      when: boot-only
    - id: workspace_class_exists
      severity: error
      scope: per-agent
      trigger: An agent declares a workspace_class that is not defined in policy.yaml workspace_classes and is not a
        platform-reserved class.
      when: boot-only
    - id: credential_key_exists
      severity: warning
      scope: global
      trigger: A tool's credentials field, an MCP server's credentials_key, or policy.web_search_provider.credentials_key
        references a credential key that does not exist in the credential store (any tier). The tool may be unconfigured in
        this deployment.
      when: boot-only
    - id: agent_permission_validation
      severity: error
      scope: per-agent
      trigger: An agent declares an unknown permission (not in the platform permissions list and not in workflow_extension_permissions).
        Or an agent's tools list includes a platform builtin tool whose required permission is not in the agent's permissions
        or permission bundle.
      when: boot-only
    - id: transition_reference_validation
      severity: error
      scope: per-flow
      trigger: A state transition (advances_to, on_complete branch) references a trigger event not in events.yaml. Or a flow's
        input/output event pins reference events not defined in any events.yaml in the flow tree.
      when: boot-only
    - id: condition_expression_validation
      severity: error
      scope: per-node
      trigger: A guard on_fail value is not one of reject, kill, discard, or escalate. Or a CEL condition is syntactically
        invalid (parse failure). Or a condition string lacks a required context prefix (entity., payload., policy., accumulated.,
        fan_out.).
      when: boot-only
    - id: transition_ownership_validation
      severity: error
      scope: per-flow
      trigger: A system node declares ownership of a transition but the flow schema does not include the transition's target
        state. Or a node owns a transition whose trigger event is not in its subscribes_to list.
      when: boot-only
    - id: event_runtime_wiring_validation
      severity: error
      scope: per-flow
      trigger: An event that requires system node handling (has node-owned state transitions) has no owning node registered. Or
        the owning node exists but has no handler for the event.
      when: boot-only
    - id: timer_validation
      severity: error
      scope: per-node
      trigger: A timer declaration is missing its owner (owner_node or owner_agent). Or the timer's owner is not a registered
        participant in the flow. Or the timer's fire_event is not in events.yaml. Timer fire/start/cancel references are
        derived internal event producer/consumer roles; authors MUST NOT restate them through swarm.source, swarm.producer,
        or swarm.consumer. External/non-derivable metadata remains only explicit proof for external producers or consumers.
      when: boot-only
    - id: write_pin_ownership_validation
      severity: error
      scope: per-flow
      trigger: Two flows declare writes to the same entity field (output data pin). Only one flow may write a given field.
      when: boot-only
    - id: gate_schema_validation
      severity: error
      scope: per-node
      trigger: A handler's sets_gate references a gate name not declared in the node's gate_state schema.
      when: boot-only
    - id: output_pin_key_carries_validation
      severity: error
      scope: per-output-pin-and-emit-site
      trigger: A connected producer output pin that participates in instance-key composition is missing key/carries evidence,
        declares ambiguous, duplicate, undeclared, or non-scalar carried fields, or an authored producer emit site cannot
        statically prove every declared key/carries payload field. Agent emit_events declarations, root or flow
        auto_emit_on_create declarations, and workflow timers for key/carries output pins fail closed until a static payload
        construction surface exists.
      when: boot-only
    - id: input_pin_wiring
      severity: warning
      scope: per-flow
      trigger: 'A flow''s required input event pin (from schema.yaml pins.inputs.events) has no satisfiable authored producer
        source on the static verify surface. The warning consumes internal/runtime/semanticview.ResolveFlowInputProducer
        evidence: boundary external ingress, intrinsic input-pin source:external, parent connect, explicit harness injection,
        platform source, and internal topology producer. It does not use unique same-name sibling output-pin inference as
        producer-pattern authority, events.yaml swarm.source:external as input-pin proof, produces, or swarm.status: planned.'
      when: boot-only
    - id: accumulate_all_bounded_escape
      severity: warning
      scope: per-handler
      trigger: A handler declares an accumulator in completion all/default mode without a schedulable bounded timeout escape.
        This is a static safety-net lint only; it does not prove the accumulator will stall.
      when: boot-only
    - id: accumulator_timeout_requires_timeout_ms
      severity: hard_invalidity
      scope: per-handler
      trigger: A handler declares accumulator completion timeout without positive timeout_ms, so runtime cannot schedule the
        accumulate.timeout event required to complete that mode.
      when: boot-only
    - id: accumulator_input_producer_path
      severity: hard_invalidity
      scope: per-handler
      trigger: A handler declares an accumulator over an input event but the authored bundle has no accepted static producer
        or source path for that event. This check consumes the same canonical producer-source resolver as input_pin_wiring
        with non-input producer checking enabled. Accepted proof classes are external event metadata for non-input events,
        parent connect, explicit harness injection, platform source, and internal topology producer (including handler emits,
        agent emit_events, flow output pins, and timers). produces declarations and swarm.status planned do not satisfy this
        proof.
      when: boot-only
    - id: pin_target_resolution
      severity: error
      scope: per-emit-site
      trigger: A pin-declared output emit or agent emit_events declaration lacks a lowered parent connect route, explicit target
        escape hatch, structural ParentRoute eligibility, eligible static child delivery-entity route, or broadcast:true;
        has malformed target syntax; references an unknown target.flow; uses
        target:sender where no inbound source can exist; uses target:sender only on external-sourced inputs with empty
        source; or uses loaded flow-scope or package-root producer target/broadcast as package-internal delivery to a
        receiver input where parent connect is required.
      when: boot-only
    - id: redundant_in_topology_select_entity
      severity: hard_invalidity
      scope: per-handler
      trigger: A handler declares select_entity or select_or_create_entity for an event whose only producers are in-topology
        connected/pin-routed producers that set event.target through parent connect, structural routing, or a valid explicit
        target. The receiver-side acquisition is invalid normal composition authority and must be replaced with receiver
        instance.by plus parent connect routing unless the event is external or mixed-provenance.
      when: boot-only
    - id: missing_external_select_entity
      severity: error
      scope: per-handler
      trigger: A stateful handler consumes an external/no-target event and declares no select_entity or select_or_create_entity,
        so it would run against event.source instead of a receiving-flow-owned entity.
      when: boot-only
    - id: semantic_drift_dead_event_schema
      severity: warning
      scope: per-event
      trigger: A product-declared event schema entry in `events.yaml` has no active authored role on the static verify surface.
        Active roles are limited to intra-flow local usage, explicit cross-flow qualified usage, root-local usage for root-declared
        events only, accepted external/platform `swarm.source` proof, accepted external `swarm.consumer` proof, same-flow timer
        fire/start/cancel references, same-flow `fan_out.emit`, and same-flow `auto_emit_on_create`. It does not treat platform catalog membership, root-local
        references into child-flow declarations, or coincidental same local names in other flows as proof.
      when: boot-only
    severity_behavior:
      error: Boot aborts. System does not start.
      warning: Canonical warning-level analyzer severity. Boot continues and logs finding details unless an explicitly
        configured strict startup/verify policy escalates warning-level findings to blocking surface failures.
      hard_invalidity: Boot aborts. Deterministic Wave 1 contract drift is treated as error-level invalidity.
      semantic_drift_warning: Canonical warning-level semantic drift finding. Boot continues and logs finding details and
        explicit check ID unless an explicitly configured strict startup/verify policy escalates warning-level findings to
        blocking surface failures.
      audit_analysis: Not surfaced on normal boot. Available on dedicated audit surfaces.
      lint_evidence: Informational only. Available on detailed lint/audit surfaces.
    surface_fatality:
      description: Analyzer finding severity and supported-surface fatality are separate concepts. A finding keeps its
        canonical severity for JSON/scriptable consumers even when a strict policy makes the current surface block.
      strict_warning_escalation: When strict startup or verify warning escalation is enabled, warning-level analyzer findings
        may block startup or `swarm verify`. Human-readable typed diagnostic lists must render those findings as blocking surface
        failures, not as non-fatal warnings.
      text_rendering:
        shared_diagnostic_convention: >-
          Typed analyzer finding lists consume `cli_specification.foundations.output_contract.diagnostic_convention`
          for the global user-facing diagnostic rules. This section owns only the analyzer finding severity/fatality
          mapping and typed-list rendering details.
        typed_finding_list: >-
          Human text lines for typed analyzer finding lists render `[BLOCKER] check_id @ location: message`,
          `[WARN] check_id @ location: message`, or `[INFO] check_id @ location: message`. `remediation:` renders on an
          indented continuation line when present. `evidence:` renders only when present and useful.
        command_outcome_failures: >-
          Single command-outcome failures that are not typed analyzer finding lists continue to use
          the CLI command-outcome prefixes such as `ERROR:` or `WARNING:`.
        error_or_blocking: Hard invalidities, errors, and policy-escalated warning findings in typed diagnostic lists use
          `[BLOCKER]`.
        non_blocking_warning: Non-blocking warning-level findings in typed diagnostic lists use `[WARN]`.
        informational: Audit/informational lint evidence in typed diagnostic lists uses `[INFO]`.
      stream_contract:
        stdout: Successful load-bearing command result only, such as `verify ok` for human output, the single JSON document
          for `--json`, or `ok` for `--quiet`.
        stderr: Human-readable analyzer diagnostics, advisory lint evidence, warnings, and blocking failures.
    check_count: 43 primary checks plus 3 supplemental checks
    implementation_notes:
      framework: Each check is a named function that receives the loaded contract bundle and returns a list of findings. Each
        finding has the check ID, severity, message, location (flow, node, agent, or event name), optional evidence, and
        optional remediation. Hard-invalidity/error findings must carry remediation by construction through the remediation-bearing
        hard-invalidity constructor or have stable/split remediation authority admitted by an AST/lint production-code guard; canonical
        report normalization remains a runtime safety net, not the proof of authoring completeness. The boot sequence runs all checks
        after contract loading and before starting nodes/agents.
      authoring_guidelines:
        shared_diagnostic_convention: >-
          Verifier findings consume `cli_specification.foundations.output_contract.diagnostic_convention` for common
          user-facing diagnostic rules. This section adds verifier-specific authoring guidance, examples, and the
          current gold-standard implementation reference.
        rule: >-
          A verifier finding names where in the contract, what is wrong, and how to fix it. Verifier findings are authored for
          contract authors, not runtime implementers. Messages name contract elements and authoring concepts, not Go functions,
          SQL tables, delivery rows, replay markers, internal GitHub issue/tracker numbers, or other implementation internals.
          User-facing diagnostics must not reference internal issue numbers or trackers; state the constraint in plain
          author-facing terms, and use a public docs URL if a pointer is warranted.
        problem_statement: >-
          The `message` field states what is wrong and where in author-facing language. It does not carry the fix text by
          itself; hard-invalidity/error fix text belongs in `remediation`.
        remediation: >-
          Remediation is concrete and imperative. Prefer `add ...`, `declare ...`, `remove ...`, or `rename ...`. When more
          than one valid repair exists, use a `Fix one of:` shape and list the valid options.
        evidence: >-
          Evidence is optional and should appear only when it helps the author understand what was checked or why the finding
          fired. Evidence should be concise, stable, and author-facing, such as checked producer/source paths or candidate field
          names; it must not expose internal runtime bookkeeping as semantic authority.
        gold_standard: >-
          `internal/runtime/bootverify/workflow_accumulator_safety_checks.go` is the current reference pattern for a
          high-quality verifier finding: it names the flow/node/handler/event, lists checked producer/source paths, and offers
          concrete repair options.
        good_example: >-
          `Flow <flow> node <node> handler <event> accumulates event <event> but no accepted producer/source path was found ...
          Fix one of: add an accepted producer path; mark the event external; remove the accumulator.`
        bad_example: >-
          `<internal helper> failed: target_required_missing` with no author-facing contract location, no imperative
          remediation, no evidence for what was checked.
        split_boundaries: >-
          True YAML file/line/path source mapping remains owned by #1746. Routing-specific remediation language and new routing
          nouns remain owned by #1786 and its routing children. Shared typed rendering and hard/error remediation enforcement are
          already owned by the verifier diagnostic renderer and AST guard; future renderer-bypass guards belong to the broader CLI
          output-conformance lane, not this verifier finding authoring guideline.
      always_on: All checks run on every boot. There is no mechanism to disable individual checks. Acknowledged warnings
        (builder feature) are a UI concern, not a runtime concern.
      scope_meaning: per-flow checks run once per flow in the tree. per-node checks run once per node. per-agent checks run
        once per agent. global checks run once for the entire contract bundle.
compliance:
  description: Boot-time and runtime compliance enforcement.
  runtime_enforcement:
    description: Checks the platform performs during execution.
    required_checks:
    - Tool calls validated against tool schema before execution
    - Platform builtin tool calls checked against agent permissions before execution (tools field entries only — MCP, HTTP,
      and native tools have their own authorization models)
    - Message delivery checked against agent message scope permission
    - State state_changes only follow declared advances_to paths
    - Guards evaluated before state advancement — block if false
    - Events, including action-originated emits, validated against payload schema before publish
    - mailbox_write handler actions preserve source_event_id and are row-idempotent for the same source event and materializer
    - artifact_repo_commit handler actions expose only opaque artifact URLs and immutable git refs, reject unsafe paths/providers,
      and are idempotent by source_event_id plus request_id/content identity
    - Accumulation is idempotent — duplicate events do not double-count
    - Permission checks read from agent.permissions, not hardcoded policy functions
    - Product behavior read from policy configuration, not hardcoded
    - Manager fallback read from agent.manager_fallback, not hardcoded role mapping
    - Workspace class read from agent.workspace_class, not hardcoded
  testing:
    description: Required test coverage for spec compliance.
    required_tests:
    - Boot validation passes with current contracts (all checks green)
    - Native tools fail closed when the configured runtime lacks provider-native support for a declared capability
    - Every declared handler has a matching Handle() implementation
    - Every state state_change follows declared advances_to paths
    - Every emitted event has a payload schema in events.yaml
    - mailbox_write materializes exactly one mailbox row per source event/materializer and rejects unsupported declarations
    - artifact_repo_commit writes only allowlisted files, produces a pinned git ref, publishes declared success/failure result
      events with schema-validated runtime-owned payload fields, rejects unsupported declarations and unsafe paths, and preserves
      replay/idempotency invariants
    - Every agent subscription resolves to an event some node or agent produces
    - Permission enforcement blocks unauthorized tool calls
    - Accumulation is idempotent under duplicate event delivery
    - Crash recovery replays undelivered events correctly
    - Persisted native-tool surfaces match callable turn truth for the supporting runtime path
    - Namespace substitution works for multi-instance flows
  handler_execution:
    description: How the runtime executes event handlers.
    rules:
    - Match inbound event to handler in owning node
    - 'If handler has guard: evaluate condition. If false, reject or kill.'
    - 'If handler has accumulate: track arrival, check completion, proceed only on complete.'
    - 'If handler has on_complete: evaluate conditions, execute matching branch.'
    - 'If handler has rules: match payload field, select the matching rule-local emit and action if present.'
    - 'Resolve side effects per handler_specification.rules_handler_interaction.side_effect_resolution: advances_to uses handler default with selected-entry override, sets_gate is handler-level only, and data_accumulation composes selected-entry writes before handler-level writes.'
    - 'If the active emit site has emit: publish the selected follow-up event.'
    - 'If the active handler or selected rule has action that is a platform action: call registered platform action.'
    - 'If the resolved action runtime instruction emits an event: publish it using the action-originated payload rules and fail-closed schema validation before commit.'
  product_boundary:
    description: Rules for product-specific code isolation.
    rules:
    - Product-specific Go code lives only in approved product packages (e.g., internal/runtime/pipeline/product/)
    - Generic runtime packages contain zero product references
    - Platform actions are platform action, not imported by generic code
    - CI guard fails if product literals appear in generic non-test Go files
  flow_coherence:
  - Every flow declared in package.yaml must have a directory under flows/
  - Root-level nodes must not duplicate flow-level node IDs
  - All handoff events must have both an emitter (source flow) and subscriber (target flow or declarative handoff)
  node_coherence:
  - The effective runtime subscription surface includes every event in event_handlers. Explicit subscribes_to is required
    only for wildcard/import-boundary escape hatches that cannot be derived from exact handler keys.
  - Every event in the effective production surface must have a payload schema in events.yaml. Explicit produces, when
    authored, is an assertion checked against handler-derived emits.
  - Guards must reference fields that exist on the entity or in policy.yaml
  - advances_to states must be reachable from the current flow state space
  agent_coherence:
  - Every tool in tools must exist in the merged tool registry (tools.yaml + MCP server catalogs)
  - Every event in emit_events must have a payload schema in events.yaml
  - Agent permissions must include required permissions for platform builtin tools in their tools
  - Every subscription event must be emitted by some node or agent
  - Every native_tools capability must be a recognized name (bash, web_search, file_io) with a boolean value
  boot_enforcement: All boot checks are defined in engine.boot_verification.checks. This is the single authoritative list.
permissions_model:
  description: Agents have a permissions list controlling what capabilities they can exercise. The platform enforces permissions
    at tool execution time and message routing time. Workflows define permissions per agent in their agent registry. Optional
    permission_bundles in policy files provide shorthand for common sets.
  enforcement: Before executing a platform builtin tool call from tools, the platform checks the calling agent's permissions
    list. If the tool requires a permission the agent lacks, the call is rejected. MCP and HTTP tools are authorized by the
    tool registry and credential store, not by agent permissions. Native tools (bash, web_search, file_io) are authorized by
    the native_tools field on the agent contract. Message scope is enforced at agent_message delivery per the scoping rules
    defined in permission_scoping.
  workflow_extensions: 'Workflows may define additional permissions beyond the platform set. The platform passes unrecognized
    permissions to workflow-registered handlers. Example: a product workflow might define approve_deployment or override_scoring.'
  permissions:
  - agent_fire
  - agent_hire
  - agent_reconfigure
  - approve_spend
  - configure_routing
  - create_flow_instance
  - human_task_decide
  - human_task_request
  - mailbox_send
  - message_flow
  - message_peers
  - schedule
  bundle_semantics:
    description: An agent may declare permissions_bundle and/or explicit permissions. If both are present, the explicit permissions
      list EXTENDS the bundle. Duplicates are deduplicated. The bundle is expanded first, then explicit permissions are added.
  permission_scoping:
    description: Defines the target scope for each permission. The platform enforces these constraints at tool execution time.
      All scoping is flow-instance-local — no permission grants cross-flow access. Cross-flow communication is via events only.
    messaging:
      message_peers:
        scope: Agents sharing the same manager_fallback value, within the same flow instance.
        rule: Caller and target must be in the same flow instance AND target.manager_fallback == caller.manager_fallback.
      message_flow:
        scope: Any agent in the same flow instance.
        rule: Caller and target must be in the same flow instance. No further constraint.
      cross_flow: Not supported. agent_message delivery is rejected if target is in a different flow instance. Cross-flow communication
        uses events (emit + subscribe).
    management:
      description: agent_hire, agent_fire, agent_reconfigure target constraints.
      scope: Same flow instance, target below caller in manager_fallback chain.
      rules:
      - Caller and target must be in the same flow instance.
      - Target's manager_fallback chain must include the caller. (A can manage B if B.manager_fallback == A, or B.manager_fallback.manager_fallback
        == A, etc.)
      - An agent cannot manage itself.
      - An agent cannot manage its own manager_fallback ancestor.
    routing:
      description: configure_routing target constraints.
      scope: Self + manageable agents (same rules as management scope).
      rules:
      - Caller can modify routes for itself.
      - Caller can modify routes for any agent it can manage (per management scope).
      - Caller cannot modify routes for agents outside its flow instance.
    manager_fallback_semantics:
      description: manager_fallback is an escalation path, not a messaging or management grant. It determines where dead-lettered
        agent sessions route to and defines the management hierarchy. It does NOT grant the fallback target messaging access
        to the agent, and it does NOT allow messaging across flow boundaries even when the fallback target is in a different
        flow.
      cross_flow_fallback: When manager_fallback references an agent in a parent flow (e.g., a child flow agent falls back to
        a root-level coordinator), escalation produces an event (platform.dead_letter or equivalent), not a direct message.
        The platform routes the escalation event through the normal event loop.
tool_model:
  description: The platform owns all tool schema serving, call validation, and execution routing. Every tool has an implementation
    class that determines how the platform executes it. Three classes exist. The generic runtime ships executors for all three.
    No product-specific tool handler code is compiled into the generic runtime.
  tool_implementation_classes:
    description: Every tool falls into exactly one implementation class. The class determines where the execution logic lives,
      what the boot validation rules are, and what the portability guarantees are.
    platform_builtin:
      description: Tools the platform ships. Always available on every deployment. The platform owns the handler code. The list
        in platform_builtin_tools is exhaustive — no other tools may use this class.
      handler_type_value: platform_builtin
      boot_rule: Must exist. Boot error if a platform_builtin handler is missing. This should never happen.
      portability: Guaranteed on every platform instance.
    mcp:
      description: Tools provided by external MCP servers. The platform connects as an MCP client, discovers tools via tools/list,
        and forwards agent calls via tools/call. The platform ships one generic MCP client executor — no per-tool handler code.
      handler_type_value: mcp
      boot_rule: If an MCP server is unreachable at boot, log warning only for optional or unreferenced external inventory.
        Any MCP-backed tool that can become visible or callable for an agent turn MUST have an exact discovered tools/list
        catalog entry before the agent turn. Missing reachability, missing catalog, missing concrete tool, prefix-only
        evidence, and authored tools.yaml handler_type:mcp entries without discovered catalog proof are hard invalidity
        under required_mcp_tool_availability. Later mcp tools/call unavailable errors are defense-in-depth only and MUST
        NOT be the first failure point for a required MCP tool.
      portability: Works anywhere the MCP server is reachable. Pre-built MCP servers exist for common services (databases,
        APIs, cloud providers). Products can ship custom MCP servers as sidecars for infrastructure-specific tools.
    http:
      description: Tools defined declaratively in tools.yaml as HTTP request templates. The platform ships one generic HTTP
        executor that reads the template, resolves variables, makes the HTTP call, and maps the response. No per-tool handler
        code. This is the primary mechanism for adding API-based tools without writing code.
      handler_type_value: http
      boot_rule: Tool definition must have a valid http block with at least url and method. Credential references are validated
        against the credential store — warning if missing (tool may be unconfigured in this deployment but should not block
        boot for other tools).
      portability: Works anywhere with network access to the target URL.
    deprecated:
      workflow_registered: 'Accepted by the loader for backward compatibility. Normalized to http if an http block is present,
        otherwise logs a boot warning: "Tool {name} uses deprecated handler_type workflow_registered with no http block. Migrate
        to handler_type: http with an http block, or provide the tool via an MCP server."'
      api_call: Same as workflow_registered — deprecated, accepted, warns.
  platform_builtin_tools:
    description: Authoritative list of platform-provided tools. Defined here only. This list is exhaustive. The runtime MUST
      ship a Go handler for each of these. Any tool not on this list MUST NOT have a Go handler in the generic runtime.
    tools:
      agent_message: Send a message to another agent. Auto-granted to all agents (universal tool).
      agent_fire: Terminate an agent session. Requires agent_fire permission.
      agent_hire: Spawn a new agent session. Requires agent_hire permission.
      agent_reconfigure: Modify an agent's prompt, tools, or subscriptions. Requires agent_reconfigure permission.
      create_entity: Create a new entity row in entity_state. Legacy trusted runtime-internal compatibility surface; not
        provider-visible or callable for normal agents.
      get_entity: Read an entity by ID. Legacy trusted runtime-internal compatibility surface; not provider-visible or
        callable for normal agents in favor of generated read_{entity_type} tools.
      human_task_decide: Record a human decision on a pending task. Requires human_task_decide permission.
      human_task_request: Create a task for human execution. Requires human_task_request permission.
      mailbox_send: Send an item to the human mailbox for decision. Auto-granted to all agents (universal tool).
      read_flow_data: Read a declared immutable reference-data file from the current agent's owning flow data root. Generated
        only from flow_data_access declarations; not universal, not tools:-granted, and not native file I/O.
      query_entities: Query entities by state, fields, or aggregation. Legacy trusted runtime-internal compatibility surface;
        not provider-visible or callable for normal agents.
      query_metrics: Read aggregated metrics (counts, sums, averages) across entities. Legacy trusted runtime-internal
        compatibility surface; not provider-visible or callable for normal agents.
      save_entity_field: Write a specific field on an entity. Legacy trusted runtime-internal compatibility surface; not
        provider-visible or callable for normal agents in favor of generated save/update tools.
      schedule: Schedule a future action or timer. Requires schedule permission.
      search_entities: Query entities by stage, field values, or metadata. Legacy trusted runtime-internal compatibility
        surface; not provider-visible or callable for normal agents.
    handler_actions:
      description: These are handler/rules-branch ACTION field values, not agent-callable tools. They are invoked via the
        action field in node handlers without rules or in selected handler.rules branches. The platform ships the handler code.
        They are listed separately from the tool catalog because agents cannot call them directly.
      actions:
        create_flow_instance: Create a new dynamic flow instance from a template.
        record_evidence: Append payload to entity accumulator. Requires evidence_target field on the handler.
        mailbox_write: Deterministically materialize authored mailbox request events into public.mailbox. Handler-without-rules
          or selected handler.rules branch action only.
        artifact_repo_commit: Deterministically commit allowlisted service-owned artifact files to a local git repository,
          persist opaque artifact URL/ref metadata, and publish declared result events. Handler-without-rules or selected
          handler.rules branch action only.
    planned_tools:
      description: Tools planned for future platform versions. Not yet implemented. The permission may exist (as an authorization
        gate) before the tool does.
      configure_routing: Add, remove, or modify event routing rules at runtime. The configure_routing permission exists and gates
        this capability. The agent-callable tool is not yet implemented. Planned for v1.5.
    generic_runtime_rule: The generic runtime ships handlers for platform_builtin tools ONLY. It does not ship handlers for
      any product-specific tool. All other tools are executed via the MCP client or HTTP executor.
    entity_tool_schemas:
      description: All entity tools operate on the generic entity_state table. They read/write entity_state.fields (JSONB),
        entity_state.current_state, entity_state.gates, and entity_state.accumulator. They do NOT operate on product-specific
        typed tables. Product-specific tables are optional query-performance optimizations — the entity tools always use the
        generic entity_state interface. For normal agents, these legacy schemas are non-provider-visible runtime-internal
        compatibility surfaces; the valid provider-visible surface is the generated role-scoped tool set from
        contract_formats.persistence_model.role_scoped_entity_tools.
      create_entity:
        description: Create a new entity row in entity_state.
        input:
          flow_instance: string — existing addressing surface. The platform infers the flow-owned entity contract from this context.
          fields: object — authored field values for the new entity. Keys must be declared on the inferred entity contract.
        output:
          entity_id: string — the created entity's ID
          current_state: string — the entity's initial state from the owning flow state machine
          created_at: string — ISO 8601
        validation: The caller does not supply entity_id, entity_type, or envelope fields. Missing declared fields materialize
          from explicit initial values or type defaults.
      get_entity:
        description: Read an entity by ID. Returns the full entity state from entity_state table.
        input:
          flow_instance: string — required existing addressing surface for the owning flow instance
          entity_id: string — required
        output:
          entity_id: string
          flow_instance: string
          entity_type: string — inferred flow-scoped entity type
          name: string (nullable)
          current_state: string
          gates: object — map of gate names to boolean values
          fields: object — all declared entity fields at type-valid values
          accumulator: object — accumulator state
          revision: integer — entity revision number
          entered_state_at: string — ISO 8601, when current_state was entered
          created_at: string — ISO 8601
          updated_at: string — ISO 8601
        note: Returns all fields. No per-caller field filtering in v1. All agents see all entity fields. Per-field visibility
          is a potential future enhancement.
      save_entity_field:
        description: Write a specific field on an entity. The field is written to entity_state.fields JSONB.
        input:
          flow_instance: string — required existing addressing surface for the owning flow instance
          entity_id: string — required
          field: string — required declared top-level field name or declared dotted subpath. Must resolve on the inferred
            entity contract and must not be an envelope field.
          value: any — required, the value to write
        output:
          entity_id: string
          field: string
          revision: integer — new revision after write
        validation: The field path must exist on the inferred entity contract. Undeclared fields, envelope fields,
          bracket/index/dynamic paths, materialized/runtime-owned fields, and post-create writes to immutable fields are
          rejected. Values must satisfy the resolved declared type.
      search_entities:
        description: Query entities by state, field values, or metadata. Returns matching entities from entity_state.
        input:
          flow_instance: string — optional, filter by flow instance
          current_state: string — optional, filter by state
          filter: object — optional, field-value pairs to match against entity_state.fields JSONB
          limit: integer — optional, default 100
          offset: integer — optional, default 0
        output:
          results: array of entity objects (same shape as get_entity output)
          total: integer — total matching count (before limit/offset)
      query_entities:
        description: Cross-entity read with aggregation. Query entities by state, fields, group, and aggregate.
        input:
          flow_instance: string — optional, filter by flow instance when the caller needs a narrower execution scope
          filter: string — optional, CEL expression evaluated against entity fields
          group_by: string — optional, envelope field or declared scalar/enum leaf to group results by
          select: array — optional, envelope fields or declared scalar/enum leaves to include in results
          limit: integer — optional, default 100
        output:
          results: array — matching entities or grouped aggregations
        validation: Filter expressions, group_by, and select selectors must resolve to envelope fields or declared scalar/enum leaves.
      query_metrics:
        description: Read aggregated metrics across entities. Counts, sums, averages.
        input:
          flow_instance: string — optional
          metric: string — required, one of count, sum, avg, min, max
          field: string — required for sum/avg/min/max, envelope field or declared scalar/enum leaf to aggregate
          group_by: string — optional, envelope field or declared scalar/enum leaf to group by
          filter: string — optional, CEL expression
        output:
          value: number — the aggregated result (for ungrouped queries)
          groups: array — for grouped queries, each entry has group_key and value
        validation: metric field, group_by, and filter selectors must resolve to envelope fields or declared scalar/enum leaves.
  agent_tool_filtering:
    description: Agents only see tools listed in their tools contract field. The platform never injects the full tool
      catalog from any source into an agent session. This controls LLM context cost.
    rule: When constructing an agent session, the platform resolves tools entries against the merged tool registry
      (platform_builtin + mcp + http). Only resolved tools are included in the LLM tool definitions. Unresolvable non-MCP
      entries log a warning per the tool_resolution boot check. Unresolvable MCP-backed entries that can become visible
      or callable for an agent turn fail closed per required_mcp_tool_availability and MUST NOT be delivered from a
      declared prefix or authored handler_type:mcp schema without exact discovered catalog proof.
    usage_hints: Provider-facing tool definitions for platform-owned delivered tools and generated emit tools MUST include
      the shared platform usage guidance. Generated emit tool usage guidance MUST describe concrete JSON payload arguments,
      not CEL or workflow expression arguments. Boot verification reports this through platform_tool_usage_hints.
    generated_schema_closure: Generated platform-owned emit/entity tool schemas MUST be recursively closed, require every
      declared property, reject undeclared required properties, and declare non-empty enums. Boot verification and workflow
      validation report this through generated_tool_schema_closure and consume the shared runtime tool-schema owner.
    universal_tools: 'The following tools are included in every agent session without listing in tools: agent_message
      and mailbox_send. Emit tools (emit_{event_name}) are auto-generated from emit_events. Neither universal communication
      tools nor emit tools require explicit tools entry.'
    role_scoped_entity_tools: 'When a normal actor resolves to a flow-owned entity contract, the platform generates
      current-entity read/save/update tools from that contract and the actor''s entity_writes declaration. The generated
      tools are eligible for the agent-visible/provider-visible surface without explicit tools entries, then filtered per
      turn by current-entity contract eligibility. The legacy entity names create_entity, get_entity, get_subject_status,
      query_entities, search_entities, query_metrics, and save_entity_field are removed before provider delivery and remain
      denied by runtime authorization as defense-in-depth. Normal actors without an entity contract receive no entity tools.'
    context_cost: An agent with 4 tools in tools pays for 4 tool schemas in LLM context, regardless of how many tools
      exist in the registry or how many tools an MCP server exposes. The filter is the contract, not the source.
    default_deny: If an agent calls a tool that is not in its tools list, not a universal communication tool, not an emit
      tool, not a generated role-scoped entity tool for an actor with an entity contract, and not a native_tools capability — the call is
      rejected. There is no default-allow policy for unrecognized tools.
  mcp_client:
    description: The platform acts as an MCP client, connecting to external MCP servers to discover and invoke tools. MCP
      servers are registered in the product's policy.yaml under mcp_servers.
    protocol: JSON-RPC 2.0 per MCP specification (tools/list for discovery, tools/call for execution).
    registration:
      location: policy.yaml under mcp_servers key
      format:
        mcp_servers:
          server_name:
            description: string — human-readable description of what this server provides
            transport: string — http | stdio
            url: string — server endpoint (for http transport). Supports policy variable substitution.
            command: string — command to spawn (for stdio transport)
            args: list — command arguments (for stdio transport)
            prefix: string — namespace prefix for this server's tools. Required. Must be unique across all registered servers.
            credentials_key: string — optional reference to credential store entry for server authentication
            rate_limit: string — optional external dispatch rate limit, format N/period, shared by all runtime tools/call
              dispatches to this MCP server.
            rate_limit_max_wait: string — required when rate_limit is present; maximum per-call admission wait before
              returning typed rate_limited.
      example: "mcp_servers:\n  postgres:\n    description: PostgreSQL database access\n    transport: http\n    url: \"{{postgres_mcp_url}}\"\
        \n    prefix: pg\n    credentials_key: postgres_mcp\n  sendgrid:\n    description: Email delivery via SendGrid\n   \
        \ transport: stdio\n    command: npx\n    args: [\"@sendgrid/mcp-server\"]\n    prefix: email"
    namespacing:
      description: MCP tools are prefixed with the server's configured prefix to avoid name collisions across servers and
        with platform builtins.
      rule: 'Server with prefix "pg" exposing tool "list_tables" registers as "pg.list_tables" in the platform tool registry.
        Agents reference the prefixed name in their tools field: [pg.list_tables].'
      resolution: 'When an agent calls "pg.list_tables", the platform splits on the first dot: prefix "pg" → server "postgres"
        → tool "list_tables". Forwards tools/call with name "list_tables" to the postgres server.'
    boot_sequence:
    - 1. For each server in mcp_servers, establish connection (HTTP client or spawn stdio process).
    - 2. Call tools/list. Cache the response as the server's tool catalog.
    - 3. For each tool in the catalog, register in the platform tool registry with the prefixed name.
    - 4. Log server name, tool count, and tool names at info level.
    - 5. If connection fails, log warning with server name and error for optional or unreferenced inventory. Skip this
      server for optional inventory, but abort boot/startup through required_mcp_tool_availability when any agent-required
      MCP tool depends on exact catalog proof from that server.
    lifecycle:
      http: Connection maintained for platform lifetime. Reconnect on failure with exponential backoff (1s, 2s, 4s, max 30s).
      stdio: Process spawned at boot, killed on platform shutdown. If process exits unexpectedly, respawn with backoff.
    external_provider_dispatch_rate_limit:
      description: >
        `rate_limit` on an MCP server declares process-local admission for runtime `tools/call` dispatches to that server.
        The bucket is shared by all discovered tools from the server, across direct Executor.Execute, /tools/{name}, and
        /mcp tools/call entry points. It applies to both HTTP and stdio MCP transports after discovery. MCP boot discovery
        (`tools/list`, initialize, startup probes) is not part of this admission bucket.
      grammar:
        rate_limit: >
          `N/period`, where N is a positive integer and period is an integer duration with unit ms, s, m, h, or d.
          The short form `N/s` means `N/1s`. Whitespace is invalid.
        rate_limit_max_wait: >
          Integer duration with unit ms, s, m, h, or d. `0s` is valid and means fail immediately rather than queue.
          This field is required when rate_limit is present; no hidden default wait is applied.
      behavior:
      - Absence of both fields means no admission limit.
      - Providing only one field is a boot/runtime validation error.
      - Excess calls wait FIFO within the process-local bucket until they can be admitted or until rate_limit_max_wait is exceeded.
      - On max-wait timeout the tool call fails with typed runtime error code `rate_limited`, component `tool-executor`,
        operation `external_dispatch_admission`, retryable true, before any outbound provider dispatch occurs.
      - Durable cross-process/fleet-wide admission, global priority, and deadline policy remain outside this owner.
  http_tool_definition:
    description: Tools defined as HTTP request templates in tools.yaml. The platform ships a generic HTTP executor that reads
      the template, resolves variables, makes the HTTP call, and maps the response. This is the primary mechanism for products
      to add API-based tool integrations without writing handler code.
    schema:
      required_fields:
        description: string — what the tool does
        handler_type: http
        input_schema: object — JSON Schema for tool arguments (same format as platform tools)
        http: object — HTTP request template (see http_block below)
      http_block:
        required:
          method: string — GET | POST | PUT | PATCH | DELETE
          url: string — URL template. Supports {{input.field_name}} substitution. Embedded substitutions inside the
            URL are percent-encoded as URL components by the runtime before request construction. Query-component
            substitutions encode spaces as `%20`, not `+`; path-component substitutions are escaped as path segments.
            Substitutions that provide the URL scheme, authority, or an absolute base URL are preserved as URL syntax rather
            than path-escaped.
            If the full url value is exactly one template variable, for example `{{input.url}}`, the resolved value is
            treated as a complete URL and is not component-encoded.
        optional:
          headers: object — header name to value template. Supports {{credentials.key}} and {{input.field_name}} substitution.
          body: object — request body template. Same substitution. Sent as JSON.
          timeout_seconds: integer — request timeout. Default 30.
      optional_fields:
        output_schema: object — field names and types the tool returns (for documentation and LLM context)
        response_mapping: object — maps response body fields to tool output fields. If omitted, the entire response body is
          returned as the tool result.
        response_success: >
          object — optional closed provider success predicate evaluated after the HTTP response is parsed and before the
          tool result is accepted. `kind` is required and is exactly `http_status_2xx` or `json_field_equals`.
          `http_status_2xx` forbids `path` and `equals`. `json_field_equals` requires a syntactically valid
          response-rooted path such as `response.body.ok` plus a scalar string, boolean, or numeric `equals` value.
          Missing paths, malformed paths, unsupported kinds, non-scalar expected values, or unequal values fail closed.
          This is not response mapping and does not shape output; it only prevents unsuccessful provider responses from
          being accepted or journaled as successful calls.
        credentials: list of strings — credential store key names this tool needs. The platform resolves them from the credential
          store at call time and makes them available as {{credentials.key}} in templates.
        managed_credential: >
          object — managed credential reference for deployment-level OAuth/token lifecycle. This is a sibling owner to
          static `credentials`; it does not create {{credentials.*}} template variables and it is not stored in
          `swarm secrets`. Fields: key is the required package-local credential handle; imported packages must declare the
          handle under `requires.credentials` and the parent import site must bind it through `bind.credentials`; no ambient
          same-name fallback is allowed. header optionally names the request header to receive the access token and defaults
          to `Authorization`. prefix optionally names the value prefix and defaults to `Bearer` only when header is omitted
          or `Authorization`; custom headers default to the raw access token. scopes optionally lists scopes required by this
          tool call. grant_type optionally declares the required managed credential grant family; supported values are
          `authorization_code`, `authorization_code_pkce`, `client_credentials`, and `github_app_installation`. grant_model
          defaults to `scope_grant` and may be `workspace_grant` for providers such as Notion that return workspace/page
          grants rather than scope strings, or `installation_grant` for GitHub App installation-token credentials.
          installation_id_input is required when grant_type is `github_app_installation` and names a top-level activity input
          field that carries the GitHub installation id selected from verified inbound context; it is forbidden for other
          grant types. token_request declares the required token endpoint profile: client_auth `post` or `basic`, body
          `form` or `json`, and optional static non-secret token endpoint headers; static token headers MUST NOT include
          Authorization or Content-Type, which are owned by client_auth/body. Boot/verify and execution fail closed when the
          connected managed credential record does not cover every required grant_type, scope, grant_model, token_request
          profile, and installation selection.
        rate_limit: string — optional external dispatch rate limit, format N/period.
        rate_limit_max_wait: string — required when rate_limit is present; maximum per-call admission wait before
          returning typed rate_limited.
    response_success_owner:
      canonical_owner: internal/runtime/httpresponsesuccess
      semantics: >
        The owner exclusively performs closed-kind validation, response-envelope path lookup, scalar/numeric equality,
        provider-failure construction, and credential-value redaction. Direct HTTP execution in internal/runtime/tools
        and activity HTTP execution in internal/runtime/pipeline construct the same response envelope and consume this
        owner. They MUST NOT retain independent kind switches, path interpreters, equality/coercion helpers, or failure
        formatters. Transport status handling, managed-token refresh, dispatch admission, and activity journaling remain
        execution-surface concerns rather than response-success semantics.
    template_resolution:
      description: Template variables in url, headers, body, and response_mapping are resolved at tool call time. URL
        template resolution is context-aware and performs URL-component percent-encoding for embedded substitutions;
        headers, body, and response_mapping resolve raw semantic values. response_success is not a template expansion
        field; it evaluates its response-rooted path against parsed HTTP response data.
      variables:
        input: Tool call arguments from the agent. Accessed as {{input.field_name}}.
        credentials: Values from the credential store for keys listed in the tool's credentials field. Accessed as {{credentials.key_name}}.
        response: HTTP response data. Available only in response_success and response_mapping. Accessed as
          {{response.body}}, {{response.status}}, {{response.headers.header_name}}.
      missing_variable: If a required template variable cannot be resolved (missing input field, missing credential), the tool
        call fails with an error returned to the agent. The platform does not make the HTTP request.
      managed_credentials: >
        `managed_credential` is resolved after package/import credential binding and before request dispatch. The managed
        credential owner provides only in-flight authorization material. The runtime refreshes before use when the record is
        expired or near expiry, injects the token into the configured header, and on provider 401 refreshes once and retries
        the request once. Missing, unconnected, refresh-failed, scope-insufficient, unsupported, grant-type-insufficient,
        installation-id-mismatched, or unbound managed credentials fail closed before dispatch. The connected record's
        grant_type, grant_model, token_request profile, scopes, and installation selection must match the tool declaration
        before dispatch. A tool may not also configure the same header in `http.headers`; that would create dual
        authorization ownership.
    external_provider_dispatch_rate_limit:
      description: >
        `rate_limit` on an HTTP tool declares process-local admission for outbound HTTP provider dispatch by that tool.
        The bucket is per workflow source and tool name, and it is consumed by direct Executor.Execute, /tools/{name},
        and /mcp tools/call entry points. Every retry attempt consumes the same bucket before making another outbound
        HTTP request; retry/backoff cannot bypass admission.
      grammar:
        rate_limit: >
          `N/period`, where N is a positive integer and period is an integer duration with unit ms, s, m, h, or d.
          The short form `N/s` means `N/1s`. Whitespace is invalid.
        rate_limit_max_wait: >
          Integer duration with unit ms, s, m, h, or d. `0s` is valid and means fail immediately rather than queue.
          This field is required when rate_limit is present; no hidden default wait is applied.
      behavior:
      - Absence of both fields means no admission limit.
      - Providing only one field, malformed grammar, zero/non-positive count, or use on non-HTTP tool handler declarations
        is a fail-closed validation error.
      - Excess calls wait FIFO within the process-local bucket until they can be admitted or until rate_limit_max_wait is exceeded.
      - On max-wait timeout the tool call fails with typed runtime error code `rate_limited`, component `tool-executor`,
        operation `external_dispatch_admission`, retryable true, before any outbound provider dispatch occurs.
      - Successful or waited admissions and timeouts are reflected in platform.runtime_log tool-execution details.
    example: "check_domain:\n  description: Check if a domain name is available for registration\n  handler_type: http\n  input_schema:\n\
      \    type: object\n    required: [domain]\n    properties:\n      domain:\n        type: string\n        description:\
      \ Domain to check (e.g., example.com)\n  http:\n    method: GET\n    url: \"https://api.domainr.com/v2/status?domain={{input.domain}}\"\
      \n    headers:\n      Authorization: \"Bearer {{credentials.domainr_api_key}}\"\n  response_mapping:\n    available:\
      \ \"{{response.body.status[0].summary}}\"\n  credentials:\n    - domainr_api_key"
  provider_capability_surface:
    promoted_by: '#1929'
    owner: internal/packs typed capability-surface model and deterministic renderer consuming internal/userfacing human-code projection
    description: >
      Provider trigger packs and provider connector declarations expose one typed proof-ready model to local preflight and
      doctor. Body-specific owners derive capability and guarantee facts from accepted manifests or ToolSchemaEntry values;
      credential owners derive connector requirement state. The common owner normalizes subject identity, applicability,
      status, requirements, enforcement evidence, ordering, and text/JSON projections. Pack envelope capabilities and
      requires remain import-time derive-and-compare integrity assertions and MUST NOT be read as runtime surface truth.
    subject:
      required_fields:
      - id
      - kind
      - provider
      - source
      - applicability
      - status
      kinds:
        provider_trigger: accepted provider-trigger manifest packaged by the verified trigger pack
        provider_connector: effective ToolSchemaEntry or installed connector-pack action
      source_values:
        trigger_pack: verified platform or external trigger pack
        connector_pack_import: explicitly imported connector action
        connector_pack: installed but not imported connector action
        flow_local: flow-local ToolSchemaEntry with category provider_connector
      applicability_values:
        effective: callable connector declaration selected by the contract
        installed: verified pack inventory that is not an effective callable connector
    status:
      READY: effective connector whose every static or managed credential requirement is satisfied
      NOT_READY: effective connector with at least one unsatisfied static or managed credential requirement
      AVAILABLE: >
        Installed capability that is not effective in the current contract. All provider-trigger pack subjects are
        AVAILABLE until #1944 contributes a selected-target readiness subject. Unimported connector actions are AVAILABLE
        and carry import remediation but MUST remain absent from ToolEntries, agent surfaces, validation, and execution.
      rollup_rule: >
        `internal/packs NormalizeSubjects` derives status from kind, applicability, and validated requirement state.
        Body adapters MUST NOT compute status. A supplied status that contradicts the derived tuple, an installed connector
        without import remediation, an effective connector with an import requirement, or a status/satisfied/remediation
        inconsistency fails closed.
    facts:
      capability_shape: {code: stable_machine_code, target: optional_body_derived_target}
      guarantee_shape: {code: stable_machine_code, enforced_by: registry_pinned_enforcement_id}
      truth_rule: >
        Trigger facts derive from the accepted Manifest. Connector facts derive from the effective ToolSchemaEntry or the
        verified installed connector body. Envelope narrative is never a renderer source.
      known_capability_codes:
      - receive_https_route
      - verify_secret
      - emit_event
      - persist_dedupe_markers
      - call_provider_action
      - lower_through_activity
      - journal_activity_attempts
      unknown_projection: Unknown capability codes remain verbatim in human output and structured JSON.
    guarantee_enforcement_registry:
      claims:
        emit_undeclared_events:
          enforced_by: internal/providertriggers.Manifest.resolveEventName
          execution_proof: internal/providertriggers TestStripeManifestAcceptsLiteralEventType
        run_code_before_admission:
          enforced_by: internal/providertriggers.Manifest.Accept
          execution_proof: internal/runtime TestInboundGateway_GitHubAdapterRejectsInvalidSignatureBeforeMarkerAndPublish
        touch_unbound_resources:
          enforced_by: internal/runtime.InboundGateway.handleWebhook
          execution_proof: internal/runtime TestInboundGateway_UnknownTargetFailsBeforeProviderAdmission
        bypass_activity_attempts:
          enforced_by: internal/runtime/pipeline.pipelineActivityDispatcher.executeNonIdempotentActivityIntent
          execution_proof: internal/runtime/pipeline TestGeneratedSyntheticConnectorUsesCanonicalActivityJournalOnReplay
        retry_non_idempotent_write_automatically:
          enforced_by: internal/runtime/pipeline.pipelineActivityDispatcher.executeNonIdempotentActivityIntent
          execution_proof: internal/runtime/pipeline TestPipelineActivityRequestNonIdempotentFailureDoesNotRetry
        expose_credential_values:
          enforced_by: internal/runtime/pipeline.executePreparedActivityHTTPTool
          execution_proof: internal/runtime/pipeline TestActivityCredentialRedactionGuarantee
      rule: >
        A known guarantee without exactly one registry enforcement owner fails closed. Human output renders guarantees as
        `cannot <verb> - enforced by <id>`; it does not present CANNOT as a product limitation.
    requirements:
      shape: >
        kind, name, scope, optional status, optional satisfied, optional remediation, optional non-secret source and
        managed-credential grant/profile detail. Secret values, tokens, private keys, and provider client secrets are
        forbidden in every field.
      static_connector_owner: internal/runtime/credentials Describe/ListDescriptors after import-boundary key resolution
      managed_connector_owner: >
        internal/runtime/managedcredentials ListRequirementDescriptors plus EvaluateRequirement for lifecycle,
        grant_type, grant_model, token_request, scope, and installation-input coverage
      connector_statuses:
      - BOUND
      - UNBOUND
      - CONNECTED
      - UNCONNECTED
      - PENDING_CONSENT
      - REFRESH_FAILED
      - SCOPE_INSUFFICIENT
      remediations:
        UNBOUND: swarm secrets set <resolved-deployment-key>
        UNCONNECTED: swarm connections connect <resolved-deployment-key>
        PENDING_CONSENT: swarm connections connect <resolved-deployment-key>
        REFRESH_FAILED: swarm connections disconnect <resolved-deployment-key> && swarm connections connect <resolved-deployment-key>
        SCOPE_INSUFFICIENT: swarm connections connect <resolved-deployment-key>
      trigger_rule: >
        Trigger signing requirements render with `scope: target` and no status, satisfied value, binding remediation,
        READY/NOT_READY claim, selected-store query, or inferred global binding. #1944 owns target selection, enablement,
        redacted SQLite/Postgres signing-binding readback, ambiguity, and mutation/remediation.
    projection:
      structured_owner: local preflight report capability_subjects
      human_phrase_owner: platform-spec.yaml#cli_specification.foundations.output_contract.shared_renderer_contract.human_code_projection
      text_rule: Human text is a deterministic projection of the same typed records emitted in JSON.
      ordering:
      - unsatisfied requirements with inline remediation
      - CAN facts grouped by target
      - guarantees with enforced_by
      - optional evidence in verbose rendering
      subject_order: kind then stable subject id
      consumers:
      - swarm doctor
      - swarm serve
      - local preflight mode serve_dev
      - local preflight mode run_local
      future_consumer: '#1769 describe --prove consumes this model and MUST NOT reconstruct a second surface.'
    current_inventory:
      trigger_packs: [github, intercom, shopify, slack, stripe, telegram, twilio, typeform]
      connector_packs: [github, microsoft_graph, notion, slack, telegram]
      connector_action_count: 7
      inventory_rule: >
        The verified connector PackRegistry enumerates installed actions deterministically. An effective connector identity
        replaces the same installed teaching row so readback cannot suggest importing an already effective flow-local or
        imported tool.
    failure_policy: >
      Capability derivation, descriptor readback, registry lookup, duplicate subject identity, or projection validation
      failure emits a typed blocking diagnostic. Consumers MUST NOT silently omit a subject, parse prose back into fields,
      fall back to envelope narrative, or preserve a legacy surface alongside this owner.
  provider_connector_tools:
    description: >
      Outbound provider connectors are authored HTTP tools represented by the existing `ToolSchemaEntry` model with
      `category: provider_connector`, and executed only through handler `activity` requests. Connector declarations may be
      flow-local entries in tools.yaml or explicitly imported connector-pack bodies, but both routes must produce the same
      canonical `ToolSchemaEntry` object. The category is a readback and validation profile, not a new runtime dispatcher:
      dispatch remains owned by the HTTP activity executor and non-idempotent writes remain owned by `activity_attempts`.
    canonical_owners:
      declaration: "ToolSchemaEntry with `category: provider_connector`, authored in tools.yaml or imported from a verified connector pack."
      pack_import: "package.yaml `connector_packs.imports[]` enables specific packed connector tools; omitted imports expose nothing."
      pack_envelope: "internal/packs universal envelope plus internal/providerconnectors connector body verifier."
      execution: "handler `activity` lowering to `platform.activity_requested`."
      non_idempotent_journal: "`activity_attempts`."
      credentials: "static credential store keys listed under tool `credentials`, or managed credential handles listed under tool `managed_credential`; exactly one credential mode owns connector auth."
      readback: "tool_model.provider_capability_surface, consuming canonical static and managed credential descriptors."
      display: "first CAN action label is derived from the authored tool `description`; if absent, it falls back to normalized `<action> via <Provider>`."
    stage_1_profile:
      required:
      - "tool id MUST use `<provider>.<action>` form."
      - "`handler_type` MUST resolve to `http` and include an `http` block with explicit `method` and `url`."
      - "`effect_class` MUST be `non_idempotent_write`."
      - "exactly one credential mode MUST be declared: either static credential keys under `credentials` or one managed credential handle under `managed_credential`."
      - "Every provider connector MUST declare exactly one closed `response_success` policy. Ordinary HTTP-status APIs declare `kind: http_status_2xx`; APIs that encode provider failure inside HTTP 2xx declare `kind: json_field_equals` with explicit path and expected scalar data. No provider/action-specific Go completeness switch is authoritative."
      forbidden:
      - "declaring both static `credentials` and `managed_credential`; dual auth ownership is forbidden."
      - "`response_mapping`; connector response mapping is split until specified."
      - "`rate_limit` and `rate_limit_max_wait`; connector admission/rate limiting is split until specified."
      - "direct runtime provider adapter code or bespoke connector dispatch."
    connector_pack_profile:
      status: "first slices: Telegram static connector pack proof, Slack managed-credential connector pack proof, Notion Basic+JSON workspace-grant connector proof, Microsoft Graph client_credentials `.default` connector proof, and GitHub App installation-token issue/comment multi-action connector proof"
      body_file: connector.yaml
      import_syntax: >
        package.yaml `connector_packs.imports[]` entries name `provider` and `tool`. The import is an explicit enablement
        gate: packed connectors MUST NOT become ambient global tools and MUST NOT appear in tool readback, activity
        validation, agent surfaces, or execution unless imported.
      body_rule: >
        The connector body wraps/carries real `ToolSchemaEntry` values. The body MUST NOT define a second connector DSL,
        second validator, second execution model, or provider-specific Go adapter path.
      verification_rule: >
        The envelope hash is over the exact connector.yaml bytes. The loader parses the envelope with strict known fields,
        verifies the exact byte hash, parses connector.yaml through the normal tool schema owner, validates the
        provider_connector profile, derives connector capabilities/requires mechanically from every tool declaration in
        deterministic tool-id order, and rejects any declared capability or requirement drift. Connector envelopes declare
        action capability truth as `capabilities.can.call_provider_actions`, a non-empty list of the exact packed tool ids;
        the former scalar `capabilities.can.call_provider_action` form is retired and MUST fail closed under strict
        envelope parsing rather than being accepted as a compatibility alias. External connector-pack directories remain a
        later gated surface, so first-party connector packs are migrated aggressively before any external connector-pack
        compatibility promise exists.
      capability_surface: >
        Connector body facts and deployment readiness consume `tool_model.provider_capability_surface`. Effective imported
        and flow-local connectors use the same typed model; installed unimported actions render AVAILABLE without becoming
        effective tools. Static and managed requirement states consume their canonical descriptor owners rather than a
        connector-local store or coverage interpreter.
      collision_policy: >
        No packed-vs-packed or packed-vs-flow-local connector shadowing is allowed in this slice. Any duplicate tool id
        fails closed before runtime construction and names both sources with remediation to remove one source or rename the
        flow-local tool.
      unbound_requirement_policy: >
        Pack import may succeed with an unbound credential name. Runtime activity dispatch must fail closed before the
        provider HTTP call and before creating an `activity_attempts` row when a required static credential or managed
        credential is unavailable, unconnected, pending, refresh_failed, scope-insufficient, unsupported, or unbound.
        Duplicate/redelivered activity requests with an existing activity_attempts row must reuse the journaled result
        before resolving managed credentials and MUST NOT refresh or dispatch again.
    generated_catalog_first_slice:
      description: >
        The first OpenAPI-to-connector-pack transform proof generates exactly the three GitHub issue/comment/label write
        tools proven by the prior supported surface plus one test-only synthetic Acme write tool. GitHub generated output
        replaces the live handwritten connector body at the same pack path and preserves the stable tool ids
        `github.create_issue_comment`, `github.create_issue`, and `github.add_labels_to_issue`. The synthetic pack uses the
        identical source/profile/generator/evidence/conformance path but is not part of the ambient builtin runtime registry.
      generator_owner: >
        `internal/providerconnectors.GenerateCatalog` plus `cmd/swarm-openapi-gen` is the deterministic transform owner.
        `--check` regenerates in memory and requires exact checked-in connector.yaml and pack.yaml bytes plus passing
        conformance bindings. The transform uses a strict selected-subtree JSON decoder and MUST NOT add a tolerant OpenAPI
        parser dependency or fetch provider documents from the network in CI.
      source_owner: >
        Each profile names checked-in OpenAPI bytes, compression (`none` or `gzip`), exact decompressed SHA-256,
        OpenAPI version, and server. Hash/version/server mismatch fails before operation lowering. Moving provider aliases or
        live provider responses are not merge-bearing generation input.
      profile_owner: >
        Strict known-field files under `internal/providerconnectors/catalog/generator-profiles` are the reviewed semantic
        source for the selected operation id/path/method, stable published tool id, canonical body variant, required fields,
        injected inputs, credential mode, permissions, non-idempotent effect class, response-success policy, output shape,
        fixture identity/status, and review status. These trust-bearing and product-narrowing fields have no inferred
        defaults. Unsupported OpenAPI forms, ambiguous variants, missing selected local parameter refs, unbound path
        parameters, missing 2xx declarations, unknown selected-operation fields, or profile/source disagreement fail closed.
      generated_identity_owner: >
        Strict versioned `internal/providerconnectors/catalog/generated-packs.yaml` independently classifies each generated
        pack by pack id, provider, exact profile path, kind, and output. It is consumed before builtin connector admission.
        Duplicate ids, duplicate profile bindings, duplicate outputs, unknown builtin ids, provider/profile mismatch,
        unindexed generator profiles, or builtin bodies carrying generated evidence without index identity fail closed.
        Indexed generated packs MUST carry matching generation evidence; removing that evidence and recomputing the exact
        pack manifest hash does not downgrade the pack to handwritten status. Builtin admission parses the exact indexed
        profile and requires the body evidence source path, OpenAPI version, and source hash to equal that profile; repairing
        only connector bytes and the envelope hash cannot substitute another source identity.
      evidence_chain: >
        Generated connector bodies carry schema/generator versions, exact source path/version/hash, exact profile path/
        schema/hash, and one operation record per generated tool. Each operation binds operation id, tool id, reviewed
        permissions, response-success policy, fixture id/status, and review status. The operation/tool sets must be equal,
        and the pack envelope binds the exact generated connector bytes by manifest_hash. Generated readback exposes these
        non-secret provenance/freshness facts, including reviewed permission ids/notes, but never credential values.
      conformance_owner: >
        Strict fixtures under `internal/providerconnectors/catalog/conformance` are keyed by provider + operation id + tool
        id and bind source/profile/manifest hashes, fixture/review status, exact resolved request method/URL/headers/body,
        and type-preserving response-success policy. Static credential values and managed access tokens in this corpus are
        explicit fake fixture context only. Generated static credential templates are resolved against that context, and
        managed header/default-prefix semantics are applied through the same pure `internal/runtime/managedcredentials`
        owner consumed by direct and activity HTTP execution, before the exact final header set is compared. Missing, extra,
        duplicate, stale, malformed, unresolved, or unreferenced fixtures fail the generator check. The synthetic write
        additionally executes through the normal HTTP activity path and proves replay reuses the canonical activity_attempt
        result without a second provider dispatch.
      non_goals:
      - read-only provider connector admission
      - external connector-pack directories or marketplace publication
      - full GitHub API generation or broad OpenAPI normalization
      - provider rate-limit or generic error-taxonomy expansion
      - provider-specific generator or runtime branches
  credential_store:
    description: Secure storage for API keys, tokens, and other credentials referenced by MCP servers and HTTP tools. The
      platform provides a typed interface with a layered resolution model.
    interface:
      get: Retrieve a credential value by key. Runtime-only — never exposed via builder API.
      set: Store a credential value by key to the writable store layer.
      list: List credential keys with metadata (source, writable, shadowed, present, updated_at, required_by where
        source context is available). Never returns values.
      delete: Remove a credential by key from the writable store layer. Cannot delete env-sourced credentials.
    resolution_model:
      description: Credentials are resolved through a two-tier overlay. Environment variables take precedence over the local
        file store. Writes go to the file store only. This gives deterministic resolution across deployment modes.
      tiers:
      - tier: env
        description: Environment variables. Read-only. Highest precedence. Used for CI, Docker, and production deployments.
          Credential key "sendgrid_api_key" resolves by trying the raw key name, then the normalized key with ".", "-", and
          spaces mapped to "_", then the uppercased normalized variant (SENDGRID_API_KEY). No prefix required — env var
          names match the credential key directly.
        writable: false
        precedence: 1 (highest)
      - tier: file
        description: Local file store. Writable. Used for local development. Stored at
          os.UserConfigDir()/swarm/credentials.json with mode 0600. Atomic writes. Per-entry updated_at timestamp.
          `SWARM_CREDENTIALS_FILE` overrides this path. Examples are `~/Library/Application Support/swarm/credentials.json`
          on macOS and usually `~/.config/swarm/credentials.json` on Linux.
        writable: true
        precedence: 2
      resolution_rule: On get, check env tier first. If present, return env value. Otherwise, check file tier. If present,
        return file value. Otherwise, credential is missing.
      list_rule: List returns merged keys from both tiers. Each entry includes the source tier (env or file) and whether
        it is writable (env = false, file = true). If a key exists in both tiers, source shows "env" (effective source)
        and shadowed is true to show that a file-tier value exists but is ignored by env precedence.
    metadata:
      description: The list interface returns metadata about each credential, never the value itself. This is what the builder
        displays.
      fields:
        key: string — credential key name
        source: string — env | file (which tier the effective value comes from)
        writable: boolean — true if the credential can be modified (false for env-sourced)
        shadowed: boolean — true when the effective value comes from env but a file-tier value also exists
        present: boolean — true if the credential has a value in any tier
        updated_at: string — ISO 8601 timestamp of last write (file-sourced only, null for env)
        required_by: list — optional references to tools, MCP servers, or native web-search providers that require the key
    storage_backends:
      local_dev: JSON file at os.UserConfigDir()/swarm/credentials.json, mode 0600, atomic writes, overridden by
        `SWARM_CREDENTIALS_FILE` when set. Plaintext for simplicity — encryption is a future enhancement. File contains a
        map of key → value with per-entry updated_at.
      docker: Environment variables (env tier). File store optionally mounted as a volume for builder access.
      production: Environment variables for secrets, or external secrets manager (Vault, AWS Secrets Manager) via a custom
        store tier implementation. The overlay model supports additional tiers — the platform resolves top-down.
    write_coordination:
      rule: Local file-tier writes through the supported CLI acquire a cross-process advisory lock before read/modify/write.
        Atomic replace still protects partial writes; the advisory lock protects against lost updates across concurrent CLI
        processes. Lock contention fails closed with a clear error. The CLI is the only supported local writer; manual JSON
        edits are unsupported and may race.
    local_cli_surface:
      command: swarm secrets set|list|check|rm
      owner: internal/runtime/credentials credential store
      rule: >
        `swarm secrets` is the supported local operator CLI over the credential store. `set` writes only the file tier and
        reads the value from hidden TTY prompt or stdin/--stdin; plaintext argv values and --value are forbidden. `list`
        renders metadata only and never values, including env/file shadowing. `check` validates required credentials from
        contract/source context and exits non-zero when required keys are missing. `rm` removes only the file-tier value;
        env-sourced effective values remain present and read-only.
      split_scope:
      - /v1/rpc credentials.* or secrets.* API promotion
      - retired Builder credentials RPC transport
      - OAuth or managed credential lifecycle
      - external vault/team secret management
      - boot-check severity policy
    contract_reference: Tools, MCP servers, and native web-search provider configuration reference credentials by key name,
      never by value. The key name appears in tools.yaml (credentials field), policy.yaml (mcp_servers.*.credentials_key),
      and policy.yaml (web_search_provider.credentials_key). The platform resolves the key to the secret value at call time
      only.
    boot_validation: At boot, the platform checks that every credential key referenced by tools, MCP servers, and native
      web-search provider configuration exists in the credential store (any tier). Missing keys log a warning — the tool may
      be unconfigured in this deployment.
    platform_guarantee: The platform never logs, indexes, or persists credential values in the event store, dead letters, or
      any platform table. Credentials exist only in the credential store and in-flight tool requests. Supported operator
      surfaces never return credential values after write — only metadata.
  managed_credential_store:
    description: >
      Sibling source authority for deployment-level managed OAuth/token credentials used by outbound HTTP tools. It owns
      structured token records and lifecycle state. It is not the static credential store and MUST NOT be implemented as
      hidden behavior inside `credentials.Store.Get(string) string`.
    scope:
    - single-tenant/self-hosted/operator-connected deployment token records
    - authorization-code consent and callback, with or without PKCE depending on provider contract
    - client_credentials as the first non-consent grant variant
    - GitHub App installation-token credentials as the first private-key/JWT app-installation grant variant
    - access token, refresh token when present, expiry, scopes, grant_model, token_request profile, provider/account identity,
      grant type, GitHub App private-key material and installation id when applicable, status, refresh policy, and failure
      evidence
    - direct Executor.Execute, served /tools/{name}, MCP tools/call HTTP-tool entry points, and provider_connector activity
      execution on the `activity_attempts` path
    non_goals:
    - multi-tenant per-user token vault or end-user account selection
    - provider trigger/webhook adapters; those extend existing inbound.webhook in a separate owner
    - DB connectors, AWS SigV4/AssumeRole, MCP/native connector authentication, and real-provider catalog conveniences
    local_storage:
      default: os.UserConfigDir()/swarm/managed_credentials.json
      override: SWARM_MANAGED_CREDENTIALS_FILE
      file_mode: "0600"
      directory_mode: "0700"
      format: JSON object containing structured managed credential records. Access tokens, refresh tokens, client secrets,
        PKCE verifier/state, expiry, status, and failure evidence are record fields.
      write_coordination: Cross-process advisory lock around file-tier connect/callback/disconnect writes, plus atomic
        replace. Lock contention fails closed instead of risking lost updates or truncated token records.
    production_storage: >
      Production deployments may provide another implementation of the managed credential store interface. The semantic
      record shape and resolver behavior remain the owner; production storage MUST preserve status/failure/scopes/expiry
      semantics and redaction guarantees.
    record_fields:
      key: Deployment-level managed credential key after import-boundary binding.
      provider: Provider label for operator status.
      account: Optional connected account identity/label.
      grant_type: authorization_code | authorization_code_pkce | client_credentials | github_app_installation.
      auth_url: Authorization endpoint for authorization-code records.
      token_url: Token endpoint for grant and refresh requests.
      api_base_url: Provider API base URL for app-installation token exchange when the grant does not use a normal OAuth
        token_url; GitHub defaults to https://api.github.com.
      client_id: OAuth client ID.
      client_secret: Optional OAuth client secret.
      installation_id: GitHub App installation id selected for a single-tenant/deployment credential record.
      private_key: GitHub App RSA private key for RS256 app JWT signing; secret material, never returned by metadata/status
        surfaces.
      redirect_url: Callback URL for authorization-code records.
      scopes: Granted/available scopes for scope_grant providers. Declared-empty scopes are valid for workspace_grant
        providers and MUST NOT be filled with fake scopes.
      grant_model: scope_grant | workspace_grant | installation_grant. Readback must render workspace_grant as a
        workspace/page-level grant and installation_grant as an installation-scoped app grant, not as missing scopes.
      token_request: >
        Closed token endpoint profile used by auth-code exchange, refresh, and client_credentials. Fields are
        client_auth (`post` sends client_id/client_secret in the request body; `basic` sends HTTP Basic and omits
        client_id/client_secret from the body), body (`form` or `json`), and static_headers (non-secret endpoint headers
        such as Notion-Version; Authorization and Content-Type are forbidden because client_auth/body own them). The default
        profile is client_auth=post and body=form for existing Slack-compatible behavior.
      access_token: Secret access token, never returned by metadata/status surfaces.
      refresh_token: Secret refresh token, never returned by metadata/status surfaces.
      token_type: Token type, default Bearer.
      expires_at: Access-token expiry timestamp when known.
      status: unconnected | pending_consent | connected | refresh_failed | scope_insufficient.
      failure: Redacted failure evidence for operator readback.
    resolver_rule: >
      HTTP tools name `managed_credential.key` as a package-local handle. Runtime consumers MUST map that handle through the
      same import-boundary `requires.credentials` / `bind.credentials` resolver used by static credentials, then read the
      managed credential record by the resulting deployment key. If the handle is undeclared, unbound, empty, missing from
      the managed store, or does not match the tool's required grant_type/grant_model/token_request/scopes, execution fails
      before outbound dispatch. For `github_app_installation`, the tool declaration MUST provide installation_id_input and
      runtime activity execution MUST resolve that top-level activity input before token acquisition; missing or mismatched
      installation ids fail closed before token exchange and before provider dispatch. Same-name ambient fallback is
      forbidden for imported packages.
    refresh_rule: >
      Before request dispatch, the resolver returns a valid access token or fails closed. It refreshes before use when the
      access token is absent or expires within the configured refresh window. For provider 401 responses, supported HTTP
      executors refresh once and retry the request once. For non_idempotent_write provider_connector activity execution,
      the activity_attempts journal must be checked before managed credential resolution on duplicate/redelivered requests;
      an existing row blocks refresh and provider redispatch. Refresh failure sets refresh_failed state with redacted failure
      evidence and returns a redacted runtime error. Auth-code exchange, refresh, and client_credentials all consume the same
      record token_request profile; provider-specific token endpoint behavior is data, not a provider branch in the engine.
      GitHub App installation-token reacquisition signs a short-lived RS256 app JWT from the stored private key and POSTs to
      `{api_base_url}/app/installations/{installation_id}/access_tokens`; it never uses OAuth client_credentials, OAuth App
      user tokens, PAT/static bearer credentials, or connector-dispatch provider branches.
    client_credentials_resource_scope_policy: >
      Client-credentials connector packs may declare provider resource scopes such as
      `https://graph.microsoft.com/.default` under `managed_credential.scopes` with `grant_model: scope_grant`. Readback,
      boot, and execution prove only that the connected managed credential record covers the declared resource scope,
      grant_model, token_request profile, lifecycle state, and bearer-token acquisition/re-acquisition. They MUST NOT claim
      provider-specific app-role, delegated-scope, or admin-consent readiness unless a separate source-authoritative owner
      for those permission claims is specified and implemented. Client-credentials refresh/re-acquisition repeats the
      `grant_type=client_credentials` token request and MUST NOT require or send a refresh token.
    github_app_installation_policy: >
      GitHub App connector packs that require app installation auth declare `managed_credential.grant_type:
      github_app_installation`, `grant_model: installation_grant`, and `installation_id_input` naming the top-level
      activity input populated from verified inbound GitHub event context. The deployment record stores the app/client id,
      installation id, API base URL, and RSA private key, and caches the returned installation access token until expiry.
      Runtime must fail closed when the inbound-selected installation id is absent or differs from the connected record.
      Issue-comment bot-loop flows that consume `inbound.github.issue_comment` and call a GitHub App issue-comment
      connector MUST guard app/bot-authored comments before activity lowering, using an `on_fail: discard` handler guard
      or equivalent no-side-effect filter. Delivery-id dedupe alone is not sufficient because an app-authored response is a
      separate GitHub webhook delivery with a new delivery id.
      Private keys, generated JWTs, installation tokens, webhook signing secrets, and provider errors containing those values
      are secret material and MUST NOT appear in events, logs, activity attempts, status, or readback. This grant family is
      not OAuth client_credentials, not a PAT/static bearer shortcut, and not a provider-specific connector dispatcher.
    operator_surface:
      command: swarm connections connect|callback|status|disconnect
      rule: >
        `swarm connections` is the supported local operator CLI for managed credential lifecycle. `connect` starts
        authorization_code or authorization_code_pkce consent, completes a client_credentials grant, or connects a
        github_app_installation record by reading the RSA private key from a non-argv source and exchanging for an
        installation token. `callback` records the authorization-code callback; `status` returns metadata and required_by
        information only; `disconnect` deletes the token record. The command is intentionally separate from `swarm secrets`,
        which remains static key/value secret storage. Secret values accepted by the CLI, including OAuth client secrets,
        GitHub App private keys, and authorization callback codes, MUST NOT be accepted as argv flag values; supported local
        secret input uses stdin or an equivalent non-argv source. `connect` supports closed token endpoint profile flags for
        grant_model, client_auth, body, and static non-secret token headers, and supports GitHub App `--installation-id` and
        optional `--api-base-url` metadata.
    boot_validation: >
      Boot/verify consumes managed_credential requirements and reports managed_credential_state for missing, pending,
      refresh_failed, scope_insufficient, grant-type/grant-model/token-profile mismatches, installation-input requirements,
      or otherwise unusable records. When boot warnings are fatal, these findings block startup. Connector readback/doctor
      MUST compare declared tool grant_type, scopes, grant_model, token_request profile, and installation_id_input against
      connected records and surface scope_insufficient rather than connected/bound when the record does not cover every
      declared requirement. Execution still fails closed even when boot warnings are non-fatal.
    redaction_guarantee: >
      Access tokens, refresh tokens, client secrets, authorization codes, PKCE verifier/state, GitHub App private keys,
      generated JWTs, installation tokens, provider errors containing those values, and transport/proxy errors that echo
      generated Authorization headers MUST NOT be returned through logs, events, dead letters, tool results, metadata, or
      CLI/API/status surfaces. Supported readback surfaces return only redacted metadata and failure evidence.
  provider_trigger_adapters:
    description: >
      Source authority for first-class provider webhook triggers on top of the existing `inbound.webhook` gateway. The
      provider-trigger manifest interpreter is the configured-provider semantic owner. It does not replace the generic
      gateway; it makes provider-specific callback binding, signing, delivery identity, event mapping, dedupe,
      acknowledgement timing, and redacted readback semantics explicit for configured providers.
    scope:
    - manual/declarative webhook registration for configured provider triggers
    - served `/webhooks/{entity}/{provider}` route mounted on the supported API listener
    - selected runtime store wiring through `runtime.Stores.InboundStore`
    - verified first-party provider-trigger pack loading through the same envelope path future external packs must use
    - provider-specific signature policy and signing-secret lookup
    - provider delivery-id extraction and dedupe-key authority
    - provider event-type extraction and canonical Swarm event mapping
    - redacted per-request delivery readback in webhook responses and persisted `platform.inbound_recorded` markers
    non_goals:
    - creating a second generic webhook gateway
    - managed OAuth/token lifecycle, which belongs to `managed_credential_store`
    - provider API subscription setup/teardown unless a later child explicitly selects it
    - broad provider-catalog expansion outside explicitly selected provider children
    - DB connectors, AWS SigV4/AssumeRole, non-HTTP, or native connector auth
    existing_gateway_owner: >
      `internal/runtime/inbound.go` remains the generic HTTP ingress executor for `/webhooks/{entity}/{provider}`. It
      consumes `runtime_ingress.queueable_ingress.inbound.webhook`, delegates configured-provider interpretation to the
      provider-trigger manifest interpreter, persists the inbound dedupe marker before publish for delivery callbacks, and
      publishes the normalized root ingress event returned by the manifest interpreter. Provider manifests may also return
      an authenticated response-only result when the provider protocol requires a challenge response that is not a
      delivery.
    manifest_interpreter_owner: >
      `internal/providertriggers` is the configured-provider manifest interpreter and canonical owner for first-class
      provider trigger admission. Runtime-local Go implementations for selected configured providers are non-authoritative.
      A selected configured provider must consume a provider-trigger manifest for signing, replay checks, delivery-id
      extraction, event-type extraction, event naming, acknowledgement timing, and redaction.
    pack_envelope_source_authority:
      owner: internal/packs universal envelope plus body-specific verifiers such as internal/providertriggers and internal/providerconnectors
      status: >
        E5 source-authority path. Provider-trigger packs and provider-connector packs wrap their body-specific canonical
        vocabulary in a universal pack envelope before registration/import. The envelope is a trust/admission artifact, not
        a provider-specific adapter and not a new body vocabulary owner. First-party configured-provider manifests are
        filesystem-distributed platform packs, never embedded/default trust fixtures. Elevated runtime config declares their
        required complete inventory at `provider_triggers.packs.platform_dirs`; an absent/empty key, an omitted required
        identity, or an unexpected platform identity fails before store selection. Project config cannot select that
        platform-authored capability source. Runtime config declares external provider-trigger packs separately at
        `provider_triggers.packs.external_dirs`. Relative paths in both lists resolve against the config layer that declares
        the effective key. `swarm serve` verifies the complete declared set before runtime construction and injects one
        registry into every runtime and Builder replacement runtime. Missing, malformed, incompatible, tampered, or
        colliding declared packs fail boot; no executable-relative, current-directory, source-checkout, embedded, package-
        global default, or nil-registry discovery fallback exists. Connector packs in this first slice are platform packs
        explicitly imported by package.yaml `connector_packs.imports[]`; external connector-pack directories require a later
        gated surface.
      required_platform_inventory:
        owner: internal/providertriggers.RequiredPlatformPackIdentities
        platform_version: 0.7.x
        identities:
        - id: provider.github
          provider: github
        - id: provider.intercom
          provider: intercom
        - id: provider.shopify
          provider: shopify
        - id: provider.slack
          provider: slack
        - id: provider.stripe
          provider: stripe
        - id: provider.telegram
          provider: telegram
        - id: provider.twilio
          provider: twilio
        - id: provider.typeform
          provider: typeform
        admission: >
          This is the exact first-party provider-trigger identity set required for the current platform minor. The elevated
          directory declaration selects filesystem locations but cannot weaken identity completeness. Boot loads platform
          directories through the common verifier, then requires every listed `(id, provider)` pair exactly once and rejects
          missing, unexpected, or mismatched platform identities before external-pack composition, registry construction,
          store selection, or runtime construction. External packs cannot satisfy a missing platform identity. Changing this
          set is a platform release/spec change and must update the runtime owner and drift proof in the same PR.
      envelope_fields:
        id: >
          Required stable pack identity. Values must be normalized ASCII identifiers and must not be inferred from directory
          names.
        version: Required semver pack version.
        platform_version: >
          Required compatibility range checked with the same platform-version constraint grammar used by package admission.
          Missing, malformed, or incompatible ranges fail pack import before provider registration.
        type: >
          Required pack body type. Supported body types are `trigger` and `connector`. New body types require their own
          gated proof cases.
        manifest_hash: >
          Required SHA-256 hash of the exact body manifest bytes carried by the pack, formatted as `sha256:<hex>`.
          Implementations MUST NOT hash re-serialized YAML or semantic object forms because those are not stable contract
          bytes.
        provenance: >
          Required provenance block. The first supported `source` values are `platform` and `external`. Provenance changes
          review/readback classification but does not create verification shortcuts.
        capabilities: >
          Required declared capability surface. The loader derives canonical capabilities mechanically from the accepted
          body manifest and requires the declared block to equal the derived block in canonical form. Drift, extra
          capabilities, missing capabilities, or narrative/manual capability truth fail import.
        requires: >
          Required typed dependency declaration surface for resources such as `webhook_signing.<provider>`, static connector
          secrets, and managed connector credentials. Declared requirements describe binding needs and readback state; they
          do not make an otherwise valid pack invalid merely because the deployment has not bound the requirement yet.
        tests: >
          Required metadata in this slice. Entries must parse as non-empty test references. Executing pack-declared tests is
          a later gated harness; current behavioral proof remains the provider-trigger conformance/runtime suite.
      verification_order:
      - >
        require the elevated `provider_triggers.packs.platform_dirs` key, read its platform pack directories and the external
        directories from `provider_triggers.packs.external_dirs`, preserving each effective key's declaring config layer
      - >
        require platform directory envelopes to declare `provenance.source: platform` and external directory envelopes to
        declare `provenance.source: external`
      - parse envelope with strict known fields
      - validate id/version/platform_version/type/provenance/tests metadata
      - read body manifest bytes selected by pack type, such as trigger.yaml or connector.yaml
      - verify manifest_hash against exact body manifest bytes
      - parse and validate the body manifest through the matching body-specific owner
      - derive body capabilities and requires mechanically from the manifest
      - compare declared capabilities/requires to derived values
      - reject competing immutable identities and duplicate universal pack ids across the composed set
      - require the exact current-platform first-party `(pack id, provider)` inventory from `required_platform_inventory`
      - reject provider-name/tool-name collisions independently according to the body-specific collision rule
      - register/import only verified body manifests
      trust_tiers: >
        Trust tiers differ by provenance value and by readback/operational policy only. First-party bundled packs and
        future external packs use the identical verifier path. No pack is trusted merely because the platform ships it.
      shadowing_policy: >
        No pack-id or provider-name shadowing is allowed in this slice. Any duplicate universal pack id or duplicate
        normalized provider name across platform and external inventories fails closed independently and reports both source
        paths and provenance values. The tuple `(id, version, manifest_hash)` is immutable within boot admission; competing
        instances fail before registration. Explicit override or replacement semantics require a later gated affordance.
      capability_surface: >
        Readback consumes `tool_model.provider_capability_surface`. Trigger facts derive from the accepted body manifest,
        while envelope capabilities/requires remain integrity assertions only. Trigger pack subjects render AVAILABLE with
        target-scoped unevaluated signing requirements; global BOUND/UNBOUND and READY/NOT_READY claims are forbidden until
        #1944 supplies a selected-target owner. Connector facts and readiness remain kind-specific inputs to the common
        model and consume canonical credential descriptor owners.
      unbound_requirement_policy: >
        A missing deployment binding for a declared signing secret, static connector secret, or managed connector credential
        does not reject pack import. Runtime webhook admission still fails closed before signature verification, dedupe
        marker persistence, or event publish when a required signing secret is unavailable. Runtime connector activity
        dispatch still fails closed before provider dispatch and before creating a new activity_attempts row when a required
        connector credential is unavailable or unusable.
      first_party_pack_migration: >
        GitHub, Slack, Stripe, Twilio, Shopify, Typeform, Intercom, and Telegram provider-trigger manifests are first-party
        platform packs distributed as filesystem inventory and loaded through this envelope path. Their trigger bodies are
        absent from binary embed inputs. There is no permanent built-in-control exemption, package-global default registry,
        nil-registry reconstruction path, or partial platform-inventory mode for configured-provider manifests. Envelope
        `manifest_hash`, `capabilities`, and `requires` are deterministic build-stamped summaries; import verifies exact-byte
        body hash and body-derived equality.
      non_goals:
      - provider-trigger manifest vocabulary changes
      - pack signing, remote distribution, ownership transfer, or marketplace trust economics
      - executing pack-declared tests
      - provider setup/teardown, OAuth, connector tools, or provider action calls
      - arbitrary code/WASM before provider-trigger admission
    manifest_vocabulary:
      provider: normalized provider token matched from `/webhooks/{entity}/{provider}`
      payload_object_required: fail closed when the decoded request payload is not a JSON object
      payload_source: >
        Source for the provider payload embedded in the published normalized event. The default `payload` uses the decoded
        JSON object or raw-body wrapper. `form` uses the gateway-parsed `application/x-www-form-urlencoded` parameter set
        and requires the relevant signed-payload recipe to fail closed on malformed form input.
      secret.required: require a configured signing secret before accepting the provider callback
      signature: >
        Configured-provider authenticity verification. HMAC-SHA256 and HMAC-SHA1 verify a manifest-selected signed payload,
        encoded as lowercase hex by default or Base64 when the manifest selects `encoding: base64`. Supported signed
        payloads are `raw_body`, `slack_v0`, `timestamp_dot_raw_body`, and `url_plus_sorted_form`. The interpreter supports
        fixed signature prefixes, structured comma-separated signature parameters, timestamp extraction from headers or
        parameters, replay tolerance windows, exact request URL plus sorted form-parameter canonicalization, and
        constant-time comparison against every configured signature candidate. `token_equality` verifies providers that send
        the configured signing secret directly in a manifest-selected header; it MUST require `secret.required`, MUST compare
        the header value to the configured `webhook_signing.<provider>` secret in constant time, and MUST reject HMAC-only
        fields such as `encoding`, `prefix`, `signed_payload`, `signature_param`, and timestamp settings.
      challenge: >
        Authenticated response-only callback handling. A matched challenge branch must not persist an inbound dedupe marker
        and must not publish a Swarm event.
      delivery_condition: JSON object condition that must match before a provider delivery is accepted.
      request_facts: >
        The gateway passes provider-neutral request facts to the manifest interpreter: method, direct scheme/host/request
        URI URL, content type, parsed query values, parsed form values, parse-error state, raw body, headers, decoded payload,
        receipt time, and user agent. The first-slice exact URL source is the request received by the API listener; forwarded
        proxy/header trust and callback URL lifecycle remain parent-tail work. Recipes that require URL/form facts MUST fail
        closed when those facts are missing, malformed, or ambiguous.
      delivery_id: authoritative provider delivery id source for dedupe marker input. Sources may be header, JSONPath, form parameter, query parameter, or manifest literal.
      event_type: authoritative provider event type source for normalized provider_event_type payload metadata. Sources may be header, JSONPath, form parameter, query parameter, or manifest literal.
      event_name: literal or `{event_type}` template for the emitted Swarm event name.
      event_name_policy: >
        New provider-trigger manifests MUST use a literal Swarm event name and carry the provider-specific event kind in
        `provider_event_type`. The `{event_type}` template form is grandfathered only for the existing GitHub and Slack
        manifests because live subscriptions already consume `inbound.github.<event_type>` and
        `inbound.slack.<event_type>`. Any additional dynamic event-name template requires an explicit spec/gate migration
        decision.
      ack.mode: >
        `after_publish` returns after normal publish completion. `durable_before_dispatch` returns after the inbound marker,
        event row, recipient manifest, and subscribed replay scope are durably persisted or queued, without waiting for
        post-commit pipeline dispatch, system-node execution, or agent handling.
      redact_keys: payload keys that must be replaced before publication or readback.
      signed_payload_recipe_discipline: >
        Signed-payload recipes are shared scheme families, not provider-specific escape hatches. New recipes should be added
        only when they generalize a provider family; recipe count should grow sublinearly as provider coverage expands.
    secret_binding: >
      The first-slice signing-secret binding is `flow_instances.config.secrets.webhook_signing.<provider>`, where
      `<provider>` is the normalized provider token. Secret values are never returned by webhook responses or readback
      surfaces. Production deployments may replace the backing config storage with an external vault reference while
      preserving the same semantic binding.
    configured_provider_manifests:
    - provider: github
      signature: >
        GitHub webhook deliveries require a configured signing secret and a valid `X-Hub-Signature-256` HMAC-SHA256
        signature over the raw request body. Missing signing secret, missing signature, or invalid signature fails before
        dedupe marker persistence and before event publish.
      delivery_id: >
        `X-GitHub-Delivery` is the authoritative provider delivery id and the dedupe key input for configured GitHub
        triggers. Missing delivery id fails before dedupe marker persistence.
      event_type: >
        `X-GitHub-Event` is the authoritative provider event type. The canonical emitted event name is
        `inbound.github.<normalized_event_type>` and the payload includes provider, provider_event_id, event_type,
        provider_event_type, provider_delivery_id, original payload, redacted headers, and received_at.
    - provider: slack
      issue: "#1691"
      signature: >
        Slack webhook deliveries and URL-verification requests require a configured signing secret and valid
        `X-Slack-Signature` over the raw body. The verifier MUST compute HMAC-SHA256 using the base string
        `v0:{X-Slack-Request-Timestamp}:{raw_body}` and compare the full `v0=` signature in constant time. Missing signing
        secret, missing or malformed signature headers, invalid signatures, and stale timestamps fail before dedupe marker
        persistence and before event publish.
      replay_window: >
        `X-Slack-Request-Timestamp` MUST parse as Unix seconds and be within five minutes of runtime receipt time. Requests
        outside that window are rejected as replay-risk traffic before any marker or event side effect.
      url_verification: >
        Slack `type: url_verification` requests are authenticated provider ingress but not provider deliveries. After
        successful signature and replay validation, the adapter returns HTTP 200 with the `challenge` value as a
        response-only result. Missing `challenge` fails closed. URL verification MUST NOT call `RecordInboundEvent` and MUST
        NOT publish an EventBus event.
      delivery_id: >
        Slack `type: event_callback` requests require the outer `event_id`; that value is the authoritative provider
        delivery id and dedupe-key input. Missing `event_id` fails before dedupe marker persistence.
      acknowledgement: >
        Accepted Slack `event_callback` requests return success after the inbound dedupe marker, canonical event record,
        recipient manifest, and subscribed replay scope are durably persisted or dispatch-queued. The HTTP acknowledgement
        MUST NOT wait for post-commit pipeline dispatch, system-node handler execution, or agent delivery completion.
      event_type: >
        Slack event callbacks use the inner `event.type` as the authoritative provider event type. The canonical emitted
        event name is `inbound.slack.<normalized_inner_event_type>`. Missing inner event or missing inner event type fails
        before dedupe marker persistence.
      redaction: >
        Slack signing secrets and deprecated verification tokens are not returned by webhook responses, logs, persisted
        marker readback, or published provider payloads. Deprecated Slack `token` fields are not accepted as primary proof
        of request authenticity.
    - provider: stripe
      issue: "#1704"
      signature: >
        Stripe webhook deliveries require a configured signing secret and valid `Stripe-Signature` HMAC-SHA256 signature.
        The manifest interpreter MUST parse comma-separated signature parameters, require `t` and at least one `v1`
        candidate, compute the signed payload as `{t}.{raw_body}`, and compare each `v1` candidate in constant time.
        Missing signing secret, missing signature, missing `t`, missing `v1`, malformed timestamp, invalid signature, and
        stale timestamp fail before dedupe marker persistence and before event publish.
      replay_window: >
        The `t` signature parameter MUST parse as Unix seconds and be within five minutes of runtime receipt time. Requests
        outside that window are rejected as replay-risk traffic before any marker or event side effect.
      delivery_id: >
        Stripe payload `id` is the authoritative provider delivery id and dedupe-key input. Missing `id` fails before
        dedupe marker persistence.
      acknowledgement: >
        Accepted Stripe deliveries return success after the inbound dedupe marker, canonical event record, recipient
        manifest, and subscribed replay scope are durably persisted or dispatch-queued. The HTTP acknowledgement MUST NOT
        wait for post-commit pipeline dispatch, system-node handler execution, or agent delivery completion.
      event_type: >
        Stripe payload `type` is the authoritative provider event type and is emitted in payload metadata as normalized
        `provider_event_type`. The canonical emitted event name is `inbound.stripe`, not `inbound.stripe.<event_type>`.
        Missing `type` fails before dedupe marker persistence.
    - provider: twilio
      issue: "#1725"
      signature: >
        Twilio form/query webhook deliveries in this slice require a configured signing secret and a valid
        `X-Twilio-Signature` HMAC-SHA1 Base64 signature. The manifest interpreter MUST compute the signed payload as the
        exact request URL received by the API listener, including any query string, followed by every parsed form parameter
        name and value concatenated in lexicographic parameter-name order with no delimiters. Missing signing secret,
        missing signature, invalid signature, URL mismatch, malformed query/form parsing, and duplicate query or form
        parameter names fail before dedupe marker persistence and before event publish.
      callback_shape: >
        The approved #1725 slice supports `application/x-www-form-urlencoded` Twilio callbacks only. Twilio JSON callbacks
        using `bodySHA256` are not supported by this slice and MUST fail closed rather than falling through to raw webhook
        mode or partial Twilio acceptance.
      delivery_id: >
        `MessageSid` form parameter is the authoritative provider delivery id and dedupe-key input for the selected Twilio
        messaging callback slice. Missing `MessageSid` fails before dedupe marker persistence.
      acknowledgement: >
        Accepted Twilio deliveries return success after the inbound dedupe marker, canonical event record, recipient
        manifest, and subscribed replay scope are durably persisted or dispatch-queued. The HTTP acknowledgement MUST NOT
        wait for post-commit pipeline dispatch, system-node handler execution, or agent delivery completion.
      event_type: >
        The selected Twilio messaging callback slice emits literal provider_event_type `message_received` in payload
        metadata. The canonical emitted Swarm event name is literal `inbound.twilio`, not a dynamic template.
    - provider: shopify
      issue: "#1728"
      signature: >
        Shopify webhook deliveries require a configured signing secret and a valid `X-Shopify-Hmac-Sha256`
        HMAC-SHA256 Base64 signature over the exact raw request body received by the API listener. The manifest
        interpreter MUST verify the raw bytes before decoded JSON payload interpretation can influence delivery
        admission. Missing signing secret, missing signature, invalid signature, or any parsed/re-encoded JSON
        canonicalization mismatch fails before dedupe marker persistence and before event publish.
      delivery_id: >
        `X-Shopify-Webhook-Id` is the authoritative provider delivery id and dedupe-key input for configured Shopify
        triggers. Missing webhook id fails before dedupe marker persistence.
      acknowledgement: >
        Accepted Shopify deliveries return success after the inbound dedupe marker, canonical event record, recipient
        manifest, and subscribed replay scope are durably persisted or dispatch-queued. The HTTP acknowledgement MUST NOT
        wait for post-commit pipeline dispatch, system-node handler execution, or agent delivery completion.
      event_type: >
        `X-Shopify-Topic` is the authoritative provider event type and is emitted in payload metadata as normalized
        `provider_event_type`. The canonical emitted Swarm event name is literal `inbound.shopify`, not a dynamic
        template. Missing topic fails before dedupe marker persistence.
    - provider: typeform
      issue: "#1733"
      signature: >
        Typeform webhook deliveries require a configured signing secret and a valid `Typeform-Signature` HMAC-SHA256
        Base64 signature over the exact raw request body received by the API listener. The header value MUST use the
        `sha256=` prefix. Missing signing secret, missing signature, invalid signature, or any parsed/re-encoded JSON
        canonicalization mismatch fails before dedupe marker persistence and before event publish.
      delivery_id: >
        Payload `event_id` is the authoritative provider delivery id and dedupe-key input for configured Typeform
        triggers. Missing `event_id` fails before dedupe marker persistence.
      acknowledgement: >
        Accepted Typeform deliveries return success after the inbound dedupe marker, canonical event record, recipient
        manifest, and subscribed replay scope are durably persisted or dispatch-queued. The HTTP acknowledgement MUST NOT
        wait for post-commit pipeline dispatch, system-node handler execution, or agent delivery completion.
      event_type: >
        Payload `event_type` is the authoritative provider event type and is emitted in payload metadata as normalized
        `provider_event_type`. The canonical emitted Swarm event name is literal `inbound.typeform`, not a dynamic
        template. Missing `event_type` fails before dedupe marker persistence.
    - provider: intercom
      issue: "#1733"
      signature: >
        Intercom webhook deliveries require a configured signing secret and a valid `X-Hub-Signature` HMAC-SHA1 hex
        signature over the exact raw request body received by the API listener. The header value MUST use the `sha1=`
        prefix. Missing signing secret, missing signature, invalid signature, or any parsed/re-encoded JSON
        canonicalization mismatch fails before dedupe marker persistence and before event publish.
      delivery_id: >
        Payload `id` is the authoritative provider delivery id and dedupe-key input for configured Intercom triggers.
        Missing `id` fails before dedupe marker persistence.
      acknowledgement: >
        Accepted Intercom deliveries return success after the inbound dedupe marker, canonical event record, recipient
        manifest, and subscribed replay scope are durably persisted or dispatch-queued. The HTTP acknowledgement MUST NOT
        wait for post-commit pipeline dispatch, system-node handler execution, or agent delivery completion.
      event_type: >
        Payload `topic` is the authoritative provider event type and is emitted in payload metadata as normalized
        `provider_event_type`. The canonical emitted Swarm event name is literal `inbound.intercom`, not a dynamic
        template. Missing `topic` fails before dedupe marker persistence.
    - provider: telegram
      issue: "#1764"
      signature: >
        Telegram webhook deliveries require a configured `secret_token` binding and a matching
        `X-Telegram-Bot-Api-Secret-Token` header. The manifest interpreter MUST compare the header token to
        `webhook_signing.telegram` in constant time. Missing signing secret, missing token header, duplicate token headers,
        wrong token header, or any HMAC-style payload/signature interpretation fails before dedupe marker persistence and
        before event publish.
      delivery_id: >
        Payload `update_id` is the authoritative provider delivery id and dedupe-key input for configured Telegram triggers.
        Missing `update_id` fails before dedupe marker persistence.
      acknowledgement: >
        Accepted Telegram deliveries return success after the inbound dedupe marker, canonical event record, recipient
        manifest, and subscribed replay scope are durably persisted or dispatch-queued. The HTTP acknowledgement MUST NOT
        wait for post-commit pipeline dispatch, system-node handler execution, or agent delivery completion.
      event_type: >
        The approved #1764 slice emits literal provider_event_type `update` in payload metadata. The canonical emitted Swarm
        event name is literal `inbound.telegram`, not a dynamic template. Granular Telegram update classification from fields
        such as `message`, `edited_message`, or `callback_query` is a later gated semantic concept.
    raw_webhook_mode: >
      Unknown providers may continue through the raw generic webhook mode, but that path is a different semantic concept and
      does not prove provider-trigger adapter closure. Configured providers MUST consume their manifest interpreter owner
      rather than generic signature, delivery-id, event-type, acknowledgement, or `inbound.{provider}` mapping fallbacks.
      Raw webhook mode MUST NOT interpret configured-provider signatures such as `Stripe-Signature` or
      `X-Twilio-Signature`; configured-provider signature semantics belong only to the corresponding configured-provider
      manifest.
  custom_tool_schema:
    description: Accepted fields for tool definitions in tools.yaml. This is the union of fields across all implementation
      classes.
    required_fields:
      description: string — human-readable description of what the tool does
    common_optional_fields:
      category: string — optional semantic profile marker. `provider_connector` means the tool must satisfy
        tool_model.provider_connector_tools.
      handler_type: string — platform_builtin | mcp | http. Default http.
      effect_class: string — required when the tool is callable from a handler activity. Executable Stage 1 values are
        read_only and non_idempotent_write on the authored HTTP activity_attempts journal path. idempotent_write is reserved
        until idempotency execution ownership is specified and implemented; long_running is reserved for a later durable
        resume/cancel slice.
      input_schema: object — parameter names and types the tool accepts
      output_schema: object — field names and types the tool returns
    retired_fields:
      parameters: RETIRED — use input_schema
      returns: RETIRED — use output_schema
    http_fields:
      http: object — HTTP request template (see http_tool_definition.schema.http_block)
      response_mapping: object — maps response fields to output fields
      response_success: >
        object — optional closed response-success policy for ordinary HTTP tools and mandatory for provider connectors.
        `kind` is exactly `http_status_2xx` or `json_field_equals`; the latter also requires a valid response-rooted `path`
        and scalar `equals` value. See tool_model.http_tool_definition.response_success_owner.
      credentials: list of strings — credential store keys
      managed_credential: object — managed OAuth/token credential reference; supported only for handler_type http
      rate_limit: string — optional external dispatch admission rate, supported only when handler_type resolves to http.
      rate_limit_max_wait: string — required when rate_limit is present.
    not_accepted:
      endpoint: NOT a valid field. Use http.url instead.
      type: NOT a valid field. Use handler_type instead.
prompt_templating:
  description: Agent prompts are markdown files selected by the canonical runtime prompt resolver. They may contain {{variable}}
    placeholders that the platform substitutes from policy.yaml at agent session creation time. The substitution is simple
    string replacement — no logic, no conditionals. Variables not found in policy.yaml are left as-is (fail-open for forward
    compatibility).
  convention:
    prompt_path: >-
      canonical resolver candidates: prompt_ref, logical agent id, registry entry id, optional {ref}.{mode}.md variant,
      workspace_class-role fallback, shard-parent runtime lookup, and bundle prompt-directory fallback
    variable_syntax: '{{variable_name}}'
    variable_source: policy.yaml scalar values, excluding typed sections such as criteria
  variable_resolution:
    description: Prompt variables ({{token}}) are resolved from multiple sources in priority order. All sources must be scanned
      by compliance tests.
    resolution_order:
    - source: instance_variables (schema.yaml)
      description: Variables declared in the flow schema. Populated at flow instance creation via config_from.
      example: customer_name, order_type, region
    - source: policy (policy.yaml)
      description: Scalar policy values from flow and root policy files. Typed sections such as criteria are not prompt
        variables; criteria are delivered only through criteria_contracts.delivery.
      example: max_retries, sla_hours, approval_threshold
    - source: entity_state fields
      description: Entity fields written by data_accumulation. Available at render time from entity context.
      example: total_amount, resolution_summary
    - source: runtime tokens
      description: Platform-injected tokens not declared in contracts. Hardcoded allowlist.
      example: current_date, agent_id, flow_instance_path
    compliance_test_sources: 'TestPromptVariablesComplete must scan ALL of these for each prompt directory: schema.yaml (instance_variables.variables),
      policy.yaml scalar keys excluding typed sections such as criteria, agents.yaml (prompt_inputs), and the runtime-token
      allowlist. A variable is valid if it appears in ANY of these sources.'
  prompt_postamble:
    description: The platform appends a short environment postamble to every agent system prompt at session creation time.
      The postamble tells the agent where it is working — workspace paths and access levels. It does NOT list available tools
      or capabilities — the LLM sees those via tool definitions in the API call, same as MCP tools and platform builtins.
      The product prompt (from the canonical resolved prompt file, with variables resolved) comes first. The postamble follows.
    construction:
      order:
      - 1. Product prompt (canonical resolved prompt file with {{variable}} substitution)
      - 2. Platform postamble (auto-generated from workspace_class)
      rules:
      - Always included. Every agent gets workspace context.
      - Does NOT list tools or native capabilities — those are conveyed via tool definitions, not prompt text.
      - Generated at session creation time from the agent's workspace_class. Not editable by the product author.
    template: |
      ## Environment

      Workspace: /workspace (read-write logical path)
      Reference data: /data (read-only logical path)
      Contracts: /opt/swarm/contracts (read-only logical path)
      Docker-backed command execution exposes these as OS paths. Trusted host bash is full host-user shell execution from the workspace backing directory; use relative paths for workspace files, and absolute path availability follows the host deployment namespace and OS permissions.
    normative_content: >
      The three logical workspace paths (/workspace, /data, /opt/swarm/contracts with their access levels) are required. The
      postamble MUST distinguish logical platform paths from host native bash process paths: Docker-backed command execution
      exposes the logical paths as OS mount paths, while trusted host bash is full host-user shell execution from the workspace
      backing directory, does not synthesize absolute /workspace, /data, or /opt/swarm/contracts OS paths, and must not be
      described as a reduced or platform-file-only command surface. The exact wording is not normative — the content
      requirements are.
    native_tools_in_postamble: No. Native tools are NOT described in the postamble. They are conveyed via tool definitions
      in the LLM API call, same as all other tools. The platform must not hide a fallback/native distinction by advertising
      native tools the current turn cannot actually call.
    note: The logical workspace paths are the same for all workspace classes — only the /workspace scope differs (per-agent vs
      per-flow-instance). The postamble does not vary by scope — it tells the agent the logical paths, the platform enforces
      scoping, and host native bash must not be represented as Docker-equivalent mount isolation.
flow_model:
  description: A Flow is the universal building block. Every level of the system is a flow — from the root flow down to the
    smallest sub-flow. A flow can contain child flows. The root flow is what others call "the root flow." There is no separate
    project concept (removed).
  flow_instance_authoring:
    status: merge_bearing_source_authority
    promoted_by: '#1538'
    parent_tracker: '#1537'
    owner: platform-spec.yaml#flow_model.flow_instance_authoring
    locked_principle: >
      Swarm's default authoring model is flow-instance-centered. A normal flow
      instance owns one primary state entity. Cross-flow composition routes to
      flow instances through `connect` and instance keys. Lists and maps are
      contained state inside the primary entity. Authors promote contained state
      to child/template flows only when it needs independent lifecycle, routing,
      timers, retries, agents, or audit. Static multi-entity flow ownership is
      retired model debt, not an authoring escape hatch.
    source_context:
      locked_design: '#1476'
      parent_tracker: '#1537'
      spec_authority_slice: '#1538'
    locked_design_coverage:
      status: exhaustive_against_locked_1476_design
      rule: >
        This ledger enumerates every major section of the locked #1476
        decision. Rows marked `specified_by_1538` are captured normatively by
        this owner. Rows marked `split_to_child` are intentionally not
        implemented by #1538 and must remain tracked by the named child before
        #1537 can close.
      rows:
      - id: locked_principle
        locked_design_section: Locked principle
        coverage: specified_by_1538
        owner: platform-spec.yaml#flow_model.flow_instance_authoring.locked_principle
      - id: locked_mental_model
