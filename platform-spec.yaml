  examples_policy:
    status: deferred
    owner: api_specification.examples_policy
    applies_to: all_generated_methods
    openrpc_method_examples: omitted_until_explicitly_authored
    runtime_probe_fixtures: not_examples_source
    future_source_model_required: true
    reason: >
      OpenRPC method examples are intentionally deferred for v1 because no authoritative
      examples source model has been promoted. Runtime probe fixtures are proof inputs
      and MUST NOT be reused as published examples.
    requirements:
    - generated openrpc.json MUST omit method examples while status is deferred
    - compliance matrix examples rows MUST use policy_deferred proof status
    - future authored or generated examples require a promoted api_specification source model and gate
  service_discovery_policy:
    status: not_published
    owner: api_specification.service_discovery_policy
    applies_to: generated_v1_method_catalog
    rpc_discover: omitted
    publication_artifact: generated_openrpc_json
    runtime_behavior: out_of_catalog_method_not_found
    reason: >
      The v1 API publishes its method catalog through generated openrpc.json.
      rpc.discover is intentionally not part of the v1 method catalog unless a
      future gate promotes it as an explicit method with runtime behavior and
      schema proof.
    requirements:
    - generated openrpc.json MUST omit rpc.discover while status is not_published
    - compliance matrix service_discovery_publication rows MUST use policy_not_published proof status
    - future rpc.discover publication requires api_specification method_catalog promotion and supported-surface runtime proof
  method_catalog_metadata:
    description: "All v1 methods. Each method declares: tier, description, scope.required,\nparams (array of contentDescriptors),\
      \ result (contentDescriptor), errors\n(array of error codes from components.errors). Mutating methods include\nidempotency.\
      \ Subscription methods include notification_schema.\n\ncontentDescriptor shape (per OpenRPC):\n  { name: string, required:\
      \ boolean, description?: string,\n    schema: <JSON Schema or $ref> }\n\ntier values:\n  must_have   \u2014 closure-gate\
      \ set. The minimal API surface required to:\n                (a) close Empire #57 (mailbox approval API gap blocking\n\
      \                    every end-to-end run), and\n                (b) back the promoted CLI v2 read commands\n\
      \                    (`swarm run list`, `swarm run status`, `swarm run trace`, `swarm health`; pre-v2.2 spellings at promotion time)\n\
      \                    and the promoted `swarm run start` follow/cancellation paths.\n\
      \                Implementable as one PR; 14 methods total.\n  should_have \u2014 v1-scoped but ships in subsequent\
      \ slices. Spec is\n                authoritative now (so consumers can plan against it),\n                but implementation\
      \ is sequenced after the must_have set.\n                Includes remaining streaming subscriptions, observability drill-down\n\
      \                (event/entity/runtime), agent control, conversation reads,\n                remaining production run-control\
      \ (pause/continue and broader stop command surfaces), runtime\n                ingress control.\n  deferred    \u2014 explicitly out of v1 scope.\
      \ Listed in deferred_namespaces.\n"
  method_catalog:
    health.ping:
      tier: must_have
      description: Cheap aliveness check. Always returns success when the runtime is responsive.
      scope:
        required:
        - read:health
      params: []
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - ok
          - ts
          properties:
            ok:
              type: boolean
              const: true
            ts:
              $ref: '#/components/schemas/Timestamp'
      errors: []
    health.check:
      tier: must_have
      description: Structured health and bundle identity. Operators use this to confirm readiness and the served bundle
        identity; runtime-instance descriptor trust uses runtime.identity.
      scope:
        required:
        - read:health
      params: []
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/HealthCheckResult'
      errors: []
    runtime.identity:
      tier: must_have
      description: >
        Authenticated nonsensitive identity for the live runtime process instance. Local context descriptors use this
        method to prove that a discovered API endpoint is the same runtime instance named by the descriptor. It is not
        bundle identity, PID, port, URL, /healthz, or /readyz.
      scope:
        required:
        - read:runtime
      params: []
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/RuntimeIdentityResult'
      errors: []
    bundle.list:
      tier: should_have
      description: >
        List persisted bundle catalog rows. This is a definition/catalog read over the bundles store owner, not runtime
        state. Results are ordered by newest ingested_at then bundle_hash and may be cursor-paginated.
      scope:
        required:
        - read:bundles
      params:
      - name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
      - name: cursor
        required: false
        schema:
          $ref: '#/components/schemas/Cursor'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/BundleListResult'
      errors: []
    bundle.get:
      tier: should_have
      description: >
        Read one persisted bundle catalog row by canonical bundle_hash. The result returns stored config, parsed projection,
        metadata, and data presence facts only; it does not expose runtime state or server-local filesystem paths.
      scope:
        required:
        - read:bundles
      params:
      - name: bundle_hash
        required: true
        schema:
          $ref: '#/components/schemas/BundleHash'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/BundleDetail'
      errors:
      - BUNDLE_NOT_FOUND
    bundle.agents:
      tier: should_have
      description: >
        Return definition-only agent catalog entries projected from the persisted bundle row identified by bundle_hash. This
        method must not read runtime agents, sessions, queues, diagnoses, active tasks, or status fields, and does not close
        strict duplicate-slug runtime identity work.
      scope:
        required:
        - read:bundles
      params:
      - name: bundle_hash
        required: true
        schema:
          $ref: '#/components/schemas/BundleHash'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/BundleAgentsResult'
      errors:
      - BUNDLE_NOT_FOUND
    bundle.register:
      tier: should_have
      description: >
        Register a bundle into the persisted bundle catalog without starting a runtime. The request submits a
        BundleRegistrationEnvelopeV1 YAML document plus optional BundleRegisterDataBlobV1 entries. The server materializes those files into a
        temporary contract root, computes the canonical bundle_hash through internal/runtime/contracts.BundleHash, stores
        canonical bundle catalog projection bytes through the shared store UPSERT owner, and returns the canonical
        bundle_hash. This method never mutates runs and never restores rows whose bundle_source was previously marked
        deleted.
      scope:
        required:
        - write:bundles
      idempotency: per the convention.
      params:
      - name: content_yaml
        required: true
        description: YAML-encoded BundleRegistrationEnvelopeV1. This is an upload envelope, not server-local filesystem authority.
        schema:
          type: string
      - name: data_blob
        required: false
        schema:
          $ref: '#/components/schemas/BundleRegisterDataBlobV1'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/BundleRegistrationResult'
      errors:
      - BUNDLE_REGISTER_CONFLICT
      - IDEMPOTENCY_CONFLICT
    bundle.delete:
      tier: should_have
      description: >
        Destructive bundle delete wrapper. The API layer owns only the v1 request/response/auth/idempotency contract and
        MUST consume the bundle-delete owner chain for execution. Omitted or false force performs the #1018 non-force path:
        plan persisted run users, fail closed with BUNDLE_HAS_ACTIVE_RUNS when running or paused persisted users exist, and
        otherwise consume the #1009 source-first final store transaction to mark eligible persisted runs deleted before
        deleting the bundle row. force=true performs the #1019 force path: shared destructive-operation mutex, bundle plan,
        preservation cleanup for active affected runs, managed entity-container selection/stop by run identity, and the same
        final store transaction after cleanup succeeds. This method MUST NOT implement CLI behavior, runtime.nuke
        include_bundles, or broad multi-bundle lifecycle cleanup.
      scope:
        required:
        - control:runtime
      idempotency: per the convention.
      params:
      - name: bundle_hash
        required: true
        schema:
          $ref: '#/components/schemas/BundleHash'
      - name: force
        required: false
        schema:
          type: boolean
          default: false
      - name: dry_run
        required: false
        schema:
          type: boolean
          default: false
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/BundleDeleteResult'
      errors:
      - BUNDLE_NOT_FOUND
      - BUNDLE_HAS_ACTIVE_RUNS
      - BUNDLE_DELETE_IN_PROGRESS
      - IDEMPOTENCY_CONFLICT
    health.subscribe:
      tier: should_have
      description: WebSocket heartbeat subscription. Notifications carry the same shape as health.check returns.
      scope:
        required:
        - read:health
      params: []
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/SubscriptionId'
      notification_schema:
        $ref: '#/components/schemas/HealthCheckResult'
      notification_cadence: Every 5 seconds.
      errors: []
    rpc.unsubscribe:
      tier: should_have
      description: Cancel an active WebSocket subscription on the current connection. This is a JSON-RPC protocol method for
        the subscription transport, not a durable resource mutation.
      scope:
        required: []
      params:
      - name: subscription_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/OkResult'
      errors: []
    event.publish:
      tier: should_have
      description: "Canonical low-level event publication and workflow-creation primitive.\nPublishes one declared event into\
        \ the runtime bus. If run_id is omitted,\nthe server allocates a new run_id, persists the event as that run's\ntrigger,\
        \ and returns new_run_created=true. If run_id is provided,\nit must identify an existing nonterminal run; missing\
        \ or terminal\nruns fail closed with RUN_NOT_FOUND or RUN_ALREADY_TERMINAL. Existing-run publication must preflight\
        \ the selected runtime EventBus recipient plan before event/idempotency persistence. A declared event with no selected\
        \ persisted delivery recipient or delivery route for that run fails closed with EVENT_NOT_DECLARED and must not return\
        \ success with deliveries=0. Target resolution failures in the selected plan also fail closed with EVENT_NOT_DECLARED.\
        \ Existing-run publication may provide `target` as the singular receiver route identity (`flow_instance` plus `entity_id`).\
        \ When present, `target` is route authority and the server validates that the entity exists in the selected run,\
        \ belongs to the selected target flow instance, and has a selected delivery route for the requested event before\
        \ event/idempotency persistence. The API must not infer an entity target from run_id or payload.entity_id.\n\nCheckpoint/source-authority policy:\
        \ callers that need causal proof\nMUST provide source_event_id together with run_id. The source event\nmust exist\
        \ in the same run_id and the server persists it as\nevents.source_event_id / ParentEventID. Omitted source_event_id\n\
        means the published event is unparented; it is valid low-level\ningress but MUST NOT be presented as proof that an\
        \ internal\napproval/checkpoint path occurred. source_event_id without run_id,\nmalformed source_event_id, or a source\
        \ event from another run fails\nclosed before event or idempotency completion persistence. A missing\nsource event\
        \ fails closed with EVENT_NOT_FOUND.\n\nThe method consumes the same canonical EventBus/store event-publication\n\
        owner used by runtime dispatch. Delivery results are read back from the\npersisted event_deliveries owner; the API\
        \ layer must not re-plan\nsubscribers. A successful event.publish response is a durable acceptance acknowledgment\
        \ for the event record, selected delivery manifest, and committed replay scope; it MUST NOT wait for system-node\
        \ handler completion, dynamic auto_emit_on_create side effects, agent processing, downstream event delivery, or downstream\
        \ receipts. Delivery statuses in the response are a persisted snapshot and may remain pending. Post-commit runtime\
        \ dispatch/recovery owns downstream completion. This is the canonical primitive; run.start remains only\nas a deprecated wrapper\
        \ for older callers.\n\n`event_name` is a contract event reference. Callers may pass a root/unambiguous leaf event\
        \ name or a flow-scoped reference such as `flow_id/local_event` or `flow-path/local-event`. The server resolves\
        \ flow-scoped references through the loaded contract catalog before declaration validation, payload validation,\
        \ EventBus publish, and idempotency completion persistence. Unknown flow/event combinations and ambiguous unscoped\
        \ leaf names fail closed with EVENT_NOT_DECLARED and no mutation.\n\nCreate-entity ownership: handler create_entity\
        \ is the only authority that materializes the canonical receiving-flow entity identity. Caller-supplied payload.entity_id on an event whose selected\
        \ handler declares create_entity fails closed with PAYLOAD_VALIDATION_FAILED before event/idempotency persistence.\
        \ select_entity/select_or_create_entity use their declared payload-key bindings only; payload.entity_id is not target\
        \ or stateful-context authority.\n"
      scope:
        required:
        - write:runs
      idempotency: per the convention.
      params:
      - name: bundle_hash
        required: false
        description: >-
          Canonical #1001 bundle identity scope. Must be bundle-v1:sha256:<64 lowercase hex>.
          Required when run_id is omitted. When run_id
          identifies an existing run, optional bundle_hash must match that run's
          canonical runs.bundle_hash or the method fails closed with BUNDLE_MISMATCH.
          In DB-loaded RuntimeContextManager mode, the resolved hash must select a
          loaded BundleContext or the method fails closed with BUNDLE_UNAVAILABLE.
          cannot be combined with legacy bundle_ref; malformed or combined inputs fail
          closed with UNSUPPORTED_BUNDLE_HASH.
        schema:
          $ref: '#/components/schemas/BundleHash'
      - name: bundle_ref
        required: false
        description: >-
          Deprecated transition alias during #1001. Carries bundle_ref.fingerprint only,
          is not authoritative for create-new-work scope or routing, and cannot be combined
          with bundle_hash.
        schema:
          $ref: '#/components/schemas/BundleRef'
      - name: event_name
        required: true
        description: >-
          Contract event reference to publish. Root and unambiguous leaf names remain accepted; valid flow_id/local_event
          or flow-path/local-event references are resolved server-side through the loaded contract catalog to the canonical
          runtime event identity before validation and persistence. Unknown flow/event combinations and ambiguous unscoped
          leaf names fail closed with EVENT_NOT_DECLARED.
        schema:
          type: string
      - name: payload
        required: true
        description: >-
          JSON object business payload. payload.entity_id is not an event envelope, target, or stateful-context authority.
          If the selected handler uses create_entity, caller-supplied payload.entity_id fails closed with PAYLOAD_VALIDATION_FAILED
          because the handler materializes the platform-owned canonical receiving-flow identity.
        schema:
          type: object
          additionalProperties: true
      - name: run_id
        required: false
        description: Existing nonterminal run to inject into; if omitted, runtime allocates and starts a new run.
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: source_event_id
        required: false
        description: Optional parent/source event id for explicit checkpoint lineage. Requires run_id and must identify an event in the same run.
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: target
        required: false
        description: >-
          Optional singular receiver route identity for existing-run publication. Requires run_id and carries the concrete
          target flow_instance plus entity_id that the server persists as event.target before EventBus recipient planning.
          This field is route authority; payload.entity_id and run_id are not target authority. Fan-out target_set and
          selector-style target forms are not part of the v1 event.publish public surface in this slice.
        schema:
          $ref: '#/components/schemas/EventPublishTargetRoute'
      - name: emitter
        required: false
        description: Optional producer identifier. Defaults to cli-publish:<actor_token_id>.
        schema:
          type: string
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/EventPublishResult'
      errors:
      - BUNDLE_MISMATCH
      - BUNDLE_SCOPE_REQUIRED
      - BUNDLE_UNAVAILABLE
      - BUNDLE_DATA_INTEGRITY_ERROR
      - UNSUPPORTED_BUNDLE_HASH
      - UNSUPPORTED_BUNDLE_REF
      - EVENT_NOT_DECLARED
      - EVENT_PUBLISH_FAILED
      - PAYLOAD_VALIDATION_FAILED
      - RUN_NOT_FOUND
      - EVENT_NOT_FOUND
      - RUN_ALREADY_TERMINAL
      - IDEMPOTENCY_CONFLICT
    test.setup_entities:
      tier: should_have
      description: >
        Public deterministic scenario-runner setup/pre-state mutation helper.
        This method seeds scenario-owned initial entity rows for exactly one
        scenario run after the runner has validated the authored setup against
        the loaded contract bundle. It is not a general product/runtime
        entity.create or entity.update surface, does not publish events, does
        not create delivery rows, does not infer handler outcomes, and does not
        accept private cataloge2e setup syntax. The server persists the run
        row under canonical bundle context and writes the requested initial
        entity state through the store owner. Scenario-visible verification
        remains through event.publish, run.diagnose/run.trace, entity.get/list,
        and other public read owners.
      scope:
        required:
        - write:runs
      idempotency: per the convention.
      params:
      - name: bundle_hash
        required: true
        description: Canonical bundle identity for the loaded contract package. Legacy bundle_ref/fingerprint inputs are not accepted.
        schema:
          $ref: '#/components/schemas/BundleHash'
      - name: run_id
        required: true
        description: Deterministic scenario run id generated by the public runner before the first action step.
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: entities
        required: true
        description: Validated scenario setup entity rows. Alias and entity_id must be unique within the request.
        schema:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required:
            - alias
            - entity_id
            - entity_type
            - current_state
            properties:
              alias:
                type: string
                minLength: 1
              entity_id:
                $ref: '#/components/schemas/OpaqueId'
              flow_instance:
                type: string
                description: Concrete flow scope for the setup entity; omitted for root-flow setup rows.
              entity_type:
                type: string
                minLength: 1
              current_state:
                type: string
                minLength: 1
              fields:
                type: object
                additionalProperties: true
              gates:
                type: object
                additionalProperties:
                  type: boolean
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/TestSetupEntitiesResult'
      errors:
      - BUNDLE_MISMATCH
      - BUNDLE_UNAVAILABLE
      - BUNDLE_DATA_INTEGRITY_ERROR
      - UNSUPPORTED_BUNDLE_HASH
      - IDEMPOTENCY_CONFLICT
    event.replay:
      tier: should_have
      description: "Canonical operator-facing event redelivery primitive.\n\nRedelivers one existing persisted event to all\
        \ original agent subscribers, or to a caller-supplied subset of those original agent subscribers. The target set is\
        \ owned by the original event_deliveries agent rows; current live subscriptions, route tables, and bundle declarations\
        \ must not add recipients. Requested subscribers outside the original agent delivery set fail closed with EVENT_REPLAY_SUBSCRIBER_NOT_ORIGINAL.\n\
        \nPublic replay creates fresh replay execution evidence. Implementations MUST preserve the original event, delivery,\
        \ receipt, and session inspection surface, and MUST create a distinct replay event identity whose source_event_id/parent\
        \ lineage points at the original event. The fresh replay event creates fresh event_deliveries rows, and the result\
        \ reports source_delivery_id lineage back to the original delivery rows.\n\nOnly terminal original delivery rows are\
        \ replayable in v1: delivered, failed, and dead_letter. Pending or in_progress originals fail closed with EVENT_REPLAY_NOT_ELIGIBLE.\
        \ If the original event has no replayable original agent delivery history, the method fails with EVENT_REPLAY_NO_DELIVERY_HISTORY.\n\
        \nThe server also persists a synthetic event.replayed audit event with original event identity, replay event identity,\
        \ selected subscribers, actor token identity, and original delivery summary. event.list, event.get, run.trace, and\
        \ event.subscribe observe this audit event through the normal event read/stream owners.\n\nRuntime pause and run-dispatch\
        \ blocking follow the queueable event-producing ingress rule: replay/audit events and delivery rows may be persisted,\
        \ but subscriber work must not dispatch until resume/unblock. Missing or unregistered selected original subscribers\
        \ fail closed before replay evidence is created with EVENT_REPLAY_SUBSCRIBER_UNAVAILABLE.\n"
      scope:
        required:
        - write:runs
      idempotency: per the convention.
      params:
      - name: event_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: subscribers
        required: false
        description: Optional subset of original agent subscriber IDs. Empty or omitted means all original agent subscribers.
        schema:
          type: array
          items:
            type: string
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/EventReplayResult'
      errors:
      - EVENT_NOT_FOUND
      - EVENT_REPLAY_NO_DELIVERY_HISTORY
      - EVENT_REPLAY_SUBSCRIBER_NOT_ORIGINAL
      - EVENT_REPLAY_SUBSCRIBER_UNAVAILABLE
      - EVENT_REPLAY_NOT_ELIGIBLE
      - PAYLOAD_VALIDATION_FAILED
      - IDEMPOTENCY_CONFLICT
    run.start:
      tier: must_have
      deprecated: true
      description: 'Deprecated wrapper over event.publish retained for older Builder/API callers. New clients should call
        event.publish directly.

        Start a run by injecting an event into the runtime bus. Create-new-work admission follows event.publish bundle_hash
        semantics: if no existing run row provides bundle context, bundle_hash is required. If run_id is supplied but no
        run row exists, the call is still create-new-work and run_id alone is not bundle scope. If caller bundle_hash and
        existing run context disagree, the method fails closed with BUNDLE_MISMATCH. In DB-loaded RuntimeContextManager mode, the
        resolved bundle_hash must select a loaded BundleContext or the method fails closed with BUNDLE_UNAVAILABLE.
        Legacy bundle_ref.fingerprint is deprecated transition input only and cannot be combined with
        bundle_hash.

        '
      scope:
        required:
        - write:runs
      idempotency: per the convention.
      params:
      - name: bundle_hash
        required: false
        description: >-
          Canonical #1001 bundle identity scope. Must be bundle-v1:sha256:<64 lowercase hex>.
          Required when no existing run row supplies
          bundle context. When run_id identifies an existing run, optional bundle_hash
          must match that run's canonical runs.bundle_hash or the method fails closed
          with BUNDLE_MISMATCH. In DB-loaded RuntimeContextManager mode, the resolved hash must
          select a loaded BundleContext or the method fails closed with BUNDLE_UNAVAILABLE;
          cannot be combined with legacy bundle_ref; malformed or
          combined inputs fail closed with UNSUPPORTED_BUNDLE_HASH.
        schema:
          $ref: '#/components/schemas/BundleHash'
      - name: bundle_ref
        required: false
        description: >-
          Deprecated transition alias during #1001. Carries bundle_ref.fingerprint only,
          is not authoritative for create-new-work scope or routing, and cannot be combined
          with bundle_hash.
        schema:
          $ref: '#/components/schemas/BundleRef'
      - name: event_name
        required: true
        schema:
          type: string
      - name: payload
        required: true
        schema:
          type: object
          additionalProperties: true
      - name: run_id
        required: false
        description: Caller-provided ID; if omitted, runtime assigns.
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - run_id
          - status
          properties:
            run_id:
              $ref: '#/components/schemas/OpaqueId'
            status:
              $ref: '#/components/schemas/RunStatus'
      errors:
      - BUNDLE_MISMATCH
      - BUNDLE_SCOPE_REQUIRED
      - BUNDLE_UNAVAILABLE
      - BUNDLE_DATA_INTEGRITY_ERROR
      - UNSUPPORTED_BUNDLE_HASH
      - UNSUPPORTED_BUNDLE_REF
      - EVENT_NOT_DECLARED
      - EVENT_PUBLISH_FAILED
      - PAYLOAD_VALIDATION_FAILED
      - IDEMPOTENCY_CONFLICT
    run.fork:
      tier: should_have
      description: "Public selected-contract run fork mutation.\n\nCreates and executes a selected-contract fork from a source run. The method consumes source bundle availability from runs.bundle_source / runs.bundle_hash and bundle-row presence before any fork mutation. Source runs whose canonical bundle bytes are unavailable fail closed with BUNDLE_UNAVAILABLE; persisted source rows with missing bundle data fail with BUNDLE_DATA_INTEGRITY_ERROR. The selected-contract execution path consumes the existing store/runtime run_fork selected_contracts owners and must not infer source identity from legacy bundle_fingerprint, bundle_ref, null-collapse, or local filesystem heuristics.\n\nIf bundle_hash is omitted, the source run's canonical bundle_hash is used. If bundle_hash is supplied and equals the source run bundle_hash, the same-bundle selected_contracts fork may proceed. Disk-loaded source execution uses the existing runtime selected-contract source loader. DB-loaded same-bundle source execution must load source bytes from the persisted bundle catalog runtime source owner, verify the reconstructed bundle_hash, and stamp fork-created runs with bundle_source=persisted plus that canonical bundle_hash.\n\nIf bundle_hash differs from the source run bundle_hash, the target hash selects an already loaded/boot-pinned RuntimeContextManager BundleContext under current Option A. The method must persist selected-contract ownership as mode=bundle_hash with that target bundle_hash, recover routes against the same target identity, execute against the target BundleContext runtime/source, and stamp fork-created runs with bundle_source=persisted plus the target canonical bundle_hash. Valid target hashes that are not loaded by this process, have been unloaded or deactivated, are missing/deleted from the catalog, or otherwise lack supported persisted bytes fail closed with BUNDLE_UNAVAILABLE. Corrupt or hash-mismatched persisted target bytes fail with BUNDLE_DATA_INTEGRITY_ERROR. run.fork MUST NOT perform Dynamic Load, bundle.register runtime start, catalog-only runtime load, ambient CLI bundle selection, or Option B artifact capture. The `swarm run fork` CLI consumes this method and must not call runtime/store helpers directly.\n"
      scope:
        required:
        - write:runs
      idempotency: per the convention.
      params:
      - name: source_run_id
        required: true
        description: Source run to fork from.
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: fork_event_id
        required: false
        description: Optional explicit fork-point event id in source_run_id. When omitted, the run-fork store owner selects the latest persisted source-run event; no CLI/current-session ambient event is allowed.
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: bundle_hash
        required: false
        description: "Optional target/source bundle selector. Equal or omitted values use same-bundle selected_contracts semantics. A differing value selects an already loaded/boot-pinned RuntimeContextManager BundleContext under #976; valid but unavailable targets fail with BUNDLE_UNAVAILABLE and corrupt target catalog bytes fail with BUNDLE_DATA_INTEGRITY_ERROR."
        schema:
          $ref: '#/components/schemas/BundleHash'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/RunForkResult'
      errors:
      - BUNDLE_UNAVAILABLE
      - BUNDLE_DATA_INTEGRITY_ERROR
      - RUN_NOT_FOUND
      - EVENT_NOT_FOUND
      - IDEMPOTENCY_CONFLICT
    run.stop:
      tier: must_have
      description: >
        Stop an in-progress run. Pending events are abandoned; in-flight handlers complete or roll back per their
        own semantics. The selected run-control store terminalizes pending same-run `event_deliveries` rows for
        canonical runtime subscriber types (`agent` and `node`) as `dead_letter` with
        `reason_code=run_stopped`, and writes the matching agent or node receipt. For events that already have a
        platform/pipeline receipt, run.stop preserves that receipt as the authoritative routing outcome while
        terminalizing the pending delivery. When a stopped event lacks a platform/pipeline receipt and no active
        delivery remains, the store writes a stopped-run pipeline dead-letter so missing-pipeline-receipt replay
        cannot resurrect abandoned work.
      scope:
        required:
        - write:runs
      idempotency: per the convention.
      params:
      - name: run_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/OkResult'
      errors:
      - RUN_NOT_FOUND
      - RUN_ALREADY_TERMINAL
      - IDEMPOTENCY_CONFLICT
    run.pause:
      tier: should_have
      description: Pause a run by halting event dispatch. In-flight handlers complete; queued events wait. Run continues on
        run.continue.
      scope:
        required:
        - write:runs
      idempotency: per the convention.
      params:
      - name: run_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/OkResult'
      errors:
      - RUN_NOT_FOUND
      - RUN_ALREADY_TERMINAL
      - RUN_ALREADY_PAUSED
      - IDEMPOTENCY_CONFLICT
    run.continue:
      tier: should_have
      description: Resume a paused run.
      scope:
        required:
        - write:runs
      idempotency: per the convention.
      params:
      - name: run_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: idempotency_key
        required: false
        schema:
          type: string
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/OkResult'
      errors:
      - RUN_NOT_FOUND
      - RUN_NOT_PAUSED
      - IDEMPOTENCY_CONFLICT
    run.get:
      tier: must_have
      description: Cheap canonical read of the run header. Used by lists, hovers, and any consumer that needs run status without
        paying for diagnostic interpretation.
      scope:
        required:
        - read:runs
      params:
      - name: run_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - run
          properties:
            run:
              $ref: '#/components/schemas/RunHeader'
      errors:
      - RUN_NOT_FOUND
    run.list:
      tier: must_have
      description: List runs with optional filters. Cursor-paginated. The optional bundle_hash filter is a canonical persisted
        run-bundle selector over runs.bundle_hash; callers must not use legacy bundle fingerprints for this field.
      scope:
        required:
        - read:runs
      params:
      - name: bundle_hash
        required: false
        description: Optional canonical bundle selector over runs.bundle_hash. Must be bundle-v1:sha256:<64 lowercase hex>.
        schema:
          $ref: '#/components/schemas/BundleHash'
      - name: status
        required: false
        schema:
          $ref: '#/components/schemas/RunStatus'
      - name: since
        required: false
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: until
        required: false
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
      - name: cursor
        required: false
        schema:
          $ref: '#/components/schemas/Cursor'
      result:
        name: result
        required: true
        schema:
          type: object
          additionalProperties: false
          required:
          - runs
          properties:
            runs:
              type: array
              items:
                $ref: '#/components/schemas/RunHeader'
            next_cursor:
              $ref: '#/components/schemas/Cursor'
      errors: []
    run.trace:
      tier: must_have
      description: "Persisted composed run trace as an ordered list of joined rows. Each\nrow is anchored on an event and\
        \ carries delivery, session, and turn\nfields where the join finds them. The runtime owns the join \u2014 clients\n\
        MUST consume rows as-emitted and MUST NOT reconstruct the join from\nseparate event/delivery/session/turn lists. Backed\
        \ by the canonical\nRunDebugTraceRow surface in internal/store/run_debug_read_surface.go.\n"
      scope:
        required:
        - read:runs
        - read:events
        - read:agents
        - read:conversations
      params:
      - name: run_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 2000
          default: 200
      - name: cursor
        required: false
        schema:
          $ref: '#/components/schemas/Cursor'
      - name: since
        required: false
        description: >
          Optional RFC3339/RFC3339Nano materialization watermark. Returns rows whose canonical trace
          materialization watermark is strictly after this timestamp.
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: until
        required: false
        description: >
          Optional snapshot-only RFC3339/RFC3339Nano materialization watermark upper bound. Returns rows whose
          canonical trace materialization watermark is less than or equal to this timestamp. When combined with
          since, the server applies the half-open window `(since, until]`; since after until is invalid.
        schema:
          $ref: '#/components/schemas/Timestamp'
      - name: filter
        required: false
        description: Typed predicates over canonical RunTraceRow facts. Present fields are OR-lists within the field and AND-composed across fields.
        schema:
          $ref: '#/components/schemas/RunTraceFilter'
      - name: include_internal
        required: false
        description: Optional trace visibility control. Defaults to false. When omitted or false, run.trace excludes `platform.runtime_log` rows; when true, those internal runtime-log trace rows are included.
        schema:
          type: boolean
          default: false
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/RunTraceListResult'
      errors:
      - RUN_NOT_FOUND
    run.diagnose:
      tier: must_have
      description: "Interpreted run diagnosis. Returns the run header plus the\noperator-state projection from\ninternal/store/run_operational_status_read_surface.go\
        \ and concrete failed-delivery evidence from\nRunDebugReport.FailedDeliveries, plus result.test_quiescence from\n\
        RunDebugReport.TestQuiescence for deterministic test assertion barriers. The single canonical owner for\n\"why isn't\
        \ this run progressing?\" routes persisted evidence through\nthe API instead of having every consumer recompute it.\n"
      scope:
        required:
        - read:runs
        - read:events
        - read:entities
      params:
      - name: run_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/RunDiagnosis'
      errors:
      - RUN_NOT_FOUND
    run.subscribe_trace:
      tier: must_have
      description: 'Live composed trace stream for one run. Each notification carries one

        joined trace row (the same RunTraceRow shape returned by run.trace).

        Distinct from event.subscribe because trace is a composed view (event

        + delivery + session + turn joined by the runtime), not raw events.

        Supports the same RunTraceFilter row predicates as run.trace, composed with

        replay_since for catch-up/recovery.

        '
      scope:
        required:
        - read:runs
        - read:events
        - read:agents
        - read:conversations
      params:
      - name: run_id
        required: true
        schema:
          $ref: '#/components/schemas/OpaqueId'
      - name: filter
        required: false
        description: Typed predicates over canonical RunTraceRow facts. Present fields are OR-lists within the field and AND-composed across fields.
        schema:
          $ref: '#/components/schemas/RunTraceFilter'
      - name: include_internal
        required: false
        description: Optional trace visibility control. Defaults to false. When omitted or false, run.subscribe_trace excludes `platform.runtime_log` rows; when true, those internal runtime-log trace rows are included in notifications.
        schema:
          type: boolean
          default: false
      - name: replay_since
        required: false
        description: Optional catch-up window. If present, delivers trace rows from this time forward, then continues live.
          Subject to runtime trace retention.
        schema:
          $ref: '#/components/schemas/Timestamp'
      result:
        name: result
        required: true
        schema:
          $ref: '#/components/schemas/SubscriptionId'
      notification_schema:
        $ref: '#/components/schemas/RunTraceRow'
      notification_cadence: Pushed per joined row as trace rows are committed by the runtime.
      errors:
      - RUN_NOT_FOUND
    entity.list:
      tier: should_have
