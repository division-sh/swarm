              result:
                description: Per-method notification payload. See each subscribe method's notification_schema field.
    error_catalog_metadata:
      description: 'Per-error-code schemas for the structured `data.details` field. The

        outer envelope (top-level code, message, data.{code, retryable,

        correlation_id}) is constant; this section types `data.details`.

        '
      root_input_rejection_contract:
        canonical_owner: internal/runtime/runstart.RootInputSet, DeriveRootInputSet, ValidateInputEvents, and RootInputValidationError
        reasons:
          not_declared_root_input: The requested run-start event is absent from the root flow pins.inputs.events declaration.
          declared_root_input_not_routable: The requested event is declared as a root input but has no derived runtime route.
        absent_root_schema_rule: A workflow with no root schema has an empty declared and routable root-input domain; absence is not a validator failure.
        lossless_consumers:
        - internal/apiv1 run.start application-error adapter
        - internal/builder run.start RPC adapter while that in-process consumer remains live
        - swarm run start human diagnostic renderer
        rule: >
          Every consumer preserves the rejected event plus the deterministically sorted declared_events and
          routable_events domains from the typed owner. Consumers do not select the reason again from string content.
        post_validation_rule: >
          If the publisher rejects an event type after run-start root-input validation succeeded, the failure is a
          non-retryable publish contradiction and MUST use EVENT_PUBLISH_FAILED rather than emitting incomplete
          root-input EVENT_NOT_DECLARED facts. Event-publish and replay invalid-event mapping remains a separate
          event-catalog concept.
    errors:
      IDEMPOTENCY_CONFLICT:
        type: object
        additionalProperties: false
        required:
        - original_request_hash
        - conflicting_request_hash
        - original_response_ref
        properties:
          original_request_hash:
            $ref: '#/components/schemas/Sha256Fingerprint'
          conflicting_request_hash:
            $ref: '#/components/schemas/Sha256Fingerprint'
          original_response_ref:
            type: object
            additionalProperties: false
            required:
            - method
            - resource_id
            properties:
              method:
                type: string
              resource_id:
                $ref: '#/components/schemas/OpaqueId'
      AGENT_DIRECTIVE_IN_PROGRESS:
        description: A matching directive operation owns a live execution lease. Retry may observe its durable outcome but must not execute it again.
        type: object
        additionalProperties: false
        required:
        - operation_id
        - directive_event_id
        - run_id
        - state
        - lease_expires_at
        properties:
          operation_id:
            $ref: '#/components/schemas/OpaqueId'
          directive_event_id:
            $ref: '#/components/schemas/OpaqueId'
          run_id:
            $ref: '#/components/schemas/OpaqueId'
          state:
            type: string
            const: executing
          lease_expires_at:
            $ref: '#/components/schemas/Timestamp'
      AGENT_DIRECTIVE_COMPLETION_PENDING:
        description: Directive execution succeeded and is durable, but settlement/API completion still requires repair. Retry performs finalization only.
        type: object
        additionalProperties: false
        required:
        - operation_id
        - directive_event_id
        - run_id
        - state
        properties:
          operation_id:
            $ref: '#/components/schemas/OpaqueId'
          directive_event_id:
            $ref: '#/components/schemas/OpaqueId'
          run_id:
            $ref: '#/components/schemas/OpaqueId'
          state:
            type: string
            const: executed
      AGENT_DIRECTIVE_EXECUTION_FAILED:
        description: The admitted directive execution returned a durable terminal failure. Retrying the operation never executes BoardStep again.
        type: object
        additionalProperties: false
        required:
        - operation_id
        - directive_event_id
        - run_id
        - state
        - failure
        properties:
