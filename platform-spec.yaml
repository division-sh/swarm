    event_publish:
      command: swarm event publish <event-name> --payload-json <json-object> [--run-id <run-id>] [--source-event-id <event-id>] [--target-flow-instance <flow-instance>] [--target-entity-id <entity-id>] [--bundle-hash <bundle-v1:sha256:...>] [--bundle-fingerprint <sha256:...>] [--emitter <source>] [--idempotency-key <key>]
      group: run_operate
      tier: should_have
      implementation_status: implemented
      owner: /v1/rpc event.publish
      behavior: >-
        Mutating event publication CLI consumer. The CLI validates the event name, required JSON object payload, optional run
        target, optional same-run source event id, optional singular receiver target route identity, optional canonical bundle_hash assertion or deprecated legacy bundle
        fingerprint alias, optional emitter, and optional
        idempotency key, then sends exactly those params to /v1/rpc event.publish through the shared v1 API client. The server
        remains the event-publication owner:
        it validates declared event/payload/run/bundle/idempotency semantics, publishes through the runtime EventBus/store
        owner, derives delivery rows, and returns EventPublishResult. The server requires --bundle-hash for create-new-work
        when --run-id is omitted, checks optional --bundle-hash against existing run context when --run-id is supplied, and
        rejects valid but non-routable hashes with BUNDLE_UNAVAILABLE under the single-active-runtime boundary. --bundle-fingerprint
        remains deprecated transition input and is not authoritative for create-new-work scope or routing. Flow-scoped event
        names are server-owned contract references: the CLI sends the caller string unchanged, and /v1/rpc event.publish
        resolves valid flow_id/local_event or flow-path/local-event references through the loaded contract catalog before
        declaration validation, payload validation, EventBus publish, and idempotency completion persistence. Unknown
        flow/event combinations and ambiguous unscoped leaf names fail closed with EVENT_NOT_DECLARED. When --run-id selects
        an existing run, the server preflights the selected runtime EventBus recipient plan and rejects declared-but-unroutable
        follow-up events before event/idempotency persistence; the CLI must render that server EVENT_NOT_DECLARED rejection
        rather than reporting a successful publish with zero deliveries. When both --target-flow-instance and --target-entity-id
        are supplied with --run-id, the CLI serializes them as `target: {flow_instance, entity_id}` and the server validates
        the selected-run entity, entity_state.flow_instance equality, event routability for that concrete receiver route,
        and source-event same-run lineage before persistence. Caller-supplied payload.entity_id is not target or
        entity authority. If the selected handler uses create_entity, /v1/rpc event.publish rejects payload.entity_id with
        PAYLOAD_VALIDATION_FAILED because create_entity materializes the platform-owned canonical receiving-flow identity.
      flags:
      - name: --payload-json <json-object>
        required: true
        maps_to: payload
        behavior: Required inline JSON object payload. File/stdin payload input is not part of the v1 CLI event-publish slice.
      - name: --run-id <run-id>
        maps_to: run_id
        behavior: Optional existing nonterminal run id to inject the event into. Omitted means the server allocates and starts a new run.
      - name: --source-event-id <event-id>
        maps_to: source_event_id
        behavior: Optional parent/source event id for explicit checkpoint lineage. Must be used with --run-id and must name an event from the same run.
      - name: --target-flow-instance <flow-instance>
        maps_to: target.flow_instance
        behavior: Optional existing-run receiver target flow instance. Must be used with --run-id and --target-entity-id.
      - name: --target-entity-id <entity-id>
        maps_to: target.entity_id
        behavior: Optional existing-run receiver target entity id. Must be used with --run-id and --target-flow-instance.
      - name: --bundle-hash <bundle-v1:sha256:...>
        maps_to: bundle_hash
        behavior: Canonical bundle scope. Required by the server when --run-id is omitted; optional with --run-id as a same-run bundle assertion. Cannot be combined with --bundle-fingerprint.
      - name: --bundle-fingerprint <sha256:...>
        maps_to: bundle_ref.fingerprint
        behavior: Deprecated legacy alias retained only as transition input. It cannot satisfy create-new-work bundle scope, does not route work, and cannot be combined with --bundle-hash.
      - name: --emitter <source>
        maps_to: emitter
        behavior: Optional producer identifier. Omitted means the server default emitter applies.
      - name: --idempotency-key <key>
        maps_to: idempotency_key
        behavior: Optional v1 API idempotency key for this mutating publish request.
      output:
        success_detail: >-
          One publish summary line with event_id, event_name, run_id, new_run_created, and delivery count,
          followed by persisted delivery rows containing delivery_id, subscriber_type, subscriber_id, status,
          session_id, and attempt, and source_event_id when server-owned lineage was supplied.
      exit_codes:
        success: 0
        cli_validation: 2
        transport_or_malformed_response: 3
        auth_or_missing_token: 4
        not_found: 5
        publish_rejected: 6
        not_found_errors:
        - RUN_NOT_FOUND
        - EVENT_NOT_FOUND
        publish_rejected_errors:
        - BUNDLE_MISMATCH
        - BUNDLE_SCOPE_REQUIRED
        - BUNDLE_UNAVAILABLE
        - BUNDLE_DATA_INTEGRITY_ERROR
        - UNSUPPORTED_BUNDLE_HASH
        - UNSUPPORTED_BUNDLE_REF
        - EVENT_NOT_DECLARED
        - EVENT_PUBLISH_FAILED
        - PAYLOAD_VALIDATION_FAILED
        - RUN_ALREADY_TERMINAL
        - IDEMPOTENCY_CONFLICT
      proof_expectations:
      - exact /v1/rpc event.publish call with event_name, required payload, optional run_id, optional source_event_id, optional target object from --target-flow-instance plus --target-entity-id, optional canonical bundle_hash or deprecated legacy bundle_ref.fingerprint, optional emitter, and optional idempotency_key params only; missing create-new-work bundle scope maps to server BUNDLE_SCOPE_REQUIRED and valid non-routable hashes map to BUNDLE_UNAVAILABLE
      - flow-scoped event names are passed through exactly by the CLI and resolved only by the server-owned /v1/rpc event.publish contract-catalog resolver; unknown scoped references and ambiguous unscoped leaf names produce EVENT_NOT_DECLARED without mutation or idempotency completion
      - existing-run follow-up publish with no selected persisted delivery recipient or delivery route produces server EVENT_NOT_DECLARED before event/idempotency persistence; the CLI exits through publish_rejected and never reports deliveries=0 as success for that path
      - explicit target route publish persists event.target and one delivery_target_route through the server-owned event.publish/EventBus path; nonexistent entity, mismatched entity/flow ownership, not-routable target flow, missing/terminal run, source lineage mismatch, blank/malformed target params, and payload-only entity_id/flow_instance non-authority fail closed before event/idempotency persistence
      - payload.entity_id on a create_entity event produces server PAYLOAD_VALIDATION_FAILED before event/idempotency persistence; the CLI exits through publish_rejected and does not treat payload.entity_id as target/entity routing authority
      - missing/blank event name, invalid or non-object --payload-json, blank optional flags, partial target route flags, target route flags without --run-id, malformed bundle_hash, malformed bundle fingerprint, both bundle identity flags together, invalid args, and missing explicit token for non-loopback API targets make zero API calls
      - success output renders only server-owned EventPublishResult event_id, run_id, source_event_id when present, new_run_created, and typed persisted delivery rows
      - RUN_NOT_FOUND, EVENT_NOT_FOUND, publish rejection errors, auth/HTTP/RPC failures, and malformed EventPublishResult values fail closed with tested exit codes
      - no direct DB/store/runtime/EventBus/dashboard/Builder reads or writes and no legacy /api/*, /rpc, /api/rpc, /ws, /api/ws, run.start, event.replay, agent.replay, or agent.replay_backlog usage
