            normalization_mode: trim_case_sensitive
            normalization: trim only; case-sensitive
            display_projection: full
            display_shortening_eligible: false
          fork:
            candidate_source: /v1/rpc conversation.fork_list
            scope_mode: unpromoted_full_only
            scope_rule: boundedness and required scope not promoted
            normalization_mode: trim_case_sensitive
