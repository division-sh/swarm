      - id: authoring_decision_rubric
        locked_design_section: Authoring decision rubric
        coverage: specified_by_1538
        owner: platform-spec.yaml#flow_model.flow_instance_authoring.authoring_decision_rubric
      - id: composition_model
        locked_design_section: Composition model
        coverage: split_to_child
        owner: platform-spec.yaml#flow_model.flow_instance_authoring.composition_model
        implementation_trackers:
