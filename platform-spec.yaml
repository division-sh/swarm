            scope_mode: unbounded_full_only
            scope_rule: unbounded; full ID unless a narrower promoted scope exists
            normalization_mode: trim_case_sensitive
            normalization: trim only; case-sensitive
            display_projection: full
            display_shortening_eligible: false
          entity:
            candidate_source: /v1/rpc entity.list
