api_specification:
  description: "Single canonical user-facing API for the Swarm platform. JSON-RPC 2.0 over\nHTTP for request/response, JSON-RPC\
    \ subscriptions over WebSocket for live\nstreams. One transport, one auth model, one envelope. All operator,\nbuilder,\
    \ CLI, and dashboard consumers route through this surface.\n\nThe spec is Phase-1 in scope (internal \u2014 Empire as\
    \ the only consumer at\nspec time) but Phase-2-publishable by construction: no internal jargon in\nmethod names, no [PROPOSED]\
    \ placeholders that the impl never honors, all\nmethod signatures typed, all shapes consistent across read paths. This\n\
    YAML is the OpenRPC source-of-truth \u2014 the openrpc.json artifact is\ngenerated mechanically from method_catalog +\
    \ components.\n"
  source_of_truth:
    status: promoted_api_catalog
    merge_bearing_owner: platform-spec.yaml#api_specification
    authority_rule: |
      This api_specification block is the sole merge-bearing user-facing
      JSON-RPC/OpenRPC API contract. API implementation gates, CLI/dashboard
      consumers, generated OpenRPC checks, and tracker closeouts MUST bind to
      this tracked section plus generated openrpc.json and implementation proof
      in internal/apispec and internal/apiv1. Issue prose, local review drafts,
      ignored files, audit matrices, and unpromoted design notes are evidence
      only until their accepted behavior is promoted here.
    local_review_spec_disposition: |
      Private user-facing RPC review artifacts remain reconciliation input only.
      Any local "OpenRPC source-of-truth" or equivalent authority claim in those
      artifacts is superseded by this tracked source_of_truth block.
      Merge-bearing API behavior must be reflected here.
    promotion_rule: |
      When the local user-facing RPC review artifact contains methods, shapes,
      or API lifecycle semantics not represented in this section, that content
      is candidate intent. It must be promoted into this section with matching
      generated/implementation proof, split to a tracked child, or explicitly
      downgraded to backlog before it can be used as implementation authority.
  multi_bundle_publication_boundary:
    owner: multi_bundle_persistence.api_surface
    status: partial_bundle_read_catalog_register_run_fork_and_delete_method_catalog
    rule: >
      #1012 promotes the multi-bundle API contract as source authority, including bundle.* methods, run.fork, bundle_hash
      filters, and bundle_hash create-new-work params. The read-only bundle.list, bundle.get, and bundle.agents methods are
      now in method_catalog/OpenRPC with matching handlers and proof. Non-destructive bundle.register is also published
      in method_catalog/OpenRPC with its handler/store/idempotency owner proof by #1017; the prepared-envelope swarm
      bundle register CLI consumer is implemented by #1167, and local contracts-directory packaging is implemented by
      #1187 through the non-hashing upload packager owner, while archive packaging remains split.
      run.fork is also promoted into method_catalog/OpenRPC with matching selected-contract API/runtime handler proof by
      #989. The swarm bundle list/show/agents/register/delete and swarm run fork CLI consumers are implemented by #1023/#1167/#1187/#1200 and
      consume only those canonical /v1/rpc methods. bundle.delete is promoted into method_catalog/OpenRPC with matching
      API/runtime handler proof by #1018 and #1019: omitted or false force performs non-force deletion and force=true
      performs force cleanup. Remaining multi-bundle methods and shapes are
      not in method_catalog/OpenRPC until a later gated API/runtime implementation PR registers handlers and regenerates
      openrpc.json/proof artifacts in the same PR. Consumers must not treat the
      retired private multi-bundle draft or #1038 prose as API authority after
      #1012.
    blocked_children:
      cross_bundle_fork: '#976'
      bundle_hash_dual_accept_migration: '#1001'
      agent_identity_duplicate_slug_migration: '#977'
  agent_identity_boundary:
    owner: platform-spec.yaml#agent_identity_model
    status: current_global_slug_constraint
    rule: >
      Agent-facing method params named agent_id currently accept the public authored slug that is also the current global
      live agent identity. The generated OpenRPC shape does not publish agents.id UUID, UUID-or-slug resolution, or
      duplicate-slug bundle-scoped lookup. Methods that need duplicate-slug safety must either receive a separately
      promoted #977 identity child or fail closed under their existing multi-context ambiguity rules.
  foundations:
    transport:
      json_rpc_over_http:
        endpoint: POST /v1/rpc
        envelope: JSON-RPC 2.0 (https://www.jsonrpc.org/specification)
        request_shape: '{"jsonrpc":"2.0","id":<id>,"method":"<namespace>.<verb>","params":{...}}'
        success_response: '{"jsonrpc":"2.0","id":<id>,"result":{...}}'
        error_response: '{"jsonrpc":"2.0","id":<id>,"error":{"code":...,"message":"...","data":{...}}}'
      json_rpc_over_websocket:
        endpoint: 'GET /v1/ws (Upgrade: websocket)'
        purpose: "Subscriptions. Once a subscription is established via a `*.subscribe`\nmethod on the WebSocket connection,\
          \ the runtime pushes notifications\nusing the geth-style envelope:\n\n  {\n    \"jsonrpc\": \"2.0\",\n    \"method\"\
          : \"rpc.subscription\",\n    \"params\": {\n      \"subscription\": \"<subscription_id>\",\n      \"result\": {\
          \ ... }\n    }\n  }\n"
        unsubscribe: "rpc.unsubscribe({subscription_id}) \u2192 {ok: true}"
      process_probes:
        description: 'HTTP endpoints `/healthz` and `/readyz` are out-of-band process

          probes for infrastructure that needs unauthenticated binary

          aliveness signals (kubernetes liveness/readiness, load balancer

          health monitoring, etc.). They are NOT part of this JSON-RPC API

          and do NOT require bearer-token auth. They live alongside /v1/rpc

          and /v1/ws but are intentionally separate concerns.

          '
        endpoints:
          /healthz: GET, no auth, returns 200 OK if the process is alive.
          /readyz: GET, no auth, returns 200 OK if the runtime is ready to accept requests (database connection up, contracts
            loaded).
        relationship_to_health_namespace: "The health.* JSON-RPC namespace is OPERATOR-grade authenticated\nhealth. health.check\
          \ returns rich structured health (db, runtime,\nbundle identity); health.ping is a cheap aliveness over the\nauthenticated\
          \ channel. Process probes (/healthz, /readyz) are a\nseparate concern for INFRASTRUCTURE consumers that cannot present\n\
          a bearer token. The two surfaces are not redundant \u2014 they serve\ndifferent consumers and answer different questions\
          \ (\"is the\nprocess up?\" vs \"is the operator API ready and what is it serving?\").\n"
    versioning:
      url_prefix: /v1/
      policy: 'Breaking changes (renamed methods, removed methods, changed result

        shapes, changed required parameter sets, changed error semantics) bump

        the URL prefix to /v2/. Additive changes (new optional parameters, new

        optional result fields, new methods, new error codes added to existing

        methods'' allowed-error lists) do not bump the version. Deprecation: a

        method or field marked deprecated in /v1/ MUST stay functional within

        /v1/ for at least one minor spec revision before removal under /v2/.

        '
    auth:
      v1_model: 'Single bearer token in `Authorization: Bearer <token>` header on every

        HTTP request and on the WebSocket upgrade. Token presence and validity

        are the only check in v1; the token grants every scope in the catalog.

        When no explicit API token is configured for numeric-loopback local dev,

        the implementation may use the built-in loopback default token governed

        by cli_specification.foundations.api_connection_auth_config_precedence.

        This remains bearer-token auth and MUST NOT become a loopback no-auth bypass.

        '
      forward_compatibility: "Each method declares its required scope(s) in this spec (see scopes\nsection). v1 enforcement\
        \ does not check scopes \u2014 every valid token\ngrants every scope. Phase 2/3 enforcement may add per-token scope\n\
        restrictions without spec changes. The scope declarations exist in\nv1 specifically to make later enforcement non-breaking.\n"
    cli_consumption_rule: "CLI v2 runtime-state commands consume this API. The CLI MUST NOT reach directly into internal packages\
      \ for runtime reads or actions. One narrow exception: `swarm verify` \u2014 which operates on contract files on disk\
      \ and does not require a running runtime \u2014 may continue to call into the verification packages directly. All other\
      \ CLI commands route through the API, including `swarm run list`, `swarm run status`, `swarm run trace`, `swarm health`, `swarm run start`,\
      \ `swarm mailbox`, `swarm control`, and later resource-noun surfaces.\n\nSame rule applies to the dashboard (when one\
      \ ships) and any future external SDK or third-party tooling. Retired `swarm investigate *` commands are legacy consumers\
      \ only and are not a source for new CLI topology.\n"
  namespaces:
    description: "Ten canonical owner namespaces. Every concept the API exposes lives in\nexactly one namespace. No overlap.\
      \ Two ownership rules locked because\nthey were the source of the prior dual-API spec drift:\n  - conversation.* owns\
      \ sessions, turns, transcripts. agent.* owns\n    agent identity, current status, and control actions only. Reading\n\
      \    a session goes through conversation.*, not agent.*.\n  - event.subscribe is the only canonical event stream. run.subscribe_trace\n\
      \    is a separate stream because trace is a composed view (events +\n    deliveries + sessions + turns), not raw events.\n"
    entries:
      health:
        owns: aliveness, readiness, structured server health, runtime identity
        streams: heartbeat
      run:
        owns: run lifecycle (start/stop/pause/continue), composed run diagnosis, composed live trace
        streams: composed live trace
      entity:
        owns: entity state (consolidates legacy "instance"-shaped reads)
        streams: none
      event:
        owns: "canonical event stream \u2014 raw events, deliveries, dead letters"
        streams: filtered live event stream
      mailbox:
        owns: mailbox items, approval/reject/defer decision actions (idempotent)
        streams: none
      agent:
        owns: agent registry, current status, control actions (restart, replay, send_directive). Returns session refs, not
          session content.
        streams: none
      conversation:
        owns: conversations, sessions, turns, transcripts
        streams: none
      runtime:
        owns: runtime control (ingress pause/resume), runtime observability (structured logs, incidents)
        streams: none
      test:
        owns: public deterministic test-runner setup/pre-state mutation helpers only; not product runtime mutation
        streams: none
  conventions:
    error_format:
      envelope: JSON-RPC 2.0 standard {code, message, data}
      data_structure:
        code: "Application-level error code, namespaced and uppercase. Examples:\nBUNDLE_MISMATCH, MAILBOX_ALREADY_DECIDED,\
          \ IDEMPOTENCY_CONFLICT,\nENTITY_NOT_FOUND. Distinct from the JSON-RPC top-level numeric\n`code`; generated OpenRPC\
          \ assigns one unique numeric code in the\n-32000..-32099 range per application error, while data.code remains\n\
          the canonical string discriminator.\n"
        details: Per-error-code structured object. See components.errors for the schema of each code's details.
        retryable: Boolean. true = transient (network, temporary lock); false = permanent (validation failure, missing resource).
        correlation_id: Opaque string. Echo of request id, or runtime-assigned for traceability across logs.
      reserved_top_level_codes:
      - '-32700: Parse error (JSON-RPC standard)'
      - '-32600: Invalid request (JSON-RPC standard)'
      - '-32601: Method not found (JSON-RPC standard)'
      - '-32602: Invalid params (JSON-RPC standard)'
      - '-32603: Internal error (JSON-RPC standard)'
      - '-32000..-32099: Application error range (generated OpenRPC assigns one unique numeric code per components.errors
        entry; data.code remains the canonical string discriminator)'
    pagination:
      style: cursor-based
      list_method_pattern: 'All list methods accept `limit?` (default 50, max 500) and `cursor?`

        (opaque string, omitted for first page). All list methods return

        `next_cursor?` (omitted when no more pages).

        '
      no_offset: "Offset pagination is forbidden \u2014 concurrent inserts make offset unstable. Cursor opaqueness is the\
        \ runtime's discretion (encoded sort key, content hash, or both)."
    subscriptions:
      establishment: 'Call `<namespace>.subscribe({filter?, replay_since?})` over the

        WebSocket connection. Returns `{subscription_id: "<opaque>"}`. The

        runtime then pushes notifications on the same WebSocket using the

        geth-style envelope (see foundations).

        '
      parameter_classes: "Subscribe and list methods share three parameter classes with\ndifferent rules \u2014 they are NOT\
        \ interchangeable:\n\n  filter      \u2014 selection criteria (e.g., run_id, event_name,\n                delivery_status).\
        \ Defined as a named schema in\n                components.schemas (e.g. EventListFilter). The\n                filter\
        \ shape MUST be identical between a list\n                method and its subscribe sibling. This is what\n       \
        \         makes them \"the same query\" with different\n                delivery modes.\n  pagination  \u2014 limit\
        \ + cursor. LIST-ONLY. Subscriptions do not\n                accept these \u2014 subscriptions deliver everything\n\
        \                matching the filter live, not in pages.\n  time_window \u2014 different parameters per delivery mode:\n\
        \                  * list:      `since` and `until` bound the\n                               result set to events\
        \ with\n                               timestamps in that interval.\n                               Either may be\
        \ omitted.\n                  * subscribe: only `replay_since` is accepted.\n                               It seeds\
        \ the subscription by\n                               delivering events from `replay_since`\n                    \
        \           forward (catch-up window), then\n                               continues live. No `until` for\n     \
        \                          subscriptions; they run until\n                               unsubscribed or disconnected.\n\
        \nThe \"filter parity\" rule applies ONLY to the filter parameter.\nPagination and time-window parameters are deliberately\
        \ not shared\nbetween list and subscribe.\n"
      ordering_per_stream: 'Notifications within a single subscription are delivered in causal

        order per stream key (e.g., per run, per filter). Ordering across

        subscriptions is not guaranteed.

        '
      delivery: 'Subscriptions are eventually-delivered and not durable across

        disconnects. On reconnect: re-subscribe and use `replay_since` if

        the consumer needs to recover events from before the disconnect

        (subject to the runtime''s retention window). Subscriptions may

        also drop notifications under backpressure; consumers SHOULD

        reconcile by paginating the equivalent list method with the same

        `filter` plus a `since` time bound.

        '
      filter_parity: 'For every subscribe method that has a list sibling, the filter

        parameter MUST reference the same components.schemas type as the

        list method''s filter parameter (e.g., event.subscribe and event.list

        both reference EventListFilter). Implementations that diverge the

        two filter shapes are spec violations.

        '
      unsubscribe: "rpc.unsubscribe({subscription_id}) \u2192 {ok}"
    runtime_ingress:
      owner: 'The canonical runtime ingress controller owns runtime.pause/runtime.resume transitions, persisted paused/running
        state, runtime resource-state errors, platform.paused/platform.resumed emission, event-producing ingress admission, dispatch
        gating, and legacy adapter consumption. Low-level runtimebus flags may exist only as implementation plumbing; they are
        not semantic owners.'
      state_storage: runtime_ingress_state
      states:
      - running
      - paused
      transitions:
        pause:
          method: runtime.pause
          from: running
          to: paused
          already_in_state_error: RUNTIME_ALREADY_PAUSED
          idempotency: 'If idempotency_key is present, replay with the same request body returns the original success response.
            A fresh pause while already paused returns RUNTIME_ALREADY_PAUSED.'
          emits: platform.paused
        resume:
          method: runtime.resume
          from: paused
          to: running
          already_in_state_error: RUNTIME_NOT_PAUSED
          idempotency: 'If idempotency_key is present, replay with the same request body returns the original success response.
            A fresh resume while already running returns RUNTIME_NOT_PAUSED.'
          emits: platform.resumed
      queueable_ingress:
      - surface: inbound.webhook
        description: External webhook/provider events are queueable. While paused, valid signed ingress is persisted as events
          and deduplicated normally, but dispatch is gated until resume.
      - surface: api.event_producing_methods
        description: Event-producing API/admin surfaces such as event.publish, event.replay, and deprecated run.start wrapper calls are queueable.
          While paused, they may persist canonical root/input events and lifecycle rows but must not dispatch subscriber work until
          resume.
      - surface: timer.fire
        description: Timer fire events are queueable event-producing ingress. While paused, due timers may persist their event
          identity but dispatch is gated until resume.
      non_queueable_ingress:
      - surface: mcp.tool_call
        description: Synchronous MCP/tool execution is request/response work, not an async event-producing ingress contract.
          It fails closed while paused unless a later spec adds an explicit async queue contract.
      - surface: mcp.json_rpc_call
        description: Synchronous MCP JSON-RPC calls fail closed while paused for the same reason as tool calls; do not fake
          queued semantics for a caller waiting on an immediate result.
      - surface: read_only_operator_api
        description: Read-only JSON-RPC operator methods are not ingress and remain allowed while paused unless a method publishes
          events or starts executable work.
      queued_not_dispatched: 'The events table is the durable queue for queueable ingress. A queued ingress event has a canonical
        events row and normal deduplication/idempotency metadata, but subscriber work must not execute while runtime_ingress_state.status
        is paused. Implementations may create event_deliveries in their existing pending state, or delay delivery-row creation
        until resume, but event_deliveries must not transition to in_progress and handlers/agents/system nodes must not run
        until resume.'
      resume_release: 'runtime.resume makes queued ingress eligible for normal EventBus routing/delivery exactly once through the
        canonical event/delivery/idempotency owners. It must not duplicate already persisted events or bypass normal delivery
        ownership.'
      consumers:
        v1_runtime_methods: runtime.pause and runtime.resume consume this owner and API idempotency.
        dashboard_runtime_actions: 'Historical POST /api/runtime/actions {pause,resume} mapped to this owner during migration,
          but it is retired as a production operator API surface; consumers MUST use /v1/rpc runtime.pause/runtime.resume.'
        inbound_webhook: Inbound webhook admission consumes this owner for queueable event-producing ingress.
        mcp_tool_gateway: MCP/tool ingress consumes this owner for fail-closed paused-state rejection unless a later async queue
          contract is approved.
        auth_breaker: Auth/credit breaker consumes a safety-trigger entrypoint on this owner and may emit platform.paused, but
          it does not define public API idempotency/resource-state semantics.
        reset: Runtime reset consumes a safety-trigger gate or reset-specific entrypoint and remains separate from public
          runtime.pause/runtime.resume API semantics.
    idempotency:
      one_rule: "All mutating methods accept an optional `idempotency_key` parameter.\nIf provided, the runtime stores `(method,\
        \ actor_token, idempotency_key)\n\u2192 original_response` for a TTL window of 24 hours starting after the\nfirst\
        \ completed response is stored. Replay with the same triple and\nthe same request body returns the stored response.\
        \ Replay with the\nsame triple and a DIFFERENT request body returns IDEMPOTENCY_CONFLICT.\n"
      conflict_response_shape: See components.errors.IDEMPOTENCY_CONFLICT for the canonical schema.
      without_key: 'Methods called without `idempotency_key` are treated as fresh. Natural

        resource-state semantics still apply (e.g., mailbox.approve on an

        already-decided item returns MAILBOX_ALREADY_DECIDED regardless of

        idempotency_key). Idempotency keys protect against client retries;

        resource-state errors protect against logic violations. Two separate

        layers, both useful, neither overlapping.

        '
      ttl: 24 hours after first completed response stored.
      mutating_methods:
      - bundle.register
      - event.publish
      - event.replay
      - bundle.delete
      - run.fork
      - agent.replay
      - run.start
      - run.stop
      - run.pause
      - run.continue
      - mailbox.approve
      - mailbox.reject
      - mailbox.defer
      - agent.send_directive
      - agent.restart
      - agent.replay_backlog
      - runtime.pause
      - runtime.resume
      - runtime.nuke
      - conversation.fork
      - conversation.fork_chat
      - conversation.fork_delete
      - test.setup_entities
    mailbox:
      status_storage_model: 'Terminal approve/reject decisions are stored as status = decided with decision approved/rejected.
        Defer is non-terminal: storage keeps status = pending, decision unset, and deferred_until set independently from
        expires_at. v1 read projections expose pending/deferred/decided/expired from those first-class fields; expired/cancelled
        rows project as expired. Existing pre-1.0 terminal deferred rows are migrated one-way to pending with deferred_until
        unset when no recoverable until exists.'
      decision_event_routes:
      - item_type: review_request
        terminal_event_name: mailbox.item_decided
        deferred_event_name: mailbox.item_deferred
      - item_type: approval
        terminal_event_name: mailbox.item_decided
        deferred_event_name: mailbox.item_deferred
      - item_type: operational_decision
        terminal_event_name: mailbox.item_decided
        deferred_event_name: mailbox.item_deferred
      decision_event_payload_contract:
        terminal_event_name: mailbox.item_decided
        deferred_event_name: mailbox.item_deferred
        producer: /v1/rpc mailbox.approve|mailbox.reject|mailbox.defer
        rule: >
          Mailbox decision events are platform-produced flat event payloads and
          MUST satisfy the active event schema before persistence. Approve and
          reject are terminal verdicts emitted as `mailbox.item_decided` with
          `decision = approved|rejected`; reject MUST carry schema-visible
          `reason`. Defer is non-terminal and emitted as `mailbox.item_deferred`
          with schema-visible `until`. The original public mailbox row payload
          MUST be emitted under the declared `mailbox_payload` field. The
          optional operator decision context remains under `decision_payload`.
        terminal_required_fields:
        - mailbox_id
        - mailbox_decision_id
        - decision
        - decision_payload
        - item_type
        - mailbox_payload
        - source_event_id
        - source_flow
        - source_entity_id
        - decided_by
        - decided_at
        deferred_required_fields:
        - mailbox_id
        - mailbox_decision_id
        - until
        - item_type
        - mailbox_payload
        - source_event_id
        - source_flow
        - source_entity_id
        - deferred_by
        - deferred_at
        field_semantics:
          mailbox_payload: >
            Original public mailbox row payload produced by the mailbox row
            materialization owner, exposed as a declared business payload field
            for consumers of mailbox decision/defer events.
          decision_payload: >
            Operator-supplied decision context from the `mailbox.approve`
            request. It is separate from `mailbox_payload` and MUST NOT be
            merged with the row payload.
          reason: >
            Operator-supplied rejection reason from `mailbox.reject`, emitted as
            a first-class terminal event field rather than buried inside
            `decision_payload`.
          until: >
            Operator-supplied defer-until timestamp from `mailbox.defer`, emitted
            as a first-class non-terminal event field and persisted as
            `deferred_until`; it MUST NOT overwrite or extend `expires_at`.
        forbidden_fields:
        - payload
        validation: >
          The producer MUST NOT emit the retired top-level `payload` member and
          validators MUST NOT add a special allowlist for it. Contracts that need
          the mailbox row payload must declare and consume `mailbox_payload`.
      decision_transaction_boundary: >
        `mailbox.approve`, `mailbox.reject`, and `mailbox.defer` own a
        caller-owned transactional publish boundary: the mailbox row state,
        mailbox decision/defer event persistence, event delivery/replay-scope
        evidence, and API idempotency completion commit atomically. Downstream
        subscriber/interceptor/runtime work MUST run only after that decision
        transaction commits, or be durably queued while ingress is paused.
        Route or event-publish failure MUST fail closed without row-only
        success. Post-commit downstream failures are recorded as event
        receipt/recovery diagnostics; they MUST NOT leave the mailbox decision
        transaction open, block later run/event writes, duplicate the event, or
        roll back already-committed mailbox/idempotency evidence.
    scopes:
      vocabulary: action-resource (read:<resource>, write:<resource>, control:<resource>, admin:<resource>, approve:<resource>,
        verify:<resource>)
      catalog:
      - read:health
      - read:runs
      - write:runs
      - admin:runs
      - read:entities
      - read:events
      - read:bundles
      - write:bundles
      - read:mailbox
      - approve:mailbox
      - read:agents
      - control:agents
      - read:conversations
      - write:conversations
      - read:runtime
      - control:runtime
      - admin:runtime
      assignment_rule: Each method in the method catalog declares its required scope(s) in its `scope.required` field. Methods
        that join across resources declare the union of relevant read scopes.
      v1_enforcement: Scope check is NOT enforced in v1. Every valid bearer token grants every scope. Spec declarations exist
        for Phase 2/3 forward compatibility.
    time:
      format: RFC3339 strings (e.g., "2026-05-09T18:31:41.367722Z")
      timezone: Always UTC in API responses; clients render to local.
      input_acceptance: Methods accepting time inputs accept any RFC3339 form; runtime normalizes to UTC.
    ids:
      shape: opaque strings
      uuid_compatibility: 'Where the runtime currently uses UUIDs, the API exposes them as opaque

        strings. Clients MUST NOT assume UUID shape; future ID forms (content-

        derived, externally-supplied, hierarchical) may not be UUIDs.

        '
      validation: IDs are validated by length (max 256 chars) and character set ([A-Za-z0-9_:.-]+) only; semantic validation
        is per-method.
    consistency:
      synchronous_path: Read-after-write within the same connection is strict for mutating methods.
      subscriptions: Eventually delivered. Notifications within a single subscription are ordered per stream key.
      cross_consumer: Reads from different connections may briefly observe stale state after a mutation; bounded by replication/cache
        propagation. Spec does not commit to a maximum staleness window in v1.
    bundle_fingerprint:
      algorithm: sha256
      shape: sha256:<hex>
      input: sha256 over the canonically-normalized loaded bundle contents (sorted file order, normalized whitespace, normalized
        line endings) concatenated with the canonically-normalized effective platform spec. Stable across paths/worktrees
        where content is identical.
      algorithm_migration: If a future version migrates to a different hash algorithm, the prefix changes (e.g., `blake3:<hex>`).
        v1 commits to sha256 only.
      role_in_v1: "fingerprint is legacy boot/runtime identity metadata and remains exposed in BundleIdentity for health/check compatibility. Public input surfaces use canonical bundle_hash (`bundle-v1:sha256:<hex>`) for promoted bundle scope after #1001/#1015. Legacy BundleRef/bundle_ref.fingerprint is a deprecated transition parser input and is not authoritative for create-new-work admission, routing, or mismatch decisions. No API surface accepts filesystem paths.\n"
  components:
    description: 'Reusable JSON Schema components. Methods reference these via $ref. The

      shapes here are the canonical contract; method param/result schemas

      MUST NOT redefine fields locally that have a named component.

      '
    schemas:
      FailureClass:
        type: string
        enum:
        - platform.timeout
        - platform.connector_failure
        - platform.compute_failure
        - platform.outcome_uncertain
        - platform.retry_exhausted
        - platform.budget_exhausted
        - platform.data_limit_exceeded
        - platform.authentication_required
        - platform.authorization_denied
        - platform.target_unreachable
        - platform.target_ambiguous
        - platform.fan_out_bound_exceeded
        - platform.chain_depth_exceeded
        - platform.early_arrival
        - platform.stale_arrival
        - platform.unexpected_arrival
        - platform.conflicting_duplicate
        - platform.reply_already_terminal
        - platform.schema_invalid
        - platform.dependency_unavailable
        - platform.internal_failure
      FailureDetail:
        type: object
        additionalProperties: false
        required:
        - code
        properties:
          code:
            type: string
            pattern: ^[a-z][a-z0-9_]*$
          attributes:
            type: object
            additionalProperties: true
      FailureEnvelope:
        type: object
        additionalProperties: false
        required:
        - schema_version
        - class
        - detail
        - retryable
        - deterministic
        - message
        - remediation
        properties:
          schema_version:
            type: string
            const: platform.failure/v1
          class:
            $ref: '#/components/schemas/FailureClass'
          detail:
            $ref: '#/components/schemas/FailureDetail'
          retryable:
            type: boolean
          deterministic:
            type: boolean
          message:
            type: string
          remediation:
            type: string
          component:
            type: string
          operation:
            type: string
      Timestamp:
        type: string
        format: date-time
        description: 'RFC3339 timestamp, UTC. Example: "2026-05-09T18:31:41.367722Z".'
      OpaqueId:
        type: string
        minLength: 1
        maxLength: 256
        pattern: ^[A-Za-z0-9_:.-]+$
        description: Opaque identifier. Currently UUID-shaped for runtime-assigned IDs; clients MUST NOT assume UUID shape.
      Cursor:
        type: string
        description: Opaque pagination cursor. Encoded by the runtime; clients MUST treat as opaque and pass back unchanged.
      Sha256Fingerprint:
        type: string
        pattern: ^sha256:[a-f0-9]{64}$
        description: Content-hash fingerprint of a bundle. Stable across paths/worktrees where content is identical.
      BundleHash:
        type: string
        pattern: ^bundle-v1:sha256:[a-f0-9]{64}$
        description: Canonical v1 bundle identity. Public input surfaces use this shape for bundle_hash; legacy sha256:<hex> fingerprints are not accepted under the bundle_hash name.
      ScopeName:
        description: 'Action-resource scopes used for v1 authorization. v1 enforcement

          treats every valid token as granting every scope; the enum exists

          for forward-compat with Phase 2/3 per-token scope restrictions.

          New scopes added by deferred namespaces (e.g., verify:contracts

          when verify.* lands, debug:* when debug.* lands) are additive.

          '
        type: string
        enum:
        - read:health
        - read:runs
        - write:runs
        - admin:runs
        - read:entities
        - read:events
        - read:bundles
        - write:bundles
        - read:mailbox
        - approve:mailbox
        - read:agents
        - control:agents
        - read:conversations
        - write:conversations
        - read:runtime
        - control:runtime
        - admin:runtime
      BundleRef:
        description: "Deprecated legacy bundle reference accepted during the #1001 dual-accept transition. New callers use\
          \ bundle_hash with BundleHash shape once canonical source facts are available. BundleRef carries the legacy sha256\
          \ fingerprint only and cannot be combined with bundle_hash; doing so fails closed with UNSUPPORTED_BUNDLE_HASH\
          \ before runtime/store mutation.\n"
        type: object
        additionalProperties: false
        required:
        - fingerprint
        properties:
          fingerprint:
            $ref: '#/components/schemas/Sha256Fingerprint'
      BundleIdentity:
        description: "Server bundle identity returned by health.check. bundle_hash is the active canonical v1 bundle identity\
          \ when the runtime has a promoted source fact and is the value clients use for create-new-work bundle scope. fingerprint\
          \ is legacy boot/runtime identity metadata retained for health/check compatibility; workflow_name and workflow_version\
          \ are human-friendly labels. Server-local filesystem paths are intentionally NOT exposed \u2014 they leak deployment\
          \ internals and aren't meaningful to external Phase-2 consumers.\n"
        type: object
        additionalProperties: false
        required:
        - workflow_name
        - workflow_version
        - fingerprint
        properties:
          bundle_hash:
            $ref: '#/components/schemas/BundleHash'
          workflow_name:
            type: string
          workflow_version:
            type: string
          fingerprint:
            $ref: '#/components/schemas/Sha256Fingerprint'
      BundleSummary:
        type: object
        additionalProperties: false
        required:
        - bundle_hash
        - agent_count
        - has_data
        - data_size_bytes
        - metadata
        - ingested_at
        properties:
          bundle_hash:
            $ref: '#/components/schemas/BundleHash'
          agent_count:
            type: integer
            minimum: 0
            description: Number of definition-only agents projected from the persisted bundle row.
          has_data:
            type: boolean
            description: True when the persisted bundle row carries an auxiliary data_blob.
          data_size_bytes:
            type: integer
            minimum: 0
            description: Size of data_blob in bytes, or 0 when has_data is false.
          metadata:
            type: object
            additionalProperties: true
          ingested_at:
            $ref: '#/components/schemas/Timestamp'
      BundleListResult:
        type: object
        additionalProperties: false
        required:
        - bundles
        properties:
          bundles:
            type: array
            items:
              $ref: '#/components/schemas/BundleSummary'
          next_cursor:
            $ref: '#/components/schemas/Cursor'
      BundleDetail:
        type: object
        additionalProperties: false
        required:
        - bundle_hash
        - content_yaml
        - parsed_json
        - metadata
        - agent_count
        - has_data
        - data_size_bytes
        - ingested_at
        properties:
          bundle_hash:
            $ref: '#/components/schemas/BundleHash'
          content_yaml:
            type: string
            description: Persisted bundle config bytes for this catalog row.
          parsed_json:
            type: object
            additionalProperties: true
            description: Persisted parsed projection for the bundle row.
          metadata:
            type: object
            additionalProperties: true
          agent_count:
            type: integer
            minimum: 0
          has_data:
            type: boolean
          data_size_bytes:
            type: integer
            minimum: 0
          ingested_at:
            $ref: '#/components/schemas/Timestamp'
      BundleAgentDefinition:
        type: object
        additionalProperties: false
        required:
        - agent_id
        properties:
          agent_id:
            $ref: '#/components/schemas/OpaqueId'
          flow_instance:
            type: string
            description: Persisted flow instance/catalog path when the definition is nested under a flow.
          role:
            type: string
          type:
            type: string
          model:
            type: string
          llm_backend:
            type: string
          mode:
            type: string
          session_scope:
            type: string
          prompt_path:
            type: string
          subscriptions:
            type: array
            items:
              type: string
          tools:
            type: array
            items:
              type: string
      BundleAgentsResult:
        type: object
        additionalProperties: false
        required:
        - agents
        properties:
          agents:
            type: array
            items:
              $ref: '#/components/schemas/BundleAgentDefinition'
      BundleRegistrationEnvelopeV1:
        type: object
        additionalProperties: false
        required:
        - api_version
        - files
        properties:
          api_version:
            type: string
            const: swarm.bundle.register.v1
            description: Envelope version for non-destructive bundle.register materialization.
          files:
            type: array
            minItems: 1
            items:
              $ref: '#/components/schemas/BundleRegistrationFile'
            description: Text contract files to materialize under the temporary bundle root. package.yaml is required.
      BundleRegistrationFile:
        type: object
        additionalProperties: false
        required:
        - path
        - text
        properties:
          path:
            type: string
            minLength: 1
            description: Slash-separated path relative to the bundle root. Empty, dot, dot-dot, absolute, backslash, NUL, non-NFC, duplicate, and ASCII case-colliding paths are invalid.
          text:
            type: string
            description: UTF-8 text content for YAML, prompt, policy, and other non-data bundle files.
      BundleRegisterDataBlobV1:
        type: object
        additionalProperties: false
        required:
        - api_version
        - entries
        properties:
          api_version:
            type: string
            const: swarm.bundle.data.v1
          entries:
            type: array
            items:
              type: object
              additionalProperties: false
              required:
              - path
              - data_base64
              properties:
                path:
                  type: string
                  minLength: 1
                  description: Strictly sorted slash-separated path under a discovered flow data directory, such as flows/<flow>/data/..., packages/<package>/flows/<flow>/data/..., or a nested flow package path, with the same normalization and collision rules as BundleRegistrationFile.path.
                data_base64:
                  type: string
                  contentEncoding: base64
            description: Ordered data entries sorted strictly by normalized path.
        description: Optional structured raw data files for bundle.register; the server persists canonical projection bytes.
      BundleRegistrationResult:
        type: object
        additionalProperties: false
        required:
        - bundle_hash
        - registered
        - has_data
        - data_size_bytes
        properties:
          bundle_hash:
            $ref: '#/components/schemas/BundleHash'
          registered:
            type: boolean
            description: True only when this call inserted a new bundle catalog row; false for duplicate same-content registration.
          has_data:
            type: boolean
            description: True when the persisted bundle row carries an auxiliary data_blob.
          data_size_bytes:
            type: integer
            minimum: 0
            description: Size of persisted data_blob bytes, or 0 when has_data is false.
      BundleDeleteResult:
        type: object
        additionalProperties: false
        required:
        - ok
        - status
        - operation_name
        - bundle_hash
        - force
        - deleted
        - dry_run
        - active_runs_stopped
        - deliveries_cancelled
        - containers_stopped
        - partial_failure
        - plan
        - cleanup
        - containers
        - final_mutation
        properties:
          ok:
            type: boolean
            description: True for dry-run or fully completed apply; false when the operation completed with explicit partial
              failures.
          status:
            type: string
            enum:
            - dry_run
            - completed
            - partial_failure
          operation_name:
            type: string
            const: bundle.delete
          bundle_hash:
            $ref: '#/components/schemas/BundleHash'
          force:
            type: boolean
          deleted:
            type: boolean
          dry_run:
            type: boolean
          active_runs_stopped:
            type: integer
            minimum: 0
          deliveries_cancelled:
            type: integer
            minimum: 0
          containers_stopped:
            type: integer
            minimum: 0
          partial_failure:
            type: boolean
          plan:
            type: object
            additionalProperties: true
            description: Exact result from the bundle-delete plan owner.
          cleanup:
            type: object
            additionalProperties: true
            description: Exact result from the preservation cleanup owner.
          containers:
            type: object
            additionalProperties: true
            description: Exact result from the managed container identity filter/stop owner.
          final_mutation:
            type: object
            additionalProperties: true
            description: Exact result from the #1009 source-first bundle delete transaction owner.
          errors:
            type: array
            items:
              type: object
              additionalProperties: false
              required:
              - scope
              - message
              properties:
                scope:
                  type: string
                message:
                  type: string
      HealthCheckResult:
        type: object
        additionalProperties: false
        required:
        - alive
        - ready
        - db_ok
        - runtime_ok
        - bundle
        properties:
          alive:
            type: boolean
          ready:
            type: boolean
          db_ok:
            type: boolean
          runtime_ok:
            type: boolean
          bundle:
            $ref: '#/components/schemas/BundleIdentity'
      RuntimeIdentityResult:
        description: >
          Nonsensitive identity for one served runtime process instance. This is the canonical descriptor-trust identity:
          clients compare runtime_instance_id against local context descriptors after authenticating to the operator API.
          It is not a bundle fingerprint, PID, port, URL, or unauthenticated process probe.
        type: object
        additionalProperties: false
        required:
        - runtime_instance_id
        - started_at
        - api_version
        - supported_transports
        properties:
          runtime_instance_id:
            $ref: '#/components/schemas/OpaqueId'
          started_at:
            $ref: '#/components/schemas/Timestamp'
          api_version:
            type: string
            const: v1
          supported_transports:
            type: array
            items:
              type: string
              enum:
              - tcp
              - unix
      RunStatus:
        type: string
        enum:
        - running
        - paused
        - completed
        - failed
        - cancelled
        - forked
      RunHeader:
        type: object
        additionalProperties: false
        required:
        - run_id
        - status
        - trigger_event_type
        - trigger_event_id
        - entity_count
        - event_count
        - started_at
        properties:
          run_id:
            $ref: '#/components/schemas/OpaqueId'
          status:
            $ref: '#/components/schemas/RunStatus'
          trigger_event_type:
            type: string
          trigger_event_id:
            $ref: '#/components/schemas/OpaqueId'
          entity_count:
            type: integer
            minimum: 0
          event_count:
            type: integer
            minimum: 0
          started_at:
            $ref: '#/components/schemas/Timestamp'
          ended_at:
            $ref: '#/components/schemas/Timestamp'
            description: Omitted while run is active; present once status is terminal (completed/failed/cancelled/forked).
          forked_from_run_id:
            $ref: '#/components/schemas/OpaqueId'
            description: Present only if status indicates a fork.
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
            description: Required exactly when status is failed; forbidden for every other status.
          control_reason:
            type: string
            description: Separate lifecycle-control reason from run_control_state; for cancelled runs this is the terminal reason and never a failure class.
      OperationalState:
        type: string
        description: 'Operational state of a run. Source of truth:

          internal/store/run_operational_status_read_surface.go

          ProjectRunOperationalStatus. Values are RunTableStatus values

          lowercased plus "stalled" as the projection''s special

          "running-but-not-progressing" state.

          '
        enum:
        - running
        - stalled
        - paused
        - completed
        - failed
        - cancelled
        - forked
      BlockingLayer:
        type: string
        description: "Layer-of-the-system identifier when operational_state is \"stalled\".\nEmpty string when state is running\
          \ or terminal. Source of truth:\nProjectRunOperationalStatus. Current owner emits:\n  \"\" (empty) \u2014 state\
          \ is running or terminal\n  \"scoring_terminal_outcome\" \u2014 scoring entities have not reached\n    a terminal\
          \ scoring outcome (shortlisted/marginal/rejected)\n  \"delivery_lifecycle\" \u2014 no active deliveries but events\
          \ exist\nAdditional values may be added as the operator-state owner gains\nmore diagnostic semantics. Type stays\
          \ string (not enum) for\nforward compatibility \u2014 additive owner extensions must not\nrequire a /v2/ bump.\n"
      DiagnosisEvidence:
        description: "Generic evidence pointer shape for future diagnosis extensions. Current run.diagnose failure evidence\
          \ is owner-backed by RunDebugFailureDelivery, which carries concrete event_deliveries/dead_letters facts instead\
          \ of opaque pointers.\n"
        type: object
        additionalProperties: false
        required:
        - kind
        - ref
        - summary
        properties:
          kind:
            type: string
            description: e.g., event, entity, turn, mailbox_item, dead_letter.
          ref:
            $ref: '#/components/schemas/OpaqueId'
          summary:
            type: string
            description: Human-readable one-line description of why this evidence supports the diagnosis.
      RunDebugFailureDelivery:
        description: >-
          Concrete failed or terminal delivery evidence for run.diagnose. Source
          of truth is event_deliveries joined to the owning event; dead_letters is
          event-scoped terminal evidence when present. Consumers MUST NOT infer
          this shape from aggregate delivery counts.
        type: object
        additionalProperties: false
        required:
        - event_id
        - event_name
        - delivery_id
        - subscriber_type
        - subscriber_id
        - status
        - retry_count
        - retry_eligible
        - terminal
        properties:
          event_id:
            $ref: '#/components/schemas/OpaqueId'
          event_name:
            type: string
          entity_id:
            $ref: '#/components/schemas/OpaqueId'
          delivery_id:
            $ref: '#/components/schemas/OpaqueId'
          subscriber_type:
            $ref: '#/components/schemas/SubscriberType'
          subscriber_id:
            type: string
          session_id:
            type: string
          status:
            $ref: '#/components/schemas/DeliveryStatus'
          reason_code:
            type: string
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
          retry_count:
            type: integer
            minimum: 0
          retry_eligible:
            type: boolean
            description: True exactly when status is failed, the retry-visible failure state.
          terminal:
            type: boolean
            description: True exactly when status is delivered or dead_letter.
          created_at:
            $ref: '#/components/schemas/Timestamp'
          started_at:
            $ref: '#/components/schemas/Timestamp'
          finished_at:
            $ref: '#/components/schemas/Timestamp'
          dead_letters:
            type: array
            description: Event-scoped terminal dead-letter records linked to this failed or dead-letter delivery when present.
            items:
              $ref: '#/components/schemas/DeadLetterRecord'
      RunTestQuiescence:
        description: "Canonical public test-quiescence projection for deterministic scenario assertions. Source of truth:\
          \ persisted run completion inputs consumed by run_model.lifecycle.completion, exposed through run.diagnose so\
          \ test runners do not infer readiness from partial trace rows or sleeps. `ready` is true exactly when all count\
          \ fields are zero.\n"
        type: object
        additionalProperties: false
        required:
        - ready
        - active_deliveries
        - unsettled_pipeline_events
        - due_timers
        - active_session_leases
        properties:
          ready:
            type: boolean
            description: True exactly when active_deliveries, unsettled_pipeline_events, due_timers, and active_session_leases are all zero.
          active_deliveries:
            type: integer
            minimum: 0
            description: Active delivery rows for the run, excluding committed replay-scope marker rows.
          unsettled_pipeline_events:
            type: integer
            minimum: 0
            description: Same-run non-runtime-log events whose platform/pipeline receipt is absent or not successful.
          due_timers:
            type: integer
            minimum: 0
            description: Active timer rows for the run whose fire_at is currently due.
          active_session_leases:
            type: integer
            minimum: 0
            description: Active agent/session leases for the run whose lease has not expired.
      RunDiagnosis:
        description: "Run header plus the canonical operator-state projection and concrete failed-delivery evidence. Source\
          \ of truth: ProjectRunOperationalStatus for operational_state/blocking fields, RunDebugReport.FailedDeliveries\
          \ for event_deliveries/dead_letters failure evidence, and RunDebugReport.TestQuiescence for deterministic test\
          \ assertion-barrier readiness.\n"
        type: object
        additionalProperties: false
        required:
        - run
        - operational_state
        - blocking_layer
        - blocking_reason
        - heuristics
        - failed_deliveries
        - test_quiescence
        properties:
          run:
            $ref: '#/components/schemas/RunHeader'
          operational_state:
            $ref: '#/components/schemas/OperationalState'
          blocking_layer:
            $ref: '#/components/schemas/BlockingLayer'
          blocking_reason:
            type: string
            description: "Free-form reason string when operational_state is \"stalled\".\nEmpty when state is running or terminal.\
              \ Current owner emits:\n  \"\" (empty)\n  \"terminal_scoring_outcome_missing\"\n  \"no_active_deliveries\"\n\
              Additional values may be added additively.\n"
          heuristics:
            type: array
            items:
              type: string
            description: 'Free-form diagnostic notes from the projection. Current owner

              emits one entry per detected condition, e.g. "dead letters

              exist for this run".

              '
          failed_deliveries:
            type: array
            description: Failed or dead-letter delivery rows with persisted reason/error/retry/dead-letter evidence for this run.
            items:
              $ref: '#/components/schemas/RunDebugFailureDelivery'
          test_quiescence:
            $ref: '#/components/schemas/RunTestQuiescence'
      EntitySummary:
        type: object
        additionalProperties: false
        required:
        - entity_id
        - run_id
        - flow_instance
        - entity_type
        - current_state
        - revision
        - created_at
        - updated_at
        properties:
          entity_id:
            $ref: '#/components/schemas/OpaqueId'
          run_id:
            $ref: '#/components/schemas/OpaqueId'
          flow_instance:
            type: string
          entity_type:
            type: string
          current_state:
            type: string
          slug:
            type: string
          name:
            type: string
          revision:
            type: integer
            minimum: 0
          created_at:
            $ref: '#/components/schemas/Timestamp'
          updated_at:
            $ref: '#/components/schemas/Timestamp'
      EntityFull:
        description: 'Entity-native shape: typed fields, gates, accumulator state. This

          is the destination shape entity.get returns. v1 implementation

          may need to translate from the existing instance-shaped readers

          in internal/dashboard/server/server.go (which return flat

          WorkflowInstance structs without the typed-fields/gates/

          accumulated decomposition). The spec commits to the entity-native

          shape; implementations are responsible for providing it. A real

          entity-read owner may need to land before entity.* methods can

          honor this shape, which is why the entity.* methods are

          should_have rather than must_have for v1.

          '
        type: object
        additionalProperties: false
        required:
        - entity
        - fields
        - gates
        - accumulated
        properties:
          entity:
            $ref: '#/components/schemas/EntitySummary'
          fields:
            type: object
            description: Typed entity fields per the entity contract. Shape depends on entity_type.
            additionalProperties: true
          gates:
            type: object
            description: "Gate state. Map of gate_name \u2192 boolean."
            additionalProperties:
              type: boolean
          accumulated:
            type: object
            description: "Accumulator state. Map of accumulator key \u2192 JSON value; values may be scalars, objects, or\
              \ arrays depending on accumulate, data_accumulation, compute, or projection writers."
            additionalProperties: true
          loops:
            type: array
            description: Typed bounded-loop runtime projection. The reserved mutable control bucket is never returned.
            items:
              $ref: '#/components/schemas/BoundedLoopActivation'
      BoundedLoopActivation:
        type: object
        additionalProperties: false
        required:
        - id
        - revision_id
        - attempt
        - max_attempts
        - current_stage
        - status
        properties:
          id:
            type: string
          revision_id:
            type: string
          attempt:
            type: integer
            minimum: 1
          max_attempts:
            type: integer
            minimum: 1
          current_stage:
            type: string
          status:
            type: string
            enum: [open, closed]
          close_reason:
            type: string
            enum: [completed, escaped]
      EntityAggregateResult:
        type: object
        additionalProperties: false
        required:
        - counts
        properties:
          counts:
            type: object
            description: "Map of group_value \u2192 integer count."
            additionalProperties:
              type: integer
              minimum: 0
      DeliveryStatus:
        type: string
        description: >-
          Canonical delivery lifecycle persisted in event_deliveries.status. pending is queued/not started; in_progress
          is claimed or executing; delivered is successful settlement; failed is retry-visible failure; dead_letter is
          terminal failure.
        enum:
        - pending
        - in_progress
        - delivered
        - failed
        - dead_letter
      SubscriberType:
        type: string
        enum:
        - node
        - agent
      EventDelivery:
        type: object
        additionalProperties: false
        required:
        - delivery_id
        - subscriber_type
        - subscriber_id
        - status
        - retry_count
        - retry_eligible
        - terminal
        properties:
          delivery_id:
            $ref: '#/components/schemas/OpaqueId'
          subscriber_type:
            $ref: '#/components/schemas/SubscriberType'
          subscriber_id:
            type: string
          session_id:
            type: string
          status:
            $ref: '#/components/schemas/DeliveryStatus'
          reason_code:
            type: string
          failure:
            $ref: '#/components/schemas/FailureEnvelope'
          retry_count:
            type: integer
            minimum: 0
          retry_eligible:
            type: boolean
          terminal:
            type: boolean
          created_at:
            $ref: '#/components/schemas/Timestamp'
          started_at:
            $ref: '#/components/schemas/Timestamp'
          finished_at:
            $ref: '#/components/schemas/Timestamp'
          dead_letters:
            type: array
            items:
              $ref: '#/components/schemas/DeadLetterRecord'
      EventPublishTargetRoute:
        type: object
