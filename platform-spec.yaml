  routing_rules:
    description: Most platform events enter the normal event loop. Products can subscribe agents to them. System nodes can handle
      them. They follow standard routing, delivery, and persistence rules.
    routable_events: 'Platform events that enter the normal event loop: platform.dead_letter, platform.agent_failed,
      platform.agent_panic, platform.event_quarantined, platform.dead_letter_escalation, platform.run_stalled, platform.reset, platform.auth_required,
      platform.paused, platform.resumed, platform.boot, platform.recovery_failed, platform.agent_started, platform.budget_threshold_crossed,
      mailbox.item_decided, mailbox.item_deferred, human_task.approved, human_task.rejected, human_task.deferred,
      human_task.expired. Products can subscribe to these.'
    internal_routable_events: 'platform.activity_requested enters the normal event loop as a platform-internal durable activity
      request and is consumed by workflow-runtime; products MUST NOT author, emit, or claim ownership of it.'
    diagnostic_events: 'Platform events that bypass the event loop and are persisted directly to the events table:
      platform.runtime_log, platform.inbound_recorded, platform.agent_directive. These are high-frequency diagnostic records
      or operator-control root records. Routing them through the event loop would cause recursive emission loops or duplicate
      control execution. They are persisted for queryability and causality but not routed to subscribers.'
  go_source_rule:
    description: Every hardcoded event name in Go runtime source must appear in this catalog. CI should enforce this — grep
      Go source for event name literals, verify each exists in platform_events.catalog or is a product event loaded from contracts.
observation_model:
  description: Defines exactly what is observable from a test, audit, or flight recorder perspective. This is the external
    contract of the engine — what an observer sees after a handler runs.
  emitted_events:
    description: The list of events produced by system node handler execution.
    includes:
    - Events from handler top-level emit on single-emit handlers
    - Events from handler rules emit
    - Events from handler on_success.emit
    - Events from handler on_complete emit
    - Events from handler accumulate.on_timeout emit
    - Events from handler fan_out emit
    - Events from action-originated emits produced by runtime action instructions
    - Events from handler action side effects (e.g., auto_emit_on_create)
    excludes:
    - Agent fixture emissions (agents are independent, their emissions route through the event loop separately)
    - Dead-lettered events (intercepted before delivery, recorded in dead_letters table instead)
    - Child flow auto_emit events (visible within the child, not in parent emission log)
    naming: Events are recorded with the producer/source route as the event namespace authority. When a template child flow
      instance emits order.completed, observers see the concrete producer instance path, for example
      child-flow-id/child-instance-id/order.completed. When a static service flow emits a local output event targeted at a
      template child, observers see the static producer flow path, for example service-flow/service.completed. Target routes
      remain event.target or event.target_set delivery metadata and do not rewrite the emitted event name. Within the same
      root flow, events use local names (no prefix).
    payload_rules:
      description: Rules for constructing emitted event payloads on supported system-node runtime emit surfaces.
      declarative_system_node_emit_surface:
        construction_order:
        - 1. Lower emitted-payload `emit.from` and bare namespace field-value sugar to the canonical explicit emit.fields map
        - 2. Start from an empty business payload
        - 3. Evaluate canonical emit.fields for the active emit site, if present
        - 4. Attach runtime-owned envelope context to the emitted event carrier; envelope fields are not copied into payload
        ownership_rule: Runtime-owned envelope fields belong to the event carrier, not to emit.fields or payload.*
        note: This surface has no implicit entity passthrough or trigger-payload passthrough. `emit.from` is compile-time
          lowering to explicit fields, not a runtime copy source. If an emitted event needs a field beyond the runtime-owned
          envelope context, the producer must declare it explicitly in canonical emit.fields at the active emit site. Consumers
          read envelope fields through event.*.
        runtime_validation:
          description: Runtime validates the emitted payload fail-closed on this surface.
          validation_view: Validate the producer-authored payload carrier against the target event schema after canonical
            Wave 1 type-aware schema lowering. Runtime-owned envelope fields are not synthesized into payload for validation.
          rejection_rule: If any producer-authored field is absent from the target event schema, if any declared field violates
            the schema, or if emit.fields authors an envelope-owned key, handler execution fails. Runtime does not silently trim
            producer-authored business payload keys.
      action_originated_emit_surface:
        construction_order:
        - 1. Start from the triggering event payload business carrier
        - 2. Attach runtime-owned envelope context to the emitted event carrier; envelope fields are not copied into payload
        collision_priority: triggering event payload business fields are preserved unless a future action runtime revision introduces
          an explicit payload-construction carrier
        note: This surface currently inherits its business payload from the triggering event payload because the action runtime
          instruction model has no separate emit.fields carrier. Runtime must still fail closed on the resulting payload. Consumers
          read envelope fields through event.* rather than payload.*.
        runtime_validation:
          description: Runtime validates the emitted payload fail-closed on this surface before publish.
          validation_view: Validate the emitted payload carrier that will actually be published after canonical Wave 1 type-aware
            schema lowering. Runtime-owned envelope fields are not synthesized into payload for validation.
          rejection_rule: If any inherited or producer-authored business field is undeclared or violates the schema, handler execution
            fails. Runtime does not silently trim inherited trigger-payload keys and does not clear the failure by projecting
            envelope-owned fields back into payload.
      auto_emit_on_create_surface:
        construction_order:
        - 1. Start from the resolved create_flow_instance config entries as the authored/config business payload.
        - '2. Keep activation lifecycle context, including instance_id, template_id, flow_path, and parent_entity_id, on runtime
          activation metadata and event envelope context; do not synthesize it into payload.'
        - 3. Attach runtime-owned envelope context to the emitted event carrier; envelope fields are not copied into payload.
        collision_priority: create_flow_instance config owns the business payload. Activation lifecycle context is separate
          from payload, so same-named config fields such as template_id remain business fields when the target schema declares
          them.
        note: This surface is authored only as `auto_emit_on_create.event`, so runtime owns the payload construction. It still
          must satisfy the active event schema fail-closed. Hidden activation lifecycle context does not silently widen the
          event contract and is not published as payload merely because the runtime needed it to create the instance; envelope
          fields remain accessible through event.*.
        runtime_validation:
          description: Runtime validates the constructed auto-emit payload fail-closed before either immediate publish or queued
            post-commit publish.
          validation_view: Validate the constructed payload carrier against the target event schema after canonical Wave 1 type-aware
            schema lowering. Runtime-owned envelope fields are not synthesized into payload for validation.
          rejection_rule: If any config-authored business field is undeclared or violates the schema, flow activation fails.
            Hidden activation lifecycle context fields do not fail validation merely because the target schema omits same-named
            payload fields. If an event schema declares a lifecycle-shaped field name such as template_id as business payload,
            the config payload must supply it explicitly. Runtime does not downgrade auto_emit_on_create schema violations into
            warning-only success on the queued post-commit branch.
  entity_state:
    description: The entity document after handler execution commits.
    observable_fields:
      current_state: The state after advances_to (or unchanged if no advances_to)
      gates: Map of gate names to boolean values, after sets_gate and clear_gates
      fields: JSONB of entity fields, after data_accumulation writes
      accumulator: JSONB of accumulated items, after accumulate step
      revision: Incremented on every handler commit
  handler_outcome:
    description: The result of a single handler execution.
    values:
      success: Handler ran to completion. All side effects committed.
      reject: 'Guard failed with on_fail: reject. No side effects. Entity unchanged.'
      discard: 'Guard failed with on_fail: discard. No side effects. No record.'
      kill: 'Guard failed with on_fail: kill. Entity advanced to terminal state.'
      escalate: 'Guard failed with on_fail: escalate:{event} or on_fail: {escalate: {event, fields}}. Escalation event
        emitted instead. Scalar shorthand emits no explicit business payload. Object form fields use the same explicit
        expression-value forms as declarative emit.fields, but they are evaluated at guard-failure time before later handler
        transforms/data writes. No implicit trigger/entity passthrough occurs, runtime-owned envelope remains on the event
        carrier, envelope-owned fields cannot be authored into business payload, and fail-closed contract validation applies.'
      dead_letter: Handler failed after retry exhaustion OR chain depth exceeded. Event moved to dead_letters.
      terminal_reject: Event targeted an entity in terminal state. Rejected before handler execution.
      waiting: Accumulation incomplete. Handler recorded the arrival but completion condition not yet met. No further steps
        executed. Entity unchanged except for accumulator tracking update.
      fanned_out: Fan-out dispatched. Handler emitted per-item events and is waiting for accumulation of results. Intermediate
        state — final outcome determined when accumulation completes.
  agent_vs_node_observability: System node handler emissions are recorded in the entity emission chain and appear in emitted_events.
    Agent emissions are NOT part of the entity emission chain — they are independent events that enter the event loop separately.
    An agent emitting ticket.classified creates a new event in the events table that is then delivered to subscribers. The
    agent emission does not appear in the triggering handler's emitted_events list.
runtime_storage:
  description: Runtime-owned writable host storage for service state. These paths are not part of the agent workspace model,
    are not mounted into agent sessions, and must never be exposed to agents as raw host paths. Agents and product contracts
    consume runtime-owned artifacts only through typed platform surfaces such as `swarm-artifact://...` URLs and immutable refs.
  artifact_root:
    description: Root directory for local-git repositories materialized by `artifact_repo_commit`.
    default: /var/lib/swarm/artifacts
    env_override: SWARM_ARTIFACT_ROOT
    resolution_order:
    - Explicit runtime coordinator option, when supplied by an embedding runtime.
    - SWARM_ARTIFACT_ROOT environment variable, when non-empty.
    - Platform default `/var/lib/swarm/artifacts`.
    requirements:
    - The resolved path MUST be an absolute runtime-private host path.
    - The resolved path MUST be writable by the runtime process when `artifact_repo_commit` executes.
    - When a loaded bundle declares `artifact_repo_commit`, `swarm serve` and local foreground `swarm run start` MUST validate
      that the resolved artifact root and its local-git storage base at `<artifact_root>/repos` are writable before runtime
      readiness. Bundles that do not declare `artifact_repo_commit` MUST NOT fail solely because the default artifact root is
      currently unwritable.
    - The resolved path MUST persist across runtime restarts.
    - The resolved path MUST NOT be `/workspace`, `/data`, `/opt/swarm/contracts`, or any descendant of those agent-visible
      mounts.
    - If the resolved path or its existing parent prefix resolves through symlinks under an agent-visible mount, startup/runtime
      validation MUST fail closed before git writes.
    - Product contracts and agents MUST NOT rely on the raw host path. The stable product surface remains the opaque
      `swarm-artifact://repos/<repo_id>` URL plus immutable commit ref.
environment_source_authority:
  repo_wide_swarm_env_accepted_set:
    promoted_by: '#1731'
    parent_tracker: '#1600'
    implementation_status: implemented_first_slice
    canonical_owner: platform-spec.yaml#environment_source_authority.repo_wide_swarm_env_accepted_set
    scope: >
      Repo-wide acceptance authority for process-visible `SWARM_*` environment variables. This owner defines the closed
      category enum, the static accepted-set catalog, typed delegation admission, doctor reporting, generated-boundary
      closure, and unknown/stale env fail-closed behavior for covered CLI commands. It does not complete the #1600 parent
      migration: seeded legacy rows remain live only as migration-bearing TODO entries and MUST shrink in later children.
    source_authority_rule: >
      Environment variables have no ambient source authority. A `SWARM_*` variable is accepted only when it is `SWARM_CONFIG`,
      an exact typed delegation declared by schema-visible config, a currently seeded legacy row with a migration pointer, a
      test-quarantined row under a test harness, or a generated-boundary row injected by Swarm into a child process. Unknown,
      known-retired, generated-boundary-in-parent, and production test-quarantine usages MUST fail closed before side effects
      on covered commands. The guard's source-authority boundary is non-empty after trimming; empty `SWARM_*=` values have
      no source authority, and any remaining direct legacy readers MUST use the same non-empty boundary until their seeded
      row is migrated. `swarm doctor` MUST render the same findings instead of being blocked by them.
    command_guard_scope:
      guarded: >
        All side-effect-capable and runtime/target-consuming CLI commands after root flag placement validation and before
        command side effects.
      skipped: >
        Pure help/completion surfaces, including subcommand `-h`/`--help` forms that are not consumed as flag values or
        written after `--`, and `swarm version` without `--server` do not consume runtime env semantics and skip the guard.
        Server-targeting version forms, including `--server=true`, are target-consuming and MUST be guarded. `swarm doctor`
        skips the blocking guard but MUST include an env finding section and exit nonzero when blockers exist, including when
        legacy runtime-config env rejectors would otherwise fail before the diagnostic report renders.
    typed_delegation:
      rule: >
        Typed delegation is schema-visible and exact. A config field may name one concrete env variable only when that field's
        schema explicitly supports env delegation. The final config source classes are owned by
        configuration_source_authority.unified_swarm_config; executable-adjacent `config.yaml` is superseded ambient
        file authority and MUST NOT be treated as a final typed-delegation source. Arbitrary string interpolation such
        as `${VAR}` is not accepted.
      first_slice_fields:
      - database.password_env
    generated_boundary:
      rule: >
        Generated-boundary envs are child-process injection names, not user/operator source authority. Seeing one of these
