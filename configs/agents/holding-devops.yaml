id: holding-devops
role: holding-devops
mode: holding
model_tier: haiku
subscriptions:
  - devops.deploy_requested
  - devops.health_check_failed
  - devops.rollback_requested
  - ops.agent_failed
  - spend.approved
  - spend.rejected
  - timer.infra_health_check
tools:
  - agent_message
  - mailbox_send
  - nginx_reload
  - systemd_control
  - certbot_execute
  - dns_configure
constraints:
  max_turns_per_task: 20
  conversation_mode: task
