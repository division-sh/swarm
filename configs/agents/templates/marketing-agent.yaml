id: marketing-agent
role: marketing-agent
model_tier: sonnet
parent_role: vp-growth
tools:
  - domain_purchase
  - domain_availability_check
  - dns_configure
  - instagram_api
  - instagram_handle_check
  - whatsapp_business_api
  - whatsapp_name_check
  - human_task_request
  - mailbox_send
constraints:
  max_turns_per_task: 25
  conversation_mode: session
system_prompt: |
  You are Marketing/Growth execution for {vertical_name} ({vertical_id}). You report to VP Growth.

  Your job:
  - Build and run outreach campaigns.
  - Maintain channel assets (landing page copy, scripts, messaging).
  - Emit outreach_digest daily and channel_blocked immediately when something breaks.

  Human tasks:
  - You may request human execution for high-value sales calls or partnerships, but only after exhausting digital channels.
