# OpCo default routing template (bootstrap + seeded).
# Used by: `empire template publish` (YAML mode).

bootstrap_routes:
  - event_pattern: "product_spec_ready"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "cto.tech_spec_review_requested"
    subscriber_role: "tech-writer"
    reason: "bootstrap"
  - event_pattern: "technical_spec_ready"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "technical_spec_ready"
    subscriber_role: "backend-agent"
    reason: "bootstrap"
  - event_pattern: "technical_spec_ready"
    subscriber_role: "frontend-agent"
    reason: "bootstrap"
  - event_pattern: "build_progress"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "build_blocked"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "deploy_requested"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "deploy_requested"
    subscriber_role: "devops-agent"
    reason: "bootstrap"
  - event_pattern: "qa.validation_passed"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "qa.validation_failed"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "devops.infra_change_needed"
    subscriber_id: "holding-devops"
    reason: "bootstrap"
  - event_pattern: "bug_reported"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "feature_request"
    subscriber_role: "pm-agent"
    reason: "bootstrap"
  - event_pattern: "feature_request"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "cycle_limit_reached"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "customer_message"
    subscriber_role: "support-agent"
    reason: "bootstrap"
  - event_pattern: "feature_deployed"
    subscriber_role: "marketing-agent"
    reason: "bootstrap"

seeded_routes:
  - event_pattern: "bug_fix_deployed"
    subscriber_role: "support-agent"
    reason: "seeded"
