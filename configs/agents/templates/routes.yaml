# OpCo default routing template (bootstrap + seeded).
# Used by: `empire template publish` (YAML mode).

bootstrap_routes:
  - event_pattern: "product_spec_ready"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "cto.tech_spec_review_requested"
    subscriber_role: "tech-writer"
    reason: "bootstrap"
  - event_pattern: "technical_spec_ready"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "technical_spec_ready"
    subscriber_role: "backend-agent"
    reason: "bootstrap"
  - event_pattern: "technical_spec_ready"
    subscriber_role: "frontend-agent"
    reason: "bootstrap"
  - event_pattern: "build_progress"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "build_blocked"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "deploy_requested"
    subscriber_role: "devops-agent"
    reason: "bootstrap"
  - event_pattern: "qa.validation_passed"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "qa.validation_failed"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "devops.infra_change_needed"
    subscriber_id: "holding-devops"
    reason: "bootstrap"
  - event_pattern: "bug_reported"
    subscriber_role: "cto-agent"
    reason: "bootstrap"
  - event_pattern: "feature_request"
    subscriber_role: "pm-agent"
    reason: "bootstrap"
  - event_pattern: "product_report"
    subscriber_role: "opco-ceo"
    reason: "bootstrap"
  - event_pattern: "growth_report"
    subscriber_role: "opco-ceo"
    reason: "bootstrap"
  - event_pattern: "cross_domain_report"
    subscriber_role: "opco-ceo"
    reason: "bootstrap"
  - event_pattern: "spend_needed"
    subscriber_role: "vp-product"
    reason: "bootstrap"
  - event_pattern: "spend_needed"
    subscriber_role: "vp-growth"
    reason: "bootstrap"
  - event_pattern: "spend_request"
    subscriber_role: "opco-ceo"
    reason: "bootstrap"
  - event_pattern: "*_escalation"
    subscriber_role: "opco-ceo"
    reason: "bootstrap"

seeded_routes:
  - event_pattern: "bug_fix_deployed"
    subscriber_role: "support-agent"
    reason: "seeded"
  - event_pattern: "feature_deployed"
    subscriber_role: "chief-of-staff"
    reason: "seeded"
  - event_pattern: "feature_deployed"
    subscriber_role: "marketing-agent"
    reason: "seeded"
  - event_pattern: "build_complete"
    subscriber_role: "chief-of-staff"
    reason: "seeded"
  - event_pattern: "prelaunch_ready"
    subscriber_role: "chief-of-staff"
    reason: "seeded"
  - event_pattern: "market_signals"
    subscriber_role: "chief-of-staff"
    reason: "seeded"
  - event_pattern: "churn_risk"
    subscriber_role: "chief-of-staff"
    reason: "seeded"
  - event_pattern: "devops.deploy_complete"
    subscriber_role: "qa-agent"
    reason: "seeded"
