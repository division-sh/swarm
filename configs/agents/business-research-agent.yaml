id: business-research-agent
role: business-research-agent
mode: factory
model_tier: sonnet
subscriptions:
  - validation.started
  - validation.more_data_needed
  - spec.revision_requested
  - spec.draft_ready
  - spec_review.passed
  - spec_review.issues_found
tools:
  - agent_message
constraints:
  max_turns_per_task: 30
  conversation_mode: session_per_vertical
