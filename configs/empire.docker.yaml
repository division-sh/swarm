runtime:
  max_concurrent_agents: 50
  event_poll_interval: 2s
  recovery_on_startup: true

database:
  host: postgres
  port: 5432
  name: empireai
  user: postgres
  password: postgres
  sslmode: disable
  pool_size: 30

llm:
  runtime_mode: cli_test
  session:
    lock_ttl: 120s
    rotate_after_turns: 50
    rotate_on_parse_failures: 3
  claude_api:
    default_model: claude-sonnet-4-5-20250929
    haiku_model: claude-haiku-4-5-20251001
    max_retries: 3
    retry_backoff: 2s
  claude_cli:
    command: claude
    timeout: 120s
    output_format: stream-json
    retries: 3
    no_session_persistence: false
    use_tmux: false

mailbox:
  poll_interval: 5s
  stale_threshold: 15m
  digest_max_interval: 24h
  digest_on_ceo_report: true

founder_mode:
  spec_review: true
  deploy_review: true
  review_timeout: 48h
  founder_input: true
  founder_input_timeout: 24h

hetzner:
  host: ""
  ssh_key: ""
  base_domain: ""
  verticals_dir: "/srv/verticals"
  port_range_start: 12000
  staging_port_range_start: 22000
  gateway_port: 8090

registrar:
  provider: ""
  api_key: ""

whatsapp:
  provider: ""
  api_key: ""

# Budget caps are in cents (USD).
budget:
  factory_monthly_cap: 50000
  per_vertical_monthly_cap: 20000
  portfolio_monthly_cap: 100000
  auto_approve_spend_below: 1500
  human_tasks:
    max_tasks_per_week: 3
    budget_reset: "monday"
    auto_expire_hours: 168
    categories_enabled:
      - sales_call
      - government_visit
      - escalated_support
      - partnership
      - verification
      - ground_truth
      - banking

sharding:
  max_shards_per_scan: 8
  max_concurrent_shards: 12
  per_shard_timeout: 30m
  startup_grace_period: 20m
  per_shard_budget_cents: 50
  max_retries_per_shard: 2
  circuit_breaker_threshold: 0.5
  stages:
    market_research:
      target_items_per_shard: 13
      max_shards: 8
    trend_research:
      target_items_per_shard: 3
      max_shards: 4

# Telegram env:
# - EMPIREAI_TELEGRAM_TOKEN + EMPIREAI_TELEGRAM_CHAT_ID
# Legacy aliases still supported:
# - EMPIREAI_NOTIFY_TELEGRAM_BOT_TOKEN + EMPIREAI_NOTIFY_TELEGRAM_CHAT_ID
