    diagnostic_direct_and_agent_directive: explicitly_split_to_closed_1150_and_1932_owners
  canonical_owner_decision: >-
    The parent/child selected-store mutation is a real semantic owner, not the
    first local helper. It owns external request identity and ordered operation
    membership while deliberately consuming, rather than duplicating, existing
    event-level delivery and recovery owners.
  systematic_consumption_audit:
    providertriggers_InboundAdmissionPlan_request_authentication: moved_to_stable_request_projection_owner_in_this_work
    providertriggers_Delivery_Events_ordered_output_projection: moved_to_absent_operation_only_projection_in_this_work
