    request_authentication_and_fingerprint: same_selected_class_retry_identity_owner
    normalized_output_projection_for_absent_identity: same_selected_class_commit_time_output_owner
    eventbus_lifecycle_reply_and_delivery_mutation: same_selected_class_atomic_side_effect_owner
    post_commit_delivery_claims_and_sweeper: same_selected_class_consumer_but_existing_event_level_outcome_owner
