  failure_rules:
    pre_commit: rollback_without_runtime_publication
    post_commit_pre_publication: leave_pending_with_readiness_false_and_rederive_on_retry_or_next_boot
    partial_publication: withdraw_the_candidate_runtime_context_then_retry_from_committed_truth
    publication_ack_failure: >-
      Treat publication as pending; replay is safe because every publication
      consumer is keyed by service_id, generation, and publication_sequence.
    no_database_transaction_across_runtime_publication: true

terminal_immutability:
  owner: internal/store/runlifecycle
  rule: >-
    completed, failed, cancelled, and forked lifecycle truth, including status,
    ended_at, failure, run-control, and terminal outcome event identity, is
    immutable. Standing reconciliation never updates a terminal run back to
    running or clears its terminal evidence. The derived event_count aggregate
    may advance or decrease only with admitted diagnostic-direct evidence rows;
    it is observational metadata, not lifecycle authority.
  backend_enforcement:
    - postgres_run_status_failure_ended_at_constraints
    - sqlite_run_status_failure_ended_at_triggers
  run_control: >-
    Terminal predecessor runs remain terminal and reject pause, continue,
    stop, event publication, directive execution, replay, and recovery.
  readback: >-
    run.get and run.diagnose continue to report the predecessor as cancelled;
    standing service readback reports the new current generation/run and links
    the repaired predecessor through the standing journal.
  terminal_event_identity: >-
    Existing predecessor terminal/control events and receipts remain attached
    to the predecessor. The repair transition is a new standing-service journal
    fact and any new runtime event is emitted under the next run generation.
  idempotency: >-
    The locked service row plus unique service operation_id and deterministic
    next run_id make commit retry and repeated boot converge on one generation.
  late_writer_fence: >-
    Old-generation writers remain rejected by immutable terminal run status;
    new-generation publication is keyed by service_id, generation, and
    publication_sequence.

terminal_event_admission:
  canonical_owner: internal/store/runlifecycle plus selected-store event mutation boundary
  current_invalid_interpreters:
    - internal/store/runlifecycle.EnsureActive ReopenCompleted
    - PostgreSQL appendEventSpec completed-to-running transition
    - SQLite AppendEventTx terminal-row insert without lifecycle transition
  rule: >-
    A new event carrying an existing run_id may persist only when the locked run
    is running or paused. Completed, cancelled, failed, and forked runs reject
    the event before event, delivery, receipt, replay-scope, outbox, state, or
    counter mutation, except through the separately typed diagnostic-direct
    evidence owner below. Event persistence never rewrites run lifecycle truth.
  ordering:
    - validate_event_shape_and_lineage
    - check_existing_event_id_first
    - exact_duplicate_returns_idempotent_success_without_run_transition_or_new_rows
    - conflicting_duplicate_fails_closed_without_mutation
    - lock_or_create_run_row
    - require_existing_run_status_running_or_paused
    - insert_event_and_atomic_delivery_manifest
    - update_counts_without_changing_status_or_terminal_evidence
  new_run_rule: >-
    A missing run row may be created as running only through the canonical run
    creation owner. An existing terminal row is never treated as missing and is
    never reopened.
  terminal_evidence_events: >-
    There is no generic post-terminal event exception. Executable terminal
    outcome events must persist before the terminal transition in the same
    owner transaction. The only post-terminal events are admitted through the
    closed diagnostic_direct_event_admission owner below; a diagnostic label or
    produced_by_type value is not itself an admission bypass.
  backend_atomicity:
    postgres: lock run FOR UPDATE in the same transaction before event or delivery insert
    sqlite: consume the serialized runtime mutation transaction and read status before insert
  removed_behavior:
    - ReopenCompleted option and completed-to-running event append
    - SQLite terminal-run event insertion with unchanged terminal status

diagnostic_direct_event_admission:
  canonical_owner: closed diagnostic-direct catalog with typed selected-store subtype owners
  preserved_closed_owners:
    - issue_1150_runtime_log_event_storage_and_read_architecture
    - issue_1932_directive_operation_outcome_transaction
  allowed_event_types:
    - platform.runtime_log
    - platform.inbound_recorded
    - platform.agent_directive
  type_rule: >-
    Admission is a closed event-type match, not a name prefix, producer label,
    payload heuristic, or caller privilege. The three types share a routing
    classification but not mutation semantics. Generic AppendEvent and generic
    EventBus publication reject diagnostic-direct events; each type requires
    its exact subtype owner. Adding another type requires an authoritative spec
    change and an exhaustive owner/reader/proof update.
  producer_rule: >-
    All three persisted rows use produced_by_type=platform. Runtime logs use
    produced_by=runtime. Inbound provider identity remains explicit in payload
    and reservation identity rather than reclassifying the marker as external
    executable work. Directive producer and operation evidence remain governed
    by #1932. The current inbound direct INSERT value produced_by_type=external
    is non-authoritative and removed with that bypass.
  runtime_log_subtype:
    owner: RuntimeLogPersistence selected-store diagnostic evidence mutation
    statuses: [running, paused, completed, cancelled, failed, forked]
    global_no_run: allowed
    mutation: event_row_only
    forbidden_effects:
      - event_deliveries
      - event_receipts
      - committed_replay_scope
      - outbox_or_deferred_publish
      - entity_or_flow_state_mutation
      - run_creation_or_lifecycle_transition
      - handler_or_pipeline_execution
    ordering:
      - validate_runtime_log_payload_lineage_event_identity_and_timestamp
      - exact_event_duplicate_returns_idempotent_success
      - conflicting_event_duplicate_refuses
      - lock_and_require_existing_run_when_run_scoped
      - insert_runtime_log_event_only
      - synchronize_derived_event_count_when_run_scoped
    counter_policy: >-
      A new run-scoped log changes event_count by exactly one on both backends,
      including after terminalization. Exact duplicates do not. entity_count and
      every lifecycle field remain unchanged.
    readers:
      - runtime.logs
      - runtime.subscribe_logs
      - run.trace_include_internal
      - run.subscribe_trace_include_internal
      - run_diagnostics_and_debug_read_surfaces
      - conversation_and_turn_runtime_log_projections
      - compute_module_replay_evidence
    post_terminal_producers:
      - runtime_failure_and_completion_adjacent_logging
      - delivery_receipt_and_manager_aftermath_logging
      - scheduler_timer_and_startup_recovery_aftermath_logging
      - event_bus_payload_publish_and_post_commit_failure_logging
      - inbound_publication_failure_logging
      - agent_llm_tool_activity_and_pipeline_aftermath_logging
  inbound_recorded_subtype:
    owner: selected-store parent inbound_publications plus ordered inbound_publication_events membership ledger
    statuses: [running, paused]
    global_no_run: forbidden_for_webhook_publication
    identity: [provider, entity_id, provider_event_id]
    publication_id: uuid_v5(inbound_publication_namespace, normalized_provider + NUL + entity_id + NUL + provider_event_id)
    cardinality: one_parent_provider_delivery_to_one_or_two_ordered_executable_event_children
    owner_model:
      request_identity_and_acknowledgement: inbound_publications
      ordered_commit_time_output_membership_and_integrity: inbound_publication_events
      executable_event_and_route_plan: events_committed_replay_scope_and_event_deliveries
      pipeline_outcome_and_recovery: event_receipts_delivery_claims_and_existing_sweeper
      evidence_only_marker: platform.inbound_recorded_parent_event
    schema:
      inbound_publications:
        primary_key: publication_id
        columns:
          publication_id: uuid_not_null
          provider: text_not_null
          entity_id: uuid_not_null
          provider_event_id: text_not_null
          request_semantic_fingerprint: text_not_null_inbound_request_semantic_v1_sha256
          request_projection_version: text_not_null_equal_inbound_request_semantic_v1
          stable_service_id: uuid_not_null_fk_standing_services
          package_key: text_not_null
          flow_id: text_not_null
          instance_id: text_not_null
          target_alias: text_not_null
          target_flow_instance: text_not_null
          expected_publication_sequence: bigint_nonnegative_not_null
          resolved_run_id: uuid_not_null_fk_runs
          marker_event_id: nullable_uuid_unique_fk_events
          acknowledgement_mode: enum_after_publish_durable_before_dispatch_not_null
          output_count: integer_nonnegative_not_null
          original_received_at: timestamp_not_null
          original_user_agent: text_not_null
          original_transport_metadata: canonical_json_object_not_null
          state: enum_prepared_committed_not_null
          created_at: timestamp_not_null
          committed_at: nullable_timestamp
        unique_constraints:
          - [provider, entity_id, provider_event_id]
          - [marker_event_id]
        checks:
          - prepared_implies_marker_event_id_and_committed_at_are_null
          - committed_implies_marker_event_id_and_committed_at_are_nonnull
          - committed_implies_output_count_greater_than_zero
          - global_marker_or_missing_resolved_run_is_forbidden
      inbound_publication_events:
        primary_key: [publication_id, ordinal]
        columns:
          publication_id: uuid_not_null_fk_inbound_publications_on_delete_cascade
          ordinal: integer_nonnegative_not_null
          event_id: uuid_unique_not_null_fk_events
          event_name: text_not_null
          output_kind: enum_raw_normalized_not_null
          pack_id: nullable_text
          pack_version: nullable_text
          pack_manifest_hash: nullable_text
          observed_authorization_generation: nullable_text
          event_integrity_fingerprint: text_not_null_sha256
          recipient_manifest_fingerprint: text_not_null_sha256
          recipient_count: integer_nonnegative_not_null
        unique_constraints:
          - [event_id]
        row_checks:
          - raw_implies_all_pack_and_authorization_fields_null
          - normalized_implies_all_pack_and_authorization_fields_nonnull
        finalization_and_integrity_invariants:
          - event_name_and_output_kind_match_the_linked_event_and_committed_authorization_evidence
          - ordinals_are_contiguous_from_zero_and_count_equals_parent_output_count
      state_authority: >-
        prepared is transaction-local reservation state only. The same selected-
        store transaction advances it to committed after the evidence marker,
        every ordered executable event child, each event's replay scope and
        delivery rows, and counters exist. A crash rolls the whole transaction
        back; any durably visible prepared parent is corruption and startup,
        read, and retry admission fail closed.
      outcome_authority: >-
        Neither parent nor child stores delivery success, failure, claim, or
        mutable dispatch state. Each child's linked event, committed replay
        scope, event_deliveries, event_receipts, and existing delivery claims are
        the only execution, route-manifest, pipeline-outcome, and recovery owners.
        Child recipient count/fingerprint fields are immutable integrity
        cross-check evidence only and cannot drive or override dispatch.
    backend_neutral_capability:
      - RunInboundPublicationMutation
      - LoadInboundPublicationByIdentity
      - ValidateInboundPublicationIntegrity
    admission_sequence:
      - resolve_the_exact_loaded_standing_target_and_authenticate_the_request
      - extract_provider_authored_identity_type_and_canonical_request_semantics_without_projecting_outputs
      - derive_publication_id_and_request_semantic_fingerprint
      - load_and_integrity_validate_existing_parent_and_children_before_current_catalog_output_projection
      - exact_committed_request_returns_original_children_and_original_acknowledgement_contract
      - conflicting_committed_request_refuses_without_mutation
      - absent_identity_uses_the_current_compiled_plan_to_derive_and_authorize_the_ordered_output_batch
      - selected_store_mutation_rechecks_identity_under_lock_before_any_parent_child_or_event_insert
    capability_rule: >-
      RunInboundPublicationMutation owns begin, provider-identity serialization,
      standing/run locks, prepared-ledger insertion, commit, and rollback. For an
      absent identity it invokes EventBus exactly once with the already-authorized
      typed ordered output batch; for an exact committed request identity it
      returns the original ordered children without invoking current-catalog
      output projection, EventBus, planning, or lifecycle materialization;
      conflict refuses. A race that observed absence before output projection is
      rechecked under the identity lock and returns the winner's children on an
      exact request fingerprint, never the loser's newly projected outputs. The
      callback exposes semantic operations and Context only, never a raw SQL
      handle. Integrity validation is read-only and never repairs missing or
      contradictory coupled rows.
    mutation_operations:
      - Context
      - AppendOrderedExecutableEvent
      - LinkOrderedPublicationEventIntegrityEvidence
      - AppendInboundRecordedEvidence
      - InsertEventDeliveriesWithTargetsOrRoutes
      - UpsertCommittedSubscribedReplayScope
      - UpsertTargetFailureReceiptWhenRequired
      - FinalizeCommittedPublicationWithOrderedChildren
    transaction_carrier_rule: >-
      Store adapters for template-instance persistence, descriptor reload, and
      reply-context create/load/claim consume the mutation context and join the
      same hidden backend transaction. EventBus, provider adapters, and lifecycle
      owners may not extract or execute raw SQL.
    concurrency:
      postgres: transaction-scoped advisory identity lock then row/run/service FOR UPDATE locks
      sqlite: one serialized runtime mutation with identity lookup before inserts
    request_semantic_fingerprint:
      owner: providertriggers authenticated provider-request retry projection
      ordering: >-
        Authenticate and normalize the provider request, derive only its stable
        inbound identity and request semantic projection, then load the existing
        parent before evaluating pack-owned normalized-output branches or
        constructing any persisted event envelope. The lookup owner is
        inbound_publications, not platform.inbound_recorded. An exact committed
        match returns the original ordered child IDs/names and original request
        evidence. Only when no parent exists may the current compiled admission
        owner derive and authorize the raw/normalized output batch before the
        selected-store mutation. Retry-local observations never overwrite the
        first row.
      included_fields:
        - normalized_provider
        - authoritative_provider_event_id
        - normalized_provider_event_type
        - nonreversible_sha256_of_canonical_unredacted_provider_body_or_form_data
        - target_entity_id
        - stable_ingress_service_identity_package_key_flow_id_and_instance
      excluded_fields:
        - received_at
        - user_agent_and_manifest_metadata_derived_from_user_agent
        - signature_authentication_and_secret_headers
        - request_url_and_other_transport_local_metadata
        - physical_run_id
        - standing_generation
        - bundle_revision_hash_or_source
        - boot_or_process_identity
        - translated_raw_or_normalized_output_event_names
        - output_kind_and_output_payload_projection
        - pack_id_version_manifest_hash_and_catalog_generation
        - current_normalized_branch_match_or_absence
        - computed_recipient_plan_delivery_routes_and_runtime_subscribers
        - current_retry_acknowledgement_mode
      provider_request_projection: >-
        Hash provider-authored identity, authoritative provider event type, exact
        non-reversible SHA-256 of canonical unredacted body or form semantics,
        and stable target identity. Redaction changes publication/readback only;
        it cannot collapse two distinct semantically consumed requests.
        Do not hash a persisted output envelope or fields synthesized by the
        current pack, because receipt observations and pack output projection are
        not retry identity.
      canonicalization: >-
        Hash one typed canonical JSON projection with sorted object keys, exact
        array order, normalized event/provider tokens, and preserved scalar
        types. Never hash map iteration order, the full persisted event payload,
        or the output batch.
      conflict_rule: >-
        Same inbound identity with a changed included field is a conflict. A
        change only to receipt observations, unrelated catalog membership, the
        same pack's revision that preserves request identity but changes output
        mapping, acknowledgement config, or current
        standing generation remains an exact retry and returns the immutable
        original child set. A catalog change alone never conflicts and never
        reinterprets an already consumed identity.
    commit_time_output_evidence:
      owner: ordered inbound_publication_events children
      rule: >-
        A new operation records exactly the ordered outputs authorized by the
        current compiled admission owner at commit time. Each child stores raw or
        normalized kind, event identity/name, relevant pack id/version/manifest
        hash, the catalog-wide authorization generation observed on original
        commit, and integrity summaries. This evidence is immutable historical
        provenance. It is never recomputed or compared against the current
        catalog to decide an exact retry.
      conditional_output_rule: >-
        The raw event is ordinal zero. Zero or one matched normalized output may
        follow at ordinal one. Pairwise-overlapping normalized branches fail at
        pack load and a forced runtime multi-match fails with zero mutation. A
        conditionally absent normalized output creates no child and exact retry
        preserves that absence. Multiple-normalized fanout requires a separate
        spec gate.
    event_identity: >-
      Derive the deterministic marker event ID from publication_id and each
      executable event ID from publication_id plus its zero-based ordinal using
      disjoint typed labels. The parent owns provider identity, request
      fingerprint, original acknowledgement mode, and marker linkage. Children
      own ordered executable membership. platform.inbound_recorded carries
      publication_id plus the ordered executable event IDs/names as immutable
      audit evidence but is not consulted as dedupe, dispatch, retry, retention,
      or response-state truth.
    current_generation_rule: >-
      Request resolution carries the expected standing publication sequence, but
      no precomputed output or recipient manifest is authoritative. The runner locks the
      target run and standing service row before invoking EventBus. It requires
      target.run_id and publication sequence to equal the current published
      generation and requires running or paused. A stale target, retired
      generation, or terminal run refuses before any route materialization or
      durable mutation; the caller may re-resolve only while provider identity is
      absent.
    transaction_local_route_materialization:
      owner: EventBus canonical subscribed route planner inside the one ordered InboundPublicationMutation batch
      ordering:
        - for_each_output_in_stable_ordinal_order_append_executable_event_in_mutation
        - for_each_child_run_canonical_delivery_planner
        - activate_or_reuse_template_instance_through_transaction_local_typed_owner
        - create_or_claim_reply_context_through_transaction_local_typed_owner
        - reload_descriptors_through_mutation_context
        - derive_each_final_recipient_plan_from_transaction_state_and_mutation_overlay
        - persist_each_event_owned_delivery_route_scope_and_receipt_set
        - persist_each_ordered_child_membership_and_integrity_cross_check
        - append_one_platform_inbound_recorded_evidence_for_the_ordered_child_set
        - finalize_parent_output_count_and_counters
      template_instance_rule: >-
        Durable flow-instance/entity/config/route facts join the transaction.
        Process-local route-table, agent, handler, timer, auto-emit, and runtime-
        context publication is staged in a mutation-local overlay/post-commit
        action set. The final plan may read the overlay, but global runtime state
        is published only after commit. Rollback discards the overlay and actions.
      reply_context_rule: >-
        Request creation and response claim run through the existing typed
        ReplyContextStore against the mutation context. A rollback restores open
        or absent state; concurrent claims serialize on the durable row; exact
        inbound retry never invokes the claim again.
      topology_rule: >-
        Each event's final plan is derived after its transaction-local lifecycle
        decisions. Planning snapshots current subscribers/routes under EventBus
        synchronization and merges only the mutation-local durable lifecycle
        overlay. The canonical route manifest remains event_deliveries; the child
        stores only count/fingerprint cross-check evidence. A concurrent route or
        subscriber change is serialized around the batch snapshot. Later topology
        change cannot rewrite committed event_deliveries, and dispatch/recovery
        consume only those event-level owners.
      preview_rule: >-
        Optional CheckPublishRecipientPlan preview remains non-mutating and may
        reject obvious invalidity, but it is advisory only. It is never passed to
        the store as the final plan and cannot authorize commit.
      rollback_rule: >-
        Any ledger, lifecycle, reply, descriptor, event, evidence, scope,
        delivery, receipt, counter, or commit failure rolls back every durable
        mutation and publishes no process-local route/agent/runtime side effect.
      post_commit_rule: >-
        Commit publishes the staged process-local route, agent, handler, timer,
        auto-emit, and runtime-context actions idempotently before delivery
        dispatch. A post-commit publication failure never rolls back or rewrites
        the parent, children, or event-owned manifests and never derives a
        replacement plan. It leaves every child's canonical deliveries
        recoverable; durable-before-dispatch remains
        accepted, while after-publish returns the existing provider failure.
        Restart rebuilds process-local state from durable template/reply facts,
        iterates the committed children in ordinal order, and recovers each child
        only through existing event-level scope, delivery, receipt, and claim
        owners.
      failure_injection_matrix:
        each_event_ordinal:
          - executable_event_failure
          - route_planning_failure
          - lifecycle_materialization_failure
          - reply_context_failure
          - replay_scope_failure
          - delivery_route_failure
          - target_failure_receipt_failure
          - child_membership_failure
        template_created_then:
          - descriptor_reload_failure
          - reply_create_or_claim_failure
          - replay_scope_failure
          - delivery_route_failure
          - evidence_failure
          - counter_failure
          - ledger_finalization_failure
          - commit_failure
        template_reused_then:
          - descriptor_reload_failure
          - reply_create_or_claim_failure
          - replay_scope_failure
          - delivery_route_failure
          - evidence_failure
          - counter_failure
          - ledger_finalization_failure
          - commit_failure
        reply_created_then:
          - descriptor_reload_failure
          - replay_scope_failure
          - delivery_route_failure
          - evidence_failure
          - counter_failure
          - ledger_finalization_failure
          - commit_failure
        reply_claimed_then:
          - descriptor_reload_failure
          - replay_scope_failure
          - delivery_route_failure
          - evidence_failure
          - counter_failure
          - ledger_finalization_failure
          - commit_failure
      concurrency_rule: >-
        PostgreSQL row/identity locks and SQLite serialized mutation semantics
        make same-template-key creation and same-reply-context claim converge.
        Exactly one transaction owns a new template or terminal reply claim;
        losers reload committed truth or refuse without partial state. Exact
        provider retry bypasses EventBus and therefore cannot activate or claim
        again.
    atomic_mutation:
      - lock_or_reserve_provider_identity_and_load_ledger_first
      - exact_request_fingerprint_returns_existing_parent_and_ordered_children
      - conflicting_request_fingerprint_refuses_before_mutation
      - current_generation_and_run_status_admission
      - insert_prepared_inbound_publications_row
      - for_each_ordered_output_insert_executable_event
      - for_each_ordered_output_transaction_local_template_instance_and_reply_context_materialization
      - for_each_ordered_output_derive_final_recipient_plan_after_materialization
      - for_each_ordered_output_insert_committed_subscribed_replay_scope
      - for_each_ordered_output_insert_complete_event_delivery_manifest_including_canonical_empty_plan
      - for_each_ordered_output_insert_child_membership_and_integrity_evidence
      - insert_one_platform_inbound_recorded_evidence_for_all_ordered_child_ids_and_names
      - synchronize_event_count_by_N_executable_plus_one_evidence
      - transition_parent_prepared_to_committed_with_output_count
      - commit_then_dispatch_or_queue_each_child_from_existing_event_owned_state
    duplicate_rule: >-
      A committed parent is authoritative only when its evidence marker, complete
      contiguous child set, every linked executable event, replay scope, and
      event-owned delivery manifest pass integrity validation. An exact request
      retry never projects or creates another output. Durable-before-dispatch
      returns the original ordered child IDs/names immediately. After-publish
      reconciles each linked child's canonical event-level outcome and waits for
      normal completion; it does not mint or dispatch a second batch. Missing,
      duplicate, non-contiguous, reordered, mismatched, or extra child/event
      coupling is corruption and fails closed. Duplicate response and recovery
      use the original acknowledgement mode and child set; later catalog, pack,
      config, topology, or standing-generation change does not reinterpret it.
    response_readback_contract: >-
      Accepted and duplicate webhook responses return the exact original ordered
      child event IDs and event names loaded from the committed ledger. The
      platform.inbound_recorded payload carries the same ordered pairs. Neither
      response reconstructs names from the current admission plan. A duplicate
      after catalog or pack revision therefore reads back byte-for-byte identical
      child identity/order evidence.
    acknowledgement_policies:
      durable_before_dispatch: >-
        After atomic publication commit, return accepted and dispatch the
        committed child set asynchronously. Exact retry returns accepted or
        duplicate with the original ordered IDs/names; pending work remains owned
        independently per child by existing delivery recovery.
      after_publish: >-
        After the same atomic publication commit, synchronously dispatch or
        reconcile every committed child and wait for normal publish completion.
        A post-commit interceptor/delivery failure is returned under the existing
        provider failure contract without deleting publication evidence. Exact
        retry loads the same ordered children: already successful returns
        duplicate success, pending or retryable child work resumes through
        canonical delivery claims and waits, and terminal nonretryable child
        failure returns the same failure. It never inserts or dispatches a second
        batch.
    failure_rule: >-
      Planning, admission, or persistence failure commits no marker and a retry
      may resolve the new current standing generation. Post-commit dispatch
      failure does not delete the marker or publication. Response behavior is
      selected by the provider acknowledgement policy above. InboundFailureRollback
      and best-effort DeleteInboundEvent rollback are removed.
    retention_rule:
      policy: permanent_dedupe
      rule: >-
        The ledger is the durable publication receipt and remains for the
        lifetime of the coupled audit event, ordered executable children, replay
        scopes, and delivery evidence. Inbound identity is never reused after success,
        including across standing generation replacement. The unused
        PurgeInboundEventsBefore store capability and marker-only purge SQL are
        removed; there is no expiry or publication incarnation model.
      rationale: >-
        Marker-only expiry contradicts deterministic executable identity and can
        re-admit consumed provider work. Permanent operation retention adds one
        parent and the minimum ordered membership rows beside already permanent
        event evidence. It does not add a second dispatch owner.
    reset_policy:
      standing_reset_repair_suspend_or_orphan: preserve_ledger_and_all_coupled_publication_rows
      bundle_delete: preserve_ledger_and_run_event_history_while_marking_source_deleted
      runtime_nuke: >-
        Intentionally release all inbound identities only after runtime ingress is
        closed and in-flight after-publish work is quiesced. In one destructive-
        reset transaction delete each child event's receipts, claims, replay scope,
        deliveries, and other event-owned rows; then ordered child rows; then the
        parent; then marker and executable events; then runs. Partial deletion
        rolls back. No preserved-parent, missing-child, or deleted-event mixed
        state is allowed.
      post_nuke: >-
        A provider retry is a new publication because runtime.nuke explicitly
        discarded both idempotency authority and all coupled execution history.
    migration_policy: >-
      No legacy marker adoption, inferred event linkage, dual read, or tolerant
      fallback exists. The authoritative platform shape includes both
      inbound_publications and inbound_publication_events with exact foreign keys,
      uniqueness, output-kind/provenance checks, and destructive-reset ordering.
      Existing selected stores lacking either table, carrying the obsolete
      single-event ledger shape, or carrying marker rows without ledger ownership
      fail exact schema compatibility before runtime admission and receive the
      existing backend-specific fresh-store remediation. Fresh compatible stores
      use only the parent/child ledger owner.
  agent_directive_subtype:
    owner: issue_1932_agent_directive_operation_reservation
    statuses: [running, paused]
    global_no_run: forbidden
    identity: agent_directive_operations operation_id plus optional actor_key idempotency
    atomic_mutation:
      - validate_request_hash_run_and_directive_event_identity
      - exact_same_key_and_hash_returns_existing_operation
      - same_key_conflicting_hash_refuses
      - lock_and_require_nonterminal_resolved_run
      - insert_platform_agent_directive_event
      - insert_committed_direct_replay_scope
      - insert_prepared_agent_directive_operation
      - synchronize_event_count
    effects: >-
      Committed direct replay scope and the prepared operation row are required
      subtype effects, not forbidden diagnostic behavior. No event deliveries
      are created by reservation. BoardStep execution and operation settlement
      remain governed by the closed #1932 state machine.
    recovery: >-
      Preserve #1932 prepared/executing/executed/succeeded/failed/indeterminate
      recovery, same-key replay, retention, destructive-reset, and heartbeat
      ownership semantics. Generic event replay never executes this row.
  backend_atomicity:
    postgres: each subtype owns one explicit transaction and locks run or semantic identity before insert
    sqlite: each subtype owns one serialized runtime mutation with the same ordering

direct_event_sql_writers:
  postgres_inbound_record_persistence:
    classification: replace_with_inbound_publications_ledger_transaction
    event_type: platform.inbound_recorded
    invalid_behavior:
      - marker_insert_precedes_executable_publish
      - failed_publish_uses_best_effort_marker_delete
      - marker_only_purge_allows_identity_reuse_against_surviving_executable_event
      - direct_insert_records_produced_by_type_external
  sqlite_inbound_record_persistence:
    classification: replace_with_inbound_publications_ledger_transaction
    event_type: platform.inbound_recorded
    invalid_behavior:
      - marker_insert_precedes_executable_publish
      - failed_publish_uses_best_effort_marker_delete
      - marker_only_purge_allows_identity_reuse_against_surviving_executable_event
      - direct_insert_records_produced_by_type_external
  postgres_and_sqlite_runtime_log_persistence:
    classification: move_run_scoped_and_global_rows_to_typed_diagnostic_direct_owner
    event_type: platform.runtime_log
  postgres_and_sqlite_directive_reservation:
    classification: move_from_generic_AppendEventTx_to_typed_directive_reservation_event_insert
    event_type: platform.agent_directive
    preserved_atomic_rows:
      - agent_directive_operations
      - committed_direct_replay_scope
  run_fork_delivery_event_replay:
    classification: consume_ordinary_duplicate_and_status_admission
    rule: >-
      The owner-authorized fork-local replay inserts executable event and
      delivery rows while the fork run is paused, then atomically activates it.
      It must duplicate-check and require that same locked paused fork run
      before direct insert. Completed, cancelled, failed, or forked targets
      refuse. This is not a diagnostic-direct exception.

