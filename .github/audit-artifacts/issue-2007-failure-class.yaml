    - apply_complete_cancelled_or_failed_child_quiescence_when_required
    - mutate_run_instance_entity_route_agent_and_timer_persistence
    - preserve_terminal_predecessor_evidence_and_move_only_whitelisted_current_state_projection_on_repair
    - append_exactly_one_journal_row_per_operation_id
    - set_publication_state_pending_and_increment_publication_sequence
    - commit_all_or_nothing
  phase_3_idempotent_publication:
    - rebuild_manager_routes_agents_and_runtime_handlers_from_committed_state
    - restore_only_active_standing_schedules_and_claims
    - publish_runtime_context_targets_and_ingress_last
    - keep_process_readiness_false_until_every_service_succeeds
  phase_4_acknowledgement:
    - conditionally_mark_publication_state_published_for_the_committed_sequence
    - emit_measured_readiness_and_journal_readback
  failure_rules:
    pre_commit: rollback_without_runtime_publication
    post_commit_pre_publication: leave_pending_with_readiness_false_and_rederive_on_retry_or_next_boot
    partial_publication: withdraw_the_candidate_runtime_context_then_retry_from_committed_truth
    publication_ack_failure: >-
      Treat publication as pending; replay is safe because every publication
      consumer is keyed by service_id, generation, and publication_sequence.
    no_database_transaction_across_runtime_publication: true

terminal_immutability:
  owner: internal/store/runlifecycle
  rule: >-
    completed, failed, cancelled, and forked run rows and their ended_at,
    failure, run-control, and terminal event evidence are immutable. Standing
    reconciliation never updates a terminal run back to running or clears its
    terminal evidence.
  backend_enforcement:
    - postgres_run_status_failure_ended_at_constraints
    - sqlite_run_status_failure_ended_at_triggers
  run_control: >-
    Terminal predecessor runs remain terminal and reject pause, continue,
    stop, event publication, directive execution, replay, and recovery.
  readback: >-
    run.get and run.diagnose continue to report the predecessor as cancelled;
    standing service readback reports the new current generation/run and links
    the repaired predecessor through the standing journal.
  terminal_event_identity: >-
    Existing predecessor terminal/control events and receipts remain attached
    to the predecessor. The repair transition is a new standing-service journal
    fact and any new runtime event is emitted under the next run generation.
  idempotency: >-
    The locked service row plus unique service operation_id and deterministic
    next run_id make commit retry and repeated boot converge on one generation.
  late_writer_fence: >-
    Old-generation writers remain rejected by immutable terminal run status;
    new-generation publication is keyed by service_id, generation, and
    publication_sequence.

terminal_event_admission:
  canonical_owner: internal/store/runlifecycle plus selected-store event mutation boundary
  current_invalid_interpreters:
    - internal/store/runlifecycle.EnsureActive ReopenCompleted
    - PostgreSQL appendEventSpec completed-to-running transition
    - SQLite AppendEventTx terminal-row insert without lifecycle transition
  rule: >-
    A new event carrying an existing run_id may persist only when the locked run
    is running or paused. Completed, cancelled, failed, and forked runs reject
    the event before event, delivery, receipt, replay-scope, outbox, state, or
    counter mutation. Event persistence never rewrites run lifecycle truth.
  ordering:
    - validate_event_shape_and_lineage
    - check_existing_event_id_first
    - exact_duplicate_returns_idempotent_success_without_run_transition_or_new_rows
    - conflicting_duplicate_fails_closed_without_mutation
    - lock_or_create_run_row
    - require_existing_run_status_running_or_paused
    - insert_event_and_atomic_delivery_manifest
    - update_counts_without_changing_status_or_terminal_evidence
  new_run_rule: >-
    A missing run row may be created as running only through the canonical run
    creation owner. An existing terminal row is never treated as missing and is
    never reopened.
  terminal_evidence_events: >-
    There is no generic post-terminal event exception. Executable terminal
    outcome events must persist before the terminal transition in the same
    owner transaction. Non-executable diagnostics use runtime_logs, run
    terminal fields, run_control_state, or the standing-service journal rather
    than appending to events under a terminal run.
  backend_atomicity:
    postgres: lock run FOR UPDATE in the same transaction before event or delivery insert
    sqlite: consume the serialized runtime mutation transaction and read status before insert
  removed_behavior:
    - ReopenCompleted option and completed-to-running event append
    - SQLite terminal-run event insertion with unchanged terminal status

