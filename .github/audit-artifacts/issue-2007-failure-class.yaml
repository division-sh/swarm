terminal_status_invariants:
  completed:
    owner: normal_run_completion_owner_from_issue_994
    policy: prove_settled
    rule: >-
      The transition does not destroy work. It succeeds only when canonical
      entity/flow terminality, deliveries, pipeline receipts, active timers and
      claims, and session leases prove that no same-run execution remains.
    issue_2007_action: preserve_completion_owner_and_absorb_terminal_event_admission
  cancelled:
    owner: canonical_run_destructive_terminalization_owner
    policy: destructive_complete_quiescence
    rule: >-
      In one selected-store transaction, terminalize every pending,
      in-progress, or retryable delivery and its receipts; terminate active
      sessions; cancel active timers and release claims; write the reasoned run
      control and terminal run row; and fence every late writer from
      resurrection.
    issue_2007_action: absorb
  failed:
    owner: canonical_run_destructive_terminalization_owner
    policy: destructive_complete_quiescence
    rule: >-
      The canonical failure envelope and destructive child quiescence commit in
      the same selected-store transaction. Builder and direct store terminal
      writers may not write failed while any run-owned execution remains.
    issue_2007_action: absorb
  forked:
    owner: terminal_forked_source_freeze_owner
    policy: preserved_lineage_non_execution
    rule: >-
      Source rows may remain pending-looking as immutable lineage, but every
      dispatch, retry, replay, recovery, timer, session, outbox, mutation, and
      late-writer path must prove the source run is not terminal forked before
      execution. The source-advanced selected-contract branch remains
      explicitly unfrozen and disjoint.
    issue_2007_action: split_to_issue_2020

standing_identity:
  namespace: selected_store
  uniqueness: [package_key, flow_id]
  service_id: uuid_v5(standing_service_namespace, package_key + NUL + flow_id)
  collision_rule: >-
    The complete candidate set is validated before mutation. Two runtime
    contexts resolving the same selected-store package_key and flow_id fail
    closed; bundle hash, source path, alias, and load order never disambiguate.
  mutable_revision_evidence: [bundle_hash, bundle_source]
  forbidden_identity_inputs: [bundle_hash, bundle_source, source_path, boot_timestamp, lease_timestamp]
  generation_identity:
    run_id: uuid_v5(service_id, "run" + NUL + decimal_generation)
    instance_id: uuid_v5(service_id, "instance")
    entity_id: existing_canonical_flow_instance_entity_identity_owner
    ordinary_revision_change: preserve_generation_run_instance_entity
    poison_repair: preserve_service_instance_entity_and_advance_run_generation
    explicit_reset: preserve_service_instance_entity_clear_current_state_and_advance_run_generation

