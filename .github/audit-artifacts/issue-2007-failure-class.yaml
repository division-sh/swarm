terminal_decision_card_evidence_reaudit:
  status: binding_after_fresh_independent_gate
  audit_base: bbc2fbee2b516ae3db0f8d0168a606b1613a07b8
  architecture_ruling: https://github.com/division-sh/swarm/issues/2007#issuecomment-4964810988
  supersedes_artifact_commit: bb7c25f9c6bba983d0fcd04e4db88e5cd32c6308
  issue_category: high_risk_terminal_lifecycle_atomicity_non_executability_backend_parity_and_hard_schema_migration
  observed_symptom: >-
    Run terminalization owns card supersession but currently defers its lifecycle
    evidence to an outbox whose later release requires bundle routing and normal
    EventBus machinery after the predecessor is terminal. Every route,
    recipient, dispatcher, and recovery seam is hypothetical executable work
    created only to prove that it must not execute.
  exact_semantic_concepts:
    - direct_transactional_terminal_decision_card_evidence
    - deterministic_mailbox_card_superseded_identity
    - typed_persistence_only_platform_pipeline_receipt
    - terminal_evidence_non_executability
    - obsolete_outbox_and_releaser_retirement
    - hard_one_way_legacy_schema_migration
    - sqlite_postgres_atomicity_and_idempotency_parity
  chosen_working_failure_class: terminal_decision_card_evidence_atomicity_and_non_executability
  immediate_parent_failure_class: status_specific_terminalization_typed_event_admission
  parent_failure_class: declaration_owned_standing_service_reconciliation_status_specific_terminal_decision_card_evidence_atomicity_non_executability_and_inbound_publication_operations
  broadest_parent_failure_class: durable_runtime_desired_state_and_status_specific_terminal_lifecycle_atomicity
  framing_decision: broad_enough_after_replacing_outbox_release_with_direct_terminal_evidence
  entry_point_not_boundary: >-
    The outbox publish failure was an entry point. The boundary includes every
    terminal producer, deterministic event and receipt identity, all former
    releasers and cleanup dependencies, startup/schema migration, replay and
    dispatch exclusion, active-run supersession preservation, failure/crash/
    retry/corruption, and both selected stores.

  binding_governing_context:
    issue_and_thread: issue_2007
    exact_spec_refs:
      - platform-spec.yaml#platform_tables.decision_card_lifecycle_outbox
      - 'platform-spec.yaml#platform_events.catalog["mailbox.card_superseded"]'
      - platform-spec.yaml#api_specification.conventions.mailbox.decision_event_payload_contract
      - platform-spec.yaml#engine.runtime_boot.active_run_abandon_quiescence
      - platform-spec.yaml#engine.runtime_core_persistence_store_contracts.optional_public_mutating_backend_support.runtime_nuke
      - platform-spec.yaml#platform_tables.destructive_reset_cleanup_policy
      - platform-spec.yaml#contract_formats.event_schema.routing_derivation.route_plan_authority
    implementation_spec_action: >-
      Remove decision_card_lifecycle_outbox and its normal-route publication
      contract. Specify that active-run stage/flow supersession remains
      event-loop routable, while terminal-run supersession is a deterministic
      persistence-only evidence variant completed by one typed platform/pipeline
      receipt in the terminalization transaction. It creates no replay scope,
      route plan, delivery, recipient receipt, dispatch, or recovery work.

  canonical_operation_contract:
    owner: TerminalDecisionCardEvidenceMutation_inside_each_selected_store_terminalization_transaction
    input_authority: >-
      The locked pending card/gate, terminal transition reason/status, canonical
      run identity, bundle pin, entity/flow identity, and terminal transition
      timestamp are the only inputs. Callers cannot supply an arbitrary event or
      receipt identity.
    deterministic_event_id: uuid_v5(terminal_decision_card_evidence_namespace, card_id)
    receipt_identity:
      event_id: deterministic_terminal_evidence_event_id
      subscriber_type: platform
      subscriber_id: pipeline
    receipt_id_policy: opaque_storage_key_not_semantic_idempotency_authority
    event_contract:
      event_name: mailbox.card_superseded
      produced_by: platform
      produced_by_type: platform
      run_id: locked_card_run_id
      entity_id: locked_card_entity_id
      flow_instance: locked_card_flow_instance
      created_at: persisted_terminal_transition_timestamp
      payload_fields:
        - card_id
        - stage_activation_id
        - reason
    receipt_contract:
      subscriber_type: platform
      subscriber_id: pipeline
      outcome: success
      reason_code: terminal_evidence_only
      side_effects:
        manager_status: processed
        reason_code: terminal_evidence_only
        emitted_or_state_effects: none
      meaning: persistence_only_terminal_handler_completed_not_agent_or_workflow_execution
    transaction_order:
      - lock_and_validate_active_run_pending_card_and_gate_activation
      - derive_deterministic_event_and_receipt_identity
      - supersede_gate_card_drafts_and_change_cursor
      - append_exact_event_row_without_generic_terminal_admission
      - append_exact_typed_platform_pipeline_receipt
      - commit_status_specific_delivery_session_timer_claim_and_control_quiescence
      - commit_run_terminal_status_failure_and_ended_at
      - update_run_counters_from_the_same_transactional_state
    forbidden_effects:
      - decision_card_lifecycle_outbox_row
      - route_plan_or_preview
      - replay_scope
      - event_delivery_or_route_manifest
      - agent_or_node_recipient_receipt
      - EventBus_publish_or_outbox
      - startup_or_sweeper_recovery_claim
      - stopped_run_or_terminal_admission_bypass
      - process_local_route_agent_handler_timer_or_session_mutation
    operation_results:
      terminal_evidence_created: >-
        Pending card/gate, exact event, typed receipt, terminal child quiescence,
        run/control status, and counters commit together.
      terminal_evidence_exact_retry: >-
        The same card is already superseded by the same terminal transition and
        the deterministic event, receipt, run/control outcome, and counters are
        exact. The whole operation returns without mutation.
      terminal_evidence_conflict: >-
        Existing event, receipt, card/gate outcome, terminal reason/status,
        identity, payload, timestamp, run/control evidence, or counters conflict
        or are partial. The operation fails closed without repair or expansion.
    crash_rule: >-
      There is one selected-store commit. Before commit no terminal evidence or
      terminal transition is visible; after commit the evidence is complete and
      already handled. No post-commit release or dispatch window exists.

