superseded_terminal_lifecycle_outbox_reaudit:
  status: superseded_non_binding
  superseded_by: terminal_decision_card_evidence_reaudit
  superseding_ruling: https://github.com/division-sh/swarm/issues/2007#issuecomment-4964810988
  audit_base: c93b0bc26782c68ba30b1ea3902db20b1c9addd7
  gate_outcome_being_repaired: insufficient_widen_class_recipient_execution
  issue_category: high_risk_runtime_semantic_ownership_terminal_lifecycle_backend_parity_and_supported_eventbus_behavior
  observed_symptom: >-
    Terminal run owners atomically supersede pending decision cards and persist
    mailbox.card_superseded publication intents, but every ordinary EventBus
    publication and recovery path correctly rejects the terminal or stopped
    predecessor. A persistence-only exception would strand committed rows,
    while delivering either agent or node routes invokes normal runtime work
    after terminalization and can perform irreversible side effects before a
    later admission fence runs.
  exact_semantic_concepts:
    - typed_terminal_run_lifecycle_publication_intent
    - atomic_event_route_manifest_and_replay_scope_materialization
    - persisted_intent_authorized_non_executable_route_settlement
    - agent_and_workflow_node_non_execution_for_terminal_predecessors
    - event_owned_terminal_receipt_and_restart_recovery_exclusion
    - sqlite_postgres_transaction_and_recovery_parity
  chosen_working_failure_class: typed_terminal_lifecycle_outbox_materialization_and_non_executable_route_settlement_convergence
  immediate_parent_failure_class: status_specific_terminalization_typed_event_admission
  parent_failure_class: declaration_owned_standing_service_reconciliation_status_specific_terminalization_typed_event_admission_and_inbound_publication_operations
  broadest_parent_failure_class: durable_runtime_desired_state_and_status_specific_terminal_lifecycle_atomicity
  framing_decision: broad_enough_after_absorbing_materialization_and_all_routing_execution_recipient_settlement
  entry_point_not_boundary: >-
    The post-rebase duplicate-admission failure and ReleaseDecisionCardLifecycleEvents
    were entry points only. The boundary includes all terminal producers, all
    release consumers, selected-store materialization, every recipient class,
    stopped-run settlement, receipt finalization, crash/restart exclusion,
    cleanup, corruption, every normal agent OnEvent entry, and both backends.
  binding_governing_context:
    lead_gate: https://github.com/division-sh/swarm/issues/2007#issuecomment-4964484845
    pr_freeze: https://github.com/division-sh/swarm/pull/2047#issuecomment-4964485739
    recipient_execution_gate: https://github.com/division-sh/swarm/issues/2007#issuecomment-4964599843
    recipient_execution_pr_freeze: https://github.com/division-sh/swarm/pull/2047#issuecomment-4964599985
    issue_and_existing_audit: issue_2007_and_this_artifact
    exact_spec_refs:
      - platform-spec.yaml#platform_tables.decision_card_lifecycle_outbox
      - 'platform-spec.yaml#platform_events.catalog["mailbox.card_superseded"]'
      - platform-spec.yaml#api_specification.conventions.mailbox.decision_event_payload_contract
      - platform-spec.yaml#contract_formats.event_schema.routing_derivation.route_plan_authority
      - platform-spec.yaml#contract_formats.event_schema.delivery_filter
      - platform-spec.yaml#engine.runtime_boot.active_run_abandon_quiescence
      - platform-spec.yaml#platform_tables.destructive_reset_cleanup_policy
    spec_action: >-
      The implementation PR must replace the current generic EventBus publication
      claim with typed materialization plus atomic terminal settlement of every
      routing-execution route. The spec must distinguish active-run routable
      mailbox.card_superseded events from terminal-run lifecycle evidence: the
      latter is readable through persisted run-independent event/audit surfaces
      but never invokes agent OnEvent, workflow carriers, interceptors, or
      handlers. Issue prose is not a merge artifact.

  full_relevant_execution_path:
    - a_terminal_owner_locks_the_run_gate_activations_cards_and_terminal_side_effects
    - pending_cards_are_superseded_and_one_immutable_lifecycle_intent_per_card_is_inserted_in_the_same_transaction
    - the_terminal_run_and_control_state_commit_before_lifecycle_materialization
    - an_immediate_startup_periodic_or_pre_cleanup_releaser_enumerates_pending_intents
    - the_exact_bundle_owner_constructs_one_canonical_route_plan_for_a_pending_intent
    - the_selected_store_typed_mutation_locks_and_validates_intent_run_card_event_and_existing_effects
    - event_replay_scope_complete_route_manifest_terminal_delivery_receipts_and_pipeline_receipt_materialize_atomically_with_outbox_completion
    - both_agent_and_workflow_node_routes_are_terminally_settled_without_runtime_consumer_invocation
    - persisted_event_and_audit_read_surfaces_may_observe_after_commit_without_route_authority
    - exact_retry_or_restart_validates_the_completed_operation_and_schedules_no_dispatch_or_replay
  reachability_gates:
    terminal_producer_transaction: same_chosen_class
    exact_loaded_bundle_resolution: same_chosen_class_and_must_fail_retryably_when_unavailable
    route_plan_construction: same_chosen_class_first_materialization_only
    typed_intent_integrity_validation: same_chosen_class
    ordinary_terminal_event_admission: different_semantic_concept_and_remains_closed
    generic_run_dispatch_gate: different_semantic_owner_and_remains_closed
    event_owned_delivery_and_receipt_rows: existing_downstream_owner_terminally_finalized_by_this_class
    agent_manager_OnEvent_pipeline: explicitly_prohibited_for_this_class
    workflow_node_handler_pipeline: explicitly_prohibited_for_this_class
    internal_observation_hooks: different_non_routing_semantic_concept

  canonical_owners:
    terminal_intent_producer: supersedeDecisionCardsForRun_inside_each_terminal_owner_transaction
    immutable_intent_store: decision_card_lifecycle_outbox
    selected_store_materialization_owner: TerminalLifecycleOutboxMaterializationMutation
    route_authority_owner: canonical_EventBus_RoutePlan_for_the_exact_pinned_bundle
    terminal_route_settlement_owner: TerminalLifecycleRouteSettlementMutation
    delivery_outcome_owner: event_deliveries_event_receipts_and_pipeline_receipt_finalized_inside_materialization
    non_executable_observation_owner: persisted_event_run_read_audit_debug_and_metric_surfaces_only
    generic_terminal_admission_owner: typed_event_admission_from_issue_2007_remains_closed
    destructive_cleanup_owner: runtime_nuke_plan_quiescence_release_then_cleanup
    owner_judgment: >-
      These are semantic owners. ReleaseDecisionCardLifecycleEvents, one SQL
      insert helper, an event-name check, a context flag, RunDispatchBlocked
      bypass, normal agent subscription, or Agent.OnEvent is not an owner.

  persisted_operation_contract:
    input_authority: >-
      The caller supplies only an intent identifier and the first-materialization
      canonical route plan. The mutation reloads every semantic event field from
      the locked outbox row and refuses caller-authored event identity, payload,
      run, card, bundle, entity, flow, or timestamp substitutions.
    immutable_identity_fields:
      - event_id
      - card_id
      - run_id
      - bundle_hash
      - event_name
      - canonical_payload
      - entity_id
      - flow_instance
      - created_at
    materialization_integrity_fields:
      - materialization_version
      - committed_replay_scope
      - immutable_route_manifest_hash
      - immutable_route_count
      - terminally_settled_agent_route_count
      - terminally_settled_node_route_count
      - completed_at
    route_manifest_hash_scope: >-
      The hash covers normalized subscriber type/id, target identity, delivery
      context, and the required terminal-settlement disposition. Every delivery
      and receipt is final at first commit; the summary remains an immutable
      integrity cross-check rather than a second dispatch owner.
    first_materialization_transaction:
      - lock_and_validate_pending_intent_card_and_terminal_predecessor
      - reject_any_conflicting_event_or_partial_effects
      - insert_the_exact_platform_event_without_generic_terminal_admission
      - persist_committed_subscribed_replay_scope
      - persist_all_agent_and_node_route_rows_as_dead_letter_terminal_predecessor_observation_only
      - persist_matching_terminal_agent_and_node_receipts
      - persist_terminal_pipeline_receipt
      - persist_immutable_route_integrity_summary_on_the_outbox_row
      - transition_pending_to_completed_in_the_same_commit
    result_vocabulary:
      pending_intent_materialized: >-
        The intent exists and is pending, the event/effects are absent, all exact
        rows and outbox completion commit atomically, and no dispatch happened
        before commit.
      already_materialized_exact_retry: >-
        A concurrent winner materialized the exact immutable event, replay scope,
        route set, and outbox summary. The loser performs no mutation and returns
        the existing operation result.
      completed_exact_retry: >-
        The outbox is completed and the immutable event, scope, terminal
        agent/node deliveries, recipient receipts, pipeline receipt, and summary
        all match. No runtime dispatch or recovery is scheduled.
      conflict_or_corruption: >-
        The intent is absent, malformed, mismatched, nonterminal, associated with
        a different card/run/bundle/event/payload/entity/flow, or accompanied by
        missing, extra, partial, or conflicting event-owned rows. The operation
        fails closed with zero mutation.
    exact_retry_rule: >-
      An exact retry never invokes current route planning, adds recipients,
      changes scope/manifest, opens a delivery, or invokes EventBus, AgentManager,
      Agent.OnEvent, workflow carriers, interceptors, or handlers.
    completion_meaning: >-
      Outbox completed means immutable evidence and terminal settlement of every
      routing-execution route committed together. Event-owned delivery/receipt
      rows remain authoritative, but there is no post-commit executable delivery
      phase. The completed outbox row remains the durable authorization and
      integrity link.

