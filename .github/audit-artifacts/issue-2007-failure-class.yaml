      Persistence-only terminal evidence was modeled as deferred runtime work,
      forcing bundle ownership, route planning, recipients, delivery settlement,
      and recovery after the run was already terminal.
    long_run_direction: >-
      Lifecycle transitions persist their non-executable evidence and typed
      handled receipt in the same transaction. EventBus and route ownership are
