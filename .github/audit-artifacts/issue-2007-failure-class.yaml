normalized_batch_reaudit:
  issue_category: high_risk_runtime_architecture_semantic_drift_failure_class_and_backend_parity
  observed_symptom: >-
    Current master permits one provider delivery to produce an ordered raw plus
    normalized event batch, while the previously approved ledger can represent
    only one executable publication event. Rebasing that model would drop child
    identity, duplicate readback, rollback, or recovery coverage.
  chosen_working_failure_class: ordered_provider_delivery_publication_operation_atomicity
  immediate_parent_failure_class: typed_event_admission_and_inbound_publication_operations
  parent_failure_class: declaration_owned_standing_service_reconciliation_status_specific_terminalization_typed_event_admission_and_inbound_publication_operations
  broadest_parent_failure_class: durable_runtime_desired_state_and_status_specific_terminal_lifecycle_atomicity
  class_stop_reason: >-
    Raw and normalized outputs share one external provider identity, target,
    acknowledgement, selected-store transaction, and retry result. Generic
    EventBus publication, response-only provider challenges, diagnostic replay,
    and agent directives have different identity and side-effect owners.
  framing_decision: broad_enough_after_absorbing_current_master_ordered_batch
  entry_point_not_boundary: >-
    The merge conflict against PublishInboundDelivery was only the entry point.
    The audit boundary includes request authentication and retry identity,
    provider output projection, standing/run admission, all event/lifecycle/reply
    mutations, evidence, response readback, dispatch/recovery, corruption,
    schema/reset, and both selected stores.
  full_execution_path:
    - resolve_exact_loaded_standing_target
    - authenticate_and_normalize_stable_provider_request_semantics
    - load_parent_and_children_by_provider_identity_before_output_projection
    - return_exact_committed_original_children_or_refuse_request_conflict
    - for_absent_identity_derive_and_authorize_current_ordered_output_batch
    - lock_identity_service_and_run_in_selected_store_mutation_and_recheck
    - append_each_event_and_run_transaction_local_route_lifecycle_and_reply_planning
    - persist_each_event_owned_scope_delivery_and_receipt_set_plus_child_integrity_link
    - append_one_parent_evidence_event_and_finalize_parent
    - commit_then_publish_staged_local_state_and_dispatch_or_recover_each_child
    - return_original_ordered_child_ids_and_names_under_the_original_acknowledgement_mode
  path_gates:
