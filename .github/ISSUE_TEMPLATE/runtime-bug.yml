name: Runtime Bug
description: Report a runtime symptom, incident, conformance failure, or recurring operational failure pattern for repro / classification.
title: "[runtime bug] "
labels:
  - bug
  - runtime
body:
  - type: markdown
    attributes:
      value: |
        Use this for runtime symptom intake and concrete failure reports.

        Before submitting:
        - check [CONTRIBUTING.md](https://github.com/yazzaoui/Swarm/blob/main/CONTRIBUTING.md)
        - use [SECURITY.md](https://github.com/yazzaoui/Swarm/blob/main/SECURITY.md) instead for suspected vulnerabilities

        This issue only needs to be good enough to start repro / identification.

        Default rule:
        - a bug report starts as a symptom report, not as a confirmed implementation class
        - if current-head repro / classification is not done yet, say so explicitly
        - do not force a confirmed root cause, canonical owner, or fix shape when they are still unknown
        - implementation should not start until repro / classification is complete

  - type: dropdown
    id: suggested_category
    attributes:
      label: Suggested Handling
      description: Suggest the current handling state. Lead/triage assigns the final category.
      options:
        - bug-intake / needs repro-classification
        - likely live bug
        - likely parity / semantic-drift bug
        - likely local bug
        - uncertain yet
    validations:
      required: true

  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What actually happened? Use concrete runtime behavior, test failure, run ID, or operator-visible symptom.
      placeholder: |
        Example:
        validation agents emit `research.completed` but `business_brief` is still absent from entity state
    validations:
      required: true

  - type: textarea
    id: observed_path
    attributes:
      label: Exact Observed Path / Surface
      description: Name the exact path, helper, endpoint, runtime surface, or operator flow where the symptom was observed. If unknown, write `unknown yet`.
      placeholder: |
        Example:
        supported helper run.start path -> builder RPC -> run control -> persisted runs row
    validations:
      required: true

  - type: textarea
    id: generic_bug_class
    attributes:
      label: Initial Hypotheses / Candidate Failure Classes
      description: List the plausible explanations. Do not force one confirmed class if repro / identification has not happened yet.
      placeholder: |
        Example:
        - actor-scoped tool availability drift
        - wrong execution path exercised
        - transport-specific tool-surface mismatch
        - stale or environment-specific report
    validations:
      required: true

  - type: textarea
    id: parent_failure_class
    attributes:
      label: Likely Parent / Related Failure Class
      description: If this looks like a child slice of a broader parent class, name it. Otherwise write `none known yet`.
      placeholder: |
        Example:
        cross-surface flow-owned session-scope proof drift across verify, boot, and runtime startup
    validations:
      required: false

  - type: dropdown
    id: process_status
    attributes:
      label: Process Status
      description: Is this a symptom-intake issue, or is it already classified enough to assign directly?
      options:
        - symptom intake / needs repro-classification
        - direct-assignable
        - umbrella / watchpoint
        - blocked on prerequisite
        - unknown yet
    validations:
      required: true

  - type: textarea
    id: known_manifestations
    attributes:
      label: Known Manifestations
      description: List the known manifestations as extensively as the currently available evidence supports. Prefer over-enumeration to collapsing multiple manifestations into one prose sentence.
      placeholder: |
        - manifestation 1:
        - manifestation 2:
        - manifestation 3:
        - if only one is known so far, say that explicitly
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Why does this matter operationally or architecturally?
      placeholder: |
        Example:
        causes false progression, hides real persistence failure, and burns agent turn budget
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Concrete evidence only. Include tests, logs, run IDs, code references, screenshots, or exact error text.
      placeholder: |
        - run id:
        - failing test:
        - log excerpt:
        - file references:
    validations:
      required: true

  - type: textarea
    id: generic_proof_plan
    attributes:
      label: Current-Head Repro Status / Known Reproducer
      description: State whether the symptom is reproduced on current head, and give the best known reproducer. If it has not been checked yet, say so explicitly.
      placeholder: |
        - current-head status: not checked yet
        - observed path:
        - reproduced path:
        - generic reproducer:
    validations:
      required: true

  - type: dropdown
    id: suggested_pre_audit_gate
    attributes:
      label: Suggested Pre-Audit Gate
      description: Suggest whether independent pre-audit review should be required once the bug is classified enough for implementation. Lead/triage makes the final call.
      options:
        - required
        - likely required
        - maybe
        - not expected
    validations:
      required: true

  - type: dropdown
    id: intended_closure_level
    attributes:
      label: Intended Closure Level
      description: If this becomes a classified implementation issue, what is the honest target?
      options:
        - local symptom fixed
        - touched seam canonicalized
        - failure class eliminated
        - unknown yet
    validations:
      required: true

  - type: textarea
    id: tracker_mapping
    attributes:
      label: Tracker Mapping
      description: Name the existing parent/tracker issue this symptom likely belongs to, or write `unknown yet` / `needs node/refinement`.
      placeholder: |
        Example:
        parent issue #123 -> flow-owned session scope proof
    validations:
      required: false

  - type: textarea
    id: likely_parent_action
    attributes:
      label: Likely Parent-Class Action After Pre-Audit
      description: If a broader parent class exists, what is the most likely action after repro / pre-audit?
      placeholder: |
        One of:
        - absorb parent now
        - keep first-slice scope
        - open or update dedicated follow-up stream
        - leave parent explicitly open as still unproven
        - none known yet
    validations:
      required: false

  - type: textarea
    id: likely_cause
    attributes:
      label: Likely Cause
      description: Initial hypothesis before full root-cause confirmation.
      placeholder: |
        Example:
        duplicated authorization semantics between gateway and executor
    validations:
      required: false

  - type: textarea
    id: root_cause
    attributes:
      label: Confirmed Root Cause
      description: Fill this only if already confirmed. Otherwise write `unknown yet`.
      placeholder: |
        Example:
        context handling still depended on a gateway-private fallback list instead of the canonical capability model
    validations:
      required: false

  - type: textarea
    id: canonical_owner
    attributes:
      label: Likely Canonical Owner / Owner Chain
      description: Which module, model, or owner chain probably governs this after repro / classification? If unknown, write `unknown yet`.
      placeholder: |
        Example:
        internal/runtime/core/toolcapabilities
    validations:
      required: false

  - type: textarea
    id: spec_authority
    attributes:
      label: Platform Spec Reference
      description: Link the authoritative platform spec section(s), or write `no direct spec section yet`.
      placeholder: |
        Example:
        platform-spec.yaml#L123
    validations:
      required: true

  - type: checkboxes
    id: smell_flags
    attributes:
      label: Architecture Smell Flags
      description: Check all that apply.
      options:
        - label: heuristic fallback
        - label: duplicate semantic implementation
        - label: product-specific leakage into runtime
        - label: branch-heavy control flow
        - label: compatibility logic in hot path
        - label: missing observability
        - label: missing typed descriptor / abstraction

  - type: textarea
    id: fix_shape
    attributes:
      label: Proposed Fix Shape If Already Known
      description: Describe the likely fix at the architectural level only if already known. Otherwise write `unknown yet`.
      placeholder: |
        Example:
        centralize this decision in one shared policy helper and remove the duplicate gateway path
    validations:
      required: false

  - type: textarea
    id: what_should_have_caught_it
    attributes:
      label: What Should Have Caught It
      description: Which invariant, test, boot check, or observability surface should have surfaced this earlier?
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Required Tests
      description: List the focused invariants and any broader regression coverage needed. Cover the failure class, not only the first symptom.
      placeholder: |
        - focused unit/conformance test:
        - integration/fixture regression:
    validations:
      required: true

  - type: input
    id: tracker_link
    attributes:
      label: Tracker Link
      description: Link the relevant parent/tracker issue, or write `unknown yet` / `new entry needed`.
      placeholder: https://github.com/...
    validations:
      required: false

  - type: checkboxes
    id: merge_constraints
    attributes:
      label: Merge Constraints
      description: This issue should not be considered fixed unless these are true.
      options:
        - label: fix removes semantic duplication instead of adding another local patch
        - label: no new heuristic fallback is introduced
        - label: no product-specific rule is embedded into shared runtime semantics
        - label: targeted tests exist
        - label: tracker state was updated
