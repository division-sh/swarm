name: Runtime Improvement
description: Propose a runtime architecture improvement, cleanup initiative, or backlog item from the watchlist.
title: "[runtime improvement] "
labels:
  - enhancement
  - runtime
  - architecture
body:
  - type: markdown
    attributes:
      value: |
        Use this for runtime architecture improvements and refactor initiatives.

        This template is intended for items derived from:
        - [RUNTIME_IMPROVEMENTS_AND_WATCHLIST.md](https://github.com/yazzaoui/Swarm/blob/main/docs/RUNTIME_IMPROVEMENTS_AND_WATCHLIST.md)
        - implementation plans in `docs/`

        Every improvement issue should define:
        - the semantic owner
        - the scope boundary
        - the acceptance criteria
        - the forbidden shortcuts

        This issue only needs to be good enough to assign.

        The implementer pre-audit is still the real gate before coding starts.
        Use this template to capture the broadest problem class you can honestly defend, plus the most extensive manifestation set you currently know.

  - type: dropdown
    id: suggested_category
    attributes:
      label: Suggested Category
      description: Suggest the process category. Lead/triage assigns the final category.
      options:
        - semantic-drift
        - failure-class
        - parity
        - high-risk maintenance
        - local
    validations:
      required: true

  - type: input
    id: source_backlog_item
    attributes:
      label: Source Backlog Item
      description: Which watchlist item or plan item does this come from?
      placeholder: |
        Example:
        RUNTIME_IMPROVEMENTS_AND_WATCHLIST.md - High Priority #15
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the architectural problem this issue addresses.
    validations:
      required: true

  - type: textarea
    id: generic_problem_class
    attributes:
      label: Generic Problem Class
      description: Describe the broader platform-level failure or smell class. Do not describe only the first symptom, incident, or example.
      placeholder: |
        Example:
        package-backed flow ownership proof is lost before session-scope validation in boot verification
    validations:
      required: true

  - type: textarea
    id: parent_failure_class
    attributes:
      label: Parent Failure Class
      description: If this issue is likely a child slice of a broader parent failure class, name that parent. Otherwise write `none known yet`.
      placeholder: |
        Example:
        typed persisted operator reads should never infer missing schema capabilities locally
    validations:
      required: true

  - type: dropdown
    id: process_status
    attributes:
      label: Process Status
      description: Is this issue directly assignable, or is it mainly an umbrella/watchpoint that should not be assigned as-is?
      options:
        - direct-assignable
        - umbrella / watchpoint
        - blocked on prerequisite
        - unknown yet
    validations:
      required: true

  - type: textarea
    id: known_manifestations
    attributes:
      label: Known Manifestations
      description: List the known manifestations as extensively as the currently available evidence supports. Prefer over-enumeration to collapsing multiple manifestations into one prose sentence.
      placeholder: |
        - manifestation 1:
        - manifestation 2:
        - manifestation 3:
        - if only one is known so far, say that explicitly
    validations:
      required: true

  - type: textarea
    id: why_now
    attributes:
      label: Why This Matters
      description: Why should this be prioritized now? Tie it to real incidents, debugging cost, or architectural leverage.
    validations:
      required: true

  - type: dropdown
    id: suggested_pre_audit_gate
    attributes:
      label: Suggested Pre-Audit Gate
      description: Suggest whether independent pre-audit review should be required before coding. Lead/triage makes the final call.
      options:
        - required
        - likely required
        - maybe
        - not expected
    validations:
      required: true

  - type: dropdown
    id: intended_closure_level
    attributes:
      label: Intended Closure Level
      description: What is the honest target if this issue is solved as written?
      options:
        - local symptom fixed
        - touched seam canonicalized
        - failure class eliminated
        - unknown yet
    validations:
      required: true

  - type: textarea
    id: watchlist_mapping
    attributes:
      label: Watchlist Mapping
      description: Name the existing watchlist node this issue belongs to, or write `needs node/refinement`.
      placeholder: |
        Example:
        operator-surfaces.yaml -> typed_persisted_operator_reads
    validations:
      required: true

  - type: textarea
    id: likely_parent_action
    attributes:
      label: Likely Parent-Class Action After Pre-Audit
      description: If a broader parent class exists, what is the most likely action after pre-audit?
      placeholder: |
        One of:
        - absorb parent now
        - keep first-slice scope
        - open or update dedicated follow-up stream
        - leave parent explicitly open as still unproven
        - none known yet
    validations:
      required: true

  - type: textarea
    id: current_smell
    attributes:
      label: Current Smell
      description: What exact smell pattern is present now?
      placeholder: |
        Examples:
        - distributed semantics
        - heuristic fallback
        - product leakage
        - branch-heavy core logic
        - duplicate semantic ownership
    validations:
      required: true

  - type: textarea
    id: canonical_owner
    attributes:
      label: Target Canonical Owner
      description: What module, abstraction, or compiled semantic artifact should own the logic after this work?
    validations:
      required: true

  - type: textarea
    id: spec_authority
    attributes:
      label: Platform Spec Reference
      description: Link the authoritative platform spec section(s), or write `spec update required`.
      placeholder: |
        Example:
        docs/specs/swarm-platform/platform/contracts/platform-spec.yaml#L123
    validations:
      required: true

  - type: textarea
    id: generic_proof_plan
    attributes:
      label: Generic Reproducer / Proof Plan
      description: State the minimal generic reproducer, failing proof, or invariant bundle that will prove this problem class in the touched seam. If none exists yet, say so explicitly and require the implementer to derive one.
      placeholder: |
        Example:
        - generic reproducer: focused semanticview/bootverify fixture for package-backed flow ownership
        - if missing: implementer must create the first failing proof as part of the work
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What files/modules are in scope? What is explicitly out of scope?
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Define concrete “done” conditions.
      placeholder: |
        - one canonical semantic owner exists
        - no alternate meaningful path remains
        - targeted tests are green
        - full suite is green
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: Test Plan
      description: Which focused invariants and broader regression tests prove the problem class is fixed, not only the first visible symptom?
    validations:
      required: true

  - type: textarea
    id: observability
    attributes:
      label: Observability / Diagnostics
      description: What runtime decision or operator signal should become clearer after this work?
    validations:
      required: false

  - type: textarea
    id: forbidden_shortcuts
    attributes:
      label: Forbidden Shortcuts
      description: Explicitly state what implementers must not do.
      placeholder: |
        - no heuristic fallback
        - no product-specific exceptions in core runtime
        - no second semantic implementation in a sibling layer
        - no branch-heavy patch that preserves the old smell
    validations:
      required: true

  - type: textarea
    id: worktree_scope
    attributes:
      label: Suggested Ownership Boundary
      description: For multi-implementer work, define the recommended write surface and coordination boundary.
      placeholder: |
        Primary files/modules:
        - ...

        Avoid editing:
        - ...
    validations:
      required: false

  - type: checkboxes
    id: merge_constraints
    attributes:
      label: Merge Constraints
      description: This issue should not be considered complete unless these are true.
      options:
        - label: implementation follows IMPLEMENTER_GUIDELINES.md
        - label: IMPLEMENTER_REVIEW_CHECKLIST.md was applied
        - label: no new fallback semantics were introduced
        - label: no product leakage into shared runtime code was introduced
        - label: duplicate semantic logic was removed or reduced
        - label: targeted tests exist
        - label: full relevant suite is green
