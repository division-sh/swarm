name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: Proof profile to execute
        required: false
        default: full
        type: choice
        options: [full, nightly, pr-common, pr-escalated]
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: ci-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  ci-plan:
    name: CI plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      proof_matrix: ${{ steps.plan.outputs.proof_matrix }}
      profile: ${{ steps.plan.outputs.profile }}
      plan_digest: ${{ steps.plan.outputs.plan_digest }}
      execution_sha: ${{ steps.plan.outputs.execution_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Plan proof topology
        id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          FORCED_PROFILE: ${{ inputs.profile }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          execution_sha=$(git rev-parse HEAD)
          test "$execution_sha" = "$EVENT_SHA"
          go list ./... > test-results/go-packages.txt
          : > test-results/changed-files.txt
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --name-only "$BASE_SHA" "$PR_HEAD_SHA" > test-results/changed-files.txt
          fi

          profile_args=()
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$FORCED_PROFILE" ]; then
            profile_args=(-profile "$FORCED_PROFILE")
          fi
          go run ./cmd/swarm-test-timing \
            -plan-ci \
            -proof-policy .github/test-proof-plan.yaml \
            -weight-model .github/test-timing-weights.json \
            -packages test-results/go-packages.txt \
            -changed-files test-results/changed-files.txt \
            -event "$EVENT_NAME" \
            -head-sha "$execution_sha" \
            -plan test-results/proof-plan.json \
            -matrix test-results/proof-matrix.json \
            -markdown test-results/proof-plan.md \
            "${profile_args[@]}"

          echo "proof_matrix=$(jq -c . test-results/proof-matrix.json)" >> "$GITHUB_OUTPUT"
          echo "profile=$(jq -r .profile test-results/proof-plan.json)" >> "$GITHUB_OUTPUT"
          echo "plan_digest=$(jq -r .digest test-results/proof-plan.json)" >> "$GITHUB_OUTPUT"
          echo "execution_sha=$execution_sha" >> "$GITHUB_OUTPUT"
          cat test-results/proof-plan.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proof plan
        uses: actions/upload-artifact@v4
        with:
          name: ci-plan
          path: |
            test-results/go-packages.txt
            test-results/changed-files.txt
            test-results/proof-plan.json
            test-results/proof-matrix.json
            test-results/proof-plan.md
          if-no-files-found: error

  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          test -z "$unformatted" || { echo "Files not formatted:"; echo "$unformatted"; exit 1; }
      - name: Build packages
        run: go build ./...
      - name: Build swarm binary
        run: go build ./cmd/swarm
      - name: Check OpenRPC artifact
        run: go run ./cmd/swarm-openrpc-gen --check
      - name: Vet
        run: go vet ./...

  sqlite-local-dev:
    name: ${{ github.event_name == 'workflow_dispatch' && 'Full dispatch SQLite smoke' || 'SQLite local smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build swarm binary
        run: go build ./cmd/swarm
      - name: Build workspace image
        run: docker build -t swarm-workspace:latest -f Dockerfile.workspace .
      - name: Prove no-selector SQLite local run
        run: |
          payload=$(mktemp)
          printf '{"entity_id":"11111111-1111-4111-8111-111111111111"}\n' > "$payload"
          ./swarm run start \
            --config .github/fixtures/sqlite-local-smoke.swarm.yaml \
            --contracts tests/tier1-primitives/test-emits-single \
            --data "${{ github.workspace }}/data" \
            --event item.received \
            --payload "$payload" \
            --api-port 18091

  proof-unit:
    name: Go proof ${{ matrix.unit }}
    needs: [ci-plan]
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.ci-plan.outputs.proof_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci-plan.outputs.execution_sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Download exact proof plan
        uses: actions/download-artifact@v4
        with:
          name: ci-plan
          path: test-results/plan
      - name: Restore measured Go cache
        id: go-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-test-${{ runner.os }}-${{ matrix.unit }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            go-test-${{ runner.os }}-${{ matrix.unit }}-master-
            go-test-${{ runner.os }}-${{ matrix.unit }}-
            go-test-${{ runner.os }}-
      - name: Run exact planned proof unit
        shell: bash
        env:
          UNIT_ID: ${{ matrix.unit }}
          SWARM_TOOL_GATEWAY_URL: ""
          SWARM_TOOL_GATEWAY_CONTAINER_URL: ""
          SWARM_TOOL_GATEWAY_TOKEN: ""
        run: |
          set -euo pipefail
          mkdir -p test-results/evidence
          plan=test-results/plan/proof-plan.json
          go run ./cmd/swarm-test-timing -assert-execution-sha \
            -plan "$plan" -execution-sha "$(git rev-parse HEAD)"
          unit=$(jq -cer --arg id "$UNIT_ID" '.units[] | select(.id == $id)' "$plan")
          mapfile -t packages < <(jq -r '.packages[]' <<<"$unit")
          test_pattern=$(jq -r '.run // empty' <<<"$unit")
          count_mode=$(jq -r '.count_mode' <<<"$unit")
          count_args=()
          if [ "$count_mode" = "count-1" ]; then count_args=(-count=1); fi
          run_args=()
          if [ -n "$test_pattern" ]; then run_args=(-run "$test_pattern"); fi
          primary_json="test-results/evidence/${UNIT_ID}-primary.json"
          primary_evidence="test-results/evidence/${UNIT_ID}-primary-evidence.json"

          start=$(date +%s)
          set +e
          go run ./cmd/swarm-test-postgres -- go test "${packages[@]}" "${run_args[@]}" "${count_args[@]}" -json | tee "$primary_json"
          status=${PIPESTATUS[0]}
          set -e
          elapsed=$(( $(date +%s) - start ))
          go run ./cmd/swarm-test-timing -record-evidence \
            -plan "$plan" -unit "$UNIT_ID" -attempt primary \
            -input "$primary_json" -evidence "$primary_evidence" \
            -elapsed-seconds "$elapsed" -exit-code "$status"

          confirmation_status=0
          if [ "$status" -eq 0 ]; then
            confirm=$(go run ./cmd/swarm-test-timing -check-confirmation \
              -plan "$plan" -policy .github/test-timing-budgets.yaml -evidence "$primary_evidence")
            if [ "$confirm" = "true" ]; then
              confirmation_json="test-results/evidence/${UNIT_ID}-confirmation.json"
              confirmation_evidence="test-results/evidence/${UNIT_ID}-confirmation-evidence.json"
              confirmation_start=$(date +%s)
              set +e
              go run ./cmd/swarm-test-postgres -- go test "${packages[@]}" "${run_args[@]}" -count=1 -json | tee "$confirmation_json"
              confirmation_status=${PIPESTATUS[0]}
              set -e
              confirmation_elapsed=$(( $(date +%s) - confirmation_start ))
              go run ./cmd/swarm-test-timing -record-evidence \
                -plan "$plan" -unit "$UNIT_ID" -attempt confirmation \
                -input "$confirmation_json" -evidence "$confirmation_evidence" \
                -elapsed-seconds "$confirmation_elapsed" -exit-code "$confirmation_status"
            elif [ "$confirm" != "false" ]; then
              echo "invalid confirmation decision: $confirm" >&2
              exit 1
            fi
          fi
          go run ./cmd/swarm-test-timing -input "$primary_json" -markdown "test-results/evidence/${UNIT_ID}-timing.md"
          cat "test-results/evidence/${UNIT_ID}-timing.md" >> "$GITHUB_STEP_SUMMARY"
          test "$status" -eq 0
          test "$confirmation_status" -eq 0
      - name: Save measured Go cache
        if: github.event_name != 'pull_request' && steps.go-cache-restore.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-test-${{ runner.os }}-${{ matrix.unit }}-${{ github.ref_name }}-${{ github.sha }}
      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-${{ matrix.unit }}-timing
          path: test-results/evidence
          if-no-files-found: error

  semantic-smoke:
    name: Semantic smoke proofs
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Prove explicit Postgres opt-in selector
        run: go run ./cmd/swarm-test-postgres -- go test ./cmd/swarm -run TestRunServeRuntimeConsumesCanonicalStoreSelectionBeforeStoreConstruction -count=1
      - name: Prove runner-owned Docker service
        run: go run ./cmd/swarm-test-postgres -- go test ./internal/testutil -run '^TestStartPostgres_Smoke$' -count=1
      - name: Prove runner failure, interrupt, and hard-death reconciliation
        shell: bash
        run: |
          set -euo pipefail
          runner="$RUNNER_TEMP/swarm-test-postgres"
          go build -o "$runner" ./cmd/swarm-test-postgres
          set +e
          "$runner" -- sh -c 'exit 17'; child_status=$?
          set -e
          test "$child_status" -eq 17
          interrupt_pid="$RUNNER_TEMP/interrupt.pid"
          "$runner" -- sh -c 'echo $$ > "$1"; exec sleep 300' sh "$interrupt_pid" & runner_pid=$!
          for _ in $(seq 1 120); do test -s "$interrupt_pid" && break; sleep 0.25; done
          kill -TERM "$runner_pid"; wait "$runner_pid" || true
          test -z "$(docker ps -aq --filter label=com.division.swarm.test-postgres.managed=1)"
          hard_pid="$RUNNER_TEMP/hard.pid"
          "$runner" -- sh -c 'echo $$ > "$1"; exec sleep 300' sh "$hard_pid" & runner_pid=$!
          for _ in $(seq 1 120); do test -s "$hard_pid" && break; sleep 0.25; done
          kill -KILL "$runner_pid"; wait "$runner_pid" || true
          kill -TERM "$(cat "$hard_pid")" 2>/dev/null || true
          "$runner" -- true
          test -z "$(docker ps -aq --filter label=com.division.swarm.test-postgres.managed=1)"

  timing-budget:
    name: CI timing budget
    if: always()
    needs: [ci-plan, proof-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci-plan.outputs.execution_sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Download exact proof plan
        uses: actions/download-artifact@v4
        with:
          name: ci-plan
          path: test-results/plan
      - name: Download all proof evidence
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: proof-*-timing
          path: test-results/evidence
          merge-multiple: true
      - name: Evaluate complete plan-bound evidence
        if: always()
        run: |
          go run ./cmd/swarm-test-timing -assert-execution-sha \
            -plan test-results/plan/proof-plan.json -execution-sha "$(git rev-parse HEAD)"
          go run ./cmd/swarm-test-timing -evaluate-budget \
            -plan test-results/plan/proof-plan.json \
            -policy .github/test-timing-budgets.yaml \
            -weight-model .github/test-timing-weights.json \
            -evidence-root test-results/evidence \
            -result-json test-results/timing-budget-result.json \
            -markdown test-results/timing-budget-result.md
          cat test-results/timing-budget-result.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload timing budget result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timing-budget-result
          path: |
            test-results/timing-budget-result.json
            test-results/timing-budget-result.md
          if-no-files-found: warn

  required-tests:
    name: ${{ github.event_name == 'workflow_dispatch' && 'Full dispatch summary' || 'Required test summary' }}
    if: always()
    needs: [ci-plan, static-checks, sqlite-local-dev, proof-unit, semantic-smoke, timing-budget]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summarize required checks
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for item in \
            "ci-plan:${{ needs.ci-plan.result }}" \
            "static-checks:${{ needs.static-checks.result }}" \
            "sqlite-local-dev:${{ needs.sqlite-local-dev.result }}" \
            "proof-unit:${{ needs.proof-unit.result }}" \
            "semantic-smoke:${{ needs.semantic-smoke.result }}" \
            "timing-budget:${{ needs.timing-budget.result }}"
          do
            name="${item%%:*}"; result="${item#*:}"
            echo "- ${name}: \`${result}\`" >> "$GITHUB_STEP_SUMMARY"
            case "$result" in success|skipped) ;; *) failed=1 ;; esac
          done
          exit "$failed"

  publish-timing-model:
    name: Publish generated timing model
    if: github.event_name == 'schedule' && needs.required-tests.result == 'success'
    needs: [required-tests, ci-plan, proof-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: timing-model-publisher
    permissions:
      contents: read
    steps:
      - name: Mint repository-restricted publisher token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.TEST_MODEL_PUBLISHER_APP_ID }}
          private-key: ${{ secrets.TEST_MODEL_PUBLISHER_PRIVATE_KEY }}
          owner: division-sh
          repositories: swarm
          permission-actions: write
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ needs.ci-plan.outputs.execution_sha }}
      - name: Download exact proof plan
        uses: actions/download-artifact@v4
        with:
          name: ci-plan
          path: test-results/plan
      - name: Download successful proof evidence
        uses: actions/download-artifact@v4
        with:
          pattern: proof-*-timing
          path: test-results/evidence
          merge-multiple: true
      - name: Generate and publish model-only PR
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_RUN_ID: github-actions-${{ github.run_id }}
          EXECUTION_SHA: ${{ needs.ci-plan.outputs.execution_sha }}
        run: |
          set -euo pipefail
          go run ./cmd/swarm-test-timing -assert-execution-sha \
            -plan test-results/plan/proof-plan.json -execution-sha "$(git rev-parse HEAD)"
          result=$(go run ./cmd/swarm-test-timing -update-weight-model \
            -plan test-results/plan/proof-plan.json \
            -evidence-root test-results/evidence \
            -weight-model .github/test-timing-weights.json \
            -source-run-id "$SOURCE_RUN_ID")
          if [ "$result" = "unchanged" ]; then
            echo "Timing model unchanged; no generated PR." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          test "$result" = "changed"
          git diff --name-only > test-results/generated-diff.txt
          go run ./cmd/swarm-test-timing -validate-publish-diff \
            -changed-files test-results/generated-diff.txt

          branch=automation/test-timing-model
          staging_branch=automation/test-timing-model-build
          ref="heads/$branch"
          staging_ref="heads/$staging_branch"
          cleanup_staging() {
            gh api --method DELETE "repos/division-sh/swarm/git/refs/$staging_ref" >/dev/null 2>&1 || true
          }
          trap cleanup_staging EXIT
          if gh api "repos/division-sh/swarm/git/ref/$staging_ref" >/dev/null 2>&1; then
            gh api --method PATCH "repos/division-sh/swarm/git/refs/$staging_ref" \
              -f sha="$EXECUTION_SHA" -F force=true >/dev/null
          else
            gh api --method POST repos/division-sh/swarm/git/refs \
              -f ref="refs/$staging_ref" -f sha="$EXECUTION_SHA" >/dev/null
          fi
          blob_sha=$(gh api "repos/division-sh/swarm/contents/.github/test-timing-weights.json?ref=$staging_branch" --jq .sha)
          content=$(base64 < .github/test-timing-weights.json | tr -d '\n')
          generated_sha=$(gh api --method PUT repos/division-sh/swarm/contents/.github/test-timing-weights.json \
            -f message="test: refresh generated timing weights" \
            -f content="$content" -f branch="$staging_branch" -f sha="$blob_sha" --jq .commit.sha)
          if gh api "repos/division-sh/swarm/git/ref/$ref" >/dev/null 2>&1; then
            gh api --method PATCH "repos/division-sh/swarm/git/refs/$ref" \
              -f sha="$generated_sha" -F force=true >/dev/null
          else
            gh api --method POST repos/division-sh/swarm/git/refs \
              -f ref="refs/$ref" -f sha="$generated_sha" >/dev/null
          fi
          cleanup_staging
          trap - EXIT

          pr=$(gh pr list --head "$branch" --base master --state open --json number --jq '.[0].number // empty')
          if [ -z "$pr" ]; then
            gh pr create --base master --head "$branch" \
              --title "[automation][issue #1967] Refresh CI timing weights" \
              --body $'Generated from successful fresh CI evidence.\n\nGenerated file only; human review and normal protection required.\n\nPart of #1967.'
          else
            gh pr edit "$pr" --title "[automation][issue #1967] Refresh CI timing weights"
          fi
          gh workflow run ci.yml --ref "$branch" -f profile=full
