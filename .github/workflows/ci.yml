name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sqlite-local-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build swarm binary
        run: go build ./cmd/swarm

      - name: Prove no-selector SQLite local run
        env:
          SWARM_API_TOKEN: ci-local-dev-token
          SWARM_WORKSPACE_DATA_SOURCE: ${{ github.workspace }}/data
        run: |
          payload=$(mktemp)
          printf '{"entity_id":"11111111-1111-4111-8111-111111111111"}\n' > "$payload"
          ./swarm run \
            --contracts tests/tier1-primitives/test-emits-single \
            --event item.received \
            --payload "$payload" \
            --api-port 18091

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SWARM_TEST_POSTGRES_DSN: host=127.0.0.1 port=5432 user=postgres password=postgres dbname=postgres sslmode=disable
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show tool versions
        run: |
          go version
          docker --version

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build packages
        run: go build ./...

      - name: Build swarm binary
        run: go build ./cmd/swarm

      - name: Check OpenRPC artifact
        run: go run ./cmd/swarm-openrpc-gen --check

      - name: Vet
        run: go vet ./...

      - name: Prove explicit Postgres opt-in selector
        run: go test ./cmd/swarm -run TestRunServeRuntimeConsumesCanonicalStoreSelectionBeforeStoreConstruction -count=1

      - name: Run tests
        run: go test ./... -count=1
