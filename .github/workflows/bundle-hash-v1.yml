name: Bundle Hash v1

on:
  pull_request:
    paths:
      - ".github/workflows/bundle-hash-v1.yml"
      - "go.mod"
      - "go.sum"
      - "internal/runtime/contracts/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/bundle-hash-v1.yml"
      - "go.mod"
      - "go.sum"
      - "internal/runtime/contracts/**"

jobs:
  corpus:
    name: Bundle hash v1 corpus (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./internal/runtime/contracts -run BundleHashV1 -count=1
