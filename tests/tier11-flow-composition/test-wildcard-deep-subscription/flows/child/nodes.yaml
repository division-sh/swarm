relay:
  id: relay
  execution_type: system_node
  subscribes_to: [work.begin]
  produces: [grandchild/task.start]
  event_handlers:
    work.begin:
      create_entity: true
      emit: grandchild/task.start

listener:
  id: listener
  execution_type: system_node
  subscribes_to: [grandchild/task.done]
  produces: [work.finished]
  event_handlers:
    grandchild/task.done:
      advances_to: completed
      emit: work.finished
