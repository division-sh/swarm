lookup_data:
  description: Looks up data from the knowledge base (root v1).
  handler_type: http
  http:
    method: GET
    url: /api/v1/lookup
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: The search query.
  output_schema:
    type: string
    description: The search result.
