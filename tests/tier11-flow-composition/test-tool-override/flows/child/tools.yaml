lookup_data:
  description: Looks up data from the knowledge base (child v2 override).
  handler_type: http
  http:
    method: GET
    url: /api/v2/lookup
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: The search query.
  output_schema:
    type: string
    description: The search result.
