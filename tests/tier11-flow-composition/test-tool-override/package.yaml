name: test-tool-override
version: 1.0.0
description: >
  Child flow defines a tool with the same ID as a root-level tool.
  Within child, the child version takes precedence; root agent uses root version.
platform_version: ">=0.7.0 <0.8.0"
flows:
- id: child
  flow: child
  mode: static
connect:
  - from: child.child_done
    to: .child_done
