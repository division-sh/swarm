alpha-intake:
  id: alpha-intake
  execution_type: system_node
  subscribes_to: [alpha.start]
  produces: [internal.done]
  event_handlers:
    alpha.start:
      create_entity: true
      advances_to: working
      emit: internal.done

alpha-finisher:
  id: alpha-finisher
  execution_type: system_node
  subscribes_to: [internal.done]
  produces: [alpha.complete]
  event_handlers:
    internal.done:
      advances_to: processed
      emit:
        event: alpha.complete
        broadcast: true
