name: analyzer-flow
initial_state: idle
terminal_states: [analyzed]
states: [idle, analyzed]
required_agents:
  - role: analyzer
    subscribes_to: [analysis.requested]
    emits: [analysis.done]
    description: Analyzes data
pins:
  inputs:
    events:
    - name: analysis_requested
      event: analysis.requested
      source: external
  outputs:
    events:
    - name: analysis_done
      event: analysis.done
