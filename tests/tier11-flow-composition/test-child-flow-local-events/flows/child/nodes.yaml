child-intake:
  id: child-intake
  execution_type: system_node
  subscribes_to: [child.start]
  produces: [child.internal]
  event_handlers:
    child.start:
      advances_to: processing
      emits: child.internal

child-processor:
  id: child-processor
  execution_type: system_node
  subscribes_to: [child.internal]
  produces: [child.done]
  event_handlers:
    child.internal:
      advances_to: processed
      emits: child.done
