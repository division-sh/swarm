name: test-nested-three-levels
version: 1.0.0
description: Root declares child, child declares grandchild. Event routing works across 3 levels.
platform_version: ">=0.7.0 <0.8.0"
flows:
- id: child
  flow: child
  mode: static
connect:
  - from: .step_begin
    to: child.step_begin
  - from: child.micro_relayed
    to: .micro_done
    adapter: child_micro_relayed_to_root_micro_done
