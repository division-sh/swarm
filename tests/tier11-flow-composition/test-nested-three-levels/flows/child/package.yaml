name: child
version: 1.0.0
description: Mid-level child flow that delegates to grandchild.
platform_version: ">=0.7.0 <0.8.0"
flows:
- id: grandchild
  flow: grandchild
  mode: static
connect:
  - from: .micro_start
    to: grandchild.micro_start
  - from: grandchild.micro_done
    to: .micro_done
    adapter: grandchild_micro_done_to_child_micro_done
