root-dispatcher:
  id: root-dispatcher
  execution_type: system_node
  subscribes_to: [pipeline.start]
  produces: [step.begin]
  event_handlers:
    pipeline.start:
      emit: step.begin

root-collector:
  id: root-collector
  execution_type: system_node
  subscribes_to: [micro.done]
  produces: [pipeline.complete]
  event_handlers:
    micro.done:
      advances_to: done
      emit:
        event: pipeline.complete
        broadcast: true
