name: worker
namespace: worker
mode: template
instance:
  by: worker_id
  on_missing: create
  on_conflict: reject
initial_state: idle
terminal_states: [complete]
states: [idle, working, complete]
instance_variables:
  worker_id: string
  task_label: string
pins:
  inputs:
    events: [work.assign]
  outputs:
    events: [work.done]
