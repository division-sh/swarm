orchestrator:
  id: orchestrator
  execution_type: system_node
  subscribes_to: [spawn.requested]
  produces: [spawn.confirmed]
  event_handlers:
    spawn.requested:
      action: create_flow_instance
      template: worker
      instance_id_from: payload.worker_id
      emit: spawn.confirmed
      advances_to: done
  permissions:
  - create_flow_instance
