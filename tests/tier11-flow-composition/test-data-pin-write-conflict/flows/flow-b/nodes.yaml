b-node:
  id: b-node
  execution_type: system_node
  subscribes_to: [b.start]
  produces: [b.done]
  event_handlers:
    b.start:
      create_entity: true
      data_accumulation:
        writes:
          - source_field: shared_field
            value:
              source: flow-b
      advances_to: done
      emits: b.done
