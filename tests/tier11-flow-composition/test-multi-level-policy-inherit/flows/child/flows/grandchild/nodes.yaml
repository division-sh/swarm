grandchild-node:
  id: grandchild-node
  execution_type: system_node
  subscribes_to: [grandchild.check]
  produces: [grandchild.passed]
  event_handlers:
    grandchild.check:
      create_entity: true
      guard:
        id: policy_merge_check
        check: "policy.threshold >= 60 AND policy.mode == 'relaxed'"
      advances_to: approved
      emit:
        event: grandchild.passed
        broadcast: true
