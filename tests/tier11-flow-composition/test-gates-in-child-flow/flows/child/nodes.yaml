validator:
  execution_type: system_node
  subscribes_to:
    - validate.start
  produces:
    - validation.done
  gate_state:
    g_validated: gate set when validation completes
  event_handlers:
    validate.start:
      create_entity: true
      advances_to: done
      sets_gate: g_validated
      emit:
        event: validation.done
