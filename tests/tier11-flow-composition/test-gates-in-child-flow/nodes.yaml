router:
  execution_type: system_node
  subscribes_to:
    - validate.requested
    - child/validation.done
  produces:
    - validate.passed
    - child/validate.start
  event_handlers:
    validate.requested:
      emit: child/validate.start
    child/validation.done:
      guard:
        id: check_child_gate
        check: _entity.gates['child/g_validated'] == true
      advances_to: done
      emit:
        event: validate.passed
        broadcast: true
