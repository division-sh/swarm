name: test-gates-in-child-flow
version: 1.0.0
platform_version: ">=0.7.0 <0.8.0"
description: >
  Gates set in a child flow are scoped to that flow instance. Parent checks
  child-scoped gate via child/g_validated reference.
flows:
  - id: child
    flow: child
    mode: static
connect:
  - from: child.validation_done
    to: .validation_done
