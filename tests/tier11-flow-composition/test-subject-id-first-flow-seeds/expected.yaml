# _note: subject_id_is_self is a new assertion type. It asserts that the
# child entity's subject_id equals its own entity_id, proving self-origin
# seeding per spec v1.6.0 subject_id.propagation_rules.first_flow.
# The entity_id is auto-generated by create_entity so a static UUID
# cannot be asserted here.

trigger:
  event: job.created
  payload:
    entity_id: 11111111-1111-1111-1111-111111111111

expected:
  handler_outcome: success
  flow_entities:
    intake:
      entity_state: processed
      subject_id_is_self: true
