child-checker:
  id: child-checker
  execution_type: system_node
  subscribes_to: [check.requested]
  produces: [check.passed]
  event_handlers:
    check.requested:
      create_entity: true
      guard:
        id: threshold_check
        check: "payload.score >= policy.threshold"
      advances_to: approved
      emits: check.passed
