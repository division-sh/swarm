parent-node:
  id: parent-node
  execution_type: system_node
  subscribes_to: [job.submit]
  produces: [work.requested]
  event_handlers:
    job.submit:
      emit: work.requested

parent-listener:
  id: parent-listener
  execution_type: system_node
  subscribes_to: [child/work.completed]
  produces: [job.done]
  event_handlers:
    child/work.completed:
      advances_to: done
      emit: job.done
