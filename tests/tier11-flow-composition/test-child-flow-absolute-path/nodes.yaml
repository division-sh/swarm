dispatcher:
  id: dispatcher
  execution_type: system_node
  subscribes_to: [work.start]
  produces: [child/task.requested]
  event_handlers:
    work.start:
      emit: child/task.requested

listener:
  id: listener
  execution_type: system_node
  subscribes_to: [task.done]
  produces: [work.finished]
  event_handlers:
    task.done:
      advances_to: done
      emit:
        event: work.finished
        broadcast: true
