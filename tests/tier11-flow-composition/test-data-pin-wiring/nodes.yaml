config-writer:
  id: config-writer
  execution_type: system_node
  subscribes_to: [job.start]
  produces: [processor/process.run]
  event_handlers:
    job.start:
      data_accumulation:
        writes:
          - target_field: task_config
            value:
              mode: "{{payload.mode}}"
              threshold: "{{payload.threshold}}"
      advances_to: configured
      emit: processor/process.run

result-listener:
  id: result-listener
  execution_type: system_node
  subscribes_to: [process.done]
  produces: [job.complete]
  event_handlers:
    process.done:
      advances_to: done
      emit:
        event: job.complete
        broadcast: true
