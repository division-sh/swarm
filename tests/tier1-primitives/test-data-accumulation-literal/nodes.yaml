test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [item.received]
  produces: [item.categorized]
  event_handlers:
    item.received:
      data_accumulation:
        writes:
          - target_field: category
            value: "premium"
        source_event: item.received
      advances_to: done
      emit:
        event: item.categorized
        broadcast: true
  state_schema:
    fields:
      category: string
