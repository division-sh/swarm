test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [item.received]
  produces: [item.stored]
  event_handlers:
    item.received:
      data_accumulation:
        writes:
          - source_field: src_name
            target_field: name
        source_event: item.received
      advances_to: done
      emits: item.stored
  state_schema:
    fields:
      name: string
