test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [item.received]
  produces: [item.processed]
  event_handlers:
    item.received:
      rules:
        type_a:
          condition: "payload.kind == a"
          data_accumulation:
            writes: [value]
            source: payload.value
  state_schema:
    fields:
      value: integer
