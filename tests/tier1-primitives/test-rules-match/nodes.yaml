test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [item.received]
  produces: [routed.a, routed.b]
  event_handlers:
    item.received:
      rules:
        type_a:
          condition: "payload.kind == 'a'"
          emit:
            event: routed.a
            broadcast: true
        type_b:
          condition: "payload.kind == 'b'"
          emit:
            event: routed.b
            broadcast: true
