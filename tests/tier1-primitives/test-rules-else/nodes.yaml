test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [item.received]
  produces: [routed.a, routed.unknown]
  event_handlers:
    item.received:
      rules:
        type_a:
          condition: "payload.kind == 'a'"
          emit: routed.a
        unknown:
          condition: "else"
          emit: routed.unknown
