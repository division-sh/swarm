test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [export.requested]
  produces: [item.exported]
  event_handlers:
    export.requested:
      advances_to: done
      emit:
        event: item.exported
        broadcast: true
        fields:
          id: event.entity_id
          name: entity.name
          status: entity.current_state
  state_schema:
    fields:
      name: string
