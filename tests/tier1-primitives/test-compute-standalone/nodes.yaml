test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [scores.ready]
  produces: [scores.computed]
  event_handlers:
    scores.ready:
      compute:
        operation: weighted_average
        keys:
          dimension_key: dimension
          score_keys: [value]
        tiers:
          - dimensions: [a, b]
            weight: 0.6
          - dimensions: [c]
            weight: 0.4
        store_as: entity.composite
      advances_to: done
      emit:
        event: scores.computed
        broadcast: true
  state_schema:
    fields:
      composite: float
