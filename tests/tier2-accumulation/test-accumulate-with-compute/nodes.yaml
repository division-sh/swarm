test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [score.received]
  produces: [scores.aggregated]
  event_handlers:
    score.received:
      accumulate:
        expected_from: entity.expected_count
        completion: all
      on_complete:
        - compute:
            operation: weighted_average
            store_as: entity.composite
            keys:
              dimension_key: dimension
              score_keys: [score]
            tiers:
              - dimensions: [a]
                weight: 0.5
              - dimensions: [b]
                weight: 0.3
              - dimensions: [c]
                weight: 0.2
          emit: scores.aggregated
      advances_to: complete
  state_schema:
    fields:
      expected_count: integer
      composite: float
      received_items: jsonb
