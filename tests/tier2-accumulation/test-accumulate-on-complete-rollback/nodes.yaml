scorer:
  id: scorer
  execution_type: system_node
  subscribes_to: [score.received]
  produces: [batch.scored]
  event_handlers:
    score.received:
      accumulate:
        expected_from: entity.expected_count
        completion: all
      on_complete:
        - condition: "true"
          advances_to: scored
          emit: batch.scored

verifier:
  id: verifier
  execution_type: system_node
  subscribes_to: [batch.scored]
  produces: [scores.verified]
  event_handlers:
    batch.scored:
      guard:
        id: confirm_scored_state
        check: "_entity.current_state == \"scored\""
        on_fail: reject
      advances_to: verified
      emit:
        event: scores.verified
        broadcast: true
