test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [score.received]
  produces: [scores.collected]
  event_handlers:
    score.received:
      accumulate:
        expected_from: entity.expected_count
        completion: all
        from: "scoring/analysis-agent"
      advances_to: complete
      emits: scores.collected
  state_schema:
    fields:
      expected_count: integer
      received_items: jsonb
