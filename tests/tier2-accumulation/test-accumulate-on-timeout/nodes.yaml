test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [item.arrived, accumulate.timeout]
  produces: [collection.done, collection.partial]
  event_handlers:
    item.arrived:
      accumulate:
        expected_from: entity.expected_count
        completion: all
        on_complete:
          - condition: else
            advances_to: complete
            emit: collection.done
        on_timeout:
          advances_to: partial
          emit: collection.partial
  state_schema:
    fields:
      expected_count: integer
      received_items: text[]
