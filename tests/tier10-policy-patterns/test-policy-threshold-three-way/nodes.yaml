classifier:
  id: classifier
  execution_type: system_node
  subscribes_to: [eval.submitted]
  produces: [eval.tier_a, eval.tier_b, eval.tier_c]
  event_handlers:
    eval.submitted:
      data_accumulation:
        writes:
          - score
      on_complete:
        - condition: "payload.score >= policy.high_mark"
          advances_to: tier_a
          emit: eval.tier_a
        - condition: "payload.score >= policy.low_mark"
          advances_to: tier_b
          emit: eval.tier_b
        - condition: "else"
          advances_to: tier_c
          emit: eval.tier_c
