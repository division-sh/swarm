processor:
  id: processor
  execution_type: system_node
  subscribes_to: [attempt.requested]
  produces: [attempt.processed, attempt.limit_hit]
  event_handlers:
    attempt.requested:
      guard:
        id: below_limit
        check: "entity.attempt_count < policy.max_attempts"
        on_fail: "escalate:attempt.limit_hit"
      data_accumulation:
        writes:
          - target_field: attempt_count
            expression: entity.attempt_count + 1
      emit:
        event: attempt.processed
        broadcast: true
