evaluator:
  id: evaluator
  execution_type: system_node
  subscribes_to: [score.final]
  produces: [result.promoted, result.demoted, result.rejected]
  event_handlers:
    score.final:
      data_accumulation:
        main_score: payload.main_score
        secondary_score: payload.secondary_score
      on_complete:
        - condition: "entity.main_score >= policy.high_mark AND entity.secondary_score >= policy.hard_floor"
          advances_to: promoted
          emits: result.promoted
        - condition: "entity.main_score >= policy.low_mark"
          advances_to: demoted
          emits: result.demoted
        - condition: "else"
          advances_to: rejected
          emits: result.rejected
