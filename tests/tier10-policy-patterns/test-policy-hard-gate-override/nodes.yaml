evaluator:
  id: evaluator
  execution_type: system_node
  subscribes_to: [score.final]
  produces: [result.promoted, result.demoted, result.rejected]
  event_handlers:
    score.final:
      data_accumulation:
        writes:
          - main_score
          - secondary_score
      on_complete:
        - condition: "payload.main_score >= policy.high_mark AND payload.secondary_score >= policy.hard_floor"
          advances_to: promoted
          emit:
            event: result.promoted
            broadcast: true
        - condition: "payload.main_score >= policy.low_mark"
          advances_to: demoted
          emit:
            event: result.demoted
            broadcast: true
        - condition: "else"
          advances_to: rejected
          emit:
            event: result.rejected
            broadcast: true
