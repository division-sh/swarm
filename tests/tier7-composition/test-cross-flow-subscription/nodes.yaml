flow-b-node:
  id: flow-b-node
  flow: flow-b
  execution_type: system_node
  subscribes_to: [order.submitted]
  produces: [order.completed]
  event_handlers:
    order.submitted:
      advances_to: done
      emits: order.completed

flow-a-node:
  id: flow-a-node
  flow: flow-a
  execution_type: system_node
  subscribes_to: [order.completed]
  produces: [invoice.created]
  event_handlers:
    order.completed:
      advances_to: done
      emits: invoice.created
