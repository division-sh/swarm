name: test-cross-flow-subscription
version: 1.0.0
description: Node in flow A subscribes to an event originating from flow B.
platform_version: ">=0.7.0 <0.8.0"
flows:
  - id: flow-a
    flow: flow-a
    mode: static
  - id: flow-b
    flow: flow-b
    mode: static
connect:
  - from: flow-b.order.completed
    to: flow-a.flow-b/order.completed
    adapter: flow-b-order-completed
