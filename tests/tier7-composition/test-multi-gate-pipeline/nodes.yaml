gate-setter-1:
  id: gate-setter-1
  execution_type: system_node
  subscribes_to: [gate.g1_set]
  event_handlers:
    gate.g1_set:
      sets_gate: g1

gate-setter-2:
  id: gate-setter-2
  execution_type: system_node
  subscribes_to: [gate.g2_set]
  event_handlers:
    gate.g2_set:
      sets_gate: g2

gate-setter-3:
  id: gate-setter-3
  execution_type: system_node
  subscribes_to: [gate.g3_set]
  event_handlers:
    gate.g3_set:
      sets_gate: g3

approval-node:
  id: approval-node
  execution_type: system_node
  subscribes_to: [approval.requested]
  produces: [approval.granted]
  event_handlers:
    approval.requested:
      guard:
        id: all_gates_check
        check: "entity.gates.g1 == true && entity.gates.g2 == true && entity.gates.g3 == true"
      advances_to: approved
      emits: approval.granted
