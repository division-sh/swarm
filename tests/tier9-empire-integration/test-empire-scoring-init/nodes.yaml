scoring-node:
  id: scoring-node
  execution_type: system_node
  subscribes_to: [vertical.discovered, score.dimension_complete, vertical.derived, vertical.killed_backprop]
  produces: [scoring.requested, vertical.shortlisted, vertical.marginal, vertical.rejected]
  event_handlers:
    vertical.discovered:
      data_accumulation:
        writes:
          - source_field: vertical_name
            target_field: name
          - geography
          - raw_signals
          - signal_strength
          - source_field: mode
            target_field: discovery_mode
          - opportunity_pattern
        source_event: vertical.discovered
      rules:
        saas_gap:
          condition: "payload.mode == saas_gap"
          data_accumulation:
            writes:
              - scoring_rubric
            value: saas_gap_rubric
        saas_trend:
          condition: "payload.mode == saas_trend"
          data_accumulation:
            writes:
              - scoring_rubric
            value: saas_trend_rubric
        local_services:
          condition: "payload.mode == local_services"
          data_accumulation:
            writes:
              - scoring_rubric
            value: local_services_rubric
        corpus:
          condition: "payload.mode == corpus"
          data_accumulation:
            writes:
              - scoring_rubric
            value: corpus_rubric
      emits: scoring.requested
  state_schema:
    fields:
      name: string
      geography: string
      raw_signals: object
      signal_strength: integer
      discovery_mode: string
      opportunity_pattern: string
      scoring_rubric: string
