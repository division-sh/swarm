discovery-aggregator:
  id: discovery-aggregator
  execution_type: system_node
  subscribes_to: [category.assessed, dedup.resolved]
  produces: [vertical.discovered, dedup.ambiguous]
  state_table: pending_dedup_candidates
  event_handlers:
    dedup.resolved:
      rules:
        keep_first:
          condition: "payload.strategy == keep_first"
          data_accumulation:
            writes:
              - merged_signal
            source: payload.signal_a
        keep_best:
          condition: "payload.strategy == keep_best"
          data_accumulation:
            writes:
              - merged_signal
            source: payload.best_signal
        merge_fields:
          condition: "payload.strategy == merge_fields"
          data_accumulation:
            writes:
              - merged_signal
            source: payload.merged
  state_schema:
    fields:
      merged_signal: object
