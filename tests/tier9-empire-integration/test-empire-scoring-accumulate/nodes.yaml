scoring-node:
  id: scoring-node
  execution_type: system_node
  subscribes_to: [vertical.discovered, score.dimension_complete, vertical.derived, vertical.killed_backprop]
  produces: [scoring.requested, vertical.shortlisted, vertical.marginal, vertical.rejected]
  event_handlers:
    score.dimension_complete:
      accumulate:
        expected_from: entity.dimensions_requested
        completion: all
        dedup_by: payload.dimension
      on_complete:
        - condition: "composite_score >= 75 AND build_complexity >= 50 AND automation_completeness >= 50"
          emits: vertical.shortlisted
          advances_to: shortlisted
        - condition: "composite_score >= 50 AND composite_score < 75 AND count(tier1_dims >= 70) >= 2"
          emits: vertical.marginal
          advances_to: marginal_review
        - condition: "else"
          emits: vertical.rejected
          advances_to: killed
      compute:
        operation: weighted_average
        tiers:
          - dimensions: [build_complexity, automation_completeness, icp_crispness, distribution_leverage, time_to_value, operational_drag]
            weight: 0.6
          - dimensions: [pain_severity, competition_gap, monetization_clarity]
            weight: 0.3
          - dimensions: [retention_architecture, expansion_potential]
            weight: 0.1
        store_as: entity.composite_score
  state_schema:
    fields:
      dimensions_requested: array
      composite_score: float
