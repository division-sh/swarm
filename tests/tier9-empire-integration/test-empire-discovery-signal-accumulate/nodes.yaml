discovery-aggregator:
  id: discovery-aggregator
  execution_type: system_node
  subscribes_to: [category.assessed, trend.identified, source.scraped, dedup.resolved]
  produces: [vertical.discovered, dedup.ambiguous]
  state_table: pending_dedup_candidates
  event_handlers:
    category.assessed:
      description: Accumulate discovery signal into scan batch.
    trend.identified:
      description: Accumulate discovery signal into scan batch.
    source.scraped:
      description: Accumulate discovery signal into scan batch.
