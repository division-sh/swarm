build-orchestrator:
  id: build-orchestrator
  execution_type: system_node
  subscribes_to: [product_spec_ready, technical_spec_ready, qa.validation_passed, deploy.requested]
  produces: [build_complete, deploy.authorized, build.escalation]
  gate_state:
    g_product_spec: PM completed product spec
    g_tech_spec: CTO completed tech spec
    g_qa_passed: QA validated the build
  event_handlers:
    deploy.requested:
      guard:
        id: qa_gate
        check: "entity.gates.g_qa_passed == true"
        on_fail: reject
      emits: deploy.authorized
