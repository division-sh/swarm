validation-orchestrator:
  id: validation-orchestrator
  execution_type: system_node
  subscribes_to:
    - vertical.shortlisted
    - research.completed
    - spec.draft_ready
    - spec_review.passed
    - cto.spec_approved
    - brand.candidates_ready
    - spec.validation_failed
    - cto.spec_vetoed
  produces:
    - validation.started
    - spec.requested
    - spec_review.requested
    - cto.spec_review_requested
    - brand.requested
    - validation.package_ready
    - mailbox.review_requested
    - vertical.killed
    - vertical.killed_backprop
  gate_state:
    gates: [g1_research, g2_spec, g3_cto, g4_brand]
  event_handlers:
    vertical.shortlisted:
      advances_to: researching
      emits: validation.started
    research.completed:
      sets_gate: g1_research
      data_accumulation:
        writes:
          - business_brief
          - research_context
        source_event: research.completed
      advances_to: mvp_speccing
      emits: spec.requested
    spec.draft_ready:
      emits: spec_review.requested
    spec_review.passed:
      sets_gate: g2_spec
      data_accumulation:
        writes:
          - source_field: final_spec
            target_field: mvp_spec
        source_event: spec_review.passed
      advances_to: cto_review
      emits: cto.spec_review_requested
    cto.spec_approved:
      sets_gate: g3_cto
      data_accumulation:
        writes:
          - source_field: cto_notes
            target_field: cto_feasibility
        source_event: cto.spec_approved
      advances_to: branding
      emits: brand.requested
    brand.candidates_ready:
      sets_gate: g4_brand
      data_accumulation:
        writes:
          - source_field: candidates
            target_field: brand
        source_event: brand.candidates_ready
      advances_to: ready_for_review
      emits:
        - validation.package_ready
        - mailbox.review_requested
  state_schema:
    fields:
      gate_state: object
      business_brief: object
      research_context: object
      mvp_spec: string
      cto_feasibility: string
      brand: array
      revision_count: integer
