dispatcher:
  id: dispatcher
  execution_type: system_node
  subscribes_to: [batch.requested]
  produces: [batch.dispatched]
  event_handlers:
    batch.requested:
      count:
        items_from: payload.items
        store_as: entity.dispatch_count
      rules:
        - id: parallel
          condition: "payload.mode == 'parallel'"
          advances_to: dispatched
          emit:
            event: batch.dispatched
            broadcast: true
        - id: sequential
          condition: "payload.mode == 'sequential'"
          data_accumulation:
            writes:
              - target_field: dispatch_count
                value: 1
          advances_to: dispatched
          emit:
            event: batch.dispatched
            broadcast: true
        - id: fallback
          condition: "else"
          data_accumulation:
            writes:
              - target_field: dispatch_count
                value: 0
          advances_to: dispatched
          emit:
            event: batch.dispatched
            broadcast: true
