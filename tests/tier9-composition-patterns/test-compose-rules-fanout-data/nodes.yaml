dispatcher:
  id: dispatcher
  execution_type: system_node
  subscribes_to: [batch.requested]
  produces: [batch.dispatched]
  event_handlers:
    batch.requested:
      rules:
        - id: parallel
          condition: "payload.mode == 'parallel'"
          fan_out:
            items_from: payload.items
          data_accumulation:
            writes:
              - target_field: dispatch_count
                expression: fan_out.count
          advances_to: dispatched
          emit: batch.dispatched
        - id: sequential
          condition: "payload.mode == 'sequential'"
          data_accumulation:
            writes:
              - target_field: dispatch_count
                value: 1
          advances_to: dispatched
          emit: batch.dispatched
        - id: fallback
          condition: "else"
          data_accumulation:
            writes:
              - target_field: dispatch_count
                value: 0
          advances_to: dispatched
          emit: batch.dispatched
