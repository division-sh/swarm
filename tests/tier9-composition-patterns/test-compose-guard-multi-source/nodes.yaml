gatekeeper:
  id: gatekeeper
  execution_type: system_node
  subscribes_to: [candidate.submitted]
  produces: [candidate.accepted]
  event_handlers:
    candidate.submitted:
      guard:
        checks:
          - id: depth_check
            check: "entity.depth <= policy.max_depth"
          - id: count_check
            check: "entity.child_count < 2"
          - id: score_floor
            check: "payload.score >= policy.min_score"
          - id: no_flags
            check: "entity.flag_count == 0"
          - id: name_unique
            check: "query_entities(name == payload.name).count == 0"
        on_fail: discard
      advances_to: accepted
      emit: candidate.accepted
