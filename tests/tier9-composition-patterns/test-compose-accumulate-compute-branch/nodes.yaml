scorer:
  id: scorer
  execution_type: system_node
  subscribes_to: [score.submitted]
  produces: [result.high, result.mid, result.low]
  event_handlers:
    score.submitted:
      data_accumulation:
        writes:
          - source_field: value
            target_field: score
      on_complete:
        - condition: "entity.score >= 75"
          advances_to: high
          emits: result.high
        - condition: "entity.score >= 50"
          advances_to: mid
          emits: result.mid
        - condition: "else"
          advances_to: low
          emits: result.low
