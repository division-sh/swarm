resolver:
  id: resolver
  execution_type: system_node
  subscribes_to: [conflict.submitted]
  produces: [conflict.resolved]
  event_handlers:
    conflict.submitted:
      rules:
        - name: keep_first
          condition: "payload.strategy == 'keep_first'"
          data_accumulation:
            writes:
              - source_field: value_a
                target_field: resolved_value
              - source_field: resolution_method
                value: "first"
          advances_to: resolved
          emits: conflict.resolved
        - name: keep_best
          condition: "payload.strategy == 'keep_best'"
          data_accumulation:
            writes:
              - source_field: value_b
                target_field: resolved_value
              - source_field: resolution_method
                value: "best"
          advances_to: resolved
          emits: conflict.resolved
        - name: merge
          condition: "payload.strategy == 'merge'"
          data_accumulation:
            writes:
              - source_field: value_a
                target_field: resolved_value_a
              - source_field: value_b
                target_field: resolved_value_b
              - source_field: resolution_method
                value: "merged"
          advances_to: resolved
          emits: conflict.resolved
