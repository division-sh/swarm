reviewer:
  id: reviewer
  execution_type: system_node
  subscribes_to: [review.done, review.insufficient]
  produces: [review.approved, review.restarted]
  event_handlers:
    review.done:
      sets_gate: g_reviewed
      advances_to: approved
      emit:
        event: review.approved
        broadcast: true
    review.insufficient:
      clear_gates: true
      advances_to: reviewing
      emit:
        event: review.restarted
        broadcast: true
