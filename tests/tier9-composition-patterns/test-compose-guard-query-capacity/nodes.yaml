gatekeeper:
  id: gatekeeper
  execution_type: system_node
  subscribes_to: [admission.requested]
  produces: [admission.granted]
  event_handlers:
    admission.requested:
      guard:
        checks:
          - id: capacity_check
            check: "query_entities(current_state == 'admitted').count < policy.max_capacity"
        on_fail: discard
      advances_to: admitted
      emit: admission.granted
