spawner:
  id: spawner
  execution_type: system_node
  subscribes_to: [spawn.requested]
  produces: [spawn.done]
  event_handlers:
    spawn.requested:
      action:
        type: create_flow_instance
        flow_template: worker
        instance_id: "{{payload.instance_id}}"
        config_from:
          name: payload.name
          priority: payload.priority
          owner: payload.owner
      advances_to: spawned
      emits: spawn.done
