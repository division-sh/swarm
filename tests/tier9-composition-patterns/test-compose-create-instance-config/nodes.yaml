spawner:
  id: spawner
  execution_type: system_node
  subscribes_to: [spawn.requested]
  produces: [spawn.done]
  event_handlers:
    spawn.requested:
      action: create_flow_instance
      template: worker
      instance_id_from: payload.instance_id
      config_from:
        name: payload.name
        priority: payload.priority
        owner: payload.owner
      advances_to: spawned
      emit:
        event: spawn.done
        broadcast: true
