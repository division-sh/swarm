name: worker
mode: template
instance:
  by: name
  on_missing: create
  on_conflict: reject
initial_state: ready
terminal_states: [done]
states: [ready, done]
instance_variables:
  name: Worker name
  priority: Priority level
  owner: Owner
pins:
  inputs:
    events:
      - name: task_assign
        event: task.assign
        source: external
  outputs:
    events: [task.done]
