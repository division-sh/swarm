test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [state.reset_requested]
  produces: [state.reset_completed]
  event_handlers:
    state.reset_requested:
      clear:
        targets:
          - accumulator_state
          - cycle_counters
          - pending_dedup
      emit:
        event: state.reset_completed
        broadcast: true
      advances_to: cleared
