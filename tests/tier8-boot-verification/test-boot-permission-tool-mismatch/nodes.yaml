test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [task.requested]
  produces: [task.completed]
  event_handlers:
    task.requested:
      advances_to: done
      emits: task.completed

sink-node:
  id: sink-node
  execution_type: system_node
  subscribes_to: [task.completed]
  produces: [task.logged]
  event_handlers:
    task.completed:
      emits: task.logged
