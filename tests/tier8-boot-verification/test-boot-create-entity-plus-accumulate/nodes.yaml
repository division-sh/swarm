test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [task.started]
  produces: [task.done]
  event_handlers:
    task.started:
      create_entity: true
      accumulate:
        into: items
        from: payload
      advances_to: done
      emit:
        event: task.done
        broadcast: true
