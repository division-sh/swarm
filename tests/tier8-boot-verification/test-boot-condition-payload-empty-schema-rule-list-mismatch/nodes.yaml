test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [check.requested]
  produces: [check.passed]
  event_handlers:
    check.requested:
      rules:
        - id: empty_schema_rule
          condition: "payload.empty_schema_rule == true"
          advances_to: done
          emit:
            event: check.passed
            broadcast: true
