test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [intake.requested]
  produces: [intake.completed]
  event_handlers:
    intake.requested:
      guard:
        id: bare_cond_guard
        check: "type == intake"
      advances_to: done
      emit:
        event: intake.completed
        broadcast: true
