policy-check-node:
  id: policy-check-node
  execution_type: system_node
  subscribes_to: [check.requested]
  produces: [check.passed]
  event_handlers:
    check.requested:
      guard:
        id: policy_ref
        check: "payload.score >= policy.nonexistent_key"
      advances_to: done
      emit:
        event: check.passed
        broadcast: true
