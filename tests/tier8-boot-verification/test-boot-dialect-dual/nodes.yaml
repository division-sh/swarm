dual-dialect-node:
  id: dual-dialect-node
  execution_type: system_node
  subscribes_to: [check.requested]
  produces: [check.passed]
  event_handlers:
    check.requested:
      on_complete:
        - condition: "payload.score >= 70"
          advances_to: done
          emit: check.passed
      rules:
        - name: high_score
          condition: "payload.score >= 70"
          emit: check.passed
      advances_to: done
