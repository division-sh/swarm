task-node:
  id: task-node
  execution_type: system_node
  subscribes_to: [task.started, timer.task_timeout]
  produces: [task.timed_out]
  timers:
    - id: task_timer
      event: timer.task_timeout
      delay: 1h
      start_on: event:task.started
  event_handlers:
    task.started:
      advances_to: active
    timer.task_timeout:
      advances_to: timed_out
      emit:
        event: task.timed_out
        broadcast: true
