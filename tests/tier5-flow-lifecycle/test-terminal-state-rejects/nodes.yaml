complete-node:
  id: complete-node
  execution_type: system_node
  subscribes_to: [task.completed]
  produces: [task.finished]
  event_handlers:
    task.completed:
      advances_to: done
      emit:
        event: task.finished
        broadcast: true

reopen-node:
  id: reopen-node
  execution_type: system_node
  subscribes_to: [task.reopen_requested]
  produces: [state.reopened]
  event_handlers:
    task.reopen_requested:
      advances_to: processing
      emit:
        event: state.reopened
        broadcast: true
