test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [flow.spawn_with_config]
  produces: [flow.spawned]
  event_handlers:
    flow.spawn_with_config:
      action: create_flow_instance
      template: worker-flow
      instance_id_from: payload.instance_id
      config_from:
        max_retries: payload.config.max_retries
        timeout_ms: payload.config.timeout_ms
      emit:
        event: flow.spawned
        broadcast: true
      advances_to: spawned
