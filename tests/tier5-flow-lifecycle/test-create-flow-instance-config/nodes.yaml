test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [flow.spawn_with_config]
  produces: [flow.spawned]
  event_handlers:
    flow.spawn_with_config:
      action:
        type: create_flow_instance
        flow_template: worker-flow
        instance_id: "{{payload.instance_id}}"
        config_from:
          threshold: "{{payload.threshold}}"
          mode: "{{payload.mode}}"
          limit: "{{payload.limit}}"
      emits: flow.spawned
      advances_to: spawned
