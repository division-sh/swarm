name: worker-flow
namespace: worker-flow
mode: template
instance:
  by: max_retries
  on_missing: create
  on_conflict: reject
initial_state: idle
terminal_states: [complete]
states: [idle, complete]
instance_variables:
  max_retries: integer
  timeout_ms: integer
auto_emit_on_create:
  event: worker.ready
pins:
  outputs:
    events: [worker.ready]
