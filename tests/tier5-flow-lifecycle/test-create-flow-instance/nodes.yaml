test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [flow.spawn_requested]
  produces: [flow.spawned]
  event_handlers:
    flow.spawn_requested:
      action: create_flow_instance
      template: worker-flow
      instance_id_from: payload.instance_id
      config_from:
        entity_id: payload.entity_id
      emit:
        event: flow.spawned
        broadcast: true
      advances_to: spawned
