test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [flow.spawn_requested]
  produces: [flow.spawned]
  event_handlers:
    flow.spawn_requested:
      action: create_flow_instance
      action_params:
        template: worker-flow
        instance_id: "payload.instance_id"
      emits: flow.spawned
      advances_to: spawned
