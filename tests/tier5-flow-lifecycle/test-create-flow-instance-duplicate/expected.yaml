trigger:
  sequence:
    - event: flow.spawn_requested
      payload:
        instance_id: worker-dup
        worker_id: worker-dup
    - event: flow.spawn_requested
      payload:
        instance_id: worker-dup
        worker_id: worker-dup
      receipt_outcome: dead_letter
      receipt_failure_class: platform.conflicting_duplicate
      receipt_failure_detail: flow_instance_already_exists
      receipt_failure_attributes:
        flow_instance: worker-flow/worker-dup
      error_contains: flow_instance_already_exists

expected:

  entity_state: spawned
  dead_letter: true
  emitted_events:
    - flow.spawned
  flow_instance_created:
    template: worker-flow
    instance_id: worker-dup
    config:
      worker_id: worker-dup
    auto_emitted: worker-flow/worker-dup/worker.ready
