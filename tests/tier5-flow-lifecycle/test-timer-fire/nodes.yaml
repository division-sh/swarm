test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [timer.scheduled, timer.check]
  produces: [timer.check]
  timers:
    - id: check_timer
      event: timer.check
      delay: 1s
      start_on: timer.scheduled
  event_handlers:
    timer.scheduled:
      advances_to: waiting
    timer.check:
      advances_to: checked
