timer-node:
  id: timer-node
  execution_type: system_node
  subscribes_to: [timer.scheduled, timer.check]
  produces: [timer.check]
  timers:
    - id: check_timer
      event: timer.check
      delay: 5s
      start_on: timer.scheduled
      cancel_on: timer.cancel_requested
  event_handlers:
    timer.scheduled:
      advances_to: waiting
    timer.check:
      advances_to: done

cancel-node:
  id: cancel-node
  execution_type: system_node
  subscribes_to: [timer.cancel_requested]
  produces: [timer.cancelled]
  event_handlers:
    timer.cancel_requested:
      advances_to: cancelled
      emits: timer.cancelled
