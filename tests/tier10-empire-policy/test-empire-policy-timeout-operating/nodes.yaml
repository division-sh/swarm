lifecycle-orchestrator:
  id: lifecycle-orchestrator
  execution_type: system_node
  subscribes_to: [timer.operating_timeout]
  produces: [operating.timeout_escalation]
  event_handlers:
    timer.operating_timeout:
      guard:
        id: operating_timeout_check
        check: "payload.elapsed_hours >= policy.operating_state_timeout_hours"
      advances_to: escalated
      emits: operating.timeout_escalation
