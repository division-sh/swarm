score-node:
  id: score-node
  execution_type: system_node
  subscribes_to: [score.dimension_complete]
  produces: [vertical.shortlisted, vertical.marginal, vertical.rejected]
  event_handlers:
    score.dimension_complete:
      on_complete:
        - condition: "payload.composite_score >= policy.composite_shortlist AND payload.build_complexity >= policy.hard_gate_floor AND payload.automation_completeness >= policy.hard_gate_floor"
          emits: vertical.shortlisted
          advances_to: shortlisted
        - condition: "payload.composite_score >= policy.hard_gate_floor AND payload.composite_score < policy.composite_shortlist AND payload.tier1_dims_above_70 >= 2"
          emits: vertical.marginal
          advances_to: marginal_review
        - condition: "else"
          emits: vertical.rejected
          advances_to: killed
