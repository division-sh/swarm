discovery-router:
  id: discovery-router
  execution_type: system_node
  subscribes_to: [vertical.discovered]
  produces: [scoring.requested]
  event_handlers:
    vertical.discovered:
      advances_to: scoring
      emits: scoring.requested

derivation-router:
  id: derivation-router
  execution_type: system_node
  subscribes_to: [vertical.derived]
  produces: [scoring.derived_requested]
  event_handlers:
    vertical.derived:
      guard:
        checks:
          - id: depth_check
            check: "entity.generation_depth <= policy.max_derivation_depth"
          - id: signal_check
            check: "payload.signal_strength >= policy.min_derivation_signal"
          - id: icp_check
            check: "entity.scores.icp_crispness >= policy.min_icp_score"
        on_fail: discard
      advances_to: derived_scoring
      emits: scoring.derived_requested
