test-node:
  id: test-node
  execution_type: system_node
  subscribes_to: [task.submitted]
  produces: [task.accepted]
  event_handlers:
    task.submitted:
      guard:
        checks:
          - id: impossible
            check: "payload.score > 9999"
        on_fail: discard
      advances_to: done
      emit: task.accepted
