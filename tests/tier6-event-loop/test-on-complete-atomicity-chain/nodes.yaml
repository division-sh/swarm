phase-one:
  id: phase-one
  execution_type: system_node
  subscribes_to: [task.started]
  produces: [phase.advanced]
  event_handlers:
    task.started:
      data_accumulation:
        writes:
          - batch_id
      on_complete:
        - condition: "payload.ready == true"
          advances_to: processing
          emit: phase.advanced

phase-two:
  id: phase-two
  execution_type: system_node
  subscribes_to: [phase.advanced]
  produces: [task.done]
  event_handlers:
    phase.advanced:
      guard:
        id: verify_state_committed
        check: "entity.batch_id != \"\""
        on_fail: reject
      advances_to: done
      emit:
        event: task.done
        broadcast: true
