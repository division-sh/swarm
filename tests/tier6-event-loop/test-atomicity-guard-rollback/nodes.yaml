processor:
  id: processor
  execution_type: system_node
  subscribes_to: [process.requested]
  produces: [process.done]
  event_handlers:
    process.requested:
      guard:
        id: must_be_ready
        check: "entity.status == 'ready'"
      data_accumulation:
        writes:
          - target_field: counter
            expression: entity.counter + 1
      sets_gate: g_processed
      advances_to: processed
      emit: process.done
