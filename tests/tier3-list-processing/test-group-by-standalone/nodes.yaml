group-node:
  id: group-node
  execution_type: system_node
  subscribes_to: [items.submitted]
  produces: [items.grouped]
  event_handlers:
    items.submitted:
      group_by:
        items_from: payload.items
        key: category
        store_as: entity.grouped
      emit:
        event: items.grouped
        broadcast: true
      advances_to: done
