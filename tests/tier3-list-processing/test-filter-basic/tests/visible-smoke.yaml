name: test-filter-basic visible smoke
steps:
  - publish: items.submitted
    payload:
      items:
        - score: 80
        - score: 30
        - score: 70
expect:
  events:
    include: [items.filtered]
  entities:
    - type: core
      current_state: done
      fields:
        filtered:
          - score: 80
          - score: 70
