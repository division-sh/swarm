filter-node:
  id: filter-node
  execution_type: system_node
  subscribes_to: [items.submitted]
  produces: [items.filtered]
  event_handlers:
    items.submitted:
      filter:
        items_from: payload.items
        condition: "item.score > 50"
        store_as: entity.filtered
      emit: items.filtered
      advances_to: done
