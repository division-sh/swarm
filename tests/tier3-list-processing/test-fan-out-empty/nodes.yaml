fan-out-node:
  id: fan-out-node
  execution_type: system_node
  subscribes_to: [batch.submitted]
  produces: [item.assigned]
  event_handlers:
    batch.submitted:
      fan_out:
        items_from: payload.items
        target: fan-out-node
        emit:
          event: item.assigned
          broadcast: true
      advances_to: scanning
