reduce-node:
  id: reduce-node
  execution_type: system_node
  subscribes_to: [scores.submitted]
  produces: [scores.aggregated]
  event_handlers:
    scores.submitted:
      reduce:
        items_from: entity.scores
        operation: weighted_average
        store_as: entity.composite
      emit: scores.aggregated
      advances_to: done
