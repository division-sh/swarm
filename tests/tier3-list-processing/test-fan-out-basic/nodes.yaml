fan-out-node:
  id: fan-out-node
  execution_type: system_node
  subscribes_to: [batch.submitted]
  produces: [scan.assigned]
  event_handlers:
    batch.submitted:
      fan_out:
        items_from: payload.items
        target: fan-out-node
        emit_per_item: scan.assigned
      advances_to: scanning
