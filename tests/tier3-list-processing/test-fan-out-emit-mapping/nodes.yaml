routing-node:
  id: routing-node
  execution_type: system_node
  subscribes_to: [batch.submitted]
  produces: [routed.a, routed.b]
  event_handlers:
    batch.submitted:
      fan_out:
        items_from: payload.items
        as: routed_item
        identity: routed_item.id
        emit:
          event: routed.a
          broadcast: true
          fields:
            item: routed_item
            item_id: routed_item.id
      advances_to: routing
