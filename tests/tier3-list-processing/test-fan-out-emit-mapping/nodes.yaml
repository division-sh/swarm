routing-node:
  id: routing-node
  execution_type: system_node
  subscribes_to: [batch.submitted]
  produces: [routed.a, routed.b]
  event_handlers:
    batch.submitted:
      fan_out:
        items_from: payload.items
        emit:
          event: routed.a
          broadcast: true
          fields:
            item: item
      advances_to: routing
