counter-node:
  id: counter-node
  execution_type: system_node
  subscribes_to: [batch.submitted]
  produces: [batch.counted]
  event_handlers:
    batch.submitted:
      reduce:
        items_from: payload.items
        operation: count
        store_as: entity.item_count
      advances_to: done
      emit:
        event: batch.counted
        broadcast: true
